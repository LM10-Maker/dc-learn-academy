{
  id:"L8",
  level:8,
  name:"Defects, Snagging & Remediation",
  icon:"🔍",
  component:"Defects",
  available:true,
  userNeedStatement:"Understand how defects are classified, tracked, and resolved — and why outstanding defects at handover must be managed, not ignored.",
  plainEnglish:"Every commissioning programme finds defects. The question is not whether defects exist — it is how they are classified, how quickly they are fixed, and what happens to defects that remain open at handover. A well-managed defect process is the difference between a clean handover and years of snagging.",
  grammar:{
    facts:[{term:"Defect Classification (A/B/C)",definition:"A three-tier system for categorising commissioning defects by severity and urgency. Category A: safety-critical or system-stopping — must be resolved before the system can be used. Category B: affects performance or functionality — must be resolved before handover. Category C: cosmetic or minor — can be resolved during defect liability period.",plain:"How serious is the problem? A = dangerous or broken, fix immediately. B = it works but not properly, fix before handover. C = it's ugly but functional, fix during the warranty period.",number:"Clonshaugh Phase 1 commissioning: 47 defects total — 3 × Category A (resolved within 48 hours), 18 × Category B (resolved before handover), 26 × Category C (scheduled for DLP). Indicative distribution consistent with BSRIA BG 6/2018 §8 benchmarks — Tier 2.",standard:"CIBSE Code M §8; BSRIA BG 6/2018 §8.1; typical construction contract conditions",feynman:{analogy:"Defect classification is like hospital triage. Category A is the emergency ward: fix now or someone gets hurt. Category B is urgent: fix before discharge. Category C is follow-up: fix during the warranty period.",firstPrinciples:"Not all defects are equal. A safety defect and a cosmetic defect need different urgency and resources. Without classification, dangerous defects may wait behind trivial ones.",theTest:"A fire damper responds in 8 seconds instead of the specified 3. Category B (performance) or A (safety)? Arguably A. Five extra seconds of open damper in a fire event allows smoke to spread between zones."}},{term:"Snagging List",definition:"A comprehensive, numbered register of all defects identified during commissioning, with classification, location, responsible party, target resolution date, and current status. The snagging list is a living document updated at every commissioning milestone and formally reviewed at practical completion.",plain:"The master list of everything that's wrong. Every defect has a number, a severity, an owner, and a deadline. Nothing falls off the list until it's fixed, verified, and signed off by the CxA.",number:"Clonshaugh snagging list at practical completion: 26 open Category C defects from a peak of 47 across all phases. Average resolution time: Category A 36 hours, Category B 12 days, Category C tracked through DLP.",standard:"BSRIA BG 6/2018 §8.2; JCT/RIAI contract conditions",feynman:{analogy:"The snagging list is the checkout receipt for a building. Every item is numbered, priced by severity, and tracked until cleared. If it is not on the list, it does not exist.",firstPrinciples:"Defect resolution requires accountability. A single shared numbered register ensures contractor, CxA, and operator reference the same document. Informal tracking creates competing records and disputes at handover.",theTest:"At handover, the contractor shows 12 open items. The operator shows 28. Whose list is correct? Neither. Without a single shared register maintained by the CxA, the truth is unknowable."}},{term:"Defect Liability Period (DLP)",definition:"The contractual period after practical completion during which the contractor is obligated to return and remedy defects at no additional cost to the client. Standard DLP is 12 months; for DC retrofits, 18 months is recommended to capture both seasonal commissioning windows.",plain:"The warranty period. If something breaks or doesn't work properly within this period, the contractor comes back and fixes it for free. For a DC, 18 months is better than 12 — it gives you time to test through both summer and winter.",number:"Clonshaugh DLP: 18 months from practical completion. Estimated contractor return visits during DLP: 6–8 visits for Category C remediation + 2 seasonal commissioning support visits. Contractor's cost: approximately €20k–€30k (absorbed in original contract).",standard:"JCT/RIAI contract conditions; CIBSE Code M §8.3",feynman:{analogy:"The DLP is a new car warranty. If something breaks within the period, the manufacturer fixes it free. For a DC, 18 months covers both summer and winter. 12 months may not.",firstPrinciples:"Defects have a time dimension. Some appear immediately. Some appear under specific conditions like summer cooling failures. An 18-month DLP from winter practical completion captures two seasonal extremes.",theTest:"Practical completion is November. DLP is 12 months. A cooling defect appears in August (month 9). Covered? Yes, just. The risk is a defect appearing in month 13 that seasonal commissioning would have caught at month 8."}},{term:"Retention Mechanism",definition:"A contractual tool where 5% of the total contract value is withheld from the contractor until the defect liability period expires and all defects are resolved. Retention creates a financial incentive for the contractor to return and fix defects during the DLP. Without retention, the contractor has been fully paid and has no contractual motivation to address post-completion defects.",plain:"Holding back 5% of the money until every defect is fixed. On a €5M contract, that is €250k the contractor does not receive until the snagging list is clear. That gives them a quarter of a million reasons to come back.",number:"Clonshaugh: 5% retention on €5M MEP contract = €250k withheld. Half released at practical completion (€125k), half at DLP expiry (€125k). This is standard under JCT/RIAI contract conditions (Tier 2 — JCT/RIAI standard forms).",standard:"JCT/RIAI Standard Building Contract conditions; RICS NRM1 §5.4",feynman:{analogy:"Retention is the deposit you hold on a rental property. If the tenant (contractor) leaves the property (building) in good condition, they get it back. If there is damage (defects), you use the deposit to fix it.",firstPrinciples:"Economic incentives drive behaviour. A contractor who has been fully paid has no financial incentive to return for defect remediation. Retention aligns the contractor's financial interest with the client's quality interest.",theTest:"The DLP expires with 8 open Category C defects. The contractor has not returned despite three requests. What leverage does the client have? If retention was held: €125k. If retention was released early: none."}},{term:"Practical Completion Certificate",definition:"A formal certificate issued when the works are substantially complete and the building can be occupied for its intended purpose. It triggers the start of the defect liability period, the release of the first half of retention, and the transfer of insurance responsibility from contractor to client. It does not mean the building is defect-free — it means all Category A and B defects are resolved and only Category C items remain.",plain:"The official moment the building is handed over. Not perfect — there will still be minor defects. But safe, functional, and ready to use. From this moment, the warranty clock starts ticking and the operator takes responsibility for insurance.",number:"Clonshaugh practical completion: 26 open Category C defects remaining from peak of 47. All Category A (3) and Category B (18) resolved. DLP commenced at practical completion for 18-month period.",standard:"JCT/RIAI contract conditions; CIBSE Code M §8.4; BSRIA BG 6/2018 §8.3",feynman:{analogy:"Practical completion is like taking delivery of a new car. It runs, it is safe, but the dealer still owes you a second service and a touch-up on the paintwork. You drive it home, but the warranty covers the outstanding items.",firstPrinciples:"A construction project is never 100% complete at any single point. Practical completion is the contractual threshold where occupancy is possible and the balance of minor works transfers to a warranty regime. Setting this threshold too low (accepting Category B defects) transfers risk to the operator. Setting it too high (zero defects) delays occupation indefinitely.",theTest:"The contractor wants practical completion issued with 4 Category B defects outstanding. The CxA recommends refusal. Why? Because Category B defects affect performance or functionality — accepting them at practical completion means the operator inherits performance problems that should have been the contractor's responsibility."}}],
    whatItLooksLike:"The snagging process is methodical. The CxA walks each commissioned area with the contractor's project manager, a tablet or laptop with the snagging list software, and a camera. Every defect is photographed, numbered, classified, and assigned a responsible party. The snagging list is updated in real time and distributed to all parties within 24 hours. Category A defects trigger an immediate work order. Category B defects are scheduled into the programme. Category C defects are logged for DLP resolution. At handover, the snagging list is formally attached to the practical completion certificate.",
    siteChecklist:["Snagging list software/template in use (numbered, classified, tracked)","Defect categories defined and agreed with contractor","Resolution timescales agreed (A: 48 hours, B: before handover, C: DLP)","Verification procedure for resolved defects (CxA re-inspection)","Outstanding defects documented at practical completion","DLP period and contractor obligations confirmed in contract"]
  },
  logic:{
    causeAndEffect:[{cause:"Category B defects reclassified as Category C to achieve practical completion on schedule",effect:"Practical completion is certified with 'minor' defects outstanding. But those 'minor' defects include a cooling unit running at 80% capacity (Category B performance issue reclassified as C). During the first warm spell, the reduced cooling capacity causes thermal excursions. The contractor argues it's a Category C defect within DLP scope; the operator argues it was wrongly classified and should have been resolved before handover.",insight:"Defect classification must be done by the CxA (independent), not the contractor (interested party). The pressure to achieve practical completion on schedule creates a strong incentive to downgrade defects. The CxA's independence is the safeguard — they classify defects based on their impact, not the programme."},{cause:"Snagging list maintained informally — emails, spreadsheets, verbal agreements",effect:"At handover, there is no single, agreed record of outstanding defects. The contractor's list shows 12 open items. The operator's list shows 28. The CxA's list shows 19. Disputes over scope and responsibility consume months of post-handover management time.",insight:"The snagging list must be a single, shared, numbered document that all parties (contractor, CxA, operator) update in real time. Cloud-based snagging tools are now standard. The cost of the software (€500–€2,000/year) (Tier 3 — market rates, indicative) is negligible compared to the cost of disputes over informal records."},{cause:"DLP set at 6 months — practical completion in December — DLP expires June before first summer peak",effect:"August heat wave reveals free cooling changeover fault (stuck valve), chiller capacity shortfall (undersized condenser for Irish summer peak), and BMS control sequence error (summer setpoints never commissioned). All defects are now the operator's cost to rectify — contractor has been released.",insight:"A 6-month DLP that starts in winter is a gift to the contractor and a trap for the owner. The DLP must cover 12 months minimum — ensuring every seasonal extreme is experienced while the contractor is still liable. This is a contract negotiation item, not a commissioning item, but the commissioning team must advise on it."}],
    constraintLesson:"The constraint in defect management is the tension between practical completion and defect resolution. The contractor wants practical completion (it triggers the final payment and starts the DLP clock). The operator wants all defects resolved (they don't want to inherit problems). The CxA is the arbiter — they certify practical completion based on whether the facility is safe and functional, with outstanding defects classified and scheduled for resolution.\n\nAt Clonshaugh, the practical completion criteria are defined in the contract:\n- Zero Category A defects outstanding\n- All Category B defects resolved OR an agreed remediation programme with retention withheld\n- Category C defects listed with agreed DLP schedule\n- All IST and PVT complete and passed\n- O&M manuals and as-built drawings delivered\n\nThe retention mechanism is key: typically 5% of the contract value (€250k on a €5M contract) is withheld until the DLP expires (Tier 2 — JCT/RIAI standard contract conditions) and all Category C defects are resolved. This provides financial incentive for the contractor to return and complete remediation.\n",
    weakestLink:{whatsWrong:"Defects are inevitable — we'll manage them during the warranty period.",whatsRight:"Category A and B defects must be resolved before or at practical completion — they are not DLP items. The DLP exists for Category C defects that do not affect safety or performance. Deferring Category B defects to the DLP is a false economy: the contractor has demobilised, the specialist sub-contractors have moved on, and what was a 2-day fix during active commissioning becomes a 2-week return visit during DLP.",howToGetThere:"Define defect categories before commissioning begins (include in Cx plan). Use a cloud-based snagging tool shared by all parties. Require CxA to classify all defects independently. Set practical completion criteria in the contract (zero Cat A, all Cat B resolved). Withhold 5% retention until DLP completion. Budget for 6–8 contractor return visits during DLP."}
  },
  rhetoric:{
    declan:"I keep the snagging list on my desk. It's the document that tells me what the contractor still owes me. At practical completion, we had 26 open Category C items — mostly cosmetic (labelling errors, minor alignment issues, paint damage from installation) plus a few performance tweaks (BMS setpoint optimisation, one CRAH fan running slightly above spec noise level). I track each one monthly. The contractor knows I'm watching. If they haven't cleared the list by month 16, I escalate to the project manager with retention as leverage.",
    ann:"Retention is my tool. The €250k (5% of €5M contract — standard JCT/RIAI conditions, Tier 2) is withheld until the DLP is clean. That's €250k the contractor doesn't receive until every defect on the list is resolved and verified by the CxA. In my experience, retention is the single most effective mechanism for ensuring defect resolution. Without it, the contractor has no financial incentive to return — they've received their money and moved on. With it, they have a quarter-million reasons to come back.",
    mark:"From an engineering perspective, the most important defects are the ones you nearly didn't find. At Clonshaugh Phase 1, the third Category A defect was a protection relay with the wrong firmware version — the relay had been configured for the correct protection curve, but the firmware didn't support the specified fast-trip characteristic. It passed visual inspection, it passed the functional test (the relay tripped), but it failed the discrimination study because the trip time at fault level was 0.3 seconds instead of 0.1 seconds. That 0.2-second difference could mean the upstream device trips first, taking out the entire distribution instead of just the faulted circuit.",
    sarah:"Defect documentation feeds into the facility's compliance record. For EPA IE Licence compliance, the facility must demonstrate that all MEP systems are operating as designed. Outstanding Category B defects — particularly those affecting energy efficiency — represent a gap between designed and actual performance. The annual EED Article 12 report must disclose any known performance limitations. A clean snagging list at DLP completion is part of the compliance evidence.",
    tom:"Defect remediation costs at Clonshaugh across the DLP (estimated): contractor return visits (8 × €2.5k mobilisation) = €20k, specialist sub-contractor call-backs (4 visits for BMS, controls, protection) = €12k, CxA re-inspection (8 verification visits × €1.5k) = €12k. Total DLP remediation cost to the project: approximately €44k. Of this, €20k is the contractor All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025.'s obligation (covered by retention). The remaining €24k is the CxA's verification cost — included in the original €55k CxA retainer. Net additional cost to the operator during DLP: €0 if retention and CxA contract are correctly structured."
  },
  
   rhetoricTakeaways:{
     declan:"The snagging list is your quality control instrument. If a defect is not on the list, it does not exist. Maintain one shared register via the CxA.",
     ann:"Retention — 5% of contract value — is the financial mechanism that ensures contractors return. €250k held on a €5M contract concentrates minds.",
     mark:"Defect classification must be performed by the CxA, not the contractor. The pressure to achieve practical completion creates incentive to downgrade defects.",
     sarah:"Systematic defect tracking reduces repeat defects across phases. Data from Phase 1 snagging informs Phase 2 quality gates — continuous improvement.",
     tom:"Retention release schedule: 50% at practical completion, 50% at DLP expiry. Never release final retention until every defect is resolved and verified by the CxA."
   },
   scenario:{title:"The Practical Completion Decision",narrative:"Clonshaugh Phase 1 practical completion inspection. The contractor has requested PC certification. The CxA's snagging list shows: 0 Category A defects, 4 Category B defects, and 22 Category C defects. The 4 Category B defects are: (1) one CRAH unit achieving only 85% of specified cooling capacity, (2) UPS battery monitoring not communicating with DCIM, (3) two fire damper actuators responding slowly (8 seconds vs 3-second specification), (4) emergency lighting in the data hall switchroom not achieving specified lux levels.",question:"Should the CxA certify practical completion? If not, which Category B defects must be resolved first, and what is the priority order?",answer:"Recommendation: DO NOT certify practical completion with these 4 Category B defects outstanding.\n\nPriority order for resolution:\n\n1. Fire damper actuators (SAFETY — potential Cat A reclassification):\n   - 8-second response vs 3-second specification is not cosmetic — in a fire event, 5 extra seconds of open damper allows smoke to spread between zones\n   - Resolve first: actuator replacement or adjustment. 2–3 days.\n   - Cost: €3k–€5k (actuators + labour)\n\n2. CRAH unit at 85% capacity (PERFORMANCE — affects N+1):\n   - At 85%, this unit effectively reduces the cooling N+1 margin\n   - If another unit fails, the system may not maintain A2 conditions\n   - Resolve second: manufacturer investigation (likely fan speed or refrigerant issue). 5–7 days.\n   - Cost: €5k–€8k (manufacturer service visit + parts if needed)\n\n3. UPS battery monitoring (OPERATIONAL — affects response to battery events):\n   - Without DCIM visibility, a battery degradation event goes unnoticed until the next power failure\n   - Resolve third: BMS/DCIM integration fix. 2–3 days.\n   - Cost: €2k–€4k (BMS integration specialist)\n\n4. Emergency lighting (COMPLIANCE — BCAR Part B):\n   - Below-spec lux in the switchroom creates a safety risk during a mains failure\n   - Resolve fourth: additional luminaires or replacement lamps. 1–2 days.\n   - Cost: €1k–€2k\n\nTotal resolution time: 10–15 days. Total cost: €11k–€19k (contractor's obligation).\nAfter resolution and CxA verification: certify practical completion with 22 Category C defects scheduled for DLP.\n"},
  sourceNote:"CIBSE Code M §8 — Tier 1. BSRIA BG 6/2018 §8 — Tier 2. JCT/RIAI contract conditions — Tier 2. Defect counts and resolution times from BSRIA BG 6/2018 §8 benchmarks — Tier 2. DLP costs indicative for Irish DC projects — Tier 3.",
  clockQuote:"He'd spent ten years knowing. Today he was proving.",
  crossRefs:[{module:"DC-LEARN-008",level:"L3",topic:"Fire damper interlocks — defect in damper response time is a fire safety issue"},{module:"DC-LEARN-009",level:"L2",topic:"DCIM integration — battery monitoring communication is a monitoring defect"}],
  cascadeCheck:{question:"Are all commissioning defects resolved or formally tracked?",pass:"Practical completion certified. 0 Category A, 0 Category B outstanding. 22 Category C tracked in DLP register with retention withheld.",fail:"No formal defect tracking. Defects discovered ad hoc during operations. No retention mechanism.",detail:"CIBSE Code M §8: all defects must be classified, tracked, and resolved within agreed timescales."}

{
  id:"L9",
  level:9,
  name:"Documentation, Handover & Operational Readiness",
  icon:"📚",
  component:"Handover",
  available:true,
  userNeedStatement:"Understand what a complete handover package looks like — and why the documentation is as important as the hardware.",
  plainEnglish:"The commissioning programme ends with handover — the moment the facility transfers from the project team to the operations team. A proper handover is not handing over keys. It is handing over knowledge: what was built, how it works, how to maintain it, what the defects are, and how to operate it safely. The documentation IS the handover.",
  grammar:{
    facts:[{term:"O&M Manuals (Operation & Maintenance)",definition:"A comprehensive set of documents covering the operation, maintenance, and servicing requirements of all building systems. For a DC, O&M manuals must include system descriptions, operating procedures, maintenance schedules, spare parts lists, alarm response procedures, and emergency procedures — all specific to the installed configuration, not generic manufacturer literature.",plain:"The instruction manual for the building. Not the manufacturer's generic brochure — a site-specific document that tells the operations team how to run, maintain, and fix every system in the facility. A box of manufacturer PDFs is not an O&M manual.",number:"Clonshaugh O&M package: 12 volumes covering power, cooling, fire, security, BMS/DCIM, and general building services. Approximately 2,500 pages of site-specific content. Cost to produce: €30k (Tier 2 — BSRIA BG 8/2009 production benchmarks; RICS NRM1, indicative).",standard:"CIBSE Code M §9; BSRIA BG 8/2009 & BG 79/2020 (O&M Manuals & Handover); EN 50600-2-3 §7",feynman:{analogy:"An O&M manual is like a medical record, not a pharmaceutical brochure. The brochure describes the drug. The record describes this patient's dosage and treatment plan. Manufacturer PDFs are brochures, not records.",firstPrinciples:"Operations teams inherit systems they did not design. The O&M manual transfers 18 months of project knowledge into a document usable at 3 AM when an alarm fires. Generic literature describes products. O&M manuals describe installations.",theTest:"An alarm fires at 3 AM on UPS Module 3. Does the O&M manual say what this alarm means in this installation? If the manual is a manufacturer PDF, no. It describes all possible alarms for all configurations."}},{term:"As-Built Drawings",definition:"Final drawings that record the actual installed configuration of all building systems — as opposed to the design drawings which show what was intended. As-built drawings must be updated to reflect every change, modification, and site instruction issued during construction and commissioning.",plain:"The drawings that show what was actually built — not what was designed. Every cable that moved, every pipe that re-routed, every piece of equipment that changed during construction must be recorded. If the drawing doesn't match the building, it's worthless.",number:"Clonshaugh as-built package: approximately 400 drawings across all disciplines. As-built markup verification by CxA: 5 days of systematic walk-through comparing drawing to installation. Discrepancy rate at first review: typically 15–25% of drawings require correction (BSRIA BG 8/2009 benchmarks — Tier 2).",standard:"BSRIA BG 8/2009 §3 & BG 79/2020; RIAI/contract requirements",feynman:{analogy:"As-built drawings are an accurate map versus the architect's sketch. The sketch shows what was planned. The map shows what was built, including the road that moved 300mm to avoid a drain.",firstPrinciples:"Design drawings predict. Construction deviates. As-built drawings record reality. Every cable that re-routed, every breaker that moved must be captured. A wrong drawing creates false confidence in wrong information.",theTest:"A crew needs to isolate breaker 14 per the drawing. Breaker 14 is actually in position 22. What happens? Wrong isolation, potentially working on a live circuit. This is why as-built verification matters."}},{term:"Operational Readiness Review (ORR)",definition:"A formal assessment conducted before the facility transitions from project mode to operational mode. The ORR verifies that: documentation is complete, staff are trained, maintenance contracts are in place, spare parts are on site, emergency procedures are documented and tested, and the DCIM system is configured and operational.",plain:"A checklist that asks: is the operations team actually ready to run this facility? Do they have the manuals, the training, the spare parts, the maintenance contracts, and the emergency procedures? If any answer is no, handover is not complete.",number:"Clonshaugh ORR: 52-point checklist across documentation, training, spares, maintenance contracts, emergency procedures, and DCIM configuration. ORR conducted 2 weeks before planned handover date to allow resolution of any gaps.",standard:"ASHRAE Guideline 0-2019 §7; BSRIA BG 6/2018 §9; EN 50600-2-3 §7.2",feynman:{analogy:"The ORR is a pilot's pre-flight checklist for a whole facility. Fuel: spare parts on site. Navigation: O&M manuals delivered. Crew briefed: training complete. Any no grounds the flight.",firstPrinciples:"Operational readiness is distinct from construction completion. A building can be physically complete but operationally unready. The ORR verifies the team can actually run the facility, not just that it exists.",theTest:"Construction 100% complete. All tests pass. Ready for handover? Only if the ORR passes: documentation, training, spares, maintenance contracts, DCIM, and emergency procedures all confirmed."}},{term:"Training Programme",definition:"Structured training delivered to the operations team on all building systems, covering normal operation, alarm response, emergency procedures, and preventive maintenance. Training must be system-specific and hands-on — not a classroom presentation of the manufacturer's marketing slides.",plain:"Teaching the operations team how to run the building. Not a PowerPoint in a meeting room — hands-on training in the plant rooms, at the switchboards, at the BMS workstation. The operations team must be able to respond to any alarm and execute any emergency procedure before they are responsible for the facility.",number:"Clonshaugh training programme: 10 days of hands-on training across power (3 days), cooling (2 days), fire (1 day), BMS/DCIM (2 days), security (1 day), and emergency procedures (1 day). Delivered by the installing contractors and the CxA. Cost: €15k (Tier 2 — CIBSE Code M §9.3 training benchmarks; BSRIA BG 8/2009, indicative).",standard:"CIBSE Code M §9.3; EN 50600-2-3 §7.3",feynman:{analogy:"Handing over a DC without training is like giving someone the keys to a 747 without flight school. The aircraft is capable. The pilot is not. Training bridges the gap.",firstPrinciples:"Knowledge does not transfer through documents alone. Hands-on training builds muscle memory. An operator who has physically executed an emergency procedure performs it faster and more reliably than one who only read about it.",theTest:"The O&M manual describes the emergency generator start procedure. Has the team been trained? Only if they have physically walked through it in the generator room with the CxA observing. Reading is not training."}},{term:"DCIM Configuration as Part of Handover",definition:"The DCIM (Data Centre Infrastructure Management) system must be configured with all commissioned setpoints, alarm thresholds, and reporting dashboards before handover. Handover without DCIM configuration means the operator inherits a monitoring system that does not match the actual installation — creating a gap between what the system does and what the operator can see.",plain:"The DCIM must show what the commissioning proved. Every setpoint, every alarm threshold, every temperature limit that was verified during commissioning must be loaded into the DCIM before handover. Otherwise the operator is flying blind with a dashboard that does not match the building.",number:"Typical DCIM configuration: 500–2,000 data points per DC. Configuration effort: 2–4 weeks for a 400-rack facility. Common gap: 30–50% of alarm thresholds are default values (not site-specific) at handover. Correct configuration reduces false alarms by 60–80%.",standard:"EN 50600-4-2; ASHRAE 135 (BACnet); CIBSE Code M §7",feynman:{analogy:"Handing over a DC without configuring the DCIM is like giving someone a car with the dashboard warning lights disconnected. The engine might be fine, but the driver cannot tell. The DCIM is the dashboard — it must be calibrated to the actual system, not left on factory defaults.",firstPrinciples:"Commissioning produces verified setpoints and performance baselines. The DCIM must reflect these verified values. Factory-default alarm thresholds trigger at generic levels that may not match the site-specific design. The result: false alarms (eroding operator trust) or missed real alarms (creating undetected risk). DCIM configuration is the bridge between commissioning evidence and operational monitoring.",theTest:"A DCIM shows a UPS load alarm threshold at 80%. The commissioned UPS capacity allows 92% continuous loading. The alarm triggers at 80%, causing unnecessary escalation. What went wrong? Answer: The DCIM alarm threshold was left at the manufacturer's default (80%) instead of being configured to the site-specific commissioned capacity (92%). The commissioning data was not transferred to the DCIM."}}],
    whatItLooksLike:"The handover package sits in the facility manager's office — a combination of physical binders and a digital repository. The O&M manuals are indexed, site-specific, and include the commissioning test results as appendices. The as-built drawings are in both paper (for the plant rooms) and digital format (for the design team and DCIM integration). The training records show who was trained, on what, and when — signed by both the trainer and the trainee. The spare parts inventory is physically checked against the O&M manual's recommended spares list. The DCIM system is configured with all commissioned setpoints, alarm thresholds, and reporting dashboards.",
    siteChecklist:["O&M manuals delivered (site-specific, not generic manufacturer literature)","As-built drawings verified by CxA walk-through","Training programme delivered and attendance recorded","Spare parts on site (verified against O&M recommended spares list)","Maintenance contracts in place for all critical systems","DCIM configured with commissioned setpoints and alarm thresholds","Emergency procedures documented, posted, and drill-tested","ORR checklist completed — all 52 points confirmed"]
  },
  logic:{
    causeAndEffect:[{cause:"O&M manuals delivered as a box of manufacturer PDFs — no site-specific content",effect:"The operations team has generic documentation for the equipment type but no information about the specific configuration, protection settings, control sequences, or alarm procedures for their installation. When an alarm triggers at 3 AM, the operator opens the manufacturer's manual and finds 200 pages of product information but nothing about what this specific alarm means in their facility.",insight:"Site-specific O&M content costs €30k to produce but transforms manufacturer literature into operational documentation. The minimum site-specific content: system schematic (showing the actual installed configuration), operating procedure (specific to the installed control sequences), alarm table (every alarm, its meaning, and the response procedure), and maintenance schedule (with site-specific intervals based on commissioning data)."},{cause:"As-built drawings not verified — design drawings issued as 'as-built' with minor markups",effect:"The drawings show the designed layout. The installation deviated during construction — a cable tray moved 300mm to clear a duct, a valve relocated to improve access, a circuit breaker relocated within the board. In 2 years, when a maintenance crew needs to isolate a circuit, the drawing shows the breaker in position 14 but it's actually in position 22. Wrong isolation leads to wrong circuit de-energised — or worse, working on a circuit that's still live.",insight:"As-built verification is not a cursory review — it is a physical walk-through comparing every drawing to the actual installation. At Clonshaugh, 15–25% of drawings required correction after initial as-built review. The CxA's 5-day walk-through is the quality gate."},{cause:"O&M manuals delivered as manufacturer generic documents — not site-specific",effect:"Operator cannot find the actual protection relay settings, the commissioned chiller setpoints, or the fire system zone map. When a relay trips, they have no reference for the correct setting. When the BMS alarms, they have no context for the threshold. The commissioning programme produced evidence — but it was not transferred into the operational documentation.",insight:"Site-specific O&M manuals cost 10–15% more than generic manuals. The cost of an operator making a wrong decision because the manual does not contain the site-specific information is 10–100× higher. The commissioning data must flow into the O&M manuals — not sit in a file on the CxA's laptop."}],
    constraintLesson:"The constraint at handover is knowledge transfer. The project team — designers, contractors, CxA — have spent 18 months learning the facility. They know every quirk, every workaround, every commissioning note. The operations team has spent zero time. The handover must transfer 18 months of knowledge in 2 weeks.\n\nThis is why the documentation and training programme are so important. The O&M manuals capture the what. The as-built drawings capture the where. The training programme transfers the how. The commissioning records capture the evidence. Without all four, the operations team is starting from scratch in a facility generating €2.5M/month in hosting revenue.\n\nThe specific constraint at Clonshaugh: the existing operations team (Declan's team) has been running the original facility for 10+ years. They know the old systems. They need to learn the new systems — which are fundamentally different (in-row cooling replacing CRAHs, modular UPS replacing monolithic, new BMS/DCIM replacing legacy controls). The training programme must bridge from old to new, not assume a blank slate.\n",
    weakestLink:{whatsWrong:"Handover is a formality — the operations team will learn the new systems over time.",whatsRight:"Handover is the single most important moment in the project lifecycle. It is the point where risk transfers from the project team (who built it) to the operations team (who must run it). An incomplete handover means the operations team inherits undocumented systems, untrained procedures, and unresolved defects — all at the moment they become responsible for €2.5M/month of hosting revenue.",howToGetThere:"Start handover planning at design stage (not practical completion). Budget for O&M manual production (€30k), as-built verification (€10k within CxA scope), training (€15k), spare parts (typically 2–3% of equipment cost), and ORR (included in CxA scope). At Clonshaugh, the total handover cost is approximately €55k — 1.1% of the €5M MEP contract. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."}
  },
  rhetoric:{
    declan:"The handover documentation is my insurance policy. When something goes wrong at 3 AM and I need to isolate a circuit, I need the as-built drawing that shows me exactly which breaker, in which position, on which board. When a cooling unit alarms and I need to understand the control sequence, I need the O&M manual that describes the actual installed sequence — not the manufacturer's generic description. When a new team member joins and needs to learn the facility, I need the training materials. I've taken over facilities with and without proper handover documentation. The difference is measured in years of confidence.",
    ann:"The handover package is a deliverable in the contract — as important as the physical installation. I specify in the contract that: (1) O&M manuals must be site-specific (not manufacturer PDFs), (2) as-built drawings must be verified by the CxA, (3) training must be delivered and attendance recorded, (4) the ORR must be passed before the final payment release (excluding retention). If any of these are incomplete, the contract is not complete and the final payment is not due. This gives the contractor a financial incentive to invest in documentation quality.",
    mark:"The technical content of the O&M manual is my responsibility as the design engineer. I write the system descriptions, the operating sequences, the alarm tables, and the maintenance schedules. The contractor provides the manufacturer-specific content (installation records, commissioning data, warranty certificates). The CxA reviews the assembled package for completeness and accuracy. For Clonshaugh, the O&M manual took 6 weeks to produce — I started writing during Phase 2 construction, updated through Phases 3 and 4, and finalised during the PVT period.",
    sarah:"The handover package includes the environmental compliance file: EED Article 12 first report template, EPA IE Licence conditions summary, F-Gas refrigerant records (R-32 or R-410A charge quantities per system, leak test certificates, F-Gas installer certificates), PUE measurement protocol and PVT results, and the EU Taxonomy evidence package (PUE ≤ 1.3 measured, water usage data, waste management plan). For SFDR reporting, the handover package is the source document. If it's incomplete, the sustainability disclosures are incomplete.",
    tom:"Handover costs at Clonshaugh: O&M manual production €30k, as-built drawing verification €10k (CxA scope), training programme €15k (10 days across all disciplines), spare parts €40k (2% of critical equipment value), DCIM configuration and handover €8k, ORR management €5k (CxA scope). Total handover: approximately €108k. Note: this overlaps with the Cx budget — the CxA scope (€55k) covers as-built verification, ORR, and training coordination. The net additional handover cost beyond the Cx budget is approximately €53k (O&M manuals + spare parts + DCIM). Total Cx + handover programme: €230k + €53k = €283k, or 5.7% of the €5M MEP contract. Within the 5–8% range for DC projects of this complexity (CIBSE Code M and BSRIA BG 6/2018 benchmarks — Tier 2)."
  },
  
   rhetoricTakeaways:{
     declan:"An ORR is not a formality — it answers one question: can the ops team actually run this facility? Documentation, training, spares, contracts, procedures.",
     ann:"The total Cx + handover programme at Clonshaugh is €283k (5.7% of MEP). This is within the 5–8% benchmark for DC projects and delivers auditable evidence.",
     mark:"A box of manufacturer PDFs is not an O&M manual. Site-specific documentation includes actual protection settings, control sequences, and alarm procedures for this facility.",
     sarah:"Handover documentation feeds directly into ongoing sustainability reporting — maintenance schedules, performance baselines, and equipment lifecycle data.",
     tom:"Handover costs beyond Cx budget: O&M manuals €15k, spare parts €20k, DCIM configuration €10k, training €8k = €53k additional. Total programme: €283k. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."
   },
   scenario:{title:"The Operational Readiness Review",narrative:"Clonshaugh ORR — 2 weeks before planned handover. The CxA presents the 52-point checklist. 47 items pass. 5 items fail: (1) emergency generator operating procedure not written, (2) spare UPS batteries not on site (12-week lead time), (3) DCIM dashboard for cooling optimisation not configured, (4) no maintenance contract for the in-row cooling units, (5) fire drill not conducted.",question:"Which of these 5 failures would you classify as a handover blocker (must resolve before handover), and which can be resolved during the DLP?",answer:"HANDOVER BLOCKERS (must resolve before handover):\n\n1. Emergency generator operating procedure not written — BLOCKER\n   - This is a safety document. The operations team must be able to start, operate, and shut down the generator safely. Without it, a mains failure at 3 AM requires improvised generator operation.\n   - Resolution: CxA writes procedure from commissioning records. 3–5 days.\n   - Cost: included in CxA scope.\n\n5. Fire drill not conducted — BLOCKER\n   - The operations team must have practised the fire evacuation procedure at least once before they are responsible for the facility. Building regulations require this.\n   - Resolution: schedule and execute fire drill. 1 day.\n   - Cost: minimal (coordination time only).\n\nDLP ITEMS (can be resolved after handover):\n\n2. Spare UPS batteries — DLP\n   - 12-week lead time means they cannot arrive before handover. The installed batteries are new and healthy.\n   - Mitigation: place order now, scheduled delivery tracked in DLP register.\n   - Risk: low (new batteries, full health monitoring via DCIM).\n\n3. DCIM cooling dashboard — DLP\n   - The BMS controls are operational and commissioned. The DCIM dashboard is a monitoring/optimisation layer, not a control system.\n   - Resolution: DCIM vendor configuration. 5 days.\n   - Risk: low (BMS provides basic cooling monitoring as fall-back).\n\n4. Cooling maintenance contract — DLP\n   - Should be in place before handover but is contractual/administrative, not safety-critical.\n   - Mitigation: interim cover from installing contractor under DLP obligations.\n   - Risk: medium (no maintenance cover for the first period).\n\nDecision: Handover delayed by 5–7 days to resolve the two blockers. DLP items tracked with deadlines.\n"},
  sourceNote:"CIBSE Code M §9 — Tier 1. BSRIA BG 8/2009 — Tier 2. ASHRAE Guideline 0-2019 §7 — Tier 2. EN 50600-2-3 §7 — Tier 1. O&M costs from BSRIA BG 8/2009 production benchmarks — Tier 2. Training duration from CIBSE Code M §9.3 — Tier 1. ORR checklist from ASHRAE Guideline 0-2019 §7 — Tier 2.",
  clockQuote:"The binder was heavy. Forty-two pages of evidence that a building worked.",
  crossRefs:[{module:"DC-LEARN-009",level:"L9",topic:"DCIM handover — operational readiness requires DCIM configured with commissioned data"},{module:"DC-LEARN-011",level:"L9",topic:"Security handover — access credentials, CCTV recording, and alarm response procedures"},{module:"DC-LEARN-005",level:"L7",topic:"Generator operating procedures — emergency procedure is a handover deliverable"}],
  cascadeCheck:{question:"Has handover been completed with full documentation and operational readiness?",pass:"ORR passed (52/52). O&M manuals delivered, as-builts verified, training complete, maintenance contracts in place, DCIM configured.",fail:"No formal handover. Operations team inherits the facility without documentation, training, or operational readiness verification.",detail:"CIBSE Code M §9 + BSRIA BG 8/BG 79: complete documentation is a commissioning deliverable, not optional."}
}

const ASSESSMENT_QUESTIONS = [
{level:1,id:"Q013-01",icon:"📋",stage:"grammar",q:"What percentage of MEP contract value does CIBSE Code M recommend for commissioning?",options:["1–2%","3–5%","8–10%","15–20%"],correct:1,explain:"CIBSE Code M defines commissioning cost at 3–5% of MEP contract value. At Clonshaugh, the €5M MEP retrofit carries a €230k Cx budget (4.6%)."},
{level:1,id:"Q013-02",icon:"📋",stage:"logic",q:"Why must the Commissioning Authority (CxA) be independent of the installing contractor?",options:["To reduce the overall commissioning cost","To comply with EU procurement regulations","Because contractors are not qualified to conduct commissioning tests","Because the builder cannot grade their own work — independence ensures unbiased verification"],correct:3,explain:"The CxA must be independent to provide unbiased verification — the entity that built the system cannot objectively declare it works. This maps to AIMEP Rule 8 and ASHRAE Guideline 0 §3."},
{level:1,id:"Q013-03",icon:"📋",stage:"rhetoric",q:"From Ann's (investor) perspective, why is the €230k Cx budget justified on a €5M MEP contract?",options:["Because facilities with formal Cx programmes have 60–70% fewer defects, and a single 4-hour outage costs more than the entire Cx budget","Because contractors insist on it as part of the construction contract","Because EU regulations mandate a minimum commissioning spend","Because the insurance company requires commissioning certificates"],correct:0,explain:"Ann frames Cx as risk mitigation: a DC generating €2.5M/month loses more in a single 4-hour outage than the entire €230k Cx budget. The investment case writes itself."},
{level:2,id:"Q013-04",icon:"🏭",stage:"grammar",q:"What is the key difference between a type test and a routine test per IEC 61439-1?",options:["Type tests are conducted on site; routine tests are conducted in the factory","Type tests verify a product design (done once); routine tests verify each manufactured unit (done on every unit)","Type tests are optional; routine tests are mandatory","Type tests check electrical performance; routine tests check physical dimensions"],correct:1,explain:"A type test verifies the design meets the standard (done once per product type). A routine test verifies that each specific manufactured unit meets its own specification."},
{level:2,id:"Q013-05",icon:"🏭",stage:"logic",q:"Why does the FAT clause need to be in the purchase order at the time of order — not added later?",options:["Because it is a legal requirement under EU procurement law","Because insurance companies require evidence of FAT clauses in purchase orders","Because the manufacturer needs the FAT clause to plan their production schedule","Once equipment is manufactured without FAT hold points, the manufacturer has no contractual obligation to test before shipping"],correct:3,explain:"The FAT clause creates a contractual hold point in the manufacturing process. Without it, the manufacturer builds, tests to their standard (not yours), and ships."},
{level:2,id:"Q013-06",icon:"🏭",stage:"rhetoric",q:"Tom (QS) says FAT saves money. What is the financial logic?",options:["FAT costs zero — the manufacturer absorbs it, and witness attendance (€18k) pays back if it catches even one defect that would cost €20k to fix on site","FAT reduces the number of SAT tests required, saving programme time","FAT eliminates the need for load bank testing, saving €30k","FAT allows the CxA fee to be reduced by 25%"],correct:0,explain:"FAT testing cost is absorbed by the manufacturer. Witness attendance is €18k. A single on-site defect remediation costs €15k–€25k. FAT typically catches 2–4 issues per unit. Net saving: positive from the first defect caught."},
{level:3,id:"Q013-07",icon:"🔧",stage:"grammar",q:"How many I/O points does a typical 400-rack DC BMS point-to-point verification involve?",options:["50–100 points","200–400 points","800+ points","2,000+ points"],correct:2,explain:"Clonshaugh BMS point-to-point: approximately 800 I/O points across power, cooling, fire, and security systems. At 10–15 minutes per point, this represents 130–200 hours of testing."},
{level:3,id:"Q013-08",icon:"🔧",stage:"logic",q:"What is the engineering reason that pre-functional checks must be completed BEFORE SAT energisation?",options:["A loose busbar joint undetected before energisation creates a hot spot that can cause arc flash — pre-functional checks are the safety gate","To satisfy the CxA's checklist requirements","Pre-functional checks generate the paperwork needed for the O&M manuals","The manufacturer's warranty requires pre-functional checks before first power-on"],correct:0,explain:"IS 10101:2020+A1:2024 §6.4 requires initial verification before energisation. A loose termination under load creates thermal runaway leading to potential arc flash — a life-safety risk."},
{level:3,id:"Q013-09",icon:"🔧",stage:"rhetoric",q:"Why does Mark (engineer) insist on measuring neutral-earth voltage at the PDU output during UPS SAT?",options:["Anything over 1V indicates an earthing issue that must be resolved before IT equipment is connected","Neutral-earth voltage affects the UPS efficiency rating","EU regulations require neutral-earth measurements for Taxonomy compliance","The PDU manufacturer's warranty is void if neutral-earth voltage is not measured"],correct:0,explain:"Mark specifies neutral-earth voltage measurement at PDU output — anything over 1V indicates an earthing issue that can cause IT equipment problems (data corruption, equipment damage)."},
{level:4,id:"Q013-10",icon:"🔗",stage:"grammar",q:"How many cause-effect pairs does a typical 400-rack DC's C&E matrix contain?",options:["20–50 pairs","50–80 pairs","120–200 pairs","500+ pairs"],correct:2,explain:"Clonshaugh C&E matrix: approximately 150 pairs across 6 systems. A typical DC of this size has 120–200 pairs. Each cell represents a test point during IST."},
{level:4,id:"Q013-11",icon:"🔗",stage:"logic",q:"Why must the fall-back procedure for a power chain IST scenario execute within 5 minutes?",options:["Because the contractor's standby charges increase after 5 minutes","Because the EU Taxonomy requires a maximum 5-minute recovery time","Because the BMS alarm timeout is set to 5 minutes","Because the UPS battery at Clonshaugh provides 10 minutes autonomy — the fall-back must complete within half the battery time to maintain safety margin"],correct:3,explain:"The UPS battery at Clonshaugh provides 10 minutes at full load. The fall-back must execute within 5 minutes, leaving 5 minutes margin. Every second counts when the battery is depleting."},
{level:4,id:"Q013-12",icon:"🔗",stage:"rhetoric",q:"Why does Ann (investor) say the tenant will not accept migrated IT equipment without witnessing IST?",options:["Because the lease requires it — IST results become part of the compliance evidence, and the tenant won't migrate until they've seen the power chain transfer test pass","Because insurance policies require tenant witness for IST events","Because the CxA requires a third-party witness for IST validation","Because EirGrid requires tenant witness before energisation of new DC equipment"],correct:0,explain:"Ann explains that tenant witness rights for IST are standard in colocation contracts above 500 kW. IST results become lease compliance evidence. No IST = no migration = no revenue."},
{level:5,id:"Q013-13",icon:"⚡",stage:"grammar",q:"What is the purpose of a stepped load test (25% → 50% → 75% → 100%)?",options:["To warm up the equipment gradually before full load testing","To comply with manufacturer warranty requirements for first energisation","To reveal load-dependent performance issues that only appear at certain load levels — a system that works at 50% may overheat at 85%","To reduce the cost of load bank hire by using shorter test windows"],correct:2,explain:"Stepped load testing reveals issues that only manifest at specific load levels. UPS efficiency, harmonic behaviour, and thermal performance all change with load — problems may appear at one step but not others."},
{level:5,id:"Q013-14",icon:"⚡",stage:"logic",q:"Why is using live IT equipment as the test load (instead of a load bank) fundamentally wrong?",options:["Because IT equipment cannot draw enough power for a full-load test","Because a load bank failure is an engineering inconvenience — a live-load failure is a data centre outage affecting tenants and potentially causing data loss","Because load banks produce more accurate test results than real servers","Because the CxA's professional indemnity insurance does not cover live-load testing"],correct:1,explain:"The entire purpose of load bank testing is to prove the system BEFORE live IT depends on it. Using live IT as the test load inverts the risk — failures during testing become outages."},
{level:5,id:"Q013-15",icon:"⚡",stage:"rhetoric",q:"What does Sarah (ESG lead) say the load bank test produces beyond power chain verification?",options:["F-Gas compliance certificates for the cooling system","Carbon emissions data for the EPA IE Licence annual return","The first measured PUE data at design load conditions — the baseline for EU Taxonomy PUE ≤ 1.3 compliance","EirGrid grid connection verification data"],correct:2,explain:"Sarah notes that the load bank test produces the first measured PUE at design load — the cooling must reject IT heat plus infrastructure heat. This measured PUE is the closest pre-operational approximation and feeds directly into Taxonomy evidence."},
{level:6,id:"Q013-16",icon:"📊",stage:"grammar",q:"What is the minimum PVT measurement duration per EN 50600-4-2?",options:["24 hours continuous","48 hours continuous","7 days continuous","72 hours continuous"],correct:3,explain:"PVT requires a minimum 72-hour continuous measurement at >80% design IT load. This captures daily cycling, thermal stability, and sufficient data points for meaningful PUE calculation."},
{level:6,id:"Q013-17",icon:"📊",stage:"logic",q:"Why does a facility measuring PUE 1.50 at 40% IT load not necessarily indicate a design failure?",options:["Because PUE measurement equipment is inaccurate at low loads","Because infrastructure power is largely fixed while IT power varies — PUE at 40% load is inherently worse than at design load, and the result must be qualified with the load factor","Because the BMS has not been optimised yet","Because the EU Taxonomy only requires PUE measurement at 100% load"],correct:1,explain:"PUE at partial load is inherently higher because infrastructure power (cooling, lighting, security) is largely fixed regardless of IT load. A facility designed for PUE 1.20 at 100% may legitimately show PUE 1.50 at 40%."},
{level:6,id:"Q013-18",icon:"📊",stage:"rhetoric",q:"Why does Ann (investor) call the PVT report 'the single most important document for my asset file'?",options:["Because it proves PUE, cooling capacity, and redundancy under real conditions — and gets sent to the fund's sustainability committee, the lender, and the insurance underwriter","Because it is required by Irish planning regulations for DC operation","Because the PVT report determines the facility's insurable value","Because tenant leases reference the PVT report for SLA calculation"],correct:0,explain:"Ann values the PVT report because it converts a €5M spend from unverified design intent into documented operational performance — evidence for investors, lenders, and insurers."},
{level:7,id:"Q013-19",icon:"🌡️",stage:"grammar",q:"Why does Clonshaugh's contract specify an 18-month DLP instead of the standard 12 months?",options:["Because the contractor negotiated a longer warranty period","Because the CxA recommended it based on the facility's size","Because EU regulations require 18 months for data centre projects","Because 18 months from a winter practical completion ensures both summer and winter seasonal commissioning fall within the warranty period"],correct:3,explain:"A 12-month DLP starting in winter expires before capturing two full seasonal extremes. 18 months ensures both summer and winter verification within warranty — at no additional contract cost."},
{level:7,id:"Q013-20",icon:"🌡️",stage:"logic",q:"If the heat exchanger approach temperature degrades from 3°C to 5°C, what is the impact on free cooling in Dublin?",options:["No impact — Dublin has sufficient free cooling hours regardless","Free cooling hours reduced from 7,200 to approximately 5,800 — losing approximately 1,400 hours worth approximately €25k/yr (Tier 2 — CRU Q4 2024 €0.12/kWh, indicative)","Free cooling becomes completely unavailable","The PUE improves because the cooling plant runs more efficiently"],correct:1,explain:"At 3°C approach (modern plate HX), free cooling threshold is ~18°C ambient. At 5°C approach (fouled HX), threshold drops to ~22°C ambient. The difference is approximately 1,400 hours/yr — worth about €25k in avoided mechanical cooling."},
{level:7,id:"Q013-21",icon:"🌡️",stage:"rhetoric",q:"What lesson does Declan (FM) share about taking over a facility commissioned in winter without seasonal verification?",options:["The facility had excessive heating costs that weren't predicted","The generator failed because cold weather had degraded the battery","The cooling plant hit its limit on the first warm day, rack temperatures climbed, and he spent three months firefighting a free cooling control issue that seasonal Cx would have caught within the DLP","The BMS lost communication due to temperature-related sensor failures"],correct:2,explain:"Declan's experience: facility looked perfect until May, then cooling failed at the first warm spell. Seasonal Cx would have caught it in a planned test, within the DLP, at the contractor's cost."},
{level:8,id:"Q013-22",icon:"🔍",stage:"grammar",q:"In defect classification, what defines a Category B defect?",options:["A defect that affects performance or functionality — must be resolved before handover","A safety-critical defect that must be resolved immediately","A cosmetic or minor defect that can be resolved during the DLP","A defect identified by the tenant rather than the CxA"],correct:0,explain:"Category A = safety-critical (immediate). Category B = affects performance (resolve before handover). Category C = cosmetic/minor (resolve during DLP)."},
{level:8,id:"Q013-23",icon:"🔍",stage:"logic",q:"Why must defect classification be performed by the CxA (independent party) rather than the contractor?",options:["Because the CxA has more technical knowledge than the contractor","Because the contract requires the CxA to sign all defect classifications","Because the contractor has a strong incentive to downgrade defects to achieve practical completion on schedule — the CxA's independence is the safeguard","Because the contractor's insurance does not cover defect classification activities"],correct:2,explain:"The pressure to achieve practical completion creates an incentive to reclassify Category B defects as Category C. The CxA's independence ensures classification is based on impact, not schedule pressure."},
{level:8,id:"Q013-24",icon:"🔍",stage:"rhetoric",q:"What is the financial mechanism Ann (investor) uses to ensure contractors return to fix defects during the DLP?",options:["A performance bond from the contractor's insurance company","Retention — 5% of contract value (€250k on a €5M contract) withheld until DLP completion and all defects are resolved","A penalty clause in the contract for each unresolved defect","The threat of excluding the contractor from future projects"],correct:1,explain:"Ann uses retention: €250k (5% of €5M) held back until every defect on the list is resolved and verified by the CxA. That gives the contractor a quarter-million reasons to return."},
{level:9,id:"Q013-25",icon:"📚",stage:"grammar",q:"What does an Operational Readiness Review (ORR) verify?",options:["That the construction works are complete and the building is safe to occupy","That all construction certificates and building regulations approvals are in place","That the facility achieves its design PUE target under operating conditions","That the operations team has documentation, training, spares, maintenance contracts, emergency procedures, and DCIM — everything needed to run the facility"],correct:3,explain:"ORR verifies operational readiness — not construction completion or PUE performance. It answers: is the ops team actually ready to run this facility?"},
{level:9,id:"Q013-26",icon:"📚",stage:"logic",q:"Why is a box of manufacturer PDFs not acceptable as an O&M manual?",options:["Because the manufacturer's documentation is copyrighted and cannot be redistributed","Because generic manufacturer literature contains no site-specific information — when an alarm triggers at 3 AM, the operator needs to know what it means in their specific facility","Because O&M manuals must be written by the CxA, not provided by manufacturers","Because digital PDFs cannot be stored in the facility's physical document archive"],correct:1,explain:"Manufacturer PDFs describe the product. O&M manuals describe the installation — the specific configuration, protection settings, control sequences, and alarm procedures for this facility."},
{level:9,id:"Q013-27",icon:"📚",stage:"rhetoric",q:"What does Tom (QS) calculate as the total Cx + handover programme cost at Clonshaugh?",options:["€150k (3% of MEP contract)","€230k (4.6% of MEP contract)","€283k (5.7% of MEP contract — Cx budget plus additional handover costs)","€400k (8% of MEP contract)"],correct:2,explain:"Tom calculates Cx budget €230k + additional handover costs €53k (O&M manuals, spare parts, DCIM configuration) = €283k total, or 5.7% of the €5M MEP contract. Within the 5–8% benchmark for DC projects."}

const GLOSSARY_013 = [
  {term:"Commissioning (Cx)",def:"Systematic process of verifying that all building systems perform interactively according to the design intent and the owner's operational needs."},
  {term:"Commissioning Plan (Cx Plan)",def:"Formal document defining scope, schedule, responsibilities, procedures, and acceptance criteria for all commissioning activities."},
  {term:"Commissioning Authority (CxA)",def:"Independent professional responsible for developing and overseeing the commissioning process — must be independent of the design team and installing contractor."},
  {term:"Fall-Back Position",def:"Documented, tested procedure for returning a system to its pre-test state if a commissioning test fails. Every live-load test must have one."},
  {term:"Factory Acceptance Test (FAT)",def:"Testing of equipment at the manufacturer's premises before delivery to site. Verifies the product meets the specification before shipping."},
  {term:"Witness Testing",def:"Testing observed by an independent party (CxA, client, or their representative) to verify the test was conducted correctly and results are genuine."},
  {term:"Type Test",def:"Test conducted on a representative sample of a product design to verify it meets a standard. Done once per product type (IEC 61439-1)."},
  {term:"Routine Test",def:"Test conducted on every manufactured unit to verify it meets its individual specification. Done on every unit before delivery."},
  {term:"Site Acceptance Test (SAT)",def:"Testing of equipment after installation on site to verify it functions correctly in its actual operating environment."},
  {term:"Pre-Functional Checks",def:"Static tests conducted before energisation — insulation resistance, continuity, torque checks, visual inspection. The safety gate before power-on."},
  {term:"Energisation Procedure",def:"Formal procedure for applying power to a system for the first time. Requires pre-functional checks complete, fall-back documented, and witness present."},
  {term:"Point-to-Point Verification",def:"Systematic verification of every I/O point in the BMS/DCIM system — confirming each sensor, actuator, and alarm functions correctly."},
  {term:"Integrated Systems Test (IST)",def:"Testing of multiple building systems operating together to verify they interact correctly under normal and failure conditions."},
  {term:"Cause-and-Effect Matrix (C&E)",def:"Document mapping every trigger (cause) to every expected system response (effect). Defines every test point during IST."},
  {term:"Transfer Test",def:"Testing the switchover between primary and backup power systems (e.g., mains to generator, UPS A to UPS B) under controlled conditions."},
  {term:"Failure Mode Simulation",def:"Deliberately triggering a failure condition during IST to verify the system responds correctly — e.g., simulating mains failure to test generator start."},
  {term:"Load Bank",def:"Portable electrical load used to simulate IT power demand during commissioning tests. Proves the power chain without risking live IT equipment."},
  {term:"Stepped Load Test",def:"Increasing load in stages (25%→50%→75%→100%) to identify load-dependent issues that only appear at specific load levels."},
  {term:"Performance Verification Test (PVT)",def:"Extended test (minimum 72 hours per EN 50600-4-2) at >80% design IT load to verify sustained performance including PUE."},
  {term:"Seasonal Commissioning",def:"Testing conducted during opposite seasonal conditions to verify systems perform in both summer and winter extremes."},
  {term:"Defects Liability Period (DLP)",def:"Contractual period (typically 12-18 months from practical completion) during which the contractor must return to fix defects at their cost."},
  {term:"Retention",def:"Percentage of contract value (typically 5%) withheld from the contractor until all defects are resolved and the DLP expires."},
  {term:"Defect Classification",def:"Categorisation of defects: A = safety-critical (immediate), B = affects performance (before handover), C = cosmetic/minor (during DLP)."},
  {term:"Practical Completion",def:"Contractual milestone when the works are substantially complete and the building can be occupied — triggers the DLP."},
  {term:"Operational Readiness Review (ORR)",def:"Assessment verifying the operations team has documentation, training, spares, maintenance contracts, and emergency procedures to run the facility."},
  {term:"O&M Manual",def:"Site-specific operations and maintenance manual — not generic manufacturer PDFs, but documentation of the actual installation and its specific configuration."},
  {term:"As-Built Drawings",def:"Drawings updated to reflect what was actually built, including all changes made during construction. Required for ongoing maintenance."},
  {term:"DCIM (Data Centre Infrastructure Management)",def:"Software platform that monitors, manages, and optimises data centre physical infrastructure — power, cooling, space, and connectivity."},
  {term:"BMS (Building Management System)",def:"Central control system monitoring sensors, managing setpoints, and coordinating equipment across the building systems."},
  {term:"Witness Hold Point",def:"Stage in construction or commissioning where work must stop until an independent witness inspects and signs off before proceeding."},
  {term:"Snagging List",def:"Register of defects and incomplete items identified during inspection, requiring resolution before practical completion."},
  {term:"Commissioning Certificate",def:"Formal document signed by the CxA confirming that a system has been tested and meets its acceptance criteria."},
  {term:"Training Programme",def:"Structured programme to transfer knowledge from designers and contractors to the operations team — mandatory before handover."},
  {term:"Spare Parts Strategy",def:"Plan for maintaining critical spare parts on site to minimise downtime — typically 2-year supply of consumables plus one unit of each critical component."},
  {term:"Emergency Procedure",def:"Documented procedure for responding to emergency conditions (fire, flood, power failure) — must be facility-specific and tested."}
];

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Runtime Error'),
      React.createElement('p',null,'DC-LEARN-013 v3.0.2 · Commissioning & Handover'),
      React.createElement('pre',{style:{fontSize:12,background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,overflow:'auto',whiteSpace:'pre-wrap'}},String(this.state.error)),
      React.createElement('p',{style:{color:'#6b7280',fontSize:13,marginTop:8}},'Copy this error and send to LM.')
    );
    return this.props.children;
  }
}

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

const hasTextSelection = () => { const sel = window.getSelection(); return sel && sel.toString().length > 0; };

function Dot({done,stage}){
  const colors={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  return <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:done?colors[stage]:'var(--border)',border:'1px solid '+(done?colors[stage]:'var(--border-light)'),marginRight:4}} />;
}

function GrammarPanel({level,onComplete,done}){
  const [expandedFact,setExpandedFact]=useState(null);
  const [checkedItems,setCheckedItems]=useState({});
  const toggleFact=(i)=>{ if(!hasTextSelection()) setExpandedFact(expandedFact===i?null:i); };
  const toggleCheck=(i)=>setCheckedItems(prev=>({...prev,[i]:!prev[i]}));
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--grammar)',fontSize:16,fontWeight:600,marginBottom:12}}>📖 Grammar — What Is It?</h3>
      {level.grammar.facts.map((f,i)=>(
        <div key={i} className="fact-card" role="button" tabIndex={0} aria-expanded={expandedFact===i}
          onClick={()=>toggleFact(i)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleFact(i)}>
          <div className="term">{f.term}</div>
          {expandedFact===i && (
            <div className="fade-in selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} style={{userSelect:'text',cursor:'text'}}>
              <div className="def">{f.definition}</div>
              <div className="detail">{f.plain}</div>
              <div className="detail" style={{fontStyle:'normal'}}>📊 {f.number}</div>
              <div className="std">{f.standard}</div>
              {f.soWhat && <div style={{fontStyle:'italic',color:'var(--grammar)',fontSize:13,marginTop:8,lineHeight:1.6}}>{f.soWhat}</div>}
              <AssistBar fact={f} stage="grammar" level={level} />
            </div>
          )}
        </div>
      ))}
      {level.grammar.whatItLooksLike && (
        <div className="card selectable-text" style={{marginTop:14}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>What It Looks Like on Site</h4>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{level.grammar.whatItLooksLike}</div>
        </div>
      )}
      {level.grammar.siteChecklist && (
        <div style={{marginTop:14}}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>Site Checklist</h4>
          {level.grammar.siteChecklist.map((item,i)=>(
            <label key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6,fontSize:13,color:'var(--text)',cursor:'pointer'}}>
              <input type="checkbox" checked={!!checkedItems[i]} onChange={()=>toggleCheck(i)} style={{marginTop:3}} />
              <span>{item}</span>
            </label>
          ))}
        </div>
      )}
      <button className={'completion-btn btn-grammar'+(done?' done':'')} onClick={onComplete}>
        {done ? '✓ Key facts memorised' : "I've memorised the key facts"}
      </button>
      {level.sourceNote && (
        <div style={{marginTop:14,fontSize:12,color:'var(--text-dim)',lineHeight:1.8,borderLeft:'3px solid var(--grammar)',paddingLeft:12}}>
          {level.sourceNote}
        </div>
      )}
      <div style={{marginTop:14,background:'var(--panel)',border:'1px solid var(--grammar)',borderRadius:10,padding:'12px 14px'}}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--grammar)',marginBottom:6}}>💡 Feynman Clarify</h4>
        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>Expand any Grammar fact and click <strong>💡 Clarify</strong> to cycle through three learning rounds: an everyday analogy, a first-principles explanation, and a self-test question. Each round uses original content — not a repetition of the visible definition.</div>
      </div>
    </div>
  );
}

function LogicPanel({level,onComplete,done}){
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--logic)',fontSize:16,fontWeight:600,marginBottom:12}}>⚙️ Logic — Why Does It Matter?</h3>
      {level.logic.causeAndEffect.map((ce,i)=>(
        <div key={i} className="ce-card" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div className="cause">⚡ {ce.cause}</div>
          <div className="effect">→ {ce.effect}</div>
          <div className="insight">💡 {ce.insight}</div>
        </div>
      ))}
      {level.logic.constraintLesson && (
        <div className="card" style={{marginTop:14,userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--logic)',marginBottom:8}}>Constraint Lesson</h4>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8,whiteSpace:'pre-line'}}>{level.logic.constraintLesson}</div>
        </div>
      )}
      <div className="wl-box" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        <h4 style={{fontSize:14,fontWeight:600,color:'var(--green)',marginBottom:10}}>🔗 Weakest Link</h4>
        <div style={{marginBottom:10}}><span style={{fontSize:12,fontWeight:600,color:'var(--red)'}}>❌ What’s Wrong:</span><p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{level.logic.weakestLink.whatsWrong}</p></div>
        <div style={{marginBottom:10}}><span style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>✅ What’s Right:</span><p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{level.logic.weakestLink.whatsRight}</p></div>
        <div><span style={{fontSize:12,fontWeight:600,color:'var(--accent)'}}>➡️ How To Get There:</span><p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{level.logic.weakestLink.howToGetThere}</p></div>
      </div>
      {level.crossRefs && level.crossRefs.length > 0 && (
        <div style={{marginTop:14}} className="selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <h4 style={{fontSize:12,fontWeight:600,color:'var(--text-dim)',marginBottom:6}}>Cross-References</h4>
          {level.crossRefs.map((cr,i)=>(<div key={i} style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>↔️ {cr.module} {cr.level}: {cr.topic}</div>))}
        </div>
      )}
      <button className={'completion-btn btn-logic'+(done?' done':'')} onClick={onComplete}>
        {done ? '✓ Consequences understood' : 'I understand the consequences'}
      </button>
    </div>
  );
}

function RhetoricPanel({level,onComplete,done}){
  const [activePersona,setActivePersona]=useState('declan');
  const pData=level.rhetoric[activePersona];
  const pText=typeof pData==='object'?pData.text:pData;
  const pTakeaway=typeof pData==='object'?pData.takeaway:(level.rhetoricTakeaways?level.rhetoricTakeaways[activePersona]:null);
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--rhetoric)',fontSize:16,fontWeight:600,marginBottom:12}}>💬 Rhetoric — How Do I Explain It?</h3>
      <div className="persona-row">
        {PERSONA_KEYS.map(k=>(<button key={k} className={'persona-btn'+(activePersona===k?' active':'')} aria-label={PERSONAS[k]} onClick={()=>setActivePersona(k)}>{PERSONAS[k]}</button>))}
      </div>
      <div className="persona-msg selectable-text" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        {pText}
        {pTakeaway && <div style={{fontStyle:'italic',color:'var(--rhetoric)',marginTop:10,fontSize:13,lineHeight:1.6}}>{pTakeaway}</div>}
      </div>
      <button className={'completion-btn btn-rhetoric'+(done?' done':'')} onClick={onComplete} style={{marginTop:16}}>
        {done ? '✓ Can explain to stakeholders' : 'I can explain it to each stakeholder'}
      </button>
    </div>
  );
}
