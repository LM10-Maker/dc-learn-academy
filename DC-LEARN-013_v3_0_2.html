const safeStore=(function(){var s;try{s=window.localStorage;}catch(e){s=null;}return{get:function(k){try{return s?s.getItem(k):null;}catch(e){return null;}},set:function(k,v){try{if(s)s.setItem(k,v);}catch(e){}},remove:function(k){try{if(s)s.removeItem(k);}catch(e){}}};})();

const CLONSHAUGH = {name:"Declan’s Clonshaugh DC",year:2013,racks:400,currentKW:6,targetKW:20,currentPUE:1.50,targetPUE:1.20,chiller:1.5,crahs:12,crahKW:150,containment:"None"};

// Source: 9 levels per Trivium method — DC_LEARN_SERIES_SPEC_v1_4 §3. Content: Commissioning & Handover per CIBSE Code M, ASHRAE Guideline 0, BSRIA BG 6/2018.
const LEVELS = [
{
  id:"L1",
  level:1,
  name:"Commissioning Philosophy & Planning",
  icon:"📋",
  component:"Cx Plan",
  available:true,
  userNeedStatement:"Understand why DC commissioning is fundamentally different from building commissioning and what a Cx plan must contain for a live retrofit.",
  plainEnglish:"Commissioning is proving that every system works as designed before you trust it with live IT load. In a DC retrofit, you cannot shut everything down to test — the existing tenants' servers must keep running. That one constraint shapes every test, every procedure, and every cost decision.",
  grammar:{
    facts:[{term:"Commissioning (Cx)",definition:"The systematic process of verifying that all building systems perform interactively according to the design intent and the owner's operational needs. In a DC context, commissioning must prove that power, cooling, fire, security, and monitoring systems function correctly under load — individually and as an integrated whole.",plain:"Testing everything to prove it works as designed. Not just switching it on — proving it performs under real conditions, including failure conditions.",number:"CIBSE Code M defines commissioning as 3–5% of MEP contract value (Tier 1 — CIBSE Commissioning Code M §2.4). At Clonshaugh, the €5M MEP retrofit carries a €230k Cx budget (4.6%) (Tier 2 — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, indicative).",standard:"CIBSE Commissioning Code M (2003); ASHRAE Guideline 0-2019 §1.1",feynman:{analogy:"Think of commissioning like a driving test. Building the car is design and construction. Commissioning is the examiner checking every system works under real conditions before you drive on a public road.",firstPrinciples:"Any engineered system has a designed behaviour and an actual behaviour. These are never identical. Commissioning measures the gap, fixes what can be fixed, and documents what remains.",theTest:"A contractor says the UPS is installed and working. Has it been commissioned? Only if tested against the design specification under load, with results recorded and signed off by someone independent of the contractor."}},{term:"Commissioning Plan (Cx Plan)",definition:"A formal document defining the scope, schedule, responsibilities, procedures, and acceptance criteria for all commissioning activities. For a DC retrofit, the plan must specifically address live-load constraints, phasing strategy, fall-back positions, and tenant notification requirements.",plain:"The master document that says what gets tested, when, by whom, and what 'pass' looks like. Without it, commissioning becomes improvised — and improvised testing in a live DC is how you cause the outage you were trying to prevent.",number:"A typical Cx plan for a 400-rack DC retrofit runs to 80–120 pages. Clonshaugh's plan covers 4 phases over 18 months with 47 individual test procedures.",standard:"CIBSE Code M §3; BSRIA BG 6/2018 §2; ASHRAE Guideline 0-2019 §4",feynman:{analogy:"The Cx plan is like a flight plan. A pilot does not take off and figure out the route mid-air. Every test, every sequence, every fall-back is mapped before the first switch is thrown.",firstPrinciples:"Complex systems fail at interfaces where one system connects to another. A Cx plan exists because the sequence of testing matters. Testing system B before system A is verified creates an untested dependency.",theTest:"A DC retrofit has 47 test procedures. Without a Cx plan, in what order do you run them? If your answer is whatever the contractor finishes first, you need a Cx plan."}},{term:"Commissioning Authority (CxA)",definition:"An independent professional responsible for developing and overseeing the commissioning process. The CxA must be independent of the design team and the installing contractor — they cannot grade their own work.",plain:"The independent referee who checks the builder's homework. They write the test procedures, witness the tests, and sign off the results. If the CxA works for the contractor, the independence is compromised — like marking your own exam.",number:"CxA fees typically run 0.5–1.5% of MEP contract value. At Clonshaugh: €25k–€75k for the 18-month programme (indicative — RICS NRM1 fee benchmarks, T2).",standard:"ASHRAE Guideline 0-2019 §3; BSRIA BG 6/2018 §2.3",feynman:{analogy:"The CxA is the independent auditor of construction. Just as a financial auditor cannot work for the company they audit, the CxA cannot work for the contractor whose systems they verify.",firstPrinciples:"Self-certification creates a conflict of interest. The entity that built the system benefits from declaring it complete. Independence removes that incentive. The CxA costs 0.5-1.5% of MEP value.",theTest:"The contractor offers to have their project engineer act as CxA to save money. Why is this unacceptable? Because the builder does not grade their own work."}},{term:"Fall-Back Position",definition:"A documented, tested procedure for returning a system to its pre-test state if a commissioning test fails or causes unexpected consequences. Every test involving live IT load must have a fall-back position before it begins.",plain:"Plan B. If this test goes wrong, what exactly do we do to get back to where we started? In a live DC, 'we'll figure it out' is not a fall-back position.",number:"Clonshaugh requires a documented fall-back for every test that could affect the 2,400 kW live IT load. Each fall-back has a maximum execution time (typically 5–15 minutes) and a named responsible person.",standard:"CIBSE Code M §5.2; BSRIA BG 6/2018 §4.1",feynman:{analogy:"A fall-back position is the fire escape for a commissioning test. Before you run the test, you confirm the escape route exists, is unlocked, and leads somewhere safe.",firstPrinciples:"Every test has a non-zero probability of failure. In a live DC, test failure can mean IT outage. A documented return path converts an unpredictable failure into a controlled procedure with a known execution time.",theTest:"You are about to test a power chain transfer in a live DC. Your fall-back is we will figure it out. Is this acceptable? No. Every live-load test requires a written procedure with a named person and a maximum execution time."}},{term:"Commissioning Budget Benchmark",definition:"CIBSE Code M recommends 3–5% of MEP contract value for commissioning. For DC retrofits, the budget should be at the upper end (4–5%) due to the complexity of live-load testing, integrated systems testing, and the cost of load bank hire. Under-budgeting Cx is the most common cause of incomplete commissioning.",plain:"Budget 4–5% of the MEP cost for commissioning a DC retrofit. Anything less and you will run out of money before the integrated systems testing — which is the most important part.",number:"CIBSE benchmark: 3–5% of MEP value; DC retrofit target: 4–5% (Tier 1 — CIBSE Code M §2.4). At Clonshaugh (€5M MEP): €200k–€250k Cx budget (Tier 2 — RICS NRM1 fee benchmarks, indicative). Load bank hire alone: €15k–€30k per test event (Tier 3 — specialist equipment hire market, indicative). CxA fees: €25k–€75k for 18-month programme (Tier 2 — RICS NRM1 fee benchmarks, indicative).",standard:"CIBSE Code M (2022) §2.4; BSRIA BG 6/2018",feynman:{analogy:"Think of commissioning budget like the safety inspection on a new aircraft. Nobody questions spending 5% of the aircraft cost on proving it flies safely. A data centre costs millions and serves critical infrastructure — the 4–5% proves it works before you trust live data to it.",firstPrinciples:"Commissioning cost scales with system complexity, not just system value. A DC has more integrated systems (power, cooling, fire, BMS, security) than a typical building, and each integration point requires testing. Live-load constraints add cost because tests must be scheduled around operational windows. Under-budgeting leads to the most expensive tests (IST, load bank) being cut first — which are precisely the tests that find the most defects.",theTest:"A project manager proposes cutting the Cx budget from 4.5% to 2% to save €125k on a €5M MEP retrofit. What gets cut? Answer: IST (€40k), seasonal commissioning (€25k), and load bank testing (€30k). These are the tests that prove the systems work together under real conditions. The €125k saving creates an unquantified risk that the DC infrastructure has not been proven."}}],
    whatItLooksLike:"The Cx plan is a physical document (often A3 ring-bound on site) that sits in the site office throughout the programme. It contains the master schedule showing which systems are tested in which phase, the test procedures with step-by-step instructions, the acceptance criteria defining what pass/fail looks like, the witness requirements specifying who must be present, and the fall-back procedures for every test that touches live load. A good Cx plan reads like a story — you can follow it from Phase 1 through to handover.",
    siteChecklist:["Cx plan document present in site office","CxA appointed and contract in place","Fall-back positions documented for every live-load test","Tenant notification schedule agreed","Phase boundaries clearly defined","Acceptance criteria signed off by owner"]
  },
  logic:{
    causeAndEffect:[{cause:"Cx treated as afterthought — budget allocated late, CxA appointed after installation begins",effect:"Systems installed without witness hold points. Defects discovered at handover instead of during installation. Remediation costs 3–5× what they would have cost if caught during installation.",insight:"Cx is not a phase at the end of a project — it is a process that starts at design stage. The Cx plan should be written before the first piece of equipment is ordered, because the plan shapes the installation sequence."},{cause:"No independent CxA — contractor's project manager acts as commissioning manager",effect:"The entity responsible for building the system is also responsible for declaring it works. Defects are reclassified as 'acceptable deviations.' Acceptance criteria are lowered to match what was actually achieved rather than what was specified.",insight:"This is AIMEP Rule 8 applied to construction: the builder doesn't grade their own work. An independent CxA costs 0.5–1.5% of MEP value — typically €25k–€75k on a €5M contract (Tier 2 — RICS NRM1 fee benchmarks, indicative). The cost of a single undetected power chain failure dwarfs this fee."},{cause:"No documented fall-back positions for live-load tests",effect:"When a test fails (and tests do fail), the response is improvised. In a live DC, improvised responses to unexpected failures are the leading cause of unplanned outages.",insight:"Every test on a live DC must answer three questions before it begins: (1) What are we testing? (2) What does pass/fail look like? (3) If it fails, how do we get back to the pre-test state in under 15 minutes? If you cannot answer all three, the test is not ready."}],
    constraintLesson:"The fundamental constraint of DC commissioning is the live IT load. In a new-build DC, you can test every system at full load before any IT equipment arrives. In a retrofit, the existing 2,400 kW of IT load at Clonshaugh must keep running throughout every phase of the 18-month programme.\n\nThis single constraint shapes everything: the phasing strategy (you cannot test Hall A's new power chain while Hall A's existing IT is running on it), the test timing (load bank tests happen on weekends or during low-demand windows), the fall-back procedures (every test that could interrupt power or cooling to live racks must have a documented return path), and the cost (phased commissioning takes longer and requires more temporary provisions than a clean-sheet programme).\n\nThree questions every test must answer before proceeding:\n1. Can this test be performed without any risk to the 2,400 kW live IT load? If yes, proceed normally.\n2. If there is risk, what is the fall-back position and how long does it take to execute? If the fall-back is documented and the execution time is acceptable, proceed with tenant notification.\n3. If there is no safe fall-back, can the test be deferred until the IT load has been migrated to the new system? If yes, sequence it into the next phase. If no, escalate to the owner for a risk decision.\n",
    weakestLink:{whatsWrong:"Commissioning is just testing at the end — you switch things on and check they work.",whatsRight:"Commissioning is a structured process that starts at design stage, runs through procurement and installation, and culminates in witnessed performance testing. The Cx plan shapes the design (witness hold points), the procurement (FAT requirements in purchase orders), the installation sequence (what gets tested before what gets covered up), and the handover (what documentation the operator receives).",howToGetThere:"Appoint the CxA during design stage (not after installation). Write the Cx plan before equipment is ordered. Include FAT witness requirements in every purchase order over €50k. Define acceptance criteria before testing begins — not after results are in. Budget 3–5% of MEP contract value (Clonshaugh: €230k of €5M). All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."}
  },
  rhetoric:{
    declan:"I've been on the receiving end of a 'commissioning programme' that was basically the contractor switching everything on the Thursday before handover and calling it done. Six months later I'm still finding things that don't work. The UPS transfer test? Never done. The cooling interlock with the fire system? 'We'll sort that in the defects period.' The O&M manuals? A box of manufacturer PDFs with no site-specific content. A proper Cx plan means I know exactly what's been tested, I've seen the results, and I've signed off that it works. That costs €230k on a €5M job — 4.6%. The alternative is spending the first year of operations discovering the defects myself, at my employer's expense, while keeping 2,400 kW of live IT running.",
    ann:"The Cx budget is a rounding error on the overall investment. Clonshaugh's €5M retrofit is part of a €15M facility upgrade programme. The €230k commissioning cost is 1.5% of total programme value. What I need to know is: does spending €230k measurably reduce my risk of a commissioning-related outage? The answer is yes — CIBSE Code M data shows that facilities with formal Cx programmes have 60–70% fewer defects at handover than those without. For a DC generating €2.5M/month in hosting revenue, a single 4-hour outage costs more than the entire Cx budget. The investment case writes itself.",
    mark:"The Cx plan is the engineering quality gate. Every system I design has performance criteria — the Cx plan is where those criteria get tested. Without it, I'm designing to a specification that nobody ever verifies. The key standards are CIBSE Code M for the overall framework, BSRIA BG 6/2018 for the procedures, and ASHRAE Guideline 0-2019 for the independence requirements. For Clonshaugh, the plan must address IEC 61439-1 (switchgear verification), IEC 62040-3 (UPS performance testing), and EN 50600-2-2 (power distribution commissioning). The 47 test procedures in the Cx plan map directly to the design specifications — one test for every critical design parameter.",
    sarah:"EU Taxonomy alignment requires evidence that the facility meets the technical screening criteria — and that evidence comes from commissioning. PUE ≤ 1.3 is not a design calculation — it must be measured and verified under operating conditions. The PVT (Performance Verification Test) at Clonshaugh must demonstrate the actual PUE at design load, not the theoretical PUE from the energy model. Without witnessed PVT results, the facility cannot claim Taxonomy alignment, which affects SFDR reporting for Ann's fund. The Cx plan is where the Taxonomy measurement protocol gets specified — what instruments, what measurement period, what load conditions.",
    tom:"Cx budget breakdown for Clonshaugh (€230k total): CxA fees €55k (18 months × retainer + witness days), load bank hire €35k (2 × full-chain tests at €15k each + standby charges), temporary power provisions €40k (portable generators for fall-back during transfer tests), instrumentation and data logging €25k (power quality meters, thermal imaging, vibration analysis), documentation and as-built verification €30k (reviewing and marking up 400+ drawings), defect management €20k (tracking, re-testing, sign-off), programme management €25k (scheduling, coordination, tenant liaison). The 4.6% is within the CIBSE Code M benchmark of 3–5%. Cutting Cx to save money is a false economy — a single re-test after handover costs €8k–€15k per system because the contractor has demobilised. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."
  },
  
   rhetoricTakeaways:{
     declan:"Commissioning is not a phase — it is a process that starts at design stage. Appoint the CxA before ordering equipment.",
     ann:"The €230k Cx budget pays for itself if it prevents a single 4-hour outage in a facility generating €2.5M/month.",
     mark:"Write the Cx plan before the first purchase order. The plan shapes the procurement — FAT clauses, witness requirements, acceptance criteria.",
     sarah:"Facilities with formal Cx programmes have 60–70% fewer defects at handover. Fewer defects means less rework, less waste, lower embodied carbon.",
     tom:"Budget 4–5% of MEP value for commissioning. Under-budgeting cuts IST and load bank testing first — the tests that find the most defects."
   },
   scenario:{title:"The Clonshaugh Cx Plan",narrative:"Clonshaugh is preparing for an 18-month MEP retrofit programme. The facility manager has been asked to review the draft Cx plan and the proposed budget. The main contractor has proposed a Cx budget of €120k (2.4% of MEP contract), with their own project engineer acting as CxA.",question:"What are the three main problems with the contractor's proposal, and what should the revised budget look like?",answer:"Problem 1: Independence. The contractor's project engineer cannot be the CxA — this violates the independence principle (ASHRAE Guideline 0 §3, and AIMEP Rule 8: the builder doesn't grade their own work). An independent CxA must be appointed.\n\nProblem 2: Budget. At 2.4%, the proposed budget is below the CIBSE Code M benchmark of 3–5%. For a live DC retrofit with tenant constraints, 4–5% is more realistic.\n\nProblem 3: Scope. A €120k budget likely omits key items: load bank hire (€35k), temporary power provisions for fall-back (€40k), and independent documentation review (€30k).\n\nRevised budget (€230k / 4.6%):\n- Independent CxA fees: €55k\n- Load bank hire (2 × full-chain): €35k\n- Temporary power (fall-back provisions): €40k\n- Instrumentation & data logging: €25k\n- Documentation & as-built review: €30k\n- Defect management: €20k\n- Programme management: €25k\nTotal: €230k (4.6% of €5M MEP contract)\n\nThe additional €110k buys independence, proper load testing, and fall-back provisions — the three things most likely to prevent commissioning-related outages on a live facility.\n"},
  sourceNote:"CIBSE Commissioning Code M (2003) — Tier 1. BSRIA BG 6/2018 — Tier 2. ASHRAE Guideline 0-2019 — Tier 2. CxA fees and Cx budget percentages from RICS NRM1 fee benchmarks and CIBSE Code M §2.4 — Tier 2. Clonshaugh scope and programme indicative for a 400-rack DC retrofit.",
  clockQuote:"If it isn't in the witness report, it didn't happen.",
  crossRefs:[{module:"DC-LEARN-003",level:"L5",topic:"Redundancy topology — concurrent maintainability requires phased Cx"},{module:"DC-LEARN-009",level:"L1",topic:"BMS/DCIM — monitoring must be commissioned before systems it monitors"}],
  cascadeCheck:{question:"Has a Cx plan been written and approved?",pass:"Cx plan approved, CxA appointed, budget allocated (€230k / 4.6%)",fail:"No Cx plan. Commissioning will be improvised — high risk of defects at handover.",detail:"CIBSE Code M §3 requires a formal Cx plan before commissioning activities begin."}

{
  id:"L2",
  level:2,
  name:"Factory Acceptance Testing (FAT)",
  icon:"🏭",
  component:"FAT",
  available:true,
  userNeedStatement:"Understand why testing equipment at the manufacturer's facility before delivery catches defects that are 10× cheaper to fix in the factory than on site.",
  plainEnglish:"Before any major piece of equipment arrives at Clonshaugh, it should be tested at the factory where it was built. A UPS module that fails its performance test in a factory is the manufacturer's problem. A UPS module that fails on site is your problem — and your tenants' problem.",
  grammar:{
    facts:[{term:"Factory Acceptance Test (FAT)",definition:"A formal test conducted at the manufacturer's premises to verify that equipment meets the specified performance requirements before it is shipped to site. FAT results form part of the commissioning evidence chain and must be referenced during SAT.",plain:"Testing the equipment at the factory before it leaves. If it doesn't work properly in the factory, it definitely won't work properly on site — and fixing it in the factory is 10× cheaper than fixing it after installation.",number:"Clonshaugh UPS FAT: 4 × 500 kVA modules tested individually at manufacturer's test bay. Each FAT takes 2–3 days including input harmonic distortion, efficiency at 25/50/75/100% load, battery discharge, and transfer tests. Cost: included in equipment purchase (manufacturer bears the cost).",standard:"IEC 62040-3 §6.2 (UPS FAT requirements); IEC 61439-1 §10.2 (switchgear routine tests)",feynman:{analogy:"FAT is like inspecting a new car at the factory before it ships. If the engine misfires, fixing it at the factory costs nothing. Fixing it at your house after delivery costs ten times more.",firstPrinciples:"Defects are cheapest to fix at the point of origin. A switchboard with a loose busbar joint costs two hours to fix in the factory. On a live site, the same fix requires isolation, temporary power, and specialist labour.",theTest:"A UPS module arrives without FAT. During SAT, the protection settings are wrong. Who pays? The client, because without a FAT clause in the purchase order, there was no contractual hold point."}},{term:"Witness Testing",definition:"A FAT or SAT conducted in the presence of the client's representative (typically the CxA or design engineer) who formally witnesses the test results and signs the test certificates. Witness testing adds cost (travel, attendance) but provides independent verification.",plain:"Being there in person to watch the test happen. The manufacturer runs the test, you watch, you check the results match the specification, you sign the certificate. If you weren't there, you're relying on the manufacturer's word.",number:"Witness FAT cost per event: €2k–€5k (CxA travel + 2 days attendance) (Tier 2 — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, indicative). Clonshaugh: 6 witness FATs (4 × UPS, 1 × LV switchboard, 1 × generator) at ~€3k each = €18k. This is included in the €55k CxA fee (Tier 2 — RICS NRM1 fee benchmarks, indicative).",standard:"BSRIA BG 6/2018 §3.2; IEC 61439-1 §10.2.7 (witness of routine tests)",feynman:{analogy:"Witness testing is like being present when a mechanic inspects your car before purchase. The mechanic runs the tests, you watch the results. If you were not there, you rely on the seller's word.",firstPrinciples:"A test certificate from the manufacturer is a claim. A witnessed test certificate is verified evidence. The difference matters when a dispute arises about whether equipment met specification at delivery.",theTest:"A FAT certificate says the switchboard passed. Six months later, a busbar joint fails. Without witness attendance, can you prove the joint was defective at manufacture? No."}},{term:"Type Test vs Routine Test",definition:"A type test verifies that a design meets the standard (done once per product type, typically by an accredited lab). A routine test verifies that a specific manufactured unit meets its own specification (done on every unit produced). FAT typically includes routine tests; type test reports are submitted as evidence.",plain:"Type test: proving the design works (done once for the product range). Routine test: proving THIS specific unit works (done on every unit that leaves the factory). You need both — the type test report plus the routine test results for your specific serial numbers.",number:"IEC 61439-1 type test report: 200–400 pages per switchboard design. Routine test certificate per unit: 15–30 pages. Both must be included in the O&M manual.",standard:"IEC 61439-1 §10.2 (routine tests) and §10.10 (design verification); IEC 62040-3 §6.1 (type tests)",feynman:{analogy:"A type test certifies a new aircraft design, done once. A routine test is the pre-flight check on every individual plane, done on every unit to prove this specific one works.",firstPrinciples:"Standards verify two things: does the design meet requirements (type test), and does this manufactured unit match the verified design (routine test). The CE mark covers the type test. The FAT covers the routine test.",theTest:"A switchboard carries a CE mark. Does it need a FAT? Yes. The CE mark proves the design type is compliant. The FAT proves this specific unit matches the design."}},{term:"FAT Witness Protocol",definition:"A structured procedure for witnessing factory acceptance tests. The CxA attends the manufacturer's test facility with the project specification, a pre-prepared test checklist, and acceptance criteria. Results are recorded in real time. Any deviation from specification is documented as a non-conformance requiring resolution before site delivery.",plain:"The CxA goes to the factory with a checklist and watches every test. If anything fails or deviates from the specification, it is written up as a non-conformance — and the equipment does not ship until it is resolved.",number:"FAT attendance cost: €2k–€5k per manufacturer visit (travel + CxA time) (Tier 2 — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, indicative). Typical DC retrofit FAT programme: 4–8 manufacturer visits. Non-conformance discovery rate at FAT: 15–25% of equipment has at least one deviation from specification.",standard:"CIBSE Code M §4.3; BSRIA BG 6/2018 §3; IEC 61439-1 Annex D",feynman:{analogy:"Think of FAT like inspecting a car before buying it — at the dealership, not after delivery. If you find the wrong engine at the dealership, they fix it before shipping. If you find it on site, you have a delay, a crane, and a project manager having a bad day.",firstPrinciples:"Fixing a defect at the factory costs 1× (the manufacturer fixes it in their workshop). Fixing the same defect on site costs 5–10× (shipping, crane, scaffolding, re-testing). FAT catches 15–25% of deviations before they become site problems. The cost of attending FAT is always less than the cost of one site non-conformance.",theTest:"A UPS arrives on site and fails the voltage regulation test during SAT. The manufacturer says it passed FAT. What went wrong? Answer: Either FAT was not witnessed (no independent verification), or the FAT test conditions did not match the site specification (different input voltage, different load profile). A witnessed FAT with site-specific test conditions would have caught this."}},{term:"FAT Documentation Requirements",definition:"The complete documentation package that must accompany equipment from FAT through to the O&M manual. Includes type test reports, routine test certificates, calibration certificates for test equipment, non-conformance reports (if any), and photographic evidence of nameplate data and serial numbers. Without this chain, SAT results cannot be correlated back to FAT evidence.",plain:"The paper trail that proves the equipment was tested and passed. Type test report proves the design works. Routine test certificate proves this specific unit works. Calibration certificate proves the test equipment was accurate. If any link in this chain is missing, the commissioning evidence is incomplete.",number:"Typical FAT documentation package per major equipment item: 50–150 pages. Clonshaugh total FAT documentation: approximately 800 pages across 6 witness events. All documents must be cross-referenced by equipment serial number.",standard:"IEC 61439-1 §10.2.7 (documentation requirements); CIBSE Code M §4.3; BSRIA BG 6/2018 §3.4",feynman:{analogy:"FAT documentation is the chain of custody for commissioning evidence. Like forensic evidence in court, every link must be traceable. If the calibration certificate for the test meter is missing, the test results it produced are questionable.",firstPrinciples:"Commissioning is an evidence-based process. Every test result must be traceable to a calibrated instrument, a documented procedure, and a verified specification. Missing documentation breaks the evidence chain and reduces the value of all downstream testing.",theTest:"A switchboard FAT certificate shows all routine tests passed. But the calibration certificate for the test equipment is missing. Is the FAT valid? Technically, no — the accuracy of the test equipment is unverified, so the test results cannot be relied upon."}}],
    whatItLooksLike:"A FAT happens in the manufacturer's test bay — a controlled environment with calibrated instruments, test loads, and environmental monitoring. The UPS manufacturer's test bay has a resistive-inductive load bank capable of simulating DC server load profiles. The switchboard manufacturer's test bay has a high-current source for verifying busbar joints and a temperature-rise chamber for type testing. The CxA arrives with the project specification, a pre-prepared test checklist, and a camera. Each test is run to the agreed procedure, results are recorded in real time, and any deviations are noted. At the end, the CxA signs the test certificate or issues a non-conformance report.",
    siteChecklist:["FAT clause included in every equipment purchase order over €50k","Witness requirements specified (CxA attendance or waived with justification)","Test procedures agreed between manufacturer and CxA before FAT date","Type test reports received and reviewed before FAT","FAT results formally documented with serial numbers","Non-conformances tracked to resolution before shipment"]
  },
  logic:{
    causeAndEffect:[{cause:"No FAT clause in purchase order — equipment arrives untested",effect:"Defects discovered during SAT on site. A switchboard with a loose busbar joint that would have been caught in a 2-hour FAT now requires a site shutdown, scaffolding, and a specialist crew. The 2-hour factory fix becomes a 2-week site remediation at 5–10× cost.",insight:"The FAT clause must be in the purchase order at the time of order — not added later as an afterthought. Once the equipment is manufactured without FAT hold points, the manufacturer has no contractual obligation to test it before shipping."},{cause:"FAT conducted without witness — manufacturer self-certifies results",effect:"Test results may be accurate, but there is no independent verification. If a dispute arises during SAT (equipment doesn't meet specification), the manufacturer points to the FAT certificate. Without witness, the client has no basis to challenge.",insight:"Witness testing is not about distrust — it is about evidence. A witnessed FAT certificate is a contractual record that both parties agree the equipment met specification at the point of delivery. An unwitnessed certificate is a manufacturer's assertion."},{cause:"FAT not witnessed — UPS ships to site with incorrect output voltage regulation",effect:"Defect discovered during SAT. UPS must be returned to factory for repair (8–12 week round trip). DC retrofit programme delayed 3 months. Cost: €50k–€100k in delay costs plus €15k shipping.",insight:"FAT attendance costs €2k–€5k per visit. A single un-witnessed FAT that misses a defect costs 10–20× that in delay and rectification. The ROI on FAT attendance is the most asymmetric in the entire commissioning programme."}],
    constraintLesson:"The key constraint with FAT is manufacturer scheduling. Major DC equipment (UPS, generators, LV switchboards) has lead times of 12–26 weeks. The FAT must be scheduled within the manufacturer's production programme — typically 1–2 weeks before planned shipment. If the CxA is not available on that date, the FAT either happens without witness or shipment is delayed.\n\nFor Clonshaugh's phased programme, this means coordinating 6 witness FATs across 4 manufacturers over 18 months, with each FAT window being 2–3 days. The CxA must have these dates locked into the programme schedule from day one, not discovered 2 weeks before the manufacturer says \"we're testing on Tuesday.\"\n\nThe other constraint is what FAT cannot tell you. A UPS that passes FAT at the manufacturer's test bay — clean power supply, controlled temperature, calibrated load bank — will not necessarily perform identically on site where the incoming supply has harmonic distortion, the ambient temperature varies, and the load profile is dynamic. FAT proves the equipment is manufactured correctly. SAT proves it works in your building.\n",
    weakestLink:{whatsWrong:"The CE mark means the equipment has been tested and is compliant — we don't need a separate FAT.",whatsRight:"The CE mark confirms the product TYPE meets the relevant standard (via type testing). It does not confirm that THIS SPECIFIC UNIT — with its specific serial number, its specific component batch, its specific assembly quality — meets the project specification. A CE-marked switchboard is designed to meet IEC 61439. Your FAT proves that the unit built for Clonshaugh actually achieves the specified fault rating, busbar capacity, and protection settings.",howToGetThere:"Include FAT clause in every purchase order over €50k. Specify which tests are required (reference IEC 62040-3 §6.2 for UPS, IEC 61439-1 §10.2 for switchboards). Require witness notification 4 weeks before FAT date. Budget €3k per witness event (CxA travel + attendance). At Clonshaugh: 6 witness FATs × €3k = €18k, included in CxA retainer. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."}
  },
  rhetoric:{
    declan:"I've had equipment arrive on site that supposedly 'passed FAT' — but when we powered it up, the protection settings were wrong, the metering CTs were the wrong ratio, and one circuit breaker was physically damaged from shipping. If I'd been at the FAT, I'd have caught the CT ratio and protection settings. The shipping damage is a separate issue, but the point is: a FAT certificate from the manufacturer isn't the same as seeing it work with your own eyes. For the Clonshaugh UPS modules, I want the CxA at the factory watching the transfer test. That's the test that matters — if the UPS can't transfer cleanly from mains to battery at the factory, it's not going to do it better on my site.",
    ann:"The cost question is straightforward. Six witness FATs at €3k each = €18k. That's within the CxA retainer so there's no additional budget line. The alternative — discovering a manufacturing defect after the equipment is installed, operational, and supporting live IT load — involves partial shutdown, remediation, and re-testing. A single on-site defect remediation on a UPS module costs €15k–€25k including the temporary provisions to keep the IT load running during the work (Tier 3 — BSRIA BG 6/2018 §3.2; Irish DC market 2025, indicative). The FAT investment pays for itself if it catches one defect. It typically catches three to five.",
    mark:"The technical content of a UPS FAT per IEC 62040-3 §6.2 covers: input current harmonic distortion, output voltage regulation, efficiency at 25/50/75/100% load, battery discharge at rated load, stored energy time, and transfer test (mains to battery and back). For the Clonshaugh 500 kVA modules, I've specified additional tests: parallel operation (two modules sharing load within 2% balance), overload behaviour (125% for 10 minutes per IEC 62040-3 Table 1), and input back-feed protection. These additional tests aren't in the standard FAT — they're project-specific requirements that must be written into the purchase order.",
    sarah:"From a compliance perspective, the FAT documentation feeds into the EU Taxonomy evidence package. The Taxonomy technical screening criteria require demonstration of energy efficiency — and UPS efficiency is a direct contributor to PUE. The FAT test at 25/50/75/100% load gives us the actual efficiency curve for each installed module, which feeds into the PVT calculation at Level 6. Without this data, the PUE verification is based on manufacturer catalogue data rather than tested performance of the installed units. For SFDR reporting, tested data carries more weight than catalogue data.",
    tom:"FAT costs zero additional to the project budget if it's in the purchase order from day one — the manufacturer absorbs the test cost as part of the supply contract. The only project cost is witness attendance: 6 events × €3k = €18k, inside the €55k CxA retainer. Here's the payback calculation: average defect remediation on a 500 kVA UPS module costs €15k–€25k on site (partial shutdown + temporary power + specialist labour + re-test). FAT typically identifies 2–4 issues per unit that would otherwise become site defects. Conservative estimate: FAT saves 2 site defects × €20k = €40k, against a witness cost of €18k. Net saving: €22k. And that's before considering the schedule impact — an on-site defect adds 2–4 weeks to the programme, which has its own cost."
  },
  
   rhetoricTakeaways:{
     declan:"The FAT clause must be in the purchase order at time of order. Once equipment is manufactured without hold points, you have lost your leverage.",
     ann:"FAT costs zero — the manufacturer absorbs it. Witness attendance at €18k pays back if it catches even one defect that would cost €20k to fix on site.",
     mark:"Specify type test reports AND routine test certificates in every equipment specification. The CE mark covers the design; FAT covers this specific unit.",
     sarah:"Every defect caught at FAT avoids a site remediation. Site fixes consume materials, transport, and energy — all with carbon cost. FAT is upstream carbon prevention.",
     tom:"FAT witness programme: 6 visits × €3k = €18k. One site non-conformance remediation: €15k–€25k. The maths is decisive from the first defect caught. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."
   },
   scenario:{title:"The Switchboard That Wasn't Tested",narrative:"Clonshaugh's new LV main switchboard has arrived on site. It was manufactured to IEC 61439-1, carries the CE mark, and the manufacturer provided a routine test certificate. However, no witness FAT was conducted — the purchase order was placed before the CxA was appointed, and no FAT clause was included. During SAT, the CxA discovers that the busbar rated current is 2,500A but the project specification requires 3,200A for the Phase 2 load growth.",question:"What has gone wrong, what is the likely cost impact, and how should the Cx plan prevent this in future?",answer:"What went wrong:\n1. Purchase order placed without FAT clause — no opportunity to check specification compliance before delivery\n2. CxA appointed after equipment was ordered — too late to influence procurement\n3. Specification review not performed at order stage — the 3,200A requirement should have been verified against the manufacturer's proposal\n\nCost impact:\n- Busbar replacement on site: €35k–€50k (new busbars manufactured, site shutdown for installation, re-testing)\n- Programme delay: 6–8 weeks (manufacturer lead time for new busbars + installation + re-test)\n- Temporary provisions: €15k–€20k (temporary feeds to maintain IT load during replacement)\n- Total: €50k–€70k for a defect that would have cost €0 to catch at FAT\n\nPrevention:\n- CxA appointment during design stage (before any purchase orders)\n- FAT clause mandatory in every purchase order over €50k\n- CxA reviews all equipment specifications against project requirements before order\n- Witness FAT for all critical power and cooling equipment\n"},
  sourceNote:"IEC 61439-1 §10.2 — Tier 1. IEC 62040-3 §6.2 — Tier 1. BSRIA BG 6/2018 §3.2 — Tier 2. Witness FAT costs from RICS NRM1 fee benchmarks — Tier 2. Defect remediation costs indicative for Irish DC projects — Tier 3.",
  clockQuote:"He'd never produced a document this long. He was oddly proud of it.",

{
  id:"L3",
  level:3,
  name:"Site Acceptance Testing (SAT)",
  icon:"🔧",
  component:"SAT",
  available:true,
  userNeedStatement:"Understand how individual systems are verified on site after installation — confirming that what passed FAT also works in your building.",
  plainEnglish:"SAT is testing each system on its own, on your site, after installation. The UPS is powered up and tested. Each CRAH unit is started and verified. Each switchboard is energised and protection settings checked. SAT proves that the installation — not just the equipment — meets the specification.",
  grammar:{
    facts:[{term:"Site Acceptance Test (SAT)",definition:"A formal test conducted on installed equipment at the project site to verify that it has been correctly installed, connected, configured, and performs to specification in its operational environment. SAT builds on FAT results but tests the complete installation — including cables, connections, and site-specific conditions.",plain:"Testing each piece of equipment after it has been installed on site. The UPS passed its FAT in the factory — but now it's connected to your cables, your switchboard, your earthing system, and your building power supply. SAT proves the installation works, not just the equipment.",number:"Clonshaugh SAT scope: 4 × UPS modules, 2 × LV switchboards, 8 × in-row cooling units, 1 × generator, 2 × ATS, 12 × PDUs. Total: ~30 individual SATs across all 4 phases.",standard:"CIBSE Code M §5; IEC 61439-1 §11 (on-site verification); BSRIA BG 6/2018 §4",feynman:{analogy:"If FAT is testing the engine on a dynamometer, SAT is the first drive on real roads. The engine worked in the lab but now faces real traffic, real gradients, and a real gearbox.",firstPrinciples:"Equipment performance depends on its environment. A UPS tested on a clean power supply at controlled temperature performs differently connected to real cables, a real transformer, and real building temperatures.",theTest:"A UPS passed FAT with 96% efficiency. On site during SAT, efficiency is 93%. Is the UPS faulty? Not necessarily. Site conditions change the operating point."}},{term:"Pre-Functional Checks (Static Testing)",definition:"Visual inspection and measurement checks performed before equipment is energised. Includes: cable termination tightness (torque verified), insulation resistance testing, earth continuity, protection device settings, and labelling verification. Pre-functional checks must be complete before SAT energisation.",plain:"Checking everything before you switch it on. Are the cables tight? Is the insulation intact? Are the circuit breakers set correctly? Are the labels right? If any of these fail, you don't energise — you fix first.",number:"Pre-functional checks on a single LV switchboard: 2–3 days for a 3,200A board with 40+ outgoing ways. Each cable termination torque-checked to manufacturer specification (typically 25–40 Nm for main connections).",standard:"IS 10101:2020+A1:2024 §6.4 (initial verification); IEC 61439-1 §11.3",feynman:{analogy:"Pre-functional checks are like checking your parachute before jumping. You do not discover a packing error at 10,000 feet. You verify every fold, every strap before you leave the aircraft.",firstPrinciples:"Energising equipment with an unverified installation risks catastrophic failure. A loose cable termination under load creates heat, which creates resistance, which creates more heat. This thermal runaway ends in arc flash.",theTest:"An installer says we can do torque checks and energisation on the same day. Why is this wrong? A failed torque check discovered during energisation is an arc flash risk, not just a paperwork issue."}},{term:"Energisation Procedure",definition:"The controlled, step-by-step process of applying power to newly installed equipment for the first time. In a live DC, energisation must follow a Method of Procedure (MOP) with fall-back positions and requires isolation of the new equipment from the live systems until SAT is complete.",plain:"The moment you switch it on for the first time. This is not a casual act — there is a written procedure, a named responsible person, everyone knows what's happening, and there's a plan for what to do if something goes wrong.",number:"Energisation of Clonshaugh Phase 1 new UPS system: 4-hour procedure including pre-energisation checks, staged energisation (incoming, bus section, outgoing), and 2-hour soak period at no-load before any IT load is connected.",standard:"BSRIA BG 6/2018 §4.2; HSA Code of Practice for Avoiding Danger from Electricity",feynman:{analogy:"Energisation is like launching a rocket. There is a precise countdown, everyone knows their role, abort criteria are pre-defined, and you do not skip steps because you are behind schedule.",firstPrinciples:"First energisation is the highest-risk moment in any electrical installation. The system transitions from inert to live. Any wiring error or protection setting mistake manifests in the first seconds of power flow.",theTest:"Can you energise a new switchboard without a written Method of Procedure? No. IS 10101 requires documented initial verification before energisation."}},{term:"Point-to-Point Verification",definition:"Systematic checking that every signal, control, and interlock connection between the new equipment and the BMS/DCIM system is correctly wired and functions as intended. A single missed interlock — cooling shut-off on fire alarm — can cause a cascade failure.",plain:"Following every wire from one end to the other. The BMS says 'start chiller 3' — does chiller 3 actually start? The fire system says 'shut down CRAH in Zone B' — does the correct CRAH shut down? Every connection tested, every signal verified.",number:"Clonshaugh BMS point-to-point: approximately 800 I/O points across power, cooling, fire, and security systems. At 10–15 minutes per point, this represents 130–200 hours of testing effort (3–5 weeks of a 2-person team).",standard:"CIBSE Code M §5.3; BSRIA BG 6/2018 §4.3",feynman:{analogy:"Point-to-point testing is like checking every address in a phone book actually reaches the right person. The BMS sends start chiller 3. Does chiller 3 actually start? Every signal verified end to end.",firstPrinciples:"Building systems communicate through signals. If sender and receiver are mismatched (wrong I/O address, reversed polarity) the system appears functional but responds incorrectly to real events.",theTest:"Clonshaugh has 800 I/O points. At 15 minutes per point, how long does verification take? 200 hours. This is the most tempting phase to skip and the most dangerous to omit."}},{term:"Energisation Sequence",definition:"The controlled sequence in which equipment is energised for the first time on site. Must follow a documented procedure: visual inspection → insulation resistance testing → phasing verification → protection relay testing → controlled energisation with monitoring. First energisation of HV equipment requires the ESB Networks-approved Authorised Person.",plain:"Switching on new electrical equipment on site is not just flipping a switch. There is a documented sequence: check it visually, test the insulation, verify the phase rotation, test the protection, then energise under controlled conditions with monitoring equipment connected.",number:"Pre-energisation checks: 5–8 per equipment item. First energisation duration: 15–30 min per item (including monitoring period). IR testing: >1 MΩ at 500V DC for LV circuits, >100 MΩ at 1 kV for MV. Phase rotation: clockwise (L1-L2-L3) per IS 10101.",standard:"IS 10101:2020+A1:2024 Chapter 61; ESB Networks Safety Rules; BS 7671",feynman:{analogy:"Think of energising new equipment like starting a newly rebuilt engine. You do not just turn the key and floor it. You check the oil, verify the coolant, crank it slowly, listen for abnormal sounds, and monitor the gauges before putting it under load. First energisation follows the same principle — controlled, monitored, and reversible at every step.",firstPrinciples:"New equipment may have manufacturing defects, transport damage, or installation errors that are invisible until power is applied. First energisation under controlled conditions (with monitoring) reveals these defects safely. Uncontrolled energisation (just switching it on) risks equipment damage, arc flash, or cascade failure. The energisation sequence converts a high-risk event into a series of low-risk, reversible steps.",theTest:"A contractor says the new switchboard is ready for energisation. What are the minimum pre-energisation checks per IS 10101? Answer: (1) Visual inspection for loose connections, foreign objects, and mechanical damage. (2) Insulation resistance (IR) test on all circuits. (3) Phase rotation verification. (4) Protection relay settings confirmed. (5) Earth continuity verified. Only after all checks pass does energisation proceed."}}],
    whatItLooksLike:"SAT is a methodical process on the live site. The CxA has a pre-prepared test sheet for each piece of equipment listing every test, the acceptance criteria, and space for the actual result. Testing typically starts early morning (06:00) on agreed days to minimise disruption. The area around the equipment being tested is cordoned off. Power quality meters are connected to the incoming supply. Thermal imaging cameras are on standby for the first energisation. The fall-back procedure is posted on the wall next to the equipment. The tenant representative has been notified. Everyone present knows the procedure, the expected results, and the abort criteria.",
    siteChecklist:["Pre-functional checks complete (insulation resistance, earth continuity, torque)","Energisation MOP approved by CxA and facility manager","Fall-back position documented and understood","BMS point-to-point schedule prepared","Thermal imaging arranged for first energisation","Tenant notification complete for test window"]
  },
  logic:{
    causeAndEffect:[{cause:"SAT performed without completing pre-functional checks — equipment energised with untested cable terminations",effect:"Loose busbar joint creates hot spot under load. Thermal runaway develops over weeks — undetected until the joint fails catastrophically, causing an arc flash event. Arc flash on a 3,200A busbar in an occupied data hall.",insight:"Pre-functional checks are not administrative overhead — they are the safety gate. IS 10101:2020+A1:2024 §6.4 requires initial verification (including insulation resistance and continuity) before any circuit is energised. Skipping this step does not save time — it transfers the risk from a controlled test to an uncontrolled failure."},{cause:"BMS point-to-point testing skipped due to schedule pressure — 'we'll verify interlocks during IST'",effect:"During IST, a cooling interlock with the fire system is found to be wired in reverse — fire alarm activates cooling instead of shutting it down. The interlock was installed correctly but the BMS I/O assignment was wrong. Discovering this during IST means the entire IST must be halted while the BMS is corrected and re-tested.",insight:"Point-to-point testing is the most tedious part of commissioning — 800 I/O points at Clonshaugh — and the most tempting to skip. But every interlock that is not tested at SAT becomes a potential cascade failure mode during IST. The cost of testing one point (15 minutes) is trivial compared to the cost of halting an IST programme (€5k–€10k per day in standby charges) (Tier 3 — BSRIA BG 6/2018 commissioning benchmarks, indicative)."},{cause:"New PDU energised without insulation resistance test — moisture in cable from overnight condensation",effect:"Phase-to-earth fault on energisation. Arc flash event at the PDU incomer. Circuit breaker trips but the operator is within the arc flash boundary. Potential for serious injury. The IR test would have detected the low insulation resistance before energisation.",insight:"The IR test takes 5 minutes per circuit. The arc flash event it prevents can cause life-changing injuries. Every excuse for skipping pre-energisation checks — schedule pressure, the equipment is new, the manufacturer tested it — is an excuse for accepting an avoidable risk."}],
    constraintLesson:"The constraint at SAT stage is the interface between new and existing systems. At Clonshaugh, the new UPS modules in Phase 1 must be connected to the existing LV switchboard — which is live and feeding 2,400 kW of IT load. The energisation procedure must isolate the new equipment from the live bus until all SAT checks are complete.\n\nThis creates a specific sequence requirement: the new UPS must pass all SAT tests on an isolated bus section before any connection to the live system. The connection itself — closing the bus coupler between the new UPS output and the existing distribution — is a separate, witnessed procedure with its own MOP and fall-back.\n\nThe fall-back for SAT is simpler than for IST or PVT: if a SAT fails, the new equipment is de-energised and isolated. The existing systems continue operating. No IT load is affected. The fail-safe is the physical isolation between new and old. This isolation must be maintained until SAT is fully complete.\n",
    weakestLink:{whatsWrong:"We can combine pre-functional checks and SAT into a single visit to save programme time.",whatsRight:"Pre-functional checks and SAT serve different purposes and must be sequential. Pre-functional checks verify installation quality (mechanical, electrical integrity). SAT verifies operational performance (does it work?). If pre-functional checks reveal a fault — and they do, on average 5–8% of terminations require re-torquing — you fix it before energisation. Combining them means discovering faults during powered testing, which is more dangerous, more expensive, and more disruptive.",howToGetThere:"Schedule pre-functional checks 1–2 weeks before planned energisation. Use a standardised checklist (IS 10101 Appendix 6). Record all results with serial numbers. Resolve all non-conformances before energisation. At Clonshaugh, allow 5 days per switchboard for pre-functional checks and 3 days for SAT — never compress them into a single 5-day window."}
  },
  rhetoric:{
    declan:"SAT is where I find out if the installation is actually any good. FAT told me the equipment works — SAT tells me the installation works. Different things. I've seen switchboards that passed FAT perfectly but had cable glands not tightened on site, earth bonds missed, and protection settings changed from the FAT values by the installer 'to make it fit.' Thermal imaging on first energisation is non-negotiable for me — I want to see every joint, every busbar connection, every cable termination under load within the first hour. If there's a hot spot, I want to know now, not in six months when the infrared scan is due.",
    ann:"The SAT phase at Clonshaugh represents approximately 40% of the total Cx programme time but only 25% of the cost. The effort is front-loaded — intensive work with relatively low risk because the new systems are isolated from live load. The business risk at SAT is schedule risk (a failed pre-functional check delays energisation) rather than operational risk (no IT load is affected). My concern is programme slippage: if Phase 1 SAT overruns by 3 weeks, it pushes Phase 2 back, which pushes the tenant migration schedule, which has contractual implications.",
    mark:"For the Clonshaugh UPS SAT, I'm testing against IEC 62040-3 in the installed environment: input current THD (must be <5% at rated load, per IS 10101 harmonic limits), output voltage regulation (±1% steady state), transfer time (mains-to-battery ≤4ms for Classification 1 per IEC 62040-3 Table 1), and efficiency at the expected operating load (75% — which is where we'll run them in N+1 configuration). I'm also measuring the neutral-earth voltage at the PDU output — anything over 1V indicates an earthing issue that must be resolved before IT equipment is connected.",
    sarah:"SAT documentation forms part of the building's environmental compliance file. Under the EPA IE Licence conditions for DCs over 5 MW (which Clonshaugh will reach post-retrofit), energy efficiency must be demonstrated through measured performance, not design calculations. The SAT test results for cooling equipment — COP at rated conditions, part-load performance, refrigerant charge verification — feed directly into the licence compliance evidence. F-Gas records from SAT (system charge, leak testing, commissioning certificates) must be retained for 5 years under EU F-Gas Regulation 517/2014.",
    tom:"SAT costs for Clonshaugh across all 4 phases: pre-functional checks €35k (5 days × 4 phases × 2-person crew + instruments), energisation and testing €45k (3 days × 4 phases × CxA + specialist commissioning engineer), BMS point-to-point €30k (800 points × 15 min × commissioning technician rate), thermal imaging and power quality monitoring €15k (equipment hire + specialist operator). Total SAT: approximately €125k — the largest single element of the €230k Cx budget. This is front-loaded: Phase 1 SAT is the most expensive (first-of-type, establishing procedures) while Phases 2–4 benefit from lessons learned. All cost figures indicative — RICS NRM1 fee benchmarks; BSRIA BG 6/2018, Irish DC market 2025."
  },
  
   rhetoricTakeaways:{
     declan:"Never energise without pre-functional checks complete. A loose busbar joint under load creates a hot spot that can cause arc flash — a life-safety risk.",
     ann:"The energisation sequence protects the investment. Energising in the wrong order can damage equipment worth hundreds of thousands of euro.",
     mark:"IS 10101:2020+A1:2024 §6.4 requires initial verification before energisation. This is not optional — it is a regulatory requirement.",
     sarah:"BMS point-to-point verification ensures every sensor and actuator is correctly wired. Incorrect BMS data leads to wrong control decisions and wasted energy.",
     tom:"Pre-functional checks and point-to-point: €30k–€50k. Arc flash incident: €500k+ in damage, delays, and liability. The prevention cost is 10% of the risk."
   },
   scenario:{title:"The First Energisation",narrative:"Clonshaugh Phase 1 UPS installation is complete. Pre-functional checks have passed — all terminations torque-verified, insulation resistance >100MΩ, earth continuity <0.1Ω. The CxA has approved the energisation MOP. The existing IT load (2,400 kW) is running on the original UPS system. The new UPS system is on an isolated bus section.",question:"Describe the correct energisation sequence and identify the three critical checkpoints where testing could reveal a fault.",answer:"Energisation sequence (Phase 1, UPS Module 1):\n1. Confirm isolation — new bus section disconnected from live bus (bus coupler OPEN, locked out)\n2. Energise incoming supply to new UPS — check input voltage (400V ±10%), frequency (50Hz ±1%), phase rotation\n3. CHECKPOINT 1: Input power quality — measure THD, check for neutral-earth voltage (must be <1V)\n4. Start UPS in maintenance bypass — verify output voltage and frequency without inverter\n5. Transfer to normal (inverter) mode — UPS takes control of output\n6. CHECKPOINT 2: Transfer test — switch from mains to battery and back. Measure transfer time (<4ms per IEC 62040-3 Classification 1). Check for output voltage disturbance.\n7. Apply test load (500 kVA resistive) — run for 2 hours minimum\n8. CHECKPOINT 3: Thermal imaging — scan all connections under load. Any joint >10°C above ambient = non-conformance. Check UPS internal temperatures against manufacturer limits.\n9. Reduce to no-load — 1-hour cool-down, final thermal scan\n10. Record all results, sign SAT certificate or issue NCR\n\nAt no point during this sequence is the live IT load affected — the new UPS is on an isolated bus section. The existing system continues operating independently.\n"},
  sourceNote:"IS 10101:2020+A1:2024 §6.4 — Tier 1. IEC 62040-3 Table 1 — Tier 1. BSRIA BG 6/2018 §4 — Tier 2. SAT costs from RICS NRM1 fee benchmarks — Tier 2. BMS point-to-point hours from BSRIA BG 6/2018 commissioning benchmarks — Tier 2.",
  clockQuote:"You know it works. Now prove it.",
  crossRefs:[{module:"DC-LEARN-001",level:"L3",topic:"LV switchboard — SAT verifies busbar rating, protection settings, form of separation"},{module:"DC-LEARN-009",level:"L3",topic:"BMS point-to-point — 800 I/O points tested during SAT"},{module:"DC-LEARN-001",level:"L4",topic:"UPS — SAT covers transfer time, efficiency, harmonic performance"}],
