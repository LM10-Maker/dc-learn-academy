function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

  useEffect(()=>{
    if(timerActive){
      startTimeRef.current=Date.now()-elapsed*1000;

    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;
  const filtered = ASSESSMENT_QUESTIONS.filter(q=>{ if(filterStage!=='all'&&q.stage!==filterStage) return false; if(filterLevel>0&&q.level!==filterLevel) return false; return true; });
  const allAnswered = score.total>=ASSESSMENT_QUESTIONS.length;
  useEffect(()=>{if(allAnswered&&timerActive){setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);}},[allAnswered]);
  const handleAnswer = (qi, oi) => { if(answers[qi]!==undefined) return; if(!timerActive)setTimerActive(true); setAnswers(prev=>({...prev,[qi]:oi})); setScore(prev=>({correct:prev.correct+(ASSESSMENT_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1})); };

  const handlePause = () => { setTimerActive(false); if(intervalRef.current)clearInterval(intervalRef.current); };
  const handleResume = () => { setTimerActive(true); };
  useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc007_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel}));}catch(e){}}
  },[answers,score,elapsed]);
  useEffect(()=>{
    try{const saved=safeStore.get('dc007_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);}}catch(e){}
  },[]);

  return (
    <div>

          27 questions across three Trivium stages — 9 per stage, one per chain level.
          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts?
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences?
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder?
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>

  const moduleComplete=complete===total;
  const fmtT=(s)=>{if(!s||s<1)return '0s';if(s<60)return s+'s';const m=Math.floor(s/60);const ss=s%60;return m+'m '+ss+'s';};
  const fmtTime=(s)=>{if(!s)return '00:00';const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const totalTime=tabTimes?Object.values(tabTimes).reduce((a,b)=>a+b,0):0;
  const tabLabels={chain:'Regulation',learn:'Learn',visual:'Visual Guide',challenges:'Field Challenges',assessment:'Assessment',progress:'Progress'};

                </div>
                <div className="progress-bar" style={{height:6}}><div className="fill fill-green" style={{width:w+'%',transition:'width 0.3s'}}></div></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}



// ErrorBoundary — BSG Layer 2
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return {hasError:true,error};}
  render(){
    if(this.state.hasError){
      return <div style={{maxWidth:700,margin:'60px auto',fontFamily:'system-ui',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2'}}>
        <h2 style={{color:'#dc2626',margin:'0 0 12px'}}>{"⚠️"} Runtime Error</h2>
        <p style={{color:'#374151',margin:'0 0 8px'}}><strong>DC-LEARN-007 v4.0.6</strong> encountered an error.</p>
        <div style={{background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,fontFamily:'monospace',fontSize:13,whiteSpace:'pre-wrap',margin:'12px 0'}}>
          {this.state.error&&this.state.error.toString()}
        </div>
        <p style={{color:'#6b7280',fontSize:13,margin:'8px 0 0'}}>Copy this error and send to LM.</p>
      </div>;
    }
    return this.props.children;
  }
}
