{cause:"CRREM pathways are updated periodically",effect:"A DC aligned in a previous version may be misaligned in the current one",insight:"Run CRREM annually, not once at acquisition. The Misalignment Year is a moving target."},
{cause:"PUE reduction and PPA both shift the Misalignment Year",effect:"Investment can be quantified: 'this €2M cooling upgrade (Tier 3 — RICS NRM1 cooling retrofit benchmark, indicative) moves Misalignment Year from 2028 to 2035'",insight:"CRREM provides financial language for efficiency investment."}
],constraintLesson:"CRREM is both a risk identification tool and a capital allocation tool.\nThe Misalignment Year tells you WHEN the asset becomes a problem.\nSensitivity analysis tells you WHAT to do and HOW MUCH it moves the problem.\nTogether: defensible investment case for retrofit — or clear signal to divest.",
weakestLink:{whatsWrong:"Good PUE — CRREM isn't a concern.",whatsRight:"PUE is one input. Grid carbon, REF, and floor area normalisation are equally important.",howToGetThere:"Run CRREM with actual metered data. Update annually. Include Misalignment Year in fund reporting. Use sensitivity for retrofit investment case."}},
rhetoric:{
declan:"Declan — CRREM tells you when your DC becomes a problem for climate-conscious investors. Good news for Irish DCs: the grid is getting cleaner at 0.2241 kgCO₂/kWh and falling as wind capacity grows. Bad news: PUE above 1.4 may already be past the Misalignment Year for Dublin DCs. Once misaligned, your asset carries a measurable climate risk premium that shows up in valuation. Check the CRREM pathway annually against your actual PUE and grid factor.",
ann:"Fund-level CRREM reporting is becoming standard for Article 8/9. The Misalignment Year needs metered data. An asset with an imminent date needs a documented improvement plan.",
mark:"CRREM inputs: energy use intensity (metered kWh/m²/yr), carbon intensity (Scope 1+2 market-based), location. SEAI 2026: 0.2241 kgCO₂/kWh. Use 'CRREM Misalignment Year' in all outputs.",
sarah:"A DC moving its Misalignment Year from 2026 to 2040 through retrofit has demonstrably extended institutional market life by 14 years. Quantifiable ESG impact.",
tom:"Tom — CRREM analysis: €5k–€15k standalone (Tier 2 — RICS NRM1 fee benchmarks, indicative), or included in a wider Carbon Valuation Assessment. The Misalignment Year directly affects three commercial decisions: acquisition pricing (risk discount on misaligned assets), CapEx planning (retrofit timing to re-align), and exit strategy (sell before or after retrofit). A 5-year-early Misalignment Year can shift asset value by 8–15% in institutional markets where CRREM is standard due diligence."},
scenario:{title:"Two DCs, Two CRREM Profiles",narrative:"Fund holds two Irish DCs. DC-A: 20 MW, PUE 1.5, no PPA. DC-B: 20 MW, PUE 1.2, 60% PPA. Both 10,000 m².",question:"Sketch CRREM profiles and identify which has the earlier Misalignment Year.",answer:"DC-A:\nTotal energy: 20,000 kW × 8,760 × 1.5 = 262,800 MWh/yr\nScope 2: 262,800 × 0.2241 = 58,893 tCO₂e\nCarbon intensity: 58,893 ÷ 10,000 = 5.89 kgCO₂/m²/yr\n\nDC-B:\nTotal energy: 20,000 × 8,760 × 1.2 = 210,240 MWh/yr\nEffective EF (40% grid): 0.40 × 0.2241 = 0.0896\nScope 2: 210,240 × 0.0896 = 18,837 tCO₂e\nCarbon intensity: 18,837 ÷ 10,000 = 1.88 kgCO₂/m²/yr\n\nDC-A has the earlier Misalignment Year.\nDC-B's is significantly later — potentially post-2040."},
sourceNote:"CRREM Foundation v2.01 (T2). Terminology update July 2025. SEAI 2026 grid EF 0.2241 kgCO₂/kWh (T1). Taxonomy PUE: Delegated Act 2021/2139 (T1). CRREM DC bands: LBE-derived PUE × GEF methodology (T3/4).",
  clockQuote:"She left the pages on the wall. She left them there.",
retrofitRelevance:"CRREM is the primary justification tool for DC retrofit investment. Misalignment Year extension achieved by each measure provides the quantifiable benefit.",
crossRefs:[{module:"DC-LEARN-006",level:"L8",topic:"CRREM for data centres — carbon intensity thresholds and Misalignment Year calculation"},{module:"DC-LEARN-010",level:"L3",topic:"CRREM & Misalignment Risk — portfolio-level CRREM strategy and investment implications"},{module:"DC-LEARN-004",level:"L1",topic:"PUE fundamentals — PUE reduction is the primary lever for shifting CRREM Misalignment Year"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw;
  const annualMWh = itMW*1000*pue*8760/1000;
  const co2 = annualMWh*0.2241; // tCO2 — SEAI 2026
  const itMWh = itMW*1000*8760/1000;
  const intensity = co2/itMWh*1000; // kgCO2/MWh_IT
  const pathway = 300; // kgCO2/MWh_IT — LBE-derived CRREM DC band (no official CRREM DC pathway in v2.01)
  return {needed:"<"+pathway,available:intensity.toFixed(0),unit:"kgCO₂/MWh",
    pass:intensity<pathway,detail:"Carbon intensity: "+intensity.toFixed(0)+" kgCO₂/MWh_IT vs CRREM pathway "+pathway};
}},

{id:"L8",level:8,name:"Carbon Tax",icon:"💰",available:true,
component:"Irish Carbon Tax Trajectory and DC Fuel Cost Impact",
userNeedStatement:"Understand the Irish carbon tax trajectory, how it applies to DC generator fuel, and cost impact over 5 years.",
plainEnglish:"Ireland has one of Europe's clearest carbon tax schedules. Going to €100/tonne by 2030. Every litre of diesel generators burn carries this tax. HVO reduces exposure because biogenic carbon is treated differently.",
grammar:{facts:[
{term:"Irish Carbon Tax",definition:"Tax on carbon content of fossil fuels, increasing annually per Finance Act schedule.",plain:"Every time you buy diesel, you pay a tax based on CO₂ released. Going up every year until 2030.",number:"€71/tCO₂ (Budget 2025, applicable from 1 May 2026 for home heating fuels) → €100/tCO₂ by 2030 (Finance Act target).",standard:"Finance Act 2020 (as amended); Budget 2025",feynman:{analogy:"Every litre of diesel comes with a surcharge based on the CO₂ it will release — like a pollution toll that gets more expensive each year until burning fossil fuel becomes uneconomic.",firstPrinciples:"Ireland levies carbon tax on fossil fuels at a rate per tonne of CO₂. The Finance Act sets a trajectory to €100/tCO₂ by 2030. The tax increases the marginal cost of diesel generation, making alternatives like HVO and battery storage progressively more attractive.",theTest:"What is the Irish carbon tax target for 2030? Answer: €100/tCO₂."}},
{term:"Carbon Tax on Diesel",definition:"Carbon tax component of diesel price = emission factor × tax rate.",plain:"Adds ~15–25 cent per litre by 2030. For DCs running generators, a meaningful operating cost.",number:"Diesel CO₂: 2.54 kgCO₂/L. At €100/tCO₂: 2.54 × 0.10 = €0.254/L additional.",standard:"SEAI Emission Factors 2024; Finance Act trajectory",feynman:{analogy:"Each litre of diesel carries a carbon penalty. At €100 per tonne, that adds roughly 25 cents per litre — meaningful when a large DC burns half a million litres a year for testing alone.",firstPrinciples:"Diesel produces 2.54 kgCO₂ per litre. At €100/tCO₂, the carbon tax adds 2.54 × €0.10 = €0.254 per litre. For DC generators consuming hundreds of thousands of litres annually, this becomes a significant operational cost that compounds with each annual rate increase.",theTest:"At €100/tCO₂, how much does carbon tax add per litre of diesel? Answer: Approximately €0.25/litre."}},
{term:"HVO Carbon Tax Treatment",definition:"HVO (EN 15940) is classified as biofuel. Biogenic carbon attracts zero or reduced carbon tax.",plain:"Diesel gets full carbon tax. HVO gets zero or reduced. Cost difference narrows as tax rises.",number:"Saving at €100/tCO₂: ~€0.254/L. HVO premium: ~€0.25/L. Near parity by 2030.",standard:"Finance Act biofuel treatment; SEAI biofuel guidance",feynman:{analogy:"Diesel gets a pollution surcharge; HVO does not. As the surcharge rises, the price gap between them shrinks — like a toll road that makes the free road look better every year.",firstPrinciples:"HVO attracts zero or reduced carbon tax because its lifecycle CO₂ is near zero. Fossil diesel carries full carbon tax. At €100/tCO₂, the carbon tax saving on HVO is approximately €0.254 per litre — roughly equal to HVO's price premium. By 2030, total cost of ownership converges.",theTest:"At what approximate carbon tax rate does HVO reach cost parity with fossil diesel? Answer: Around €100/tCO₂ (approximately 2030)."}},
{term:"DC Generator Carbon Tax Exposure",definition:"Annual carbon tax from generator test and emergency fuel consumption.",plain:"Data centres test backup generators every month, and that routine testing burns significant volumes of diesel — all of which attracts carbon tax. A large facility with 40 generators can consume over 500,000 litres per year just in testing, producing a carbon tax bill that grows with every Finance Act budget.",number:"40 generators × 3.5 MW × 4 hrs/month × 12 × 0.265 L/kWh = 529,920 L/yr. At €100/tCO₂: €134,600/yr.",standard:"Finance Act trajectory. Generator consumption: 0.265 L/kWh",feynman:{analogy:"Monthly generator testing sounds routine, but 40 generators running 4 hours each month adds up to half a million litres of diesel a year — and a carbon tax bill that grows every budget.",firstPrinciples:"Testing regime: 40 generators × 3.5 MW × 4 hours/month × 12 months × 0.265 L/kWh = ~529,920 litres/year. At €100/tCO₂: 529,920 × 2.54 kg ÷ 1000 × €100 = ~€134,600/year in carbon tax alone. This is a controllable cost — HVO, reduced test duration, or load bank consolidation all reduce it.",theTest:"A DC uses 500,000 litres of diesel per year for testing. At €100/tCO₂, what is the annual carbon tax? Answer: 500,000 × 2.54 × €0.10 ÷ 1000 = approximately €127,000."}}
,
{term:"Carbon Tax — Scope 1 Generator Exposure",definition:"Ireland's carbon tax applies to diesel fuel used in data centre generators. At €71/tCO₂ (Budget 2025) rising to €100/tCO₂ by 2030, the tax creates a direct financial incentive to minimise generator runtime and switch to HVO or alternative fuels.",plain:"Every litre of diesel your generators burn carries a carbon tax. At current rates, a 10 MW DC running 200 test hours per year on diesel pays approximately €25–35k in carbon tax. By 2030, that rises to €35–50k. Switching to HVO eliminates approximately 90% of this cost.",number:"€71/tCO₂: current rate (Budget 2025). €100/tCO₂: 2030 target (Finance Act). 2.54 kgCO₂/litre: diesel emission factor (SEAI 2024).",standard:"Finance Act 2020 (as amended) — Carbon Tax Schedule; SEAI Emission Factors 2024",feynman:{analogy:"Carbon tax on generator diesel is like a congestion charge on driving. You can still drive, but every trip costs more. The tax makes the alternative — HVO, BESS, or reduced testing — economically rational even without an ESG motivation.",firstPrinciples:"Carbon tax internalises the environmental cost of CO₂ emissions into fuel pricing. Each litre of diesel produces 2.54 kgCO₂ (SEAI 2024, T1). At €71/tCO₂ (Budget 2025, T1), that adds €0.18 per litre on top of the fuel price. For a data centre consuming 100,000 litres per year in testing and outages, the indicative tax is approximately €18k/yr — rising to €25k/yr by 2030 at €100/tCO₂ (Finance Act, T1). This progressively strengthens the business case for HVO (near-zero Scope 1) and BESS (eliminating short-duration generator starts).",theTest:"Clonshaugh DC uses 175,000 litres of diesel per year across testing and outages. What is the annual carbon tax at €71/tCO₂? Answer: 175,000 × 2.54 kgCO₂/L = 445 tCO₂. Tax: 445 × €71 = €31,595/yr. At €100/tCO₂ in 2030: €44,500/yr."}}],whatItLooksLike:"Carbon tax on fuel invoices. For DC operators: trackable via fuel consumption records. For finance: a rising cost line requiring Finance Act trajectory modelling.",
siteChecklist:["Model annual test fuel consumption with carbon tax trajectory to 2030","Confirm HVO tax treatment with advisor","Include carbon tax escalation in 10-year operating cost model","Assess HVO switch vs purchase premium at 2026, 2028, 2030","Track Finance Act changes annually","Include in SFDR cost-of-carbon disclosures if applicable"]},
logic:{causeAndEffect:[
{cause:"Carbon tax rising from €71 to €100/tCO₂ (2025–2030)",effect:"Annual generator fuel carbon tax increases ~41% at constant consumption",insight:"Semi-fixed operating cost that rises regardless of efficiency. Only reduce by burning less or switching to HVO."},
{cause:"HVO tax treatment reduces net fuel cost differential",effect:"Economic case for HVO strengthens every year",insight:"At €100/tCO₂ (2030), HVO tax saving (~€0.25/L) nearly offsets premium (~€0.25/L). Net cost approaches zero."},
{cause:"Generator test regime is legally required under EPA licence",effect:"Cannot reduce test frequency to save carbon tax",insight:"Only way to manage exposure is fuel type. HVO is the only switch available."}
],constraintLesson:"Carbon tax automatically increases every year without requiring any DC operational change.\nIt applies to every litre burned — test, emergency, and grid support.\nModelling it in operating cost projections is not optional for investor-grade business cases.",
weakestLink:{whatsWrong:"Carbon tax is small — we model diesel at a flat price.",whatsRight:"Carbon tax rises 41% between 2025 and 2030. On a 10-year DCF, that compounds significantly. Use the Finance Act trajectory.",howToGetThere:"Build fuel cost model: consumption × fuel base price × carbon tax trajectory. Three scenarios: diesel, HVO, transition."}},
rhetoric:{
declan:"Declan — every litre of diesel attracts carbon tax, going up every year to 2030. At current rate (€71/tCO₂ = €0.18/L), annual test fuel of 50,000 litres costs approximately €9,000 in carbon tax alone. By 2030 at €100/tCO₂ (€0.25/L), that rises to €12,700. Switching to HVO cuts this to near-zero because HVO lifecycle emissions are 80–90% lower. The tax saving alone may not justify the switch, but combined with Scope 1 reporting improvements, it becomes compelling.",
ann:"Ann — a 10-year DCF using flat diesel prices understates the carbon cost trajectory. €71→€100/tCO₂ is a 41% increase in carbon cost over 5 years. Lenders now routinely request carbon cost sensitivity in debt underwriting. A portfolio of 5 DCs consuming 500,000 litres/yr collectively faces €95k/yr today rising to €134k/yr by 2030 in carbon tax alone. Model this as a scheduled escalation with the Finance Act trajectory, not a flat assumption.",
mark:"Generator test fuel: 0.265 L/kWh. 60 MW fleet: 60,000 kW × 4 hrs/month × 12 × 0.265 = 763,200 L/yr. At €100/tCO₂: €193,853/yr. HVO: effectively zero.",
sarah:"Sarah — carbon tax savings from HVO transition can be reported as a financial benefit of sustainability investment in SFDR disclosures. This creates a direct link between ESG action and investor returns. For a 10 MW DC saving €32k/yr in carbon tax through HVO, the 10-year NPV at 8% discount rate is approximately €215k — a quantifiable PAI improvement that can be attributed to a specific management decision.",
tom:"Tom — use the Finance Act carbon tax trajectory (€71/tCO₂ 2025 → €100/tCO₂ 2030) as the most reliable projection for Irish operating cost modelling. Lenders increasingly request carbon cost scenarios in due diligence. A 10 MW DC consuming 175,000 litres/yr faces €32k/yr in carbon tax today, rising to €44k/yr by 2030. Over a 10-year hold, cumulative carbon tax on diesel is €320–445k. Model as scheduled escalation, not risk."},
scenario:{title:"The 10-Year Fuel Cost Model",narrative:"A financial model for a 40 MW DC uses flat diesel at €1.20/L for 10 years (2026–2035). CFO asks: is carbon tax correctly modelled?",question:"Is the model correct? What should the corrected approach show?",answer:"Model is INCORRECT. Flat price misses carbon tax escalation.\n\nCorrect approach: separate base fuel price from carbon tax component.\n\nCarbon tax:\nCurrent: €71/tCO₂ (Budget 2025) → €0.180/L\n2030 target: €100/tCO₂ (Finance Act) → €0.254/L\n\nFuel consumption: 40 generators × 2 MW × 4 hrs/month × 12 × 0.265 = 1,017,600 L/yr\n\nCurrent carbon tax: 1,017,600 × 2.54 × €71 / 1,000,000 = €183,500/yr\n2030 carbon tax: 1,017,600 × 2.54 × €100 / 1,000,000 = €258,500/yr\n10-year total (linear interpolation): ~€2.2M vs flat model assumption\nUnderstatement: material for lender-grade model.\n\nNote: Intermediate annual rates are set in each Finance Act budget. Model using current rate + 2030 target with linear interpolation, and update when each budget is published."},
sourceNote:"Finance Act 2020 as amended (T1). Diesel EF: SEAI 2024 2.54 kgCO₂/L (T1). HVO: Finance Act biofuel treatment (T1).",
  clockQuote:"The green lines crossed and converged. The wall wasn't a list. It was a map.",
retrofitRelevance:"Carbon tax modelling relevant to all generator-intensive DCs. HVO case strengthens annually.",
crossRefs:[{module:"DC-LEARN-005",level:"L3",topic:"HVO & alternative fuels — carbon tax trajectory makes HVO switching increasingly cost-neutral by 2028–2030"},{module:"DC-LEARN-005",level:"L6",topic:"Redundancy architectures — 2(N+1) generator fleets have highest fuel exposure to carbon tax escalation"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw;
  const annualMWh = itMW*1000*pue*8760/1000;
  const co2 = annualMWh*0.2241/1000; // ktCO2 — SEAI 2026
  const costCurrent = co2*1000*71; // €71/tCO2 Budget 2025 (Finance Act)
  const cost2030 = co2*1000*100; // €100/tCO2 2030 target
  return {needed:"€"+costCurrent.toFixed(0),available:"€"+cost2030.toFixed(0),unit:"€/yr",
    pass:true,detail:"Carbon tax: €"+(costCurrent/1000).toFixed(0)+"k (current) → €"+(cost2030/1000).toFixed(0)+"k (2030) at "+co2.toFixed(1)+" ktCO₂/yr"};
}},

{id:"L9",level:9,name:"Regulatory Horizon",icon:"🔭",available:true,
component:"The 2030 Regulatory Landscape — What's Coming and What It Means",
userNeedStatement:"Understand regulatory changes expected by 2030 that will materially affect Irish DC compliance, and what to do now.",
plainEnglish:"The regulatory environment in 2030 will be materially different. New F-Gas rules, updated EED, tighter Taxonomy thresholds, potentially formal Irish DC policy, and full EU energy reporting obligations.",
grammar:{facts:[
{term:"EU F-Gas Regulation 2024/573",definition:"Updated F-Gas Regulation replacing 517/2014. Accelerated HFC phase-down, new restrictions, expanded scope.",plain:"The EU updated F-Gas rules in 2024 — tighter, faster. DC operators need to check updated schedule.",number:"Phase-down to 15% by 2030 (accelerated milestones). New R-32 restrictions. FM-200 supply tightening.",standard:"EU Regulation 2024/573",feynman:{analogy:"The 2024 update is like the government tightening speed limits further and adding new vehicle categories to the restriction list. The direction was set in 2014; 2024 accelerates the timeline.",firstPrinciples:"Regulation 2024/573 replaces 517/2014 with faster HFC phase-down milestones, stricter service bans, and extended scope. For DCs, this means R-32 restrictions come sooner, FM-200 supply tightens faster, and leak detection requirements become more stringent. Equipment procurement decisions made today must account for the 2030 supply position.",theTest:"What regulation did EU 2024/573 replace? Answer: EU 517/2014 (the original F-Gas Regulation)."}},
{term:"EED Recast 2023/1791",definition:"Strengthened Article 26 obligations, extended scope, new monitoring requirements for large energy consumers.",plain:"The updated Energy Efficiency Directive strengthens waste heat assessment requirements and adds mandatory energy monitoring for data centres above 500 kW IT. The original EED suggested operators 'consider' waste heat; the recast says 'prove you considered it, report your energy data, and we will check.' SEAI is responsible for Irish transposition.",number:"In force. Member states transpose by October 2025. SEAI responsible for Irish transposition.",standard:"EU EED 2023/1791; SEAI transposition",feynman:{analogy:"The original EED said 'consider waste heat.' The recast says 'prove you considered it, report your energy data, and we will check.' The obligation moved from suggestion to enforcement.",firstPrinciples:"The EED Recast strengthens waste heat assessment requirements, adds mandatory energy monitoring for DCs above 500 kW, and requires member state transposition by October 2025. SEAI is the competent authority for Ireland. The recast turns Article 26 from a planning condition into an ongoing operational obligation.",theTest:"By when must EU member states transpose the EED Recast? Answer: October 2025."}},
{term:"EU Data Act (2025)",definition:"Data sharing obligations for connected products and services. Indirectly affects DCs as infrastructure providers.",plain:"Organisations must make IoT data accessible. DCs hosting this data need to understand tenants' obligations.",number:"In force from 12 September 2025.",standard:"EU Data Act 2023/2854",feynman:{analogy:"Like a rule that says the data from your smart meter belongs to you, not the electricity company. The Data Act makes IoT data accessible — and DCs hosting that data need to understand the implications.",firstPrinciples:"The EU Data Act (in force from 12 September 2025) establishes rules on IoT data access and sharing. Data centres hosting IoT data must understand switching obligations, interoperability requirements, and data portability. This is a contractual and operational consideration, not primarily an energy or carbon issue.",theTest:"When does the EU Data Act come into force? Answer: 12 September 2025."}},
{term:"Irish NPF DC Policy Review",definition:"Ongoing review of DC policy within National Planning Framework. May formalise spatial restrictions.",plain:"Government is deciding where DCs can be built. Answer may be 'not in Dublin' for large new facilities.",number:"DHLGH Policy Statement 2022 is current reference. NPF review underway. No formal moratorium as of March 2026.",standard:"DHLGH Policy Statement 2022; National Planning Framework (under review)",feynman:{analogy:"The government is redrawing the map of where data centres can be built in Ireland. The answer may be 'not in Dublin' for large facilities — and the review outcome is not yet known.",firstPrinciples:"The National Planning Framework review will determine long-term spatial policy for data centres. The 2022 DHLGH statement is an interim position. The review outcome could range from formal location restrictions to conditional approval frameworks tied to grid contribution. Planning applications submitted now face uncertainty about the policy that will apply at determination.",theTest:"Is the Irish NPF DC policy review complete as of March 2026? Answer: No — it is underway with no formal conclusion."}}
,
{term:"EU Data Centre Energy Efficiency Package — April 2026",definition:"The European Commission is preparing a Data Centre Energy Efficiency Package for adoption in April 2026, alongside the Strategic Roadmap for Digitalisation and AI. This may introduce mandatory minimum performance standards or a labelling scheme.",plain:"The EU is moving beyond voluntary reporting. The April 2026 package could set mandatory efficiency floors — a DC that currently just reports PUE may soon need to meet a minimum to continue operating or accessing green finance. This is the biggest upcoming regulatory shift for the sector.",number:"April 2026: expected adoption. PUE ≤ 1.3: likely floor based on Taxonomy precedent. 2030: political target for climate-neutral DCs.",standard:"European Commission — planned Data Centre Energy Efficiency Package (April 2026); COM/2022/552 Action Plan for Digitalisation of Energy Sector",feynman:{analogy:"The shift from reporting to mandatory standards is like the difference between a restaurant displaying a hygiene score and being shut down if it falls below the threshold. The EU is moving from transparency to enforcement for data centre energy efficiency.",firstPrinciples:"Reporting creates data. Data enables comparison. Comparison enables minimum standards. The EU data centre regulatory trajectory follows this logic: EED Article 12 (reporting), Delegated Regulation 2024/1364 (standardised KPIs), and now a potential mandatory performance floor. Each step tightens the regulatory grip on inefficient facilities.",theTest:"A legacy Irish colo runs at PUE 1.55. Under current rules it must report this to the EU database. If mandatory minimum standards are set at PUE 1.3, what changes? Answer: The colo must retrofit to improve PUE below 1.3 or face potential operational or financial restrictions. The regulatory obligation shifts from disclosure to compliance."}}],whatItLooksLike:"Regulatory horizon visible in: EirGrid planning documents, DHLGH updates, EU legislation tracker, EPA licence conditions, SEAI reports.",
siteChecklist:["Subscribe to EirGrid, SEAI, EPA, DHLGH regulatory updates","Review refrigerants against EU 2024/573 schedule","Confirm EED 2023/1791 transposition status with SEAI","Track NPF DC policy review outcomes","Assess EU Data Act obligations for tenants","Build regulatory horizon review into annual programme"]},
logic:{causeAndEffect:[
{cause:"Taxonomy REF rises from 50% to 75% in 2027 and 90% in 2030",effect:"50% PPA today fails in 2027. PPA strategy must be designed for 2030.",insight:"Contract for 90% now at lowest available price rather than topping up under pressure in 2027."},
{cause:"Irish NPF may formalise spatial restrictions",effect:"New GDA projects may face formal planning refusal — fundamentally changing market geography",insight:"The single biggest strategic risk to Irish DC market in the next 5 years. Existing GDA DCs are protected. New development at risk."},
{cause:"F-Gas 2024/573 accelerates HFC phase-down",effect:"Operators planning on 2014 schedule may need to accelerate",insight:"Check 2024 Regulation dates against site-specific refrigerants. 2014 timeline not reliable for planning."}
],constraintLesson:"Regulatory risk isn't just about current obligations — it's knowing what's coming.\n\nThree highest-risk items for Irish DCs 2025–2030:\n1. Irish NPF DC policy outcome (site selection risk)\n2. EU Taxonomy REF escalation (renewable energy programme risk)\n3. F-Gas 2024/573 acceleration (refrigerant transition timing)",
weakestLink:{whatsWrong:"We're compliant today — we'll deal with new regulations when they come into force.",whatsRight:"Refrigerant transitions, PPA contracting, and planning all take years. By the time an obligation comes into force, it's too late to respond without programme cost.",howToGetThere:"Annual regulatory horizon review: list regulations with 2025–2035 triggers. Assess compliance status and lead time. Prioritise by lead time × impact."}},
rhetoric:{
declan:"Declan — the regulatory horizon is accelerating. F-Gas Regulation changed in 2024 — a completely new regulation with tighter timelines. CRU published the DC connection policy December 2025. EU Data Centre Energy Efficiency Package lands April 2026. Each creates new compliance obligations on different timelines. Map all regulatory deadlines onto a single calendar and assign ownership for each. No single team member can track all of this alone.",
ann:"Taxonomy REF escalation is a contractual risk. 50% PPA today fails the 75% threshold in 2027. Structure for 90% from the start.",
mark:"EU F-Gas 2024/573: check transition dates for R-134a, R-32, R-410A, FM-200/HFC-227ea. Update transition plan against 2024 Regulation.",
sarah:"Sarah — the Taxonomy REF trajectory is the most impactful near-term ESG risk for Irish DC investments. The escalation from 50% to 75% to 90% renewable energy fraction is a published schedule — not a forecast. Every PPA negotiation should be structured against this trajectory. Failure to meet the threshold at any review point removes Taxonomy alignment, potentially triggering reclassification under SFDR and loss of Article 8/9 fund eligibility.",
tom:"Tom — quantify the regulatory horizon in every investment model: PPA uplift cost for 80% REF (€1–2M/yr for 20 MW DC, Tier 2 — CRU/BNEF indicative), refrigerant transition CapEx (€200–500k over 5 years, Tier 3 — EU F-Gas market pricing, indicative), carbon tax escalation (€350–450k over 10 years, Tier 1 — Finance Act trajectory, T1), EED reporting compliance (€30–60k/yr, Tier 2 — SEAI ESOS guidance, indicative), and potential mandatory efficiency standards from 2026. These are scheduled, published obligations — not risks. Any model excluding them underprices the asset."},
scenario:{title:"The 2027 PPA Gap",narrative:"Article 8 fund owns 30 MW DC with 50% PPA (10-year, signed 2025). ESG team flags REF rises to 75% in 2027.",question:"What is the exposure, options, and recommended action?",answer:"Exposure:\nAnnual consumption: 30,000 kW × 8,760 × PUE 1.3 = 341,640 MWh/yr\nCurrent PPA: 50% = 170,820 MWh\n2027 requirement: 75% = 256,230 MWh\nGap: 85,410 MWh/yr uncovered\n\nImpact: DC fails Taxonomy REF from Jan 2027. Fund must re-classify as non-aligned.\n\nOptions:\nA) Top-up PPA: 85,410 MWh × €70/MWh = ~€6.0M/yr additional. 6–12 months to sign.\nB) On-site solar: typically 5–10% of DC consumption. Can supplement but won't close 25% gap.\nC) Accept non-alignment and disclose.\n\nRecommendation: Option A — sign top-up PPA before Jan 2027. Negotiate now for best price."},
sourceNote:"EU F-Gas 2024/573 (T1). EED 2023/1791 (T1). EU Data Act 2023/2854 (T1). DHLGH Policy Statement 2022 (T1). NPF under review (T1).",
  clockQuote:"She nearly called Mark. Put the phone down.",
retrofitRelevance:"Regulatory horizon review is the foundation of a DC sustainability programme. All three major risks require 3–5 year lead times.",
crossRefs:[{module:"DC-LEARN-010",level:"L9",topic:"Net Zero roadmap — regulatory compliance milestones integrated into 10-year sustainability programme"},{module:"DC-LEARN-003",level:"L9",topic:"Topology design for retrofit — regulatory timeline drives the sequencing of infrastructure upgrades"}],

const PERSONAS = {declan:"Declan (Ops Manager)",ann:"Ann (Fund Manager)",mark:"Mark (MEP Engineer)",sarah:"Sarah (ESG Analyst)",tom:"Tom (QS / Cost Manager)"};
const PERSONA_KEYS = ["declan","ann","mark","sarah","tom"];

const ASSESSMENT_QUESTIONS = [
{level:1,id:"Q007-01",icon:"♨️",stage:"grammar",q:"What is the EED Article 26 threshold for total rated energy input that triggers a waste heat feasibility assessment in Ireland?",options:["5 MW","2 MW","1 MW","500 kW"],correct:2,explain:"EED Article 26 (EU 2023/1791) applies to data centres with total rated energy input exceeding 1 MW. The assessment must be conducted and SEAI notified before commissioning. Source: EU EED 2023/1791 Article 26."},
{level:1,id:"Q007-02",icon:"♨️",stage:"logic",q:"An Article 26 assessment concludes 'not feasible.' Is the SEAI notification still required?",options:["No — not feasible means the obligation ends","Yes — the notification to SEAI is required regardless of the assessment outcome","Only if planning required it","Only for DCs above 10 MW IT"],correct:1,explain:"The obligation to ASSESS and NOTIFY applies regardless of feasibility outcome. 'Not feasible' must be documented and notified to SEAI. Silence is not compliance. Source: EU EED 2023/1791 Article 26; SEAI transposition guidance."},
{level:1,id:"Q007-03",icon:"♨️",stage:"rhetoric",q:"A developer says: 'There's no district heating network nearby so Article 26 doesn't apply.' How do you respond?",options:["Correct — no network means no obligation","Article 26 applies based on total rated energy input (>1 MW), not on the availability of a district heating network. The assessment and SEAI notification are required regardless.","Correct if the site is outside Dublin","Article 26 only applies in the Greater Dublin Area"],correct:1,explain:"The obligation is based on total rated energy input >1 MW — not on proximity to district heating. The assessment must be conducted. If no viable recovery route exists, document it and notify SEAI. Source: EU EED 2023/1791."},
{level:2,id:"Q007-04",icon:"🏭",stage:"grammar",q:"What is the EPA IE Licence thermal input threshold for data centre generators?",options:["10 MW thermal","25 MW thermal","100 MW thermal","50 MW thermal"],correct:3,explain:"IE Licence is required for installations with thermal input >50 MW. For DC generators: thermal input = electrical output ÷ 0.40 (EPA guidance — diesel efficiency). Source: IE Directive 2010/75/EU; EPA DC Licensing Guidance 2024."},
{level:2,id:"Q007-05",icon:"🏭",stage:"logic",q:"A DC has 30 generators at 3 MW electrical each. Does it require an EPA IE Licence?",options:["No — it's under 50 MW thermal","Only if generators are connected to the grid","Yes — 30 × 3 MW ÷ 0.40 = 225 MW thermal — well above the 50 MW threshold","Only if generators run more than 500 hours per year"],correct:2,explain:"30 × 3 MW = 90 MW electrical. 90 MW ÷ 0.40 = 225 MW thermal. IE Licence threshold: 50 MW thermal. IE Licence required. Note: threshold based on installed capacity, not operating hours. Source: EPA Guidance for Licensing of Data Centres 2024."},
{level:2,id:"Q007-06",icon:"🏭",stage:"rhetoric",q:"A project manager says: 'We'll apply for the EPA licence after planning permission is granted.' What is the correct response?",options:["The EPA IE Licence takes 12–18 months. Running it after planning adds 12–18 months to the programme. Both must run in parallel from project inception.","Correct — planning permission must come first","EPA licence is not required until commissioning","Correct if planning takes less than 6 months"],correct:0,explain:"Both EPA IE Licence and planning permission take 12–18 months. Running them in series doubles the regulatory programme time. They must be submitted in parallel. Source: EPA process guidance; standard DC development programme."},
{level:3,id:"Q007-07",icon:"🌿",stage:"grammar",q:"What is the EU Taxonomy PUE threshold for new data centres commissioned from 2025?",options:["PUE ≤1.3","PUE ≤1.2","PUE ≤1.4","PUE ≤1.5"],correct:0,explain:"EU Taxonomy (Delegated Act 2021/2139 Annex I Section 8.1): new DCs commissioned from 1 January 2025 must achieve PUE ≤1.3 to meet the Taxonomy criteria for climate change mitigation."},
{level:3,id:"Q007-08",icon:"🌿",stage:"logic",q:"A DC has PUE 1.28 but no Corporate PPA (Irish grid REF ~42%). Is it EU Taxonomy-aligned?",options:["Yes — PUE ≤1.3 is the only criterion","No — REF ≥50% is also required. At 42% grid REF without PPA, the DC fails the Taxonomy REF criterion.","Yes — Irish grid is already nearly 50% renewable","Depends on the DNSH checks"],correct:1,explain:"EU Taxonomy requires BOTH PUE ≤1.3 AND REF ≥50% (from 2025), plus DNSH checks. The Irish grid REF of ~42% (2026) does not reach the 50% threshold without a Corporate PPA. PUE compliance alone is insufficient."},
{level:3,id:"Q007-09",icon:"🌿",stage:"rhetoric",q:"An investor claims their DC is EU Taxonomy-aligned because it achieves PUE 1.3. What is missing from their analysis?",options:["Nothing — PUE 1.3 is the complete Taxonomy requirement","Only the DNSH water check is missing","PUE is one of four criteria. REF ≥50%, DNSH checks (waste heat, F-Gas, water), and minimum social safeguards must also be confirmed.","Taxonomy alignment requires PUE <1.0"],correct:2,explain:"EU Taxonomy alignment for DCs requires: PUE ≤1.3, REF ≥50% (and rising), DNSH to five environmental objectives, and minimum social safeguards. PUE alone is not sufficient. Source: Delegated Act 2021/2139 Annex I Section 8.1."},
{level:4,id:"Q007-10",icon:"📊",stage:"grammar",q:"What SFDR article classification requires all investments to qualify as 'sustainable investments'?",options:["Article 6","Article 7","Article 8","Article 9"],correct:3,explain:"SFDR Article 9 products have sustainable investment as their objective. ALL investments must be 'sustainable' per SFDR Article 2(17). Article 8 promotes ESG characteristics but does not require 100% sustainable investments. Source: SFDR 2019/2088."},
{level:4,id:"Q007-11",icon:"📊",stage:"logic",q:"An Article 9 fund acquires a DC that has not achieved EU Taxonomy alignment. What must happen?",options:["The fund can hold the asset without action","The fund reclassifies to Article 8 or commits to a time-bound plan to achieve alignment","The asset automatically becomes aligned on acquisition","Taxonomy alignment is not required for Article 9 funds"],correct:1,explain:"Article 9 funds require all investments to be 'sustainable' under SFDR Article 2(17), which requires Taxonomy alignment for environmental objectives. A non-aligned DC either requires a remediation plan with a clear timeline or the fund must reclassify. Source: SFDR 2019/2088; ESMA Q&A on SFDR."},
{level:4,id:"Q007-12",icon:"📊",stage:"rhetoric",q:"A DC operator says: 'SFDR is a fund manager's problem — it doesn't affect DC operations.' How do you respond?",options:["Correct — SFDR only affects fund managers","Correct for Article 8 funds only","SFDR indirectly determines which institutional investors can acquire DC assets. Non-Taxonomy-aligned DCs are progressively excluded from Article 8/9 fund portfolios — affecting asset liquidity and pricing.","SFDR only applies to funds based in Luxembourg"],correct:2,explain:"SFDR is a fund-level disclosure requirement but it drives acquisition criteria for institutional capital. Article 8/9 funds — which manage most institutional real estate capital — require Taxonomy-aligned assets. Non-aligned DCs face a shrinking institutional buyer universe."},
{level:5,id:"Q007-13",icon:"❄️",stage:"grammar",q:"What is the GWP of FM-200 (HFC-227ea) fire suppression agent?",options:["GWP 3,220","GWP 675","GWP 1,430","GWP 1"],correct:0,explain:"FM-200 (HFC-227ea) has a Global Warming Potential of 3,220 — one of the highest-GWP F-gases used in DCs. Compare to Novec 1230: GWP=1. Compare to R-134a (cooling): GWP=1,430. Source: IPCC Fifth Assessment Report; EU F-Gas Regulation 517/2014."},
{level:5,id:"Q007-14",icon:"❄️",stage:"logic",q:"A DC facility manager says: 'We comply with F-Gas — we have the refrigerant log for our chillers.' What is the gap?",options:["No gap — chiller refrigerant log covers F-Gas compliance","F-Gas does not apply to fire suppression systems","The fire suppression system uses FM-200 — also an F-gas requiring an annual refrigerant log, leak detection, and F-Gas certified service engineer. The suppression system is the most commonly missed F-Gas obligation.","FM-200 is exempt from F-Gas regulation"],correct:2,explain:"EU F-Gas Regulation applies to ALL F-gas-containing systems, including fire suppression. FM-200 (HFC-227ea) is an F-gas. Annual refrigerant log, leak detection (mandatory >10 tCO₂e), and certified engineer are all required. Source: EU 517/2014; EU 2024/573."},
{level:5,id:"Q007-15",icon:"❄️",stage:"rhetoric",q:"Why does the financial case for switching from FM-200 to Novec 1230 improve over time?",options:["Novec 1230 prices are decreasing","FM-200 is being banned in 2027","Novec 1230 provides better fire protection","FM-200 supply is being restricted under F-Gas phase-down, increasing FM-200 service costs. Simultaneously, carbon reporting obligations make FM-200 discharge events more expensive to disclose. The net cost differential narrows annually."],correct:3,explain:"FM-200 supply restriction under F-Gas phase-down increases service and refill costs annually. Each FM-200 discharge (accidental or system test) releases 3,220 tCO₂e per tonne of agent — a growing PAI reporting liability. Novec 1230 GWP=1 eliminates both risks."},
{level:6,id:"Q007-16",icon:"🏗️",stage:"grammar",q:"What is the Strategic Infrastructure Development (SID) route for DC planning applications in Ireland?",options:["Applications go to the local county council","Applications go directly to An Coimisiún Pleanála, bypassing the local authority","Applications go to the EU Commission","Applications go to An Coimisiún Pleanála only if refused by the local authority"],correct:1,explain:"SID applications for qualifying large infrastructure projects (including large DCs) go directly to An Coimisiún Pleanála — bypassing the local authority. This is typically faster in principle but involves higher scrutiny. Source: Planning and Development Act 2000."},
{level:6,id:"Q007-17",icon:"🏗️",stage:"logic",q:"A DC planning application for a 50 MW IT facility in South Dublin does not reference the DHLGH DC Policy Statement 2022 or the TCP connection application. What is likely to happen?",options:["An Coimisiún Pleanála is likely to issue a Request for Further Information on both items. The Policy Statement is a material consideration. Absence of grid connection evidence is a programme risk that ABP will flag.","Planning will be granted — policy statements are not legally binding","Planning will be refused automatically","Planning authorities do not consider grid capacity"],correct:0,explain:"DHLGH Policy Statement is a material planning consideration that ABP must take into account. ABP routinely requests evidence of grid connection application status for large DCs. An incomplete application on these points will receive an RFI, adding months to the programme."},
{level:6,id:"Q007-18",icon:"🏗️",stage:"rhetoric",q:"What is the most important single action a DC developer can take to strengthen a GDA planning application under current Irish planning policy?",options:["Submit as many drawings as possible","Delay application until policy review is complete","Proactively address the DHLGH DC Policy Statement 2022: demonstrate EED Article 26 waste heat assessment, grid flexibility capability, renewable PPA, and positive community contribution — before ABP asks.","Reduce the scale of the development"],correct:2,explain:"The DHLGH Policy Statement requires DCs to demonstrate positive grid contribution. Pre-emptively providing this evidence — waste heat assessment, flexibility, PPA, community benefit — reduces the risk of an RFI and third-party objection."},
{level:7,id:"Q007-19",icon:"📉",stage:"grammar",q:"What is the correct CRREM terminology for the year a building's emissions exceed the Paris-aligned pathway?",options:["Stranding Year","Carbon Crossing Year","Climate Risk Year","CRREM Misalignment Year"],correct:3,explain:"CRREM Foundation updated terminology in July 2025. The correct term is 'CRREM Misalignment Year' — the year a specific asset's carbon intensity first exceeds the CRREM pathway. 'Stranding Year' is no longer the correct CRREM term. Source: CRREM Foundation July 2025 update."},
{level:7,id:"Q007-20",icon:"📉",stage:"logic",q:"An Irish DC has PUE 1.1 and a 70% Corporate PPA from new Irish wind. How does Irish grid decarbonisation affect its CRREM Misalignment Year?",options:["Grid decarbonisation reduces the market-based emission factor of the remaining 30% grid electricity, further reducing the DC's carbon intensity and extending the Misalignment Year beyond what PUE and PPA alone would achieve.","Grid decarbonisation has no effect — only on-site efficiency matters","Grid decarbonisation worsens CRREM position","CRREM only considers Scope 1 emissions"],correct:0,explain:"CRREM uses Scope 2 market-based emissions. The 30% of consumption not covered by PPA uses the grid emission factor — which is declining. Irish grid decarbonisation from 0.2241 (2026) toward ~0.10 (2030) reduces the residual Scope 2 factor, extending the Misalignment Year. Source: CRREM Foundation v2.01; SEAI trajectory."},
{level:7,id:"Q007-21",icon:"📉",stage:"rhetoric",q:"An asset manager asks why they should invest in a PUE improvement programme. How do you frame the answer in CRREM terms?",options:["PUE improvement is purely an operating cost benefit","PUE improvement doesn't affect CRREM calculations","CRREM doesn't consider PUE","PUE improvement reduces energy intensity, which reduces carbon intensity, which moves the CRREM Misalignment Year further into the future — extending the asset's institutional market life by a quantifiable number of years and supporting the retrofit investment case."],correct:3,explain:"CRREM provides a financial language for retrofit investment. The Misalignment Year extension from a PUE improvement is a quantifiable metric: 'this €2M cooling upgrade moves our Misalignment Year from 2027 to 2038.' This is more persuasive than energy cost savings alone for institutional investors."},
{level:8,id:"Q007-22",icon:"💰",stage:"grammar",q:"What is the Irish carbon tax rate per tonne of CO₂ from the Finance Act trajectory for 2030?",options:["€71/tCO₂","€100/tCO₂","€87.50/tCO₂","€75/tCO₂"],correct:1,explain:"The Finance Act targets €100/tCO₂ by 2030. The current rate is €71/tCO₂ (Budget 2025). Intermediate annual rates are set in each Finance Act budget. Source: Finance Act 2020 (as amended); Budget 2025."},
{level:8,id:"Q007-23",icon:"💰",stage:"logic",q:"Why does the financial case for HVO strengthen as carbon tax rises?",options:["HVO becomes cheaper as demand increases","Carbon tax applies to diesel but biogenic HVO attracts zero or reduced carbon tax. As the tax rises to €100/tCO₂, the carbon tax saving from HVO (approximately €0.254/litre at 2030 rate) nearly offsets the HVO purchase premium (20–25%), effectively reducing the net cost of HVO to near parity.","Carbon tax does not apply to generator fuel","HVO generates tax credits"],correct:1,explain:"Diesel: carbon tax = 2.54 kgCO₂/litre (SEAI 2024, T1) × €100/tCO₂ (Finance Act, T1) = €0.254/litre. HVO: biogenic carbon = zero or near-zero carbon tax. HVO purchase premium: approximately €0.20–0.30/litre (Tier 3 — EU F-Gas/HVO market, indicative). At 2030 carbon tax rate, the tax saving nearly closes the HVO premium gap."},
{level:8,id:"Q007-24",icon:"💰",stage:"rhetoric",q:"A CFO presents a 10-year DC operating cost model using a flat diesel price of €1.30/litre. What is the key error?",options:["€1.30/litre is too high","Flat fuel pricing is acceptable for 10-year models","The error is in the generator consumption rate","The model uses a flat price that doesn't capture the Finance Act carbon tax escalation. The carbon tax component of diesel cost rises from ~€0.180/litre (current at €71/tCO₂) to ~€0.254/litre (2030 at €100/tCO₂) — a 41% increase — and must be modelled using the published Finance Act trajectory."],correct:3,explain:"Carbon tax is a known, published, escalating cost component of diesel. Modelling it as flat understates future fuel costs. Current rate: €71/tCO₂ (Budget 2025). 2030 target: €100/tCO₂ (Finance Act). Source: Finance Act 2020 as amended; Budget 2025."},
{level:9,id:"Q007-25",icon:"🔭",stage:"grammar",q:"The EU Taxonomy REF threshold for data centres in 2027 is:",options:["75%","50%","80%","90%"],correct:0,explain:"EU Taxonomy REF thresholds (Delegated Act 2021/2139): ≥50% by 2025, ≥75% by 2027, ≥90% by 2030. A PPA covering 50% of consumption today will fail the Taxonomy REF criterion in 2027 without supplementation. Source: EU Delegated Act 2021/2139 Annex I Section 8.1(a)(ii)."},
{level:9,id:"Q007-26",icon:"🔭",stage:"logic",q:"A DC has a 10-year PPA covering 50% of annual electricity consumption, signed in 2025. What happens to its EU Taxonomy alignment in 2027?",options:["REF threshold rises to 75% in 2027. At 50% PPA coverage, the DC fails the Taxonomy REF criterion from January 2027 and cannot be reported as Taxonomy-aligned until additional PPA or on-site generation closes the gap.","It remains aligned — the PPA was signed in compliance year","PPA coverage does not affect Taxonomy alignment","Taxonomy REF thresholds don't apply to existing DCs"],correct:0,explain:"Taxonomy REF thresholds are annual requirements, not locked at point of compliance. The 75% threshold from 2027 applies to all DCs seeking Taxonomy alignment from that year. A 50% PPA is insufficient from 2027. The PPA strategy must be designed for the 2030 trajectory, not today's threshold."},
{level:9,id:"Q007-27",icon:"🔭",stage:"rhetoric",q:"An investor asks: 'We're compliant today — is there anything we need to do about future regulations?' How do you respond?",options:["Correct — compliance today means compliance in future","Only Taxonomy requires future planning","Regulatory compliance is not static. Three high-priority horizon items for Irish DCs: Taxonomy REF escalation (50%→75%→90%), F-Gas phase-down acceleration (EU 2024/573), and Irish NPF DC policy outcome. All require actions over 3–5 year horizons that cannot be deferred to the compliance date.","Irish regulations rarely change significantly"],correct:2,explain:"Today's compliance is a starting point. F-Gas transitions, PPA expansion, and planning position all have lead times measured in years. Waiting until an obligation comes into force before acting guarantees programme cost and compliance risk."}
];

const GLOSSARY_007 = [
  {term:"EED (Energy Efficiency Directive)",def:"EU Directive 2023/1791 — recast requiring DC operators above 500 kW to report energy, waste heat, and sustainability indicators to the European Database."},
  {term:"EU Taxonomy Regulation",def:"Classification system (EU 2020/852) defining environmentally sustainable economic activities. Data centres must meet PUE ≤1.3, use climate projections, and satisfy DNSH criteria."},
  {term:"SFDR",def:"Sustainable Finance Disclosure Regulation (EU 2019/2088) — requires financial market participants to disclose sustainability risks and impacts. Articles 6/8/9 classify fund-level ESG commitments."},

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 002 v5.0.4 template
function AssistBar({fact, level, stage}) {
  const [clarifyStep, setClarifyStep] = useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if (stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function GrammarPanel({level, onComplete, done}) {
  const [expandedFact, setExpandedFact] = useState(null);
  const [checkedItems, setCheckedItems] = useState({});
  const toggleFact = (i) => { if(!hasTextSelection()) setExpandedFact(expandedFact===i?null:i); };
  const toggleCheck = (i) => setCheckedItems(prev=>({...prev,[i]:!prev[i]}));
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--grammar)',fontSize:16,fontWeight:600,marginBottom:12}}>📖 Grammar — What Is It?</h3>
      {level.grammar.facts.map((f,i)=>(
        <div key={i} className="fact-card" role="button" tabIndex={0} aria-expanded={expandedFact===i}
          onClick={()=>toggleFact(i)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleFact(i)}>
          <div className="term">{f.term}</div>
          {expandedFact===i && (
            <div className="fade-in selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} style={{userSelect:'text',cursor:'text'}}>
              <div className="def">{f.definition}</div>
              <div className="detail">{f.plain}</div>
              <div className="detail" style={{fontStyle:'normal'}}>📊 {f.number}</div>
              <div className="std">{f.standard}</div>
              {f.soWhat && <div style={{fontStyle:'italic',color:'var(--grammar)',fontSize:13,marginTop:8,lineHeight:1.6}}>{f.soWhat}</div>}
              <AssistBar fact={f} stage="grammar" level={level} />
            </div>
          )}
        </div>
      ))}
      {level.grammar.whatItLooksLike && (
        <div className="card selectable-text" style={{marginTop:14}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>What It Looks Like on Site</h4>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{level.grammar.whatItLooksLike}</div>

      )}
      {level.grammar.siteChecklist && (
        <div style={{marginTop:14}}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>Site Checklist</h4>
          {level.grammar.siteChecklist.map((item,i)=>(
            <label key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6,fontSize:13,color:'var(--text)',cursor:'pointer'}}>
              <input type="checkbox" checked={!!checkedItems[i]} onChange={()=>toggleCheck(i)} style={{marginTop:3}}/>
              <span>{item}</span>
            </label>
          ))}
        </div>
      )}
      <button className={'completion-btn btn-grammar'+(done?' done':'')} onClick={onComplete}>
        {done ? '✓ Key facts memorised' : "I've memorised the key facts"}
      </button>
      {level.sourceNote && (
        <div style={{marginTop:14,fontSize:12,color:'var(--text-dim)',lineHeight:1.8,borderLeft:'3px solid var(--grammar)',paddingLeft:12}}>
          {level.sourceNote}

      )}
      <div style={{marginTop:14,background:'var(--panel)',border:'1px solid var(--grammar)',borderRadius:10,padding:'12px 14px'}}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--grammar)',marginBottom:6}}>💡 Feynman Clarify</h4>
        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>Expand any Grammar fact and click <strong>💡 Clarify</strong> to cycle through three learning rounds: an everyday analogy, a first-principles explanation, and a self-test question. Each round uses original content — not a repetition of the visible definition.</div>

// ═══════════════════════════════════════════════════════════════
function RhetoricPanel({level, onComplete, done}) {
  const [activePersona, setActivePersona] = useState('declan');
  const PERSONA_ROLE = {declan:'ops',ann:'fund',mark:'eng',sarah:'esg',tom:'cost'};
  const pData = level.rhetoric[activePersona];
  const pText = typeof pData === 'object' ? pData.text : pData;
  const rtEntry = RHETORIC_TAKEAWAYS.find(r => r.level === level.level);
  const pTakeaway = typeof pData === 'object' ? pData.takeaway : (rtEntry ? rtEntry.messages[PERSONA_ROLE[activePersona]] : null);
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--rhetoric)',fontSize:16,fontWeight:600,marginBottom:12}}>💬 Rhetoric — How Do I Explain It?</h3>
      <div className="persona-row">
        {PERSONA_KEYS.map(k=>(<button key={k} className={'persona-btn'+(activePersona===k?' active':'')} aria-label={PERSONAS[k]} onClick={()=>setActivePersona(k)}>{PERSONAS[k]}</button>))}
      </div>
      <div className="persona-msg selectable-text" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        {pText}
        {pTakeaway && <div style={{fontStyle:'italic',color:'var(--rhetoric)',marginTop:10,fontSize:13,lineHeight:1.6}}>{pTakeaway}</div>}
      </div>
      <button className={'completion-btn btn-rhetoric'+(done?' done':'')} onClick={onComplete} style={{marginTop:16}}>
        {done ? '✓ Can explain to stakeholders' : 'I can explain it to each stakeholder'}
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ChainTab — canonical Section 4 (module-specific content)
// ═══════════════════════════════════════════════════════════════
function ChainTab({setActiveTab, setSelectedLevel, progress}) {
  const [activeChainLevel, setActiveChainLevel] = useState(-1);
  const [calcKW, setCalcKW] = useState("");
  const [calcRacks, setCalcRacks] = useState("");
  const [calcPUE, setCalcPUE] = useState("");
  const [calcResult, setCalcResult] = useState(null);

  const runCascade = () => {
    const kw = parseFloat(calcKW);
    const racks = parseInt(calcRacks);
    const pue = parseFloat(calcPUE);
    if(isNaN(kw)||isNaN(racks)||isNaN(pue)){return;}
    setCalcResult(LEVELS.map(l => l.cascadeCheck(kw, racks, pue)));
  };

  return (
    <div className="fade-in">
      <div style={{borderRadius:12,overflow:'hidden',marginBottom:20,position:'relative',backgroundImage:'url('+HERO_IMG+')',backgroundSize:'cover',backgroundPosition:'center 75%',height:260}}>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,rgba(13,17,23,0.15) 0%,rgba(13,17,23,0.65) 55%,rgba(13,17,23,0.97) 100%)'}}></div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'20px 28px'}}>
          <h2 style={{fontSize:22,fontWeight:700,color:'#fff',marginBottom:6,textShadow:'0 2px 8px rgba(0,0,0,0.6)'}}>Regulatory Landscape — Clonshaugh DC</h2>
          <p style={{fontSize:13,color:'rgba(255,255,255,0.82)',margin:'0 0 3px',textShadow:'0 1px 4px rgba(0,0,0,0.5)'}}>Fictional reference facility — nine regulatory domains, five frameworks, five regulators, five sets of deadlines.</p>
          <p style={{fontSize:12,color:'rgba(255,255,255,0.60)',margin:0,textShadow:'0 1px 4px rgba(0,0,0,0.5)'}}>Each level covers a regulation, directive, or policy. The cascade calculator checks all thresholds against your facility simultaneously.</p>
        </div>
      </div>
      <div className="chain-layout">
        <div>
          {LEVELS.map((lvl,i)=>{
            const p = progress[lvl.id];
            const done = p && [p.grammar,p.logic,p.rhetoric].every(Boolean);
            const cr = calcResult ? calcResult[i] : null;
            const isActive = activeChainLevel === i;
            return (
              <div key={lvl.id} className={'chain-item'+(cr?(cr.pass?' pass':' fail'):'')+(isActive?' active':'')}
                onClick={()=>{if(!hasTextSelection()) setActiveChainLevel(isActive?-1:i);}}>
                <span style={{fontSize:"1.5rem",width:36,textAlign:"center",flexShrink:0}}>{lvl.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontWeight:600,fontSize:"0.88rem",color:"var(--text-bright)"}}>{lvl.name}</span>
                    <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>L{lvl.level}</span>
                    <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
                      <Dot done={p&&p.grammar} stage="grammar"/>
                      <Dot done={p&&p.logic} stage="logic"/>
                      <Dot done={p&&p.rhetoric} stage="rhetoric"/>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:"var(--text-dim)",marginTop:2}}>{lvl.component}</div>
                  {cr && (
                    <div style={{marginTop:6,fontSize:12}}><span className={cr.pass?'badge badge-pass':'badge badge-fail'}>{cr.pass?'PASS':'FAIL'}</span><span style={{color:'var(--text-dim)',marginLeft:8}}>{cr.detail}</span></div>
                  )}
                  {isActive && (
                    <div style={{borderTop:"1px solid var(--border)",marginTop:10,paddingTop:10}} onClick={e=>e.stopPropagation()}>
                      <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,marginBottom:8}}>{lvl.plainEnglish}</p>
                      <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',marginBottom:8}}>User Need: {lvl.userNeedStatement}</p>
                      <button onClick={(e)=>{e.stopPropagation();setSelectedLevel(i);setActiveTab("learn");}} style={{padding:"6px 14px",borderRadius:6,border:"1px solid var(--green)",background:"var(--green-dim)",color:"var(--green)",fontSize:"0.78rem",cursor:"pointer",fontWeight:600}}>
                        Open in Learn tab {"→"}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div>
          <div className="sidebar-card">
            <h3 style={{fontSize:14,fontWeight:600,color:"var(--text-bright)",marginBottom:8}}>{"🔢"} Cascade Calculator</h3>
            <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:10}}>Enter facility parameters to check against all regulatory thresholds.</div>
            <label style={{fontSize:12,color:"var(--text-dim)",display:"block",marginBottom:4}}>IT Load (MW)</label>
            <input className="calc-input" type="number" step="0.1" value={calcKW} onChange={e=>setCalcKW(e.target.value)} placeholder="e.g. 2.4"/>
            <label style={{fontSize:12,color:"var(--text-dim)",display:"block",marginBottom:4}}>Racks</label>
            <input className="calc-input" type="number" value={calcRacks} onChange={e=>setCalcRacks(e.target.value)} placeholder="e.g. 400"/>
            <label style={{fontSize:12,color:"var(--text-dim)",display:"block",marginBottom:4}}>Current PUE</label>
            <input className="calc-input" type="number" step="0.01" value={calcPUE} onChange={e=>setCalcPUE(e.target.value)} placeholder="e.g. 1.8"/>
            <button className="calc-btn" onClick={runCascade}>Find Bottlenecks →</button>
            {calcResult && (
              <div className="fade-in" style={{marginTop:12}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:8}}>{calcResult.filter(r=>!r.pass&&r.needed!=="-").length} gap{calcResult.filter(r=>!r.pass&&r.needed!=="-").length!==1?'s':''} found</div>
                {calcResult.map((r,i)=>r.needed!=="-"&&(<div key={i} style={{fontSize:12,color:'var(--text-dim)',marginBottom:4}}><span className={r.pass?'badge badge-pass':'badge badge-fail'} style={{marginRight:6}}>{r.pass?'PASS':'FAIL'}</span>L{i+1}: {r.detail}</div>))}
              </div>
            )}
            <div style={{marginTop:14,fontSize:12,color:'var(--text-dim)',lineHeight:1.8,borderTop:'1px solid var(--border)',paddingTop:10}}>
              <strong style={{color:'var(--text-bright)'}}>How to read the results</strong><br/>
              The calculator tests your facility parameters against each regulatory threshold. <span style={{color:'var(--green)',fontWeight:600}}>PASS</span> means that threshold is currently met. <span style={{color:'var(--red)',fontWeight:600}}>FAIL</span> means a compliance gap — fix FAIL items by priority, starting with the nearest deadline.
            </div>
          </div>
          <div className="sidebar-card">
            <h3 style={{fontSize:14,fontWeight:600,color:"var(--text-bright)",marginBottom:12}}>{"🏢"} Facility Profile</h3>
            <div style={{fontSize:13,color:"var(--text)",lineHeight:2}}>
              <div>Location: <strong>Clonshaugh, Dublin</strong></div>
              <div>Built: <strong>2013 (Colocation)</strong></div>
              <div>Racks: <strong>400</strong></div>
              <div>Current density: <strong>6 kW/rack</strong></div>
              <div>Target density: <strong style={{color:"var(--amber)"}}>20 kW/rack</strong></div>
              <div>Regulatory context: <strong>CRU, EPA, SEAI, EED</strong></div>
              <div>Current PUE: <strong>{CLONSHAUGH.pue}</strong></div>
              <div>Target PUE: <strong style={{color:"var(--amber)"}}>{CLONSHAUGH.targetPUE}</strong></div>
            </div>
          </div>
          <div className="sidebar-card">
            <h3 style={{fontSize:14,fontWeight:600,color:"var(--text-bright)",marginBottom:8}}>{"📐"} Methodology</h3>
            <div style={{fontSize:12,color:"var(--text-dim)",lineHeight:1.8}}>
              <strong>Trivium Method:</strong> Grammar (definitions) {"→"} Logic (cause/effect) {"→"} Rhetoric (stakeholder perspectives).
              <br/><strong>Feynman Clarify:</strong> Every fact has three layers — analogy (no jargon), first principles (from universal knowledge), and a test (can you answer this?).
              <br/><strong>Weakest Link:</strong> Each level identifies the most common misconception and the corrective path.
              <br/><strong>Five Personas:</strong> Same finding {"→"} five different professional perspectives (Declan, Ann, Mark, Sarah, Tom).
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// LearnTab — canonical Section 5
// ═══════════════════════════════════════════════════════════════
function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
    {lvl.clockQuote && (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
      <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
      <div style={{fontSize:12,color:"var(--text-muted)"}}>— Level {lvl.level}: {lvl.name}</div>
    </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeedStatement}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric}/>}
      </div>
      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

function FieldChallengesTab(){
  const [filterLevel,setFilterLevel]=useState(0);
  const [revealed,setRevealed]=useState({});
  const filtered = filterLevel===0 ? LEVELS : LEVELS.filter(l=>l.level===filterLevel);
  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--amber)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6}}>Fictional reference facility — Clonshaugh, Dublin. These field challenges are based on engineering scenarios encountered in Irish DC retrofit programmes. Apply the knowledge from the Learn tab to solve real-world problems.</div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>
        {LEVELS.map(l=>(<button key={l.id} className={'filter-btn'+(filterLevel===l.level?' active':'')} onClick={()=>setFilterLevel(l.level)}>L{l.level}</button>))}
      </div>
      {filtered.map(lvl=>(
        <div key={lvl.id} className="challenge-card selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>{lvl.icon} Level {lvl.level}: {lvl.name}</div>
          <h3 style={{fontSize:15,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>{lvl.scenario.title}</h3>
          <div className="fc-situation" style={{marginBottom:12}}>
            <div className="fc-label">Situation</div>
            <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,margin:0}}>{lvl.scenario.narrative}</p>
          </div>
          <div className="fc-challenge-q" style={{marginBottom:8}}>
            <div className="fc-label" style={{marginBottom:6}}>Challenge</div>
            <div>{lvl.scenario.question}</div>
          </div>
          {!revealed[lvl.id] ? (
            <button style={{marginTop:8,padding:'8px 16px',border:'1px solid var(--green)',borderRadius:8,background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',fontSize:13,fontFamily:'var(--font-sans)'}}
              onClick={()=>setRevealed(prev=>({...prev,[lvl.id]:true}))}>Show the Fix</button>
          ) : (
            <div className="fc-fix fade-in" style={{marginTop:10}}>
              <div className="fc-label">The Fix</div>
              <div className="fc-fix-content selectable-text" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
                {lvl.scenario.answer && (() => {
                  const parts = lvl.scenario.answer.split('\nSources:');
                  return (<div>
                    <div style={{whiteSpace:'pre-line'}}>{parts[0]}</div>
                    {parts[1] && <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',background:'var(--panel)',padding:'8px 12px',borderRadius:6,marginTop:8}}>Sources: {parts[1]}</div>}
                  </div>);
                })()}
              </div>
              {lvl.sourceNote&&<div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',marginTop:10}}>Source: {lvl.sourceNote}</div>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function GlossaryBibToggle(){
  const [show,setShow]=useState(null);
  return (
    <div style={{display:'flex',gap:8,flexDirection:'column'}}>
      <div style={{display:'flex',gap:8}}>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='glossary'?'var(--green-dim)':'var(--surface)',color:show==='glossary'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='glossary'?null:'glossary')}>
          {show==='glossary'?'▾':'▸'} Glossary ({GLOSSARY_007.length} terms)
        </button>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='bib'?'var(--green-dim)':'var(--surface)',color:show==='bib'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='bib'?null:'bib')}>
          {show==='bib'?'▾':'▸'} Bibliography ({BIBLIOGRAPHY_007.length} sources)
        </button>
      </div>
      {show==='glossary' && <div className="card fade-in"><GlossaryPanel/></div>}
      {show==='bib' && <div className="card fade-in"><BibliographyPanel/></div>}
    </div>
  );
}

function GlossaryPanel(){
  const [search,setSearch]=useState('');
  const filtered=search?GLOSSARY_007.filter(g=>g.term.toLowerCase().includes(search.toLowerCase())||g.def.toLowerCase().includes(search.toLowerCase())):GLOSSARY_007;
  return (
    <div>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search terms..." style={{width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:8,background:'var(--surface)',color:'var(--text)',fontSize:13,fontFamily:'var(--font-sans)',marginBottom:12,boxSizing:'border-box'}}/>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>{filtered.length} of {GLOSSARY_007.length} terms</div>
      {filtered.map((g,i)=>(
        <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{g.term}</div>
          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6,marginTop:2}}>{g.def}</div>
        </div>
      ))}
    </div>
  );
}

function BibliographyPanel(){

    <div>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Sources referenced in this module. Tier 1 = published standard or regulatory instrument. Tier 2 = industry benchmark or guidance document.</div>
      {BIBLIOGRAPHY_007.map((b,i)=>(
        <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>

            <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{b.title}</div>
          </div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginTop:3,lineHeight:1.6}}>

function VG_NarrativePanel({text, takeaway}) {
  return (<div className="vg-narrative"><div className="np-title">📋 What this diagram shows</div><div className="np-body">{text}</div><div className="np-takeaway">Key takeaway: {takeaway}</div></div>);
}

function VG_Walkthrough({title, subtitle, steps, insight, narrative, takeaway, children}) {
  const [step, setStep] = useState(0);
  return (
    <div className="card">
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:2}}>{title}</div>
      <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:14}}>{subtitle}</div>
      <div className="vg-step-row">
        {steps.map((s,i) => (
          <button key={i} onClick={() => setStep(i)} className="vg-step-btn"
            style={{border:step===i?'1px solid var(--green)':'1px solid var(--border)',
              background:step===i?'var(--green-dim)':'transparent',
              color:step===i?'var(--green)':'var(--text-dim)',fontWeight:step===i?600:400}}>
            {i+1}. {s}
          </button>
        ))}
      </div>
      {typeof children === 'function' ? children(step) : children}
      {insight && step === steps.length - 1 && (
        <div className="fade-in" style={{marginTop:12,padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid var(--warn)',borderRadius:8,fontSize:12,color:'var(--text-bright)',lineHeight:1.6}}>{insight}</div>
      )}
      {narrative && <VG_NarrativePanel text={narrative} takeaway={takeaway}/>}
    </div>
  );
}

              <text style={{font:'500 11px var(--font-sans)',fill:'var(--warn)'}} x="340" y={wy+36} textAnchor="middle">EED Article 26 (waste heat) — most commonly absent from mandates.</text>

        })()}

        <defs>
          <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        takeaway="For Ann & Tom: No single regulation is 'the important one'. The chain is only as strong as the weakest link — and the weakest link is usually the one nobody assigned to anyone."

/* ═══ 5. CRREM MISALIGNMENT PATHWAY ═══ */

  const S = 0.55, B = 340;
  const dcA_v = 336, dcB_v = 107;
  const dcA_y = B - dcA_v*S;   /* 155.2 */
  const dcB_y = B - dcB_v*S;   /* 281.2 */
  const mid_y = (dcA_y + dcB_y) / 2;
  /* Pathway points: 2020=400, 2030≈290, 2040≈190, 2050=100 */
  const px = (yr) => 100 + (yr-2020)*(500/30);
  const py = (v) => B - v*S;

  return (
    <VG_Walkthrough
      title="L7: CRREM Misalignment Pathway — Carbon Intensity vs Time"
      subtitle="When does the asset cross the line? PUE + REF determine the answer."
      steps={["CRREM Pathway", "Two DC Profiles", "Investment Case"]}
      insight="CRREM is both a risk identification tool and a capital allocation tool. The Misalignment Year tells investors WHEN. Sensitivity analysis tells them WHAT to do."
      narrative="CRREM shows a declining carbon intensity limit year by year. The LBE-derived DC pathway starts at ~400 kgCO₂/MWh_IT (2020) declining to ~100 by 2050. DC-A (PUE 1.50, no PPA) at ~336 kgCO₂/MWh_IT crosses the pathway at approximately 2030 — misalignment is imminent. DC-B (PUE 1.20, 60% PPA) at ~107 sits comfortably below."

      {(step) => (
        <svg viewBox="0 0 680 470" style={{display:'block',maxWidth:680,margin:'0 auto'}}>
          {/* Axes */}
          <line x1="100" y1={B} x2="600" y2={B} stroke="var(--text-dim)" strokeWidth="1.5"/>
          <line x1="100" y1={py(420)} x2="100" y2={B} stroke="var(--text-dim)" strokeWidth="1.5"/>

          {/* Y axis labels — right margin of axis */}
          {[0,100,200,300,400].map(v => (
            <text key={v} style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="90" y={py(v)+4} textAnchor="end">{v}</text>
          ))}
          <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="40" y={py(200)} textAnchor="middle" transform={"rotate(-90,40," + py(200) + ")"}>kgCO₂/MWh_IT</text>

          {/* X axis labels */}
          {[2020,2025,2030,2035,2040,2045,2050].map(yr => (
            <text key={yr} style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x={px(yr)} y={B+18} textAnchor="middle">{yr}</text>
          ))}

          {/* Grid lines */}
          {[100,200,300].map(v => (
            <line key={v} x1="100" y1={py(v)} x2="600" y2={py(v)} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3 3"/>
          ))}

          {/* Step 0: Pathway */}
          {step >= 0 && (
            <g className="fade-in">
              <text style={{font:'700 12px var(--font-sans)',fill:'var(--warn)'}} x="350" y={py(420)-2} textAnchor="middle">CRREM DC Pathway (LBE-derived bands)</text>
              <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="350" y={py(420)+12} textAnchor="middle">⚠ No official CRREM DC pathway in v2.01 — bands are LBE methodology (T3/T4)</text>

              {/* Pathway shaded area: declining from 400 (2020) to 100 (2050) */}
              <polygon points={px(2020)+","+py(400)+" "+px(2030)+","+py(290)+" "+px(2040)+","+py(190)+" "+px(2050)+","+py(100)+" "+px(2050)+","+B+" "+px(2020)+","+B}
                fill="var(--warn)" fillOpacity="0.06"/>
              <polyline points={px(2020)+","+py(400)+" "+px(2030)+","+py(290)+" "+px(2040)+","+py(190)+" "+px(2050)+","+py(100)}
