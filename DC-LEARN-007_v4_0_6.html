const LEVELS = [
{id:"L1",level:1,name:"EED Article 26",icon:"♨️",available:true,
component:"Energy Efficiency Directive Article 26 — Waste Heat Assessment",
userNeedStatement:"Understand EED Article 26, why it applies to Irish DCs above 1 MW total rated energy input, and what the waste heat assessment obligation actually requires.",
plainEnglish:"Every time a DC gets built or significantly upgraded, the developer must check whether the waste heat can be sent to a nearby district heating network instead of just venting it to atmosphere. It is now a legal obligation.",
grammar:{facts:[
{term:"EED Article 26 (EU 2023/1791)",definition:"Requires new or substantially refurbished DCs with total rated energy input exceeding 1 MW to assess waste heat recovery feasibility and notify SEAI.",plain:"If your DC generates total rated energy input exceeding 1 MW, you must formally check whether waste heat can be used — typically district heating. And tell SEAI.",number:"Threshold: total rated energy input >1 MW. SEAI notification required.",standard:"EU EED 2023/1791 Article 26; SEAI transposition guidance",feynman:{analogy:"Imagine a factory that vents hot air out the roof all day. The government says: before you build, check if someone nearby could use that heat. That is Article 26 for data centres.",firstPrinciples:"Servers convert electricity to computation and heat. The heat must be removed. If a heat user exists nearby, rejecting it to atmosphere wastes energy that has already been paid for. Article 26 makes you check before you build, not after.",theTest:"At what threshold does EED Article 26 require a waste heat feasibility assessment? Answer: Total rated energy input exceeding 1 MW."}},
{term:"Waste Heat",definition:"Heat generated as a byproduct of IT equipment operation, rejected via the cooling system to atmosphere.",plain:"Every watt fed to servers ends up as heat. Article 26 asks: could that heat warm buildings instead?",number:"Cooling overhead heat ≈ (PUE - 1) × IT load. Total heat rejection ≈ PUE × IT load (since IT energy also becomes heat). PUE 1.4, 10 MW IT: overhead = 4 MW, total rejection ≈ 14 MW.",standard:"EU EED 2023/1791 Article 26(1); Green Grid ITUE metric",feynman:{analogy:"A data centre is like a giant electric kettle that never switches off. The water (air) gets hot, but instead of making tea, the heat just gets thrown away outside.",firstPrinciples:"Every watt of IT power becomes heat. PUE measures how much extra power goes to cooling and infrastructure. The waste heat equals roughly (PUE minus 1) times the IT load. At PUE 1.4 and 10 MW IT, that is 4 MW of continuous low-grade heat.",theTest:"A DC has 10 MW IT load and PUE 1.8. How much waste heat does it produce? Answer: (1.8 − 1) × 10 = 8 MW."}},
{term:"Feasibility Assessment",definition:"Technical and economic analysis of waste heat recovery viability — temperature, volume, proximity to demand, infrastructure cost.",plain:"Must show what heat is available, at what temperature, infrastructure cost, and whether nearby demand exists.",number:"Heat rejection: CRAC/AHU exhaust 25–40°C. District heating supply: 60–80°C. Gap requires heat pump lift.",standard:"CODEMA District Heating Technical Guidance 2024; EU EED 2023/1791 Annex IX",feynman:{analogy:"Like surveying whether a river can power a mill — you check the flow (heat volume), the head (temperature), and whether anyone downstream wants the water (demand).",firstPrinciples:"Waste heat recovery requires three things to align: sufficient temperature for the use case, a heat user within economic piping distance, and infrastructure cost that the energy saving can repay. Most DC heat is 25–40°C, but district heating needs 60–80°C — a heat pump bridges this gap at additional cost.",theTest:"DC exhaust air is 35°C but district heating needs 70°C. What bridges the gap? Answer: A heat pump, which upgrades low-grade heat to usable temperature."}},
{term:"SEAI Notification",definition:"Irish DCs with total rated energy input >1 MW must submit notification to SEAI with assessment results, regardless of feasibility outcome.",plain:"You must tell SEAI the outcome — even if 'not feasible right now.' Silence is not compliance.",number:"Due: before commissioning. Format: SEAI-prescribed form. No fee.",standard:"SEAI EED transposition guidance; Irish transposing SI",feynman:{analogy:"Like filing a planning search — even if you decide not to build, the council still needs to know you checked. Silence is not the same as compliance.",firstPrinciples:"The obligation has two parts: assess and notify. The assessment outcome does not change the notification requirement. SEAI needs visibility of all assessments to track national waste heat potential, regardless of individual feasibility.",theTest:"A DC assessment concludes waste heat recovery is not feasible. Must they still notify SEAI? Answer: Yes — notification is required regardless of outcome."}}
,
{term:"EED Delegated Regulation 2024/1364 — Sustainability Indicators",definition:"The Delegated Regulation specifies the exact KPIs and calculation methodologies for data centre sustainability reporting: PUE, WUE, ERF (Energy Reuse Factor), and REF (Renewable Energy Factor). These become the basis for the planned EU rating scheme.",plain:"The EU does not just want data — it wants data calculated the same way by everyone. The Delegated Regulation standardises how PUE, WUE, and renewable fraction are measured and reported. This is the foundation for the rating labels coming in 2026.",number:"4 KPIs: PUE, WUE, ERF, REF. May 2024: Regulation entered into force. 15 May: annual reporting deadline from 2025.",standard:"Commission Delegated Regulation (EU) 2024/1364 — supplementing EED Article 12",feynman:{analogy:"The Delegated Regulation is like the measurement protocol for a drug trial. Everyone must use the same instruments, the same timing, and the same calculation methods — otherwise you cannot compare results across facilities or countries.",firstPrinciples:"Standardised metrics enable comparison. Without a common calculation method, one operator could report PUE using peak load while another uses annual average. The Delegated Regulation eliminates this ambiguity by prescribing measurement points, time periods, and formulas for each KPI.",theTest:"An operator measures PUE at the main switchboard and reports 1.25. Another operator measures at the UPS output and reports 1.35. Are they comparable? Answer: Not without knowing the measurement boundary. The Delegated Regulation standardises the measurement methodology to EN 50600-4-2, eliminating this ambiguity."}}],whatItLooksLike:"An EED Article 26 assessment is typically 10–30 pages: (1) heat available; (2) nearby heat demand; (3) infrastructure cost; (4) economic feasibility; (5) SEAI notification letter.",
siteChecklist:["Confirm total rated energy input — if >1 MW, Article 26 applies","Identify nearest district heating network within 5 km","Calculate waste heat: (PUE - 1) × IT load × 8,760 hrs","Determine heat rejection temperature","Submit assessment and SEAI notification before commissioning"]},
logic:{causeAndEffect:[
{cause:"EED Article 26 applies to DCs with total rated energy input >1 MW",effect:"Almost every commercial DC in Ireland requires a waste heat feasibility assessment as a legal obligation",insight:"This obligation is frequently absent from DC project mandates. Discovering it post-planning is the most common compliance gap."},
{cause:"CODEMA is developing Dublin district heating networks",effect:"DCs in south Dublin docklands may have a viable connection within planning horizon",insight:"The 'not viable' answer for Dublin city-centre DCs is becoming harder to sustain."},
{cause:"'Not feasible' finding does not end the obligation",effect:"The finding must be notified to SEAI and reasoning documented",insight:"A 'not feasible' conclusion is defensible IF the assessment is thorough."}
],constraintLesson:"EED Article 26 is the regulatory obligation most commonly missed in DC project planning.\nIt is not optional, not voluntary, and not dependent on feasibility outcome.\nThe obligation to ASSESS and NOTIFY applies regardless of what the assessment finds.\n\nCommission the assessment at RIBA Stage 1/2 — alongside the grid connection pre-application query.",
weakestLink:{whatsWrong:"We checked and there's no district heating nearby — so Article 26 doesn't apply.",whatsRight:"Article 26 applies based on total rated energy input (>1 MW), not on the outcome. The assessment IS the obligation.",howToGetThere:"Commission assessment at RIBA Stage 1. Submit to SEAI before commissioning. Include reference in planning application."}},
rhetoric:{
declan:"Declan — EED Article 26 is not optional. If total rated energy input exceeds 1 MW, assess waste heat recovery potential and report to SEAI. Before commissioning, not after someone asks. The assessment must cover district heating potential within 2 km radius, absorption cooling opportunities, and heat reuse for adjacent buildings. Document it even if the conclusion is negative — a documented negative assessment is compliant, an absent assessment is not.",
ann:"Ann — Article 26 compliance is increasingly a planning requirement and a standard investor due diligence item. A missing waste heat assessment is a material gap in any acquisition data room. For Article 8/9 fund investors, the assessment demonstrates EED compliance and shows due regard for energy efficiency — even if no commercial heat recovery opportunity exists. The cost of the assessment (€8–25k, Tier 2 — RICS NRM1 fee benchmarks, indicative) is negligible against the risk of a planning objection or investor query.",
mark:"Cooling overhead = (PUE - 1) × IT load. Total heat rejection ≈ PUE × IT load. At PUE 1.3, 20 MW IT: total rejection ≈ 26 MW thermal. Heat rejection from DX: 30–35°C — below district heating supply, heat pump lift required.",
sarah:"Sarah — the Article 26 waste heat assessment and SEAI notification is now standard ESG evidence for EU-regulated funds investing in DC assets. For SFDR reporting, this demonstrates compliance with energy efficiency obligations under the EED. The assessment itself can be used to quantify waste heat recovery potential as a positive sustainability indicator in Article 8 fund disclosures. Missing it is a due diligence red flag.",
tom:"Tom — waste heat assessment cost: €8k–€25k upfront (Tier 2 — RICS NRM1 fee benchmarks, indicative). Cost of non-compliance: planning objection, enforcement notice, retrospective assessment under time pressure at 3× the cost. For a 20 MW DC, waste heat potential is approximately 7–9 MW thermal. Whether or not you can monetise it, the assessment is a legal obligation under the EED transposition. Budget it at planning stage."},
scenario:{title:"The Missing Assessment",narrative:"A 15 MW DC in Dublin Docklands is 3 months from commissioning. Planning condition requires an EED Article 26 assessment before first occupation. No assessment has been commissioned.",question:"What is the minimum scope, who delivers it, and what is the realistic timeline?",answer:"Scope:\n1. Waste heat: (PUE-1) × 15 MW × 8,760 at PUE 1.3 = 3.9 MW, 34,164 MWh/yr\n2. Temperature profile: 28–35°C\n3. Demand mapping: CODEMA plans + buildings within 5 km\n4. Infrastructure cost estimate\n5. NPV at 20 years\n6. SEAI notification letter\n\nDelivered by: MEP consultant\nTimeline: 4–6 weeks + 1 week SEAI = 5–7 weeks"},
sourceNote:"EU EED 2023/1791 (T1). SEAI transposition SI (T1). CODEMA Dublin City District Heating Study 2023 (T2).",
  clockQuote:"She pinned the last deadline to the wall and stepped back. They didn't synchronise. They converged.",
retrofitRelevance:"Substantial refurbishments (>25% IT load increase) trigger Article 26.",
crossRefs:[{module:"DC-LEARN-004",level:"L6",topic:"EED reporting — PUE/WUE metering infrastructure required for Article 26 compliance"},{module:"DC-LEARN-006",level:"L4",topic:"EED Article 26 — carbon and compliance context for waste heat assessment obligations"},{module:"DC-LEARN-009",level:"L7",topic:"DCIM reporting — automated data extraction for annual EED submissions"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw; // cascade passes IT MW as first param
  const threshold = 1; // MW IT — EED Art 26 threshold
  return {needed:threshold+" MW",available:itMW.toFixed(1)+" MW",unit:"MW",
    pass:itMW>=threshold,detail:itMW>=threshold?"EED Art 26 applies — waste heat assessment required":"Below 1 MW threshold — exempt"};
}},

{id:"L2",level:2,name:"EPA IE Licence",icon:"🏭",available:true,
component:"EPA Industrial Emissions Licence — Threshold, Application, Conditions",
userNeedStatement:"Understand when an EPA IE Licence is required for a DC and what licence conditions mean for operations.",
plainEnglish:"If your DC's backup generators produce more than 50 MW of thermal input, the EPA requires a licence before you operate.",
grammar:{facts:[
{term:"IE Licence Threshold",definition:"Installations with rated thermal input >50 MW require an IE Licence from the EPA.",plain:"Generator electrical output divided by efficiency (about 0.40 for diesel) gives rated thermal input. If this exceeds 50 MW, the EPA requires an Industrial Emissions Licence before you can operate. Most mid-size DCs with 15+ generators will cross this threshold.",number:"25 × 3.5 MW = 87.5 MW ÷ 0.40 = 218.75 MW thermal. Required.",standard:"IE Directive 2010/75/EU; EPA Guidance for Data Centres (2024)",feynman:{analogy:"Think of it like a driving licence — below a certain engine size you need a standard licence, above it you need a special one. For generators, the threshold is 50 MW of thermal input.",firstPrinciples:"The EPA regulates industrial emissions. Generator efficiency is roughly 40%, so 1 MW of electrical output requires 2.5 MW of fuel energy input. Multiple generators on one site are aggregated. A site with 25 generators at 3.5 MW each produces 87.5 MW electrical but consumes 218 MW thermal — well above the 50 MW threshold.",theTest:"A DC has 15 generators rated at 2 MW each. Total electrical output is 30 MW. What is the thermal input? Answer: 30 ÷ 0.40 = 75 MW thermal — IE Licence required."}},
{term:"Thermal Input Calculation",definition:"For diesel generators: thermal input = electrical output ÷ efficiency (0.40).",plain:"Diesel engines are only about 40% efficient — 60% of the fuel energy becomes waste heat. So producing 1 MW of electricity actually burns 2.5 MW worth of diesel. The EPA uses this thermal input figure, not electrical output, because it reflects total combustion and therefore total emissions.",number:"Diesel LHV: 42.8 MJ/kg. Consumption: 0.265 L/kWh. Thermal input = output ÷ 0.40.",standard:"EPA guidance — diesel generator efficiency: 0.40",feynman:{analogy:"If a car engine is 30% efficient, for every 10 litres of fuel only 3 litres worth of energy reaches the wheels. Generators work the same way — the fuel burned is much more than the electricity produced.",firstPrinciples:"Diesel generators are approximately 40% efficient. Thermal input equals electrical output divided by efficiency. The EPA uses thermal input (not electrical output) because it measures total combustion and therefore total emissions potential.",theTest:"A generator produces 3 MW electrical at 40% efficiency. What is its thermal input? Answer: 3 ÷ 0.40 = 7.5 MW thermal."}},
{term:"HVO Condition",definition:"EPA increasingly requires HVO (EN 15940) as a licence condition for new DCs.",plain:"The EPA is increasingly requiring new data centres to use HVO (hydrotreated vegetable oil) instead of fossil diesel for backup generators. HVO reduces CO₂ emissions by approximately 90% and modern diesel engines accept it without modification. The cost premium is 20–25% over mineral diesel, but this gap narrows as carbon tax rises.",number:"HVO CO₂ reduction: ~90%. Cost premium: 20–25% vs diesel.",standard:"EN 15940; SEAI Emission Factors 2024; EPA practice 2024/25",feynman:{analogy:"Like switching from coal to charcoal in a barbecue — the grill works the same way, but the fuel comes from recently grown plants instead of ancient carbon.",firstPrinciples:"HVO is chemically identical to fossil diesel but made from waste oils and fats. The carbon released on combustion was recently absorbed from the atmosphere by the source crop, so the net addition is near zero. EPA licence conditions increasingly require HVO capability as a pathway to lower Scope 1 emissions.",theTest:"HVO reduces CO₂ emissions by approximately how much compared to fossil diesel? Answer: Approximately 90%."}},
{term:"BREF / BAT Conclusions",definition:"EU BAT Reference Documents defining emissions levels for IE-licensed installations.",plain:"BREF documents define what the EU considers 'best available technology' for each industrial sector. Your EPA licence conditions are derived directly from these standards. When the EU updates BREF for large combustion plants, the EPA must review your licence within 4 years — so what was compliant at installation may need upgrading.",number:"LCP BREF NOx: 190 mg/Nm³ (new plant). CEMS may be required.",standard:"LCP BREF 2021; IE Directive Article 14",feynman:{analogy:"BREF is like a building code for pollution — it defines the best technology available, and your licence conditions are based on meeting that standard.",firstPrinciples:"Best Available Techniques (BAT) are defined in sector-specific BREF documents published by the EU. For large combustion plants, the LCP BREF sets emission limits for NOx, SOx, and particulates. IE Licence conditions derive directly from BAT conclusions. Non-compliance risks licence enforcement.",theTest:"What does LCP BREF set for new plant NOx limits? Answer: 190 mg/Nm³."}}
,
{term:"EPA IE Licence — BAT Conclusions Review Cycle",definition:"EPA licences are reviewed periodically against updated BAT (Best Available Techniques) conclusions. When the EU publishes new BAT reference documents for a sector, the EPA must reassess licence conditions within 4 years.",plain:"Your EPA licence conditions are not fixed forever. When the EU updates what counts as best available technology for data centres, the EPA has 4 years to review your licence against the new standard. If your facility falls below updated BAT, the EPA can impose new conditions.",number:"4 years: maximum period for licence review after new BAT conclusions published. 6–10 years: typical full licence review cycle in Ireland.",standard:"IED 2010/75/EU Article 21 — Review of Conditions; EPA IE Licence Guidance",feynman:{analogy:"A BAT review is like a building regulations update. Your building was compliant when built, but new regulations raise the bar. The EPA licence review checks whether your facility still meets the current standard, not just the one that applied when you were licensed.",firstPrinciples:"The IED creates a ratchet mechanism: as technology improves, BAT conclusions advance. Licences must keep pace. For data centres, this means cooling efficiency, UPS efficiency, and waste heat recovery are all potential BAT indicators. A facility that was best-in-class in 2015 may be below BAT in 2025 without continuous investment.",theTest:"A DC was licensed in 2016 at PUE 1.6. Updated BAT conclusions in 2024 show PUE 1.3 is achievable. When must the EPA review the licence? Answer: Within 4 years of the BAT conclusions publication — by 2028 at the latest. The operator should plan PUE improvement now, not wait for the review notice."}}],whatItLooksLike:"EPA IE Licence application: 50–200 pages with fuel calculations, emissions assessment, BAT assessment, monitoring programme.",
siteChecklist:["Calculate total generator electrical output","Apply: output ÷ 0.40 = thermal input","If >50 MW: licence required before construction","Allow 12–18 months for EPA determination","Confirm HVO compatibility","Budget for ongoing monitoring"]},
logic:{causeAndEffect:[
{cause:"Thermal input uses total INSTALLED capacity, not operating load",effect:"2(N+1) redundancy pushes thermal input well above 50 MW even if generators rarely all run",insight:"Threshold is installed capacity. DC that never runs all generators still needs the licence."},
{cause:"EPA IE Licence takes 12–18 months",effect:"Must apply in parallel with planning permission",insight:"Exact parallel with EirGrid TCP. Both multi-year. Both frequently applied for too late."},
{cause:"EPA imposing HVO as licence condition",effect:"New IE Licences since 2023 specify HVO as required fuel",insight:"Specify HVO compatibility on all generators. Modern diesels accept HVO. Zero cost to specify."}
],constraintLesson:"The EPA IE Licence is one of the two longest-lead regulatory items in DC development.\nIt takes 12–18 months and cannot be short-circuited.\nA DC that starts late will commission late — regardless of construction speed.",
weakestLink:{whatsWrong:"We'll apply for the EPA licence once planning is granted.",whatsRight:"Apply in parallel. Both 12–18 months. Running in series doubles the programme.",howToGetThere:"Environmental consultant at inception. Thermal input on day 1. If >50 MW: two parallel tracks."}},
rhetoric:{
declan:"Declan — generator output ÷ 0.40 gives rated thermal input. Over 50 MW means an EPA Industrial Emissions licence, which takes 12–18 months. Start the application at planning stage, not construction. The EPA will set emission limit values for NOx, SOx, and particulate matter. Your maintenance team needs to understand the licence conditions as thoroughly as the building services specification.",
ann:"EPA IE Licence is a condition precedent. Not applied for = material programme risk. Lenders ask at financial close.",
mark:"Mark — 25 × 3.5 MW generators = 87.5 MW electrical ÷ 0.40 efficiency = 218.75 MW rated thermal input. Threshold: 50 MW. EPA IE Licence is required. Specify EN 15940-compliant HVO in the fuel specification from day one. Calculate thermal input at concept design stage — it may change generator count, fuel type, or site layout decisions. Once the EPA application is filed, changes are expensive.",
sarah:"Sarah — HVO under EPA licence reduces Scope 1 by approximately 90%. This is the single most impactful action on DC Scope 1 carbon emissions and can be implemented immediately with zero engine modification. For SFDR reporting, the Scope 1 reduction from diesel to HVO is verifiable, auditable, and material. If the facility holds an EPA licence, the fuel switch also simplifies emission limit compliance because HVO produces lower NOx and particulate emissions than mineral diesel.",
tom:"Tom — EPA licence fees: €50k–€150k application and processing (Tier 1 — EPA published fee schedule). Annual monitoring: €30k–€80k/yr (Tier 2 — SEAI/EPA guidance, indicative). CEMS if required: €200k–€400k capital plus €20–40k/yr maintenance. The EPA licence compliance cost can add 5–10% to the backup power budget. A common mistake is budgeting generators without budgeting the regulatory infrastructure around them."},
scenario:{title:"The Threshold Calculation",narrative:"A 30 MW IT Tier IV DC: 32 generators at 2.8 MW each in 2(N+1).",question:"Perform the threshold calculation.",answer:"32 × 2.8 MW = 89.6 MW electrical\n89.6 ÷ 0.40 = 224 MW thermal\n224 > 50 MW threshold\n\nIE Licence IS REQUIRED.\nHVO compatibility, CEMS likely, LCP BREF NOx limits apply."},
sourceNote:"IE Directive 2010/75/EU (T1). EPA Guidance 2024 (T1). Thermal input EF: EPA 0.40 (T1). HVO: EN 15940 (T1).",
  clockQuote:"Which one do we tackle first? All of them. They're not separate.",
retrofitRelevance:"Expansions increasing generator capacity above 50 MW thermal require a new IE Licence.",
crossRefs:[{module:"DC-LEARN-005",level:"L2",topic:"Diesel generators — thermal input calculation is the EPA trigger (generator rating ÷ efficiency)"},{module:"DC-LEARN-006",level:"L7",topic:"EPA IE Licensing — generator fleet context and HVO mandate implications"}],
cascadeCheck:(kw,racks,pue)=>{
  const genMWth = racks; // cascade passes genMWth as second param
  const threshold = 50; // MWth — EPA IE Licence trigger
  return {needed:threshold+" MWth",available:genMWth.toFixed(1)+" MWth",unit:"MWth",
    pass:genMWth<threshold,detail:genMWth>=threshold?"EPA IE Licence REQUIRED ("+genMWth.toFixed(1)+" MWth ≥ 50)":"Below 50 MWth threshold — no IE Licence"};
}},

{id:"L3",level:3,name:"EU Taxonomy",icon:"🌿",available:true,
component:"EU Taxonomy for Sustainable Finance — DC Screening Criteria",
userNeedStatement:"Understand the EU Taxonomy screening criteria for data centres.",
plainEnglish:"The EU Taxonomy lists which investments count as 'sustainable.' DCs are on the list — but only if they meet specific criteria. Get it wrong and EU-regulated funds cannot count your DC.",
grammar:{facts:[
{term:"EU Taxonomy Regulation",definition:"EU 2020/852 — classification system for sustainable activities. DCs in Section 8.1 of Annex I.",plain:"A list that says which investments count as 'green.' DCs are on it — but only with specific, measurable criteria.",number:"6 environmental objectives. DCs must contribute to objective 1 (climate mitigation) and DNSH to the other 5.",standard:"EU 2020/852; Delegated Act 2021/2139 Section 8.1",feynman:{analogy:"Like a nutritional label for investments — it tells investors whether an asset genuinely counts as green, using a standardised checklist rather than self-declaration.",firstPrinciples:"The Taxonomy is a classification system. An activity is Taxonomy-aligned only if it substantially contributes to at least one environmental objective, does no significant harm to the others, and meets minimum social safeguards. For data centres, this means meeting specific PUE, water, and renewable energy thresholds.",theTest:"How many environmental objectives does the EU Taxonomy have? Answer: Six."}},
{term:"PUE Threshold (New DCs from 2025)",definition:"New DCs must achieve PUE ≤1.3 for Taxonomy alignment.",plain:"For every 1.3 watts drawn from the grid, at least 1.0 watt must reach the IT equipment. That is what PUE ≤ 1.3 means in practice. New data centres built from 2025 must meet this threshold to qualify as Taxonomy-aligned. Existing facilities that exceed 1.3 need a retrofit plan to close the gap.",number:"PUE ≤1.3. Best hyperscale: 1.05–1.15. Typical Irish colocation: 1.4–1.6 (fails).",standard:"Delegated Act 2021/2139 Section 8.1(a)(i)",feynman:{analogy:"Like a fuel efficiency standard for cars — if your data centre uses more than 1.3 watts from the grid to deliver 1 watt to IT equipment, it cannot be called green under EU rules.",firstPrinciples:"PUE measures total facility energy divided by IT energy. A PUE of 1.3 means 30% of energy goes to cooling, lighting, and losses. The EU Taxonomy set this as the maximum for new DCs from 2025 because modern design can achieve it. Existing colocation at PUE 1.4–1.6 fails without retrofit.",theTest:"What PUE must new data centres achieve from 2025 for EU Taxonomy alignment? Answer: PUE ≤ 1.3."}},
{term:"REF (Renewable Energy Factor)",definition:"Fraction of DC energy from renewables. Delegated Act criteria require increasing renewable share.",plain:"What fraction is renewable? The Taxonomy requires a rising renewable energy share — operators must demonstrate compliance through PPAs or on-site generation.",number:"Irish grid ~42% (2026). PPA needed to bridge gap to Taxonomy thresholds.",standard:"Delegated Act 2021/2139 Section 8.1; Delegated Regulation 2024/1364; EU RED III",feynman:{analogy:"Like asking what percentage of the petrol in your car came from sustainable sources. For data centres, it is the fraction of electricity from renewables — and the required percentage rises over time.",firstPrinciples:"The Irish grid is approximately 42% renewable. The Taxonomy requires a renewable energy share that exceeds the grid average. Since grid renewables alone may fall short of Taxonomy thresholds, DCs typically need Power Purchase Agreements or on-site generation to demonstrate compliance.",theTest:"The Irish grid delivers ~42% renewable energy. Is a DC on grid power alone likely to meet the Taxonomy renewable energy criterion? Answer: Unlikely without supplementary PPAs or on-site renewable generation."}},
{term:"DNSH — Do No Significant Harm",definition:"Must not harm other 5 environmental objectives.",plain:"It is not enough to be energy efficient — a Taxonomy-aligned data centre must also prove it does no significant harm to water resources, waste management, pollution prevention, or biodiversity. Think of it as a six-dimensional test: passing on PUE alone is not enough if you are failing on refrigerant management or water consumption.",number:"DNSH water: WUE. DNSH waste heat: EED Art 26. DNSH hazardous: F-Gas monitoring.",standard:"Delegated Act 2021/2139 Section 8.1(d)",feynman:{analogy:"It is not enough to score high on one exam — you must also not fail any of the others. DNSH means your green credentials on energy cannot come at the cost of water, waste, or biodiversity.",firstPrinciples:"Taxonomy alignment requires passing two tests: substantial contribution to one objective, and do no significant harm to the remaining five. For DCs, DNSH criteria cover water use efficiency, waste heat recovery (EED Article 26), hazardous materials (F-Gas), and waste management.",theTest:"A DC has excellent PUE but uses R-410A with no leak monitoring. Does it pass DNSH? Answer: No — unmanaged high-GWP refrigerant fails the pollution prevention criterion."}}
,
{term:"EU Taxonomy — Do No Significant Harm (DNSH) Criteria for Data Centres",definition:"Taxonomy alignment requires not just meeting the PUE threshold but also passing DNSH tests across all six environmental objectives: climate change, water, circular economy, pollution, biodiversity, and adaptation.",plain:"Meeting PUE ≤ 1.3 is necessary but not sufficient for Taxonomy alignment. You must also demonstrate no significant harm to water resources (WUE), circular economy (equipment reuse and recycling), pollution prevention (refrigerant management), and biodiversity. It is a six-dimensional test, not a single number.",number:"6 environmental objectives. PUE ≤ 1.3 is the climate mitigation criterion. DNSH applies to the other 5.",standard:"EU Taxonomy Regulation (EU) 2020/852; Delegated Act 2021/2139, Annex I, Section 8.1 — DNSH criteria",feynman:{analogy:"Taxonomy DNSH is like a health check where you must pass every test, not just blood pressure. A DC with excellent PUE but massive water consumption or F-Gas leakage fails the overall assessment — one bad score disqualifies the claim.",firstPrinciples:"The EU Taxonomy prevents green-washing by requiring multi-dimensional proof. A data centre could have PUE 1.2 but consume millions of litres of water through evaporative cooling, use high-GWP refrigerants, and send all decommissioned equipment to landfill. DNSH catches these blind spots by testing each environmental objective independently.",theTest:"A DC achieves PUE 1.15 (excellent) but uses R410A refrigerant (GWP 2,088) across all cooling systems. Is it Taxonomy-aligned? Answer: No — the DNSH criteria for pollution prevention require assessment of refrigerant GWP. High-GWP refrigerants may fail the DNSH test regardless of PUE performance."}}],whatItLooksLike:"Taxonomy evidence: energy metering (PUE), PPA contracts (REF), EED Art 26 assessment (DNSH), F-Gas records, water data.",
siteChecklist:["Calculate PUE — if >1.3, fails for new builds","Calculate REF — if <50%, PPA required","Confirm EED Art 26 assessment exists","Confirm F-Gas monitoring","Prepare Taxonomy Alignment Statement"]},
logic:{causeAndEffect:[
{cause:"PUE >1.3 fails Taxonomy for new DCs",effect:"Funds cannot classify investment as Taxonomy-aligned",insight:"Most legacy Irish DCs (PUE 1.4–1.6) cannot be aligned without upgrade. Increasingly affects pricing."},
{cause:"Irish grid REF ~42% (2026)",effect:"DC on grid alone fails 50% threshold",insight:"A modest PPA (~8% gap) achieves compliance at low cost. Irish PPA market is active."},
{cause:"DNSH cross-references EED Art 26 and F-Gas",effect:"Cannot claim alignment if these are unmet",insight:"Taxonomy is a package: PUE + REF + DNSH. Missing any = non-aligned."}
],constraintLesson:"EU Taxonomy criteria are binary screens — not aspirational targets.\nA DC either meets them or does not.\nCriteria tighten (REF 50%→75%→90%). Designing for today's criteria = falling out of alignment within 5 years.",
weakestLink:{whatsWrong:"PUE 1.3 — so we're Taxonomy-aligned.",whatsRight:"PUE is one of four criteria. REF, DNSH, and minimum safeguards must also be met.",howToGetThere:"Complete checklist against all criteria in Delegated Act Section 8.1. Document evidence."}},
rhetoric:{
declan:"Declan — Taxonomy alignment requires all six boxes checked: PUE ≤1.3, REF ≥50% (rising towards 80% under CRU rules), EED Article 26 waste heat assessment complete, F-Gas inventory and monitoring in place, water consumption documented, and circular economy plan for equipment. Miss any single criterion and the facility is not Taxonomy-aligned. The Taxonomy is not a pass/fail on PUE alone — it is a six-dimensional test.",
ann:"SFDR Article 8/9 funds must disclose Taxonomy-aligned portfolio fraction. DC that fails the screen cannot be counted.",
mark:"Mark — PUE per Taxonomy must be annual metered average, not instantaneous readings. The measurement boundary follows EN 50600-4-2: total facility energy at the main LV switchboard divided by IT equipment energy at PDU output. Design the metering architecture into the electrical distribution from day one. Retrofitting sub-meters into an operational DC is 5–10× more expensive than installing them during construction.",
sarah:"Sarah — the Taxonomy REF trajectory (50%/75%/90%) means a 50% PPA signed today needs supplementing by 2027 to maintain alignment. Structure PPA contracts with built-in volume escalation clauses. The 80% CRU obligation and the Taxonomy trajectory are converging — plan for 90% REF by 2030 and you satisfy both. Additionality verification is essential: the PPA must fund new renewable generation to count under Taxonomy DNSH criteria.",
tom:"Tom — PPA for 50% REF at 20 MW IT: approximately €1.2M/yr at €60/MWh (Tier 2 — CRU/BNEF published PPA pricing, indicative). Against approximately €21M/yr total electricity cost (Tier 2 — CRU Q4 2024 €0.12/kWh, T2), the PPA often serves double duty as a cost hedge and a Taxonomy alignment instrument. Model against 3 electricity price scenarios. If the PPA saves money in 2 of 3 scenarios AND delivers alignment, it is a no-regret investment."},
scenario:{title:"The Taxonomy Gap Analysis",narrative:"Acquiring a 25 MW IT DC (2019). PUE 1.45, no PPA, no EED assessment, F-Gas records available. Article 8 fund wants alignment.",question:"Identify gaps, cost, timeline.",answer:"Gap 1: PUE 1.45 > 1.3 — upgrade needed. €500k–€3M, 6–18 months.\nGap 2: REF — no PPA, grid ~42%. PPA needed. ~€1.9M/yr, 6–12 months.\nGap 3: DNSH — no Art 26 assessment. €15k–€25k, 4–6 weeks.\nGap 4: F-Gas — PASS.\n\n3 gaps. Art 26 quickest. PPA next. PUE requires feasibility study.\nAlignment in 12–18 months with active programme."},
sourceNote:"EU Taxonomy 2020/852 (T1); Delegated Act 2021/2139 Section 8.1 (T1). PUE: 8.1(a)(i). REF: 8.1(a)(ii). DNSH: 8.1(d).",
  clockQuote:"I can build the programme. I can't build the infrastructure it requires.",
retrofitRelevance:"Taxonomy drives DC retrofit. Rising REF bar means recurring programme, not one-time fix.",
crossRefs:[{module:"DC-LEARN-004",level:"L7",topic:"ASHRAE thermal envelopes — PUE ≤1.3 requires optimised supply air temperatures within ASHRAE limits"},{module:"DC-LEARN-010",level:"L4",topic:"EU Taxonomy alignment — Taxonomy criteria as an investment gateway for DC funds"}],
cascadeCheck:(kw,racks,pue)=>{
  const limit = 1.3; // EU Taxonomy PUE threshold — Delegated Act 2021/2139
  return {needed:"≤1.30",available:pue.toFixed(2),unit:"PUE",
    pass:pue<=limit,detail:pue<=limit?"PUE "+pue.toFixed(2)+" meets Taxonomy ≤1.30":"PUE "+pue.toFixed(2)+" exceeds Taxonomy 1.30 limit"};
}},

{id:"L4",level:4,name:"SFDR Reporting",icon:"📊",available:true,
component:"Sustainable Finance Disclosure Regulation — Article 6, 8, and 9",
userNeedStatement:"Understand SFDR article classifications, what they require DC investors to disclose, and how DC metrics feed into fund reporting.",
plainEnglish:"SFDR makes fund managers declare how seriously they take sustainability. Article 9 is the highest bar — funds must prove investments genuinely contribute to a sustainable goal. Data centres are in scope with specific metrics required.",
grammar:{facts:[
{term:"SFDR Article 6",definition:"Baseline — all EU-regulated products must integrate sustainability risk into decisions and disclose how.",plain:"Every EU-regulated fund must at minimum consider sustainability risks in its investment decisions — that is the Article 6 floor. It does not require green claims, just acknowledgement. For DC investors, this means even the most basic fund structure must assess climate and regulatory risk before committing capital.",number:"Disclose how sustainability risks are integrated. No minimum threshold.",standard:"SFDR (EU) 2019/2088 Article 6",feynman:{analogy:"Like the basic safety inspection every car must pass — Article 6 is the minimum standard every fund must meet, simply disclosing how it considers sustainability risks.",firstPrinciples:"SFDR creates a disclosure hierarchy. Article 6 is the floor: every fund must explain how sustainability risks factor into investment decisions, or explain why they do not. There is no minimum sustainability threshold — only transparency.",theTest:"Does an Article 6 fund need to demonstrate positive environmental impact? Answer: No — it only needs to disclose how sustainability risks are considered."}},
{term:"SFDR Article 8",definition:"Products promoting environmental or social characteristics. Must disclose how and what % is Taxonomy-aligned.",plain:"Article 8 funds actively promote environmental or social characteristics and must demonstrate how they do it. For data centre assets, this means providing auditable evidence of PUE, renewable energy fraction, and carbon intensity — not just stating good intentions. The fund must show its working.",number:"Disclose: % Taxonomy-aligned, PAIs, pre-contractual disclosure.",standard:"SFDR (EU) 2019/2088 Article 8",feynman:{analogy:"Like a food label that says 'contains organic ingredients' — the fund promotes ESG characteristics but is not exclusively green. It must prove what percentage actually qualifies.",firstPrinciples:"Article 8 funds promote environmental or social characteristics. They must disclose what proportion of investments is Taxonomy-aligned, report Principal Adverse Impacts, and provide pre-contractual sustainability information. DC assets in Article 8 funds face Taxonomy scrutiny.",theTest:"What must an Article 8 fund disclose about its investments? Answer: The percentage that is Taxonomy-aligned, PAIs, and pre-contractual ESG disclosure."}},
{term:"SFDR Article 9",definition:"Products with sustainable investment as their objective. All investments must be 'sustainable.'",plain:"Article 9: every investment must make a genuine contribution. For DCs: Taxonomy alignment, additionality-verified renewables.",number:"100% of investments must be sustainable per SFDR Article 2(17).",standard:"SFDR (EU) 2019/2088 Article 9; EU Taxonomy 2020/852",feynman:{analogy:"Like a fully organic restaurant — every dish must meet the standard, not just the specials. Article 9 means every investment must be genuinely sustainable.",firstPrinciples:"Article 9 funds have sustainable investment as their objective. 100% of investments must meet SFDR Article 2(17) criteria. For DC assets, this means full Taxonomy alignment: PUE ≤ 1.3, REF thresholds met, DNSH passed. A single non-compliant asset compromises the entire fund classification.",theTest:"What percentage of an Article 9 fund's investments must be sustainable? Answer: 100%."}},
{term:"Principal Adverse Impacts (PAIs)",definition:"SFDR requires disclosure of investments' adverse sustainability impacts.",plain:"Funds must disclose negative impacts — not just positive. For DCs: GHG, energy, water, e-waste.",number:"PAI indicators: GHG intensity (tCO₂e/€M), energy consumption, REF, water use.",standard:"SFDR RTS Annex I Table 1; PCAF Standard",feynman:{analogy:"Like a side-effects list on medicine — even if the treatment works, you must report the negative impacts. For investments, PAIs are the environmental downsides you must disclose.",firstPrinciples:"PAIs quantify negative sustainability impacts using standardised indicators: GHG intensity, energy consumption, water use, hazardous waste. For DC investments, the key PAIs are energy consumption per revenue, carbon intensity, and water use efficiency. These metrics drive due diligence questions.",theTest:"Name two PAI indicators relevant to data centres. Answer: GHG intensity (tCO₂e/€M revenue) and energy consumption."}}
,
{term:"CSRD — Corporate Sustainability Reporting Directive Impact on DC Operators",definition:"The CSRD requires large companies and listed SMEs to report sustainability data using European Sustainability Reporting Standards (ESRS). DC operators within scope must disclose energy consumption, GHG emissions, and climate risk including CRREM alignment.",plain:"From 2024 onwards, the CSRD expands mandatory sustainability reporting to thousands more companies across the EU. If the DC operator or their parent company is in scope, they must report detailed energy and carbon data — and that data must be audited to limited assurance standards.",number:"2024–2026: phased CSRD rollout. ~50,000 EU companies in scope. Limited assurance initially, moving to reasonable assurance.",standard:"CSRD Directive (EU) 2022/2464; ESRS E1 (Climate Change); ESRS E2 (Pollution)",feynman:{analogy:"CSRD is like upgrading from self-certified tax returns to mandatory external audit. Companies can no longer self-declare their sustainability performance — it must be reported to standardised templates and independently verified.",firstPrinciples:"Regulatory pressure on sustainability reporting flows from company level to asset level. When a DC owner must report audited GHG data under CSRD, they need granular, metered, verifiable data from every facility. This drives demand for DCIM systems, sub-metering, and standardised KPIs at the building level.",theTest:"A fund owns 12 data centres across Europe through an Irish holding company in CSRD scope. What sustainability data must the holding company report for each DC? Answer: Energy consumption (kWh), Scope 1 + 2 GHG emissions (tCO₂e), PUE, water consumption, refrigerant inventory and leakage — all to ESRS standards with limited assurance."}}],whatItLooksLike:"SFDR reporting: pre-contractual documents, periodic reports, website disclosures. DC data needed: PUE, carbon (Scope 1+2+3), energy, REF, WUE, waste heat status.",
siteChecklist:["Confirm fund article classification (6/8/9)","Establish metering: PUE, CUE, REF, WUE","Confirm Scope 1/2/3 methodology","Align with PCAF Standard if used","Confirm additionality for renewable claims","Establish annual PAI data collection"]},
logic:{causeAndEffect:[
{cause:"Article 9 fund acquires DC without Taxonomy alignment",effect:"Cannot classify as 'sustainable investment' — compromises Article 9 status",insight:"Article 9 DC investments require Taxonomy alignment from day one. Cannot 'fix later' without risking fund status."},
{cause:"PAI reporting requires consistent annual data",effect:"DC metering gaps create fund reporting gaps",insight:"Specify SFDR metering at design stage — not as retrofit."},
{cause:"SFDR RTS requires 'alignment fraction' disclosure",effect:"Funds increasingly exclude non-aligned DCs from acquisition",insight:"Non-aligned DCs face a shrinking institutional buyer universe."}
],constraintLesson:"SFDR is a disclosure regulation — it forces funds to show what they own and what it does to the environment.\nThe consequence: institutional investors seek Article 8/9 funds, which seek Taxonomy-aligned assets.\nNon-aligned DCs face a shrinking pool of institutional buyers.",
weakestLink:{whatsWrong:"SFDR is a fund manager's problem — it doesn't affect DC operations.",whatsRight:"SFDR indirectly determines DC acquisition criteria for institutional capital. Non-aligned DCs are progressively excluded.",howToGetThere:"Understand which SFDR classification applies to likely buyers. Design Taxonomy alignment in. Build metering infrastructure."}},
rhetoric:{
declan:"Declan — SFDR affects who can buy your DC at exit. Article 9 funds need every investment Taxonomy-aligned. If yours is not, you are excluded from their purchase universe — that is a smaller buyer pool and a lower exit multiple. Article 8 funds have more flexibility but still need to report Taxonomy-aligned asset percentages. Your operational decisions today — PUE, refrigerant choice, renewable sourcing — directly affect the asset attractiveness to Europe deepest capital pools.",
ann:"PAI reporting requires: GHG emissions, energy intensity, REF, water use. If the DC can't produce these from metered data, the fund reporting is based on estimates — audit risk.",
mark:"Metering spec for SFDR: sub-metering at IT level (PUE), total facility (CUE), generator fuel flow (Scope 1), grid import (Scope 2). Design-stage decision.",
sarah:"Article 9 is the highest standard. A DC achieving it — Taxonomy-aligned PUE, additionality-verified 90% REF, full PAI — commands a premium from the largest global fund managers.",
tom:"Tom — SFDR metering retrofit on an existing DC: €200k–€500k depending on complexity (Tier 2 — RICS NRM1 fee benchmarks; indicative). Designed-in from new: €30k–€80k incremental (Tier 2 — RICS NRM1, indicative). The difference is not just capital — it is a cost-of-capital event. A facility with auditable SFDR data commands a lower cap rate than one requiring investor-funded metering upgrades post-acquisition. Build the reporting infrastructure from day one."},
scenario:{title:"The Article 9 Acquisition",narrative:"An Article 9 fund is acquiring a 40 MW colocation DC in Dublin.",question:"List data requirements, Taxonomy checks, and annual PAI obligations.",answer:"Pre-acquisition (Taxonomy screen):\n1. Annual PUE ≤1.3 (metered)\n2. REF ≥50% (PPA with additionality)\n3. EED Art 26 on file\n4. F-Gas monitoring records\n5. WUE (metered)\n6. Waste management records\n\nAnnual PAI:\n• Scope 1+2 GHG (location + market-based)\n• GHG intensity (tCO₂e/€M)\n• Energy consumption + intensity\n• REF\n• Water use + WUE\n• E-waste (kg/yr)\n\nArticle 9 requires Taxonomy alignment + DNSH + minimum social safeguards."},
sourceNote:"SFDR: EU 2019/2088 (T1). RTS: 2022/1288 (T1). EU Taxonomy: 2020/852 (T1). PAI: SFDR RTS Annex I (T1). PCAF Standard 2022 (T2).",
  clockQuote:"Eight deadlines. And I've probably missed some.",
retrofitRelevance:"SFDR PAI is annual. DC improvements (PUE, PPA) directly reflected in PAI metrics — clear financial incentive for retrofit.",
crossRefs:[{module:"DC-LEARN-006",level:"L9",topic:"SFDR & investor reporting — carbon and compliance module covering PAI disclosure requirements"},{module:"DC-LEARN-010",level:"L3",topic:"CRREM & Misalignment Risk — CRREM trajectory feeds directly into SFDR Article 9 reporting"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw;
  const annualMWh = itMW*1000*pue*8760/1000; // MWh/yr
  const co2 = annualMWh*0.2241; // tCO2 — SEAI 2026
  return {needed:"Report",available:co2.toFixed(0)+" tCO₂",unit:"tCO₂/yr",
    pass:true,detail:"Scope 2: "+co2.toFixed(0)+" tCO₂/yr at "+itMW+" MW IT — SFDR reporting required"};
}},

{id:"L5",level:5,name:"F-Gas Phase-Down",icon:"❄️",available:true,
component:"EU F-Gas Regulation 517/2014 — Cooling Refrigerants and Suppression Agents",
userNeedStatement:"Understand which F-gases are used in DC cooling and fire suppression, the phase-down schedule, and what decisions to make now.",
plainEnglish:"The EU is banning high-GWP refrigerants. Most DC chillers use refrigerants that will be unavailable or expensive by 2030. And most people don't know FM-200 fire suppression is also an F-gas being phased down.",
grammar:{facts:[
{term:"F-Gas Regulation (EU 517/2014, updated 2024)",definition:"EU regulation controlling production, use, and servicing of fluorinated greenhouse gases. Phase-down to 15% of 2015 levels by 2030.",plain:"The EU is restricting the gases that chillers and some fire suppression systems use. Less supply = higher prices.",number:"Phase-down: 2015 = 100%. 2030 = 15% baseline. 2050 = effective ban on most high-GWP HFCs.",standard:"EU 517/2014; EU 2024/573 (updated F-Gas)",feynman:{analogy:"Imagine a tap being slowly closed on the gases that cool your building and suppress your fires. The EU is phasing them down — not banning them overnight, but making them scarcer and more expensive each year.",firstPrinciples:"HFCs are powerful greenhouse gases used in chillers and fire suppression. The EU phase-down reduces the quantity of HFCs that can be sold, using a quota system based on CO₂-equivalent. As supply tightens, prices rise and alternatives become necessary. The 2024 update accelerates the schedule.",theTest:"What percentage of the HFC baseline will be available in 2030? Answer: 15%."}},
{term:"R-134a (HFC-134a)",definition:"Most common DC precision cooling refrigerant. GWP = 1,430. Banned in new EU stationary equipment from 2022.",plain:"R-134a is what most DC cooling uses. Already banned in new equipment. Service supply tightening.",number:"GWP: 1,430. Replacements: R-454B (GWP 466), R-32 (GWP 675).",standard:"EU 517/2014 Annex III; EPEE Guidance 2024",feynman:{analogy:"R-134a is to data centre cooling what leaded petrol was to cars — it works well, but regulators are phasing it out because the environmental cost is too high.",firstPrinciples:"R-134a has a GWP of 1,430 — each kilogram leaked is equivalent to 1,430 kg of CO₂. It is banned in new equipment under F-Gas. Existing systems can be serviced until supply runs out. Alternatives like R-454B (GWP 466) offer similar performance with one-third the climate impact.",theTest:"What is the GWP of R-134a? Answer: 1,430."}},
{term:"FM-200 (HFC-227ea)",definition:"Most common clean agent fire suppression gas in DCs. GWP = 3,220. IS an F-gas subject to phase-down.",plain:"FM-200 is the gas in most DC fire suppression. Almost nobody knows it's an F-gas being phased out. Replacement: Novec 1230.",number:"FM-200 GWP: 3,220. Novec 1230 GWP: 1. FM-200 supply restricted, price increasing.",standard:"EU 517/2014; ISO 14520-9; IPCC Fifth Assessment Report",feynman:{analogy:"FM-200 is the fire extinguisher gas in most server rooms — invisible and effective, but with a climate footprint 3,220 times worse than CO₂. Most operators do not realise it is an F-Gas.",firstPrinciples:"FM-200 has a GWP of 3,220. Under F-Gas phase-down, its supply is increasingly restricted via the HFC quota system. Unlike cooling refrigerants, fire suppression gases are often overlooked in carbon audits. A single discharge of an FM-200 system can release tonnes of CO₂-equivalent.",theTest:"What is the GWP of FM-200? Answer: 3,220."}},
{term:"Novec 1230 (FK-5-1-12)",definition:"F-Gas-compliant alternative to FM-200. Zero ODP, GWP=1.",plain:"The 'green' FM-200. Same fire suppression, 3,000× lower carbon footprint. Note: 3M exited Novec 1230 production end-2025 citing PFAS concerns. Alternative suppliers exist, but IG-541 (inert gas) is gaining market share as a long-term non-fluorinated option.",number:"Design concentration: 5.9% (vs FM-200: 6.35%). Cost premium: 15–25%.",standard:"ISO 14520-10; NFPA 2001; IS 3218:2024",feynman:{analogy:"Novec 1230 does the same job as FM-200 — flooding the room to stop fire — but with a climate footprint that rounds to zero. It is the electric car of fire suppression.",firstPrinciples:"Novec 1230 has a GWP of 1, compared to FM-200 at 3,220. It is not an HFC, so it falls outside F-Gas quota restrictions. Design concentration is slightly lower (5.9% vs 6.35%), making it marginally more volume-efficient. The cost premium of 15–25% is recovered through avoided carbon liability.",theTest:"What is the GWP of Novec 1230? Answer: 1."}}
,
{term:"F-Gas Regulation (EU) 2024/573 — Equipment Bans Timeline",definition:"The revised F-Gas Regulation introduces equipment-specific bans on a tightening timeline. Split AC and heat pumps using F-gases with GWP ≥ 750 are banned from 2027. Chillers using F-gases with GWP ≥ 750 are banned from 2027 for charges below 12 kg.",plain:"The F-Gas rules do not just phase down HFC supply — they ban specific equipment types by date. From 2027, you cannot install new split systems or small chillers with R410A (GWP 2,088) or similar. This directly affects DC cooling plant replacement planning.",number:"2027: ban on new split/mono-block systems with GWP ≥ 750 and capacity > 12 kW. 2032: ban on servicing equipment with GWP > 2,500 using virgin refrigerant.",standard:"F-Gas Regulation (EU) 2024/573 — Article 11 and Annex IV (equipment prohibitions)",feynman:{analogy:"The equipment ban timeline is like a car scrappage scheme in reverse — instead of offering incentives to replace old cars, the EU is banning the sale of new high-emission models by specific dates. Your existing R410A system can keep running, but its replacement must use a low-GWP alternative.",firstPrinciples:"Phase-down targets reduce the total volume of HFCs available on the EU market. Equipment bans complement this by ensuring new installations use low-GWP alternatives. The two mechanisms work together: as supply shrinks and new high-GWP equipment is banned, the market transitions to natural and low-GWP synthetic refrigerants.",theTest:"A DC CRAC unit fails in 2028. The unit uses R410A. Can the operator replace it with an identical R410A unit? Answer: No — from 2027, new equipment above 12 kW using F-gases with GWP ≥ 750 is banned. The replacement must use a low-GWP alternative such as R32 (GWP 675) or R290 (GWP 3)."}}],whatItLooksLike:"F-Gas compliance: annual refrigerant log (mandatory >5 tCO₂e), leak detection (>10 tCO₂e), engineer certification (FETAC Level 6 in Ireland). FM-200 canisters in suppression rooms — labelled with refrigerant type and GWP.",
siteChecklist:["Identify all F-gas refrigerants — type, charge, GWP, tCO₂e","Identify suppression agent — FM-200 or Novec 1230","Confirm annual refrigerant log is maintained","Assess refrigerant transition plan","If FM-200: assess Novec 1230 retrofit","Confirm F-Gas certified engineers for all work"]},
logic:{causeAndEffect:[
{cause:"R-134a banned in new EU DC equipment since 2022",effect:"Replacements or additions must use R-454B, R-32, or R-513A. Service refill still permitted but supply tightening.",insight:"The question is 'when' not 'will we.' DCs that plan ahead avoid emergency replacements."},
{cause:"FM-200 is an F-gas with GWP 3,220",effect:"Supply restricted, service becoming more expensive",insight:"Single most commonly missed F-Gas issue in DC audits. FM managers who know about chiller F-Gas often don't know suppression is in scope."},
{cause:"One FM-200 discharge = 3.22 tCO₂e per kg",effect:"100kg system discharge = 322 tCO₂e — equivalent to 12 months Scope 2 in many cases",insight:"For SFDR PAI reporting, FM-200 discharge is a material Scope 1 event. Transition to Novec eliminates this."}
],constraintLesson:"F-Gas phase-down affects every cooling system and most fire suppression systems in Irish DCs.\nR-134a supply already restricted. FM-200 tightening.\nFacilities that haven't assessed exposure are accumulating risk: cost inflation, supply uncertainty, compliance liability.",
weakestLink:{whatsWrong:"F-Gas is a cooling issue — our HVAC contractor handles it.",whatsRight:"F-Gas applies to cooling AND fire suppression. Suppression is the most commonly missed obligation — and highest carbon consequence if discharged.",howToGetThere:"Audit all refrigerants — cooling AND suppression. Create log. Assess FM-200 to Novec transition. Include in annual compliance review."}},
rhetoric:{
declan:"Declan — FM-200 is an F-gas with GWP 3,220. Check your fire suppression cylinders. If FM-200, you have an F-gas reporting obligation and supply is getting expensive as HFC quota tightens. Novec 1230 (FK-5-1-12) is the standard replacement with GWP below 1. Every FM-200 cylinder needs to be in your F-Gas inventory, leak-tested annually, and reported. Fire suppression is often overlooked in F-Gas compliance audits because people think of HVAC first.",
ann:"A single FM-200 discharge releases hundreds of tCO₂e. For Article 8/9 funds, that is a reportable PAI event. Novec eliminates the risk.",
mark:"R-134a ban in new equipment: 2022 — in force. Confirm all new CRAC/CRAH specs reference R-454B, R-32, or R-513A. FM-200: check cylinders, annual log, leak detection.",
sarah:"F-Gas monitoring records are a DNSH check for Taxonomy. Missing records = cannot claim alignment. Often the easiest gap to close.",
tom:"Tom — FM-200 to Novec 1230 retrofit: €50k–€150k per protected zone (Tier 3 — EU F-Gas market pricing; EPA F-Gas register, indicative) including cylinders, pipework modifications, and recommissioning. FM-200 price has increased 40–80% in the EU market between 2022 and 2025. The conversion is manageable now but gets more expensive every year as HFC quota tightens further. Budget the conversion in the next 3-year CapEx cycle. Waiting until supply fails during a cylinder recharge means emergency procurement at double the planned cost."},
scenario:{title:"The F-Gas Audit",narrative:"A DC asset manager requests F-Gas compliance audit. Site manager: 'We have refrigerant log for chillers and CRACs. Nothing for fire suppression.'",question:"What are the gaps, risks, and remediation?",answer:"Gap: FM-200 (HFC-227ea, GWP 3,220) — F-gas. EU 517/2014 applies.\n\nMissed obligations:\n1. Annual leak check (>5 tCO₂e) — 100kg × 3.22 = 322 tCO₂e, mandatory\n2. Refrigerant log — charge weight, service dates, losses\n3. Leak detection (>10 tCO₂e) — mandatory at 322 tCO₂e\n4. F-Gas certified engineer for all work\n\nRemediation:\n1. Commission F-Gas inspection (this week)\n2. Establish suppression system log\n3. Retroactively document from contractor records\n4. Assess Novec 1230 retrofit programme\n5. Include suppression in annual F-Gas audit scope"},
sourceNote:"EU F-Gas 517/2014; EU 2024/573 (T1). FM-200 GWP: IPCC Fifth Assessment (T1). Novec 1230: ISO 14520-10 (T1). Irish enforcement: EPA (T1).",
  clockQuote:"You can't skip to the end.",
retrofitRelevance:"F-Gas transition is the most universal DC retrofit driver — every DC with DX cooling and FM-200 faces it.",
crossRefs:[{module:"DC-LEARN-008",level:"L3",topic:"Clean agent suppression — FM-200 (HFC-227ea, GWP 3,220) faces F-Gas phase-down pressure alongside cooling refrigerants"},{module:"DC-LEARN-002",level:"L5",topic:"Chillers — R-410A service restriction from 2032 drives chiller replacement planning"},{module:"DC-LEARN-006",level:"L5",topic:"F-Gas phase-down — carbon and compliance context for refrigerant transition"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw;
  const coolingMW = itMW*(pue-1); // MW cooling load
  const estChargeKg = coolingMW*120; // approx 120 kg/MW cooling — EN 378-1 typical charge density for DX chillers (T3)
  const gwp = 1430; // R-134a typical — Regulation (EU) 2024/573
  const co2eq = estChargeKg*gwp/1000; // tCO2eq
  const limit = 50; // tCO2eq reporting threshold
  return {needed:"<"+limit+" tCO₂eq",available:co2eq.toFixed(0)+" tCO₂eq",unit:"tCO₂eq",
    pass:co2eq<limit,detail:co2eq>=limit?estChargeKg.toFixed(0)+" kg × GWP "+gwp+" = "+co2eq.toFixed(0)+" tCO₂eq — F-Gas reporting required":"Below F-Gas reporting threshold"};
}},

{id:"L6",level:6,name:"Irish Planning",icon:"🏗️",available:true,
component:"Irish Planning System — DC-Specific Triggers and Material Considerations",
userNeedStatement:"Understand the Irish planning framework for DCs, material considerations, and the current policy environment.",
plainEnglish:"Planning for a DC in Ireland involves grid impact, water supply, community benefit, noise, visual impact, and the government's DC policy statement. Getting this right first time avoids years of appeals.",
grammar:{facts:[
{term:"Strategic Infrastructure Development (SID)",definition:"Large infrastructure projects go directly to An Coimisiún Pleanála, bypassing local authority.",plain:"A DC above a certain size skips the county council and goes straight to the national planning board.",number:"SID threshold: floor area >20,000 m² or IT power ~10–20 MW. Direct to ABP.",standard:"Planning and Development Act 2000 (as amended)",feynman:{analogy:"Like a court case that is too important for the local judge — large data centres bypass the county council and go directly to the national planning board.",firstPrinciples:"SID exists because large infrastructure has national significance beyond local planning authority expertise. DCs above the threshold (typically >20,000 m² or ~10–20 MW IT) go directly to An Coimisiún Pleanála. This means longer timelines but more rigorous assessment including mandatory EIA.",theTest:"Where does a SID application go — the local authority or An Coimisiún Pleanála? Answer: Directly to An Coimisiún Pleanála."}},
{term:"Material Considerations",definition:"Factors planning authorities must consider beyond development plan compliance.",plain:"Planning authorities can consider grid impact, water supply, carbon emissions, community impact, and government data centre policy when assessing an application. For large DCs, these material considerations now carry as much weight as traditional planning issues like traffic and visual impact. The DHLGH Policy Statement 2022 made this explicit.",number:"Current: grid impact (EirGrid SG10/SG11), water (Irish Water), DHLGH Policy Statement 2022, EIA.",standard:"Planning and Development Act 2000; DHLGH DC Policy Statement 2022",feynman:{analogy:"Material considerations are the list of concerns that a planning board is legally allowed to weigh. For data centres, the list has grown — grid impact, water, carbon, and community benefit are all now on the table.",firstPrinciples:"Planning decisions must be based on material considerations — factors relevant to land use and public interest. For DCs, recent policy has expanded these to include grid capacity, renewable energy contribution, waste heat, water demand, and alignment with national climate targets.",theTest:"Name three material considerations specific to DC planning in Ireland. Answer: Grid impact, waste heat, and DHLGH policy compliance."}},
{term:"EIA",definition:"Large DCs require Environmental Impact Assessment Report — comprehensive environmental effects assessment.",plain:"For large DCs: detailed assessment of noise, air, water, ecology, traffic, visual impact — before permission.",number:"EIA threshold: typically >1 ha or >10,000 m² GFA for DC developments.",standard:"EU EIA Directive 2014/52/EU; SI 296 of 2018",feynman:{analogy:"An EIA is a full health check for a building site — measuring noise, air, water, wildlife, and traffic before a brick is laid, so problems are identified before they become permanent.",firstPrinciples:"Environmental Impact Assessment is mandatory above certain thresholds. For DCs, the trigger is typically site area >1 ha or GFA >10,000 m². The EIAR (report) takes 12–18 months to prepare because it requires baseline surveys across seasons. It covers noise, air quality, hydrology, ecology, visual impact, and traffic.",theTest:"How long does a typical DC EIAR take to prepare? Answer: 12–18 months."}},
{term:"DHLGH DC Policy Statement 2022",definition:"Government policy directing new large GDA DCs to demonstrate positive grid contribution; preferring regional locations.",plain:"Government said: Dublin has enough DCs. New ones must prove they're good grid citizens. Cork, Shannon, Limerick preferred.",number:"No formal moratorium (March 2026), but policy materially increases evidential burden for GDA applications.",standard:"DHLGH Policy Statement on Data Centres 2022",feynman:{analogy:"The government drew a line around Dublin and said: if you want to build a data centre here, you need to prove you are giving back to the grid, not just taking from it.",firstPrinciples:"The DHLGH statement did not impose a formal moratorium but raised the evidential burden for DC planning in the Greater Dublin Area. Applicants must now demonstrate positive grid contribution through demand flexibility, waste heat recovery, or renewable energy generation. This is a material planning consideration.",theTest:"Did the 2022 DHLGH Policy Statement impose a formal moratorium on DCs in Dublin? Answer: No — but it materially increased the evidential burden."}}
,
{term:"CRU/2025236 — Spatial Planning Signal for Data Centres",definition:"The CRU decision includes locational signals: EirGrid and ESB Networks will assess each proposed DC site against local grid capacity and renewable generation proximity. Sites in grid-constrained areas may be refused connection.",plain:"You cannot build a data centre just anywhere in Ireland any more. The CRU now requires the system operators to assess whether the local grid can support the proposed demand. Dublin and Cork are already heavily constrained. Developers may need to look at less obvious locations with grid headroom and proximate renewable generation.",number:"31 March 2026: System Operators publish connection process. < 1 MVA: de-minimis threshold. Grid-constrained areas: Dublin, Cork flagged.",standard:"CRU Decision CRU/2025236 §4 — Locational Signals; EirGrid Grid Development Strategy",feynman:{analogy:"The CRU spatial signal is like a city zoning map for electricity. Just as you cannot build a factory in a residential zone, you may not be able to build a data centre where the grid cannot support it — regardless of planning permission.",firstPrinciples:"Electricity networks have finite capacity at each node. A 50 MW data centre in an area with 30 MW of spare capacity creates a 20 MW deficit that requires new infrastructure. The CRU is shifting this cost signal upstream: instead of approving connections and solving capacity problems later, the system operators will now assess locational feasibility before issuing connection offers.",theTest:"A developer proposes a 30 MW DC in Dublin where the local 110 kV station has 15 MW of spare capacity. What is the likely CRU outcome? Answer: The connection offer may require the developer to fund reinforcement of the 110 kV station, or the application may be deferred until planned network upgrades are complete. The 15 MW shortfall is a material locational constraint."}}],whatItLooksLike:"Planning file: drawings, planning report, EIAR, grid impact assessment, EED Art 26, utilities confirmation, noise/visual/transport assessments.",
siteChecklist:["Determine route: local authority or SID (ABP)","Confirm EIA requirement","Prepare grid impact assessment","Address DHLGH Policy Statement if GDA","Include EED Art 26 in planning file","Irish Water pre-connection enquiry"]},
logic:{causeAndEffect:[
{cause:"DHLGH Policy Statement creates higher evidential burden for GDA DCs",effect:"More detailed scrutiny and potential third-party objections",insight:"DCs proactively addressing the policy — waste heat, flexibility, PPA, community benefit — are better positioned."},
{cause:"EIA requirement means 12–18 months preparation",effect:"Planning programme must allow for full EIAR plus determination plus appeal",insight:"A contested SID application can take 3–5 years from decision to construction."},
{cause:"Planning authorities routinely request grid connection evidence",effect:"Application without TCP reference likely receives an RFI",insight:"Submitting TCP application before or with planning is increasingly a requirement."}
],constraintLesson:"The Irish planning system for large DCs has fundamentally changed since 2020.\nDC developers who don't engage with the planning policy landscape before designing\nproduce applications that don't address the right questions and face preventable delays.",
weakestLink:{whatsWrong:"We'll submit planning when the design is complete.",whatsRight:"Pre-application consultation with ABP before design stage is the most efficient use of time.",howToGetThere:"Planning consultant at inception. Pre-application request. Identify material considerations. Design to address them."}},
rhetoric:{
declan:"Declan — building a large DC in Dublin? Talk to An Coimisiún Pleanála before finalising design. SID applications go directly to ABP. Pre-app consultation tells you what they will ask. Recent refusals have focused on energy demand, visual amenity, and noise. Bring your EirGrid connection assessment, waste heat recovery plan, and noise study to the pre-app. Planning permission without grid connection certainty is increasingly difficult.",
ann:"Ann — planning risk is programme risk. A contested SID application can take 3–5 years to resolve through judicial review. That timeline must be in the investment horizon. For a 7-year fund cycle, spending 3 years in planning means only 4 years of operational revenue. Some funds now structure DC investments with planning risk as a separate phase with distinct return expectations and exit options.",
mark:"Mark — EIA triggers at data centre scale. EIAR scope covers noise, air quality, hydrology, ecology, visual impact, and traffic. Commission baseline surveys at least 12 months before the planning application to capture seasonal variation. Noise is the most common refusal ground for Irish DCs — generator testing and cooling plant produce tonal components that are difficult to mitigate retrospectively. Specify acoustic enclosures at concept design, not as planning conditions.",
sarah:"DHLGH Policy Statement asks DCs to demonstrate positive grid contribution. Waste heat, flexibility, PPA, community benefit — these are planning material considerations.",
tom:"Tom — SID planning application costs: €500k–€1.5M (Tier 3 — RICS NRM1; Irish DC planning programme data, indicative) including EIA, traffic, visual impact, and noise surveys. If appealed (increasingly common for DCs): add €200k–€500k in legal and expert fees (Tier 3 — RICS NRM1; Irish planning legal fee benchmarks, indicative) plus 12–18 months delay. The CRU spatial signals may reduce planning risk in grid-strong locations but increase it in Dublin. Budget for both grant and appeal scenarios."},
scenario:{title:"The GDA Application",narrative:"Developer plans 50 MW IT DC on 10 ha in Clondalkin. Planning consultant says: 'straightforward — industrial use in industrial zone.'",question:"Identify missed material considerations and realistic programme.",answer:"Missed considerations:\n1. SID route: 50 MW/10 ha — direct to ABP, not SDCC\n2. EIA: 10 ha — EIAR required (12–18 months prep)\n3. DHLGH Policy: GDA, 50 MW — must demonstrate grid flexibility, waste heat, PPA\n4. Grid: TCP reference required\n5. Irish Water: cooling water demand\n6. Noise: generator testing near residential\n\nRealistic programme:\n• ABP pre-app: 8–12 weeks\n• EIAR: 12–18 months\n• ABP determination: 12–18 months\n• Appeal risk: 6–18 months\n• Total: 3–5 years to construction start"},
sourceNote:"Planning and Development Act 2000 (T1). DHLGH Policy Statement 2022 (T1). EIA: SI 296/2018 (T1). SID thresholds: current SI (T1).",
  clockQuote:"It's not one clock. That's the point.",
retrofitRelevance:"Expansions crossing SID thresholds require new planning applications.",
crossRefs:[{module:"DC-LEARN-002",level:"L7",topic:"Condenser/heat rejection — noise from cooling towers and dry coolers is a material planning condition"},{module:"DC-LEARN-005",level:"L2",topic:"Diesel generators — generator noise and emissions are planning conditions for new and expanded facilities"}],
cascadeCheck:(kw,racks,pue)=>{
  const itMW = kw;
  const sidThreshold = 50; // MW — Strategic Infrastructure Development
  return {needed:sidThreshold+" MW",available:itMW.toFixed(1)+" MW",unit:"MW",
    pass:itMW<sidThreshold,detail:itMW>=sidThreshold?"SID route via ABP ("+itMW.toFixed(1)+" MW ≥ 50)":"Local authority planning route"};
}},

{id:"L7",level:7,name:"CRREM",icon:"📉",available:true,
component:"Carbon Risk Real Estate Monitor — Misalignment Year and Stranded Asset Risk",
userNeedStatement:"Understand the CRREM methodology for DCs, how to calculate the Misalignment Year, and what it means for asset value.",
plainEnglish:"CRREM shows what year a building's carbon emissions exceed the Paris-aligned pathway. The year it crosses is the CRREM Misalignment Year. Past that year, the asset is on the wrong side of the trajectory — affecting value.",
grammar:{facts:[
{term:"CRREM Pathway",definition:"Science-based decarbonisation pathways showing maximum allowable carbon intensity year-by-year for Paris alignment.",plain:"A line showing how much carbon per square metre a DC is allowed each year. If above the line, you're misaligned.",number:"CRREM 1.5°C for DCs (EU): ~25 kgCO₂/m²/yr in 2025, declining to ~5 by 2050.",standard:"CRREM Foundation v2.01 (2021); July 2025 update",feynman:{analogy:"Like a speed limit that gets lower each year. CRREM shows the maximum carbon per square metre your building is allowed — and the limit drops every year until 2050.",firstPrinciples:"CRREM pathways are science-based trajectories derived from global carbon budgets, allocated to building types by region. They show the maximum allowable carbon intensity (kgCO₂/m²/year) for Paris alignment. A building above the pathway line is misaligned — its emissions exceed what is consistent with limiting warming.",theTest:"What does a CRREM pathway show on the y-axis? Answer: Maximum allowable carbon intensity in kgCO₂/m² per year."}},
{term:"CRREM Misalignment Year",definition:"The year a specific asset's carbon intensity first exceeds the CRREM pathway.",plain:"The year your DC's carbon footprint becomes 'too high.' Before: aligned. After: stranding risk accumulates.",number:"DC with PUE 1.4 on Irish grid: may already be past 1.5°C Misalignment Year. PUE 1.1 + 80% PPA: may not reach it until 2040+.",standard:"CRREM Foundation v2.01; July 2025 — 'Misalignment Year' replaces 'Stranding Year'",feynman:{analogy:"The Misalignment Year is like the date your car fails its emissions test — it is the specific year when your building crosses from compliant to non-compliant on the CRREM trajectory.",firstPrinciples:"The Misalignment Year is where the building's actual or projected carbon intensity curve crosses above the CRREM pathway. Before this year, the asset is aligned. After, stranding risk accumulates. The year depends on PUE, grid carbon factor, renewable energy fraction, and floor area.",theTest:"What determines when a DC hits its CRREM Misalignment Year? Answer: PUE, grid carbon factor, renewable energy fraction, and floor area normalisation."}},
{term:"CRREM Input Data for DCs",definition:"Energy use intensity (kWh/m²/yr), carbon intensity of energy (grid EF + Scope 1), floor area, location.",plain:"How much energy per m², how carbon-intense that energy is, and where. Plot against pathway.",number:"Irish grid: 0.2241 kgCO₂/kWh (SEAI 2026). Generator diesel: 0.268 kgCO₂/kWh. HVO: ~0.027.",standard:"CRREM Foundation v2.01; SEAI Emission Factors 2026",feynman:{analogy:"To plot your position on CRREM, you need three things: how much energy you use per square metre, how dirty that energy is, and where you are. Like checking your speed, your fuel type, and the local speed limit.",firstPrinciples:"CRREM requires energy use intensity (metered kWh/m²/year), carbon intensity of energy supply (grid emission factor plus any Scope 1), and building location. The Irish grid factor is 0.2241 kgCO₂/kWh (SEAI 2026). Generator diesel adds 0.268 kgCO₂/kWh. These inputs determine where you sit relative to the pathway.",theTest:"What is the SEAI 2026 grid emission factor for Ireland? Answer: 0.2241 kgCO₂/kWh."}},
{term:"Terminology Update",definition:"CRREM Foundation updated July 2025: 'CRREM Misalignment Year' — not 'Stranding Year.'",plain:"CRREM tells when misaligned. Whether that leads to stranding depends on market conditions. 'Misalignment Year' is precise.",number:"All LBE tools: use 'CRREM Misalignment Year' exclusively.",standard:"CRREM Foundation update July 2025",feynman:{analogy:"Like renaming 'failing' to 'not yet meeting standards' — CRREM changed from 'Stranding Year' to 'Misalignment Year' because stranding depends on market conditions, but misalignment is a measurable fact.",firstPrinciples:"The CRREM Foundation updated terminology in July 2025. 'Misalignment Year' is precise — it describes the point where emissions exceed the pathway. 'Stranding' implies market consequence, which depends on investor behaviour, regulation, and geography. The terminology change separates the physical fact from the commercial interpretation.",theTest:"What term replaced 'Stranding Year' in the July 2025 CRREM update? Answer: 'CRREM Misalignment Year.'"}}
,
{term:"CRREM v2.01 — Excel Tool Retirement and Open-Access Transition",definition:"The CRREM Foundation retired the EU-Project Excel Tool in 2025 and transitioned to open-access Pathway Datasets and a Calculation Library. The underlying science and methodology are unchanged — only the delivery format has changed.",plain:"CRREM used to be a spreadsheet you downloaded. Now the data is published as open-access datasets that can be integrated into portfolio management platforms. The Misalignment Year calculation methodology is documented separately for anyone to implement.",number:"v2.01: current pathway version. 2025: Excel Tool retirement. Open-access datasets at crrem.org.",standard:"CRREM Foundation — Pathway Dataset & Calculation Library (2025)",feynman:{analogy:"CRREM retiring the Excel Tool is like a map publisher stopping paper maps and publishing all data as a digital API. The geography has not changed. But now navigation apps can integrate the data directly, serving millions of users instead of individual map readers.",firstPrinciples:"CRREM's value is the science-based decarbonisation pathway, not the spreadsheet interface. By publishing raw datasets separately, CRREM enables institutional investors to embed Misalignment Year calculations into portfolio analytics at scale. This transition reflects market maturity — multiple commercial platforms now offer CRREM integration.",theTest:"A fund manager used the CRREM Excel Tool for 3 years. After retirement, can they still calculate Misalignment Years? Answer: Yes — pathways, emission factors, and calculation rules are published open-access. They can build their own tool or use a platform with CRREM integration."}}],whatItLooksLike:"CRREM analysis: chart of DC carbon intensity vs pathway, Misalignment Year, carbon gap, sensitivity analysis showing how improvements move the Misalignment Year.",
siteChecklist:["Calculate energy use intensity: annual kWh ÷ floor area","Calculate carbon intensity: (Scope 1 + Scope 2 market-based) ÷ floor area","Identify CRREM pathway for DC type and location","Plot against pathway — identify Misalignment Year","Sensitivity: PUE improvement and/or PPA impact","Use 'CRREM Misalignment Year' — not 'Stranding Year'"]},
logic:{causeAndEffect:[
{cause:"Irish grid decarbonisation improving CRREM position passively",effect:"DCs with no active programme may still see Misalignment Year move forward as grid cleans",insight:"Irish DCs have a structural advantage. 0.2241 kgCO₂/kWh is already low by EU standards and declining."},
