<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DC-TOOL-003 v1.0.0 | Redundancy Gap Tool | Legacy Business Engineers</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* === THEME VARIABLES (inherited from DC-LEARN Canonical Architecture v1.1) === */
:root,[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--panel:#1c2333;
  --border:#30363d;--border-light:#484f58;
  --text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;
  --accent:#58a6ff;--accent2:#79c0ff;--success:#3fb950;--warn:#d29922;--error:#f85149;
  --lbe-green:#4a7c59;--dc-black:#1a1a1a;
  --green:#22c55e;--green-dim:rgba(34,197,94,0.15);--green-glow:rgba(34,197,94,0.3);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);--amber-glow:rgba(245,158,11,0.3);
  --font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;
}
[data-theme="light"]{
  --bg:#ffffff;--surface:#f6f8fa;--panel:#f0f2f5;
  --border:#d0d7de;--border-light:#afb8c1;
  --text:#1f2328;--text-bright:#000;--text-dim:#57606a;--text-muted:#8b949e;
  --accent:#0969da;--accent2:#0550ae;--success:#1a7f37;--warn:#9a6700;--error:#cf222e;
  --lbe-green:#3a6147;--dc-black:#1a1a1a;
  --green:#16a34a;--green-dim:rgba(22,163,74,0.1);--green-glow:rgba(22,163,74,0.2);
  --red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);
  --amber:#d97706;--amber-dim:rgba(217,119,6,0.08);--amber-glow:rgba(217,119,6,0.15);
}

/* === BASE === */
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* === HEADER === */
header{background:var(--dc-black);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--lbe-green)}
header img{height:40px;width:40px;border-radius:50%}
header h1{font-size:18px;font-weight:700;color:#fff;flex:1}
header .sub{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
.theme-toggle{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}

/* === LAYOUT === */
.main{max-width:900px;margin:0 auto;padding:24px 16px}

/* === TABS === */
.tab-row{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab-btn{background:transparent;border:none;color:var(--text-dim);padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-sans);transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text-bright);border-bottom-color:var(--green)}

/* === CARDS === */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;color:var(--text-bright);margin-bottom:8px}

/* === FORM === */
.input-group{margin-bottom:16px}
.input-label{display:block;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:4px;font-family:var(--font-mono)}
.input-field{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px}
.input-field:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(88,166,255,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--text-muted);margin-top:2px}
select.input-field{appearance:auto}

/* === BUTTONS === */
.run-btn{background:var(--lbe-green);color:#fff;border:none;padding:12px 32px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:var(--font-sans);transition:opacity .2s}
.run-btn:hover{opacity:0.9}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* === RESULTS === */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.traffic-light{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px;vertical-align:middle}
.tl-green{background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.tl-amber{background:var(--amber);box-shadow:0 0 6px var(--amber-glow)}
.tl-red{background:var(--red);box-shadow:0 0 6px var(--red-glow)}
.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px}
.status-pass{background:var(--green-dim);color:var(--green)}
.status-flag{background:var(--amber-dim);color:var(--amber)}
.status-fail{background:var(--red-dim);color:var(--red)}
.tier-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;font-family:var(--font-mono);vertical-align:middle}
.tier-1{background:var(--green-dim);color:var(--green)}
.tier-2{background:rgba(88,166,255,0.15);color:var(--accent)}
.tier-3{background:var(--amber-dim);color:var(--amber)}
.tier-4{background:var(--red-dim);color:var(--red)}

/* === CAVEAT === */
.caveat-box{background:var(--amber-dim);border:1px solid var(--amber);border-radius:6px;padding:12px 16px;margin:16px 0;font-size:13px;color:var(--text)}

/* === PERSONA === */
.persona-lens{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.persona-name{font-weight:700;font-size:14px;color:var(--text-bright)}
.persona-role{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}

/* === CONFIDENCE === */
.confidence-bar{height:8px;border-radius:4px;background:var(--panel);overflow:hidden;margin-top:4px;display:flex}
.confidence-fill{height:100%;transition:width 0.5s}
.conf-t1{background:var(--green)}
.conf-t2{background:var(--accent)}
.conf-t3{background:var(--amber)}
.conf-t4{background:var(--red)}
.conf-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.conf-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim)}
.conf-dot{width:8px;height:8px;border-radius:50%}

/* === LOADING === */
.loading-container{text-align:center;padding:48px 20px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:14px;color:var(--text-dim);margin-top:8px;font-family:var(--font-mono)}

/* === SIGN-OFF === */
.signoff{border-top:2px solid var(--lbe-green);padding-top:16px;margin-top:24px}
.signoff-name{font-weight:700;font-size:15px;color:var(--text-bright)}
.signoff-title{font-size:13px;color:var(--text-dim)}
.signoff-pi{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:4px}

/* === SOFT CTA === */
.soft-cta{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-top:24px;text-align:center}
.soft-cta p{font-size:14px;color:var(--text-dim);margin-bottom:8px}
.soft-cta a{color:var(--lbe-green);font-weight:600}

/* === FOOTER === */
.nav-footer{text-align:center;padding:24px 16px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:32px}

/* === ERROR === */
.error-box{background:var(--red-dim);border:1px solid var(--red);border-radius:6px;padding:12px 16px;margin:16px 0;font-size:13px;color:var(--text)}

/* === PRINT === */
@media print{
  .no-print{display:none!important}
  body{background:#fff;color:#000}
  header{background:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .result-card,.card,.persona-lens{border:1px solid #ccc;break-inside:avoid}
  .caveat-box{background:#fff3cd;border:1px solid #d29922;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .status-pass,.status-flag,.status-fail,.tier-badge,.tl-green,.tl-amber,.tl-red{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* === RESPONSIVE === */
@media(max-width:768px){
  header{padding:12px 16px}
  header h1{font-size:15px}
  .main{padding:16px 12px}
  .tab-btn{padding:8px 12px;font-size:13px}
  .btn-row{flex-direction:column}
  .metric-row{flex-direction:column}
}

/* === A+ INPUT SECTIONS === */
.input-section{margin-bottom:24px}
.input-section-header{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:16px;font-family:var(--font-mono)}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
@media(max-width:600px){.input-grid{grid-template-columns:1fr}}
.input-field.invalid{border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.field-error{font-size:11px;color:var(--red);margin-top:2px}
.confirm-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;margin:20px 0}
.confirm-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)}
.confirm-row:last-child{border-bottom:none}
.confirm-label{color:var(--text-dim)}
.confirm-value{color:var(--text-bright);font-family:var(--font-mono);font-weight:500}
.confirm-missing{color:var(--amber);font-style:italic}

/* === A+ METRIC CARDS === */
.metric-row{display:flex;gap:12px;margin-bottom:20px}
.metric-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.metric-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-family:var(--font-mono);margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700;color:var(--text-bright)}
.metric-sub{font-size:12px;color:var(--text-dim);margin-top:4px}

/* === A+ FINDINGS CHART === */
.findings-chart{margin:20px 0}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{width:140px;font-size:12px;color:var(--text-dim);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-track{flex:1;height:24px;background:var(--panel);border-radius:4px;overflow:hidden;position:relative}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px}
.chart-bar-fill span{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.bar-pass{background:var(--green)}
.bar-flag{background:var(--amber)}
.bar-fail{background:var(--red)}

/* === A+ FINDING CARD === */
.finding-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px;border-left:4px solid var(--border)}
.finding-card.f-pass{border-left-color:var(--green)}
.finding-card.f-flag{border-left-color:var(--amber)}
.finding-card.f-fail{border-left-color:var(--red)}

/* === A+ DONUT CHART === */
.donut-container{display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center}
.donut-legend{display:flex;flex-direction:column;gap:10px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.donut-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.donut-legend-count{font-family:var(--font-mono);font-weight:600;color:var(--text-bright);min-width:24px}

/* === A+ PROGRESS STEPS === */
.progress-steps{display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto}
.progress-step{display:flex;align-items:center;gap:12px;font-size:14px}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid var(--border);color:var(--text-muted)}
.step-icon.done{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.step-icon.active{border-color:var(--accent);color:var(--accent);animation:pulse-step 1.5s infinite}
.step-label{color:var(--text-dim)}
.step-label.active{color:var(--text-bright);font-weight:500}
.step-label.done{color:var(--text)}
@keyframes pulse-step{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>

/* ================================================================

   ================================================================ */
function buildUserPrompt(inputs){
  let lines = ['Conduct a screening assessment for the following facility:\n'];
  INPUT_SCHEMA.forEach(field => {
    const val = inputs[field.id];
    if(val !== undefined && val !== null && val !== ''){
      const unitStr = field.unit ? ' '+field.unit : '';
      lines.push(`${field.label}: ${val}${unitStr}`);
    }
  });
  lines.push('\nAssess against all relevant Irish and EU regulatory thresholds.');
  lines.push('Provide findings for at least 5 assessment areas.');
  lines.push('Include persona perspectives for all 5 personas.');
  return lines.join('\n');
}

/* ================================================================
   HELPER: Parse AI response
   ================================================================ */
function parseAIResponse(data){
  // Check for truncation (stop_reason === 'max_tokens')
  const truncated = data.stop_reason === 'max_tokens' || data.stop_reason === 'end_turn' ? false :
                    data.stop_reason === 'max_tokens';
  const wasTruncated = data.stop_reason === 'max_tokens';

  const text = data.content
    .filter(item => item.type === 'text')
    .map(item => item.text)
    .join('');

  if(wasTruncated){
    return { parsed: null, raw: text, error: 'Response was truncated (max_tokens reached). The screening produced too much detail. Try again — if this persists, contact LM.' };
  }

  // Strategy 1: strip markdown fences and parse
  const stripped = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try { return { parsed: JSON.parse(stripped), raw: text }; } catch(e) {}

  // Strategy 2: find outermost { ... } block
  const first = text.indexOf('{');
  const last = text.lastIndexOf('}');
  if(first !== -1 && last > first){
    const block = text.substring(first, last + 1);
    try { return { parsed: JSON.parse(block), raw: text }; } catch(e) {}
  }

  // Strategy 3: failed — return raw for debugging
  return { parsed: null, raw: text, error: 'Could not parse screening results as JSON.' };
}

/* ================================================================
   HELPER: Traffic light class
   ================================================================ */
function tlClass(status){
  if(!status) return '';
  const s = status.toUpperCase();
  if(s === 'GREEN' || s === 'PASS') return 'tl-green';
  if(s === 'AMBER' || s === 'FLAG') return 'tl-amber';
  return 'tl-red';
}
function statusClass(status){
  if(!status) return '';
  const s = status.toUpperCase();
  if(s === 'PASS') return 'status-pass';
  if(s === 'FLAG') return 'status-flag';
  return 'status-fail';
}
function tierClass(tier){
  if(!tier) return 'tier-3';
  const t = tier.replace('T','');
  return 'tier-'+t;
}

function InputTab({ inputs, setInputs, onRun, loading }){
  const [showConfirm, setShowConfirm] = useState(false);
  const [touched, setTouched] = useState({});

  const handleChange = (id, value) => {
    setInputs(prev => ({...prev, [id]: value}));
    setTouched(prev => ({...prev, [id]: true}));
  };
  const loadDemo = () => { setInputs({...DEMO_DATA}); setTouched({}); setShowConfirm(false); };
  const handleExport = () => {
    const blob = new Blob([JSON.stringify(inputs, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${TOOL_ID}_inputs.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const handleImport = () => {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
    inp.onchange = e => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => { try { setInputs(prev => ({...prev, ...JSON.parse(ev.target.result)})); } catch(err){ alert('Invalid JSON'); } };
      reader.readAsText(file);
    }; inp.click();
  };

  const missingRequired = INPUT_SCHEMA.filter(f => f.required).filter(f => {
    const v = inputs[f.id]; return v === undefined || v === null || v === '';
  });
  const allValid = missingRequired.length === 0;
  const filledCount = INPUT_SCHEMA.filter(f => { const v = inputs[f.id]; return v !== undefined && v !== null && v !== ''; }).length;

  const SECTIONS = [
    { title: 'Facility Identity', ids: ['facility_name','location','build_year'] },
    { title: 'Power Supply', ids: ['it_load_mw','mic_kva','voltage_kv','supply_feeds','transformer_config','msb_config'] },
    { title: 'UPS & Backup', ids: ['redundancy_level','ups_config','ups_battery_age','generator_count','generator_fuel','fuel_autonomy_hrs'] },
    { title: 'Cooling', ids: ['rack_count','pue','cooling_type','cooling_redundancy'] },
    { title: 'Commercial', ids: ['target_tier','ppa_pct','hall_config','total_floor_m2'] }
  ];

  const renderField = (field) => {
    const isEmpty = field.required && touched[field.id] && (inputs[field.id] === undefined || inputs[field.id] === null || inputs[field.id] === '');
    return (
      <div className="input-group" key={field.id}>
        <label className="input-label">
          {field.label}{field.unit ? ` (${field.unit})` : ''}{field.required ? ' *' : ''}
        </label>
        {field.type === 'select' ? (
          <select className={'input-field' + (isEmpty ? ' invalid' : '')} value={inputs[field.id] || ''}
            onChange={e => handleChange(field.id, e.target.value)}>
            <option value="">— Select —</option>
            {(field.options||[]).map(opt => {
              const val = typeof opt === 'object' ? opt.value : opt;
              const lab = typeof opt === 'object' ? opt.label : opt;
              return <option key={val} value={val}>{lab}</option>;
            })}
          </select>
        ) : (
          <input className={'input-field' + (isEmpty ? ' invalid' : '')}
            type={field.type === 'number' ? 'number' : 'text'}
            value={inputs[field.id] !== undefined && inputs[field.id] !== null ? inputs[field.id] : ''}
            onChange={e => handleChange(field.id, field.type==='number' ? (e.target.value==='' ? '' : Number(e.target.value)) : e.target.value)}
            min={field.min} max={field.max} step={field.step} placeholder={field.hint} />
        )}
        {isEmpty && <div className="field-error">Required</div>}
        {!isEmpty && field.hint && <div className="input-hint">{field.hint}</div>}
      </div>
    );
  };

  const handleRunClick = () => {
    if(!allValid){
      const t = {}; INPUT_SCHEMA.filter(f=>f.required).forEach(f => t[f.id] = true);
      setTouched(prev => ({...prev, ...t}));
      return;
    }
    setShowConfirm(true);
  };

  if(showConfirm){
    return (
      <div>
        <div className="confirm-panel">
          <h2 style={{fontSize:16,fontWeight:700,color:'var(--text-bright)',marginBottom:16}}>Confirm Screening</h2>
          <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>
            {filledCount} of {INPUT_SCHEMA.length} fields provided. Fields marked "estimated" will reduce confidence score.
          </p>
          {INPUT_SCHEMA.map(f => {
            const v = inputs[f.id];
            const hasVal = v !== undefined && v !== null && v !== '';
            return (
              <div className="confirm-row" key={f.id}>
                <span className="confirm-label">{f.label}</span>
                {hasVal ? (
                  <span className="confirm-value">{v}{f.unit ? ' '+f.unit : ''}</span>
                ) : (
                  <span className="confirm-missing">not provided</span>
                )}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:12}}>
          <button className="btn-secondary" style={{flex:1}} onClick={() => setShowConfirm(false)}>Edit Inputs</button>
          <button className="run-btn" style={{flex:2}} onClick={() => { setShowConfirm(false); onRun(); }}>
            Run Screening Assessment
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="btn-row no-print">
        <button className="btn-secondary" onClick={loadDemo}>Load Demo (Clonshaugh)</button>
        <button className="btn-secondary" onClick={handleImport}>Import JSON</button>
        <button className="btn-secondary" onClick={handleExport}>Export JSON</button>
      </div>
      {SECTIONS.map(sec => (
        <div className="input-section" key={sec.title}>
          <div className="input-section-header">{sec.title}</div>
          <div className="input-grid">
            {sec.ids.map(id => {

        <div style={{textAlign:'center',marginTop:8,fontSize:13,color:'var(--red)'}}>
          {missingRequired.length} required field{missingRequired.length > 1 ? 's' : ''} missing
        </div>
      )}
    </div>
  );
}

          <div className="metric-value" style={{fontSize:15}}>
            {(result.decision_gate || '').replace(/_/g,' ')}
          </div>
          <div className="metric-sub">Decision gate</div>
        </div>
      </div>

      {/* Executive Summary */}
      <div className="result-card">
        <h3 style={{marginBottom:10,fontSize:15}}>Executive Summary</h3>
        <p style={{lineHeight:1.8,fontSize:14}}>{result.executive_summary}</p>
      </div>

      {/* Caveat */}
      <div className="caveat-box">
        This screening assessment does not constitute a design deliverable or compliance determination.
        All cost figures are indicative and screening-level, based on the data provided. Findings
        should be validated through a Desktop Assessment before any investment or procurement decision.
      </div>

      {/* Findings Chart */}
      {findings.length > 0 && (
        <div className="card">
          <h2>Findings Overview</h2>
          <div className="findings-chart">
            {findings.map((f, i) => {
              const barClass = f.status === 'PASS' ? 'bar-pass' : f.status === 'FAIL' ? 'bar-fail' : 'bar-flag';
              const w = f.status === 'PASS' ? 33 : f.status === 'FAIL' ? 100 : 66;
              return (
                <div className="chart-bar-row" key={i}>
                  <div className="chart-bar-label" title={f.area}>{f.area}</div>
                  <div className="chart-bar-track">
                    <div className={'chart-bar-fill '+barClass} style={{width:w+'%'}}>
                      <span>{f.status}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Detailed Findings */}
      {findings.map((f, i) => (
        <div className={'finding-card' + (f.status === 'PASS' ? ' f-pass' : f.status === 'FAIL' ? ' f-fail' : ' f-flag')} key={i}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span className={'status-badge '+statusClass(f.status)}>{f.status}</span>
            <span style={{fontWeight:600,color:'var(--text-bright)',fontSize:15,flex:1}}>{f.area}</span>
            <span className={'tier-badge '+tierClass(f.tier)}>{f.tier}</span>
          </div>
          <p style={{marginBottom:10,lineHeight:1.7,fontSize:14}}>{f.detail}</p>
          {f.implication && (
            <div style={{background:'var(--panel)',borderRadius:6,padding:'10px 14px',marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Implication</span>
              <p style={{fontSize:13,color:'var(--text)',marginTop:4,lineHeight:1.6}}>{f.implication}</p>
            </div>
          )}
          {f.indicative_action && (
            <p style={{color:'var(--text-dim)',fontSize:13,marginBottom:6}}>
              <strong style={{color:'var(--accent)'}}>Investigate:</strong> {f.indicative_action}
            </p>
          )}
          {f.cost_range && (
            <p style={{fontSize:13,color:'var(--warn)',fontFamily:'var(--font-mono)'}}>
              Indicative cost: {f.cost_range}
            </p>
          )}
          {f.source && (
            <p style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginTop:6}}>
              Source: {f.source}
            </p>
          )}
        </div>
      ))}

      {/* Persona Perspectives */}
      {result.persona_views && (
        <div className="card">
          <h2>Stakeholder Perspectives</h2>
          {Object.entries(PERSONAS).map(([key, p]) => (
            result.persona_views[key] ? (
              <div className="persona-lens" key={key}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:18}}>{p.icon}</span>
                  <span className="persona-name">{p.name}</span>
                  <span className="persona-role">{p.role}</span>
                </div>
                <p style={{fontSize:13,lineHeight:1.6,color:'var(--text)'}}>{result.persona_views[key]}</p>
              </div>
            ) : null
          ))}
        </div>
      )}

      {/* Sign-off */}
      <div className="signoff">
        <div className="signoff-name">Les Murphy CEng MIEI</div>
        <div className="signoff-title">Independent Technical Advisor</div>
        <div className="signoff-title">Legacy Business Engineers Ltd</div>
        <div className="signoff-pi">PI Insurance: confirmed</div>
      </div>

      {/* CTA */}
      <div className="soft-cta">
        <p>Need a Desktop Assessment (€10,000–€15,000) or Disposal Analysis (€8,000–€12,000)?</p>
        <a href="mailto:info@legacybe.ie">info@legacybe.ie</a>
        <span style={{margin:'0 8px',color:'var(--text-muted)'}}>|</span>
        <a href="https://legacybe.ie" target="_blank" rel="noopener">legacybe.ie</a>
      </div>
    </div>
  );
}

/* ================================================================
   COMPONENT: ConfidenceTab
   ================================================================ */
function ConfidenceTab({ result, inputs }){
  if(!result) return (
    <div className="card" style={{textAlign:'center',padding:48}}>
      <div style={{fontSize:32,marginBottom:12}}>🎯</div>
      <div style={{fontSize:16,color:'var(--text-dim)'}}>Run a screening to see confidence breakdown</div>
    </div>
  );

  const [highlight, setHighlight] = useState(null);
  const dataPoints = [];
  INPUT_SCHEMA.forEach(field => {
    const val = inputs[field.id];
    if(val !== undefined && val !== null && val !== '')
      dataPoints.push({ name: field.label, value: val + (field.unit ? ' '+field.unit : ''), source: 'User input', tier: 'T1' });
  });
  Object.entries(CANONICAL_DATA).forEach(([key, cd]) => {
    dataPoints.push({ name: key.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()), value: cd.value + ' ' + cd.unit, source: cd.source, tier: cd.tier });
  });
  const counts = { T1:0, T2:0, T3:0, T4:0 };
  dataPoints.forEach(dp => { counts[dp.tier] = (counts[dp.tier]||0) + 1; });
  const total = dataPoints.length;
  const score = total > 0 ? Math.round((counts.T1*4+counts.T2*3+counts.T3*2+counts.T4*1)/(total*4)*100) : 0;
  const verifiedPct = total > 0 ? Math.round((counts.T1+counts.T2)/total*100) : 0;

  const R=70, CX=90, CY=90, SW=20, circ=2*Math.PI*R;
  const tiers=[
    {key:'T1',color:'var(--green)',label:'T1 Statutory',count:counts.T1},
    {key:'T2',color:'var(--accent)',label:'T2 Published',count:counts.T2},
    {key:'T3',color:'var(--amber)',label:'T3 Industry',count:counts.T3},
    {key:'T4',color:'var(--red)',label:'T4 Estimated',count:counts.T4}
  ];
  let off=0;
  const arcs=tiers.filter(t=>t.count>0).map(t=>{
    const pct=t.count/total, dash=circ*pct;
    const a={...t,dasharray:`${dash} ${circ-dash}`,offset:-off}; off+=dash; return a;
  });

  return (
    <div>
      <div className="card">
        <h2>Data Confidence Score</h2>
        <div className="donut-container">
          <div style={{position:'relative',width:180,height:180}}>
            <svg viewBox="0 0 180 180" width="180" height="180">
              <circle cx={CX} cy={CY} r={R} fill="none" stroke="var(--panel)" strokeWidth={SW}/>
              {arcs.map((a,i)=>(
                <circle key={i} cx={CX} cy={CY} r={R} fill="none" stroke={a.color} strokeWidth={SW}
                  strokeDasharray={a.dasharray} strokeDashoffset={a.offset}
                  style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'all 0.4s',
                    opacity:highlight&&highlight!==a.key?0.3:1,cursor:'pointer'}}
                  onMouseEnter={()=>setHighlight(a.key)} onMouseLeave={()=>setHighlight(null)}/>
              ))}
            </svg>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
              <div style={{fontSize:28,fontWeight:700,color:'var(--text-bright)'}}>{score}%</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>confidence</div>
            </div>
          </div>
          <div className="donut-legend">
            {tiers.map(t=>(
              <div className="donut-legend-item" key={t.key}
                style={{opacity:highlight&&highlight!==t.key?0.4:1,cursor:'pointer'}}
                onMouseEnter={()=>setHighlight(t.key)} onMouseLeave={()=>setHighlight(null)}>
                <span className="donut-legend-dot" style={{background:t.color}}></span>
                <span className="donut-legend-count">{t.count}</span>
                <span style={{color:'var(--text-dim)'}}>{t.label}</span>
              </div>
            ))}
          </div>
        </div>
        <p style={{fontSize:13,color:'var(--text-dim)',marginTop:20,lineHeight:1.6,textAlign:'center'}}>
          {verifiedPct}% of data points are verified (T1/T2).
          {counts.T3+counts.T4>0?` ${counts.T3+counts.T4} data point${counts.T3+counts.T4>1?'s':''} at T3/T4 — validate with site data before any investment decision.`:''}
        </p>
      </div>
      <div className="card">
        <h2>Data Points ({total})</h2>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{borderBottom:'2px solid var(--border)'}}>
                {['Data Point','Value','Source','Tier'].map(h=>(
                  <th key={h} style={{textAlign:h==='Tier'?'center':'left',padding:'8px 12px',color:'var(--text-muted)',fontFamily:'var(--font-mono)',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.5px'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {dataPoints.map((dp,i)=>(
                <tr key={i} style={{borderBottom:'1px solid var(--border)',
                  background:highlight===dp.tier?'var(--panel)':'transparent',
                  opacity:highlight&&highlight!==dp.tier?0.4:1,transition:'all 0.2s'}}>
                  <td style={{padding:'8px 12px',color:'var(--text)'}}>{dp.name}</td>
                  <td style={{padding:'8px 12px',color:'var(--text-bright)',fontFamily:'var(--font-mono)'}}>{dp.value}</td>
                  <td style={{padding:'8px 12px',color:'var(--text-dim)'}}>{dp.source}</td>
                  <td style={{padding:'8px 12px',textAlign:'center'}}><span className={'tier-badge '+tierClass(dp.tier)}>{dp.tier}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {result.data_quality_notes && (
        <div className="caveat-box"><strong>Data Quality Notes:</strong> {result.data_quality_notes}</div>
      )}
    </div>
  );
}

/* ================================================================
   COMPONENT: App
   ================================================================ */
function App(){
  const [theme, setTheme] = useState('dark');
  const [activeTab, setActiveTab] = useState('input');
  const [inputs, setInputs] = useState({});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);
  const [rawResponse, setRawResponse] = useState(null);

  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    document.documentElement.setAttribute('data-theme', next);
  };

  const runScreening = async () => {
    setLoading(true);
    setError(null);
    setResult(null);
    setRawResponse(null);
    setActiveTab('analysis');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8000,
          system: DOMAIN_PROMPT,
          messages: [{ role: 'user', content: buildUserPrompt(inputs) }]
        })
      });

      if(!response.ok){
        const errText = await response.text().catch(() => '');
        setRawResponse(errText || `HTTP ${response.status} ${response.statusText}`);
        throw new Error(`API error: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();
      const { parsed, raw, error: parseError } = parseAIResponse(data);
      setRawResponse(raw);

      if(parsed){
        setResult(parsed);
      } else {
        setError(parseError || 'Analysis completed but output format was unexpected. See raw response below.');
      }

    } catch(err) {
      if(!err.message?.startsWith('API error')){
        setError(err.message || 'Screening failed. Check your connection and try again.');
      } else {
        setError(err.message);
      }
    } finally {
      setLoading(false);
    }
  };

  const TABS = [
    { id:'input',      label:'📋 Input' },
    { id:'analysis',   label:'🔍 Analysis' },
    { id:'report',     label:'📊 Report' },
    { id:'confidence', label:'🎯 Confidence' }
  ];

  return (
    <div>
      <header>
        <img src={LOGO_SRC} alt="LBE" />
        <div style={{flex:1}}>
          <h1>{TOOL_NAME}</h1>
          <div className="sub">{TOOL_ID} v{TOOL_VERSION} | Legacy Business Engineers</div>
        </div>
        <button className="theme-toggle no-print" onClick={toggleTheme}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
      </header>

      <div className="main">
        <div className="tab-row no-print">
          {TABS.map(tab => (
            <button
              key={tab.id}
              className={'tab-btn' + (activeTab === tab.id ? ' active' : '')}
              onClick={() => setActiveTab(tab.id)}
            >
              {tab.label}
            </button>
          ))}
        </div>

        {activeTab === 'input' && (
          <InputTab inputs={inputs} setInputs={setInputs} onRun={runScreening} loading={loading} />
        )}
        {activeTab === 'analysis' && (
          <AnalysisTab loading={loading} error={error} result={result} rawResponse={rawResponse} />
        )}
        {activeTab === 'report' && (
          <ReportTab result={result} inputs={inputs} />
        )}
        {activeTab === 'confidence' && (
          <ConfidenceTab result={result} inputs={inputs} />
        )}

        <div className="nav-footer no-print">
          <div>Generated by {TOOL_ID} v{TOOL_VERSION}</div>
          <div style={{marginTop:4}}>© 2026 Legacy Business Engineers Ltd | <a href="https://legacybe.ie">legacybe.ie</a></div>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   RENDER
   ================================================================ */
ReactDOM.render(
  <ErrorBoundary><App /></ErrorBoundary>,
  document.getElementById('root')
);
</script>
</body>
