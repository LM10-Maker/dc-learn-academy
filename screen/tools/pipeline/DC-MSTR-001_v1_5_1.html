function Tip({meaning,typical,source,warning}) {
  return (
    <span className="tip-wrap">
      <span className="tip-icon">ⓘ</span>
      <span className="tip-box">
        <div><strong>Meaning:</strong> {meaning}</div>
        {typical && <div style={{marginTop:4}}><strong>Typical:</strong> {typical}</div>}
        {source && <div style={{marginTop:4}}><strong>Source:</strong> {source}</div>}
        {warning && <div style={{marginTop:4,color:'#fbbf24'}}><strong>⚠ {warning}</strong></div>}
      </span>
    </span>
  );
}

function JE({title, children}) {
  const [open, setOpen] = useState(false);
  return (
    <div className="je">
      <div className="je-head" onClick={() => setOpen(!open)}>
        <span className="je-title">📘 {title}</span>
        <span className="je-arrow">{open ? '▼' : '▶'}</span>
      </div>
      {open && <div className="je-body">{children}</div>}
    </div>
  );
}

function Field({label, tip, required, children}) {
  return (
    <div className="field">
      <label className="field-label">
        {label} {required && <span className="text-red-500">*</span>}
        {tip && <Tip {...tip} />}
      </label>
      {children}
    </div>
  );
}

      t.push({c:"red",icon:"⚠️",
        title:`Direct liquid cooling mandatory — ${calc.r} kW/rack + ${calc.g}% GPU`,
        body:`At ${calc.r} kW/rack with ${calc.g}% GPU workload, air cooling cannot physically remove the heat (air has ¼ the heat capacity of water above ~40 kW/rack). DLC (rear-door heat exchangers, cold plates, or immersion) is mandatory. Estimated cooling capex premium: ~${fmt(dlcPremium)} (+15-25%), offset by PUE improvement of ~0.03-0.04 saving ~${fmtM(pueSaving)}/yr. Requires CDU infrastructure, facility water loops, and rack-level plumbing from Phase 1. Action: Commission S4-A Site Feasibility Study to validate DLC infrastructure requirements before planning application.`,
        ref:"ASHRAE TC 9.9:2021 Table 3 (thermal density limits), OCP Thermal Design Guide v2.0, EN 50600-2-3 Clause 6.4"});
    }
    // 2b. DLC RECOMMENDED
    else if (calc.dlcRec) {
      const gpuRackCost = calc.gpuRacks * 3500; // ~€3.5k/rack for rear-door HX
      t.push({c:"amber",icon:"💡",
        title:`Liquid cooling recommended for ${calc.gpuRacks.toLocaleString()} GPU racks`,
        body:`${calc.g}% GPU at ${calc.r} kW/rack is approaching the air cooling ceiling (~25-30 kW with hot-aisle containment). Rear-door heat exchangers on GPU racks (~${fmt(gpuRackCost)} for ${calc.gpuRacks} racks) reduce PUE cooling contribution by 0.02-0.04 and provide headroom for future density increases. If GPU % or rack density grows, DLC becomes mandatory — designing water infrastructure now avoids costly retrofit. Action: Include DLC-ready piping risers in Phase 1 base build specification.`,
        ref:"ASHRAE TC 9.9:2021, OCP Thermal Design Guide v2.0, EN 50600-2-3 Clause 6.4"});
    }

    // 3. EPA IE LICENCE — regulatory timeline risk
    if (calc.epaTrigger) {
      const genThermalMW = calc.genCapMW * 0.8;
      t.push({c:"red",icon:"📋",
        title:`EPA IE licence required — ${genThermalMW.toFixed(0)} MW thermal exceeds 50MW threshold`,
        body:`Generator farm at ~${calc.genCapMW.toFixed(0)} MW capacity produces ~${genThermalMW.toFixed(0)} MW thermal input, exceeding the 50MW Industrial Emissions Directive threshold. This triggers a full IE licence application: budget 12-18 months lead time, €80-150k in application/consultant fees, and annual compliance reporting. Consider HVO-ready (EN 15940) generators — EPA is increasingly requiring biofuel capability as a licence condition for new DCs. HVO reduces CO₂ by ~90% during generator operation (typically <100 hrs/yr). Action: Engage EPA pre-application consultation at RIBA Stage 1 to de-risk the planning timeline.`,
        ref:"EPA IE Directive 2010/75/EU, S.I. No. 138/2013 Schedule 1 Class 1.1, EPA BAT Guidance Note LC-AD-5"});
    }

    // 4. WATER RESTRICTION — planning constraint
    if (waterR && coolStrat!=="dry") {
      const puePenalty = 0.015;
      const penaltyCost = puePenalty * calc.m * 8760 * elecRate * 1000;
      t.push({c:"red",icon:"🚰",
        title:`Water restriction: dry cooling only — adds ~${fmt(penaltyCost)}/yr to energy costs`,
        body:`Water-restricted planning condition eliminates evaporative and adiabatic cooling strategies. Only dry cooler + free cooling achieves WUE 0.0 L/kWh. PUE penalty: +0.01-0.02 vs adiabatic (~${fmt(penaltyCost)}/yr at ${calc.m} MW IT). South Dublin, Meath, Kildare, and Wicklow increasingly impose water conditions — verify planning authority position before committing to cooling strategy. Action: Request pre-planning meeting with local authority to confirm water use restrictions before RIBA Stage 2.`,
        ref:"South Dublin CC DC Planning Policy 2023, Meath CC Variation No.3, EN 50600-4-5 (WUE), EN 50600-2-3 Clause 7.2"});
    }

    // 5. HEAT REUSE — EU EED obligation + revenue
    if (heatR && calc.wasteHeatMW>1) {
      const rev20 = calc.heatRev * 20;
      t.push({c:"green",icon:"♻️",
        title:`Heat reuse: ${calc.wasteHeatMW.toFixed(1)} MW → ${calc.homesServed.toLocaleString()} homes → ${fmtM(calc.heatRev)}/yr`,
        body:`EU EED Article 26 (effective 15 May 2025) mandates waste heat recovery assessment for new DCs >1MW IT and annual PUE/WUE/CUE/REF reporting for all >500kW. This ${calc.m} MW facility produces ~${calc.wasteHeatMW.toFixed(1)} MW of 30-50°C waste heat, upgradable via heat pump to 70-80°C for district heating serving ~${calc.homesServed.toLocaleString()} homes. Revenue at €0.04-0.06/kWh: ~${fmtM(calc.heatRev)}/yr (${fmtM(rev20)} over 20 years). Irish DH market is immature but growing — early movers secure favourable supply agreements. Action: Commission waste heat feasibility study at RIBA Stage 2 to assess district heating connection viability.`,
        ref:"EU EED 2023/1791 Article 26, EN 50600-4-8 (REF), CIBSE CP1:2020 (heat networks)"});
    }

    // 6. PUE + TIER IV — ambitious but achievable
    if (tier==="IV" && parseFloat(pue)<1.15) {
      const baselinePUE = 1.30;
      const saving01 = 0.01 * calc.m * 8760 * elecRate * 1000;
      const totalSav = (baselinePUE - calc.pu) * calc.m * 8760 * elecRate * 1000;
      t.push({c:"green",icon:"🎯",
        title:`PUE ${pue} at Tier IV: saves ${fmtM(totalSav)}/yr vs 1.30 baseline`,
        body:`PUE ${pue} at Tier IV 2(N+1) is ambitious but achievable in Ireland's climate. Requirements: Li-ion UPS (97-98% efficiency vs 94-95% VRLA), economiser-first free cooling (${calc.fcHrs.toLocaleString()} hrs/yr here), low-loss cast-resin transformers, LED + occupancy lighting, and VSD on all pumps/fans. Each 0.01 PUE saves ~${fmt(saving01)}/yr on this ${calc.m} MW facility. The 2(N+1) redundancy adds ~0.01-0.02 PUE overhead vs Tier III — offset by specifying high-efficiency components. Action: Include PUE target as a contractual KPI in the cooling and electrical design briefs.`,
        ref:"EN 50600-4-2 Clause 5 (PUE measurement), Uptime Institute Tier IV Standard, CIBSE TM65:2021"});
    }

    // 7. NEW: EirGrid connection timeline risk
    if (eirgrid && calc.m >= 20) {
      const connMW = calc.facilityMW;
      t.push({c:"amber",icon:"⚡",
        title:`EirGrid HV connection: ${connMW.toFixed(0)} MW — budget 24-36 month lead time`,
        body:`At ${connMW.toFixed(0)} MW facility demand, this requires a direct 110kV EirGrid connection (above ESB Networks' 20MW MV threshold). Current EirGrid queue: 24-36 months from application to energisation for Group Processing. This is typically the critical path item for hyperscale DC programmes. Budget €2-5M for connection assets (110kV switchgear, on-site substation, dedicated line). Action: Submit EirGrid connection application at RIBA Stage 0/1 — do not wait for planning permission, as applications can proceed in parallel.`,
        ref:"EirGrid Grid Code v9, CRU Decision CRU/2024/XX (connection policy), EirGrid Group Processing Approach"});
    }

    // 8. NEW: Fuel storage — fire safety + environmental
    if (calc.fuelM3 > 50) {
      t.push({c:"amber",icon:"🛢️",
        title:`Fuel storage: ${calc.fuelM3.toFixed(0)} m³ — fire and environmental implications`,
        body:`${calc.fuelM3.toFixed(0)} m³ (${(calc.fuelL/1000).toFixed(0)}k litres) diesel storage for ${autoHrs}hr autonomy requires: EPA-compliant bunded tank farm (≥110% capacity bund), fire separation distances per IS 3218:2024, automatic fire suppression to generator hall, and Environmental Impact Assessment screening. At >200m³, COMAH (Seveso III) lower-tier thresholds may apply — verify with HSA. HVO (EN 15940) is compatible with standard diesel tanks but check manufacturer warranty. Action: Budget €${Math.round(calc.fuelM3 * 800).toLocaleString()}-${Math.round(calc.fuelM3 * 1200).toLocaleString()} for tank farm civil/mechanical works.`,
        ref:"S.I. No. 311/2019 (fuel storage), IS 3218:2024 Clause 8.4, COMAH Directive 2012/18/EU, TGD Part B Vol.2"});
    }

    // 9. NEW: Rack count vs floor space
    if (calc.rackCount > 500) {
      const hallArea = calc.rackCount * 5.5; // ~5.5 m² per rack inc aisles
      const hallCount = Math.ceil(hallArea / 2000); // typical 2000m² hall
      t.push({c:"green",icon:"📐",
        title:`${calc.rackCount.toLocaleString()} racks → ~${(hallArea/1000).toFixed(1)}k m² white space across ${hallCount} halls`,
        body:`At ~5.5 m²/rack (including hot/cold aisle containment, end-of-row cooling, and maintenance access), ${calc.rackCount.toLocaleString()} racks requires ~${Math.round(hallArea).toLocaleString()} m² of white space. At typical 2,000 m² per data hall, that's ${hallCount} halls — likely ${Math.ceil(hallCount/calc.ph)} per phase across ${calc.ph} phases. Total building footprint (including plant, offices, loading) is typically 2.2-2.8× white space: ~${Math.round(hallArea*2.5).toLocaleString()} m² gross. Site area of ${area||'—'} ha provides ${area ? (parseFloat(area)*10000/Math.round(hallArea*2.5)*100).toFixed(0) : '—'}% coverage — verify against planning 40-50% max site coverage. Action: Validate hall sizing in DC-SITE-001 Site Feasibility tool.`,
        ref:"EN 50600-1 Clause 6.2 (space planning), Uptime Institute White Paper WP-23"});
    }

    // 10. NEW: ASHRAE class mismatch warning
    if (ashrae==="A1" && calc.m > 20) {
      t.push({c:"amber",icon:"🌡️",
        title:`ASHRAE A1 limits free cooling to ~${Math.round(calc.fcHrs*0.82).toLocaleString()} hrs — consider A2`,
        body:`A1 (18-27°C) provides ~65-75% free cooling hours in Ireland vs A2 (10-35°C) at 82-92%. On a ${calc.m} MW facility, moving A1→A2 adds ~${Math.round((calc.fcHrs - calc.fcHrs*0.82)*calc.coolingMW*elecRate).toLocaleString()} hrs of free cooling — saving ~${fmt((calc.fcHrs - calc.fcHrs*0.82)*calc.coolingMW*elecRate*1000)}/yr in chiller energy. Most hyperscale operators specify A2 for volume servers, reserving A1 for financial trading platforms where condensation risk is unacceptable. Action: Confirm IT vendor thermal specifications — most modern servers support A2.`,
        ref:"ASHRAE TC 9.9:2021 Table 1, EN 50600-2-3 Clause 6.3"});
    }

    return t;
  }, [calc,fcPri,waterR,coolStrat,heatR,ashrae,tier,pue,eirgrid,autoHrs,area]);

  const loadDemo = useCallback(() => {
    const d=DEMO;
    setPName(d.project.name);setPRef(d.project.ref);setCounty(d.project.county);setEircode(d.project.eircode);
    setArea(d.project.area);setBy(d.project.by);setDate(d.project.date);
    setMw(d.it.mw);setP1(d.it.p1);setPhases(d.it.phases);setRd(d.it.rd);setGpu(d.it.gpu);setGrowth(d.it.growth);
    setTier(d.design.tier);setAshrae(d.design.ashrae);setPue(d.design.pue);setWue(d.design.wue);setCue(d.design.cue);setAutoHrs(d.design.auto_hrs);
    setCoolStrat(d.cool.strat);setFcPri(d.cool.fc);setWaterR(d.cool.water);setHeatR(d.cool.heat);
    setVolt(d.elec.volt);setUpsTech(d.elec.ups);setGenFuel(d.elec.fuel);
    setBuildYear(d.project.build_year||"");setPpaPercent(d.elec.ppa_pct||"0");setGenHoursAnnual(d.elec.gen_hrs_annual||"200");
    setMicMva(d.elec.mic_mva||"");setHallNames(d.project.hall_names||"");
    setEn50600(d.comp.en);setUptimeCert(d.comp.uptime);setEpaIE(d.comp.epa);setEirgrid(d.comp.eirgrid);
    setBudget(d.comm.budget);setProgMo(d.comm.months);setRiba(d.comm.riba);
    setShowResults(false);
  },[]);

  const exportJSON = useCallback(() => {
    const payload={metadata:{tool_id:TOOL_ID,version:TOOL_VERSION,core_dna:CORE_DNA,generated:new Date().toISOString(),status:docStatus,cascade:"ALL_DC_TOOLS",
      _aimep_lineage:`LBE-AIMEP-${TOOL_ID}-v${TOOL_VERSION}-${new Date().toISOString()}`,
      disclaimer:"INDICATIVE DESIGN AID — Not a detailed data centre design. Provides master parameters for feasibility screening only. All outputs require review by a chartered engineer before inclusion in any design documentation. Does not check: detailed electrical design, cooling load calculation, structural assessment, planning, grid connection, fire safety, cost estimate, or IT specification.",
      classification:"T2 — Screening tool, indicative only"},
      project:{name:pName,ref:pRef,county,eircode,site_area_ha:parseFloat(area)||null,prepared_by:by,date,build_year:buildYear?parseInt(buildYear):null,hall_names:hallNames||null},
      it_load:{total_it_mw:calc.m,phase_1_mw:calc.p,phase_count:calc.ph,rack_density_kw:calc.r,rack_count:calc.rackCount,
        gpu_percentage:calc.g,gpu_racks:calc.gpuRacks,std_racks:calc.stdRacks,growth_rate_pct:parseFloat(growth),scale_band:calc.band.label},
      design_criteria:{uptime_tier:tier,tier_req:TIERS[tier],ashrae_class:ashrae,ashrae_limits:ASHRAE[ashrae],
        pue_target:calc.pu,wue_target:parseFloat(wue),cue_target:parseFloat(cue),autonomy_hours:calc.ah},
      cooling:{strategy:coolStrat,auto_rec:calc.coolRec,free_cooling_priority:fcPri,water_restricted:waterR,heat_reuse_required:heatR,
        free_cooling:{zone:calc.cz,hours:calc.fcHrs,pct:parseFloat(calc.fcPct)},dlc_required:calc.dlcReq,dlc_recommended:calc.dlcRec},
      electrical:{utility_kv:parseInt(volt),auto_voltage:calc.voltRec,ups:upsTech,auto_ups:calc.upsRec,fuel:genFuel,auto_fuel:calc.fuelRec,ppa_pct:parseFloat(ppaPercent)||0,generator_hours:parseFloat(genHoursAnnual)||0,mic_mva:parseFloat(micMva)||null},
      derived:{facility_mw:calc.facilityMW,cooling_mw:calc.coolingMW,gen_cap_mw:calc.genCapMW,fuel_litres:calc.fuelL,fuel_m3:calc.fuelM3,
        waste_heat_mw:calc.wasteHeatMW,homes_heat:calc.homesServed,heat_rev_eur:calc.heatRev,epa_trigger:calc.epaTrigger},
      compliance:{en_50600,uptime_cert:uptimeCert,epa_ie:epaIE,eirgrid_conn:eirgrid},
      commercial:{budget_per_mw:parseFloat(budget)||null,programme_mo:parseInt(progMo)||null,riba_stage:riba},
      screening:{
        current_pue:parseFloat(currentPue)||null,
        target_pue:calc.pu,
        grid_operator:parseInt(volt)<=20?"ESB Networks":"EirGrid",
        redundancy_level:redundancyLevel||null,
        lease_end_year:leaseEndYear?parseInt(leaseEndYear):null,
      },
      tips:tips.map(t=>({severity:t.c,title:t.title,body:t.body,ref:t.ref}))};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`${TOOL_ID}_${pRef||'export'}_${date}.json`; a.click();
  },[calc,tips,pName,pRef,county,eircode,area,by,date,tier,ashrae,pue,wue,cue,autoHrs,coolStrat,fcPri,waterR,heatR,volt,upsTech,genFuel,en50600,uptimeCert,epaIE,eirgrid,budget,progMo,riba,docStatus,growth,buildYear,ppaPercent,genHoursAnnual,micMva,hallNames,currentPue,redundancyLevel,leaseEndYear]);

  const importRef = useRef(null);
  const handleImport = useCallback((e) => {
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);
      const tid=(d.metadata&&d.metadata.tool_id)||(d._aimep_lineage&&d._aimep_lineage.tool_id)||'';
      if(tid===TOOL_ID){
        // DC-MSTR-001 round-trip import
        if(d.project){setPName(d.project.name||"");setPRef(d.project.ref||"");setCounty(d.project.county||"");setEircode(d.project.eircode||"");setArea(String(d.project.site_area_ha||""));setBy(d.project.prepared_by||"");setDate(d.project.date||"");setBuildYear(d.project.build_year?String(d.project.build_year):"");}
        if(d.it_load){setMw(String(d.it_load.total_it_mw||""));setP1(String(d.it_load.phase_1_mw||""));setPhases(String(d.it_load.phase_count||"4"));setRd(String(d.it_load.rack_density_kw||"15"));setGpu(String(d.it_load.gpu_percentage||"0"));setGrowth(String(d.it_load.growth_rate_pct||"5"));}
        if(d.design_criteria){setTier(d.design_criteria.uptime_tier||"III");setAshrae(d.design_criteria.ashrae_class||"A2");setPue(String(d.design_criteria.pue_target||"1.20"));setWue(String(d.design_criteria.wue_target||"0.5"));setCue(String(d.design_criteria.cue_target||"0.30"));setAutoHrs(String(d.design_criteria.autonomy_hours||"48"));}
        if(d.cooling){setCoolStrat(d.cooling.strategy||"auto");setFcPri(d.cooling.free_cooling_priority!==false);setWaterR(d.cooling.water_restricted===true);setHeatR(d.cooling.heat_reuse_required===true);}
        if(d.electrical){setVolt(String(d.electrical.utility_kv||"110"));setUpsTech(d.electrical.ups||"auto");setGenFuel(d.electrical.fuel||"auto");setPpaPercent(d.electrical.ppa_pct!=null?String(d.electrical.ppa_pct):"");setGenHoursAnnual(d.electrical.generator_hours?String(d.electrical.generator_hours):"200");setMicMva(d.electrical.mic_mva!=null?String(d.electrical.mic_mva):"");}
        if(d.project&&d.project.hall_names){setHallNames(d.project.hall_names);}
        if(d.compliance){setEn50600(d.compliance.en_50600!==false);setUptimeCert(d.compliance.uptime_cert===true);setEpaIE(d.compliance.epa_ie===true);setEirgrid(d.compliance.eirgrid_conn!==false);}
        if(d.commercial){setBudget(String(d.commercial.budget_per_mw||""));setProgMo(String(d.commercial.programme_mo||""));setRiba(d.commercial.riba_stage||"1");}
        setShowResults(false);alert("Import OK — review and click Generate.");
      } else if(tid==='DC-TOOL-010'||(!tid&&d.it_load_mw!=null)){
        // DC-TOOL-010 shared field standard — direct import with zero manual editing
        const fuelMap={diesel:'diesel',hvo:'hvo',gas:'gas_turbine','gas turbine':'gas_turbine'};
        const locMap={dublin:'Dublin',cork:'Cork',limerick:'Limerick',galway:'Galway',regional:'Regional'};
        if(d.facility_name||d.project_name) setPName(d.facility_name||d.project_name||"");
        if(d.it_load_mw!=null) setMw(String(d.it_load_mw));
        if(d.rack_density_kw!=null) setRd(String(d.rack_density_kw));
        if(d.pue!=null) setPue(String(d.pue));
        if(d.location) setCounty(locMap[(d.location||'').toLowerCase()]||'Dublin');
        if(d.build_year!=null) setBuildYear(String(d.build_year));
        if(d.ppa_pct!=null) setPpaPercent(String(d.ppa_pct));
        if(d.generator_fuel) setGenFuel(fuelMap[(d.generator_fuel||'').toLowerCase()]||'auto');
        if(d.generator_hours!=null) setGenHoursAnnual(String(d.generator_hours));
        if(d.rack_count!=null&&d.rack_density_kw==null&&d.it_load_mw) setRd(String(Math.round((d.it_load_mw*1000)/d.rack_count)));
        setShowResults(false);alert("Imported from DC-TOOL-010. Review all parameters and click Generate.");
      } else {
        alert(`Expected ${TOOL_ID} or DC-TOOL-010, got ${tid||'unknown format'}`);return;
      }
    }catch(err){alert("Invalid JSON: "+err.message);}};
    r.readAsText(f); e.target.value='';
  },[]);

  const canCalc = parseFloat(mw) > 0;
  const tabNames = ["Project & IT Load","Design Criteria","Compliance & Commercial"];

  return (
    <div className="container">
      {/* HEADER */}
      <div className="card card-header">
        <div className="flex-between">
          <div className="header-brand">
            <img src={LBE_LOGO} alt="LBE" className="logo-img" 
              onError={(e) => { e.target.style.display="none"; }} />
            <div>
              <div className="text-xs text-gray-400 font-mono">{TOOL_ID} v{TOOL_VERSION} · Core DNA {CORE_DNA}</div>
              <h1 className="text-2xl" style={{marginTop:4}}>{TOOL_NAME}</h1>
              <p className="text-sm text-gray-500" style={{marginTop:4}}>{TOOL_SUBTITLE}</p>
            </div>
          </div>
          <div className="text-right">
            <div className="text-xs text-gray-400">Legacy Business Engineers</div>
            <div className="text-xs text-green-700 font-semibold">S4 Data Centre Services</div>
          </div>
        </div>
        <div className="info-bar">
          <strong>How this tool works:</strong> Enter project parameters once → Export JSON → Every downstream S4 tool imports this file, eliminating duplicate data entry across 60+ design tools.
        </div>
      </div>

      {/* DEMO + IMPORT */}
      <div className="flex gap-2 mb-4 no-print">
        <button className="btn btn-demo" onClick={loadDemo}>📋 Load Clonshaugh Demo</button>
        <button className="btn btn-secondary" onClick={() => importRef.current?.click()}>📥 Import JSON</button>
        <input ref={importRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
      </div>

      {/* TABS */}
      <div className="tabs no-print">
        {tabNames.map((t,i) => (
          <button key={i} className={`tab ${i===tab?'active':''}`} onClick={() => setTab(i)}>{t}</button>
        ))}
      </div>

      {/* ═══ TAB 0: PROJECT & IT LOAD ═══ */}
      {tab===0 && (
        <div className="card">
          <h2 className="text-lg font-bold text-gray-800 mb-4">Project Information</h2>
          <div className="grid-2">
            <Field label="Project Name" required tip={{meaning:"Client project or site name",typical:"Tara Campus, Park West DC",source:"Client brief"}}>
              <input type="text" value={pName} onChange={e=>setPName(e.target.value)} placeholder="e.g. Tara Campus" />
            </Field>
            <Field label="Project Reference" tip={{meaning:"Internal LBE or client reference",typical:"TC-2026-001",source:"Project register"}}>
              <input type="text" value={pRef} onChange={e=>setPRef(e.target.value)} placeholder="e.g. TC-2026-001" />
            </Field>
            <Field label="County" required tip={{meaning:"Irish county for climate and regulatory mapping",typical:"Dublin, Meath, Kildare most common",source:"Site address",warning:"South Dublin, Meath, Kildare, Wicklow have DC planning restrictions"}}>
              <select value={county} onChange={e=>setCounty(e.target.value)}>
                <option value="">— Select county —</option>
                {COUNTIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
            <Field label="Eircode" tip={{meaning:"Irish postcode",typical:"D22 X1Y2",source:"Site address"}}>
              <input type="text" value={eircode} onChange={e=>setEircode(e.target.value)} placeholder="e.g. D22 X1Y2" />
            </Field>
            <Field label="Site Area (hectares)" tip={{meaning:"Total site area",typical:"5-15 ha for 20-100MW",source:"Site survey",warning:"Below 0.5 ha/MW may be insufficient for Tier IV"}}>
              <input type="number" step="0.1" min="0" value={area} onChange={e=>setArea(e.target.value)} placeholder="e.g. 12.5" />
            </Field>
            <Field label="Prepared By"><input type="text" value={by} onChange={e=>setBy(e.target.value)} placeholder="e.g. Legacy Business Engineers" /></Field>
            <Field label="Date"><input type="date" value={date} onChange={e=>setDate(e.target.value)} /></Field>
            <Field label="Facility Build Year" tip={{meaning:"Year the existing facility was originally commissioned. Leave blank for new-build projects.",typical:"2000–2020 for existing stock",source:"Facilities records or planning permission"}}>
              <input type="number" step="1" min="1980" max="2030" value={buildYear} onChange={e=>setBuildYear(e.target.value)} placeholder="e.g. 2014 (leave blank for new)" />
            </Field>
          </div>

          <h2 className="text-lg font-bold text-gray-800 mt-6 mb-4">IT Load Parameters</h2>
          <div className="grid-2">
            <Field label="Total IT Load (MW)" required tip={{meaning:"Ultimate IT capacity at full build-out",typical:"5-20 MW enterprise, 20-50 MW colo, 50-200 MW hyperscale",source:"Client brief",warning:"IT load only — facility power = IT × PUE"}}>
              <input type="number" step="0.5" min="0.5" max="500" value={mw} onChange={e=>setMw(e.target.value)} placeholder="e.g. 50" />
            </Field>
            <Field label="Phase 1 IT Load (MW)" tip={{meaning:"IT load in first deployment phase",typical:"20-30% of total for hyperscale",source:"Deployment plan"}}>
              <input type="number" step="0.5" min="0" value={p1} onChange={e=>setP1(e.target.value)} placeholder="e.g. 12.5" />
            </Field>
            <Field label="Deployment Phases" tip={{meaning:"Phases from first to full capacity",typical:"1 enterprise, 3-6 hyperscale",source:"Client programme"}}>

            </div>
          )}

          <div className="mt-6 no-print">
            <JE title="What is PUE and why does it matter?"><p><strong>PUE</strong> = Total Facility Energy ÷ IT Equipment Energy. PUE 1.0 = impossible (cooling/distribution always add overhead). Hyperscale best practice: 1.10-1.15. Global average: ~1.58.</p><p>Every 0.01 PUE improvement on 50MW saves ~€438,000/year at €0.12/kWh — €8.8M over 20 years per 0.01.</p><p className="je-ref">EN 50600-4-2, Uptime Institute Global DC Survey 2024</p></JE>
            <JE title="Uptime Tier I–IV explained"><p>Tier I (99.671%): No redundancy, 28.8hr downtime/yr. Tier II (99.741%): N+1, 22.7hr. Tier III (99.982%): Concurrently maintainable, dual paths, 1.6hr. Tier IV (99.995%): Fault tolerant, 2(N+1), 26.3 min/yr.</p><p>Tier IV costs ~30-40% more than III but eliminates planned downtime. Financial DCs and hyperscalers require Tier III minimum.</p><p className="je-ref">Uptime Institute Tier Standard, EN 50600-2-2</p></JE>
            <JE title="ASHRAE Thermal Classes: A1 vs A2"><p>A1 (18-27°C): Tightest, enterprise/financial. ~65-75% free cooling in Ireland. A2 (10-35°C): Default hyperscale. 82-92% free cooling in Ireland. A3/A4 (5-40/45°C): Aggressive, near 100% free cooling but needs ruggedised IT.</p><p>Moving A1→A2 in Dublin adds ~1,000 free cooling hours/year — eliminating ~12% chiller energy.</p><p className="je-ref">ASHRAE TC 9.9 2021</p></JE>
            <JE title="Ireland's free cooling advantage"><p>Dublin avg 10.2°C. For ASHRAE A2: Dublin ~8,100 hrs (92%), Galway ~8,300 (95%), Cork ~8,200 (94%). Compare: Amsterdam ~7,200 (82%), Frankfurt ~6,100 (70%), London ~7,500 (86%). Ireland's 8-15% advantage = lower PUE + lower electricity bills.</p><p className="je-ref">Met Éireann 30-year TMY, ASHRAE TC 9.9</p></JE>
            <JE title="GPU density and the 40kW barrier"><p>Traditional: 8-15 kW/rack (CRAH OK). 15-25 kW: in-row + containment. 25-40 kW: rear-door HX. &gt;40 kW: air physically cannot remove the heat — DLC mandatory.</p><p>Air has ¼ the heat capacity of water. Above 40kW you need liquid at the heat source: piping to every rack, CDUs, facility water infrastructure.</p><p className="je-ref">ASHRAE TC 9.9, OCP Thermal Guidelines</p></JE>
            <JE title="EU EED Article 26: Heat reuse obligation"><p>From 15 May 2025: New DCs &gt;1MW must assess waste heat recovery. All DCs &gt;500kW must report PUE/WUE/CUE/REF annually. A 50MW DC at PUE 1.2 produces ~10MW waste heat — servicing ~3,000 homes via district heating at €0.04-0.06/kWh revenue.</p><p className="je-ref">EU EED 2023/1791 Article 26</p></JE>
          </div>

// ═══ BLANK SCREEN GUARD — Layer 2: React Error Boundary ═══
// Catches runtime render crashes. Ref: AIMEP_BLANK_SCREEN_GUARD_v1_0.md
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError:false, error:null, info:null}; }
  static getDerivedStateFromError(error) { return {hasError:true, error}; }
  componentDidCatch(error, info) { this.setState({info}); console.error('AIMEP ErrorBoundary:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
        React.createElement('h2', {style:{color:'#dc2626',margin:'0 0 12px'}}, '⚠️ Tool Runtime Error'),
        React.createElement('p', {style:{color:'#374151'}}, React.createElement('strong', null, 'DC-MSTR-001 v1.5.4'), ' crashed during rendering.'),
        React.createElement('pre', {style:{background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,fontSize:13,whiteSpace:'pre-wrap',margin:'12px 0',maxHeight:300,overflow:'auto'}},
          String(this.state.error) + (this.state.info ? '\n\nComponent Stack:' + this.state.info.componentStack : '')),
        React.createElement('p', {style:{color:'#6b7280',fontSize:13}}, 'Copy this error and send to LM.')
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
