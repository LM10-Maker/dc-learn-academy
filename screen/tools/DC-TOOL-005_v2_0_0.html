<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DC-TOOL-005 v2.0.0 | UPS Adequacy Tool | Legacy Business Engineers</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>

/* === THEME VARIABLES (inherited from DC-LEARN Canonical Architecture v1.1) === */
:root,[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--panel:#1c2333;
  --border:#30363d;--border-light:#484f58;
  --text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;
  --accent:#58a6ff;--accent2:#79c0ff;--success:#3fb950;--warn:#d29922;--error:#f85149;
  --lbe-green:#4a7c59;--dc-black:#1a1a1a;
  --green:#22c55e;--green-dim:rgba(34,197,94,0.15);--green-glow:rgba(34,197,94,0.3);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);--amber-glow:rgba(245,158,11,0.3);
  --font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;
}
[data-theme="light"]{
  --bg:#ffffff;--surface:#f6f8fa;--panel:#f0f2f5;
  --border:#d0d7de;--border-light:#afb8c1;
  --text:#1f2328;--text-bright:#000;--text-dim:#57606a;--text-muted:#8b949e;
  --accent:#0969da;--accent2:#0550ae;--success:#1a7f37;--warn:#9a6700;--error:#cf222e;
  --lbe-green:#3a6147;--dc-black:#1a1a1a;
  --green:#16a34a;--green-dim:rgba(22,163,74,0.1);--green-glow:rgba(22,163,74,0.2);
  --red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);
  --amber:#d97706;--amber-dim:rgba(217,119,6,0.08);--amber-glow:rgba(217,119,6,0.15);
}

/* === BASE === */
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* === HEADER === */
header{background:var(--dc-black);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--lbe-green)}
header img{height:40px;width:40px;border-radius:50%}
header h1{font-size:18px;font-weight:700;color:#fff;flex:1}
header .sub{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
.theme-toggle{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}

/* === LAYOUT === */
.main{max-width:900px;margin:0 auto;padding:24px 16px}

/* === TABS === */
.tab-row{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.tab-btn{background:transparent;border:none;color:var(--text-dim);padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-sans);transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text-bright);border-bottom-color:var(--green)}

/* === CARDS === */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;color:var(--text-bright);margin-bottom:8px}

/* === FORM === */
.input-group{margin-bottom:16px}
.input-label{display:block;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:4px;font-family:var(--font-mono)}
.input-field{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px}
.input-field:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(88,166,255,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--text-muted);margin-top:2px}
select.input-field{appearance:auto}

/* === BUTTONS === */
.run-btn{background:var(--lbe-green);color:#fff;border:none;padding:12px 32px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:var(--font-sans);transition:opacity .2s}
.run-btn:hover{opacity:0.9}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* === RESULTS === */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.traffic-light{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:8px;vertical-align:middle}
.tl-green{background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.tl-amber{background:var(--amber);box-shadow:0 0 6px var(--amber-glow)}
.tl-red{background:var(--red);box-shadow:0 0 6px var(--red-glow)}
.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px}
.status-pass{background:var(--green-dim);color:var(--green)}
.status-flag{background:var(--amber-dim);color:var(--amber)}
.status-fail{background:var(--red-dim);color:var(--red)}
.tier-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;font-family:var(--font-mono);vertical-align:middle}
.tier-1{background:var(--green-dim);color:var(--green)}
.tier-2{background:rgba(88,166,255,0.15);color:var(--accent)}
.tier-3{background:var(--amber-dim);color:var(--amber)}
.tier-4{background:var(--red-dim);color:var(--red)}

/* === CAVEAT === */
.caveat-box{background:var(--amber-dim);border:1px solid var(--amber);border-radius:6px;padding:12px 16px;margin:16px 0;font-size:13px;color:var(--text)}

/* === PERSONA === */
.persona-lens{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.persona-name{font-weight:700;font-size:14px;color:var(--text-bright)}
.persona-role{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}

/* === CONFIDENCE === */
.confidence-bar{height:8px;border-radius:4px;background:var(--panel);overflow:hidden;margin-top:4px;display:flex}
.confidence-fill{height:100%;transition:width 0.5s}
.conf-t1{background:var(--green)}
.conf-t2{background:var(--accent)}
.conf-t3{background:var(--amber)}
.conf-t4{background:var(--red)}
.conf-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.conf-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim)}
.conf-dot{width:8px;height:8px;border-radius:50%}

/* === LOADING === */
.loading-container{text-align:center;padding:48px 20px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:14px;color:var(--text-dim);margin-top:8px;font-family:var(--font-mono)}

/* === SIGN-OFF === */
.signoff{border-top:2px solid var(--lbe-green);padding-top:16px;margin-top:24px}
.signoff-name{font-weight:700;font-size:15px;color:var(--text-bright)}
.signoff-title{font-size:13px;color:var(--text-dim)}
.signoff-pi{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:4px}

/* === SOFT CTA === */
.soft-cta{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-top:24px;text-align:center}
.soft-cta p{font-size:14px;color:var(--text-dim);margin-bottom:8px}
.soft-cta a{color:var(--lbe-green);font-weight:600}

/* === FOOTER === */
.nav-footer{text-align:center;padding:24px 16px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:32px}

/* === ERROR === */
.error-box{background:var(--red-dim);border:1px solid var(--red);border-radius:6px;padding:12px 16px;margin:16px 0;font-size:13px;color:var(--text)}

/* === PRINT === */
@media print{
  .no-print{display:none!important}
  body{background:#fff;color:#000}
  header{background:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .result-card,.card,.persona-lens{border:1px solid #ccc;break-inside:avoid}
  .caveat-box{background:#fff3cd;border:1px solid #d29922;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .status-pass,.status-flag,.status-fail,.tier-badge,.tl-green,.tl-amber,.tl-red{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* === RESPONSIVE === */
@media(max-width:768px){
  header{padding:12px 16px}
  header h1{font-size:15px}
  .main{padding:16px 12px}
  .tab-btn{padding:8px 12px;font-size:13px}
  .btn-row{flex-direction:column}
  .metric-row{flex-direction:column}
}

/* === A+ INPUT SECTIONS === */
.input-section{margin-bottom:24px}
.input-section-header{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:16px;font-family:var(--font-mono)}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
@media(max-width:600px){.input-grid{grid-template-columns:1fr}}
.input-field.invalid{border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.field-error{font-size:11px;color:var(--red);margin-top:2px}
.confirm-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;margin:20px 0}
.confirm-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)}
.confirm-row:last-child{border-bottom:none}
.confirm-label{color:var(--text-dim)}
.confirm-value{color:var(--text-bright);font-family:var(--font-mono);font-weight:500}
.confirm-missing{color:var(--amber);font-style:italic}

/* === A+ METRIC CARDS === */
.metric-row{display:flex;gap:12px;margin-bottom:20px}
.metric-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.metric-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-family:var(--font-mono);margin-bottom:6px}
.metric-value{font-size:22px;font-weight:700;color:var(--text-bright)}
.metric-sub{font-size:12px;color:var(--text-dim);margin-top:4px}

/* === A+ FINDINGS CHART === */
.findings-chart{margin:20px 0}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{width:140px;font-size:12px;color:var(--text-dim);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-track{flex:1;height:24px;background:var(--panel);border-radius:4px;overflow:hidden;position:relative}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px}
.chart-bar-fill span{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.bar-pass{background:var(--green)}
.bar-flag{background:var(--amber)}
.bar-fail{background:var(--red)}

/* === A+ FINDING CARD === */
.finding-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px;border-left:4px solid var(--border)}
.finding-card.f-pass{border-left-color:var(--green)}
.finding-card.f-flag{border-left-color:var(--amber)}
.finding-card.f-fail{border-left-color:var(--red)}

/* === A+ DONUT CHART === */
.donut-container{display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center}
.donut-legend{display:flex;flex-direction:column;gap:10px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.donut-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.donut-legend-count{font-family:var(--font-mono);font-weight:600;color:var(--text-bright);min-width:24px}

/* === A+ PROGRESS STEPS === */
.progress-steps{display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto}
.progress-step{display:flex;align-items:center;gap:12px;font-size:14px}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid var(--border);color:var(--text-muted)}
.step-icon.done{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.step-icon.active{border-color:var(--accent);color:var(--accent);animation:pulse-step 1.5s infinite}
.step-label{color:var(--text-dim)}
.step-label.active{color:var(--text-bright);font-weight:500}
.step-label.done{color:var(--text)}
@keyframes pulse-step{0%,100%{opacity:1}50%{opacity:0.5}}

/* === AUDIT TRAIL === */
.audit-step{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px;font-family:var(--font-mono);font-size:13px}
.audit-step-name{font-weight:700;font-size:14px;color:var(--text-bright);margin-bottom:8px;font-family:var(--font-sans)}
.audit-formula{color:var(--accent);margin-bottom:6px}
.audit-input-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--text-dim)}
.audit-input-val{color:var(--text-bright);font-weight:500}
.audit-input-src{font-size:11px;color:var(--text-muted)}
.audit-result{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-weight:700;color:var(--green);font-size:15px}
.audit-result.fail{color:var(--red)}
.audit-result.flag{color:var(--amber)}
.calc-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.calc-card-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-family:var(--font-mono);margin-bottom:4px}
.calc-card-value{font-size:20px;font-weight:700;color:var(--text-bright)}
.calc-card-unit{font-size:12px;color:var(--text-dim)}
.calc-card.pass{border-color:var(--green)}
.calc-card.fail{border-color:var(--red)}
.calc-card.flag{border-color:var(--amber)}
.finding-detail-calc{background:var(--panel);border-radius:6px;padding:10px 14px;margin:8px 0;font-family:var(--font-mono);font-size:12px;color:var(--text);line-height:1.8}
.interp-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.interp-text{font-size:14px;color:var(--text);line-height:1.7;font-style:italic}

</style>
</head>

/* ================================================================
   DC-TOOL-005: runCalcEngine — 14 calculations (C01–C14)
   Deterministic JavaScript. No AI. No network.
   ================================================================ */
function runCalcEngine(inp_raw) {
  // Normalise inputs
  const inp = {
    it_load_mw:    Number(inp_raw.it_load_mw   || 0),
    pue:           Number(inp_raw.pue           || 1.5),
    racks:         Number(inp_raw.racks         || 0),
    gen_count:     Number(inp_raw.gen_count     || 0),
    gen_rating_mw: Number(inp_raw.gen_rating_mw || 0),
    gen_redundancy: inp_raw.gen_redundancy || 'N',
    ups_rating_mva: Number(inp_raw.ups_rating_mva || 0),
    ups_efficiency: Number(inp_raw.ups_efficiency || 96),
    ups_bridge_min: Number(inp_raw.ups_bridge_min || 10),
    fuel_type:      inp_raw.fuel_type || 'diesel',
    fuel_storage_l: Number(inp_raw.fuel_storage_l || 0),
    test_hours_yr:  Number(inp_raw.test_hours_yr  || 0),
    bess_installed: inp_raw.bess_installed === 'true' || inp_raw.bess_installed === true,
    bess_mw:        Number(inp_raw.bess_mw || 0)
  };

  // Constants (sourced — see CANONICAL_DATA)
  const CARBON_TAX     = 71;      // €/tCO₂ Budget 2025 T1
  const CARBON_TAX_30  = 100;     // €/tCO₂ Finance Act T1
  const ELEC_PRICE     = 0.12;    // €/kWh CRU Q4 2024 T2
  const EPA_THRESH     = 50;      // MWth EPA IE T1
  const DIESEL_CO2     = 2.68;    // kgCO₂/L SEAI T1
  const BURN_KWH       = 0.27;    // L/kWh output T3
  const GEN_EFF        = 0.40;    // fraction T3
  const CRM_PRICE      = 149960;  // €/MW/yr SEMO PCAR2829T-4 T1
  const SYNC_S         = 25;      // seconds T3
  const GEN_COST_MW    = 400000;  // €/MW Caterpillar/Cummins/MTU T3
  const UPS_COST_KW    = 120;     // €/kW Schneider/ABB/Eaton T3
  const BATT_COST_KWH  = 250;     // €/kWh Schneider/ABB/Eaton T3
  const HVO_REDUCTION  = 0.90;    // fraction ISCC T2
  const DS3_RATE       = 20;      // €/MWh EirGrid T3

  const r = {};  // results object
  const steps = [];

  function step(id, name, formula, value, unit, tier, inputs_used, fmtFn) {
    r[id] = value;
    const fmt = fmtFn ? fmtFn(value) : (typeof value === 'boolean' ? (value ? 'YES' : 'NO') : (typeof value === 'number' ? value.toLocaleString() : String(value)));
    steps.push({ id, name, formula, value, formatted: fmt + (fmt.slice(-unit.length) === unit ? '' : (' ' + unit)).replace(/  +/g,' ').trim(), unit, tier, inputs_used });
    return value;
  }

  // C01 — Total facility load
  const total_mw = inp.it_load_mw * inp.pue;
  step('C01_total_mw', 'C01 — Total Facility Load', 'IT Load × PUE', total_mw, 'MW', 'Derived',
    [{label:'IT Load', value:inp.it_load_mw, unit:'MW', tier:'T1', source:'User input'},
     {label:'PUE',     value:inp.pue,         unit:'',   tier:'T1', source:'User input'}],
    v => v.toFixed(2) + ' MW');

  // C02 — Generator fleet capacity
  const gen_fleet_mw = inp.gen_count * inp.gen_rating_mw;
  const gen_util_pct = gen_fleet_mw > 0 ? (total_mw / gen_fleet_mw * 100) : 0;
  r.gen_fleet_mw = gen_fleet_mw;
  r.gen_util_pct = gen_util_pct;
  step('C02_gen_fleet', 'C02 — Generator Fleet Capacity', 'Count × Rating each', gen_fleet_mw, 'MW', 'Derived',
    [{label:'Generator count', value:inp.gen_count, unit:'', tier:'T1', source:'User input'},
     {label:'Rating each', value:inp.gen_rating_mw, unit:'MW', tier:'T1', source:'User input'}],
    v => v.toFixed(1) + ' MW (' + Math.round(gen_util_pct) + '% utilisation)');

  // C03 — Generator adequacy (80% loading limit)
  const gen_80_limit = gen_fleet_mw * 0.8;
  const gen_adequate = total_mw <= gen_80_limit;
  r.gen_adequate = gen_adequate; r.gen_80_limit = gen_80_limit;
  step('C03_gen_adequacy', 'C03 — Generator Adequacy (80% Limit)', 'Facility Load ≤ Fleet × 0.8?', gen_adequate, 'boolean', 'Derived',
    [{label:'Facility load', value:total_mw.toFixed(2)+' MW', unit:'', tier:'Calc', source:'C01'},
     {label:'80% fleet limit', value:gen_80_limit.toFixed(2)+' MW', unit:'', tier:'Derived', source:'C02 × 0.8'}],
    v => v ? 'ADEQUATE (' + total_mw.toFixed(1) + ' ≤ ' + gen_80_limit.toFixed(1) + ' MW)' : 'OVERLOADED (' + total_mw.toFixed(1) + ' > ' + gen_80_limit.toFixed(1) + ' MW)');

  // C04 — EPA thermal threshold
  const thermal_mw = gen_fleet_mw / GEN_EFF;
  const epa_exceeds = thermal_mw > EPA_THRESH;
  r.thermal_mw = thermal_mw; r.epa_exceeds = epa_exceeds;
  step('C04_epa_thermal', 'C04 — EPA Thermal Input', 'Generator Fleet ÷ Electrical Efficiency (40%)', thermal_mw, 'MWth', 'T1 (threshold) + T3 (efficiency)',
    [{label:'Generator fleet', value:gen_fleet_mw+' MW', unit:'', tier:'Calc', source:'C02'},
     {label:'Gen efficiency', value:'40%', unit:'', tier:'T3', source:'Industry standard'},
     {label:'EPA threshold', value:'50 MWth', unit:'', tier:'T1', source:'EPA IE — IED 2010/75/EU'}],
    v => v.toFixed(1) + ' MWth' + (epa_exceeds ? ' (EXCEEDS 50 MWth)' : ' (below 50 MWth)'));

  // C05 — Annual generator emissions (testing)
  const fuel_l_yr  = inp.it_load_mw * inp.pue * 1000 * BURN_KWH * inp.test_hours_yr;
  const co2_t_yr   = fuel_l_yr * DIESEL_CO2 / 1000;
  const ct_cur     = co2_t_yr * CARBON_TAX;
  const ct_2030    = co2_t_yr * CARBON_TAX_30;
  r.fuel_l_yr = fuel_l_yr; r.co2_t_yr = co2_t_yr; r.ct_cur = ct_cur; r.ct_2030 = ct_2030;
  step('C05_emissions', 'C05 — Annual Generator Emissions (Testing)', 'IT×PUE×1,000×0.27 L/kWh×test_hrs = L. ×2.68 kgCO₂/L÷1,000 = t', Math.round(co2_t_yr), 'tCO₂/yr', 'T1 (SEAI, Budget 2025) + T3 (burn rate)',
    [{label:'IT load', value:inp.it_load_mw+' MW', unit:'', tier:'T1', source:'User input'},
     {label:'Test hours', value:inp.test_hours_yr+' hrs/yr', unit:'', tier:'T1', source:'User input'},
     {label:'Burn rate', value:'0.27 L/kWh', unit:'', tier:'T3', source:'Typical gen set'},
     {label:'CO₂ factor', value:'2.68 kgCO₂/L', unit:'', tier:'T1', source:'SEAI'},
     {label:'Carbon tax (current)', value:'€71/tCO₂', unit:'', tier:'T1', source:'Budget 2025'},
     {label:'Carbon tax (2030)', value:'€100/tCO₂', unit:'', tier:'T1', source:'Finance Act'}],
    v => v.toLocaleString() + ' tCO₂/yr | €' + Math.round(ct_cur).toLocaleString() + ' current | €' + Math.round(ct_2030).toLocaleString() + ' (2030)');

  // C06 — UPS conversion loss
  const ups_loss_kw   = inp.it_load_mw * 1000 * (100 - inp.ups_efficiency) / 100;
  const ups_loss_cost = ups_loss_kw * 8760 * ELEC_PRICE;
  r.ups_loss_kw = ups_loss_kw; r.ups_loss_cost = ups_loss_cost;
  step('C06_ups_loss', 'C06 — UPS Conversion Loss', 'IT Load × (1 − efficiency) = loss. ×8,760 hr/yr × €0.12/kWh = cost', Math.round(ups_loss_kw), 'kW', 'Derived',
    [{label:'IT load', value:inp.it_load_mw+' MW', unit:'', tier:'T1', source:'User input'},
     {label:'UPS efficiency', value:inp.ups_efficiency+'%', unit:'', tier:'T1', source:'User input'},
     {label:'Electricity price', value:'€0.12/kWh', unit:'', tier:'T2', source:'CRU Q4 2024'}],
    v => v.toLocaleString() + ' kW (€' + Math.round(ups_loss_cost).toLocaleString() + '/yr)');

  // C07 — UPS capacity vs facility load
  // C07: UPS protects IT load (cooling powered via generator ATS, not through UPS)
  const ups_mw    = inp.ups_rating_mva * 0.9;
  const ups_ok    = inp.it_load_mw <= ups_mw;
  const ups_gap   = inp.it_load_mw - ups_mw;
  r.ups_mw = ups_mw; r.ups_ok = ups_ok; r.ups_gap = ups_gap;
  step('C07_ups_capacity', 'C07 — UPS Capacity vs IT Load', 'UPS MVA × 0.9 PF vs IT Load (UPS protects IT; cooling via generator ATS)', ups_ok, 'boolean', 'Derived',
    [{label:'UPS rating', value:inp.ups_rating_mva+' MVA', unit:'', tier:'T1', source:'User input'},
     {label:'Power factor', value:'0.9', unit:'', tier:'T1', source:'Standard design value'},
     {label:'IT load', value:inp.it_load_mw.toFixed(2)+' MW', unit:'', tier:'T1', source:'User input'}],
    v => v ? 'ADEQUATE (' + ups_mw.toFixed(1) + ' MW ≥ ' + inp.it_load_mw.toFixed(1) + ' MW IT)' : 'INSUFFICIENT (' + ups_mw.toFixed(1) + ' MW < ' + inp.it_load_mw.toFixed(1) + ' MW IT, gap ' + Math.abs(ups_gap).toFixed(1) + ' MW)');

  // C08 — Generator transfer time margin
  const bridge_s  = inp.ups_bridge_min * 60;
  const margin_s  = bridge_s - SYNC_S;
  r.bridge_s = bridge_s; r.margin_s = margin_s;
  step('C08_transfer', 'C08 — Generator Transfer Time Margin', 'UPS bridge (s) − Generator sync time (25 s)', margin_s, 'seconds', 'T3 (sync time)',
    [{label:'UPS bridge', value:inp.ups_bridge_min+' min = '+bridge_s+' s', unit:'', tier:'T1', source:'User input'},
     {label:'Gen sync time', value:'25 s', unit:'', tier:'T3', source:'Typical diesel gen set'}],
    v => v + ' s margin (' + bridge_s + ' s bridge − ' + SYNC_S + ' s sync)');

  // C09 — Fuel endurance at full load
  const burn_l_hr   = total_mw * 1000 * BURN_KWH;
  const endur_hrs   = burn_l_hr > 0 ? inp.fuel_storage_l / burn_l_hr : 0;
  r.burn_l_hr = burn_l_hr; r.endur_hrs = Math.round(endur_hrs * 10) / 10;
  step('C09_endurance', 'C09 — Fuel Endurance at Full Load', 'Storage (L) ÷ Burn Rate (L/hr)', r.endur_hrs, 'hours', 'T3 (burn rate)',
    [{label:'Fuel storage', value:inp.fuel_storage_l.toLocaleString()+' L', unit:'', tier:'T1', source:'User input'},
     {label:'Burn rate', value:Math.round(burn_l_hr).toLocaleString()+' L/hr', unit:'', tier:'T3', source:'Facility load × 0.27 L/kWh'}],
    v => v.toLocaleString() + ' hours' + (v >= 72 ? ' (≥ 72 h Storm Éowyn benchmark)' : ' (< 72 h benchmark)'));

  // C10 — 2(N+1) generator fleet sizing
  const n_req       = Math.ceil(total_mw / (inp.gen_rating_mw || 1));
  const fleet_2n1   = 2 * (n_req + 1);
  const fleet_cost  = fleet_2n1 * inp.gen_rating_mw * GEN_COST_MW;
  r.n_req = n_req; r.fleet_2n1 = fleet_2n1; r.fleet_cost = fleet_cost;
  step('C10_fleet_2n1', 'C10 — 2(N+1) Generator Fleet Sizing', 'N = ⌈Facility ÷ Rating⌉. Fleet = 2(N+1). Cost = Fleet × MW × €400K/MW', fleet_cost, '€', 'T3 — Caterpillar/Cummins/MTU',
    [{label:'Facility load', value:total_mw.toFixed(2)+' MW', unit:'', tier:'Calc', source:'C01'},
     {label:'Rating each', value:inp.gen_rating_mw+' MW', unit:'', tier:'T1', source:'User input'},
     {label:'Cost/MW', value:'€400,000/MW', unit:'', tier:'T3', source:'Caterpillar/Cummins/MTU'}],
    v => fleet_2n1 + ' generators (€' + Math.round(v).toLocaleString() + ' indicative)');

  // C11 — BESS opportunity
  const bess_tgt    = Math.max(2, Math.round(inp.it_load_mw * 0.5));
  const cur_bess    = inp.bess_installed ? inp.bess_mw : 0;
  const bess_gap    = bess_tgt - cur_bess;
  const ds3_rev     = bess_tgt * 0.7 * DS3_RATE * 8760;
  r.bess_tgt = bess_tgt; r.cur_bess = cur_bess; r.bess_gap = bess_gap; r.ds3_rev = Math.round(ds3_rev);
  step('C11_bess', 'C11 — BESS Opportunity Assessment', 'Target = max(2, IT×0.5). DS3 = MW×0.7×€20/MWh×8,760', bess_gap, 'MW gap', 'T3 — BNEF H2 2025, EirGrid DS3',
    [{label:'IT load', value:inp.it_load_mw+' MW', unit:'', tier:'T1', source:'User input'},
     {label:'BESS installed', value:inp.bess_installed?'Yes':'No', unit:'', tier:'T1', source:'User input'},
     {label:'Current BESS', value:cur_bess+' MW', unit:'', tier:'T1', source:'User input'},
     {label:'DS3 rate', value:'€20/MWh', unit:'', tier:'T3', source:'EirGrid DS3 estimate'}],
    v => v > 0 ? v + ' MW gap (DS3 revenue target: €' + Math.round(ds3_rev/1000) + 'k/yr)' : 'No gap (' + cur_bess + ' MW installed)');

  // C12 — CRM revenue potential
  const crm_elig  = gen_fleet_mw > 10;
  const crm_rev   = crm_elig ? gen_fleet_mw * CRM_PRICE : 0;
  r.crm_elig = crm_elig; r.crm_rev = crm_rev;
  step('C12_crm', 'C12 — CRM Revenue Potential', 'If fleet > 10 MW → Fleet × €149,960/MW/yr', crm_rev, '€/yr', 'T1 — SEMO PCAR2829T-4',
    [{label:'Generator fleet', value:gen_fleet_mw+' MW', unit:'', tier:'Calc', source:'C02'},
     {label:'Threshold', value:'10 MW', unit:'', tier:'T1', source:'CRM licence requirement'},
     {label:'CRM T-4 price', value:'€149,960/MW/yr', unit:'', tier:'T1', source:'SEMO PCAR2829T-4'}],
    v => crm_elig ? '€' + Math.round(v).toLocaleString() + '/yr eligible' : 'Not eligible (fleet < 10 MW)');

  // C13 — Total backup infrastructure cost (2(N+1))
  const ups_cost   = total_mw * 1000 * UPS_COST_KW;
  const batt_cost  = total_mw * 1000 * inp.ups_bridge_min / 60 / 0.8 * BATT_COST_KWH;
  const total_bkup = fleet_cost + ups_cost + batt_cost;
  r.ups_cost = ups_cost; r.batt_cost = batt_cost; r.total_bkup = total_bkup;
  step('C13_backup_cost', 'C13 — Total Backup Infrastructure Cost (2(N+1))', 'Generators (C10) + UPS (€120/kW) + Battery (€250/kWh)', total_bkup, '€', 'T3 — Schneider/ABB/Eaton/Caterpillar',
    [{label:'Gen fleet cost', value:'€'+Math.round(fleet_cost).toLocaleString(), unit:'', tier:'T3', source:'C10'},
     {label:'UPS cost', value:'€'+Math.round(ups_cost).toLocaleString(), unit:'', tier:'T3', source:'€120/kW × IT load (Schneider/ABB/Eaton)'},
     {label:'Battery cost', value:'€'+Math.round(batt_cost).toLocaleString(), unit:'', tier:'T3', source:'€250/kWh × bridge kWh (Schneider/ABB/Eaton)'}],
    v => '€' + Math.round(v).toLocaleString() + ' indicative (screening-level)');

  // C14 — HVO transition impact
  const hvo_saved_t  = co2_t_yr * HVO_REDUCTION;
  const hvo_saved_eu = hvo_saved_t * CARBON_TAX;
  r.hvo_saved_t = Math.round(hvo_saved_t); r.hvo_saved_eu = Math.round(hvo_saved_eu);
  step('C14_hvo', 'C14 — HVO Fuel Transition Impact', 'Diesel CO₂ × 90% lifecycle reduction (ISCC) × Carbon Tax', Math.round(hvo_saved_t), 'tCO₂/yr saved', 'T2 — ISCC-certified HVO lifecycle',
    [{label:'Diesel CO₂', value:Math.round(co2_t_yr)+' tCO₂/yr', unit:'', tier:'Calc', source:'C05'},
     {label:'HVO reduction', value:'90%', unit:'', tier:'T2', source:'ISCC-certified HVO lifecycle'},
     {label:'Carbon tax', value:'€71/tCO₂', unit:'', tier:'T1', source:'Budget 2025'}],
    v => v.toLocaleString() + ' tCO₂/yr saved (€' + Math.round(hvo_saved_eu).toLocaleString() + '/yr carbon tax saving)');

  return { results: r, steps };
}

/* ================================================================
   DC-TOOL-005: runFindingsEngine — 7 findings (F01–F07)
   Rule-based. Deterministic. No AI.
   ================================================================ */
function runFindingsEngine(inp_raw, r) {
  // Map traffic-light to PASS/FLAG/FAIL for template rendering
  const s = (tl) => tl === 'GREEN' ? 'PASS' : tl === 'AMBER' ? 'FLAG' : 'FAIL';

  const findings = [];

  // F01 — Generator fleet adequacy
  findings.push({ id:'F01', area:'Generator Fleet Adequacy',
    status: s(r.gen_adequate ? 'GREEN' : 'RED'),
    detail: r.gen_fleet_mw + ' MW fleet, ' + Math.round(r.gen_util_pct) + '% utilisation. Facility load ' + r.C01_total_mw.toFixed(1) + ' MW vs 80% limit ' + r.gen_80_limit.toFixed(1) + ' MW.',
    action: r.gen_adequate ? 'Adequate — no action required.' : 'Generator fleet upgrade required to meet 80% loading limit.',
    cost_range: r.gen_adequate ? null : 'See C10/C13: €' + Math.round(r.fleet_cost).toLocaleString() + ' indicative (2(N+1) fleet, T3)',
    source: 'CIBSE Guide K / Uptime Institute', tier: 'Derived' });

  // F02 — EPA IE licence threshold
  const epa_s = r.epa_exceeds ? 'RED' : r.thermal_mw > 40 ? 'AMBER' : 'GREEN';
  findings.push({ id:'F02', area:'EPA IE Licence Threshold',
    status: s(epa_s),
    detail: r.thermal_mw.toFixed(1) + ' MWth thermal input (fleet ' + r.gen_fleet_mw + ' MW ÷ 40% efficiency). EPA threshold: 50 MWth.' + (r.epa_exceeds ? ' Exceeded by ' + (r.thermal_mw - 50).toFixed(1) + ' MWth.' : r.thermal_mw > 40 ? ' Within 10 MWth of threshold.' : ' Well below threshold.'),
    action: r.epa_exceeds ? 'EPA IE Licence application required. Cannot operate legally without licence above 50 MWth.' : r.thermal_mw > 40 ? 'Approaching threshold — investigate before any fleet expansion.' : 'No action required.',
    cost_range: r.epa_exceeds ? '€50,000–€150,000 indicative (EPA licence, legal, monitoring — T3)' : null,
    source: 'EPA IE — Industrial Emissions Directive / IED 2010/75/EU', tier: 'T1' });

  // F03 — UPS capacity
  findings.push({ id:'F03', area:'UPS Capacity',
    status: s(r.ups_ok ? 'GREEN' : 'RED'),
    detail: 'UPS: ' + r.ups_mw.toFixed(1) + ' MW at 0.9 PF. IT load: ' + Number(inp_raw.it_load_mw).toFixed(1) + ' MW.' + (r.ups_ok ? ' Capacity adequate for IT load.' : ' Shortfall: ' + Math.abs(r.ups_gap).toFixed(1) + ' MW versus IT load.'),
    action: r.ups_ok ? 'Adequate.' : 'UPS upgrade or additional modules required.',
    cost_range: r.ups_ok ? null : '€' + Math.round(Math.abs(r.ups_gap) * 1000 * 120).toLocaleString() + ' indicative for additional capacity (€120/kW, T3)',
    source: 'IEC 62040 / BS EN 62040', tier: 'Derived' });

  // F04 — Transfer time margin
  const tm_s = r.margin_s > 300 ? 'GREEN' : r.margin_s > 60 ? 'AMBER' : 'RED';
  findings.push({ id:'F04', area:'Generator Transfer Time Margin',
    status: s(tm_s),
    detail: r.bridge_s + ' s UPS bridge − 25 s generator sync = ' + r.margin_s + ' s margin. Recommended: > 300 s operational comfort.',
    action: r.margin_s > 300 ? 'Adequate margin.' : r.margin_s > 60 ? 'Investigate UPS battery health and generator start reliability.' : 'Critical — consider UPS battery string extension.',
    cost_range: r.margin_s <= 60 ? '€50,000–€200,000 indicative battery extension (T3)' : null,
    source: 'CIBSE Guide K / IEC 62040-3', tier: 'T3' });

  // F05 — Fuel endurance (Storm Éowyn benchmark)
  const fe_s = r.endur_hrs >= 72 ? 'GREEN' : r.endur_hrs >= 24 ? 'AMBER' : 'RED';
  findings.push({ id:'F05', area:'Fuel Endurance',
    status: s(fe_s),
    detail: r.endur_hrs.toLocaleString() + ' hours at full facility load. Benchmark: ≥72 hours (Storm Éowyn — January 2025 extended grid outage precedent).',
    action: r.endur_hrs >= 72 ? 'Adequate — meets Storm Éowyn 72-hour benchmark.' : 'Increase fuel storage or establish priority refuelling contract. ' + (72 - r.endur_hrs).toFixed(0) + ' hours below 72-hour target.',
    cost_range: r.endur_hrs < 72 ? '€50,000–€300,000 indicative for additional storage tank (T3)' : null,
    source: 'Storm Éowyn precedent (Jan 2025) / EirGrid grid outage protocols', tier: 'T3' });

  // F06 — Carbon tax exposure
  const ct_s = r.ct_2030 > 100000 ? 'RED' : r.ct_2030 > 25000 ? 'AMBER' : 'GREEN';
  findings.push({ id:'F06', area:'Generator Carbon Tax Exposure',
    status: s(ct_s),
    detail: Math.round(r.co2_t_yr).toLocaleString() + ' tCO₂/yr from generator testing. Current: €' + Math.round(r.ct_cur).toLocaleString() + '/yr (€71/tCO₂). 2030 projection: €' + Math.round(r.ct_2030).toLocaleString() + '/yr (€100/tCO₂).',
    action: r.co2_t_yr > 50 ? 'Evaluate HVO transition — indicative 90% Scope 1 reduction (C14: €' + Math.round(r.hvo_saved_eu).toLocaleString() + '/yr tax saving).' : 'Moderate exposure — monitor carbon tax trajectory.',
    cost_range: null,
    source: 'Budget 2025 (€71/tCO₂) / Finance Act (€100/tCO₂ by 2030)', tier: 'T1' });

  // F07 — BESS revenue opportunity
  const bess_s = r.bess_gap > 0 ? 'AMBER' : 'GREEN';
  findings.push({ id:'F07', area:'BESS Revenue Opportunity',
    status: s(bess_s),
    detail: r.cur_bess + ' MW BESS installed. Recommended: ' + r.bess_tgt + ' MW (DS3 eligible). Gap: ' + (r.bess_gap > 0 ? r.bess_gap + ' MW.' : 'None.'),
    action: r.bess_gap > 0 ? 'Install ' + r.bess_gap + ' MW BESS — indicative DS3 revenue €' + Math.round(r.ds3_rev/1000) + 'k/yr (T3).' : 'BESS adequate — investigate DS3 contract terms.',
    cost_range: r.bess_gap > 0 ? '€' + Math.round(r.bess_gap*1000000).toLocaleString() + '–€' + Math.round(r.bess_gap*1500000).toLocaleString() + ' indicative BESS CAPEX (€1.0–1.5M/MW, T3)' : null,
    source: 'EirGrid DS3 Programme / BNEF H2 2025', tier: 'T3' });

  return findings;
}

function deriveTrafficLight(findings) {
  if (findings.some(f => f.status === 'FAIL')) return 'RED';
  if (findings.some(f => f.status === 'FLAG')) return 'AMBER';
  return 'GREEN';
}

/* ================================================================
   HELPERS
   ================================================================ */
function tlClass(s){ if(!s)return''; s=s.toUpperCase(); return s==='GREEN'||s==='PASS'?'tl-green':s==='AMBER'||s==='FLAG'?'tl-amber':'tl-red'; }
function statusClass(s){ if(!s)return''; s=s.toUpperCase(); return s==='PASS'?'status-pass':s==='FLAG'?'status-flag':'status-fail'; }
function tierClass(t){ if(!t)return'tier-3'; return 'tier-'+t.replace('T',''); }

/* ================================================================
   COMPONENT: InputTab (same A+ pattern as v1.0)
   ================================================================ */
function InputTab({ inputs, setInputs, onRun, loading }){
  const [showConfirm, setShowConfirm] = useState(false);
  const [touched, setTouched] = useState({});
  const handleChange = (id, value) => { setInputs(prev => ({...prev, [id]: value})); setTouched(prev => ({...prev, [id]: true})); };
  const loadDemo = () => { setInputs({...DEMO_DATA}); setTouched({}); setShowConfirm(false); };
  const handleExport = () => { const b=new Blob([JSON.stringify(inputs,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=TOOL_ID+'_inputs.json'; a.click(); URL.revokeObjectURL(u); };
  const handleImport = () => { const i=document.createElement('input'); i.type='file'; i.accept='.json'; i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{setInputs(prev=>({...prev,...JSON.parse(ev.target.result)}))}catch(err){alert('Invalid JSON')}};r.readAsText(f)}; i.click(); };

  const missingRequired = INPUT_SCHEMA.filter(f=>f.required).filter(f=>{const v=inputs[f.id];return v===undefined||v===null||v==='';});
  const allValid = missingRequired.length === 0;
  const filledCount = INPUT_SCHEMA.filter(f=>{const v=inputs[f.id];return v!==undefined&&v!==null&&v!=='';}).length;

  const SECTIONS = [
    { title: 'Facility Identity',       ids: ['facility_name','location','build_year'] },
    { title: 'IT Load & Efficiency',    ids: ['it_load_mw','pue','racks'] },
    { title: 'Generator Fleet',         ids: ['gen_count','gen_rating_mw','gen_redundancy'] },
    { title: 'UPS System',              ids: ['ups_rating_mva','ups_efficiency','ups_bridge_min'] },
    { title: 'Fuel & Testing',          ids: ['fuel_type','fuel_storage_l','test_hours_yr'] },
    { title: 'BESS',                    ids: ['bess_installed','bess_mw'] }
  ];

  const renderField = (field) => {
    // Conditional BESS capacity field — only visible when BESS = Yes
    if (field.id === 'bess_mw' && inputs['bess_installed'] !== 'true') return null;
    const isEmpty = field.required && touched[field.id] && (inputs[field.id]===undefined||inputs[field.id]===null||inputs[field.id]==='');
    return (
      <div className="input-group" key={field.id}>
        <label className="input-label">{field.label}{field.unit?' ('+field.unit+')':''}{field.required?' *':''}</label>
        {field.type==='select'?(
          <select className={'input-field'+(isEmpty?' invalid':'')} value={inputs[field.id]||''} onChange={e=>handleChange(field.id,e.target.value)}>
            <option value="">— Select —</option>
            {(field.options||[]).map(opt=>{const val=typeof opt==='object'?opt.value:opt;const lab=typeof opt==='object'?opt.label:opt;return <option key={val} value={val}>{lab}</option>;})}
          </select>
        ):(
          <input className={'input-field'+(isEmpty?' invalid':'')} type={field.type==='number'?'number':'text'}
            value={inputs[field.id]!==undefined&&inputs[field.id]!==null?inputs[field.id]:''}
            onChange={e=>handleChange(field.id,field.type==='number'?(e.target.value===''?'':Number(e.target.value)):e.target.value)}
            min={field.min} max={field.max} step={field.step} placeholder={field.hint}/>
        )}
        {isEmpty&&<div className="field-error">Required</div>}
        {!isEmpty&&field.hint&&<div className="input-hint">{field.hint}</div>}
      </div>
    );
  };

  if(showConfirm) return (
    <div>
      <div className="confirm-panel">
        <h2 style={{fontSize:16,fontWeight:700,color:'var(--text-bright)',marginBottom:16}}>Confirm Screening</h2>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{filledCount} of {INPUT_SCHEMA.length} fields provided.</p>
        {INPUT_SCHEMA.map(f=>{const v=inputs[f.id];const has=v!==undefined&&v!==null&&v!=='';return(
          <div className="confirm-row" key={f.id}><span className="confirm-label">{f.label}</span>{has?<span className="confirm-value">{v}{f.unit?' '+f.unit:''}</span>:<span className="confirm-missing">not provided</span>}</div>
        );})}
      </div>
      <div style={{display:'flex',gap:12}}>
        <button className="btn-secondary" style={{flex:1}} onClick={()=>setShowConfirm(false)}>Edit Inputs</button>
        <button className="run-btn" style={{flex:2}} onClick={()=>{setShowConfirm(false);onRun();}}>Run Screening</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="btn-row no-print">
        <button className="btn-secondary" onClick={loadDemo}>Load Demo Data</button>
        <button className="btn-secondary" onClick={handleImport}>Import JSON</button>
        <button className="btn-secondary" onClick={handleExport}>Export JSON</button>
      </div>
      {SECTIONS.map(sec=>(
        <div className="input-section" key={sec.title}>
          <div className="input-section-header">{sec.title}</div>
          <div className="input-grid">{sec.ids.map(id=>{const field=INPUT_SCHEMA.find(f=>f.id===id);return field?renderField(field):null;})}</div>
        </div>
      ))}
      <button className="run-btn" disabled={loading} onClick={()=>{if(!allValid){const t={};INPUT_SCHEMA.filter(f=>f.required).forEach(f=>t[f.id]=true);setTouched(prev=>({...prev,...t}));return;}setShowConfirm(true);}}>
        {loading?'Running...':'Review & Run Screening'}
      </button>
      {!allValid&&Object.keys(touched).length>0&&<div style={{textAlign:'center',marginTop:8,fontSize:13,color:'var(--red)'}}>{missingRequired.length} required field{missingRequired.length>1?'s':''} missing</div>}
    </div>
  );
}

            <tbody>
              {Object.entries(CANONICAL_DATA).map(([key, cd]) => (
                <tr key={key} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 12px',color:'var(--text)'}}>{key.replace(/_/g,' ')}</td>
                  <td style={{padding:'8px 12px',color:'var(--text-bright)',fontFamily:'var(--font-mono)',fontWeight:600}}>{cd.value}</td>
                  <td style={{padding:'8px 12px',color:'var(--text-dim)'}}>{cd.unit}</td>
                  <td style={{padding:'8px 12px',color:'var(--text-dim)'}}>{cd.source}</td>
                  <td style={{padding:'8px 12px'}}><span className={'tier-badge '+tierClass(cd.tier)}>{cd.tier}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="nav-footer">
        All calculations are deterministic. No AI involvement in any numerical output. Audit trail generated by {TOOL_ID} v{TOOL_VERSION}.
      </div>
    </div>
  );
}

/* ================================================================
   COMPONENT: App — Runs calcs (instant) + requests interpretation (API)
   ================================================================ */
function App(){
  const [theme, setTheme] = useState('dark');
  const [activeTab, setActiveTab] = useState('input');
  const [inputs, setInputs] = useState({});
  const [calcSteps, setCalcSteps] = useState(null);
  const [findings, setFindings] = useState([]);
  const [trafficLight, setTrafficLight] = useState(null);
  const [interpretation, setInterpretation] = useState(null);
  const [interpreting, setInterpreting] = useState(false);
  const [error, setError] = useState(null);

  const toggleTheme = () => { const n=theme==='dark'?'light':'dark'; setTheme(n); document.documentElement.setAttribute('data-theme',n); };

  const runScreening = async () => {
    // STEP 1: Run calcs INSTANTLY (no API)
    const { results, steps } = runCalcEngine(inputs);
    setCalcSteps(steps);

    const fResults = runFindingsEngine(inputs, results);
    setFindings(fResults);

    const tl = deriveTrafficLight(fResults);
    setTrafficLight(tl);

    // Show calculations tab immediately
    setActiveTab('calculations');

    // STEP 2: Request AI interpretation (async, non-blocking)
    setInterpreting(true);
    setInterpretation(null);
    setError(null);

    try {
      const calcSummary = steps.map(s => s.name + ': ' + s.formatted + ' ' + s.unit).join('\n');
      const findingSummary = fResults.map(f => f.area + ': ' + f.status + ' — ' + f.detail).join('\n');

      const userPrompt = 'FACILITY: ' + (inputs.facility_name||'Unknown') + ' | ' + (inputs.location||'') + ' | Built ' + (inputs.build_year||'?') + '\n\nCALCULATED RESULTS:\n' + calcSummary + '\n\nFINDINGS:\n' + findingSummary + '\n\nTraffic light: ' + tl + '\n\nInterpret these pre-calculated results. Do not perform any arithmetic.';

      const response = await fetch('https://iphonednnnqhxvhypvwn.supabase.co/functions/v1/tool-interpret', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwaG9uZWRubm5xaHh2aHlwdnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDU0MzMsImV4cCI6MjA4OTc4MTQzM30.VoexekmmKTbiLOBcROZl4YxUnx-A3EP8Rj7J72FBWAU' },
        body: JSON.stringify({
          system_prompt: INTERPRETATION_PROMPT,
          user_message: userPrompt,
          max_tokens: 8000
        })
      });

      if(!response.ok) throw new Error('API error: ' + response.status);
      const data = await response.json();
      const text = data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
      const clean = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();

      // Try parse
      try { setInterpretation(JSON.parse(clean)); }
      catch(e) {
        const first = text.indexOf('{'); const last = text.lastIndexOf('}');
        if(first!==-1&&last>first) { try { setInterpretation(JSON.parse(text.substring(first,last+1))); } catch(e2) { setError('Interpretation parse failed. Calculated results are still valid.'); } }
        else setError('Interpretation unavailable. Calculated results are still valid.');
      }
    } catch(err) {
      setError('Interpretation unavailable: ' + err.message + '. Calculated results are still valid — see Calculations and Audit Trail tabs.');
    } finally {
      setInterpreting(false);
    }
  };

  const TABS = [
    { id:'input',        label:'📋 Input' },
    { id:'calculations', label:'🔢 Calculations' },
    { id:'report',       label:'📊 Report' },
    { id:'audit',        label:'📋 Audit Trail' }
  ];

  return (
    <div>
      <header>
        <img src={LOGO_SRC} alt="LBE" />
        <div style={{flex:1}}>
          <h1>{TOOL_NAME}</h1>
          <div className="sub">{TOOL_ID} v{TOOL_VERSION} | Legacy Business Engineers</div>
        </div>
        <button className="theme-toggle no-print" onClick={toggleTheme}>{theme==='dark'?'☀️':'🌙'}</button>
      </header>
      <div className="main">
        <div className="tab-row no-print">
          {TABS.map(tab=>(<button key={tab.id} className={'tab-btn'+(activeTab===tab.id?' active':'')} onClick={()=>setActiveTab(tab.id)}>{tab.label}</button>))}
        </div>

        {activeTab==='input'&&<InputTab inputs={inputs} setInputs={setInputs} onRun={runScreening} loading={interpreting}/>}
        {activeTab==='calculations'&&<CalculationsTab calcSteps={calcSteps} findings={findings} trafficLight={trafficLight} inputs={inputs}/>}
        {activeTab==='report'&&<ReportTab calcSteps={calcSteps} findings={findings} trafficLight={trafficLight} interpretation={interpretation} inputs={inputs} interpreting={interpreting}/>}
        {activeTab==='audit'&&<AuditTrailTab calcSteps={calcSteps} inputs={inputs}/>}

        {error&&<div className="error-box no-print" style={{marginTop:16}}><strong>Note:</strong> {error}</div>}

        <div className="nav-footer no-print">
          <div>{TOOL_ID} v{TOOL_VERSION} | Calculations: deterministic JavaScript | Interpretation: AI (Sonnet)</div>
          <div style={{marginTop:4}}>© 2026 Legacy Business Engineers Ltd | <a href="https://legacybe.ie">legacybe.ie</a></div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
