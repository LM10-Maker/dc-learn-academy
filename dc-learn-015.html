{id:"L6",level:6,name:"Carbon Accounting — The Glide Path Problem",icon:"📊",component:"Carbon Glide Path",available:true,
 userNeedStatement:"Understand why CRU Readiness temporarily increases carbon intensity and how to report it",
 plainEnglish:"Here is the paradox: complying with CRU/2025236 makes your carbon performance worse before it gets better. During years 1–3, gas generation adds Scope 1 while the CPPA has not yet delivered. Your CUE increases. CRREM alignment worsens.",
 clockQuote:"CRU readiness isn't a certificate you receive. It's a position you maintain. The clock doesn't stop when you file the first report. It keeps running. The programme is the answer — not because it's finished, but because it's working.",
 grammar:{facts:[
  {term:"Carbon Use Effectiveness (CUE)",definition:"Total facility carbon emissions divided by IT energy consumption, in kgCO₂/kWh IT. CUE = PUE × grid emission factor (location-based).",plain:"How much carbon it costs to deliver one kWh of useful IT work.",number:"Clonshaugh at PUE 1.50: CUE = 1.50 × 0.2241 = 0.336 kgCO₂/kWh IT (location-based, grid only).",standard:"The Green Grid CUE White Paper; SEAI 2026 grid EF 0.2241 kgCO₂/kWh",feynman:{analogy:"CUE is to carbon what PUE is to energy — a single number that tells you how efficiently your facility converts energy into compute.",firstPrinciples:"CUE captures both energy efficiency (PUE) and carbon intensity of the energy source.",theTest:"Calculate CUE for PUE 1.30 using only grid electricity at 0.2241 kgCO₂/kWh."}},
  {term:"Scope 1 vs Scope 2 during glide path",definition:"Scope 1 = direct emissions from gas combustion (~0.41 kgCO₂/kWh). Scope 2 = indirect from grid (0.2241 kgCO₂/kWh). During glide path, Scope 1 is added without Scope 2 reduction.",plain:"Your gas engines create new emissions while grid emissions do not decrease until the CPPA delivers.",number:"Gas Scope 1: ~0.41 kgCO₂/kWh. Grid Scope 2: 0.2241 kgCO₂/kWh. Gas is 1.83× the grid factor.",standard:"GHG Protocol; SEAI emission factors; EPA IE Licence guidance",feynman:{analogy:"Adding a petrol car to your fleet while your electric car is on order. Total emissions go up before they come down.",firstPrinciples:"The glide path creates a temporary carbon penalty — the unavoidable cost of building self-sufficient capacity.",theTest:"Why is gas Scope 1 (0.41) higher than grid Scope 2 (0.2241)?"}},
  {term:"CRREM band impact",definition:"Carbon intensity bands: <200 ALIGNED, 200–300 WATCH, 300–400 ELEVATED, >400 CRITICAL. On-site gas pushes facilities towards higher bands.",plain:"Your CRREM status may worsen during the generation glide path.",number:"Clonshaugh CUE before generation: 0.336 (~336 kgCO₂/MWh IT = ELEVATED). With gas: CUE could rise above 0.400 (CRITICAL) during years 1–3.",standard:"CRREM v2.01 (office proxy — no DC-specific pathway); AIMEP Source Verification Protocol",feynman:{analogy:"Taking on a short-term loan to fund a long-term investment — your debt ratio worsens before the investment pays off.",firstPrinciples:"CRREM measures the snapshot. The trajectory matters more than the current position if the glide path has a credible end point.",theTest:"What CRREM band does a CUE of 0.380 kgCO₂/kWh IT fall into?"}},
  {term:"Carbon tax exposure",definition:"On-site gas generation creates a carbon tax liability. Current: €71/tCO₂, rising to €100/tCO₂ by 2030 (Finance Act).",plain:"You pay carbon tax on every tonne of CO₂ your gas engines produce.",number:"€71/tCO₂ current (Budget 2025), €100/tCO₂ by 2030. Applies to Scope 1 only.",standard:"Finance Act; Budget 2025",feynman:{analogy:"A toll road for fossil fuels — the toll increases every year.",firstPrinciples:"Carbon tax internalises the externality, making low-carbon alternatives progressively more competitive.",theTest:"At €71/tCO₂, what is the annual carbon tax on 10,000 tCO₂ Scope 1?"}},
  {term:"Market-based vs location-based accounting",definition:"Two methods of calculating Scope 2. Location-based uses grid average. Market-based subtracts CPPA credits.",plain:"Two ways to count your electricity emissions — grid average vs your actual contracts.",number:"Location-based: 0.2241 for everyone. Market-based: 0.2241 × (1 - PPA%) for contracted portion.",standard:"GHG Protocol Scope 2 Guidance (2015); SFDR PAI indicators",feynman:{analogy:"Location-based is your neighbourhood average income. Market-based is your actual salary.",firstPrinciples:"Market-based rewards procurement decisions. Location-based provides comparability.",theTest:"Which method shows the benefit of a CPPA?"}}
 ],whatItLooksLike:"A carbon trajectory chart showing CUE over 10 years: rising in years 1–3, peaking, then declining as the CPPA ramps up.",
 siteChecklist:["Calculate current CUE (PUE × grid EF)","Model CUE with gas generation added","Model CUE trajectory as CPPA ramps over 6-year glide path","Identify CRREM band at each year","Calculate annual carbon tax liability"]},
 logic:{causeAndEffect:[
  {cause:"Gas engine Scope 1 emissions at 0.41 kgCO₂/kWh are nearly double the current Irish grid emission factor of 0.2241 kgCO₂/kWh",effect:"The blended facility Carbon Usage Effectiveness increases during years 1–3 as Scope 1 gas emissions are added before CPPA credits arrive",insight:"CRU Readiness temporarily worsens carbon performance. The key is communicating the trajectory, not the snapshot."},
  {cause:"New renewable CPPA projects take 3–5 years from contract signing to first generation delivery in the Irish market",effect:"The carbon reduction benefit from the CPPA lags the Scope 1 carbon cost from gas generation by 2–4 years in the compliance glide path",insight:"The glide path is designed around this reality. Early movers accept higher interim carbon for long-term self-sufficiency."},
  {cause:"Irish carbon tax is legislated to increase from €71/tCO₂ (Budget 2025) to €100/tCO₂ by 2030 under the Finance Act trajectory",effect:"The operating cost penalty for gas grows, creating a natural incentive to transition to hydrogen or biogas",insight:"The Finance Act trajectory is deliberately designed to make fossil gas progressively uneconomic."}
 ],constraintLesson:"The glide path paradox is the hardest thing to explain to ESG investors. A DC that was CRREM-ELEVATED at CUE 0.336 may become CRREM-CRITICAL at CUE 0.42 in year 2 — then improve to ALIGNED at CUE 0.15 by year 8.\n\nThe constraint is narrative. Without a clear trajectory story, the year 2 snapshot will trigger SFDR adverse impact flags.",
 weakestLink:{whatsWrong:"Our CRREM status has worsened since we installed generation. CRU Readiness is making our carbon worse.",whatsRight:"CUE increases during years 1–3 are expected and planned. The 10-year trajectory shows alignment by year 6–8.",howToGetThere:"Build the 10-year CUE trajectory chart. Show it in every investor report. Explain the three phases: (1) generation installed, (2) CPPA ramps up, (3) full delivery."}},
 rhetoric:{declan:{hook:"I installed gas engines as CRU required. Now the compliance team is telling me my carbon trajectory shows a CRREM misalignment in year 4. The engineering and the reporting need to be aligned from the start.",text:"I installed gas engines as the CRU required. Now compliance is telling me my carbon got worse. I know it is temporary, but the optics are bad until the wind farm comes online."},ann:{hook:"I need the 10-year CUE trajectory for the fund board. If year 2 shows CRREM misalignment risk, that is a disclosure item — and a reason to accelerate the CPPA signing rather than defer it.",text:"I need the 10-year CUE trajectory for the fund board. If year 2 shows CRREM-CRITICAL, we need the forward-looking narrative ready."},mark:{hook:"The carbon accounting is straightforward: Scope 1 from gas combustion, Scope 2 from grid import, market-based adjustment from CPPA and GoO. The complexity is in the measurement and reporting, not the engineering.",text:"The carbon accounting is straightforward: Scope 1 from gas, Scope 2 from grid, market-based adjustment for CPPA credits. The complexity is phased reporting."},sarah:{hook:"SFDR PAI indicators do not have a forward-looking trajectory mechanism. I report current-year values — but I use the 10-year model to demonstrate to investors that the trajectory is improving, not static.",text:"SFDR PAI indicators do not have a mechanism for forward-looking trajectories. I need voluntary supplementary disclosure showing the planned path."},tom:{hook:"Carbon tax on 10,000 tCO2 at 71 euros per tonne today is 710 thousand euros per year. At 100 euros by 2030 that rises to 1 million euros. Include the Finance Act schedule in every investment model from year one.",text:"Carbon tax on 10,000 tCO₂ at €71/tCO₂ = €710,000/year. At €100 by 2030 = €1M/year. Model it declining over the glide path."}},
 scenario:{title:"Clonshaugh Carbon Trajectory — 10-Year Model",narrative:"Clonshaugh installs hybrid generation in year 0. CPPA signed year 1, wind farm energises year 4. Full 80% delivery by year 6.",question:"What does the CUE trajectory look like?",answer:"This is the glide path paradox. Installing gas generation to meet the CRU obligation temporarily worsens carbon performance. CUE (Carbon Use Effectiveness) captures both energy efficiency and carbon intensity — it is the single number that tells an investor whether the facility is moving toward or away from net zero. Here is the year-by-year trajectory.\n\nYear 0 (pre-gen): CUE = 1.50 × 0.2241 = 0.336. CRREM: ELEVATED.\nYear 1 (gas, no CPPA): CUE ~0.42. CRREM: CRITICAL.\nYear 2–3 (gas running): CUE ~0.40–0.42. CRREM: CRITICAL.\nYear 4 (CPPA 40%): CUE ~0.28. CRREM: WATCH.\nYear 5 (CPPA 60%): CUE ~0.22. CRREM: WATCH.\nYear 6 (CPPA 80%): CUE ~0.15. CRREM: ALIGNED.\nYear 7–10 (full compliance): CUE ~0.10–0.15. CRREM: ALIGNED.\n\nWhat this means in practice: CUE gets worse before it gets better. For three years the facility shows CRREM-CRITICAL status — a red flag for ESG reporting. Ann needs this trajectory in the board paper from day one. Sarah needs voluntary supplementary disclosure showing the forward-looking path. The end state (CUE ~0.15) is significantly better than the starting point (0.336), but the journey requires a prepared narrative.",
whoShouldCare:["sarah","ann","tom"]},
 rhetoricTakeaways:{declan:"Declan should understand that on-site gas generation temporarily increases total carbon before renewables offset it. The Scope 1/Scope 2 balance must be tracked monthly during the glide path.",ann:"Ann must communicate the carbon trajectory to investors clearly — a temporary rise in reported emissions during CRU Readiness build-out is expected and documented in the programme plan.",mark:"Mark verifies the monitoring system reports CUE, Scope 1, and Scope 2 separately, with both market-based and location-based accounting, to satisfy CRU and ESG requirements simultaneously.",sarah:"Sarah should note that CRREM data centre pathways are not published — the LBE-derived bands (200/300/400 kgCO₂/MWh IT) are indicative only and must be disclosed as T3/T4 estimates.",tom:"Tom should include carbon tax escalation (€71→€100/tCO₂ by 2030) in the lifecycle cost model. For Clonshaugh, gas engine Scope 1 creates an estimated €58k/year liability at current rates."
},
L7:{
  declan:"Declan must verify whether on-site generation thermal input approaches the 50 MW EPA threshold. Exceeding it triggers Industrial Emissions licensing — a 12–18 month programme impact."},
 sourceNote:"SEAI 2026 grid EF 0.2241. Gas EF: EPA guidance (~0.41). Carbon tax: Budget 2025 (€71) and Finance Act (€100 by 2030). CRREM bands: LBE-derived PUE × GEF methodology — no published CRREM DC pathway (Tier 3/4).",
 retrofitRelevance:"Every existing DC installing CRU-compliant generation will experience this trajectory.",
 crossRefs:[{module:"DC-LEARN-006",level:"L2",topic:"Carbon Metrics — CUE methodology"},{module:"DC-LEARN-006",level:"L9",topic:"CRREM for Data Centres"}],
 cascadeCheck:(kw,racks,pue)=>{const itMWh=kw*racks*8.76;const gasFrac=0.2;const gasMWh=itMWh*pue*gasFrac;const gasEF=0.41;const gridEF=0.2241;const scope1=gasMWh*gasEF/1000;const scope2=itMWh*pue*(1-gasFrac)*gridEF/1000;const cue=(scope1+scope2)*1000/(itMWh);return{needed:cue.toFixed(3),available:"0.2241",unit:"kgCO₂/kWh (CUE vs grid)",pass:cue<0.35,detail:"CUE "+cue.toFixed(3)+" kgCO₂/kWh (Scope1: "+scope1.toFixed(0)+"t + Scope2: "+scope2.toFixed(0)+"t)"}}
},
{id:"L7",level:7,name:"EPA & Environmental — Licensing Triggers",icon:"🏭",component:"EPA Licensing",available:true,
 userNeedStatement:"Determine whether on-site generation triggers an EPA IE Licence",
 plainEnglish:"If your gas generators have combined thermal input above 50 MW, you need an EPA Industrial Emissions licence. Thermal input = electrical output ÷ efficiency. Get this calculation wrong and your project is delayed 12–18 months.",
 clockQuote:"It's a machine, an energy asset, and a compliance programme. And it took five people to see it. The clock hasn't stopped. It never stops. But they were ahead of it now — and they knew what to do when it gained.",
 grammar:{facts:[
  {term:"EPA IE Licence threshold",definition:"Combustion plant with total rated thermal input exceeding 50 MW requires an Industrial Emissions licence from the EPA.",plain:"If your power plant burns more than 50 MW of fuel (heat in, not electricity out), you need an EPA licence.",number:"50 MW thermal input threshold. Calculation: sum of all generator electrical output ÷ efficiency.",standard:"EPA IE guidance; EU IED 2010/75/EU",feynman:{analogy:"The speedometer measures fuel burned, not distance travelled.",firstPrinciples:"The EPA regulates combustion impacts (NOx, particulates, CO₂), not electrical output.",theTest:"A 25 MW gas plant at 40% efficiency: what is the thermal input?"}},
  {term:"Thermal input calculation",definition:"Thermal input (MW_th) = electrical output (MW_e) ÷ efficiency. Sum across all combustion units.",plain:"Divide your electrical output by engine efficiency to get the fuel input the EPA cares about.",number:"Example: 20 MW / 0.45 = 44.4 MW thermal. Below 50. But 25 MW / 0.45 = 55.6 MW — above threshold.",standard:"EPA IE Licence guidance; AIMEP DC Standards Reference",feynman:{analogy:"If you eat 2,000 calories but only convert 900 to useful energy, the dietician measures the 2,000.",firstPrinciples:"Efficiency losses become waste heat and emissions. The EPA regulates total combustion.",theTest:"Clonshaugh has 3.7 MW gas at 0.45 efficiency. What is the thermal input?"}},
  {term:"IE Licence programme impact",definition:"An EPA IE Licence takes 12–18 months, requires EIA screening, and adds conditions on noise, air quality, and fuel storage.",plain:"Getting the licence takes over a year and comes with strict environmental conditions.",number:"12–18 months processing. Typical: 55 dBA night noise, NOx limits, zero watercourse discharge, bunded fuel.",standard:"EPA licensing statistics; IE Licence conditions",feynman:{analogy:"Planning permission for a factory — takes time, adds conditions, but without it you cannot operate.",firstPrinciples:"Environmental licensing is a programme constraint, not just a compliance checkbox.",theTest:"At what project stage should the EPA thermal calculation be done?"}},
  {term:"HVO mandate",definition:"Hydrotreated Vegetable Oil, a drop-in diesel replacement. Near-zero net lifecycle CO₂ (biogenic carbon cycle), though stack Scope 1 CO₂ is still emitted at combustion. Increasingly required by EPA for new DC generation.",plain:"The EPA is increasingly requiring clean fuel instead of diesel for backup and testing. HVO burns like diesel but its lifecycle carbon is near-zero because the CO₂ was recently absorbed from the atmosphere.",number:"HVO price: ~2–3× natural gas on energy basis (Tier 4). Net lifecycle Scope 1: near-zero (biogenic). Stack CO₂ still present — report under GHG Protocol biogenic guidance.",standard:"EPA IE Licence conditions; EN 15940; GHG Protocol biogenic CO₂ guidance",feynman:{analogy:"Premium unleaded versus regular — costs more but fewer harmful emissions.",firstPrinciples:"HVO shifts the carbon accounting: stack CO₂ is biogenic (recently absorbed from atmosphere), so net lifecycle Scope 1 approaches zero. However, stack emissions still physically occur — the difference is accounting treatment, not physics.",theTest:"Does HVO eliminate Scope 1 emissions at the generation site? Answer: No — stack CO₂ still occurs, but net lifecycle Scope 1 is near-zero because the carbon is biogenic."}},
  {term:"Noise limits at sensitive receptors",definition:"EPA/planning conditions typically require 55 dBA Leq at the nearest noise-sensitive receptor at night.",plain:"Your generators cannot be too loud for the neighbours, especially at night.",number:"55 dBA Leq night-time. Gas engines: 85–95 dBA at 1 m (need acoustic enclosures). BESS: negligible noise.",standard:"EPA IE Licence conditions; EPA Noise Guidance NG4",feynman:{analogy:"55 dBA is roughly a quiet conversation. Your 90 dBA engine needs 35 dB of attenuation.",firstPrinciples:"Noise propagation follows the inverse square law but is modified by barriers and ground absorption.",theTest:"A gas engine at 90 dBA at 1 m needs to meet 55 dBA at 80 m. What attenuation is required?"}}
 ],whatItLooksLike:"An EPA licence application package — EIS screening, noise assessment, air dispersion modelling, fuel storage drawings, monitoring plan.",
 siteChecklist:["Calculate total thermal input for all combustion units","If >50 MW: initiate EPA pre-application immediately","If <50 MW: document calculation and retain as evidence","Assess noise — identify all sensitive receptors within 500 m","Check planning conditions for existing noise/emissions limits"]},
 logic:{causeAndEffect:[
  {cause:"A DC that installs 25 MW of gas engine generation at 40% thermal efficiency produces 62.5 MW thermal input for EPA threshold purposes",effect:"An EPA IE Licence is required, adding 12–18 months to the project programme and triggering HVO fuel obligations on the new licence",insight:"The thermal calculation must be done at feasibility stage, not detailed design."},
  {cause:"A hybrid configuration splits capacity between gas engines (thermal, high CRM de-rating) and BESS (non-combustion, DS3 revenue)",effect:"BESS contributes zero thermal input to the EPA calculation, potentially keeping the facility below the 50 MW IE Licence threshold",insight:"Hybrid is not just a de-rating strategy — it is also an EPA strategy."},
  {cause:"The EPA is increasingly mandating HVO or equivalent low-carbon fuel as a binding condition of new IE Licence approvals since 2023",effect:"Fuel costs increase 2–3× but net lifecycle Scope 1 emissions approach zero (biogenic carbon cycle)",insight:"HVO mandates are becoming standard. Budget for HVO pricing from day one. Stack CO₂ still occurs — report biogenic separately."}
 ],constraintLesson:"The 50 MW threshold is a hard boundary. Below: planning conditions only. Above: 12–18 month licensing process plus ongoing EPA oversight.\n\nFor Clonshaugh at 3.7 MW gas / 0.45 = 8.2 MW thermal — well below 50 MW. But for larger facilities, the calculation is critical.",
 weakestLink:{whatsWrong:"Our 20 MW gas plant is 20 MW so it is well below the 50 MW EPA threshold.",whatsRight:"The threshold is 50 MW THERMAL, not electrical. 20 MW electrical at 45% efficiency = 44.4 MW thermal. At 40% it is 50 MW — exactly at the threshold.",howToGetThere:"Run the calculation using worst-case (lowest) efficiency. Use the manufacturer ISO rating, not the brochure number."}},
 rhetoric:{declan:{hook:"I ran the numbers. Our 3.7 MW gas at 0.45 efficiency is 8.2 MW thermal — well below the 50 MW IE threshold. But at 10 MW electrical, I need the calculation confirmed before the planning application is submitted.",text:"I ran the numbers. Our 3.7 MW gas at 0.45 efficiency is 8.2 MW thermal. Not even close to 50 MW. No EPA licence needed. Twelve months saved on programme."},ann:{hook:"For portfolio planning, every facility above approximately 22 MW electrical generation requires an EPA IE Licence application. That is a programme item that takes 12 months and must appear in the development timeline.",text:"For portfolio planning, every facility above ~22 MW electrical generation should be flagged as potentially EPA-licensable."},mark:{hook:"I need the ISO efficiency data from the manufacturer, not the marketing specification. A 2 percent efficiency difference changes the thermal input calculation by 4 to 5 MW — which may cross a threshold.",text:"I need the manufacturer ISO efficiency data, not the marketing number. A 2 percentage point difference can move a facility across the threshold."},sarah:{hook:"An EPA IE Licence is a material disclosure item in transaction due diligence. Missing it on a facility above the thermal threshold is a regulatory gap that a buyer's legal team will identify and price.",text:"An EPA IE Licence is a material disclosure item for due diligence."},tom:{hook:"EPA licence application at 100 to 250 thousand euros. Annual monitoring at 30 to 50 thousand euros per year. Acoustic and emissions modelling for the application: 50 to 80 thousand euros. All must be in the development budget.",text:"EPA licence application: ~100–250K EUR. Annual monitoring: ~30–50K EUR/yr. Acoustic enclosures: ~80–150K EUR per unit."}},
 scenario:{title:"Clonshaugh EPA Check",narrative:"Clonshaugh hybrid: 3.7 MW gas (Jenbacher, 0.45 efficiency) + 1.6 MW BESS. One noise-sensitive receptor at 80 m.",question:"Does Clonshaugh need an EPA IE Licence?",answer:"The EPA Industrial Emissions Licence threshold is 50 MW total thermal input — not electrical output. The calculation is: electrical output ÷ engine efficiency = thermal input. Only combustion units count; BESS contributes zero. This is a critical programme gate: if you cross 50 MW thermal, you need an IE Licence that takes 12–18 months and comes with strict environmental conditions.\n\nThermal input: 3.7 MW / 0.45 = 8.2 MW thermal\nBESS: 0 MW thermal\nTotal: 8.2 MW. Below 50 MW. NO EPA IE LICENCE REQUIRED.\n\nNoise: 85–95 dBA at 1 m. At 80 m with attenuation: ~50–60 dBA. Acoustic enclosure needed for 55 dBA night margin.\nCost: ~80–120K EUR.\n\nWhat this means in practice: Clonshaugh clears the EPA threshold by a wide margin. No licence application, no 12–18 month delay, no annual monitoring costs (~30–50K/yr avoided). The noise enclosure is the only environmental mitigation needed. For larger facilities (above ~22 MW electrical generation), the EPA calculation becomes the critical path item.",
whoShouldCare:["mark","sarah","ann"]},
 rhetoricTakeaways:{declan:"Declan must verify whether on-site generation thermal input approaches the 50 MW EPA threshold. Exceeding it triggers Industrial Emissions licensing — a 12–18 month programme impact.",ann:"Ann should assess EPA IE Licence risk as a programme delay factor in the investment case. The €200–500k licensing cost is secondary to the 12–18 month schedule impact on CRM revenue.",mark:"Mark verifies thermal input is calculated precisely: engine fuel consumption (MW thermal) × number of units. The 50 MW threshold is absolute — there is no de minimis or phased exemption.",sarah:"Sarah should include EPA licensing status in ESG disclosures and note HVO fuel switching as a Scope 1 reduction pathway for backup generators.",tom:"Tom should carry a contingency for acoustic treatment, HVO fuel premium, and EPA licensing fees in the compliance budget. These are frequently omitted in early-stage cost estimates."
},
L8:{
  declan:"Declan should evaluate Green Energy Park models for any future expansion — co-locating with renewables and private wires simplifies CRU Readiness and reduces grid dependency."},
 sourceNote:"EPA IE Licence guidance. Gas engine efficiency: Jenbacher ISO data (Tier 3). Acoustics: BS 4142:2014+A1:2019 thresholds, typical DC plant noise levels (Tier 3).",
 retrofitRelevance:"The EPA check is mandatory for any DC installing combustion generation.",
 crossRefs:[{module:"DC-LEARN-007",level:"L2",topic:"EPA IE Licence regulatory framework"},{module:"DC-LEARN-010",level:"L6",topic:"Carbon accounting — EPA IE Licence obligations and Scope 1 reporting"}],
 cascadeCheck:(kw,racks,pue)=>{const mic=kw*racks/1000*pue;const gasFrac=0.7;const gasMW=mic*0.95*gasFrac;const eff=0.45;const thermal=gasMW/eff;return{needed:thermal.toFixed(1),available:"50",unit:"MW thermal vs 50 MW EPA",pass:thermal<50,detail:thermal.toFixed(1)+" MW thermal — "+(thermal<50?"below 50 MW, no IE Licence":"EXCEEDS 50 MW — IE Licence required")}}
},
{id:"L8",level:8,name:"Green Energy Parks — Regional Opportunity",icon:"🏞️",component:"Green Energy Parks",available:true,
 userNeedStatement:"Understand LEAP, Green Energy Parks, and what they mean for DC siting strategy",
 plainEnglish:"The Government approved the Large Energy User Action Plan in January 2026. Its centrepiece is Green Energy Parks — designated locations where DCs co-locate with renewable generation and storage. Dublin is constrained. The future is regional.",
 clockQuote:"The curtain at Row 7 was fixed. He didn't know when. He didn't know who. But it was done — and the fact that it was done, without being asked, told him more about what the programme had changed than any commissioning report.",
 grammar:{facts:[
  {term:"LEAP Action Plan",definition:"Government strategy approved 13 January 2026 with 17 actions to accommodate energy-intensive industries while meeting climate targets.",plain:"The Government's plan for how to grow energy-hungry industries without breaking the grid or climate.",number:"17 actions. 5-year implementation. Cabinet approved 13 January 2026.",standard:"LEAP Action Plan (Dept of Enterprise, January 2026)",feynman:{analogy:"A town plan that zones industrial areas near power stations, not in residential streets.",firstPrinciples:"Plan-led development reduces coordination failures.",theTest:"When was LEAP approved and how many actions does it contain?"}},
  {term:"Green Energy Parks",definition:"Designated locations where energy-intensive industries co-locate with renewable generation, storage, and grid infrastructure.",plain:"Pre-planned industrial zones next to wind farms and battery storage.",number:"Privately developed or State-coordinated. National Planning Statement forthcoming.",standard:"LEAP Action 5; CRU/2025236 locational provisions",feynman:{analogy:"An industrial estate with its own power station, built as one project.",firstPrinciples:"Co-location eliminates transmission losses and reduces grid reinforcement needs.",theTest:"Can a Green Energy Park be developed privately?"}},
  {term:"Private wires legislation",definition:"Government policy approved July 2025, legislation in Spring 2026, allowing private electricity infrastructure connecting generation directly to demand.",plain:"New laws allowing DCs to build private cables directly from wind farms.",number:"Policy approved July 2025. Legislation Spring 2026.",standard:"Government Statement on Private Wires; Government Legislation Programme Spring 2026",feynman:{analogy:"Building your own road instead of using the public highway.",firstPrinciples:"Private wires remove the grid bottleneck. If you generate and consume in the same location, why route through the public network?",theTest:"Is private wires legislation currently enacted or still pending?"}},
  {term:"Dublin constraint",definition:"The Greater Dublin Area grid is constrained — insufficient capacity for significant new DC demand.",plain:"Dublin is full. New large data centres will need to go somewhere else.",number:"Dublin: 1,150 MW operational DC capacity (H1 2025). 5.8 GW additional DC demand in pipeline nationally.",standard:"EirGrid capacity data; KPMG Ireland DC policy analysis (March 2026)",feynman:{analogy:"A car park that is full. You can wait or park down the road.",firstPrinciples:"Grid congestion in Dublin is structural. Reinforcement takes 5–10 years.",theTest:"How much DC capacity is currently operational in Dublin?"}},
  {term:"Regional opportunity",definition:"Areas outside Dublin with available grid capacity, RE resources, and planning potential.",plain:"The next wave of Irish data centres will be in the countryside, near wind farms.",number:"Amazon/Bord na Móna: Offaly (former peatlands). West Coast: offshore wind proximity.",standard:"LEAP Actions 1, 5, 8; EirGrid Transmission Development Plan",feynman:{analogy:"Building the factory where the raw materials are — when the product (data) travels at the speed of light.",firstPrinciples:"For hyperscale DC, the limiting factor is power, not proximity. A 20 ms latency difference is immaterial for most workloads.",theTest:"Why are former peatlands attractive for Green Energy Parks?"}}
 ],whatItLooksLike:"A masterplan showing a DC campus co-located with wind farm, battery storage, private wire, and shared grid infrastructure.",
 siteChecklist:["Assess whether planned site is constrained or unconstrained","Check proximity to RE pipeline within 20 km","Check EirGrid connection queue for regional capacity","Assess private wire feasibility (pending legislation)","Monitor National Planning Statement on Green Energy Parks"]},
 logic:{causeAndEffect:[
  {cause:"The Dublin grid is physically constrained at approximately 1,150 MW DC capacity with multi-year reinforcement timelines for additional headroom",effect:"New hyperscale DC development is effectively redirected to regional Irish locations with available grid capacity and co-located RE resources",insight:"This is not optional — it is a consequence of physics and policy."},
  {cause:"The LEAP Action Plan creates Green Energy Parks as pre-approved co-location zones for data centres adjacent to renewable generation",effect:"DC developers gain planning and grid certainty in exchange for committing to integrated RE development",insight:"Green Energy Parks trade flexibility for certainty."},
  {cause:"Irish private wires legislation enabling direct DC-to-renewable connections without the public grid is pending enactment in Spring 2026",effect:"Data centres could connect directly to adjacent renewable generation via private wire without the public grid, reducing CPPA additionality cost",insight:"This removes the most significant infrastructure constraint. A paradigm shift."}
 ],constraintLesson:"LEAP is the State's response to a dilemma: Ireland wants DC investment but cannot allow unconstrained grid demand growth. The solution is to move DCs to where the energy is generated.\n\nThe constraint is infrastructure. Regional sites often lack fibre connectivity, skilled workforce, and transport links.",
 weakestLink:{whatsWrong:"Green Energy Parks are a future concept. We should keep building in Dublin.",whatsRight:"Dublin is physically constrained. Even with CRU Readiness, new hyperscale connections will face locational assessment by SOs.",howToGetThere:"Monitor the National Planning Statement. Engage with IDA Ireland. Assess sites within 20 km of planned offshore wind landing points."}},
 rhetoric:{declan:{hook:"I manage a Dublin facility. For the next expansion, the board is looking at a regional location with its own generation. My job as ops manager would change completely — I need to understand how.",text:"I manage a Dublin facility. For our next expansion, the board is looking at a regional site near Moneypoint where ESB is planning offshore wind landing infrastructure."},ann:{hook:"Green Energy Parks change the investment thesis. Instead of DC in Dublin plus remote renewable asset, the Green Energy Park co-locates both — eliminating the grid connection queue and the transmission cost.",text:"Green Energy Parks change the investment thesis. Instead of DC in Dublin plus remote CPPA, we co-locate DC + wind + storage as a single integrated asset."},mark:{hook:"The engineering challenge in a regional location is different: fibre latency for latency-sensitive workloads, water availability for cooling, access road capacity for construction, and grid reinforcement requirements.",text:"The engineering challenge is different regionally. Fibre latency, water, access roads, and local workforce are all design constraints."},sarah:{hook:"For ESG reporting, a Green Energy Park DC with on-site renewables and waste heat utilisation is a materially stronger story than a Dublin DC with a remote CPPA. The Scope 1 and 2 profile is fundamentally cleaner.",text:"For ESG reporting, a Green Energy Park DC is a stronger story than Dublin DC with remote CPPA. Co-location is tangible."},tom:{hook:"Land at 50 to 150 thousand euros per acre regional versus 500 thousand to 1 million euros per acre in Dublin. But add fibre, roads, and grid reinforcement — the total development cost gap narrows significantly.",text:"Land: regional at 50–150K EUR/acre vs Dublin 500K–1M EUR/acre. But add fibre, roads, water and the gap narrows. Net benefit depends on scale — viable above ~20 MW IT."}},
 scenario:{title:"What Would Clonshaugh Look Like as a Green Energy Park?",narrative:"Hypothetical: Clonshaugh relocates its expansion (8 MVA additional) to a Green Energy Park in the Midlands, co-located with a 30 MW wind farm.",question:"How does the Green Energy Park model change the economics?",answer:"Dublin expansion (8 MVA additional):\n- SO may refuse or condition (constrained)\n- Separate CPPA needed\n- CAPEX: gen 8–15M EUR + CPPA 2–4M EUR/yr\n\nMidlands Green Energy Park:\n- Unconstrained grid, SO more likely to approve\n- Wind farm adjacent, potential private wire\n- CPPA cost near zero (captive RE)\n- Land ~70% lower\n\nSaving: ~2–4M EUR/yr CPPA. Over 15 years: 30–60M EUR.\nTrade-off: 5–10 ms latency, local workforce, 2–3 yr greenfield lead time.",
whoShouldCare:["ann","mark","sarah"]},
 rhetoricTakeaways:{declan:"Declan should evaluate Green Energy Park models for any future expansion — co-locating with renewables and private wires simplifies CRU Readiness and reduces grid dependency.",ann:"Ann should assess regional site options where grid capacity and wind resources align. Western and midlands sites can achieve CRU Readiness at lower cost than constrained Dublin locations.",mark:"Mark needs to understand private wires legislation constraints — current rules restrict direct supply from co-located generation. Proposed amendments may change the design basis for new facilities.",sarah:"Sarah can position regional development as a sustainability advantage — lower grid carbon intensity, proximity to renewable generation, and reduced pressure on Dublin's constrained network.",tom:"Tom should compare Dublin compliance costs (premium for constrained grid, acoustic treatment, limited expansion headroom) against regional alternatives (lower land cost, grid availability, wind proximity)."
},
L9:{
  declan:"Declan must create a master programme timeline that converges CRU Readiness, CRM qualification, CPPA procurement, and planning permission — with critical path analysis and milestone tracking."},
 sourceNote:"LEAP Action Plan (January 2026). KPMG Ireland DC analysis (March 2026). Land estimates: SCSI (Tier 4).",
 retrofitRelevance:"Existing Dublin DCs cannot relocate, but their operators can site new capacity regionally.",
 crossRefs:[{module:"DC-LEARN-006",level:"L7",topic:"CRU and Grid Connection"},{module:"DC-LEARN-007",level:"L6",topic:"Irish Planning — SID"}],
 cascadeCheck:(kw,racks,pue)=>{const mic=kw*racks/1000*pue;return{needed:mic.toFixed(1),available:"1150",unit:"MW (Dublin DC capacity)",pass:true,detail:mic.toFixed(1)+" MW vs Dublin operational 1,150 MW — "+(mic>50?"regional Green Energy Park may be more viable":"Dublin connection possible if capacity available")}}
},
{id:"L9",level:9,name:"The Full Compliance Programme — Integration",icon:"🎯",component:"Compliance Programme",available:true,
 userNeedStatement:"See how all CRU obligations integrate into a single phased investment programme",
 plainEnglish:"This is not eight separate problems. CRU generation, SEM participation, 80% renewable, carbon accounting, EPA licensing, EED reporting, F-Gas compliance, and CRREM alignment are one integrated decision.",
 clockQuote:"'When do we start?' The clock at Clonshaugh was under control. But a bigger clock had just started. The story wasn't over. It was scaling.",
 grammar:{facts:[
  {term:"Timeline convergence",definition:"Multiple regulatory deadlines converge: CRU (from connection), EED Article 12 (annual), F-Gas (2027 milestone), CRREM (annual), SFDR (annual).",plain:"All the deadlines hit at once. You need a single programme.",number:"CRU: from connection. EED: annual from May 2025. F-Gas: next major 2027. CRREM: annual. SFDR: annual PAI.",standard:"CRU/2025236; EED 2023/1791 Art.12; EU F-Gas; CRREM v2.01; SFDR RTS",feynman:{analogy:"Five buses arriving at the same stop — you need to be ready for all of them.",firstPrinciples:"Integrated compliance is cheaper and more effective than addressing each obligation independently.",theTest:"Name five regulatory obligations that converge for an Irish DC in 2026–2030."}},
  {term:"Phased investment programme",definition:"A sequenced capital deployment: (1) generation, (2) SEM registration, (3) CPPA, (4) EED/F-Gas, (5) CRREM trajectory.",plain:"Spend the money in the right order so each phase enables the next.",number:"Phase 1 (Yr 0–1): Generation + SEM. Phase 2 (Yr 1–3): CPPA + EED/F-Gas. Phase 3 (Yr 3–6): CPPA delivery + CRREM. Phase 4 (6+): Steady state.",standard:"RICS NRM1 programme management; SEM CRM Rules (phasing sequence — T2)",feynman:{analogy:"Building a house: foundation first, then walls, then roof.",firstPrinciples:"Each phase creates conditions for the next. Generation must be operational before SEM revenue starts.",theTest:"Why must generation be Phase 1, not Phase 3?"}},
  {term:"Total programme CAPEX",definition:"Combined capital cost of CRU Readiness: generation, grid modifications, metering, acoustics, legal/advisory.",plain:"The total bill for making your data centre CRU-compliant.",number:"Autoproducer (1–10 MVA): 6–15M EUR. Large user (10–50 MVA, expanded teaching scenario): 30–65M EUR. Hyperscale (50+ MVA): 80–200M EUR. All indicative ±30% (RICS NRM1 Class 4).",standard:"RICS NRM1 cost benchmarks; Thunder Said Energy 2025 generation capex (T3)",feynman:{analogy:"The total cost of a car: not just purchase, but insurance, tax, fuel, and maintenance for life.",firstPrinciples:"CAPEX is the entry cost. OPEX determines the long-term case. SEM revenue is the offset.",theTest:"What accuracy class applies to these CAPEX estimates?"}},
  {term:"SO connection application (31 March 2026)",definition:"EirGrid and ESB Networks must publish the new connection process reflecting CRU/2025236 by 31 March 2026.",plain:"The System Operators will tell you exactly how to apply under the new rules.",number:"Deadline: 31 March 2026. Will detail: application form, evidence, criteria, timelines.",standard:"CRU/2025236 Section 6.2",feynman:{analogy:"The exam syllabus — you know the subject, now you need the specific questions.",firstPrinciples:"The SO process translates CRU policy into engineering requirements.",theTest:"What is the significance of 31 March 2026?"}},
  {term:"Annual self-reporting",definition:"DCs must report annually on RE usage, emissions, and planned measures to achieve zero emissions.",plain:"Every year, you tell the CRU how you are doing on renewable and emissions targets.",number:"Annual cycle. Covers: RE usage, CPPA status, emissions (Scope 1+2), planned measures.",standard:"CRU/2025236 Section 5",feynman:{analogy:"Like filing annual accounts — you report progress against commitments.",firstPrinciples:"Self-reporting with verification creates accountability without continuous regulatory oversight.",theTest:"What three areas must the annual CRU report cover?"}}
 ],whatItLooksLike:"A programme Gantt chart showing generation, SEM, CPPA, EED, F-Gas, CRREM, and SFDR — all on one timeline with dependencies.",

 scenario:{title:"Clonshaugh Full Compliance Programme — Board Paper",narrative:"Clonshaugh prepares a board paper for Q2 2026 presenting the full CRU Readiness programme for its 4 MVA connection agreement.",question:"What are the headline numbers for the board?",answer:"FACILITY: Clonshaugh, Dublin. 400 racks, 6 kW/rack, 2.4 MW IT. PUE 1.50. 4 MVA.\nCRU TIER: Autoproducer (1–10 MVA).\n\nGENERATION: 5.3 MW hybrid (3.7 MW gas + 1.6 MW BESS). CAPEX: 5.3–8.0M EUR (±30%).\nEPA: 8.2 MW thermal. Below 50 MW. No licence.\n\nRENEWABLE: 80% of 31,536 MWh = 25,229 MWh. CPPA: ~11,984 MWh/yr gap. Cost: 1.0–1.2M EUR/yr.\n\nSEM REVENUE: ~644–714K EUR/yr.\n\nNET ANNUAL: ~0.5–0.8M EUR/yr.\nTOTAL 20-YEAR: CAPEX 5.8–8.5M + net OPEX 10–16M = 16–25M EUR.\nCARBON: CUE rises from 0.336 → 0.42 (year 1) then → 0.15 (year 6).\n\nRECOMMENDATION: Proceed. Delay increases risk — the CPPA market is tightening.",

// Source: 27 questions (9 per Trivium stage) per DC_LEARN_SERIES_SPEC_v1_2 §5. Distribution D1 verified.
const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q015-01",icon:"⚡",stage:"grammar",q:"When was CRU/2025236 published?",options:["December 2025","February 2025","January 2026","March 2026"],correct:0,explain:"CRU/2025236 was published 12 December 2025 — the final statutory direction. The February 2025 paper was the proposed decision only. Confusing the two dates leads to incorrect compliance timelines; all CRU deadlines run from 12 December 2025."},
  {level:1,id:"Q015-02",icon:"⚡",stage:"logic",q:"Why did the CRU replace the 2021 moratorium with a structured framework?",options:["To permanently ban new data centres in the Greater Dublin Area and redirect investment to regional infrastructure.","To create regulatory certainty while addressing security of supply and climate targets","To reduce residential electricity prices by making data centres pay a greater share of network infrastructure costs.","To comply with EU state aid rules that prohibit blanket moratoriums on commercial infrastructure development."],correct:1,explain:"The moratorium created investment uncertainty. CRU/2025236 replaces it with clear rules balancing digital economy, grid security, and decarbonisation."},
  {level:1,id:"Q015-03",icon:"⚡",stage:"rhetoric",q:"From Tom's perspective, what is the most significant commercial impact of CRU/2025236?",options:["Electricity price reductions from the SEM revenue obligation that offset operational energy costs for the facility.","Free grid connections in designated regional growth areas, reducing the TCP capital contribution significantly.","Elimination of carbon tax obligations for facilities that meet the 80% renewable sourcing requirement.","Additional CAPEX of 15–30 EUR per kW IT for generation"],correct:3,explain:"Tom flags generation adding €15–30/kW IT to CAPEX — at Clonshaugh's 2.4 MW, that is €36k–72k additional capital. This cost was absent from pre-2025 budgets and must now be factored into every DC investment appraisal under CRU/2025236."},
  {level:2,id:"Q015-04",icon:"🏷️",stage:"grammar",q:"What is the de minimis MIC threshold below which CRU/2025236 obligations do not apply?",options:["1 MVA","0.5 MVA","5 MVA","10 MVA"],correct:0,explain:"The de minimis threshold is 1 MVA MIC (CRU/2025236). Below this, no generation or renewable obligations apply. For Ann, this creates a natural market segment — edge and micro DCs face zero CRU compliance cost."},
  {level:2,id:"Q015-05",icon:"🏷️",stage:"logic",q:"A DC at 8 MVA plans to expand to 12 MVA. What happens at the CRU tier boundary?",options:["Nothing changes — the original tier assessment applies permanently and expansion does not trigger re-assessment under CRU/2025236.","Only the additional 4 MVA increment faces the full generation tier obligations, with the original 8 MVA remaining under the autoproducer tier.","The expansion application is automatically refused because 12 MVA exceeds the GDA grid capacity allocation per site.","The facility moves from autoproducer to full generation tier at 10 MVA"],correct:3,explain:"The 10 MVA threshold is a cliff edge — total MIC, not the increment, determines the tier. At 12 MVA the facility enters full generation tier with substantially higher obligations. Tom must model the cost step before filing the expansion application."},
  {level:2,id:"Q015-06",icon:"🏷️",stage:"rhetoric",q:"Why does Ann describe the tier structure as creating 'natural market segmentation'?",options:["Because the tier structure excludes smaller operators from the Irish DC market by making sub-1 MVA facilities economically unviable.","Because different MIC tiers face proportionally different obligations and capital requirements","Because the generation tier only applies to hyperscale facilities, leaving colocation operators unaffected by CRU/2025236 obligations.","Because the three tiers are voluntary and operators can choose their compliance level based on their business model."],correct:1,explain:"Ann sees three investment profiles: exempt (<1 MVA, zero CRU cost), autoproducer (1–10 MVA, manageable generation), and full generation (>10 MVA, substantial CAPEX). Each tier creates a distinct risk-return profile for fund allocation decisions."},
  {level:3,id:"Q015-07",icon:"🔋",stage:"grammar",q:"What is the approximate de-rating factor for a 4-hour LFP BESS in the SEM CRM?",options:["0.85","0.70","0.40","0.95"],correct:2,explain:"BESS (4-hour LFP) de-rates at ~0.35–0.45 in CRM because it cannot sustain output through a 12-hour stress event. A 10 MW BESS earns CRM on only ~4 MW de-rated capacity. Gas engines de-rate much higher at ~0.85–0.90."},
  {level:3,id:"Q015-08",icon:"🔋",stage:"logic",q:"Why is a hybrid gas+BESS configuration often preferred over standalone gas or BESS?",options:["It provides the best weighted de-rating plus dual revenue streams (CRM + DS3)","A hybrid configuration is always cheaper on a per-MW basis than either standalone gas or BESS because shared infrastructure reduces fixed costs.","The CRU mandates a hybrid configuration for all DCs above 10 MVA MIC under CRU/2025236.","A hybrid eliminates all Scope 1 emissions because the BESS handles daytime load, limiting gas engine runtime to night hours only."],correct:0,explain:"Hybrid captures gas's high CRM de-rating (~0.85) and BESS's fast DS3/FFR response in a single asset. Gas earns capacity revenue; BESS earns frequency revenue. Tom's model should stack both streams against combined CAPEX."},
  {level:3,id:"Q015-09",icon:"🔋",stage:"rhetoric",q:"Mark needs the EPA thermal input before signing off on gas engines. Why?",options:["Thermal input determines the electrical output rating of the gas engine, which is required for the EirGrid connection application.","Mark needs thermal input to select the correct engine manufacturer — only certain manufacturers supply engines above 15 MW thermal.","Thermal input determines the CRM de-rating factor applied in the SEM capacity auction for the generation asset.","To determine if 50 MW thermal threshold triggers an IE Licence"],correct:3,explain:"Mark verifies: electrical output ÷ efficiency = thermal input. At Clonshaugh, 3.7 MW gas ÷ 0.45 = 8.2 MWth — below the 50 MW EPA threshold. A larger 25 MW fleet would hit 55.6 MWth, triggering a 12–18 month IE Licence process."},
  {level:4,id:"Q015-10",icon:"💰",stage:"grammar",q:"What is the CRM in the SEM?",options:["Capacity Remuneration Mechanism","Carbon Reduction Mechanism","Connection Review Method","CRU Regulatory Mandate"],correct:0,explain:"CRM pays generators for availability during system stress, based on de-rated capacity. At the T-4 clearing price of €149,960/MW/yr (SEMO PCAR2829T-4), this is the largest single revenue stream for DC on-site generation in Ireland."},
  {level:4,id:"Q015-11",icon:"💰",stage:"logic",q:"Why does SEM revenue transform generation from 'pure cost to self-funding asset'?",options:["Because the CRU refunds generation CAPEX directly to qualifying DCs through a grid development levy credit mechanism.","Because CRM (~150K/MW) + DS3 + arbitrage exceeds annual generation operating costs","Because SEM participation is voluntary and the revenue guarantee is backed by EirGrid's regulated revenue stream.","Because grid electricity becomes effectively free for generators that export more than 50% of their output to the SEM."],correct:1,explain:"Revenue stacking — CRM (~€150k/MW/yr) + DS3 (€10–25k/MW) + wholesale arbitrage — typically exceeds generation OPEX. This transforms generation from pure compliance cost to a self-funding investment. Ann's model must capture all three streams."},
  {level:4,id:"Q015-12",icon:"💰",stage:"rhetoric",q:"Declan says he will 'hire an aggregator'. What role does the aggregator play?",options:["The aggregator designs and procures the on-site generation plant on behalf of the DC operator under a turnkey EPC contract.","The aggregator builds and operates the CPPA wind farm that supplies the 80% renewable obligation under CRU/2025236.","The aggregator conducts the EPA IE Licence application and manages the environmental permitting process for the gas engines.","Manages SEMO registration, dispatch, and settlement for 5–10% of revenue"],correct:3,explain:"Aggregators manage SEMO registration, dispatch, and settlement — the complexity Declan's team lacks in-house. Fee is typically 5–10% of revenue. Without one, the operator must build a trading desk — impractical for a single-site DC."},
  {level:5,id:"Q015-13",icon:"🌿",stage:"grammar",q:"What percentage of annual electricity must new DCs above 1 MVA source from additional Irish renewables?",options:["50%","60%","80%","100%"],correct:2,explain:"CRU/2025236 requires 80% from additional (new or repowered) Irish RE — the additionality requirement. Existing RESS/REFIT wind farms do not qualify. The operator must procure CPPAs that trigger new-build RE capacity on the Irish grid."},
  {level:5,id:"Q015-14",icon:"🌿",stage:"logic",q:"Why do existing RESS/REFIT wind farms not satisfy the 80% obligation?",options:["They lack additionality — the obligation requires NEW capacity that would not exist without the DC commitment","Existing wind farms are too old to meet the technical performance standards for CPPA additionality certification under CRU/2025236.","Their intermittent output profile means they cannot reliably deliver 80% of DC annual demand regardless of contracted capacity.","Existing wind farms are State-owned and CRU/2025236 prohibits State-owned generation from counting toward the DC renewable obligation."],correct:0,explain:"Additionality means each MW of DC demand must trigger new RE on the Irish grid. Buying certificates from existing wind farms does not satisfy CRU/2025236 — only CPPAs with new-build or repowered projects qualify. This drives Ireland's RE pipeline."},
  {level:5,id:"Q015-15",icon:"🌿",stage:"rhetoric",q:"Tom calculates 9.5M EUR/year in renewable costs for a 10 MW facility. What drives this number?",options:["Carbon tax on 10 MW of on-site gas generation at €100/tCO₂ applied to estimated annual test and emergency run hours.","80% of 140,000 MWh at 85 EUR/MWh additionality premium","Grid connection reinforcement charges levied by EirGrid on facilities above 5 MW MIC in the Greater Dublin Area.","BESS charging costs for the 4-hour LFP system required under the autoproducer tier of CRU/2025236."],correct:1,explain:"Tom's calculation: 80% × 140,000 MWh × €85/MWh additionality premium ≈ €9.5M/yr. The additionality premium — cost above market price to finance new-build RE — is the single largest CRU compliance cost for generation-tier facilities."},
  {level:6,id:"Q015-16",icon:"📊",stage:"grammar",q:"What is the approximate Scope 1 emission factor for gas engine generation?",options:["0.10 kgCO₂/kWh","0.2241 kgCO₂/kWh","0.41 kgCO₂/kWh","0.65 kgCO₂/kWh"],correct:2,explain:"Gas engines produce ~0.41 kgCO₂/kWh — nearly twice the grid factor of 0.2241 (SEAI 2026). On-site gas adds Scope 1 immediately, even as CPPAs reduce Scope 2 over time. Sarah must model both effects to show the net carbon trajectory."},
  {level:6,id:"Q015-17",icon:"📊",stage:"logic",q:"Why does CRU Readiness temporarily WORSEN carbon performance?",options:["Because the CRU bans all renewable procurement during the first three years of a new generation licence.","Because grid electricity becomes more carbon-intensive once a DC has on-site generation, due to load displacement effects on the Irish grid.","Because BESS produces measurable Scope 2 emissions during the charging cycle that exceed the Scope 1 savings from avoided grid import.","Because gas generation adds Scope 1 before the CPPA delivers renewable credits"],correct:3,explain:"The glide path paradox: on-site gas adds Scope 1 immediately, but CPPA-driven Scope 2 reductions take 3–5 years to materialise. Sarah must frame this for the board — CUE temporarily worsens before improving. The six-year trajectory is key."},
  {level:6,id:"Q015-18",icon:"📊",stage:"rhetoric",q:"What does Sarah need to explain to the fund board about the CUE trajectory?",options:["That CUE will steadily improve from year one as the CPPA and SEM revenue both take effect simultaneously on commissioning.","That CUE rises in years 1–3, stabilises, then drops below baseline as the CPPA delivers","That CRREM no longer applies to data centres following the July 2025 CRREM Foundation update which removed the DC pathway.","That carbon tax escalation will be eliminated by the 2030 Finance Act review, removing the upward CUE pressure entirely."],correct:1,explain:"Sarah must communicate a three-phase CUE trajectory: rise (years 1–3 as gas adds Scope 1), stabilise (CPPA ramps), decline (80% RE achieved). Without this narrative, the board may reject a strategy that temporarily worsens the ESG headline number."},
  {level:7,id:"Q015-19",icon:"🏭",stage:"grammar",q:"The EPA IE Licence threshold is based on what measurement?",options:["Thermal input in MW","Electrical output in MW","Annual energy production in MWh","Number of generator units"],correct:0,explain:"EPA IE Licence triggers at 50 MW thermal input — electrical output ÷ efficiency, not nameplate MWe capacity. This catches operators who compare their MWe to the 50 MW threshold without converting to thermal. Mark should verify every claim."},
  {level:7,id:"Q015-20",icon:"🏭",stage:"logic",q:"A hybrid gas/BESS can help avoid the EPA threshold because...",options:["BESS units are classified as electrical storage, not generation, and are explicitly exempt from all EPA IE Licence regulation.","BESS does not contribute thermal input (no combustion), reducing the total below 50 MW","The EPA grants hybrid systems automatic exemption from the IE Licence threshold provided BESS covers at least 30% of peak output.","Gas engines in hybrid mode operate at lower load factor, which increases their thermal efficiency and reduces the calculated thermal input."],correct:1,explain:"BESS has zero thermal input — no combustion. Hybrid gas+BESS reduces the combustion component below 50 MWth, potentially avoiding the EPA IE Licence. At Clonshaugh, 3.7 MW gas + BESS stays at 8.2 MWth — well below the threshold."},
  {level:7,id:"Q015-21",icon:"🏭",stage:"rhetoric",q:"What does Declan mean by 'saves us 12 months on programme'?",options:["EPA processing time has been reduced to 6 months under the government's expedited DC permitting pathway announced in the LEAP Action Plan.","The EPA has agreed to fast-track IE Licence applications for Clonshaugh-scale facilities that commit to HVO fuel from commissioning.","At 8.2 MW thermal, Clonshaugh is below 50 MW — no IE Licence needed, avoiding 12–18 month process","Declan has identified a licensing exemption under the Fire Services Act that reclassifies standby gas engines as safety-critical plant."],correct:2,explain:"Clonshaugh's 3.7 MW gas ÷ 0.45 = 8.2 MWth — well below the 50 MW EPA threshold. No IE Licence means no 12–18 month application, no public consultation, no programme delay. Declan's '12 months saved' is the EPA timeline avoided."},
  {level:8,id:"Q015-22",icon:"🏞️",stage:"grammar",q:"When was the LEAP Action Plan approved by Cabinet?",options:["December 2025","13 January 2026","March 2026","July 2025"],correct:1,explain:"LEAP was approved by Cabinet on 13 January 2026 with 17 actions for energy-intensive industries including data centres. It introduces mandatory energy audits, efficiency benchmarks, and annual reporting for sites above 50 GWh/yr consumption."},
  {level:8,id:"Q015-23",icon:"🏞️",stage:"logic",q:"Why are Green Energy Parks expected outside Dublin?",options:["Dublin City Council has banned new industrial development in the GDA, directing all DC campus applications to regional local authorities.","Regional locations offer superior fibre connectivity for latency-sensitive hyperscale workloads that cannot tolerate Dublin network congestion.","Dublin grid is constrained at 1,150 MW DC capacity, while regional areas have spare grid and RE resources","The CRU/2025236 generation tier only permits new DC approvals in designated rural enterprise zones outside the Greater Dublin Area."],correct:2,explain:"Dublin grid capacity is constrained at ~1,150 MW allocated to DCs. Regional sites near wind resources offer faster connection, lower TCP costs, and potential co-location as Green Energy Parks — Ann's 'captive RE at lower cost than market CPPAs.'"},
  {level:8,id:"Q015-24",icon:"🏞️",stage:"rhetoric",q:"What does Ann mean by 'captive RE at lower cost than market CPPAs'?",options:["Renewable energy contracted directly from the Government's RESS auction pool at regulated prices below open-market CPPA rates.","Free electricity sourced directly from the Irish national grid at off-peak hours when renewable generation exceeds demand.","Subsidised wind energy procured under legacy REFIT tariffs, which carry a lower strike price than new-build additionality CPPAs.","Co-located RE connected via private wire, eliminating the CPPA additionality premium"],correct:3,explain:"In a Green Energy Park, DC and wind farm share a site via private wire — eliminating network charges and the CPPA additionality premium. Ann sees captive RE at a cost structure significantly below open-market CPPA rates."},
  {level:9,id:"Q015-25",icon:"🎯",stage:"grammar",q:"By what date must System Operators publish the new CRU connection process?",options:["12 December 2025","13 January 2026","31 March 2026","1 July 2026"],correct:2,explain:"CRU/2025236 Section 6.2 directs System Operators (EirGrid, ESB Networks) to publish updated connection processes by 31 March 2026. Until publication, no new applications can be processed under the revised framework — a hard programme dependency."},
  {level:9,id:"Q015-26",icon:"🎯",stage:"logic",q:"Why is integrated compliance cheaper than addressing each CRU obligation independently?",options:["Shared advisory, metering, and reporting infrastructure reduces duplication","The CRU offers a compliance fee discount for DCs that register all five obligations simultaneously in the same regulatory period.","Only the generation obligation must be met in practice — the renewable and reporting obligations are waived once generation is in place.","Integrated CRU projects are exempt from carbon tax because they are reclassified as energy infrastructure rather than commercial buildings."],correct:0,explain:"One data collection exercise feeds five parallel obligations: CRU generation, CRU renewables, EED recast, EU Taxonomy, and CRREM. Integrated compliance avoids duplication — shared metering, shared advisory, one programme manager across all streams."},
  {level:9,id:"Q015-27",icon:"🎯",stage:"rhetoric",q:"In the Clonshaugh board paper, what is the approximate net annual compliance cost after SEM revenue?",options:["Zero — SEM revenue fully covers all CPPA, generation OPEX, and reporting obligations with a surplus.","0.5–0.8M EUR","1.5–1.9M EUR","5–8M EUR"],correct:1,explain:"Annual CPPA (1.0–1.2M) + gen OPEX (0.2–0.3M) - SEM revenue (0.64–0.71M) = ~0.5–0.8M EUR/yr. CRM at ~150K/MW/yr transforms the economics."}
];

const GLOSSARY_015 = [
{term:"Additionality",def:"Requirement that renewable energy procurement causes new generation capacity to be built, rather than purchasing certificates from existing sources."},
{term:"Autoproducer Tier",def:"CRU classification for data centres with MIC between 1 and 10 MVA, requiring on-site generation capacity for system stress events."},
{term:"BESS",def:"Battery Energy Storage System — provides frequency response, peak shaving, and bridges the gap between grid loss and generator start."},
{term:"Carbon Tax",def:"Irish excise duty on fossil fuel combustion. Currently €71/tCO₂ (Budget 2025), legislated to reach €100/tCO₂ by 2030."},
{term:"Carbon Use Effectiveness (CUE)",def:"Metric measuring kgCO₂ emitted per kWh of IT energy consumed. Captures both grid carbon intensity and on-site generation emissions."},
{term:"Capacity Remuneration Mechanism (CRM)",def:"SEM mechanism paying generators to be available during system stress. T-4 clearing price: €149,960/MW/year (SEMO PCAR2829T-4)."},
{term:"Corporate PPA (CPPA)",def:"Long-term power purchase agreement between a corporate buyer and a renewable generator, typically 10–15 years with a new-build project."},
{term:"CRREM",def:"Carbon Risk Real Estate Monitor — provides decarbonisation pathways for real estate assets. No published pathway exists for data centres (T3/T4)."},
{term:"CRU",def:"Commission for Regulation of Utilities — Irish statutory regulator responsible for electricity, gas, and water regulation."},
{term:"CRU/2025236",def:"CRU statutory direction establishing the three-pillar framework (generation, flexibility, renewables) for data centre grid connections."},
{term:"De Minimis Threshold",def:"1 MW IT load below which CRU data centre obligations do not apply. Facilities under this threshold are excluded from the framework."},
{term:"De-rating Factor",def:"Reduction applied to generator nameplate capacity to reflect ambient conditions, altitude, and maintenance. Typically 10–15% in Ireland."},
{term:"DS3 / FASS",def:"Delivering a Secure Sustainable Electricity System — EirGrid's system services framework paying for frequency response, reactive power, and ramping."},
{term:"EED Recast",def:"Energy Efficiency Directive 2023/1791 — EU legislation requiring data centres >500 kW to report energy performance metrics including PUE."},
{term:"EPA IE Licence",def:"Industrial Emissions licence required when thermal input exceeds 50 MW. Process takes 12–18 months with public consultation."},
{term:"ESB Networks",def:"Distribution System Operator for Ireland, managing the MV/HV network up to 110 kV. Processes MIC applications and connection agreements."},
{term:"EU Taxonomy",def:"Classification system defining environmentally sustainable economic activities. Data centres must achieve PUE ≤1.3 under Delegated Act 2021/2139."},
{term:"Full Generation Tier",def:"CRU classification for data centres with MIC exceeding 10 MVA, requiring higher levels of firm dispatchable generation capacity."},
{term:"Glide Path",def:"Six-year phased trajectory for achieving the 80% renewable obligation, allowing operators to ramp up procurement progressively."},
{term:"Green Energy Park",def:"Co-location model placing data centres adjacent to renewable generation with shared grid connection and potential private wire supply."},
{term:"Grid Emission Factor",def:"Carbon intensity of electricity from the national grid. SEAI 2026 value: 0.2241 kgCO₂/kWh (T1 — declining annually)."},
{term:"HVO",def:"Hydrotreated Vegetable Oil — drop-in diesel replacement for backup generators, reducing Scope 1 emissions by up to 90%."},
{term:"Installed Capacity",def:"CRU formula: number of generator units × derated output × availability factor. This is the compliance-relevant capacity, not nameplate."},
{term:"LEAP",def:"Large Energy User Action Plan — SEAI requirement for sites consuming over 50 GWh/year to develop and implement energy efficiency plans."},
{term:"Location-based Accounting",def:"GHG accounting method using average grid emission factors. Required alongside market-based in dual-reporting frameworks."},
{term:"Market-based Accounting",def:"GHG accounting method using contractual instruments (CPPAs, REGOs) to determine emission factors for purchased electricity."},
{term:"Maximum Import Capacity (MIC)",def:"Maximum electrical demand (MVA) that ESB Networks agrees to supply. Determines CRU tier and all downstream compliance obligations."},
{term:"Misalignment Year",def:"Year when an asset's carbon intensity trajectory exceeds the CRREM decarbonisation pathway. LBE-derived concept for data centre assessment."},
{term:"PUE",def:"Power Usage Effectiveness — ratio of total facility energy to IT energy. EU Taxonomy threshold: ≤1.3. Clonshaugh current: 1.50, target: 1.20."},
{term:"Reciprocating Gas Engine",def:"Internal combustion engine burning natural gas for electricity generation. 42–45% electrical efficiency, <60s start time, CRM-eligible."},
{term:"Renewable Gap",def:"Difference between current renewable electricity percentage and the 80% CRU target, determining CPPA procurement volume required."},
{term:"Revenue Stacking",def:"Combining multiple income streams (CRM + DS3 + wholesale + avoided import) from the same generation asset to improve investment returns."},
{term:"Scope 1 Emissions",def:"Direct GHG emissions from owned or controlled sources — on-site gas engines, diesel generators, refrigerant leaks."},
{term:"Scope 2 Emissions",def:"Indirect GHG emissions from purchased electricity. Reduced by CPPAs (market-based) or grid decarbonisation (location-based)."},
{term:"Section 34 Direction",def:"Legal instrument under the Electricity Regulation Act giving CRU/2025236 statutory force over ESB Networks connection decisions."},
{term:"SEM",def:"Single Electricity Market — the all-island wholesale electricity market for Ireland and Northern Ireland."},
{term:"System Operator (SO)",def:"EirGrid (transmission) and ESB Networks (distribution) — responsible for grid connection applications and network planning."},
{term:"Thermal Input",def:"Fuel energy consumed by generation equipment (MW thermal), calculated from fuel flow rate and calorific value. EPA threshold: 50 MW."},
{term:"Trading Site",def:"SEM registration allowing a generation unit to participate in wholesale markets, CRM auctions, and DS3 system services."},
{term:"Three Pillars",def:"CRU/2025236 framework requiring data centres to provide: (1) on-site generation, (2) demand flexibility, (3) 80% renewable procurement."}
];

const SO_WHAT_MAP = {
"CRU/2025236":"Why it matters: This statutory direction replaces the informal moratorium with a transparent, rules-based framework. Data centres that meet the three pillars can proceed; those that don't cannot connect. For Clonshaugh, it defines every compliance obligation from generation to renewables.",
"De facto moratorium (2021–2025)":"Why it matters: Four years of connection uncertainty destroyed planning confidence and froze investment. Understanding why it happened — grid stress from 1.2 GW of DC load on a 5 GW peak system — prevents repeating the mistakes that caused it.",
"Three pillars of CRU/2025236":"Why it matters: Generation, flexibility, and renewables are not optional extras — they are mandatory conditions for grid connection. Missing any single pillar blocks the entire project, regardless of performance on the other two.",
"Section 34 direction":"Why it matters: This is the legal instrument that gives CRU/2025236 its statutory force. It means ESB Networks cannot approve a connection application that fails the three-pillar test — there is no discretion or appeal to a different authority.",
"Scope exclusion":"Why it matters: Edge nodes, enterprise rooms, and telecoms are excluded from the CRU framework. Operators must verify whether their facility falls within scope before investing in compliance infrastructure that may not be required.",
"De minimis threshold":"Why it matters: The 1 MW IT load threshold determines whether a facility triggers CRU obligations at all. Clonshaugh at 2.4 MW IT is well above this line — there is no route to exemption through downsizing.",
"Autoproducer tier (1–10 MVA)":"Why it matters: Most Irish data centres, including Clonshaugh at 5 MVA, fall into this tier. The generation requirement is less onerous than the full tier but still demands on-site or contracted dispatchable capacity during system alerts.",
"Full generation tier (10 MVA+)":"Why it matters: Large hyperscale facilities face the highest generation obligations — firm dispatchable power equivalent to a percentage of MIC. Understanding the threshold helps operators plan expansion without accidentally triggering the full tier.",
"Maximum Import Capacity (MIC)":"Why it matters: MIC is the single number that determines your CRU tier, your generation obligation, and your ESB Networks connection agreement. Getting MIC wrong cascades through every compliance calculation in the programme.",
"Expansion trigger":"Why it matters: Any MIC increase — even a modest one — can push a facility from the autoproducer tier to the full generation tier, triggering substantially higher obligations. Expansion decisions must be modelled against CRU thresholds before commitment.",
"De-rating factor":"Why it matters: CRU does not accept nameplate capacity at face value. A 2 MW gas engine derated by 15% for ambient temperature delivers only 1.7 MW of firm capacity. Under-sizing by ignoring derating means failing the generation pillar.",
"Installed capacity calculation":"Why it matters: The installed capacity formula (number of units × derated output × availability factor) determines whether you pass the generation pillar. Every variable must be documented and defensible for the annual self-report.",
"Reciprocating gas engine":"Why it matters: Gas engines are the dominant on-site generation technology for Irish data centres because they start in under 60 seconds, achieve 42–45% electrical efficiency, and qualify for CRM revenue. They are the default solution for Pillar 1.",
"BESS (Battery Energy Storage System)":"Why it matters: Batteries provide sub-second frequency response and bridge the gap between grid loss and generator start. They also stack DS3 revenue — but CRU does not count BESS alone toward the generation pillar because batteries discharge, not generate.",
"Hybrid configuration":"Why it matters: Combining gas engines with BESS and solar PV creates a system that satisfies all three CRU pillars simultaneously while maximising revenue from CRM, DS3, and renewable certificates. This is the emerging best-practice design.",
"Single Electricity Market (SEM)":"Why it matters: SEM is the all-island wholesale market where generators sell and suppliers buy. Data centre on-site generation must be registered in SEM to qualify for CRM payments and to demonstrate compliance with the flexibility pillar.",
"Capacity Remuneration Mechanism (CRM)":"Why it matters: CRM pays generators to be available during system stress events. At €149,960/MW/year (T-4 clearing price), a 2 MW engine earns ~€300k/year — revenue that directly offsets the capital cost of CRU-mandated generation.",
"DS3 / FASS system services":"Why it matters: DS3 pays for fast-acting services (frequency response, reactive power, ramping). BESS and fast-start engines can earn €30–80k/MW/year from DS3 on top of CRM — making the business case for compliance infrastructure significantly stronger.",
"Trading Site registration":"Why it matters: Without a valid Trading Site registration in SEM, on-site generation cannot participate in CRM or DS3. Registration is a prerequisite for the revenue streams that make CRU Readiness economically viable.",
"Revenue stacking":"Why it matters: Revenue stacking (CRM + DS3 + wholesale arbitrage + avoided import) transforms CRU Readiness from a pure cost into a net-positive investment. The financial case depends on stacking — no single stream alone justifies the capital.",
"80% renewable obligation":"Why it matters: CRU/2025236 mandates that 80% of a data centre's electricity consumption must come from verified renewable sources. This is the single largest ongoing compliance obligation and the hardest to achieve in a constrained Irish market.",
"Additionality":"Why it matters: Buying existing wind certificates does not count — CRU requires proof that the renewable procurement causes new capacity to be built. This fundamentally changes how Corporate PPAs must be structured for compliance.",
"Six-year glide path":"Why it matters: Operators do not need to achieve 80% renewables on day one. The glide path allows phased ramp-up, but the trajectory must be documented in the annual self-report with credible procurement contracts backing each year's target.",
"Corporate PPA (CPPA)":"Why it matters: A CPPA is the primary instrument for meeting the 80% renewable obligation with additionality. The contract must be long-term (10–15 years), with a new-build wind or solar project, and matched to actual consumption profiles.",
"Renewable gap calculation":"Why it matters: The gap between current renewable percentage and the 80% target determines the volume of CPPAs needed. For Clonshaugh consuming ~21 GWh/year IT load, an 80% target means securing ~16.8 GWh of additional verified renewable supply.",
"Carbon Use Effectiveness (CUE)":"Why it matters: CUE measures kgCO₂ per kWh of IT energy. It captures both grid carbon intensity and on-site emissions. As the grid decarbonises (SEAI 2026: 0.2241 kgCO₂/kWh), CUE becomes the primary metric linking energy strategy to ESG reporting.",
"Scope 1 vs Scope 2 during glide path":"Why it matters: On-site gas generation reduces Scope 2 (grid imports) but increases Scope 1 (direct combustion). During the glide path, total carbon may temporarily rise before renewables offset the gas. ESG reporting must explain this trajectory.",
"CRREM band impact":"Why it matters: CRREM pathway alignment determines whether the asset is classified as Paris-aligned or at risk of misalignment. Data centres do not have a published CRREM pathway — the LBE-derived bands (200/300/400 kgCO₂/MWh IT) are indicative only (T3/T4).",
"Carbon tax exposure":"Why it matters: At €71/tCO₂ (rising to €100 by 2030), on-site gas generation creates a direct carbon tax liability. A 2 MW gas engine running 2,000 hours/year at 0.205 kgCO₂/kWh gas produces ~820 tCO₂ = ~€58k/year carbon tax exposure.",
"Market-based vs location-based accounting":"Why it matters: Market-based accounting allows renewable certificates to reduce reported emissions; location-based uses the average grid factor. CRU Readiness requires market-based evidence, but investors increasingly demand both methods disclosed side by side.",
"EPA IE Licence threshold":"Why it matters: Any facility with thermal input exceeding 50 MW triggers an EPA Industrial Emissions licence — a 12–18 month process with public consultation. This threshold constrains on-site generation sizing and must be checked before procurement.",
"Thermal input calculation":"Why it matters: Thermal input is calculated from fuel consumption, not electrical output. A 2 MW gas engine at 42% efficiency consumes ~4.76 MW thermal. Three such engines = 14.3 MW thermal — well below the 50 MW IE threshold for Clonshaugh.",
"IE Licence programme impact":"Why it matters: Triggering an IE Licence adds 12–18 months and €200–500k to the programme. For Clonshaugh, staying below 50 MW thermal input is a hard design constraint that limits the number of on-site generators.",
"HVO mandate":"Why it matters: Hydrotreated Vegetable Oil can replace diesel in backup generators with minimal modifications, reducing Scope 1 emissions by up to 90%. CRU does not mandate HVO, but ESG frameworks increasingly expect fossil-fuel alternatives for emergency power.",
"Noise limits at sensitive receptors":"Why it matters: Gas engines and cooling towers generate 85–95 dBA at 1 metre. Planning conditions typically require 45 dBA at the nearest residence. Acoustic enclosures add €50–100k per engine — a cost that must be included in the CRU Readiness budget.",
"LEAP Action Plan":"Why it matters: The Large Energy User Action Plan (LEAP) is an SEAI requirement for sites consuming over 50 GWh/year. While Clonshaugh at ~21 GWh is below the threshold, expansion toward 20 kW/rack would trigger LEAP obligations.",
"Green Energy Parks":"Why it matters: Co-locating data centres with renewable generation (wind, solar, battery) creates a microgrid that can satisfy CRU pillars at source. Green Energy Parks are emerging as the preferred model for new Irish DC development.",
"Private wires legislation":"Why it matters: Current Irish legislation restricts private wire connections between generators and consumers. Proposed amendments would enable direct supply from co-located renewables — removing the need to route through the public grid.",
"Dublin constraint":"Why it matters: Dublin's transmission network is capacity-constrained, with limited headroom for new large connections. CRU/2025236 explicitly acknowledges this by requiring demand flexibility and generation to reduce net grid impact in the Dublin region.",
"Regional opportunity":"Why it matters: EirGrid's capacity maps show significant headroom in the west and midlands, where wind resources are also strongest. Regional sites can achieve CRU Readiness more easily due to available grid capacity and proximity to renewable generation.",

"Phased investment programme":"Why it matters: Spreading CRU Readiness capital over 3–5 years aligns expenditure with the renewable glide path and CRM revenue ramp-up. Front-loading all investment creates cash-flow stress before revenue streams are established.",
"Total programme CAPEX":"Why it matters: The total CRU Readiness programme for a facility like Clonshaugh — generation, BESS, switchgear, acoustic treatment, grid reinforcement — is estimated at €3–5M. This must be weighed against €300–500k/year in stacked revenue.",

"Annual self-reporting":"Why it matters: CRU requires annual evidence of compliance across all three pillars. The self-report must include generation availability logs, renewable procurement certificates, and flexibility response records. Failure to report is treated as non-compliance."
