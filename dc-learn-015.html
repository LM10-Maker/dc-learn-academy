{id:"L1",level:1,name:"The CRU Decision — What Changed",icon:"⚡",component:"CRU Decision",available:true,
 userNeedStatement:"Understand what CRU/2025236 requires and why it replaces the 2021 moratorium",
 plainEnglish:"In December 2025 the CRU published its final decision on how new data centres connect to the Irish grid. It replaces the 2021 direction (CRU/21/124) that effectively blocked new connections for four years. The new policy says: bring your own generation, source 80% renewable, and participate in the electricity market.",
 clockQuote:"The question was simple. Yes or no. The answer was neither — and both. That was what the last six months had been about: learning that compliance was not a state you achieved but a position you maintained.",
 grammar:{facts:[
  {term:"CRU/2025236",definition:"The CRU's Large Energy Users Connection Policy decision paper, published 12 December 2025, establishing a tiered connection framework for data centres replacing CRU/21/124.",plain:"The new rulebook for connecting data centres to the Irish grid.",number:"Published 12 December 2025. Applies to all new DC connection applications from that date.",standard:"CRU/2025236, Section 34 direction under Electricity Regulation Act 1999",feynman:{analogy:"Think of it as a new building code — every application filed after this date must comply, no grandfather clause for new builds.",firstPrinciples:"The grid cannot absorb unlimited flat-profile demand. By requiring DCs to bring generation, the policy makes each new connection approximately system-neutral.",theTest:"Can you explain why the old moratorium was unsustainable and what three things the new policy requires?"}},
  {term:"De facto moratorium (2021–2025)",definition:"The period from November 2021 (CRU/21/124) to December 2025 during which new data centre grid connections were effectively blocked.",plain:"For four years, getting a new data centre connected in Ireland was nearly impossible.",number:"Data centre share of Irish electricity rose from 5% (2015) to 22% (2024).",standard:"CRU/21/124; CSO Metered Electricity Consumption 2024",feynman:{analogy:"The moratorium was a dam holding back a flood. The new policy replaces the dam with managed channels.",firstPrinciples:"Reactive prohibition creates investment uncertainty. Structured rules create predictable pathways.",theTest:"What percentage of Irish electricity did data centres consume in 2024?"}},
  {term:"Three pillars of CRU/2025236",definition:"The three core requirements: (1) dispatchable generation matching MIC, (2) 80% renewable from additional Irish sources, (3) SEM market participation.",plain:"Every new data centre must bring its own power plant, buy Irish wind or solar, and trade in the electricity market.",number:"Three pillars. 80% renewable target. 6-year glide path. 100% MIC in dispatchable capacity (de-rated).",standard:"CRU/2025236 Section 6.2",feynman:{analogy:"Like requiring every new factory to arrive with its own water supply, recycling plan, and contribution to the town reservoir.",firstPrinciples:"Making new demand self-supporting removes the system adequacy burden from existing consumers.",theTest:"Name the three pillars of CRU/2025236."}},
  {term:"Section 34 direction",definition:"The legal mechanism under the Electricity Regulation Act 1999 by which the CRU directs EirGrid and ESB Networks to implement the new connection policy.",plain:"The CRU tells the grid operators exactly how to process data centre applications.",number:"SOs required to publish connection application process by 31 March 2026.",standard:"Electricity Regulation Act 1999 s.34; CRU/2025236 Section 6.2",feynman:{analogy:"The CRU writes the exam questions, the System Operators mark the papers.",firstPrinciples:"Regulatory authority flows through statutory instruments.",theTest:"By what date must System Operators publish the new connection application process?"}},
  {term:"Scope exclusion",definition:"CRU/2025236 applies exclusively to data centres, not to other Large Energy Users such as pharmaceuticals, semiconductors, or life sciences.",plain:"This policy is for data centres only. Other big energy users have a different path under LEAP.",number:"DC demand: 22% of Irish electricity in 2024. 85% of all demand growth 2015–2023.",standard:"CRU/2025236 Section 1; LEAP Action Plan (January 2026)",feynman:{analogy:"Data centres got their own lane because they are the biggest single category of demand growth.",firstPrinciples:"Concentrated, flat-profile, geographically clustered demand needs different treatment from variable industrial loads.",theTest:"Does CRU/2025236 apply to a new pharmaceutical plant? Why or why not?"}}

 logic:{causeAndEffect:[
  {cause:"DC electricity demand grew from approximately 5% to 22% of Irish total national consumption between 2015 and 2024",effect:"Grid capacity constraints on the Dublin transmission system triggered EirGrid's 2021 moratorium on new DC connections",insight:"The moratorium was a symptom, not a solution. Unconstrained demand growth without matching generation required a structural policy response."},
  {cause:"The 2021 EirGrid moratorium on new DC connections blocked an estimated €10 billion in planned Irish DC investment",effect:"Ireland lost competitive position for new DC investment to European markets with clearer grid connection frameworks",insight:"Regulatory uncertainty is more damaging than tough but clear rules. CRU/2025236 trades leniency for predictability."},
  {cause:"CRU/2025236 requires qualifying DCs to bring dispatchable on-site generation AND source 80% of annual electricity from additional Irish renewables",effect:"New DC projects become net contributors to system adequacy rather than net consumers",insight:"The two-pillar approach addresses both security of supply and decarbonisation simultaneously."}
 ],constraintLesson:"The CRU had to balance three competing interests: Ireland's digital economy (21,000 direct DC jobs), grid security (system adequacy margin), and climate targets (80% renewable by 2030). The 2021 moratorium addressed security but sacrificed the economy. CRU/2025236 attempts to serve all three by making new DC demand self-supporting.\n\nThe constraint is time. The 6-year glide path means that during years 1–3, a new DC with gas generation will actually increase Ireland's Scope 1 emissions.",
 weakestLink:{whatsWrong:"The moratorium ended, so data centres can connect freely now.",whatsRight:"The moratorium was replaced by a structured regime that is arguably more demanding — full dispatchable generation, 80% renewable, and SEM participation are substantial commitments.",howToGetThere:"Read CRU/2025236 Section 6.2. Map your facility against the three tiers. Calculate generation and renewable obligations. Budget accordingly."}},
 rhetoric:{declan:{hook:"Four years we could not get a connection. Now we can, but CRU says we need to bring our own generation. Before we decide anything, I need to know which tier we actually fall into.",text:"Four years we could not get a connection. Now we can, but we need to bring a power plant with us. The rules are clear at least — I would rather have hard rules than no rules."},ann:{hook:"The investment case fundamentally changes under CRU/2025236. A 50 MW DC now requires a co-located generation asset — model that capital requirement from the first development appraisal.",text:"The investment case fundamentally changes. A 50 MW DC now requires a co-located generation asset that participates in the SEM. That is a different risk profile and return model."},mark:{hook:"I need to understand the SO connection application process before finalising the generation specification. The connection agreement terms define the metering, protection, and generation de-rating requirements.",text:"I need the SO connection application process (due 31 March 2026) to understand the technical requirements. The CRU sets the policy; the SOs implement the engineering."},sarah:{hook:"CRU/2025236 is material for SFDR reporting. Any DC fund holding Irish assets needs to disclose how the generation obligation is being managed — it is a new Principal Adverse Impact item.",text:"For SFDR reporting, CRU/2025236 is material. Any DC fund holding Irish assets needs to disclose the generation obligation and its carbon implications during the glide path."},tom:{hook:"The generation obligation adds 15 to 30 euros per kW IT to CAPEX at this scale. For a 10 MW facility that is 150 to 300 thousand euros of additional capital before a single server is installed.",text:"The generation obligation adds 15–30 EUR per kW IT to CAPEX. For a 10 MW facility, that is 15–30 million EUR additional capital before you serve a single rack."}},
 scenario:{title:"Clonshaugh Expansion — Which Tier?",narrative:"Clonshaugh currently has a 4 MVA connection. The operator wants to expand to 12 MVA. The expansion application will be filed in Q2 2026.",question:"What CRU tier applies and what are the headline obligations?",answer:"The expansion takes Clonshaugh from 4 MVA (autoproducer) to 12 MVA (full generation tier, above 10 MVA).\n\n1. Full dispatchable generation matching 12 MVA MIC (~11.4 MW at 0.95 PF, de-rated)\n2. 80% of annual demand from additional Irish RE (6-year glide path)\n3. Mandatory SEM participation\n4. Annual self-reporting\n\nGeneration CAPEX (hybrid): ~20–35M EUR (Tier 4, ±30%).\nCPPA cost: ~6–8M EUR/yr at 75–100 EUR/MWh additionality (Tier 4).",
whoShouldCare:["declan","mark","ann","sarah"]},
 rhetoricTakeaways:{declan:"For Ops, the CRU framework replaces years of connection uncertainty with a clear, rules-based pathway. Declan can now plan procurement timelines against known obligations rather than waiting for ad-hoc approvals.",ann:"For Fund Managers, CRU/2025236 de-risks Irish DC investment by making compliance requirements transparent and predictable. Ann can model CRU costs and revenue streams into asset valuations with confidence.",mark:"For MEP Engineers, the three-pillar structure defines the technical scope — generation sizing, flexibility systems, and renewable integration must all be designed as an integrated system, not bolt-on afterthoughts.",sarah:"For ESG Analysts, the CRU framework creates a verifiable compliance pathway that maps directly to EU Taxonomy technical screening criteria and CSRD disclosure requirements.",tom:"For QS, the CRU framework defines the scope boundaries for compliance budgeting. Tom can now price generation, flexibility, and renewable procurement as distinct cost elements with known deliverables."
},

{id:"L2",level:2,name:"CRU Tier Classification — Which Rules Apply",icon:"🏷️",component:"Tier Classification",available:true,
 userNeedStatement:"Determine which CRU tier a facility falls into and what obligations that triggers",
 plainEnglish:"CRU/2025236 creates three tiers based on Maximum Import Capacity. Below 1 MVA you are exempt. Between 1 and 10 MVA you need an autoproducer unit. Above 10 MVA you need full dispatchable generation.",
 clockQuote:"The dashboard showed every metric Sarah had been unable to report six months ago. PUE metered. WUE zero. Renewable at 82%. EED filed. F-Gas on schedule. The form she couldn't fill in Chapter 9 was now filling itself — because the infrastructure behind it had been built.",
 grammar:{facts:[
  {term:"De minimis threshold",definition:"Data centres with MIC below 1 MVA are exempt from CRU/2025236 generation and renewable obligations, though SOs may still refuse connections in constrained locations.",plain:"Below 1 MVA, you are off the hook for generation — but you can still be refused on location grounds.",number:"1 MVA de minimis. Below this: no generation, no 80% renewable, no SEM.",standard:"CRU/2025236 Section 3.1",feynman:{analogy:"Like a small business exemption from large-employer labour laws — you are not covered, but other rules still apply.",firstPrinciples:"Imposing generation obligations on sub-1 MVA sites would be disproportionate.",theTest:"A 0.8 MVA edge facility applies for connection in Dublin. Is it exempt from CRU/2025236?"}},
  {term:"Autoproducer tier (1–10 MVA)",definition:"DCs with MIC between 1 MVA and 10 MVA must provide an autoproducer unit meeting 100% of MIC on a de-rated basis, registered as a Trading Site in the SEM.",plain:"Mid-sized data centres need their own generator that participates in the electricity market.",number:"1 MVA to less than 10 MVA. De-rated capacity must meet 100% of MIC. SEM registration mandatory.",standard:"CRU/2025236 Section 3.2",feynman:{analogy:"Your car needs an engine big enough to drive at motorway speed — measured after de-rating, not the nameplate.",firstPrinciples:"De-rating accounts for the difference between installed capacity and what the system can rely on.",theTest:"A 5 MVA colocation needs an autoproducer. If the de-rating factor for gas engines is 0.85, what installed capacity is needed?"}},
  {term:"Full generation tier (10 MVA+)",definition:"DCs with MIC at or above 10 MVA must provide full dispatchable on-site or proximate generation, with mandatory SEM participation and 80% renewable obligation.",plain:"Large data centres must bring a complete power plant that trades in the wholesale electricity market.",number:"10 MVA and above. Full dispatchable generation. Mandatory SEM. 80% renewable. Annual reporting.",standard:"CRU/2025236 Section 3.3",feynman:{analogy:"At this scale, you are not just a consumer — you are a participant in the national electricity system.",firstPrinciples:"A 50 MW DC is the equivalent of a small town. The grid cannot absorb that without the DC contributing to system adequacy.",theTest:"What is the fundamental difference between the autoproducer and full generation tiers?"}},
  {term:"Maximum Import Capacity (MIC)",definition:"The maximum electrical demand a customer can draw from the grid, as specified in the ESB Networks connection agreement. MIC determines the CRU tier.",plain:"The number on your grid connection agreement that decides which CRU tier you are in.",number:"Measured in MVA. Convert to MW: MW = MVA × power factor (typically 0.95 for DC).",standard:"ESB Networks Connection Agreement; CRU/2025236",feynman:{analogy:"MIC is the pipe diameter. Your actual demand is how much water you draw through it.",firstPrinciples:"MIC represents the maximum system impact, not the average load.",theTest:"A DC has 4 MVA MIC but typically draws only 2.5 MW. Which MIC determines the CRU tier?"}},
  {term:"Expansion trigger",definition:"Existing DCs seeking to increase their MIC are subject to CRU/2025236 at the new MIC level.",plain:"If you expand, your new total MIC determines your tier — even if the original connection predates the policy.",number:"Applies from 12 December 2025 to all new connection applications and MIC increases.",standard:"CRU/2025236 Section 1.2",feynman:{analogy:"Adding a floor to a building triggers current building regulations, not the ones from when it was first built.",firstPrinciples:"The policy prevents existing operators from growing unconstrained while new entrants face full obligations.",theTest:"Clonshaugh has a legacy 4 MVA connection from 2013. If it applies for 12 MVA, what tier applies?"}}
 ],whatItLooksLike:"A decision tree: check MIC, determine tier, read the obligations. Operators should have their ESB connection agreement to hand.",
 siteChecklist:["Locate ESB Networks connection agreement and confirm current MIC","Determine CRU tier based on MIC","If expanding, calculate new total MIC and re-check tier","Check whether the site is in a constrained location","Note: de minimis facilities in constrained areas may still be refused"]},
 logic:{causeAndEffect:[
  {cause:"A DC operator applying to increase MIC from 8 MVA to 12 MVA crosses the 10 MVA tier boundary defined in CRU/2025236",effect:"The facility crosses from autoproducer to full generation tier, triggering substantially greater obligations",insight:"The 10 MVA threshold is a cliff edge. Operators close to 10 MVA should carefully evaluate whether expansion justifies the step-change."},
  {cause:"CRU/2025236 sets a 1 MVA MIC de minimis threshold below which no generation or renewable sourcing obligations apply",effect:"Small edge and enterprise data centres below 1 MVA MIC are fully exempted, significantly reducing the administrative compliance burden",insight:"Proportionality: the cost of compliance for a 500 kVA facility would exceed any system benefit."},
  {cause:"Under CRU/2025236, Maximum Import Capacity (MIC) — not actual measured demand — determines the compliance tier for each facility",effect:"A lightly loaded facility with high MIC faces the same obligations as a fully utilised one",insight:"MIC represents the maximum grid impact. The CRU designs obligations around worst-case, not average."}
 ],constraintLesson:"The tier structure creates strategic decisions for operators near the boundaries. An 8 MVA facility planning expansion to 11 MVA faces a discontinuous jump at 10 MVA. Some may choose to limit to 9.9 MVA.\n\nThis is rational commercial behaviour, but also the kind of gaming the CRU anticipated. The SO connection process may include provisions to address phased applications designed to avoid threshold triggers.",
 weakestLink:{whatsWrong:"My existing 8 MVA facility is not affected because it was built before the policy.",whatsRight:"Existing connections are not retrospectively covered. But any application to increase MIC is covered from 12 December 2025.",howToGetThere:"Check the date of your connection agreement. Check your current MIC. Check whether any planned expansion triggers a tier change."}},
 rhetoric:{declan:{hook:"We are at 4 MVA. If we expand to 6 we stay in autoproducer tier. If we go to 12 or above, the generation obligation changes the scale of investment required entirely.",text:"We are at 4 MVA. If we expand to 6, we stay in autoproducer tier. If we go to 12, we hit full generation. That is a completely different capital commitment."},ann:{hook:"The tier structure creates market segmentation. Sub-1 MVA edge facilities have no generation obligation. 1 to 10 MVA mid-tier has a proportionate obligation. Above 10 MVA the obligation scales with the connection.",text:"The tier structure creates natural market segmentation. Sub-1 MVA edge facilities are unaffected. Mid-market colocation has a proportionate obligation. Hyperscale bears the full burden."},mark:{hook:"I need the de-rating factors by generation technology before I can complete the sizing calculation. A 10 MVA obligation might require 12 MW of installed capacity at the relevant de-rating factor.",text:"I need the de-rating factors by technology. A 10 MVA obligation might need 12 MW installed (gas, DR ~0.85) or 25 MW (BESS, DR ~0.40). The technology choice is not neutral."},sarah:{hook:"For Taxonomy reporting, the tier classification feeds directly into the eligibility assessment for the CRU renewable obligation. Both the tier and the fulfilment method must be disclosed.",text:"For Taxonomy reporting, the tier classification feeds directly into the eligibility assessment."},tom:{hook:"The 10 MVA threshold is the critical planning number. Below it, generation CAPEX is modest. Above it, the energy centre capital programme is 5 to 10 million euros — a different development decision entirely.",text:"The 10 MVA cliff is the critical number. Below it, generation CAPEX is perhaps 3–8M EUR. Above it, 15–35M EUR. That single MVA boundary changes the investment case fundamentally."}},
 scenario:{title:"Clonshaugh at 4 MVA — Autoproducer Sizing",narrative:"Clonshaugh has a 4 MVA connection from 2013. The operator applies for a new connection agreement at 4 MVA in Q2 2026.",question:"What autoproducer capacity does Clonshaugh need?",answer:"Clonshaugh at 4 MVA is in the autoproducer tier (1–10 MVA).\nRequired: autoproducer unit meeting 100% of MIC on a de-rated basis.\nMIC: 4 MVA. At PF 0.95: 3.8 MW demand.\n\nGas engine (DR ~0.85): 3.8 / 0.85 = 4.5 MW installed. CAPEX: 3.6–5.4M EUR.\nBESS (DR ~0.40, 4-hour): 3.8 / 0.40 = 9.5 MW. CAPEX: 15.2–22.8M EUR.\nHybrid (70/30): DR ~0.72, installed = 5.3 MW. CAPEX: 5.3–8.0M EUR.\n\nRecommendation: gas engine or hybrid for this scale.",
whoShouldCare:["mark","ann","sarah"]},
 rhetoricTakeaways:{declan:"Declan needs to understand that MIC determines the CRU tier and all downstream obligations. Any expansion request to ESB Networks must be modelled against tier thresholds before submission.",ann:"Ann should note that the autoproducer/full-tier boundary at 10 MVA creates a step-change in compliance cost. Expansion above 10 MVA requires significantly more generation investment.",mark:"Mark verifies that electrical systems reflect CRU tier obligations — MIC sizing, de-rating calculations, and installed capacity formulas should be documented in the design basis and defensible under audit.",sarah:"Sarah should report CRU tier classification as a material risk factor in ESG disclosures. The tier determines generation obligations, which directly affect Scope 1 emissions trajectory.",tom:"Tom needs to price de-rating and availability factors into generation cost estimates. Nameplate capacity is not compliance capacity — the installed capacity formula determines what CRU accepts."
},

  declan:"Declan should coordinate gas engine procurement with BESS and switchgear installation to ensure all generation infrastructure is commissioned before the CRM delivery year."},

 retrofitRelevance:"Every existing DC planning any MIC change must assess its tier.",
 crossRefs:[{module:"DC-LEARN-001",level:"L1",topic:"MIC and grid connection fundamentals"},{module:"DC-LEARN-012",level:"L7",topic:"CRU tier classification"}],

{id:"L3",level:3,name:"Dispatchable Generation — Sizing & Technology",icon:"🔋",component:"Generation Sizing",available:true,
 userNeedStatement:"Size the dispatchable generation requirement and compare technology options",
 plainEnglish:"CRU/2025236 requires generation matching your MIC. But 'matching' means de-rated capacity, not nameplate. The de-rating factor depends on technology — gas engines de-rate differently from batteries.",
 clockQuote:"Nobody can guarantee PUE. It is a metered metric, not a promise. What can be guaranteed is the infrastructure, the commissioning evidence, and the trajectory. The data will demonstrate compliance — or it will demonstrate where the next investment is needed.",
 grammar:{facts:[
  {term:"De-rating factor",definition:"A multiplier (0 to 1) applied by the SEM to reduce installed capacity to firm capacity. Technology-dependent.",plain:"How much of your installed generation the grid counts as reliable.",number:"Gas engine ~0.85. Gas turbine ~0.80–0.90. BESS (4-hour LFP) ~0.35–0.45. Hybrid ~0.70–0.80.",standard:"SEM CRM de-rating methodology; EirGrid CRM",feynman:{analogy:"Like a car's fuel-economy rating versus real-world consumption — the de-rating gives you the realistic number.",firstPrinciples:"The SEM needs to know how much power is reliably available at system peak. A 4-hour battery cannot sustain output through a 12-hour stress event.",theTest:"Why does a BESS de-rate more heavily than a gas engine?"}},
  {term:"Installed capacity calculation",definition:"Required installed MW = MIC (MVA) × power factor ÷ de-rating factor.",plain:"How big your power plant needs to be, accounting for de-rating.",number:"For 10 MVA at PF 0.95 with gas engine (DR 0.85): 10 × 0.95 / 0.85 = 11.2 MW installed.",standard:"CRU/2025236; SEM CRM de-rating curves",feynman:{analogy:"If you need 100 litres of water and your pipe delivers 85% efficiency, you need a 118-litre tank.",firstPrinciples:"The de-rating formula converts a system adequacy requirement into an engineering specification.",theTest:"Calculate the installed BESS capacity needed for a 5 MVA facility with PF 0.95 and de-rating 0.40."}},
  {term:"Reciprocating gas engine",definition:"Modular internal combustion engines (typically 2–3 MW per unit, e.g. Jenbacher J920) burning natural gas. High part-load efficiency, fast start.",plain:"The workhorse option — multiple smaller engines that can start quickly and run efficiently at partial load.",number:"Efficiency 42–48% (full load). Start time <5 min. Footprint ~15–25 m² per MW. CAPEX ~800–1,200 EUR/kW (Tier 4).",standard:"Manufacturer data (Jenbacher, Wärtsila); EPA IE Licence guidance",feynman:{analogy:"Like having four smaller vans instead of one large truck — flexibility to run one, two, or all four.",firstPrinciples:"Modularity provides resilience (N+1) and efficiency (part-load matching). But gas combustion creates Scope 1 at ~0.41 kgCO₂/kWh.",theTest:"What is the Scope 1 emission factor for gas engine generation compared to the grid?"}},
  {term:"BESS (Battery Energy Storage System)",definition:"Lithium iron phosphate (LFP) battery systems providing dispatchable capacity. Duration-limited (2–4 hours), zero Scope 1, but heavily de-rated in the CRM.",plain:"Large batteries that can discharge for 2–4 hours. Clean, but the grid does not count them as fully reliable.",number:"CAPEX ~400–600 EUR/kWh (4-hour). Cycle life 6,000–8,000 cycles. De-rating ~0.35–0.45.",standard:"CATL, BYD manufacturer specs; SEM CRM de-rating",feynman:{analogy:"A sprint runner, not a marathon runner — excellent for short bursts but cannot sustain output all day.",firstPrinciples:"Duration limitation is why BESS de-rates heavily. A 4-hour battery at peak demand provides certainty for 4 hours, not 12.",theTest:"Why is BESS significantly more expensive per de-rated MW than gas engines?"}},
  {term:"Hybrid configuration",definition:"A combination of gas engines and BESS, typically 70% thermal / 30% storage. Provides the best weighted de-rating and dual revenue streams.",plain:"Mix batteries with gas engines — better de-rating, faster response, more revenue streams.",number:"Weighted de-rating ~0.72. Dual CRM + DS3/FASS revenue. Typical split: 70% gas / 30% BESS by installed MW.",standard:"SEM CRM; EirGrid DS3 procurement gates",feynman:{analogy:"Like a car with both a petrol engine and an electric motor — each does what it does best.",firstPrinciples:"Hybrid captures the de-rating benefit of thermal and the response speed of BESS for DS3 fast-frequency revenue.",theTest:"Calculate the weighted de-rating for a 70/30 gas/BESS hybrid where gas DR=0.85 and BESS DR=0.40."}}
 ],whatItLooksLike:"An energy centre — a fenced compound adjacent to the DC with gas engine modules, battery containers, switchgear, gas connection, and cooling. Typically 200–800 m².",
 siteChecklist:["Confirm MIC and calculate de-rated generation requirement","Assess site area available for generation plant","Check GNI gas network availability","Check structural capacity for BESS containers (25–30 tonnes each)","Assess noise-sensitive receptors within 100 m"]},
 logic:{causeAndEffect:[
  {cause:"BESS de-rates at approximately 0.40 in the SEM CRM versus gas engines at approximately 0.85 due to duration limitations",effect:"BESS requires roughly twice the installed capacity of gas engines for the same MIC obligation",insight:"This doubles CAPEX for BESS, making standalone BESS uneconomic for CRU Readiness at scale. Hybrid configurations balance cost and carbon."},
  {cause:"Gas engines produce direct Scope 1 combustion emissions at approximately 0.41 kgCO₂/kWh — nearly double the current Irish grid factor",effect:"During the 6-year renewable glide path, total facility carbon intensity increases before decreasing",insight:"This is the 'glide path paradox' — CRU Readiness makes carbon performance temporarily worse."},
  {cause:"CRU/2025236 requires all DC on-site generation above the de minimis threshold to participate in the SEM electricity market",effect:"DC generation becomes a revenue source (CRM + DS3 + arbitrage) not just a compliance cost",insight:"A well-designed energy centre can offset 30–60% of its annual operating cost through SEM revenue."}
 ],constraintLesson:"The technology choice is not just engineering — it is financial, regulatory, and carbon-strategic. Gas engines are cheapest per de-rated MW but create Scope 1. BESS is cleanest but most expensive per de-rated MW.\n\nThe constraint is gas network access. Sites without a GNI connection can only use BESS or HVO. HVO is clean-burning but ~2–3× the cost of natural gas.",
 weakestLink:{whatsWrong:"We will install BESS because it has zero Scope 1 emissions and is cleanest for ESG.",whatsRight:"BESS de-rates at ~0.40 — meaning you need 2.5× the installed capacity of gas. The CAPEX difference can be 15–20M EUR.",howToGetThere:"Run the financial model for all four options. Include CRM/DS3 revenue, carbon tax, CPPA costs, and 20-year NPV."}},
 rhetoric:{declan:{hook:"I can get gas to the site — GNI confirmed the connection. So the hybrid option is viable. But I need the EPA thermal input calculation before I can commit to any gas engine specification.",text:"I can get gas to the site — GNI confirmed. So the hybrid option works. Three 2 MW gas engines plus a 2 MWh BESS module. Fits in the car park."},ann:{hook:"CRM revenue changes the investment case for every generation option. A 10 MW hybrid earning 1.5 to 3 million euros per year from CRM needs to be modelled against pure CPPA and pure BESS alternatives.",text:"The CRM revenue changes the investment case. A 10 MW hybrid could earn 1.5–3M EUR/year in capacity payments alone."},mark:{hook:"I need the EPA thermal input calculation before signing off on any gas engine. Electrical output divided by 0.45 efficiency gives the thermal figure — and the 50 MW threshold determines the licence requirement.",text:"I need the EPA thermal input calculation before signing off on gas engines. Electrical output ÷ efficiency gives thermal input. If >50 MW, we need an IE Licence."},sarah:{hook:"For SFDR reporting, the blended emission factor is the weighted average of gas Scope 1 at 0.456 kgCO2 per kWh electrical and grid Scope 2 at 0.224 kgCO2 per kWh. Report both components separately.",text:"For SFDR, I report the blended emission factor: weighted average of gas Scope 1 and grid Scope 2 minus PPA credits. During years 1–3 before the CPPA delivers, our CUE will increase."},tom:{hook:"Gas engine CAPEX at 800 to 1,200 euros per kW. BESS at 1,600 to 2,400 euros per kW for a 4-hour system. CPPA advisory at 50 to 100 thousand euros. Model all four options against the same 20-year horizon.",text:"Gas engine CAPEX: 800–1,200 EUR/kW. BESS: 1,600–2,400 EUR/kW (4-hour). Hybrid at 70/30: ~1,000–1,500 EUR/kW blended. For Clonshaugh at 5.3 MW hybrid: 5.3–8.0M EUR."}},
 scenario:{title:"Clonshaugh Generation Options — Four-Way Comparison",narrative:"Clonshaugh at 4 MVA (PF 0.95 = 3.8 MW demand) needs an autoproducer. Gas available. Site area: 300 m².",question:"Which technology option is recommended?",answer:"The CRU requires Clonshaugh to install dispatchable generation matching its 4 MVA MIC on a de-rated basis. Four technology options exist — each with different installed capacity, CAPEX, and site footprint. The de-rating factor is the key variable: it determines how much you must overbuild to satisfy the grid.\n\nRequired de-rated capacity: 3.8 MW (4 MVA × 0.95 PF).\n\nOption 1 — Gas engine: 3.8/0.85 = 4.5 MW. CAPEX: 3.6–5.4M EUR. Footprint: ~90 m².\nOption 2 — Gas turbine: not economic at 4.5 MW (minimum viable ~10 MW).\nOption 3 — BESS: 3.8/0.40 = 9.5 MW. CAPEX: 15.2–22.8M EUR. Footprint: ~250 m².\nOption 4 — Hybrid (70/30): 3.8/0.72 = 5.3 MW. CAPEX: 5.3–8.0M EUR. Footprint: ~130 m².\n\nWhat this means in practice: Option 4 (hybrid) delivers the best balance of CAPEX, de-rating, SEM revenue potential, and site footprint. BESS alone costs 3× more for the same de-rated output. Gas alone works but forfeits the DS3 fast-frequency revenue that BESS unlocks.",
whoShouldCare:["declan","mark","ann","tom"]},
 rhetoricTakeaways:{declan:"Declan should coordinate gas engine procurement with BESS and switchgear installation to ensure all generation infrastructure is commissioned before the CRM delivery year.",ann:"Ann can model CRM revenue (€149,960/MW/year) and DS3 revenue (€30–80k/MW/year) as committed income streams that offset CRU Readiness capital within 5–8 years.",mark:"Mark checks whether reciprocating gas engines have verified de-rating curves, acoustic attenuation meeting planning conditions, and parallel operation capability for N+1 resilience.",sarah:"Sarah should disclose the Scope 1 impact of on-site gas generation in ESG reporting, including the carbon tax trajectory from €71 to €100/tCO₂ by 2030.",tom:"Tom should include in the cost plan: engine procurement (€800–1,200/kW), BESS (€400–600/kWh), acoustic enclosures (€50–100k/engine), gas connection, and switchgear — total €3–5M for Clonshaugh."
},

  declan:"Declan must ensure SEM Trading Site registration and CRM pre-qualification are completed 18–24 months ahead of the delivery year. Late registration forfeits an entire auction cycle."},

{id:"L4",level:4,name:"SEM Participation — Market Requirements",icon:"💰",component:"SEM Participation",available:true,
 userNeedStatement:"Understand SEM participation requirements and revenue opportunities for DC generation",
 plainEnglish:"Your generation must participate in the Single Electricity Market. This is both a compliance obligation and a revenue source. CRM capacity payments, DS3 system services, and energy arbitrage can offset 30–60% of annual generation operating costs.",
 clockQuote:"The programme had paid back more than half its cost before it was finished. Tom had never seen that in thirty years of building economics. The programme wasn't spending money. It was converting cost into revenue.",
 grammar:{facts:[
  {term:"Single Electricity Market (SEM)",definition:"The all-island wholesale electricity market covering Ireland and Northern Ireland, operated by SEMO.",plain:"The wholesale electricity market where all power is bought and sold on the island of Ireland.",number:"All-island market. Operated by SEMO. Governed by SEM Committee (CRU + UREGNI).",standard:"SEM Trading and Settlement Code; Electricity Regulation Act 1999",feynman:{analogy:"The stock exchange for electricity — every megawatt-hour is traded, priced, and settled.",firstPrinciples:"Centralised markets create price transparency and dispatch the cheapest generation first.",theTest:"Which two regulators govern the SEM?"}},
  {term:"Capacity Remuneration Mechanism (CRM)",definition:"An SEM mechanism that pays generators for being available, regardless of whether they dispatch.",plain:"You get paid for having your power plant ready, even when it is not running.",number:"CRM T-4 clearing price: ~150,000 EUR/MW de-rated/year (SEMO PCAR2829T-4). Auctions held annually.",standard:"SEM CRM Rules; SEMO PCAR2829T-4 (T1)",feynman:{analogy:"A retainer fee for a consultant — paid to be available, with additional fees if actually called.",firstPrinciples:"Capacity markets solve the missing money problem — energy-only markets do not adequately reward reliability.",theTest:"Is a CRM payment based on installed or de-rated capacity?"}},
  {term:"DS3 / FASS system services",definition:"Technical services (frequency response, reserve, inertia) paid by the TSO for grid stability. Being replaced by FASS with DASSA go-live targeted December 2026.",plain:"Payments for helping keep the grid stable — fast response, reserve power, inertia.",number:"DS3 extended until DASSA go-live (target December 2026). 12 service products.",standard:"DS3 System Services Protocol v4.1; EirGrid SOEF Markets",feynman:{analogy:"Being paid to keep your engine running so you can move instantly when needed.",firstPrinciples:"As renewable penetration increases, the grid loses synchronous inertia. Fast-acting generation provides stability.",theTest:"Why is DS3 being replaced by FASS?"}},
  {term:"Trading Site registration",definition:"The legal entity through which DC generation participates in the SEM. Required for both tiers.",plain:"You register your power plant as a participant in the electricity market.",number:"Registration with SEMO. Annual compliance obligations. Market rules from day one.",standard:"SEM Trading and Settlement Code; CRU/2025236 Section 3",feynman:{analogy:"Registering a company — gives your generation asset a legal identity in the market.",firstPrinciples:"Market participation requires visibility. The TSO must know what exists and when it is available.",theTest:"Can a DC avoid SEM registration if generation is used only on-site?"}},
  {term:"Revenue stacking",definition:"Combining multiple SEM revenue streams to maximise return on the generation asset.",plain:"Earning from multiple sources simultaneously to make the power plant pay for itself.",number:"Total indicative ~175,000–200,000 EUR/MW/yr: CRM ~150K (T1) + DS3/FASS 10–25K + arbitrage variable.",standard:"SEMO PCAR2829T-4 (CRM — T1); EirGrid DS3 payment reports (T2)",feynman:{analogy:"A property earning rent, parking fees, and laundry income — combined they cover the mortgage.",firstPrinciples:"Generation assets have multiple value streams. CRU Readiness is the obligation; revenue stacking is the opportunity.",theTest:"Name three revenue streams available to DC generation in the SEM."}}

 siteChecklist:["Confirm SEMO registration requirements","Assess whether to self-manage or appoint a market aggregator","Model CRM revenue using latest T-4 auction prices","Check DS3 eligibility for planned generation","Confirm metering requirements (half-hourly, CT/VT rated)"]},
 logic:{causeAndEffect:[
  {cause:"CRU/2025236 mandates formal SEM electricity market participation for all qualifying DC on-site generation capacity",effect:"DC operators become active SEM electricity market participants rather than passive consumers, requiring new market expertise and systems",insight:"A fundamental identity shift — different skills, risks, and rewards."},
  {cause:"SEM Capacity Remuneration Mechanism auctions pay generators based on their de-rated capacity, not nameplate installed capacity",effect:"Gas engines earn higher CRM per installed MW than BESS because they de-rate higher",insight:"Another reason hybrid configurations are attractive — gas earns CRM while BESS earns DS3 FFR."},
  {cause:"The EirGrid DS3 system services framework is transitioning to FASS/DASSA with a target implementation date of December 2026",effect:"Revenue certainty from EirGrid system services is reduced during the DS3 to FASS/DASSA transition period targeting December 2026",insight:"DCs energising in 2026–2027 should model two scenarios: DS3 extended rates and FASS auction rates."}
 ],constraintLesson:"SEM participation is not optional, but how you participate is flexible. Large operators may build in-house trading capability. Smaller operators will appoint a market aggregator for 5–10% of revenue.\n\nThe constraint is expertise. Most DC operators have never participated in an electricity market.",

 rhetoric:{declan:{hook:"I am an operations manager, not an electricity trader. I will hire an aggregator to manage the SEM participation. But I need to understand the revenue model before I can justify the capital to the board.",text:"I am an operations manager, not an electricity trader. I will hire an aggregator. The revenue pays their fee and then some."},ann:{hook:"CRM revenue de-risks the generation investment. A 10 MW hybrid earning 175 to 200 thousand euros per MW per year from CRM alone generates 1.75 to 2 million euros annually before any DS3 stacking.",text:"CRM revenue de-risks the generation investment. A 10 MW hybrid earning ~175–200K EUR/MW/year is 1.75–2.0M EUR annually before energy arbitrage."},mark:{hook:"SEM settlement requires half-hourly data, CT and VT metering to Class 0.5 or above, and a SCADA connection to the TSO. The metering specification must be confirmed before the connection application is submitted.",text:"I need the metering specification. SEM settlement requires half-hourly data, CT/VT accuracy class 0.5S, redundant comms."},sarah:{hook:"SEM participation creates new disclosure requirements. CRM contracts, DS3 revenue, and dispatch data are commercially sensitive — but the generation asset's emission intensity must be reported to CRU annually.",text:"SEM participation creates new disclosure requirements. CRM contracts, DS3 revenue, dispatch data — all material for SFDR."},tom:{hook:"Aggregator fees at 5 to 10 percent of revenue. SEMO registration at 50 thousand euros setup plus 20 thousand euros per year. Both are line items in the energy centre operating cost model.",text:"Aggregator fees: 5–10% of revenue. SEMO registration: ~50K EUR setup + 20K EUR/yr. Metering upgrade: 80–150K EUR. Small change against 1.75–2.0M EUR annual SEM revenue at 10 MW scale."}},
 scenario:{title:"Clonshaugh SEM Revenue Model",narrative:"Clonshaugh installs a 5.3 MW hybrid (3.7 MW gas + 1.6 MW BESS) for its 4 MVA autoproducer obligation.",question:"What is the indicative annual SEM revenue?",answer:"The generation asset is not just a compliance cost — it participates in the Single Electricity Market and earns revenue from multiple streams simultaneously. This is revenue stacking: CRM capacity payments, DS3 system services, energy arbitrage, and avoided import. Here is how the numbers work for Clonshaugh's 5.3 MW hybrid.\n\nDe-rated capacity: 3.8 MW.\n\nCRM: 3.8 MW × 150K EUR/MW/yr = 570K EUR/yr (SEMO PCAR2829T-4, T1)\nDS3 (BESS, 1.6 MW FFR): 1.6 × 15K = 24K EUR/yr\nArbitrage: estimated 30–80K EUR/yr\nAvoided import: ~20–40K EUR/yr\n\nTotal: 644–714K EUR/yr (indicative)\nGeneration OPEX: ~200–280K EUR/yr\nNet: approximately 364–434K EUR/yr\n\nWhat this means in practice: the generation asset is self-funding. CRM revenue alone (570K) exceeds the low end of generation OPEX (200K). The net surplus offsets CPPA costs, transforming the CRU obligation from pure expense into a partially revenue-generating programme.",
whoShouldCare:["ann","tom","mark"]},

},

{id:"L5",level:5,name:"80% Renewable Obligation — PPA Pathway",icon:"🌿",component:"Renewable Obligation",available:true,
 userNeedStatement:"Understand the 80% renewable electricity obligation and how to meet it through CPPAs",
 plainEnglish:"Every DC at or above 1 MVA must source 80% of annual electricity from additional Irish renewable generation. Additional means new or fully repowered. You have six years from energisation to get there.",
 clockQuote:"Twelve items. Six complete. Four in progress. Two scheduled. The programme was not a document. It was the building's memory of what it had learned — and the building's commitment to what it would become.",
 grammar:{facts:[
  {term:"80% renewable obligation",definition:"DCs with MIC ≥1 MVA must meet at least 80% of annual demand with additional Irish renewable electricity.",plain:"Four-fifths of your electricity must come from new Irish wind or solar.",number:"80% of annual demand. Additional only. Irish-sourced only. 6-year glide path.",standard:"CRU/2025236 Section 4",feynman:{analogy:"Like requiring a new housing estate to fund new water treatment capacity, not just connect to existing supply.",firstPrinciples:"Additionality ensures each new DC drives new RE capacity on the Irish grid.",theTest:"Does buying REGOs from an existing wind farm satisfy the obligation?"}},
  {term:"Additionality",definition:"The renewable generation must be new (commissioned after the DC connection) or fully repowered. Existing RESS/REFIT does not qualify.",plain:"Your renewable contract must create new capacity that did not exist before.",number:"No RESS/REFIT credits. Must be new or fully repowered.",standard:"CRU/2025236 Section 4.2",feynman:{analogy:"You cannot claim credit for planting a tree that was already in the ground.",firstPrinciples:"Without additionality, DCs would simply bid up existing RE contracts, raising prices without adding capacity.",theTest:"Why did the CRU reject counting existing RESS-contracted wind?"}},
  {term:"Six-year glide path",definition:"DCs have six years from energisation to achieve the 80% target.",plain:"You do not need 80% on day one. You have six years to ramp up.",number:"6 years from energisation. Must show a credible plan in connection application.",standard:"CRU/2025236 Section 4.3",feynman:{analogy:"Like a mortgage — you commit to the full amount but pay it down over time.",firstPrinciples:"Wind farms take 3–5 years to develop. The glide path aligns DC and RE timelines.",theTest:"What is the connection between the 6-year glide path and wind farm development timelines?"}},
  {term:"Corporate PPA (CPPA)",definition:"A long-term bilateral contract between a DC operator and a renewable energy developer. The primary mechanism for meeting the 80% obligation.",plain:"A private deal to buy wind or solar electricity directly from a developer for 10–15 years.",number:"Typical term: 10–15 years. Additionality premium: ~75–100 EUR/MWh above wholesale (Tier 4).",standard:"Market practice; CRU/2025236 Section 4",feynman:{analogy:"Like a long-term lease versus buying daily on the spot market — you lock in supply and price.",firstPrinciples:"CPPAs provide revenue certainty to RE developers and price certainty to DC operators.",theTest:"What is the typical term of a CPPA in Ireland?"}},
  {term:"Renewable gap calculation",definition:"The difference between the 80% obligation and the grid's existing renewable fraction.",plain:"How much new renewable energy you actually need to buy.",number:"Grid RE ~42% (SEAI 2024). Gap to 80%: 38 percentage points. For a 10 MW DC at PUE 1.50: ~50,000 MWh/yr gap.",standard:"SEAI Renewable Electricity 2024; CRU/2025236",feynman:{analogy:"If the bus gets you 42% of the way, you need your own transport for the remaining 38%.",firstPrinciples:"The grid already carries RE. The obligation covers the shortfall to 80%.",theTest:"Calculate the annual CPPA volume needed for a 10 MW IT facility at PUE 1.50."}}
 ],whatItLooksLike:"A CPPA contract with a wind or solar developer, annual renewable certificates, a credible procurement plan, and annual compliance reports.",
 siteChecklist:["Calculate total annual facility demand (IT load × PUE × 8,760)","Determine 80% obligation volume in MWh","Subtract grid RE contribution (~42%) to get CPPA gap","Identify potential CPPA counterparties","Assess additionality premium and budget impact"]},
 logic:{causeAndEffect:[
  {cause:"The CRU/2025236 80% obligation requires additional new Irish renewable capacity — not just green electricity tariffs or REGO certificates",effect:"DC operators must engage directly with Irish wind/solar developers to contract new capacity",insight:"This creates a bilateral relationship between the DC sector and RE development. Wind Energy Ireland welcomed the policy."},
  {cause:"The Irish national grid supplies approximately 42% renewable electricity in 2026, leaving a 38-percentage-point CPPA obligation gap",effect:"The effective CPPA obligation gap is approximately 38 percentage points above the grid's 42% REF, not the full 80% stated in the regulation",insight:"As the grid greens towards 80% by 2030, the CPPA gap narrows. Early movers face the largest gap."},
  {cause:"Corporate Power Purchase Agreements for Irish additionality renewables require 10–15 year commitments at 75–100 EUR/MWh premium",effect:"Renewable CPPA procurement becomes the largest single line item in the DC's annual operating cost budget, exceeding facility staff costs",insight:"For a 50 MW hyperscale, CPPA cost could be 25–40M EUR/year. This defines the Irish DC business model."}
 ],constraintLesson:"The additionality requirement is the most commercially significant element. DCs cannot rely on green tariffs — they must underwrite new projects.\n\nThe constraint is the Irish RE development pipeline. EirGrid's queue has ~20 GW but only a fraction will reach COD by 2030. Competition for bankable CPPAs is intensifying.",
 weakestLink:{whatsWrong:"We will buy Guarantees of Origin from Scandinavian hydro to meet the 80% obligation.",whatsRight:"CRU/2025236 requires Irish-sourced additional RE. GoOs from existing or imported generation do not qualify.",howToGetThere:"Engage a CPPA broker or approach Irish RE developers directly. Target projects in EirGrid queue with expected energisation within your glide path."}},
 rhetoric:{declan:{hook:"I need the CPPA delivery timeline. If our DC energises in 2028, the renewable glide path requires the CPPA to be active from year one — not year three when we get around to it.",text:"I need the CPPA delivery timeline. If our DC energises in 2028, the glide path runs to 2034. The CPPA project needs to generate by then. We need to sign by 2029 at the latest."},ann:{hook:"CPPA costs are the largest single line item in the energy strategy. For a 20 MW facility, approximately 8 to 12 million euros per year. Model that commitment across multiple grid carbon scenarios before signing.",text:"CPPA costs are the largest line item. For a 20 MW facility, ~8–12M EUR/year. Investors need to model this as a core operating cost."},mark:{hook:"The CPPA is a commercial contract but I need to verify the metering and settlement interface before the heads of terms are agreed. The DC load profile must be matched to the generation profile for GoO purposes.",text:"The CPPA is a commercial contract, but I need to verify the metering and settlement mechanisms."},sarah:{hook:"For SFDR Article 8 and 9 reporting, the CPPA provides the market-based Scope 2 accounting. Without it, the facility must report using the location-based SEAI emission factor — which is higher.",text:"For SFDR Article 8/9 reporting, the CPPA provides the market-based Scope 2 accounting. During the glide path, we report on a dual basis."},tom:{hook:"80 percent of 140,000 MWh per year at 85 euros per MWh is 9.5 million euros per year for a 10 MW facility at PUE 1.60. Model the CPPA cost against the green financing premium available with 80 percent REF.",text:"80% of 140,000 MWh at 85 EUR/MWh = 9.5M EUR/year for a 10 MW facility at PUE 1.60. That is ~950 EUR per kW IT per year in RE costs alone."}},
 scenario:{title:"Clonshaugh Renewable Procurement Plan",narrative:"Clonshaugh: 2.4 MW IT, PUE 1.50, facility demand 3.6 MW. Annual demand: 3.6 MW × 8,760 hrs = 31,536 MWh/yr.",question:"What CPPA volume is needed and what will it cost?",answer:"CRU/2025236 requires 80% of annual electricity from additional Irish renewables. The word 'additional' is critical — it means new or repowered capacity, not existing RESS/REFIT wind farms. The Irish grid already delivers ~42% renewable, but that does not count. The operator must procure the gap through a Corporate PPA (CPPA). Here is the arithmetic.\n\nAnnual facility demand: 31,536 MWh/yr\n80% obligation: 25,229 MWh/yr\nGrid RE contribution (42%): 13,245 MWh/yr\nCPPA gap: 25,229 - 13,245 = 11,984 MWh/yr\n\nEquivalent wind capacity: ~5 MW (at 30% CF)\nCPPA cost at 85 EUR/MWh: ~1.0M EUR/yr\nCPPA cost at 100 EUR/MWh: ~1.2M EUR/yr\n\nWhat this means in practice: over a 15-year CPPA term, the renewable obligation costs 15–18M EUR total — making it the single largest cumulative cost of CRU Readiness, larger than the generation CAPEX. Ann needs to model this as a core operating cost from year one, not a future aspiration.",
whoShouldCare:["ann","sarah","tom"]},
 rhetoricTakeaways:{declan:"Declan should plan renewable procurement in phases aligned with the six-year glide path, securing CPPAs for new-build wind or solar projects with verified additionality.",ann:"Ann must assess CPPA counterparty risk — a 10–15 year contract with a project-finance wind farm requires credit analysis, completion guarantees, and shape-matching provisions.",mark:"Mark confirms that metering and monitoring systems can verify renewable consumption percentage in real time — matching CPPA output to actual facility demand on a half-hourly basis.",sarah:"Sarah should report the renewable trajectory against the 80% target in ESG disclosures, including the glide path schedule, CPPA volumes, and any shortfall mitigation strategy.",tom:"Tom needs to model CPPA strike prices (currently €65–85/MWh for new-build onshore wind) against wholesale market forecasts. The premium over market price is the true cost of additionality."
},
L6:{
  declan:"Declan should understand that on-site gas generation temporarily increases total carbon before renewables offset it. The Scope 1/Scope 2 balance must be tracked monthly during the glide path."},
 sourceNote:"CRU/2025236 Section 4 (T1). SEAI RE 2024 (42%) (T1). CPPA strike prices €65–85/MWh: RE-Source Platform European CPPA Benchmark 2024; BloombergNEF Power Purchase Agreement Monitor H2 2024 (Tier 3, indicative).",
 retrofitRelevance:"Any existing DC expanding above 1 MVA must plan renewable procurement as part of the expansion business case.",
 crossRefs:[{module:"DC-LEARN-012",level:"L6",topic:"Renewable integration and 80% obligation"},{module:"DC-LEARN-010",level:"L2",topic:"Scope 2 emissions — renewable electricity impact on carbon footprint"}],
