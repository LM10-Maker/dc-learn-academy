{id:"L8",level:8,name:"The Retrofit Opportunity",icon:"🔧",component:"Intervention Menu",available:true,
userNeedStatement:"I need the menu of interventions — what, in what order, at what cost, with what return.",
plainEnglish:"Five things to fix, and the order matters. 1. Containment — cheapest, fastest, makes everything else better. 2. BMS — measure before optimise. 3. Free cooling — biggest annual saving. 4. Chiller replacement. 5. Power resilience. This is a programme, not a shopping list.",
grammar:{facts:[
{term:"Hot Aisle Containment (HAC)",definition:"Physical enclosure of hot aisle preventing exhaust mixing with supply air.",plain:"Doors and panels on the hot aisle so hot air goes straight back to cooling instead of leaking.",number:"Cost: €50–100K for 400 racks (indicative, Tier 3 — SCSI M&E benchmarks). Install: 3–6 months. Gain: 10–15%. Payback: <12 months.",standard:"ASHRAE TC 9.9; SCSI M&E benchmarks 2025 (Tier 2)",feynman:{analogy:"Putting a lid on a boiling pot. Without it, steam escapes everywhere.",firstPrinciples:"Containment preserves ΔT at CRAH coil → less air volume → fans run slower → cube law: half speed = 12.5% power.",theTest:"CRAH fans 100%→70%: power reduction per 10 kW rated? ((0.70)³ = 0.343 → 3.43 kW. Saving: 6.57 kW.)"}},
{term:"Free Cooling Retrofit",definition:"Adding dry/adiabatic coolers to CHW system for compressor-free heat rejection.",plain:"Roof equipment using Dublin's cold air instead of compressors. Works 80%+ of the year.",number:"Cost: €400–600K (Tier 3 — Vertiv/Schneider published, indicative). Install: 6–12 months. Saving: ~3,800 MWh, ~€456K/yr. Payback: 1.1–1.3 years.",standard:"EN 50600-2-3:2019; Met Éireann",feynman:{analogy:"Switching from gym to running outside. Same exercise, fraction of cost when weather cooperates.",firstPrinciples:"Free cooling replaces compressor work (250W/kW) with fan/pump work (40W/kW). 6:1 ratio × 7,200+ hrs.",theTest:"Why fastest payback? (6:1 energy ratio × 7,200+ hours = very large cumulative saving vs capex.)"}},
{term:"BMS / DCIM Modernisation",definition:"Upgrade from legacy BMS to modern DCIM — 3,000+ points, real-time PUE, predictive alerting.",plain:"Upgrade the building's brain from 500 monitoring points to 3,000+. A legacy BMS tells you what is on or off. A modern DCIM tells you how efficiently each system is running, trends performance over time, and produces the reports EED Article 12 demands.",number:"Cost: €150–300K (Tier 3 — Schneider/Vertiv/Siemens published, indicative). Install: 3–6 months. Enables EED reporting + 5–10% additional saving. Payback: 12–18 months.",standard:"EN 50600-4-2:2016; Directive 2023/1791",feynman:{analogy:"Going from a speedometer to full telemetry — fuel efficiency, tyre pressure, engine temp.",firstPrinciples:"500-point BMS monitors state ('is it on?'). 3,000-point DCIM monitors performance ('is it efficient?').",theTest:"Why must BMS precede/coincide with free cooling? (Without sub-metering, can't verify savings or optimise setpoints.)"}},
{term:"Temporary Cooling (Rental Chillers)",definition:"Mobile chiller units deployed during retrofit works to maintain cooling while permanent plant is modified or replaced.",plain:"Renting portable chillers so the data hall stays cool while the permanent cooling system is being upgraded.",number:"Rental cost: €15–30K/month for 500 kW unit. Duration: 3–6 months per phase. Total rental: €90–180K across a typical programme.",standard:"Aggreko/Andrews Sykes published rental rates (Tier 3); SCSI M&E benchmarks",feynman:{analogy:"Living in a caravan while your house is being renovated — temporary but essential.",firstPrinciples:"Servers cannot tolerate cooling interruption. Any work on chiller plant requires alternative cooling. Rental cost is a programme cost, not a contingency.",theTest:"Why is temporary cooling NOT optional in a DC retrofit? (Servers generate 2,400 kW heat continuously. 10 minutes without cooling exceeds ASHRAE thermal limits.)"}},
{term:"Generator Fuel Autonomy",definition:"The duration a data centre can operate on stored fuel without resupply. Measured in hours at full generator load. Depends on tank capacity, load, and resupply logistics.",plain:"How long the generators can run before the fuel runs out. Clonshaugh: 8 hours at full load. That's a typical overnight outage — a multi-day grid event would require emergency fuel delivery.",number:"Clonshaugh: 20,000 L tank. Full load consumption: ~500 L/hr per 2 MVA generator. At 2 generators = 1,000 L/hr → 20 hours at 50% load, 10 hours at full load. Safety margin: 8 hours declared.",standard:"EN 50600-2-2:2019; EPA IE Licence conditions",feynman:{analogy:"Generator fuel is like a phone battery — the capacity is fixed, the drain rate depends on load, and you need to plan when to recharge.",firstPrinciples:"Fuel autonomy = tank volume ÷ consumption rate. Consumption is proportional to electrical load. Declared autonomy includes a safety margin below the physical limit.",theTest:"If Clonshaugh adds HVO (20% cost premium), does fuel autonomy change? (Answer: No — HVO has similar energy density to diesel. Autonomy stays at ~8 hours. The change is carbon, not runtime.)"}}

],whatItLooksLike:"Containment: panels, self-closing doors. Free cooling: dry cooler banks on roof. BMS/DCIM: modern control room. Chiller: compact modular units.",
siteChecklist:["Roof: space for dry coolers?","Plant room: space for pumps/valving?","Data hall: aisle width for doors?","BMS: network infrastructure?","Electrical: spare capacity?","Access: crane access to roof?"]},
logic:{causeAndEffect:[
{cause:"Retrofit interventions have engineering dependencies — free cooling requires containment first, and BMS metering must precede optimisation",effect:"Incorrect sequencing of retrofit interventions wastes capital expenditure and delays the energy savings that fund subsequent phases of the programme",insight:"Containment reduces demand → free cooling sized smaller. BMS enables measurement → optimisation data-driven."},
{cause:"Combined retrofit programme costs approximately €600K–€1M depending on scope and phasing — a significant capital commitment for the fund",effect:"At €500K+ per year in energy savings, the total retrofit programme payback is approximately 1.5–2 years — exceptional for commercial property investment",insight:"DC energy efficiency retrofit delivers one of the best returns in commercial real estate — better than most HVAC or envelope upgrades."},
{cause:"Retrofit requires temporary cooling provision during chiller plant modification — any cooling interruption beyond thermal buffer risks IT equipment",effect:"Programme must include rental chiller costs (~€90–180K) and crane access logistics",insight:"Temporary cooling is not contingency — it is a programme cost. Data hall cannot tolerate cooling interruption. Crane access, structural loading, and CHW tie-in must all be designed."}
],constraintLesson:"Two constraints: operational continuity (can't take cooling offline) and capital availability (savings are future, capex is now). Retrofit must be phased with temporary cooling if needed.",
weakestLink:{whatsWrong:"\"Just do free cooling — that's the big saving.\" Without containment, you oversize. Without BMS, you can't verify.",whatsRight:"Optimal: containment → BMS → free cooling → chiller → power. Each makes the next more effective.",howToGetThere:"A retrofit design study models the sequenced programme with phasing, cumulative savings projections, and temporary cooling requirements."}},
rhetoric:{declan:{hook:"Give me containment first — two weekends, no downtime. Then BMS to establish baselines. Then free cooling. I need the sequence, not the vision.",text:"Give me containment first — two weekends, no downtime. Then BMS. Then free cooling — needs crane access."},ann:{hook:"800 thousand euros capex, 500 thousand euros per year saving — that is 60 percent plus IRR. I need the cash flow model, not the technical narrative.",text:"Combined: €800K capex, €500K/yr saving = 60%+ IRR. Better than any alternative in the portfolio."},mark:{hook:"Sequencing is critical. Containment reduces design load. BMS establishes the baseline. Free cooling only performs correctly if both precede it.",text:"Sequencing is critical. Containment reduces design load. BMS establishes baseline. Free cooling sized against contained load."},sarah:{hook:"Each phase moves toward Taxonomy alignment. Containment brings PUE to around 1.45. Add free cooling and the facility reaches the 1.30 threshold.",text:"Each step moves toward Taxonomy. Containment: PUE ~1.45. Plus free cooling: PUE ~1.25–1.30. That's Taxonomy territory."},tom:{hook:"75 thousand containment plus 225 thousand BMS plus 500 thousand free cooling equals 800 thousand. Saving from PUE 1.50 to 1.20 pays it in under two years.",text:"Containment €75K + BMS €225K + free cooling €500K = €800K. Saving from PUE 1.50→1.25: ~€600K/yr. Payback: 1.3 years."}},
scenario:{title:"Retrofit Programme Payback",narrative:"Three-phase: containment €75K (PUE 1.45), BMS €225K (enables Phase 3), free cooling €500K (PUE 1.25).",question:"Cumulative simple payback vs PUE 1.50 baseline at €0.12/kWh?",answer:"The three phases are sequenced so each makes the next more effective. Containment reduces demand, BMS enables measurement, and free cooling captures the largest annual saving. Here is the cumulative financial picture.\n\nBaseline (1.50): 3,600 kW → €3,784K/yr.\nAfter Phase 1 (1.45): 3,480 kW → €3,658K. Saving: €126K/yr.\nAfter Phase 3 (1.25): 3,000 kW → €3,154K.\nCombined saving: €630K/yr. Capex: €800K. Payback: 1.3 years.\n\nWhat this means in practice: the entire three-phase programme pays for itself in under 16 months. After payback, the €630K/yr saving recurs for the remaining 20+ year asset life. Few capital programmes in commercial real estate deliver returns anywhere close to this.",
whoShouldCare:["tom","ann","mark"]},
sourceNote:"EN 50600-2-3:2019; ASHRAE TC 9.9; Met Éireann; CRU Q4 2024 electricity price (T2). Generator/HVO costs: Caterpillar/Cummins published price data (Tier 3). All costs indicative, screening-level.",
clockQuote:"The best time to retrofit was five years ago. The second best time is before the next capital cycle closes.",
retrofitRelevance:"This IS the retrofit menu. Every intervention mapped.",
crossRefs:[{module:"DC-LEARN-004",level:"L4",topic:"Free cooling design"},{module:"DC-LEARN-012",level:"L1",topic:"Energy centres"}],
rhetoricTakeaways:{declan:"Key takeaway: 8 hours fuel autonomy sounds comfortable until you face a 3-day storm. Pre-arrange fuel delivery contracts.",ann:"Key takeaway: Generator reliability is the last line of defence. Maintenance records and test logs are due diligence essentials.",mark:"Key takeaway: HVO switch: zero physical modification, ~90% Scope 1 reduction. The simplest decarbonisation action available.",sarah:"Key takeaway: Generator testing hours × diesel consumption = measurable Scope 1. HVO conversion eliminates most of this.",tom:"Key takeaway: HVO costs 20–25% more than diesel (Tier 3 — Caterpillar/Cummins published). For testing hours only, the annual premium is ~€5–10K (Tier 3 — indicative, Clonshaugh testing regime). Trivial."},
cascadeCheck:(kw,racks,pue)=>{if(kw<=0||racks<=0)return{needed:"€800K",available:"€0K/yr",unit:"payback",pass:false,detail:"Enter valid kW and rack count"};const saving=(pue-1.25)*kw*racks*8.76*0.12;if(saving<=0)return{needed:"€800K",available:"€0K/yr",unit:"payback",pass:pue<=1.25,detail:pue<=1.25?"PUE "+pue+" already at/below 1.25 target":"No saving at current inputs"};return{needed:"€800K",available:"€"+saving.toFixed(0)+"K/yr",unit:"payback",pass:saving>0,detail:"€800K capex vs €"+saving.toFixed(0)+"K/yr saving = "+(800/saving).toFixed(1)+" yr payback"}}
},

{id:"L9",level:9,name:"The Business Case",icon:"💰",component:"Commercial Decisions",available:true,
userNeedStatement:"I need the commercial argument — fund manager economics, carbon exposure, asset misalignment risk, cost of inaction — in investment committee language.",
plainEnglish:"Four numbers. Excess energy (PUE 1.50 vs 1.20): ~€757K/yr. Carbon at €71/tCO₂: ~€502K/yr shadow carbon cost (rising to €707K at 2030). Retrofit: ~€800K. Payback: 1.3 years. No scenario where doing nothing gets cheaper.",
grammar:{facts:[
{term:"CRREM Misalignment Year",definition:"Year when carbon intensity exceeds the CRREM pathway. Note: CRREM v2.01 has NO published DC pathway — LBE-derived (PUE × grid EF, Tier 3/4). Bands: 200/300/400 kgCO₂/MWh_IT.",plain:"When the building's carbon footprint crosses the line for climate-aligned investment.",number:"PUE 1.50 × 0.2241 = 336 kgCO₂/MWh_IT (amber). At 1.20: 269 (green, <300).",standard:"CRREM v2.01 (LBE-derived, T3/4). Derivation MUST be disclosed.",feynman:{analogy:"A carbon credit score. Above threshold: creditworthy. Below: restricted finance.",firstPrinciples:"Carbon intensity = Grid EF × PUE. At 1.50: 336. At 1.20: 269. Threshold tightens yearly.",theTest:"Does PUE 1.50→1.20 move from amber to green? (Yes — 336→269, crossing below 300.)"}},
{term:"Carbon Tax Trajectory",definition:"Ireland's carbon tax: €71/tCO₂ (Budget 2025), rising to €100 by 2030. Applies directly to fossil fuels; used as a shadow carbon price for Scope 2 grid electricity exposure.",plain:"Tax on fossil fuel emissions — €71 now, €100 by 2030. For grid electricity, this is applied as a shadow carbon price to quantify exposure. At 7,000+ tCO₂/yr, that's a meaningful growing cost.",number:"Clonshaugh: 7,067 tCO₂. Shadow cost current: €502K. 2030: €707K.",standard:"Finance Act 2020; Budget 2025",feynman:{analogy:"A rising floor under the cost of pollution. Every year the penalty for high emissions increases.",firstPrinciples:"7,067 tCO₂/yr × €71 = €502K. × €100 = €707K. × €150 = €1.06M. Inaction costs more every year.",theTest:"At €100/tCO₂ by 2030, annual shadow cost at current PUE? (7,067 × €100 = €706,700.)"}},
{term:"CRM Revenue Opportunity",definition:"Capacity Remuneration Mechanism — pays for providing capacity to Irish electricity system.",plain:"Irish grid pays DCs to provide backup power during high demand. Standby revenue.",number:"T-4 clearing: €149,960/MW/yr (T1 — SEMO PCAR2829T-4). If 2 MW qualified: ~€300K/yr (derived from T1 input, indicative).",standard:"SEMO PCAR2829T-4",feynman:{analogy:"Paid to be on standby. Grid pays for available capacity, whether dispatched or not.",firstPrinciples:"Electricity needs reserve for peaks. CRM creates a market. DCs with backup gen are natural participants.",theTest:"2 MW at €149,960/MW/yr: annual revenue? (2 × €149,960 = €299,920.)"}},
{term:"Cost of Inaction",definition:"The cumulative financial penalty of deferring retrofit — excess energy, carbon tax, lost CRM revenue, and potential valuation discount.",plain:"What it costs to do nothing. Every month of delay, Clonshaugh burns €70K+ in avoidable energy and carbon costs.",number:"Annual inaction cost: ~€857K (energy €757K + carbon €100K). 2-year delay: ~€1.71M. Compare to €800K total retrofit programme.",standard:"Finance Act 2020 (T1); SEAI 2026 (T1); CRU Q4 2024 (T2); Budget 2025 (T1)",feynman:{analogy:"A leaking roof — every month you delay repair, the water damage grows. Eventually the repair costs less than the damage.",firstPrinciples:"Inaction cost = (excess energy + shadow carbon + lost revenue) × time. At €857K/yr, the entire €800K programme pays back in 11 months. Delay is the most expensive option.",theTest:"Committee defers 2 years. Total cost vs retrofit? (€1.71M inaction vs €800K retrofit. Delay costs 2.1× the solution.)"}},
{term:"Decommissioning",definition:"The planned removal and disposal of end-of-life IT equipment, cooling plant, and electrical infrastructure from a data centre, including secure data destruction and environmental compliance.",plain:"Taking old equipment out safely — wiping data, removing hazardous materials, recycling metals, and tracking everything for audit. It's the reverse of commissioning.",number:"Typical DC equipment life: IT 3–5 years, UPS 10–15 years, chillers 15–20 years, building 25–40 years. Decommissioning cost: 5–15% of original capex (indicative).",standard:"WEEE Directive 2012/19/EU; EN 50625-1:2014",feynman:{analogy:"Decommissioning is like demolishing a building — you can't just knock it down, you have to separate materials, handle hazards, and prove the site is clean.",firstPrinciples:"Every asset has a lifespan. End-of-life creates three obligations: data security (destruction verification), environmental compliance (F-gas recovery, WEEE), and financial provision (decommissioning reserve).",theTest:"Why must F-gas refrigerant be recovered during chiller decommissioning? (Answer: F-Gas Regulation requires certified recovery. FM-200 has GWP 3,220 and R410A has GWP 2,088 — venting is illegal and carries heavy penalties.)"}}

],whatItLooksLike:"The business case is a spreadsheet built from physical measurements — PUE from BMS, energy from meters, carbon from grid EF, cost from bills.",
siteChecklist:["Annual electricity bill (kWh and €)","Generator fuel consumption","PPA/GO contracts","Insurance premiums","Tenant green clauses or PUE guarantees","Lease expiry dates","Comparable facility valuations"]},
logic:{causeAndEffect:[
{cause:"PUE 1.50 at €0.12/kWh (CRU Q4 2024, Tier 2) produces approximately €757K per year in excess energy cost versus the target PUE of 1.20",effect:"The €800K combined retrofit programme pays back in approximately 1.3 years from energy savings alone — before accounting for compliance value",insight:"Add: carbon avoidance (€502K), Taxonomy alignment, valuation uplift, CRM revenue (~€300K). Case strengthens yearly."},
{cause:"Carbon tax trajectory from €71 to €100/tCO₂ (Finance Act, Tier 1) increases Clonshaugh annual carbon cost by approximately €205K per year by 2030",effect:"The cost of inaction rises every year as carbon tax escalates, F-Gas restrictions tighten, and the energy cost penalty of PUE 1.50 compounds annually",insight:"Year 1 delay: ~€857K. Year 2: ~€880K. 5-year delay: ~€4.5M cumulative. Entire retrofit: €800K."},
{cause:"CRM T-4 at €149,960/MW/yr represents significant revenue for qualified DC backup generation",effect:"2 MW of qualified embedded generation at Clonshaugh could yield approximately €300K per year in CRM standby capacity revenue (Tier 1 — SEMO)",insight:"CRM revenue is additional to energy savings. Combined: €630K energy + €300K CRM + €100K carbon avoidance = €1.03M/yr total benefit vs €800K one-off programme cost. IRR exceeds 100%."}
],constraintLesson:"The constraint is not cost — payback justifies investment. The constraint is decision-making. Committees need measured PUE, audited bills, specific quotes, and a phased programme. The engineering profession provides exactly this: screening, regulatory assessment, retrofit design, and programme management.",
weakestLink:{whatsWrong:"\"Business case is speculative — don't have accurate data.\" Circular: data isn't accurate because BMS can't measure. BMS can't measure because nobody invested.",whatsRight:"Commission data first. A screening assessment provides the baseline. A regulatory gap analysis provides the defensible business case.",howToGetThere:"Step 1: Facility screening (days). Step 2: Regulatory assessment (weeks). Step 3: Retrofit design (months). The total cost to produce a fundable business case is a fraction of one year's excess energy cost (~€857K/yr at Clonshaugh)."}},
rhetoric:{declan:{hook:"70 thousand euros per month in wasted energy. Two years of deferral. That is 1.7 million euros to avoid an 800 thousand euro decision.",text:"I don't speak finance. But I can tell you: €70K+ per month in wasted energy. That's real money leaving through the roof as heat that shouldn't be there. Retrofit pays back in 15–16 months. After that, pure savings — every month. I've been asking for this budget for three years."},ann:{hook:"800 thousand capex. 630 thousand energy saving. 500 thousand carbon avoidance. 300 thousand CRM. Every year of delay is a compounding loss, not a deferral.",text:"€800K capex. €630K/yr energy saving. €500K/yr carbon avoidance. CRM: €300K/yr. Payback: under 2 years. IRR: 60%+. In 20 years of real estate investment, I have never seen a capex programme with returns like DC cooling retrofit. The only risk is waiting — every month of delay costs €70K."},mark:{hook:"Three work packages, proven technologies, deployed in hundreds of European data centres. The technical risk is near zero — the timeline risk is not.",text:"Three work packages, proven technologies, deployed in hundreds of European DCs. Risk is execution, not technology. Containment is mechanical — panels and doors. Free cooling is heat exchangers and controls. BMS is software and sensors. The engineering is solved. The question is programme management."},sarah:{hook:"Moves the asset from Taxonomy non-aligned at PUE 1.50 to aligned at 1.30 or below. That changes SFDR reporting from red to green in one programme.",text:"Transforms asset from Taxonomy non-aligned (PUE 1.50) to aligned (≤1.30). Changes SFDR classification from Article 6 to potentially Article 8. That's not a footnote in a sustainability report — it's a change in what capital can invest in this asset."},tom:{hook:"Phase 1: 75 thousand, payback 7 months. Phase 2: 225 thousand, 18 months. Phase 3: 500 thousand, 20 months. Name a better sequenced capital programme.",text:"Phase 1: €75K containment (payback 7 months). Phase 2: €225K BMS (payback 18 months — but enables everything after). Phase 3: €500K free cooling (payback 13 months). Combined: €800K, 16 months. After payback, the saving recurs every year for the remaining asset life — 20+ years."}},
scenario:{title:"The Cost of Inaction",narrative:"Committee debates: approve €800K now or defer 2 years to 'gather more data.'",question:"Cumulative excess cost over 2-year delay (energy + carbon, no PUE improvement)?",answer:"This is the question every investment committee must answer: what does delay actually cost? The committee is comparing €800K now against two years of 'gathering more data.' Here is what those two years look like.\n\nExcess energy: €756,864/yr.\nExcess carbon: 1,413 tCO₂ × €71 = €100,323/yr.\nAnnual inaction cost: €857,187.\nTwo years: €1,714,374.\nCompare to €800K retrofit. Delay costs >2× the programme.\n\nWhat this means in practice: the committee is not choosing between spending and saving — they are choosing between €800K now or €1.71M over two years. Delay is the most expensive option on the table. And the data they want to 'gather' requires the BMS upgrade that is part of the programme they are deferring.",
whoShouldCare:["ann","tom","sarah"]},
sourceNote:"Finance Act 2020 (T1); Budget 2025 €71 (T1); CRREM v2.01 LBE-derived methodology (T3/4); SEMO PCAR2829T-4 €149,960 (T1); SEAI 2026 (T1); CRU Q4 2024 (T2).",
clockQuote:"The clock doesn't wait for committee approval — every month of delay costs more than the decision.",
retrofitRelevance:"Converts engineering analysis to investment committee language. The business case is the bridge between technical assessment and capital allocation.",
crossRefs:[{module:"DC-LEARN-007",level:"L7",topic:"Carbon tax and compliance costs"},{module:"DC-LEARN-010",level:"L1",topic:"Net zero pathway"}],
rhetoricTakeaways:{declan:"Key takeaway: Every finding in this module is a line item in a retrofit business case. Convert technical insight to investment language.",ann:"Key takeaway: The business case must show IRR, NPV, and payback — not just PUE improvement. Speak the committee's language.",mark:"Key takeaway: Decommissioning is part of lifecycle costing. F-gas recovery, WEEE, data destruction — all have cost and programme impact.",sarah:"Key takeaway: Lifecycle carbon includes embodied carbon in equipment. Decommissioning and disposal complete the carbon accounting boundary.",tom:"Key takeaway: Decommissioning reserve: 5–15% of original capex. Include it in lifecycle cost models from day one."},
cascadeCheck:(kw,racks,pue)=>{const co2=kw*racks*pue*8.76*0.2241;const cost=co2*71;if(co2<=0)return{needed:"0",available:"0",unit:"€K carbon",pass:true,detail:"No load — no carbon exposure"};return{needed:(cost/1000).toFixed(0),available:"0",unit:"€K carbon",pass:false,detail:(co2/1000).toFixed(0)+" tCO₂/yr × €71 = €"+(cost/1000000).toFixed(0)+"K/yr carbon exposure"}}
}

const SO_WHAT_MAP = {
"Data Centre":"Why it matters: Every module in this series examines one system inside this building. Understanding the building as a whole is the foundation for understanding any part of it.",
"IT Load":"Why it matters: IT load determines the size and cost of every other system. Get the IT load wrong, and every downstream calculation — cooling, power, carbon — is wrong too.",
"Power Usage Effectiveness (PUE)":"Why it matters: PUE is the single number that connects energy cost to IT productivity. It's the basis of every business case, every regulatory return, and every sustainability report.",
"Raised Floor":"Why it matters: The raised floor is the primary cooling distribution system in legacy DCs. Its design determines whether cooling reaches the servers efficiently or wastes energy in turbulence and bypass.",
"Fire Suppression":"Why it matters: Fire suppression is a compliance and continuity requirement. The choice of suppression agent (FM-200 vs Novec vs IG-541) has direct F-Gas regulatory and carbon reporting implications.",
"Maximum Import Capacity (MIC)":"Why it matters: MIC is the hard ceiling on facility power. Every growth plan — density increase, new halls, EV charging — must fit within MIC or trigger a costly ESB Networks upgrade.",
"Rack Density (kW/rack)":"Why it matters: Rack density determines cooling demand per rack. Moving from 6 to 20 kW/rack triples the heat per rack — the cooling system must handle this or become the bottleneck.",
"Cooling System (Chiller-Only)":"Why it matters: Chiller-only cooling means no free cooling — compressors run 8,760 hours. Adding economisers in Dublin's climate (7,200 hrs <18°C) is the single largest energy efficiency opportunity.",
"UPS (Uninterruptible Power Supply)":"Why it matters: UPS is the bridge between grid loss and generator start. Battery ageing reduces bridge time. A failed UPS = hard shutdown of every server it feeds.",
"Grid Connection":"Why it matters: A single MV feed is a single point of failure for the entire facility. Second-feed analysis is the first question in any resilience assessment.",
"Building Vintage (2013)":"Why it matters: 2013 is pre-CRU, pre-Taxonomy, pre-EED Article 12, pre-F-Gas phase-down. Every regulation that matters today did not exist when Clonshaugh was designed.",
"Operational Expenditure (OpEx)":"Why it matters: In a DC, electricity is 40–60% of OpEx. PUE reduction translates directly to OpEx reduction — the single biggest lever for operating margin.",
"ESB Networks Medium Voltage (10 kV)":"Why it matters: 10 kV MV means ESB Networks, not the transmission operator. Connection upgrades, outage scheduling, and regulatory obligations differ significantly from HV (38 kV+) connections.",
"Data Hall Layout":"Why it matters: Hall layout — open vs contained, raised floor vs slab — determines cooling efficiency, rack density limits, and the feasibility of retrofit interventions.",
"Containment":"Why it matters: Containment is the lowest-cost, fastest-payback cooling retrofit. It should be first in every prioritised action list — everything else works better with containment in place.",
"Power Chain Overview":"Why it matters: Understanding the full power chain from grid to rack reveals every point of failure. Redundancy must exist at every link — one weak link sets the facility's availability.",
"Cooling Chain Overview":"Why it matters: The cooling chain must reject every watt of IT power as heat. If any link in the chain is undersized, the entire facility throttles to the weakest component.",
"Redundancy (N, N+1, 2N)":"Why it matters: Redundancy topology determines uptime. N = no spare (any failure = outage). N+1 = one spare (one failure tolerated). 2N = full duplication (maintenance without risk).",
"CRU Licence":"Why it matters: CRU licence conditions are the primary regulatory driver for Irish DC retrofit. Non-compliance risks licence revocation — the facility cannot legally operate without it.",
"BMS Points":"Why it matters: Insufficient monitoring points mean you cannot measure PUE, WUE, or rack-level performance accurately. EED Article 12 reporting requires data that a 500-point BMS cannot produce.",
"NEAP Assessment":"Why it matters: NEAP is the statutory energy assessment methodology for Irish commercial buildings. Understanding its limitations for DCs prevents misleading energy performance claims.",
"Capacity Headroom":"Why it matters: Headroom is the gap between current demand and maximum capacity. It determines growth potential without infrastructure upgrade — the key metric for expansion planning.",
"Annual Energy Consumption":"Why it matters: Annual energy = IT × PUE × 8,760. This number drives electricity cost (€3.78M/yr), carbon footprint (7,060 tCO₂), and regulatory reporting obligations.",
"Site Perimeter":"Why it matters: Physical security is EN 50600's first function. A weak perimeter compromises every inner layer. It's also the first thing a potential investor or insurer inspects.",
"Maintenance Access":"Why it matters: Equipment that cannot be maintained without shutdown reduces availability. Maintenance access planning determines whether the facility can achieve Tier III concurrent maintenance.",
"Cable Management":"Why it matters: Unmanaged cables block plenum airflow, impede access for maintenance, and create fire load. Cable management is a prerequisite for containment and raised floor optimisation.",
"Building Fabric":"Why it matters: The building envelope affects both cooling load (solar gain, insulation) and physical security (wall construction, roof access). Age and condition determine retrofit scope.",
"Regulatory Landscape (2013 vs 2026)":"Why it matters: The gap between 2013 design standards and 2026 regulations is the entire retrofit requirement. Every module quantifies one dimension of this gap.",
"Raised Floor Plenum":"Why it matters: Plenum height and obstruction level determine cooling delivery efficiency. A shallow, cable-choked plenum forces higher fan speeds and wastes energy.",
"Environmental Compliance":"Why it matters: EPA IE licence, F-Gas, WEEE, and noise regulations all apply to Clonshaugh. Non-compliance carries enforcement action, fines, and reputational risk to the fund.",
"Energy Performance Certificate":"Why it matters: BER/NEAP is a statutory requirement but measures the wrong things for a DC. Understanding this prevents reliance on a misleading metric.",
"Carbon Footprint (Scope 2)":"Why it matters: Scope 2 = purchased electricity × grid emission factor. At 0.2241 kgCO₂/kWh, Clonshaugh produces ~7,060 tCO₂/yr. This drives SFDR, Taxonomy, and CRREM reporting.",
"Shadow Carbon Cost":"Why it matters: Shadow carbon cost = tCO₂ × carbon tax rate. At €71/tCO₂ today, Clonshaugh faces ~€502K/yr. At €100/tCO₂ (2030 target), ~€707K/yr. This is real financial exposure.",
"Generator Fuel Autonomy":"Why it matters: Fuel autonomy defines resilience during extended grid outages. 8 hours is adequate for typical outages but insufficient for multi-day events without pre-arranged fuel delivery contracts.",
"HVO (Hydrotreated Vegetable Oil)":"Why it matters: HVO is the simplest Scope 1 carbon reduction available — ~90% CO₂ reduction, zero physical modification. Increasingly an EPA licence expectation.",
"Lifecycle Costing":"Why it matters: Lifecycle cost = capex + OpEx + decommissioning over asset life. A cheap chiller with high energy consumption costs more over 15 years than an efficient one at higher capex.",
"Retrofit Phasing":"Why it matters: You cannot shut down a live DC to retrofit it. Phasing determines what work can be done concurrently with operations and what requires temporary plant — adding 30–50% to project cost.",
"Business Case Structure":"Why it matters: A business case converts engineering analysis to investment committee language. Without it, even the best technical proposal will not secure funding.",
"Capital Expenditure (CapEx) Breakdown":"Why it matters: M&E services are 60–70% of DC build cost. Understanding the cost structure reveals where retrofit investment has the greatest impact per euro spent.",
"Decommissioning":"Why it matters: Every asset will eventually require decommissioning. F-gas recovery, WEEE compliance, and data destruction are legal obligations with cost and programme implications.",
"Risk Register":"Why it matters: A risk register maps every identified risk to likelihood, impact, and mitigation. It is the bridge between engineering assessment and insurance/investor due diligence.",
"Due Diligence Scope":"Why it matters: Due diligence for DC acquisition must go beyond standard property checks. M&E condition, regulatory compliance, and remaining equipment life are the value determinants.",
"Payback Period":"Why it matters: Payback period is the decision metric for retrofit investment. Containment (6–18 months) vs DCIM (3–5 years) vs second feed (7–10 years) — sequence from shortest to longest.",
"Net Present Value (NPV)":"Why it matters: NPV adjusts future savings to today's value. A €500K annual saving over 10 years is worth more than €5M today because of the time value of money.",
"Investment Committee Language":"Why it matters: Engineers speak in kW, PUE, and °C. Investment committees speak in IRR, NPV, and payback. Translation between these languages is where most retrofit proposals fail."
};

const ASSESSMENT_QUESTIONS = [
{level:1,id:"Q000-1",icon:"🏢",stage:"grammar",q:"What is the primary function of a data centre according to EN 50600?",options:["Provide office space for IT staff and the technical support teams that maintain the server infrastructure.","House IT equipment with dedicated power, cooling, fire suppression, and security","Store paper records and long-term archive data in a humidity-controlled secure facility environment.","Generate electricity for the national grid using on-site diesel or gas generation plant."],correct:1,explain:"EN 50600-1:2019 defines a data centre as a facility housing IT equipment with four key functions: physical security, power distribution, environmental control (cooling), and fire protection."},
{level:1,id:"Q000-2",icon:"🏢",stage:"logic",q:"If Clonshaugh has IT load 2,400 kW and PUE 1.50, what is total facility power?",options:["2,400 kW","3,000 kW","3,600 kW","4,800 kW"],correct:2,explain:"Total = IT Load × PUE = 2,400 × 1.50 = 3,600 kW. The 1,200 kW overhead goes to cooling (~900 kW) and power distribution losses (~300 kW)."},
{level:1,id:"Q000-3",icon:"🏢",stage:"rhetoric",q:"An investor asks why the electricity bill matters more than the building's square footage. What is the best explanation?",options:["Electricity prices are subsidised for commercial operators and will fall as Irish renewables capacity increases, making the grid cost a minor concern.","Electricity cost (€3.78M/yr) dwarfs maintenance and staffing — it IS the operating cost","Square footage determines building valuation and depreciation schedule, which are the dominant inputs in institutional real estate investment analysis.","The building does not consume electricity directly — energy consumption is entirely attributable to the tenant IT load and excluded from the landlord account."],correct:1,explain:"In a DC, electricity is 40–60% of OpEx. For Clonshaugh: 31,536 MWh × €0.12/kWh = €3.78M/yr. This is the dominant cost driver and the primary lever for operational margin improvement."},
{level:2,id:"Q000-4",icon:"📍",stage:"grammar",q:"What is Clonshaugh's Maximum Import Capacity (MIC)?",options:["2.4 MW","3.6 MW","5 MVA","10 MVA"],correct:2,explain:"Clonshaugh has 5 MVA MIC from ESB Networks at 10 kV medium voltage. At 0.95 power factor, this provides 4,750 kW — current demand is 3,600 kW (24% headroom)."},
{level:2,id:"Q000-5",icon:"📍",stage:"logic",q:"At 20 kW/rack and PUE 1.20, can Clonshaugh's 5 MVA MIC support 400 racks?",options:["Yes — total IT demand is 8,000 kW, and PUE 1.20 means only 1,600 kW of overhead, giving 9,600 kW total — within the 10 MVA capacity of the ESB Networks substation.","No — total demand is 9,600 kW, exceeding 4,750 kW usable","Yes — PUE improvement from 1.50 to 1.20 reduces facility overhead by 720 kW, releasing enough headroom within the current 5 MVA MIC to support additional racks.","Insufficient information — rack density and IT equipment vintage must be confirmed before a MIC calculation can be completed."],correct:1,explain:"IT = 400 × 20 = 8,000 kW. Total = 8,000 × 1.20 = 9,600 kW. MIC = 5 MVA × 0.95 = 4,750 kW. Shortfall: 4,850 kW. A second ESB feed or reduced rack count is required."},
{level:2,id:"Q000-6",icon:"📍",stage:"rhetoric",q:"A fund manager asks what limits growth at Clonshaugh. What is the primary constraint?",options:["Staff availability — Clonshaugh cannot scale its operations team proportionally without significant lead time for recruitment and training.","MIC headroom — only 24% spare, insufficient for full densification","Planning permission — any increase in rack count or IT load requires a fresh planning application to the local authority.","Broadband speed — the current fibre connectivity cannot support the latency requirements of high-density compute workloads above 8 kW per rack."],correct:1,explain:"MIC is the hard ceiling. At 3,600 kW demand vs 4,750 kW usable, there is 1,150 kW (24%) headroom. Full densification to 20 kW/rack needs 9,600 kW — nearly double MIC."},
{level:3,id:"Q000-7",icon:"⚡",stage:"grammar",q:"What is the function of a UPS in a data centre power chain?",options:["Generate backup electricity permanently for IT load during extended grid outages lasting hours or days.","Bridge the gap between grid loss and generator start (10–15 seconds)","Reduce electricity costs by storing cheap off-peak power and releasing it at peak tariff periods.","Cool the servers and other IT equipment during planned maintenance periods."],correct:1,explain:"UPS (Uninterruptible Power Supply) provides battery-backed power for 10–15 seconds while generators start. It bridges the gap — not a long-term backup source."},
{level:3,id:"Q000-8",icon:"⚡",stage:"logic",q:"If Clonshaugh's chiller-only cooling fails for 10 minutes, what happens to servers?",options:["Nothing significant — servers have individual internal cooling fans that can sustain safe operating temperatures for 30–60 minutes in an enclosed hall.","Temperature rises past ASHRAE A1 limits (32°C) and servers throttle or shut down","The UPS automatically activates supplementary cooling to maintain safe server inlet temperatures during the chiller outage period.","Free cooling from outside air activates automatically when the chiller trips, maintaining the cold aisle temperature within ASHRAE A1 limits."],correct:1,explain:"2,400 kW IT = 2,400 kW heat. Without cooling, enclosed halls heat at ~2–3°C per minute. ASHRAE A1 limit (32°C intake) is exceeded within 5–8 minutes. Thermal shutdown follows."},
{level:3,id:"Q000-9",icon:"⚡",stage:"rhetoric",q:"Declan (Ops Manager) says 'keeping the lights on' is his job. What does he really mean?",options:["Maintaining the facility lighting, emergency lighting, and external security illumination systems to the required lux levels 24 hours per day.","Ensuring continuous operation of all M&E systems 24/7/365","Managing the electricity procurement contract and minimising the monthly ESB Networks energy bill for the facility.","Cleaning and maintaining the server room environment to the required temperature and humidity standards under the OLA."],correct:1,explain:"'Keeping the lights on' is DC ops shorthand for maintaining power, cooling, fire, and security continuously. It means 3,600 kW of demand managed 8,760 hours/year without interruption."},
{level:4,id:"Q000-10",icon:"🧊",stage:"grammar",q:"What does 'chiller-only cooling' mean at Clonshaugh?",options:["Only the chillers are active — CRAH and CRAC units have been decommissioned and cooling is provided solely by chilled water distribution.","Mechanical refrigeration runs 24/7 with no free cooling economiser","The building uses ice storage tanks to pre-cool the chilled water loop during off-peak periods, reducing daytime compressor operation.","Cooling is powered by a dedicated generator that is isolated from the main IT load power path."],correct:1,explain:"Chiller-only means compressors run year-round. No economiser uses outside air. Dublin has 7,200 hrs/yr below 18°C — Clonshaugh wastes this entirely."},
{level:4,id:"Q000-11",icon:"🧊",stage:"logic",q:"Adding free cooling at Clonshaugh reduces compressor hours by approximately what percentage?",options:["10%","25%","50%","82%"],correct:3,explain:"Free cooling operates when outside air <18°C. Dublin: 7,200 of 8,760 hours/yr = 82%. However, partial free cooling and transition periods mean actual compressor reduction is ~50–65%."},
{level:4,id:"Q000-12",icon:"🧊",stage:"rhetoric",q:"Sarah (ESG Analyst) asks about the chiller refrigerant. Why does this matter for sustainability reporting?",options:["Refrigerant type determines cooling system efficiency, which affects the PUE calculation and the facility's EU Taxonomy screening result.","R410A has GWP 2,088 — it's a regulated F-Gas with phase-down obligations and Scope 1 implications","All refrigerants currently approved under EU F-Gas Regulation are environmentally neutral in normal operation at the concentrations used in HVAC systems.","Refrigerant choice only matters at initial installation — once charged, the refrigerant circuit is sealed and has no ongoing reporting implications."],correct:1,explain:"R410A is an F-Gas (GWP 2,088). EU F-Gas Regulation mandates phase-down. Leakage = Scope 1 emissions. Replacement timeline must be in the sustainability roadmap."},
{level:5,id:"Q000-13",icon:"🔐",stage:"grammar",q:"How many security layers typically exist between a DC's public road and the server rack?",options:["2","3–4","5–6","10+"],correct:2,explain:"Defence-in-depth: perimeter fence → building entrance → corridor/mantrap → data hall → rack cage → server. Typically 5–6 layers per EN 50600-2-5."},
{level:5,id:"Q000-14",icon:"🔐",stage:"logic",q:"Why does a single gated entrance create a security vulnerability?",options:["A single gate is harder to locate and therefore reduces the risk of targeted access attempts by identifying the facility as a standard commercial premises.","One gate must handle delivery, staff, and visitors simultaneously — increasing tailgating risk","A single gate consumes more electrical power than a multi-gate perimeter system, creating an unnecessary operational cost for the facility.","Single gates are more expensive to operate and maintain than a distributed multi-point access system with separate delivery and staff entrances."],correct:1,explain:"A single gate means all traffic types (delivery trucks, staff cars, visitors) share one entry. This creates queuing, tailgating opportunities, and mixing of access levels."},
{level:5,id:"Q000-15",icon:"🔐",stage:"rhetoric",q:"An insurer asks about physical security at Clonshaugh. What is the critical gap?",options:["CCTV resolution — the existing 2MP cameras do not meet the 4K standard that insurers now require for post-incident forensic evidence collection.","No anti-vehicle barriers and no mantrap — single point of entry with no anti-tailgating measures","Window locks — ground-floor windows without secondary locks are a material liability gap in the physical perimeter assessment for insurance underwriting.","Fire escape routes — the current arrangement conflicts with physical security requirements and creates a gap that insurers routinely flag."],correct:1,explain:"Insurers assess defence-in-depth. No anti-vehicle barriers (ram-raid risk), no mantrap (tailgating risk), and single entry (no segregation of traffic types) are material gaps."},
{level:6,id:"Q000-16",icon:"📐",stage:"grammar",q:"What is the standard raised floor height at Clonshaugh?",options:["300 mm","600 mm","900 mm","1,200 mm"],correct:1,explain:"Clonshaugh: 600 mm raised floor. Modern best practice: 900–1,200 mm. Deeper plenums reduce air velocity and improve distribution uniformity."},
{level:6,id:"Q000-17",icon:"📐",stage:"logic",q:"If 30% of the under-floor plenum is obstructed by cables, how does this affect cooling?",options:["No effect — cold air flows around cable bundles and reaches perforated tiles at the design volume and pressure regardless of obstruction.","Effective airflow area reduces by 30%, but turbulence further reduces cooling delivery efficiency","Cable obstruction improves directional airflow by channelling cold air toward perforated tiles rather than allowing pressure equalisation across the plenum.","Cable obstruction only affects structured cabling performance — it has no measurable impact on under-floor static pressure or cooling air volume."],correct:1,explain:"Cable obstruction reduces cross-sectional area AND creates turbulence. The combined effect on cooling delivery exceeds the 30% area reduction. Cable management is a prerequisite for containment."},
{level:6,id:"Q000-18",icon:"📐",stage:"rhetoric",q:"Tom (QS) is pricing a containment retrofit. What must be done first?",options:["Order containment panels immediately — lead times for hot aisle containment systems are 12–16 weeks and procurement should start before design is finalised.","Complete under-floor cable management — containment on a blocked plenum wastes the investment","Apply for planning permission — physical changes to the data hall fire compartment boundary require a fire certificate amendment before installation.","Upgrade the BMS to sub-meter the cold aisle before containment, so baseline airflow data is captured before the thermal environment changes."],correct:1,explain:"Containment seals hot/cold aisles. If the plenum is blocked, cold air cannot reach tiles uniformly — containment concentrates the problem rather than solving it. Cable tidy first, then containment."},
{level:7,id:"Q000-19",icon:"📋",stage:"grammar",q:"Which five regulatory instruments apply to Irish data centres in 2026?",options:["BCAR, NEAP, BER, Planning Act, and Fire Certificate","CRU Licence, EED Article 12, EU Taxonomy, F-Gas Regulation, EPA IE Licence","GDPR, DORA, NIS2, PSD2, MiFID","Health & Safety Act, Fire Services Act, Safety Statement, Environmental Act, NIS2"],correct:1,explain:"The five key regulatory instruments for Irish DC operations in 2026: CRU licence conditions, EED Article 12 (energy reporting), EU Taxonomy (PUE ≤1.3), F-Gas Regulation (refrigerant phase-down), EPA IE Licence (emissions)."},
{level:7,id:"Q000-20",icon:"📋",stage:"logic",q:"Clonshaugh's PUE is 1.50. The EU Taxonomy threshold is ≤1.3. What is the consequence?",options:["No consequence — the EU Taxonomy PUE threshold is a voluntary target and non-compliance does not affect operational permits or financing.","The facility does not qualify for Taxonomy-aligned green finance","Clonshaugh must shut down immediately — PUE non-compliance triggers a mandatory enforcement notice under the Taxonomy Delegated Act.","PUE only matters for new builds — existing facilities commissioned before 2025 are permanently grandfathered under the pre-2025 Taxonomy criteria."],correct:1,explain:"EU Taxonomy Delegated Act 2021/2139 sets PUE ≤1.3 for DC activities. At PUE 1.50, Clonshaugh cannot be classified as a sustainable economic activity — this affects green bond eligibility and SFDR reporting."},
{level:7,id:"Q000-21",icon:"📋",stage:"rhetoric",q:"Ann (Fund Manager) asks: 'Is this facility CRU compliant?' What is the correct answer?",options:["Yes — Clonshaugh holds an active ESB Networks connection agreement and pays CRU-regulated network charges, which constitutes CRU compliance.","No — and the correct term is 'CRU Readiness', not 'CRU Readiness', because we assess readiness rather than certify compliance","Compliance is confirmed by the BER certificate and the EPA fire licence, which together cover all CRU obligations applicable to the facility.","CRU does not regulate data centres directly — CRU regulates the electricity network and its rules apply to ESB Networks, not to DC operators."],correct:1,explain:"PI-safe language: 'CRU Readiness' not 'CRU Readiness'. LBE assesses readiness against CRU licence conditions — we do not certify compliance. That determination is CRU's role."},
{level:8,id:"Q000-22",icon:"🔋",stage:"grammar",q:"What is Clonshaugh's generator fuel autonomy at full load?",options:["2 hours","8 hours","24 hours","72 hours"],correct:1,explain:"Clonshaugh: 20,000 L tank, ~1,000 L/hr at full dual-generator load. Declared autonomy: 8 hours (includes safety margin below the physical 10-hour limit at full load)."},
{level:8,id:"Q000-23",icon:"🔋",stage:"logic",q:"Switching from diesel to HVO reduces generator CO₂ emissions by approximately what percentage?",options:["10%","50%","90%","100%"],correct:2,explain:"HVO (EN 15940) reduces Scope 1 CO₂ by approximately 90% on a lifecycle basis. Same engines, same tanks, same autonomy — different fuel. The simplest decarbonisation action available."},
{level:8,id:"Q000-24",icon:"🔋",stage:"rhetoric",q:"Mark (MEP Engineer) says 'HVO is a zero-modification switch'. What does this mean practically?",options:["HVO requires replacement of the generator engine block and fuel injection system — the switchover is zero-modification at the control system level only.","Existing diesel generators and fuel tanks accept HVO with no physical changes — only fuel supply changes","HVO eliminates the need for generator testing because it has a longer shelf life than mineral diesel and degrades more slowly in the storage tank.","HVO is a gaseous fuel that requires a separate storage and delivery system — the 'zero modification' refers to the generator control parameters only."],correct:1,explain:"HVO is a drop-in replacement for mineral diesel. Same viscosity, similar energy density, compatible with existing engines and tanks. The only change is the fuel delivery contract."},
{level:9,id:"Q000-25",icon:"💰",stage:"grammar",q:"What percentage of DC build cost is typically M&E services?",options:["20–30%","40–50%","60–70%","80–90%"],correct:2,explain:"M&E services (power, cooling, fire, security, BMS) represent 60–70% of DC build cost. Compare with offices (30–35%). In a DC, you're buying an engineering system with a building wrapper."},
{level:9,id:"Q000-26",icon:"💰",stage:"logic",q:"Containment (€50–150K, 6–18 month payback) vs DCIM (€200–500K, 3–5 year payback). Which do you recommend first and why?",options:["DCIM first — the measurement baseline must be established before any physical intervention so that payback calculations are based on verified data.","Containment first — it has faster payback and enables all downstream improvements","Both simultaneously — the shared project management and site access reduces total installation cost and minimises disruption to live operations.","Neither — capital should be directed to solar PV on the roof, which has a longer payback but a stronger ESG narrative for the fund board."],correct:1,explain:"Containment first: lowest cost, fastest payback, and it improves the baseline for every subsequent intervention. DCIM measures; containment acts. Sequence: contain → measure → optimise."},
{level:9,id:"Q000-27",icon:"💰",stage:"rhetoric",q:"An investment committee asks for the business case in one sentence. What do you say?",options:["PUE reduction from 1.50 to 1.20 saves approximately €750K per year in electricity costs, pays back containment in under 18 months, and eliminates ~1,900 tCO₂ from the Scope 2 footprint","The building needs new servers and cooling upgrades to remain competitive as tenant density expectations increase beyond the current 8 kW per rack.","We should wait for the revised CRU guidance expected in Q3 2026 before committing capital, to ensure any investment aligns with the new regulatory framework.","The current PUE of 1.50 is above the EU Taxonomy threshold of 1.3, which may affect future financing options depending on the fund's ESG classification."],correct:0,explain:"One sentence covers: financial saving (€750K/yr), payback timeline (<18 months for first measure), and carbon impact (1,900 tCO₂). This is the language an investment committee needs."}
];
const GLOSSARY_000 = [
{term:"Data Centre",def:"Purpose-built facility housing IT equipment with dedicated power, cooling, fire suppression, and security (EN 50600-1:2019)."},
{term:"IT Load",def:"Electrical power consumed by computing, storage, and networking equipment (kW or MW)."},
{term:"PUE",def:"Power Usage Effectiveness — ratio of total facility energy to IT energy. PUE = Total / IT. Lower is better."},
{term:"MIC",def:"Maximum Import Capacity — contractual limit on electricity import from ESB Networks (MVA)."},
{term:"Rack Density",def:"Average electrical power per server rack (kW/rack). Indicator of facility age and computing intensity."},
{term:"Raised Floor",def:"Elevated floor creating pressurised plenum for cold air distribution and cable routing."},
{term:"Containment",def:"Physical separation of hot and cold airstreams using curtains or rigid panels."},
{term:"Free Cooling",def:"Use of outside air (via economiser coils) to cool water directly, bypassing compressors."},
{term:"UPS",def:"Uninterruptible Power Supply — battery system bridging grid loss to generator start (10–15 sec)."},
{term:"BMS",def:"Building Management System — centralised monitoring and control of M&E systems."},
{term:"DCIM",def:"Data Centre Infrastructure Management — software platform for granular monitoring (power, cooling, capacity)."},
{term:"R410A",def:"HFC refrigerant (GWP 2,088) used in Clonshaugh chillers. Subject to F-Gas Regulation phase-down."},
{term:"FM-200",def:"Clean agent fire suppressant (GWP 3,220). Subject to F-Gas Regulation. Being replaced by Novec 1230 or IG-541."},
{term:"VESDA",def:"Very Early Smoke Detection Apparatus — aspirating detection system for data halls."},
{term:"ESB Networks",def:"Electricity distribution network operator in Ireland. Manages MV (10/20 kV) and LV (400 V) connections."},
{term:"CRU",def:"Commission for Regulation of Utilities — Irish regulator overseeing energy and water utilities, including DC licensing."},
{term:"EED",def:"EU Energy Efficiency Directive — Article 12 requires DC energy reporting (PUE, WUE, REF)."},
{term:"EU Taxonomy",def:"EU classification system for sustainable economic activities. DC threshold: PUE ≤1.3."},
{term:"F-Gas Regulation",def:"EU regulation phasing down high-GWP fluorinated greenhouse gases including R410A and FM-200."},
{term:"EPA IE Licence",def:"Industrial Emissions licence from the Environmental Protection Agency for facilities above specified thresholds."},
{term:"NEAP",def:"Non-domestic Energy Assessment Procedure — Irish methodology for commercial building BER. The residential equivalent is a separate procedure and does not apply to data centres."},
{term:"BER",def:"Building Energy Rating — statutory energy label for Irish buildings, derived from NEAP for commercial properties."},
{term:"HVO",def:"Hydrotreated Vegetable Oil (EN 15940) — drop-in diesel replacement with ~90% lifecycle CO₂ reduction."},
{term:"Scope 1",def:"Direct GHG emissions from owned/controlled sources (generators, refrigerant leaks)."},
{term:"Scope 2",def:"Indirect GHG emissions from purchased electricity. Scope 2 = consumption × grid emission factor."},
{term:"Grid Emission Factor",def:"CO₂ per unit of grid electricity. Ireland (SEAI 2026): 0.2241 kgCO₂/kWh."},
{term:"Carbon Tax",def:"Irish carbon tax on CO₂ emissions. €71/tCO₂ (Budget 2025), target €100/tCO₂ by 2030."},
{term:"Shadow Carbon Cost",def:"Internal carbon price applied to investment decisions = tCO₂ × carbon tax rate."},
{term:"Payback Period",def:"Time for cumulative savings to equal initial investment. Shorter = better."},
{term:"NPV",def:"Net Present Value — sum of future cash flows discounted to present value. NPV > 0 = value-creating."},
{term:"IRR",def:"Internal Rate of Return — discount rate at which NPV = 0. Compare against hurdle rate."},
{term:"Lifecycle Cost",def:"Total cost over asset life: CapEx + OpEx + maintenance + decommissioning."},
{term:"Redundancy (N+1)",def:"One additional unit beyond minimum requirement. Allows single failure without service impact."},
{term:"Redundancy (2N)",def:"Full duplication of systems. Allows maintenance on one set while other operates. Highest availability."},
{term:"ASHRAE",def:"American Society of Heating, Refrigerating and Air-Conditioning Engineers. TC 9.9 defines DC environmental guidelines."},
{term:"EN 50600",def:"European standard series for data centre facilities — covers design, build, and operation."},
{term:"Hot Aisle / Cold Aisle",def:"Rack arrangement alternating server intake (cold) and exhaust (hot) sides to manage airflow."},
{term:"Plenum",def:"Pressurised air space (under raised floor or above ceiling) for air distribution."},
{term:"Defence-in-Depth",def:"Security model using multiple independent layers. Each layer buys response time."},
{term:"Concurrent Maintenance",def:"Ability to maintain any component without interrupting IT service (Uptime Tier III requirement)."},
{term:"CRREM",def:"Carbon Risk Real Estate Monitor — models asset misalignment risk against decarbonisation pathways. Note: no published DC pathway; LBE uses derived bands (T3/T4). LBE terminology: Misalignment Year (never use the alternative term)."}
];

const {useState,useEffect,useCallback,useMemo,useRef} = React;
const hasTextSelection = () => { const sel = window.getSelection(); return sel && sel.toString().length > 0; };

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].lvl.level),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
            <strong>Trivium Method:</strong> Grammar (definitions) → Logic (cause/effect) → Rhetoric (stakeholder perspectives).
            <br/><strong>Feynman Clarify:</strong> Every fact has three layers — analogy (no jargon), first principles (from universal knowledge), and a test (can you answer this?).
            <br/><strong>Weakest Link:</strong> Each level identifies the most common misconception and the corrective path.
            <br/><strong>Five Personas:</strong> Same finding → five different professional perspectives (Declan, Ann, Mark, Sarah, Tom).

        </div>

function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const [rhetPersonaInit,setRhetPersona]=useState(null);
  // Read persona stage + persona key from Chain tab persona entry card
  React.useEffect(()=>{
    try {
      const req = sessionStorage.getItem('dc_persona_stage');
      if(req){ setStage(req); sessionStorage.removeItem('dc_persona_stage'); }
      const pk = sessionStorage.getItem('dc_persona_key');
      if(pk){ setRhetPersona(pk); sessionStorage.removeItem('dc_persona_key'); }
    } catch(e){}
  },[selectedLevel]);
  
  React.useEffect(()=>{ dcTimingLog.log('stage_change', { stage: stage, level: selectedLevel }); },[stage, selectedLevel]);
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
    {lvl.clockQuote && (
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
        <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>— Level {lvl.level}: {lvl.name}</div>
      </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeedStatement}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric} initialPersona={rhetPersonaInit}/>}
      </div>
      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}
