  function flush(){ try { safeStore.set(DC_TIMING_KEY, JSON.stringify(buf)); } catch(e){} }
  function log(event, data) {
    buf.push(Object.assign({ event: event, ts: Date.now() }, data || {}));
    if(buf.length > 2000) buf = buf.slice(-1500);
    flush();
  }
  log('module_open', { module: TOOL_ID, version: TOOL_VERSION });
  try { window.addEventListener('beforeunload', function(){ log('module_close', {}); flush(); }); } catch(e){}
  return { log: log };
})();

{id:"L1",level:1,name:"What Is a Data Centre?",icon:"🏢",component:"The Building & Purpose",available:true,
userNeedStatement:"I need to understand what a data centre actually is — physically, operationally, and commercially — so I can participate in conversations about DC investment, operations, or regulation with confidence.",
plainEnglish:"A data centre is a building full of computers that never switch off. Every email, video stream, bank transaction, and cloud file lives here. The computers generate heat so the building needs industrial cooling. They cannot tolerate power cuts so the building needs backup power. Clonshaugh draws 3,600 kW — enough for roughly 1,800 Irish homes — for a single 2,400 m² data hall.",
grammar:{facts:[
{term:"Data Centre",definition:"A purpose-built facility housing IT equipment with dedicated power, cooling, fire suppression, and security to ensure continuous operation.",plain:"A building designed to keep computers running 24/7/365, with everything they need to stay powered, cool, and safe.",number:"Ireland hosts ~82 operational data centres (2024), consuming ~22% of national electricity demand (CRU, 2024 data).",standard:"EN 50600-1:2019",feynman:{analogy:"A hospital for computers. Power is the blood supply, cooling is temperature regulation, and the BMS is the patient monitor.",firstPrinciples:"Computers convert electricity into computation and heat. 100% of input energy leaves as heat. The building must supply electricity reliably and remove heat continuously.",theTest:"If you can explain why a DC needs both a power system AND a cooling system of roughly equal capacity, you understand the fundamental physics."}},
{term:"IT Load",definition:"The electrical power consumed by computing, storage, and networking equipment, measured in kW or MW. The productive load — the reason the facility exists.",plain:"The power the computers actually use. Everything else in the building exists to support this.",number:"Clonshaugh IT load: 2,400 kW (400 racks × 6 kW/rack). At 20 kW/rack target: 8,000 kW.",standard:"EN 50600-2-2:2019",feynman:{analogy:"IT load is the engine in a car. Everything else — fuel system, radiator, exhaust — exists to keep the engine running.",firstPrinciples:"Every watt of IT becomes a watt of heat. 2,400 kW IT = 2,400 kW heat rejection required. Conservation of energy — no exceptions.",theTest:"Can you calculate total facility power from IT load and PUE? (Answer: IT Load × PUE.)"}},
{term:"Power Usage Effectiveness (PUE)",definition:"Ratio of total facility energy to IT equipment energy. PUE = Total / IT. A PUE of 1.0 means all energy goes to computing; higher values indicate overhead.",plain:"A number showing how much energy the building wastes. PUE 1.50 means for every 1 kW computing, 0.50 kW goes to cooling and power systems.",number:"Clonshaugh PUE: 1.50 current, 1.20 target. EU Taxonomy: ≤1.3. Global average (2024): 1.58.",standard:"EN 50600-4-2:2016; Delegated Act 2021/2139",feynman:{analogy:"PUE is fuel efficiency in reverse. Lower is better — less overhead per unit of useful work.",firstPrinciples:"PUE = Total / IT. If Total = 3,600 kW and IT = 2,400 kW, PUE = 1.50. The 0.50 overhead is cooling (~0.30–0.35) + distribution (~0.10–0.15) + other (~0.05).",theTest:"If PUE is 1.50 and IT load is 2,400 kW, total facility power? (3,600 kW.) Overhead? (1,200 kW.)"}},
{term:"Raised Floor",definition:"Elevated floor system (typically 600 mm) creating a pressurised plenum for cold air distribution and cable routing beneath server racks.",plain:"A false floor on stilts. Cold air is pumped underneath and rises through perforated tiles in front of racks. Cables run below too.",number:"Clonshaugh: 600 mm raised floor. Modern DCs often use 900–1,200 mm for better airflow. Some new builds use overhead cooling, eliminating raised floors entirely.",standard:"EN 50600-2-3:2019; ASHRAE TC 9.9",feynman:{analogy:"Like underfloor heating in reverse — cold air delivered underneath, rising where needed.",firstPrinciples:"Pressurised plenum = uniform air delivery. Higher floor = more air volume = lower velocity = less turbulence at tile level.",theTest:"Why does a deeper raised floor improve cooling efficiency? (More plenum volume = lower air velocity = more uniform delivery to tiles.)"}},
{term:"Fire Suppression",definition:"Gaseous or water-based system designed to extinguish fire without damaging electronic equipment. FM-200, Novec 1230, or IG-541 in data halls; sprinkler in non-IT areas.",plain:"A fire system that puts out fires without soaking the servers. Gas-based — fills the room and starves the fire of oxygen.",number:"Clonshaugh: FM-200 (GWP 3,220) in both halls. Industry trend: Novec 1230 (GWP 1) or IG-541 (GWP 0). F-Gas Regulation drives replacement.",standard:"EN 15004-1:2019; IS 3218:2013",feynman:{analogy:"Fire suppression is the airbag in a car — you hope never to use it, but it must work first time, every time.",firstPrinciples:"Fire requires heat, fuel, and oxygen. Gas suppression removes oxygen below the combustion threshold (~14%). Water suppression removes heat. Both must act before equipment damage occurs.",theTest:"Why can't you use water sprinklers in a data hall? (Answer: Water damages electronics. Gas suppression is non-conductive and leaves no residue.)"}}

{cause:"Data centres operate 24/7/365 with no scheduled downtime — energy consumption is continuous and cooling demand never stops",effect:"Annual energy consumption equals IT load multiplied by PUE multiplied by 8,760 hours — there is no off-peak period and no seasonal shutdown",insight:"Clonshaugh: 3,600 kW × 8,760 h = 31,536 MWh/yr. At €0.12/kWh (CRU Q4 2024): ~€3.78M/yr electricity."},

],constraintLesson:"The fundamental constraint: you cannot cool more heat than you can reject, and you cannot power more servers than your electrical supply can feed. Thermal capacity and electrical capacity define the maximum IT load.\n\nWhen you walk through a DC for the first time, the question is not \"how many servers?\" but \"how close to thermal and electrical limits?\"",
weakestLink:{whatsWrong:"\"A data centre is just a big room full of servers.\" Servers are ~40% of capex. The other 60% is power, cooling, fire, security, and building envelope.",whatsRight:"An integrated engineering system where power, cooling, fire safety, and monitoring must all function simultaneously for computation to occur.",howToGetThere:"Walk the full facility — switchroom, UPS room, chiller plant, generator compound, BMS room. A screening-level assessment maps all systems against current regulatory requirements. This is the starting point for any acquisition or retrofit decision."}},
rhetoric:{
declan:{hook:"Keep the lights on in a building that never sleeps — and nobody outside this room understands what that means.",text:"When someone asks what I do, I say I keep the lights on in a building that never sleeps. People think it's IT — it's not. It's mechanical and electrical engineering running 24/7. The servers are just the reason the building exists. My job is keeping 3,600 kW of power and cooling working 8,760 hours a year."},
ann:{hook:"3.8 million euros a year in electricity before I walked three metres — that is when I understood this asset class.",text:"The first time I walked through a data centre, the noise hit me. Then the electricity bill — €3.8M per year for a single 2,400 m² facility. A single data centre can consume more power than a small town. That's the asset — and the liability. If the PUE is wrong, you're burning €750K/yr that goes straight off your return."},
mark:{hook:"EN 50600 defines four functions. Before I assess anything, I need to know which of those functions actually work here.",text:"The building IS the product. EN 50600 defines four functions: physical security, power distribution, environmental control, fire protection. Each has its own engineering chain and failure modes. In an office, M&E is 30–35% of build cost. In a DC, it's 60–70%. You're buying an engineering system, not a building."},
sarah:{hook:"SFDR and EU Taxonomy both require specific disclosures for this building type — most asset owners have not started yet.",text:"Under SFDR and EU Taxonomy, this building type has specific reporting obligations — PUE, WUE, RE share, GHG intensity. If you're reporting on a DC you've never visited, your disclosures are based on hope, not measurement. A BER for a house is straightforward. DC sustainability reporting requires sub-metered data that most pre-2015 facilities simply cannot produce."},
tom:{hook:"8 to 12 thousand euros per square metre to build. If you do not know what you are paying for, you are the margin.",text:"Build cost for a new DC shell plus M&E fit-out: €8–12K/m² (Tier 2 — SCSI Q1 2025; Uptime Institute Annual Data Centre Survey 2024, indicative). M&E services are 60–70% of that total. The services ARE the building. Retrofit means pricing changes more complex per m² than a hospital — you cannot take systems offline while servers run, so phasing, temporary plant, and live coordination all add cost and programme time."}},
scenario:{title:"First Visit — What Am I Looking At?",narrative:"You're a fund manager visiting Clonshaugh for a potential acquisition. The FM mentions PUE 1.50 and IT load 2,400 kW. Your analyst asks: \"What's our annual electricity cost?\"",question:"Calculate annual electricity cost at current PUE and €0.12/kWh.",answer:"The analyst is asking the single most important financial question about any DC asset: what is the annual electricity cost? PUE converts IT load into total facility demand, and the answer determines operating margin.\n\nTotal = 2,400 × 1.50 = 3,600 kW. Annual = 3,600 × 8,760 = 31,536 MWh. Cost = 31,536 × €120/MWh = €3,784,320/yr.\n\n(Source: PUE 1.50 per facility BMS. Electricity: €0.12/kWh, CRU Q4 2024.)\n\nWhat this means in practice: €3.78M per year in electricity for a single 2,400 m² facility. Every 0.10 reduction in PUE saves roughly €250K/yr. That is the business case for retrofit in one number.",
whoShouldCare:["declan","ann","mark"]},
sourceNote:"EN 50600-1:2019 (T1); Uptime Institute Global Survey 2024 (T2); SEAI 2026 grid EF 0.2241 (T1); CRU Q4 2024 €0.12/kWh (T2); Budget 2025 €71/tCO₂ (T1).",

{id:"L2",level:2,name:"Meet Clonshaugh — The Reference Facility",icon:"📍",component:"Clonshaugh Reference DC",available:true,
userNeedStatement:"I need a concrete Irish example with real numbers that I can reference across every module.",
plainEnglish:"Clonshaugh is a fictional reference facility — representative of Irish data centres built 2010–2015 but not any specific real site. Built in 2013 — no CRU policy, no Taxonomy, no EED reporting. Designed for 6 kW/rack with chiller-only cooling and R410A. PUE 1.50 was acceptable then. Today it's above Taxonomy (≤1.3), the refrigerant faces F-Gas phase-down, and the single grid feed creates resilience risk. This is the patient. Every module that follows is the diagnosis.",
grammar:{facts:[
{term:"Maximum Import Capacity (MIC)",definition:"Maximum electrical power a premises can draw from the network, set by ESB Networks connection agreement. MIC determines the transformer and cable sizing upstream.",plain:"The biggest electricity supply the building is allowed to draw. Clonshaugh: 5 MVA from ESB Networks at medium voltage (10 kV).",number:"5 MVA at 0.95 PF = 4,750 kW. Current: 3,600 kW. Headroom: 1,150 kW (24%). At PUE 1.20: supports 3,958 kW IT — 65% increase.",standard:"ESB Networks Standard Terms; EN 50600-2-2:2019",feynman:{analogy:"MIC is like the water main diameter. You can install any number of taps, but the pipe limits total flow.",firstPrinciples:"Electrical supply is finite. Transformer, cable, and protection upstream have rated capacities. Exceeding MIC trips protection.",theTest:"At 20 kW/rack (8,000 kW IT) and PUE 1.20, total = 9,600 kW. Can 5 MVA support this? (No — shortfall ~4,850 kW.)"}},
{term:"Rack Density (kW/rack)",definition:"Average electrical power per server rack. Key indicator of facility age and computing intensity.",plain:"How much power each rack uses. Low (5–6 kW) = old equipment. High (20+ kW) = modern workloads.",number:"Clonshaugh: 6 kW/rack. Industry standard: 10. High density: 20. AI/GPU: 50–100+.",standard:"Uptime Institute Global Survey 2024; ASHRAE TC 9.9",feynman:{analogy:"Rack density is like occupancy in a room. 10 people = comfortable. 50 people = need industrial ventilation.",firstPrinciples:"Higher power/rack = more heat/rack = more cooling/rack. Linear relationship, but cooling cost doesn't scale linearly.",theTest:"Moving 6→20 kW/rack: by what factor does cooling requirement increase? (3.3×.)"}},
{term:"Chiller-Only Cooling",definition:"Cooling system where mechanical chillers provide 100% of cooling year-round, with no free cooling from ambient air.",plain:"Running compressors all year even when it's 5°C outside. Most energy-intensive way to cool a DC in Ireland.",number:"Chiller-only PUE contribution: ~0.25. With free cooling: ~0.08. Dublin has 7,200 hrs/yr <18°C — wasted potential.",standard:"EN 50600-2-3:2019; Met Éireann 30-year normals",feynman:{analogy:"Running a chiller in Dublin winter = running a tumble dryer when it's sunny and windy outside.",firstPrinciples:"Free cooling works when outdoor temp < return water temp − 3°C approach. Dublin mean 10.2°C. 82% of the year, outdoor air can reject DC heat without compressors.",theTest:"Why does chiller-only significantly affect PUE? (Cooling is largest PUE contributor. Without free cooling, compressors add ~0.25 instead of ~0.08.)"}},
{term:"Single MV Grid Feed",definition:"A single medium-voltage (10 kV) connection from ESB Networks to the facility, with no alternative supply path.",plain:"One cable from ESB Networks. If it fails, the entire facility transfers to generator power. No planned maintenance on incoming supply without generator reliance.",number:"Clonshaugh: single 10 kV feed, 5 MVA MIC. Dual MV feed from separate substations: 12–24 months, €800K–2M (Tier 3 — SCSI benchmarks; ESB Networks capital programme data, indicative). HV upgrade (for future growth beyond 5 MVA): 2–4 year TSO timeline.",standard:"ESB Networks Connection Policy; EN 50600-2-2:2019 Availability Class 3",feynman:{analogy:"A house with one road in. If that road floods, you're stuck until it clears — or you use the helicopter (generator).",firstPrinciples:"Reliability = 1 − P(failure). Single feed: one failure path. Dual feed: both must fail simultaneously. Probability drops multiplicatively.",theTest:"Why does Tier III require concurrent maintainability? (Every component must be serviceable without IT interruption — impossible with single feed.)"}},
{term:"Grid Connection",definition:"The physical and contractual interface between the data centre and the electricity distribution network. Defines Maximum Import Capacity (MIC), voltage level, and connection terms.",plain:"How the building connects to the national grid. Clonshaugh has a single medium-voltage (10 kV) feed from ESB Networks — no backup grid connection.",number:"Clonshaugh: 10 kV ESB Networks MV. Single feed. 5 MVA MIC. Second feed (2N) = €1.5–3M capital (Tier 3 — SCSI benchmarks; ESB Networks capital programme data, indicative), 12–18 month programme.",standard:"ESB Networks Standard Terms; ECP-11-0032",feynman:{analogy:"The grid connection is the water main — one pipe feeds the entire building. If it breaks, everything stops until generators start.",firstPrinciples:"Electricity must flow continuously. A single grid feed creates a single point of failure. Dual-feed (2N) eliminates this but doubles the connection cost.",theTest:"Clonshaugh has a single MV feed. What happens during a grid outage? (Answer: UPS bridges for 10–15 sec, then generators take over. Generator start failure = total facility shutdown.)"}}

{cause:"R410A refrigerant has GWP 2,088 under EU F-Gas Regulation 2024/573 — subject to progressive phase-down quota restrictions",effect:"Chiller fleet using R410A faces progressive EU F-Gas quota restrictions, rising refrigerant costs, and potential supply shortages for maintenance",insight:"F-Gas phase-down reduces quota progressively. Refrigerant cost rises. Plan chiller replacement within next capital cycle (5–7 years)."},

],constraintLesson:"Clonshaugh's constraints are layered and interacting. MIC limits total power. Chiller-only inflates PUE. R410A faces sunset. Single feed = resilience risk. Raised floor limits density. Open aisle wastes cooling. No single fix addresses all.\n\nA retrofit is a coordinated programme — it requires sequenced engineering design, not a shopping list of equipment.",
weakestLink:{whatsWrong:"\"Clonshaugh just needs new chillers.\" Chiller swap without free cooling locks in 15–20 years of unnecessary operating cost.",whatsRight:"The cooling system needs a strategy change — free cooling with chiller trim would drop cooling PUE from ~0.25 to ~0.08.",howToGetThere:"1. Commission a facility screening assessment. 2. Map regulatory gaps (CRU, EED, Taxonomy, F-Gas, EPA). 3. Produce a sequenced retrofit design with phased costings and projected savings."}},
rhetoric:{
declan:{hook:"Eight years running this facility, and works used to mean keeps servers cool. The gap is costing more than anyone budgeted.",text:"I've run Clonshaugh eight years. 'Works' used to mean 'keeps servers cool.' Now it means 'meets CRU AND Taxonomy AND has an F-Gas plan.' The goalposts moved, and they keep moving. Every year there's a new reporting requirement that this 2013 building was never designed to meet."},
ann:{hook:"Two assets — the location and the licence — and only one of them performs. PUE 1.50 explains the valuation shortfall.",text:"I see two assets — the location (Dublin, connected, zoned, 5 MVA MIC) and the liability (PUE 1.50, no free cooling, R410A, single feed). Retrofit or sell — either way, you need the numbers. A new greenfield connection is 5–7 years. That MIC is worth millions on its own."},
mark:{hook:"Four quantifiable engineering gaps. PUE 1.50 versus the 1.3 Taxonomy threshold alone blocks this asset from green finance.",text:"Four engineering gaps, all quantifiable: PUE 1.50 vs Taxonomy ≤1.3. Chiller-only vs 7,200 free cooling hours available. R410A (GWP 2,088) vs F-Gas phase-down. Single MV feed vs Tier III concurrent maintenance. Each gap has a defined solution, cost range, and timeline."},
sarah:{hook:"Taxonomy failure on PUE is not a footnote — it is a hard block on every institutional mandate that references the Delegated Act.",text:"Under SFDR and Taxonomy, this facility fails the PUE threshold. That's not a footnote — it's a material fact in any fund reporting. An asset failing Taxonomy alignment attracts a valuation discount that far exceeds the cost of retrofit."},
tom:{hook:"400 to 600 thousand euros retrofit, 300 to 500 thousand euros annual saving. That gap between numbers is the investment committee question.",text:"Free cooling retrofit: €400–600K indicative. Annual saving: potentially €300–500K/yr. Payback: 1–2 years. These are screening-level figures — a detailed retrofit design study produces the defensible numbers for investment committee."}},
scenario:{title:"The Density Question",narrative:"A tenant wants 50 racks at 20 kW/rack for AI inference. Clonshaugh runs at 6 kW/rack. Can the facility support it?",question:"Calculate additional IT power and check against MIC at PUE 1.50.",answer:"A high-density tenant request tests two constraints simultaneously: electrical capacity (MIC) and cooling capacity. Here is how the numbers stack up for Clonshaugh.\n\nNew block: 50 × 20 = 1,000 kW. Existing: 350 × 6 = 2,100 kW. Total IT: 3,100 kW. Total at PUE 1.50: 4,650 kW. MIC: 4,750 kW. Headroom: 100 kW (2.1%) — technically within MIC but no margin. Cooling also needs assessment.\n\nWhat this means in practice: the facility can technically accommodate the request on paper, but 2% headroom leaves no room for any future growth or PUE variation. Cooling infrastructure designed for 6 kW/rack cannot serve 20 kW/rack without in-row cooling — a separate capital decision.",
whoShouldCare:["declan","mark","ann"]},
sourceNote:"ESB Networks Connection Policy (T1); EN 50600-2-2/2-3:2019 (T1); F-Gas 2024/573 (T1); Met Éireann (T1); Uptime Institute 2024 (T2).",
clockQuote:"Clonshaugh was state-of-the-art in 2013. The clock didn't stop — the building did.",
retrofitRelevance:"Clonshaugh IS the retrofit case study. Every gap identified here becomes a defined work package in a retrofit programme.",
crossRefs:[{module:"DC-LEARN-001",level:"L1",topic:"Clonshaugh power chain"},{module:"DC-LEARN-002",level:"L1",topic:"Clonshaugh cooling chain"},{module:"DC-LEARN-007",level:"L1",topic:"Regulatory framework"}],
rhetoricTakeaways:{declan:"Key takeaway: Know your MIC headroom — 24% at Clonshaugh means limited growth without ESB upgrade.",ann:"Key takeaway: The grid connection is the ceiling on your investment thesis. No MIC headroom = no densification.",mark:"Key takeaway: Single MV feed = single point of failure. Quantify the second-feed business case early.",sarah:"Key takeaway: Grid emission factor × consumption = Scope 2 footprint. The connection type doesn't change the carbon math.",tom:"Key takeaway: Second ESB feed: €1.5–3M capex (Tier 3 — indicative), 12–18 month programme. Budget early or accept the risk."},
cascadeCheck:(kw,racks,pue)=>{const target=kw*racks;const mic=5000*0.95;return{needed:(target/1000).toFixed(1),available:(mic/1000).toFixed(1),unit:"MW IT",pass:target<=mic,detail:(target/1000).toFixed(1)+"MW IT vs "+(mic/1000).toFixed(1)+"MW MIC capacity"}}
},

{id:"L3",level:3,name:"The Power Chain — Grid to Rack",icon:"⚡",component:"Power Distribution",available:true,
userNeedStatement:"I need to understand how electricity gets from the grid to the rack — equipment, losses, and resilience at each stage.",
plainEnglish:"Electricity arrives from ESB Networks at 10 kV (medium voltage), steps down to 400 V via an on-site transformer. It passes through a UPS (10–15 minutes battery autonomy; generators start within seconds), then to PDUs on the data hall floor. Each step has losses. Each step is a failure point.",
grammar:{facts:[
{term:"MV/LV Transformer",definition:"Converts medium voltage (10 kV) from ESB Networks to low voltage (400 V) for building distribution. Typically oil-filled, 5 MVA, located in a fenced compound.",plain:"The transformer in the fenced compound. Takes 10,000 volts from the street and reduces it to 400 volts for the building.",number:"Clonshaugh: 10 kV/400 V, 5 MVA oil-filled. Efficiency ~99.5%. Loss at full load: ~25 kW. Larger DCs (20+ MW) connect at HV (38 kV+) via the transmission operator.",standard:"ESB Networks Distribution Code; IS 10101:2020; EN 50600-2-2:2019",feynman:{analogy:"Voltage is like water pressure. The distribution network runs at higher pressure for efficiency. The building needs lower pressure. The transformer is the pressure reducer.",firstPrinciples:"Power = V × I. Higher voltage = lower current = thinner cables + lower I²R losses. ESB Networks distributes at 10 kV; the building uses 400 V. Transformer trades V for I at >99% efficiency.",theTest:"Why does ESB Networks distribute at 10 kV not 400 V? (Lower current = lower losses across the local network. 5 MVA at 10 kV = 289 A. At 400 V = 7,217 A — impractical cable sizes.)"}},
{term:"Uninterruptible Power Supply (UPS)",definition:"Power conditioning and backup system providing clean, continuous power. Battery power for 5–15 min during mains failure.",plain:"The battery backup that keeps servers running during the 10–15 seconds until generators start.",number:"Typical efficiency: 94–97% (double conversion). Loss on 2,400 kW at 96%: ~100 kW. Battery autonomy: 10–15 min.",standard:"EN 62040-3:2011; EN 50600-2-2:2019",feynman:{analogy:"The UPS is the cyclist's legs on a tandem. When the engine (grid) stops, the cyclist takes over instantly.",firstPrinciples:"Double conversion: AC→DC (battery charge) → DC→AC (server feed). Cleans power but costs 3–6% in losses.",theTest:"UPS at 96% on 2,400 kW: how much waste heat? (2,400 × 0.04 = 96 kW — which also needs cooling.)"}},
{term:"Power Distribution Unit (PDU)",definition:"Final distribution point — floor-standing or overhead unit distributing circuits to server racks.",plain:"The electrical panel on the data hall floor feeding power to each row of racks.",number:"Typical: serves 20–40 racks. Clonshaugh: ~10–20 PDUs for 400 racks.",standard:"EN 50600-2-2:2019; IEC 61439",feynman:{analogy:"If transformer is water main and UPS is filter, PDU is the manifold sending pipes to each row of taps.",firstPrinciples:"Power distribution splits large supply into protected, metered circuits. PDU is where capacity management happens.",theTest:"Why is PDU monitoring important? (Reveals which circuits approach capacity, enabling load balancing.)"}},
{term:"Automatic Transfer Switch (ATS)",definition:"Electrical device that automatically transfers load from mains to generator supply upon detecting mains failure.",plain:"The switch that detects a power cut and flips the building to generator power — typically within 10–15 seconds.",number:"Transfer time: 8–15 seconds typical. UPS bridges the gap. Clonshaugh: mechanical ATS. Modern: static transfer switches (<10 ms).",standard:"EN 50600-2-2:2019; IEC 62310-1",feynman:{analogy:"Like a railway points switch — detects the approaching train (power loss) and diverts to the alternative track (generator) automatically.",firstPrinciples:"Power continuity requires seamless transfer. UPS provides instantaneous backup; ATS selects the stable source. Speed of ATS determines UPS battery drain.",theTest:"If ATS transfers in 12 seconds and UPS has 10 min autonomy, how much battery is consumed? (~2%. But if ATS fails to transfer, full battery is consumed.)"}},
{term:"Containment",definition:"Physical separation of hot and cold airstreams in a data hall using curtains, panels, or enclosed cabinets to prevent mixing and improve cooling efficiency.",plain:"Barriers that stop hot exhaust air from mixing with cold supply air. Without them, up to 35% of cooled air never reaches a server.",number:"Clonshaugh: No containment (2012 build). Retrofit cost: €50–150K (Tier 3 — SCSI benchmarks; RICS NRM1, indicative). PUE improvement: 0.05–0.15. Payback: 6–18 months.",standard:"ASHRAE TC 9.9; EN 50600-2-3:2019",feynman:{analogy:"Containment is like closing the windows when the air conditioning is on — obvious in hindsight, but many DCs still don't do it.",firstPrinciples:"Mixing hot and cold air raises supply temperature, forcing cooling equipment to work harder. Separation maintains the design delta-T and reduces compressor load.",theTest:"If containment reduces PUE by 0.10 at Clonshaugh (3,600 kW total), what is the annual energy saving? (Answer: 240 kW × 8,760 h = 2,102 MWh/yr × €0.12 = ~€252K.)"}}

],whatItLooksLike:"HV compound: fenced, oil-filled transformer. Switchroom: grey cabinets, mimic diagrams. UPS room: battery cabinets + power electronics, humming. Data hall: floor-standing PDU cabinets or overhead busbar.",
siteChecklist:["MV: transformer nameplate (MVA, voltage ratio, year)","Switchroom: single-line diagram — photograph it. Check incoming voltage level.","UPS: module count, autonomy display, battery age and type","Data hall: PDU config, per-circuit kW readings?","General: second (redundant) power path?"]},
logic:{causeAndEffect:[
{cause:"Each power chain stage introduces losses — transformer approximately 0.5%, UPS approximately 4%, and cabling 1–2% — compounding through the chain",effect:"Cumulative electrical distribution losses add 5–7% to the IT load figure — a hidden contributor to PUE that is often overlooked in efficiency analysis",insight:"For 2,400 kW IT: transformer ~12 kW + UPS ~96 kW + cabling ~36 kW = ~144 kW distribution loss. Must be paid for AND cooled."},
{cause:"Clonshaugh has a single medium-voltage grid feed at 10 kV from ESB Networks with no alternative or redundant supply path",effect:"Any fault on the incoming supply causes total facility loss until generators start",insight:"Tier III requires dual paths. Single feed means no planned maintenance on incoming supply without full generator transfer. Dual MV feed adds resilience without the cost of a full HV upgrade."},
{cause:"UPS operating at 96% efficiency on 2,400 kW IT load generates approximately 96 kW of continuous waste heat that must be cooled",effect:"UPS waste heat must be cooled by the HVAC system — a hidden additional cooling load that further inflates PUE beyond the direct UPS losses",insight:"96 kW = 840 MWh/yr waste heat. At 97% UPS: 72 kW. At 98%+: 48 kW. UPS upgrade saves both electricity AND cooling energy — double benefit."}
],constraintLesson:"Series reliability: if any element fails — transformer, switchgear, UPS, PDU — servers downstream go dark. Redundancy (N+1, 2N) adds parallel paths. But redundancy is expensive — the commercial question is what level the workload justifies.",
weakestLink:{whatsWrong:"\"The power chain is fine — we've never had an outage.\" Past performance is not a reliability guarantee.",whatsRight:"Resilience means sustaining a component failure without IT interruption. Requires dual paths or automatic transfer with sufficient UPS autonomy.",howToGetThere:"Commission a single-point-of-failure assessment of the power chain. Dual MV feed: 12–24 months via ESB Networks. HV upgrade for growth: 2–4 years via the TSO."}},
rhetoric:{declan:{hook:"Power fails: the UPS gives me ten minutes. At 96 percent efficiency I am burning 96 kW just to protect the other 2,400.",text:"Power chain is my #1 worry. Cooling fails: 10 min. Power fails: 10 min of UPS battery. Generators better start. I test them weekly."},ann:{hook:"Single grid feed is uninsured risk. The question is not what redundancy costs — it is what a single fault costs.",text:"Single grid feed is uninsured risk. What's the cost of a second feed vs a full facility outage?"},mark:{hook:"96 kW loss on 2,400 kW IT at 96 percent UPS efficiency. Upgrading to 98 percent recovers 48 kW continuously — year-round.",text:"At 96% UPS efficiency on 2,400 kW, you lose 96 kW. Modern 98%+ UPS saves 48 kW continuously — 420 MWh/yr, ~€50K/yr."},sarah:{hook:"Distribution losses inflate Scope 2 directly. Under EED Article 12, the power distribution efficiency ratio must now be reported annually.",text:"Distribution losses feed into Scope 2 reporting. Under EED Article 12, power distribution efficiency is reportable."},tom:{hook:"Second grid feed at 2 to 5 million euros. Calculate the full-outage cost before deciding that number is too expensive.",text:"Second grid feed: €2–5M (Tier 3 — SCSI benchmarks; ESB Networks capital programme, indicative), 2–4 years. UPS upgrade: €300–500K (Tier 3 — Schneider/ABB/Eaton published, indicative). UPS has a payback; grid feed is insurance."}},
scenario:{title:"The UPS Efficiency Upgrade",narrative:"Existing UPS at 94%. Proposal: replace with 97% efficient unit at €400K (Tier 3 — Schneider/ABB/Eaton published ranges, indicative).",question:"Annual energy saving and simple payback?",answer:"UPS efficiency is one of those quiet wins — a few percentage points translate to large annual savings because the UPS handles the entire IT load 8,760 hours per year. Here is the arithmetic.\n\nCurrent loss: 2,400 × 0.06 = 144 kW. New loss: 2,400 × 0.03 = 72 kW. Saving: 72 kW × 8,760 h = 631 MWh. Cost saving: 631 × €120 = €75,720/yr. Payback: €400K / €75.7K = 5.3 years.\n\n(Also reduces cooling load by 72 kW.)\n\nWhat this means in practice: 5.3 years is a longer payback than cooling interventions, but UPS replacement also improves power quality and battery autonomy. If the existing UPS is approaching end-of-life (10–15 years), the efficiency upgrade is effectively free — you are replacing it anyway.",
whoShouldCare:["mark","tom","sarah"]},
sourceNote:"ESB Networks Distribution Code (T1); EN 62040-3:2011 (T1); EN 50600-2-2:2019 (T1); IEC 61439 (T1); CRU Q4 2024 €0.12/kWh (T2).",
clockQuote:"Every kilowatt lost in the power chain is paid for twice — once as electricity, once as cooling.",
retrofitRelevance:"UPS efficiency upgrades are among the highest-return interventions. 3% gain on 2,400 kW saves ~€76K/yr.",
crossRefs:[{module:"DC-LEARN-001",level:"L1",topic:"Full power distribution"},{module:"DC-LEARN-005",level:"L1",topic:"Backup power"}],
rhetoricTakeaways:{declan:"Key takeaway: The power chain has nine levels of failure between grid and server. Know each one.",ann:"Key takeaway: PUE 1.50 means 50% overhead. Reducing to 1.20 saves ~€750K/yr on Clonshaugh's load.",mark:"Key takeaway: Containment first, free cooling second, VSD third. Engineering sequence matters.",sarah:"Key takeaway: Every 0.10 PUE reduction saves ~250 tCO₂/yr at Clonshaugh. Quantify the carbon case alongside the cost case.",tom:"Key takeaway: Containment: €50–150K (Tier 3 — SCSI benchmarks; RICS NRM1, indicative), 6–18 month payback. Fastest return of any DC retrofit measure."},
cascadeCheck:(kw,racks,pue)=>{const demand=kw*racks*pue/1000;const cap=5*0.95;return{needed:demand.toFixed(1),available:cap.toFixed(1),unit:"MW",pass:demand<=cap,detail:demand.toFixed(1)+"MW demand vs "+cap.toFixed(1)+"MW transformer capacity"}}
},

{id:"L4",level:4,name:"The Cooling Chain — Server to Sky",icon:"❄️",component:"Cooling Distribution",available:true,
userNeedStatement:"I need to understand how heat travels from server chip to atmosphere — equipment, energy at each stage, and why free cooling is the biggest opportunity.",
plainEnglish:"Every watt becomes a watt of heat. Clonshaugh generates 2,400 kW of heat continuously. Heat travels: chip → rack → room air → CRAH → chilled water → chiller → condenser → atmosphere. Dublin offers 7,200 hours/yr of free cooling. Clonshaugh captures zero.",
grammar:{facts:[
{term:"Computer Room Air Handler (CRAH)",definition:"Cooling unit circulating air through the data hall — draws hot exhaust, delivers cooled air via chilled water coils.",plain:"The big cooling units around the data hall edge. Blow cold air under raised floor, pull hot air from above.",number:"Typical: 50–150 kW sensible. Clonshaugh: ~20–30 perimeter CRAHs. Fan power: 5–10% of cooling capacity.",standard:"EN 50600-2-3:2019; ASHRAE TC 9.9",feynman:{analogy:"A CRAH is a car radiator in reverse — cold water flows through coils, air blows over them.",firstPrinciples:"Q = m × Cp × ΔT. CRAH moves air mass across a temperature difference. Chilled water absorbs heat.",theTest:"Why does perimeter CRAH struggle with high density? (Air path too long — hot/cold mix. In-row is closer.)"}},
{term:"Free Cooling",definition:"Using ambient outdoor air (via heat exchanger) to reject heat without chiller compressors.",plain:"Using Dublin's cold air instead of energy-hungry compressors. Ireland's natural competitive advantage.",number:"Dublin <18°C: 7,200 hrs/yr (82%). Cooling PUE: ~0.08 vs ~0.25 chiller-only.",standard:"Met Éireann; EN 50600-2-3:2019",feynman:{analogy:"Opening the window instead of running AC — but using a heat exchanger to keep out dust.",firstPrinciples:"Heat flows hot→cold (2nd law). When outdoor < return water, heat exchanger rejects heat. Energy drops from ~250W/kW (chiller) to ~40W/kW (fans/pumps).",theTest:"At CHW return 22°C and 3°C approach, free cooling below what outdoor temp? (19°C. Dublin <19°C ~87% of year.)"}},
{term:"Condenser / Dry Cooler",definition:"Roof or ground-level heat rejection transferring heat to outdoor air.",plain:"The rows of fans on the roof — where the DC's heat finally leaves the building.",number:"Fan power: 15–30 kW per 500 kW rejection. At 2,400 kW IT: 70–140 kW in condenser fans.",standard:"EN 50600-2-3:2019",feynman:{analogy:"The DC's exhaust pipe. All input electrical energy must eventually exit as heat through here.",firstPrinciples:"Conservation of energy: all input becomes heat. If condenser capacity < total heat, temperatures rise until shutdown.",theTest:"DC draws 3,600 kW total. How much heat must condensers reject? (~3,600 kW — all input becomes heat.)"}},
{term:"Adiabatic Cooling",definition:"Enhancement to dry coolers where water mist pre-cools incoming air, extending free cooling hours beyond the dry bulb limit.",plain:"Spraying a fine mist on dry cooler coils — like sweating. Extends the hours free cooling can operate into warmer months.",number:"Extends free cooling by ~500–1,000 hours/yr in Dublin climate. Water use: 3–8 m³/day. Zero water in pure dry cooling mode.",standard:"EN 50600-2-3:2019; Eurovent guidelines",feynman:{analogy:"Athletes pour water over themselves in a marathon — evaporation removes extra heat beyond what sweating alone can manage.",firstPrinciples:"Evaporative cooling exploits latent heat of vaporisation (2,260 kJ/kg). Wet bulb temp < dry bulb, so adiabatic rejects heat at lower ambient than dry alone.",theTest:"Why is adiabatic sometimes preferred over pure dry cooling in Dublin? (Extends free cooling hours by ~15% while maintaining near-zero water use most of the year.)"}},
{term:"BMS Points",definition:"Individual measurement or control connections in a Building Management System — each sensor, actuator, or alarm is one point. Point count indicates monitoring granularity.",plain:"Each sensor or control in the building's brain. More points = more visibility. Clonshaugh's legacy BMS has ~500 points; a modern DCIM would have 5,000+.",number:"Clonshaugh: ~500 BMS points. Industry benchmark: 10–15 points per rack. Clonshaugh target: 4,000–6,000 points. Gap: 10× current.",standard:"EN ISO 16484-5:2017; EED Article 12",feynman:{analogy:"BMS points are like nerve endings — more points mean better awareness of what's happening across the facility.",firstPrinciples:"You cannot control what you cannot measure. Each point provides one data stream. Insufficient points create blind spots where failures go undetected.",theTest:"Why is ~500 points insufficient for a 400-rack facility? (Answer: ~1.25 points/rack — cannot measure per-rack power or temperature. EED Article 12 requires granular PUE/WUE reporting that needs per-circuit metering.)"}}

],whatItLooksLike:"Hot air (35–45°C) rises from racks. No containment at Clonshaugh. Perimeter CRAHs. Chilled water to chiller plant. Roof condensers: 80–90 dB(A).",
siteChecklist:["Containment type","CRAH: perimeter or in-row, refrigerant","Chiller plant: count, kW, refrigerant","Roof: condenser count","CHW flow/return temps","Free cooling capability?"]},
logic:{causeAndEffect:[
{cause:"No aisle containment installed and no free cooling capability — hot and cold air mix freely and chillers run year-round",effect:"Without containment, hot exhaust and cold supply air mix freely and compressor-based cooling runs year-round, inflating PUE by approximately 0.17",insight:"These two gaps account for most of the difference between PUE 1.50 and best-practice ~1.20."},
{cause:"R410A refrigerant (GWP 2,088) subject to EU F-Gas Regulation 2024/573 phase-down — supply becoming restricted and expensive",effect:"The R410A chiller fleet faces increasing refrigerant costs and availability constraints under EU F-Gas phase-down quotas through to 2030",insight:"Plan chiller replacement with low-GWP alternatives (R513A, R1234ze, R290) within 5–7 years before supply restrictions bite."},
{cause:"No aisle containment installed — hot server exhaust at 35–45°C mixes freely with cold supply air at 18°C, destroying cooling effectiveness",effect:"CRAHs receive pre-mixed warmer air, reducing cooling effectiveness and forcing higher fan speeds",insight:"Mixing destroys the temperature differential that drives heat transfer. Containment restores ΔT at the coil, allowing fans to run slower — cube law: 70% speed = 34% power."}
],constraintLesson:"Cooling is the largest PUE contributor and biggest retrofit opportunity. But operationally sensitive — can't take cooling offline while servers run. Must be phased: containment first, then free cooling, then chiller replacement.",
weakestLink:{whatsWrong:"\"Our cooling has plenty of capacity.\" Capacity ≠ efficiency. PUE ~0.25 vs 0.08 = hundreds of thousands wasted annually.",whatsRight:"Free cooling + containment can deliver same cooling with 60–70% less energy.",howToGetThere:"Phase 1: Containment (€50–100K, Tier 3 — SCSI benchmarks; RICS NRM1, indicative). Phase 2: Free cooling (€400–600K, Tier 3 — Vertiv/Schneider published, indicative). Phase 3: Chiller replacement (TBD). All figures screening-level — detailed design study required for investment-grade numbers."}},
rhetoric:{declan:{hook:"Chiller trip at 3am: ten minutes to alarm, ten more to respond. Dublin runs below 18 degrees for 7,200 hours a year.",text:"Cooling keeps me up at night. Literally. Chiller trips at 3am: 10–15 min to alarm threshold. Servers don't negotiate."},ann:{hook:"750 thousand to 1 million euros in cooling energy at PUE 1.50. Free cooling cuts that by 400 to 600 thousand. That is a dividend.",text:"Cooling energy: ~€750K–1M/yr at PUE 1.50. At PUE 1.20 with free cooling: €300–400K/yr. The delta recurs every year. (Derived: Clonshaugh cooling load × €0.12/kWh CRU Q4 2024, T2.)"},mark:{hook:"7,200 hours below 18 degrees Celsius per year. Free cooling with chiller trim reduces cooling PUE to 0.06. The physics does the heavy lifting.",text:"7,200 hours <18°C. Free cooling with chiller trim: cooling PUE 0.06–0.08. 70% reduction from current 0.25."},sarah:{hook:"Dry cooler free cooling uses zero process water — WUE reaches 0.0 litres per kWh and removes the planning objection before it forms.",text:"WUE is the next frontier after PUE. Dry cooler free cooling uses zero water — important as water stress reporting enters Taxonomy."},tom:{hook:"Containment at 50 to 100 thousand euros, payback under 12 months. Free cooling at 400 to 600 thousand, payback under 18. Show me better returns.",text:"Containment: €50–100K (Tier 3 — SCSI benchmarks, indicative), payback <12 months. Free cooling: €400–600K (Tier 3 — Vertiv/Schneider published, indicative), payback 2–3 years. Best returns in the entire programme."}},
scenario:{title:"The Free Cooling Business Case",narrative:"FM proposes dry coolers operating below 19°C. Current chiller: 600 kW. Free cooling: 100 kW (fans/pumps). System cost: €500K (Tier 3 — Vertiv/Schneider/Trane published, indicative).",question:"Annual cooling energy saving with 7,600 hours below 19°C (dry bulb, 3°C approach on 22°C CHW return), and simple payback?",answer:"Free cooling replaces compressor work with fan and pump work — a 6:1 energy ratio. The question is how many hours per year Dublin's climate supports it, and whether the capex justifies the saving.\n\nFree cooling hours: 7,600. Chiller-only: 1,160.\nCurrent: 600 × 8,760 = 5,256 MWh.\nNew: (100 × 7,600) + (600 × 1,160) = 1,456 MWh.\nSaving: 3,800 MWh × €120 = €456K/yr. Payback: €500K / €456K = 1.1 years.\n\nWhat this means in practice: the system pays for itself in just over a year, and the €456K saving recurs annually for the 20+ year asset life. This is consistently the highest-returning cooling intervention in Irish data centres.",
whoShouldCare:["mark","tom","ann"]},
sourceNote:"EN 50600-2-3:2019 (T1); ASHRAE TC 9.9 (T1); Met Éireann (T1); F-Gas 2024/573 (T1); CRU Q4 2024 (T2).",
clockQuote:"Every hour Dublin's air is cold enough for free cooling and your compressors are running, you're burning money and carbon for nothing.",
retrofitRelevance:"Cooling is single largest retrofit opportunity. Containment + free cooling: 60–70% reduction.",
crossRefs:[{module:"DC-LEARN-002",level:"L1",topic:"Full cooling chain"},{module:"DC-LEARN-004",level:"L4",topic:"Free cooling economics"}],
rhetoricTakeaways:{declan:"Key takeaway: Cooling is half your energy bill. Understanding how heat moves from chip to atmosphere reveals every saving opportunity.",ann:"Key takeaway: Free cooling uses Dublin's climate as a free asset — 7,200 hours/yr of cold air that compressors currently duplicate.",mark:"Key takeaway: CRAH sizing, containment, and free cooling are interdependent. Size them as a system, not individually.",sarah:"Key takeaway: Chiller refrigerant choice (R410A vs low-GWP) directly affects F-Gas compliance timeline and Scope 1 reporting.",tom:"Key takeaway: Cooling retrofit costs €200–500K for free cooling (Tier 3 — SCSI benchmarks; Vertiv published, indicative). Payback: 2–3 years. The numbers are unambiguous."},
cascadeCheck:(kw,racks,pue)=>{const it=kw*racks;const cool=it*0.3;const cap=3000;return{needed:(cool/1000).toFixed(1),available:(cap/1000).toFixed(1),unit:"MW cooling",pass:cool<=cap,detail:(cool/1000).toFixed(1)+"MW cooling load vs "+(cap/1000).toFixed(1)+"MW installed"}}
},
{id:"L5",level:5,name:"Support Systems — Fire, Security, BMS",icon:"🔒",component:"Safety & Monitoring",available:true,
userNeedStatement:"I need to understand fire suppression, physical security, and BMS — why they matter for compliance and insurance.",
plainEnglish:"Power and cooling get the attention, but three other systems keep the DC safe. Fire suppression (FM-200), security (mantrap, CCTV), BMS monitoring. At Clonshaugh: FM-200, badge-and-CCTV, legacy BMS with ~500 points.",
grammar:{facts:[
{term:"Clean Agent Fire Suppression",definition:"Gaseous system extinguishing fire without residue. FM-200, Novec 1230, IG-541. Note: 3M exited PFAS manufacturing end-2025, affecting Novec 1230 supply chain — IG-541 (inert gas) gaining market share.",plain:"Gas floods the room and puts out fire without getting anything wet. Novec 1230 supply constrained since 3M's PFAS exit — inert gas (IG-541) now the leading alternative.",number:"FM-200 GWP: 3,220. Novec 1230 GWP: 1 (supply-constrained). IG-541 GWP: 0. Hold time: 10 min minimum.",standard:"IS 3218:2013+A1:2019; EN 15004",feynman:{analogy:"Like suffocating a candle with a snuffer — removes oxygen or absorbs heat faster than combustion produces it.",firstPrinciples:"Fire needs fuel, heat, oxygen. Clean agents reduce oxygen (inert) or absorb heat (chemical).",theTest:"Why is IG-541 gaining market share over Novec 1230? (3M exited PFAS manufacturing end-2025. IG-541 has zero GWP and no supply-chain risk.)"}},
{term:"Building Management System (BMS)",definition:"Integrated monitoring and control platform for all M&E systems.",plain:"Central nervous system of the building. Clonshaugh: ~500 points, limited trending.",number:"Modern for 400 racks: 2,000–5,000 points indicative (CIBSE Guide H; Tier 3). Clonshaugh: ~500.",standard:"EN 50600-2-3:2019; CIBSE Guide H",feynman:{analogy:"The building's dashboard. Clonshaugh's BMS is a dashboard with half the gauges missing.",firstPrinciples:"You cannot manage what you cannot measure. BMS converts physical conditions to data for alarms, trends, and reports.",theTest:"Why is BMS modernisation often highest priority? (Without measurement, can't verify PUE or confirm retrofit savings.)"}},
{term:"Physical Security",definition:"Layered access control: perimeter fencing, CCTV, mantrap, biometric/smart card.",plain:"Fences, cameras, locked doors, ID cards. DCs hold others' data — unauthorised access is a liability event.",number:"Typical: 5 zones (perimeter, lobby, corridor, data hall, cage). CCTV retention: ~90 days.",standard:"EN 50600-2-5:2016; ISO 27001 Annex A",feynman:{analogy:"Like a bank vault — multiple layers, each harder to breach. Breach probability drops multiplicatively.",firstPrinciples:"Defence in depth: no single measure relied upon. Each layer adds independent control.",theTest:"Why separate zones rather than single perimeter? (Single layer failure doesn't compromise all assets.)"}},
{term:"VESDA (Very Early Smoke Detection Apparatus)",definition:"Aspirating smoke detection system that continuously samples air through a network of pipes, detecting smoke at pre-combustion stage.",plain:"Pipes with tiny holes running across the ceiling, constantly sniffing the air for the earliest traces of smoke — before you can see or smell anything.",number:"Detection sensitivity: 0.005–20% obscuration/m. Response time: 30–90 seconds. Typical DC: one VESDA unit per 200–400 m².",standard:"IS 3218:2013+A1:2019; EN 54-20:2006",feynman:{analogy:"Like a smoke-sniffing dog patrolling the room 24/7 — catches the scent long before a standard detector would trigger.",firstPrinciples:"Standard detectors wait for smoke to reach ceiling. VESDA actively pulls air samples from the room — 100× more sensitive, catches overheating cables and components at thermal decomposition stage.",theTest:"Why is VESDA preferred over standard detectors in DCs? (Active sampling detects pre-combustion gases before visible smoke. Airflow in DCs disperses smoke, making passive ceiling detectors unreliable.)"}},
{term:"Site Perimeter",definition:"The physical boundary of the data centre property, including fencing, gates, CCTV coverage zones, and access control points. First ring of a defence-in-depth security model.",plain:"The fence and gates around the building. In a data centre, the perimeter is the first of typically 5–6 security layers between the public road and the server rack.",number:"Clonshaugh: Single gated entrance, CCTV at perimeter, 2.4 m palisade fencing. No mantrap. No anti-vehicle barriers. EN 50600-2-5:2019 requires defence-in-depth.",standard:"EN 50600-2-5:2019; BS 7958:2009",feynman:{analogy:"Site perimeter is like a castle's outer wall — it doesn't stop a determined intruder, but it controls access and creates a detection zone.",firstPrinciples:"Security is layered. The perimeter deters, detects, and delays. Each layer buys response time. A compromised perimeter means all inner layers face the threat simultaneously.",theTest:"Why is a single gate with CCTV insufficient for a modern DC? (Answer: No anti-tailgating, no vehicle barriers, no perimeter intrusion detection. A single gate means one entry point must handle delivery, staff, and visitors simultaneously.)"}}

],whatItLooksLike:"Fire: red cylinders, VESDA detectors. Security: mantrap, CCTV at junctions. BMS: control room screens or aging controller.",
siteChecklist:["Fire: agent type, cylinder count, last test date","Fire: VESDA locations","Security: mantrap, biometric type, access log","BMS: manufacturer, age, point count","BMS: trend logging — how far back?"]},
logic:{causeAndEffect:[
{cause:"Building management system has approximately 500 I/O points with limited trending capability — insufficient for EED reporting",effect:"PUE cannot be accurately measured with the current BMS capability — all cooling optimisation is based on estimates rather than measured data",insight:"EN 50600-4-2 defines PUE measurement categories L1/L2/L3. Clonshaugh supports L1 at best — insufficient for EED reporting."},
{cause:"FM-200 fire suppression agent has GWP 3,220 — the highest-GWP F-gas commonly used in data centre infrastructure",effect:"FM-200 system refill after a discharge event faces F-Gas quota constraints — supply may not be available when needed, leaving the zone unprotected",insight:"FM-200 faces the same F-Gas supply squeeze as R410A for chillers — both are high-GWP gases under progressive EU phase-down quotas."},
{cause:"Legacy BMS with approximately 500 points cannot sub-meter individual cooling, lighting, and power systems for EED Article 12 reporting",effect:"PUE can only be measured at Level 1 (utility bill ÷ estimated IT) — insufficient for EED reporting",insight:"EED Article 12 requires metrics that demand Level 2/3 metering. Without 2,000+ point DCIM, Clonshaugh cannot produce compliant reports."}
],constraintLesson:"Support systems are infrastructure you forget until they fail. BMS failure = blind to rising temps. Fire failure = electrical fault becomes data hall fire. Security breach = tenant data liability.",
weakestLink:{whatsWrong:"\"Systems work — never had a fire or breach.\" Survivorship bias. Untested fire + unmonitored BMS + single-factor security = risks compounding silently.",whatsRight:"Adequacy measured by capability, testing records, and compliance — not absence of incidents.",howToGetThere:"Fire inspection per IS 3218. BMS audit (point count, trending). Security audit per EN 50600-2-5."}},
rhetoric:{declan:{hook:"Three things I never skip: generator test, fire inspection, BMS calibration. Guess which one the previous team had not touched in years.",text:"Three things I never skip: generator test weekly, fire inspection quarterly, BMS alarm check every shift."},ann:{hook:"Insurance underwriters care more about fire detection and access control than PUE. Inadequate protection means the premium question arrives before the principle one.",text:"Insurance underwriters care about fire and security more than PUE. Inadequate protection = higher premiums or no cover."},mark:{hook:"BMS at 150 to 300 thousand euros. Without it I have no baselines, no automated fault detection, and no EED compliance evidence trail.",text:"BMS upgrade: €150–300K (Tier 3 — Schneider/Vertiv/Siemens published, indicative). Modern DCIM 3,000+ points, real-time PUE. Payback within 12 months through cooling optimisation."},sarah:{hook:"EED Article 12 requires L2 and L3 metering data. The BMS upgrade is not optional — it is the reporting infrastructure this facility needs.",text:"EED Article 12 requires reporting that needs L2/L3 metering. BMS upgrade is a compliance prerequisite."},tom:{hook:"BMS 150 to 300 thousand euros. Novec 1230 200 to 400 thousand euros. Neither is glamorous — both are what prevent a 50 million euro write-off.",text:"BMS: €150–300K (Tier 3 — Schneider/Vertiv published). Novec 1230: €200–400K (Tier 3 — Kidde/Siemens published). Security: €100–200K (Tier 3 — Axis/Genetec/Gallagher published). Total support modernisation: €450K–900K indicative."}},
scenario:{title:"The BMS Blind Spot",narrative:"Three CRAHs running at 100% fan speed for 6 weeks. BMS only monitors on/off, not fan speed.",question:"Energy cost of 100% vs optimal 60% speed for 6 weeks, using cube law (10 kW rated fans)?",answer:"This scenario illustrates why BMS modernisation is not optional — a legacy system that only monitors on/off cannot detect inefficiency. Fan speed is the key variable, and the cube law makes small speed reductions very powerful.\n\nAt 60%: (0.60)³ = 0.216.\nWaste per CRAH: 10 × 0.784 = 7.84 kW. Three: 23.5 kW.\nDuration: 1,008 h. Wasted: 23.7 MWh. Cost: €2,844.\nModern BMS would alert in hours.\n\nWhat this means in practice: €2,844 over six weeks from just three fans. Scale that across 20–30 CRAHs running suboptimally for months or years, and the hidden cost of a blind BMS becomes tens of thousands annually — more than enough to justify the upgrade.",
whoShouldCare:["declan","mark"]},
sourceNote:"IS 3218:2013+A1:2019 (T1); EN 50600-2-3/2-5 (T1); CIBSE Guide H (T2); F-Gas 2024/573 (T1); ISO 27001 (T1).",
clockQuote:"The systems you forget to check are the ones that fail when it matters most.",
retrofitRelevance:"BMS is the foundation — without measurement, can't verify savings.",
crossRefs:[{module:"DC-LEARN-008",level:"L1",topic:"Fire safety"},{module:"DC-LEARN-009",level:"L1",topic:"BMS and DCIM"}],
rhetoricTakeaways:{declan:"Key takeaway: Security is layered. Perimeter → building → corridor → hall → rack. Each layer buys response time.",ann:"Key takeaway: Insurer and investor due diligence starts at the perimeter. Physical security gaps reduce asset valuation.",mark:"Key takeaway: EN 50600-2-5 defines four protection classes. Know which class Clonshaugh achieves and what gaps exist.",sarah:"Key takeaway: Access control data supports social compliance reporting. Who accessed what, when, and why — all auditable.",tom:"Key takeaway: Physical security upgrade: €100–300K (Tier 3 — Axis/Genetec/Gallagher published, indicative). Insurance premium reduction often offsets 30–50% of cost."},

{id:"L6",level:6,name:"The Regulatory Squeeze",icon:"📜",component:"2013–2026 Reg. Shift",available:true,
userNeedStatement:"I need a high-level map of regulations now applying to DCs built before these rules existed.",
plainEnglish:"When Clonshaugh was built in 2013, none of these applied: CRU DC policy (2021+), EED recast (2023), Taxonomy PUE ≤1.3 (2021), F-Gas phase-down (2024 recast), EPA enhanced IE licence. Five frameworks converging on buildings designed before any existed.",
grammar:{facts:[
{term:"CRU Data Centre Policy",definition:"CRU framework governing DC connections — grid conditions, 80% RE obligation (CRU/2025236), demand-side management.",plain:"Ireland's energy regulator sets conditions on data centre connections. For in-scope large energy users seeking new or modified connections: 80% renewable required.",number:"CRU RE: 80%. Grid RE: ~42% (SEAI 2024). Gap: 38pp — CPPAs or GOs.",standard:"CRU/2025236",feynman:{analogy:"CRU is a planning authority for electricity. You need approval to connect and conditions to keep that connection.",firstPrinciples:"Ireland's electricity is finite. DCs use ~22%. CRU regulates access for grid stability.",theTest:"Grid provides 42% RE, CRU requires 80%. What must the operator do? (Procure 38% via CPPAs or GOs.)"}},
{term:"EU EED Recast 2023/1791",definition:"DCs above 500 kW IT must report energy metrics to the European Commission.",plain:"Europe now requires data centres above 500 kW IT to report energy performance metrics — PUE, water usage, renewable share — to the European Commission. Clonshaugh at 2,400 kW is nearly five times above the threshold, so reporting is mandatory, not optional.",number:"Threshold: 500 kW IT. Clonshaugh: 2,400 kW (4.8× above).",standard:"Directive 2023/1791, Article 12",feynman:{analogy:"EED reporting is calorie labels on food. The DC must display energy consumption.",firstPrinciples:"What gets published gets scrutinised. Mandatory reporting creates market pressure on inefficient facilities.",theTest:"Is Clonshaugh above the 500 kW threshold? (Yes, by 4.8×.)"}},
{term:"EU Taxonomy (2021/2139)",definition:"DC taxonomy-alignment criterion: PUE ≤1.3. No age exemption when alignment is claimed or assessed.",plain:"To be classified as taxonomy-aligned: PUE ≤1.3. Applies regardless of building age.",number:"PUE threshold: ≤1.3. Clonshaugh: 1.50. Gap: 0.20.",standard:"Delegated Regulation 2021/2139, Annex I §8.1",feynman:{analogy:"Like a BER rating for houses. Taxonomy PUE ≤1.3 is the A rating for data centres.",firstPrinciples:"Capital flows to sustainable classification. Excluded = restricted finance, higher capital cost.",theTest:"Does Taxonomy PUE exempt older DCs? (No. ≤1.3 applies regardless of age when taxonomy alignment is claimed or assessed.)"}},
{term:"Guarantees of Origin (GOs)",definition:"Tradeable certificates proving 1 MWh of electricity was generated from a specific renewable source, used to meet RE procurement obligations.",plain:"A certificate that says 'this MWh came from a wind farm.' You buy GOs to prove your electricity is green, even if the actual electrons came from gas.",number:"CRU requires 80% RE. Grid provides ~42%. Gap: ~12,000 MWh/yr for Clonshaugh. GO price: €2–5/MWh (Tier 3 — RE-Source Platform; BloombergNEF 2024, indicative). CPPA price: negotiated, typically €60–90/MWh fixed (Tier 3 — RE-Source Platform; market benchmarks, indicative).",standard:"Directive 2018/2001 (RED II); CRU/2025236",feynman:{analogy:"Like carbon credits but for renewable energy. You buy proof that clean power was generated somewhere on the grid, matching your consumption.",firstPrinciples:"GOs are accounting instruments, not physics. The grid mixes all electrons. GOs allocate the green label to the buyer. CPPAs are bilateral contracts — more defensible under SFDR than unbundled GOs.",theTest:"Why might an investor prefer a CPPA over unbundled GOs? (Additionality — a CPPA finances new RE capacity. GOs may be relabelling existing generation.)"}},
{term:"Raised Floor Plenum",definition:"The pressurised air space between the structural slab and the raised access floor. Serves as a cold air distribution duct and cable routing pathway.",plain:"The space under the raised floor — pressurised with cold air that rises through perforated tiles to cool the servers. Also full of cables, which block airflow.",number:"Clonshaugh: 600 mm plenum. Under-floor cable obstruction estimated 20–30%. Modern best practice: 900–1,200 mm or overhead cooling (no raised floor).",standard:"ASHRAE TC 9.9; EN 50600-2-3:2019",feynman:{analogy:"The raised floor plenum is like the ducts in a building's HVAC system — if they're blocked, rooms don't get enough air regardless of how hard the fan blows.",firstPrinciples:"Airflow follows the path of least resistance. Under-floor cables create turbulence and pressure drops. Deeper plenums reduce velocity and improve uniformity at tile level.",theTest:"If 30% of the plenum is obstructed by cables, by how much does effective airflow area decrease? (Answer: 30%. But the effect on cooling is worse because turbulence further reduces delivery efficiency.)"}}

],whatItLooksLike:"Regulation isn't visible like a chiller. It's in paperwork — CRU conditions, EED templates, EPA licence, F-Gas log.",
siteChecklist:["CRU connection conditions — RE obligations?","EPA IE licence in place?","EED reporting submitted?","CPPAs or GOs for RE?","F-Gas log — refrigerants, quantities","Carbon tax exposure calculated?"]},
logic:{causeAndEffect:[
{cause:"Five regulatory frameworks converge simultaneously on pre-2015 DCs — EED, EU Taxonomy, F-Gas, CRU, and carbon tax all require action",effect:"Compliance across five converging regulatory frameworks requires a coordinated multi-disciplinary response covering MEP, ESG, legal, and financial teams",insight:"CRU, EPA, EED, Taxonomy, F-Gas — each has own regulator and penalties. A cross-cutting regulatory assessment maps all five frameworks against current facility capability."},
{cause:"Clonshaugh was designed and built before any of these regulatory requirements existed — the facility has no built-in compliance capability",effect:"No compliance infrastructure — no sub-metering, no RE contracts, no GHG tracking",insight:"Compliance requires BMS (measurement), CPPAs (procurement), and engineering upgrades (PUE reduction)."},
{cause:"CRU Decision CRU/2025236 requires 80% renewable energy fraction but the Irish grid renewable share is only approximately 42% in 2026",effect:"Operator must procure ~12,000 MWh/yr of renewable energy independently via CPPAs or GOs",insight:"GO cost: ~€24–60K/yr. CPPA: higher annual cost but locks in price and provides additionality for SFDR reporting. Failure to comply risks connection conditions."}
],constraintLesson:"Five rules from five directions, all tightening simultaneously. Addressing only one (PUE for Taxonomy) may leave four others non-compliant.",
weakestLink:{whatsWrong:"\"We'll deal with regulation when inspectors come.\" Enforcement isn't punitive yet but capital markets are already pricing compliance risk.",whatsRight:"Proactive assessment identifies gaps before they become liabilities. Compliance commands higher valuations.",howToGetThere:"Commission a regulatory readiness assessment covering all five frameworks against current capability. This is the foundation for any compliance programme."}},
rhetoric:{declan:{hook:"Fifteen years running DCs. First ten: no regulator visited. Last three: CRU conditions, EED letters, Taxonomy scrutiny. Completely different game.",text:"15 years running DCs. First 10: no regulator visited. Last 3: CRU conditions, EED requests, EPA query on generator emissions."},ann:{hook:"Non-compliance is a valuation discount the DCF model does not capture until the buyer's solicitor finds it in the data room.",text:"Non-compliance is a valuation discount. Facility failing Taxonomy or lacking RE is worth less. Full stop."},mark:{hook:"Every gap has a defined engineering solution. PUE: cooling retrofit. RE: CPPA. Metering: BMS upgrade. Each has a cost range and a lead time.",text:"Each gap has a defined engineering solution. PUE: cooling retrofit. RE: CPPAs. Metering: BMS."},sarah:{hook:"Taxonomy Annex I section 8.1: PUE no greater than 1.3, GHG management, water management. Three thresholds. None of them are negotiable.",text:"Taxonomy: Annex I, §8.1. PUE ≤1.3, GHG management, water management. Thresholds, not aspirations."},tom:{hook:"Total compliance programme at 750 thousand to 1.2 million euros. The alternative is a non-compliant asset no institutional buyer will touch.",text:"Total compliance programme: €750K–1.2M (Tier 3 — SCSI benchmarks; RICS NRM1, indicative). Compare to 10–15% discount on a €30–50M asset."}},
scenario:{title:"The Renewable Energy Gap",narrative:"CRU requires 80% RE. Grid provides ~42%. What must Clonshaugh procure?",question:"Calculate volume of additional RE required.",answer:"CRU requires 80% renewable energy for in-scope large energy user connections, but the Irish grid only delivers about 42% RE. The operator must bridge that gap independently through CPPAs or Guarantees of Origin.\n\nTotal consumption: 31,536 MWh. Required RE (80%): 25,229 MWh. Grid RE (42%): 13,245 MWh. Gap: 11,984 MWh/yr to procure via CPPAs or GOs.\n\nWhat this means in practice: Clonshaugh must independently source nearly 12,000 MWh of renewable energy per year. At GO prices of €2–5/MWh, that is €24–60K/yr — manageable. But investors increasingly expect CPPAs (which finance new capacity) rather than unbundled GOs (which may relabel existing generation). The RE gap is a procurement decision, not just a compliance tick-box.",
whoShouldCare:["sarah","ann","tom"]},
sourceNote:"CRU/2025236 (T1); Directive 2023/1791 (T1); Regulation 2021/2139 (T1); F-Gas 2024/573 (T1); SEAI 2024 (T1).",
clockQuote:"Five regulators, five frameworks, five sets of deadlines — and one building designed before any existed.",
retrofitRelevance:"The regulatory squeeze IS the reason for retrofit.",
crossRefs:[{module:"DC-LEARN-007",level:"L1",topic:"Full regulatory deep dive"},{module:"DC-LEARN-015",level:"L1",topic:"CRU Readiness"}],
rhetoricTakeaways:{declan:"Key takeaway: Under-floor cable management is the invisible blocker. Clean the plenum before adding containment.",ann:"Key takeaway: A 600 mm plenum with 30% cable obstruction is functionally equivalent to 420 mm. That limits cooling.",mark:"Key takeaway: Raised floor vs overhead cooling is the fundamental architecture decision for any major retrofit.",sarah:"Key takeaway: Cable management reduces fire load, improves airflow, and enables accurate CFD modelling for sustainability reporting.",tom:"Key takeaway: Cable tidy: €20–50K (Tier 3 — SCSI benchmarks; RICS NRM1, indicative). Small cost, but it's a prerequisite for containment and free cooling to work properly."},
cascadeCheck:(kw,racks,pue)=>{const total=kw*racks*pue*8.76;if(total<=0)return{needed:"0",available:"0",unit:"MWh RE",pass:true,detail:"No load — no RE obligation"};const re80=total*0.8;const gridRE=total*0.42;const gap=re80-gridRE;return{needed:(re80/1000).toFixed(0),available:(gridRE/1000).toFixed(0),unit:"MWh RE",pass:gap<=0,detail:"Need "+(re80/1000).toFixed(0)+"GWh RE (80%). Grid: "+(gridRE/1000).toFixed(0)+"GWh. Gap: "+(gap/1000).toFixed(0)+"GWh"}}
},

{id:"L7",level:7,name:"The Gap — 2013 vs 2026",icon:"📊",component:"Engineering Gap Analysis",available:true,
userNeedStatement:"I need to see what Clonshaugh delivers vs what's required — the specific gaps driving retrofit scope.",
plainEnglish:"PUE 1.50 vs Taxonomy ≤1.3. R410A vs F-Gas. Zero free cooling vs 7,200 hours. Single feed vs Tier III. 500 BMS points vs EED metering. Each gap is a work package. Together, the business case.",
grammar:{facts:[
{term:"PUE Gap",definition:"0.20 PUE points from 1.50 to 1.30. ~4,200 MWh/yr excess energy.",plain:"How far the building is from where it needs to be. PUE 1.50 vs Taxonomy ≤1.3 means Clonshaugh wastes roughly 4,200 MWh per year in excess overhead energy — that is real electricity being converted to waste heat and vented through the roof.",number:"Energy: 0.20 × 2,400 × 8,760 = 4,205 MWh/yr. Cost: €504,576/yr.",standard:"EN 50600-4-2:2016; Delegated Act 2021/2139",feynman:{analogy:"A car at 40 MPG when regulation requires 50. Need to change the engine, not just drive carefully.",firstPrinciples:"PUE 1.50→1.30: non-IT must drop from 1,200 to 720 kW. 480 kW reduction from cooling.",theTest:"PUE 1.50→1.30 on 2,400 kW IT: annual cost saved? (~€504K at €0.12/kWh.)"}},
{term:"Containment Gap",definition:"No physical separation between hot exhaust and cold supply air.",plain:"No barriers between hot and cold. They mix. Cooling works harder.",number:"Containment saves 10–15%. PUE impact: ~0.05.",standard:"ASHRAE TC 9.9; Uptime Institute Survey 2024 (Tier 2)",feynman:{analogy:"Heating a house with windows open. Containment closes the windows.",firstPrinciples:"Mixing 35°C exhaust with 18°C supply destroys the ΔT that drives cooling.",theTest:"Why is containment the recommended FIRST step? (Lowest cost, makes all subsequent work more effective.)"}},
{term:"Free Cooling Gap",definition:"7,200 hrs available, 0 used.",plain:"Dublin offers 7,200+ hours per year below 18°C — over 80% of the time, outdoor air could reject data centre heat without running compressors. Clonshaugh uses none of it. That is the single largest efficiency opportunity for any Irish data centre.",number:"Potential: ~3,800 MWh/yr, ~€456K/yr.",standard:"Met Éireann; EN 50600-2-3:2019",feynman:{analogy:"Paying for AC 12 months when it's cool enough outside for 10 months.",firstPrinciples:"Free cooling: ~40W/kW. Chiller: ~250W/kW. Ratio 6.25:1 for 7,200+ hrs/yr.",theTest:"Energy saving ratio of free cooling vs chiller? (6.25:1.)"}},
{term:"Cooling PUE Contribution",definition:"The portion of PUE attributable to cooling systems — typically the single largest overhead component.",plain:"How much of the building's energy waste goes to keeping things cool. At Clonshaugh, it's about two-thirds of all overhead.",number:"Clonshaugh cooling contribution: ~0.30 PUE points (of 0.50 total overhead). Distribution: ~0.12. Lighting/other: ~0.08. Target with free cooling: ~0.08 cooling contribution.",standard:"EN 50600-4-2:2016; Uptime Institute Survey 2024",feynman:{analogy:"If PUE overhead is a pie, cooling is the biggest slice — roughly 60%. Shrinking that slice has the largest impact on the whole.",firstPrinciples:"PUE = 1 + (cooling + distribution + other) / IT. Reducing cooling from 0.30 to 0.08 drops PUE from 1.50 to 1.28. Single biggest lever.",theTest:"If cooling drops from 0.30 to 0.08 PUE contribution, what is the new PUE? (1.00 + 0.08 + 0.12 + 0.08 = 1.28 — below Taxonomy threshold.)"}},
{term:"Energy Performance Certificate",definition:"In Ireland, commercial buildings require a Building Energy Rating (BER) using NEAP methodology. Data centres are assessed but their unique energy profile makes standard NEAP challenging.",plain:"The building's energy label — like the energy rating on a fridge, but for the whole building. DCs are unusual because their energy use is dominated by IT, not heating/lighting.",number:"Clonshaugh BER: likely G-rated by NEAP methodology. However, NEAP was designed for offices, not DCs. CRU licence conditions will increasingly drive DC-specific energy reporting.",standard:"S.I. No. 243/2012; SEAI NEAP methodology",feynman:{analogy:"A DC BER is like rating a factory by its office lighting — it measures the wrong thing. The real energy performance metric for a DC is PUE.",firstPrinciples:"Standard building energy ratings assess heating, cooling, and lighting per m². DCs consume 10–50× more energy per m² than offices, almost entirely for IT and cooling. PUE is the meaningful metric.",theTest:"Why is a NEAP BER misleading for a data centre? (Answer: NEAP assesses building fabric and HVAC. A DC's dominant energy use — IT equipment — is outside the NEAP boundary.)"}}

],whatItLooksLike:"The gap isn't visible from outside. It's on paper: PUE 1.50, no free cooling, R410A, 500 BMS points, single feed.",
siteChecklist:["PUE: current value and method","Cooling: any free cooling?","Containment: type?","Refrigerant: type, GWP, F-Gas log","Grid: single or dual?","BMS: point count","RE: CPPAs or GOs?"]},
logic:{causeAndEffect:[
{cause:"Six gaps compound at Clonshaugh — PUE, containment, free cooling, refrigerant phase-down, grid redundancy, and BMS metering all require investment",effect:"No single capital intervention closes the total compliance and efficiency gap — a phased programme addressing all six deficiencies is required",insight:"Gaps are interdependent. Containment → CRAH efficiency → free cooling more effective. BMS → measurement → Taxonomy compliance."},
{cause:"The PUE gap of 0.20 between current (1.50) and target (1.30) represents approximately €505K per year in excess energy cost at €0.12/kWh",effect:"The financial case for retrofit is driven primarily by energy cost savings rather than compliance alone — savings fund the compliance investment",insight:"Compliance is the trigger. Energy savings are the payback. €500K/yr funds €1–2M programme in 2–4 years."},
{cause:"Containment, BMS upgrades, and free cooling each address different efficiency gaps but interact — sequencing determines whether benefits compound or conflict",effect:"Benefits compound when implemented in correct sequence — containment first enables smaller free cooling sizing",insight:"Containment saves 10–15% immediately. This reduces the design load for free cooling equipment, lowering capex by 10–20%. BMS then verifies actual vs projected savings."}
],constraintLesson:"The gap between 2013 and 2026 is where the engineering value lies. Anyone can list regulatory requirements. The real value is quantifying the gap for a specific facility, sequencing interventions in the right order, and producing a defensible business case that an investment committee can approve.",
weakestLink:{whatsWrong:"\"Gap is too big — cheaper to build new.\" Clonshaugh has a Dublin location and 5 MVA MIC. New greenfield connection: 4–7 years.",whatsRight:"Most 2010–2015 Dublin facilities favour retrofit — the grid connection alone is worth millions.",howToGetThere:"Step 1: Facility screening assessment to quantify the gap. Step 2: Sequenced retrofit design with phased costings and projected savings."}},
rhetoric:{declan:{hook:"I can name every gap — no free cooling, no containment, R410A refrigerant, single feed. What I could not name was the total cost.",text:"I can name every gap: no free cooling, no containment, R410A, single feed, ancient BMS, PUE 1.50. I've been asking for budget for three years."},ann:{hook:"PUE 1.20 comparables sell at a premium I can quantify. Clonshaugh at 1.50 is not a sustainability issue — it is a bid price.",text:"The gap = valuation discount. PUE 1.20 comparable sells at X. Clonshaugh at 1.50 sells at X minus retrofit cost."},mark:{hook:"Each gap has a solution and an indicative cost. Total programme at 1.1 to 2.5 million euros. That is a phased plan, not an alarm.",text:"Each gap has a solution and cost range. Total: €1.1–2.5M indicative."},sarah:{hook:"Under SFDR and Taxonomy, every gap requires disclosure. A funded remediation pathway converts non-compliant to in-transition — a material difference.",text:"Under SFDR and Taxonomy, every gap must be disclosed. Funded pathway is materially different from no plan."},tom:{hook:"Priority: containment first — cheapest, fastest, unlocks measurement. Then BMS. Then free cooling. Sequence the capital, not the ambition.",text:"Priority: containment (cheapest). BMS (enables measurement). Free cooling (biggest saving). Chiller (F-Gas). Second feed (longest)."}},
scenario:{title:"The Gap in Euros",narrative:"Investment committee wants financial impact of gaps vs best-practice PUE 1.20.",question:"Annual excess energy cost and carbon cost at €71/tCO₂?",answer:"This is the core financial gap calculation — the difference between where Clonshaugh is (PUE 1.50) and where best practice sits (PUE 1.20), expressed in euros and tonnes of CO₂.\n\nAt PUE 1.50: 3,600 kW → 31,536 MWh. At 1.20: 2,880 kW → 25,229 MWh.\nExcess: 6,307 MWh → €756,864/yr.\nExcess carbon: 6,307 × 0.2241 = 1,414 tCO₂ → 1,414 × €71 = €100,394.\nTotal annual gap: €857,258.\n\nWhat this means in practice: Clonshaugh is bleeding €857K per year in excess energy and shadow carbon costs. That is €71K per month. Any retrofit programme costing less than one year of that gap has a payback under twelve months — and the saving recurs every year for the remaining asset life.",
whoShouldCare:["ann","tom"]},
sourceNote:"EN 50600-4-2:2016 (T1); Delegated Act 2021/2139 (T1); Met Éireann (T1); SEAI 2026 (T1); Budget 2025 (T1); CRU Q4 2024 (T2).",
clockQuote:"The gap between 2013 and 2026 isn't just a number — it's €857K per year leaving the building as waste heat and carbon.",
retrofitRelevance:"This level IS the business case in simplest form.",
crossRefs:[{module:"DC-LEARN-004",level:"L7",topic:"PUE optimisation"},{module:"DC-LEARN-007",level:"L1",topic:"Regulatory requirements"}],
rhetoricTakeaways:{declan:"Key takeaway: The regulations changed but the building didn't. Every year widens the gap between as-built and as-required.",ann:"Key takeaway: Regulatory non-compliance is not a risk — it's a certainty. The question is when enforcement begins, not whether.",mark:"Key takeaway: CRU, EED, Taxonomy, F-Gas, EPA — five regulatory instruments, each with specific DC requirements. Map them all.",sarah:"Key takeaway: EU Taxonomy PUE ≤1.3 is a bright line. Clonshaugh at 1.50 does not qualify. This affects green finance eligibility.",tom:"Key takeaway: Compliance cost is cheaper than non-compliance cost. Budget for regulatory alignment in every retrofit programme."},
