<title>DC-LEARN-012 v2.4.8 | Energy Centres & Microgrids | Legacy Business Engineers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.dc-story-body{font-size:17px;line-height:1.9;color:var(--text)}
.dc-story-body p{margin-bottom:22px !important;font-size:17px;line-height:1.9}
.dc-story-body h2{font-family:Georgia,"Times New Roman",serif !important;font-size:26px !important;font-weight:400 !important;color:var(--text-bright) !important;margin-bottom:28px !important;text-align:center;letter-spacing:0.3px}
.dc-story-body h3{font-family:Georgia,"Times New Roman",serif !important;font-size:19px !important;font-weight:500 !important;color:var(--text-bright) !important;margin:36px 0 16px !important}
.dc-story-body blockquote{margin:32px 0 !important;padding:18px 24px 18px 28px !important;border-left:3px solid var(--green) !important;background:var(--green-dim) !important;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.dc-story-body blockquote p{margin-bottom:0 !important}
.dc-story-body hr{margin:36px auto !important;width:80px;border:none !important;border-top:1px solid var(--border-light) !important}
.dc-story-body em{font-style:italic}
.dc-story-body strong{color:var(--text-bright)}
.dc-story-body .dc-story-dropcap::first-letter{float:left;font-family:Georgia,"Times New Roman",serif;font-size:68px;line-height:0.85;padding-right:10px;padding-top:4px;color:var(--green);font-weight:400}
@media(max-width:600px){.dc-authbtn-dropdown{position:fixed !important;top:68px !important;left:12px !important;right:12px !important;min-width:0 !important;width:auto !important}}
</style>

</head>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-LEARN-012 v2.4.8</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

   scenario:{
      title:"Clonshaugh — Why Now?",
      narrative:"Clonshaugh has operated on a single 10 kV ESB Networks connection (5 MVA MIC) since 2013. The fund wants to expand IT from 2,400 kW to 8,000 kW — requiring approximately 10 MVA, which would need a 38 kV HV upgrade. EirGrid: no additional capacity until 2029+.",
      question:"What is the minimum dispatchable generation Clonshaugh needs under CRU policy, and what regulatory thresholds are triggered?",
      answer:`Here's how we work through Clonshaugh's expansion case. The fund wants to triple the IT capacity, but the grid can't deliver the extra power. So we need to figure out how much generation to install and what regulatory doors that opens.

Note: The following calculation uses indicative figures for illustration. Regulatory thresholds are T1 (CRU/2025236, Electricity Regulation Act 1999). Capex is Tier 4 (Thunder Said Energy 2025; BNEF H2 2025). All cost outputs are screening-level estimates subject to detailed design and tender.

Step 1: Current MIC = 5 MVA (10 kV MV, ESB Networks). Expansion to 8,000 kW IT at PUE 1.20 = 9,600 kW ≈ 10 MVA (38 kV HV upgrade required).
Step 2: CRU requires dispatchable generation matching MIC. At 10 MVA: SEM participation mandatory.
Step 3: Regulatory thresholds:
  • 10 MVA MIC → SEM participation required (CRU/2025236)
  • 10 MW connected generation → Dispatch Licence (Electricity Regulation Act 1999 s.14)
  • Thermal input: 10 MW / 0.40 = 25 MW thermal (MCP Directive registration required; below 50 MW EPA IE Licence threshold)
  • 80% renewable obligation, 6-year glide path (CRU/2025236)
Step 4: Minimum dispatchable = 10 MW (matching expanded MIC).
Step 5: Capex indication: 10 MW × EUR 800–1,200/kW = EUR 8–12M (Tier 4 — Thunder Said Energy 2025; BNEF H2 2025).

The takeaway: a straightforward IT expansion triggers a cascade of regulatory obligations — Dispatch Licence, SEM participation, 80% renewable, MCP registration. The energy centre is not optional, it's the price of admission for growth. And the 3.3× IT load increase also requires cooling and power distribution upgrades in parallel (see DC-LEARN-002, DC-LEARN-014).`
    ,

      constraintLesson:`The tension is between electrical efficiency and emissions compliance.

At 45% efficiency, 55% of fuel energy becomes heat. In electricity-only mode, that heat is wasted. The EPA will ask: why burn gas and waste heat when EED requires waste heat recovery assessment?

CHP transforms the profile: 45% electrical + 40% thermal = 85% overall. Emissions per unit of useful energy nearly halve.

The Irish constraint: who buys the heat? Dublin has no district heating network reaching North Dublin industrial estates where most DCs sit. Without a heat customer, CHP infrastructure is stranded capex.

Engineering response: design CHP-ready from day one (pipe runs, heat exchangers, thermal store) even without a heat customer today. Marginal cost at construction: 5–10% of energy centre cost. Retrofitting later: 3–5× more (Tier 4 — Thunder Said Energy 2025; RICS NRM1 benchmarks).`,

   scenario:{
      title:"Clonshaugh Prime Mover Selection",
      narrative:"Clonshaugh needs 10 MW dispatchable. Gas Networks Ireland connection available. Two options: 5 × 2 MW reciprocating gas engines, or 1 × 10 MW gas turbine.",
      question:"Compare both options on efficiency, modularity, emissions, and cost.",
      answer:`This is the first big technology decision for the energy centre. Two fundamentally different approaches — let's compare them side by side so Ann and Tom can see what they're buying.

Note: Capex figures are Tier 4 indicative (Wärtsilä 34SG and Siemens SGT-800 published ranges). Efficiency data from manufacturer datasheets (T3). EPA thresholds from IE Licence guidance (T1). All costs screening-level, subject to detailed design and tender.

Option A — 5 × 2 MW Reciprocating Gas Engines:
  Efficiency at rated: ~45%. At 50% load: ~42%.
  Thermal input: 10 MW / 0.45 = 22.2 MW (below 50 MW EPA threshold).
  Modularity: install 2–3 initially, add as IT grows.
  Start-up: ~5 min. NOx: < 250 mg/Nm³ (< 50 with SCR).
  Capex: 10 MW × EUR 700/kW = EUR 7M (Tier 4).
  CHP: ~10 MW thermal, ~5 MW recoverable at 50%.

Option B — 1 × 10 MW Gas Turbine:
  Efficiency at rated: ~35% simple cycle. At 50% load: ~28%.
  Thermal input: 10 MW / 0.35 = 28.6 MW (still below 50 MW).
  Modularity: none — all or nothing.
  Start-up: ~10 min. NOx: ~300 mg/Nm³ (< 50 with SCR).
  Capex: 10 MW × EUR 600/kW = EUR 6M (Tier 4).
  CHP: ~18 MW thermal (higher exhaust temperature).

Recommendation: Option A (reciprocating engines). The turbine is cheaper upfront but burns 30% more gas at part load — and a DC ramping over 2–3 years spends most of its early life at 50–70% load. The EUR 1M premium on engines is offset by ~EUR 400k/yr fuel saving from higher part-load efficiency. Modularity means the fund only commits capital as IT demand materialises.`
    ,

         definition:"Li-ion battery chemistry (LiFePO₄) with lower energy density than NMC but superior thermal stability, longer cycle life (4,000–8,000 cycles at 80% DoD), and no cobalt/nickel.",
         plain:"The safer, longer-lasting battery type. Won\'t catch fire as easily and lasts much longer when cycled daily.",
         number:"LFP: 4,000–8,000 cycles at 80% DoD, ~120 Wh/kg. NMC: 2,000–4,000 cycles, ~200 Wh/kg. For stationary BESS, cycle life > density.",
         standard:"IEC 62619 — T1; NFPA 855 — T2",
         feynman:{
           analogy:"Think of it like choosing between a sports car battery and a truck battery. The sports car battery (NMC) is smaller and lighter, but it can overheat and doesn\'t last as long. The truck battery (LFP) is bigger and heavier, but it\'s nearly fireproof and keeps going for years of daily use.",
           firstPrinciples:"Lithium-ion batteries store energy by moving lithium ions between two electrodes. The cathode material determines the battery\'s personality. LFP uses iron and phosphate — cheap, stable, and long-lasting. NMC uses nickel, manganese, and cobalt — more energy-dense but less stable and shorter-lived.",
           theTest:"You understand LFP when you can answer: Why do DC energy centres overwhelmingly choose LFP over NMC? Answer: Cycle life (4,000–8,000 vs 2,000–4,000 cycles at 80% DoD), thermal stability (lower fire risk next to gas engines), and no cobalt supply chain issues."}},
        {term:"State of Health (SoH)",
         definition:"Battery\'s remaining capacity vs original, as percentage. End-of-warranty typically 70–80% SoH after 10–15 years.",
         plain:"Think of it like a phone battery after a year — it still works but holds less charge. State of Health tells you exactly how much capacity your BESS has lost since installation. LFP degrades roughly 2–3% per year at moderate cycling, so a 10 MWh system might only deliver 8 MWh after five years.",
         number:"Typical BESS warranty: 10 years or 4,000 cycles, min 70% SoH guaranteed.",
         standard:"IEC 62933-2-1 — T1",
         feynman:{
           analogy:"Think of it like the battery on your phone. When it was new, 100% lasted all day. After two years, 100% only lasts until lunchtime. The battery hasn\'t broken — it\'s degraded. SoH measures how much of the original capacity remains.",
           firstPrinciples:"Every charge/discharge cycle causes tiny physical changes inside the battery — lithium gets trapped, electrode surfaces roughen. Over thousands of cycles, the battery holds less energy. SoH tracks this: 100% when new, dropping 2–3% per year with moderate use. Warranties guarantee minimum 70% after 10 years.",
           theTest:"You understand SoH when you can answer: Your 10 MWh BESS has degraded to 75% SoH. How much energy can it actually store? Answer: 7.5 MWh. If your UPS bridging needs 0.75 MWh minimum, you still have margin — but your grid services duration has shortened from 2 hours to 1.5 hours."}},
        {term:"C-Rate",
         definition:"Charge/discharge rate relative to capacity. 10 MWh at 1C = 10 MW for 1 hour. At 0.5C = 5 MW for 2 hours. Higher C-rates accelerate degradation.",
         plain:"How fast you drain the battery. Fast discharge earns grid revenue but wears it out quicker.",
         number:"DS3/FASS reserves: C/1 to C/2. UPS bridging: C/1 or faster for 5–10 min. Revenue cycling: 1–2 cycles/day at C/1.",
         standard:"DS3 Technical Requirements — T1; IEC 62933-2-1 — T1",
         feynman:{
           analogy:"Think of it like filling a swimming pool. You can use a garden hose (slow, gentle) or a fire hose (fast, aggressive). C-rate is the size of the hose relative to the pool. A 10 MWh battery discharging at 1C empties in 1 hour; at 0.5C it takes 2 hours. The fire hose fills faster but wears out the plumbing.",
           firstPrinciples:"C-rate = power ÷ capacity. A 10 MWh battery delivering 10 MW = 1C (empties in 1 hour). Delivering 5 MW = 0.5C (empties in 2 hours). Higher C-rates generate more heat, stress the cells, and accelerate degradation. Grid services typically need C/1 to C/2 — moderate rates that balance revenue with battery longevity.",
           theTest:"You understand C-rate when you can answer: A 5 MW / 10 MWh BESS needs to bridge a 5-minute generator start at full facility load (9 MW). What C-rate is needed? Answer: 9 MW from 10 MWh = 0.9C for 5 minutes. Well within capability but only uses 0.75 MWh of the 10 MWh capacity."}},
      {term:"BESS degradation management",definition:"Managing capacity fade through DoD limits, temperature control, and oversizing.",plain:"Batteries lose capacity every time they charge and discharge — it is physics, not a defect. The trick is managing how fast it happens. Keep depth of discharge moderate, temperature controlled, and oversize by 15 to 20 percent at installation so you still meet your contracted capacity in year 8.",number:"LFP: about 2 percent loss per year. 80 percent remaining at 8,000 cycles.",standard:"IEC 62619:2022",feynman:{analogy:"Like a rechargeable torch that lasts less after a year of daily charging. Size for end-of-life.",firstPrinciples:"Every cycle causes microscopic electrode changes. Sizing for beginning-of-life means undersized by year 5.",theTest:"10 MWh BESS, 10 MWh contract, 5 years at 2 percent loss. Result? Answer: About 9 MWh. Cannot meet contract. Oversize by 15 to 20 percent."}}

       {term:"BESS Thermal Runaway Protection",definition:"Li-ion cells can enter thermal runaway if overheated, overcharged, or mechanically damaged. BESS installations require dedicated fire detection, gas suppression, ventilation, and physical separation per NFPA 855.",plain:"Batteries can catch fire in a chain reaction called thermal runaway. Every BESS needs fire protection designed specifically for lithium batteries — water sprinklers alone are not sufficient.",number:"NFPA 855 separation: 3m between containers; deflagration venting per IEC 62933-5-2",standard:"NFPA 855:2023; IEC 62933-5-2 Safety — T1",feynman:{analogy:"Think of a row of dominoes made of matches. If one lights, the heat ignites the next. Thermal runaway spreads from cell to cell. Fire protection is about stopping the first domino and containing the rest.",firstPrinciples:"Li-ion cells contain flammable electrolyte. Internal short circuits or overcharging generates heat. If heat exceeds the thermal stability threshold, the cell vents flammable gas and ignites. Adjacent cells then overheat in cascade. Prevention requires cell-level monitoring, module-level isolation, and container-level suppression.",theTest:"A BESS container sensor reports one cell at 80 degrees C (threshold 60 degrees C). What sequence should fire? Answer: isolate the affected string electrically, activate container ventilation to extract flammable gases, alert the BMS and operator, and prepare gas suppression. Do NOT open the container doors — oxygen accelerates thermal runaway."}}

   scenario:{
      title:"Clonshaugh BESS Sizing",
      narrative:"Clonshaugh\'s 10 MW energy centre needs BESS for UPS bridging, load smoothing, and grid revenue.",
      question:"Size the BESS (MW and MWh) and estimate annual grid services revenue.",
      answer:`The BESS has to serve three masters simultaneously — it's not just a big battery, it's three different systems sharing one piece of hardware. Here's how we size it.

Note: Revenue figures are Tier 4 indicative based on DS3 Gate 12 published outcomes (T1). BESS capex from BNEF H2 2025 (T3). UPS offset based on RICS NRM1 benchmarks (T2). All costs screening-level, subject to detailed design and tender.

Layer 1 — UPS Bridging:
  The first job: keep the DC alive for 5 minutes while generators start.
  Facility load: 10 MVA × 0.9 PF = 9 MW. Bridge 5 min = 0.083 hrs.
  Energy: 9 MW × 0.083 = 0.75 MWh. Reserve: 20% of total BESS.

Layer 2 — Load Smoothing:
  The second job: absorb sudden load changes so generators don't see step demands.
  Ramp: ±2 MW over 15 min. Energy: 2 MW × 0.25 hrs = 0.5 MWh.

Layer 3 — Grid Services:
  The third job: earn revenue from the SEM by providing fast frequency response.
  Target: 2-hour duration at 5 MW. Energy: 5 MW × 2 hrs = 10 MWh.

Total BESS: 5 MW / 10 MWh LFP, 2-hour duration.
Layers 1+2 (1.25 MWh) fit within 20% reserve of 10 MWh (2 MWh).

Revenue (Tier 4 — indicative, DS3 Gate 12 published outcomes):
  Availability payments: ~EUR 100–150k/yr
  Wholesale arbitrage: ~EUR 50–80k/yr
  Capacity market: ~EUR 30–50k/yr
  Total: ~EUR 180–280k/yr
Capex: 10 MWh × EUR 400/kWh = EUR 4M (Tier 4).
Simple payback on grid revenue alone: 14–22 years.
But: BESS replaces ~EUR 1.5M of additional UPS capacity — effective payback: 7–12 years.

The clever part: by combining UPS bridging with grid services in one BESS, the fund avoids buying separate UPS capacity AND earns revenue. The grid services pay for the battery; the UPS function comes free.`

    clockQuote:"Tom had spent his career where compliance was a cost and regulation was a burden. This was the first time the compliance asset and the revenue asset were the same thing. His entire framework had just inverted.",
    userNeedStatement:"Understand microgrid topology, islanding, black start, and the protection engineering that makes independent operation possible.",
    plainEnglish:"A microgrid is a self-contained power system that can disconnect from the main grid and run independently. The switchgear, protection, and controls that make this safe are the hardest engineering in the energy centre.",
    grammar:{
      facts:[
        {term:"Islanding",
         definition:"The ability of a microgrid to disconnect from the utility grid and operate independently using on-site generation and storage, maintaining voltage and frequency within statutory limits.",
         plain:"Pulling the plug from ESB Networks and running on your own power. The DC doesn\'t notice — lights stay on, servers keep running.",
         number:"Pure DC Dublin operates fully islanded (no grid connection yet). Frequency regulation: 50 Hz ±0.5 Hz. Voltage: ±5% of nominal. Transition time: under 100 ms. Protection relays need two settings groups: grid-connected and islanded (different fault levels).",
         standard:"EN 50549-1 — T1; EirGrid Grid Code — T1",
         feynman:{
           analogy:"Think of it like unplugging your house from the mains and switching to a backup generator — except your house has 400 servers that must not notice the change. Islanding means your private power system keeps running perfectly when the public grid disappears.",
           firstPrinciples:"A microgrid normally runs in parallel with the national grid, sharing the load. If the grid fails, the microgrid must detect the loss (within 50 ms), disconnect the grid-tie breaker, and take over voltage and frequency control — all without the IT load experiencing any interruption. This requires BESS to bridge the milliseconds while generators adjust.",
           theTest:"You understand islanding when you can answer: Why can\'t a standard backup generator installation do what a microgrid does? Answer: A standard ATS has a break-before-make transfer (100–500 ms outage). A microgrid uses BESS to maintain continuous power during the transition — zero interruption."}},
        {term:"Black Start",
         definition:"The ability to restart the microgrid from a complete shutdown without external grid power. Requires at least one generator with its own starting system (battery cranking, compressed air) and the control logic to sequence all other generation online.",
         plain:"Starting the engines when everything is dead — no grid, no battery charge, nothing. At least one engine must be able to start itself.",
         number:"Black start sequence: engine crank (30–60 seconds) → generator sync → BESS charge → sequential engine starts → load pickup. Total: 5–15 minutes to full capacity.",
         standard:"EirGrid Grid Code Section CC.14 (Black Start capability) — T1",
         feynman:{
           analogy:"Think of it like jump-starting a car when the battery is completely flat. You need another car (or a portable charger) to get the first engine turning. In a microgrid, at least one generator must be able to start itself with its own battery cranking system — then it starts everything else.",
           firstPrinciples:"After a total shutdown, there\'s no electricity anywhere — no grid, no BESS charge, nothing. Black start means one generator cranks using its own starting battery (like a car starter motor), generates power, charges the BESS, then sequences the other generators online. The whole process takes 5–15 minutes from dead to full capacity.",
           theTest:"You understand black start when you can answer: All generators and BESS are offline after a total facility shutdown. What starts first and why? Answer: The designated black start generator — it has its own battery cranking system independent of the facility electrical supply. It generates power to charge the BESS and start the remaining engines."}},
        {term:"Point of Common Coupling (PCC)",
         definition:"The electrical point where the microgrid connects to the utility grid. All protection, metering, and islanding detection equipment is located at or near the PCC.",
         plain:"The handshake point between your private grid and ESB Networks\' grid. This is where the switchgear decides: connected or islanded.",
         number:"Typical PCC for a DC microgrid: 38 kV or 110 kV circuit breaker with protection relay (SEL-751, ABB REF615 or equivalent), ROCOF and vector shift islanding detection.",
         standard:"EN 50549-1 — T1; ESB Networks Distribution Code — T1",
         feynman:{
           analogy:"Think of it like the front door of your house. Inside, you control everything. Outside, it\'s the public road. The PCC is the door between your private electrical system and ESB Networks\' public grid. All the locks, meters, and security cameras sit at this door.",
           firstPrinciples:"The PCC is where the microgrid physically connects to the grid — typically a high-voltage circuit breaker (38 kV or 110 kV). All protection relays, revenue metering, and islanding detection equipment sit here. When the grid fails, the PCC breaker opens. When reconnecting, the microgrid must synchronise its frequency and voltage with the grid before the breaker closes.",
           theTest:"You understand PCC when you can answer: What happens if the PCC breaker closes when the microgrid is 0.5 Hz out of sync with the grid? Answer: A massive current transient — the grid and microgrid try to force each other into alignment. This can damage generators and switchgear. Synchronisation must be within 0.1 Hz before closing."}},
      {term:"Rate of Change of Frequency (RoCoF)",
         definition:"The speed at which grid frequency changes during a supply-demand imbalance, measured in Hz/s. RoCoF is the key indicator of grid inertia — low inertia means frequency drops faster when a generator trips, giving protection systems less time to respond.",
         plain:"When a power station trips off the grid, the frequency starts dropping. RoCoF measures how fast it drops. In Ireland, because wind and solar don\'t spin heavy turbines, the grid has less inertia than most European countries — so frequency drops faster. This matters for your microgrid because your islanding detection relays use RoCoF to decide when to disconnect from the grid.",
         number:"EirGrid Grid Code CC.7 standard: withstand 1.0 Hz/s RoCoF. Maximum observed: approaching 2.0 Hz/s during high-wind, low-demand periods. At 50 Hz nominal, a 1.0 Hz/s RoCoF means the frequency drops from 50 Hz to 49 Hz in one second — your protection relays have roughly 500 ms to detect, decide, and act before under-frequency load shedding triggers.",
         standard:"EirGrid Grid Code CC.7 — T1; DS3 System Services — T1; ENTSO-E RoCoF guidelines — T2",
         feynman:{
           analogy:"Think of it like a bicycle wheel. A heavy steel wheel keeps spinning for a long time when you stop pedalling — it has inertia. A light carbon wheel slows down quickly. The Irish grid is like the light wheel: lots of wind turbines (which are electrically decoupled from the grid) and fewer heavy spinning generators. When something goes wrong, the frequency drops fast. RoCoF measures exactly how fast that wheel is slowing down.",
           firstPrinciples:"Grid frequency (50 Hz in Ireland) reflects the balance between supply and demand. Every spinning generator adds inertia — the physical momentum of its rotor resists frequency change. When a 400 MW gas plant trips, the remaining generators must absorb the deficit. If there\'s lots of inertia (many heavy rotors spinning), frequency drops slowly — RoCoF is low. If inertia is low (high wind penetration, fewer spinning plants), frequency drops fast — RoCoF is high. Ireland\'s small, isolated grid with 40%+ renewable penetration has among the highest RoCoF exposure in Europe.",
           theTest:"You understand RoCoF when you can answer: Ireland\'s grid is running at 65% wind penetration on a Sunday night. A 400 MW CCGT trips. Why is RoCoF higher than the same event on a Tuesday afternoon at 30% wind? Answer: At 65% wind, fewer synchronous generators are online, so less rotational inertia. The same 400 MW loss causes a faster frequency drop. Your microgrid\'s RoCoF relay detects the higher rate and islands faster — which is exactly what it should do."}}

       {term:"Microgrid Controller (EMS)",definition:"The energy management system that coordinates generation dispatch, BESS charge/discharge, load management, and grid interaction in real time. Executes economic optimisation and islanding sequences automatically.",plain:"The brain of the microgrid — it decides which generators to run, when to charge or discharge the battery, and how to balance supply and demand every second.",number:"Response time under 100ms for frequency events; optimisation cycle every 5-15 minutes",standard:"IEC 61850 communications; IEC 62351 cybersecurity — T1",feynman:{analogy:"Think of an air traffic controller managing a busy airport. Planes (generators) take off and land in sequence, fuel trucks (batteries) need positioning, and the runway (grid connection) can close without warning.",firstPrinciples:"A microgrid has multiple energy sources with different response characteristics. Optimising across these requires continuous computation balancing cost, emissions, reliability, and grid signals. Without automated control, operators make suboptimal decisions.",theTest:"Grid frequency drops to 49.5 Hz at 3 AM. The microgrid has 2 gas engines at 60% load and a BESS at 80% SOC. What should the EMS do? Answer: dispatch BESS instantly for fast frequency response while ramping one engine to 80% over 5 minutes to sustain the response."}}

      constraintLesson:`The hardest engineering in a microgrid is the transition between modes.

Grid-connected → islanded: the grid-tie breaker opens. Within 100–200 ms, the microgrid controller must:
1. Detect the island condition (ROCOF + vector shift)
2. Switch the lead generator to isochronous frequency control
3. Adjust all other generators to droop mode
4. Switch protection relay setting groups
5. Shed non-essential load if generation is insufficient

If step 2 takes too long, frequency collapses and the microgrid trips. If step 4 doesn\'t happen, a fault in islanded mode may not be cleared by the lower fault current.

The reverse transition (islanded → grid reconnection) is equally critical: the microgrid must synchronise frequency, voltage, and phase angle with the grid before closing the tie breaker. Close out of sync and the resulting current transient can damage generators and switchgear.

This is why the microgrid controller is the most expensive single item in the energy centre after the engines themselves — and why commissioning the mode transitions is a 4–6 week programme of testing.`,

      ann:{hook:"An islanded microgrid removes grid dependency from the investment thesis entirely. That is a fundamentally different risk profile for a DC — and a different asset class from a fund perspective.",text:"An islanded microgrid removes grid dependency from the investment thesis entirely. No EirGrid queue, no connection delay, no MDC risk. The premium for microgrid vs simple backup generation is 15–25% — but the value is immediate operational capability vs 4–8 years waiting."},
      mark:{hook:"Two protection setting groups on every relay, automatic changeover on island detection, anti-islanding disabled during scheduled islanding test events. Protection engineering is the critical path item here.",text:"Two protection setting groups on every relay, automatic changeover on island detection, fault level study for both modes. This is a 6-month protection engineering programme. And every time we add or remove a generator, we re-study. The microgrid is never \'finished\' — it evolves with the load. The protection study must model both grid-connected and islanded fault levels. In islanded mode, fault current drops by 60 to 80 percent. Every relay setting changes."},
      sarah:{hook:"A fully islanded gas microgrid has zero Scope 2 emissions — no grid import — but 100 percent Scope 1 from the on-site gas combustion. The reporting structure changes entirely on islanding.",text:"A fully islanded gas microgrid has zero Scope 2 (no grid import) but 100% Scope 1 (all on-site combustion). When we reconnect to the grid with 80% renewable CPPAs, the Scope 1/2 split reverses. The carbon accounting model changes fundamentally between islanded and grid-connected operation."},

    rhetoricTakeaways:{declan:"Islanding is not emergency mode — it is a designed operating state. Train the team to run in island mode monthly.",ann:"A microgrid that can island has fundamentally different risk profile — it is grid-independent.",mark:"Protection settings must work in both grid-connected and islanded modes — test both during commissioning.",sarah:"Microgrids enable higher renewable fractions by managing variability locally.",tom:"Microgrid controls add 8-12% to energy centre capex but unlock the full revenue stack."},
   scenario:{
      title:"Clonshaugh Microgrid Mode Transition",
      narrative:"Clonshaugh\'s energy centre is grid-connected, exporting 3 MW to the SEM while serving 9 MW DC load. ESB Networks trips the 38 kV feed for an unplanned outage.",
      question:"Describe the sequence of events in the first 60 seconds and identify the critical engineering parameters.",
      answer:`This is the most critical 60 seconds in the energy centre's life — the moment the grid disappears and the microgrid takes over. Everything has to happen in sequence, and the IT load must never notice. Here's the timeline.

T=0 ms: 38 kV grid loss detected by ROCOF relay at PCC (threshold: df/dt > 1.5 Hz/s).
T=50 ms: Grid-tie breaker opens (protection trip time 30–50 ms).
T=50–100 ms: BESS inverter switches to grid-forming mode, assumes voltage/frequency reference. IT load sees no interruption.
T=100 ms: Microgrid controller switches lead engine to isochronous mode (frequency master).
T=200 ms: All protection relays switch to islanded setting group (lower fault level settings).
T=500 ms: BESS begins load sharing with running engines. Frequency stabilised at 50 Hz ±0.2 Hz.
T=5 sec: Standby engines receive start command from microgrid controller.
T=30–60 sec: Additional engines synchronise and accept load. BESS reduces output as engines ramp.
T=60 sec: System stable in islanded mode. All 9 MW DC load served by on-site generation + BESS.

Critical parameters:
• BESS response time: < 100 ms (inverter-based, achievable)
• ROCOF detection: < 50 ms at 1.5 Hz/s threshold
• Protection changeover: < 200 ms (relay setting group switch)
• BESS capacity for bridge: 9 MW × 1 min = 150 kWh minimum (well within 10 MWh BESS)
• Frequency deviation: < 0.5 Hz during transition (EN 50549-1)

The point Declan would make: this sequence has to work perfectly every single time. The BESS is the hero — it bridges the gap in under 100 ms while the engines wake up. Without it, you have a 5-second blackout on every grid event.`
    ,

      constraintLesson:`Revenue stacking is the commercial model that makes energy centres financially viable.

A single revenue stream carries too much exposure to justify the capex on its own:
• CRM capacity payments alone: ~EUR 1,275k/yr on 10 MW at 0.85 de-rating (SEMO PCAR2829T-4 — T1). That is a 6–9 year payback on EUR 8–12M — borderline, and the clearing price, de-rating, and contract length are all auction risks.
• DS3/FASS services alone: EUR 200–400k/yr (DS3 Gate 12 outcomes — T1) = well beyond payback on its own.
• Wholesale energy sales at EUR 0.12/kWh (CRU Q4 2024 — T2): competitive with grid import but not profitable after gas cost.

Stacked together: CRM + DS3/FASS + wholesale arbitrage + avoided grid import cost = the energy centre starts to pay for itself.

The constraint: revenue stacking requires sophisticated optimisation. An energy management system (EMS) that optimises across all revenue streams simultaneously is essential.`,

   scenario:{
      title:"Clonshaugh SEM Revenue Model",
      narrative:"Clonshaugh\'s 10 MW energy centre is commissioned. Mark has installed SEM-compliant metering. Ann wants year-one revenue projection.",
      question:"Build the stacked revenue model for year one, assuming 80% availability and current market parameters.",
      answer:`The key insight here is that no single revenue stream justifies the energy centre on its own. It's the stack that makes the numbers work. Here's how the four streams add up in year one.

Note: CRM clearing price is T1 (SEMO PCAR2829T-4). DS3/FASS revenue based on Gate 12 published outcomes (T1). Gas and electricity prices from CRU Q4 2024 (T2). Arbitrage and self-consumption figures are Tier 4 indicative. All outputs are screening-level estimates subject to market conditions.

Revenue Stream 1 — CRM Capacity:
  This is the biggest line item. The grid pays us an annual retainer just for being available.
  10 MW × de-rating 0.85 = 8.5 MW qualified. At EUR 150k/MW/yr (SEMO PCAR2829T-4 — T1) = EUR 1,275k/yr.

Revenue Stream 2 — DS3/FASS System Services:
  The BESS and engines earn additional payments for responding to grid frequency events.
  BESS 5 MW + Engines 10 MW registered. Combined: EUR 250–350k/yr (Tier 4 — indicative, DS3 Gate 12 published outcomes). Mid: EUR 300k/yr.

Revenue Stream 3 — Wholesale Energy:
  Selling power during high-price periods when the SEM price exceeds our gas generation cost.
  Arbitrage during high-price periods. Net benefit: ~EUR 120k/yr (Tier 4 — indicative, based on SEM day-ahead price spread analysis).

Revenue Stream 4 — Avoided Grid Import:
  Every kWh we generate on-site at gas cost is cheaper than buying from the grid.
  Gas cost: EUR 0.04/0.45 = EUR 0.089/kWh. Grid: EUR 0.12/kWh (CRU Q4 2024 — T2). Saving: EUR 0.031/kWh.
  Estimated: EUR 300–500k/yr (Tier 4 — gas price dependent).

Year 1 Total: CRM EUR 1,275k + DS3 EUR 300k + Arbitrage EUR 120k + Self-consumption EUR 400k = EUR 2,095k.
Less: trading EUR 200k + gas fuel EUR 2.5M.
Net: energy centre reduces total energy cost by ~EUR 1.9M vs grid-only (Tier 4).

What this means for Ann: the energy centre isn't primarily a power plant — it's a financial instrument that generates four independent revenue streams while also supplying the DC's electricity. The CRM alone covers more than half the annual debt service on the capex.`

    userNeedStatement:"Understand the CRU\'s 80% renewable obligation, CPPA mechanics, GoOs vs additionality, and how to plan the 6-year glide path.",
    plainEnglish:"The CRU says 80% of your electricity must come from new Irish renewables within 6 years. Buying green certificates isn\'t enough — you need to invest in actual wind farms or solar parks.",
    grammar:{
      facts:[
        {term:"Corporate Power Purchase Agreement (CPPA)",
         definition:"A long-term contract (10–20 years) between a corporate buyer and a renewable developer, where the buyer agrees to purchase electricity at a fixed or indexed price, providing revenue certainty enabling the project to reach financial close.",
         plain:"A deal where you promise to buy electricity from a new wind farm for 10–20 years. Your promise is what gets the wind farm built — that\'s the additionality.",
         number:"Irish CPPA market: tenor 10–15 years. Price: EUR 0.06–0.09/kWh fixed (2025 market, Tier 4). Volume: 80% of DC annual demand required by CRU.",
         standard:"CRU/2025236 — T1; RE-Source Platform CPPA benchmarks — T2",
         feynman:{

           firstPrinciples:"Wind farms cost hundreds of millions to build. Banks won\'t lend unless the developer can prove someone will buy the electricity. A CPPA provides that proof — a creditworthy buyer (the DC) commits to purchasing a fixed volume at a fixed price for 10–15 years. The bank sees guaranteed revenue and approves the loan. No CPPA, no wind farm.",
           theTest:"You understand CPPAs when you can answer: Why can\'t a DC just buy renewable electricity from the spot market instead of committing to a 15-year CPPA? Answer: Because the CRU requires additionality — the renewable generation must be new. Spot market purchases from existing wind farms don\'t cause new capacity to be built."}},
        {term:"Guarantee of Origin (GoO)",
         definition:"A certificate proving that 1 MWh of electricity was generated from a renewable source. GoOs can be traded separately from the physical electricity.",
         plain:"A green certificate you can buy to claim your electricity is renewable. But the CRU says this isn\'t enough — the GoO must come from new Irish generation.",
         number:"Irish GoO price: EUR 1–3/MWh. European: EUR 0.50–2/MWh. CRU requires GoOs from additional Irish generation — European GoOs don\'t count.",
         standard:"EU Directive 2018/2001 Article 19 — T1; CRU/2025236 — T1",
         feynman:{
           analogy:"Think of it like a receipt from a shop. The receipt proves you bought something, but it doesn\'t mean the shop made that item just for you. A GoO proves someone generated 1 MWh of renewable electricity, but buying the certificate doesn\'t mean new renewable capacity was built.",
           firstPrinciples:"GoOs are tradeable certificates — 1 GoO = 1 MWh of renewable generation. They can be bought and sold separately from the actual electricity. A DC in Dublin can buy a GoO from a Norwegian hydro plant and claim \'renewable\' electricity — even though the electrons came from Irish gas. The CRU sees through this: it requires GoOs from additional Irish generation, not imports.",
           theTest:"You understand GoOs when you can answer: A DC buys European GoOs at EUR 2/MWh to cover 80% of demand. Does this satisfy the CRU\'s 80% renewable obligation? Answer: No — the CRU requires GoOs from additional renewable generation in the State. European GoOs from existing plants don\'t count."}},
        {term:"Additionality",
         definition:"The principle that renewable procurement must cause new renewable capacity to be built, rather than claiming credit for existing generation.",
         plain:"You can\'t just buy green certificates from an existing wind farm. Your money must cause a new wind farm to be built in Ireland.",
         number:"CRU 6-year glide path: demonstrate credible plan at connection application, with annual reporting.",
         standard:"CRU/2025236 Section on Renewable Electricity Obligation — T1",
         feynman:{
           analogy:"Think of it like planting a tree vs buying a certificate that says a tree exists somewhere. Additionality means you must actually cause a new tree to be planted — not just buy paperwork for one that\'s already growing. The CRU wants new wind farms, not certificates from old ones.",
           firstPrinciples:"Ireland needs more renewable energy to decarbonise. Buying certificates from existing wind farms doesn\'t add any new clean energy to the system — the same electrons would have been generated anyway. Additionality means the DC\'s demand must cause new renewable capacity to be built. A CPPA with a project that hasn\'t yet reached financial close is the mechanism.",
           theTest:"You understand additionality when you can answer: A wind farm has been operating in Co. Kerry since 2018. A DC signs a CPPA to buy its output. Is this additional? Answer: No — the wind farm was already built and generating. Additionality requires supporting a project that would not have been built without the CPPA commitment."}},

       {term:"Temporal Matching (24/7 CFE)",definition:"The emerging standard requiring renewable generation to match consumption on an hourly basis, not just annually. Annual matching allows a DC to claim 100% renewable while running on gas at night — temporal matching closes that gap.",plain:"Instead of buying enough wind certificates for a year on average, temporal matching means proving renewable supply for every single hour.",number:"Google targeting 24/7 carbon-free energy by 2030; Microsoft committed to temporal matching",standard:"EnergyTag standard for granular energy certificates — T2",feynman:{analogy:"Imagine claiming you eat healthy because you ate 365 salads last year — but all in January and fast food the rest. Annual matching is like that. Temporal matching means a salad every day.",firstPrinciples:"Electricity is consumed in real time. Wind at 3 AM does not offset gas at 3 PM. Annual matching uses statistical averaging to hide temporal mismatch. Hourly matching forces genuine alignment between renewable supply and actual consumption.",theTest:"A DC consumes 10 MW constantly with a 30 MW wind PPA at 40% capacity factor. Annual generation matches. But wind is zero 200 hours per year. Is the DC 100% renewable? Answer: annually yes, temporally no — 200 hours run on gas with no renewable offset."}}

      constraintLesson:`The 80% obligation creates a timing mismatch — the central commercial challenge of the CRU policy.

The DC needs to be operational before the CPPA generation comes online. During the glide path, the DC runs on gas (high Scope 1).

Gas generation Scope 1: ~0.46 kgCO₂/kWh electrical (at 45% efficiency, natural gas at 0.205 kgCO₂/kWh — SEAI 2026)
Grid import Scope 2: ~0.2241 kgCO₂/kWh (SEAI 2026, annual average — partially renewable grid)

Note: the 0.2241 figure is an annual average. The marginal grid emission factor — the actual carbon intensity when the DC is consuming — is often higher (0.35–0.45 kgCO₂/kWh during peak hours when gas plant is on the margin). When marginal emissions are considered, the Scope 1 penalty is smaller than the average comparison suggests.

Carbon breakeven occurs when sufficient CPPA volume displaces gas generation with renewable electricity.

Sarah\'s SFDR reporting must navigate this: Article 9 not achievable during gas-heavy glide path. Article 8 achievable if trajectory is credible.`,

   scenario:{
      title:"Clonshaugh 80% Renewable Pathway",
      narrative:"Clonshaugh\'s expanded DC consumes 9 MW × 8,760 hrs = 78,840 MWh/yr. CRU requires 80% from additional Irish renewables within 6 years.",
      question:"Size the CPPA portfolio and estimate annual cost.",
      answer:`The 80% renewable obligation is the largest financial commitment after the energy centre itself — potentially EUR 60M+ over 15 years. Here's how we size it and what it costs.

Note: CRU 80% obligation from CRU/2025236 (T1). CPPA pricing from RE-Source Platform benchmarks (T2). Capacity factor from Wind Energy Ireland (T2). Grid price from CRU Q4 2024 (T2). All costs are screening-level estimates subject to CPPA negotiation and wind resource.

Step 1: 80% target = 78,840 × 0.80 = 63,072 MWh/yr.
Step 2: Onshore wind capacity factor ~32%: 63,072 / (8,760 × 0.32) = 22.5 MW of wind capacity needed.
Step 3: CPPA at EUR 0.065/kWh, 15-year tenor. Annual: 63,072 × EUR 65/MWh = EUR 4.1M/yr.
  Compare grid: 63,072 × EUR 120/MWh (CRU Q4 2024 — T2) = EUR 7.6M/yr. Saving: EUR 3.5M/yr.
Step 4: Glide path: Year 1–2: 0% CPPA (wind farm in development). Year 3: 30%. Year 4: 50%. Year 5: 70%. Year 6: 80%.
Step 5: Volume buffer 10%: contract 24.8 MW onshore. Low-wind shortfall: EUR 200–400k spot purchases.

The critical timing point: the CPPA must be procured in year 1–2 because a wind farm takes 3–5 years from contract to first generation. If procurement is delayed to year 3, the glide path becomes impossible without buying expensive spot-market certificates — which may not even satisfy the CRU's additionality requirement.

What this means in practice: the 80% renewable obligation is not just a compliance checkbox — it is a EUR 60M+ strategic procurement that must start on day one. The CPPA saves roughly EUR 3.5M per year versus grid import, but only if the wind capacity is contracted early enough to match the glide path. Ann needs to budget EUR 200–400K for advisory and legal costs upfront, and Tom needs to model the volume shortfall risk in low-wind years. Get this wrong and the entire connection agreement is at risk.`
    ,

    grammar:{
      facts:[

         definition:"Under CRU/2025236, System Operators must assess each DC connection application against: location, dispatchable generation provision, and renewable electricity plan.",

         standard:"CRU/2025236 Section 6.2 Direction — T1",

           firstPrinciples:"Before CRU/2025236, a DC applied for a grid connection and EirGrid assessed grid capacity. Now the assessment has three dimensions: location (is the local grid constrained?), generation (does the DC provide its own dispatchable power?), and renewable plan (can the DC show a credible path to 80% renewable?). Fail any one and the connection may not be offered.",

        {term:"Mandatory Demand Curtailment (MDC)",
         definition:"A provision allowing SOs to instruct affected DCs to reduce or cease grid import at short notice. DCs with CRU/2025236-compliant dispatchable generation are exempt.",
         plain:"If you don\'t have your own generation, the grid operator can tell you to switch off. If you do have it, they can\'t.",
         number:"MDC applies to DCs connected under the previous 2021 policy that lack compliant on-site generation. Does NOT apply to new DCs with compliant energy centres.",
         standard:"CRU/2025236; CRU2024001 — T1",
         feynman:{
           analogy:"Think of it like a water restriction during a drought. If you don\'t have your own well, the council can tell you to stop watering your garden. If you do have a well, you\'re exempt. MDC is the electricity version — no own generation means the grid can tell you to reduce or stop importing.",
           firstPrinciples:"When the grid is under stress (demand exceeds available supply), someone has to reduce consumption. MDC gives system operators the power to instruct non-compliant DCs to reduce or cease grid import at short notice. DCs with CRU/2025236-compliant energy centres are exempt — they can island and run independently.",
           theTest:"You understand MDC when you can answer: Clonshaugh has a 5 MVA grid connection but no energy centre. Can EirGrid curtail its supply? Answer: Yes — without compliant on-site generation, Clonshaugh is subject to MDC. Building an energy centre would make it exempt."}},
        {term:"Annual Renewable Reporting",
         definition:"Mandatory self-reporting by DCs on renewable energy usage, emissions, and measures to move to zero emissions. Requirements embedded in grid connection agreements.",
         plain:"Every year you must prove to the CRU how much of your electricity came from renewables, what your emissions were, and what you\'re doing to reduce them.",
         number:"Reporting aligned with EED Article 12 (for DCs > 500 kW IT): PUE, WUE, CUE, REF published annually.",
         standard:"CRU/2025236 — T1; EU EED 2023/1791 Article 12 — T1",
         feynman:{
           analogy:"Think of it like filing your tax return — but for energy. Once a year, you must prove to the CRU exactly how much of your electricity was renewable, what your emissions were, and what you\'re doing about it. Incomplete or late returns risk your connection agreement, not just a fine.",
           firstPrinciples:"The CRU embeds reporting obligations in the grid connection agreement itself — making compliance contractual, not just regulatory. You must report: renewable energy percentage vs glide path target, GoO certificates retired, generation dispatch data, and emissions. This data also serves EED Article 12 (PUE/WUE/CUE disclosure) and EPA emissions returns.",
           theTest:"You understand annual reporting when you can answer: Clonshaugh reports 45% renewable in year 3 but the glide path target is 30%. Is it compliant? Answer: Yes — exceeding the target is fine. The risk is falling behind. If Clonshaugh reported 20% against a 30% target, the CRU could review the connection agreement."}},
      {term:"CRU/2025236",definition:"December 2025 CRU decision on DC grid connections.",plain:"The single most important document for anyone building or expanding a DC in Ireland. Published December 2025, it rewrites the rules: you must now bring your own generation, participate in the electricity market, and prove an 80 percent renewable pathway before the CRU will approve your grid connection.",number:"Dispatchable generation matching MIC, SEM participation, 80 percent renewable (6-year glide), location assessment, annual reporting.",standard:"CRU/2025236",feynman:{analogy:"Like planning permission for grid connections.",firstPrinciples:"DCs must bring their own generation and renewables. Contribute to the system, not just consume.",theTest:"50 MW in Dublin. Requirements? Answer: 50 MW dispatchable in SEM, 80 percent renewable plan, Dublin is constrained."}},{term:"Flexible connection framework",definition:"Forthcoming CRU framework for curtailable connections with faster processing.",plain:"Instead of waiting years for a firm grid connection that guarantees full power at all times, you agree to accept reduced import during peak periods — maybe 50 to 200 hours per year. In exchange, the CRU processes your connection faster. Your microgrid covers the shortfall when the grid curtails.",number:"Expected post-March 2026. Curtailment: 50 to 200 hours per year in constrained areas.",standard:"CRU/2025236 Section 6.2",feynman:{analogy:"Like an airline overselling seats. You accept bumping risk for a cheaper ticket.",firstPrinciples:"Firm connections take years. Flexible ones accept temporary curtailment. The DC covers shortfall with on-site generation.",theTest:"20 MW flexible curtailed to 15 MW. What happens? Answer: Microgrid ramps 5 MW. If it cannot, shed 5 MW IT load."}}

      constraintLesson:`The reporting obligation creates a data management challenge that many DC operators underestimate.

To report accurately, you need:
1. Metered generation data from every engine and BESS (15-minute resolution, SEMO standard)
2. GoO certificates matched to CPPA volumes and retired in the registry
3. Gas consumption metered and reconciled to generation output (for Scope 1)
4. PUE, WUE, CUE, REF calculated per EN 50600-4 methodology
5. All auditable and aligned with EED Article 12 deadlines

Most DC operators\' BMS/DCIM systems track energy for operations, not regulatory reporting to multiple authorities.

Engineering lesson: specify the metering and data infrastructure for compliance reporting at design stage. Retrofitting regulatory metering into an operational energy centre is disruptive and expensive.`,

   scenario:{
      title:"Clonshaugh CRU Readiness Calendar",
      narrative:"Clonshaugh\'s energy centre is commissioned Q1 2027. The 6-year glide path to 80% renewable starts.",
      question:"Map the compliance obligations and key milestones for years 1–6.",
      answer:`The compliance calendar is driven by the CRU connection agreement — these aren't optional reports, they're contractual obligations tied to the grid connection. Miss a deadline and the CRU can review your connection terms. Here's the 6-year roadmap.

Year 1 (2027): Commission metering (SEMO, CRU, EPA grade). Register Trading Site. First CRU annual report. EED Article 12 first disclosure. CPPA: 0% (wind farm in development).
Year 2 (2028): Second CRU report. CPPA target: 0–10% (financial close, construction starting).
Year 3 (2029): CPPA target: 30% (first phase generating). First GoO retirement.
Year 4 (2030): CPPA target: 50%. Carbon tax reaches EUR 100/tCO₂ (Finance Act). Material Scope 1 reduction.
Year 5 (2031): CPPA target: 70%. Near-compliant.
Year 6 (2032/33): CPPA target: 80%. Obligation met. Full CRU Readiness. MDC exemption confirmed.

The risk that keeps Ann awake: a single CPPA project delay pushes the whole glide path back. The mitigation is to contract with 2–3 separate wind/solar projects so no single project failure breaks the trajectory. The metering infrastructure must be right from day one — you cannot retrospectively prove compliance with data you didn't collect.`

      facts:[
        {term:"Hydrogen Blending",

         number:"20% H₂ blend by volume reduces CO₂ by ~7%. Working: H₂ energy density is ~1/3 of CH₄ by volume, so 20% H₂ by volume ≈ 7% by energy content → ~7% CO₂ reduction (CIBSE/IEA methodology — T2). 100% hydrogen eliminates combustion CO₂ entirely.",

         feynman:{

           firstPrinciples:"Hydrogen has about one-third the energy of natural gas per unit volume. So 20% hydrogen by volume only replaces about 7% of the energy — and therefore only cuts CO₂ by about 7%. At 100% hydrogen, combustion CO₂ is zero (only water vapour), but NOx emissions increase because hydrogen burns hotter.",
           theTest:"You understand hydrogen blending when you can answer: If Gas Networks Ireland starts blending 20% hydrogen by volume, how much does a DC\'s Scope 1 fall? Answer: Only ~7% — because hydrogen has lower energy density per volume. 20% by volume ≈ 7% by energy content ≈ 7% CO₂ reduction."}},
        {term:"Hydrotreated Vegetable Oil (HVO)",

         plain:"Cooking oil recycled into fuel. Drops straight into diesel engines. Cuts carbon by 90% — the quickest win available today.",
         number:"HVO cost premium vs diesel: 15–25%. CO₂: 0.27 kgCO₂/L (lifecycle) vs diesel 2.68 kgCO₂/L.",
         standard:"EN 15940 — T1; SEAI Emission Factors — T1; EPA IE Licence guidance — T1",
         feynman:{

           firstPrinciples:"HVO is made from waste cooking oils and animal fats through a process called hydrotreating. The result is a fuel chemically similar to diesel but derived from biological waste, not fossil sources. On a well-to-wheel lifecycle basis, the CO₂ savings are ~90% because the carbon in HVO was recently captured from the atmosphere by the plants/animals it came from.",

      constraintLesson:`The honest constraint on hydrogen for Irish DCs is supply, not technology.

The engines are ready (5–20% blend today, 100% within 5–10 years).
The directive is in place (2024/1788, transpose August 2026).
The gas grid exists.

What doesn\'t exist: green hydrogen production at scale in Ireland. No electrolyser capacity of significance. National Hydrogen Strategy in draft. First large-scale projects 5–8 years from production.

Practical fuel transition pathway:
1. Years 1–3: Natural gas (available, affordable, lower Scope 1 than diesel)
2. Years 2–5: Biomethane blending via gas grid (as Irish production scales)
3. Years 3–7: HVO for backup diesel generators (immediate Scope 1 reduction)
4. Years 5–10+: Hydrogen blending increasing
5. Years 10+: High-percentage or 100% hydrogen (if supply materialises)

Engineering response: specify hydrogen-ready from day one, plan commercially for biomethane and HVO. Don\'t bet the investment on hydrogen arriving by a specific date.`,

   scenario:{
      title:"Clonshaugh Fuel Transition Roadmap",
      narrative:"Clonshaugh\'s energy centre runs on natural gas. The board wants a fuel transition plan to zero Scope 1.",
      question:"Design a 10-year fuel transition plan with Scope 1 reduction at each stage.",
      answer:`The board wants zero Scope 1, but the honest answer is that's a 10-year journey — not a switch you flip. Here's the staged approach, starting with what's achievable today and building toward what's coming tomorrow.

Note: Gas emission factor from SEAI 2026 (T1). Biomethane premium from SEAI Biomethane Strategy (T2). Hydrogen figures are Tier 4 indicative — timeline highly uncertain. All cost projections are screening-level.

Baseline: 10 MW at 45% efficiency, 100% natural gas.
Gas consumption: 9 MW × 8,760 hrs / 0.45 = 175,200 MWh gas.
Scope 1 baseline: 175,200 × 0.205 kgCO₂/kWh (SEAI 2026 — T1) = 35,916 tCO₂/yr.

Year 1–2: 100% natural gas. Scope 1: 35,916 tCO₂/yr. Action: confirm H₂-ready engines are specified.
Year 3–4: 20% biomethane blend. Scope 1: 28,733 tCO₂/yr (−20%). Extra cost: ~EUR 1.4M/yr (35,040 MWh × EUR 0.04/kWh premium — Tier 3, SEAI Biomethane Strategy; GNI published tariffs).
Year 5–6: 10% H₂ + 20% biomethane (30% low-carbon). Scope 1: 25,141 tCO₂/yr (−30%).
Year 7–8: 20% H₂ + 30% biomethane (50% low-carbon). Scope 1: 17,958 tCO₂/yr (−50%).
Year 9–10: 50% H₂ + 30% biomethane (80% low-carbon). Scope 1: 7,183 tCO₂/yr (−80%).
Plus: diesel backup fleet → HVO in year 1: approximately 90% lifecycle carbon reduction on standby operation.
Note: hydrogen timeline highly uncertain. All H₂ figures Tier 4 — indicative.

The pragmatic message for Declan and Ann: biomethane and HVO are available today. Hydrogen is coming but nobody can guarantee when. Verify that engine specifications include H₂-readiness (2–5% capex premium), plan commercially around biomethane, and model hydrogen as upside — not base case. The quickest win is switching diesel backup to HVO in month one — no engineering change, immediate carbon reduction.`

        {term:"Levelised Cost of Energy (LCOE)",

           firstPrinciples:"LCOE = total lifetime cost ÷ total lifetime energy produced, expressed as EUR/MWh. For Clonshaugh\'s energy centre: total cost ~EUR 126M over 20 years, producing ~1.5M MWh = ~EUR 85–110/MWh. Compare: grid import at EUR 120/MWh, CPPA wind at EUR 65–90/MWh. The energy centre\'s blended LCOE is competitive with grid — and has price certainty.",

      constraintLesson:`The integrated strategy must resolve five tensions:

1. Capex timing: build big now (scale, faster compliance) vs build small and grow (lower risk, better tech each phase)
2. Fuel strategy: natural gas (available, Scope 1) vs biomethane/hydrogen (lower carbon, higher cost, uncertain supply)
3. Revenue: maximise SEM revenue (aggressive) vs maximise reliability (conservative)
4. Renewable: single large CPPA (concentrated risk) vs portfolio (diversified but complex)
5. Compliance: front-load (expensive now, risk-free) vs glide path (cheaper now, compliance risk)

   scenario:{
      title:"Clonshaugh Energy Centre — Full Business Case",
      narrative:"The fund has approved feasibility. Tom and Ann need the 20-year investment summary.",
      question:"Present the phased investment, cumulative cost vs grid-only, and key decision milestones.",
      answer:`Here's how we structure the full business case for Ann and Tom. There are three parts: first, the phased build programme showing when money goes out and what gets built; second, a 20-year total cost comparison against doing nothing (grid-only); and third, the critical path milestones that drive the programme.

Note: All capex figures are Tier 4 indicative (Thunder Said Energy 2025; BNEF H2 2025; Jenbacher/Wärtsilä published ranges). Grid price from CRU Q4 2024 (T2). CPPA pricing from RE-Source Platform (T2). 20-year TCO methodology per RICS Life Cycle Costing guidance (T2). All outputs are screening-level estimates subject to detailed design and tender.

PHASED INVESTMENT:
The fund doesn't write a single cheque for EUR 15M. The investment phases over 4 years, with each phase earning revenue before the next one starts. Phase 1 proves the concept and de-risks Phase 2.

Year 0: Feasibility + RIBA Stage 2: EUR 0.25M
Year 1: Phase 1 (2 × 2 MW + 5 MWh BESS + controller): EUR 6.2M. CPPA procurement initiated.
Year 2: Phase 1 operational. SEM registered. First CRM bid.
Year 3: Phase 2 (+3 × 2 MW + 5 MWh expansion + metering): EUR 8.25M
Year 4: Phase 2 operational. Full 10 MW. Dispatch Licence active.
Year 5: First CPPA generation (30%). Year 6–7: Ramp to 80%.

Total capex (matching Tom): Engines EUR 10M + BESS EUR 4M + Controls EUR 0.5M + Metering EUR 0.2M = EUR 14.7M. Plus feasibility EUR 0.25M = ~EUR 15M (Tier 4 — indicative, subject to detailed design and tender).

20-YEAR COMPARISON:
This is the number Ann cares about most — what does 20 years cost if we build the energy centre vs what does it cost if we stay on the grid?

Grid-only: 9 MW × 8,760 hrs × EUR 0.12/kWh (CRU Q4 2024 — T2) × 20 yrs = EUR 189M + diesel backup EUR 10M = ~EUR 199M.
Energy centre: Capex EUR 15M + Gas EUR 45M + CPPA EUR 66M + Maint/compliance EUR 20M − Revenue EUR 20M = ~EUR 126M.
20-year saving: ~EUR 73M. Annual average: ~EUR 3.7M/yr.

KEY MILESTONES:
The timeline is driven by two long-lead items — engine procurement (12 months from order) and CPPA wind farm development (3–5 years from contract). Everything else sequences around these.

Month 0: Board approval. Month 3: Engine procurement (12-month lead). Month 6: CPPA RFP.
Month 12: Phase 1 construction. Month 18: Commissioned + SEM. Month 24: Phase 2 start.
Month 30: Phase 2 commissioned. Month 36–60: CPPA wind farms built. Month 60–72: 80% renewable met.

In practical terms: the energy centre pays for itself through avoided grid costs and SEM revenue. The fund invests EUR 15M over 4 years and saves EUR 73M over 20 — a net benefit of EUR 58M. The CRU Readiness obligation that triggered this investment actually improves the asset's financial position compared to doing nothing.`

const GLOSSARY_012 = [
  {term:"Energy Centre",def:"Dedicated on-site facility housing dispatchable generation, BESS, switchgear, and controls supplying a data centre."},
  {term:"Dispatchable Generation",def:"Generation capacity that can be started, stopped, and ramped on demand — not dependent on weather conditions."},
  {term:"CRU Direction (CRU/2025236)",def:"CRU policy requiring new large energy users to provide on-site dispatchable generation and meet renewable obligations."},
  {term:"BESS (Battery Energy Storage System)",def:"Electrochemical storage providing grid services, UPS bridging, peak shaving, and renewable time-shifting."},
  {term:"Microgrid",def:"Local energy system capable of operating connected to or islanded from the main grid, with its own generation, storage, and controls."},
  {term:"Islanding",def:"Controlled disconnection from the national grid allowing the microgrid to operate autonomously using on-site generation."},
  {term:"Point of Common Coupling (PCC)",def:"The electrical point where the data centre microgrid connects to the distribution or transmission network."},
  {term:"Gas Reciprocating Engine",def:"Internal combustion engine running on natural gas, providing fast-start dispatchable generation with 5-minute ramp capability."},

  {term:"Power Purchase Agreement (PPA)",def:"Long-term contract to buy renewable electricity directly from a generator, typically 10–15 years."},
  {term:"Corporate PPA (cPPA)",def:"PPA between a corporate buyer and a renewable generator, providing price certainty and additionality."},
  {term:"Guarantees of Origin (GoO)",def:"Certificates proving electricity was generated from a specific renewable source — 1 GoO = 1 MWh."},
  {term:"Additionality",def:"Principle that renewable procurement should fund NEW generation capacity, not just rebadge existing supply."},
  {term:"Capacity Remuneration Mechanism (CRM)",def:"SEM auction mechanism paying generators for making reliable capacity available to the grid."},
  {term:"T-4 Auction",def:"CRM auction held 4 years ahead of the delivery year — the primary capacity auction in the SEM."},
  {term:"De-rated Capacity",def:"The firm capacity a generator can reliably deliver, adjusted for technology-specific availability factors."},

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}
