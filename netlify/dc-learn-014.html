<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}

/* ═══ MODULE 014 VG ADDITIONS ═══ */
.chain-hero{position:relative;border-radius:12px;overflow:hidden;margin-bottom:16px;height:200px}
.chain-hero img{width:100%;height:100%;object-fit:cover;display:block}
.chain-hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 24px;background:linear-gradient(transparent,rgba(0,0,0,0.85))}
.chain-hero-overlay h2{color:#fff;font-size:1.4rem;margin:0 0 4px;font-family:var(--font-sans)}
.chain-hero-overlay p{color:rgba(255,255,255,0.75);font-size:0.85rem;margin:0}
.chain-level{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.chain-level:hover{border-color:var(--green)}
.chain-level.active{border-color:var(--green);background:var(--green-dim)}
.calc-result{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;text-align:center}
.sc-question{font-weight:600;color:var(--text-bright);margin-bottom:10px}
.sc-answer{font-size:13px;white-space:pre-wrap;line-height:1.8}
.checklist{list-style:none;padding-left:0}.checklist li{padding:4px 0 4px 24px;position:relative;font-size:13px;line-height:1.6}.checklist li::before{content:"☐";position:absolute;left:0;color:var(--green);font-size:14px}
</style>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-LEARN-014 v2.4.9</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

{id:"L1",level:1,name:"Why Air Cooling Hits a Wall",icon:"🌡️",component:"Thermal Limit",available:true,
clockQuote:"You can upgrade software. You can upgrade servers. You cannot upgrade the specific heat capacity of air. At 30 kW per rack, the physics changes the conversation — and the conversation changes the building.",
userNeedStatement:"Understand the physics of why air cooling cannot scale beyond 25 kW/rack and why GPU power trajectories make liquid cooling inevitable.",
plainEnglish:"Air is a poor carrier of heat. At rack densities above 25 kW, you simply cannot move enough air through a rack to keep chips alive. GPU power is doubling every generation — air cooling has run out of road.",
grammar:{facts:[
{term:"Specific Heat Capacity of Air vs Water",definition:"Air has a specific heat capacity of 1.005 kJ/kg·K; water has 4.186 kJ/kg·K. Water carries approximately 3,500 times more heat per unit volume than air at equivalent flow velocity.",plain:"Water is roughly 3,500 times better at carrying heat than air. That single number explains the entire shift.",number:"Air: 1.005 kJ/kg·K. Water: 4.186 kJ/kg·K. Volumetric ratio ~3,500:1.",standard:"ASHRAE TC 9.9, 5th Edition 2021; fundamental thermodynamics",feynman:{analogy:"Think of it like carrying shopping bags. Air is like carrying one bag at a time — slow and limited. Water is like loading a van — it moves thousands of times more in each trip. That is why liquid cooling works.",firstPrinciples:"Heat moves through materials at different rates. Air absorbs about 1 kJ of heat per kilogram per degree. Water absorbs 4.2 kJ — four times more per kilo. But water is also 800 times denser. Multiply those together: water carries roughly 3,500 times more heat per unit volume at the same flow speed.",theTest:"You understand this when you can answer: if a GPU produces 1,200 W of heat and you have a choice between blowing air over it or running water past it, which one lets you use a smaller, quieter cooling device? Answer: water, because it absorbs 3,500 times more heat per litre — the pipes and cold plates can be tiny compared to the heatsinks and fans air cooling needs."},soWhat:"This ratio is the entire business case for liquid cooling — water moves thousands of times more heat in the same space."},
{term:"Air Cooling Maximum Rack Density",definition:"With contained hot/cold aisle and in-row cooling, the absolute physical limit for air cooling is approximately 25 kW per rack.",plain:"No matter how good your containment is, air cooling maxes out around 25 kW per rack. Most facilities struggle above 15 kW.",number:"25 kW/rack absolute maximum (contained). 10–15 kW/rack practical limit (legacy).",standard:"AIMEP DC Standards Reference v1.2 Section 4; Uptime Institute 2024",feynman:{analogy:"Think of it like trying to cool a room with a desk fan. One fan handles a small room fine. But if you put ten ovens in that room, no number of desk fans will keep it cool — you need a different approach entirely.",firstPrinciples:"Air can only carry so much heat per cubic metre. To cool a rack, you blow cold air through it. At 6 kW, normal airflow works. At 15 kW, you need containment and high-speed fans. At 25 kW, you have reached the physical limit — air simply cannot move enough heat away, regardless of fan speed or duct design.",theTest:"You understand this when you can answer: a client says their contained hot aisle can handle 30 kW/rack — are they right? Answer: no. 25 kW is the absolute ceiling with best-in-class air containment. 30 kW requires liquid cooling."},soWhat:"Any tenant requiring more than 25 kW per rack forces a technology decision that changes the entire facility infrastructure."},
{term:"GPU TDP Trajectory",definition:"NVIDIA H100: 700 W/GPU. B200: 1,000–1,200 W. B300: 1,100–1,400 W. An 8-GPU server at 1,200 W/GPU = 9.6 kW from GPUs alone.",plain:"Each generation of GPU doubles the heat. An 8-GPU Blackwell server produces nearly 10 kW of heat from GPUs alone.",number:"H100: 700 W → B200: 1,000–1,200 W → B300: 1,100–1,400 W per GPU.",standard:"NVIDIA published specifications; Tier 3 manufacturer data",feynman:{analogy:"Think of it like lightbulbs getting brighter every year, but the lamp fitting stays the same size. Eventually, the bulb produces so much heat that the fitting melts. GPU power is doing the same to rack cooling.",firstPrinciples:"Every GPU generation processes more data by running more transistors faster — which produces more heat. The H100 produced 700 watts. The next generation, Blackwell, produces 1,200 watts. Eight GPUs in one server means nearly 10 kW just from the processors, before you count memory, storage, or networking.",theTest:"You understand this when you can answer: if an 8-GPU Blackwell server produces 9.6 kW from GPUs alone, and your rack cooling budget is 6 kW total, how many of these servers fit in one rack on air cooling? Answer: zero — a single server already exceeds the rack cooling capacity."},soWhat:"GPU power doubling each generation means any facility plan without liquid cooling becomes obsolete within one product cycle."},
{term:"NVIDIA GB200 NVL72 Rack",definition:"72 Blackwell GPUs, 36 Grace CPUs. 120 kW total. 1,360 kg. 600 × 1,068 × 2,236 mm. DLC mandatory.",plain:"NVIDIA’s flagship AI rack consumes 120 kW and weighs 1.4 tonnes. Air cooling is physically impossible.",number:"120 kW/rack. 72 GPUs. 1,360 kg.",standard:"NVIDIA GB200 NVL72 spec; DGX GB User Guide",feynman:{analogy:"Think of it like a Formula 1 car — it cannot use a standard petrol pump because the fuel flow is too fast. The NVL72 cannot use standard air cooling because the heat flow is too intense. Both are purpose-built with their own supply systems.",firstPrinciples:"The NVL72 packs 72 GPUs and 36 CPUs into one rack. Total power is 120 kW — twenty times what a standard rack consumes. It weighs 1,360 kg — four times a normal rack. NVIDIA builds the liquid cooling directly into the rack because no external air cooling system exists that could handle 120 kW in that space.",theTest:"You understand this when you can answer: can you order an air-cooled NVL72? Answer: no. NVIDIA does not offer an air-cooled option because it is physically impossible to dissipate 120 kW from that form factor using air."},soWhat:"The NVL72 sets the market standard — if your facility cannot host it, you cannot compete for premium AI tenants."},
{term:"NVIDIA GB200 NVL72",definition:"NVIDIA's 2025 GPU platform requiring 132 kW per rack with direct-to-chip liquid cooling as the standard configuration.",plain:"The latest NVIDIA AI GPU rack that uses 132 kilowatts and requires liquid cooling as standard. Air cooling cannot handle this density.",number:"132 kW per rack. 72 GPUs per rack. TDP per GPU: 1,200 W. Direct-to-chip cooling standard. Successor roadmap to 240 kW per rack.",standard:"NVIDIA GB200 NVL72 Specification (2025)",feynman:{analogy:"Like a Formula 1 engine that cannot run without its water cooling system. The GB200 rack generates so much heat that liquid cooling is not optional, it is part of the design.",firstPrinciples:"At 132 kW per rack, air cooling would require hurricane-force airflow. Liquid cooling removes heat 3,500 times more efficiently per unit volume. NVIDIA designed the GB200 with integrated cold plates because there is no air-cooled alternative at this density.",theTest:"Can a GB200 NVL72 rack run on air cooling? Answer: No. It is designed for direct-to-chip liquid cooling. There is no air-cooled SKU. The 132 kW heat load exceeds what any practical air system can remove from a single rack."},soWhat:"This is not a niche product — it is the baseline for enterprise AI, and it mandates liquid cooling as a non-negotiable requirement."}
],whatItLooksLike:"In a legacy hall, CRAHs push cold air under raised floor into racks at 6–10 kW. In an AI hall, pipes carry water to CDUs that feed liquid directly into servers.",siteChecklist:["Identify current avg/peak kW/rack from BMS or PDU","Check CRAH supply/return air temps","Measure hot aisle temp — if >40°C, at limit","Review GPU procurement plans"]},
logic:{causeAndEffect:[
{cause:"GPU thermal design power doubles with each new architecture generation while standard rack form factors remain fixed",effect:"Heat flux density exceeds air-cooled heatsink capacity, causing thermal throttling",insight:"This is a step function. A facility cooling H100 (40 kW) cannot cool Blackwell (120 kW) with the same infrastructure."},
{cause:"Air cooling requires large heatsinks and airflow gaps that physically increase the distance between adjacent GPUs in the chassis",effect:"NVLink copper interconnects must be longer to bridge the increased inter-GPU distance, adding signal latency and attenuation",insight:"DLC enables tighter GPU packing, shorter interconnects. The NVL72 architecture depends on DLC for copper NVLink distances."},
{cause:"A facility installs DLC cold plates but keeps the CRAH units running at full capacity.",effect:"The cold plates remove 70 to 80 percent of rack heat directly. The CRAHs are cooling air that is already cool. Cooling energy is wasted on an empty thermal load.",insight:"When DLC is deployed, CRAH capacity must be proportionally reduced or the fans de-staged. The energy saving only materialises if the air cooling system responds to the reduced load."}
],constraintLesson:"Air cooling is asymptotic. Improving containment, raising supply temps — all produce diminishing returns above 15 kW/rack.\n\nMost Irish facilities hit a practical wall at 15–18 kW/rack. Clonshaugh at 6 kW/rack is typical of 2013-era builds.\n\nGPU power trajectory shows 600 kW/rack (Vera Rubin NVL144). No air-side innovation bridges a 24× gap.",
weakestLink:{whatsWrong:"We can handle higher densities by adding more CRAHs.",whatsRight:"Air cooling is limited to ~25 kW/rack. The NVL72 at 120 kW is 5× beyond this.",howToGetThere:"Commission thermal survey. Map kW/rack. Budget €50–100k for assessment (Tier 3 — SCSI benchmarks; RICS NRM1, indicative)."}},
rhetoric:{declan:{hook:"I have run air-cooled halls for 12 years and we got to 20 kW with good containment. At 120 kW per rack, air cooling is not the answer — the physics will not allow it.",text:"I’ve run air-cooled halls for 12 years. With containment we got to 20 kW. But 120 kW? That’s a different building. We hit the wall at 15 kW per rack. The CRAH units were at maximum fan speed, the underfloor plenum was choking, and the hot aisle was 38 C. The tenants were complaining about throttling. That is when we started looking at liquid."},ann:{hook:"If we cannot support liquid cooling in the existing halls, we cannot host the AI workloads that command 3 times the revenue per kW. That is the investment decision this assessment must answer.",text:"If we don’t invest in liquid cooling readiness, we can’t host premium-revenue workloads. Air-cooled: €80–100/kW/month (Tier 3 — CBRE/JLL Irish DC market data, indicative). DLC: 20–40% premium (Tier 3 — Uptime Institute 2024, indicative). The tenant pipeline has changed. Two years ago, everyone wanted 6 kW racks. Now every enquiry is 30 kW minimum, some are asking for 80 kW. If we cannot offer liquid cooling, we lose those tenants to new-build competitors."},mark:{hook:"Water moves approximately 3,500 times more heat per unit volume than air. At 120 kW per rack, the air velocity required for conventional cooling would destroy the equipment before it cooled it.",text:"Water moves ~3,500× more heat per unit volume. At 120 kW/rack, air velocities would create acoustic and structural problems. Water carries 3,500 times more heat per unit volume than air. That is not a small improvement. It is a fundamentally different physics. The question is not whether liquid cooling will replace air, it is when."},sarah:{hook:"DLC consumes 60 to 80 percent less cooling energy than equivalent air-cooled infrastructure. EU Taxonomy PUE 1.3 becomes achievable with DLC where it would be impossible with air cooling at this density.",text:"DLC consumes 60–80% less cooling energy. EU Taxonomy PUE 1.3 becomes easier to hit. EU Taxonomy requires PUE 1.3 or below. At Clonshaugh PUE 1.50, we fail. Liquid cooling is the fastest path to Taxonomy compliance because it eliminates most of the cooling overhead."},tom:{hook:"Assessment cost at 15 to 30 thousand euros for structural, power, and cooling feasibility across the existing halls. That assessment determines whether 3 to 5 million euros of retrofit is viable or not.",text:"The following uses indicative figures. Input assumptions: retrofit and new-build costs Tier 2 — AIMEP DC Standards Ref v1.2 Section 7; Schneider Electric Feb 2026; SCSI benchmarks. All outputs screening-level, subject to detailed design and tender. New build: €10,000–15,000/kW IT. Retrofit DLC: €3,000–5,000/kW IT. Retrofit is 50–70% cheaper. A full air-to-liquid retrofit for one hall: 800K to 1.5M euro. But the density increase from 6 kW to 30 kW per rack means 5 times the revenue from the same floor area. Payback: 18 to 30 months. At 0.12 euro per kWh, every kW of cooling overhead costs 1,050 euro per year. At PUE 1.50, that is 1.2 million per year in cooling alone for a 2,400 kW facility."}},
rhetoricTakeaways:{declan:"Air cooling has a ceiling at 25 kW — plan for liquid before the first AI tenant enquiry.",ann:"Facilities that cannot cool 30+ kW racks lose the fastest-growing tenant segment entirely.",mark:"Design the cooling transition now — the physics gap between 25 kW air and 120 kW liquid cannot be bridged incrementally.",sarah:"Liquid cooling is the fastest path to PUE 1.3 and EU Taxonomy compliance for high-density operations.",tom:"Retrofit at €3–5k/kW IT versus new build at €10–15k/kW IT (Tier 2 — AIMEP DC Standards Ref v1.2 Section 7; Schneider Electric Feb 2026; SCSI benchmarks, indicative) — the business case for transition is clear."},
scenario:{title:"Clonshaugh: Can legacy halls support 30 kW/rack?",narrative:"AI provider wants 40 racks at 30 kW/rack. Facility runs 6 kW/rack across 400 racks.",question:"Can existing air cooling support 40 racks at 30 kW each?",answer:"Additional IT = 40 × (30−6) = 960 kW. 30 kW/rack exceeds air cooling ceiling (25 kW). DLC mandatory.\nDLC captures ~75% (900 kW by liquid). Air handles ~25% (300 kW).\nSource: AIMEP DC Standards Ref v1.2 Section 4.",

{id:"L2",level:2,name:"Direct-to-Chip Cold Plate Technology",icon:"❄️",component:"Cold Plates",available:true,
clockQuote:"At 6 kW, air works. At 20 kW, air works harder. At 30 kW, air can't work hard enough — the specific heat capacity sets the ceiling. The medium has to change. That's not a preference. It's thermodynamics.",
userNeedStatement:"Understand how DLC cold plates work, what they connect to, and why they dominate AI cooling.",
plainEnglish:"A cold plate sits on the GPU/CPU with liquid flowing through channels inside it. Same principle as a car radiator, precision-engineered for a 1,200-watt GPU.",
grammar:{facts:[
{term:"Cold Plate",definition:"Machined metal block with internal micro-channels. Mounted directly onto CPU/GPU die via TIM. Absorbs heat by conduction, transfers via forced convection.",plain:"A liquid-cooled heatsink bolted to the chip. Coolant flows through tiny channels, picking up heat.",number:"Chip-to-coolant ΔT: 17–20°C at 500 W (DLC) vs >60°C (air).",standard:"ASHRAE TC 9.14; Schneider Electric March 2026",feynman:{analogy:"Think of it like a hot water bottle in reverse. A hot water bottle transfers heat from water to your body. A cold plate transfers heat from the chip to the water. Same physics, opposite direction.",firstPrinciples:"A GPU produces heat at its surface. If you press a block of copper with tiny channels onto that surface, and pump cool water through the channels, heat transfers from chip to copper to water. The temperature difference between chip and water is only 17–20°C because metal-to-liquid contact is very efficient — unlike air, which needs a 60°C+ gap.",theTest:"You understand this when you can answer: why does DLC use copper plates with micro-channels rather than just spraying water on the chip? Answer: micro-channels maximise the surface area where copper meets water, keeping thermal resistance extremely low (0.01–0.03 °C/W) while containing the coolant in a leak-proof system."},soWhat:"Cold plate thermal resistance determines whether a GPU runs at full performance or throttles — a few hundredths of a degree per watt matters."},
{term:"DLC Market Dominance",definition:"~43% of DC liquid cooling market by revenue (2025). ~75% of liquid-cooled rack deployments. Standard for NVIDIA GB200/GB300.",plain:"Three out of four liquid-cooled racks use cold plates, not immersion.",number:"43% revenue share, ~75% of deployments.",standard:"Mordor Intelligence Jan 2026; Dell’Oro Group Jan 2026",feynman:{analogy:"Think of it like how smartphones replaced feature phones — not because they were the only option, but because they solved most problems better than the alternatives. DLC is the smartphone of liquid cooling — it handles most densities with the least disruption.",firstPrinciples:"Three liquid cooling technologies exist: direct-to-chip (cold plates), single-phase immersion (oil bath), and two-phase immersion (boiling fluid). DLC wins on practicality — it works with standard rack form factors, standard server designs, and existing chilled water plants. That is why 75% of liquid-cooled racks use DLC.",theTest:"You understand this when you can answer: an operator asks why not go straight to immersion for a 30 kW/rack deployment. What is the engineering answer? Answer: at 30 kW, DLC handles the heat, fits existing racks, and costs less. Immersion only justifies its structural and operational complexity above 80 kW/rack."},soWhat:"DLC dominance means the supply chain, standards, and vendor ecosystem are all building around cold plates — the safest technology bet."},
{term:"Hybrid Heat Split",definition:"Cold plates remove 70–80% of server heat (CPUs, GPUs). Remaining 20–30% (networking, storage, PSUs) is air-cooled.",plain:"Even with DLC, you still need some air. Cold plates handle the big heat — networking and drives still need airflow.",number:"DLC: 70–80% by liquid. Air: 20–30% residual. Supermicro DLC-2 claims 98%.",standard:"NVIDIA DGX GB User Guide; Supermicro specs",feynman:{analogy:"Think of it like a house with radiators and an open fire. The radiators (liquid) handle most of the heating, but you still need ventilation (air) for the rooms without radiators. DLC is the same — cold plates handle 75% of heat, but networking cards and drives still need airflow.",firstPrinciples:"In a server, CPUs and GPUs produce the most heat and sit under cold plates. But networking ASICs, storage drives, and power supplies also generate heat — and they do not have cold plates. That residual 20–30% of heat still exhausts into the air. A DLC hall needs both pipe infrastructure and some air cooling capacity.",theTest:"You understand this when you can answer: if you install DLC on all GPUs in a rack, can you turn off the CRAHs entirely? Answer: no. Approximately 20–30% of rack heat (from networking, storage, PSUs) still needs air cooling."},soWhat:"The 20–30% air residual means DLC halls still need some air cooling — never design for 100% liquid capture."},
{term:"Cold plate thermal resistance",definition:"The resistance to heat transfer between the chip surface and the coolant inside the cold plate, measured in degrees C per watt. Lower is better.",plain:"How hard it is for heat to get from the chip into the water. A good cold plate has very low resistance.",number:"Typical copper microchannel cold plate: 0.03 to 0.06 C/W. At 700 W GPU TDP: 21 to 42 C temperature rise across the plate.",standard:"ASHRAE TC 9.9; Manufacturer specifications",feynman:{analogy:"Like the thickness of a blanket between you and a hot water bottle. A thin blanket transfers heat quickly (low resistance). A thick blanket insulates (high resistance). The cold plate must be the thinnest blanket possible.",firstPrinciples:"Heat flows from hot to cold through materials. The cold plate sits between the chip and the coolant. Its thermal resistance determines how much temperature difference is needed to transfer the heat. Lower resistance means the coolant can be warmer while still keeping the chip cool.",theTest:"A cold plate has 0.05 C/W resistance. A 1,000 W GPU runs through it. What is the temperature rise? Answer: 50 C across the plate. If coolant enters at 35 C, the chip junction is at 85 C minimum."},soWhat:"Thermal resistance is the hidden spec that determines GPU lifespan and compute revenue — insist on manufacturer test data."},{term:"Leak detection systems",definition:"Sensors and monitoring infrastructure designed to detect coolant leaks in liquid-cooled environments before they damage IT equipment.",plain:"Sensors that detect water or coolant escaping from pipes before it reaches the servers.",number:"Response time: under 5 seconds to alarm. Rope sensors detect along the full pipe route. Point sensors at low points and under CDUs. Cost: 5,000 to 15,000 euro per zone.",standard:"EN 50600-2-3:2019; ASHRAE Standard 62.1",feynman:{analogy:"Like a smoke detector but for water. It sits under the raised floor along every pipe run and shouts the moment it gets wet.",firstPrinciples:"Liquid cooling puts water near electronics. A leak must be detected before it spreads. Rope sensors along pipe routes detect moisture within seconds. Automatic valve isolation can shut off the affected zone while the rest continues operating.",theTest:"A leak develops in a manifold joint at 02:00. What detects it? Answer: Rope sensor along the manifold triggers alarm within 5 seconds. Automatic isolation valve closes. NOC dispatches. Adjacent racks continue operating."},soWhat:"Leak detection is the insurance policy that makes liquid cooling acceptable to risk-averse operators and insurers."}
],whatItLooksLike:"Copper cold plates bolted over each GPU with flexible hoses to a rear manifold. Blind-mate connectors allow trays to connect automatically.",siteChecklist:["Verify cold plate material compatibility with coolant","Check blind-mate connector leak rate","Confirm TIM spec and replacement interval","Verify manifold connection count"]},
logic:{causeAndEffect:[
{cause:"DLC cold plates are in direct thermal contact with the chip die via thermal interface material with minimal thermal resistance",effect:"Thermal resistance dramatically lower — chip junction temps stay within spec at 1,200+ W/GPU",insight:"DLC achieves 0.01–0.03 °C/W vs 0.1–0.3 °C/W for air. An order of magnitude improvement."},
{cause:"DLC operates as a closed-loop coolant circuit with no evaporation, condensation, or atmospheric water loss",effect:"WUE approaches zero for the DLC circuit — closed-loop operation means no evaporative water loss from the IT cooling system",insight:"Significant sustainability advantage. Eliminates a major environmental concern for EPA IE Licence."},
{cause:"Cold plates are installed with standard thermal interface material (TIM) that degrades over 2 to 3 years.",effect:"Thermal resistance increases by 20 to 40 percent as TIM dries out. Chip temperatures rise. Throttling begins. Compute performance drops without any hardware failure.",insight:"Specify long-life TIM (rated for 5+ years) at installation. Budget for TIM replacement during server refresh cycles. This is a maintenance item, not a one-time installation."}
],constraintLesson:"DLC’s constraint is integration complexity. Every server needs correct cold plates, leak-free connections, and a manifold feeding the facility loop. A single leak can destroy millions in GPU hardware.\n\nIn the Irish market, very few DLC-experienced commissioning engineers exist. Most CDU vendors fly in teams from Netherlands or UK (€20–40k additional (Tier 3 — Irish DC contractor market practice, indicative). Plan to train Declan’s team during Phase 1 pilot.",
weakestLink:{whatsWrong:"DLC is risky — liquid near electronics causes failures.",whatsRight:"Modern DLC uses closed-loop, non-conductive coolant with leak detection. The GB200 NVL72 ships with integrated DLC as standard.",howToGetThere:"Start with 4–8 rack pilot. Procure validated CDU + manifold. Train team. Budget €200–300k for pilot."}},
rhetoric:{declan:{hook:"After six months with DLC deployed, leak detection had zero alerts. Chips run cooler than they ever did with air, and the heat rejection numbers are exactly what the engineers predicted.",text:"After six months, leak detection had zero alerts. Chips run cooler than they ever did on air. The cold plates are not complicated to install. It is the piping that takes time. Every rack needs supply and return connections, manifolds along each row, and the CDU connection at the end. Plan 3 to 5 days per row of 10 racks."},ann:{hook:"DLC de-risks the GPU investment. A 3 million euro rack of GPUs runs at 30 to 40 degrees junction temperature with DLC versus 80 degrees with air. The reliability difference changes the tenant insurance model.",text:"DLC de-risks the GPU investment. A €3M rack of GPUs (Tier 3 — NVIDIA published pricing, indicative) that throttles is a stranded asset. DLC is now standard configuration for NVIDIA GB200. Any tenant deploying AI workloads will require it. This is not a technology choice; it is a market requirement."},mark:{hook:"DLC cold plates achieve 0.01 to 0.03 degrees Celsius per watt thermal resistance. Air cooling at 0.2 degrees per watt would produce a 240 degree rise on a 1,200 W chip — which is why DLC is not optional.",text:"DLC cold plates achieve 0.01–0.03 °C/W. Air at 0.2 °C/W would produce 240°C rise at 1,200 W — impossible. At 132 kW per rack (GB200 NVL72), the cold plate must remove over 1,000 W per GPU. Thermal resistance must be below 0.05 C per W. Only copper microchannel cold plates achieve this consistently."},sarah:{hook:"DLC closed loop means no evaporative water loss from cooling. WUE stays at 0.0 litres per kWh and EPA IE Licence reporting for water consumption is dramatically simplified.",text:"DLC’s closed loop means no evaporative water loss. EPA IE Licence reporting simplified. The liquid cooling market is projected to reach 7 billion dollars by 2029. This is not experimental technology. It is the standard for AI infrastructure globally."},tom:{hook:"Cold plates add 50 to 80 euros per kW IT. At 40 racks times 30 kW that is 1,200 kW — adding 60 to 96 thousand euros to the rack fit-out cost but enabling 3 times the revenue per kW.",text:"Cold plates add €50–80/kW IT (Tier 3 — Asetek/CoolIT/Vertiv published specs, indicative). For 1,200 kW pod = €60–96k. Against €3M+ total, it’s a rounding error. Cold plate plus manifold plus quick-disconnects: approximately 800 to 1,500 euro per server. For a 40-rack deployment at 4 servers per rack: 128K to 240K for the rack-level components alone. TIM replacement every 3 to 5 years: budget 10 to 20 euro per server. Neglected TIM causes throttling worth 10 times more in lost compute revenue."}},
rhetoricTakeaways:{declan:"DLC cold plates are simpler than they look — train the team on a pilot pod before committing to full deployment.",ann:"DLC is standard for NVIDIA GB200 — any AI tenant requires it. This is market access, not technology choice.",mark:"Thermal resistance below 0.05°C/W is non-negotiable at 1,200 W/GPU — specify and verify at commissioning.",sarah:"DLC closed-loop eliminates evaporative water loss — a significant advantage for EPA reporting and water stewardship.",tom:"Cold plates add €50–80/kW IT (Tier 3 — Asetek/CoolIT/Vertiv published specs, indicative) — trivial against the GPU hardware they protect and the compute revenue they enable."},
scenario:{title:"Clonshaugh: Sizing cold plate manifold for 40 DLC racks",narrative:"Each rack 30 kW IT, 75% DLC capture. Determine coolant flow rate per rack at 10°C ΔT.",question:"What coolant flow rate per rack?",answer:"DLC heat = 30 × 0.75 = 22.5 kW.\nFlow = Q/(Cp × ΔT) = 22.5/(4.186 × 10) = 0.538 kg/s = 32.3 L/min per rack.\nTotal pod = 40 × 32.3 = 1,290 L/min.\nCDU count = 1,200/175 ≈ 7 CDUs.",
whoShouldCare:["mark","declan"]},
sourceNote:"ASHRAE TC 9.14 (T1); Schneider Electric WP 210 (T3); Vertiv/nVent/Trane CDU published specs (T3).",retrofitRelevance:"CDUs bridge old CHW infrastructure to new DLC racks.",
  cascadeCheck:(kw,racks,pue)=>{const dlcCapture=0.75;const dlcKW=kw*dlcCapture;const airKW=kw*(1-dlcCapture);return{needed:kw.toFixed(0),available:dlcKW.toFixed(0)+"+"+airKW.toFixed(0),unit:"kW (DLC+air split)",pass:true,detail:`At ${kw}kW/rack: DLC captures ${(dlcCapture*100).toFixed(0)}% = ${dlcKW.toFixed(1)}kW. Air handles ${airKW.toFixed(1)}kW residual.`}},
  crossRefs:[{module:"DC-LEARN-002",level:"L4",topic:"Chilled water plant"},{module:"DC-LEARN-003",level:"L3",topic:"Redundancy — N+1 CDU pumps"}]},
{id:"L3",level:3,name:"Coolant Distribution Units (CDUs)",icon:"🔄",component:"CDU",available:true,
clockQuote:"The chiller could handle the heat. The pipes couldn't carry the water. The constraint wasn't capacity — it was distribution. The building had the engine but not the plumbing.",
userNeedStatement:"Understand the role and sizing of CDUs as the bridge between server-level DLC and facility-level cooling plant.",
plainEnglish:"A CDU is a heat exchanger with pumps that sits between the clean coolant touching your servers and the facility chilled water. It keeps dirty facility water away from GPU cold plates.",
grammar:{facts:[
{term:"Two-Loop Architecture",definition:"Technology Cooling System (TCS) = clean coolant to servers. Facility Water System (FWS) = building chilled water. CDU bridges them via plate heat exchanger.",plain:"Two separate water loops. The clean loop touches the chips. The building loop handles heat rejection. They never mix.",number:"TCS: <1.0 µS/cm conductivity. FWS: standard CHW.",standard:"ASHRAE TC 9.9 Water-Cooled Servers",feynman:{analogy:"Think of it like a double-glazed window — two panes of glass with a gap between them. The CDU creates two loops with a heat exchanger between them, so dirty building water never touches the clean server coolant. The heat crosses over, but the fluids do not mix.",firstPrinciples:"Server cold plates have micro-channels that clog easily. Building chilled water contains treatment chemicals and particles. If you connect them directly, particles block channels and corrode copper. The CDU solves this with a plate heat exchanger — heat transfers between two separate fluid loops without mixing. The server-side loop (TCS) stays ultra-clean.",theTest:"You understand this when you can answer: could you save money by connecting facility chilled water directly to GPU cold plates and eliminating the CDU? Answer: absolutely not. A single particle blocking a micro-channel can destroy a €50k GPU (Tier 3 — NVIDIA published pricing, indicative). The CDU is the cheapest insurance in the entire system."},soWhat:"The two-loop separation protects millions of euro in GPU hardware from a few cents worth of contaminants in building water."},
{term:"CDU Components",definition:"Plate heat exchanger, 2 redundant variable-speed pumps, motorised control valves, temp/pressure sensors, filtration, PLC controller.",plain:"Like a large fridge-sized cabinet with pumps, heat exchanger, and sensors. Placed in-row or in plant room.",number:"Capacity: 150–200 kW per unit. Weight flooded: up to 3,000 kg.",standard:"Vertiv XDU; nVent RACKCHILLER; Trane Ascend specs",feynman:{analogy:"Think of it like the circulation system in a swimming pool — a pump pushes water through a filter and heat exchanger, sensors check temperature and pressure, and the whole thing runs automatically. A CDU does the same for server coolant, but at much higher precision.",firstPrinciples:"A CDU contains five essential systems: a plate heat exchanger (transfers heat between loops), redundant variable-speed pumps (drive coolant flow), motorised valves (regulate temperature), sensors (monitor pressure, temperature, flow), and filtration (keeps coolant clean). Everything is controlled by a PLC that communicates with the building management system.",theTest:"You understand this when you can answer: why do CDUs have two pumps instead of one? Answer: because CDU pump failure means GPU thermal shutdown in 10–30 seconds. N+1 pump redundancy is as critical as UPS redundancy — a single pump failure cannot be allowed to cause an outage."},soWhat:"Understanding CDU internals is essential for specifying redundancy — every component is a potential single point of failure."},
{term:"Thermal Response Time",definition:"At 1,200 W/GPU, junction temps rise rapidly if coolant stops. GPUs throttle at ~83°C, shut down at ~90°C. Time to shutdown: 10–30 seconds.",plain:"If the CDU pump stops, GPUs overheat in seconds — not minutes. Pump redundancy is critical.",number:"10–30 seconds from pump failure to GPU thermal shutdown.",standard:"NVIDIA GPU thermal specs; ASHRAE TC 9.9 thermal guidelines",feynman:{analogy:"Think of it like a pan on a gas hob. Turn off the gas and the pan stays hot for minutes because it has thermal mass. But a GPU at 1,200 watts is like a blowtorch hitting a thin sheet of metal — remove cooling and it overheats almost instantly. There is no buffer time.",firstPrinciples:"GPUs pack billions of transistors into a few hundred square millimetres, each producing heat. At 1,200 watts, the heat flux is enormous. When coolant stops flowing, the tiny thermal mass of the chip heats up at roughly 3–5°C per second. From normal operating temperature (70°C) to throttle point (83°C) is about 3–4 seconds. From throttle to shutdown (90°C) is another few seconds. Total: 10–30 seconds.",theTest:"You understand this when you can answer: if a CDU pump trips and the backup pump takes 60 seconds to start, what happens? Answer: every GPU on that cooling loop has already shut down. 60 seconds is far too long — backup pump switchover must happen in under 5 seconds."},soWhat:"The 10–30 second window from pump failure to shutdown defines the entire CDU redundancy strategy — there is no time for manual intervention."},
{term:"Facility water loop",definition:"The secondary cooling loop connecting CDUs to the building rejection system (dry coolers or cooling towers), typically using treated water at 35 to 45 C.",plain:"The building-level water circuit that takes heat from the CDUs out to the roof where it is rejected to the atmosphere.",number:"Supply temperature: 35 to 45 C (warm water). Return: 45 to 55 C. Flow rate: sized per CDU heat load. Pipe material: copper or stainless steel.",standard:"ASHRAE TC 9.9; EN 50600-2-3:2019",feynman:{analogy:"Like the hot water pipes in a central heating system. The CDU is the boiler (it picks up heat), the dry cooler on the roof is the radiator (it dumps heat to the air).",firstPrinciples:"Heat must leave the building. The facility water loop carries it from the CDUs to external rejection equipment. Higher supply temperatures (35 to 45 C versus 7 to 12 C for chilled water) mean free cooling works for more hours of the year in Dublin.",theTest:"Why is 40 C facility water better than 12 C chilled water for a Dublin DC? Answer: At 40 C, the dry cooler can reject heat to outdoor air for nearly all of Dublin's 7,200 free cooling hours. At 12 C, mechanical refrigeration is needed for most of the year."},soWhat:"Higher facility water temperatures unlock thousands of free cooling hours in Dublin — the loop temperature is an efficiency lever."},{term:"Quick-disconnect coupling",definition:"Self-sealing fluid connector that allows servers or cold plates to be connected and disconnected without draining the loop or losing coolant.",plain:"A snap-on connector that lets you unplug a server from the water supply without spilling. Like a garden hose quick-connect but for data centres.",number:"Drip-free disconnect: less than 0.5 ml spillage per cycle. Rated for 10,000 connect/disconnect cycles. Cost: 50 to 150 euro per pair.",standard:"ASHRAE TC 9.9; Manufacturer specifications",feynman:{analogy:"Like the quick-release coupling on a garden hose. You pull back the collar, the hose disconnects, and no water comes out because the internal valve seals automatically.",firstPrinciples:"In an air-cooled DC, you unplug network cables and slide the server out. In a liquid-cooled DC, you must also disconnect the coolant lines. Quick-disconnect couplings make this safe: internal valves seal when disconnected, preventing coolant loss.",theTest:"A server needs emergency replacement at 03:00. The technician is not trained in plumbing. Can they swap it? Answer: With quick-disconnect couplings, yes. Pull back the collar, disconnect both supply and return, slide out the server. Less than 0.5 ml spillage. No plumbing skills needed."},soWhat:"Quick-disconnects transform liquid cooling maintenance from a plumbing operation to a standard IT swap — critical for operational acceptance."}
],whatItLooksLike:"Floor-standing cabinet the size of a large fridge. Pipe connections to rack manifolds (TCS) and chilled water plant (FWS).",siteChecklist:["Confirm CDU footprint fits","Verify CHW supply temp and flow","Check CDU weight when flooded (up to 3 tonnes)","Confirm redundant power feeds","Verify leak detection integration"]},
logic:{causeAndEffect:[
{cause:"TCS carries coolant through cold plates — any contamination fouls micro-channels",effect:"Localised hot spots develop, GPUs throttle to protect themselves from overtemperature, and persistent thermal stress causes hardware failure",insight:"The two-loop architecture exists to keep facility water contaminants away from server cold plates. Never connect facility water directly to cold plates."},
{cause:"CDU pumps drive the entire TCS loop — if flow drops, every cold plate loses cooling",effect:"Simultaneous GPU thermal runaway occurs across the entire rack group within seconds of CDU pump failure at full load",insight:"CDU pump redundancy (N+1 minimum) is as important as UPS redundancy."},
{cause:"A CDU is sized for the current rack density (20 kW average) without headroom for growth.",effect:"When tenants deploy next-generation GPUs at 50 kW per rack, the CDU cannot handle the heat load. Coolant temperature rises. Servers throttle. The CDU becomes the bottleneck.",insight:"Size CDUs for planned maximum density, not current density. A CDU rated at 80 kW per rack costs 15 to 20 percent more than a 30 kW unit but avoids a full replacement in 3 years."}
],constraintLesson:"Retrofit constraint: connection to existing facility water. Clonshaugh’s CHW plant was sized for 2,400 kW IT at PUE 1.50 = ~1,200 kW cooling. Adding 1,200 kW DLC IT needs additional heat rejection.\n\nIrish TCS loop: inhibited deionised water with biocide (copper-compatible). FWS: 25–30% propylene glycol for outdoor pipe runs. Test quarterly.",
weakestLink:{whatsWrong:"We can pipe facility water directly to cold plates — CDUs just add cost.",whatsRight:"Direct connection exposes cold plates to contaminants. A single particle can destroy a €50k GPU (Tier 3 — NVIDIA published pricing, indicative). CDU cost (€150–250k, Tier 3 — Asetek/CoolIT/Vertiv/Iceotope published ranges, indicative) is trivial against the hardware it protects.",howToGetThere:"Specify Tier 1 CDUs with redundant pumps, leak detection, BMS integration. Size for pod capacity + 20%."}},
rhetoric:{declan:{hook:"I have seen what dirty process water does to a heat exchanger plate. The CDU secondary circuit must be kept clean — it is the insurance policy for the primary server cooling loop.",text:"I’ve seen what dirty water does to a chiller plate. The CDU is the insurance policy. The CDU is the heart of the system. If it fails, every rack on that loop overheats in 2 to 3 minutes. We specified N+1 CDU redundancy from day one. The standby CDU cost 80K but the alternative is losing 40 racks of compute."},ann:{hook:"CDU failure means the entire cluster goes offline. A 4-week AI training run loses all progress on failure — the CDU redundancy specification is not a technical preference, it is an SLA requirement.",text:"CDU failure = cluster outage. A 4-week AI training run loses all progress. CDU redundancy is revenue protection. CDU sizing is a strategic decision. Undersize and you cannot grow. Oversize and capital sits idle. The sweet spot: size for 80 percent of maximum planned density with modular expansion capability."},mark:{hook:"CDU sizing requires matching heat load, flow rate, and pressure drop through every component. An undersized pump on a 1,200 kW DLC pod will show up as hot spots at the furthest racks — not as a pump alarm.",text:"Sizing requires matching heat load, flow rate, and pressure drop. Undersized pump head — even by 10% — means starved cold plates in the furthest rack. The facility water loop temperature is critical. At 40 C supply, Dublin free cooling covers 97 percent of the year. At 12 C supply (chilled water), you need mechanical refrigeration for 60 percent of hours."},sarah:{hook:"CDU closed secondary loop enables waste heat recovery at 30 to 40 degrees Celsius. EED Article 26 waste heat assessment applies — document the feasibility assessment before the CDU design is fixed.",text:"CDU closed secondary loop enables waste heat recovery at 30–40°C. EED Article 26 waste heat provisions become relevant. Note: if FWS uses evaporative cooling, check Uisce Éireann abstraction consent. The coolant in the CDU loop is classified as a chemical substance under REACH. Ensure the safety data sheet is available and included in the facility chemical register."},tom:{hook:"CDU unit cost at 80 to 150 thousand euros for a 400 kW primary circuit. At N+1 for a 1,200 kW pod: 3 CDUs plus one redundant unit equals 320 to 600 thousand euros for CDU infrastructure alone.",text:"The following uses indicative figures for illustration. Input assumptions: CDU unit costs Tier 3 — Asetek/CoolIT/Vertiv/Iceotope published ranges; leak detection certification Tier 3 — Irish insurer market practice (Allianz/AIG/Zurich). All outputs screening-level, subject to detailed design and tender. Budget €150–250k per CDU, 7 units = €1.2–1.75M. That’s 35–50% of total cooling investment. Irish insurers (Allianz, AIG, Zurich) increasingly require leak detection certification — budget €15–25k (Tier 3 — Irish insurer market practice, indicative). CDU capex: 40K to 120K per unit depending on capacity. A 500 kW CDU serving 10 high-density racks costs approximately 80K. With N+1 redundancy: 160K for the CDU pair."}},
rhetoricTakeaways:{declan:"CDU pump failure gives you 10–30 seconds — N+1 redundancy with automatic switchover is non-negotiable.",ann:"CDU cost is 35–50% of cooling infrastructure but protects 100% of the compute hardware — it is the cheapest insurance.",mark:"Size CDUs for planned maximum density, not current load — replacing an undersized CDU costs 3× the upfront premium.",sarah:"CDU secondary loop at 35–40°C enables waste heat recovery and maximises Dublin free cooling hours.",tom:"Budget €150–250k per CDU (Tier 3 — Asetek/CoolIT/Vertiv/Iceotope published ranges, indicative), 6–7 units for a 1,200 kW pod — this is the single largest cooling line item."},
scenario:{title:"Clonshaugh: CDU sizing for DLC pod",narrative:"40 racks at 30 kW, 75% DLC capture. Check existing CHW capacity.",question:"How many CDUs? What additional CHW demand?",answer:"DLC heat = 40 × 30 × 0.75 = 900 kW.\nCDUs = 900/200 = 5 (N+1 = 6 installed).\nAir residual = 40 × 30 × 0.25 = 300 kW.\nTotal new cooling = 1,200 kW.\nExisting spare = 1,200 × 0.20 = 240 kW.\nShortfall: 960 kW — needs supplementary dry coolers.",
whoShouldCare:["mark","tom"]},
sourceNote:"ASHRAE TC 9.9 (T1); Schneider Electric WP 210 (T3); Vertiv XDU/nVent/Trane published specs (T3).",retrofitRelevance:"CDUs are the centrepiece of any DLC retrofit.",
  cascadeCheck:(kw,racks,pue)=>{const dlcRacks=Math.ceil(racks*0.25);const cduCapKW=200;const cdusNeeded=Math.ceil(dlcRacks*kw*0.75/cduCapKW);return{needed:cdusNeeded.toFixed(0),available:"0",unit:"CDUs required",pass:false,detail:`${dlcRacks} DLC racks × ${kw}kW × 75% capture ÷ ${cduCapKW}kW/CDU = ${cdusNeeded} CDUs. N+1: ${cdusNeeded+1} total.`}},
