{id:"L6",level:6,name:"Power Distribution for High Density",icon:"⚡",component:"Power Density",available:true,
clockQuote:"The answer isn't one technology. The answer is the right technology for each zone, designed to coexist. Air for the 400 racks at 6 kW. Liquid for the 40 racks at 30 kW. Two thermal worlds in one building.",
userNeedStatement:"Understand how power distribution must change at 30–120 kW/rack and why busbar replaces traditional cabling.",
plainEnglish:"A 6 kW rack needs one 32 A feed. A 30 kW rack needs two 63 A three-phase feeds. A 120 kW rack needs overhead busbar. The legacy power distribution cannot serve AI racks.",
grammar:{facts:[
{term:"Power Density Progression",definition:"6 kW: 1×32A 1ph. 10 kW: 2×32A 3ph. 20 kW: 2×63A 3ph. 50 kW: busbar tap. 120 kW: overhead busbar mandatory.",plain:"Every density step needs bigger power feeds. At 120 kW, individual cables are too thick — you switch to busbar overhead.",number:"6 kW: 1×32A. 10 kW: 2×32A 3ph. 20 kW: 2×63A 3ph. 120 kW: busbar.",standard:"AIMEP DC Standards Ref v1.2 Section 4",feynman:{analogy:"Think of it like upgrading from a garden hose to a fire hose. A 6 kW rack is the garden hose — easy to handle. A 120 kW rack is the fire hose — you need completely different connections, supports, and safety equipment.",firstPrinciples:"Electrical current equals power divided by voltage. At 6 kW and 230V, current is 26 amps — one standard plug. At 30 kW and 415V three-phase, current is 44 amps per phase — a dedicated industrial feed. At 120 kW, you need 167 amps per phase — individual cables become impractically heavy, so you switch to overhead busbar, a continuous copper conductor with tap-off points.",theTest:"You understand this when you can answer: why can you not just run thicker cables to each 120 kW rack instead of installing busbar? Answer: at 167 amps per phase, the cable cross-section would be enormous, the routing under a raised floor impossible due to weight and congestion, and the I²R losses significant. Busbar is lighter, has lower losses (0.5% vs 2–3%), and allows tap-off at any point."},soWhat:"At 30+ kW per rack, power distribution becomes the constraint — undersized cables and breakers throttle the facility before cooling does."},
{term:"Busbar Distribution",definition:"Continuous copper/aluminium conductor overhead with tap-off boxes at each rack. Higher capacity, lower losses than cables.",plain:"Instead of heavy cables to every rack, a solid metal bar overhead with power taps at each position.",number:"Rating: 800–3,200 A. Loss: ~0.5% (busbar) vs 2–3% (cable). Weight saving ~40%.",standard:"IS 10101:2020+A1:2024; EN 61439",feynman:{analogy:"Think of it like a train overhead power line compared to a diesel engine. The overhead wire delivers power to every train that connects to it along the route. Busbar delivers power to every rack that taps into it along the row — one continuous conductor instead of individual cables.",firstPrinciples:"A busbar is a rigid copper or aluminium conductor enclosed in a metal duct, mounted overhead along a rack row. Every 600–1,200 mm, a tap-off box drops down to connect a rack. Current flows through the busbar with about 0.5% loss per run — compared to 2–3% for equivalent cable lengths. The weight saving is about 40% compared to cabling for the same capacity.",theTest:"You understand this when you can answer: at what rack density does busbar become the preferred distribution method? Answer: 30 kW/rack is the inflection point. Below that, traditional cabling is practical. Above that, cable congestion, weight, and I²R losses make busbar the superior engineering choice."},soWhat:"Busbar eliminates the cable congestion that makes high-density rows physically unserviceable — it is an enabler, not a luxury."},
{term:"Voltage Uplift",definition:"Higher density favours higher voltage. At 120 kW/230V 1ph: 522 A (impractical). At 415V 3ph: 167 A/phase. I²R loss reduction 230V→415V: ~69%.",plain:"Higher voltage = lower current = thinner cables, less heat, less waste. Irish DCs at 400–415V 3ph have an advantage over US 208V.",number:"120 kW at 230V 1ph: 522 A. At 415V 3ph: 167 A/ph. I²R reduction: ~69%.",standard:"IS 10101:2020+A1:2024; fundamental electrical engineering",feynman:{analogy:"Think of it like water pressure in pipes. Higher pressure moves the same amount of water through a thinner pipe. Higher voltage moves the same power through a thinner cable. That is why Irish DCs at 415V have an advantage over US DCs at 208V — they can deliver more power with less copper.",firstPrinciples:"Electrical losses are proportional to current squared (I²R). If you double the voltage, current halves for the same power. Half the current means one quarter the losses. Going from 230V single-phase to 415V three-phase reduces current by factor 0.554, and losses by 0.554² = 0.307 — a 69% reduction.",theTest:"You understand this when you can answer: Clonshaugh has some legacy racks on 230V single-phase feeds. When converting to a 30 kW DLC pod, should they keep the 230V feeds or upgrade to 415V three-phase? Answer: upgrade. At 30 kW on 230V, each rack draws 130 amps — impractical. At 415V three-phase, each rack draws 44 amps per phase, and distribution losses drop by 69%."},soWhat:"Upgrading voltage reduces I²R losses by up to 69% — a free efficiency gain that compounds across every rack in the facility."},
{term:"Busway for high-density racks",definition:"Overhead or underfloor power distribution using busbar trunking instead of cable, supporting 250 to 600 A per run for high-density rack rows.",plain:"A rigid copper bar carrying power along the row of racks instead of hundreds of individual cables. Handles much higher current in less space.",number:"Typical rating: 250 to 600 A per busway. Supports 40 to 100 kW per rack. Tap-off boxes every 600 mm for individual rack connection.",standard:"EN 61439-6; IS 10101:2020+A1:2024",feynman:{analogy:"Like a water main running along a street with individual taps for each house. The busway is the power main with tap-off boxes at each rack position.",firstPrinciples:"A 100 kW rack at 400 V draws 250 A. Traditional cabling from a remote DB requires very heavy cables. Busway runs along the rack row with short tap-off connections. Less copper, less voltage drop, and easier to add or reconfigure rack connections.",theTest:"Clonshaugh wants to support 80 kW racks. Why does traditional cabling fail? Answer: At 200 A per rack, traditional cable runs from a remote DB would require 95 mm2 cables and create voltage drop problems. Busway provides 600 A along the row with 1 metre tap-off connections."},soWhat:"Busway provides the modular, high-capacity power path that high-density rows demand — it scales without re-cabling."},{term:"Remote power panel (RPP)",definition:"A power distribution panel located within or adjacent to the rack row, reducing cable runs and voltage drop for high-density deployments.",plain:"A power panel right next to the racks instead of across the room. Shorter cables mean less voltage drop and less copper.",number:"Typical capacity: 200 to 400 kW per RPP. Located within 3 m of served racks. Voltage drop: under 1 percent from RPP to rack.",standard:"EN 61439-3; NFPA 70 Article 408",feynman:{analogy:"Like having a fuse board in every room instead of one in the cupboard under the stairs. The shorter the cable, the less energy is lost and the less copper is needed.",firstPrinciples:"High-density racks draw high currents. Long cable runs cause voltage drop proportional to length and current. Moving the distribution panel close to the racks shortens runs from 30 m to 3 m, reducing voltage drop by 90 percent and cable cost by 60 to 70 percent.",theTest:"A 100 kW rack is 25 m from the nearest DB. Voltage drop? Answer: At 250 A on a 25 m run, voltage drop exceeds 3 percent. With an RPP at 3 m, drop is under 0.4 percent. The RPP saves cable and ensures voltage quality."},soWhat:"RPPs place circuit protection close to the load, reducing cable runs and I²R losses — essential for high-density row design."}
],whatItLooksLike:"Overhead busbar trunking — enclosed metal duct along the row at ceiling level. Every 600–1,200 mm, a tap-off box drops to the rack. Inside racks: intelligent PDUs.",siteChecklist:["Verify switchboard capacity for additional 1,200 kW","Check transformer headroom","Assess cable routes — distance and containment","If busbar: verify structural support","Plan PDU specification — intelligent, per-outlet metered"]},
logic:{causeAndEffect:[
{cause:"At 30 kW per rack, each rack requires approximately 44 A per phase on 415V three-phase distribution",effect:"Cabling 40 such feeds under raised floor creates congestion and heat accumulation",insight:"30 kW/rack is the inflection point. Below: cables work. Above: busbar is better engineering."},
{cause:"Power distribution losses are proportional to I²R — doubling current quadruples losses for the same cable impedance",effect:"Doubling power density quadruples I²R distribution losses if voltage is unchanged — a significant hidden energy penalty",insight:"Irish DCs at 400–415V 3ph already have an advantage. Ensure DLC pod uses 415V 3ph, not legacy 230V."},
{cause:"A 1,200 kW DLC pod is added to an existing main switchboard that has only 400 kW of spare switchboard capacity",effect:"Transformer loading exceeds 90%. Harmonic distortion from GPU PSUs (THDi 25–35%) de-rates transformer by 10–15%. Effective shortfall larger than simple kW arithmetic suggests.",insight:"GPU workloads have high harmonic content. K-factor rated transformers or harmonic filters are needed. The electrical survey must include harmonic analysis (IEEE 519 / EN 61000-3-12), not just load addition. At Clonshaugh, the existing 2013-era transformers may need K-factor assessment before DLC pod commissioning."}
],constraintLesson:"Power constraint at Clonshaugh: not HV supply (sized for 2,400 kW) but LV distribution. Existing switchboards/cables were designed for 400 × 6 kW. Adding 960 kW needs new sub-distribution.\n\nKey decision: new cables from MSB or local sub-MSB with busbar. For 40 racks at 30 kW, local sub-MSB + busbar is the better solution.",
weakestLink:{whatsWrong:"We have 2,400 kW on the transformer — 960 kW should fit.",whatsRight:"Transformer may accommodate it, but cables, busbar ratings, and breakers were sized for 6 kW/rack. Running 30 kW through 6 kW-rated distribution causes overheating and fire risk. New distribution is not optional.",howToGetThere:"Electrical survey: MSB spare ways, cable routes, transformer loading. Design dedicated sub-distribution with 30% spare. Budget €300–500k (Tier 2 — SCSI benchmarks; RICS NRM1, indicative)."}},
rhetoric:{declan:{hook:"When I saw the cable schedule for 30 kW racks I thought there had been a mistake. At 415V three-phase that is 44 A per phase per rack — almost double what we had planned for.",text:"When I saw the cable spec for 30 kW racks, I thought — where do I put all that copper? Overhead busbar freed the floor and reduced losses. At 80 kW per rack, the power cables are as thick as your wrist. We switched to overhead busway and it transformed the cable management. Tap-off boxes at each rack position, 5-minute connection."},ann:{hook:"Power upgrade for 40 DLC racks: 300 to 500 thousand euros. That is the infrastructure cost that enables the revenue premium. Model it as infrastructure enabling revenue, not as a cost centre line item.",text:"Power upgrade for 40 DLC racks: €300–500k (Tier 2 — SCSI benchmarks; RICS NRM1, indicative). But it unlocks 1,200 kW premium AI revenue. Pays back within year one. Power distribution is the hidden bottleneck. Everyone focuses on cooling, but if you cannot deliver 100 kW to each rack position, the cooling investment is wasted."},mark:{hook:"At 30 kW per rack on 415V three-phase, 44 A per phase means a 63 A tap-off box is minimum. Busway rating for the entire pod must be verified before the CDU and rack manifolds are connected.",text:"At 30 kW/rack, 415V 3ph: ~44 A/phase. 63 A tap-off box per rack gives headroom. Sub-MSB at 2,000 A with 30% spare = 2,600 A busbar. Voltage drop at high current is the killer. A 30 m cable run at 250 A loses 3 percent voltage. RPPs within 3 m of racks reduce this to 0.4 percent. The servers care about voltage quality."},sarah:{hook:"Distribution loss reduction from cable at 2 to 3 percent to busbar at 0.5 percent at 1,200 kW saves approximately 30 kW continuously — a directly reportable PUE improvement in the EED Article 12 submission.",text:"Distribution loss reduction from cable (2–3%) to busbar (0.5%) at 1,200 kW saves 18–30 kW parasitic. At 0.2241 kgCO₂/kWh × 8,760 hrs = 35–59 tonnes CO₂/year. High-density power distribution must comply with IS 10101:2020+A1:2024 and EN 61439. Busway installations need verification testing per manufacturer protocol."},tom:{hook:"Sub-MSB for DLC pod: 300 thousand euros, busway 200 thousand euros, tap-off boxes and PDUs 150 thousand euros. Total distribution upgrade for 40 DLC racks: 650 thousand euros.",text:"The following uses indicative figures. Input assumptions: Sub-MSB Tier 3 — ABB/Schneider/Eaton published ranges; busbar/tap-offs Tier 3 — Siemens/ABB published; PDUs Tier 3 — Vertiv/Schneider published; M&E labour Tier 2 — SCSI benchmarks. Sub-MSB + busbar for 40 racks: €350–450k installed (indicative). Sub-MSB €120k, busbar €80k, 40 tap-offs €40k, PDUs €60k, cabling €50k. Busway costs 500 to 800 euro per metre installed. For a 40 m row: 20K to 32K. Compared to individual cable runs at 150 to 300 per rack: busway saves 30 to 50 percent on a 40-rack row."}},
rhetoricTakeaways:{declan:"At 30+ kW per rack, cable tray congestion becomes the bottleneck — busbar solves distribution before it becomes a crisis.",ann:"Power distribution upgrades are invisible to tenants but critical to density — undersized distribution caps revenue.",mark:"Upgrading to 415V three-phase reduces I²R losses by 69% — the efficiency gain compounds across every rack.",sarah:"Metering at circuit level is the foundation for accurate PUE reporting and CRU Readiness documentation.",tom:"Busbar at €150–250k per row (Tier 3 — Siemens/ABB/Legrand published busbar pricing; SCSI benchmarks, indicative) is a strategic investment — it enables the density that drives premium lease rates."},
scenario:{title:"Clonshaugh: Power distribution for DLC pod",narrative:"40 racks at 30 kW = 1,200 kW IT. Existing MSB has 400 kW spare on 2,500 kVA transformer.",question:"Size sub-distribution and check transformer capacity.",answer:"Pod demand: 1,200 kW × 1.08 (DLC overhead) = ~1,300 kW.\nAssuming 2 × 2,500 kVA transformers (Tier III): total capacity 4,750 kW.\nCurrent demand: 3,600 kW (75.8% loaded). Spare: 1,150 kW.\nDLC: 1,300 kW. Shortfall: ~150 kW — marginal.\nSub-MSB: 1,300 kW at 415V 3ph = 1,808 A. Rate at 2,000 A + 30% = 2,600 A busbar.",
whoShouldCare:["mark","tom"]},
sourceNote:"IS 10101:2020+A1:2024 (T1); EN 61439 (T1); AIMEP DC Standards Ref v1.2 Section 4 (T2).",retrofitRelevance:"Power distribution is usually the first bottleneck in a retrofit.",
  cascadeCheck:(kw,racks,pue)=>{const targetKW=30;const currentBranch=32*0.8*230/1000;const threePhaseBranch=32*0.8*400*1.732/1000;return{needed:targetKW.toFixed(0),available:currentBranch.toFixed(1),unit:"kW/rack vs branch capacity",pass:targetKW<=currentBranch,detail:`${targetKW}kW target vs 1PH 32A: ${currentBranch.toFixed(1)}kW (FAIL) vs 3PH 32A: ${threePhaseBranch.toFixed(1)}kW (OK). 3-phase PDU upgrade required.`}},
  crossRefs:[{module:"DC-LEARN-001",level:"L4",topic:"LV distribution topology"},{module:"DC-LEARN-006",level:"L3",topic:"HV connection"}]},
{id:"L7",level:7,name:"Structural & Spatial Constraints",icon:"🏗️",component:"Structure",available:true,
clockQuote:"If the number we've been measuring stops telling the whole story, we don't abandon the number. We add a second one. PUE for the building. TUE for the zone. Two metrics, one facility.",
userNeedStatement:"Understand structural loading, floor penetration, and spatial requirements for liquid-cooled high-density racks in legacy buildings.",
plainEnglish:"A legacy rack weighs 300–400 kg. An AI rack at 120 kW weighs 1,360 kg plus coolant. A filled CDU weighs 3 tonnes. Your data hall floor was probably designed for 10–12 kN/m². AI racks can exceed that.",
grammar:{facts:[
{term:"Floor Loading Comparison",definition:"Standard air: 300–600 kg (3–6 kN in ~0.5 m²). NVL72: 1,360 kg (21 kN/m² point load). CDU flooded: ~3,000 kg (30 kN/m²). Standard DC floor: 10–12 kN/m².",plain:"An AI rack weighs 3–4× a standard rack. A filled CDU weighs even more. Most legacy floors cannot support either without reinforcement.",number:"NVL72: 21 kN/m². CDU: ~30 kN/m². Floor rating: 10–12 kN/m².",standard:"EN 50600-2-1; NVIDIA specs",feynman:{analogy:"Think of it like standing on snow. In regular shoes, you sink in. On snowshoes, your weight is spread over a larger area and you stay on top. A spreader plate does the same for heavy racks — it distributes the weight so the floor does not fail.",firstPrinciples:"Force equals mass times gravity. A 1,360 kg rack in 0.64 m² creates a point load of 21 kN/m². A standard DC floor is rated for 10–12 kN/m². That means the NVL72 exceeds the floor capacity by nearly double. The solution is a steel spreader plate that distributes the load over a larger area — say 2–3 m² — bringing the load within the floor's rating.",theTest:"You understand this when you can answer: Clonshaugh has 12 kN/m² floor capacity. A 30 kW DLC rack weighs 1,000 kg on a 0.6 m² footprint. Does it need a spreader plate? Answer: yes. Point load = 1,000 × 9.81 / 1,000 / 0.6 = 16.4 kN/m², which exceeds the 12 kN/m² rating. A 1.2 × 0.8 m spreader plate brings it to 10.2 kN/m² — within spec."},soWhat:"The NVL72 at 21 kN/m² exceeds standard floor ratings by 2× — structural capacity is the first-pass filter for any liquid cooling project."},
{term:"Structural Reinforcement Methods",definition:"(1) Steel spreader plates: €5–10k/rack (Tier 3 — Irish M&E contractor market pricing, indicative) installed under live conditions. (2) Slab-on-grade: €15–25k/position (Tier 3 — Irish M&E contractor market pricing, indicative). (3) Overhead suspension (rare).",plain:"Spread the weight with steel plates, pour a new pad, or hang from the ceiling. Most use steel spreader plates.",number:"Spreader plate: distributes 1,360 kg across 2–3 m² → 4.5–6.8 kN/m².",standard:"Introl Jan 2026; EN 50600-2-3:2019; structural engineering practice",feynman:{analogy:"Think of it like putting a chopping board under a heavy pot to protect a wooden table. The steel spreader plate is the chopping board — it spreads the concentrated weight across a larger surface so the floor beneath does not crack.",firstPrinciples:"Three methods exist for supporting heavy equipment on DC floors. Steel spreader plates (€5–10k per rack) sit under rack feet and distribute weight — quickest to install. Slab-on-grade pads (€15–25k per position, Tier 3 — Irish M&E contractor market pricing, indicative) pour new reinforced concrete — most permanent. Overhead suspension (rare) hangs equipment from the ceiling structure. For Clonshaugh's retrofit at 30 kW/rack, spreader plates are the practical choice.",theTest:"You understand this when you can answer: a structural engineer says the slab can handle the DLC racks without spreader plates, but only at 95% of rated capacity. Should you proceed without plates? Answer: no. Operating at 95% of structural capacity leaves no safety margin for dynamic loads (forklift, maintenance), CDU flooding, or future density increases. Always use spreader plates if the margin is less than 30%."},soWhat:"Reinforcement methods determine timeline and cost — steel beams are fast; concrete takes weeks but handles the highest loads."},
{term:"Pipe Penetrations",definition:"DLC needs CHW supply/return pipes to every CDU. Requires floor, wall, riser penetrations. Each must be fire-stopped per BS 476/EN 1366.",plain:"Getting pipes to the right place means cutting holes. Every hole must be fire-sealed.",number:"Typical pipe: 100–150 mm DN. Fire stopping per penetration: €200–500 (Tier 1 — Building Regs Part B; EN 1366).",standard:"Building Regs (Ireland) Part B; EN 1366",feynman:{analogy:"Think of it like adding plumbing to a house that was built without it. Every hole you drill through a wall or floor weakens the fire separation and creates a potential leak point. Each penetration must be carefully sealed — fire stopping to maintain the fire rating, waterproofing to contain any leak.",firstPrinciples:"DLC needs chilled water pipes from the plant room to every CDU. In a retrofit, this means cutting through floors, walls, and risers — each designed as a fire barrier. Every penetration through a fire-rated element must be fire-stopped to maintain the original rating (typically 60 or 120 minutes). The pipes also need waterproof seals because a leaked pipe penetration floods the floor below.",theTest:"You understand this when you can answer: the contractor says fire stopping is optional because the DC has a sprinkler system. Is this correct? Answer: no. Fire stopping and sprinklers serve different purposes. Fire stopping maintains compartment integrity to contain fire spread. Sprinklers suppress fire in the room. Both are required — one does not replace the other."},soWhat:"Pipe penetrations through fire-rated barriers require fire stopping certification — a missed penetration invalidates the compartment rating."},
{term:"Floor loading capacity",definition:"The maximum weight per square metre that the data hall floor can support, critical for immersion tanks and high-density racks.",plain:"How much weight the floor can hold. Immersion tanks full of fluid and servers are very heavy. The floor might not be designed for this.",number:"Standard raised floor: 8 to 12 kN per m2. Immersion tank: 15 to 25 kN per m2 when filled. Structural assessment required before deployment.",standard:"EN 50600-2-1:2021; BS EN 1991-1-1 (Eurocode 1)",feynman:{analogy:"Like parking a truck on a residential driveway. The driveway was designed for cars. Immersion tanks on a standard raised floor is the same problem: the floor was designed for air-cooled racks, not tanks of heavy fluid.",firstPrinciples:"A standard 42U rack weighs 500 to 800 kg. An immersion tank of the same footprint weighs 2,000 to 4,000 kg when filled with fluid and servers. The raised floor system and structural slab must support this concentrated load. Most legacy floors cannot.",theTest:"Clonshaugh wants to install immersion cooling pods. The raised floor was designed for 10 kN per m2. The pods exert 20 kN per m2. What happens? Answer: The floor fails unless reinforced. Options: remove raised floor sections and place pods directly on structural slab, or install structural load-spreading frames."},soWhat:"Floor loading is the hard constraint that gates everything — if the slab cannot support the racks, no amount of cooling design matters."},{term:"Ceiling height requirements",definition:"The minimum clear height needed for liquid cooling infrastructure including overhead manifolds, busway, leak detection, and maintenance access.",plain:"High-density liquid cooling needs more headroom above the racks than air cooling did. Manifolds, pipes, and busway all compete for ceiling space.",number:"Minimum clear above rack: 600 to 900 mm for manifolds and maintenance. Total minimum slab-to-slab: 4.5 to 5.0 m for immersion. Standard legacy DC: 3.6 to 4.2 m slab-to-slab.",standard:"EN 50600-2-1:2021; ASHRAE TC 9.9",feynman:{analogy:"Like adding a mezzanine floor to a warehouse. If the warehouse was built with low ceilings, the mezzanine does not fit. Liquid cooling infrastructure needs ceiling height that many legacy DCs do not have.",firstPrinciples:"Air cooling uses underfloor plenums and ceiling-mounted CRAH units. Liquid cooling replaces these with overhead manifolds, busway, and CDU connections. The total vertical space requirement increases. In a legacy DC with 3.6 m slab-to-slab, there is no room for both standard racks and overhead liquid infrastructure.",theTest:"Clonshaugh has 3.8 m slab-to-slab. Can it support immersion cooling? Answer: Marginal. With 42U racks at 2.0 m, raised floor at 0.6 m, and 0.6 m overhead, only 0.6 m remains for structure and services. Immersion tanks may need the raised floor removed to gain height."},soWhat:"Ceiling height determines whether overhead services (busbar, pipe manifolds, containment) can be installed without compromising rack access."}
],whatItLooksLike:"Raised-floor tiles removed revealing new steel spreader plates bolted to slab. Overhead pipe racks with insulated CHW pipes. Fire-stopped penetrations. CDUs on reinforced plinths.",siteChecklist:["Commission structural survey — confirm kN/m²","Check raised-floor pedestal rating","Verify ceiling height for overhead pipes (min 3.0 m)","Assess building drainage for 500+ L coolant spill","Review fire compartmentation"]},
logic:{causeAndEffect:[
{cause:"Liquid-cooled racks and CDUs concentrate significantly higher weight loads in smaller floor footprints than air-cooled racks",effect:"Point loads from CDUs and high-density racks can exceed rated floor capacity, creating a structural failure risk",insight:"This kills many brownfield projects. If slab is only 8 kN/m², even standard DLC racks exceed it. Structural assessment must happen first."},
{cause:"Pipe routing requires continuous path through potentially multiple fire compartments",effect:"Each penetration reduces fire rating unless fire-stopped; increases potential leak points",insight:"Pipe routing is often more expensive and disruptive than the cooling equipment itself."},
{cause:"Immersion tanks are placed on a standard raised floor without structural assessment.",effect:"The filled tank exceeds the floor loading capacity. Floor tiles crack or the pedestal system deforms. The tank tilts, stressing pipe connections. A leak develops.",insight:"A structural survey costs 3K to 5K euro and takes 2 days. A floor failure with 2,000 litres of dielectric fluid costs 200K plus in damage and downtime."}
],constraintLesson:"Structural capacity is the first-pass filter.\n\nClonshaugh (2013 purpose-built): slab likely 12–15 kN/m². A 30 kW DLC rack at ~1,000 kg in 0.6 m² = 16.4 kN/m² — exceeds rating. Spreader plates are necessary.\n\nCDUs: locate on slab (not raised floor) wherever possible.\n\nFor NVL72 (120 kW, 1,360 kg, 21 kN/m²): slab-on-grade recommended. Future consideration for Clonshaugh.",
weakestLink:{whatsWrong:"The building was designed as a DC, so the floor handles any rack.",whatsRight:"Designed for 6 kW racks at 300–400 kg. AI racks are 2–4× heavier. Always verify with structural survey.",howToGetThere:"Engage structural engineer: core samples, rebar mapping, load calc. Cost: €5–15k (Tier 2 — SCSI benchmarks; RICS NRM1, indicative). Do this before any procurement."}},
rhetoric:{declan:{hook:"We placed two loaded DLC racks without checking the floor specification first. The pedestals started deflecting visibly after 20 minutes. We removed the racks before any tile failed.",text:"We placed two loaded racks without checking. Pedestals started deflecting after three months. Emergency lift, spreader plates, €30k and two weeks down. We discovered the floor loading problem the hard way. The structural engineer said our raised floor could handle 10 kN per m2. The immersion tank needed 22 kN. We had to remove the raised floor and pour new plinths."},ann:{hook:"Structural reinforcement at 5 to 10 thousand euros per rack is a fixed cost of high-density deployment. It is not optional — and it must be completed before any DLC rack is loaded onto the floor.",text:"Structural reinforcement: €5–10k/rack (Tier 3 — Irish M&E contractor market pricing, indicative) × 40 = €200–400k. That’s 7–13% of total. Skip it and a €3M GPU rack breaks the floor. Ceiling height is the silent killer for retrofit. If your slab-to-slab is under 4 m, immersion cooling is extremely difficult. DLC is possible but overhead manifold space is tight. This is a hard physical constraint."},mark:{hook:"NVL72 rack: 1,360 kg on four pedestals in a 600 by 600 mm tile footprint. Each tile must support 3.4 kN point load. Standard raised floor tiles are rated to 1.5 kN — a direct structural failure mode.",text:"NVL72: 1,360 kg on four feet in 600 × 600 mm tiles. Each tile must support 3.4 kN. Standard tiles rated 3–4 kN. This fails. Need structural tiles or spreader plates. The structural assessment must cover point loads (individual tanks), distributed loads (fluid-filled manifolds), and dynamic loads (fluid movement during filling and draining). Static analysis alone is insufficient."},sarah:{hook:"Structural upgrades require no planning permission as internal works but building control notification under Part A of the Building Regulations applies. Document the structural engineer sign-off for the compliance record.",text:"Structural upgrades — no planning permission (internal works). But building control sign-off if fire compartmentation affected. Structural modifications may require Building Control notification under BCAR. Confirm with the assigned certifier before removing raised floor sections or pouring new plinths."},tom:{hook:"Structural reinforcement for 40 DLC racks: steel frame sub-structure at 8 thousand per rack times 40 racks equals 320 thousand euros. Include it in the pod business case from the first feasibility assessment.",text:"The following uses indicative figures for illustration. Input assumptions: structural survey Tier 2 — SCSI benchmarks; RICS NRM1; spreader plates/plinths Tier 3 — Irish M&E contractor market pricing; fire stopping Tier 2 — Building Regs Part B; EN 1366. All outputs screening-level, subject to detailed design and tender. Structural survey: €10k. Spreader plates (40): €280k. CDU plinths (6): €30k. Fire stopping: €8k. Total: ~€350k. Not optional. Structural reinforcement for one immersion zone (8 tanks): 40K to 80K. Floor removal and plinth construction: 60K to 120K. These costs are often missing from early business cases."}},
rhetoricTakeaways:{declan:"Structural survey is the first step in any liquid cooling project — discover limitations before committing capital.",ann:"Floor loading capacity is the gatekeeper — if the building cannot support 21 kN/m², the NVL72 cannot be deployed.",mark:"Pipe routing determines maintenance access for the life of the facility — get it right first time or live with the constraints.",sarah:"Coolant is a chemical substance under REACH — ensure safety data sheets are in the facility chemical register.",tom:"Structural reinforcement at €100–200k (Tier 3 — Irish M&E contractor market pricing, indicative) is a fraction of total project cost but gates everything that follows."},
scenario:{title:"Clonshaugh: Structural assessment for 40-rack DLC pod",narrative:"Slab: 250 mm reinforced concrete, 12 kN/m² UDL. Racks at 1,000 kg, 0.6 m² footprint.",question:"Does the slab support the load? What mitigation?",answer:"Point load = 1,000 × 9.81/1,000/0.6 = 16.4 kN/m². Exceeds 12 kN/m².\nSpreader plate (1.2×0.8 m = 0.96 m²): 9.81/0.96 = 10.2 kN/m² — WITHIN spec.\nCDU flooded (1,800 kg on 1.0 m²) = 17.7 kN/m² — needs reinforced plinth.\n40 plates at €7k = €280k. 6 CDU plinths at €5k = €30k. Total: €310k.",
whoShouldCare:["mark","tom","declan"]},
sourceNote:"EN 50600-2-1 (T1); NVIDIA NVL72 published spec (T3); Building Regs Part B (T1).",retrofitRelevance:"Structural assessment is the first gate — before procuring any equipment.",
  cascadeCheck:(kw,racks,pue)=>{const currentFloorLoad=1.5;const dlcFloorLoad=3.0;return{needed:dlcFloorLoad.toFixed(1),available:currentFloorLoad.toFixed(1),unit:"kN/m² floor loading",pass:dlcFloorLoad<=currentFloorLoad,detail:`DLC racks: ${dlcFloorLoad}kN/m² vs current floor rating ${currentFloorLoad}kN/m². ${dlcFloorLoad>currentFloorLoad?"STRUCTURAL UPGRADE REQUIRED":"OK"}`}},
  crossRefs:[{module:"DC-LEARN-008",level:"L4",topic:"Fire safety — penetration fire stopping"},{module:"DC-LEARN-003",level:"L5",topic:"Redundancy — structural resilience"}]},
{id:"L8",level:8,name:"New Metrics — TUE Alongside PUE",icon:"📊",component:"Efficiency Metrics",available:true,
clockQuote:"The plan hadn't finished and the target had already moved. The building designed for 6 kW was being asked to host 30 kW. The programme wasn't behind — the market was ahead.",
userNeedStatement:"Understand why PUE is misleading for liquid-cooled facilities and what TUE, pPUE, CUE provide.",
plainEnglish:"PUE was designed for air-cooled DCs. DLC reduces server fan power, which PUE counts as IT power. The facility gets more efficient but PUE doesn’t fully reflect it. TUE fixes this.",
grammar:{facts:[
{term:"PUE Limitation for Liquid Cooling",definition:"PUE = Total Facility Power / IT Equipment Power. When DLC reduces server fans (40–80%), IT power denominator shrinks, making PUE understate the true improvement.",plain:"PUE has a blind spot. When DLC reduces fan power, PUE’s maths makes the facility look less improved than it actually is.",number:"NVIDIA/Vertiv study: server fan power reduced 80% with 75% DLC. IT power reduced ~7%. PUE improvement understated.",standard:"Vertiv/NVIDIA ASME paper; The Green Grid",feynman:{analogy:"Think of it like measuring fuel efficiency in a hybrid car by dividing total distance by total fuel. The electric motor contributes distance but uses no fuel — making the calculation understate the efficiency gain from the electric system. PUE has the same blind spot with DLC — it ignores the fan power savings.",firstPrinciples:"PUE divides total facility power by IT equipment power. IT equipment power includes server fans. When DLC spins down fans (40–80% reduction), the IT denominator shrinks. A smaller denominator makes the ratio bigger — understating the improvement. The facility is genuinely more efficient, but PUE does not fully show it.",theTest:"You understand this when you can answer: the NVIDIA/Vertiv study found PUE did not change between 61.4% and 68.6% DLC deployment. Does this mean there was no benefit to increasing DLC? Answer: no. TUE showed a clear improvement because it removes fan power from the denominator. PUE was misleading — the facility was more efficient, but PUE's maths hid it."},soWhat:"PUE alone misses the efficiency gains inside the server — TUE captures the full benefit of eliminating fans and reducing chip temperatures."},
{term:"Total Usage Effectiveness (TUE)",definition:"TUE = Total Facility Power / IT Compute Power (excluding fans). Separates infrastructure overhead from productive compute.",plain:"TUE counts only power that processes data. Fans, pumps, lights — all overhead.",number:"NVIDIA/Vertiv: TUE improved 15.5% between all-air and 75% DLC. PUE did not change between 61.4% and 68.6% DLC.",standard:"2013 ISC paper; Vertiv/NVIDIA ASME paper",feynman:{analogy:"Think of it like measuring a factory's efficiency by counting only the machines doing useful work, not the lights and air conditioning. TUE does exactly this — it counts only the power that processes data (CPUs, GPUs, memory, storage) and treats everything else as overhead.",firstPrinciples:"TUE = Total Facility Power divided by IT Compute Power. IT Compute Power excludes server fans, which are cooling infrastructure, not computation. When DLC reduces fan power, TUE's denominator stays constant (same compute load), so the full benefit of reduced facility energy shows in the ratio. The NVIDIA/Vertiv study showed TUE improved 15.5% between all-air and 75% DLC — far more than PUE suggested.",theTest:"You understand this when you can answer: which metric should Ann present to the investment committee to justify extending DLC from 60% to 75% of the pod, and why? Answer: TUE. Between 60% and 75% DLC, PUE improved only 4.6%, but TUE improved 6.8% — 48% more improvement. PUE understates the return; TUE shows the real gain."},soWhat:"TUE captures what PUE ignores — the energy saved inside the server by removing fans and reducing thermal resistance."},
{term:"Carbon Usage Effectiveness (CUE)",definition:"CUE = Total CO₂ Emissions / IT Equipment Power. At Ireland’s 0.2241 kgCO₂/kWh, PUE 1.20 → CUE = 0.269.",plain:"CUE tells you how much carbon each kWh of computing produces. Combines DC efficiency with grid cleanliness.",number:"Ireland: CUE = PUE × 0.2241. PUE 1.20: CUE = 0.269. PUE 1.08 (DLC): CUE = 0.242.",standard:"The Green Grid; SEAI 2026 grid emission factor",feynman:{analogy:"Think of it like calculating the carbon footprint of a taxi journey. It depends on two things: how far you drive (facility efficiency = PUE) and how dirty the fuel is (grid carbon = emission factor). CUE multiplies these together to show how much carbon each kWh of computing produces.",firstPrinciples:"CUE = PUE multiplied by the grid emission factor. In Ireland, the SEAI 2026 average grid emission factor is 0.2241 kgCO₂/kWh. At PUE 1.50 (legacy air-cooled): CUE = 0.336. At PUE 1.08 (DLC pod): CUE = 0.242. That is a 28% carbon reduction per kWh of IT — achieved purely through facility efficiency, without changing the grid.",theTest:"You understand this when you can answer: if Ireland's grid reaches 80% renewable and the emission factor drops to 0.05 kgCO₂/kWh, does PUE still matter for carbon? Answer: less, but yes. At 0.05 and PUE 1.50: CUE = 0.075. At PUE 1.08: CUE = 0.054. The absolute numbers are smaller, but the 28% relative improvement from better PUE still applies."},soWhat:"CUE links energy efficiency to carbon impact — it makes the sustainability case for liquid cooling quantifiable and auditable."},
{term:"Total Use of Energy (TUE)",definition:"A metric capturing both IT energy efficiency and cooling efficiency: TUE = PUE multiplied by IT equipment utilisation efficiency.",plain:"PUE only measures how efficiently you cool the servers. TUE also measures how efficiently the servers are actually being used. A DC can have great PUE but terrible TUE if servers are idle.",number:"TUE = PUE x ITUE. Ideal TUE: 1.0 to 1.2. Typical legacy DC: 2.5 to 4.0. High-density liquid-cooled: 1.1 to 1.5.",standard:"The Green Grid TUE metric; EN 50600-4-1 (energy efficiency)",feynman:{analogy:"Like measuring a car by both fuel efficiency and how often it actually carries passengers. A car doing 50 mpg but sitting in the garage 90 percent of the time is not efficient overall. TUE captures both the cooling efficiency and the IT utilisation.",firstPrinciples:"PUE measures total facility energy divided by IT energy. But if IT equipment is 30 percent utilised, 70 percent of the IT energy is wasted on idle servers. TUE multiplies PUE by IT utilisation inefficiency to give a true picture of energy effectiveness.",theTest:"A DC has PUE 1.2 but servers are 25 percent utilised. What is the effective TUE? Answer: TUE = 1.2 x (1/0.25) = 4.8. Despite excellent PUE, the facility wastes 80 percent of its energy on idle servers."},soWhat:"TUE provides the complete energy picture that PUE misses — essential for genuine efficiency comparison between air and liquid cooling."},{term:"Cooling energy proportion (CEP)",definition:"The fraction of total facility energy consumed by cooling infrastructure, used to compare different cooling architectures.",plain:"What percentage of your electricity bill goes to cooling. Air cooling: 30 to 40 percent. Liquid cooling: 5 to 15 percent.",number:"Air-cooled legacy: 30 to 40 percent. DLC with warm water: 5 to 10 percent. Immersion: 3 to 8 percent. Target: under 10 percent.",standard:"EN 50600-4-1; ASHRAE TC 9.9",feynman:{analogy:"Like comparing the heating bill as a percentage of total household costs. A well-insulated house spends 5 percent on heating. A draughty house spends 30 percent. CEP measures the same for DC cooling.",firstPrinciples:"Cooling energy is the biggest variable cost in a DC. For an expanded teaching scenario at 10 MW IT load, reducing CEP from 35 percent to 8 percent saves approximately 2.7 MW of cooling power, worth 2.8 million euro per year at 0.12 euro per kWh.",theTest:"Clonshaugh at PUE 1.50 spends what on cooling? Answer: PUE 1.50 means 50 percent overhead. Of that, cooling is typically 70 percent of overhead = 35 percent of total energy. At 2,400 kW IT: approximately 840 kW cooling = 880,000 euro per year."},soWhat:"CEP isolates cooling cost from total energy — the metric that directly measures the financial impact of the cooling technology choice."}
],whatItLooksLike:"DCIM dashboard with three gauges: PUE (facility-level), TUE (compute-level), CUE (carbon-level). In DLC hall, TUE shows bigger improvement than PUE.",siteChecklist:["Verify BMS/DCIM can measure IT compute power separately from fan power","Check server BMC/IPMI reports GPU/CPU power independently","Establish baseline PUE and TUE before DLC deployment","Update EED Article 12 reporting to include TUE"]},
logic:{causeAndEffect:[
{cause:"DLC removes 70–80% of heat before it enters the air stream, reducing server fan speeds and fan power by 40–80%",effect:"PUE improves less than expected — may not change between intermediate DLC percentages",insight:"NVIDIA/Vertiv found PUE unchanged between 61.4% and 68.6% DLC. TUE showed clear improvement. If the board uses PUE alone, they’ll undervalue DLC."},
{cause:"Partial PUE (pPUE) isolates the efficiency of the cooling subsystem by excluding the IT load from the denominator",effect:"pPUE enables direct comparison of DLC zone efficiency versus the air-cooled zone within the same facility",insight:"Facility-level PUE blends both zones. pPUE for DLC zone will be dramatically lower."},
{cause:"TUE is not measured because the PUE of 1.25 appears satisfactory and no further metric is requested by the investor",effect:"Servers are running at 20 percent utilisation. Effective TUE is 6.25. The facility is using 5 times more energy than needed per unit of useful compute.",insight:"PUE measures the building. TUE measures the business. A DC with PUE 1.25 and 20 percent utilisation is less efficient than one with PUE 1.50 and 80 percent utilisation."}
],constraintLesson:"Constraint: measurement infrastructure. TUE requires server-level power monitoring separating compute from fan power. For Clonshaugh’s new GPU servers, NVIDIA management interface provides this. For legacy 360 air-cooled racks, may not be possible — acceptable.\n\nPragmatic: report PUE for facility (EED), TUE for DLC pod (investment justification), CUE for carbon (SFDR, EU Taxonomy).",
weakestLink:{whatsWrong:"Our DLC pod achieved PUE 1.08 — proves the investment was worthwhile.",whatsRight:"PUE 1.08 is excellent but understates the gain. TUE might be 1.05 or lower. Report both — PUE for regulatory compliance, TUE for engineering truth.",howToGetThere:"Configure DCIM to collect GPU/CPU power from BMC/IPMI. Calculate TUE. Report both monthly."}},
rhetoric:{declan:{hook:"I track PUE because the regulators require it. But TUE shows the real improvement and it is the metric that tells tenants how efficiently their AI workload is actually being cooled.",text:"I track PUE because regulators want it. But TUE shows the real improvement and justifies more DLC pods. PUE told us our building was efficient. TUE told us our business was wasteful. We had PUE 1.25 but servers were at 25 percent utilisation. TUE was 5.0. That was the wake-up call."},ann:{hook:"Quarterly reporting: PUE for regulatory compliance, TUE for operational efficiency, CUE for carbon intensity. DLC deployment improves all three simultaneously — communicate that to the investment committee.",text:"Quarterly report: PUE (regulatory), TUE (efficiency), CUE (carbon intensity). DLC drops CUE from 0.337 to 0.242 — 28% reduction. Investors are starting to ask about TUE, not just PUE. A fund with PUE 1.2 and 20 percent utilisation is less attractive than PUE 1.4 with 80 percent utilisation. TUE captures this."},mark:{hook:"The Vertiv and NVIDIA ASME paper is the reference standard for TUE methodology. 75 percent DLC deployment reduces total facility power by 15 to 20 percent versus a comparable air-cooled facility.",text:"The Vertiv/NVIDIA ASME paper is the reference. 75% DLC reduces total facility power by 27%, improves TUE by 15.5%. Measured results. CEP below 10 percent is achievable with warm water DLC. At Clonshaugh PUE 1.50, CEP is approximately 35 percent. With DLC at PUE 1.15, CEP drops to 8 percent. That is a 4 times reduction in cooling energy."},sarah:{hook:"CUE feeds into SFDR PAI indicators. Lower CUE means a better sustainability disclosure for the fund. DLC deployment at Clonshaugh reduces CUE from 0.336 to 0.293 — a 13 percent improvement on the same IT load.",text:"CUE feeds into SFDR PAI indicators. Lower CUE = better reporting for Ann’s fund. DLC improves CUE purely through efficiency."},tom:{hook:"TUE measurement infrastructure at 20 to 30 thousand euros per DLC pod. That incremental metering cost is justified — it is the metric that premium AI tenants will reference in their own sustainability reporting.",text:"TUE measurement infrastructure: ~€20–30k per pod (Tier 3 — CIBSE; Vertiv/Schneider published DCIM pricing, indicative) (BMC licenses, DCIM module). Trivial against €3M+ pod investment. Proves the savings. Cooling energy at Clonshaugh: approximately 840 kW at PUE 1.50. With DLC at PUE 1.15: approximately 360 kW. Saving: 480 kW at 0.12 euro per kWh = 504K euro per year. Liquid cooling pays for itself in cooling savings alone."}},
rhetoricTakeaways:{declan:"Waste heat at 35–40°C from CDUs is genuinely useful — connect to building heating before exploring district networks.",ann:"Waste heat revenue at €15–25/MWh creates a new income stream that improves the liquid cooling business case.",mark:"Heat pump COP of 3–5 means waste heat recovery generates more useful energy than it consumes — the maths works.",sarah:"EED Article 26 makes waste heat recovery a regulatory obligation — early compliance avoids retrofit costs later.",tom:"District heating connection charges of €50–100k per MW (Tier 3 — Uisce Éireann/district heating operator published tariffs, indicative) are recoverable within 3–5 years at current heat prices."},
scenario:{title:"Clonshaugh: Why TUE reveals what PUE hides",narrative:"DLC deployed in three stages. BMS records total facility power, IT equipment power, IT compute power.",question:"Compare PUE and TUE across 0%, 60%, and 75% DLC. Calculate CUE at 75%.",answer:"Baseline (0% DLC): PUE = 3,600/2,400 = 1.500. TUE = 3,600/2,220 = 1.622.\n60% DLC: PUE = 3,168/2,310 = 1.371. TUE = 3,168/2,220 = 1.427.\n75% DLC: PUE = 2,952/2,256 = 1.308. TUE = 2,952/2,220 = 1.330.\n\nPUE improvement 60%→75%: 4.6%. TUE improvement: 6.8%. TUE shows 48% more improvement.\nWhy? PUE denominator shrinks as fans spin down, partially offsetting numerator reduction.\n\nCUE at 75%: 1.308 × 0.2241 = 0.293 kgCO₂/kWh IT.\nBaseline CUE: 0.336. Saving: (0.336−0.293) × 2,400 × 8,760/1,000 = 904 tonnes CO₂/year (full facility, all 400 racks benefiting from reduced PUE).",
whoShouldCare:["mark","sarah"]},
sourceNote:"Vertiv/NVIDIA ASME paper (T3); The Green Grid (T2); SEAI 2026 grid EF 0.2241 kgCO₂/kWh (T1); ISC 2013 TUE origin (T2).",retrofitRelevance:"New metrics essential to justify DLC investment.",
  cascadeCheck:(kw,racks,pue)=>{const pueOnly=pue;const dlcPUE=1.15;const tueFactor=0.85;const tue=dlcPUE*tueFactor;return{needed:pueOnly.toFixed(2),available:tue.toFixed(2),unit:"PUE vs TUE (with DLC)",pass:false,detail:`Current PUE ${pueOnly}. With DLC: PUE ~${dlcPUE}, TUE ~${tue.toFixed(2)} (captures heat reuse). TUE shows true efficiency.`}},
  crossRefs:[{module:"DC-LEARN-004",level:"L1",topic:"PUE fundamentals"},{module:"DC-LEARN-004",level:"L7",topic:"PUE reporting for EED"}]},
{id:"L9",level:9,name:"Retrofit Strategy",icon:"🎯",component:"Business Case",available:true,
clockQuote:"That's not a problem. That's a market. Ann smiled for the first time since she'd walked into this building. The density request wasn't a disruption to the programme. It was the reason the programme existed.",
userNeedStatement:"Synthesise all prior levels into a phased retrofit strategy with a defensible business case.",
plainEnglish:"This is where it all comes together. Clonshaugh converts 40 racks from 6 kW air to 30 kW DLC, adding 960 kW of premium AI capacity. Total investment: ~€3.1M (indicative — Tier 2/T3 per sourcing in level content). Payback: 2.1 years (indicative).",
grammar:{facts:[
{term:"Retrofit vs New Build",definition:"Brownfield DLC: €3,000–5,000/kW IT. Greenfield new-build: €10,000–15,000/kW IT. Retrofit 50–70% cheaper.",plain:"Retrofitting costs about a third of building new — the building, grid connection, and base infrastructure exist.",number:"Retrofit: €3,000–5,000/kW IT. New build: €10,000–15,000/kW IT. (Tier 2 — AIMEP DC Standards Ref v1.2 Section 7; Schneider Electric Feb 2026; SCSI benchmarks, indicative)",standard:"AIMEP DC Standards Ref v1.2 Section 7; Schneider Electric Feb 2026",feynman:{analogy:"Think of it like renovating a house versus building from scratch. If the foundations, walls, and roof are sound, renovation gets you a modern kitchen for a fraction of the cost of a new build. A DC retrofit reuses the building, grid connection, and base cooling — saving 50–70%.",firstPrinciples:"A new-build AI DC costs €10,000–15,000 per kW IT (Tier 2 — AIMEP DC Standards Ref v1.2 Section 7; Schneider Electric Feb 2026; SCSI benchmarks, indicative) because you pay for land, building, HV connection (years of lead time), transformers, generators, and cooling plant from scratch. A retrofit costs €3,000–5,000/kW IT (Tier 2 — SCSI benchmarks; AIMEP DC Standards Ref v1.2 Section 7, indicative) because the building, HV connection, and base infrastructure already exist. You add DLC cooling, upgrade power distribution, and reinforce the floor — significant work, but a fraction of starting from zero.",theTest:"You understand this when you can answer: what is the single largest cost saving in retrofit versus new build? Answer: the HV grid connection. ESB Networks connection modifications can take 2–4 years and cost millions. An existing facility with MIC headroom avoids this entirely — saving years and substantial capital."},soWhat:"TCO analysis over 10–15 years consistently favours liquid cooling retrofit — the lower capex versus new build is recovered through density uplift."},
{term:"DLC Revenue Premium",definition:"DLC colocation commands 20–40% premium. Standard: €80–100/kW/month. DLC-ready: €100–140/kW/month.",plain:"AI tenants pay more for liquid-cooled space because very few facilities offer it.",number:"Standard: €80–100/kW/month. DLC: €100–140/kW/month.",standard:"Schneider Electric Feb 2026; industry colocation benchmarks (T3)",feynman:{analogy:"Think of it like airport parking — covered, secure spaces near the terminal command a premium because demand is high and supply is limited. DLC-ready colocation space commands a 20–40% premium because very few facilities can offer it, and AI workloads are desperate for it.",firstPrinciples:"Standard colocation in Ireland sells at €80–100/kW/month. DLC-ready AI space sells at €100–140/kW/month. The premium exists because AI workloads need liquid cooling, very few facilities offer it, and the cost of building new is much higher than the premium tenants pay. For the operator, the revenue uplift more than covers the retrofit investment.",theTest:"The following uses indicative revenue figures. Input assumptions: DLC lease rate €120/kW/month Tier 3 — CBRE/JLL Irish DC market data; existing air-cooled rate €90/kW/month Tier 3 — CBRE/JLL Irish DC market data. All outputs screening-level. You understand this when you can answer: if Clonshaugh charges €120/kW/month for DLC space versus €90/kW/month for existing air-cooled space, what is the incremental annual revenue from converting 40 racks at 6 kW to 40 racks at 30 kW? Answer: DLC revenue = 1,200 kW × €120 × 12 = €1,728k. Existing revenue = 240 kW × €90 × 12 = €259k. Incremental = €1,469k/year."},soWhat:"Liquid-cooled capacity commands a 20–40% lease premium — the investment in cooling infrastructure pays back through higher revenue per square metre."},
{term:"Clonshaugh Total Investment",definition:"Phase 1 pilot: €300k. Phase 2: Cooling €1.7M + Power €400k + Structural €350k + Fees/commissioning €350k. Total: €3.1M for 1,200 kW → €2,580/kW IT.",plain:"€3.1M total for 1,200 kW AI capacity at €2,580/kW — well below industry benchmarks.",number:"Total: €3.1M. Capacity: 1,200 kW. Cost/kW: €2,580.",standard:"Built-up estimate from module levels L2–L7; RICS Life Cycle Costing guidance (T2/T4 — working shown in field challenge)",feynman:{analogy:"Think of it like buying and fitting out a commercial kitchen. The equipment (CDUs = ovens, busbar = gas supply, spreader plates = reinforced floor) costs a lot, but the revenue from the restaurant (AI tenant) pays it back in two years. The building already exists — you are upgrading the services.",firstPrinciples:"The following uses indicative figures (Tier 2/T3 — sourcing per tom note). Input assumptions: all cost components Tier 2/T3 per tom rhetoric note above; revenue rates Tier 3 — CBRE/JLL Irish DC market data. Outputs screening-level, subject to detailed design and tender. The total investment breaks down into five components: pilot (€300k — proves the concept), cooling (€1,700k — CDUs, piping, manifolds), power (€400k — sub-MSB, busbar, PDUs), structural (€350k — spreader plates, CDU plinths), and professional fees plus contingency (€350k). Total: €3,100k for 1,200 kW DLC capacity. Cost per kW IT: €2,580.",theTest:"indicative figures (Tier 2/T3 — sourcing per tom calculation note above). You understand this when you can answer: Ann needs to know the simple payback period. What is it? Answer: investment €3.1M, incremental annual revenue €1,469k (gross €1,728k minus existing €259k). Payback = €3.1M / €1.47M = 2.1 years."},soWhat:"Understanding the total investment breakdown prevents budget surprises — CDUs, piping, structural, and electrical each carry significant cost."},
{term:"Liquid cooling retrofit ROI",definition:"The financial return calculation for converting from air to liquid cooling, considering reduced cooling energy, increased rack density, and premium tenant revenue.",plain:"The business case for switching to liquid cooling: you save on electricity, fit more servers per square metre, and charge tenants more.",number:"Energy saving: 25 to 40 percent of cooling cost. Density increase: 3 to 5 times current. Revenue premium: 15 to 30 percent per kW. Typical payback: 2 to 4 years for DLC retrofit.",standard:"Schneider Electric Application Note; Uptime Institute 2024 DLC cost survey",feynman:{analogy:"Like converting a car park to a multi-storey. The same footprint holds 3 to 5 times more cars (density), the per-space revenue is higher (premium), and the operating cost per car is lower (efficiency).",firstPrinciples:"Three revenue levers: energy cost reduction (lower PUE), density increase (more kW per m2), and premium pricing (AI tenants pay more for liquid cooling). The capex is CDU, piping, cold plates, and leak detection. The ROI depends on which levers are available.",theTest:"Clonshaugh converts one hall from 6 kW air to 30 kW DLC. What is the revenue impact? Answer: Same hall area, 5 times the IT load. If rack revenue is proportional to kW, revenue increases 5 times. Cooling energy drops 30 percent. Capex payback: 2 to 3 years."},soWhat:"ROI analysis shows 18–30 month payback driven by density increase — the revenue uplift from 6 to 30 kW per rack is the primary return driver."},{term:"Phased liquid cooling deployment",definition:"A risk-managed approach starting with a pilot pod of 4 to 8 racks, validating performance, then scaling in 20 to 40 rack increments.",plain:"Start small, prove it works, train your team, then expand. Do not convert the whole DC at once.",number:"Pilot: 4 to 8 racks with dedicated CDU. Scale: 20 to 40 rack pods. Pilot capex: 200K to 400K euro. Full hall conversion: 2M to 5M euro.",standard:"Schneider Electric Reference Design; EN 50600-2-3:2019",feynman:{analogy:"Like renovating a hotel room by room. Each room is completed before starting the next. If something goes wrong at 4 racks, the loss is 300K. At 400 racks, it is catastrophic.",firstPrinciples:"Full conversion is high risk and high capex. Phased deployment limits capital at risk, allows operational learning, and matches investment to confirmed tenant demand. Each phase has its own CDU, its own commissioning, and its own business case.",theTest:"Ann asks why not convert all 400 racks to DLC at once. Answer: Phased limits risk (300K pilot vs 3M full), allows training, and matches investment to confirmed demand. Speed matters less than certainty."},soWhat:"Phased deployment matches capex to proven demand — each phase de-risks the next and builds operational confidence incrementally."}
],whatItLooksLike:"40 racks in four rows, overhead busbar, CDUs at row ends, insulated CHW pipes to roof dry coolers. BMS shows real-time PUE, TUE, CUE. DLC pod is quieter than air zone.",siteChecklist:["Confirm all L1–L8 assessments complete","Finalise deployment schedule with milestones","Procure CDUs, busbar, spreader plates in parallel","Schedule pipe installation during maintenance window","Plan tenant commissioning: emulators → gradual ramp → full AI"]},
logic:{causeAndEffect:[
{cause:"Clonshaugh converts 40 racks from 6 to 30 kW, increasing IT from 2,400 to 3,360 kW in same footprint",effect:"Revenue per m² increases with density, and the DLC infrastructure premium per kW amplifies the return on floor area",insight:"Same building, 40% more IT, 20–40% higher price/kW. Revenue per m² can increase 60–80%."},
{cause:"Retrofit requires coordinated cooling, power, structural, and measurement work streams",effect:"Any one discipline bottlenecking delays everything — critical path typically runs through power or structural",insight:"Cooling is what everyone talks about. Power kills the schedule. Structural kills the budget if discovered late."},
{cause:"A retrofit business case assumes 100 percent of racks will convert to high density.",effect:"Many tenants are running commodity workloads that do not need liquid cooling. Forcing conversion loses these tenants. Actual conversion reaches 40 to 60 percent.",insight:"Model the business case at 50 percent conversion, not 100. The hybrid approach (some air, some liquid) is the realistic outcome for most retrofits."}
],constraintLesson:"Overriding constraint: ESB Networks MIC. Adding ~1,300 kW demand requires MIC headroom. If facility is at MIC, connection modification = 4–8 years. Verify MIC before committing capital.\n\nIf MIC constrained: (a) decommission low-value air-cooled racks, (b) on-site generation (EPA/CRU rules), (c) energy storage peak-shaving.\n\nAssuming MIC confirmed: target 9 months from decision to first AI workload.",
weakestLink:{whatsWrong:"Wait until GPU densities stabilise before investing in liquid cooling.",whatsRight:"Densities are increasing, not stabilising. Waiting means missing revenue today and paying more tomorrow. DLC infrastructure is modular — outlasts servers by 10–15 years.",howToGetThere:"Make the decision. Engage CDU vendor, structural engineer, electrical contractor in parallel. CDU PO within 4 weeks. Target pilot at week 12."}},
rhetoric:{declan:{hook:"Nine months from decision to first AI tenant. The CDU is the longest lead item — order it in week one or the programme slips by two months regardless of everything else.",text:"Nine months from decision to first AI tenant. CDU is the longest lead — order it first, design around it. We started with 8 racks of DLC as a pilot. Dedicated CDU, dedicated water loop, dedicated monitoring. It took 6 weeks to commission and 3 months to prove the performance. Then we scaled to 40 racks. Then 120. Each phase was funded by the previous."},ann:{hook:"3.1 million euros total investment enabling premium AI tenant revenue at 3 times the standard per-kW rate. Model the revenue uplift over 5 years against that capital — the NPV case is straightforward.",text:"€3.1M investment (indicative, Tier 2/T3 — see sourcing in Tom cost note below). Existing 40 racks at 6 kW generate €259k/yr. DLC lifts to €1,728k/yr. Incremental: €1,469k/yr. Payback: 2.1 years. IRR above 25%. The retrofit ROI has three components: energy saving (25 to 40 percent of cooling cost), density premium (15 to 30 percent higher rent per kW), and tenant retention (AI tenants will leave if you cannot offer liquid). Model all three."},mark:{hook:"Programme: weeks 1 to 4 for assessments and CDU procurement, weeks 4 to 12 for structural and power works, weeks 12 to 24 for CDU installation and DLC commissioning, weeks 24 to 36 for tenant fit-out.",text:"Programme: weeks 1–4 (assessments + CDU procurement), 4–12 (structural + power + piping), 12–16 (CDU installation), 16–20 (pilot with 4 live racks), 20–36 (scale to 40). Critical path: CDU delivery 8–12 weeks. The pilot must include full instrumentation: supply and return temperatures, flow rates, power consumption, chip junction temperatures. Without data, you cannot prove the business case for scaling."},sarah:{hook:"CUE improves from 0.336 to 0.293 — a 13 percent reduction and 452 tonnes CO2 per year saved. DLC removes the evaporative water loss entirely. Both metrics are reportable in the EED Article 12 annual submission.",text:"CUE improves from 0.336 to 0.293 — 13% reduction. 452 tonnes CO₂/yr saved (DLC zone only). At €71/tCO₂ (Budget 2025): €32k/yr, rising to €45k/yr at €100/tCO₂ (2030, Finance Act). A phased retrofit aligns with CRREM methodology. Each phase improves the carbon intensity, moving the facility further from the misalignment trajectory. Document each phase for investor reporting."},tom:{hook:"Full business case: assessment 25 thousand euros, structural 320 thousand euros, power distribution 650 thousand euros, CDU and DLC 1.6 million euros, commissioning 80 thousand euros. Total 2.7 million euros.",text:"The following uses indicative figures for illustration. Input assumptions: pilot T3 — Asetek/CoolIT/Vertiv published ranges; cooling (CDU/piping/manifolds) T3 — Asetek/CoolIT/Vertiv published ranges; power (sub-MSB/busbar/PDU) T2 — SCSI benchmarks; structural T3 — Irish contractor market pricing; professional fees T2 — RICS NRM1 fee benchmarks; revenue rates T3 — CBRE/JLL Irish DC market data. All outputs screening-level, subject to detailed design and tender. Total: pilot €300k + cooling €1,700k + power €400k + structural €350k + fees €350k = €3,100k. Revenue at €120/kW/month: €1,728k/yr gross. Less existing €259k/yr. Incremental: €1,469k/yr. Payback: 2.1 years. Pilot (8 racks): 200K to 400K. Phase 1 (40 racks): 800K to 1.5M. Phase 2 (120 racks): 2M to 4M. Full hall (400 racks): 5M to 10M. Each phase has its own business case and ROI calculation."}},
rhetoricTakeaways:{declan:"Total cost of liquid cooling is front-loaded — the first 3 years are capex-heavy but years 4–15 deliver consistent savings.",ann:"Risk-adjusted NPV over 10–15 years consistently favours liquid cooling — the stranded asset risk of inaction is higher.",mark:"CDU, piping, and structural work are 60–70% of capex — these are the line items that need early procurement commitment.",sarah:"The carbon case for liquid cooling strengthens each year as grid emission factors decline and carbon tax rises.",tom:"Insurance certification for leak detection is now a procurement requirement — budget €15–25k (Tier 3 — Irish insurer market practice, indicative) and include in the spec."},
scenario:{title:"Clonshaugh: Full retrofit business case",narrative:"Investment committee requires single-page summary: cost, revenue, payback, risks.",question:"Prepare business case summary.",answer:"Indicative figures only — sourcing per level sourceNote (T2/T3). Capacity: 40 racks × 30 kW = 1,200 kW IT (DLC).\nCOST: Pilot €300k + Cooling €1,700k + Power €400k + Structural €350k + Fees €350k = €3,100k (€2,580/kW IT).\nREVENUE: 1,200 kW × €120/month × 12 = €1,728k/yr. Less existing €259k/yr = €1,469k/yr incremental.\nPAYBACK: €3.1M / €1.47M = 2.1 years.\nCARBON: 452 t CO₂/yr saved (DLC zone only — 40 racks at PUE 1.08 vs 1.50 baseline). €32k/yr at €71/tCO₂.\nRISKS: (1) Tenant risk — phased deployment mitigates. (2) Structural — spreader plates costed. (3) Power — transformer marginal, verify. (4) ESB Networks MIC — VERIFY BEFORE COMMITTING. 2–4 year wait if constrained. (5) CDU lead time 8–12 weeks.\nPROGRAMME: 9 months (assumes MIC confirmed).",
whoShouldCare:["ann","mark","tom"]},

// Source: 27 questions (3 per level × 9 levels) per DC_LEARN_SERIES_SPEC_v1_4 §5.
const ASSESSMENT_QUESTIONS=[
// L1
{level:1,id:"Q014-01",icon:"🌡️",stage:"grammar",q:"What is the approximate heat-carrying capacity ratio of water to air by volume?",options:["350:1","3,500:1","35:1","35,000:1"],correct:1,explain:"Water carries ~3,500× more heat per unit volume than air — specific heat 4.186 vs 1.005 kJ/kg·K, plus far higher density. This is why liquid cooling handles 30+ kW/rack densities where air cooling physically cannot remove heat fast enough."},
{level:1,id:"Q014-02",icon:"🌡️",stage:"logic",q:"Why does DLC enable tighter GPU packing in the NVL72, beyond thermal management?",options:["Removing air-cooled heatsinks shortens GPU distance, enabling copper NVLink","DLC servers are physically more compact due to the absence of air-cooled heatsinks, allowing tighter rack packaging.","DLC reduces the number of GPUs required per compute job by improving per-GPU thermal headroom and boosting clock speeds.","DLC eliminates the need for dedicated power distribution infrastructure by integrating coolant and power in the same manifold."],correct:0,explain:"DLC cold plates replace bulky heatsinks, allowing GPUs close enough for copper NVLink interconnects — shorter distance = lower latency = higher training throughput. NVIDIA mandates DLC for NVL72 as a compute performance requirement, not just thermal."},
{level:1,id:"Q014-03",icon:"🌡️",stage:"rhetoric",q:"From Tom’s perspective, what is the cost saving of DLC retrofit vs new AI facility?",options:["10–20% cheaper","30–40% cheaper","50–70% cheaper","80–90% cheaper"],correct:2,explain:"DLC retrofit costs €3,000–5,000/kW IT vs €10,000–15,000/kW IT for new AI facility — a 50–70% saving. Tom positions retrofit as the cost-efficient path, provided the existing structure supports the NVL72 point loads (~21 kN/m²)."},
// L2
{level:2,id:"Q014-04",icon:"❄️",stage:"grammar",q:"What percentage of the liquid cooling market do DLC systems represent by revenue?",options:["23%","83%","63%","43%"],correct:3,explain:"DLC holds ~43% of the liquid cooling market by revenue but ~75% by rack count (2025). The gap reflects immersion's higher per-unit cost. For most DC operators, DLC's lower infrastructure disruption makes it the practical first step to liquid cooling."},
{level:2,id:"Q014-05",icon:"❄️",stage:"logic",q:"Why does DLC achieve near-zero Water Usage Effectiveness (WUE)?",options:["DLC operates as a closed loop with no evaporative water loss","DLC uses significantly less water than evaporative cooling towers — approximately 80% less on a per-kW basis at rated load.","DLC systems use recycled greywater sourced from the facility's water management system, reducing fresh water consumption.","DLC does not require any coolant or fluid — heat transfer occurs via direct contact between the chip and a phase-change material."],correct:0,explain:"DLC is closed-loop — coolant recirculates without evaporative loss. Unlike cooling towers (WUE 1.0–1.8 L/kWh), DLC achieves near-zero WUE. For Sarah's ESG reporting, this is a measurable water sustainability advantage under EU Taxonomy criteria."},
{level:2,id:"Q014-06",icon:"❄️",stage:"rhetoric",q:"What coolant flow rate per rack at 30 kW, 75% DLC, 10°C ΔT?",options:["12 L/min","22 L/min","32 L/min","42 L/min"],correct:2,explain:"At 30 kW/rack with 75% DLC fraction: heat = 22.5 kW. Flow = 22.5 ÷ (4.186 × 10°C ΔT) = 0.538 kg/s = 32.3 L/min. Mark should verify per-rack flow against CDU manifold capacity to confirm balanced distribution across the pod."},
// L3
{level:3,id:"Q014-07",icon:"🔄",stage:"grammar",q:"What is the primary purpose of the CDU heat exchanger?",options:["Cool servers directly","Filter data hall air","Generate chilled water based on manufacturer specific","Isolate clean TCS coolant from facility water"],correct:3,explain:"The CDU plate heat exchanger isolates clean TCS coolant from facility FWS — protecting cold plate micro-channels from contamination. Any cross-contamination blocks micro-channels permanently, requiring full cold plate replacement at €2–5k per server."},
{level:3,id:"Q014-08",icon:"🔄",stage:"logic",q:"How long from CDU pump failure to GPU thermal shutdown at 1,200 W/GPU?",options:["5–10 minutes","1–2 minutes","10–30 seconds","Less than 5 seconds"],correct:2,explain:"At 1,200 W/GPU, junction temps rise ~5°C/second when coolant stops. GPUs throttle at ~83°C and shut down at ~90°C — giving 10–30 seconds before thermal shutdown. CDU pump redundancy (N+1) with fast switchover (<5s) is essential."},
{level:3,id:"Q014-09",icon:"🔄",stage:"rhetoric",q:"What does Tom estimate as CDU cost proportion of total DLC cooling infrastructure?",options:["35–50%","10–20%","60–70%","80–90%"],correct:0,explain:"CDU cost at €1.2–1.75M represents 35–50% of total cooling infrastructure for a 1,200 kW pod. Tom flags this concentration: the CDU is both the most expensive and most critical single component. Procurement lead time is 8–12 weeks."},
// L4
{level:4,id:"Q014-10",icon:"🛁",stage:"grammar",q:"What PUE values can single-phase immersion cooling achieve?",options:["1.20–1.30","1.10–1.15","1.02–1.03","1.00 exactly"],correct:2,explain:"Single-phase immersion achieves PUE 1.02–1.03 — the only cooling energy is pump power, no fans or compressors. However, the infrastructure cost (structural reinforcement, fluid, drainage, containment) limits practical adoption to greenfield or purpose-built facilities."},
{level:4,id:"Q014-11",icon:"🛁",stage:"logic",q:"Why is brownfield immersion adoption only ~20%?",options:["Immersion total cost of ownership is prohibitive — the coolant fluid alone costs 15× more per litre than chilled water.","Limited vendor support is the primary barrier — fewer than five vendors have deployed immersion at scale in Irish data centres.","Legacy buildings are structurally incompatible with immersion — concrete slabs from the 1990s cannot bear tank loads under any retrofit scheme.","Structural reinforcement, drainage, crane access, and new procedures are difficult in existing facilities"],correct:3,explain:"Brownfield immersion faces multiple barriers: tanks at 3–5 t/m² exceed most existing floor ratings, drainage requires bunded containment, crane access is needed for servicing, and operations require entirely new skill sets. Only ~20% brownfield adoption reflects these realities."},
{level:4,id:"Q014-12",icon:"🛁",stage:"rhetoric",q:"At what density does immersion become more practical than DLC?",options:["30 kW/rack","50 kW/rack","80 kW/rack","120 kW/rack"],correct:2,explain:"80 kW/rack is the transition where immersion’s superior heat flux removal justifies the structural and operational investment. Below 80 kW, DLC handles thermal loads without immersion’s infrastructure disruption. Mark should assess the density roadmap before choosing."},
// L5
{level:5,id:"Q014-13",icon:"🔀",stage:"grammar",q:"What is the recommended pilot pod size for DLC retrofit?",options:["1–2 racks","4–8 racks","20–40 racks","100+ racks"],correct:1,explain:"A 4–8 rack pilot validates thermal performance, CDU control, leak detection, and coolant monitoring while training the operations team. Ann limits exposure to ~€300k instead of committing the full €3.1M before the system is proven in Clonshaugh's environment."},
{level:5,id:"Q014-14",icon:"🔀",stage:"logic",q:"What happens to CRAHs when DLC is added to adjacent racks?",options:["May short-cycle if not re-balanced, wasting energy","Must be fully powered down and decommissioned once DLC is activated — running both simultaneously trips the thermal protection system.","Automatically adjust their setpoints upward through BMS feedback from the DLC manifold temperature sensor.","Are completely unaffected — DLC and CRAH systems operate independently with no thermal or control interaction."],correct:0,explain:"DLC removes heat at source, reducing hot air in the hall. CRAHs designed for full air cooling may overcool remaining racks and short-cycle — wasting energy and accelerating compressor wear. BMS setpoint re-balancing is required after each DLC deployment phase."},
{level:5,id:"Q014-15",icon:"🔀",stage:"rhetoric",q:"Why does Ann recommend phased DLC deployment?",options:["Required by EirGrid under CRU/2025236, which mandates phased implementation for DC power infrastructure upgrades above 2 MVA.","DLC technology is insufficiently mature for full deployment — component reliability data for 10-year lifecycles is not yet available.","Full immediate conversion minimises programme disruption — a single mobilisation is more cost-effective than multiple phased contracts.","Matches capex to revenue — €300k pilot risk vs €3M"],correct:3,explain:"Phased deployment matches capex to revenue — pilot limits exposure to ~€300k. If the tenant doesn’t materialise or performance falls short, Ann has €300k at risk, not €3.1M. Each phase gate requires proven performance before releasing the next capital tranche."},
// L6
{level:6,id:"Q014-16",icon:"⚡",stage:"grammar",q:"At what density does overhead busbar become preferred for power distribution?",options:["6 kW/rack","10 kW/rack","30 kW/rack (inflection point)","120 kW/rack"],correct:2,explain:"30 kW/rack is the power distribution inflection point. Below this, cables are adequate. Above, cable tray congestion limits serviceability and I²R losses become significant. Overhead busbar at 415V reduces distribution losses by ~69% vs 230V cabling."},
{level:6,id:"Q014-17",icon:"⚡",stage:"logic",q:"By how much do I²R losses reduce upgrading from 230V to 415V?",options:["25%","50%","90%","~69%"],correct:3,explain:"Stepping from 230V to 415V cuts current by factor 0.554. I²R losses scale with current squared: 0.554² = 0.307, giving ~69% loss reduction. At 1,200 kW per pod, this saves 18–30 kW parasitic — a measurable PUE improvement."},
{level:6,id:"Q014-18",icon:"⚡",stage:"rhetoric",q:"Annual CO₂ saving from upgrading to busbar at 1,200 kW?",options:["5–10 t/yr","35–59 t/yr","100–150 t/yr","500+ t/yr"],correct:1,explain:"Busbar saves 18–30 kW parasitic × 0.2241 kgCO₂/kWh (SEAI 2026) × 8,760 hrs = 35–59 tCO₂/yr. At carbon tax €71/tCO₂, that is €2.5–4.2k/yr in avoided cost, plus measurable PUE and CUE improvement for Sarah's ESG reporting."},
// L7
{level:7,id:"Q014-19",icon:"🏗️",stage:"grammar",q:"What is the approximate point load of an NVL72 rack?",options:["10 kN/m²","15 kN/m²","30 kN/m²","21 kN/m²"],correct:3,explain:"NVL72: 1,360 kg in 0.64 m² = ~21 kN/m² point load. Standard DC raised floors are rated 10–12 kN/m² — exceeded by ~2×. Structural assessment must be completed before procurement. Spreader plates (~€7k each) distribute load to acceptable levels."},
{level:7,id:"Q014-20",icon:"🏗️",stage:"logic",q:"Why should structural assessment be FIRST in DLC retrofit?",options:["If building can’t support weight, nothing else matters","Cheapest assessment — structural surveys cost €15k–25k and should be completed early to avoid mobilising more expensive workstreams.","Takes the longest of all assessments — 6–8 weeks for a comprehensive structural report, setting the critical path for the programme.","Regulations require a structural assessment before any planning application for DLC retrofit under BCAR Part A structural requirements."],correct:0,explain:"Structural capacity is the first-pass filter — if the floor cannot support the load, nothing else matters. Discovering this after CDU procurement (€1.2–1.75M committed) is catastrophic. Mark should commission the structural survey before any other workstream."},
{level:7,id:"Q014-21",icon:"🏗️",stage:"rhetoric",q:"Tom’s budget for structural mitigation (40-rack pod)?",options:["€50k","€150k","€350k","€700k"],correct:2,explain:"Tom's structural budget: 40 spreader plates × €7k = €280k, 6 CDU plinths × €5k = €30k, fire stopping €8k, plus contingency ≈ €350k total. This is 11% of the €3.1M project — a non-trivial line item often underestimated in early feasibility."},
// L8
{level:8,id:"Q014-22",icon:"📊",stage:"grammar",q:"Which metric uses IT Compute Power (excluding fans) as denominator?",options:["pPUE","TUE","CUE","WUE"],correct:1,explain:"TUE replaces IT Equipment Power with IT Compute Power in the denominator — stripping out server fan energy. This matters because DLC eliminates server fans, which distorts PUE downward without improving actual compute efficiency per watt."},
{level:8,id:"Q014-23",icon:"📊",stage:"logic",q:"Why did PUE not change between 61.4% and 68.6% DLC in the NVIDIA/Vertiv study?",options:["The DLC cooling system was not functioning during the test period, so air cooling continued to carry the full cooling load.","Fan power reduction offset cooling energy reduction in PUE calculation","The installation was incorrect — DLC cold plates were not fully seated, leaving significant heat still transferred to the air stream.","PUE measurement was inaccurate due to sub-metering calibration errors introduced during the DLC manifold installation."],correct:1,explain:"DLC cuts facility cooling energy (PUE numerator) and server fan power (PUE denominator). Between 61.4% and 68.6% DLC penetration, these reductions cancelled out — PUE showed zero change despite real efficiency gains. TUE captured the hidden improvement."},
{level:8,id:"Q014-24",icon:"📊",stage:"rhetoric",q:"TUE shows how much more improvement than PUE between 60% and 75% DLC?",options:["12% more","24% more","48% more","96% more"],correct:2,explain:"PUE improved 4.6% between 60–75% DLC penetration, but TUE improved 6.8% — a 48% larger gain visible only through TUE. Sarah should report both: PUE for EU Taxonomy compliance (≤1.3 threshold), TUE for the true compute efficiency story."},
