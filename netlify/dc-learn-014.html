{id:"L4",level:4,name:"Immersion Cooling",icon:"🛁",component:"Immersion Tank",available:true,
clockQuote:"Declan understood air — you could feel it, hear it, see the curtain sway. Liquid was invisible, pressurised, silent. A leak in an air system was a draught. A leak in a liquid system was a flood. The risk profile changed with the medium.",
userNeedStatement:"Understand immersion cooling: where it excels, why brownfield adoption is limited, and when to choose it over DLC.",
plainEnglish:"Immersion cooling submerges entire servers in non-conductive fluid. It handles extreme densities but requires completely different infrastructure and operations.",
grammar:{facts:[
{term:"Single-Phase Immersion",definition:"Servers submerged in dielectric fluid (hydrocarbon/mineral oil) that remains liquid. Heat transfers by convection. Warm fluid pumped to heat exchanger.",plain:"Servers sit in a bath of special non-conductive oil. Oil stays liquid, gets pumped through a cooler.",number:"PUE: 1.02–1.03. Energy efficiency: up to 80% higher than cold plate DLC.",standard:"Persistence Market Research Jan 2026; GRC specs",feynman:{analogy:"Think of it like cooking sous vide — the food sits in a bath of water at a precise temperature. In single-phase immersion, servers sit in a bath of special oil at a controlled temperature. The oil carries heat away without boiling.",firstPrinciples:"If you submerge a server in non-conductive fluid, the fluid absorbs heat from every surface — no fans needed. The fluid is pumped to a heat exchanger and returned cool. Because there are no fans, no CRAHs, and no air movement, the only cooling energy is pump power. That is why PUE reaches 1.02–1.03.",theTest:"You understand this when you can answer: if immersion achieves PUE 1.02 and DLC achieves 1.08, why does anyone choose DLC? Answer: because immersion requires completely different infrastructure (tanks at 3–5 tonnes/m², crane access, fluid handling), different server form factors, and longer maintenance times. DLC works with standard racks and standard servers."},soWhat:"Single-phase immersion achieves the lowest PUE but demands completely different infrastructure — the decision is irreversible."},
{term:"Two-Phase Immersion",definition:"Servers in low-boiling-point dielectric fluid (fluorocarbon). Fluid boils at chip surface, absorbing heat via latent heat. Vapour rises to condenser, returns as liquid. Passive circulation.",plain:"The fluid actually boils on the chip surface. Vapour rises, hits condenser, falls back. No pumps needed server-side.",number:"Boiling point: 34–61°C. Heat flux: up to 250 kW/m². Two-phase CAGR: 25.64% through 2031.",standard:"3M/Solventis data; Mordor Intelligence Jan 2026",feynman:{analogy:"Think of it like sweating. Your body cools itself by evaporating moisture — the phase change from liquid to gas absorbs enormous energy. Two-phase immersion does the same thing: the fluid boils on the chip surface, absorbing heat through evaporation, then condenses back to liquid and falls down.",firstPrinciples:"Every liquid has a boiling point. Some engineered fluids boil at 34–61°C — just above chip operating temperature. When fluid touches a hot chip, it boils. The phase change absorbs far more energy than just heating liquid (latent heat vs sensible heat). The vapour rises, hits a condenser, turns back to liquid, and falls down — passive circulation with no pumps needed on the server side.",theTest:"You understand this when you can answer: why is two-phase immersion not used more widely despite its superior cooling? Answer: the fluids are expensive (€50–80/litre, Tier 3 — 3M/Solventis published data, indicative), some are fluorocarbon-based with environmental concerns (F-Gas Regulation), and the sealed tank systems are complex to maintain. The technology is best suited for extreme densities (100+ kW/rack) where simpler methods cannot cope."},soWhat:"Two-phase immersion handles extreme densities but the fluid chemistry creates a 15-year regulatory and supply chain commitment."},
{term:"Brownfield Adoption Rate",definition:"~20% of immersion deployments are brownfield. 80% are greenfield. Structural loading, drainage, fluid handling limit retrofit adoption.",plain:"Only 1 in 5 immersion installations is a retrofit.",number:"20.4% brownfield adoption (2025).",standard:"Introl Feb 2026 industry analysis",feynman:{analogy:"Think of it like converting a petrol car to electric — you can do it, but it is far easier and cheaper to buy an electric car from scratch. Immersion cooling in an existing DC is the conversion; new-build immersion is the purpose-built approach.",firstPrinciples:"Retrofitting for immersion requires reinforcing floors for 3–5 tonnes per square metre, installing overhead cranes, building fluid drainage systems, and retraining staff. Only 20% of immersion deployments are retrofits because the structural and operational changes are too disruptive for most existing buildings. The other 80% are new builds where immersion infrastructure is designed in from day one.",theTest:"You understand this when you can answer: a 2013-era DC operator wants to deploy immersion tanks — what is the first thing they should check? Answer: floor loading capacity. Legacy DC floors at 10–12 kN/m² cannot support immersion tanks at 30+ kN/m². If structural reinforcement is needed, the cost may exceed the benefit versus DLC."},soWhat:"The 80% greenfield bias means immersion is rarely the right choice for existing facilities — the structural hurdle is too high."},
{term:"Two-phase immersion cooling",definition:"Immersion cooling using a low-boiling-point dielectric fluid that boils on contact with hot components, carrying heat as vapour to a condenser at the top of the tank.",plain:"The servers sit in a liquid that boils at a low temperature. The boiling carries heat away much faster than just sitting in warm liquid.",number:"Heat flux: up to 1,500 W per cm2. Boiling point: 49 to 56 C (typical engineered fluids). Condenser recovers vapour. PUE contribution: 1.02 to 1.03.",standard:"ASHRAE TC 9.9; Manufacturer specifications",feynman:{analogy:"Like boiling a kettle. The water absorbs heat until it boils, and the steam carries a huge amount of energy. Two-phase immersion uses the same principle but with engineered fluids that boil at 50 C instead of 100 C.",firstPrinciples:"Phase change (liquid to gas) absorbs far more energy than simple heating. A fluid boiling at 50 C on a 80 C chip surface removes heat extremely efficiently. The vapour rises to a condenser at the top of the tank and returns as liquid. No pumps needed for the primary loop.",theTest:"Why is two-phase more efficient than single-phase immersion? Answer: Phase change absorbs latent heat, which is orders of magnitude more energy per unit mass than sensible heating. Two-phase handles 1,500 W per cm2 versus 250 to 300 for single-phase."},soWhat:"The phase-change physics delivers unmatched heat removal but the sealed tank system fundamentally changes how maintenance is done."},{term:"Dielectric fluid",definition:"Electrically non-conductive liquid used in immersion cooling and some direct-to-chip systems, safe for direct contact with IT components.",plain:"A special liquid that does not conduct electricity, so you can dip servers in it without short circuits.",number:"Dielectric strength: greater than 25 kV. Viscosity: 0.5 to 5 cSt (low for good flow). GWP varies: engineered fluids from 1 to 300. Cost: 15 to 50 euro per litre.",standard:"IEC 60296; Manufacturer safety data sheets",feynman:{analogy:"Like cooking oil. You can put your hand in it and it does not shock you because it does not conduct electricity. Dielectric fluid is similar but engineered for cooling, with specific viscosity and boiling points.",firstPrinciples:"Water conducts electricity and would destroy server components. Dielectric fluids are electrically insulating but thermally conductive. They can safely contact circuit boards, capacitors, and chips. The trade-off is cost: dielectric fluid costs 15 to 50 euro per litre versus near-zero for water. Note: 3M announced exit from PFAS manufacturing (end-2025). Fluorinated dielectric fluids face supply chain uncertainty. Non-fluorinated alternatives (mineral oil, synthetic esters) are available but with different thermal properties.",theTest:"Why not use water for immersion cooling? Answer: Water conducts electricity and would short-circuit every component it touches. Dielectric fluid is electrically insulating. The cost premium (15 to 50 euro per litre) is the price of this safety."},soWhat:"Fluid selection is a strategic decision with environmental, cost, and supply chain implications that outlast the hardware it cools."}
],whatItLooksLike:"Rectangular stainless steel vessel, 2–3 m long, filled with clear/yellow fluid. Servers slide in vertically on rails. No fans, no cable clutter, striking silence.",siteChecklist:["Check floor loading (3–5 tonnes/m²)","Plan fluid drainage (€30–80/litre fluid, Tier 3 — 3M/Solventis published data, indicative)","Verify crane access ceiling height","Assess fire safety for dielectric fluids","Review maintenance procedures"]},
logic:{causeAndEffect:[
{cause:"Single-phase immersion eliminates all air-side cooling infrastructure including CRAH units, containment, and raised-floor plenums",effect:"Facility PUE of 1.02–1.03 is achievable at full immersion — the theoretical minimum limited only by power distribution losses",insight:"Lowest theoretical PUE, but PUE alone doesn’t capture server fan elimination which improves TUE further."},
{cause:"Servers must be physically removed from immersion tanks for maintenance, requiring draining or hot-service procedures",effect:"Mean Time To Repair increases 3–5× compared to air-cooled racks due to the physical extraction and re-submerging required",insight:"Best cooling, worst maintainability. OK for long AI training runs; problematic for colocation with frequent changes."},
{cause:"Two-phase immersion uses fluorocarbon dielectric fluids with Global Warming Potential potentially above 750 per EU F-Gas Regulation",effect:"Falls under EU F-Gas Regulation 2024/573. Future supply restrictions and rising fluid costs possible. Single-phase hydrocarbon alternatives are outside F-Gas scope but have lower heat flux capacity.",insight:"Fluid chemistry is a 15-year commitment. Choosing a fluid that faces regulatory phase-out creates stranded infrastructure risk. For new deployments, single-phase hydrocarbon or synthetic ester fluids avoid this exposure entirely."}
],constraintLesson:"Immersion’s constraint is operational and structural, not thermal. Retrofit requires: structural reinforcement (3–5 t/m²), fluid containment, crane system, staff training, fire system assessment.\n\nFor Clonshaugh at 30 kW/rack, DLC is appropriate. Immersion becomes relevant above 80 kW/rack.",
weakestLink:{whatsWrong:"We should skip DLC and go straight to immersion for future-proofing.",whatsRight:"At 30 kW/rack, DLC delivers adequate cooling with far lower structural/operational requirements. Immersion only makes sense above 80 kW/rack.",howToGetThere:"If targeting 80+ kW/rack: structural survey, crane access, vendor quotes. Budget €500–800k for 4-tank pilot (Tier 3 — Iceotope/Submer/LiquidStack published ranges, indicative)."}},
rhetoric:{declan:{hook:"The silence in an immersion tank room is eerie. But swapping a failed drive means full PPE, a drain-down procedure, and a waiting period before you can access the equipment.",text:"The silence in an immersion facility is eerie. But swapping a drive means PPE, draining, hoist, 20-minute drip wait. Immersion is a different world. The servers look different, the racks look different, the maintenance procedures are completely different. Your technicians need retraining. Budget 2 to 4 weeks of hands-on training before going live."},ann:{hook:"Immersion makes sense for purpose-built AI at 100 kW per rack or above. For a Clonshaugh retrofit, DLC cold plates give 80 percent of the benefit with 20 percent of the operational complexity.",text:"Immersion makes sense for purpose-built AI at 100+ kW/rack. For Clonshaugh retrofit at 30 kW, structural upgrade alone costs more than the entire DLC solution. Single-phase immersion reduces cooling energy by up to 45 percent versus air. Two-phase reduces water consumption by 48 percent. For ESG reporting, these are headline numbers."},mark:{hook:"Two-phase achieves 250 kW per square metre heat flux versus 50 to 100 for single-phase DLC. But fluid containment, vapour suppression, and ATEX classification of the tank room are non-trivial engineering requirements.",text:"Two-phase achieves 250 kW/m² heat flux vs 50–100 for single-phase DLC. But fluid cost (€50–80/L, Tier 3 — 3M/Solventis published data, indicative) and F-gas concerns make it niche. Two-phase immersion handles 1,500 W per cm2 versus 250 to 300 for single-phase. But two-phase fluid costs 3 to 5 times more and requires vapour-tight tank design."},sarah:{hook:"Some immersion fluids fall under F-Gas Regulation depending on GWP. Verify the fluid specification against the 2024 F-Gas Regulation phase-down schedule before any immersion system is commissioned.",text:"Some immersion fluids fall under F-Gas Regulation depending on GWP. Single-phase hydrocarbons generally outside scope. Check specific product. The dielectric fluid has GWP implications. Some fluorinated fluids have GWP over 200. Hydrocarbon-based and biobased alternatives have GWP under 10. Specify low-GWP fluid for Taxonomy alignment."},tom:{hook:"DLC cold plates at 200 to 300 euros per kW IT versus single-phase immersion at 600 to 800 euros per kW IT. For a 40-rack pod at 30 kW the capex delta is 500 to 700 thousand euros — significant at pilot scale.",text:"The following uses indicative figures for illustration. Input assumptions: immersion tank costs Tier 3 — Iceotope/Submer/LiquidStack published ranges; structural costs Tier 3 — SCSI benchmarks; fluid costs Tier 3 — 3M/Solventis published data. All outputs screening-level, subject to detailed design and tender. Immersion for 500 kW: tanks €400–600k + structural €100–200k + fluid €150–300k = €650k–1.1M (€1,300–2,200/kW IT). DLC at 30 kW/rack: €800–1,500/kW IT. Immersion tank plus fluid plus CDU: approximately 15K to 25K per kW of IT load. For a 500 kW deployment: 7.5M to 12.5M. Premium over DLC, but supports densities that DLC cannot reach."}},
rhetoricTakeaways:{declan:"Immersion changes everything about maintenance — budget 2–4 weeks of hands-on training before the first tank goes live.",ann:"Immersion makes sense above 80 kW/rack — below that threshold, DLC delivers the same result with far less disruption.",mark:"Two-phase immersion achieves 1,500 W/cm² heat flux but fluid cost and F-Gas concerns make it a niche technology.",sarah:"Dielectric fluid chemistry is a 15-year commitment — choose low-GWP fluids now to avoid stranded infrastructure risk.",tom:"Immersion at €1,300–2,200/kW IT (Tier 3 — Iceotope/Submer/LiquidStack published ranges, indicative) is competitive only above 80 kW — below that, DLC at €800–1,500/kW IT (Tier 3 — Asetek/CoolIT/Vertiv published ranges, indicative) wins."},
scenario:{title:"Clonshaugh: DLC vs immersion for the AI pod",narrative:"Investment committee asks which technology for 40 racks at 30 kW = 1,200 kW IT.",question:"Compare capex and recommend.",answer:"DLC: ~€1,420/kW IT. Moderate structural impact. NVIDIA ships DLC-ready.\nImmersion: ~€1,300–2,200/kW IT. HIGH structural impact. Different form factors.\nRECOMMENDATION: DLC. At 30 kW/rack, DLC wins on structural risk, server compatibility, operational simplicity.\nImmersion becomes relevant above 80 kW/rack.",
whoShouldCare:["mark","ann","tom"]},
sourceNote:"GRC published specs (T3); 3M/Solventis fluid data (T3); Introl Feb 2026 (T3); Mordor Intelligence Jan 2026 (T3).",retrofitRelevance:"Rarely the right choice for brownfield at current densities.",
  cascadeCheck:(kw,racks,pue)=>{const immersionThreshold=80;return{needed:kw.toFixed(0),available:immersionThreshold.toFixed(0),unit:"kW/rack (immersion threshold)",pass:kw<immersionThreshold,detail:`${kw}kW/rack vs ${immersionThreshold}kW immersion threshold. ${kw>=immersionThreshold?"Immersion viable":"Below threshold — DLC preferred for retrofit"}`}},
  crossRefs:[{module:"DC-LEARN-007",level:"L5",topic:"F-Gas Regulation"},{module:"DC-LEARN-002",level:"L3",topic:"Cooling heat rejection — immersion still requires facility-level heat rejection to atmosphere"}]},
{id:"L5",level:5,name:"Hybrid Air/Liquid Transition",icon:"🔀",component:"Hybrid Zone",available:true,
clockQuote:"The floor was designed for 6 kW racks at 800 kilograms. A 30 kW GPU rack weighs up to 1,800 kilograms. The floor won't take it — not the tiles, not the pedestals, not the sub-structure. Density isn't just a cooling problem. It's a structural problem.",
userNeedStatement:"Understand how to phase air-to-liquid transition in brownfield DC without disrupting existing workloads.",
plainEnglish:"You don’t convert an entire DC overnight. You create hybrid zones — DLC pods coexisting with air-cooled racks. The key is managing the interface.",
grammar:{facts:[
{term:"Hybrid Cooling Architecture",definition:"Some racks use DLC (AI), adjacent racks remain air-cooled (storage, networking). Both run simultaneously, sharing facility infrastructure but with dedicated cooling paths.",plain:"Liquid-cooled AI racks sit next to air-cooled storage racks in the same hall. The challenge is managing the boundary.",number:"Common ratio: 70% liquid / 30% air for heat removal in hybrid DLC deployments.",standard:"Schneider Electric Feb 2026; Introl 2025",feynman:{analogy:"Think of it like a street where some houses have gas central heating and others have heat pumps. Both work at the same time, both connect to the same electricity grid, but they operate differently. A hybrid DC hall has air-cooled and liquid-cooled racks sharing the same facility infrastructure.",firstPrinciples:"Not all racks need liquid cooling. Storage servers, network switches, and low-density compute run fine on air. AI training racks at 30+ kW need DLC. In a retrofit, you create a DLC zone for high-density racks while keeping existing air cooling for everything else. Both zones share the chilled water plant and electrical distribution, but have separate cooling paths.",theTest:"You understand this when you can answer: in a hybrid hall, the DLC zone reduces hot air exhaust. What problem does this create for the air-cooled zone? Answer: CRAHs may short-cycle (turn on/off rapidly) because the air-side heat load has dropped. BMS controls must be re-balanced for the hybrid thermal profile."},soWhat:"The phased approach limits capital at risk — a €300k pilot failure (Tier 3 — Asetek/CoolIT/Vertiv; SCSI benchmarks, indicative) is recoverable; a €3M full conversion failure is not."},
{term:"Rear-Door Heat Exchanger (RDHx)",definition:"Liquid-to-air HX on rack rear door. Facility CHW flows through, cooling hot exhaust air. 30–120 kW/rack without modifying servers.",plain:"A radiator bolted to the back door. Cools hot air with chilled water. No server changes needed.",number:"RDHx: 30–120 kW/rack (Motivair ChilledDoor). No server modification.",standard:"Motivair/Schneider Electric specs",feynman:{analogy:"Think of it like a car radiator bolted to the back of a server rack. Hot air from the servers passes through the radiator, gives up its heat to chilled water, and exits cool. The servers inside do not know it is there — nothing changes inside the rack.",firstPrinciples:"An RDHx replaces the standard rear door of a rack with a door containing a liquid-to-air heat exchanger. Facility chilled water flows through copper tubes in the door. Hot exhaust air from servers passes through the tubes and exits 10–20°C cooler. This neutralises the rack's heat output without modifying any servers. Capacity: 30–120 kW per door.",theTest:"You understand this when you can answer: what advantage does an RDHx have over DLC cold plates for a quick density upgrade? Answer: zero server modification required. You connect chilled water to the door and the rack immediately handles higher densities. The trade-off is that RDHx is less efficient than DLC at extreme densities because it still relies on internal server fans."},soWhat:"RDHx bridges the gap between pure air and full DLC — it adds liquid cooling without touching the servers themselves."},
{term:"Phased Deployment Model",definition:"Start with pilot pod, validate performance, then scale. Prefabricated components can accelerate.",plain:"Don’t rip and replace. Start small, prove it, train the team, expand.",number:"Recommended pilot: 4–8 racks. Scale in pods of 20–40.",standard:"Schneider Electric blog Feb 2026",feynman:{analogy:"Think of it like renovating a hotel room by room instead of closing the entire hotel. Each room is completed and handed back before starting the next. Phased DLC deployment works the same way — each pod is commissioned independently while adjacent racks continue serving customers.",firstPrinciples:"A full DC conversion is risky and expensive. The phased approach starts with a 4–8 rack pilot pod with its own CDU. If the pilot works and the tenant commits, you scale to 40 racks. Each phase is self-contained — its own cooling, its own commissioning, its own sign-off. If something goes wrong at 8 racks, the loss is €300k (Tier 3 — Iceotope/Submer/LiquidStack published ranges; SCSI benchmarks, indicative). If something goes wrong at 400 racks, the loss is catastrophic.",theTest:"You understand this when you can answer: Ann's fund committee asks why not convert all 400 racks to DLC at once to capture the full revenue premium faster. What is the engineering response? Answer: phased deployment limits capital at risk (€300k pilot vs €3M full), allows team training, and matches investment to confirmed tenant demand. Speed matters less than certainty."},soWhat:"The pilot pod validates thermal performance, trains the operations team, and builds the business case — skip it and risk all three."},
{term:"Rear-door heat exchanger (RDHx)",definition:"A liquid-cooled heat exchanger mounted on the rear door of a standard server rack, capturing exhaust heat before it enters the room.",plain:"A radiator on the back of the rack that cools the hot air coming out of the servers before it reaches the room. No modifications to the servers needed.",number:"Heat capture: 60 to 100 percent of rack heat load. Rack density support: up to 40 kW per rack. No server modification. Coolant: facility water at 35 to 45 C.",standard:"ASHRAE TC 9.9; Schneider Electric Application Note 135",feynman:{analogy:"Like a car radiator mounted on the back door. The hot air passes through the radiator on its way out and arrives in the room already cooled.",firstPrinciples:"Server exhaust air is typically 35 to 45 C. A heat exchanger with 30 to 40 C water can absorb most of this heat. The air leaving the heat exchanger is near room temperature. The room CRAH has almost nothing left to do. This is the easiest retrofit path because no server modifications are needed.",theTest:"Clonshaugh wants to increase rack density from 6 kW to 25 kW without modifying servers. What works? Answer: RDHx. Mount liquid-cooled heat exchangers on the rear doors. Each captures 60 to 100 percent of the heat. No server changes. Coolant piping to each rack is the only addition."},soWhat:"RDHx handles 50–80% of rack heat without modifying servers — the lowest-risk entry point into liquid cooling for existing facilities."},{term:"Warm water cooling",definition:"Liquid cooling using facility water at 35 to 45 C rather than chilled water at 7 to 12 C, enabling year-round free cooling in temperate climates like Ireland.",plain:"Using warm water for cooling instead of cold water. Sounds wrong, but it works because chips run at 80 to 90 C and warm water still absorbs plenty of heat.",number:"Supply: 35 to 45 C. Return: 45 to 55 C. Free cooling hours in Dublin at 45 C supply: approximately 8,500 per year (97 percent). Eliminates mechanical refrigeration.",standard:"ASHRAE W4/W5 classification; EN 50600-2-3:2019",feynman:{analogy:"Like cooling a hot engine with lukewarm water instead of ice water. The engine runs at 90 C, so even 40 C water can absorb a lot of heat. And you do not need a refrigerator to make the water cold.",firstPrinciples:"Chips operate at 70 to 90 C. Water at 40 C is 30 to 50 C below the chip temperature. This temperature difference is sufficient for effective heat transfer. The advantage: Dublin outdoor temperatures rarely exceed 25 C, so a dry cooler can produce 35 to 40 C water for free, without mechanical refrigeration, for nearly the entire year.",theTest:"Why is warm water cooling transformative for Dublin DCs? Answer: Dublin is below 18 C for 7,200 hours per year. With warm water cooling (supply at 40 C), free cooling works for over 8,500 hours. Mechanical chillers are essentially eliminated, cutting cooling energy by 80 to 90 percent."},soWhat:"Warm water at 35–45°C unlocks thousands of free cooling hours in Dublin and enables waste heat recovery — cold water is an efficiency penalty."}
],whatItLooksLike:"Two worlds in one hall. Air-cooled side: CRAHs humming, containment. DLC side: pipe manifolds, CDUs, less noise. Transition zone with containment curtains.",siteChecklist:["Define DLC zone boundaries","Check CRAH capacity for residual air cooling","Verify CHW plant spare capacity","Establish pipe routing plan","Plan CDU placement"]},
logic:{causeAndEffect:[
{cause:"DLC racks remove 70–80% of server heat via liquid, materially reducing the hot air exhaust into the data hall",effect:"Adjacent CRAH units may short-cycle as the reduced hot air exhaust causes them to overcool the remaining air-cooled zone",insight:"BMS controls must be updated for hybrid thermal profile."},
{cause:"Liquid coolant pipe routing competes for space with cable trays and power busbars in raised-floor data hall environments",effect:"Under-floor pipes reduce plenum cross-section; overhead pipes need structural support",insight:"Under-floor vs overhead is a consequential choice. For Clonshaugh’s 2013 raised floor, overhead or slab-mounted troughs recommended."},
{cause:"A hybrid transition plan deploys DLC in one hall but does not upgrade the facility water loop.",effect:"The existing chilled water loop runs at 7 to 12 C. DLC works best with warm water at 35 to 45 C. Running DLC on chilled water wastes the free cooling opportunity that justifies the investment.",insight:"The facility water loop upgrade is as important as the rack-level DLC deployment. Without warm water, you get the complexity of liquid cooling without the energy saving."}
],constraintLesson:"Constraint: operational continuity. Existing customers’ air-cooled workloads cannot be disrupted.\n1. DLC piping during maintenance windows.\n2. CDU commissioning with rack emulators — never live GPUs.\n3. CHW plant must serve both regimes simultaneously.",
weakestLink:{whatsWrong:"Convert the entire hall at once — partial conversion creates complexity.",whatsRight:"Phased conversion reduces risk, capital exposure, and disruption. If 8 racks go wrong, it’s manageable. If 400 go wrong, it’s catastrophic.",howToGetThere:"Phase 1: 4–8 rack pilot. Phase 2: Scale to 40. Phase 3: Expand based on demand."}},
rhetoric:{declan:{hook:"We ran the DLC pilot for three months. Every operator on the team got hands-on training before the first production tenant moved in. By go-live the procedures were second nature.",text:"We ran the pilot for three months. Every operator got hands-on time. By the time we scaled, the team was confident. The hybrid zone is the messy bit. Half the hall is air-cooled at 6 kW, half is liquid-cooled at 30 kW. Two different cooling systems, two different maintenance regimes, two different temperature profiles. Manage it carefully."},ann:{hook:"Phased deployment matches capex to revenue. 300 thousand euros pilot risk versus 3 million euros full deployment. That is how you get board approval for a technology the investment committee has never seen before.",text:"Phased deployment matches capex to revenue. €300k pilot risk, not €3M. That’s how you present liquid cooling to a fund committee. RDHx is the entry drug. No server modifications, fits existing racks, captures 60 to 100 percent of exhaust heat. Capex: 3K to 5K per rack. It buys you time to plan the full DLC conversion."},mark:{hook:"RDHx is the unsung hero of hybrid hall design. It boosts existing air-cooled racks from 10 to 30 to 40 kW without touching the raised floor — extending the revenue life of air-cooled infrastructure.",text:"RDHx is the unsung hero. Boosts air-cooled racks from 10 to 30–40 kW without touching servers. €8–15k per door (Tier 3 — Airedale/Rittal/Schneider Electric published ranges, indicative). I'd check that the facility water loop is designed for the maximum planned liquid load from day one, even if installation starts with RDHx on 20 percent of racks. Retrofitting larger pipes later is disruptive and expensive."},sarah:{hook:"Hybrid halls create EED Article 12 reporting complexity. Per-zone PUE measurement is more useful than facility-level PUE — and the metering architecture must reflect that from the start.",text:"Hybrid halls create EED Article 12 reporting complexity. pPUE per zone is more useful than facility-level PUE. Document each hybrid transition phase for CRREM reporting. The carbon intensity should improve measurably with each phase, supporting the investor narrative."},tom:{hook:"CDU installation for DLC zone at 300 thousand euros, RDHx for transitional zone at 150 thousand euros, containment modification at 75 thousand euros. Total hybrid hall infrastructure: 525 thousand euros.",text:"The following uses indicative figures for illustration. Input assumptions: CDU Tier 3 — Asetek/CoolIT/Vertiv published ranges; M&E works Tier 2 — SCSI benchmarks; commissioning Tier 2 — RICS NRM1 fee benchmarks; BSRIA BG8. All outputs screening-level, subject to detailed design and tender. Phase 1 pilot (4 racks × 30 kW): CDU €200k, piping €40k, emulator €15k, commissioning €45k. Total ~€300k. €2,500/kW IT. RDHx at 3K to 5K per rack versus full DLC at 8K to 15K per rack. For a 100-rack pilot, RDHx: 300K to 500K. DLC: 800K to 1.5M. RDHx is the low-risk entry point."}},
rhetoricTakeaways:{declan:"Start with one pod, learn, then scale — the phased approach builds operational confidence without betting the facility.",ann:"Phased deployment matches capex to revenue — €300k pilot risk versus €3M full conversion risk.",mark:"CRAH re-balancing after DLC installation is mandatory — without it, the energy savings never materialise.",sarah:"The 5-year transition plan aligns with technology refresh cycles, lease renewals, and carbon reduction targets.",tom:"Phase 1 pilot at €200–300k (Tier 3 — Asetek/CoolIT/Vertiv/Schneider published ranges; SCSI benchmarks, indicative) validates the business case. Phase 2 at €1.5–2M (Tier 3 — SCSI benchmarks; RICS NRM1, indicative) scales only if demand confirms."},
scenario:{title:"Clonshaugh: Planning the hybrid hall layout",narrative:"Convert one end of Hall A (400 racks) to 40-rack DLC pod, keeping 360 racks air-cooled.",question:"Compare under-floor vs overhead pipe routing for 2013 raised-floor construction (600 mm plenum).",answer:"Option A (under-floor): cheaper but reduces plenum by 15–20%, conflicts with cable trays, leak risk.\nOption B (overhead): preserves plenum, visible joints, expansion-friendly. Needs 3.0 m clear height. €30–50k structural.\nOption C (slab-mounted troughs): avoids both constraints. Practical for <30 m runs.\nRecommendation: Overhead (B) or troughs (C). Under-floor not recommended.",
whoShouldCare:["mark","declan"]},
sourceNote:"Schneider Electric Feb 2026 (T3); WP 210 (T3); Motivair published specs (T3); Introl 2025 (T3).",retrofitRelevance:"Hybrid is the natural state of brownfield transition. Every operator will live here for years.",
