const LEVELS = [
{

  available:true,
  component:"MTBF, MTTR & Availability",
  userNeedStatement:"Calculate whether a single component meets your uptime requirement. Every watt of redundancy you add later is pointless if you don't understand how the individual components fail first.",
  plainEnglish:"Before designing redundancy, understand how individual components fail. A UPS with 200,000-hour MTBF still fails. A chiller with 72-hour MTTR means 3 days without cooling. Know the numbers before you spend money on spares.",
  grammar:{
    facts:[
      {term:"MTBF (Mean Time Between Failures)",definition:"Average operating hours between failures for a repairable component",plain:"How long something typically runs before it breaks",number:"UPS: 200K–500K hrs; Chiller: 40K–80K hrs; Generator: 2K–5K hrs (run time)",standard:"IEEE 493-2007 Table 3-1",feynman:{analogy:"Think of a lightbulb rated for 10,000 hours. It won't die at exactly 10,001 hours — MTBF is the average across thousands of identical bulbs, some failing early, some lasting much longer.",firstPrinciples:"Every mechanical and electrical device wears out. If you track when many identical devices fail and average those times, you get MTBF. A higher number means the component is statistically more likely to keep running on any given day.",theTest:"If a UPS module has an MTBF of 200,000 hours and you have 4 identical modules, what is the expected time between ANY module failure? Answer: 200,000 ÷ 4 = 50,000 hours (~5.7 years)."}},
      {term:"MTTR (Mean Time To Repair)",definition:"Average time from failure detection to full service restoration",plain:"How long to fix — including getting parts and people on site",number:"UPS module: 2–4 hrs; Chiller compressor: 24–72 hrs; Transformer: 168–504 hrs",standard:"IEEE 493-2007 Table 3-1",feynman:{analogy:"Imagine a flat tyre. MTTR isn't just changing the wheel — it's the total time from 'car stops' to 'car moves again,' including finding the jack, loosening the bolts, fitting the spare, and checking tyre pressure.",firstPrinciples:"Downtime has phases: detection, diagnosis, parts arrival, repair, testing, and return to service. MTTR covers all of them. Reducing any single phase shortens total downtime.",theTest:"An ATS fails at 2am. Detection takes 45 minutes, engineer arrives in 2 hours, swap takes 1 hour, testing 30 minutes. What is the MTTR? Answer: 4 hours 15 minutes — detection time counts."}},
      {term:"Availability (A)",definition:"Proportion of time operational: A = MTBF / (MTBF + MTTR)",plain:"The percentage of time it actually works",number:"Single UPS: 99.995% (26 min/yr); Single chiller: 99.93% (6 hrs/yr)",standard:"IEEE 493-2007 Clause 3.2",feynman:{analogy:"Availability is like a shop's opening ratio. If it's supposed to be open 365 days but closes for 1 day for repairs, it's 99.73% available. In a DC, that one day costs €548/hr in lost revenue (Irish colocation market rate, CBRE/JLL 2024, T3).",firstPrinciples:"A system is either working or not. Availability = time working ÷ total time. Longer MTBF or shorter MTTR both increase availability. The formula A = MTBF/(MTBF+MTTR) captures both effects in one number.",theTest:"MTBF = 50,000 hours, MTTR = 4 hours. What is availability? Answer: 50,000/(50,000+4) = 99.992% — four nines."}},
      {term:"Annual Downtime",definition:"Expected unavailable hours/yr: Downtime = 8,760 × (1 − A)",plain:"Convert availability % to actual hours lost per year",number:"99.9% = 8.76 hrs; 99.99% = 52.6 min; 99.999% = 5.26 min",standard:"Derived from IEEE 493",feynman:{analogy:"Availability percentages hide real pain. '99.9%' sounds excellent until you convert it: 8.76 hours offline per year. At €548/hr revenue (CBRE/JLL 2024, T3), that's €4,800 lost — enough to motivate a redundancy upgrade.",firstPrinciples:"There are 8,760 hours in a year. Subtract your availability percentage from 100%, multiply by 8,760, and you get your expected annual downtime in hours. Small percentage differences translate to large time differences.",theTest:"What is the annual downtime difference between 99.99% and 99.999%? Answer: 52.6 minutes vs 5.3 minutes — one additional nine removes ~47 minutes per year."}},
      {term:"Failure Rate (λ)",definition:"Reciprocal of MTBF: λ = 1/MTBF, failures per million hours",plain:"Higher number = less reliable",number:"UPS: 2–5/M hrs; ATS: 3–10/M hrs",standard:"IEEE 493-2007 Annex A",feynman:{analogy:"Failure rate is like a dripping tap. A tap that drips once per hour (λ=1/hr) fills a bucket faster than one dripping once per day (λ=1/24hr). In series systems, all the drips combine.",firstPrinciples:"Failure rate (λ) is the inverse of MTBF. Higher λ means more frequent failures. When components are in series, their failure rates ADD together — the system fails more often than any single part.",theTest:"Two components: λ₁ = 0.0001/hr, λ₂ = 0.0002/hr, in series. What is the system failure rate? Answer: λ_system = 0.0003/hr (MTBF = 3,333 hours). Series always makes things worse."}},
      {term:"Series vs Parallel (RBD)",definition:"Series: multiply availabilities. Parallel: 1 − product of unavailabilities",plain:"Series = Christmas lights (one out, all out). Parallel = motorway lanes",number:"Two 99.9% in series: 99.8%. Two 99.9% in parallel: 99.9999%",standard:"IEEE 493-2007 Clause 3.3",feynman:{analogy:"Series is like Christmas tree lights wired end-to-end — one bulb dies, the whole string goes dark. Parallel is like having two separate strings; one can fail and the tree still glows.",firstPrinciples:"In series, all components must work for the system to work — multiply availabilities. In parallel, all components must fail for the system to fail — multiply unavailabilities. Parallel always improves reliability; series always degrades it.",theTest:"Two components each at 99.9%. What is system availability in series vs parallel? Answer: Series = 99.8% (multiply). Parallel = 99.9999% (six nines). Same components, opposite outcomes."}}
    ],
    whatItLooksLike:"You won't see 'MTBF: 200,000 hours' on a nameplate. Identify reliability indicators: equipment age plates, maintenance stickers (regular PM = higher MTBF), spare parts shelves (on-site = lower MTTR), alarm panels (BMS status), single-instance components (these set the availability ceiling).",
    siteChecklist:["Record manufacture date for each critical component","Check last PM date — within manufacturer's interval?","Count critical spares on site","Note components with active alarms or bypassed protections","Identify single-instance components (these are your ceiling)","Ask: last unplanned outage? How long to restore?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"A single UPS with MTBF 300,000 hours and MTTR 4 hours is the only power conditioning unit on the critical load path",effect:"Single unit: A = 300,000/300,004 = 99.9987% — equivalent to approximately 6.9 minutes of downtime per year",insight:"6.9 minutes of TOTAL IT power loss per year from just one component"},
      {cause:"Five critical components are connected in series on a single path, each with 99.99% individual availability",effect:"Series system availability = 0.9999^5 = 99.95% — equivalent to 4.38 hours of downtime per year at this load",insight:"Each is four nines but five in series gives three nines. Series DESTROYS availability"},
      {cause:"A single chiller with MTBF 60,000 hours has a compressor with a 72-hour spare parts delivery lead time",effect:"With 72-hour MTTR, chiller availability = 99.88% — equivalent to approximately 10.5 hours of downtime per year",insight:"MTTR dominated by supply chain, not wrench time. Irish distributor lead times set the real repair clock"},
      {cause:"A standby generator with MTBF 3,000 run hours operates only 50 hours per year across test runs and actual demand events",effect:"Standby failure modes — battery degradation, fuel contamination, and fail-to-start — dominate over in-service running failures",insight:"IEEE 493 reports 2–15% fail-to-start rates for standby generators. Standby MTBF ≠ running MTBF"}
    ],
    constraintLesson:"The Weakest Link Method starts here: what sets your availability ceiling?\n\nClonshaugh's single ATS between utility and generators. 13 years old, no documented load-transfer test. IEEE 493 MTBF ~50,000 hrs with 8-hr MTTR: A = 99.984% = 1.4 hrs/yr downtime from ONE component.\n\nThe assumption: 'Our UPS handles everything.'\nWrong. The ATS failure that matters is 'stuck' — not 'slow transfer.' If it sticks, 10 minutes UPS battery, then 400 racks go dark.\n\nFirst intervention isn't bigger UPS — it's testing the ATS.",
    weakestLink:{whatsWrong:"Single ATS, 13 years old, no documented load-transfer test. IEEE 493: 4% fail-to-operate rate for untested units. Steady-state A = 99.984%, but DEMAND availability = 96%.",whatsRight:"UPS provides 10-min ride-through. Two transformers provide capacity headroom. The ATS failure that matters is 'stuck' not 'slow transfer.'",howToGetThere:"[Costs indicative, 2025 Irish market. ATS/STS: Schneider/ABB/Eaton published ranges (T3). ESB connection: ESB Networks published process (T1). UPS: SCSI M&E benchmarks; RICS NRM1, indicative (T2).] 1. Immediate: ATS functional test under load (~€2K–€5K)\n2. Short-term: quarterly exercise per EN 50600-3-1 Annex A\n3. Medium-term: second ATS/STS per path for 2N upgrade (€50K–€80K each)"}
  },
  rhetoric:{
    declan:{hook:"Managed this facility since 2013 and the ATS has never failed — which means it has never actually been tested under real load conditions.",text:"I've managed this facility since 2013 and we've been lucky. That ATS has never failed — but never been tested under real load. We exercise generators monthly on no-load but that doesn't test transfer. One box between ESB and everything. If it sticks, 10 minutes UPS before 400 racks go dark. I'd spend €5K on testing rather than discover the fault during the next power cut."},
    ann:{hook:"Untested availability is a marketing claim, not an engineering fact. Show me the transfer test log before we price this asset's uptime SLA.",text:"[Costs and revenue figures indicative — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024; 400-rack at €548/hr from Irish colocation market rates (CBRE/JLL DC market reports 2024). Screening-level estimates.] 400 racks = ~€4.8M/yr revenue = €548/hr. ATS failure × 8hrs = €4,384 direct, before SLA penalties (10× that). Test = €5K. At 2% failure probability: expected loss = 0.02 × €43,840 = €877/yr. Test pays back in 6 years conservatively; with SLAs, year one. I can't accept an unquantified risk — show me MTBF, MTTR, and the availability number."},
    mark:{hook:"ATS MTBF around 50,000 hours for a 10-year-old unit. Series availability with a single untested path gives you a number nobody wants to calculate.",text:"A = MTBF / (MTBF + MTTR). Clonshaugh ATS: MTBF ~50,000 hrs (lower quartile for 13yr undocumented PM), MTTR 8 hrs. A = 99.984% = 1.4 hrs/yr. This single component sets the ceiling for the entire downstream chain. System cannot exceed 99.984% if the ATS is the sole path. Series reliability — the fundamental lesson."},
    sarah:{hook:"Five nines is 5 minutes of downtime per year. Then you add series components — and that number compounds in a direction the SLA cannot absorb.",text:"'Five nines' didn't click until I did the maths. 99.999% = 5 min/yr. Then series: five at 99.99% → 0.9999^5 = 99.95% = 4.4 hrs. Each brilliant alone, chained = fast degradation. Like relay racing — one runner trips and it's over. So when someone says '2N UPS,' I ask: what about everything ELSE in the chain?"},
    tom:{hook:"ATS replacement at a cost that is a fraction of one hour of SLA penalty. The maintenance budget line that looks small is covering the largest tail risk.",text:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] Reliability = what you'll pay to avoid downtime:\nATS functional test: €5K | New 5MVA ATS: €60K–€80K\nSecond utility feed: €200K–€400K | Full 2N UPS: €800K–€1.2M\nAlways ask: availability improvement per euro? Cheapest intervention often gives the biggest jump."}
  },
  scenario:{title:"The Untested Transfer",narrative:"ESB Networks: planned 10kV maintenance Tuesday 06:00–14:00. Facility transfers to generators for 8 hours. ATS should handle it — but no record of successful transfer under full load since 2013.",question:"Calculate ATS availability (MTBF 50,000 hrs, MTTR 8 hrs). Then calculate probability of failure during Tuesday's transfer at IEEE 493 4% fail-to-start rate for untested units.",answer:"Step 1: A = 50,000/(50,000+8) = 99.984%, downtime = 1.4 hrs/yr\nStep 2: P(fail Tuesday) = 4% [IEEE 493 Table 7-1]\n\nHidden assumption: Steady-state A (99.984%) ≠ DEMAND availability. Component can be 99.99% powered-and-monitoring but only 96% when actually triggered.\n\nDeclan's real risk Tuesday = 4%, not 0.016%.\nThe Weakest Link isn't hardware — it's the missing test regime.\n\nSteady-state availability and demand availability are different numbers. The ATS that looks fine on paper has a 4% chance of failing when you need it most.\n\nSources: MTBF/MTTR — IEEE 493-2007 Tables 3-1, 7-1 (T1). Demand availability — IEEE 493-2007 Clause 3.4 (T1). ATS failure rates — Uptime Institute field data (T2).",
whoShouldCare:["declan","mark"]},
  rhetoricTakeaways:{declan:"Single-component MTBF sets the floor for my maintenance schedule — I need to know which box fails first.",ann:"Availability translates directly to revenue exposure — 99.984% sounds good until you calculate the annual cost of 1.4 hours downtime.",mark:"IEEE 493 gives me the component data, but demand availability vs steady-state availability is where most designs go wrong.",sarah:"Downtime risk is a material ESG disclosure item — investors want to see MTBF-based risk quantification, not just uptime promises.",tom:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] A €5K ATS test vs a €60K ATS replacement — the cost-per-availability-point drives the investment decision."},
  retrofitRelevance:"In retrofit, single-component reliability data drives the upgrade priority list. Don't replace equipment based on age alone — replace based on MTBF degradation, MTTR exposure, and availability ceiling impact. The component with the lowest availability × highest consequence goes first.",
  crossRefs:[{module:"DC-LEARN-005",level:"L4",topic:"UPS topologies — UPS is the component most sensitive to single-point reliability degradation"},{module:"DC-LEARN-001",level:"L3",topic:"LV main switchboard — the single point through which all power flows in most existing facilities"}],
  sourceNote:"IEEE 493-2007 Gold Book Tables 3-1, 7-1 — component reliability data (T1). Availability formula A = MTBF/(MTBF+MTTR) per IEEE 493 Clause 3.2 (T1). ATS fail-to-operate rates from IEEE 493 Table 7-1 (T1). Series/parallel RBD per IEEE 493 Clause 3.3 (T1).",
  clockQuote:"A test you're confident about is not a test. A test you're slightly nervous about — that's the one that tells you something.",
  cascadeCheck:(targetTier)=>{
    // L1: Single component — availability ceiling check
    const atsA = 99.984; // IEEE 493 for untested ATS
    const needed = targetTier >= 3 ? 99.99 : 99.98;
    return {needed:needed.toFixed(2)+"%",available:atsA.toFixed(3)+"%",unit:"",pass:atsA>=needed,detail:"ATS availability "+atsA+"% vs "+needed+"% required"};
  }
},
{
  id:"L2", level:2, name:"N+1 Redundancy", icon:"➕",
  available:true,
  component:"N+1 Redundancy",
  userNeedStatement:"Determine if adding one spare component meets your uptime and maintainability requirements. N+1 is the minimum for safe maintenance — without it, every service window is a risk window.",
  plainEnglish:"Need 3 to run the facility? Install 4. One breaks or needs service, the other 3 carry the full load. This is the cheapest meaningful redundancy and the entry point for professional data centre operations.",
  grammar:{
    facts:[
      {term:"N+1 Redundancy",definition:"N components required for full capacity, plus 1 spare unit",plain:"Need 3 to run, install 4. One breaks, other 3 carry load",number:"Clonshaugh: N=1 at original load (2013), +1 spare. But does N cover CURRENT load?",standard:"Uptime Tier II; EN 50600-1 Cl 6.2.2",feynman:{analogy:"A football team has 11 players on the pitch (N=11) and substitutes on the bench. N+1 means one substitute ready — enough to cover one injury without stopping the match.",firstPrinciples:"First calculate how many units you need to carry your load — that's N. Then add one spare. The spare handles either a planned maintenance event or an unplanned failure. Without the spare, every maintenance window is a risk window.",theTest:"Load is 2,400kW. Each UPS module delivers 1,350kW. What is N, and how many modules do you need for N+1? Answer: N = ceil(2,400/1,350) = 2. N+1 = 3 modules required."}},
      {term:"Concurrent Maintainability",definition:"Can perform maintenance on any component without reducing capacity below N",plain:"Take one out for service, others keep running at full capacity",number:"N+1 allows ONE offline. Two simultaneous failures = below N capacity",standard:"Uptime Tier III; EN 50600-1 Availability Class 3",feynman:{analogy:"It's like having a spare lane on a motorway. Traffic keeps flowing (IT load runs) while road workers fix potholes in the closed lane (maintenance on one UPS module).",firstPrinciples:"Maintenance is inevitable — every component needs servicing. If you must shut down IT load to service power equipment, you're trading reliability for maintenance. N+1 means the spare carries load while you service any single unit.",theTest:"You have N+1 UPS. Can you service TWO modules simultaneously without risk? Answer: No — servicing one uses your spare. Servicing two means zero redundancy. N+1 allows one maintenance event at a time."}},
      {term:"Parallel Redundancy (UPS)",definition:"Multiple modules sharing load, with capacity to lose one at full facility load",plain:"Four engines on a plane needing three — one quits, still flying",number:"3+1: normal 75% each, failure 100%. 4+1: normal 80%, failure 100%",standard:"IEC 62040-3 Clause 6.4",feynman:{analogy:"Imagine two water pumps feeding one tank. Either pump alone can fill the tank. If one pump stops, the other takes over — but it now runs at full capacity with no backup.",firstPrinciples:"Parallel UPS modules share the load during normal operation. When one fails, the survivors must absorb its share instantly. The key question is: can the survivors carry 100% load? If yes, you have redundancy. If no, you have load-sharing with risk.",theTest:"Three 500kVA modules share 1,200kW load. One fails. Can the remaining two carry full load? Answer: 2 × 500 × 0.9PF = 900kW. No — 900kW < 1,200kW. This is NOT redundant."}},
      {term:"N+0 (No Redundancy)",definition:"Exactly the capacity needed with no spare. One failure = immediate capacity loss",plain:"Running without a safety net. Everything must work, all the time",number:"Availability = product of individual availabilities. Zero tolerance for failure",standard:"EN 50600-1 Availability Class 1",feynman:{analogy:"Driving without a spare tyre. The car works perfectly — until you get a puncture on a motorway at midnight. N+0 means every component is load-bearing, and losing any one means the system fails.",firstPrinciples:"N+0 means you have exactly the minimum capacity needed. No spare exists. Every planned maintenance event requires either accepting risk or shutting down. Load growth is the silent killer — a system commissioned as N+1 becomes N+0 when load doubles.",theTest:"Clonshaugh has 2×1.5MVA UPS. Load grew from 1,200kW to 2,400kW. Was it N+1 at commissioning? What is it now? Answer: At 1,200kW: N=1, had 2 = N+1. At 2,400kW: N=2, have 2 = N+0."}},
      {term:"Load Per Module",definition:"Each of (N+1) carries Load/(N+1) normal, Load/N if one fails",plain:"Normal: light load. Failure: others absorb the lost module's share",number:"3+1: normal 25%, failure 33%. 4+1: normal 20%, failure 25%",standard:"IEC 62040-3; CIBSE Guide K Cl 10.4",feynman:{analogy:"Like weight limits on a bridge. Each lane has a maximum load. Divide total traffic by the number of lanes — if it exceeds the per-lane limit, you need more lanes, not wider ones.",firstPrinciples:"Each module has a rated capacity in kVA and a power factor that converts to kW. Divide total IT load (kW) by per-module capacity (kW) to find how many you need. Round up — you can't have half a module.",theTest:"UPS rated 1,500kVA at 0.9PF. IT load is 4,000kW. How many modules for N+1? Answer: Per module = 1,350kW. N = ceil(4,000/1,350) = 3. N+1 = 4 modules."}}
    ],
    whatItLooksLike:"Count components vs design requirement. 4 CRAHs where N=3 = N+1. UPS: module count vs required. Chiller: units vs load. Generators: count vs demand.\n\nThe Trap: Clonshaugh 2×1.5MVA UPS — each 1.35MW at 0.9PF vs 2.4MW load. Neither carries full load alone = NOT N+1. The label says '2N' but the maths says 'N+0'.",
    siteChecklist:["Count: UPS modules, chillers, CRAHs, generators","Verify N: what is the minimum number for full load?","Confirm +1: one MORE than N installed and operational?","Check: can N units (without spare) carry 100% of load?","Review: has the spare been rotated into active service?","Ask: if two fail simultaneously — what happens?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"Three 500kW chillers serve a 1,000kW cooling load — N=2 required, installed=3 — providing true N+1 cooling redundancy",effect:"N+1 redundancy is achieved — one chiller can be taken offline for planned maintenance while two carry the full cooling load",insight:"But if ambient exceeds design, chiller output drops. Spare becomes essential for BASE load — not available for maintenance"},
      {cause:"A modular UPS frame houses 4 × 250kW modules serving a 750kW load — N=3 required, one module spare in slot",effect:"One module failure leaves three modules carrying the full 750kW load with no impact to IT equipment power quality",insight:"All share common bypass switch AND bus. The frame is a SPOF. Module-level N+1 ≠ system-level N+1"},
      {cause:"Two generators provide N+1 redundancy with N=1, but one generator fails to start on demand during a live grid outage",effect:"The remaining generator carries the full facility load after the UPS battery bridges the failed unit's start-up gap",insight:"Working generator faults during extended outage = N-1, no recovery. IEEE 493: 2–15% fail-to-start rates for standby units"}
    ],
    constraintLesson:"The Weakest Link at Clonshaugh:\n\nHandover docs say '2N UPS.' IT load: 2,400kW. String A: 1.5MVA × 0.9PF = 1,350kW. String B: same. Total: 2,700kW.\n\nFor 2N, each string must carry 100% alone. String A: 1,350/2,400 = 56%. FAIL.\n\nNot even N+1: N = ceil(2,400/1,350) = 2 units needed. Have 2 = N+0.\n\nAt 2013 commissioning (~1,200kW), each string carried full load — system WAS genuinely 2N. Load growth killed redundancy. Equipment unchanged — only the load grew. Nobody noticed.",
    weakestLink:{whatsWrong:"UPS labelled '2N' but N = ceil(2,400/1,350) = 2 units needed. Have 2 units = N+0. No redundancy margin. Can't take either offline for PM without going below IT load.",whatsRight:"Combined 2,700kW gives 12.5% headroom. Static bypass handles full load (raw utility). Battery ~10 min. At 2013 commissioning WAS genuinely 2N.",howToGetThere:"[Costs indicative, 2025 Irish market. UPS modules: Schneider/Eaton/ABB published ranges (T3). SCSI M&E benchmarks; RICS NRM1, indicative (T2). Expanded teaching scenario — 8MW figure for illustration only; Clonshaugh IT load = 2.4 MW.] A: +1 module (3 × 1.5MVA) = N+1 at current load. €250K–€400K\nB: 2 × 3MVA strings = true 2N at current load. €800K–€1.2M\nC: 2 × 10MVA for 8MW target. €3M–€5M\nThe label on the drawing doesn't match the topology."}
  },
  rhetoric:{
    declan:{hook:"Handover docs said 2N UPS. I believed it for seven years. The audit showed neither string met the N threshold individually under load.",text:"Handover docs said '2N UPS.' Believed it 7 years. Mark's audit showed neither string carries full load alone. No safety net since we passed ~1,400kW. Can't take either offline for PM without going below IT load. Every maintenance window is a risk window. Vendor wants 4 hrs/yr PM — that's 4 hrs where single UPS failure = total loss. I've been postponing PM because the risk feels higher than running without it."},
    ann:{hook:"N+1 that is not independently verified is N-probable. The asset valuation assumes the redundancy claim is engineered, not inherited from handover documentation.",text:"[Costs and revenue figures indicative — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024; 400-rack at €548/hr from Irish colocation market rates (CBRE/JLL DC market reports 2024). Screening-level estimates.] Mislabelling cost us. Insurance based on declared 2N — if insurer discovers we weren't, claim disputed. €500K+ exposure. Option A (add module €350K) restores N+1. ROI: €350K vs €500K insurance exposure. Pays back in 18 months. Won't approve €5M until we have signed density contracts."},
    mark:{hook:"N+1 definition: N units where each exceeds N times the load, install N plus 1. At Clonshaugh 2,400 kW IT, two 1,500 kW strings gives genuine N+1.",text:"N+1 definition: N units where each × N ≥ load. Install N+1. Clonshaugh: 2,400kW load, 1,350kW unit. N = ceil(2,400/1,350) = 2. Need 3 for N+1. Have 2 = N+0. Original 2013: N = ceil(1,200/1,350) = 1, with 2 = N+1. Load growth converted N+1 to N+0. EN 50600-1 Class 2 minimum: add 1 module now."},
    sarah:{hook:"N+1 is not just failure protection — it is the permission structure for maintenance windows. Without it, every planned outage becomes an unplanned risk.",text:"N+1 isn't just failure protection — it's permission to do maintenance. Without it, taking anything offline drops capacity below need. Skip PM (more likely to fail) or work on live gear (safety risk). I learned that N+1 at one load becomes N+0 at a higher load. Clonshaugh: 2N for 1,200kW became N+0 at 2,400kW. Nobody noticed because the equipment hadn't changed."},
    tom:{hook:"Modular UPS upgrade to genuine N+1 for a 2,400 kW facility. The capex is material — but one unplanned outage SLA penalty likely exceeds the programme cost.",text:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] N+1 = cheapest meaningful redundancy. Irish premiums over N+0:\nUPS: +€250K–€400K/module. Chiller: +€150K–€250K/unit.\nGenerator: +€200K–€350K/genset. CRAH: +€30K–€50K.\nRule of thumb: N+1 adds 25–40% to M&E capital. 2N: 80–110%.\nClonshaugh N+1 restore: €350K + 15% contingency = €400K. 12–16 weeks."}
  },
  scenario:{title:"The Maintenance That Couldn't Wait",narrative:"UPS vendor flags critical firmware update. Each module must be taken offline for 2 hours. With 2 units at 2,400kW load, one offline reduces capacity to 1,350kW = 56% of IT load.\n\nThe firmware fixes a known spontaneous-shutdown fault. Risk the fault, or risk 2 hours at 56% coverage?",question:"Calculate available UPS capacity during maintenance as % of IT load. How many racks at 6kW must power down to fit within remaining UPS capacity?",answer:"Step 1: 1 × 1.5MVA × 0.9PF = 1,350kW. Coverage = 56.25%.\nShortfall = 1,050kW → ceil(1,050/6) = 175 racks must shed (44%)\n\nHidden assumption: assumes remaining UPS runs at 100% rated.\nIEC 62040-3 recommends 80% continuous for transient margin.\nAt 80%: 1,080kW → shortfall 1,320kW → 220 racks (55%).\n\nOne motor start at 100% loading = overload trip.\nN+1 isn't optional — it's the minimum for safe maintenance.\n\nN+0 means every maintenance window is a risk event. The UPS module that looked like a spare was actually load-bearing.\n\nSources: UPS parallel operation — IEC 62040-3:2021 (T1). N+1 definition — Uptime Institute Tier Standard (T1). Load calculations — AIMEP DC Standards Reference v1.2.0 (T2).",
whoShouldCare:["declan","mark"]},
  rhetoricTakeaways:{declan:"N+1 means I can take one unit offline for service — without it, every maintenance window is a risk event.",ann:"N+1 is the minimum investment that protects revenue during planned maintenance — the cheapest form of insurance.",mark:"Check the maths: N is determined by current load, not nameplate. Load growth silently converts N+1 to N+0.",sarah:"N+1 is the baseline for responsible facility operations — N+0 means we are one failure away from SLA breach and reputational damage.",tom:"Adding one spare module (N+1) is typically 25-30% of N cost — the availability improvement per euro is highest at this step."},
  retrofitRelevance:"In retrofit, achieving N+1 is Phase 1. It's the cheapest step that delivers the biggest operational improvement: the ability to perform maintenance safely. Always verify N+1 against CURRENT load, not original design load. Load growth is the silent redundancy killer.",
  crossRefs:[{module:"DC-LEARN-005",level:"L2",topic:"Diesel generators — N+1 generator sets are the first backup power redundancy milestone"},{module:"DC-LEARN-002",level:"L3",topic:"CRAH/CRAC units — N+1 cooling allows one unit offline for maintenance without thermal risk"}],
  sourceNote:"Uptime Institute Tier Standard (2024) Clause 5.1 — Tier II N+1 requirement. EN 50600-1 Clause 6.2.2 — Availability Class 2. IEC 62040-3 Clause 6.4 — UPS parallel redundancy. CIBSE Guide K Clause 10.4 — load per module calculations. Standards references: T1 — published international standards (IEC/IEEE/EN/Uptime Institute).",
  clockQuote:"Four milliseconds. That's how long the load was unprotected during transfer. Not zero — four milliseconds. In a well-designed facility, four milliseconds is acceptable. In a facility with poorly specified equipment, four milliseconds is an outage. Spec matters.",
  cascadeCheck:(targetTier)=>{
    const upsModules = 2; // Clonshaugh: 2 × 1.5MVA
    const upsCapEach = 1350; // kW at 0.9PF
    const itLoad = 2400;
    const nNeeded = Math.ceil(itLoad/upsCapEach); // 2
    const isNplus1 = upsModules > nNeeded;
    const needed = targetTier >= 2 ? "N+1" : "N+0";
    const actual = upsModules > nNeeded ? "N+1" : (upsModules === nNeeded ? "N+0" : "N-"+(nNeeded-upsModules));
    return {needed:needed,available:actual,unit:"",pass:isNplus1||targetTier<2,detail:upsModules+" modules, need "+nNeeded+". "+actual+" at current load"};
  }
},
{
  id:"L3", level:3, name:"2N Redundancy", icon:"✌️",
  available:true,
  component:"2N Dual Path",
  userNeedStatement:"Design dual-path topology where either path sustains full operations alone. 2N is the Tier IV foundation — but only works if the paths are truly independent from utility entrance to rack power cord.",
  plainEnglish:"Two of everything. Two feeds, two transformers, two switchboards, two UPS strings, two distribution paths, two power cords per server. Pull the plug on either side and nothing happens. That's true 2N.",
  grammar:{
    facts:[
      {term:"2N Redundancy",definition:"Two independent systems (N+N), each sized for 100% of total IT load",plain:"Two of everything. Either system runs the whole facility alone",number:"Doubles infrastructure cost but eliminates single-component failure as outage cause",standard:"Uptime Tier IV; EN 50600-1 Availability Class 4",feynman:{analogy:"Two completely separate roads to the same destination. If one road floods, you take the other. Neither road shares any bridges, junctions, or traffic lights with the other.",firstPrinciples:"Build two independent power paths (A and B), each capable of powering the entire IT load alone. The paths must share nothing — no common transformer, no common switchboard, no common cable route. Any shared component limits the whole system.",theTest:"You have 2N UPS but a single MSB upstream. Is this true 2N? Answer: No. The single MSB is a shared component that limits system availability to whatever the MSB delivers — regardless of downstream redundancy."}},
      {term:"Path A / Path B",definition:"Two independent distribution paths from utility entrance to rack, never sharing any component",plain:"Two separate power stations feeding the same building — completely independent",number:"Each path: utility → TX → MSB → UPS → distribution → rack PDU → server PSU. Fully independent",standard:"EN 50600-2-2 Clause 6.3",feynman:{analogy:"Like having two independent phone lines into your house. If the phone company cuts one cable, the other still works — but only if they enter from different streets.",firstPrinciples:"Path independence means no single failure can affect both paths. True independence requires separate utility feeds, separate transformers, separate switchboards, and separate cable routes. The paths must be physically and electrically isolated.",theTest:"Path A and B both enter the building through the same cable trench. Is path independence maintained? Answer: No — a single excavation accident could sever both paths. Physical separation matters."}},
      {term:"Dual-Corded Load",definition:"IT equipment with two power supply units (PSUs), each connected to a different path",plain:"Pull either power cord — server keeps running on the other PSU",number:"Enterprise servers: dual PSU standard. Network gear: often single PSU (needs STS)",standard:"EN 50600-2-2 Clause 6.3.3",feynman:{analogy:"Like plugging your laptop into two different wall sockets using two separate chargers. If one socket trips, the other keeps your laptop running without interruption.",firstPrinciples:"IT equipment with two power supplies can connect one to Path A and one to Path B. If either path fails, the server continues on the surviving path. Single-corded equipment needs an STS upstream to get the same protection.",theTest:"A server has dual power supplies connected to paths A and B. Path A fails. Does the server go down? Answer: No — it continues on Path B automatically, with zero transfer time."}},
      {term:"Isolation",definition:"Paths A and B are physically and electrically independent with fire-rated separation",plain:"A fire in the Path A room must not damage Path B equipment",number:"Tier IV requires separate rooms with fire-rated walls between paths",standard:"Uptime Tier IV; EN 50600-2-2 Clause 6.5",feynman:{analogy:"Like watertight compartments on a ship. A hole in one compartment floods only that section; the doors seal and the ship stays afloat. Without compartments, the whole ship sinks.",firstPrinciples:"Isolation means a fault in one part cannot propagate to another. In electrical terms, this requires physical separation (bus-section switches) and protection coordination (circuit breakers that trip selectively). The MSB bus-section is the key isolation point.",theTest:"A fault occurs on Path A downstream of the MSB bus-section. Does Path B lose power? Answer: No — the bus-section switch isolates the fault. Without the bus-section, a single MSB fault takes out everything."}},
      {term:"Static Transfer Switch (STS)",definition:"Transfers single-corded load between two sources in <10ms",plain:"For single-PSU gear — the STS gives it 2N benefit by selecting whichever path is live",number:"Transfer <4ms for modern STS. Within ITIC/CBEMA voltage tolerance curve",standard:"IEC 62310-1; IEEE 446",feynman:{analogy:"Like a railway points switch that flips tracks in milliseconds. When the train (power) detects a problem on Track A, the STS instantly routes it to Track B — so fast the passengers (servers) don't even notice.",firstPrinciples:"An STS uses solid-state electronics (thyristors) to transfer load between two power sources in under 10 milliseconds. This is fast enough that IT equipment rides through without interruption. Mechanical transfer switches (ATS) take 100-500ms — too slow for many servers.",theTest:"Server PSU has 20ms ride-through capability. ATS transfer time is 200ms. STS transfer time is 8ms. Which works? Answer: Only the STS — 8ms is within 20ms ride-through. The ATS at 200ms causes a dropout."}}
    ],
    whatItLooksLike:"True 2N is visually obvious: two switchrooms (MSB-A/MSB-B), two UPS rooms with fire separation, dual cable risers (colour-coded red/blue or A/B), dual power strips at every rack.\n\nThe Trap: '2N' on paper but both feeds from the same ESB substation. 2N on the SLD, single point of failure in reality.",
    siteChecklist:["Two physically separate distribution paths with independent routing","Each path carries 100% IT load (MEASURE — don't assume from nameplate)","Fire-rated separation between A and B paths","No shared containment, riser, or cable penetration","Every server dual-corded? Single-PSU gear on STS?","Different ESB substations for each utility feed?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"A true 2N power topology is installed with each independent A and B path achieving 99.9% individual availability",effect:"Parallel 2N availability: A = 1 − (0.001)² = 99.9999% — equivalent to approximately 32 seconds of downtime per year",insight:"Two three-nines paths give six nines. The mathematical power of true independence"},
      {cause:"A 2N UPS system is installed downstream but a single utility incomer from ESB Networks feeds both UPS input transformers",effect:"Upstream of the split = single-path availability. 2N downstream can't compensate",insight:"2N is only as good as where the paths diverge. Common mode failure defeats downstream redundancy"},
      {cause:"A 2N cooling system has separate independent chiller paths but both paths share a single cooling tower for heat rejection",effect:"Cooling tower failure takes out both cooling circuits simultaneously — 2N independence is broken at the heat rejection stage",insight:"Cooling 2N must extend from CRAH all the way to atmosphere. Heat rejection is the hidden common point"},
      {cause:"A facility has 2N power topology throughout but a single fire detection and suppression control panel serves all zones",effect:"Fire panel failure eliminates detection and suppression control across the entire facility — a life safety single point of failure",insight:"2N thinking must extend beyond M&E to life safety, security, BMS, and controls"}
    ],
    constraintLesson:"Clonshaugh with 2 × 3MVA UPS upgrade: excellent downstream. But upstream:\n\n• Both transformers feed SINGLE 3200A MSB (no bus-section)\n• Single 5MVA MIC from one ESB substation\n• Single transformer room (one fire = both lost)\n\nThree shared components upstream of the UPS split undermine the entire 2N investment.\n\nA = 0.9999 × [1−(0.001)²] = 99.99% = 53 min/yr.\nShared MSB limits to four nines — 100× worse than true 2N.\n\nThe system is limited by the worst single-path component upstream of where paths diverge.",
    weakestLink:{whatsWrong:"Three shared components upstream: single MSB bus (no bus-section), single 5MVA MIC, single transformer room. System availability limited by worst single-path component.",whatsRight:"2 × 2MVA TX give capacity headroom. Paths exist conceptually — just share junction points. Physical space available for dual routing.",howToGetThere:"[Costs indicative, 2025 Irish market. ESB Networks connection: ESB published process (T1). UPS 2N: Schneider/Eaton published ranges (T3). Switchgear, cable routes, TX separation: SCSI M&E benchmarks; RICS NRM1, indicative (T2). Chiller: Vertiv/Trane published ranges (T3).] 1. MSB bus-section switch: €50K–€80K (biggest independence gain per euro)\n2. Second utility feed: €200K–€400K (12–24 months lead)\n3. TX fire separation: €30K–€60K\n4. A/B cable routes: €100K–€200K\nPower 2N total: €1.33M–€2.21M. With 2×3MVA UPS: €2.13M–€3.41M\nAdd cooling 2N: +€700K–€1.21M. Grand total: €2.83M–€4.62M"}
  },
  rhetoric:{
    declan:{hook:"True 2N means two of everything — feeds, transformer rooms, switchboards, UPS, distribution paths. One shared component is one single point of failure.",text:"True 2N means two of EVERYTHING — feeds, TX rooms, switchboards, UPS, distribution, down to two power cords per server. We've got two UPS sharing one switchboard, one utility, one TX room. Lose the MSB, lose everything. Most sobering: SLAs assume 2N. If MSB fire, insurer asks 'where's your second path?' — we admit it doesn't exist."},
    ann:{hook:"2N infrastructure supports a Tier III plus or Tier IV availability claim. The difference in lease rate per rack between Tier II and Tier III is the business case.",text:"[Costs and revenue figures indicative — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024; 400-rack at €548/hr from Irish colocation market rates (CBRE/JLL DC market reports 2024). Screening-level estimates.] True 2N at current load: ~€2–3M. Target: €5–8M. Current 99.95% = 4.4 hrs/yr. At €548/hr + SLAs = €25K–€50K annual expected loss. €2M for 99.9999%: 40–80 year payback on direct savings alone. Doesn't pencil. But: one catastrophic event = €500K+. Insurance reduction €50K–€100K/yr. 2N space commands 30–50% rent premium. Business case isn't reliability maths — it's market positioning."},
    mark:{hook:"System availability with two 99.9 percent independent paths: 99.9999 percent theoretically. Add any shared component and that number collapses toward the weaker path.",text:"A_sys = 1 − (1−A_path)². Two 99.9% paths = 99.9999% (32 sec/yr). But add shared MSB at 99.99%: limits entire system to four nines (53 min/yr) regardless of downstream redundancy. EN 50600-2-2 Clause 6.3: Class 4 requires independence from utility coupling through to IT equipment."},
    sarah:{hook:"Tier classification looks at the whole facility, not individual components. A single shared MSB section is enough to reduce a 2N claim to N+1 at best.",text:"Tier classification looks at the WHOLE facility, not individual components. Best UPS but single-path upstream = Tier I from utility to MSB, Tier IV from UPS to rack. System classification = LOWEST tier in the chain. I drew the reliability block diagram and everything before the UPS split is in series. True 2N pushes the split all the way back to utility entrance."},
    tom:{hook:"Dual MSB fit-out is a significant capital item. The avoided cost of a single Tier III SLA breach over 10 years is the financial case for spending it now.",text:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar); Uptime Institute Annual Data Centre Survey 2024. All figures screening-level estimates.] 2N Irish DC retrofit budget breakdown:\nPower: feed €200K–€400K, MSB €80K–€150K, 2×3MVA UPS €800K–€1.2M, A/B routes €100K–€200K, fire sep €30K–€60K, design €120K–€200K.\nTotal power: €1.33M–€2.21M.\nCooling: chiller €300K–€500K, CRAH €180K–€300K, tower €100K–€180K, piping €80K–€150K, BMS €40K–€80K.\nCooling: €700K–€1.21M.\nPhase it — bus-section (€80K) and second chiller (€300K) give most improvement for least cost."}
  },
  scenario:{title:"The MSB Incident",narrative:"02:30 Wednesday. BMS alerts: MSB temperature alarm. Thermal camera shows 120°C hotspot on Phase L2 busbar connection — arcing. MSB must be de-energised for emergency repair. But de-energising the MSB = ALL power lost. No Path B. 400 racks, 2,400kW, single MSB.",question:"Total IT load at risk if MSB is de-energised? If UPS provides 10-min battery and the generator starts in 5 min, can Declan keep running during repair?",answer:"Step 1: ALL 2,400kW at risk (100% flows through single MSB)\nStep 2: Generator feeds THROUGH the MSB: Generator → ATS → MSB → UPS.\nDe-energised MSB = generator can't feed load either.\nUPS battery: 10-minute countdown to total loss.\n\nStep 3 (Weakest Link): UPS ride-through only helps for UPSTREAM faults where MSB stays energised. For MSB faults, generator and UPS are both stranded.\n\nDeclan's only option: coordinated IT shutdown in 10 min, emergency busbar repair while dark, cold-start 400 racks.\nExpected total downtime: 6–12 hours.\n\nIn a single-MSB facility, the MSB IS the single point of failure. No UPS or generator compensates. This is why 2N needs split MSB.\n\nA single MSB defeats the purpose of every redundant component downstream. In a single-bus facility, the MSB IS the availability ceiling.\n\nSources: Distribution topology — EN 50600-2-2:2019 Clause 6 (T1). MSB bus-section — IS 10101:2020 (T1). 2N path independence — Uptime Institute Tier III requirements (T1).",
whoShouldCare:["mark","tom"]},
  rhetoricTakeaways:{declan:"2N means two completely independent paths — if Path A fails entirely, Path B carries everything. That is a different class of resilience.",ann:"2N topology doubles the capital cost but enables zero-downtime SLAs — the premium clients who pay for 2N justify the investment.",mark:"2N only works if the paths are truly independent — shared ATS, shared bus-tie, or shared cooling header defeats the entire purpose.",sarah:"2N facilities can demonstrate fault tolerance in ESG reporting — a quantifiable resilience metric that institutional investors value.",tom:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] 2N doubles infrastructure cost but the revenue uplift from premium SLAs can deliver payback within 3-5 years for the right client mix."},
  retrofitRelevance:"2N retrofit is the structural upgrade that transforms a facility's commercial proposition. In Irish colocation, 2N commands 30–50% rent premium. The MSB bus-section (€80K) should ALWAYS be Phase 1 — it creates the physical path independence that every downstream 2N component relies on.",
  crossRefs:[{module:"DC-LEARN-005",level:"L2",topic:"Generator redundancy — 2N generators mean complete path independence for backup power"},{module:"DC-LEARN-001",level:"L3",topic:"LV switchboard — MSB bus-section creates the physical split that enables 2N distribution"}],
  sourceNote:"Uptime Institute Tier Standard (2024) Clause 5.3 — Tier IV 2N requirement. EN 50600-2-2 Clause 6.3 — dual distribution paths. EN 50600-2-2 Clause 6.3.3 — dual-corded loads. IEC 62310-1 and IEEE 446 — STS transfer time specifications. EN 50600-2-2 Clause 6.5 — fire-rated path separation. Standards references: T1 — published international standards (IEC/IEEE/EN/Uptime Institute).",
  clockQuote:"Redundancy is not a guarantee against failure. It is a guarantee that a single defined failure will not cause an outage. The moment you have two failures simultaneously, you are outside the design envelope. The question is: how likely is that, and do you know?",
  cascadeCheck:(targetTier)=>{
    const hasDualFeed = false; // Clonshaugh: single MIC
    const hasBusSection = false; // Single MSB
    const needed = targetTier >= 4 ? "2N paths" : (targetTier >= 3 ? "Dual feed" : "N/A");
    const actual = hasDualFeed ? (hasBusSection ? "2N" : "Split MSB needed") : "Single path";
    return {needed:needed,available:actual,unit:"",pass:targetTier<3||hasDualFeed,detail:hasDualFeed?"Dual utility feeds":"Single utility feed — no path independence"};
  }
},
{
  id:"L4", level:4, name:"2N+1 Redundancy", icon:"🛡️",
  available:true,
  component:"2N+1 Maximum Tolerance",
  userNeedStatement:"Understand when 2N+1 is justified and how to cost the incremental benefit over 2N. This is belt, braces, and a backup belt — two paths that each run the whole facility, each with a spare part.",
  plainEnglish:"Two complete independent systems, each with one additional spare component. Survive any single fault AND service any component simultaneously. The cost per additional 'nine' of availability gets exponentially more expensive — 2N+1 is where you ask 'is this justified?'",
  grammar:{
    facts:[
      {term:"2N+1 Redundancy",definition:"Two complete independent systems (2N), each with one additional spare component (+1) within each path",plain:"Two paths that each run the whole facility, and each path has a spare part",number:"Path A: 3+1 UPS modules. Path B: 3+1 UPS modules. Either path carries 100%",standard:"Uptime Institute Tier IV enhanced; EN 50600-1 Availability Class 4 with concurrent maintenance",feynman:{analogy:"Two separate roads to the destination (2N), PLUS an emergency helicopter (the +1). You can close one road for maintenance and still have a backup if the other road has an incident.",firstPrinciples:"2N gives you two full paths. The +1 adds a spare within each path. This means you can perform maintenance on one path while the other path still has internal redundancy. Without +1, maintenance on one path leaves the other as a single point of failure.",theTest:"With 2N+1, can you service a UPS module on Path A while Path B simultaneously experiences a component failure? Answer: Yes — the +1 spare on Path B covers the failure while A is in maintenance. This is what 2N alone cannot do."}},
      {term:"Fault Tolerance + Concurrent Maintainability",definition:"2N+1 delivers BOTH: survive any single fault AND service any component simultaneously",plain:"Something breaks AND you're doing maintenance on something else — still full capacity",number:"2N survives one path loss. 2N+1 survives path loss PLUS component failure within surviving path",standard:"Uptime Tier IV — simultaneously fault tolerant and concurrently maintainable",feynman:{analogy:"A hospital that can perform surgery (handle a fault) while simultaneously renovating an operating theatre (maintenance). Both capabilities exist at the same time — not either/or.",firstPrinciples:"Fault tolerance means surviving an unplanned failure automatically. Concurrent maintainability means servicing equipment without affecting load. Having both simultaneously means the system handles surprises even during planned work — the gold standard.",theTest:"During a planned UPS maintenance window, an unplanned chiller failure occurs. Does a 2N+1 facility survive both events? Answer: Yes for power (2N+1 covers both). But only if cooling also has redundancy — power topology alone doesn't protect cooling."}},
      {term:"Incremental Availability Gain",definition:"Moving from 2N to 2N+1 improves availability from ~99.9999% to ~99.99999%",plain:"From 32 seconds/year downtime to about 3 seconds/year — diminishing returns",number:"2N: 32 sec/yr. 2N+1: ~3 sec/yr. Difference = 29 seconds. Cost: €500K–€1M additional (T2/T3 — SCSI benchmarks; Uptime Institute 2024)",standard:"IEEE 493 — parallel-series reliability combination",feynman:{analogy:"Climbing a mountain — the first 1,000 metres are steep but achievable. Each additional 100 metres gets exponentially harder. Going from 99.99% to 99.999% availability costs 10× more than going from 99% to 99.9%.",firstPrinciples:"Each additional 'nine' of availability requires roughly 10× the investment. The law of diminishing returns applies brutally. After 2N, the incremental availability gain from adding +1 is measured in seconds per year — but the cost is hundreds of thousands of euro.",theTest:"2N gives 32 seconds annual downtime. 2N+1 gives ~3 seconds. The +1 costs €500K. What is the payback at €548/hr revenue? Answer: 29 seconds saved = €4.41/yr. Payback = 113,000 years. Revenue alone never justifies 2N+1."}},
      {term:"Cost Per Nine",definition:"Marginal cost to add one additional nine to the availability figure",plain:"Each additional nine after the first gets exponentially more expensive to achieve",number:"99%→99.9% = ~€200K. 99.9%→99.99% = ~€800K. 99.999%→99.9999% = ~€2M+",standard:"T3 — Industry heuristic from project cost data; SCSI M&E benchmarks",feynman:{analogy:"Like buying insurance — basic cover is cheap, but adding flood, earthquake, and pandemic cover makes each increment dramatically more expensive for incrementally less likely events.",firstPrinciples:"Plot availability nines (y-axis) against cumulative investment (x-axis). The curve flattens sharply after 2N. The business case for higher tiers is not revenue protection — it's rent grade, SLA compliance, and avoiding contractual penalties.",theTest:"A tenant's SLA specifies 99.995% availability. What is the commercial consequence if actual is 99.9%? Answer: ~8 hours vs ~26 minutes annual downtime. The gap triggers SLA penalties, potential lease renegotiation, and reputational damage."}},
      {term:"Topology Certification",definition:"Independent third-party verification that installed infrastructure matches the claimed redundancy tier",plain:"Getting an expert to check that what you built actually works the way the drawings say it does",number:"TCDD (design): €30K–€60K. TCCF (constructed): €60K–€120K. Revalidation: 3-year cycle (T3 — Uptime Institute Professional Services published fee schedule)",standard:"Uptime Institute Tier Certification; EN 50600-1 Annex B",feynman:{analogy:"Like an MOT for your car — it's not enough to say the brakes work, you need an independent inspector to verify it. Tier certification does the same for data centre topology.",firstPrinciples:"Design documents show intent, not reality. Construction introduces deviations, commissioning reveals defects, and operations create drift. Certification closes the loop by independently verifying that the as-built facility matches the target topology under test conditions.",theTest:"A facility claims Tier III but has never been certified. During due diligence, the buyer discovers 3 undocumented SPOFs. Would certification have caught these? Answer: Yes — TCCF requires physical inspection and functional testing of every switchover path."}}
    ],
    whatItLooksLike:"2N+1 looks like 2N but with more modules per path. UPS room: Path A has 4 modules where 3 are needed (3+1). Path B identical. Chiller plant: 3 chillers per circuit where 2 carry load. Generator yard: 3 gensets per path.\n\nKey identifier: can you take one component from the ACTIVE path and still have N capacity on that path?",
    siteChecklist:["Count modules per path — is there N+1 WITHIN each independent path?","Verify each path can lose one component and still carry 100%","Check: can both paths be under maintenance simultaneously?","Confirm spare components are genuinely operational (not decommissioned)","Review maintenance logs: has the +1 ever been tested under failure?","Cost check: what was the premium over 2N at procurement?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"Path A UPS fails completely during a planned chiller maintenance window on the Path B cooling circuit simultaneously",effect:"Path B UPS carries 100% IT load. But Path B cooling is in maintenance. IT load overheats within 10–15 minutes",insight:"Power redundancy without cooling redundancy isn't redundancy. 2N+1 must cover BOTH power and cooling simultaneously"},
      {cause:"A 2N+1 UPS system is installed but the generator configuration is 2N only — Path A generator is down for annual service",effect:"During service window, Path A has no generator backup. Utility failure = Path A on UPS battery only (10 min)",insight:"2N+1 at UPS level is undermined by 2N at generator level. Topology is only as strong as the weakest LAYER"},
      {cause:"[Costs indicative — SCSI M&E benchmarks; Uptime Institute 2024, T2/T3. Revenue rate from CBRE/JLL DC market reports 2024, T3.] Finance challenge: €500K additional for 2N+1 over 2N. Expected improvement: 29 seconds/yr",effect:"At €548/hr revenue rate, 29 seconds = €4.41/yr in avoided lost revenue. Payback: 113,000 years",insight:"Direct revenue loss doesn't justify 2N+1. Justification is SLA contractual requirements, insurance terms, or rent grade — not availability maths"}
    ],
    constraintLesson:"[Costs indicative, 2025 Irish market — SCSI M&E benchmarks; RICS NRM1; Uptime Institute Annual Data Centre Survey 2024; screening-level estimates.] At Clonshaugh's current state, discussing 2N+1 is premature. The facility isn't even N+1 on UPS. Investing in 2N+1 modules while the MSB is still a single bus is like fitting racing tyres on a car with no engine.\n\nThe topology conversation follows a logical sequence:\nFirst achieve N+1 → Then achieve 2N → THEN consider 2N+1.\nSkipping steps wastes capital on redundancy that doesn't deliver.\n\nPhase 1: N+1 (€400K, 16 weeks) — highest ROI\nPhase 2: 2N (€2.5M, 12 months)\nPhase 3: 2N+1 (+€500K–€800K, 8 weeks) — lowest ROI",
    weakestLink:{whatsWrong:"Discussing 2N+1 at Clonshaugh is premature. Not even N+1 currently. Three topology gaps (single MSB, single feed, single cooling) must be solved before +1 per path delivers value.",whatsRight:"Physical footprint could accommodate 2N+1. Building shell has more capacity than 2013 M&E fit-out used. Future-proofing achievable without demolishing.",howToGetThere:"[Costs indicative, 2025 Irish market. Tier upgrade costs: Uptime Institute Annual Data Centre Survey 2024; SCSI M&E benchmarks; RICS NRM1, indicative (T2/T3).] Phase 1: Achieve N+1 (€400K, 16 weeks)\nPhase 2: Achieve 2N (MSB split + second feed + 2×3MVA UPS, €2.5M, 12 months)\nPhase 3: Achieve 2N+1 (+€500K–€800K per path, 8 weeks)\nTotal to 2N+1: €3.4M–€3.7M phased over 18 months\nEach phase delivers measurable availability improvement."}
  },
  rhetoric:{
    declan:{hook:"I have seen the 2N+1 spec in hyperscale tenders. For a new-build that makes sense — retrofitting it into an existing facility requires careful sequencing.",text:"I've seen the 2N+1 spec in hyperscale tender documents. For new-build, it makes sense — incremental cost during construction is maybe 15% over 2N. But retrofitting to 2N+1 from where we are? We need to walk before we run. Get me N+1 first so I can actually do maintenance. Then we'll talk 2N. Then 2N+1. Each step gives me something real."},
    ann:{hook:"2N+1 is the hyperscale standard because the cost of any single outage at that scale dwarfs the additional infrastructure spend required to prevent it.",text:"[Costs and revenue figures indicative — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024; 400-rack at €548/hr from Irish colocation market rates (CBRE/JLL DC market reports 2024). Screening-level estimates.] 2N+1 over 2N: €500K–€800K for 29 seconds less downtime per year. On pure revenue maths, never pays back. But hyperscale tenants' SLAs require Tier IV with concurrent maintainability. Premium rent over 400 racks = €3.84M/yr additional revenue. Against that, €800K is a 2.5-month payback. The business case for 2N+1 isn't reliability — it's rent grade."},
    mark:{hook:"2N+1 availability per path with 3+1 modules at 99.995 percent each gives a system figure that exceeds any reasonable SLA requirement — by design.",text:"2N+1 availability: each path 3+1 modules (99.995% each). Path A = 1 − C(4,2)×(0.00005)²×(0.99995)² ≈ 99.99999+%. Two such paths in parallel approaches nine nines. Beyond six nines, common-mode failures (software bugs, human error, natural disaster) dominate over random component failures. EN 50600-1 Annex A acknowledges this: beyond Class 4, operational procedures matter more than hardware."},
    sarah:{hook:"The key insight for 2N+1 is the combination — it is not just more equipment, it is that maintenance windows no longer require any system-level risk exposure.",text:"I initially thought 2N+1 was just 'more stuff.' The key insight is the COMBINATION: fault tolerance AND concurrent maintainability. 2N gives fault tolerance (one whole path fails, other takes over). N+1 within each path gives maintainability (service one module, path still at N). 2N+1 = doing maintenance on Path A AND Path B survives a component failure. That's the scenario nobody else covers."},
    tom:{hook:"2N+1 premium over 2N is approximately 10 to 15 percent additional capital. For hyperscale operators that premium is priced directly into the colocation contract.",text:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] Incremental 2N+1 over 2N for Clonshaugh (assuming 2N achieved):\n2 extra UPS modules (one per path): €500K–€800K\nSwitchgear/cabling: €50K–€100K\nControls integration: €30K–€50K\nTotal: €580K–€950K (call it €750K with contingency)\nAs % of 2N cost: 20–30% additional. New-build: only 10–15% premium.\nIf you're doing 2N anyway, the marginal cost during the same project is much lower than retrofitting later."}
  },
  scenario:{title:"The Perfect Storm That Wasn't",narrative:"3am Saturday. Path B UPS module in scheduled firmware update (offline 2 hrs — Path B now at N, no spare). At 3:15am, a capacitor fails in one of Path A's UPS modules. Path A drops to N−1.\n\nWith 2N: both paths now at minimum capacity — one more failure anywhere means load loss.\nWith 2N+1: Path A still has N capacity (the +1 absorbs the failure) and Path B is at N (maintenance window).",question:"In a 2N configuration with 3 modules per path (no +1), calculate system capacity if Path B loses one module (maintenance) AND Path A loses one module (failure). Express as % of IT load.",answer:"Step 1: Each module = 250kW. IT load = 750kW (3 modules needed).\nPath A: 3 − 1 failure = 2 modules = 500kW capacity\nPath B: 3 − 1 maintenance = 2 modules = 500kW capacity\nCombined: 1,000kW available. IT load: 750kW. Coverage: 133%.\nSeems fine — each path at 67% capacity (500/750).\n\nStep 2: Load sharing — servers draw equally from A and B.\nEach path carries 375kW (50% of 750). Each path has 500kW = OK.\n\nStep 3 (Weakest Link): Servers aren't perfectly balanced.\n60/40 split: Path A carries 450kW vs 500kW capacity (90%).\nOne more module failure on A = 250kW vs 450kW = FAIL.\n\nWith 2N+1 (4 modules/path): Path A after failure = 3 × 250 = 750kW.\n60/40 split: 450kW vs 750kW = comfortable 60% loading.\nThe +1 provides margin for REAL load distribution, not ideal.\n\n2N+1 on paper means nothing if shared infrastructure upstream reduces it to N+1 in practice. Check every junction point.\n\nSources: 2N+1 topology — Uptime Institute Tier IV Standard (T1). Shared infrastructure analysis — EN 50600-2-2:2019 Annex A (T1). Load distribution — IEC 62040-3:2021 (T1).",
whoShouldCare:["mark","declan"]},
  rhetoricTakeaways:{declan:"2N+1 means I can maintain both paths simultaneously — that flexibility transforms my maintenance programme from reactive to proactive.",ann:"2N+1 is the topology that supports the highest-value SLAs in the market — it is a competitive differentiator, not just a cost.",mark:"Shared infrastructure between paths (common ATS, shared cooling) undermines 2N+1. The topology on paper must match the topology in practice.",sarah:"Facilities with 2N+1 certification demonstrate institutional-grade resilience — a requirement for sovereign wealth and pension fund investment.",tom:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] The incremental cost from 2N to 2N+1 is modest (one additional module per path) but the SLA premium it enables is significant."},
  retrofitRelevance:"2N+1 in retrofit is Phase 3 — the polish after the structural work. Only pursue it after 2N is complete and tested. The business case is rent grade and SLA tier, not reliability mathematics. For Clonshaugh, the phased programme (N+1 → 2N → 2N+1) spreads €3.4M–€3.7M over 18 months with measurable milestones.",
  crossRefs:[{module:"DC-LEARN-005",level:"L6",topic:"Redundancy architectures — generator and UPS redundancy must match the topology target"},{module:"DC-LEARN-006",level:"L6",topic:"CRU & grid connection — dual feed from separate substations is the upstream prerequisite for 2N+1"}],
  sourceNote:"Uptime Institute Tier Standard (2024) — Tier IV enhanced (2N+1). EN 50600-1 Availability Class 4 — concurrent maintenance under fault. IEEE 493 — parallel-series reliability combination methods. Industry cost data from SCSI M&E benchmark data and Uptime Institute project cost references (T2).",
  clockQuote:"N+1 redundancy protects against the failure of one component in a set. It does not protect against the failure of a component that sits upstream of the entire set. That upstream component is your single point of failure. Finding it is the job. Fixing it is the next job.",
  cascadeCheck:(targetTier)=>{
    const needed = targetTier >= 4 ? "2N+1" : "N/A";
    const actual = "N+0"; // Clonshaugh current
    return {needed:needed,available:actual,unit:"",pass:targetTier<4,detail:"Current: N+0. 2N+1 requires Phases 1-3 complete"};
  }
},
