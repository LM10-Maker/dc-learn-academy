{
  id:"L9", level:9, name:"Topology Design for Retrofit", icon:"🏗️",
  available:true,
  component:"Live Retrofit Topology",
  userNeedStatement:"Sequence a topology upgrade programme for a live facility with zero planned IT downtime. The MSB bus-section installation can be sequenced within the UPS battery window — transfer to battery, split the bus, restore utility. The 10-minute battery makes 'zero downtime' MSB split possible.",
  plainEnglish:"Retrofitting a live data centre is like renovating the kitchen while the restaurant is still serving dinner. The sequence matters more than the specification. Upgrade DISTRIBUTION first (MSB split €80K, T2 — SCSI benchmarks), then major equipment (UPS €1.2M, T3 — Schneider/Eaton published ranges). Getting it backwards wastes millions.",
  grammar:{
    facts:[
      {term:"Live Retrofit",definition:"Upgrading facility infrastructure while IT operations continue uninterrupted",plain:"Renovating the kitchen while the restaurant is still serving dinner",number:"Typical DC retrofit: 12–24 months. Zero-downtime retrofit adds 30–50% to programme cost",standard:"EN 50600-3-1 Annex A — operational constraints during upgrade",feynman:{analogy:"Like performing heart surgery on a patient who must stay awake and walking throughout. Every cut, every stitch must be planned so the heart never stops beating — even for a second.",firstPrinciples:"A live retrofit upgrades infrastructure while the facility remains operational. This requires temporary power supplies, carefully sequenced switching, pre-tested procedures, and fallback plans for every step. The cost premium over a shutdown retrofit is 15-30%, but the alternative (planned downtime) may cost more in lost revenue.",theTest:"[Revenue rate €548/hr derived from Irish colocation market rates (CBRE/JLL DC market reports 2024, T3). Shutdown savings indicative — SCSI M&E benchmarks, indicative (T2).] A facility generates €548/hr revenue. A shutdown retrofit saves €200K vs live retrofit. Shutdown takes 72 hours. Is the shutdown cheaper? Answer: Revenue loss = 72 × €548 = €39,456. Yes, shutdown is cheaper IF the tenant agrees. Most Tier III+ leases prohibit planned outages."}},
      {term:"Temporary Supplies",definition:"Mobile/temporary infrastructure that maintains capacity during permanent equipment upgrade",plain:"Rent a generator, plug it in, take the old one out, install the new one, unplug the rental",number:"Mobile UPS: €5K–€15K/month. Mobile chiller: €8K–€20K/month. Mobile generator: €3K–€8K/month",standard:"Project-specific risk assessment per CDM regulations",feynman:{analogy:"Like a temporary bridge built next to the old bridge before demolition starts. Traffic moves to the temporary bridge, the old bridge is demolished and rebuilt, then traffic moves back.",firstPrinciples:"Temporary generators, temporary UPS, or temporary cooling provide an alternative power/cooling path during works. They extend battery runtime from minutes to unlimited and remove time pressure from the work. The rental cost (€3K-€5K for a generator, T3 — specialist DC hire market rates) is trivial compared to the risk of rushing.",theTest:"UPS battery provides 10 minutes. MSB bus-section installation takes 25 minutes. What temporary supply solves this? Answer: Mobile generator (€3K-€5K rental, T3 — specialist DC hire market rates). UPS transfers to battery, then to generator. Work proceeds with unlimited time — no rush, no risk."}},
      {term:"Upgrade Sequencing",definition:"The order in which infrastructure components are upgraded to maintain capacity throughout",plain:"Can't install new MSB until new TX feeds it. Can't install new TX until new HV cable is in",number:"Critical path: utility feed → transformer → MSB → UPS → distribution. Cooling often parallels",standard:"Uptime Institute Tier Certification for constructed facility",feynman:{analogy:"Like building a house — you pour foundations before raising walls, and raise walls before fitting the roof. In a DC, you split distribution (MSB bus-section) BEFORE installing new UPS — because the new UPS needs the new distribution to connect to.",firstPrinciples:"Upgrade sequencing follows the direction of power flow: distribution before generation, generation before IT. Split the MSB first (creates A/B paths), then install new UPS (connects to new paths), then migrate IT loads (rebalance across paths). Reversing the sequence wastes capital on equipment that can't be connected yet.",theTest:"Should you install a new UPS string or split the MSB first? Answer: Split the MSB first (€50K-€80K, T2 — SCSI benchmarks). The new UPS (€800K+, T3 — Schneider/Eaton published ranges) needs an independent distribution path to connect to. Distribution before generation — always."}},
      {term:"Dual-Running Period",definition:"Time when both old and new systems operate simultaneously during transition",plain:"New UPS running alongside old one. Load migrated rack by rack. Both must work",number:"Typical dual-running: 2–4 weeks per major system. Allows testing and gradual load migration",standard:"Good engineering practice per EN 50600-3-1",feynman:{analogy:"Like training a new employee alongside the person they're replacing. For an overlap period, both are employed — expensive, but it proves the new person can do the job before the old one leaves.",firstPrinciples:"During a dual-running period, old and new equipment operate simultaneously. This proves the new equipment works under real load conditions before the old equipment is decommissioned. The period costs double in energy and maintenance but eliminates the risk of discovering problems only after the old system is gone.",theTest:"New UPS is installed and commissioned. Should you immediately decommission the old UPS? Answer: No — run both for 2-4 weeks minimum. Monitor new UPS under real load, verify thermal performance, confirm automatic transfers work. Then decommission the old unit."}},
      {term:"Commissioning Under Load",definition:"Testing new equipment with actual IT load, not just test loads",plain:"The new UPS passed factory test. Now prove it works with 400 racks of real servers",number:"Factory test ≠ site test ≠ load test. All three required before cutover",standard:"CIBSE Commissioning Code M",feynman:{analogy:"Like test-driving a car on a motorway, not just in the showroom. Equipment must prove it works under real conditions — actual heat, actual load, actual fault scenarios — not just manufacturer's test bench conditions.",firstPrinciples:"Factory acceptance testing (FAT) verifies equipment works in controlled conditions. Site acceptance testing (SAT) verifies it works in YOUR conditions — your ambient temperature, your harmonics, your load profile. Commissioning under load means gradually transferring real IT load and monitoring performance at each step.",theTest:"A UPS passes factory tests at 25°C ambient. Site ambient is 32°C (failed cooling). Should you commission at rated load? Answer: No — derate for temperature. UPS capacity decreases ~2% per °C above 25°C. At 32°C: ~14% derating. Commission at reduced load or fix cooling first."}}
    ],
    whatItLooksLike:"Active retrofit sites show: temporary equipment (rental generators, mobile chillers), section barriers in plant rooms, phased construction zones, dual labelling (old + new references), temporary monitoring (additional BMS points).\n\nThe safest indicator: a detailed Gantt chart on the wall showing the sequence and current status. Absence of a visible programme = risk.",
    siteChecklist:["Is there a documented retrofit sequence with each phase's risk assessment?","What temporary equipment is required? Confirm availability and lead time","For each phase: what is the minimum capacity during transition?","Rollback plan for each phase — can you return to previous state?","Commissioning plan: factory → site → load → integrated system test","Who is the project manager and do they have DC retrofit experience?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"A UPS upgrade is initiated as the first retrofit step but the main switchboard has not yet been split into A/B sections",effect:"New 2N UPS strings connect to single MSB. Single bus failure still takes out both. €1.2M investment (Schneider/Eaton published ranges, T3) gives zero topology improvement",insight:"Sequencing matters more than specification. Upgrade DISTRIBUTION first, then major equipment. MSB split (€80K, SCSI benchmarks, T2) must happen BEFORE UPS upgrade (€1.2M, Schneider/Eaton, T3)"},
      {cause:"[Rental costs: specialist DC hire market rates, indicative (T3). Delivery risk: project experience (T4).] Temporary chiller installed for permanent chiller replacement. 20-week lead time on permanent unit",effect:"Mobile equipment rental at €15K/month accumulates to €75K over five months — delivery delays can extend this to €120K+",insight:"Temporary equipment costs are the hidden budget risk. Always get firm delivery dates before committing to rental periods"},
      {cause:"Rack-by-rack live load migration from the old single-bus path to the new split A/B path configuration takes six weeks",effect:"During migration: some racks on old, some on new. Mixed topology. Fault must be managed across both systems",insight:"Migration window is highest-risk period. Staffing must be doubled (teams for old and new). This is where most retrofit incidents occur"}
    ],
    constraintLesson:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024. Screening-level estimates.] Clonshaugh's constraint for retrofit: 400 racks of live tenants. No planned shutdown acceptable — lease has no maintenance downtime allowance.\n\nThe single MSB is the critical sequencing bottleneck — must be split before any other topology upgrade. But splitting requires a brief power interruption to reconfigure bus connections.\n\nSolution: UPS battery provides 10-min ride-through. MSB bus-section can be installed within this window using a mobile generator for extended time.\n\nThe retrofit sequencing rule: upgrade DISTRIBUTION before GENERATION. Split the MSB before installing new UPS. Install CHW isolation before new chillers. Route A/B cable paths before commissioning dual-corded racks.\n\nCumulative availability worked example — Clonshaugh upgrade phases:\nBaseline (current, Tier I): five series components each ~99.9% → system 0.999^5 = 99.5% = 43.8 hrs/yr downtime.\nAfter Phase 1 (N+1 UPS + MSB split + MOPs): weakest component MTTR halved, MSB bus-section adds parallel path at distribution → system ~99.95% = 4.4 hrs/yr. Investment: €310K (SCSI M&E benchmarks; RICS NRM1, indicative, T2).\nAfter Phase 2 (cooling N+1 + second chiller): cooling SPOF eliminated, parallel cooling path → system ~99.98% = 1.75 hrs/yr. Investment: +€750K (SCSI M&E benchmarks; Vertiv/Trane, indicative, T2/T3).\nAfter Phase 3 (2N power, dual utility): two independent power paths, each 99.9% → power subsystem 99.9999%. System limited by operational procedures → ~99.99% = 52 min/yr. Investment: +€2.2M (SCSI M&E benchmarks; ESB Networks; Schneider/Eaton, indicative, T2/T3).\nTotal: 43.8 hrs/yr → 52 min/yr. Each phase compounds — but the first €310K buys 90% of the improvement (43.8 → 4.4 hrs). Diminishing returns after that. This is why Phase 1 has the highest ROI.",
    weakestLink:{whatsWrong:"400 live racks, no downtime allowance in lease. Single MSB must be split first but requires power interruption. 30–60 second window for bus reconnection exceeds zero-downtime requirement.",whatsRight:"UPS battery gives 10-min ride-through. Mobile generator eliminates time constraint. Building has physical space for dual routing. Phased approach delivers measurable milestones.",howToGetThere:"[Costs indicative, 2025 Irish market. Full programme costs: SCSI M&E benchmarks; RICS NRM1; ESB Networks published process (T1/T2). Equipment rentals: specialist DC hire market rates (T3). Professional fees: RICS NRM1 fee benchmarks, indicative (T2). ESB second feed critical path: 12–24 months per ESB published connection process (T1).] Phase 1 — Foundation (Months 1–3, €175K–€310K):\n  MOPs (€10K), BMS redundancy (€20K), fire panel (€35K), MSB bus-section (€80K), CHW valves (€20K)\nPhase 2 — Cooling N+1 (Months 4–8, €450K–€750K):\n  Second chiller + containment + commissioning\nPhase 3 — Power Path Split (Months 6–14, €1.3M–€2.2M):\n  Second feed (ESB 12+ months), TX separation, new UPS, A/B routing\nPhase 4 — Migration (Months 14–18, €100K–€200K):\n  Rack-by-rack to dual-corded 2N\nTotal: €2.5M–€4.3M over 18 months. Critical path: ESB second feed."}
  },
  rhetoric:{
    declan:{hook:"The retrofit sequence Mark proposed made sense once I saw the programme timeline. Start cheap, measure, then apply the expensive interventions on a proven baseline.",text:"The retrofit sequence Mark proposed made sense when I saw the timeline. Start cheap: MOPs, BMS, fire panel. Then cooling resilience. Then the big power split. The MSB bus-section on UPS battery terrified me — deliberately disconnecting utility and trusting the battery. We rehearsed three times on a Saturday before doing it for real. 30 minutes of work, 10 minutes of battery, and now I have an A/B split MSB. Best €80K I ever spent."},
    ann:{hook:"Phased retrofit converts a 2 million euro capital ask into three independent investment decisions — each of which pays back before the next phase is approved.",text:"[Costs and revenue figures indicative — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute 2024; 400-rack at €548/hr from Irish colocation market rates (CBRE/JLL DC market reports 2024). Screening-level estimates.] The phased programme sold to the board. Phase 1 at €175K eliminates 5 of 7 SPOFs — immediate risk reduction. Phase 2 at €450K adds cooling and containment (energy savings pay back 30%). Phase 3 at €1.3M enables Tier III marketing and premium rents. Each phase has a deliverable and a tenant-facing benefit. Total: €2M–€3.5M over 18 months with measurable milestones."},
    mark:{hook:"Phase sequencing: ATS first to restore genuine N+1, then MSB sectionalization to eliminate the shared SPOF, then UPS module expansion to reach the designed redundancy.",text:"[Costs indicative, 2025 Irish market — SCSI M&E benchmarks; RICS NRM1; Uptime Institute 2024; manufacturer published ranges (Schneider/Eaton/ABB). Screening-level estimates.] The retrofit sequencing rule: upgrade DISTRIBUTION before GENERATION. Split the MSB before installing new UPS. Install CHW isolation before new chillers. Route A/B cable paths before commissioning dual-corded racks. Every major equipment investment requires distribution infrastructure to receive it. I've seen €1M UPS installations deliver zero topology improvement because the MSB was still a single bus. €80K bus-section should ALWAYS be Phase 1."},
    sarah:{hook:"Each retrofit phase increases the Tier classification evidence available for the compliance file — and for the SFDR disclosure on availability of critical infrastructure.",text:"The retrofit project taught me that engineering design and project management are inseparable in DC work. You can design the perfect 2N topology, but if you can't build it without shutting down the facility, the design is useless. The sequence — what gets installed in what order, with what temporary equipment, with what risk at each step — IS the design. A topology drawing without a build programme is only half a design."},
    tom:{hook:"Retrofit sequencing matters more than the total programme cost. Delivering Phase 1 within the existing maintenance budget builds the board approval case for Phase 2.",text:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] Retrofit programme cost summary, Clonshaugh Tier I → Tier III:\nPhase 1 (foundation): €175K–€310K (3 months)\nPhase 2 (cooling N+1): €450K–€750K (4 months)\nPhase 3 (power 2N): €1.3M–€2.2M (8 months)\nPhase 4 (migration): €100K–€200K (4 months)\nTemporary equipment: €50K–€100K (rentals)\nProfessional fees: €120K–€200K\nContingency (15%): €330K–€550K\nTOTAL: €2.5M–€4.3M over 18 months\nKey lead item: ESB second feed (apply Month 1)."}
  },
  scenario:{title:"The 30-Minute Window",narrative:"Retrofit Phase 1d: MSB bus-section installation. Pre-fabricated switch delivered and staged. Plan: disconnect utility at MSB, UPS takes over on battery (10 min rated), install bus-section connections (estimated 25 min), restore utility.\n\nEverything must be done within UPS battery runtime.",question:"UPS battery provides 10 minutes at 2.4MW. Bus-section installation requires 25 minutes. What is the gap? How does Mark solve it?",answer:"Step 1: Gap analysis\nBattery: 10 min. Installation: 25 min.\nGap: 15 minutes uncovered. At 10 min, battery exhausts → total loss.\n\nStep 2: Solution — mobile generator\na. Start mobile generator + verify (5 min before)\nb. Disconnect utility at MSB incomer\nc. UPS transfers to battery (instant)\nd. Connect mobile generator to UPS input via temporary cable (3 min)\ne. UPS transfers from battery to generator (instant)\nf. Battery recharging, unlimited runtime\ng. Install bus-section (25 min, no time pressure)\nh. Restore utility to Section A, then Section B\nCost: mobile generator 1 week rental €3K–€5K\n\nStep 3 (Weakest Link): The temporary cable between generator and UPS input. Must be properly rated, protected, tested before load transfer. If temp connection fails → back on battery with 10 min.\nThe Weakest Link shifted from TIME to TEMPORARY INFRASTRUCTURE.\nEvery retrofit phase creates new temporary SPOFs.\n\nLive migration planning is the critical path for any topology upgrade. The sequencing matters more than the equipment selection.\n\nSources: Retrofit methodology — EN 50600-3-1:2016 Annex A (T1). Commissioning under load — CIBSE Commissioning Code M (T2). CDM regulations — Safety, Health and Welfare at Work Act 2005 (T1).",
whoShouldCare:["mark","tom","ann"]},
  rhetoricTakeaways:{declan:"Retrofit topology assessment starts with where we are today — the gap between current and target tier defines my capital programme for the next 5 years.",ann:"A phased upgrade strategy aligns topology investment to budget cycles — we do not need to go from Tier I to Tier III in one step.",mark:"Live migration planning is the critical path — you cannot shut down 400 racks to install a second utility feed. The sequencing must be engineered.",sarah:"Topology upgrade milestones are reportable ESG improvements — each phase delivers measurable availability improvement aligned to net-zero pathway.",tom:"[Costs indicative, 2025 Irish market — T2: SCSI M&E benchmarks; RICS NRM1. T3: Uptime Institute Annual Data Centre Survey 2024; manufacturer published ranges (Schneider/Eaton/ABB/Vertiv/Trane/Caterpillar). Screening-level estimates.] Cost-per-nine escalates exponentially — the business case for Tier III is strong, but Tier IV must be justified by the specific tenant revenue it enables."},
  retrofitRelevance:"This IS the retrofit level. The entire Clonshaugh programme is mapped here: 4 phases, 18 months, €2.5M–€4.3M. The key lesson: sequence matters more than specification. The €80K MSB bus-section in Phase 1 unlocks the value of every subsequent investment. Apply for ESB second feed on Day 1 — it's the critical path item with 12+ month lead.",
  crossRefs:[{module:"DC-LEARN-006",level:"L6",topic:"CRU & grid connection — ESB second feed application is the critical path item with 12+ month lead"},{module:"DC-LEARN-010",level:"L9",topic:"Net Zero roadmap — topology upgrade phases must align with the sustainability investment timeline"}],
  sourceNote:"EN 50600-3-1 Annex A — operational constraints during infrastructure upgrade. CIBSE Commissioning Code M — commissioning requirements. CDM regulations — temporary supply risk assessment. ESB Networks connection lead times from published connection process. Retrofit cost benchmarks from SCSI Tender Price Index and Irish M&E contractor market rates (T2).",
  clockQuote:"Writing it down doesn't fix it. But it does mean you can't forget it. In a facility that runs continuously, the maintenance log is the memory. What isn't in the log didn't happen. What is in the log must be followed up.",

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q003-01",icon:"🔧",stage:"grammar",q:"What does MTBF stand for and what does it measure?",options:["Mean Time Before Failure — total operating hours until the first breakdown of a new component","Maintenance Time Before Failure — the maximum recommended service interval for rotating equipment","Maximum Tolerance Before Failure — the stress limit above which failure probability exceeds 50%","Mean Time Between Failures — average operating hours between failures"],correct:3,explain:"MTBF = Mean Time Between Failures. IEEE 493 defines it as average operating hours between failures for repairable components."},
  {level:1,id:"Q003-02",icon:"🔧",stage:"logic",q:"Five components in series, each 99.99% available. What is the system availability?",options:["99.99%","99.999%","99.90%","99.95%"],correct:3,explain:"Series: multiply availabilities. 0.9999^5 = 0.9995 = 99.95%. Series destroys availability."},
  {level:1,id:"Q003-03",icon:"🔧",stage:"rhetoric",q:"A Clonshaugh ATS has 4% fail-to-operate rate (untested). During a planned utility outage, what is the DEMAND availability?",options:["99.984% — steady-state MTBF calculation gives the true availability figure and the fail-to-operate rate is a commissioning anomaly, not a design constraint.","96% (demand availability = 100% minus fail-to-operate)","99.99% — ATS units are highly reliable safety-critical components and the fail-to-operate rate applies only to units without maintenance contracts.","98% — the correct approach is to split the difference between steady-state availability and the fail-to-operate rate as a conservative estimate."],correct:1,explain:"Steady-state A ≠ demand availability. IEEE 493: 4% fail-to-operate for untested units means 96% demand availability."},
  {level:2,id:"Q003-04",icon:"➕",stage:"grammar",q:"Clonshaugh has 2×1.5MVA UPS for 2,400kW IT load. What is the ACTUAL redundancy level?",options:["2N — two strings, each carries full load","N+1 — one spare beyond minimum","N+0 — exactly minimum capacity, no spare","N-1 — below minimum capacity"],correct:2,explain:"Each string: 1.5MVA × 0.9PF = 1,350kW. Need 2,400kW. N = ceil(2,400/1,350) = 2. Have 2 = N+0. No spare."},
  {level:2,id:"Q003-05",icon:"➕",stage:"logic",q:"What changed between 2013 commissioning and today that killed UPS redundancy?",options:["IT load grew from 1,200kW to 2,400kW","Battery capacity degraded with age, reducing each UPS string's effective output below the 1,350kW rating.","Firmware updates applied during a maintenance window reduced the UPS units' maximum output current rating.","Power factor at the UPS output terminals worsened below 0.9 due to increased non-linear IT loads."],correct:0,explain:"At 1,200kW: N=1, with 2 units = N+1. At 2,400kW: N=2, with 2 units = N+0. Load growth, not equipment change."},
  {level:2,id:"Q003-06",icon:"➕",stage:"rhetoric",q:"N+1 redundancy primarily enables what operational benefit?",options:["Higher energy efficiency — N+1 allows one unit to run at part load, improving its COP and reducing the total facility PUE.","Faster server boot times — N+1 power path redundancy ensures servers receive uninterrupted power during boot sequences.","Lower insurance premiums — N+1 certification is a recognised underwriting criterion that reduces the DC operator's property insurance cost.","Safe maintenance without IT impact"],correct:3,explain:"N+1 means one spare beyond capacity. Take one unit offline for service; remaining N units carry full load."},
  {level:3,id:"Q003-07",icon:"✌️",stage:"grammar",q:"True 2N with each path at 99.9% availability gives what system availability?",options:["99.99% — parallel paths add exactly one nine to the base availability","99.9% — parallel paths provide no statistical benefit over a single path","99.98% — slightly better than a single path","99.9999% — two three-nine paths give six nines"],correct:3,explain:"Parallel: A = 1 − (1−0.999)² = 1 − 0.000001 = 99.9999%. Two three-nine paths give six nines."},
  {level:3,id:"Q003-08",icon:"✌️",stage:"logic",q:"Clonshaugh has 2N UPS but single MSB. What limits system availability?",options:["UPS battery runtime — the 10-minute bridge time limits availability because generator start-to-sync time occasionally exceeds this margin.","The single MSB (worst upstream single-path component)","Server power supply dual-input utilisation — servers with single PSUs cannot benefit from 2N UPS topology downstream.","Cooling system capacity — the single chiller represents a higher availability risk than the single MSB in the power path."],correct:1,explain:"Shared MSB at 99.99% limits entire system to four nines regardless of downstream 2N. Worst single-path component upstream sets the ceiling."},
  {level:3,id:"Q003-09",icon:"✌️",stage:"rhetoric",q:"What is the cheapest single action to improve path independence at Clonshaugh?",options:["Second utility feed (€200K–€400K) — eliminating the single utility dependency has the highest structural impact on overall path independence.","New 2×3MVA UPS (€800K–€1.2M) — upgrading UPS capacity to 2N creates genuine A/B path separation for all downstream IT load.","MSB bus-section switch (€50K–€80K)","Second chiller (€300K–€500K) — adding a second chiller eliminates the largest operational SPOF and the highest-consequence single failure."],correct:2,explain:"MSB bus-section (€50K–€80K) creates A/B path split at distribution. Biggest independence gain per euro."},
  {level:4,id:"Q003-10",icon:"🛡️",stage:"grammar",q:"2N+1 over 2N improves annual downtime from 32 seconds to ~3 seconds. At €548/hr revenue, what is the payback on €500K additional investment?",options:["113,000 years","18 months","10 years","2.5 months"],correct:0,explain:"29 seconds saved × €548/hr = €4.41/yr. €500K / €4.41 = 113,378 years. Revenue maths never justifies 2N+1. Business case is rent grade/SLA."},
  {level:4,id:"Q003-11",icon:"🛡️",stage:"logic",q:"What does 2N+1 provide that 2N alone does not?",options:["Higher energy efficiency — 2N+1 allows one unit per path to run at part load, improving system COP and reducing facility PUE.","Fault tolerance AND concurrent maintainability simultaneously","Faster failover transfer times — the additional unit absorbs load instantaneously, reducing the transfer time to under 1ms.","Lower equipment procurement costs — the additional unit creates negotiating leverage with suppliers for volume pricing."],correct:1,explain:"2N survives one path loss. +1 within each path allows maintenance. Combined: service Path A AND Path B survives a component failure."},
  {level:4,id:"Q003-12",icon:"🛡️",stage:"rhetoric",q:"For Clonshaugh, what should happen BEFORE investing in 2N+1?",options:["Achieve N+1 first, then 2N, then 2N+1","Install 2N+1 immediately to achieve maximum protection in one capital programme rather than incurring repeated disruption over three phases.","Skip directly to Tier IV certification — the Uptime Institute process identifies the most efficient retrofit path and avoids intermediate capital waste.","Add generators with fuel autonomy upgrade first — power generation is the highest-consequence SPOF and must be addressed before distribution."],correct:0,explain:"Currently N+0. Must achieve N+1 (€400K) → 2N (€2.5M) → then 2N+1 (€500K–€800K). Skipping steps wastes capital."},
  {level:5,id:"Q003-13",icon:"🏛️",stage:"grammar",q:"Clonshaugh marketing says 'Tier III design.' What is the ACTUAL tier based on installed infrastructure?",options:["Tier I — functionally single-path throughout","Tier III — as marketed","Tier II — some redundancy exists despite single utility feed","Tier IV — installed infrastructure exceeds the marketing claim"],correct:0,explain:"Single utility, N+0 UPS, single MSB, single chiller = Tier I. 'Tier III design' means building ENVELOPE can accommodate it, not that M&E is installed."},
  {level:5,id:"Q003-14",icon:"🏛️",stage:"logic",q:"Approximately what percentage of facilities claiming Tier III would fail formal Uptime certification?",options:["~5%","~15%","~40%","~80%"],correct:2,explain:"~40% of facilities that claim Tier III would not achieve formal Uptime Institute certification. Self-declaration is meaningless."},
  {level:5,id:"Q003-15",icon:"🏛️",stage:"rhetoric",q:"What is the commercial consequence of claiming a higher tier than actually achieved?",options:["No material consequence — Uptime Institute tier classification is an industry guideline, not a legally binding standard under Irish contract law.","Slightly lower insurance premiums — overstated tier claims reduce the apparent risk profile and lower the annual premium without legal implications.","Faster tenant acquisition — colocation tenants rarely verify tier claims and the marketing benefit outweighs the technical accuracy requirement.","Lease renegotiation, rent reduction, legal exposure"],correct:3,explain:"Tier claims in leases have legal weight. Tenant discovering Tier I when paying for Tier III can demand rent reduction + damages."},
  {level:6,id:"Q003-16",icon:"⚠️",stage:"grammar",q:"How many documented SPOFs does the Clonshaugh SPOF map identify?",options:["3","5","12","7"],correct:3,explain:"7 documented: single utility, single MSB, single chiller, single ATS, single BMS, single fire panel, no fuel bunding. Expected 3–5 more hidden."},
  {level:6,id:"Q003-17",icon:"⚠️",stage:"logic",q:"Which SPOF elimination gives the best value (highest impact per euro) at Clonshaugh?",options:["Second utility feed (€200K–€400K) — eliminates the highest-consequence single point of failure in the power chain with the highest commercial impact.","Second chiller (€300K–€500K) — eliminates the cooling SPOF which causes the fastest-onset service disruption in the event of failure.","BMS redundancy (€15K–€30K)","MSB bus-section (€50K–€80K) — creates A/B power path separation and improves availability across the entire downstream IT load."],correct:2,explain:"BMS at €15K–€30K eliminates a 2–4 hour SPOF affecting all cooling control. Highest impact per euro."},
  {level:6,id:"Q003-18",icon:"⚠️",stage:"rhetoric",q:"What category of SPOF is most commonly missed in standard engineering analysis?",options:["Electrical distribution SPOFs — single busbar and panel configurations are routinely overlooked in SLD reviews despite being the most common failure mode.","Cooling capacity SPOFs — single chiller and single cooling tower configurations are the most frequently missed in standard facilities risk assessments.","Hidden SPOFs: BMS, fire panel, access, human knowledge","Generator capacity SPOFs — insufficient fuel autonomy and shared fuel tanks are consistently missed in tier assessments and insurance audits."],correct:2,explain:"Standard SLDs show power paths. Hidden SPOFs in controls, fire systems, physical access, supply chain, and human knowledge are frequently missed."},
  {level:7,id:"Q003-19",icon:"🔄",stage:"grammar",q:"What does Clonshaugh currently lack that prevents concurrent maintainability regardless of physical topology?",options:["Maintenance bypass switches for each UPS and distribution panel","Written Methods of Procedure (MOPs)","Redundant UPS modules","Second utility feed"],correct:1,explain:"No written MOPs. Declan's knowledge is the only isolation procedure. No MOP = no CM regardless of installed equipment."},
  {level:7,id:"Q003-20",icon:"🔄",stage:"logic",q:"What is the cost of a complete MOP programme vs Tier III infrastructure?",options:["MOPs: €25K–€43K vs Infrastructure: €2.5M–€3.5M","MOPs cost approximately €500K when specialist DC engineers write them to EN 50600-3-1 standard versus €1M for Tier III infrastructure.","MOPs and infrastructure cost approximately the same when maintenance training, annual reviews, and BMS integration are included.","MOPs are effectively free — documentation is an internal task requiring no specialist input or external professional fees."],correct:0,explain:"MOPs: €25K–€43K (1% of infrastructure cost) for 80% of the operational benefit. Write MOPs before investing in hardware."},
  {level:7,id:"Q003-21",icon:"🔄",stage:"rhetoric",q:"EN 50600-3-1 Clause 6.2 requires what for facilities claiming Availability Class 2+?",options:["Annual third-party audit by an accredited Uptime Institute or TÜV assessor to verify that the facility meets Class 2 availability requirements.","Minimum 2N power topology from utility incomer to IT equipment for all circuits serving Class 2 or higher spaces.","24/7 on-site staffing with at least one qualified electrical engineer available at all times within the facility boundary.","Documented planned maintenance procedures"],correct:3,explain:"EN 50600-3-1 Cl 6.2 requires documented procedures for all planned maintenance. Not optional for Class 2+."},
  {level:8,id:"Q003-22",icon:"💪",stage:"grammar",q:"Fault tolerance requires three things. Which is MISSING from Clonshaugh's cooling system?",options:["Action (automatic backup activation)","Detection (sensors)","Decision (BMS alarm logic)","All three are missing"],correct:0,explain:"Cooling: detection exists (BMS sensors), decision partial (alarm logic), ACTION missing (no automatic standby chiller start). One gap breaks fault tolerance."},
  {level:8,id:"Q003-23",icon:"💪",stage:"logic",q:"What percentage of DC outages involve multiple system failures (cascading), not single faults?",options:["~20%","~40%","~70%+","~95%"],correct:2,explain:"Uptime Institute reports 70%+ of outages involve multiple system failures. Cascading failures at INTERFACES between systems, not within single components."},
  {level:8,id:"Q003-24",icon:"💪",stage:"rhetoric",q:"At 20kW/rack target density with no containment, approximately how long after a chiller trip before ASHRAE A1 recommended limits are breached?",options:["30 minutes","4.5 hours","8 hours","1.5 hours"],correct:3,explain:"At 20kW/rack: ~4°C/hr rise. With 3°C hot-spot deduction: 6°C effective headroom / 4°C/hr ≈ 1.5 hours."},
  {level:9,id:"Q003-25",icon:"🏗️",stage:"grammar",q:"What is the fundamental sequencing rule for DC topology retrofit?",options:["Upgrade distribution before generation","Upgrade generation before distribution","Start with the most expensive component and work down to lower-cost items","Start with cooling, then power"],correct:0,explain:"Distribution before generation. Split MSB (€80K) BEFORE installing new UPS (€1.2M). Distribution must be ready to receive new equipment."},
  {level:9,id:"Q003-26",icon:"🏗️",stage:"logic",q:"How does Mark solve the 25-minute MSB bus-section installation when UPS battery only provides 10 minutes?",options:["Accept 15 minutes of downtime and restore IT load from the second UPS path once the bus-section work is complete.","Use a mobile generator for unlimited runtime during work","Rush the installation to complete within the 10-minute UPS battery window and rely on fast working practices.","Install during a planned IT shutdown and schedule the work for the lowest-traffic period to minimise commercial impact."],correct:1,explain:"Mobile generator (€3K–€5K rental) provides unlimited runtime. UPS transfers to battery, then to generator, work proceeds with no time pressure."},
  {level:9,id:"Q003-27",icon:"🏗️",stage:"rhetoric",q:"What is the total estimated cost for Clonshaugh Tier I → Tier III retrofit over 18 months?",options:["€500K–€700K","€1.2M–€1.8M","€2.5M–€4.3M","€8M–€12M"],correct:2,explain:"Phase 1: €175K–€310K. Phase 2: €450K–€750K. Phase 3: €1.3M–€2.2M. Phase 4: €100K–€200K. Plus temp equipment, fees, contingency = €2.5M–€4.3M (SCSI M&E benchmarks; RICS NRM1; indicative, T2)."}

const GLOSSARY_003 = [
{term:"Availability (A)",def:"Probability that a system is operational at any given time. A = MTBF / (MTBF + MTTR). Expressed as a percentage (e.g. 99.99%)."},
{term:"MTBF",def:"Mean Time Between Failures — average operating time between failures of a repairable system. Measured in hours. Higher = more reliable."},
{term:"MTTR",def:"Mean Time To Repair — average time to restore a failed component to service. Measured in hours. Lower = faster recovery."},
{term:"Demand Availability",def:"Probability that a component operates successfully when called to act (e.g. generator start, ATS transfer). Distinct from steady-state availability."},
{term:"Series Reliability",def:"System where all components must work for the system to function. Total availability is the product of individual availabilities: A_sys = A1 × A2 × ... × An."},
{term:"Parallel Reliability",def:"System where only one of multiple components must work. A_sys = 1 - (1-A1)(1-A2)...(1-An). Basis of all redundancy topologies."},
{term:"N+1 Redundancy",def:"N components required for full capacity, plus 1 spare. Minimum topology for concurrent maintenance. Fails if 2+ components fail simultaneously."},
{term:"2N Redundancy",def:"Two complete independent paths, each capable of carrying 100% load. Failure of an entire path does not affect IT load. Requires dual-corded equipment."},
{term:"2N+1 Redundancy",def:"Two independent paths plus one additional spare module per path. Allows concurrent maintenance on both paths simultaneously."},
{term:"N+0 (No Redundancy)",def:"Exactly the minimum capacity required. No spare. Any single failure causes capacity loss. Common in legacy facilities where load has outgrown original topology."},
{term:"Concurrent Maintainability",def:"Ability to perform planned maintenance on any single component without reducing IT capacity below N. Requires N+1 minimum per maintenance domain."},
{term:"Fault Tolerance",def:"Ability to survive any single unplanned failure automatically, without human intervention, within the IT equipment hold-up time (typically 10-20ms)."},
{term:"Single Point of Failure (SPOF)",def:"Any component whose failure alone causes system failure. SPOFs set the ceiling on system availability regardless of redundancy elsewhere."},
{term:"Common-Mode Failure",def:"Single event affecting multiple redundant paths simultaneously. Examples: shared utility feed, shared cooling water, common BMS controller, shared fire suppression zone."},
{term:"Uptime Tier I",def:"Basic site infrastructure. No redundancy. Expected availability 99.671% (28.8 hrs/yr downtime). Single distribution path."},
{term:"Uptime Tier II",def:"Redundant capacity components (N+1 UPS, generators). Single distribution path. Expected availability 99.741% (22.7 hrs/yr). Not concurrently maintainable on distribution."},
{term:"Uptime Tier III",def:"Concurrently maintainable. Multiple distribution paths (one active). N+1 redundancy. Expected availability 99.982% (1.6 hrs/yr)."},
{term:"Uptime Tier IV",def:"Fault tolerant + concurrently maintainable. 2N distribution. Expected availability 99.995% (0.4 hrs/yr). Automatic response to any single failure."},
{term:"Reliability Block Diagram (RBD)",def:"Graphical model showing series and parallel relationships between components. Used to calculate system availability from individual component data."},
{term:"Static Transfer Switch (STS)",def:"Power electronic device that transfers IT load between two sources within milliseconds. Enables seamless source changeover without IT equipment disruption."},
{term:"Automatic Transfer Switch (ATS)",def:"Electromechanical switch that transfers load between utility and generator (or between utility feeds). Transfer time typically 100-500ms. May be a SPOF."},
{term:"Bypass Isolation",def:"Maintenance configuration allowing a component to be removed from service while load is served through an alternative bypass path."},
{term:"Distribution Path",def:"The route power takes from source (utility/generator) to IT load (server PSU). Includes transformers, switchgear, UPS, PDUs, and all interconnecting cables."},
{term:"Fault Domain",def:"Zone within which a single failure is contained. Good topology design ensures fault domains do not overlap between redundant paths."},
{term:"Block Redundancy",def:"Self-contained redundancy modules where each block includes its own UPS, distribution, and sometimes cooling. Failure in one block cannot cascade to another."},
{term:"Compartmentalisation",def:"Physical separation of redundant paths into different rooms or fire zones, preventing a single physical event from affecting both paths simultaneously."},
{term:"EN 50600-1",def:"European standard for data centre facilities and infrastructures. Part 1 defines availability classes 1-4 aligned approximately with Uptime Tiers I-IV."},
{term:"EN 50600-2-2",def:"European standard for data centre power distribution. Defines design requirements for electrical infrastructure per availability class."},
{term:"EN 50600-3-1",def:"European standard for data centre management and operations. Defines maintenance procedures and operational requirements per availability class."},
{term:"IEEE 493 (Gold Book)",def:"IEEE Recommended Practice for the Design of Reliable Industrial and Commercial Power Systems. Primary source for component MTBF/MTTR data."},
{term:"Uptime Institute",def:"Organisation that created the Tier Classification system. Provides certification through Tier Certification of Design Documents (TCDD) and Tier Certification of Constructed Facility (TCCF)."},
{term:"PUE Impact of Redundancy",def:"Additional redundant components consume power even in standby — UPS efficiency losses, transformer no-load losses, generator block heaters all increase facility PUE."},
{term:"Topology Degradation",def:"Process by which a facility's effective redundancy tier drops below its design tier, typically due to load growth, deferred maintenance, or component ageing."},
{term:"Live Migration",def:"Process of upgrading facility topology while maintaining continuous IT operations. Requires careful sequencing to avoid temporary loss of redundancy."},
{term:"Phased Upgrade",def:"Strategy of incrementally improving topology tier across multiple budget cycles rather than a single large capital programme. Each phase delivers measurable availability improvement."},
{term:"Cost Per Nine",def:"Capital cost to achieve each additional nine of availability (e.g. 99.9% to 99.99%). Increases exponentially — the business case must justify the investment."},
{term:"Gap Analysis",def:"Systematic comparison of current facility topology against target tier requirements. Identifies specific component and distribution deficiencies requiring investment."},
{term:"Maintenance Bypass",def:"Electrical path that allows load to be served through an alternative route during maintenance of the primary path. Essential for Tier III concurrent maintainability."},
{term:"Hold-Up Time",def:"Duration that IT equipment PSU capacitors can sustain operation during a power interruption. Typically 10-20ms. Fault-tolerant systems must transfer within this window."},
{term:"Dual-Corded Equipment",def:"IT equipment with two independent power supplies, each connected to a different distribution path. Required for 2N topology to function as designed."}
];

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}

    return this.props.children;

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].lvl.level),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}


function getCertType(pct) {
  if (pct >= 90) return { type: 'Achievement', maxHours: 4 };
  if (pct >= 80) return { type: 'Completion', maxHours: 3 };
  return null;
}
async function issueCertificate(learnerName, learnerEmail, score, total, selectedHours) {
  if (!supa) { console.warn('Supabase not loaded'); return null; }
  var pct = Math.round(score / total * 100); var cert = getCertType(pct);
  if (!cert) return null;
  var hours = selectedHours || cert.maxHours;
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  var result = await supa.from('certificates').insert([{ user_id: userId, module_id: TOOL_ID, certificate_number: certNumber, cpd_hours: hours, certificate_type: cert.type, score: pct, learner_name: learnerName, pdf_url: null }]).select().single();
  if (result.error) { console.error('Certificate insert failed:', result.error.message); return null; }
  safeStore.set('cert_' + TOOL_ID, JSON.stringify({ certNumber: certNumber, type: cert.type, hours: hours, name: learnerName, score: pct, issued: new Date().toISOString() }));
  return { certNumber: certNumber, type: cert.type, hours: hours, pct: pct };
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)

        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);

  // Visibility change — pause on tab switch

      if(qStartTimes[qi]===undefined) return; // not yet started

/* ═══ DC-LEARN STAGE 5 AUTH + SYNC ═════════════════════════════════════════
   Built: 09/04/2026 — Stage 5 Session 2
   Layer 1 (localStorage) never depends on Layer 2 (Supabase).
   If Supabase is blocked, offline, or errors, the module works exactly as
   it did before: IS_FREE_MODULE or localStorage.dc_learn_paid decides access.
   =========================================================================*/

const IS_FREE_MODULE = (TOOL_ID === 'DC-LEARN-000' || TOOL_ID === 'DC-LEARN-001' || TOOL_ID === 'DC-LEARN-002');
const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};

function useAuth() {
  const [state, setState] = React.useState({
    loading: !!supa,
    user: null,
    isAdmin: false,
    hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
  });

  React.useEffect(() => {
    let mounted = true;

    async function resolve(session) {
      if (!mounted) return;
      try {
        if (session && session.user) {
          const user = session.user;
          if (dcAuth.isAdminUser(user)) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: true, hasAccess: true });
            return;
          }
          const licenceOk = await dcAuth.checkLicence(user.id);
          if (licenceOk === true) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: false, hasAccess: true });
          } else {
            // licenceOk === null (error: fall through) or false (no row)
            setState({
              loading: false, user: user, isAdmin: false,
              hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
            });
          }
          return;
        }
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      } catch(e) {
        console.warn('DC-LEARN: auth resolve failed, falling through', (e && e.message) || e);
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    }

    if (!supa) {
      setState({
        loading: false, user: null, isAdmin: false,
        hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
      });
      return () => { mounted = false; };
    }

    (async () => {
      try {
        const { data: { session } } = await supa.auth.getSession();
        await resolve(session);
      } catch(e) {
        console.warn('DC-LEARN: getSession failed, falling through', (e && e.message) || e);
        if (mounted) setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    })();

    let sub = null;
    try {
      const r = supa.auth.onAuthStateChange((_ev, session) => { resolve(session); });
      sub = r && r.data && r.data.subscription;
    } catch(e) {}

    return () => {
      mounted = false;
      try { if (sub) sub.unsubscribe(); } catch(e) {}
    };
  }, []);

  return state;
}

function PlatformSync({ user, progress }) {
  React.useEffect(() => {
    if (!supa || !user || !user.id) return;
    let cancelled = false;
    (async () => {
      try {
        // 1. Flush timing buffer → learner_analytics, then clear on success
        const raw = safeStore.get(DC_TIMING_KEY);
        if (raw) {
          let events = [];
          try { events = JSON.parse(raw); } catch(e) { events = []; }
          if (!cancelled && Array.isArray(events) && events.length) {
            const rows = events.slice(0, 500).map(function(ev) {
              return {
                user_id: user.id,
                module_id: TOOL_ID,
                event_type: (ev && ev.event) || 'unknown',
                event_data: ev || {},
                recorded_at: new Date((ev && ev.ts) || Date.now()).toISOString(),
              };
            });
            const { error } = await supa.from('learner_analytics').insert(rows);
            if (!error) safeStore.remove(DC_TIMING_KEY);
            else console.warn('DC-LEARN: analytics flush failed', error.message);
          }
        }
        // 2. Upsert progress → learner_progress (keeps localStorage as cache)
        if (!cancelled && progress && typeof progress === 'object') {
          const keys = Object.keys(progress);
          const rows = keys.map(function(levelId) {
            const p = progress[levelId] || {};
            return {
              user_id: user.id,
              module_id: TOOL_ID,
              level_id: String(levelId),
              grammar_complete: !!p.grammar,
              logic_complete: !!p.logic,
              rhetoric_complete: !!p.rhetoric,
              updated_at: new Date().toISOString(),
            };
          });
          if (rows.length) {
            const { error } = await supa.from('learner_progress').upsert(rows, {
              onConflict: 'user_id,module_id,level_id',
            });
            if (error) console.warn('DC-LEARN: progress upsert failed', error.message);
          }
        }
      } catch(e) {
        console.warn('DC-LEARN: PlatformSync error', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [user && user.id, JSON.stringify(progress || {})]);
  return null;
}
