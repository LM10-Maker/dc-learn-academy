{
  id:"L8",level:8,name:"Intrusion Detection & Alarm Systems",icon:"🔔",
  component:"Alarm Systems",available:true,
  clockQuote:"v0.1 — not v1.0. The version number was deliberate. He was sharing what he knew and marking it as draft. He was asking for review, not guarding territory. It was the most professional thing Declan had done in ten years of operations.",
  userNeedStatement:"Understand how intrusion is detected, alarmed, and responded to in a DC environment",
  plainEnglish:"Intrusion detection is the nervous system of DC security. It detects breach attempts and triggers alarms. The response protocol determines whether detection leads to prevention.",
  grammar:{
    facts:[{term:"Intruder alarm system",definition:"An electronic system to detect intruders and trigger alerts. Comprises sensors, control panel, communication link, and monitoring station. Graded 1–4 per EN 50131-1.",plain:"The alarm system that detects when someone breaks in, sends the alert, and triggers the response.",number:"Grade 3: supervision every 100 seconds, dual communication (IP + cellular), anti-tamper, battery ≥60 hours.",standard:"EN 50131-1:2006+A3:2020",feynman:{analogy:"Think of it like the smoke alarm in your house — sensors detect the threat, the alarm sounds, and the fire brigade is called. An intruder alarm does the same: sensors detect intrusion, the panel alerts the monitoring centre, and the guards or Gardai are dispatched.",firstPrinciples:"Security has three steps: detect, alert, respond. Sensors detect the intrusion. The control panel processes the signals and determines if it is real. The communication link sends the alert to the monitoring centre. The centre verifies and dispatches a response. Without all three steps, detection alone achieves nothing.",theTest:"You understand intruder alarms when you can answer: A facility has sensors and a panel but no ARC monitoring — what happens at 3am? Answer: The local sounder activates, but nobody is notified. The intruder hears the alarm and has unlimited time because no response is dispatched."},soWhat:"The intruder alarm system is the detection backbone for after-hours security — when staff leave, the alarm system becomes the primary detection mechanism."},{term:"PIR detector (passive infrared)",definition:"A sensor that detects movement by measuring changes in infrared radiation. Dual-technology PIR+microwave reduces false alarms in DC environments.",plain:"A motion sensor that detects body heat. In a data centre, you need the dual-technology type because constant airflow triggers basic PIR.",number:"PIR range: up to 15m. Dual-tech false alarm rate: <1 per month per detector.",standard:"EN 50131-2-2; EN 50131-2-4",feynman:{analogy:"Think of it like feeling the warmth of someone walking past you in a dark room — you cannot see them, but you sense the change in temperature. A PIR sensor does exactly this: it detects the infrared heat of a person moving through its field of view.",firstPrinciples:"Every warm body emits infrared radiation. A PIR sensor divides its view into zones. When a warm body moves from one zone to the next, the sensor detects the temperature change and triggers. In a data centre, cooling airflow also creates temperature changes — which is why dual-technology sensors (PIR + microwave) are needed.",theTest:"You understand PIR detectors when you can answer: A data hall with CRAH units has single-technology PIR sensors generating 5 false alarms per day — what is the fix? Answer: Replace with dual-technology (PIR + microwave). Air triggers PIR but not microwave. Both must trigger simultaneously, eliminating HVAC false alarms."},soWhat:"PIR detectors are the workhorse of internal intrusion detection — inexpensive, reliable, and effective in the controlled environments found inside data centres."},{term:"Alarm Receiving Centre (ARC)",definition:"A professionally staffed monitoring station that receives alarm signals, verifies, and initiates response.",plain:"The 24/7 monitoring centre that watches your alarms and dispatches guards or Gardaí if needed.",number:"EN 50518 response: acknowledgement within 60 seconds, verification within 180 seconds, guard dispatch within 15 minutes. Cost: €30–€80/month (Tier 3 — Irish ARC market rates, indicative).",standard:"EN 50518:2019; PSA (Ireland)",feynman:{analogy:"Think of it like a 999 call centre for your building — it is staffed 24/7, receives your alarm signal within seconds, checks the cameras to verify, and dispatches guards or Gardai. Without it, your alarm is just a noisy box on the wall.",firstPrinciples:"An alarm that only sounds locally depends on someone nearby hearing it and responding. An ARC is a professionally staffed monitoring centre that receives alarm signals electronically. EN 50518 certification requires: acknowledge within 60 seconds, verify within 180 seconds, dispatch within 15 minutes.",theTest:"You understand ARCs when you can answer: A data centre pays 50 euro per month for ARC monitoring and is insured for 50 million euro — is the cost justified? Answer: 600 euro per year to protect a 50 million euro asset. The insurance premium reduction alone typically exceeds the ARC cost many times over."},soWhat:"The ARC is where the alarm becomes a response — without a monitored ARC, an alarm is just a noise that no one investigates."},{term:"EN 50131 Alarm Grading",definition:"European standard classifying intruder alarm systems into four grades based on the sophistication of the intruder they are designed to detect: Grade 1 (low risk) through Grade 4 (high risk).",plain:"A grading system for alarm installations — Grade 1 is basic home security, Grade 4 resists a professional with specialist tools and alarm knowledge.",number:"Grade 3 minimum for data centres. Requires dual communication paths, battery backup of 12 hours minimum, tamper protection on all devices, and response time under 180 seconds.",standard:"EN 50131-1:2006+A3:2020; I.S. EN 50131-1",feynman:{analogy:"Think of it like the Michelin star system for restaurants — one star is good, three stars is world-class. EN 50131 grades alarm systems from 1 to 4, and a data centre needs Grade 3 minimum because the threat is from skilled, motivated intruders.",firstPrinciples:"A Grade 1 alarm assumes an opportunistic intruder. A Grade 4 assumes a knowledgeable intruder with specialist defeat tools. The grade determines the resilience of every component: sensors, cabling, communication, control panel, and monitoring.",theTest:"You understand alarm grading when you can answer: A data centre has a Grade 2 intruder alarm — is this adequate? Answer: No. Grade 2 assumes limited tools and knowledge. Data centres face targeted threats requiring Grade 3 minimum."},soWhat:"The alarm grade determines whether the system is evidence-grade — Grade 1 might satisfy a domestic insurer but Grade 3 is the minimum for critical infrastructure."},{term:"Dual-path alarm communication",definition:"Two independent communication channels between the alarm panel and the ARC, typically IP primary and cellular backup, each supervised with heartbeat monitoring.",plain:"Two separate links carrying the alarm signal to the monitoring station. If someone cuts one, the other still works.",number:"Heartbeat supervision interval: 90 seconds maximum. Path failure notification to ARC: 180 seconds maximum. Grade 3 requires both paths operational 24/7.",standard:"EN 50136-1:2012; EN 50518:2019",feynman:{analogy:"Think of it like having two phone lines to call emergency services — if one is cut, you still have the other. Dual-path communication ensures cutting a cable does not silence the alarm.",firstPrinciples:"A single communication path is a single point of failure. An intruder who cuts the phone line silences the alarm. Dual-path uses two different technologies (IP and cellular) so defeating one does not defeat the other. Heartbeat monitoring checks both paths every 90 seconds.",theTest:"You understand dual-path communication when you can answer: A data centre alarm uses IP-only communication. During a network outage, the alarm triggers — what happens? Answer: Nothing reaches the ARC. The alarm sounds locally but nobody responds."},soWhat:"Dual-path communication eliminates the single point of failure in alarm reporting — cutting a phone line no longer silences the alarm."}],
    whatItLooksLike:"An intruder alarm shows PIR sensors at ceiling level, magnetic contacts on doors, glass break detectors, a keypad at entry, and a panel in the comms room.",
    siteChecklist:["Is the alarm graded to EN 50131-1 Grade 3?","Are dual-tech detectors used in areas with HVAC airflow?","Is the system monitored by an EN 50518-certified ARC?","Are there dual communication paths?","Is the system integrated with access control?"]
  },
  logic:{
    causeAndEffect:[{cause:"Standard single-technology PIR motion detectors are installed in a data hall with high-volume CRAH unit airflow.",effect:"Air turbulence triggers 5–10 false alarms per day. Security staff learn to ignore data hall alarms.",insight:"Dual-technology detectors are essential in DC environments. Cost premium over single PIR: €30–€50 per detector (Tier 3 — Honeywell, Gallagher published ranges)."},{cause:"The intruder alarm system uses a single PSTN telephone line as the sole communication path to the Alarm Receiving Centre.",effect:"Cutting the line silences the alarm. The ARC receives no signal. A single communication path is a single point of failure.",insight:"EN 50131-1 Grade 3 requires dual paths (IP + cellular). Both supervised — failure generates fault alarm within 100 seconds."},{cause:"The intruder alarm system installed during 2013 commissioning has not received a firmware or software update since installation.",effect:"Known firmware vulnerabilities can be exploited to disable the system remotely. The system may fail to communicate with modern ARC protocols.",insight:"Alarm firmware is a cybersecurity surface. NIS2 requires risk management of all network-connected devices. An unpatched alarm panel is as much a cyber risk as an unpatched server."}],
    constraintLesson:"Alarm systems in DCs must support zone-based arming — perimeter 24/7, corridors outside hours, data halls when unoccupied. Integration with access control enables auto arm/disarm by zone occupancy.",
    weakestLink:{whatsWrong:"Believing that having an alarm system is the same as having monitored security.",whatsRight:"An alarm that rings locally with no ARC monitoring is a noise-maker, not a security system. Monitored alarm + response protocol is the security system.",howToGetThere:"Contract an EN 50518-certified ARC (€40–€80/month, Tier 3 — Irish ARC market rates, indicative). Define a response protocol. Test the chain quarterly."}
  },
  rhetoric:{declan:{hook:"We have an alarm on the building that was installed when we moved in. I am not entirely sure it is still connected to a monitoring station — nobody has verified it recently.",text:"We’ve got an alarm on the building — installed when we moved in. I’m not sure anyone has tested it in three years. The panel shows ‘faults’ nobody’s resolved. We tested the dual-path communication last quarter by deliberately disconnecting the IP link. The cellular backup kicked in within 90 seconds and the ARC confirmed receipt. That test cost us nothing and proved the system works."},ann:{hook:"A non-functional alarm creates false confidence. It is worse than no alarm because it appears in the security schedule but fails on activation — and insurance cover conditions require a monitored system.",text:"A non-functional alarm is worse than no alarm — it creates false confidence. The annual service contract is €2,000–€4,000 (Tier 3 — Gallagher, Honeywell published ranges, indicative). The cost of an undetected intrusion is orders of magnitude higher. ARC monitoring at €30–€80 per month (Tier 3 — Irish ARC market rates) is trivial compared to the alternative. An unmonitored alarm is just a noisy box — nobody responds. The ARC is the response trigger. Without it, the alarm system has no purpose."},mark:{hook:"Grade 3 requires tamper protection on all devices, dual communication path, 60-hour standby battery, and anti-masking detectors. Each of those is a verifiable technical requirement in EN 50131.",text:"Grade 3 requires tamper protection on all devices, dual communication, 60-hour battery, and circuit supervision every 100 seconds. The panel must be in a secure room, not reception. EN 50131 Grade 3 requires that all detection devices have individual tamper protection. If someone opens a detector casing, the tamper switch triggers an immediate alert. This prevents an intruder from disabling sensors before the main attack."},sarah:{hook:"Insurance policies increasingly require evidence of a monitored alarm system to EN 50131 Grade 3 as a condition of DC cover. Missing the standard means the policy may not respond on a claim.",text:"Insurance policies increasingly require evidence of a monitored alarm to EN 50131-1 Grade 3. An unmonitored system may void specific policy exclusions. Under NIS2, a physical security incident at a data centre classified as essential infrastructure requires notification to the NCSC within 24 hours. The intruder alarm system is the first detection layer that triggers this reporting obligation."},tom:{hook:"Alarm upgrade: Grade 3 panel plus 40 detectors plus 20 magnetic contacts plus 8 glass break sensors plus dual-path monitoring. Total 35 to 55 thousand euros — a condition of some insurance policies.",text:"Alarm upgrade: Grade 3 panel + 40 detectors + 20 magnetic contacts + 8 glass break + dual-path communicator + installation: €25k–€35k. Annual monitoring: €600. Annual maintenance: €2,000. Tier 3 — manufacturer published ranges (Texecom, Honeywell), PSA market rates, indicative."}},
  rhetoricTakeaways:{declan:"Alarm fatigue is the real threat — if the team ignores alarms because 90% are false, the one real alarm gets the same treatment. Grade 3 reduces false alarms to actionable levels.",ann:"An unmonitored alarm system is an uninsured alarm system — dual-path ARC monitoring is an insurance condition for most DC policies in Ireland.",mark:"EN 50131 Grade 3 with dual-path signalling is the minimum for critical infrastructure — Grade 1 and 2 do not meet the response time or reliability requirements.",sarah:"NIS2 requires incident detection capability. An EN 50131 Grade 3 alarm system with dual-path ARC monitoring satisfies the physical detection component.",tom:"Intruder alarm upgrade (Grade 3, dual-path ARC, 40 zones): €35,000–€55,000 (Tier 3 — Gallagher, Honeywell, SCSI 2025, indicative). Annual ARC monitoring: €3,000–€5,000. Quarterly testing: €2,000–€4,000 per year."},
  scenario:{title:"Clonshaugh Alarm System Upgrade",narrative:"Grade 2 panel from 2013 with single-tech PIR sensors. 3–5 false alarms per week from data hall HVAC. Single telephone line to ARC.",question:"Specify a Grade 3 replacement that eliminates false alarms.",answer:"SITUATION: Clonshaugh has a Grade 2 intruder alarm panel from 2013 with single-technology PIR sensors. The system generates 3–5 false alarms per week from data hall HVAC airflow triggering PIR detectors. The monitoring station has started ignoring alarms from the site — a critical security failure. The panel communicates via a single telephone line with no redundancy.\n\nCHALLENGE: Specify a Grade 3 replacement that eliminates HVAC-induced false alarms, provides dual-path communication, and restores monitoring station confidence.\n\nSHOW THE FIX: Replace with a Grade 3 panel (EN 50131-1 compliant) with 8 configurable zones, dual-path communication (IP primary + GSM backup), and 20 × dual-technology detectors (PIR + microwave). Dual-tech detectors require BOTH technologies to trigger simultaneously — HVAC airflow triggers PIR but not microwave, eliminating the false alarm source. Add 10 × magnetic contacts on critical doors (server halls, comms rooms, plant rooms) for tamper detection.\n\nCost: Grade 3 panel €4,500, dual-tech detectors (20 × €180) €3,600, magnetic contacts (10 × €85) €850, dual-path communicator €1,200, installation and commissioning €6,000, annual monitoring contract €2,400/year. Total capital: approximately €16,150, annual opex €2,400 (Tier 3 — alarm integrator estimates).\n\nThe upgrade reduces false alarms from 3–5/week to near zero, restoring monitoring station response confidence and meeting EN 50131-1 Grade 3 requirements for the facility classification.\n\nSources: EN 50131-1:2006+A3:2020 Grade 3 requirements (T1); IS 199 intruder alarm standard (T1).",
whoShouldCare:["mark","tom","declan"]},
  sourceNote:"EN 50131-1:2006+A3:2020. EN 50518:2019. PSA (Ireland). Cost benchmarks: Tier 3 — manufacturer published ranges (Texecom, Honeywell, Gallagher), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-008",level:"L1",topic:"Fire detection — alarm systems must not conflict"},{module:"DC-LEARN-009",level:"L7",topic:"BMS/DCIM — alarm event integration"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'Grade 3 + dual-path + ARC',available:'Grade 2 (single path, false alarms)',unit:'Intruder alarm grade',pass:false,detail:'Grade 2 panel with single-tech PIR. 3-5 false alarms/week. Single telephone line to ARC.'};}

{
  id:"L9",level:9,name:"Security Retrofit Strategy & Compliance",icon:"📋",
  component:"Security Programme",available:true,
  clockQuote:"The zone map at Clonshaugh took four people three hours. At Tallaght — twelve hundred racks, three times the floor area, four times the systems — the same exercise would take weeks. The methodology had to scale. That was the test Clonshaugh was preparing them for.",
  userNeedStatement:"Bring together all security layers into a phased retrofit programme with costs and compliance mapping",
  plainEnglish:"Security retrofit is a programme, not a project. Phase 1 is perimeter and vehicle access. Phase 2 is building entry and data hall. Phase 3 is CCTV and alarm. Phase 4 is rack security and integration.",
  grammar:{
    facts:[{term:"Security management plan",definition:"A documented plan covering security strategy, risk assessment, physical measures, operational procedures, incident response, and review cycle.",plain:"The master document that says: here’s what we protect, here are the threats, here’s what we’ve installed, and here’s what we do when something goes wrong.",number:"Typical: 40–60 pages for Class 3. Annual review cost: €3,000–€5,000 (Tier 3 — RICS NRM1 fee benchmarks, indicative).",standard:"EN 50600-2-5:2021 Section 4; ISO 27001:2022 Clause 8",feynman:{analogy:"Think of it like a business plan for security — it states what you are protecting, what the threats are, what you have installed, how you operate it, and what you do when something goes wrong. Without it, you have equipment but not a system.",firstPrinciples:"Security equipment without documented procedures is hardware, not security. A management plan connects every piece of equipment to a purpose, every alarm to a response, and every response to a person. It is reviewed annually because threats change, equipment ages, and staff turn over.",theTest:"You understand security management plans when you can answer: A facility has 1 million euro of security equipment but no management plan — will it pass EN 50600-2-5 Class 3? Answer: No. Section 4 requires a documented plan as a precondition. The assessor will not test equipment until the plan is reviewed."},soWhat:"Without a plan, you have equipment but not a system — the management plan connects every alarm to a response and every response to a person."},{term:"Security risk assessment",definition:"A structured evaluation of threats, vulnerabilities, likelihood, and impact for a DC facility.",plain:"A formal review that asks: what could go wrong, how likely is it, how bad would it be, and what should we fix first?",number:"Risk scoring: likelihood (1–5) × impact (1–5) = risk score (1–25). Scores >15 require mitigation. Review: annually + after incidents.",standard:"EN 50600-2-5:2021 Section 4.2; ISO 27001:2022 Clause 6.1",feynman:{analogy:"Think of it like a doctor's check-up — the doctor examines you, identifies what could go wrong, how likely it is, how serious it would be, and recommends treatment. A security risk assessment does the same for your building.",firstPrinciples:"You cannot protect against everything equally. A risk assessment ranks threats by likelihood times impact. A flood in Dublin (likely, high impact) scores higher than an earthquake (unlikely). The assessment tells you where to spend first. Scores above 15 out of 25 require mitigation.",theTest:"You understand risk assessment when you can answer: Two threats score identically at 12 — insider theft (likelihood 4 x impact 3) and protest blockade (likelihood 3 x impact 4) — which do you mitigate first? Answer: Both score 12, but insider theft has higher likelihood and is harder to detect. Prioritise based on detection difficulty when scores are equal."},soWhat:"The risk assessment tells you where to spend first — a €1.28 million security budget (Tier 4 — aggregate estimate, indicative) without prioritisation wastes money on low-risk items while high-risk gaps remain open."},{term:"Physical security testing",definition:"Periodic testing of all physical security systems to verify they function as designed.",plain:"Testing everything works — trying to get in where you shouldn’t, checking cameras see what they should, making sure the response team actually responds.",number:"Quarterly for critical systems. Annual red team: €8,000–€15,000 (Tier 3 — SCSI 2025, indicative).",standard:"EN 50600-2-5:2021 Section 6",feynman:{analogy:"Think of it like an MOT for your car — everything looked fine last year, but brakes wear, tyres degrade, and lights blow. Security systems drift the same way: cameras move, sensors get blocked, batteries die, and access lists go stale. Quarterly testing catches the drift.",firstPrinciples:"Commissioning proves the system works on day one. Testing proves it still works on day 365. Cameras drift out of alignment. PIR sensors get blocked by moved equipment. Access databases accumulate departed staff. Battery backups degrade. A quarterly test walks through every component and fixes what has drifted.",theTest:"You understand security testing when you can answer: A facility was Class 3 compliant 18 months ago — is it still Class 3 today without any testing? Answer: Almost certainly not. Without testing, camera alignment, sensor coverage, access lists, and battery backups will have degraded. Compliance is maintained, not achieved once."},soWhat:"Commissioning proves the system works on day one — testing proves it still works on day 365, catching the drift that degrades every security installation."},{term:"Security audit frequency",definition:"The schedule of formal security assessments required to maintain compliance with EN 50600-2-5, NIS2, and ISO 27001.",plain:"How often you need to formally check that your security systems actually work — not just that they are powered on.",number:"Quarterly walk-through inspections. Annual penetration test (physical). Biannual EN 50600-2-5 gap analysis. ISO 27001 surveillance audit annually, recertification every 3 years.",standard:"EN 50600-2-5:2021 Section 8; ISO 27001:2022 Clause 9.2; NIS2 Article 21",feynman:{analogy:"Think of it like an NCT for your car — you might think everything is fine, but without regular testing you do not know if the brakes are worn. Security audits test whether systems still perform as designed.",firstPrinciples:"Security systems degrade over time. Cameras develop blind spots from new construction. Access cards accumulate as staff leave without returns. Software vulnerabilities appear in firmware. Without regular testing, the security posture you built 12 months ago may not exist today.",theTest:"You understand security audit frequency when you can answer: A facility passed EN 50600-2-5 Class 3 eighteen months ago but has not been re-tested — is it still Class 3? Answer: Possibly not. Degradation in any of the 23 requirements may have occurred undetected."},soWhat:"Security systems degrade continuously — cameras drift, access lists accumulate stale entries, and batteries age, making regular auditing a maintenance function, not an overhead."},{term:"Security Operations Centre (SOC) integration",definition:"Centralised monitoring capability that unifies physical security (CCTV, ACS, IDS) with cybersecurity (SIEM, network IDS, firewalls) into a single operational view.",plain:"One control room that sees both the physical alarms and the cyber alarms at the same time — so linked events are correlated immediately.",number:"Typical SOC staffing: 2 operators per shift for a 400-rack facility. Integration reduces MTTR by 40–60%. Cost: €200,000–€400,000 for a converged SOC build-out (Tier 3 — SCSI 2025, indicative).",standard:"ISO 27001:2022 Annex A.5.24; NIST SP 800-61r2",feynman:{analogy:"Think of it like air traffic control — instead of one person watching the radar and another watching the runway cameras, both feeds are on the same screen. A converged SOC combines physical and cyber feeds for the full picture.",firstPrinciples:"Physical and cyber security have traditionally been separate departments with separate tools. But an attack combining physical access with a cyber exploit requires both systems to correlate the events. A converged SOC enables this correlation in real time.",theTest:"You understand SOC integration when you can answer: A badge is used at the data hall at 02:00 and simultaneously a large data transfer is detected from a server in that hall — what does a converged SOC do? Answer: It correlates both events, flags the combination as anomalous, and triggers immediate investigation."},soWhat:"A converged SOC correlates physical and cyber events in real time — the badge swipe at 02:00 plus the data exfiltration at 02:05 becomes one investigation, not two."}],
    whatItLooksLike:"A mature security programme has a risk register, a zoning plan on display, a testing calendar, annual red team reports, an incident response playbook, and a real-time status dashboard.",
    siteChecklist:["Is there a documented security management plan (reviewed within 12 months)?","Has a formal risk assessment been conducted?","Is there a quarterly testing schedule?","Has a red team test been conducted in the last 12 months?","Are all systems under maintenance contracts?"]
  },
  logic:{
    causeAndEffect:[{cause:"A facility installs certified perimeter, access control, and CCTV equipment but has no documented security procedures or staff training.",effect:"The equipment works but staff don’t know how to use it. A mantrap alarm triggers and nobody knows the escalation procedure.",insight:"Technology is 40% of security; procedures and people are 60%. A €500k installation with no procedures is less secure than €200k with well-documented, tested procedures (Tier 4 — industry consensus, indicative)."},{cause:"Security systems are installed and never tested — commissioning was assumed sufficient.",effect:"Over 12–24 months: cameras drift, PIR sensors are blocked, access databases accumulate stale credentials, batteries degrade.",insight:"Quarterly testing catches degradation before it becomes a vulnerability. Cost: 4 days/year and €8,000–€16,000/year (Tier 3 — SCSI 2025, indicative)."},{cause:"A facility attempts a security retrofit without a master plan — installing individual components over 18 months.",effect:"Components do not integrate. CCTV covers different zones than access control. IDS is not connected to the ARC. The result is security products, not a security system.",insight:"The master plan costs €5,000–€10,000 (Tier 3 — RICS NRM1 fee benchmarks, indicative) and saves 20–30% on implementation by avoiding rework, duplicate cabling, and integration failures."}],
    constraintLesson:"The security retrofit programme must manage three constraints simultaneously: cost (spread capex over 12–18 months), disruption (minimise impact on live IT), and compliance (deliver the highest-priority gap first).\\n\\nPhase 1 (Months 1–3): Perimeter + vehicle. Minimal disruption.\\nPhase 2 (Months 3–6): Building entry + data hall access.\\nPhase 3 (Months 6–9): CCTV + intrusion detection.\\nPhase 4 (Months 9–12): Rack security + integration + testing.\\n\\nTotal: 12 months. Budget: €800k–€1.2M for 400-rack legacy facility (Tier 4 — aggregate estimate, indicative).",
    weakestLink:{whatsWrong:"Believing that achieving EN 50600-2-5 Class 3 certification is a one-time project.",whatsRight:"Compliance requires ongoing operation — quarterly testing, annual reviews, continuous monitoring. A facility can drift from Class 3 to Class 2 within 12 months if maintenance lapses.",howToGetThere:"Include a 5-year operational budget alongside capex. Annual opex: €25,000–€40,000/year (Tier 3 — SCSI 2025, indicative)."}
  },
  rhetoric:{declan:{hook:"I have run this facility for 10 years without a security incident. That does not mean the current measures are adequate — it means we have been fortunate so far.",text:"I’ve been running this facility for 10 years and we’ve never had a security incident. But the insurance assessor, the tenant, and the CEO are all now asking for EN 50600 Class 3. Three security audits in. The first was painful — we failed on 7 of 23 EN 50600 requirements. By the third, we were passing clean. Regular testing works because it forces fixes."},ann:{hook:"The total programme is 800 thousand to 1.2 million euros over 12 months. That is the cost of one month's SLA revenue for a medium colocation facility. The risk the programme mitigates is not comparable.",text:"The total programme is €800k–€1.2M over 12 months (Tier 4 — aggregate estimate, indicative). Against a €30M+ facility generating €3M/year in lease revenue, this is a 3–4% asset improvement. The alternative — losing the tenant — costs €1.8M/year. A converged SOC is a premium selling point for colocation. Financial services tenants now ask to tour the SOC during due diligence."},mark:{hook:"The integration architecture is the most important design decision. Access control, CCTV, alarm, and DCIM must share a single PSIM platform — not operate as four separate unconnected systems.",text:"The integration architecture is the most important design decision. Access control, CCTV, intruder alarm, and PIDS must feed into a single SIEM platform or DCIM security module."},sarah:{hook:"The compliance framework is layered: EN 50600-2-5 for engineering, ISO 27001 for management, GDPR for data handling, and CER Directive for critical entity resilience. All four must be addressed.",text:"The compliance framework is layered: EN 50600-2-5 (engineering), ISO 27001 (management), GDPR (data protection), PSA (manned guarding), and tenant requirements. A compliance matrix avoids duplication. NIS2 requires management board accountability for cybersecurity. In a converged SOC, the quarterly board report covers both physical and cyber incidents."},tom:{hook:"Full programme: Phase 1 perimeter and entry 243 thousand euros, Phase 2 data hall access 209 thousand euros, Phase 3 rack security 162 thousand euros, Phase 4 monitoring and integration 162 thousand euros.",text:"Full programme for Clonshaugh: Phase 1 €243k, Phase 2 €209k, Phase 3 €162k, Phase 4 €656k. Total capex: ~€1.29M. Annual opex: ~€35k. 5-year TCO: ~€1.45M. Tier 3 — manufacturer published ranges (Gallagher, Axis, Genetec), SCSI 2025, indicative. A converged SOC build-out runs €200,000–€400,000 capex plus €150,000–€200,000/year staffing. For a 400-rack facility charging €1,500/rack/month, SOC cost is 3–5% of revenue."}},
  rhetoricTakeaways:{declan:"The retrofit programme proved that phasing works — we achieved Class 3 in 12 months without a single hour of downtime, because every phase was planned around the operational calendar.",ann:"The total security retrofit costs €1.29 million spread over 12 months (Tier 4 — aggregate estimate, indicative) — the ROI comes from reduced insurance premiums, tenant retention, and regulatory compliance.",mark:"The 4-phase programme sequences dependencies correctly — perimeter before building entry, building entry before data hall, data hall before rack-level. Each phase enables the next.",sarah:"Annual security review is not optional under NIS2 — the management plan, risk assessment, and testing schedule must be current, documented, and evidence-ready at all times.",tom:"Total programme: ~€1.29 million (T4 estimate, indicative). Quarterly testing: €8,000–€16,000 per year ongoing (Tier 3 — SCSI 2025). Annual red team: €8,000–€15,000 (Tier 3 — SCSI 2025). These are operational costs, not one-offs."},
  scenario:{title:"Clonshaugh Security Retrofit Programme",narrative:"Fund manager has approved a security retrofit to achieve EN 50600-2-5 Class 3 within 12 months. Budget authority: up to €1.5M. Financial services tenant lease (€1.8M/year) conditional on Class 3.",question:"Produce a phased programme with costs and milestones.",answer:"SITUATION: The fund manager has approved a comprehensive security retrofit to achieve EN 50600-2-5 Class 3 across the entire Clonshaugh facility within 12 months. Budget authority: up to €1.2M. The facility must remain fully operational throughout — no data hall shutdowns permitted.\n\nCHALLENGE: Produce a phased programme with costs, milestones, and a sequence that maintains continuous operation while progressively upgrading from the current non-compliant baseline to full Class 3.\n\nSHOW THE FIX: The programme is structured in four phases, sequenced outside-in to avoid disrupting data hall operations until perimeter and building security are established.\n\nPhase 1 — Perimeter and Vehicle (Months 1–3): PIDS fence detection, HVM barriers, ANPR vehicle access. Cost: €243,000. Milestone: perimeter alarm operational.\n\nPhase 2 — Building Entry and Alarm (Months 3–6): Mantrap installation, speed gates, biometric readers, Grade 3 alarm panel replacement. Cost: €185,000. Milestone: two-factor building entry operational.\n\nPhase 3 — Data Hall Access and CCTV (Months 5–9): Hall A Class 4 access, Hall B Class 3 access, IP CCTV migration with analytics. Cost: €199,000. Milestone: differentiated hall access and 90-day CCTV retention live.\n\nPhase 4 — Rack Security and Integration (Months 7–12): Electronic rack locks (400 racks), unified security management platform, acceptance testing. Cost: €580,000. Milestone: full Class 3 certification audit.\n\nTotal programme: €1,207,000 across 12 months. The outside-in sequencing means each phase delivers independently certifiable improvements. If budget is constrained, Phases 1–3 (€627,000) achieve Class 3 at the building level without rack-level electronic locks — Phase 4 can be deferred to year 2.\n\nSources: EN 50600-2-5:2021 (T1); CPNI Physical Security Guide (T2); costs Tier 3 — security integrator estimates, indicative.",
whoShouldCare:["ann","mark","tom"]},

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q011-01",icon:"🛡️",stage:"grammar",q:"How many protection classes does EN 50600-2-5 define?",options:["2","3","4","5"],correct:2,explain:"EN 50600-2-5 defines 4 protection classes (1–4), each adding layers: Class 1 is basic access control, Class 4 is military-grade. Most Irish colocation facilities target Class 3 — driven by financial services tenant requirements and insurance underwriting conditions."},
  {level:1,id:"Q011-02",icon:"🛡️",stage:"logic",q:"Why is upgrading just the card readers insufficient to move from Class 1 to Class 3?",options:["Card readers are a Class 3 requirement only where the facility processes financial data — an MEP-only DC is exempt from the biometric credential requirement.","Class 3 requires zoning, physical barriers, CCTV, IDS, AND access control as a system","Class 3 only applies to new-build facilities — existing DCs can self-certify against Class 1 and then upgrade incrementally to Class 3 over five years.","Card readers with Class 3 firmware cannot be installed retroactively in Class 1 infrastructure without a full access control system replacement."],correct:1,explain:"Protection class is a system-level assessment — upgrading one component without the others fails the standard. Class 3 requires perimeter detection, CCTV, mantraps, biometrics, IDS, and monitoring all working as an integrated system. Mark should verify every layer."},
  {level:1,id:"Q011-03",icon:"🛡️",stage:"rhetoric",q:"Which stakeholder is most likely to drive the EN 50600-2-5 Class 3 requirement?",options:["The financial services tenant via lease terms","The facility cleaning contractor who requires unescorted after-hours access to all areas of the data hall.","The local authority planning department as a condition of the planning permission for the facility expansion.","The SEAI energy assessor who includes security classification in the mandatory energy audit report."],correct:0,explain:"Financial services tenants typically mandate EN 50600 Class 3 as a lease condition — no Class 3, no occupancy. For Ann, this makes security investment a revenue prerequisite, not a discretionary spend. Losing a financial tenant over security gaps is a direct income risk."},
  {level:2,id:"Q011-04",icon:"🏗️",stage:"grammar",q:"What is the minimum clear zone width required either side of a perimeter fence for EN 50600-2-5 Class 3?",options:["3 metres","2 metres","1 metre","5 metres"],correct:0,explain:"EN 50600-2-5 Class 3 requires minimum 3m clear zone on each side of the perimeter fence (6m total). This prevents concealment and ensures PIDS sensors operate without vegetation interference. On constrained Dublin sites, the 6m total can consume significant site area."},
  {level:2,id:"Q011-05",icon:"🏗️",stage:"logic",q:"What happens when vegetation grows against a perimeter fence with PIDS?",options:["The PIDS becomes more accurate because vegetation reduces wind-driven debris that causes false positives on uncovered fence sections.","PIDS is completely unaffected by vegetation because modern fibre-optic PIDS filters environmental interference at the signal processing level.","Vegetation physically strengthens the fence line and reduces the probability of cut-through breach attempts in that section.","False alarms increase, leading to alarm fatigue and effectively disabling the system"],correct:3,explain:"Wind-blown vegetation triggers PIDS constantly, creating alarm fatigue. Operations staff begin ignoring alerts — and detection is effectively disabled. The 3m clear zone (EN 50600-2-5 Class 3) exists precisely to prevent this. Declan must enforce vegetation maintenance schedules."},
  {level:2,id:"Q011-06",icon:"🏗️",stage:"rhetoric",q:"What is the typical insurance premium benefit of installing certified perimeter detection?",options:["No insurance benefit — insurers do not differentiate between facilities with and without perimeter detection systems.","1–2% of the DC policy","5–8% of the DC policy","25% of the DC policy"],correct:2,explain:"Documented perimeter detection typically reduces DC insurance premiums by 5–8% (Tier 3 — Irish insurance market, indicative). For a facility with €200k–300k annual premiums, that is €10k–24k/yr saved. Ann should request the insurer’s specific credit schedule before procurement."},
  {level:3,id:"Q011-07",icon:"🚛",stage:"grammar",q:"What does PAS 68 V/7500(N2)/48/90:0 mean?",options:["A fire resistance rating for structural elements protecting data hall boundaries","An HVM barrier rating: stops a 7,500 kg vehicle at 48 km/h with zero penetration","A noise rating for diesel generator sets installed adjacent to the site perimeter","An electrical cable fire resistance rating for underground cable protection"],correct:1,explain:"PAS 68 rates hostile vehicle mitigation barriers: V/7500(N2)/48/90:0 means a 7,500 kg vehicle at 48 km/h with zero penetration. Mark should verify the threat assessment determines the correct PAS 68 rating — over-specifying wastes budget, under-specifying fails the risk assessment."},
  {level:3,id:"Q011-08",icon:"🚛",stage:"logic",q:"Why is ANPR alone insufficient for vehicle security?",options:["ANPR confirms vehicle identity but does not inspect the vehicle or verify the driver","ANPR camera systems are too expensive for routine deployment at secondary entrance points serving delivery and service vehicles.","ANPR systems only function reliably in daylight and cannot read number plates in the low-light conditions of covered vehicle inspection bays.","ANPR processing latency at peak delivery periods causes queue build-up that creates a secondary tailgating risk at the entrance barrier."],correct:0,explain:"ANPR confirms plate identity but does not inspect the vehicle, verify the driver, or detect threats. A stolen vehicle with valid plates passes without detection. ANPR must be paired with physical inspection (under-vehicle scanner, driver ID check) for Class 3 vehicle security."},
  {level:3,id:"Q011-09",icon:"🚛",stage:"rhetoric",q:"What is the minimum vehicle inspection area length for an articulated trailer in Ireland?",options:["6 metres","8 metres","12 metres","20 metres"],correct:3,explain:"Irish articulated trailers reach 16.5m (SI 190/2014). With approach and clearance margins, a 20m vehicle inspection zone is needed. On constrained Dublin DC sites, this often requires a dedicated vehicle loop — Mark should verify site layout accommodates this before planning."},
  {level:4,id:"Q011-10",icon:"🚪",stage:"grammar",q:"What is anti-passback in access control?",options:["A system that prevents a credential from granting exit until a corresponding re-entry event is logged","A backup access route activated when the primary entry reader fails or loses network connectivity","A time-based feature that automatically blocks all access credentials after the facility's defined out-of-hours period","Logic that prevents a credential from being used to enter if it hasn't been used to exit first"],correct:3,explain:"Anti-passback prevents credential sharing: if a badge has entered but not exited, it cannot grant re-entry. This eliminates tailgating via shared cards. For colocation, it also provides accurate occupancy counts — critical for fire evacuation headcount and tenant SLA reporting."},
  {level:4,id:"Q011-11",icon:"🚪",stage:"logic",q:"Why does a mantrap solve a problem that CCTV cannot?",options:["Mantraps are cheaper to maintain than CCTV systems because they have no ongoing recording storage or transmission bandwidth cost.","CCTV records tailgating but doesn't prevent it — a mantrap physically prevents it","Mantraps include integrated cameras that capture higher-quality imagery than fixed CCTV cameras positioned at corridor entry points.","CCTV cannot provide reliable coverage in data hall environments due to the electromagnetic interference from server and cooling equipment."],correct:1,explain:"CCTV is detective — it records tailgating but cannot prevent it. A mantrap is preventive — it physically blocks unauthorised entry with interlocking doors and weight sensors. EN 50600-2-5 Class 3 requires preventive controls at data hall boundaries, not just recording."},
  {level:4,id:"Q011-12",icon:"🚪",stage:"rhetoric",q:"What is the approximate cost of a mantrap installation at a data hall entrance?",options:["€25,000–€45,000","€5,000–€10,000","€100,000–€150,000","€250,000+"],correct:0,explain:"A mantrap with weight sensor, biometric, CCTV, and structural installation costs €25,000–€45,000 per unit (Tier 3 — Boon Edam, Gallagher published ranges, indicative)."},
  {level:5,id:"Q011-13",icon:"🔐",stage:"grammar",q:"Which combination satisfies two-factor authentication (2FA)?",options:["Two different access cards from different credential categories","A PIN AND a password — both are knowledge factors from the same authentication category","A card AND a fingerprint","Two different PINs entered sequentially on the same reader keypad"],correct:2,explain:"2FA requires two different authentication categories: something you have (card) + something you are (biometric). Two items from the same category (e.g. two PINs) do not qualify. EN 50600-2-5 Class 3 mandates 2FA at all data hall entry points."},
  {level:5,id:"Q011-14",icon:"🔐",stage:"logic",q:"Why should colocation tenants have separate access credentials?",options:["To reduce server noise transmission between adjacent colocation cages by limiting the frequency of door opening events.","To simplify the access control system by assigning each tenant a dedicated reader rather than programming shared readers with multiple credential sets.","To improve cooling efficiency in the data hall by ensuring doors are opened only by personnel with specific thermal management training.","So that one tenant's staff cannot access another tenant's equipment"],correct:3,explain:"Per-tenant access credentials prevent one tenant’s staff from reaching another’s equipment — a fundamental colocation security requirement. It also enables per-rack billing with individual audit trails. Ann prices this as a premium feature: €50–100/rack/month access surcharge."},
  {level:5,id:"Q011-15",icon:"🔐",stage:"rhetoric",q:"What GDPR obligation arises from deploying biometric access control?",options:["None — biometric data captured for physical access control is not classified as personal data under the GDPR definition in Article 4.","A DPIA must be completed","The Data Protection Commission must formally approve the biometric system before it can be deployed at any access control point.","Biometric template data must be stored on servers located outside the EU to prevent conflicts with GDPR data subject rights."],correct:1,explain:"Biometric data (fingerprints, iris) is special category personal data under GDPR. A Data Protection Impact Assessment (Article 35) must be completed before deployment. Failure to complete the DPIA risks enforcement by the Irish DPC — fines up to 4% of global turnover."},
  {level:6,id:"Q011-16",icon:"🗄️",stage:"grammar",q:"What is the typical cost per rack for electronic lock installation (front + rear)?",options:["€800–€1,500","€400–€600","€100–€200","€3,000–€5,000"],correct:0,explain:"Electronic rack locks cost €800–€1,500 per rack fully installed (Tier 3 — CPI, Chatsworth). At Clonshaugh’s 400 racks, that is €320k–€600k. Tom should note that cabling (PoE + data to each rack) often exceeds the lock hardware cost in legacy facilities."},
  {level:6,id:"Q011-17",icon:"🗄️",stage:"logic",q:"Why is the cabling cost often more than the lock hardware cost?",options:["Lock hardware for electronic rack access is priced at a significant premium to standard mechanical locks because of the integrated controller module.","Cabling must use screened STP Cat6A to prevent electromagnetic interference from adjacent power cables in the data hall cable management.","Each rack needs new PoE + data cable runs, and legacy facilities have no existing rack-level infrastructure","Electronic locks operate at 48V DC and require a dedicated power circuit separate from the standard 230V AC distribution."],correct:2,explain:"Each electronic lock needs PoE + data cabling. In legacy facilities with no rack-level infrastructure, running 400+ new cables through congested cable trays is often more expensive than the locks themselves. Tom’s budget must capture cabling as a separate line item."},
  {level:6,id:"Q011-18",icon:"🗄️",stage:"rhetoric",q:"What additional revenue model does electronic rack access enable?",options:["Per-rack billing with individual access control and audit trails","Reduced electricity costs through granular rack-level power metering linked to the access control event log.","Faster server deployment cycles because engineers can self-serve access without waiting for an escort from the operations team.","Reduced cooling costs due to the thermal monitoring sensors integrated into the electronic lock controller module."],correct:0,explain:"Electronic rack locks enable per-rack colocation with individual access control and audit trails. Each tenant gets their own credential set, and every access event is logged. Ann models this as a premium service — per-rack access charges of €50–100/rack/month."},
  {level:7,id:"Q011-19",icon:"📹",stage:"grammar",q:"What is the minimum CCTV retention period for EN 50600-2-5 Class 3?",options:["7 days","30 days","90 days","365 days"],correct:2,explain:"EN 50600-2-5 Class 3 requires minimum 90-day CCTV retention. At 30 fps per camera across 40+ cameras, this drives significant storage infrastructure — typically 50–100 TB. GDPR Article 5(1)(e) also applies: retention must not exceed what is necessary for the purpose."},
  {level:7,id:"Q011-20",icon:"📹",stage:"logic",q:"Why must CCTV cameras be on a separate network VLAN from IT equipment?",options:["Separating CCTV to a dedicated VLAN improves video quality by eliminating packet collisions from high-bandwidth IT traffic on shared network segments.","A compromised camera on the IT VLAN becomes a cybersecurity attack vector","CCTV systems consume excessive network bandwidth that degrades application performance when cameras share the same VLAN as IT equipment.","CCTV cameras use proprietary protocols that are incompatible with standard enterprise network switches used for IT equipment connectivity."],correct:1,explain:"IP camera firmware vulnerabilities are well-documented attack vectors. A camera on the IT VLAN gives an attacker a direct network entry point to production infrastructure. Dedicated CCTV VLAN with firewall segregation is mandatory for any Class 3 facility."},
  {level:7,id:"Q011-21",icon:"📹",stage:"rhetoric",q:"What is the key metric for camera placement quality at identification zones?",options:["Total camera count — more cameras provide greater coverage redundancy and eliminate blind spots in the security zone.","Camera resolution in megapixels — higher sensor resolution provides greater image detail for forensic investigation of security incidents.","Frame rate — higher frame rates capture fast-moving subjects without motion blur at the identification zone entry point.","Pixel density per metre face width (≥100 px/m)"],correct:3,explain:"Pixel density at the identification zone must be ≥100 px/m face width for positive identification (EN 62676-4). Camera count alone is meaningless — a hundred poorly positioned cameras provide less evidential value than ten correctly placed ones. Mark should verify px/m at each zone."},
  {level:8,id:"Q011-22",icon:"🔔",stage:"grammar",q:"Why are dual-technology (PIR + microwave) detectors required in data hall environments?",options:["They eliminate false alarms caused by HVAC airflow triggering PIR sensors alone","They are less expensive on a per-detector basis than single-technology PIR sensors for large data hall deployments.","They can simultaneously detect both intruder presence and smoke, providing dual security and fire detection from one device.","They are physically smaller than single-technology detectors and can be installed in ceiling voids with limited clearance."],correct:0,explain:"CRAH airflow triggers single-tech PIR sensors, causing constant false alarms in data halls. Dual-tech (PIR + microwave) requires both technologies to activate simultaneously — air movement triggers PIR but not microwave, eliminating HVAC-induced false positives."},

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level

    )
  );

function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const [rhetPersonaInit,setRhetPersona]=useState(null);
  // Read persona stage + persona key from Chain tab persona entry card
  React.useEffect(()=>{
    try {
      const req = sessionStorage.getItem('dc_persona_stage');
      if(req){ setStage(req); sessionStorage.removeItem('dc_persona_stage'); }
      const pk = sessionStorage.getItem('dc_persona_key');
      if(pk){ setRhetPersona(pk); sessionStorage.removeItem('dc_persona_key'); }
    } catch(e){}
  },[selectedLevel]);
  
  React.useEffect(()=>{ dcTimingLog.log('stage_change', { stage: stage, level: selectedLevel }); },[stage, selectedLevel]);
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
    {lvl.clockQuote && (
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
        <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>— Level {lvl.level}: {lvl.name}</div>
      </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeedStatement}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric} initialPersona={rhetPersonaInit}/>}

      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

        <div className="fade-in" style={{marginTop:12,padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid var(--amber)',
          borderRadius:8,fontSize:12,color:'var(--text-bright)',lineHeight:1.6}}>

/* ═══ DIAGRAM 3: L4 MANTRAP OPERATION (3-step walkthrough) ═══ */
/* Teaching: CCTV records tailgating. A mantrap prevents it. */
/* LAYOUT ARITHMETIC:
   Chamber: 2.4m ceiling, 1.2m wide (widened to 160px for readability)
   Person: 1.8m = 75% of 2.4m ceiling → 105px of 140px chamber height
   Scale (vertical): 58.3 px/m
   Floor y=224, Ceiling y=84, Chamber x=220 to x=380
   Door 1 (corridor side) x=212, Door 2 (data hall side) x=380
   Person facing RIGHT (entering data hall) — this is the access control use case
*/

/* SVG stick figure — facing right, walking into data hall */
function Person({cx, floorY=222, height=105, color='var(--text)', walking=true, facingRight=true}) {
  const headR = 5;
  const headCY = floorY - height + headR;
  const neckY = headCY + headR;
  const shoulderY = neckY + 10;
  const hipY = neckY + Math.round(height * 0.42);
  const feetY = floorY;
  const dir = facingRight ? 1 : -1;
  /* Walking: arms swing forward/back, legs stride */
  /* Standing: arms slightly out from body, legs shoulder-width apart */
  const armFwd = walking ? 12 : 6;
  const armBack = walking ? 6 : 6;
  const legFwd = walking ? 12 : 5;
  const legBack = walking ? 7 : 5;
  return (
    <g>
      {/* Head */}
      <circle cx={cx} cy={headCY} r={headR} fill="none" stroke={color} strokeWidth="1.8"/>
      {/* Torso */}
      <line x1={cx} y1={neckY} x2={cx} y2={hipY} stroke={color} strokeWidth="1.8"/>
      {/* Arms — natural rest or walking swing */}
      <line x1={cx} y1={shoulderY} x2={cx + dir * armFwd} y2={shoulderY + 22} stroke={color} strokeWidth="1.5"/>
      <line x1={cx} y1={shoulderY} x2={cx - dir * armBack} y2={shoulderY + 20} stroke={color} strokeWidth="1.5"/>
      {/* Legs — stance width or walking stride */}
      <line x1={cx} y1={hipY} x2={cx + dir * legFwd} y2={feetY} stroke={color} strokeWidth="1.8"/>
      <line x1={cx} y1={hipY} x2={cx - dir * legBack} y2={feetY} stroke={color} strokeWidth="1.8"/>
    </g>
  );
}

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc011_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc011_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc011_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

        </div>

                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}

        </div>

        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';

            </div>

            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}
