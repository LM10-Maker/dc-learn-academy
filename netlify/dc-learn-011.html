{
  id:"L4",level:4,name:"Building Entry & Visitor Management",icon:"🚪",
  component:"Building Access",available:true,
  clockQuote:"Four layers on one floor plan. Fire in red. Lease in blue. Security in green. Cooling in yellow. The zones had been managed separately for a decade. When they were drawn on the same page, the gaps were obvious.",
  userNeedStatement:"Understand how people are authenticated and controlled at the building entrance",
  plainEnglish:"The building entrance is where identity is verified and visitors are separated from authorised staff. A mantrap prevents tailgating. Every entry and exit is logged.",
  grammar:{
    facts:[{term:"Mantrap (interlock/airlock)",definition:"A small enclosed vestibule with two interlocking doors — the outer door must close and lock before the inner door can open.",plain:"A tiny room between two locked doors. You badge into the first door, it closes behind you, and only then can you badge through the second door.",number:"Typical dimensions: 1.2m × 2.0m × 2.4m. Throughput: 6–10 persons/minute. Cost: €25,000–€45,000 per unit (Tier 3 — Boon Edam, Gallagher published ranges, indicative).",standard:"EN 50600-2-5:2021 Section 5.5; IEC 60839-11-1",feynman:{analogy:"Think of it like a revolving door that only lets one person through at a time — except both sides lock, it weighs you to make sure you are alone, and it has a camera watching. If two people try to squeeze in, it locks both doors and raises an alarm.",firstPrinciples:"A normal door lets multiple people through on one badge swipe — this is called tailgating. A mantrap is a small room with two doors that never open simultaneously. You badge into door one, it closes behind you, the system checks you are alone, then door two opens. One person, one authentication, one entry.",theTest:"You understand mantraps when you can answer: During a shift change, 40 staff need to enter — the mantrap processes 8 people per minute. How long is the queue? Answer: 5 minutes. This is why most facilities pair a mantrap (for data hall access) with speed gates (for building entry)."},soWhat:"The mantrap is the single most effective anti-tailgating measure — it physically enforces one person per authentication and provides an accurate occupancy count."},{term:"Anti-passback",definition:"Access control logic that prevents a credential from being used to enter if it hasn’t been used to exit first.",plain:"The system knows your badge is already inside. If someone tries to use it at the door again, it’s rejected.",number:"Hard anti-passback: rejects credential. Soft: allows but alerts. Class 3 requires hard anti-passback at Zone 3+.",standard:"IEC 60839-11-1:2013; EN 50600-2-5:2021",feynman:{analogy:"Think of it like a cinema ticket that gets torn at the entrance — once you are inside, you cannot hand the stub back to a friend outside to use again. Anti-passback works the same way: once your badge is inside, it cannot be used at the entrance again until you badge out.",firstPrinciples:"Access cards can be shared. Person A badges in, passes their card back through the fence to Person B, and now two people are inside on one credential. Anti-passback prevents this: the system tracks that Card A is already inside and rejects it at the entrance until an exit event is recorded.",theTest:"You understand anti-passback when you can answer: A contractor badges into the data hall but forgets to badge out — what happens next morning? Answer: Their badge is rejected because the system thinks they are still inside. Security must manually reset their badge status."},soWhat:"Anti-passback prevents the most common credential-sharing attack — passing a badge back through the fence to a second person is blocked because the badge is already 'inside'."},{term:"Visitor management system",definition:"Software for pre-registering visitors, capturing ID, issuing temporary credentials, assigning escorts.",plain:"The system that knows who’s visiting, who invited them, where they’re allowed to go, and when their pass expires.",number:"Best practice: pre-registration 24hrs+, photo ID captured, badge limited to Zone 1 unless escorted, automatic expiry.",standard:"ISO 27001:2022 Annex A.7.2; EN 50600-2-5 Section 5.5",feynman:{analogy:"Think of it like hotel check-in — you book in advance, show your passport at reception, get a room key that only opens your floor, and check out when you leave. A visitor management system does the same: pre-register, verify ID, issue a limited badge, and log departure.",firstPrinciples:"Every person on site who is not permanent staff is a visitor. Visitors need to be expected, identified, restricted, accompanied, and tracked. The system automates all five steps: pre-registration, ID capture, zone-limited badge, escort assignment, and entry/exit logging.",theTest:"You understand visitor management when you can answer: A visitor badge is found on the ground the next day — what risk does this represent? Answer: If the badge is not time-limited, whoever picks it up has the same access as the visitor. Best practice: automatic expiry after 8 hours maximum."},soWhat:"Unmanaged visitors are the audit finding that generates the most remediation cost — a visitor management system eliminates it permanently for a one-time investment."},{term:"Full-height turnstile",definition:"A floor-to-ceiling rotating barrier admitting one person per credential presentation, physically preventing tailgating and piggybacking.",plain:"A full-height cage that rotates to let one person through at a time. You cannot follow someone through without your own badge.",number:"Throughput: 15–20 persons per minute. Cost: €8,000–€15,000 per unit installed (Tier 3 — Boon Edam, Gallagher published ranges, indicative). Height: 2.1–2.4m.",standard:"EN 50600-2-5:2021 Section 5.4",feynman:{analogy:"Think of it like a revolving door at a hotel — except it only turns when you present a valid credential, and it only has space for one person. If two try to squeeze in, it locks.",firstPrinciples:"A standard swing door admits multiple people in one opening — this is tailgating. A waist-high turnstile can be climbed over. A full-height turnstile is floor-to-ceiling and admits exactly one person per rotation.",theTest:"You understand full-height turnstiles when you can answer: Why is a waist-high turnstile insufficient for a Class 3 data hall entry? Answer: It can be climbed over or reached over. Full-height eliminates both bypass methods."},soWhat:"A waist-high turnstile can be climbed or vaulted — a full-height turnstile is the minimum physical barrier for unsupervised entry points at Class 3 facilities."},{term:"Tailgating detection",definition:"Technology detecting when more than one person passes through an access point on a single credential, using IR beams, stereo cameras, or weight sensors.",plain:"A system that spots when someone sneaks through a door behind the person who badged in.",number:"Stereo camera accuracy ≥98%. IR beam pitch: 25mm. Floor mat sensitivity: detects ≥30 kg.",standard:"EN 50600-2-5:2021 Section 5.4",feynman:{analogy:"Think of it like a train station turnstile that counts passengers — if two people go through on one ticket, the system knows.",firstPrinciples:"An access control system records that one credential was presented. But it cannot tell if one or two people walked through. Tailgating detection adds a separate counting mechanism and compares the body count to credentials presented.",theTest:"You understand tailgating detection when you can answer: Access logs show 47 entries but the stereo camera counted 52 people — what does this mean? Answer: Five people tailgated. The security team needs to investigate."},soWhat:"Tailgating is the most common physical access violation in data centres — detection systems catch the gap between credentials presented and bodies counted."}],
    whatItLooksLike:"A controlled entrance has a reception desk, turnstiles for staff, a mantrap for data hall-bound personnel, and clear separation between visitor and operational areas.",
    siteChecklist:["Is there a mantrap or interlock at the entrance to Zone 2+?","Is anti-passback enabled?","Does the visitor system capture photo ID?","Are visitor credentials time-limited?","Is tailgating detection active?"]
  },
  logic:{
    causeAndEffect:[{cause:"A legacy facility uses a standard door with single card reader — no mantrap, no tailgating detection.",effect:"During shift changes, multiple people enter on a single badge swipe. The facility has no accurate occupant count.",insight:"The mantrap solves three problems: prevents tailgating, creates accurate occupancy count, provides containment point."},{cause:"Visitors are issued temporary access badges that are not zone-restricted and allow access to all areas including the data hall.",effect:"An escorted visitor who separates from their escort has unrestricted access to all secure areas including the data hall.",insight:"Visitor badges must be technically limited — they should only operate in Zone 1 and require escort-badge proximity for Zone 2+."},{cause:"Visitor escorts leave visitors unattended in the controlled corridor to take a phone call.",effect:"The visitor is in a controlled zone without supervision. They can observe security procedures, photograph layouts, or access restricted areas.",insight:"Escort discipline is the most frequently failed audit item. The technical solution is GPS-tagged visitor badges that alarm when visitor and escort separate by more than 5 metres."}],
    constraintLesson:"Building entry design must balance security with operational throughput. A mantrap processing one person every 15 seconds creates a 10-minute queue when 40 people arrive for a shift change.",
    weakestLink:{whatsWrong:"Believing that CCTV at the entrance provides the same security as a mantrap.",whatsRight:"CCTV records tailgating — it doesn’t prevent it. A mantrap physically prevents tailgating. CCTV is detective; a mantrap is preventive.",howToGetThere:"Install a mantrap at Zone 2→Zone 3 boundary (€25,000–€45,000, Tier 3 — Boon Edam, Gallagher published ranges, indicative). For Zone 0→Zone 1, speed gates with tailgating detection (€8,000–€12,000 per lane, Tier 3 — Boon Edam published ranges)."}
  },
  rhetoric:{declan:{hook:"We have a reception desk and a visitor sign-in book. The security consultant pointed out that neither of those things actually prevents an unauthorised person from entering the facility.",text:"We’ve got a reception desk and a nice lady who asks visitors to sign the book. The staff know each other — they hold the door open. The mantrap was the most disruptive installation we did. Three weeks of construction noise in the lobby while the data hall was live. But it solved our tailgating problem overnight — from 12 incidents a month to zero."},ann:{hook:"A mantrap costs 35 to 40 thousand euros. A data breach from unauthorised physical access costs millions in regulatory fines, SLA penalties, and reputational damage. The cost comparison is not close.",text:"A mantrap costs €35k (Tier 3 — Boon Edam published ranges). A data breach from unauthorised physical access costs €4M+ average in Ireland (Tier 2 — IBM Cost of Data Breach Report 2024). The risk-reward calculus is not even close. Visitor management is a revenue enabler. Enterprise tenants conduct quarterly security audits of their colocation providers. A professional visitor management system with escort tracking scores points on every audit."},mark:{hook:"Mantrap specification must accommodate the largest equipment moved through the facility — server racks at 2,000 mm high, 800 mm wide, and 1,200 mm deep with a loaded weight of up to 1,500 kg.",text:"The mantrap specification needs to account for the largest equipment we move through it. Most facilities need a separate equipment airlock at the loading dock. Anti-passback logic needs careful programming. If someone badges in but does not badge out — because they left through a fire exit — the system thinks they are still inside. The NOC needs a manual override procedure for these cases."},sarah:{hook:"ISO 27001 Annex A.7.2 requires physical entry controls. EN 50600-2-5 Class 3 specifically requires interlocking dual-door entry with access card and biometric verification for data hall access.",text:"ISO 27001 Annex A.7.2 requires ‘physical entry controls’. EN 50600-2-5 Class 3 specifies the mantrap as non-negotiable. Under GDPR, the facial recognition element of mantrap biometrics requires a DPIA. You must demonstrate that less intrusive methods (card + PIN) were considered and rejected on security grounds before deploying biometrics."},tom:{hook:"Building entry upgrade: 2 speed gates at 12 thousand each, 1 mantrap at 40 thousand, visitor management system at 15 thousand. Total 79 thousand euros — the first gate in a layered access architecture.",text:"Building entry upgrade: 2× speed gate lanes €24k, 1× mantrap €40k, visitor management €15k, anti-passback upgrade €8k, structural works €12k. Total: ~€99k. Tier 3 — manufacturer published ranges (Boon Edam, Gallagher), SCSI 2025, indicative. A complete lobby security upgrade — mantrap, full-height turnstile, visitor kiosk, anti-passback, CCTV integration — runs €80k–€130k. Spread over 5 years for a 400-rack facility, that is €40–€65 per rack per year."}},
  rhetoricTakeaways:{declan:"The mantrap solved our tailgating problem overnight — from 12 incidents a month to zero. The three-week installation disruption was worth every day.",ann:"A mantrap costs €35,000 (Tier 3 — Boon Edam published ranges). A data breach from unauthorised physical access costs €4 million average in Ireland (Tier 2 — IBM Cost of Data Breach Report 2024). The risk-reward is not even close.",mark:"The mantrap needs a separate equipment airlock at the loading dock — you cannot move a 42U rack through a personnel mantrap without disabling it.",sarah:"ISO 27001 Annex A.7.2 requires physical entry controls. EN 50600-2-5 Class 3 specifies the mantrap as non-negotiable for Zone 2+ boundaries.",tom:"Building entry upgrade (speed gates + mantrap + visitor system + anti-passback): ~€99,000 (Tier 3 — Boon Edam, Gallagher, SCSI 2025, indicative). Over 5 years for 400 racks, that is €50 per rack per year."},
  scenario:{title:"Clonshaugh Building Entry Redesign",narrative:"Clonshaugh’s entrance is a standard glass lobby with a reception desk. Staff use magnetic stripe cards. No mantrap, no turnstile.",question:"Design a building entry upgrade for EN 50600-2-5 Class 3.",answer:"SITUATION: Clonshaugh's building entrance is a standard commercial glass lobby with a reception desk and magnetic stripe card readers. No mantrap, no turnstile, no tailgate detection. Any visitor who follows an authorised person through the door gains unrestricted access to the entire building.\n\nCHALLENGE: Design a building entry upgrade that meets EN 50600-2-5 Class 3 — requiring two-factor authentication and anti-tailgating measures at the Zone 1 to Zone 2 boundary.\n\nSHOW THE FIX: Four transition points are required. Zone 0→1 (public to site): Speed gates with visitor management kiosk — pre-registered visitors only, photo ID verification. Zone 1→2 (lobby to controlled area): Card plus PIN door with anti-passback — no single-factor entry permitted. Zone 2→3 (controlled to data hall corridor): Mantrap with biometric (fingerprint or iris) plus card — the critical boundary. Zone 3→4 (corridor to individual data hall): Biometric plus escort policy for visitors.\n\nCost breakdown: Speed gates €35,000, mantrap €28,000, biometric readers (8 units) €24,000, anti-passback software licence €8,000, visitor management system €12,000. Total: approximately €107,000 (Tier 3 — security integrator estimates, indicative). This eliminates the tailgating vulnerability and creates an auditable access trail that satisfies both EN 50600 and tenant SLA requirements.\n\nSources: EN 50600-2-5:2021 Table 3 (T1); BS 7858 security screening standard (T1).",
whoShouldCare:["mark","tom","sarah"]},
  sourceNote:"EN 50600-2-5:2021 Section 5.5. IEC 60839-11-1. ISO 27001:2022 Annex A.7.2. Cost benchmarks: Tier 3 — manufacturer published ranges (Boon Edam, Meesons, Gallagher), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-008",level:"L3",topic:"Fire egress — mantrap must have emergency release"},{module:"DC-LEARN-009",level:"L2",topic:"DCIM integration — access events"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'Mantrap + anti-passback',available:'Single card reader (no interlock)',unit:'Building entry control',pass:false,detail:'No mantrap, no anti-passback, no tailgating detection. Single door with mag stripe card.'};}
},
{
  id:"L5",level:5,name:"Data Hall Access Control",icon:"🔐",
  component:"Data Hall Security",available:true,
  clockQuote:"The fire damper was doing its job — protecting the compartment. The cooling system was doing its job — keeping the racks cool. The problem was that in a fire event, one system's safety measure became the other system's interruption. Nobody had mapped them together.",
  userNeedStatement:"Understand the specific access control requirements for the data hall",
  plainEnglish:"The data hall is where the IT equipment lives. Two-factor authentication, two-person integrity rules, and real-time monitoring are standard for Class 3.",
  grammar:{
    facts:[{term:"Two-factor authentication (2FA)",definition:"Access control requiring two independent credential types from different categories: something you have, something you know, or something you are.",plain:"You need two different types of proof — your badge AND your fingerprint.",number:"EN 50600-2-5 Class 3 requires 2FA at Zone 3 boundaries. Class 4 requires 2FA + two-person integrity.",standard:"EN 50600-2-5:2021 Table 1; IEC 60839-11-1",feynman:{analogy:"Think of it like withdrawing cash from an ATM — you need your bank card (something you have) AND your PIN (something you know). Neither works alone. 2FA at a data hall door works the same way: your badge plus your fingerprint.",firstPrinciples:"Authentication factors come in three categories: something you have (card), something you know (PIN), and something you are (fingerprint). Two-factor means two different categories. Two cards is not 2FA because both are something you have. A card plus a fingerprint is 2FA because they are different categories.",theTest:"You understand 2FA when you can answer: A facility requires a PIN pad and a password to enter the data hall — is this 2FA? Answer: No. A PIN and a password are both something you know — same category. True 2FA needs two different categories."},soWhat:"2FA at the data hall ensures that a stolen badge alone is insufficient — the attacker needs both the physical credential and the biometric or PIN."},{term:"Two-person integrity (TPI)",definition:"An access policy requiring two authorised individuals to authenticate simultaneously to gain entry.",plain:"You can’t go into this room alone — two authorised people must badge in together.",number:"TPI required at EN 50600-2-5 Class 4 for all data hall access. At Class 3, required for critical infrastructure rooms.",standard:"EN 50600-2-5:2021 Section 5.6",feynman:{analogy:"Think of it like a safe deposit box at a bank — the bank manager has one key and you have the other. Neither key works alone. TPI means two people must authenticate together to open the door.",firstPrinciples:"One person alone in a critical room can do anything unwitnessed. TPI prevents this by requiring two authorised people to be present. Both must badge in simultaneously. If one leaves, the room alarms. The principle: no unsupervised access to the highest-value assets.",theTest:"You understand TPI when you can answer: EN 50600-2-5 Class 3 requires TPI for which zones? Answer: Critical infrastructure rooms (UPS, generator, MDB) — not the general data hall. Class 4 requires TPI for all data hall access."},soWhat:"TPI eliminates unsupervised access to the highest-value assets — no single person can enter a critical room alone, removing the opportunity for unwitnessed action."},{term:"Biometric access control",definition:"Authentication using a measurable biological characteristic — fingerprint, iris pattern, or facial geometry.",plain:"Using your body to prove who you are. It can’t be lost, shared, or forgotten.",number:"Fingerprint FAR <0.001%, FRR <1%. Iris FAR <0.0001%. Reader cost: fingerprint €500–€1,500, iris €2,000–€4,000 (Tier 3 — HID Global, Suprema published ranges, indicative).",standard:"ISO/IEC 19795-1; EN 50600-2-5:2021",feynman:{analogy:"Think of it like your phone unlocking with your face or fingerprint — you cannot forget it, lose it, or lend it to a colleague. Biometrics at a data centre door work the same way: your body is the credential.",firstPrinciples:"Cards can be stolen. PINs can be shared. Biometrics are unique to the individual. A fingerprint reader measures ridge patterns. An iris scanner maps the coloured ring in your eye. False acceptance rates below 0.001% make spoofing extremely difficult.",theTest:"You understand biometric access when you can answer: A facility installs fingerprint readers — what GDPR obligation does this create? Answer: A Data Protection Impact Assessment (DPIA) must be completed before deployment, because fingerprints are special category personal data under GDPR Article 35."},soWhat:"Biometrics bind the credential to the individual — unlike cards and PINs, a fingerprint cannot be shared, lost, or forgotten."},{term:"Time-limited access (scheduled windows)",definition:"Access control policy restricting credentials to specific time windows, preventing after-hours access without explicit authorisation.",plain:"Your badge only works during your scheduled shift or approved visit window. At midnight, it stops working unless someone authorises overtime.",number:"Reduces after-hours access incidents by 70–80%. Implementation: integrate ACS with HR shift schedules via API.",standard:"ISO 27001:2022 Annex A.7.2; EN 50600-2-5:2021",feynman:{analogy:"Think of it like a hotel key that expires at checkout — your card works until 11 AM, then deactivates. Time-limited access does the same for data hall credentials.",firstPrinciples:"A 24/7 credential provides maximum convenience but maximum risk window. Time-limiting removes exposure during hours when access is not needed. If 90% of access is 08:00–18:00, time-limiting removes 14 hours of unnecessary exposure per day.",theTest:"You understand time-limited access when you can answer: An engineer needs emergency data hall access at 22:00 outside their window — what happens? Answer: Badge rejected. They call NOC, which verifies the emergency, grants a temporary override, and logs the exception."},soWhat:"Time-limiting removes 14 hours of unnecessary credential exposure per day — a badge that only works 08:00–18:00 cannot be misused at 02:00."},{term:"Access-DCIM correlation",definition:"Integration between physical access control and DCIM/ITSM systems cross-referencing who entered the data hall with what changes were made to IT infrastructure.",plain:"Joining door logs with IT change logs — so you can see that the person who entered at 14:00 rebooted server X at 14:15.",number:"Reduces mean time to root cause by 40–60% for physical-layer incidents. Requires API integration between ACS, DCIM, and ITSM.",standard:"ITIL 4 Configuration Management; ISO 27001:2022 Annex A.7.4",feynman:{analogy:"Think of it like airport security correlating the passenger manifest with baggage scan logs — you know who was on the plane and what they brought.",firstPrinciples:"Physical access and logical changes are tracked in separate systems. When an incident occurs, investigation must manually cross-reference door logs with change records. Automated correlation eliminates this manual step and immediately identifies who was in the room.",theTest:"You understand access-DCIM correlation when you can answer: A critical server rebooted unexpectedly at 03:15 — how does correlation help? Answer: The system immediately shows who had data hall access at 03:15, which rack they were assigned to, and whether a change ticket existed."},soWhat:"Correlation connects physical presence to logical actions — when a server reboots at 03:15, the system immediately identifies who was in the room."}],
    whatItLooksLike:"A properly controlled data hall entrance has a biometric reader beside a card reader, a rated door with magnetic lock, CCTV, and a door-held alarm.",
    siteChecklist:["Is data hall access controlled with 2FA?","Is anti-passback enabled?","Is there a door-held alarm (<30s trigger)?","Are all access events logged?","Is CCTV covering every entry/exit?"]
  },
  logic:{
    causeAndEffect:[{cause:"A facility uses card-only access to the data hall — the same card as the building entrance.",effect:"Anyone with a building card can enter the data hall. Cleaners, caterers, and visitors all have the same access as engineers.",insight:"Zone separation requires credential separation. Adding biometric 2FA at the data hall achieves this."},{cause:"Data hall secure doors are routinely propped open with cable trays or equipment during hardware deployment operations.",effect:"During the deployment window, data hall access control is bypassed. The access log shows no entries because the door is physically open.",insight:"Hardware deployment requires a ‘supervised open door’ procedure with security officer stationed at the door."},{cause:"Former employees retain active access credentials for weeks after leaving because HR and facilities use separate systems.",effect:"Ex-employees can enter the data hall after employment has ended. In colocation, a former tenant employee could access equipment after contract expiry.",insight:"Automated credential deactivation via HR API integration costs under €5,000 (Tier 3 — SCSI 2025, indicative) but eliminates one of the most common audit findings."}],
    constraintLesson:"Data hall access control faces a fundamental tension in colocation environments: the operator controls physical access, but the tenant controls what happens inside their cage. Per-tenant policies require zone-within-zone access.",
    weakestLink:{whatsWrong:"Believing that biometric access eliminates the need for a mantrap.",whatsRight:"Biometrics verify identity. A mantrap prevents tailgating. They solve different problems. You need both.",howToGetThere:"If a mantrap is at the building entrance, the minimum at the data hall is: biometric 2FA + anti-passback + door-held alarm + CCTV."}
  },
  rhetoric:{declan:{hook:"We have 40 people with data hall access right now. Half of them have not needed it in the past 6 months. That is not a security programme — it is an open door.",text:"We’ve got 40 people with data hall access right now. Half of them don’t need to be in there on any given day. We found a contractor badge from 2019 still active last month. The contractor left in 2020. Three years of unnecessary data hall access. Time-limited credentials would have caught this on day one."},ann:{hook:"Per-tenant access control is a revenue enabler. Financial services tenants pay a premium for individually auditable access logs — and they will not sign without biometric-level verification.",text:"Per-tenant access control is a revenue enabler. Financial services tenants pay a 15–25% premium for dedicated cages with dedicated access control. Unrevoked credentials are an insurance red flag. If a breach traces to a credential that should have been deactivated, the insurer may argue contributory negligence."},mark:{hook:"The biometric system must integrate with the existing access control platform via open protocol. Proprietary biometric readers that do not export to the PSIM create an audit trail gap.",text:"The biometric system needs to integrate with the existing access control platform. OSDP v2 is the modern standard — encrypted end-to-end."},sarah:{hook:"Biometric data is personal data under GDPR. The facility must have a completed DPIA and a documented retention and deletion schedule before any biometric system is deployed.",text:"Biometric data is personal data under GDPR. The facility must have a DPIA for the biometric system. Under GDPR Article 17, retaining access logs for deactivated credentials longer than necessary is a data protection issue. But under NIS2, insufficient logging is a security failure."},tom:{hook:"Data hall access upgrade: biometric readers at 1,200 each for 20 doors, plus installation and integration. Total programme 35 to 50 thousand euros — plus the DPIA at 5 thousand euros.",text:"Data hall access upgrade (Tier 3 — Gallagher, HID Global, SCSI 2025, indicative): 4× biometric readers €6k, controller upgrade €8k, door hardware €12k, cabling €5k, commissioning €4k. Total: ~€35k for access layer alone. Integrating access control with HR costs €5,000–€10,000 for API work. Automated deactivation saves 2 hours per week of manual admin — payback in under 6 months."}},
  rhetoricTakeaways:{declan:"We had a contractor badge from 2019 still active last month — three years of unnecessary data hall access. Time-limited credentials would have caught this on day one.",ann:"Per-tenant access control is a revenue enabler — financial services tenants pay a 15–25% premium for dedicated cages with dedicated, auditable access control.",mark:"The biometric system must integrate via OSDP v2 — encrypted, end-to-end, and compatible with the existing access control platform. Proprietary protocols create vendor lock-in.",sarah:"Biometric data is special category data under GDPR — a DPIA must be completed before deployment. Article 35 is not optional, and the DPC enforces it.",tom:"Data hall access upgrade (4 biometric readers + controller + door hardware + commissioning): ~€35,000 (Tier 3 — Gallagher, HID Global, SCSI 2025, indicative). HR integration for auto-deactivation: €5,000–€10,000 additional."},
  scenario:{title:"Clonshaugh Data Hall Access Upgrade",narrative:"Two data halls, both use the same magnetic stripe card as building entrance. No biometric, no anti-passback, no door-held alarms.",question:"Design differentiated access control for both halls.",answer:"SITUATION: Both data halls at Clonshaugh (Hall A and Hall B) use the same magnetic stripe card as the building entrance. No biometric verification, no anti-passback, no door-held-open alarm. A financial services tenant in Hall A requires EN 50600-2-5 Class 4 access controls; a general colocation tenant in Hall B requires Class 3.\n\nCHALLENGE: Design differentiated access control for both halls that meets their respective tenant requirements without creating operational complexity for the facilities team.\n\nSHOW THE FIX: Hall A (financial services, 200 racks): Biometric two-factor authentication (card + fingerprint) with hard anti-passback (entry requires prior exit record), door-held-open alarm, and 90-day CCTV retention at hall entry. This meets Class 4 requirements. Hall B (general colocation, 200 racks): Card + PIN two-factor authentication with soft anti-passback (alarm only, no lockout), door-held-open alarm, and 30-day CCTV retention. This meets Class 3 requirements.\n\nBoth halls share a common access control platform (single head-end, unified reporting) but with differentiated policies per zone. Cost: Hall A upgrade €65,000, Hall B upgrade €42,000 (Tier 3 — security integrator estimates). The differentiation allows Clonshaugh to charge a security premium of approximately €15–€25/rack/month for Hall A tenants — recovering the investment within 18 months.\n\nSources: EN 50600-2-5:2021 Table 3 Classes 3–4 (T1).",
whoShouldCare:["mark","sarah","tom"]},
  sourceNote:"EN 50600-2-5:2021 Sections 5.5–5.6. IEC 60839-11-1. GDPR Articles 35–36. Cost benchmarks: Tier 3 — manufacturer published ranges (Gallagher, HID Global), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-003",level:"L3",topic:"Redundancy — access must not impede redundant paths"},{module:"DC-LEARN-009",level:"L4",topic:"DCIM — access event correlation"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'2FA (biometric + card)',available:'Single-factor mag stripe',unit:'Data hall access',pass:false,detail:'Same card opens building and data hall. No biometric, no anti-passback.'};}

{
  id:"L6",level:6,name:"Rack-Level & Cabinet Security",icon:"🗄️",
  component:"Rack Security",available:true,
  clockQuote:"What happens when you're not here? It was the question Declan had been avoiding for ten years. Not because he didn't know the answer, but because the answer was: nobody else knows what I know. And that wasn't a system — it was a dependency.",
  userNeedStatement:"Understand how individual racks and cabinets are secured within the data hall",
  plainEnglish:"Once inside the data hall, rack-level security controls who can touch specific equipment. Electronic rack locks provide per-rack audit trails and remote locking.",
  grammar:{
    facts:[{term:"Electronic rack lock",definition:"A solenoid or motor-driven locking mechanism on a server cabinet controlled by the access control system.",plain:"A lock on the rack door that works like the building access system — you badge to open it, and it records who and when.",number:"Handles per rack: 2 (front + rear). System cost: €800–€1,500 per rack fully installed (Tier 3 — CPI, Chatsworth published ranges, indicative).",standard:"EN 50600-2-5:2021 Section 5.7; IEC 60839-11-1",feynman:{analogy:"Think of it like a hotel room door — you badge to open it, it logs who entered and when, and management can revoke your key from the front desk without physically changing the lock. Electronic rack locks work identically for server cabinets.",firstPrinciples:"A barrel key lock has no memory — it does not know who opened it or when. An electronic lock records every open and close event with a timestamp and credential ID. When someone leaves the company, their access is revoked in software in seconds. With a key lock, you would need to re-key 400 racks.",theTest:"You understand electronic rack locks when you can answer: A master key is lost at a 400-rack facility with barrel locks — what does it cost to fix? Answer: 8,000 to 12,000 euro in locksmith fees to re-key all racks. With electronic locks, it costs nothing — you revoke the lost credential in software."},soWhat:"The electronic rack lock extends the audit trail to the individual cabinet — the last 0.6 metres between the data hall door and the server is no longer uncontrolled."},{term:"Colocation cage",definition:"A physical enclosure within the data hall dedicated to a single tenant, constructed from mesh panels with access-controlled door.",plain:"A fenced-off area inside the data hall that belongs to one tenant only.",number:"Standard mesh: 50mm×50mm welded steel. Height: slab-to-slab. Cost: €150–€300/m² of cage floor area (Tier 3 — manufacturer published ranges, SCSI 2025, indicative).",standard:"EN 50600-2-5:2021 Section 5.7",feynman:{analogy:"Think of it like a storage unit in a self-storage facility — you rent your own lockable space inside a shared building. Your stuff is physically separated from everyone else, with your own door and your own key.",firstPrinciples:"In an open-plan data hall, every tenant can physically reach every other tenant's equipment. A cage is a mesh enclosure with its own access-controlled door that physically separates one tenant's racks from another's. It resolves liability: if something happens inside your cage, it was someone with your credentials.",theTest:"You understand colocation cages when you can answer: A financial services tenant asks for physical separation — does a painted line on the floor satisfy this? Answer: No. Physical separation means a floor-to-ceiling mesh enclosure with its own access-controlled door. A painted line is a visual marker, not a physical barrier."},soWhat:"The cage is the physical boundary of a tenant's contractual space — everything inside belongs to them, everything outside is the operator's responsibility."},{term:"Cabinet tamper detection",definition:"Sensors on rack doors that detect unauthorised opening — magnetic contacts, vibration sensors, temperature sensors.",plain:"Sensors that know when someone opens, forces, or interferes with a rack.",number:"Magnetic contact: €20–€40/door. Vibration sensor: €50–€100/rack (Tier 3 — manufacturer published ranges, indicative). Alert latency: <10 seconds.",standard:"EN 50600-2-5:2021; EN 50600-2-3",feynman:{analogy:"Think of it like the tamper-evident seal on a medicine bottle — if someone has opened it, you can tell immediately. Cabinet tamper sensors detect any unauthorised opening, even if the intruder bypasses the lock.",firstPrinciples:"A lock prevents authorised opening. Tamper detection catches unauthorised opening. A magnetic contact on the door detects opening. A vibration sensor detects drilling or forced entry. Both send alerts within 10 seconds. Together they cover opened the door and went through the wall.",theTest:"You understand tamper detection when you can answer: An electronic lock is installed but no tamper sensor — what attack vector remains? Answer: Removing the side panel of the rack or forcing the door past the lock mechanism. Tamper detection catches both."},soWhat:"Tamper detection alerts on the opening that was not requested — if a cabinet opens without a corresponding access event, something is wrong."},{term:"Colocation cage partition",definition:"The welded mesh panel system forming the physical walls of a colocation cage — distinct from the cage as a rentable product. Specified by mesh aperture, wire diameter, and height (floor-to-slab).",plain:"The steel mesh walls that make up a cage — the actual panels, posts, and door hardware that a contractor installs. Cost is per linear metre of wall, not per m² of floor area.",number:"Mesh spec: minimum 50×50mm weld mesh, 3mm wire diameter. Height: floor-to-slab (3.0–4.2m). Cost: €150–€250 per linear metre of wall panel installed (Tier 3 — manufacturer published ranges, Tier 4 installation). A typical 12-rack cage (5m × 3m perimeter = 16 linear metres) costs €2,400–€4,000 for mesh panels alone.",standard:"EN 50600-2-5:2021 Section 5.5; Uptime Institute Tier III Topology",feynman:{analogy:"Think of it like safe deposit boxes in a bank vault — the vault protects everyone, but each customer has their own locked box. A colocation cage is a private vault within the shared data hall.",firstPrinciples:"In a colocation facility, multiple tenants share the same data hall. Without physical separation, any tenant\'s staff can reach any other tenant\'s equipment. A mesh cage creates a physical barrier requiring a separate credential. The mesh must extend to the structural slab.",theTest:"You understand colocation cages when you can answer: A cage stops at the suspended ceiling (2.7m) in a hall with a 4.2m slab — is this adequate? Answer: No. The 1.5m gap allows climbing over. EN 50600-2-5 Class 3 requires floor-to-slab barriers."},soWhat:"The cage partition must extend slab-to-slab or the security zone boundary is incomplete — a partition that stops at the ceiling tile can be bypassed in seconds."},{term:"RFID asset tracking",definition:"Radio-frequency identification system tagging individual IT assets and tracking their location, movement, and chain of custody within the data hall.",plain:"A tag on every server that tells you exactly where it is, when it moved, and who moved it.",number:"Passive UHF read range: 5–10m. Active RFID: up to 30m. Tag cost: €0.50–€5.00 per asset. System: €15,000–€40,000 for 400-rack deployment (Tier 3 — manufacturer published ranges, indicative).",standard:"ISO 18000-63; ISO 27001:2022 Annex A.5.9",feynman:{analogy:"Think of it like anti-theft tags on clothing — each item is tagged and the system knows when something moves toward the exit without being scanned out.",firstPrinciples:"A 400-rack hall may contain 4,000+ IT assets. Manual inventory is slow and error-prone. RFID tags emit a unique identifier when scanned. Fixed readers at doorways detect asset movement and cross-reference against approved work orders.",theTest:"You understand RFID tracking when you can answer: A reader at the data hall exit detects a tagged server leaving at 03:00 with no work order — what happens? Answer: Immediate alert. The rack location is known, the access log shows who was present."},soWhat:"Asset tracking closes the gap between the access log and the equipment log — when a server leaves a rack, the system knows what left, when, and through which door."}],
    whatItLooksLike:"A well-secured data hall shows individual rack handles with LED indicators, mesh cages separating tenants, CCTV per aisle, and DCIM showing real-time rack access map.",
    siteChecklist:["Do racks have electronic locks (not key locks)?","Is every open/close event logged?","Are tenants physically separated by cages?","Is tamper detection installed?","Can rack access be remotely revoked?"]
  },
  logic:{
    causeAndEffect:[{cause:"Server racks use standard mechanical key locks with a single master key shared among all facilities and engineering staff.",effect:"Any staff member can open any rack. No audit trail. Lost keys compromise all racks.",insight:"Electronic locks solve key management — revoking access is a software operation, not a lock change."},{cause:"Colocation tenants are co-located in an open-plan data hall with no physical cage separation between individual tenant zones.",effect:"Tenant A’s staff have physical access to Tenant B’s equipment. Insurance liability is ambiguous.",insight:"Physical cage separation resolves liability definitively. For premium tenants, the cage is a pre-condition of occupancy."},{cause:"A colocation facility has open racks in a shared data hall without cage partitions.",effect:"Any tenant\'s staff can physically access any other tenant\'s equipment — pull cables, remove drives, install devices. No per-tenant audit trail at rack level.",insight:"Open racks in shared environments are a commercial liability. Per-rack electronic locks or cage partitions are the minimum for multi-tenant data halls."}],
    constraintLesson:"Rack-level security in retrofit is constrained by the existing cable management infrastructure. Electronic locks require power and data cabling to each rack. Budget 40–60% of total cost for cabling and labour.",
    weakestLink:{whatsWrong:"Believing that CCTV cameras in data hall aisles provide rack-level security.",whatsRight:"CCTV shows someone standing at a rack — it doesn’t show what they’re doing inside the rack. The camera can’t see inside an open cabinet.",howToGetThere:"Deploy electronic locks on tenant-facing cabinets first. Add magnetic contacts for tamper detection. Integrate with DCIM."}
  },
  rhetoric:{declan:{hook:"We have 400 racks with barrel key locks and approximately 20 master keys floating around the facility. I cannot tell you where all of them are.",text:"We’ve got 400 racks with barrel key locks. There are maybe 20 master keys floating around. Every time someone leaves, we should change the locks but we never do. The cabling was the killer. Every rack needed a new PoE cable and a data cable for the electronic lock. In a 400-rack hall with no existing rack-level infrastructure, that was 800 new cable runs through full cable trays."},ann:{hook:"Electronic rack locks enable per-rack billing for colocation — a higher-margin product than cage or suite rental. The lock investment pays back in premium revenue, not just security improvement.",text:"Electronic rack locks enable per-rack billing for colocation — a higher-margin product. A tenant paying for individual rack access with audit trails will pay 15–20% more than a tenant sharing an open hall. The locks pay for themselves through premium pricing."},mark:{hook:"Electronic lock system requires UPS-backed power. Each controller draws 5 to 10 W. For 400 racks that is 2 to 4 kW of additional load — include it in the UPS capacity calculation.",text:"The electronic lock system needs UPS-backed power. Each controller draws 5–10W. 40 controllers = 400W. Negligible load but it needs UPS. Electronic rack locks must integrate with the central ACS — not operate standalone. Standalone locks create a separate credential management system that drifts out of sync with the main access policy."},sarah:{hook:"GDPR physical security extends to rack level for cabinets storing personal data. Electronic locks with per-event audit logs provide the access control evidence required under GDPR Article 32.",text:"GDPR physical security extends to the rack level for cabinets storing personal data. Electronic rack locks with audit logs satisfy this requirement. RFID asset tracking creates a chain of custody record. If a server containing personal data leaves the facility, you have a timestamped log showing when it left, through which door, and who was present. This supports GDPR breach investigation."},tom:{hook:"Full rack security for 400 racks: electronic locks 480 thousand euros, cabling 120 thousand euros, controller and software 80 thousand euros. Total 680 thousand euros — offset by per-rack premium revenue.",text:"Full rack security for 400 racks: electronic locks €480k, cabling €120k, controllers €40k, software €15k/yr, cage construction €80k, commissioning €25k. Total capex: ~€745k. Tier 3 — manufacturer published ranges (CPI, Chatsworth, Rittal), SCSI 2025, indicative. Cage partitions at €150–€250 per linear metre for a typical 12-rack cage (5m × 3m perimeter = 16 linear metres) cost €2,400–€4,000 per cage. Electronic locks at €800–€1,500 per rack cost €9,600–€18,000 for the same 12 racks. The commercial decision depends on tenant density."}},
  rhetoricTakeaways:{declan:"Electronic rack locks give us an audit trail down to the individual cabinet — when something changes in Rack 12, I know exactly who opened it and when.",ann:"Rack-level access control enables per-cabinet billing in colocation — every lock event is a chargeable touchpoint, and the audit trail protects both operator and tenant.",mark:"RFID asset tracking closes the last gap — the access log says who entered, the rack lock says which cabinet they opened, and RFID says what hardware they moved.",sarah:"ISO 27001 requires asset management. EN 50600-2-5 Class 3 requires per-rack audit trails. RFID tracking satisfies both with a single deployment.",tom:"Electronic lock retrofit: €800–€1,500 per rack installed (Tier 3 — CPI, Chatsworth, SCSI 2025, indicative). For 400 racks: €320,000–€600,000. Colocation cage with slab-to-slab partition: €15,000–€25,000 per cage."},
  scenario:{title:"Clonshaugh Rack Security Deployment",narrative:"400 racks with barrel key locks, 20 master keys in circulation. Financial services tenant requires electronic locks with individual audit trails.",question:"Phase a rack security deployment.",answer:"SITUATION: Clonshaugh has 400 racks with barrel key locks and 20 master keys in circulation. There is no audit trail of who accessed which rack and when. The financial services tenant has flagged this as a compliance failure for their PCI-DSS and SOC 2 requirements.\n\nCHALLENGE: Phase a rack security deployment across 400 racks that meets tenant compliance requirements without requiring a full data hall shutdown.\n\nSHOW THE FIX: Phase 1 (Hall A, 200 racks — months 1–4): Deploy electronic locks with card + PIN access, integrated with the building access control platform. Each rack gets an individually addressable lock with timestamped access logging. Cost: electronic locks (200 × €850) = €170,000, controllers and cabling €80,000, software licensing €50,000. Phase 1 total: approximately €300,000.\n\nPhase 2 (Hall B, 200 racks — months 5–8): Same specification. Phase 2 total: approximately €280,000 (lower per-unit cost from infrastructure already in place).\n\nTotal programme: approximately €580,000 across 8 months with zero rack downtime — locks are installed on energised racks during scheduled maintenance windows. Each phase delivers compliance for that hall independently. The audit trail eliminates the 20-master-key problem and provides the per-rack access records required for PCI-DSS Requirement 9 and SOC 2 CC6.4.\n\nSources: EN 50600-2-5:2021 Section 7 (T1); PCI-DSS v4.0 Requirement 9 (T1).",
whoShouldCare:["mark","tom","ann"]},
  sourceNote:"EN 50600-2-5:2021 Section 5.7. IEC 60839-11-1. ISO 27001:2022 Annex A Clause 7. Cost benchmarks: Tier 3 — manufacturer published ranges (CPI, Chatsworth, Rittal), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-001",level:"L8",topic:"Power distribution — rack PDU access"},{module:"DC-LEARN-009",level:"L5",topic:"DCIM — rack-level monitoring"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'Electronic locks + audit trail',available:'Barrel key locks (no audit)',unit:'Rack-level access',pass:false,detail:'Standard key locks with 20+ master keys. No per-rack audit trail, no remote revocation.'};}
},
{
  id:"L7",level:7,name:"CCTV, Surveillance & Monitoring",icon:"📹",
  component:"Surveillance Systems",available:true,
  clockQuote:"The calendar now had four colours. Red for regulatory deadlines. Black for descriptions. Blue for caveats. Green for security. Every colour was a system. Every system was connected to the others. The wall was becoming a programme.",
  userNeedStatement:"Understand modern CCTV and video surveillance requirements for data centre facilities",
  plainEnglish:"Modern DC surveillance uses IP cameras with video analytics — motion detection, person tracking, facial recognition. Retention periods are driven by EN 50600 class.",
  grammar:{
    facts:[{term:"IP camera (network camera)",definition:"A digital video camera that transmits video over an IP network. Supports PoE, remote config, and embedded analytics.",plain:"A camera that connects to the network like a computer — it sends digital video over Ethernet cables.",number:"Resolution: 2MP minimum general, 5MP+ for identification zones. Storage: 32 cameras × 90 days ≈ 72 TB. PoE: 15–25W/camera.",standard:"EN 50132-1; EN 50600-2-5:2021 Section 5.8",feynman:{analogy:"Think of it like upgrading from a film camera to a digital camera — the digital version has higher resolution, can be viewed remotely, stores images on a hard drive, and can be told to take a photo when it sees movement. IP cameras are the digital upgrade from analogue CCTV.",firstPrinciples:"Analogue cameras send a video signal over coax cable to a recorder. The resolution is fixed and low (about 0.4 megapixels). An IP camera sends digital video over Ethernet at 2-12 megapixels. It connects to the network like a computer, can be powered by the same cable (PoE), and supports software analytics.",theTest:"You understand IP cameras when you can answer: A 16-camera analogue system costs 8,000 euro to replace with IP — is it worth it? Answer: Yes, if identification-grade footage is required. Analogue at 0.4MP cannot identify a person; IP at 5MP with 100+ pixels per metre face width can."},soWhat:"An IP camera is only as useful as its storage and analytics pipeline — a camera without a VMS and retention policy is just a live feed no one watches."},{term:"Video Management System (VMS)",definition:"Software platform that receives, stores, manages, and displays video from IP cameras.",plain:"The software that controls all the cameras — live view, playback, search, export.",number:"VMS licence: €100–€300/camera (Tier 3 — Milestone, Genetec published ranges, indicative). NVR storage for 90 days at 32 cameras: ~100 TB raw with RAID 6.",standard:"EN 50132-7; IEC 62676-1-1",feynman:{analogy:"Think of it like the playlist app on your phone — it organises all your music, lets you search, create playlists, and share tracks. A VMS organises all your camera feeds: live view, search recordings by time or event, and export clips.",firstPrinciples:"Cameras generate video. Without a VMS, the video just piles up on a hard drive with no way to find anything useful. A VMS indexes every frame by time, camera, and detected events. When security needs footage from a specific door at a specific time, the VMS finds it in seconds instead of hours.",theTest:"You understand VMS when you can answer: An access control event shows someone entered the data hall at 02:17 — how does the VMS help? Answer: The VMS is integrated with access control. It automatically bookmarks the camera footage at that door at 02:17 and presents it with one click."},soWhat:"The VMS is the intelligence layer that turns raw video into searchable, retrievable evidence — without it, reviewing 90 days of 32 cameras is practically impossible."},{term:"Video analytics",definition:"Software-based analysis of video streams to detect events of interest: motion, person, facial recognition, loitering.",plain:"Smart software that watches cameras for you — spots people, detects loitering, alerts on open doors.",number:"Edge analytics: basic motion. Server analytics: facial recognition, requires GPU server (€5,000–€15,000 — Tier 3, manufacturer published ranges). AI-based detection reduces false alarm rate by 70–90% vs motion detection. Processes 16–32 camera feeds per analytics server. False positive rate <5%.",standard:"EN 50132-7; IEC 62676-4",feynman:{analogy:"Think of it like a dog that barks when a stranger approaches but ignores the family cat. Video analytics watches the camera feed and alerts only when it sees something that matters — a person where there should not be one, or someone loitering near the generator compound.",firstPrinciples:"A human guard watching 32 cameras loses focus after 20 minutes. Analytics software watches all 32 feeds continuously and never loses focus. It detects motion, classifies objects (person vs animal vs vehicle), and triggers alerts based on rules. The software never gets tired or distracted.",theTest:"You understand video analytics when you can answer: A facility has 32 cameras monitored by one guard — is a person detected faster with or without analytics? Answer: With analytics. The guard gets a pop-up alert within seconds. Without it, the guard must spot the person on one of 32 simultaneous feeds."},soWhat:"Analytics convert CCTV from reactive to proactive — the system detects the behaviour before it becomes an incident, not after."},{term:"ONVIF protocol",definition:"Open Network Video Interface Forum — a standardised protocol for IP security cameras ensuring interoperability between cameras, NVRs, and management platforms from different manufacturers.",plain:"A common language that lets cameras from one brand talk to recording systems from another. No vendor lock-in.",number:"Profile S (streaming), Profile G (recording), Profile T (advanced H.265). Over 20,000 conformant products from 500+ manufacturers.",standard:"ONVIF Profile S/G/T; IEC 62676-2-3",feynman:{analogy:"Think of it like USB — before USB, every printer needed its own cable. ONVIF does for CCTV what USB did for peripherals: one standard interface that any camera and any recorder can use.",firstPrinciples:"A data centre may have cameras from 3 manufacturers installed over 10 years. Without a common protocol, each requires its own management software. ONVIF provides a standardised API so any conformant camera works with any conformant NVR.",theTest:"You understand ONVIF when you can answer: Clonshaugh wants to replace 20 analogue cameras with IP cameras but keep the existing NVR — what should they specify? Answer: ONVIF Profile S conformant cameras to ensure integration regardless of manufacturer."},soWhat:"ONVIF prevents vendor lock-in — any ONVIF-compliant camera works with any ONVIF-compliant VMS, protecting the operator's investment across hardware generations."},{term:"CCTV retention period",definition:"The duration for which recorded video footage is stored before automatic deletion, determined by regulatory requirements, contractual obligations, and storage capacity.",plain:"How long you keep the camera recordings before they are automatically deleted. Too short and you lose evidence; too long and you breach data protection laws.",number:"EN 50600-2-5 Class 3: minimum 30 days. Financial services tenants: typically 90 days. GDPR maximum: purpose-limited. Storage: ~1 TB per camera per 30 days at 4K/15fps.",standard:"EN 50600-2-5:2021; GDPR Articles 5(1)(e), 17; DPC Guidance on CCTV (Ireland)",feynman:{analogy:"Think of it like a security logbook — you need to keep it long enough to investigate any incident that is reported late, but not so long that you are hoarding personal data without justification.",firstPrinciples:"Video footage is personal data under GDPR. Storing it requires a lawful basis, which expires when the purpose is fulfilled. The retention period must balance three forces: regulatory minimums (EN 50600 — 30 days), contractual demands (tenants — often 90 days), and data protection maximums (GDPR — no longer than necessary).",theTest:"You understand CCTV retention when you can answer: A tenant requires 180-day retention but GDPR says no longer than necessary — how do you resolve this? Answer: Conduct a DPIA documenting why 180 days is necessary for the specific use case. If justified, document and implement. If not, negotiate to the justified maximum."},soWhat:"The retention period is where security obligations and data protection law collide — get it wrong in either direction and you face either an evidence gap or a GDPR fine."}],
    whatItLooksLike:"A modern DC CCTV system shows IP cameras at every entrance, corridor junction, and data hall aisle. The VMS displays on a video wall with automatic pop-ups for access events.",
    siteChecklist:["Are all cameras IP (not analogue)?","Is resolution ≥2MP at identification zones?","Is retention ≥90 days for Class 3?","Is VMS integrated with access control?","Are cameras on UPS-backed power and separate VLAN?"]
  },
  logic:{
    causeAndEffect:[{cause:"A legacy facility has analogue cameras on a 16-channel DVR with 30-day retention.",effect:"Image quality insufficient for identification. 30-day retention fails Class 3. DVR failure loses all footage.",insight:"The analogue-to-IP migration is the single most impactful CCTV upgrade. Budget €1,500–€3,000 per camera position (Tier 3 — Axis published ranges, indicative)."},{cause:"CCTV cameras installed in the data hall are connected to the same network VLAN as the live IT equipment and servers.",effect:"A compromised CCTV camera becomes a direct network entry point into the data hall LAN, exposing all connected IT equipment.",insight:"CCTV must be on a physically or logically separated network. Best practice: dedicated VLAN with firewall rules."},{cause:"CCTV cameras are installed at 2.4m height but the suspended ceiling void (1.5m deep) above the data hall partition is unmonitored.",effect:"An intruder or insider can access the ceiling void and move between security zones above camera coverage. The void is a blind spot.",insight:"In retrofit facilities, the ceiling void is the most commonly overlooked surveillance gap. A single PTZ camera per 100m² of ceiling void costs €2,000–€4,000 (Tier 3 — Axis published ranges, indicative) and closes the gap."}],
    constraintLesson:"CCTV retrofit is constrained by cabling capacity and PoE power budget. IP cameras require Cat6 cabling to each position. PoE budget: 48-port switch provides 740W total.",
    weakestLink:{whatsWrong:"Believing that more cameras means better security.",whatsRight:"Camera placement design is more important than count. Ten well-placed cameras with analytics outperform thirty poorly placed ones.",howToGetThere:"Commission a CCTV design from a specialist. The key metric: pixel density at identification zones (≥100 pixels per metre face width)."}
  },
  rhetoric:{declan:{hook:"Our analogue CCTV works — I can see who is at the front door. But when we had an incident last year I could not retrieve the footage from the week before because the DVR storage was full.",text:"Our analogue system works — I can see who’s at the front door. But when we had an incident, the footage was useless for identification. I watched the guard monitoring 48 feeds for 20 minutes. After 12 minutes, he was staring at one screen without looking at the others. That is attention fatigue."},ann:{hook:"CCTV is a foundation investment. Once IP cameras are in place, analytics can be added incrementally. The infrastructure investment enables every subsequent security upgrade at marginal cost.",text:"CCTV is a foundation investment — once IP cameras are in, analytics can be added incrementally as tenant requirements evolve. A video analytics platform costs €40,000–€80,000 for 64 cameras (Tier 3 — Milestone, Genetec published ranges, indicative). It replaces the second monitoring officer on night shift — saving €45,000–€55,000/year (Tier 3 — SCSI salary benchmarks 2025). Payback: 12–18 months."},mark:{hook:"For 32 cameras at 5MP, 15fps, 90 days retention with H.265 compression: approximately 30 TB storage required. RAID 6 overhead adds 25 percent. Total storage system: 38 TB minimum.",text:"For 32 cameras: 32 × 5MP × 15fps × 90 days × H.265 ≈ 30 TB compressed. RAID 6 overhead adds ~25%. Budget 40 TB usable. NVR cost: €8,000–€18,000 (Tier 3 — manufacturer published ranges, indicative)."},sarah:{hook:"CCTV recording is personal data processing under GDPR. The facility needs signage, a privacy notice, a retention schedule, and a subject access request procedure — all documented before go-live.",text:"CCTV recording is personal data processing under GDPR. The facility needs signage, a retention policy, access request procedures, and a DPIA if facial recognition is deployed. Video analytics generates metadata — time, location, behaviour type. Under GDPR, this is personal data processing. The DPIA must cover analytics, not just cameras."},tom:{hook:"Full CCTV upgrade for Clonshaugh at 32 cameras: IP cameras 38 thousand euros, NVR and storage 18 thousand euros, cabling and installation 25 thousand euros, VMS licence 8 thousand euros. Total 89 thousand euros.",text:"Full CCTV upgrade for Clonshaugh (32 cameras, Tier 3 — Axis, Milestone, SCSI 2025, indicative): cameras €48k, cabling €32k, PoE switches €8k, NVR €18k, VMS licences €6k, analytics €8k, labour €15k, commissioning €5k. Total: ~€140k. Budget analytics at 25–35% of total CCTV hardware cost. A €120k camera installation needs a €30k–€42k analytics budget."}},
  rhetoricTakeaways:{declan:"Thirty-two cameras generating 90 days of footage means nothing if I cannot search it — the VMS is what turns recordings into usable evidence.",ann:"Identification-grade CCTV is an insurance condition for most DC policies — cameras that record movement but not faces do not meet the evidential standard.",mark:"Camera specification starts with the use case: detection (wide-angle, 25 px/m) versus identification (narrow, 125 px/m). Most facilities need both, in different zones.",sarah:"CCTV retention is where EN 50600 and GDPR collide — 90-day retention is operationally desirable but must be justified under GDPR purpose limitation. A DPIA is essential.",tom:"Full CCTV upgrade (32 IP cameras + VMS + analytics + 90-day storage): €120,000–€180,000 (Tier 3 — Axis, Milestone, SCSI 2025, indicative). Maintenance: 10–15% of capex per year."},
  scenario:{title:"Clonshaugh CCTV Migration",narrative:"16 analogue cameras on a single DVR with 30-day retention. Poor image quality. Tenant requires 90-day retention and identification-grade resolution.",question:"Design the IP CCTV migration.",answer:"SITUATION: Clonshaugh has 16 analogue cameras on a single DVR with 30-day retention. Image quality is insufficient for facial identification. The financial services tenant requires 90-day retention with identification-quality imagery at all entry points and within the data halls.\n\nCHALLENGE: Design an IP CCTV migration that delivers identification-quality coverage with 90-day retention while reusing existing cable routes where possible.\n\nSHOW THE FIX: Deploy 32 IP cameras: 16 × 5MP (perimeter, entries, corridors — identification quality at 100 pixels/m face width per BS EN 62676-4) and 16 × 2MP (data hall aisle overview — recognition quality). Network video recorder: 48 TB usable in RAID 6 configuration, providing 90+ days retention at H.265 compression with continuous recording.\n\nAdd video analytics on perimeter cameras (line crossing, loitering detection) and entry cameras (tailgate detection) integrated with the access control alarm panel. Existing Cat5e cable routes can carry IP cameras with PoE switches — no new containment required for 24 of 32 positions.\n\nCost: cameras and lenses €38,000, NVR and storage €18,000, PoE switches €8,000, analytics licences €12,000, installation and commissioning €16,000. Total: approximately €92,000 (Tier 3 — CCTV integrator estimates). The 90-day retention with identification quality satisfies both the tenant SLA and the EN 50600-2-5 Class 3 surveillance requirement.\n\nSources: EN 50600-2-5:2021 Section 6.5 (T1); BS EN 62676-4 video surveillance design (T1).",
whoShouldCare:["mark","tom"]},
  sourceNote:"EN 50132-1. EN 50600-2-5:2021 Section 5.8. IEC 62676-1-1. GDPR Articles 13, 35. Cost benchmarks: Tier 3 — manufacturer published ranges (Axis, Milestone, Genetec), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-009",level:"L6",topic:"DCIM video feed integration"},{module:"DC-LEARN-008",level:"L5",topic:"Fire detection — visual verification"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'IP cameras + 90-day retention',available:'Analogue (30-day, poor quality)',unit:'CCTV capability',pass:false,detail:'Analogue cameras on DVR. 30-day retention (Class 3 requires 90). No analytics. No access control integration.'};}
