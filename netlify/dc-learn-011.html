<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
</style>

const LEVELS = [
{
  id:"L1",level:1,name:"Security Zones & Defence-in-Depth",icon:"🛡️",
  component:"Zoning Framework",available:true,
  clockQuote:"He knew every zone, every badge reader, every camera position. He'd managed access for ten years. But when the auditor asked for the map, the only map was in his head — and a map that lives in one person's head is a map that leaves when they do.",
  userNeedStatement:"Understand how data centres layer physical security from public boundary to IT equipment",
  plainEnglish:"A data centre organises security in concentric rings — each ring harder to penetrate than the last. EN 50600-2-5 defines four protection classes. Most legacy Irish DCs were built to Class 1 or 2 and now need Class 3 for colocation tenancy.",
  grammar:{
    facts:[{term:"EN 50600-2-5",definition:"European standard specifying physical security measures for data centres, defining four protection classes (1–4) with increasing security requirements for access control, intrusion detection, and surveillance.",plain:"The European rulebook that grades DC security on a 1-to-4 scale — 1 is basic, 4 is military-grade.",number:"4 protection classes. Class 3 requires controlled access zones, interlocking doors, and CCTV with 90-day retention.",standard:"EN 50600-2-5:2021",feynman:{analogy:"Think of it like a restaurant health inspection grading — A, B, C, D. EN 50600-2-5 grades your data centre security from Class 1 (the minimum) to Class 4 (the maximum). Your tenants check the grade before signing the lease.",firstPrinciples:"Every building has some level of physical security, even if it is just a locked front door. EN 50600-2-5 takes this basic idea and defines exactly what good looks like at four levels, from simple locks up to blast-rated walls. Class 3 is the standard most Irish colocation tenants now demand.",theTest:"You understand EN 50600-2-5 when you can answer: A facility has biometric readers on the data hall but no interlocking doors and analogue CCTV with 30-day retention — what Class is it? Answer: Class 1 or 2 at best, because Class 3 requires interlocking doors AND 90-day retention as a system."},soWhat:"EN 50600-2-5 is the benchmark tenants and insurers use to evaluate your facility — it determines lease terms, insurance premiums, and regulatory compliance posture."},{term:"Defence-in-depth",definition:"A security strategy employing multiple layers of protection so that failure of any single layer does not compromise the protected asset. In DC context: perimeter → building → corridor → data hall → rack.",plain:"If someone gets past the fence, they still need to get past the door, then the mantrap, then the data hall lock, then the rack lock. No single failure opens the path.",number:"Minimum 5 security layers in a Class 3 facility: perimeter, building envelope, controlled lobby, data hall, rack/cage.",standard:"EN 50600-2-5:2021 Table 1; ISO 27001:2022 Annex A Clause 7",feynman:{analogy:"Think of it like the layers of security at an airport — you pass through a ticket check, then bag screening, then passport control, then a gate check. No single layer catches everything, but together they make it very hard to get through unchecked.",firstPrinciples:"One lock on one door can be picked or forced. Two different locks on two different doors doubles the effort an intruder needs. Defence-in-depth applies this principle across five or more layers — fence, building, lobby, data hall, rack — each with a different type of barrier.",theTest:"You understand defence-in-depth when you can answer: If someone clones a magnetic stripe access card, how many layers can they bypass in a Class 3 facility? Answer: Only the layers using that card type — the biometric reader at the data hall and the electronic rack lock still block them."},soWhat:"A single security layer always fails eventually — defence-in-depth ensures that when one layer is breached, the next layer detects and delays the attacker."},{term:"Security zone",definition:"A physically bounded area within a data centre with a defined access policy, monitoring level, and audit trail.",plain:"A named area with its own set of rules about who gets in, how they’re watched, and how entry is recorded.",number:"Typical zoning: Zone 0 (public), Zone 1 (reception/office), Zone 2 (controlled corridor), Zone 3 (data hall), Zone 4 (critical infrastructure).",standard:"EN 50600-2-5:2021 Section 5.2",feynman:{analogy:"Think of it like the rooms in a hospital — the public waiting area, the staff corridor, the operating theatre, and the pharmacy all have different rules about who can enter. Each room is a zone with its own access policy.",firstPrinciples:"A building is one big space until you draw boundaries inside it. Each boundary creates a zone. Each zone gets its own rules: who can enter, how they prove their identity, and how their entry is recorded. The more sensitive the contents, the stricter the zone rules.",theTest:"You understand security zones when you can answer: A cleaner has a Zone 1 badge but needs to clean the data hall (Zone 3) — what should happen? Answer: The cleaner cannot enter Zone 3 with a Zone 1 badge. They need an escort with Zone 3 credentials, and the escort logs the entry."},soWhat:"Zones define where people can and cannot go — every zone transition is a control point where identity is verified and access is logged."},{term:"Protection class",definition:"EN 50600-2-5 classification (1–4) defining the minimum security measures required. Class 1 = basic (deterrence), Class 2 = controlled (delay), Class 3 = high (detection + delay + response), Class 4 = very high.",plain:"A grade for how seriously you take security — from ‘locked doors’ up to ‘armed response and blast-rated walls.’",number:"Class 1 has 8 minimum requirements. Class 3 has 23. Class 4 adds ballistic protection and anti-surveillance measures.",standard:"EN 50600-2-5:2021 Table 1",feynman:{analogy:"Think of it like car insurance groups — Group 1 is a basic runabout with a steering lock, Group 50 is a supercar with a tracker, immobiliser, and secure garage requirement. Higher protection class means more security measures required.",firstPrinciples:"Not every building needs the same level of security. A garden shed and a bank vault protect different things. EN 50600-2-5 defines four classes so that the security investment matches the risk. Class 3 has 23 specific requirements that must all be met — missing even one means you are not Class 3.",theTest:"You understand protection classes when you can answer: A facility meets 22 of the 23 Class 3 requirements but has no intruder alarm — what class is it? Answer: It is not Class 3. Protection class is pass/fail on all requirements, not a score out of 23."},soWhat:"The protection class sets the minimum security investment — it determines which technologies, procedures, and staffing levels are contractually required."},{term:"NIS2 Directive (DC Security Obligations)",definition:"EU Directive 2022/2555 classifying data centres as essential digital infrastructure, requiring physical and cyber security risk management, 24-hour incident reporting, and management board accountability.",plain:"The EU cybersecurity law making DC operators personally responsible for security. Ireland expects transposition via the National Cyber Security Bill in 2026.",number:"Fines up to €10M or 2% of global turnover (NIS2 Directive, Tier 1 — EU legislation). 24-hour initial incident notification. Ireland: 4,500–6,000 organisations in scope.",standard:"EU Directive 2022/2555 (NIS2); Irish National Cyber Security Bill (pending)",feynman:{analogy:"Think of it like building regulations for fire safety — before the regulations, you decided how seriously to take it. After, it is a legal obligation with fines. NIS2 does for cybersecurity what building regs did for fire.",firstPrinciples:"Previously, DC security was a commercial decision. NIS2 makes it a legal requirement for essential entities. The directive requires risk management measures, incident reporting, and supply chain security. The Irish NCSC will be the competent authority.",theTest:"You understand NIS2 when you can answer: A facility manager discovers a physical security breach at 2 AM — under NIS2, what must happen? Answer: Initial notification to the NCSC within 24 hours, full report within 72 hours. The management board is personally accountable."},soWhat:"NIS2 makes physical security a legal obligation for data centre operators — non-compliance triggers fines up to 2% of global turnover or €10 million (Tier 1 — NIS2 Directive)."}],
    whatItLooksLike:"In a well-zoned facility, you pass through visibly different security environments as you move inward.",
    siteChecklist:["Can you identify at least 4 distinct security zones on the floor plan?","Does each zone have its own access credential type?","Are zone boundaries physically enforced (walls floor-to-slab)?","Is there a documented access policy for each zone?","Are interlocking doors (mantraps) present between Zone 2 and Zone 3?"]
  },
  logic:{
    causeAndEffect:[{cause:"A legacy data centre uses a single card-swipe access control system that applies the same credential to all areas of the facility.",effect:"Every employee, visitor, and contractor with a badge has physical access to IT equipment. No zone separation means a stolen badge compromises the entire facility.",insight:"Zone separation isn’t just about adding more locks — it’s about ensuring that access to each ring requires a different credential type."},{cause:"Partition walls between zones stop at the suspended ceiling rather than extending to the structural slab.",effect:"An intruder can climb above the ceiling tiles and bypass the access-controlled door entirely.",insight:"EN 50600-2-5 Class 3 requires zone boundaries to be slab-to-slab. During retrofit, this is often the most disruptive physical upgrade."},{cause:"A facility pursues EN 50600 Class 3 certification but has no documented zoning plan.",effect:"The certification audit fails at the first gate — the assessor requires a zoning drawing showing each protection class boundary.",insight:"Start with the zoning plan, not the equipment. The plan defines what you need; the equipment delivers it."}],
    constraintLesson:"The fundamental constraint in DC security zoning is the tension between operational access and security isolation. Data centres require frequent physical access — for maintenance, hardware deployment, cabling, cleaning, and incident response. Every security layer adds time and friction.\\n\\nThe engineering challenge is designing security zones that are robust against intrusion but do not impede legitimate operational workflows.\\n\\nIn retrofit, the additional constraint is that zone boundaries must be constructed around live IT systems.",
    weakestLink:{whatsWrong:"Believing that upgrading access card readers to biometric readers upgrades the facility from Class 1 to Class 3.",whatsRight:"Protection class is a system-level assessment — it requires zoning, physical barriers, interlocking doors, CCTV, intrusion detection, AND access control working together.",howToGetThere:"Commission a gap analysis against EN 50600-2-5 Class 3 requirements (€5,000–€10,000, Tier 2 — RICS NRM1 fee benchmarks, indicative). Produce a zoning plan. Prioritise slab-to-slab partition upgrades."}
  },
  rhetoric:{declan:{hook:"I have been managing this facility since it opened and we have never had a security breach. But nobody has ever formally assessed whether the current measures would prevent one.",text:"I’ve been managing this facility since it opened. We’ve never had a security breach. But the new tenant is asking for EN 50600 Class 3 and our insurance underwriter wants documented zones. The new tenant due diligence process now starts with the zoning plan before they even look at rack space. If you cannot show them documented zones with separate credential types, the conversation ends."},ann:{hook:"Security upgrade costs are real — 200 to 500 thousand euros for a mid-size retrofit. But the cost of a single breach in a regulated DC environment is typically 10 to 50 times that.",text:"Security upgrade costs are real — €200k to €500k for a mid-size retrofit (Tier 3 — SCSI/manufacturer benchmarks, indicative). But the commercial consequence of losing a financial services tenant over an EN 50600 gap is worse. NIS2 changes the cost-benefit equation. Security upgrades that used to be optional are now compliance requirements. The penalty for non-compliance — up to €10M or 2% of global turnover (Tier 1 — NIS2 Directive 2022/2555) — dwarfs the retrofit cost."},mark:{hook:"EN 50600-2-5 Class 3 requires slab-to-slab boundaries, interlocking entry at data hall level, and two-factor authentication. Document the gaps against each requirement before specifying the solution.",text:"EN 50600-2-5 Class 3 requires slab-to-slab boundaries, interlocking entry at data hall level, and 90-day CCTV retention. At Clonshaugh, the suspended ceiling void above the current data hall partition is the single biggest vulnerability. The gap between Class 2 and Class 3 is not incremental — it is systemic. Class 3 requires every element working together as a system. You cannot upgrade piecemeal and claim compliance."},sarah:{hook:"ISO 27001:2022 Annex A Clause 7 is the audit framework most institutional tenants reference. EN 50600-2-5 provides the physical engineering standard. Both must be satisfied for the compliance file.",text:"ISO 27001:2022 Annex A Clause 7 is the audit framework our tenants reference. EN 50600-2-5 gives us the engineering standard to build against. The Irish NCSC will be the competent authority under NIS2. Data centres are classified as essential digital infrastructure. Board members are personally accountable for security governance."},tom:{hook:"A full security retrofit to EN 50600-2-5 Class 3 at 300 to 500 euros per square metre of data hall area. At Clonshaugh that is a defined programme budget — not an open-ended spend.",text:"A full security retrofit to Class 3 runs €300–€500 per m² of data hall floor area. That’s €150k–€250k for a 500 m² hall. Budget: Tier 3 — manufacturer benchmarks (Gallagher, Axis), Irish DC market 2025. A full Class 3 zoning implementation runs €150k–€300k depending on slab-to-slab partition requirements. The cost per rack works out at €375–€750 for a 400-rack facility — typically less than one month of rack revenue."}},
  rhetoricTakeaways:{declan:"Zones are the skeleton of the security system — every upgrade, every audit, every response procedure hangs on the zone structure you set up first.",ann:"Protection class is a lease condition, not a technical preference — if your facility cannot demonstrate Class 3, you lose the financial services tenants that pay premium rents.",mark:"EN 50600-2-5 is not a checklist — it is a system-level assessment. Upgrading one component without addressing the zone structure gets you nowhere.",sarah:"NIS2 makes physical security a regulatory requirement for essential entities — the transition window is closing, and non-compliance fines are material.",tom:"A gap analysis against EN 50600-2-5 Class 3 costs €5,000–€10,000 (Tier 2 — RICS NRM1 fee benchmarks, indicative) and produces the entire scope of work for the security upgrade. It is the first spend."},
  scenario:{title:"Clonshaugh Security Zone Assessment",narrative:"Clonshaugh’s original 2013 build has a single magnetic stripe card system. Partition walls stop at the suspended ceiling (2.7m) rather than the structural slab (4.2m). The largest tenant has issued a request for EN 50600-2-5 Class 3 compliance evidence.",question:"How many EN 50600-2-5 Class 3 requirements does Clonshaugh currently fail?",answer:"SITUATION: Clonshaugh was built in 2013 with a single magnetic stripe card system across the entire facility — 400 racks, 2.4 MW IT load, no security zoning. Partition walls stop at the suspended ceiling, meaning anyone with a card can access any part of the building including both data halls.\n\nCHALLENGE: EN 50600-2-5 Class 3 requires a minimum of four security zones (public, controlled, restricted, high-security) with progressively stronger access controls at each boundary. How many Class 3 requirements does Clonshaugh currently fail?\n\nSHOW THE FIX: Seven major gaps exist. (1) No zoning plan — single card gives universal access. (2) Single-factor authentication only — Class 3 requires two-factor at Zone 3+. (3) No mantrap or airlock at building entry — tailgating is uncontrolled. (4) Partition walls stop at ceiling — physical boundaries do not extend slab-to-slab. (5) No anti-passback — a card can be shared without detection. (6) No CCTV analytics integration with access control. (7) No differentiated hall access despite different tenant risk profiles.\n\nThe remediation cost to close all seven gaps is estimated at €850K–€1.1M (Tier 3 — EN 50600 security integrator market rates, indicative). The alternative is losing financial services tenants who require Class 3 certification — at Clonshaugh, that represents approximately €1.2M per year in revenue.\n\nSources: EN 50600-2-5:2021 Table 1 (T1); CPNI Physical Security Guide (T2).",
whoShouldCare:["mark","declan","sarah"]},
  sourceNote:"EN 50600-2-5:2021. ISO 27001:2022 Annex A Clause 7. Cost benchmarks: Tier 3 — manufacturer catalogues (Gallagher, Axis, Genetec), Irish DC market 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-003",level:"L2",topic:"Redundancy topology"},{module:"DC-LEARN-008",level:"L1",topic:"Fire compartmentation"}],

{
  id:"L2",level:2,name:"Perimeter Security & Site Boundary",icon:"🏗️",
  component:"Site Perimeter",available:true,
  clockQuote:"Three metres of corridor. Inside the fire compartment but outside the access zone. It didn't matter in practice — nobody went there. But the audit didn't measure practice. It measured alignment. And the lines didn't align.",
  userNeedStatement:"Understand the first physical layer of DC defence — the site boundary",
  plainEnglish:"The perimeter is the first thing an intruder encounters. A 2.4m palisade fence from 2013 does not meet current hostile vehicle mitigation requirements.",
  grammar:{
    facts:[{term:"Hostile Vehicle Mitigation (HVM)",definition:"Physical barriers designed to prevent vehicle-borne attacks. Rated to PAS 68/IWA 14-1.",plain:"Bollards or barriers that stop a truck from driving through the perimeter.",number:"PAS 68 V/7500(N2)/48/90:0 = stops a 7,500 kg truck at 48 km/h with zero penetration.",standard:"PAS 68:2013; IWA 14-1:2013",feynman:{analogy:"Think of it like the concrete planters outside a busy shopping street — they look decorative, but they are engineered to stop a truck. HVM bollards at a data centre do the same job: they stop a vehicle from reaching the building or generator compound.",firstPrinciples:"A standard car park barrier lifts to let vehicles through — it is designed for convenience, not resistance. A bollard rated to PAS 68 is a steel post set in reinforced concrete, tested by driving a 7,500 kg truck into it at 48 km/h. If the truck stops and the bollard stays, it passes.",theTest:"You understand HVM when you can answer: A facility has a rising arm barrier at the vehicle entrance — does this provide hostile vehicle mitigation? Answer: No. A rising arm barrier provides access control but zero resistance to a vehicle that drives through it."},soWhat:"HVM converts a low-cost, high-consequence attack vector into a problem that requires significant planning to execute — the bollard buys time the response team needs."},{term:"Perimeter Intrusion Detection System (PIDS)",definition:"Electronic detection system installed on or near the perimeter fence to detect climbing, cutting, or lifting.",plain:"An alarm system on the fence that tells you someone is trying to get over, under, or through it.",number:"Detection probability ≥95% with nuisance alarm rate <1 per day per 100m zone.",standard:"EN 50131-1:2006; EN 50132-7",feynman:{analogy:"Think of it like a burglar alarm on your house — but for the garden fence instead of the front door. It tells you someone is trying to get over the fence before they reach the building.",firstPrinciples:"A fence delays an intruder, but it cannot tell you the intruder is there. A sensor on the fence detects the vibration of climbing or cutting. The sensor sends a signal to the control room. The guard checks the camera. The whole sequence — detect, verify, respond — happens while the intruder is still on the fence.",theTest:"You understand PIDS when you can answer: Clonshaugh has a 2.4m palisade fence but no PIDS — is the perimeter secure? Answer: No. The fence provides delay (30-60 seconds) but no detection. Without PIDS, nobody knows the fence is being breached until the intruder is already inside."},soWhat:"Without PIDS, a fence is a delay mechanism with no alarm — an attacker crossing at night is detected only if they happen to walk past a camera."},{term:"Clear zone",definition:"A sterile area on both sides of the perimeter fence, kept clear of vegetation and equipment.",plain:"Empty ground either side of the fence so cameras can see it and sensors can work.",number:"Minimum 3m clear zone each side per EN 50600-2-5 Class 3.",standard:"EN 50600-2-5:2021 Section 5.3",feynman:{analogy:"Think of it like mowing the grass around a campfire — you clear the ground so you can see anything approaching. A clear zone around a fence serves the same purpose: clear sightlines for cameras and no false alarms from bushes.",firstPrinciples:"Cameras need line of sight. Fence sensors need stable conditions. If vegetation grows against the fence, cameras see leaves instead of intruders and sensors trigger on wind instead of climbing. A 3-metre clear strip on each side of the fence solves both problems.",theTest:"You understand clear zones when you can answer: A PIDS system generates 5 false alarms per day — what is the most likely cause? Answer: Vegetation or loose materials in the clear zone. The fix is grounds maintenance, not new sensors."},soWhat:"The clear zone is where delay becomes detection — vegetation, equipment, or debris in the zone creates blind spots that negate the entire detection system."},{term:"Perimeter lighting",definition:"Security lighting illuminating the perimeter fence line and clear zone to minimum 50 lux at ground level for CCTV identification and deterrence.",plain:"Bright lights along the fence so cameras can see and intruders feel exposed.",number:"50 lux minimum at ground level for Class 3. LED with photocell and battery backup. Lamp spacing 15–20m.",standard:"EN 50600-2-5:2021 Section 5.3; BS 5489-1:2020",feynman:{analogy:"Think of it like floodlights on a football pitch — they make everything visible. Perimeter lighting does the same for the fence line. Without it, your cameras are recording darkness.",firstPrinciples:"CCTV cameras need light to produce usable images. At night, an unlit fence is invisible. 50 lux at ground level provides enough contrast for a camera to distinguish a person from background.",theTest:"You understand perimeter lighting when you can answer: A facility has excellent CCTV but perimeter lights were switched off to save energy — what happened? Answer: CCTV became blind at night. The entire detection capability was disabled to save approximately €2,000/year (indicative, teaching illustration)."},soWhat:"Lighting converts CCTV from recording shadows to recording identifiable faces — the 50 lux minimum is the threshold for evidential-grade footage at the perimeter."},{term:"Anti-climb topping",definition:"Physical deterrent at the top of a perimeter fence to delay climbing — rotating barbed tape, Y-section outriggers with concertina wire, or cranked arms.",plain:"The sharp, rotating, or angled sections at the top of a fence that make climbing over painful and difficult.",number:"Adds 15–30 seconds to a climb attempt. Y-section extends effective height by 0.6m to 3.0m total. Razor tape rated to BS EN 10223-7.",standard:"EN 50600-2-5:2021; BS EN 10223-7",feynman:{analogy:"Think of it like a thorny hedge at the top of a garden wall — it does not make the wall taller, but makes going over it much harder.",firstPrinciples:"A fence creates delay. Anti-climb topping extends that delay. The extra time allows PIDS to detect, CCTV to verify, and a guard to respond. Without topping, a fit person scales a 2.4m palisade in under 30 seconds.",theTest:"You understand anti-climb topping when you can answer: Which matters more — the extra 0.6m of height or the extra 30 seconds of delay? Answer: The extra time. Security works on time budgets: detect-verify-respond must complete before the intruder reaches the asset."},soWhat:"Anti-climb topping is the cheapest delay multiplier on the perimeter — a €5/m addition (Tier 3 — manufacturer published ranges) converts a 10-second climb into a 60-second ordeal that triggers PIDS."}],
    whatItLooksLike:"A properly secured perimeter shows a continuous fence line with anti-climb features, no vegetation touching the fence, clear sightlines for cameras, and HVM bollards at vehicle approach points.",
    siteChecklist:["Is the fence height ≥2.4m with anti-climb topping?","Is there a clear zone of ≥3m on both sides?","Are HVM measures present at vehicle entry points?","Is PIDS installed and operational?","Are CCTV cameras covering the full fence line?"]
  },
  logic:{
    causeAndEffect:[{cause:"Vegetation is allowed to grow against the perimeter fence and into the clear zone over several years without maintenance.",effect:"PIDS generates constant false alarms. Security staff begin ignoring alarms. The detection system is effectively disabled.",insight:"Perimeter maintenance is a security function. A clear zone maintenance schedule costs €2,000–€4,000/year (Tier 3 — SCSI 2025, indicative) and preserves a €50,000+ PIDS investment."},{cause:"A legacy facility has no hostile vehicle mitigation measures installed at the primary vehicle entrance from the public road.",effect:"A vehicle at 30 km/h can pass through a standard rising arm barrier. Generator compounds adjacent to the vehicle route are unprotected.",insight:"HVM is increasingly required by insurance underwriters. PAS 68-rated bollards cost €1,500–€3,000 per bollard installed (Tier 3 — manufacturer published ranges, indicative)."},{cause:"Perimeter security lighting is switched off during the night shift as a cost-saving measure without consideration of security impact.",effect:"CCTV cameras record unusable images. Guards cannot visually verify PIDS alerts. The entire perimeter detection system is degraded.",insight:"Perimeter lighting costs €3,000–€5,000/year (Tier 3 — SCSI 2025, indicative). The detection system it supports costs €50,000+ (Tier 3 — Gallagher, Optex published ranges). Switching off lights to save €5k disables a €50k investment."}],
    constraintLesson:"Perimeter security in Irish DC retrofits faces a specific constraint: many facilities are on industrial estates with shared boundaries and neighbouring buildings within metres of the fence.\\n\\nThe practical approach is to define what you can control and layer additional detection within the site where external constraints limit perimeter hardening.",
    weakestLink:{whatsWrong:"Believing that a tall fence with razor wire provides adequate perimeter security.",whatsRight:"A fence delays an intruder by 30–60 seconds. Without detection (PIDS) and response, the delay is wasted. The fence is the delay component of a detect-delay-respond system.",howToGetThere:"Install PIDS on the existing fence (€150–€300/linear metre, Tier 3 — Gallagher, Optex published ranges, indicative). Ensure CCTV covers the full fence line. Connect PIDS alarms to the monitoring station with <30 second response protocol."}
  },
  rhetoric:{declan:{hook:"Our fence is standard 2.4 metre palisade with razor wire. The insurance assessor asked when the last PIDS detection probability test was done. Nobody could answer.",text:"Our fence is fine — 2.4m palisade, razor wire on top. But the insurance assessor asked about detection and response times, and I had to admit we’d only know about a breach when someone noticed on the cameras. The eastern boundary is the problem. Next door is a logistics warehouse and their delivery trucks park against our fence. We cannot get a clear zone on that side without their cooperation."},ann:{hook:"The perimeter upgrade at 80 to 120 thousand euros is the cheapest intervention in the security programme. HVM bollards protect against the highest-consequence physical threat.",text:"The perimeter upgrade is €80k–€120k (Tier 3 — Gallagher, Optex, SCSI 2025, indicative). But the insurance premium reduction is typically 5–8% of the DC-specific policy. For a facility insured at €50M replacement value, that’s €25k–€40k annual saving. Payback in 2–4 years. Insurance underwriters now explicitly ask about perimeter detection. If you cannot evidence PIDS and response protocols, expect a 10–15% loading on the DC-specific policy."},mark:{hook:"EN 50600-2-5 Class 3 requires PIDS with 95 percent or above detection probability and below 1 nuisance alarm per 100 metres per week. Both metrics must be specified and verified.",text:"EN 50600-2-5 Class 3 requires PIDS with ≥95% detection probability and <1 nuisance alarm per day per 100m zone. Fibre optic PIDS on an existing palisade fence achieves this if the clear zone is maintained. Fibre optic PIDS gives you zone discrimination — you can tell which 50m section of fence is being breached. Older taut-wire systems only give you whole-fence alarm with no location data."},sarah:{hook:"ISO 27001:2022 Annex A Clause 7.1.1 requires a defined security perimeter. The standard does not specify technology — but the EN 50600-2-5 engineering requirement gives the minimum technical specification.",text:"ISO 27001:2022 Annex A Clause 7.1.1 requires a ‘security perimeter’ — but doesn’t define the technical standard. EN 50600-2-5 gives us the engineering specification."},tom:{hook:"Perimeter upgrade for a 200 metre fence line: PIDS 30 to 60 thousand euros, HVM bollards 15 to 25 thousand euros, lighting enhancement 10 to 20 thousand euros. Total under 110 thousand euros.",text:"Perimeter upgrade costs for a 200m fence line: PIDS €30k–€60k, HVM bollards €15k, clear zone €5k–€10k, CCTV upgrades €15k–€25k. Total: €65k–€110k. Tier 3 — manufacturer benchmarks (Gallagher, Optex), SCSI 2025."}},
  rhetoricTakeaways:{declan:"The perimeter is the first line — if an intruder gets past the fence without triggering an alarm, every other security layer is working from a deficit.",ann:"Certified perimeter detection reduces insurance premiums by 5–8% — the payback on PIDS and HVM is measured in premium savings, not just security improvement.",mark:"PIDS specification must account for the Dublin climate — wind, rain, and vegetation cause nuisance alarms that lead to alarm fatigue and effectively disable the system.",sarah:"CER Directive and NIS2 both require documented physical perimeter controls — the perimeter is where regulatory compliance starts.",tom:"Full perimeter upgrade (PIDS + HVM + lighting + clear zone): €180,000–€280,000 for a 280m perimeter (Tier 3 — Gallagher, Optex, SCSI 2025, indicative). Phase it: HVM and lighting first, then PIDS."},
  scenario:{title:"Clonshaugh Perimeter Assessment",narrative:"Clonshaugh sits on an industrial estate with a 280m palisade fence, one vehicle gate with a rising arm barrier. The insurance underwriter has requested evidence of perimeter detection capability.",question:"Design a perimeter security upgrade for Clonshaugh.",answer:"SITUATION: Clonshaugh sits on a Dublin industrial estate with a 280m palisade fence, one vehicle gate with a rising arm barrier, and no PIDS (perimeter intrusion detection system). The insurance assessor has flagged the perimeter as non-compliant with EN 50600-2-5 Class 3 requirements.\n\nCHALLENGE: Design a perimeter security upgrade that meets Class 3 requirements while working within the constraints of an existing industrial estate site — shared boundaries, limited setback, and active vehicle access.\n\nSHOW THE FIX: Three elements are required. First, PIDS on the full 280m fence perimeter — fibre-optic or taut-wire detection with zone mapping to the BMS/security panel. Cost: approximately €56,000 (€200/m installed, Tier 3 — security integrator rates). Second, hostile vehicle mitigation (HVM) at the vehicle entrance — rated bollards or barriers replacing the rising arm. Cost: approximately €25,000 (Tier 3). Third, a minimum 3m clear zone inside the fence line — relocating any equipment, storage, or vegetation that provides concealment. Cost: approximately €6,000 for clearance and landscaping.\n\nTotal perimeter upgrade: approximately €87,000. This closes the insurance gap and satisfies the EN 50600-2-5 Class 3 perimeter detection requirement. Without it, the facility insurance premium carries a security exclusion clause that voids cover for physical intrusion events.\n\nSources: EN 50600-2-5:2021 Section 6.2 (T1); CPNI Perimeter Security Guide (T2).",
whoShouldCare:["mark","declan"]},
  sourceNote:"EN 50600-2-5:2021 Section 5.3. PAS 68:2013. Cost benchmarks: Tier 3 — manufacturer published ranges (Gallagher, Optex), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-008",level:"L2",topic:"Fire service access"},{module:"DC-LEARN-009",level:"L3",topic:"BMS/DCIM integration"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'PIDS + HVM + clear zone',available:'Fence only (no detection)',unit:'Perimeter detection',pass:false,detail:'No PIDS, no HVM, no clear zone. Fence provides delay but no detection.'};}

{
  id:"L3",level:3,name:"Vehicle Access & Screening",icon:"🚛",
  component:"Vehicle Control",available:true,
  clockQuote:"He had been the zone map for ten years. Now the building needed the zone map to be on paper, because paper survived shift changes, staff turnover, and tenant audits. Knowledge in one person's head was not a system. It was a single point of failure.",
  userNeedStatement:"Understand how vehicle access is controlled and screened at DC facilities",
  plainEnglish:"Vehicles carry equipment, fuel, and people — but also risk. Vehicle-borne improvised explosive devices (VBIED) are the highest-energy attack vector.",
  grammar:{
    facts:[{term:"Vehicle inspection area",definition:"A designated zone between the outer and inner vehicle gates where vehicles are stopped, inspected, and cleared.",plain:"A holding area where every vehicle is checked — driver ID, under the vehicle, and what’s in the back.",number:"Minimum 20m long to hold an articulated trailer (SI 190/2014: max 16.5m plus clearance), with barriers at both ends.",standard:"EN 50600-2-5:2021 Section 5.4; CPNI Vehicle Security Guidelines",feynman:{analogy:"Think of it like an airlock on a submarine — the outer door opens, you step inside, the outer door closes, then the inner door opens. A vehicle inspection area works identically: the outer gate admits the truck, it closes, the truck is inspected, then the inner gate opens.",firstPrinciples:"An unchecked vehicle entering a secure site is a risk. Creating a space between two gates gives security staff a controlled environment to check the driver, scan underneath the vehicle, and inspect cargo. The key dimension is length: 20 metres minimum to hold an Irish articulated trailer.",theTest:"You understand vehicle inspection areas when you can answer: Clonshaugh has 25m between its gate and building — can it fit a dual-gate airlock? Answer: Marginally yes. An articulated trailer needs 20m plus 5m approach. 25m is just sufficient with tight geometry."},soWhat:"Without an inspection area, vehicles travel directly from the public road to the building — there is no opportunity to check what is underneath or inside."},{term:"Delivery management procedure",definition:"A documented process governing how deliveries are scheduled, announced, verified, and escorted.",plain:"The rules for getting a delivery truck onto your site — who orders it, who confirms it, who checks the driver.",number:"Best practice: pre-notification 24hrs+ in advance, driver ID checked against manifest.",standard:"ISO 27001:2022 Annex A.7.2; EN 50600-2-5 Section 5.4",feynman:{analogy:"Think of it like a guest list at a private event — your name has to be on the list before you arrive, someone checks your ID at the door, and a host walks you to your table. Deliveries work the same way: pre-notified, verified, and escorted.",firstPrinciples:"An unannounced vehicle at the gate is an unknown risk. A delivery management procedure removes the unknown: the delivery is booked 24 hours in advance, the driver name and vehicle registration are on a manifest, security checks both at the gate, and an escort accompanies the driver to the loading dock.",theTest:"You understand delivery management when you can answer: A fuel tanker arrives at Clonshaugh but is not on the manifest — what happens? Answer: The gate does not open. The driver is held at the outer gate while security contacts the operations team to verify. No manifest entry, no site access."},soWhat:"An unannounced vehicle at the gate is an unknown risk — the delivery management procedure converts unknowns into verified, expected, and escorted arrivals."},{term:"Under-Vehicle Scanning System (UVSS)",definition:"Automated imaging system capturing the underside of every vehicle entering the site, comparing against a baseline to detect attachments or modifications.",plain:"A camera that photographs the bottom of every vehicle as it drives over a scanner. If something is attached that should not be there, the system flags it.",number:"Scan time under 5 seconds. Resolution detects objects ≥50mm. Cost: €25,000–€45,000 installed (Tier 3 — manufacturer published ranges, indicative).",standard:"CPNI guidance; ISO/IEC 27002:2022 Clause 7.2",feynman:{analogy:"Think of it like the security scanner at an airport that X-rays your luggage — except it photographs the underside of vehicles.",firstPrinciples:"A vehicle has a large concealed surface underneath. Manual inspection takes 5–10 minutes and is unreliable. An automated scanner photographs the entire underside in under 5 seconds and compares to a baseline. Any difference is flagged.",theTest:"You understand UVSS when you can answer: A delivery truck visits Clonshaugh weekly. This week the UVSS flags an anomaly — what does it mean? Answer: Something has been attached or modified since the last visit. Physical inspection required before the vehicle proceeds."},soWhat:"UVSS detects what a visual inspection cannot — modifications to a known vehicle's underside that may indicate concealed persons, devices, or contraband."},{term:"Vehicle airlock (sally port)",definition:"Controlled vehicle entry area with two gates — the outer gate closes before the inner gate opens, preventing forced entry and enabling inspection.",plain:"A holding pen for vehicles with a gate at each end. The truck drives in, the gate behind closes, the truck is checked, then the gate ahead opens.",number:"Minimum internal length: 20m for articulated vehicles (SI 190/2014 — max 16.5m plus clearance). Cost: €80,000–€150,000 (Tier 3 — Automatic Systems, Gunnebo published ranges, indicative).",standard:"EN 50600-2-5:2021 Section 5.3; SI 190/2014",feynman:{analogy:"Think of it like a canal lock — a boat enters, the gate behind closes, then the gate ahead opens. A vehicle airlock traps the vehicle between two gates for inspection.",firstPrinciples:"A single gate provides access control but no containment. If forced, the vehicle is inside. Two sequential gates create a trapped zone — even if the first is forced, the second still blocks access.",theTest:"You understand vehicle airlocks when you can answer: A truck arrives claiming urgent delivery without advance booking — what happens? Answer: Outer gate opens to airlock. Truck held between gates while credentials are verified and vehicle inspected. Inner gate stays closed until all checks pass."},soWhat:"The dual-gate airlock is the vehicular equivalent of a mantrap — even if the outer gate is forced, the inner gate still blocks access to the building."},{term:"Automatic Number Plate Recognition (ANPR)",definition:"Camera-based system that reads and records vehicle registration plates, cross-referencing against pre-approved lists and national databases.",plain:"A camera that reads every number plate entering and leaving the site — it knows immediately whether the vehicle is expected.",number:"Read accuracy ≥98% in daylight, ≥95% at night. Capture speed: up to 160 km/h. Cost: €8,000–€15,000 per lane installed (Tier 3 — manufacturer published ranges, indicative).",standard:"CPNI Vehicle Security Guidance; ISO/IEC 27002:2022 Clause 7.2",feynman:{analogy:"Think of it like a bouncer with a guest list — the ANPR reads the plate and instantly checks it against the approved list. If you are on it, the system logs you. If not, it flags you.",firstPrinciples:"A vehicle approaching a gate could be anyone. ANPR automates the first identity check — is this vehicle expected? It captures every plate, timestamps the entry and exit, and cross-references against pre-approved manifests. It does not inspect the vehicle or verify the driver — that requires separate systems.",theTest:"You understand ANPR when you can answer: An ANPR system records a vehicle as expected but the driver is not on the manifest — what happens? Answer: The vehicle is held in the inspection area. ANPR confirms vehicle identity; driver verification is a separate check at the gate."},soWhat:"ANPR automates the first identity check on every vehicle — it catches the unexpected arrival before the gate opens, buying time for the security team to respond."}],
    whatItLooksLike:"A controlled vehicle entrance has two gates creating an inspection area. The outer gate opens, it closes before the inner gate opens.",
    siteChecklist:["Is there a dual-gate vehicle airlock?","Is under-vehicle inspection performed?","Are all deliveries pre-notified?","Is the vehicle route separated from pedestrian paths?","Are HVM measures present at both vehicle gates?"]
  },
  logic:{
    causeAndEffect:[{cause:"A facility uses a single rising arm barrier — trucks drive directly from the public road to the loading dock.",effect:"There is no opportunity to inspect vehicles for concealed threats before they are adjacent to the building structure.",insight:"The dual-gate vehicle airlock is the vehicular equivalent of a mantrap. Retrofit cost: €40,000–€80,000 (Tier 3 — Automatic Systems, Gunnebo published ranges, indicative)."},{cause:"Vehicle access credentials are managed separately from the building access control system.",effect:"No unified audit trail. A vehicle can enter the site without a corresponding building access event.",insight:"Modern access control platforms manage vehicle gates and building doors on the same system."},{cause:"Delivery vehicles are waved through the gate without inspection because the driver is a regular.",effect:"The vehicle has not been screened since the baseline was established. Any modification or concealed person is undetected. Familiarity has replaced process.",insight:"Regular vehicles are the highest risk because complacency develops. The UVSS baseline model works precisely because it detects changes in known vehicles — but only if every vehicle is scanned every time."}],
    constraintLesson:"Vehicle access design for DC retrofits is constrained by the site geometry that was fixed when the facility was built. Retrofitting a dual-gate vehicle inspection area requires 15–20m of linear road space.",
    weakestLink:{whatsWrong:"Believing that automatic number plate recognition (ANPR) provides vehicle security.",whatsRight:"ANPR confirms the vehicle is expected — it does not inspect the vehicle or verify the driver. ANPR is an identity layer, not a security layer.",howToGetThere:"Layer ANPR (identity) with UVSS (inspection) and driver ID verification (personnel). All three checks pass before the inner gate opens."}
  },
  rhetoric:{declan:{hook:"We get 5 to 10 deliveries a day. The team buzzes the intercom and I open the gate. That process has zero security beyond asking someone their name.",text:"We get 5–10 deliveries a day. The lads just buzz the intercom and I open the gate from the control room. That’s a lot of process for a box of paper towels. We had a contractor drive through the barrier last year — claimed it was stuck. No damage, but the generator compound was wide open."},ann:{hook:"Vehicle-borne attack is the highest-consequence physical threat to a DC asset. The cost of HVM protection is fixed; the cost of a successful attack is not bounded.",text:"Vehicle-borne attack is the highest-consequence physical threat to a DC asset. One incident at any facility would trigger a review of every site in the portfolio. Vehicle screening adds 3–5 minutes per delivery. Twenty deliveries a day and you lose ninety minutes. But one unscreened vehicle incident voids your insurance claim entirely."},mark:{hook:"The vehicle airlock must handle a legal maximum length articulated trailer at 16.5 metres. Rising arm barriers are minimum; a full airlock with vehicle ID verification is Class 3 compliant.",text:"The vehicle airlock needs to handle an articulated trailer — 16.5m legal maximum in Ireland. With clearance, that’s a 20m inspection zone. At Clonshaugh, the distance from gate to building is 25m — just enough."},sarah:{hook:"CER Directive 2022/2557 and NIS2 Directive 2022/2555 both apply to large DC operators. Vehicle access control is explicitly referenced in CER as a critical entities resilience requirement.",text:"CER Directive 2022/2557 (Critical Entities Resilience) and NIS2 Directive 2022/2555 classify data centres as essential/critical digital infrastructure. Physical security standards will tighten under both directives. NIS2 requires documented physical security procedures for essential entities. Vehicle screening logs become evidence of compliance."},tom:{hook:"Vehicle entrance upgrade: HVM bollards 40 to 80 thousand euros, vehicle airlock civil works 50 to 100 thousand euros, ANPR and access control 20 to 40 thousand euros. Total programme 110 to 220 thousand euros.",text:"Vehicle entrance upgrade (Tier 3 — Automatic Systems, Gunnebo, Axis, SCSI 2025, indicative): dual gates €40k–€60k, UVSS €20k–€35k, ANPR €8k–€12k, road works €15k–€30k. Total: €83k–€137k. Compensating measures for constrained site: €45k–€70k. Complete vehicle screening upgrade — UVSS, sally port, ANPR, inspection lighting — runs €250k–€350k. Phase it: ANPR and inspection bay first (€60k), UVSS second (€40k), sally port last."}},
  rhetoricTakeaways:{declan:"Every unscreened vehicle on site is an unquantified risk — ANPR and UVSS together take 30 seconds per vehicle and close the gap completely.",ann:"Vehicle-borne attack is the highest-consequence physical threat to a DC asset — one incident invalidates the insurance cover for every facility in the portfolio.",mark:"The vehicle airlock must handle a 16.5 m articulated trailer — site geometry sets the constraint, and Clonshaugh's 25 m gate-to-building distance is just sufficient.",sarah:"NIS2 requires documented vehicle screening procedures for essential entities — the screening log is evidence of compliance, not just operational procedure.",tom:"Complete vehicle screening (sally port + UVSS + ANPR): €250,000–€350,000 (Tier 3 — Automatic Systems, Gunnebo, SCSI 2025, indicative). Phase it — ANPR and inspection bay first (€60,000), then UVSS (€40,000), sally port last."},
  scenario:{title:"Clonshaugh Vehicle Access Upgrade",narrative:"Clonshaugh has 25m from its perimeter gate to the building. Current access is a single rising arm barrier with intercom.",question:"Can Clonshaugh accommodate a dual-gate vehicle airlock?",answer:"SITUATION: Clonshaugh has 25 metres from the perimeter gate to the building entrance. The current vehicle access is a single rising arm barrier with intercom — no inspection bay, no vehicle airlock, no under-vehicle scanning.\n\nCHALLENGE: EN 50600-2-5 Class 3 recommends a dual-gate vehicle airlock (one gate opens, vehicle enters, first gate closes, inspection occurs, second gate opens). Can Clonshaugh physically accommodate this in 25 metres?\n\nSHOW THE FIX: Minimum dual-gate airlock requires approximately 20m (8m first gate zone + 8m vehicle holding area + 4m second gate zone) plus 5m approach from the road. Available: 25m. Assessment: MARGINAL — just achievable but with no margin for articulated delivery vehicles. The recommended solution is a speed-controlled single gate with ANPR (automatic number plate recognition), vehicle barriers rated to PAS 68/IWA 14-1, and a separate inspection bay for unregistered vehicles. This delivers equivalent security within the physical constraints.\n\nCost: approximately €45,000 for ANPR + rated barriers + inspection bay (Tier 3 — security integrator estimates). The alternative full airlock design would require site boundary modification costing an additional €80,000–€120,000 that the industrial estate lease may not permit.\n\nSources: EN 50600-2-5:2021 Section 6.3 (T1); PAS 68:2013 vehicle barrier ratings (T1); IWA 14-1:2013 (T1).",
whoShouldCare:["mark","tom","declan"]},
  sourceNote:"EN 50600-2-5:2021 Section 5.4. PAS 68:2013. SI 190/2014 (Irish vehicle dimensions). Cost benchmarks: Tier 3 — manufacturer published ranges (Gunnebo, Came), SCSI 2025.",
  retrofitRelevance:"",
  crossRefs:[{module:"DC-LEARN-005",level:"L7",topic:"Fuel delivery"},{module:"DC-LEARN-011",level:"L2",topic:"Perimeter HVM coordination"}],
  cascadeCheck:function(kw,racks,pue){return{needed:'Dual-gate airlock + UVSS',available:'Single rising arm barrier',unit:'Vehicle screening',pass:false,detail:'No inspection area, no UVSS. Single barrier provides no delay against deliberate attack.'};}
