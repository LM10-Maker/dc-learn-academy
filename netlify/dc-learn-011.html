  var engageIssued=safeStore.get("dc011_engage");
  const fmtT=(s)=>{if(!s||s<1)return '0s';if(s<60)return s+'s';const m=Math.floor(s/60);const ss=s%60;return m+'m '+ss+'s';};
  const fmtTime=(s)=>{if(!s)return '00:00';const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const totalTime=tabTimes?Object.values(tabTimes).reduce((a,b)=>a+b,0):0;
  const tabLabels={chain:'Security Chain',learn:'Learn',visual:'Visual Guide',challenges:'Field Challenges',assessment:'Assessment',book:'The Story',progress:'Progress'};
  const maxTime=tabTimes?Math.max(...Object.values(tabTimes),1):1;
  // Read assessment results from localStorage
  const [assessData,setAssessData]=useState(null);
  React.useEffect(()=>{try{const s=safeStore.get('dc011_assess');if(s)setAssessData(JSON.parse(s));}catch(e){}},[]);
  const stageLabels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const assessStageScore=(st)=>{
    if(!assessData||!assessData.answers)return null;
    const qs=ASSESSMENT_QUESTIONS.filter(q=>q.stage===st);
    let c=0,t=0;
    qs.forEach(q=>{const gi=ASSESSMENT_QUESTIONS.indexOf(q);if(assessData.answers[gi]!==undefined){t++;if(assessData.answers[gi]===q.correct)c++;}});
    return t>0?{c,t}:null;
  };
  return (
    <div>
      {moduleComplete && (
        <div className="card" style={{borderLeft:'4px solid var(--green)',background:'var(--green-dim)',marginBottom:16}}>
          <h2 style={{color:'var(--green)',marginBottom:6}}>Module Complete</h2>
          <div style={{fontSize:14,color:'var(--text-bright)',marginBottom:4}}>All {total} Trivium stages completed across 9 chain levels.</div>
          {assessData&&assessData.score&&assessData.score.total>=ASSESSMENT_QUESTIONS.length && (
            <div style={{fontSize:13,color:'var(--text-dim)',marginTop:8}}>
              Assessment: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%) in {fmtTime(assessData.elapsed)}
            </div>
          )}
          {totalTime>0 && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Total time invested: {fmtT(totalTime)}</div>}
          {!engageIssued && totalTime>=4500 && (
            <button onClick={function(){setShowEngageCert(true);}} style={{marginTop:14,padding:'10px 0',borderRadius:8,border:'none',background:'var(--grammar)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}}>
              Get Engagement Certificate (2 CPD hours)
            </button>
          )}
          {!engageIssued && totalTime<4500 && (
            <div style={{marginTop:12,padding:'10px 14px',background:'var(--panel)',borderRadius:6,fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>
              <span style={{fontFamily:'var(--font-mono)',fontWeight:600,color:'var(--grammar)'}}>{Math.ceil((4500-totalTime)/60)} min remaining</span>
              {' '}to unlock 2 CPD hour certificate (1h 15m minimum engagement required).
            </div>
          )}
          {engageIssued && (<div style={{marginTop:12,padding:'10px 14px',background:'rgba(37,99,235,0.08)',borderRadius:6,fontSize:13,color:'var(--grammar)'}}>Engagement certificate issued</div>)}
          {showEngageCert && React.createElement(EngageCertModal,{onClose:function(){setShowEngageCert(false);},onIssued:function(num){safeStore.set("dc011_engage",num);setShowEngageCert(false);}})}
        </div>
      )}
      <div className="card"><h2>Overall Progress</h2><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{complete}/{total} stages complete ({pct}%)</div><div className="progress-bar" style={{height:12}}><div className="fill fill-green" style={{width:pct+'%'}}></div></div></div>
      {assessData&&assessData.score&&assessData.score.total>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:8}}>Assessment Results</h2>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Score: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%)</div>
          <div className="progress-bar" style={{height:8,marginBottom:10}}><div className="fill fill-green" style={{width:Math.round(assessData.score.correct/assessData.score.total*100)+'%'}}></div></div>
          {assessData.elapsed>0 && <div style={{fontSize:12,fontFamily:'var(--font-mono)',color:assessData.elapsed<=900?'var(--grammar)':'var(--red)',marginBottom:8}}>{assessData.elapsed<=900?'Completed in '+fmtTime(assessData.elapsed)+' (under time)':'Completed in '+fmtTime(assessData.elapsed)+' ('+fmtTime(assessData.elapsed-900)+' over)'}</div>}
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{
              const s=assessStageScore(st);
              return s && (
                <div key={st} style={{fontSize:12,color:stageColours[st]}}>
                  <strong>{stageLabels[st]}:</strong> {s.c}/{s.t}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {LEVELS.map(lvl=>{const p=progress[lvl.id]||{};return (
        <div key={lvl.id} className="card" style={{padding:16}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20}}>{lvl.icon}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>Level {lvl.level}: {lvl.name}</div><div style={{display:'flex',gap:8,marginTop:6}}><Dot done={p.grammar} stage="grammar"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Grammar</span><Dot done={p.logic} stage="logic"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Logic</span><Dot done={p.rhetoric} stage="rhetoric"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Rhetoric</span></div></div></div></div>
      );})}
      {tabTimes && totalTime>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:4}}>Session Insights</h2>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Time spent per tab across sessions. For continuous improvement — not visible to other users.</div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>Total time: {fmtT(totalTime)}</div>
          {Object.keys(tabLabels).map(k=>{
            const t=tabTimes[k]||0;
            const w=Math.round(t/maxTime*100);
            return (
              <div key={k} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--text-dim)'}}>{tabLabels[k]}</span>
                  <span style={{fontFamily:'var(--font-mono)',color:t>0?'var(--text-bright)':'var(--text-muted)'}}>{fmtT(t)}</span>
                </div>
                <div className="progress-bar" style={{height:6}}><div className="fill fill-green" style={{width:w+'%',transition:'width 0.3s'}}></div></div>
              </div>
            );
          })}
        </div>
      )}
      {moduleComplete && <CertificateGenerator assessData={assessData}/>}
    </div>
  );
}

/* ═══ DC-LEARN STAGE 5 AUTH + SYNC ═════════════════════════════════════════
   Built: 09/04/2026 — Stage 5 Session 2
   Layer 1 (localStorage) never depends on Layer 2 (Supabase).
   If Supabase is blocked, offline, or errors, the module works exactly as
   it did before: IS_FREE_MODULE or localStorage.dc_learn_paid decides access.
   =========================================================================*/

const IS_FREE_MODULE = (TOOL_ID === 'DC-LEARN-000' || TOOL_ID === 'DC-LEARN-001' || TOOL_ID === 'DC-LEARN-002');
const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};

function AuthButton({ authState }) {
  const [showLogin, setShowLogin] = React.useState(false);
  const [email, setEmail] = React.useState('');
  const [sent, setSent] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  const handleSend = async () => {
    if (!email || !email.includes('@')) { setError('Enter a valid email address.'); return; }
    setLoading(true); setError('');
    const { error: err } = await dcAuth.sendMagicLink(email);
    setLoading(false);
    if (err) setError(typeof err === 'string' ? err : 'Could not send link. Try again.');
    else setSent(true);
  };

  if (!supa) return null;

  if (authState && authState.user) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--text-muted)'}}>
          {authState.user.email}{authState.isAdmin ? ' · admin' : ''}
        </span>
        <button onClick={()=>dcAuth.signOut().then(()=>window.location.reload())}
          style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--text-dim)',
          background:'transparent',border:'1px solid var(--border)',borderRadius:4,
          padding:'3px 8px',cursor:'pointer'}}>Sign out</button>
      </div>
    );
  }

  return (
    <div style={{position:'relative'}}>
      <button onClick={()=>setShowLogin(v=>!v)}
        style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--accent)',
        background:'transparent',border:'1px solid var(--accent)',borderRadius:4,
        padding:'3px 10px',cursor:'pointer'}}>Sign in</button>
      {showLogin && (
        <div style={{position:'absolute',top:'calc(100% + 8px)',right:0,
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:8,padding:16,zIndex:999,minWidth:280,
          boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
          {!sent ? (
            <div>
              <div style={{fontSize:13,color:'var(--text-dim)',marginBottom:10,lineHeight:1.5}}>
                Enter your email — we'll send a sign-in link.<br/>
                <span style={{fontSize:11,color:'var(--text-muted)'}}>No password needed.</span>
              </div>
              <input type="email" value={email}
                onChange={e=>{setEmail(e.target.value);setError('');}}
                onKeyDown={e=>{if(e.key==='Enter') handleSend();}}
                placeholder="your@email.com"
                style={{width:'100%',padding:'8px 10px',fontSize:13,
                background:'var(--panel)',border:'1px solid var(--border)',
                borderRadius:6,color:'var(--text-bright)',marginBottom:8,
                fontFamily:'var(--font-sans)',boxSizing:'border-box'}}/>
              {error && <div style={{fontSize:11,color:'var(--error)',marginBottom:6}}>{error}</div>}

function useAuth() {
  const [state, setState] = React.useState({
    loading: !!supa,
    user: null,
    isAdmin: false,
    hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
  });

  React.useEffect(() => {
    let mounted = true;

    async function resolve(session) {
      if (!mounted) return;
      try {
        if (session && session.user) {
          const user = session.user;
          if (dcAuth.isAdminUser(user)) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: true, hasAccess: true });
            return;
          }
          const licenceOk = await dcAuth.checkLicence(user.id);
          if (licenceOk === true) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: false, hasAccess: true });
          } else {
            // licenceOk === null (error: fall through) or false (no row)
            setState({
              loading: false, user: user, isAdmin: false,
              hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
            });
          }
          return;
        }
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      } catch(e) {
        console.warn('DC-LEARN: auth resolve failed, falling through', (e && e.message) || e);
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    }

    if (!supa) {
      setState({
        loading: false, user: null, isAdmin: false,
        hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
      });
      return () => { mounted = false; };
    }

    (async () => {
      try {
        const { data: { session } } = await supa.auth.getSession();
        await resolve(session);
      } catch(e) {
        console.warn('DC-LEARN: getSession failed, falling through', (e && e.message) || e);
        if (mounted) setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    })();

    let sub = null;
    try {
      const r = supa.auth.onAuthStateChange((_ev, session) => { resolve(session); });
      sub = r && r.data && r.data.subscription;
    } catch(e) {}

    return () => {
      mounted = false;
      try { if (sub) sub.unsubscribe(); } catch(e) {}
    };
  }, []);

  return state;
}

function PlatformSync({ user, progress }) {
  React.useEffect(() => {
    if (!supa || !user || !user.id) return;
    let cancelled = false;
    (async () => {
      try {
        // 1. Flush timing buffer → learner_analytics, then clear on success
        const raw = safeStore.get(DC_TIMING_KEY);
        if (raw) {
          let events = [];
          try { events = JSON.parse(raw); } catch(e) { events = []; }
          if (!cancelled && Array.isArray(events) && events.length) {
            const rows = events.slice(0, 500).map(function(ev) {
              return {
                user_id: user.id,
                module_id: TOOL_ID,
                event_type: (ev && ev.event) || 'unknown',
                event_data: ev || {},
                recorded_at: new Date((ev && ev.ts) || Date.now()).toISOString(),
              };
            });
            const { error } = await supa.from('learner_analytics').insert(rows);
            if (!error) safeStore.remove(DC_TIMING_KEY);
            else console.warn('DC-LEARN: analytics flush failed', error.message);
          }
        }
        // 2. Upsert progress → learner_progress (keeps localStorage as cache)
        if (!cancelled && progress && typeof progress === 'object') {
          const keys = Object.keys(progress);
          const rows = keys.map(function(levelId) {
            const p = progress[levelId] || {};
            return {
              user_id: user.id,
              module_id: TOOL_ID,
              level_id: String(levelId),
              grammar_complete: !!p.grammar,
              logic_complete: !!p.logic,
              rhetoric_complete: !!p.rhetoric,
              updated_at: new Date().toISOString(),
            };
          });
          if (rows.length) {
            const { error } = await supa.from('learner_progress').upsert(rows, {
              onConflict: 'user_id,module_id,level_id',
            });
            if (error) console.warn('DC-LEARN: progress upsert failed', error.message);
          }
        }
      } catch(e) {
        console.warn('DC-LEARN: PlatformSync error', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [user && user.id, JSON.stringify(progress || {})]);
  return null;
}
