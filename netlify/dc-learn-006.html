    {cause:"Total installed on-site generator capacity exceeding 10 MW triggers the CRU generation licence requirement regardless of operating mode",effect:"CRU generation licence required before generators can be connected and operated.",insight:"A 50 MW DC with 2(N+1) generators at 4 MW each = 16+ generators = 64+ MW installed. Well above threshold."},
    {cause:"EPA has included HVO or equivalent low-carbon fuel as a licence condition in new IE Licence approvals since 2023",effect:"Diesel-only may not be approved for new DCs requiring IE licence (thermal input >50 MW).",insight:"Specify all generators as HVO-capable at procurement. All modern diesel generators are compatible. Specification cost is zero."},
    {cause:"Battery Energy Storage Systems can provide primary frequency response and fast reserve services to EirGrid under formal grid service agreements",effect:"Revenue potential \u20ac50k\u2013\u20ac500k/year but requires I-SEM registration and operational complexity.",insight:"For most DCs, primary BESS role is UPS bridging. Grid services are optional revenue needing dedicated resource."}
  ],
  constraintLesson:"On-site generation in a large DC crosses the boundary between \u2018backup power\u2019 and \u2018power generation.\u2019 CRU does not distinguish between a dedicated power station and DC backup generators if capacity exceeds 10 MW.\n",
  weakestLink:{
    whatsWrong:"Our generators are backup only \u2014 they never export. We don\u2019t need a generation licence.",
    whatsRight:"The generation licence requirement is based on installed capacity, not operating mode. Even generators that never export require a licence if capacity exceeds 10 MW.",
    howToGetThere:"Calculate installed capacity. Apply for licence. CRU has a standard process and conditions for standby-only generators are straightforward."}},
  rhetoric:{
    declan:{hook:"Your generators are legally a power station above 10 MW. Apply to CRU for the generation licence before you commission — not after.",text:"Your generators are legally a power station. Over 10 MW, CRU needs to know. Apply alongside your grid connection \u2014 both take about 12 months."},
    ann:{hook:"HVO may reduce lifecycle emissions by approximately 90 percent and reclassifies generator CO2 as biogenic. For an Article 9 fund that is a Scope 1 line item that largely disappears.",text:"HVO may reduce lifecycle emissions by ~90% and reclassifies direct combustion CO\u2082 as biogenic under GHG Protocol. For 2(N+1) generators, that\u2019s material for carbon reporting. The fuel cost premium is 20\u201325% but runtime is typically <100 hours/year."},
    mark:{hook:"Generation licence threshold is 10 MW — apply to CRU. HVO specification: EN 15940, include at generator tender stage. Both are programme items, not operational afterthoughts.",text:"Generation licence: 10 MW threshold, apply to CRU. HVO: EN 15940 — I'd verify this is in the generator procurement spec. BESS: DS3 programme, requires I-SEM registration, separate metering."},
    sarah:{hook:"HVO adoption reclassifies generator CO2 as biogenic and demonstrates proactive decarbonisation. Under SFDR PAI indicators, it is a reportable positive action on climate change mitigation.",text:"HVO adoption reclassifies generator CO\u2082 as biogenic and demonstrates proactive EPA compliance. Investors increasingly ask about generator fuel type \u2014 HVO is the answer."},
    tom:{hook:"HVO fuel premium is 15 to 25 percent on cost. For a facility running generators in test mode only, total fuel cost is a minor OpEx line — the carbon benefit is worth multiples of the premium.",text:"HVO fuel cost estimate (Tier 3 \u2014 SEAI HVO guidance; fuel supplier market rates, indicative): HVO premium 20\u201325% per litre. Standby-only basis, 100\u2013200 hrs/yr: 200\u2013400 L/MW. For 60 MW fleet: 12,000\u201324,000 L/yr. Premium: \u20ac3,600\u2013\u20ac7,200/yr. Not material. Note: facilities with monthly load-bank testing at full capacity will consume materially more \u2014 see DC-LEARN-005 L9."}},
  rhetoricTakeaways:{declan:"Your generators are legally a power station. Over 10 MW installed, CRU needs to know. Apply alongside grid connection.",ann:"HVO reduces lifecycle CO₂ by ~90% and reclassifies combustion CO₂ as biogenic. The fuel cost premium is not material.",mark:"Generation licence: 10 MW threshold. HVO: EN 15940, specify at procurement. BESS: DS3, requires I-SEM registration.",sarah:"HVO adoption reclassifies generator CO₂ as biogenic. Investors increasingly ask about generator fuel type.",tom:"HVO premium: 20–25% per litre (Tier 3 — SEAI HVO guidance; fuel supplier market rates, indicative). Annual test fuel for 60 MW fleet: €3,600–€7,200/yr. Not material."},
    scenario:{
    title:"The Licence Oversight",
    narrative:"A 40 MW Tier IV DC is 8 months from commissioning. Grid connection in progress. Planning granted. Building 60% complete. The MEP consultant flags 60 MW installed generator capacity and asks if a generation licence has been applied for.",
    question:"What is the status, programme impact, and recovery plan?",
    answer:"Status: Generation licence not applied for. Required before generators can be connected.\n\nTimeline: 6\u201312 months from submission.\nBest case (6 months): 2 months before commissioning \u2014 workable.\nTypical (9 months): 1 month after commissioning \u2014 generators cannot be energised on schedule.\n\nRecovery:\n1. Submit application to CRU immediately\n2. Engage CRU pre-application consultation for expedited review\n3. Explore temporary connection without generator export (island mode)\n4. Phase IT load to reduce generator dependency during gap\n5. Notify stakeholders of programme risk\n\nPrevention: One line in design team mandate: \u2018If generators >10 MW, initiate CRU generation licence.\u2019\n\nRegulatory basis: Electricity Regulation Act 1999 and CRU/2025236 require all generating units above 10 MW total installed capacity to hold a CRU generation licence before connection \u2014 regardless of operating mode (standby, island, or export). Clonshaugh\u2019s generator fleet will exceed this threshold once Phase 2 is commissioned.\n\nFinancial impact of delay: At CRM clearing price \u20ac149,960/MW/yr (SEMO PCAR2829T-4) on a 10 MW fleet, a 3-month delay costs ~\u20ac375k in foregone capacity revenue alone \u2014 before energy cost differential. Every week without a licence is a week of SEM revenue forfeited. Submit the application immediately alongside the grid connection.\n",
whoShouldCare:["mark","sarah","ann"]},
  sourceNote:"Electricity Regulation Act 1999 Section 14 (T1). HVO: EN 15940 (T1); SEAI Emission Factors 2024 (T1). BESS: EirGrid DS3 (T1); CRU I-SEM (T1). CRM T-4: SEMO PCAR2829T-4 \u20ac149,960/MW/yr (T1).",
  retrofitRelevance:"Existing DCs with diesel-only generators face increasing regulatory pressure to switch to HVO. Generator specification change is zero-cost. Fuel switching is operationally simple.",
  crossRefs:[{module:"DC-LEARN-005",level:"L2",title:"Diesel Generators",why:"Generator sizing, fuel systems, and runtime calculations"},{module:"DC-LEARN-005",level:"L8",title:"BESS",why:"Battery energy storage and grid services integration"}],
  clockQuote:"She crossed out 'Site Visit Notes' and wrote 'Programme.' The word change was small. What it meant was not."
},
{
  id:"L9",level:9,name:"Future Grid",icon:"🌱",
  component:"Renewables & 2030 Grid",available:true,
  userNeedStatement:"Understand the trajectory of the Irish grid, DC policy, and what the 2030 renewable target means for DC carbon footprints.",
  cascadeCheck:(kw,racks,pue)=>{const targetMW=(racks*20/1000)*pue;const mic=CLONSHAUGH.mic;return{needed:targetMW.toFixed(1),available:(mic*0.9).toFixed(1),unit:"MW",pass:targetMW<=(mic*0.9),detail:`Future capacity at 20kW/rack: ${targetMW.toFixed(1)}MW vs ${(mic*0.9).toFixed(1)}MW MIC. ${targetMW>(mic*0.9)?'MIC upgrade required for target density.':'MIC adequate for target density.'}`}},
  learningObjective:"Understand the Irish grid\u2019s trajectory to 80% renewable by 2030, government DC policy, and what additionality means for investor-grade carbon claims.",
  plainEnglish:"The Irish grid in 2030 will look very different. 80% renewable. Potentially far more constrained for DCs. Understanding the direction of travel is the difference between making the right site decision today and getting it wrong.",
  grammar:{facts:[
    {term:"Government DC Policy Statement (2022)",definition:"DHLGH policy directing new DC connections in the GDA must demonstrate grid capacity and contribute positively.",plain:"The government decided Dublin had enough DCs. Not a ban \u2014 a higher evidential burden.",number:"DCs: approximately 22% of Irish grid demand (CRU, 2024). Government target: limit to 15\u201318% by 2030.",standard:"DHLGH DC Policy Statement 2022; EirGrid-ESBN Shaping our Electricity Future 2021",
      feynman:{analogy:"Think of it like planning restrictions in a national park. You can still build, but you need stronger justification and must demonstrate you won\u2019t harm the environment. The DC Policy Statement is similar: you can still connect in Dublin, but you must prove grid capacity exists and that your DC contributes positively.",firstPrinciples:"In 2022, the Department of Housing, Local Government and Heritage issued a policy statement acknowledging that DCs consume approximately 22% of Irish electricity (CRU, 2024) and that further growth in the Greater Dublin Area is constrained. The policy doesn\u2019t ban new DCs but requires demonstration of grid capacity, renewable energy contribution, and positive economic impact. This effectively raises the bar for Dublin-area DC development.",theTest:"You know you understand this when you can answer: Is there a ban on new DC connections in Dublin? Answer: No \u2014 it\u2019s a higher evidential burden, not a ban. Developers must demonstrate grid capacity, renewable contribution, and positive impact. But the practical effect is that development outside the GDA faces fewer hurdles."}},
    {term:"EirGrid 2030 Renewable Target",definition:"Government target of 80% renewable electricity by 2030.",plain:"Four out of five units of electricity from wind and solar by 2030.",number:"Grid carbon trajectory: 0.437 (2015) \u2192 0.2241 (2026) \u2192 ~0.08\u20130.10 (2030).",standard:"Climate Action Plan 2024; EU RED III; EirGrid Generation Development Plan 2023",
      feynman:{analogy:"Ireland\u2019s grid is getting greener every year \u2014 like a river gradually clearing after pollution stops. By 2030, 80% of electricity should come from wind and solar. For a DC, this means your Scope 2 carbon footprint drops automatically \u2014 without doing anything on-site.",firstPrinciples:"Ireland\u2019s grid carbon intensity has fallen from 0.437 kgCO\u2082/kWh (2015) to 0.2241 (2026) as renewable generation has increased from ~25% to ~42%. The government targets 80% renewable by 2030, which would reduce grid carbon to approximately 0.08\u20130.10 kgCO\u2082/kWh. This is the single biggest decarbonisation lever for Irish DCs \u2014 passive grid decarbonisation reduces Scope 2 without any on-site investment.",theTest:"You know you understand this when you can answer: A DC in Ireland with PUE 1.20 on the 2030 grid (80% RE). What is the approximate CUE? Answer: CUE = PUE \u00d7 grid EF = 1.20 \u00d7 0.09 \u2248 0.108 kgCO\u2082/kWh-IT. Compare to 2026: 1.20 \u00d7 0.2241 = 0.269. A 60% reduction from grid decarbonisation alone."}},
    {term:"Additionality (Corporate PPA)",definition:"Renewable energy must be from new generation that would not have been built without the PPA.",plain:"If you want to say your DC is \u2018100% renewable,\u2019 you need to fund new generation \u2014 not buy certificates from existing farms.",number:"EU Taxonomy: PPA from projects commissioned within 3 years, in same bidding zone.",standard:"EU Taxonomy Delegated Act 2021/2139; EU RED III Article 22a",
      feynman:{analogy:"Additionality is like the difference between planting a new tree and buying a certificate for an existing tree. If you fund a NEW wind farm through a PPA, that\u2019s additional renewable generation that wouldn\u2019t exist without you. Buying RECs from an existing wind farm doesn\u2019t add any new renewable capacity.",firstPrinciples:"For SFDR Article 9 funds and EU Taxonomy alignment, passive grid decarbonisation is insufficient. Investors require additionality: proof that the DC\u2019s renewable energy claim comes from NEW generation capacity that was built specifically because of the PPA. Existing wind farms generating RECs do not count. The PPA must be from projects commissioned within 3 years, in the same bidding zone (Ireland).",theTest:"You know you understand additionality when you can answer: A DC claims \u2018net zero Scope 2\u2019 based on Ireland\u2019s grid reaching 80% renewable by 2030. Is this valid for an Article 9 fund? Answer: No. Article 9 requires additionality-verified PPAs. Passive grid improvement doesn\u2019t satisfy SFDR/Taxonomy requirements. The DC needs a signed PPA with a new renewable project."}},
    {term:"Flexibility and Demand Response",definition:"EirGrid programme incentivising large consumers to reduce demand during grid stress, in exchange for payment.",plain:"EirGrid will pay DCs to reduce demand for short periods when the grid is under stress.",number:"Demand response payments: \u20ac20k\u2013\u20ac200k/year for large DCs (indicative \u2014 Tier 2, EirGrid DS3 Programme rates).",standard:"EirGrid DS3 Programme; EU Electricity Regulation 2019/943 Article 17",
      feynman:{analogy:"Demand response is like surge pricing in reverse. Instead of charging more during peak demand, EirGrid PAYS you to use less. For a DC with on-site generation or battery storage, reducing grid demand during stress periods can earn \u20ac20k\u2013\u20ac200k/year \u2014 and positions the DC as part of the grid solution, not part of the problem.",firstPrinciples:"The Irish grid faces periods of high demand and low renewable output when system stability is at risk. EirGrid\u2019s demand response programme pays large consumers to reduce their grid demand during these periods. A DC can participate by shifting to on-site generation or battery power temporarily. Revenue is modest (\u20ac20k\u2013\u20ac200k/year) but the political value is significant: DCs that actively support grid stability are better positioned in the policy debate about DC electricity consumption.",theTest:"You know you understand this when you can answer: Why would a DC participate in demand response for \u20ac50k/year when its electricity bill is \u20ac10M+? Answer: The revenue is not the main benefit. Demonstrating grid flexibility positions the DC as a responsible grid participant, supporting planning applications and policy engagement. DCs that consume passively are part of the problem. DCs that respond flexibly are part of the solution."}},
    {term:"CRU Data Centre Connection Obligation",definition:"CRU Decision CRU/2025236 requiring new data centre grid connections to source a minimum of 80% renewable electricity.",plain:"New DCs connecting to the Irish grid must commit to sourcing 80% of their electricity from renewables. This is a condition of connection, not a voluntary target.",number:"Minimum: 80% renewable. Applies to new connections from 2025. Evidence: Corporate PPA or equivalent.",standard:"CRU Decision CRU/2025236 (superseding CRU/21/124)",
      feynman:{analogy:"The CRU renewable obligation is like a planning condition on a new building — you must comply before you can occupy. For a DC, 80% renewable sourcing is a condition of getting the grid connection turned on. Without evidence of compliance, CRU can block energisation.",firstPrinciples:"CRU Decision CRU/2025236 establishes that new DC grid connections must demonstrate 80% renewable electricity sourcing. This can be met through Corporate PPAs with additionality, direct connection to on-site renewables, or a combination. The obligation is monitored annually. It aligns with the government's Climate Action Plan and the EU Taxonomy renewable energy requirements.",theTest:"You know you understand this when you can answer: A new DC plans to buy 80% renewable energy certificates (RECs) from existing wind farms to meet the CRU obligation. Is this sufficient? Answer: Likely insufficient. CRU/2025236 requires evidence of genuine renewable sourcing, which may require additionality-verified PPAs rather than unbundled RECs from existing generation. The exact compliance mechanism is subject to CRU guidance — check the latest published criteria."}},

  constraintLesson:"The Irish grid\u2019s direction is positive for DC decarbonisation but uncertain for DC expansion. 80% renewables is achievable but the queue isn\u2019t getting shorter and the political environment for new large DCs in Dublin is the most challenging ever.\n",

  rhetoric:{
    declan:{hook:"The Irish grid will be 80 percent renewable by 2030 if targets are met. My Scope 2 number changes materially even if I do nothing — but the CPPA locks it in contractually.",text:"The Irish grid will be 80% renewable by 2030 if targets are met. Your Scope 2 number will halve without you doing anything. But your investors may require a PPA to be credible."},
    ann:{hook:"Irish DC carbon footprint in 2030 on 80 percent renewable grid: approximately 0.10 kgCO2 per kWh versus 0.224 today. That trajectory changes the investment case for CPPAs signed now.",text:"Irish DC carbon footprint in 2030 on 80% renewable grid: approximately 0.10 kgCO\u2082/kWh-IT at PUE 1.10. Compare to Germany at 0.38 kgCO\u2082/kWh-IT. Ireland\u2019s renewable trajectory is a genuine competitive advantage."},
    mark:{hook:"Track the SEAI published annual emission factor — it changes every year. Any carbon model using a static 2024 value will be wrong by 2027 and will mis-state the compliance position.",text:"Track SEAI\u2019s published annual emission factor \u2014 it changes every year. Do not use 2024 for a 2028 projection. Do not extrapolate \u2014 SEAI is the reference."},
    sarah:{hook:"EU Taxonomy REF requirement: 50 percent by 2025, 75 percent by 2027, 90 percent by 2030. The Irish grid alone reaches approximately 80 percent by 2030 — CPPA closes the final 10 percent.",text:"EU Taxonomy REF requirement: 50% by 2025, 75% by 2027, 90% by 2030. Irish grid ~42% today. A modest additionality PPA from new Irish wind covers the gap."},
    tom:{hook:"Corporate PPA at 60 to 90 euros per MWh for new Irish onshore wind. Lock in now — the 2027 Taxonomy threshold at 75 percent REF means the CPPA signed today is the threshold you need.",text:"Corporate PPA: \u20ac60\u201390/MWh for new Irish onshore wind (Tier 3 \u2014 RE-Source Platform 2025 market benchmarks). Against a DC paying \u20ac120/MWh grid electricity (Tier 2 \u2014 CRU Q4 2024), a PPA saves 20\u201330% AND provides additionality."}},
  rhetoricTakeaways:{declan:"The Irish grid will be 80% renewable by 2030. Your Scope 2 number halves without you doing anything.",ann:"Ireland's renewable trajectory is a genuine competitive advantage for DC carbon footprint vs Germany or Netherlands.",mark:"Track SEAI annual emission factor — it changes every year. Do not extrapolate. SEAI is the reference.",sarah:"EU Taxonomy renewable requirement: 50% by 2025, 75% by 2027, 90% by 2030. A modest PPA covers the gap.",tom:"Corporate PPA: €60–90/MWh for new Irish onshore wind (Tier 3 — RE-Source Platform 2025 market benchmarks). Against €120/MWh grid electricity (Tier 2 — CRU Q4 2024), a PPA saves 20–30%."},

    answer:"Claim: PARTIALLY VALID \u2014 with significant caveats.\n\nValid:\n\u2022 Irish grid REF trajectory: ~42% (2026) \u2192 targeting 80% (2030)\n\u2022 If 80% achieved: ~0.08\u20130.10 kgCO\u2082/kWh\n\u2022 At PUE 1.10: CUE ~0.088\u20130.11 kgCO\u2082/kWh-IT \u2014 near-zero\n\nNot valid:\n1. EU Taxonomy/SFDR Article 9 require ADDITIONALITY \u2014 passive grid decarbonisation is not sufficient\n2. The 80% target is a government aspiration, not a guarantee\n3. \u2018Net zero Scope 2\u2019 requires market-based accounting with RECs or PPAs\n\nEvidence needed:\n1. Signed Corporate PPA with additionality-verified Irish wind/solar project\n2. PPA covers 2025\u20132030 (continuous compliance)\n3. PPA generation covers DC annual consumption\n4. Independent verification of additionality\n\nGap: No PPA in place. Claim needs qualification: \u2018subject to execution of an additionality-verified PPA.\u2019\n\nWhat Ann needs to hear: An Article 9 fund making an unqualified net zero Scope 2 claim without an additionality-verified PPA is exposed to greenwashing liability under SFDR (Commission Delegated Regulation (EU) 2022/1288). Passive grid decarbonisation does not satisfy the additionality requirement. The fund prospectus must be qualified before publication.\n\nIndicative CPPA cost: Clonshaugh 2.4 MW IT at PUE 1.50 consumes ~21 GWh/year. At \u20ac60\u201370/MWh strike price, the annual commitment is \u20ac1.26M\u20131.47M. This is the financial commitment underpinning the ESG claim \u2014 it belongs in the business case alongside energy centre capex.\n",
whoShouldCare:["sarah","ann","mark"]},

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q006-01",icon:"🗺",stage:"grammar",q:"Who operates the Irish transmission system (110kV+)?",options:["EirGrid","ESB Networks","CRU","SEAI"],correct:0,explain:"EirGrid is the state-owned TSO for Ireland, responsible for the 110kV, 220kV, and 400kV transmission network. Source: Electricity Regulation Act 1999."},
  {level:1,id:"Q006-02",icon:"🗺",stage:"logic",q:"Why must the grid connection application be submitted before planning permission is granted?",options:["EirGrid requires planning permission to be in place before accepting a TCP application, so the planning process must complete first.","Grid connection and planning run in series under current CRU rules, so the TCP must wait until planning is determined before submission.","Grid connection and planning take similar time — running them in parallel saves years","EirGrid can formally refuse a connection if planning permission has already been granted to a competing applicant on the same substation."],correct:2,explain:"TCP timeline is 4–8 years. Planning typically 18 months–3 years. Running in parallel saves years. Source: EirGrid Connection Policy 2024."},
  {level:1,id:"Q006-03",icon:"🗺",stage:"rhetoric",q:"How would you explain the Irish grid connection queue to a fund manager?",options:["ESB Networks manages the distribution grid and processes connection applications faster than EirGrid — most DC connections are now via ESB Networks rather than the TCP route.","EirGrid prioritises commercial applications commercially and can fast-track urgent DC connections if the developer submits a compelling grid benefit case.","Grid connections for DC campuses of 5 MVA and above are typically available within 12 months under CRU's expedited commercial connection pathway.","2.1 GW of DC applications are ahead of you — each representing years of lead time"],correct:3,explain:"2.1 GW of queued DC applications means any new applicant faces 4–8 years minimum to energisation. Framing this as a concrete queue position, not abstract programme risk, is what fund managers retain and act on. Queue position is the most commercially valuable intangible in Irish DC development. Source: EirGrid System Operator data 2024."},

  {level:2,id:"Q006-04",icon:"📋",stage:"grammar",q:"What does TCP stand for in the EirGrid connection process?",options:["Technical Connection Protocol","Transmission Connection Policy","Total Capacity Planning","Transformer Connection Programme"],correct:1,explain:"TCP = Transmission Connection Policy — EirGrid's formal process for connections to 110kV+. Governed by CRU/2025236 (superseding CRU/21/124)."},
  {level:2,id:"Q006-05",icon:"📋",stage:"logic",q:"A connection offer expires before the developer accepts it. What is the likely consequence?",options:["The application loses its queue position and joins the back of the queue — the most commercially damaging outcome in the TCP process.","EirGrid automatically renews the offer at the same terms and queue position, provided the developer notifies within 30 days of expiry.","EirGrid issues a revised offer within 4 weeks at updated connection cost, preserving the original queue position under the CRU continuity rule.","The developer can renegotiate the commercial terms of the offer before the expiry date is formally recorded by EirGrid."],correct:0,explain:"An expired offer means the application loses its queue position. Queue position is the most valuable thing in the TCP process."},
  {level:2,id:"Q006-06",icon:"📋",stage:"rhetoric",q:"A QS asks what provisional sum to put in the budget for grid connection. What is the correct response?",options:["Allocate €5M as a flat provisional sum — this is the standard industry benchmark for Irish transmission-connected data centre grid connections.","Nil — EirGrid pays for all shallow connection works under the regulated connection charging regime; the developer only pays for on-site primary substation infrastructure.","€50k–€150k per MVA for shallow connection, with contingency for deep reinforcement","Allow €1M per MW of IT load as a rule of thumb — this captures both shallow connection charges and on-site primary substation capital cost."],correct:2,explain:"€50k–€150k per MVA is the standard shallow connection benchmark. Deep reinforcement is additional and site-specific. Source: EirGrid Connection Policy 2024; CRU/2025236."},

  {level:3,id:"Q006-07",icon:"⚡",stage:"grammar",q:"What is the typical 2025 market lead time for a 100 MVA power transformer?",options:["52–78 weeks","26–36 weeks","8–12 weeks","Over 100 weeks"],correct:0,explain:"52–78 weeks (approximately 12–18 months) is the current 2025 market lead time for large power transformers from the four main manufacturers (Siemens, ABB, Hitachi Energy, Hyundai). This is the critical long-lead item on primary substation design."},
  {level:3,id:"Q006-08",icon:"⚡",stage:"logic",q:"Why is a double busbar configuration (not single busbar) specified for Tier IV primary substations?",options:["Double busbar is cheaper to install and operate because it uses a simpler switching scheme that reduces protection relay count.","Double busbar provides twice the fault current capacity, which is required by IEC 62271 for transmission-connected installations.","Double busbar allows concurrent maintainability — either bus can be isolated for maintenance without loss of supply","Single busbar meets Tier IV requirements provided the busbars are fitted with bus-coupler protection rated at 40 kA for 1 second."],correct:2,explain:"Tier IV requires concurrent maintainability. A single busbar requires a complete outage for maintenance. Double busbar allows one section to be isolated while the other remains live. Source: Uptime Institute Tier Standard; CIBSE TM57."},
  {level:3,id:"Q006-09",icon:"⚡",stage:"rhetoric",q:"How do you explain transformer procurement timing to a developer who wants to wait until detailed design is complete?",options:["The transformer must be ordered before detailed design is complete due to 52–78 week lead time","Detailed design is the right time to order — the transformer specification depends on the final load schedule and voltage regulation calculation output.","Transformer specification is the HV contractor's responsibility; the developer should not order directly and should wait for the contractor's procurement schedule.","A standard off-the-shelf transformer can be sourced in 8–12 weeks, so waiting for detailed design is the correct and cost-effective approach."],correct:0,explain:"Waiting for detailed design completion before ordering guarantees a programme delay of 12–18 months. Transformer procurement is a project inception decision."},

  {level:4,id:"Q006-10",icon:"🛡",stage:"grammar",q:"What is the typical trip time for transformer differential protection?",options:["15–25ms","150–300ms","60–150ms","500–1000ms"],correct:0,explain:"Transformer differential protection trips in 15–25ms — the fastest type in the primary substation. An internal fault persisting beyond this causes winding damage and potential fire. It operates by comparing currents entering and leaving the transformer: any imbalance above threshold triggers an immediate trip. Source: IEC 60255-187-3."},
  {level:4,id:"Q006-11",icon:"🛡",stage:"logic",q:"An incomer relay and outgoing feeder relay both trip at 0.4 seconds. What is the problem?",options:["0.4 seconds is too slow for modern IEC 60255 relays — both relays must be set to trip within 0.1 seconds to meet EirGrid Grid Code requirements.","Setting both relays to the same trip time is only a problem at voltages above 110kV where EirGrid requires graded discrimination.","Settings are standard and correct — 0.4 seconds is the EirGrid Grid Code minimum for incomer and feeder protection at 10 kV.","Both relays race to trip — likely blacking out the whole facility"],correct:3,explain:"Zero discrimination time means both relays trip simultaneously. A feeder fault takes out entire primary supply. Requires 0.3–0.4s time step. Source: CIBSE TM57 Section 5."},
  {level:4,id:"Q006-12",icon:"🛡",stage:"rhetoric",q:"A facility manager asks why protection settings from a previous DC project can't be reused. How do you respond?",options:["They can be reused if the same relay manufacturer and firmware version are used — EirGrid accepts type-tested settings for identical installations.","Protection settings are site-specific based on local fault levels. Reusing is a professional liability issue.","Protection settings are standardised across all EirGrid connections under the Grid Code — the same settings apply to all 10 kV connections.","Settings do not need to be site-specific if the same relay type and rated voltage are used — the manufacturer's default settings are Grid Code compliant."],correct:1,explain:"Protection settings are derived from site-specific fault levels — driven by cable impedances, network topology, and local MV grid conditions that differ between sites and change over time as the network evolves. Reusing settings from another project is a professional liability risk and EirGrid Grid Code non-compliance. A formal relay coordination study is required per installation. Source: IEC 60255; EirGrid Grid Code."},

  {level:5,id:"Q006-13",icon:"🔀",stage:"grammar",q:"For Tier IV dual feed to be genuinely independent, what is the minimum requirement?",options:["Two cables from the same substation on separate busbars and separate feeders","Two feeds from geographically separate EirGrid substations with independent busbars and cable routes","Two circuits on the same overhead line routed via different pole positions","Two feeds from the same substation on different voltage levels"],correct:1,explain:"Genuine independence requires different EirGrid substations, independent cable routes, no shared protection. Source: Uptime Institute; EN 50600-2-2."},
  {level:5,id:"Q006-14",icon:"🔀",stage:"logic",q:"A contractor lays both HV cables in a single trench to save cost. Why is this a problem?",options:["A single mechanical event takes out both feeds — defeating the independence requirement","Laying cables in a shared trench violates planning conditions for all DCs in the Greater Dublin Area.","Cables in close proximity overheat each other, reducing the current-carrying capacity below the rated design value.","Shared trenching is permitted if the cables are rated at different voltages and separated by a concrete dividing wall."],correct:0,explain:"Route diversity requires separate trenches and different routes. A single incident affecting one trench takes out both cables."},
  {level:5,id:"Q006-15",icon:"🔀",stage:"rhetoric",q:"A developer says: 'We have two feeds from Citywest substation — that's dual feed for Tier IV.' How do you respond?",options:["Correct — two physically separate feeders from the same substation meet the Tier IV independence criterion under EN 50600-2-2, provided they are on separate busbars.","Two feeds from the same substation share a common busbar. A single event at Citywest takes out both. Tier IV requires genuinely independent substations.","This depends entirely on whether the feeds are on different busbars within Citywest — dual busbar at the source substation is sufficient for Tier IV.","Correct if both feeds are at different voltage levels — a 110 kV and a 38 kV feed from the same substation counts as independent for Tier IV purposes."],correct:1,explain:"Two feeds from the same substation are NOT independent for Tier IV. Both share the same physical substation vulnerability."},

  {level:6,id:"Q006-16",icon:"📈",stage:"grammar",q:"What is the EirGrid Grid Code minimum power factor at the connection point?",options:["0.85 lagging","Unity (1.0)","0.95 lagging to 0.95 leading","0.90 lagging"],correct:2,explain:"EirGrid Grid Code requires PF between 0.95 lagging and 0.95 leading. Most DCs target 0.98+. Source: EirGrid Grid Code CPC4; EN 50160."},
  {level:6,id:"Q006-17",icon:"📈",stage:"logic",q:"An existing DC with older transformer-based UPS receives an EirGrid PF non-compliance notice. What is the most cost-effective long-term remedy?",options:["Investigate faulty metering before committing capital — transformer-based UPS power factor is typically stable and PF non-compliance notices are often attributable to metering drift.","PF correction is not required for standby UPS — the EirGrid Grid Code PF requirement applies to the primary connection point, not individual load circuits.","Install dedicated capacitor banks at the primary substation regardless of UPS age — this is the least disruptive and most rapid fix for a PF non-compliance notice.","Replace UPS with modern modular units (PF 0.99 input) — resolves PF AND delivers energy saving payback"],correct:3,explain:"Older UPS has PF 0.80–0.85. Modern modular UPS achieves 0.99+. Replacement resolves PF AND saves ~2.5% UPS losses. Payback 7–15 years."},
  {level:6,id:"Q006-18",icon:"📈",stage:"rhetoric",q:"A facilities manager asks why harmonic distortion matters if the lights aren't flickering. How do you explain?",options:["Harmonics cause visible flicker only at frequencies below 25 Hz — above that threshold, the distortion is invisible to the eye but still measurable at the connection point.","Modern UPS and CRAC units have active harmonic filters built in, so harmonic distortion at 10 kV is self-correcting in data centre environments.","Harmonic distortion is monitored passively by EirGrid and only becomes the DC operator's problem if it triggers a Grid Code non-compliance notice.","Harmonics overheat cables and transformers silently and can cause relay mal-operation — invisible damage until something fails"],correct:3,explain:"Harmonics cause hidden damage and protection interference long before visible symptoms. Baseline power quality monitoring is important."},

  {level:7,id:"Q006-19",icon:"📜",stage:"grammar",q:"What does the EirGrid SCADA interface requirement mean for a DC operator?",options:["Must install a meteorological monitoring station providing ambient temperature and wind speed data to EirGrid's system operations centre.","SCADA connectivity is optional for DC facilities below 50 MW IT load under EirGrid's exemption for sub-threshold commercial connections.","Must install a real-time communications link providing voltage, current, power and alarm data to EirGrid's control centre","EirGrid installs and maintains the SCADA interface at its own cost under the regulated connection agreement."],correct:2,explain:"EirGrid requires real-time monitoring of all transmission-connected facilities. DC owner must install and maintain the interface. Polling every 2 seconds."},
  {level:7,id:"Q006-20",icon:"📜",stage:"logic",q:"Protection relays not on EirGrid's approved list discovered 4 weeks before commissioning. What is the primary consequence?",options:["A minor delay of approximately one week — EirGrid's engineering team can fast-track relay type approval for unapproved units where the technical specification is equivalent.","EirGrid will not permit connection. Type approval takes 12–16 weeks minimum — 8–12 week programme delay likely","EirGrid can temporarily waive the type approval requirement and permit commissioning under a performance bond provided the relay manufacturer is IEC-certified.","Relays can be commissioned under a programme bond with retrospective type approval, provided EirGrid's protection engineer signs a technical concession."],correct:1,explain:"EirGrid will not energise until relay type approval is confirmed. This is a hard gate. 12–16 weeks minimum. Prevention: check approved list at specification stage."},
  {level:7,id:"Q006-21",icon:"📜",stage:"rhetoric",q:"Who is responsible for Grid Code compliance at a DC — the HV contractor or the DC owner?",options:["The HV contractor — Grid Code compliance transfers to the contractor at financial close and remains with the contractor for the duration of the defects liability period.","EirGrid is responsible for Grid Code compliance monitoring at the connection point and notifies the DC owner of any breaches detected during routine network surveillance.","DC owner — Grid Code compliance is the connection holder's obligation regardless of installer","CRU — CRU holds Grid Code enforcement powers and bears primary compliance responsibility for all transmission-connected parties including DC owners."],correct:2,explain:"The DC owner is responsible for documentation, type approvals, ongoing compliance monitoring, and reporting. Common source of confusion."},

  {level:8,id:"Q006-22",icon:"🔋",stage:"grammar",q:"At what installed generation capacity does a DC require a CRU Licence to Generate Electricity (Dispatch Licence)?",options:["1 MW","10 MW","5 MW","25 MW"],correct:1,explain:"Generation licence threshold is 10 MW installed electrical capacity. Most Tier III/IV DCs exceed this. Source: Electricity Regulation Act 1999 s.14."},
  {level:8,id:"Q006-23",icon:"🔋",stage:"logic",q:"A DC's generators never export to the grid — strictly standby. Does this mean a generation licence is not required?",options:["Incorrect — the threshold is based on installed capacity, not operating mode. Standby generators above 10 MW still need a licence.","Correct — standby generators are explicitly exempt from CRU licence requirements because they do not participate in the Single Electricity Market dispatch schedule.","Only generators physically connected to the transmission or distribution grid via a formal connection agreement require a CRU Dispatch Licence.","Diesel-fuelled generators are exempt from the CRU generation licence requirement regardless of installed capacity, as they are classified as emergency plant."],correct:0,explain:"CRU requires a generation licence based on installed capacity, not operating mode or dispatch intent. Standby generators above 10 MW total installed capacity need a licence even if they never export to the grid. The application process takes 6–12 months; missing this blocks commissioning. Source: Electricity Regulation Act 1999; CRU/2025236."},
  {level:8,id:"Q006-24",icon:"🔋",stage:"rhetoric",q:"An investor asks if switching to HVO fuel has a material financial impact. How do you frame the answer?",options:["HVO costs approximately twice as much per litre as mineral diesel and doubles the annual generator fuel budget — a material capital allocation decision that requires board approval.","HVO is only suitable for new generators with compatible fuel injection systems — older DC generator fleets cannot run on HVO without significant engine modification.","HVO qualifies for full Irish government fuel subsidy under the Renewable Transport Fuel Obligation, making the net cost to the DC operator equivalent to mineral diesel.","HVO costs 20–25% more per litre, but generator runtime is typically 100–200 hours/year. Annual premium for a 60 MW fleet is €5k–€10k — not material."],correct:3,explain:"HVO premium sounds significant but annual fuel consumption for standby operation is small. The lifecycle carbon and EPA compliance benefits outweigh cost."},

  {level:9,id:"Q006-25",icon:"🌱",stage:"grammar",q:"What is the Irish government's target for renewable electricity by 2030?",options:["50%","65%","100%","80%"],correct:3,explain:"Climate Action Plan 2024 targets 80% renewable by 2030. Reduces grid carbon intensity to ~0.08–0.10 kgCO₂/kWh — a 55–65% reduction from 0.2241."},
  {level:9,id:"Q006-26",icon:"🌱",stage:"logic",q:"A DC claims 'net zero Scope 2' based solely on the Irish grid's renewable trajectory. Why is this insufficient for an SFDR Article 9 fund?",options:["The Irish grid will not reach 80% renewable by 2030 on current build rates, so the Scope 2 claim is based on an unachievable trajectory.","Article 9 SFDR funds are not permitted to make Scope 2 claims for portfolio assets — only Scope 1 direct emissions are reportable under the fund's PAI framework.","Article 9 funds require additionality-verified PPAs — passive grid decarbonisation does not satisfy SFDR/Taxonomy requirements","Net zero Scope 2 is not a recognised SFDR reporting metric — SFDR mandates GHG intensity disclosure rather than net zero framing for portfolio assets."],correct:2,explain:"SFDR Article 9 requires market-based accounting with additionality. Passive grid improvement doesn't qualify. Source: EU RED III Article 22a; EU Taxonomy."},
  {level:9,id:"Q006-27",icon:"🌱",stage:"rhetoric",q:"A developer asks whether South Dublin or a greenfield site in Athlone would have a shorter grid connection programme. How do you respond?",options:["South Dublin — existing HV infrastructure and substation capacity near established DC campuses gives a shorter TCP queue and lower reinforcement cost.","Athlone — EirGrid capacity is less constrained outside the GDA, and the DC policy burden is lower","Both locations face the same TCP queue — EirGrid processes connection applications on a first-in-first-out basis regardless of geography.","Neither — the government moratorium on new DC connections applies nationally and Athlone is subject to the same connection freeze as South Dublin."],correct:1,explain:"GDA grid is more constrained due to the 2.1 GW DC queue. Locations outside the GDA typically have shorter queues and face less political resistance. Source: EirGrid TDP 2022; DHLGH DC Policy Statement."}
];
const PERSONAS = {declan:"Declan (Ops Manager)",ann:"Ann (Fund Manager)",mark:"Mark (MEP Engineer)",sarah:"Sarah (ESG Analyst)",tom:"Tom (QS / Cost Manager)"};
const PERSONA_KEYS = ["declan","ann","mark","sarah","tom"];

const SO_WHAT_MAP = {
"EirGrid":"Why it matters: EirGrid controls the 110 kV+ network. If your DC needs more than ~20 MW, EirGrid is your gatekeeper — not ESB Networks.",
"ESB Networks":"Why it matters: small DCs connect through ESB Networks at 10/38 kV. The timeline is months, not years. This is the path for edge and colocation.",
"Grid Connection Queue":"Why it matters: queue position determines when your DC can energise. Construction speed is irrelevant if the grid connection is years away.",
"DC Share of Irish Grid":"Why it matters: at 22% of national demand, DCs are the most politically visible electricity consumer in Ireland. Every policy decision affects you.",
"SNSP Limit":"Why it matters: the SNSP limit caps renewable penetration. Until it rises to 95%, wind curtailment continues — and DCs cannot claim 100% renewable on a location basis.",
"TCP (Transmission Connection Policy)":"Why it matters: the TCP is the formal gate between your project and the grid. Queue position, offer validity, and acceptance deadlines all sit here.",
"Connection Offer":"Why it matters: the connection offer is time-limited. An expired offer sends you to the back of a multi-year queue.",
"Shallow vs Deep Reinforcement":"Why it matters: shallow costs are predictable (€50k–€150k/MVA, Tier 1 — ESB Networks Connection Charging Methodology, indicative). Deep reinforcement can be 2–5× and is entirely site-specific.",
"Connection Timeline":"Why it matters: 4–8 years for 110 kV connections is the single longest lead item on any Irish DC project.",
"Pre-Application Consultation":"Why it matters: 8 weeks and free. It tells you if the site is viable before you spend money on a formal application.",
"Power Transformer (110kV/11kV or 110kV/20kV)":"Why it matters: 52–78 week lead time means ordering before many design decisions are finalised. The programme depends on it.",
"110kV Switchgear":"Why it matters: GIS vs AIS determines footprint and cost. SF₆ creates F-Gas reporting obligations and future regulatory risk.",
"Busbar Configuration":"Why it matters: single busbar = single point of failure. The busbar decision cascades through every downstream protection study.",
"Protection Relays":"Why it matters: protection relays detect faults in milliseconds. Wrong settings cause total blackouts instead of isolated trips.",
"Transformer Cooling Modes (ONAN/ONAF)":"Why it matters: understanding derating means knowing the real capacity of your transformer — not just the nameplate number.",
"Overcurrent Protection (IDMT)":"Why it matters: IDMT is the workhorse of protection. Getting the time-current settings wrong means faults trip the wrong breaker.",
"Earth Fault Protection":"Why it matters: earth faults start small and grow. Early detection at 5–10% catches developing faults before they become dangerous.",
"Differential Protection":"Why it matters: differential protection is the fastest type (15–25 ms). It prevents transformer fires from internal faults.",
"Protection Discrimination":"Why it matters: without discrimination, one fault on a single PDU could black out the entire 110 kV supply.",
"Current Transformer (CT)":"Why it matters: the relay is only as good as its CT. Wrong CT specification means wrong protection response during faults.",
"Independent Feed":"Why it matters: true independence means no shared weakness. Two feeds from one substation share a common vulnerability.",
"Concurrently Maintainable":"Why it matters: concurrent maintainability drives 55% capital cost premium. It is the defining characteristic of Tier III and above.",
"Grid Busbar Transfer":"Why it matters: the transfer must happen faster than UPS battery depletion. Static transfer (1–4 ms) vs motorised (100–300 ms).",
"N Security Concept":"Why it matters: N-1 at the grid level does not mean N-1 at your connection. You must apply and pay for dual independent feeds.",
"Route Diversity":"Why it matters: one backhoe strike in a shared trench takes out both feeds. Physical separation is the only real test.",
"Power Factor":"Why it matters: low PF wastes grid capacity and triggers EirGrid charges. Modern UPS at 0.99 PF eliminates the problem.",
"Total Harmonic Distortion (THD)":"Why it matters: harmonics cause silent damage — overheating cables and transformers, and potentially causing relay mal-operation.",
"Flicker":"Why it matters: DC loads are steady, so operational flicker is rare. But generator transfer events need baseline monitoring data.",
"Reactive Power Compensation":"Why it matters: modern UPS with active front-end (PF 0.99+) eliminates the need for separate correction equipment.",
"K-Factor Transformer":"Why it matters: a standard transformer feeding IT loads without K-factor derating will overheat. K-13 is the minimum for DC applications.",
"Grid Code":"Why it matters: non-compliance can mean EirGrid refuses to energise or disconnects you. It is a condition of connection.",
"Demand Connection Code (DCC)":"Why it matters: the DCC harmonises connection requirements across Europe. A 50 MW DC is well above the 250 kW threshold.",
"SCADA Interface":"Why it matters: without SCADA, EirGrid will not energise. It is a hard gate — not a nice-to-have.",
"Fault Ride-Through (FRT)":"Why it matters: disconnecting during a grid voltage dip makes the grid problem worse. Modern UPS provides seamless FRT.",
"Type Registration":"Why it matters: specifying from the approved list avoids 12–18 weeks of type approval delay. A 2-hour check prevents a 3-month delay.",
"Licence to Generate Electricity (commonly: Dispatch Licence)":"Why it matters: the threshold is installed capacity, not operating mode. Even standby-only generators above 10 MW need a licence.",
"Generator Curtailment":"Why it matters: standby generators face low curtailment risk. But BESS in grid services is subject to dispatch instructions.",
"BESS Grid Services":"Why it matters: CRM T-4 at €149,960/MW/yr (Tier 1 — SEMO PCAR2829T-4) is significant revenue — but requires I-SEM registration and operational complexity.",
"HVO (Hydrotreated Vegetable Oil)":"Why it matters: HVO is a drop-in replacement that reduces lifecycle CO₂ by ~90%. The fuel cost premium for standby operation is not material.",
"EPA Industrial Emissions Licence":"Why it matters: the 50 MW threshold is thermal input, not electrical output. Most Tier IV DCs exceed it — often without realising.",
"Government DC Policy Statement (2022)":"Why it matters: not a ban, but a higher evidential burden. Development outside the GDA faces fewer hurdles.",
"EirGrid 2030 Renewable Target":"Why it matters: grid decarbonisation alone reduces DC carbon footprint by 55–65% between 2026 and 2030. Costs nothing.",
"Additionality (Corporate PPA)":"Why it matters: passive grid improvement does not satisfy SFDR/Taxonomy requirements. Article 9 funds need additionality-verified PPAs.",
"Flexibility and Demand Response":"Why it matters: DCs that actively support grid stability are part of the solution. DCs that consume passively are part of the problem.",
"CRU Data Centre Connection Obligation":"Why it matters: 80% renewable is a condition of connection, not a voluntary target. Without evidence, CRU can block energisation."

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null,info:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){this.setState({info});}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Tool Runtime Error'),

      React.createElement('pre',{style:{background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,fontSize:13,whiteSpace:'pre-wrap',maxHeight:300,overflow:'auto'}},String(this.state.error)),

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].lvl.level),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

      <div className="chain-layout">
      <div>
        <div className="card">
          
          {LEVELS.map((l,i)=>{
            const p = progress[l.id]||{};
            const completedStages = [p.grammar,p.logic,p.rhetoric].filter(Boolean).length;
            const allDone = completedStages===3;
            const cr = showCascade ? cascadeResults[i] : null;
            const isBneck = cr && !cr.pass && cr.needed!=="-";
            const isPass = cr && cr.pass && cr.needed!=="-";
            
            return (
              <div key={l.id} className={'chain-item'+(isPass?' pass':isBneck?' fail':'')}
                  role="button" tabIndex={0}
                  onClick={()=>handleChainClick(l)}
                  onKeyDown={(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleChainClick(l);}}}
                  style={{
                    alignItems:'flex-start'
                  }}>
                  <span className="icon" style={{paddingTop:2}}>{l.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:14,color:'var(--text-bright)'}}>L{l.level}: {l.name}</div>
                        <div style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{l.component}</div>
                      </div>
                      <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                        <Dot done={p.grammar} stage="grammar"/>
                        <Dot done={p.logic} stage="logic"/>
                        <Dot done={p.rhetoric} stage="rhetoric"/>
                      </div>
                    </div>
                    {cr && cr.needed!=="-" && (<div style={{marginTop:6,fontSize:12}}><span className={cr.pass?'badge badge-pass':'badge badge-fail'}>{cr.pass?'PASS':'FAIL'}</span><span style={{color:'var(--text-dim)',marginLeft:8}}>{cr.detail}</span></div>)}
                    {activeChainLevel === l.level && (
                      <div className="fade-in selectable-text"
                        style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',userSelect:'text',cursor:'text'}}
                        onClick={e => e.stopPropagation()}
                        onMouseDown={e => e.stopPropagation()}>
                        <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,marginBottom:8}}>
                          {l.plainEnglish}
                        </p>
                        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',marginBottom:8}}>
                          User Need: {l.userNeedStatement}

                                        fontSize:12,fontFamily:'var(--font-sans)'}}

            <span style={{marginRight:12}}>

/* ─── CLOCK FACE ─── */
function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

        E('button', {onClick:handleSubmit, disabled:!name.trim()||!validEmail(email), style:Object.assign({},gbtn,{opacity:(!name.trim()||!validEmail(email))?0.5:1})}, 'Issue ' + selHours + '-Hour Certificate'),
        E('div', {style:{fontSize:11,color:'var(--text-dim)',marginTop:10,textAlign:'center'}}, 'Verifiable at learn.legacybe.ie/verify')),
      state === 'loading' && E('div', {style:{textAlign:'center',padding:'32px 0',color:'var(--text-dim)'}}, 'Issuing certificate...'),

        E('button', {onClick:doPrint, style:gbtn}, '⎙ Save as PDF / Print'),

  );
}
function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc006_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc006_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc006_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
          27 questions across three Trivium stages — 9 per stage, one per chain level.
          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>60s</span>
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}
          </div>
        </div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterStage==='all'?' active':'')} onClick={()=>setFilterStage('all')}>All</button>
        <button className={'filter-btn'+(filterStage==='grammar'?' active':'')} onClick={()=>setFilterStage('grammar')}>Knowledge Check</button>
        <button className={'filter-btn'+(filterStage==='logic'?' active':'')} onClick={()=>setFilterStage('logic')}>Eng. Calculation</button>
        <button className={'filter-btn'+(filterStage==='rhetoric'?' active':'')} onClick={()=>setFilterStage('rhetoric')}>Prof. Judgement</button>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>
        {LEVELS.map(l=>(<button key={l.id} className={'filter-btn'+(filterLevel===l.level?' active':'')} onClick={()=>setFilterLevel(l.level)}>L{l.level}</button>))}
      </div>
      {score.total>0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:600}}>Score: {score.correct}/{score.total} ({Math.round(score.correct/score.total*100)}%)</div>
            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL?'Completed in '+fmtTime(elapsed)+' (under time)':'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{const s=stageScore(st);const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};return s.t>0&&(<div key={st} style={{fontSize:12,color:stageColours[st]}}><strong>{labels[st]}:</strong> {s.c}/{s.t}</div>);})}
          </div>
          {allAnswered&&assessPct>=80&&React.createElement('button',{onClick:function(){setShowCertModal(true);},style:{marginTop:12,padding:'10px 0',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}},assessPct>=90?'Get Achievement Certificate':'Get Completion Certificate')}
          {showCertModal&&React.createElement(CertModal,{score:score.correct,total:score.total,onClose:function(){setShowCertModal(false);}})}
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>

        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown

        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';

        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>

            </div>

            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{

              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}

            })}

            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}

      })}

  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
