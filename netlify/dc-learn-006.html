<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:6px;cursor:pointer;transition:all .2s}
.chain-item .name{font-weight:600;font-size:14px;color:var(--text-bright)}
.chain-item .comp{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}



.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
</style>

  cascadeCheck:(kw,racks,pue)=>{const totalMW=(kw*racks/1000)*pue;const tier=totalMW<=5?"MV (10 kV, ESB Networks)":totalMW<=20?"HV (38 kV, ESB Networks)":"Transmission (110 kV, EirGrid)";const timeline=totalMW<=5?"6–18 months":totalMW<=20?"12–36 months":"4–8 years";return{needed:totalMW.toFixed(1),available:tier,unit:"MW",pass:totalMW<=5,detail:`${totalMW.toFixed(1)} MW total → ${tier}. Connection timeline: ${timeline}`}},
  learningObjective:"Understand the structure of the Irish electricity grid, who operates it, and why grid capacity is the first constraint on any DC project.",
  plainEnglish:"The Irish grid has three voltage tiers, and your connection tier depends on how much power you need. Small DCs (like Clonshaugh at 5 MVA) connect at 10 kV from ESB Networks — months to arrange. Mid-size DCs (5–20 MW) connect at 38 kV, also ESB Networks — 1–3 years. Large DCs (20+ MW) need a 110 kV transmission connection from EirGrid — 4–8 years, and there are ~2.1 GW of DC applications queued ahead of you.",
  grammar:{facts:[
    {term:"EirGrid",definition:"The state-owned transmission system operator (TSO) for Ireland, responsible for the 110kV, 220kV, and 400kV network.",plain:"Owns and operates the high-voltage backbone of the Irish electricity grid.",number:"~6,800 km of high-voltage transmission lines. Peak demand ~6.7 GW (2024).",standard:"Electricity Regulation Act 1999; EirGrid Grid Code v2.0 2024",
      feynman:{analogy:"Think of EirGrid like the motorway authority. They don\u2019t own the cars or the local roads \u2014 they own and manage the motorways (110kV and above). Every large data centre needs a junction onto their motorway, and there are a limited number of junctions available.",firstPrinciples:"Electricity must be generated, transmitted at high voltage over long distances, then stepped down for local distribution. In Ireland, EirGrid manages the high-voltage transmission network (110kV, 220kV, 400kV). They don\u2019t generate or sell electricity \u2014 they transport it. Any load above ~20 MW needs a direct connection to their network.",theTest:"You know you understand EirGrid when you can answer: Who do you contact first about grid capacity for a 40 MW DC in Dublin? Answer: EirGrid (not ESB Networks), because 40 MW requires a 110kV transmission connection, which is EirGrid\u2019s network."}},
    {term:"ESB Networks",definition:"The distribution system operator (DSO) for Ireland, responsible for the 38kV and below network. Serves ~2.3 million customers.",plain:"Owns and operates the local electricity network \u2014 the wires that reach homes and small businesses.",number:"38kV, 20kV, 10kV, and 400V networks. ~155,000 km of overhead and underground cable.",standard:"Electricity Regulation Act 1999; ESB Networks Distribution Code",
      feynman:{analogy:"If EirGrid is the motorway authority, ESB Networks runs the local roads and side streets. Most homes and businesses connect here. But a data centre drawing tens of MW of power can\u2019t connect to a side street \u2014 it needs the motorway.",firstPrinciples:"ESB Networks distributes electricity from EirGrid\u2019s transmission substations to end users at lower voltages (38kV, 20kV, 10kV, 400V). Small DCs (<5 MW) may connect at 38kV distribution level. Larger DCs (>20 MW) must connect directly to EirGrid\u2019s 110kV transmission network because the distribution network cannot supply enough power to a single point.",theTest:"You know you understand this when you can answer: A 5 MW edge DC in Cork needs a grid connection. Who processes the application? Answer: ESB Networks, because 5 MW is within distribution network capacity at 38kV. But a 50 MW hyperscale must go to EirGrid for a 110kV transmission connection."}},
    {term:"Grid Connection Queue",definition:"The backlog of applications waiting for EirGrid to process grid connections. DC applications represent a significant portion.",plain:"A queue of projects waiting for permission to connect to the grid. It\u2019s long and slow.",number:"~2.1 GW of DC applications pending (EirGrid 2024). Timeline: 4\u20138 years from application to energisation.",standard:"EirGrid System Operator Annual Report 2024; CRU/2025236",
      feynman:{analogy:"Think of it like a hospital waiting list. You can\u2019t jump the queue by being richer or more prepared \u2014 your position is determined by when you applied. And the queue for grid connections is currently about 2.1 GW of DC projects \u2014 each representing years of waiting.",firstPrinciples:"EirGrid has finite capacity to process connection applications \u2014 each requires a detailed system study modelling the impact on the entire national grid. The queue is first-come-first-served. 2.1 GW of pending DC applications means that even submitting today, energisation is likely 4\u20138 years away. Queue position is the single most valuable asset in an Irish DC development.",theTest:"You know you understand this when you can answer: A developer submits a technically perfect 40 MW application today. When can they expect to energise? Answer: 4\u20138 years minimum, because queue position determines timing \u2014 not application quality."}},
    {term:"DC Share of Irish Grid",definition:"Data centres now consume approximately 22% of total Irish electricity demand (CRU, 2024).",plain:"Over a fifth of all electricity in Ireland goes to data centres.",number:"DC demand: ~22% of grid (CRU, 2024). Government review targeting 15\u201318% by 2030.",standard:"CRU Annual Report 2024; DHLGH DC Policy Statement 2022; EirGrid Generation Adequacy Report 2024",
      feynman:{analogy:"Imagine a town where one factory uses a quarter of the entire water supply. The town council would want to know: is the factory essential? Can it use less? Are we building enough water infrastructure? That\u2019s the Irish government\u2019s position on DC electricity consumption.",firstPrinciples:"Ireland\u2019s total electricity demand is approximately 35 TWh/year. DCs consume roughly 8 TWh \u2014 22% (CRU, 2024). This concentration of demand in one sector creates grid planning challenges: where to build new generation, how to manage peak demand, and whether the grid can accommodate further DC growth while meeting climate targets.",theTest:"You know you understand this when you can answer: Why does the government care about DC electricity consumption specifically? Answer: At 22%, DCs are the single largest category of demand growth. This affects generation planning, grid reinforcement costs, and Ireland\u2019s ability to meet its 80% renewable target by 2030."}},
    {term:"SNSP Limit",definition:"System Non-Synchronous Penetration limit — the maximum percentage of electricity demand that can be served by non-synchronous generation (wind, solar, HVDC imports) at any instant.",plain:"There is a technical ceiling on how much wind and solar the Irish grid can absorb at any given moment. Currently 75%. If wind is generating more than 75% of demand, EirGrid must curtail it.",number:"75% SNSP limit (2024). Target: 95% by 2030. Was 50% in 2016.",standard:"EirGrid DS3 Programme; EirGrid SNSP Operational Limit Policy 2024",
      feynman:{analogy:"Think of a spinning top. As long as enough heavy spinning tops (synchronous generators) are turning, the system stays stable. Replace too many with feathers (non-synchronous wind/solar) and the top wobbles. SNSP is the maximum feather-to-top ratio the grid can tolerate.",firstPrinciples:"Grid frequency (50 Hz) is maintained by the physical inertia of large spinning generators. Wind turbines and solar panels connect via power electronics and do not provide natural inertia. Above the SNSP limit, the grid does not have enough inertia to recover from sudden disturbances. EirGrid has progressively raised the limit from 50% to 75% through the DS3 programme.",theTest:"You know you understand SNSP when you can answer: On a windy night with low demand, wind could supply 100% of Irish electricity. Why does EirGrid curtail wind at 75%? Answer: Above 75% SNSP, there is insufficient synchronous inertia to maintain grid stability during a fault. The curtailed energy is wasted — this is the cost of the current SNSP limit."}}

  whatItLooksLike:"Overhead 110kV transmission lines on steel lattice towers, or underground cable terminations at the site boundary. EirGrid-branded equipment at the nearest transmission substation. Revenue metering at the point of connection.",
  siteChecklist:["Identify nearest 110kV substation from EirGrid published network map","Check published capacity constraints for the local 110kV network","Confirm whether dual independent 110kV feeds are available from different substations","Verify distance from nearest substation to site boundary (affects cable cost)","Check EirGrid\u2019s pre-application consultation availability (free, 8 weeks)"]},
  logic:{causeAndEffect:[
    {cause:"The EirGrid grid connection queue stands at 2.1 GW of DC applications with a typical lead time of 4–8 years",effect:"A DC project that hasn\u2019t applied for grid connection is already 4\u20138 years from energisation, regardless of construction readiness.",insight:"Grid connection is the longest single lead item on any DC project. It must be the first conversation, not the last."},
    {cause:"EirGrid operates on N-1 security \u2014 any single element can fail without cascading",effect:"New DC connections must not compromise grid security. Failed N-1 assessment means connection refused or delayed until reinforcement is built.",insight:"The N-1 study is not a formality. Large DC connections in constrained areas frequently fail the first assessment."},
    {cause:"DC demand is approximately 22% of Irish grid (CRU, 2024) and government is reviewing policy",effect:"New DC connections in the Greater Dublin Area face heightened planning scrutiny and potential policy restrictions.",insight:"Diversification outside Dublin reduces both grid queue risk and political risk."}
  ],
  constraintLesson:"The grid is the first constraint and the last to be resolved. A \u20ac100M DC with a 50 MVA MIC can never draw more than 50 MVA \u2014 no matter how many generators, UPS, or PDUs are installed. Increasing the MIC is a multi-year, multi-million-euro grid infrastructure project.\n",
  weakestLink:{
    whatsWrong:"Treat grid connection as a late-stage detail \u2014 confirm the site, get planning, then sort the grid.",
    whatsRight:"Treat grid connection as the first site selection criterion. Check capacity before anything else.",
    howToGetThere:"Request an indicative grid capacity assessment from EirGrid at pre-application stage. It\u2019s free, takes 8 weeks, and tells you if the preferred site is viable before you spend money on planning."}},
  rhetoric:{
    declan:{hook:"You need to know if the nearest 110 kV substation has headroom before you sign any site agreement. Not after — before.",text:"You need to know if the nearest 110kV substation has capacity before you sign anything. EirGrid publishes a capacity heat map \u2014 use it."},
    ann:{hook:"The grid connection queue is the single biggest programme risk on any Irish DC development today. It is also the item least likely to appear in the initial risk register.",text:"The grid connection queue is the single biggest programme risk on Irish DC development. 2.1 GW waiting. 4\u20138 years. That risk needs to be in your underwriting from day one."},
    mark:{hook:"110 kV connection for anything over 20 MW. Dual independent 110 kV sources for Tier IV. The network operator capacity check is the first engineering deliverable — not the last.",text:"110kV connection for anything over 20 MW. Dual independent 110kV sources for Tier IV \u2014 from different substations, not just different feeders."},
    sarah:{hook:"DC electricity consumption represents approximately 22 percent of Irish grid demand. That visibility means every new connection application receives heightened scrutiny from CRU.",text:"DC electricity consumption is approximately 22% of Irish grid demand (CRU, 2024). That figure is why government is reviewing DC policy."},
    tom:{hook:"Grid connection cost at 50 to 150 thousand euros per MVA for shallow works. Deep reinforcement works can add 1 to 5 million euros with no programme certainty on delivery date.",text:"Grid connection cost: \u20ac50k\u2013\u20ac150k per MVA for shallow connection (Tier 2 \u2014 EirGrid Connection Policy 2024, CRU/2025236). Deep reinforcement can be 2\u20135x that."}},
  rhetoricTakeaways:{declan:"Grid capacity determines when your DC energises — every other workstream is secondary.",ann:"Queue position is the most valuable asset in Irish DC development. It cannot be bought or expedited.",mark:"Confirm voltage tier and connection point at site selection — it determines every downstream design decision.",sarah:"22% of national demand is a political number. Know it, track it, report it.",tom:"Grid connection is the longest and most expensive single line item. Budget €50k–€150k/MVA minimum (Tier 2 — EirGrid Connection Policy 2024, CRU/2025236, indicative)."},
    scenario:{
    title:"The 40MW Meath Site",
    narrative:"A developer has secured an option on a 30-acre site in Meath. Planners are supportive. The business case assumes 40 MW IT Phase 1 with option to 120 MW. The project director asks: \u2018What\u2019s the grid situation?\u2019",
    question:"What is the minimum information you need before recommending the site proceeds to detailed planning?",
    answer:"This question tests whether you can prioritise grid capacity as the first site selection criterion \u2014 before planning, before design, before cost.\n\nMinimum information required:\n1. Nearest 110kV substation identity and capacity status \u2014 EirGrid published network map + pre-application query (free, 8 weeks)\n2. Second independent 110kV source for Tier IV dual feed\n3. Connection voltage confirmation \u2014 40 MW Phase 1 \u2192 110kV TCP. 120 MW ultimate \u2192 may require 220kV\n4. Current queue position estimate\n5. Overhead vs underground route \u2014 planning sensitivity\n\nThe following cost estimate uses indicative figures (Tier 2 \u2014 EirGrid Connection Policy 2024). All outputs are screening-level, subject to connection offer.\n\nIndicative connection cost: 40 MW @ 110kV \u2248 42,100 kVA at 0.95 PF (42.1 MVA).\nAt \u20ac50k\u2013\u20ac150k/MVA: \u20ac2.1M\u2013\u20ac6.3M shallow connection.\n\nWhat this means in practice: the grid connection alone could cost \u20ac2M\u2013\u20ac6M before a single rack is installed \u2014 and deep reinforcement could double or triple that figure. This is why grid capacity must be the first conversation, not the last.\n",
whoShouldCare:["mark","ann","tom"]},
  sourceNote:"EirGrid System Operator Annual Report 2024 (T1), Transmission Development Plan 2022 (T1). Connection costs: EirGrid Connection Policy 2024 (T1), CRU/2025236 (T1).",
  retrofitRelevance:"Existing DCs cannot increase power draw beyond their MIC. Understanding the grid structure reveals why MIC upgrades take 4\u20138 years \u2014 and why PUE improvement is the fastest way to free capacity.",
  crossRefs:[{module:"DC-LEARN-001",level:"L1",title:"Utility Supply & MIC",why:"MIC fundamentals and capacity planning"}],
  clockQuote:"A connection agreement is not a receipt. It is a contract between the building and the grid. When the building changes, the contract needs to change with it — and the grid doesn't move fast."

{
  id:"L2",level:2,name:"Connection Application",icon:"📋",
  component:"TCP Connection Process",available:true,
  userNeedStatement:"Understand the step-by-step TCP application process, what triggers each gate, and what the timelines actually mean.",
  cascadeCheck:(kw,racks,pue)=>{const totalMW=(kw*racks/1000)*pue;const mic=CLONSHAUGH.mic;return{needed:totalMW.toFixed(1),available:(mic*0.9).toFixed(1),unit:"MW",pass:totalMW<=(mic*0.9),detail:`${totalMW.toFixed(1)}MW demand vs ${(mic*0.9).toFixed(1)}MW MIC (${mic}MVA at 90% utilisation)`}},
  learningObjective:"Understand the EirGrid TCP process \u2014 how to apply, what triggers each gate, and why timing is everything.",
  plainEnglish:"It\u2019s like applying for planning permission, but the applicant is EirGrid and the planning authority is the entire Irish electricity network. You don\u2019t just plug in \u2014 you join a queue, pay for studies, and wait.",
  grammar:{facts:[
    {term:"TCP (Transmission Connection Policy)",definition:"EirGrid\u2019s formal process for processing applications to connect to the 110kV+ transmission network.",plain:"The rulebook for how you apply for a grid connection and how EirGrid processes it.",number:"Current queue: ~2.1 GW of DC applications pending (EirGrid 2024).",standard:"CRU Decision CRU/2025236 (superseding CRU/21/124); EirGrid Connection Policy 2024",
      feynman:{analogy:"Think of the TCP like the planning permission system for electricity. You submit an application, EirGrid studies the impact on the entire network, and then they make an offer \u2014 or refuse. The queue is strict: first-come, first-served.",firstPrinciples:"Every new connection to the transmission network changes the flow of electricity across the entire system. EirGrid must study each application to confirm the network can handle it without compromising security of supply. The TCP formalises this into a staged process: application \u2192 study \u2192 offer \u2192 acceptance \u2192 construction \u2192 energisation.",theTest:"You know you understand TCP when you can answer: What determines when your DC gets connected \u2014 the quality of your application or the date you submitted it? Answer: The date. Queue position is first-come-first-served. A technically excellent application submitted late still waits behind all earlier applications."}},
    {term:"Connection Offer",definition:"A formal offer from EirGrid specifying connection voltage, point of connection, capacity, timeline, and cost.",plain:"The document that says \u2018here is exactly how you can connect, when, and at what cost.\u2019 It has an expiry date.",number:"Typical offer validity: 3\u20136 months from issue.",standard:"EirGrid Connection Policy 2024 Section 4",
      feynman:{analogy:"The connection offer is like a mortgage approval letter. It specifies the terms, has an expiry date, and if you don\u2019t accept in time, you lose it \u2014 and have to start over. Except restarting a grid connection means going to the back of a 4\u20138 year queue.",firstPrinciples:"After completing its system study, EirGrid issues a connection offer specifying the technical parameters (voltage, point of connection, capacity) and the commercial terms (cost, timeline). The offer is time-limited. If the developer doesn\u2019t accept within the validity period, the application lapses and the queue position is lost.",theTest:"You know you understand this when you can answer: A developer receives a connection offer but their planning appeal delays acceptance by 7 months. The offer had 6-month validity. What happens? Answer: The offer expires. The application falls back in the queue. The developer faces a potential 2\u20135 year delay to get a new offer."}},
    {term:"Shallow vs Deep Reinforcement",definition:"Shallow: customer pays only for works within their own substation boundary. Deep: customer contributes to network upgrades on the public network.",plain:"Shallow = you pay to connect your building to the existing road. Deep = you pay to build the road extension.",number:"Shallow: \u20ac50k\u2013\u20ac150k/MVA (Tier 2 \u2014 CRU/2025236). Deep: 2\u20135x shallow, indicative.",standard:"CRU/2025236; EirGrid Grid Code Section CPC1",
      feynman:{analogy:"Imagine building a house at the end of a lane. If the lane already reaches your site, you just pay for your driveway (shallow). If the lane needs to be extended, you pay for the extension too (deep). Deep reinforcement for a DC can add millions to the connection cost.",firstPrinciples:"Shallow connection works are those within the customer\u2019s own boundary: the customer substation, metering, and the final cable run. Deep reinforcement involves upgrading the public network \u2014 new overhead lines, transformer upgrades at EirGrid substations, or cable replacements. The customer may be required to fund deep reinforcement if their connection triggers the need.",theTest:"You know you understand this when you can answer: A 40 MW DC connection costs \u20ac3M shallow. EirGrid says deep reinforcement adds \u20ac8M. Why? Answer: The local 110kV network needs a new overhead line or transformer upgrade to handle the additional 40 MW without breaching N-1 security. The customer pays because their connection triggered the need."}},
    {term:"Connection Timeline",definition:"Time from accepted connection offer to energisation. 4\u20138 years typical for new transmission connection.",plain:"How long before you can actually turn the DC on from the grid.",number:"Longest lead: 110kV cable procurement and installation (18\u201324 months for cable alone).",standard:"EirGrid System Operator Annual Report 2024",
      feynman:{analogy:"A grid connection timeline is like building a motorway junction. You can\u2019t accelerate it with more money or better contractors \u2014 statutory processes, equipment lead times, and construction sequencing set the pace. 4\u20138 years is the reality.",firstPrinciples:"A new 110kV connection requires: EirGrid application and study (6\u201312 months), connection offer and acceptance (3\u20136 months), planning consent for overhead lines or cable routes (12\u201324 months), procurement of switchgear and transformers (52\u201378 weeks), construction (12\u201336 months), and commissioning (4\u20138 weeks). These stages partially overlap but the total is 4\u20138 years.",theTest:"You know you understand this when you can answer: A developer buys a site today and needs 80 MW by 2029. Is this achievable with a new 110kV connection? Answer: Very unlikely. 4\u20138 year lead time means energisation 2030\u20132034. The developer needs a site with existing grid capacity or an already-submitted application."}},
    {term:"Pre-Application Consultation",definition:"EirGrid's free, 8-week pre-application service providing indicative capacity information before formal TCP submission.",plain:"Before spending money on a formal application, EirGrid will tell you for free whether grid capacity is likely available at your preferred site.",number:"Duration: 8 weeks. Cost: free. Outcome: indicative capacity and timeline — not binding.",standard:"EirGrid Connection Policy 2024 Section 3.2",
      feynman:{analogy:"A pre-application consultation is like checking if a restaurant has tables before making a reservation. It costs nothing, takes 8 weeks, and tells you whether your preferred site is viable before you commit money to a formal application.",firstPrinciples:"A formal TCP application costs significant study fees and locks you into a queue. The pre-application consultation provides a non-binding indication of available capacity, likely connection voltage, and estimated timeline — all before spending money. If the answer is unfavourable, you can redirect to a different site at zero cost.",theTest:"You know you understand this when you can answer: A developer wants to skip pre-application and submit the formal TCP immediately to save 8 weeks. Is this a good strategy? Answer: No. If the site has no capacity, the developer has spent study fees and entered a queue that will not result in a connection. The 8 weeks saved is meaningless against a 4–8 year TCP timeline."}}

  whatItLooksLike:"No physical infrastructure visible at application stage \u2014 the TCP is a paper process. The connection offer document is the key deliverable. During construction: cable trenches, overhead line towers, and substation civil works.",
  siteChecklist:["Confirm TCP application has been submitted to EirGrid","Check queue position and expected offer date","Verify connection offer validity period and acceptance deadline","Review connection cost estimate \u2014 shallow vs deep breakdown","Confirm whether a Licence to Generate Electricity (commonly: Dispatch Licence) application is also required (generators >10 MW)"]},
  logic:{causeAndEffect:[
    {cause:"TCP queue position determines the connection date; a stronger engineering submission does not accelerate the queue",effect:"A technically excellent application submitted late will still wait behind all earlier applications.",insight:"Submit the application with minimum required information as early as possible. You can revise later."},
    {cause:"On-site installed generation capacity exceeding 10 MW requires a formal generation licence from CRU under the Electricity Regulation Act 1999",effect:"Most Tier IV DCs with 2(N+1) generators need a generation licence, adding 6\u201312 months.",insight:"Calculate total installed generator capacity early. If it exceeds 10 MW, apply immediately."},
    {cause:"TCP connection offers from EirGrid carry an acceptance deadline and expire automatically if not formally accepted within the specified period",effect:"Development programme slip \u2192 offer expires \u2192 application falls back in queue.",insight:"Connection offer management is a live project management task."}
  ],
  constraintLesson:"The TCP process has improved since CRU/21/124 (now superseded by CRU/2025236) but it remains a constrained resource allocation problem. EirGrid has finite study capacity, finite network capacity, and finite construction resource. The practical lesson: grid connection is the first conversation, not the last.\n",
  weakestLink:{
    whatsWrong:"Wait until planning permission is granted before submitting the TCP application.",
    whatsRight:"Submit the TCP application in parallel with the planning application. Both take years. Running them in series adds years.",
    howToGetThere:"Use EirGrid\u2019s pre-application consultation (free, 8 weeks) to get indicative capacity before committing to a site."}},
  rhetoric:{
    declan:{hook:"The grid connection timeline is longer than the construction programme. If you are not applying for connection before planning permission is granted, you are already behind.",text:"The grid connection timeline is longer than your construction programme. If you haven\u2019t applied yet, you\u2019re already behind."},
    ann:{hook:"Your lenders will ask about grid connection status at the first drawdown meeting. Approved in principle is not the same as connection agreement signed — and funders know the difference.",text:"Your lenders will ask about grid connection at first drawdown meeting. \u2018Application submitted, offer expected Q3 2028\u2019 is fundable. \u2018We haven\u2019t applied yet\u2019 is not."},
    mark:{hook:"TCP application for 40 MW at Tier IV: 40 MW load, 2N generators for thermal input calculation, 110 kV transmission, dual independent feeds from separate substations.",text:"TCP application: 40 MW load, Tier IV (2N generators), 110kV transmission, dual independent feed required. Dispatch licence if generators >10 MW."},
    sarah:{hook:"EirGrid published capacity heat maps are public information. A DC project that has not reviewed grid capacity before acquiring a site has a basic due diligence gap.",text:"EirGrid\u2019s published capacity heat map is public information. A DC project that hasn\u2019t consulted it before site selection will have ESG investors asking why."},
    tom:{hook:"Provisional sum for grid connection: 50 to 150 thousand euros per MVA shallow, up to 5 million for deep reinforcement. Carry the range in the development appraisal from day one.",text:"Provisional sum for grid connection: \u20ac50k\u2013\u20ac150k/MVA shallow (Tier 2 \u2014 EirGrid Connection Policy 2024), contingency for deep reinforcement. For 40 MW: \u20ac2M\u2013\u20ac6M shallow minimum."}},
  rhetoricTakeaways:{declan:"Submit the TCP application before planning permission. Running them in parallel saves years.",ann:"An expired connection offer means back of the queue. The study fee at risk is trivial against years lost.",mark:"Pre-application consultation is free and takes 8 weeks. Do it before committing to any site.",sarah:"The connection timeline is the critical path for every sustainability milestone in the business plan.",tom:"Shallow connection: €50k–€150k/MVA (Tier 2 — EirGrid Connection Policy 2024). Deep reinforcement: 2–5× that. Budget for deep until confirmed otherwise."},
    scenario:{
    title:"Parallel Planning & Grid",
    narrative:"A developer has submitted a planning application for a 20 MW DC in Kildare. The planning consultant says consent will take 18 months. The MD asks: should we wait until we have planning before applying to EirGrid?",
    question:"What is the recommendation, with reasoning?",
    answer:"This is about programme sequencing \u2014 the single biggest controllable risk on an Irish DC project. The grid connection timeline dwarfs every other workstream.\n\nRecommendation: Submit the TCP application immediately \u2014 do not wait.\n\nReasoning:\n1. TCP timeline = 4\u20138 years. Planning = 18 months. In series: 5.5\u20139.5 years. In parallel: 4\u20138 years. Saving: 18 months minimum.\n2. If planning is refused, withdraw the TCP and lose the study fee (~\u20ac50k\u2013\u20ac200k, indicative \u2014 Tier 2, EirGrid Connection Policy 2024). Against a multi-hundred-million-euro project, acceptable insurance.\n3. EirGrid allows technical parameters to be revised after application. Queue position cannot be recovered.\n4. Kildare 110kV has documented capacity constraints per EirGrid TDP.\n\nWhat this means in practice: the cost of NOT applying in parallel is 18 months of delay \u2014 worth far more than the study fee at risk.\n",
whoShouldCare:["mark","ann","tom"]},
  sourceNote:"EirGrid Connection Policy 2024 (T1), CRU Decision CRU/2025236 (T1). Timeline: EirGrid System Operator Annual Report 2024 (T1).",
  retrofitRelevance:"Existing DCs needing MIC increases follow the same TCP queue. A retrofit-driven capacity increase faces the same 2\u20135 year lead time as a new connection.",
  crossRefs:[{module:"DC-LEARN-007",level:"L1",title:"Regulatory Landscape",why:"CRU regulatory framework governing the TCP process"}],
  clockQuote:"You can have the best cooling system in Ireland. You can have the most efficient PUE in Dublin. But if the wire from the grid can't carry the load, none of it matters. The connection is upstream of everything."
},
{
  id:"L3",level:3,name:"HV Substation Design",icon:"\u26A1",
  component:"110kV/38kV Substation",available:true,
  userNeedStatement:"Understand what a primary 110kV substation contains, how it steps voltage down, and what the key design decisions are.",
  cascadeCheck:(kw,racks,pue)=>{const totalMW=(kw*racks/1000)*pue;const txMVA=CLONSHAUGH.txMVA||2;const derated=txMVA*0.8*0.9;return{needed:(totalMW/2).toFixed(1),available:derated.toFixed(1),unit:"MW/path",pass:(totalMW/2)<=derated,detail:`${(totalMW/2).toFixed(1)}MW per tx path vs ${derated.toFixed(1)}MW (${txMVA}MVA \u00d70.8 K-derate \u00d70.9 PF)`}},
  learningObjective:"Understand what the primary substation contains, why transformer sizing and lead time are critical, and how busbar configuration affects availability.",
  plainEnglish:"The substation is the DC\u2019s front door to the national grid. It steps 110,000 volts down to something the DC\u2019s equipment can use. Get this wrong and every piece of equipment downstream is at risk.",
  grammar:{facts:[
    {term:"Power Transformer (110kV/11kV or 110kV/20kV)",definition:"Steps 110kV transmission voltage down to distribution voltage for onward supply to the DC\u2019s own HV switchroom.",plain:"The big transformer in the fenced compound outside the building.",number:"Typical size: 40\u2013160 MVA. Weight: 100\u2013300 tonnes. Lead time: 52\u201378 weeks (2025 market).",standard:"IEC 60076 (Power Transformers); IS 10101:2020+A1:2024",
      feynman:{analogy:"Think of it like a pressure regulator on a water main. High-pressure water arrives from the mains, and the regulator steps it down to a safe, usable pressure. The HV transformer does the same for electricity \u2014 stepping 110,000 volts down to 10,000 or 20,000 volts.",firstPrinciples:"Electricity travels long distances at high voltage (110kV) because higher voltage means lower current and less energy lost as heat. But 110kV is far too high for any equipment inside a data centre. The power transformer steps it down in stages. Each transformer is optimised for its voltage range. Lead time of 52\u201378 weeks means this must be ordered before many design decisions are finalised.",theTest:"You know you understand this when you can answer: A DC project is 14 months into construction and the 110kV transformer hasn\u2019t been ordered. What is the programme impact? Answer: 52\u201378 weeks for delivery + 8\u201312 weeks installation + 4\u20136 weeks commissioning = 16\u201324 months minimum delay. The DC cannot energise without it."}},
    {term:"110kV Switchgear",definition:"High-voltage switchgear at the incoming voltage level. Operated by EirGrid, not the DC owner.",plain:"The switchgear at the incoming 110kV level is how you connect to and disconnect from the national grid. Think of it as the master isolation point between EirGrid\u2019s network and your facility. In most new builds, Gas-Insulated Switchgear (GIS) is specified because it has a much smaller footprint than Air-Insulated Switchgear (AIS) \u2014 critical when site area is constrained.",number:"GIS typically used for new builds \u2014 smaller footprint. AIS for outdoor connections.",standard:"IEC 62271-200",
      feynman:{analogy:"Think of 110kV switchgear like the circuit breaker panel in your house, but scaled up to handle enough electricity for a small town. If something goes wrong \u2014 a fault, a short circuit \u2014 the switchgear disconnects the supply in milliseconds.",firstPrinciples:"At 110kV, fault currents can reach tens of thousands of amps. The switchgear must detect a fault and break the circuit within 60\u201380 milliseconds using SF\u2086 gas or vacuum interrupters. GIS (gas-insulated switchgear) is compact for indoor use. AIS (air-insulated) is larger but cheaper for outdoor installations.",theTest:"You know you understand this when you can answer: Why does it matter whether 110kV switchgear uses SF\u2086 or vacuum? Answer: SF\u2086 is a potent greenhouse gas (GWP 23,500\u00d7 CO\u2082). It creates F-Gas reporting obligations and future regulatory risk. New installations should specify SF\u2086-free alternatives where available."}},
    {term:"Busbar Configuration",definition:"The arrangement of primary conductors distributing power from incoming transformer to outgoing feeder circuits.",plain:"The main highway inside the substation that all the electricity flows through.",number:"Double busbar (sectionable): standard for Tier III/IV DCs.",standard:"Uptime Institute Tier Standard; CIBSE TM57",
      feynman:{analogy:"A busbar is like a dual carriageway inside your substation. A single carriageway (single busbar) means any maintenance blocks all traffic. A dual carriageway (double busbar) means you can close one lane for repairs while the other stays open.",firstPrinciples:"The busbar is the common conductor that connects the incoming transformer feeds to the outgoing distribution circuits. A single busbar is a single point of failure \u2014 maintenance requires a complete outage. A double busbar (sectionable) allows one section to be isolated while the other remains live, enabling concurrent maintainability.",theTest:"You know you understand this when you can answer: A Tier IV DC has a single busbar at the primary substation. Does this meet Tier IV requirements? Answer: No. Tier IV requires concurrent maintainability. A single busbar means any busbar maintenance = total outage. Double busbar (sectionable) is the minimum."}},
    {term:"Protection Relays",definition:"Electronic devices that monitor the HV system for faults and trigger circuit breakers within milliseconds.",plain:"The circuit breaker\u2019s brain. Detects faults that humans can\u2019t react to fast enough.",number:"Typical fault clearance: 60\u2013150ms. Modern numerical relays: <50ms.",standard:"EirGrid Grid Code Protection Requirements; IEC 60255",
      feynman:{analogy:"Protection relays are like smoke detectors for the electrical system. They monitor continuously, react in milliseconds, and trigger the circuit breakers to isolate faults before damage spreads. A smoke detector that takes 30 seconds to respond is useless. A relay that takes 300ms might be too slow.",firstPrinciples:"At high voltages, fault energy is enormous \u2014 a 110kV fault can release megawatts of destructive energy. Protection relays continuously monitor current and voltage. When they detect a fault signature (overcurrent, earth fault, differential imbalance), they send a trip signal to the circuit breaker. The relay must discriminate correctly: trip only the faulted section, not the entire supply.",theTest:"You know you understand this when you can answer: What happens if the protection relay trips the incomer breaker instead of the faulted feeder breaker? Answer: The entire primary supply is lost instead of just the faulted circuit. This is a discrimination failure \u2014 the most dangerous type of protection error in a DC."}},
    {term:"Transformer Cooling Modes (ONAN/ONAF)",definition:"ONAN = Oil Natural Air Natural (passive). ONAF = Oil Natural Air Forced (fans). Emergency ONAF rating is typically 120–130% of ONAN nameplate.",plain:"A transformer can carry more load if you turn on the cooling fans. The nameplate rating assumes no fans. With fans (ONAF emergency), it can carry 20–30% more — but only for limited periods.",number:"ONAN: 100% nameplate. ONAF: 120–130% (time-limited). Long-term ONAF: 110–115%.",standard:"IEC 60076-7 (Loading Guide for Power Transformers)",
      feynman:{analogy:"A transformer cooling mode is like a car engine — at idle it runs cool, but at full speed it needs the radiator fan. ONAN is the idle rating (no fans). ONAF is the full-speed rating (fans running). You can briefly exceed the ONAN rating using fans, but sustained overload degrades the insulation.",firstPrinciples:"Transformer loading is limited by winding temperature. Higher current = more heat = faster insulation ageing. ONAN rating is the continuous capacity with passive cooling only. ONAF adds forced air cooling (fans) which removes heat faster, allowing higher loading. The IEC 60076-7 loading guide defines time limits for overloading based on ambient temperature and prior loading history.",theTest:"You know you understand this when you can answer: A 5 MVA ONAN transformer is loaded at 5.5 MVA with fans running. Is this sustainable long-term? Answer: No. 5.5 MVA is 110% — within ONAF emergency rating but above long-term ONAF. Sustained operation above ONAN accelerates insulation ageing. Confirm with IEC 60076-7 loading curves for the specific ambient temperature."}}

  constraintLesson:"The primary substation is often the last item designed and the first to determine programme. Transformer lead time means it must be ordered before many DC design decisions are finalised.\n",
  weakestLink:{
    whatsWrong:"Size the transformer to Phase 1 IT load. We\u2019ll add capacity later.",
    whatsRight:"Size the transformer to ultimate site load. Changing a power transformer after the connection is live means a planned outage and 18\u201324 months procurement.",

  rhetoric:{
    declan:{hook:"The main transformer lead time is longer than most construction programmes. Order it before planning permission is granted or it controls your commissioning date.",text:"The main transformer\u2019s lead time is longer than most construction programmes. Order it before your structural frame is finished."},
    ann:{hook:"Transformer procurement is the capital item that cannot be value-engineered. The lead time means the decision must be made before every other parameter is confirmed.",text:"Transformer procurement is the capital item that can\u2019t be value-engineered. Four manufacturers can supply what an Irish DC needs. If they\u2019re all 78 weeks out, you\u2019re 78 weeks out."},
    mark:{hook:"Double busbar, sectionable, with bus coupler and full protection discrimination from the start. Under-specifying the primary switchboard to save capital is the most expensive mistake in HV design.",text:"Double busbar, sectionable, with bus coupler and full protection discrimination study. EirGrid SCADA interface spec agreed at FEED stage."},
    sarah:{hook:"Transformer size determines the facility's maximum energy consumption and therefore its maximum Scope 2 carbon footprint. Undersizing it creates a future expansion constraint.",text:"Transformer size determines the DC\u2019s maximum carbon footprint. If you undersize and run two transformers later, you\u2019ve added transformer losses to Scope 2."},
    tom:{hook:"Primary transformer at 1.5 to 4 million euros each from Siemens, ABB, or Hitachi Energy. With 52-week lead time, the procurement decision is programme-critical from month one.",text:"Primary transformer: \u20ac1.5M\u2013\u20ac4M (Tier 3 \u2014 Siemens/ABB/Hitachi Energy published ranges, indicative). GIS switchgear compound: \u20ac2M\u2013\u20ac5M (Tier 3 \u2014 same sources). Don\u2019t value-engineer this."}},
  rhetoricTakeaways:{declan:"The transformer defines the critical path. Order it at concept stage — not when construction starts.",ann:"Primary transformer procurement is a 12–18 month commitment. Undersize it and the retrofit costs 10× the saving.",mark:"Double busbar, sectionable, with bus coupler. Full protection discrimination study agreed at FEED stage.",sarah:"Transformer size determines the facility maximum carbon footprint. Undersize now means double losses later.",tom:"Primary transformer: €1.5M–€4M. GIS switchgear compound: €2M–€5M. These are Tier 3 indicative ranges."},
    scenario:{
    title:"The 52-Week Gap",
    narrative:"A 30MW DC project is 14 months into construction. Steelwork, roof, cladding, internal fit-out, and all MEP plant are on programme. The commissioning manager flags that the 110kV/11kV transformer has not been ordered.",
    question:"What is the likely programme impact and what should have prevented this?",
    answer:"This is about long-lead item management \u2014 the single most common programme failure in DC construction. The transformer defines the critical path.\n\nProgramme impact:\n\u2022 Current lead time: 52\u201378 weeks from order to delivery\n\u2022 Installation and testing: 8\u201312 weeks\n\u2022 EirGrid SCADA commissioning: 4\u20136 weeks\n\u2022 Total remaining: 64\u201396 weeks = 16\u201324 months\n\nIf construction completes in 6 months but transformer isn\u2019t on site for 12+ months, DC cannot energise.\n\nPrevention:\n1. RIBA Stage 1/2: transformer procurement assigned with stage-gate sign-off\n2. Programme: transformer lead time plotted as critical path\n3. Long-lead register: all items >26-week on tracked register from inception\n\nWhat this means in practice: a transformer that isn\u2019t ordered at concept stage can delay energisation by 12\u201318 months \u2014 making it the most expensive procurement oversight in DC construction.\n",
whoShouldCare:["mark","tom"]},
  sourceNote:"Transformer lead times: UK/EU supplier data 2025 — Siemens, ABB, Hitachi Energy (T3). EirGrid SCADA: Grid Code Protection Annex 2024 (T1).",
  retrofitRelevance:"Existing DCs with single transformers are high-risk candidates for power failure. Adding a second transformer is a major retrofit \u2014 18\u201324 month programme including civil works.",
  crossRefs:[{module:"DC-LEARN-001",level:"L2",title:"HV/MV Substation",why:"Substation design principles and transformer specification"}],
  clockQuote:"Grid capacity is earned, not inherited. A connection issued in 2013 does not guarantee capacity in 2026. The building changed. The grid didn't change with it."
