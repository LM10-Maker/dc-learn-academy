  {id:"L9",level:9,name:"Atmosphere",icon:"🌍",component:"Ultimate Heat Sink",available:true,
   userNeedStatement:"Understand that the atmosphere is the final destination for all data centre heat — and that local climate, regulations, and waste heat recovery determine how efficiently this happens.",
   plainEnglish:"All roads lead here. Every watt that enters the data centre as electricity eventually leaves as heat into the atmosphere. The question is: how much extra electricity did we use along the way?",
   grammar:{
     facts:[
       {term:"PUE (Power Usage Effectiveness)",definition:"Total facility power divided by IT load power. The universal efficiency metric for data centres.",plain:"For every 1kW of IT power, how much total power does the facility use? PUE 1.3 means 1.3kW total for 1.0kW of IT.",number:"Average: 1.58. Best: <1.1",standard:"The Green Grid / EN 50600-2-3:2019",feynman:{analogy:"If you earn €1.30 but only €1.00 goes to your savings (IT load) and €0.30 goes to bank fees (cooling, lighting, losses), your PUE is 1.3. Every cent above 1.0 is overhead.",firstPrinciples:"PUE measures total facility efficiency as a single ratio. A PUE of 1.0 would mean zero overhead — physically impossible. Each chain level adds overhead. Reducing PUE means reducing waste at every level.",theTest:"Facility A has PUE 1.50 at 8MW IT. Facility B has PUE 1.20 at 8MW IT. What is the annual energy cost difference at €0.12/kWh? Answer: A uses 12.0MW total, B uses 9.6MW. Difference: 2.4MW × 8,760h × €0.12 = €2.52M/year."},soWhat:"PUE is the compound result of every chain level — decompose it to find where the waste hides."},
       {term:"Total Heat Rejection",definition:"IT Load × PUE = total heat rejected to atmosphere. This is the total thermal load on the local environment.",plain:"The total heat the data centre dumps into the air. Always more than just the server heat.",number:"8MW × 1.3 PUE = 10.4MW",standard:"First Law of Thermodynamics",feynman:{analogy:"Everything that enters a building as electricity must eventually leave as heat — it is an unbreakable physical law. The total heat rejected is the electricity bill made visible as warmth radiating from the rooftop.",firstPrinciples:"Conservation of energy means all electrical input converts to heat. IT equipment, cooling systems, lighting, and losses all produce heat. Total heat rejection equals total electrical input — IT Load × PUE.",theTest:"A facility uses 10.4MW total electrical power. How much heat does it reject to the atmosphere? Answer: exactly 10.4MW — every watt of electricity consumed becomes a watt of heat, regardless of what equipment consumed it."},soWhat:"Every watt consumed by the facility leaves as heat through the condenser — the atmosphere is the ultimate and unlimited sink."},
       {term:"Waste Heat Recovery",definition:"Capturing rejected heat for useful purposes: district heating, agriculture, swimming pools.",plain:"Instead of just dumping heat into the air, use it to heat buildings or warm swimming pools.",number:"EU EED mandates assessment >1MW",standard:"EU Energy Efficiency Directive (EU/2023/1791)",feynman:{analogy:"A bakery heats the shop with the ovens’ exhaust instead of running a separate heater. The data centre version sends warm water to heat nearby buildings instead of dumping it into the air.",firstPrinciples:"Data centres produce consistent, reliable low-grade heat (25–40°C). If a nearby demand exists (district heating, pools, greenhouses), this heat has economic value. Heat pumps can upgrade the temperature for wider use.",theTest:"EU EED requires waste heat assessment for facilities above what threshold? Answer: 1MW thermal output — meaning virtually all commercial data centres must assess waste heat recovery feasibility."},soWhat:"Waste heat at 30–40°C is too low for most direct use but perfect for heat pumps — transforming a liability into a revenue stream."},
       {term:"Grid Carbon Intensity",definition:"CO₂ emissions per unit of electricity consumed. Determines the carbon footprint of cooling energy.",plain:"How much CO₂ is produced for each kWh of electricity the data centre consumes. Ireland's grid emits 0.2241 kgCO₂ per kWh (SEAI 2026). Every unit of cooling energy saved reduces carbon proportionally — so PUE improvement and grid decarbonisation multiply each other's benefit.",number:"Ireland: 0.2241 kgCO₂/kWh (SEAI 2026)",standard:"SEAI 2026",feynman:{analogy:"The carbon intensity of electricity is like the calorie count of food — it tells you the environmental cost of each unit consumed. As Ireland adds more renewables, each kWh gets cleaner, but it is not zero yet.",firstPrinciples:"Each kWh of grid electricity carries a carbon footprint based on the generation mix. Ireland’s grid factor is 0.2241 kgCO₂/kWh (SEAI 2026). As wind and solar increase, this factor falls — but operational efficiency multiplies the benefit.",theTest:"PUE improves from 1.50 to 1.20 at 8MW IT. Using Ireland’s grid factor of 0.2241 kgCO₂/kWh, what is the annual carbon saving? Answer: 2.4MW saved × 8,760h × 0.2241 = 4,712 tCO₂/year."},soWhat:"Grid decarbonisation helps everyone equally — PUE improvement is the operator's own contribution to carbon reduction."},
       {term:"Local Climate Impact",definition:"The cooling chain's performance is fundamentally determined by local ambient conditions. Dublin's cool, humid climate is ideal for data centres.",plain:"Where you build the data centre determines how efficiently you can cool it. Ireland's mild climate is a natural advantage.",number:"Dublin: 10°C avg, 7,200 free cooling hrs",standard:"Met Éireann 30-year normals",feynman:{analogy:"Building a ski resort in the Alps versus the Sahara — location determines how hard you must work to stay cool. Dublin’s mild, damp climate is the Alps of data centre cooling.",firstPrinciples:"Cooling efficiency depends on ambient temperature and humidity. Dublin’s average of 10°C and 7,200 hours below 18°C provide exceptional free cooling potential. This is a structural advantage that no amount of engineering can replicate in a warm climate.",theTest:"Dublin offers 7,200 free cooling hours per year. What percentage of the year is this? Answer: 7,200 ÷ 8,760 = 82% — meaning chillers only need to run for 18% of the year if the cooling system is properly designed."},soWhat:"Planning authorities are increasingly aware of data centre heat rejection — proactive waste heat recovery changes the narrative from polluter to community asset."}
     ],
     whatItLooksLike:"Step outside the data centre and look up. If you see water vapour plumes from cooling towers, you're watching heat leave the building. The dry cooler fans, the cooling tower drift, the warm air rising from equipment compounds — this is the end of the cooling chain. The atmosphere absorbs everything.",
     siteChecklist:["Calculate current PUE from utility data","Check if waste heat recovery has been assessed (EED requirement)","Note local planning conditions for noise, plume visibility","Check grid carbon factor for the site's electricity supplier","Assess free cooling potential based on local climate data","Review regulatory compliance: EPA, planning, EED"]
   },
   logic:{
     causeAndEffect:[
       {cause:"PUE is reduced from 1.50 to 1.20 at 8MW IT load through containment, setpoint optimisation, and free cooling activation",effect:"Total facility power drops from 12.0MW to 9.6MW. 2.4MW of cooling overhead eliminated. Carbon: 4,712 tCO₂/year saved.",insight:"PUE improvement is the compound result of optimising every level of the cooling chain. No single measure achieves it alone."},
       {cause:"Irish grid decarbonisation reduces the Scope 2 emission factor from a historic 0.4 kgCO₂/kWh to 0.2241 kgCO₂/kWh in 2026",effect:"Facility carbon footprint drops 44% even with no operational changes. But this is not within the operator's control.",insight:"Grid decarbonisation helps everyone. PUE improvement is the operator's contribution. Both are needed."},
       {cause:"Data centre condenser waste heat at approximately 30°C is recovered and upgraded via heat pump for district heating supply",effect:"Revenue stream from heat sale + renewable heat credits. Transforms data centre from environmental cost to community asset.",insight:"Waste heat recovery changes the narrative from 'data centre as polluter' to 'data centre as heat source'. Regulators respond positively."}
     ],
     constraintLesson:"The complete cooling chain — Declan's Clonshaugh at 8MW (target state):\n\nLevel 1 (Server): 8.0 MW IT heat generated (1W electrical = 1W thermal)\nLevel 2 (Airflow): Containment (<5% bypass) ensures heat reaches CRAHs\nLevel 3 (CRAH): 24°C supply, 36°C return (ΔT=12°C). Airflow: 8,000/(1.2×1.006×12) = 552 m³/s\nLevel 4 (CHW): 6°C supply, 12°C return (ΔT=6°C). Flow: 8,000/(4.18×6) = 319 L/s\nLevel 5 (Chiller): Evaporator duty ~8.4 MW. At COP 4.5: electrical = 8.4/4.5 = 1.87 MW\nLevel 6 (Free cooling): 7,200 hrs/yr (<18°C) displacing 1.87 MW of chiller power\nLevel 7 (Tower): Condenser rejection = 8.4 + 1.87 = 10.3 MW at 4°C approach to wet-bulb\nLevel 8 (BMS): Optimises setpoints, staging, and free cooling transitions continuously\nLevel 9 (Atmosphere): Total facility power = 8.0 × 1.20 PUE = 9.6 MW. All 9.6 MW rejected as heat.\n\nCurrent state: PUE 1.50 → Target: PUE 1.20\nPower saved: (8×1.50) − (8×1.20) = 2.4 MW continuous\nAnnual saving: 2.4 MW × 8,760 hrs × €0.12/kWh = €2.52M/year\nCarbon saving: 2.4 MW × 8,760 hrs × 0.2241 kgCO₂/kWh = 4,712 tCO₂/year",
     weakestLink:{whatsWrong:"Treating PUE as a single number rather than the sum of nine chain levels. A PUE of 1.50 doesn't tell you WHERE the waste is.",whatsRight:"Decompose PUE into its components. Attribute overhead to each chain level. Fix the biggest contributors first.",howToGetThere:"Cascade audit: walk the cooling chain L1→L9. Measure each level's contribution to PUE. Prioritise by ROI."}
   },
   rhetoric:{
     declan:"Declan, your facility's heat ends up in the Dublin atmosphere regardless. The question is: did you use 4.0MW of overhead (PUE 1.50) or 1.6MW (PUE 1.20) to get it there at 8MW IT? That's €2.52M/year difference.",
     ann:"Ann, PUE × IT Load × electricity price × 8,760 = annual energy cost. Every 0.1 PUE point at 8MW = €840k/year. That's what's at stake in the cooling chain.",
     mark:"Mark checks whether the cooling chain has been designed as one integrated system, not nine independent components. Every decision at one level cascades through all others — start with the highest CHW temperature the chain can tolerate.",
     sarah:"Sarah, the cooling chain is where Scope 2 carbon lives in a data centre. Optimising from PUE 1.50 to 1.20 saves 4,712 tCO₂/year at current grid intensity (8MW IT). As the grid decarbonises, PUE efficiency locks in proportionally larger absolute savings.",
     tom:"Tom, cooling chain optimisation from PUE 1.50 to 1.20 at 8MW: total investment ~€1.4M across all levels. Annual saving: ~€2.52M. Simple payback: 7 months. 15-year NPV: >€30M."
   },
   rhetoricTakeaways:{
     declan:"The question is not whether the heat reaches the atmosphere — it always does. The question is how much overhead you used to get it there.",
     ann:"Every 0.1 PUE point at 8MW is €840k/year. That is what the cooling chain is worth in the asset model.",
     mark:"Design the cooling chain as one integrated system. Every decision at one level cascades through all nine.",

     tom:"Total investment ~€1.4M across all levels. Annual saving ~€2.52M. Simple payback: 7 months. 15-year NPV: >€30M."
   },
   scenario:{title:"The Cascade Audit",narrative:"Declan has budget approval for PUE improvement. Current PUE: 1.50. Target: 1.20. Budget: €1.5M. The question isn't whether to improve — it's the sequence.",question:"Design the improvement sequence with costs and expected PUE impact.",answer:"The sequence matters more than the spend. The principle is: fix controls first (free or near-free gains), then airflow distribution, then plant upgrades. Each phase builds on the previous one — raising supply air temperature only works if containment prevents bypass, and economiser hours only increase if CHW temperatures are optimised. Doing it in the wrong order wastes capital.\n\nIndicative costs below are screening-level estimates (Tier 3 — CIBSE Guide F; industry project benchmarks, Q1 2025 Dublin market). Subject to detailed design and tender.\n\nPhase 1 (Month 1–2): Controls & Setpoints — €50k\n• Raise supply air to ASHRAE A2 limit: PUE -0.06\n• Optimise chiller staging: PUE -0.02\n\nPhase 2 (Month 2–3): Airflow — €120k\n• Containment + blanking panels: PUE -0.05\n\nPhase 3 (Month 3–6): Free Cooling Optimisation — €300k\n• Waterside economiser upgrade: PUE -0.10\n\nPhase 4 (Month 6–9): CHW Optimisation — €150k\n• Fix ΔT, raise CHW temp: PUE -0.04\n\nPhase 5 (Month 9–18): Plant Efficiency — €800k\n• High-efficiency chillers + wet towers: PUE -0.03\n\nTotal: PUE 1.50 → 1.20. Total spend: €1.42M. Annual saving: €2.52M.\n\nWhat this means in practice: the first €170k (Phases 1–2) delivers 0.13 PUE points — nearly half the total improvement — in 3 months, with payback measured in weeks. The expensive plant upgrades in Phase 5 only add 0.03 PUE points. Sequence drives value."},
   sourceNote:"EN 50600-2-3:2019 (T1). EU EED 2023/1791 (T1). SEAI 2026 Grid EF 0.2241 kgCO₂/kWh (T1). Met Éireann 30-year normals (T1). CRU Q4 2024 €0.12/kWh (T2).",
  whoShouldCare:["sarah", "ann", "mark"],
  clockQuote:"The cooling system was sized for the building as it was. If the building is going to become something different, the question isn't whether the cooling can cope — it's whether anyone has asked that question yet.",

// Source: 27 questions (9 per Trivium stage) per DC_LEARN_SERIES_SPEC_v1_2 -5. Distribution D1 verified.
const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q002-01",icon:"🔥",stage:"grammar",q:"A 10kW server produces how much heat?",options:["10kW","5kW","15kW","7.5kW"],correct:0,explain:"Every watt of IT power becomes a watt of heat — 10kW server = 10kW heat load. Undersizing cooling by even 10% causes thermal runaway within minutes. First Law of Thermodynamics; the baseline for all DC heat rejection design."},
  {level:1,id:"Q002-02",icon:"🔥",stage:"logic",q:"Racks overheating at 15kW despite 65% chiller utilisation. Most likely cause?",options:["Chiller capacity is insufficient — 65% utilisation indicates the plant is already near its thermal design limit at the current IT load.","Airflow bypass — cold air not reaching racks","Server firmware throttling is generating additional heat beyond the nameplate 15kW under sustained high-compute workloads.","Wrong refrigerant charge causing the chiller to run at reduced COP, limiting effective heat rejection capacity."],correct:1,explain:"65% utilisation means plenty of capacity. The problem is distribution: cold air bypasses the IT load through floor gaps and missing blanking panels."},
  {level:1,id:"Q002-03",icon:"🔥",stage:"rhetoric",q:"How explain to a fund manager why raising supply air from 18°C to 24°C saves money?",options:["'ASHRAE TC 9.9 permits supply air up to 27°C for A1-class equipment — operating at 18°C is unnecessary and creates no resilience benefit.'","'Servers are designed to operate more efficiently at warmer intake temperatures — the thermal management system works better above 20°C.'","'It improves PUE by approximately 0.5 without any capital expenditure — cooling energy falls while IT load remains constant.'","'Each 1°C saves 2-4% cooling energy — 6°C rise = 15-20% saving, zero capex'"],correct:3,explain:"Financial framing — specific % saving and zero capex — triggers fund manager approval. Vague claims are dismissed. Each 1°C rise saves 2-4% cooling energy; a 6°C rise delivers 15-20% saving with no capital commitment. Source: ASHRAE TC 9.9 A1 class."},

  {level:2,id:"Q002-04",icon:"💨",stage:"grammar",q:"Typical bypass airflow rate in an uncontained data hall?",options:["5-10%","15-20%","30-60%","70-90%"],correct:2,explain:"30-60% of cold air bypasses IT equipment in uncontained halls, forcing chiller oversizing and raising hot-aisle temps above ASHRAE A1 limits. Containment at ~€150k recovers 500kW effective capacity; chiller replacement costs €1.2M. Source: ASHRAE RP-1596."},
  {level:2,id:"Q002-05",icon:"💨",stage:"logic",q:"Installed cooling: 1,500kW. Bypass: 38%. Effective cooling reaching IT?",options:["930kW","1,500kW","570kW","1,200kW"],correct:0,explain:"1,500kW × (1 - 0.38) = 930kW reaches IT equipment. The wasted 570kW adds ~€600k/year in unnecessary electricity at €0.12/kWh. Containment eliminates this loss without new plant; a replacement chiller to compensate costs €1.2M+. Source: ASHRAE RP-1596."},
  {level:2,id:"Q002-06",icon:"💨",stage:"rhetoric",q:"Contractor quotes €1.2M for new chiller. Airflow audit shows 38% bypass. Your recommendation?",options:["Install the chiller — the hot spots confirm insufficient cooling capacity and additional plant is the only reliable solution.","Both together — containment addresses distribution while the new chiller addresses absolute capacity, and combining them maximises the PUE improvement.","Accept the hot spots and increase the cold aisle setpoint to compensate — the existing equipment can manage 15kW racks with adjusted controls.","'Spend €150k on containment first — it recovers 500kW of effective capacity without new equipment'"],correct:3,explain:"Containment eliminates bypass, recovering effective capacity at 1/8th the cost. Fix distribution before adding capacity."},

  {level:3,id:"Q002-07",icon:"❄️",stage:"grammar",q:"ASHRAE A1 class maximum supply air temperature?",options:["18°C","21°C","24°C","27°C"],correct:3,explain:"ASHRAE TC 9.9 A1 class permits 18-27°C supply air. Operating at 18°C when 24°C is safe wastes 15-20% cooling energy — ~€60k/year at Clonshaugh 2.4MW IT load. No resilience benefit accrues from the lower setpoint. Source: ASHRAE TC 9.9 2021."},
  {level:3,id:"Q002-08",icon:"❄️",stage:"logic",q:"CRAH airflow for 8MW IT load at ΔT=12°C? (ρ=1.2, cp=1.006)",options:["~280 m³/s","~400 m³/s","~552 m³/s","~800 m³/s"],correct:2,explain:"Q = 8,000 / (1.2 × 1.006 × 12) = ~552 m³/s. Undersizing CRAH airflow drives rack inlet temps above ASHRAE A1's 27°C ceiling, triggering CPU throttle and unplanned downtime. This formula sets minimum CRAH capacity for any IT load. Source: CIBSE Guide B2."},
  {level:3,id:"Q002-09",icon:"❄️",stage:"rhetoric",q:"Facilities team nervous about raising supply air from 18°C. Best approach?",options:["Override their objection and raise supply air immediately to 27°C — ASHRAE A1 class confirms this is safe and the energy saving justifies the decision.","'Raise 1°C per week, monitor rack inlets daily. Stop if any inlet approaches 27°C'","Leave supply air at 18°C permanently — the conservative setpoint protects equipment and the energy cost is acceptable insurance against server failure.","Jump straight to 27°C for one week, then reassess — a full-temperature test exposes any distribution problems faster than a slow incremental approach."],correct:1,explain:"Phased 1°C/week rise with daily inlet monitoring catches distribution failures before they escalate. Jumping straight to 27°C risks breaching ASHRAE A1's 27°C inlet limit in hotspot racks, triggering CPU throttle or emergency shutdown. Source: CIBSE Guide B2."},

  {level:4,id:"Q002-10",icon:"🔵",stage:"grammar",q:"Design CHW delta-T for a typical data centre?",options:["6°C","2°C","12°C","4°C"],correct:0,explain:"Design ΔT of 6°C (6°C supply / 12°C return) sets pipe, pump, and coil sizing. Actual ΔT below 3°C doubles required flow rate and pump energy — Low ΔT Syndrome wastes ~€100k/year in electricity at 2.4MW IT scale. Source: CIBSE Guide B2."},
  {level:4,id:"Q002-11",icon:"🔵",stage:"logic",q:"Design ΔT: 6°C. Actual ΔT: 3°C. Impact on pump energy?",options:["No change — pump energy depends on pressure drop, not temperature difference, so ΔT reduction has no direct pump energy impact.","25% increase — reduced ΔT creates proportionally higher flow demand with sub-linear effect on pump energy due to affinity law.","100% increase (doubles)","200% increase"],correct:2,explain:"Half the ΔT = double the flow rate = double the pump energy (affinity law: P ∝ flow³). At Clonshaugh's 2.4MW IT load, Low ΔT Syndrome adds ~€100k/year in avoidable pump electricity and masks real chiller performance issues. Source: CIBSE Guide B2."},
  {level:4,id:"Q002-12",icon:"🔵",stage:"rhetoric",q:"BMS shows 6°C supply, 9°C return. How explain the problem to Declan?",options:["'The pumps are oversized for the current IT load — we need variable speed drives to reduce flow rate and restore the design ΔT.'","'Everything is within design parameters — 9°C return is acceptable and does not indicate a performance problem at the current IT load.'","'We need bigger chillers — a 3°C return temperature indicates that the current plant cannot handle the heat load of the data halls.'","'Your ΔT is 3°C not 6°C — pumps circulate twice the water needed. Fix: replace 3-port valves, check coils'"],correct:3,explain:"Declan needs diagnosis, root cause, and fix in plain language — in that order. ΔT of 3°C vs design 6°C doubles pump energy, ~€100k/year wasted at 2.4MW scale. Vague feedback gets deferred; specific numbers with a fix get immediate action. Source: CIBSE Guide B2."},

  {level:5,id:"Q002-13",icon:"⚙️",stage:"grammar",q:"Chiller electrical consumption at COP 4.5 for 8MW cooling?",options:["1.78 MW","0.89 MW","2.67 MW","1.33 MW"],correct:0,explain:"8MW ÷ COP 4.5 = 1.78MW electrical. A chiller at COP 3.0 instead consumes 2.67MW — €792k/year more at €0.12/kWh. COP is the primary procurement benchmark and directly determines PUE contribution from the chiller plant. Source: CIBSE Guide B2."},
  {level:5,id:"Q002-14",icon:"⚙️",stage:"logic",q:"R-134a chiller installed 2020. F-Gas Regulation impact?",options:["No impact — R-134a is explicitly exempt from the EU F-Gas Regulation phase-down because it is classified as a low-GWP refrigerant under the 2014 baseline.","Must replace immediately — EU F-Gas Regulation 2024/573 bans R-134a in all existing cooling systems from 1 January 2025.","F-Gas Regulation only affects new installations — existing systems charged with R-134a before 2024 are permanently grandfathered under the phase-down schedule.","R-134a (GWP 1,430) being phased down. Costs rising 15-20%/year. End-of-service ~2030"],correct:3,explain:"F-Gas Regulation (EU) 2024/573 phases down high-GWP refrigerants. R-134a servicing becomes increasingly expensive and restricted."},
  {level:5,id:"Q002-15",icon:"⚙️",stage:"rhetoric",q:"CFO asks: water-cooled or air-cooled chillers for Dublin? How frame it?",options:["'Water-cooled is the industry standard for data centres and the correct choice regardless of site-specific energy cost — air-cooled is only for small edge deployments.'","'Air-cooled COP 3.0 vs water-cooled COP 5.5 — at 8.4MW cooling that is €1.27M/year difference. Capex premium pays back in 3 months'","'Both are technically fine — the choice is entirely a matter of site layout preference and available plant room space for the cooling towers.'","'Air-cooled is simpler to maintain — fewer water treatment obligations, no Legionella risk, and lower facilities management overhead cost.'"],correct:1,explain:"Financial comparison with specific payback period is the language CFOs understand. 8.4MW cooling ÷ 3.0 = 2.80MW vs ÷ 5.5 = 1.53MW. Difference: 1.27MW × 8,760h × €0.12/kWh = €1.34M/year."},

  {level:6,id:"Q002-16",icon:"🌿",stage:"grammar",q:"Dublin free cooling hours per year?",options:["3,000","5,000","7,200","8,760"],correct:2,explain:"Dublin records ~7,200 hours/year below 18°C (82% of the year), enabling economiser operation without mechanical refrigeration. Missing 10% of this window costs ~€75k/year in avoidable chiller electricity at Clonshaugh. Source: Met Éireann 30-year normals."},
  {level:6,id:"Q002-17",icon:"🌿",stage:"logic",q:"CHW at 6°C: 5,000 free cooling hrs. CHW at 12°C: 7,200 hrs. Why?",options:["Higher CHW temp means smaller gap to ambient — free cooling activates at higher outdoor temperatures","A larger heat exchanger surface area is required at higher CHW temperatures to achieve the same approach temperature to the ambient air.","Higher CHW temperature reduces system pressure, allowing the free cooling circuit to overcome pipe losses at lower ambient temperatures.","Higher CHW temperature means more refrigerant is needed in the economiser circuit to transfer heat at the reduced temperature differential."],correct:0,explain:"Free cooling activates when ambient < (CHW return − approach temp). At 6°C return, threshold ~3°C; at 12°C return, threshold ~9°C — capturing ~2,200 extra free cooling hours and ~€210k/year in avoided chiller electricity. Source: CIBSE Guide B2."},
  {level:6,id:"Q002-18",icon:"🌿",stage:"rhetoric",q:"Client says 'free cooling is unreliable in Ireland'. Best response?",options:["Agree — Ireland's high humidity and frequent Atlantic fronts make free cooling unreliable for the temperature precision required by data centre cooling systems.","'Dublin has 7,200 free cooling hours (82% of year). Ireland's cool climate is a natural advantage — most of your cooling should be free'","Free cooling only works reliably in winter months — the remaining seven months require full mechanical refrigeration regardless of ambient temperature.","Free cooling is not worth the capital investment in Ireland — the payback exceeds 15 years when maintenance and controls integration are included."],correct:1,explain:"Ireland's 7,200 free cooling hours (82% of year) outperforms Phoenix (~1,800) and Singapore (~0). At Clonshaugh 2.4MW, free cooling avoids ~€750k/year in chiller electricity. Reframe the climate: it is a structural competitive asset. Source: Met Éireann 30-year."},

  {level:7,id:"Q002-19",icon:"🌡️",stage:"grammar",q:"Wet cooling tower approach temperature in Dublin?",options:["1-2°C","3-5°C","8-12°C","15-20°C"],correct:1,explain:"Wet tower approach is 3-5°C above wet-bulb. Dublin avg wet-bulb ~10°C → condenser ~14°C. Dry coolers approach dry-bulb (~25°C) — an 11°C penalty that reduces chiller COP ~40% and adds ~€400k/year electricity cost at Clonshaugh. Source: CIBSE Guide B2."},
  {level:7,id:"Q002-20",icon:"🌡️",stage:"logic",q:"Dry cooler vs wet tower: condenser water temperature difference in Dublin?",options:["Same temperature — both technologies reject heat to the same ambient air and achieve equivalent condenser water temperatures at rated conditions.","Wet tower 5°C higher — wet towers operate above the dry-bulb temperature, making dry coolers the lower-temperature option in Dublin conditions.","Dry cooler 15-20°C higher — dry coolers approach the dry-bulb temperature while wet towers approach the wet-bulb temperature, creating a large differential.","Dry cooler 5-7°C higher"],correct:3,explain:"Dry cooler: 10°C approach to dry-bulb (25°C) = 35°C. Wet tower: 4°C approach to wet-bulb (10°C) = 14°C. Difference: ~21°C at design."},
  {level:7,id:"Q002-21",icon:"🌡️",stage:"rhetoric",q:"Client prefers dry coolers to 'avoid water costs'. How respond?",options:["Agree — water treatment, Legionella compliance, and blowdown disposal make wet cooling towers a significant ongoing liability for a DC operator.","'Water costs €50k/year. The COP difference costs €1.28M/year. Over 15 years: dry coolers cost €19M+ more than wet towers'","Both have the same whole-life energy cost when water treatment, maintenance, and capital depreciation are properly accounted for in the lifecycle model.","Suggest adiabatic as a compromise — it provides wet-bulb-approaching temperatures with much lower water consumption than a conventional cooling tower."],correct:1,explain:"Water treatment costs €50k/year. The COP penalty of dry vs wet cooling costs €1.28M/year in electricity at 8.4MW. Over 15 years, dry coolers cost €19M more. Quantifying this converts engineering advice into a commercial decision. Source: CIBSE Guide B2."},

  {level:8,id:"Q002-22",icon:"📡",stage:"grammar",q:"Typical PUE improvement from BMS optimisation alone?",options:["0.10-0.30","0.01-0.02","0.50-0.80","0.05-0.10"],correct:0,explain:"BMS optimisation typically delivers 0.10-0.30 PUE improvement through setpoint optimisation, staging, and free cooling activation."},
  {level:8,id:"Q002-23",icon:"📡",stage:"logic",q:"Setpoints unchanged since commissioning 4 years ago. Supply air: 18°C, CHW: 6°C. What's the risk?",options:["No risk — conservative commissioning setpoints represent best practice and should not be changed without a full energy audit and CIBSE assessment.","Equipment will fail — cooling plant running at commissioning setpoints is operating below its design thermal design point and accelerating component wear.","PUE is already optimal — commissioning setpoints are designed by qualified engineers to achieve the facility's target PUE at rated IT load.","System running 20-30% less efficiently than possible due to suboptimal setpoints"],correct:3,explain:"Commissioning setpoints are conservative starting points. 4 years without optimisation means significant energy waste — 20-30% cooling overhead that could be eliminated."},
  {level:8,id:"Q002-24",icon:"📡",stage:"rhetoric",q:"One metric to assess a DC operator's cooling competence?",options:["Number of installed chillers — total plant count reveals whether the cooling design has sufficient N+1 redundancy for the declared IT load.","Brand of BMS — the BMS manufacturer indicates the sophistication of the control philosophy and the operator's investment in optimisation capability.","'Show me your PUE trend for the last 12 months'","Chiller COP rating from the manufacturer's data sheet — nameplate COP reflects equipment quality and sets the thermodynamic ceiling for cooling efficiency."],correct:2,explain:"PUE trend reveals operational discipline. Flat or improving = active management. Rising = neglect. It captures the entire cooling chain in one number."},

  {level:9,id:"Q002-25",icon:"🌍",stage:"grammar",q:"8MW IT at PUE 1.3: total heat rejected to atmosphere?",options:["8.0 MW","10.4 MW","12.0 MW","14.4 MW"],correct:1,explain:"8MW × 1.3 PUE = 10.4MW total facility power = 10.4MW heat rejected to atmosphere. Every 0.1 PUE improvement at 8MW reduces heat rejection by 0.8MW — equivalent to removing ~300 residential homes from the local heat island. Source: EU Taxonomy Delegated Act 2021/2139."},
  {level:9,id:"Q002-26",icon:"🌍",stage:"logic",q:"PUE 1.50→1.20 at 8MW. Annual carbon saving? (Grid: 0.2241 kgCO₂/kWh)",options:["~2,000 tCO₂","~4,712 tCO₂","~7,853 tCO₂","~12,000 tCO₂"],correct:1,explain:"Power saved: (8×1.50 − 8×1.20) = 2.4MW. Annual carbon: 2.4MW × 8,760h × 0.2241 kgCO₂/kWh = 4,712 tCO₂. At €71/tCO₂ carbon tax that is €334k/year of avoided liability — and a direct EU Taxonomy PUE ≤1.3 compliance signal. Source: SEAI 2026; Budget 2025."},
  {level:9,id:"Q002-27",icon:"🌍",stage:"rhetoric",q:"Design the PUE improvement sequence. What comes FIRST?",options:["New chillers — the biggest energy savings come from plant efficiency improvements and capital investment in modern chillers delivers the fastest PUE reduction.","Free cooling — Dublin's 7,200 hours below 18°C represents the largest single addressable energy saving and should be captured before any other measure.","Controls and setpoints (lowest cost, fastest impact)","Cooling towers — upgrading from dry coolers to wet towers reduces condenser water temperature and immediately improves chiller COP across the full year."],correct:2,explain:"Controls and setpoints first: zero/low capex, immediate results, no construction. Then airflow, free cooling, CHW, and finally plant upgrades. Fix the brain before the body."}
];

const GLOSSARY_002 = [
  {term:"Adiabatic Cooling",def:"Pre-cools air entering a dry cooler by evaporating water. Hybrid between wet and dry — uses less water than a full wet tower."},
  {term:"Airflow Rate",def:"Volume of air moved per unit time (m³/s). Must match the heat load: Q = ṁ × cp × ΔT."},
  {term:"Airside Economiser",def:"Introduces filtered outdoor air directly into the data hall for cooling. Simpler than waterside but harder to control humidity in Ireland's climate."},
  {term:"Approach Temperature",def:"Difference between heat exchanger outlet and cooling medium inlet. Lower approach = more effective heat transfer but larger equipment."},
  {term:"ASHRAE Thermal Envelope",def:"Recommended operating conditions for servers: 18–27°C supply air, 5.5°C dew point to 60% RH (Class A1)."},
  {term:"Blanking Panels",def:"Filler panels in unused rack positions preventing hot exhaust air from recirculating to server inlets."},
  {term:"BMS",def:"Building Management System — central control system coordinating setpoints, staging, and equipment across the cooling chain."},
  {term:"Bypass Air",def:"Cold supply air that returns to the CRAH without passing through IT equipment. Pure waste — reduces effective cooling capacity."},
  {term:"Cascade Calculator",def:"Tool that tests each cooling chain level against IT load inputs to identify bottlenecks (PASS/FAIL per level)."},
  {term:"CHW Supply Temperature",def:"Temperature of water leaving the chiller. Lower = more capacity but more energy. Higher = better efficiency + more free cooling hours."},
  {term:"Containment",def:"Physical barriers (curtains, panels, doors) separating hot and cold airstreams. Eliminates bypass air."},
  {term:"COP",def:"Coefficient of Performance — ratio of cooling output to electrical input. COP 4.5 = 4.5kW cooling per 1kW electricity."},
  {term:"CRAC",def:"Computer Room Air Conditioner — self-contained with DX refrigerant circuit. Simpler but less efficient at scale than CRAHs."},
  {term:"CRAH",def:"Computer Room Air Handler — uses chilled water coils. Connected to central chiller plant for better efficiency at scale."},
  {term:"Cooling Tower (Wet)",def:"Evaporates water to reject heat to atmosphere. Very efficient in Dublin's climate (avg wet-bulb 10°C) but consumes water."},
  {term:"Delta-T (ΔT)",def:"Temperature difference between chilled water supply and return. Design: 6°C. Low ΔT = pumps overwork."},
  {term:"Dry Cooler",def:"Air-cooled heat exchanger. No water but less efficient — condenser temperatures 15–20°C higher than wet towers."},
  {term:"Economiser Cycle",def:"System using outdoor conditions to provide cooling without running chillers. Waterside or airside."},
  {term:"Equipment Staging",def:"Sequence of turning equipment on/off to match capacity to load. Optimal: fewer machines at higher load."},
  {term:"Free Cooling Hours",def:"Annual hours when ambient conditions allow cooling without mechanical refrigeration. Dublin: ~7,200 hrs/yr (82%)."},
  {term:"Free Cooling Transition",def:"Switchover from mechanical to economiser cooling. Must be seamless — poor transitions cause operators to disable free cooling entirely."},
  {term:"Grid Carbon Intensity",def:"CO₂ per unit of electricity. Ireland: 0.2241 kgCO₂/kWh (SEAI 2026)."},
  {term:"Heat Flux",def:"Rate of heat transfer per unit area (kW/m²). High density racks need more aggressive cooling."},
  {term:"Heat Rejection Rate",def:"Total heat rejected to atmosphere = IT load × PUE. Always greater than IT load alone."},
  {term:"Hot Aisle / Cold Aisle",def:"Rack arrangement: server fronts face cold aisle, backs face hot aisle. Foundation of airflow management."},
  {term:"IPLV",def:"Integrated Part Load Value — weighted efficiency across a realistic load profile. More important than full-load COP."},
  {term:"IT Heat Rejection",def:"Every watt of IT electrical power converts to heat (First Law of Thermodynamics). 1W electrical = 1W thermal."},
  {term:"Low Delta-T Syndrome",def:"Actual return water temperature lower than design. Causes doubled pump energy. #1 cause: 3-port mixing valves."},
  {term:"PUE",def:"Power Usage Effectiveness — total facility power ÷ IT load power. Target: ≤1.3. World-class: <1.1."},
  {term:"Part-Load Performance",def:"Chiller efficiency below rated capacity. Most chillers are most efficient at 50–75% load."},
  {term:"Pipe Velocity",def:"Water speed in pipes. Max 1.5 m/s (CIBSE). Too high = erosion/noise. Too low = air pockets."},
  {term:"Primary/Secondary Pumping",def:"Decoupled system: primary pumps protect chillers (constant flow), secondary pumps match demand (variable flow)."},
  {term:"Rack Power Density",def:"Total IT power per rack. Enterprise: 5–30kW. AI/HPC: 30–80kW+."},
  {term:"Raised Floor Plenum",def:"Space beneath raised floor used as cold air distribution chamber. Depth and obstruction directly affect airflow."},
  {term:"Refrigerant",def:"Working fluid in chiller compression cycle. R-134a (GWP 1,430) being phased down. HFO-1234ze (GWP 7) is the replacement."},
  {term:"Sensible Cooling Ratio",def:"Fraction of cooling used for temperature reduction vs humidity removal. Data centres need 0.85–0.95 (high sensible)."},
  {term:"Server Inlet Temperature",def:"Temperature at server front panel. Must stay within ASHRAE envelope. Local measurement, not room average."},
  {term:"Setpoint Optimisation",def:"Adjusting control setpoints based on real-time conditions. Each 1°C saves 2–4% cooling energy."},
  {term:"Supply Air Temperature",def:"Temperature of air delivered to cold aisle. ASHRAE allows up to 27°C — most facilities overcool at 18°C."},
  {term:"Total Heat Rejection",def:"IT Load × PUE = total thermal load on the atmosphere. Every watt consumed leaves as heat."},
  {term:"Waste Heat Recovery",def:"Capturing rejected heat for useful purposes. Data centre heat at 30–40°C suits heat pumps for district heating."},
  {term:"Water-Cooled vs Air-Cooled",def:"Water-cooled: COP 5–7, needs cooling towers. Air-cooled: COP 2.5–3.5, simpler. At scale, water-cooled saves €1M+/year."},
  {term:"Waterside Economiser",def:"Plate heat exchanger transferring CHW heat directly to cooling tower water when outdoor conditions allow. Preferred in Ireland."},
  {term:"Wet-Bulb Temperature",def:"Lowest temperature achievable through evaporation. Determines cooling tower performance. Dublin avg: ~10°C."}
];

  {id:"EN50600",title:"EN 50600-2-3:2019 — Data Centre Facilities and Infrastructures: Environmental Control",year:"2019",tier:"T1",usage:"European data centre cooling standard, PUE methodology, environmental control requirements"},

// AssistBar - Clarify only (Grammar), no Read Aloud

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaHeatMap({persona, onPersonaLevel, PERSONA_MAP}) {
  const [sel, setSel] = React.useState(null); // {pKey, lIdx}
  const [tip, setTip] = React.useState(null); // {text, x, y}

  const PKEYS = ['declan','ann','mark','sarah','tom'];

  // Compute rhetoric text lengths per persona per level
  const raw = React.useMemo(() => {
    return PKEYS.map(pk =>
      LEVELS.map(lvl => {
        const r = lvl.rhetoric[pk];
        return typeof r === 'object' ? (r.text||'').length : (r||'').length;
      })
    );
  }, []);

  // Normalise per row (per persona) — min/max within that persona's row
  const norm = React.useMemo(() => {
    return raw.map(row => {
      const mn = Math.min(...row), mx = Math.max(...row);
      return row.map(v => (mx === mn) ? 0.5 : (v - mn) / (mx - mn));
    });
  }, [raw]);

  const PINFO = [
    {key:'declan',icon:'👷',label:'Declan',role:'Ops Manager'},
    {key:'ann',   icon:'💼',label:'Ann',   role:'Fund Manager'},
    {key:'mark',  icon:'🔧',label:'Mark',  role:'MEP Engineer'},
    {key:'sarah', icon:'🌱',label:'Sarah', role:'ESG Analyst'},
    {key:'tom',   icon:'📊',label:'Tom',   role:'QS / Cost'},
  ];

  const cellStyle = (pi, li) => {
    const intensity = norm[pi][li];
    const isSel = sel && sel.pIdx === pi && sel.lIdx === li;
    return {
      height: 32,
      borderRadius: 4,
      cursor: 'pointer',
      background: `rgba(124,58,237,${(0.12 + intensity * 0.75).toFixed(2)})`,
      border: isSel ? '2px solid var(--green)' : '1.5px solid transparent',
      transition: 'transform .1s',

  };

  const handleSelect = (pi, li) => {
    setSel(prev => (prev && prev.pIdx === pi && prev.lIdx === li) ? null : {pIdx:pi, lIdx:li});

  const handleGo = () => {
    if (!sel) return;
    onPersonaLevel(PINFO[sel.pIdx].key, sel.lIdx);
  };

  const selP = sel ? PINFO[sel.pIdx] : null;
  const selL = sel ? LEVELS[sel.lIdx] : null;
  const selText = sel ? (() => {
    const r = LEVELS[sel.lIdx].rhetoric[PINFO[sel.pIdx].key];
    return typeof r === 'object' ? (r.text||'') : (r||'');
  })() : '';

  return React.createElement('div', {style:{marginTop:8}},
    // Label
    React.createElement('div', {style:{fontSize:12,color:'var(--text-dim)',marginBottom:8,fontFamily:'var(--font-mono)'}},

    // Grid — scrollable wrapper

      React.createElement('div', {style:{
        display:'grid',
        gridTemplateColumns:'90px repeat(9,1fr)',

        // Header row

        ...LEVELS.map((lvl,li) =>
          React.createElement('div', {key:lvl.id, style:{
            fontSize:9, textAlign:'center', color:'var(--text-muted)',

          }},
            React.createElement('div', {style:{fontWeight:600, color:'var(--text-dim)', fontSize:10}}, `L${li+1}`),
            lvl.name.split(' ').slice(0,2).join(' ')
          )
        ),
        // Persona rows
        ...PINFO.map((p, pi) => [
          // Row label
          React.createElement('div', {key:`rl-${pi}`, style:{
            display:'flex', alignItems:'center', gap:5,
            fontSize:11, color:'var(--text-bright)', paddingRight:4,
            fontWeight: persona===p.key ? 600 : 400,
            opacity: persona && persona!==p.key ? 0.6 : 1,
          }},
            React.createElement('span', {style:{fontSize:13}}, p.icon),
            React.createElement('div', null,
              React.createElement('div', {style:{fontWeight:500}}, p.label),
              React.createElement('div', {style:{fontSize:9,color:'var(--text-muted)'}}, p.role)
            )

      )
    ),

    // Selected preview
    sel && React.createElement('div', {style:{
      marginTop:10, padding:'10px 12px',
      background:'var(--panel)', borderRadius:8,
      borderLeft:'3px solid var(--rhetoric)',

        fontSize:10, fontFamily:'var(--font-mono)',

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (idx) => {
    setSelectedLevel(idx);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.idx),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].idx),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

                onClick={()=>{ if(!hasTextSelection()) setActiveChainLevel(activeChainLevel===lvl.level?null:lvl.level); }}

          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Racks<input className="calc-input" type="number" value={calcRacks} onChange={e=>setCalcRacks(Number(e.target.value))}/></label>
          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Target PUE<input className="calc-input" type="number" step="0.1" value={calcPue} onChange={e=>setCalcPue(Number(e.target.value))}/></label>

            <div className="fade-in" style={{marginTop:12}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:8}}>{calcResult.filter(r=>!r.pass&&r.needed!=="-").length} bottleneck{calcResult.filter(r=>!r.pass&&r.needed!=="-").length!==1?'s':''} found</div>
              {calcResult.map((r,i)=>r.needed!=="-"&&(<div key={i} style={{fontSize:12,color:'var(--text-dim)',marginBottom:4}}><span className={r.pass?'badge badge-pass':'badge badge-fail'} style={{marginRight:6}}>{r.pass?'PASS':'FAIL'}</span>L{i+1}: {r.detail}</div>))}
            </div>
          )}
          <div style={{marginTop:14,fontSize:12,color:'var(--text-dim)',lineHeight:1.8,borderTop:'1px solid var(--border)',paddingTop:10}}>
            <strong style={{color:'var(--text-bright)'}}>How to read the results</strong><br/>
            The calculator tests each chain level against your inputs. <span style={{color:'var(--green)',fontWeight:600}}>PASS</span> means that level has enough capacity to handle the heat load from the level above it. <span style={{color:'var(--red)',fontWeight:600}}>FAIL</span> means a bottleneck — that level cannot handle the demand, and the weakest link sets the ceiling for the whole chain. Fix FAIL levels in sequence from top to bottom — upstream fixes often resolve downstream bottlenecks.
          </div>
        </div>
        <div className="sidebar-card">
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--text-bright)',marginBottom:4}}>🏢 Facility Profile</h3>
          <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Clonshaugh Reference Facility (2013)</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:2}}>
            <div>Racks: <strong>{CLONSHAUGH.racks}</strong></div>
            <div>Current density: <strong>{CLONSHAUGH.currentKW} kW/rack</strong></div>
            <div>Target density: <strong>{CLONSHAUGH.targetKW} kW/rack</strong></div>
            <div>Current PUE: <strong>{CLONSHAUGH.currentPUE}</strong></div>
            <div>Target PUE: <strong>{CLONSHAUGH.targetPUE}</strong></div>
            <div>Chiller: <strong>~{CLONSHAUGH.chiller} MW</strong></div>
            <div>CRAHs: <strong>{CLONSHAUGH.crahs} × {CLONSHAUGH.crahKW}kW</strong></div>
            <div>Containment: <strong>{CLONSHAUGH.containment}</strong></div>
          </div>
        </div>
        <div className="sidebar-card">
          <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>📐 Methodology</h3>
          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
            <strong>Trivium Method:</strong> Grammar (definitions) → Logic (cause/effect) → Rhetoric (stakeholder perspectives).
            <br/><strong>Feynman Clarify:</strong> Every fact has three layers — analogy (no jargon), first principles (from universal knowledge), and a test (can you answer this?).
            <br/><strong>Weakest Link:</strong> Each level identifies a common misconception and the corrective path.
            <br/><strong>Five Personas:</strong> Same finding → five different professional perspectives (Declan, Ann, Mark, Sarah, Tom).
            <br/><strong>Your Angle:</strong> Time-pressured or returning? Click your role to find where your professional perspective is richest in this module — direct entry to the Rhetoric layer.
          </div>
        </div>

      </div>
    </div>
  </div>
  );
}

function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const [rhetPersonaInit,setRhetPersona]=useState(null);
  // Read persona stage + persona key from Chain tab persona entry card
  React.useEffect(()=>{
    try {
      const req = sessionStorage.getItem('dc_persona_stage');
      if(req){ setStage(req); sessionStorage.removeItem('dc_persona_stage'); }
      const pk = sessionStorage.getItem('dc_persona_key');
      if(pk){ setRhetPersona(pk); sessionStorage.removeItem('dc_persona_key'); }
    } catch(e){}
  },[selectedLevel]);
  React.useEffect(()=>{ dcTimingLog.log('stage_change', { stage: stage, level: selectedLevel }); },[stage, selectedLevel]);
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
    {lvl.clockQuote && (
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
        <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>— Level {lvl.level}: {lvl.name}</div>
      </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeedStatement}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric} initialPersona={rhetPersonaInit}/>}
      </div>
      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

  const [show,setShow]=useState(null);
  return (
    <div style={{display:'flex',gap:8,flexDirection:'column'}}>
      <div style={{display:'flex',gap:8}}>

      takeaway="When delta-T drops from 6°C to 3°C, pumps must move twice the water — doubling pump energy. Monitor delta-T, not just temperature.">
      {(step) => (
        <svg viewBox="0 0 680 340" style={{maxWidth:680,margin:'0 auto',display:'block'}}>

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc002_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc002_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc002_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
          27 questions across three Trivium stages — 9 per stage, one per chain level.
          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>60s</span>
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}
          </div>
        </div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterStage==='all'?' active':'')} onClick={()=>setFilterStage('all')}>All</button>
        <button className={'filter-btn'+(filterStage==='grammar'?' active':'')} onClick={()=>setFilterStage('grammar')}>Knowledge Check</button>
        <button className={'filter-btn'+(filterStage==='logic'?' active':'')} onClick={()=>setFilterStage('logic')}>Eng. Calculation</button>
        <button className={'filter-btn'+(filterStage==='rhetoric'?' active':'')} onClick={()=>setFilterStage('rhetoric')}>Prof. Judgement</button>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>
        {LEVELS.map(l=>(<button key={l.id} className={'filter-btn'+(filterLevel===l.level?' active':'')} onClick={()=>setFilterLevel(l.level)}>L{l.level}</button>))}
      </div>
      {score.total>0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:600}}>Score: {score.correct}/{score.total} ({Math.round(score.correct/score.total*100)}%)</div>
            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL?'Completed in '+fmtTime(elapsed)+' (under time)':'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{const s=stageScore(st);const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};return s.t>0&&(<div key={st} style={{fontSize:12,color:stageColours[st]}}><strong>{labels[st]}:</strong> {s.c}/{s.t}</div>);})}
          </div>
          {allAnswered&&assessPct>=80&&React.createElement('button',{onClick:function(){setShowCertModal(true);},style:{marginTop:12,padding:'10px 0',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}},assessPct>=90?'Get Achievement Certificate':'Get Completion Certificate')}
          {showCertModal&&React.createElement(CertModal,{score:score.correct,total:score.total,onClose:function(){setShowCertModal(false);}})}
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q);
        const answered=answers[gi]!==undefined;
        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        const countdownCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
              <span>{q.icon}</span>
              <span className={'badge badge-'+q.stage}>{q.stage}</span>
              <span style={{fontSize:12,color:'var(--text-muted)'}}>Level {q.level}</span>
              {/* B5: per-question countdown top-right */}
              {timerActive&&!answered&&!isTimedOut&&qStarted&&(
                <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:countdownCol,minWidth:36,textAlign:'right'}}>
                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  var checkResult = supa.from('certificates').select('certificate_number').eq('module_id', TOOL_ID).eq('learner_name', learnerName).maybeSingle();
  return checkResult.then(function(existing) {
    if (existing.data) { return { duplicate: true, certNumber: existing.data.certificate_number }; }
    return supa.from('certificates').insert([{
      user_id: userId, module_id: TOOL_ID, certificate_number: certNumber,
      cpd_hours: 2, certificate_type: 'Engagement', score: null,
      learner_name: learnerName, pdf_url: null
    }]).select().single().then(function(result) {
      if (result.error) { console.error('Engagement cert failed:', result.error.message); return null; }
      return { certNumber: certNumber, type: 'Engagement', hours: 2, pct: null };
    });
  });
}

/* ═══ DC-LEARN STAGE 5 AUTH + SYNC ═════════════════════════════════════════
   Built: 09/04/2026 — Stage 5 Session 2
   Layer 1 (localStorage) never depends on Layer 2 (Supabase).
   If Supabase is blocked, offline, or errors, the module works exactly as
   it did before: IS_FREE_MODULE or localStorage.dc_learn_paid decides access.
   =========================================================================*/

const IS_FREE_MODULE = (TOOL_ID === 'DC-LEARN-000' || TOOL_ID === 'DC-LEARN-001' || TOOL_ID === 'DC-LEARN-002');
const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};
