<title>DC-LEARN-002 v5.13.7 | Data Centre Cooling Chain | Legacy Business Engineers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.dc-story-body{font-size:17px;line-height:1.9;color:var(--text)}
.dc-story-body p{margin-bottom:22px !important;font-size:17px;line-height:1.9}
.dc-story-body h2{font-family:Georgia,"Times New Roman",serif !important;font-size:26px !important;font-weight:400 !important;color:var(--text-bright) !important;margin-bottom:28px !important;text-align:center;letter-spacing:0.3px}
.dc-story-body h3{font-family:Georgia,"Times New Roman",serif !important;font-size:19px !important;font-weight:500 !important;color:var(--text-bright) !important;margin:36px 0 16px !important}
.dc-story-body blockquote{margin:32px 0 !important;padding:18px 24px 18px 28px !important;border-left:3px solid var(--green) !important;background:var(--green-dim) !important;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.dc-story-body blockquote p{margin-bottom:0 !important}
.dc-story-body hr{margin:36px auto !important;width:80px;border:none !important;border-top:1px solid var(--border-light) !important}
.dc-story-body em{font-style:italic}
.dc-story-body strong{color:var(--text-bright)}
.dc-story-body .dc-story-dropcap::first-letter{float:left;font-family:Georgia,"Times New Roman",serif;font-size:68px;line-height:0.85;padding-right:10px;padding-top:4px;color:var(--green);font-weight:400}
</style>
</head>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-LEARN-002 v5.13.7</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

     facts:[
       {term:"IT Heat Rejection",definition:"Every watt of electrical power consumed by IT equipment is converted to heat. A 10kW server produces 10kW of heat. This is the output of the power distribution chain (DC-LEARN-001): every watt that reaches a server PSU exits as heat into the cooling chain.",plain:"What goes in as electricity comes out as heat — all of it. The power chain (001) delivers the watts; the cooling chain (002) removes them.",number:"1W electrical = 1W thermal",standard:"First Law of Thermodynamics / ASHRAE TC 9.9",feynman:{analogy:"Think of a light bulb: 100% of the electricity it uses becomes heat (plus a little light). A server is the same — every watt of power turns entirely into heat that must go somewhere.",firstPrinciples:"Energy cannot be created or destroyed, only converted. Electrical energy entering a server converts to heat energy. The cooling chain exists to move that heat outside the building.",theTest:"If a server draws 10kW of electrical power, how much heat does it produce? Answer: exactly 10kW — the First Law of Thermodynamics guarantees a 1:1 conversion."},soWhat:"Every cooling decision downstream starts here — get the heat load wrong and the entire chain is mis-sized."},
       {term:"Rack Power Density",definition:"Total IT power per rack, typically 5–30kW for enterprise, 30–80kW+ for AI/HPC.",plain:"How much heat each rack cabinet pumps into the room. A 5kW rack is easy to cool with standard air; a 30kW AI rack concentrates so much heat in one spot that you need much more aggressive airflow — or even liquid cooling — to keep it safe.",number:"5–80+ kW/rack",standard:"ASHRAE TC 9.9 (2021)",feynman:{analogy:"Imagine stacking electric heaters in a wardrobe. One 2kW heater is easy to cool with an open door. Stack fifteen and you need serious ventilation. Rack density is how many heaters are in each wardrobe.",firstPrinciples:"More computing power per rack means more electrical power per rack. More electrical power means more heat in a smaller space. Concentrated heat is harder to remove than spread-out heat.",theTest:"A facility designed for 5kW racks now hosts 20kW AI racks. What breaks first? Answer: the airflow — existing cooling units may have enough total capacity but cannot deliver enough air to the concentrated heat source."},soWhat:"Density determines whether air cooling works or liquid cooling is needed — it is the fork in the road for the whole cooling strategy."},
       {term:"ASHRAE Thermal Envelope",definition:"Recommended supply air: 18–27°C, 5.5°C dew point to 60% RH for Class A1 environments.",plain:"The temperature and humidity range that keeps servers happy. ASHRAE sets the boundaries — too cold wastes energy, too hot risks equipment damage. Most facilities run well inside the safe band, which means they are overcooling and paying for it.",number:"18–27°C supply (A1)",standard:"ASHRAE TC 9.9 Thermal Guidelines (2021)",feynman:{analogy:"Every machine has a comfort zone, like a greenhouse thermostat. Too cold wastes energy; too hot kills the plants. ASHRAE sets the thermostat range for servers.",firstPrinciples:"Electronics have operating temperature limits set by their components. Running cooler than necessary wastes energy. Running hotter risks damage or shutdown. The standard defines the safe and efficient band.",theTest:"An operator runs supply air at 16°C. Is this within ASHRAE A1 recommended range? Answer: no — the A1 minimum is 18°C. Running at 16°C wastes cooling energy with no reliability benefit."},soWhat:"The envelope sets the efficiency ceiling — operating inside it safely while targeting the warm end saves the most energy."},
       {term:"Server Inlet Temperature",definition:"Temperature of air entering the server. Must stay within ASHRAE envelope to prevent throttling or shutdown.",plain:"The temperature the server actually 'feels' at its front panel. Room average can be 22°C while a single rack inlet reads 32°C because of a local hot spot. Inlet temperature is what matters — not what the room thermostat says.",number:"Target 18–27°C (A1 class)",standard:"ASHRAE TC 9.9 (2021)",feynman:{analogy:"A person checking the weather sticks their hand out the window. A server checks its inlet — that is the temperature it actually experiences, regardless of what the room thermostat says.",firstPrinciples:"The temperature at the server front panel determines server health. Room average temperature can differ significantly from what individual servers experience. Local hot spots can exist even when average conditions are fine.",theTest:"Room average is 22°C but a rack inlet reads 32°C. Is there a problem? Answer: yes — the server sees 32°C regardless of the room average, and this exceeds the A1 recommended maximum of 27°C."},soWhat:"Inlet temperature is the ground truth — it overrules every other measurement in the room."},
       {term:"Heat Flux",definition:"Rate of heat transfer per unit area. Higher density racks have higher heat flux requiring more aggressive cooling.",plain:"How concentrated the heat is in a given area. A 5kW rack spreads heat over a full cabinet footprint — manageable with standard airflow. A 40kW AI rack concentrates eight times more heat in the same space, and standard air cooling cannot remove it fast enough.",number:"0.5–10+ kW/m²",standard:"EN 50600-2-3:2019",feynman:{analogy:"Drying a wet towel in a large room is easy — heat spreads naturally. Drying it inside a sealed box requires a fan. High heat flux means the box is small and the towel is very wet.",firstPrinciples:"Heat flux measures energy per unit area. Higher density racks concentrate more heat in less space. Concentrated heat requires faster air movement or liquid cooling to remove effectively.",theTest:"A rack produces 20kW in a 0.6m × 1.0m footprint. What is the heat flux? Answer: 20kW ÷ 0.6m² ≈ 33 kW/m² — this is above the threshold where standard raised-floor cooling struggles."},soWhat:"High heat flux is the trigger for liquid cooling — when air cannot carry the watts away fast enough, the cooling technology must change."}
     ],
     whatItLooksLike:"Walk into a data hall and you feel the heat immediately. Rows of black cabinets with blinking LEDs, each one humming with fans pulling cool air through the front and pushing hot air out the back. The hot aisle behind the racks can be 35–45°C.",
     siteChecklist:["Read rack power meters — note highest density rack","Check server inlet temperatures (should be 18–27°C for A1)","Identify any hot spots above 35°C at rack inlet","Note rack layout: hot aisle / cold aisle arrangement?","Count populated vs available rack positions","Check for blanking panels in unused rack positions"]
   },
   logic:{
     causeAndEffect:[
       {cause:"IT rack density increases from 5kW to 20kW per rack without any corresponding upgrade to the cooling delivery system",effect:"Server inlet temperatures exceed ASHRAE limits → thermal throttling → performance degradation",insight:"Cooling must scale with IT load. A rack density change is a cooling chain change."},
       {cause:"Missing blanking panels in partially populated racks allow hot exhaust air to recirculate directly into the cold aisle",effect:"Hot exhaust air recirculates to server inlets, creating hot spots even with adequate total cooling capacity",insight:"The problem isn't always capacity — it's air management. €5 blanking panels (Tier 3 — ASHRAE TC 9.9 Best Practice, indicative) can fix what looks like a €500k cooling problem."},
       {cause:"Supply air temperature is set at 18°C instead of the ASHRAE TC 9.9 A1-class maximum of 24°C allowable for the installed equipment",effect:"Cooling system works 15–20% harder than necessary, wasting energy and reducing free cooling hours",insight:"Overcooling is the most common and most fixable waste in data centre cooling."}
     ],
     constraintLesson:"The cooling chain is a cascade: each level must handle the heat rejected by the level before it. The total heat at Level 1 (server output) sets the minimum capacity for every subsequent level.\n\nKey relationship: Total facility heat = IT Load × PUE\n\nAt Declan's Clonshaugh facility:\n• Current: 2.4 MW IT × 1.50 PUE = 3.60 MW total facility power\n• Target: 8.0 MW IT × 1.20 PUE = 9.60 MW total facility power\n\nThe non-IT overhead (cooling, lighting, losses) = (PUE − 1) × IT Load.\nAt PUE 1.50: overhead = 0.50 × IT load (50%). At PUE 1.20: overhead = 0.20 × IT load (20%).\nReducing PUE from 1.50 to 1.20 cuts the cooling/infrastructure overhead from 50% to 20% of IT load — even as IT load triples.",
     weakestLink:{whatsWrong:"Assuming cooling capacity is the only metric. Many facilities have enough total kW of cooling but poor distribution — hot spots persist while the system reports 'adequate'.",whatsRight:"Cooling effectiveness = right temperature, right place, right time. Capacity alone is insufficient.",howToGetThere:"Map rack-level inlet temperatures. Fix distribution (containment, blanking panels, floor tiles) before adding capacity."}
   },
   rhetoric:{
     declan:"Declan, every rack power increase is a cooling chain event. Before adding servers, check: can the cooling chain handle the new heat load at every level from rack to atmosphere?",
     ann:"Ann, server heat output is the load that sizes everything downstream. In due diligence, compare actual IT load vs cooling capacity — a facility running at 80%+ cooling utilisation has no headroom for growth.",
     mark:"Mark checks whether cooling has been sized from the rack out — worst-case rack density plus diversity, cascading through each chain level. Sizing from the building in is a common failure mode.",
     sarah:"Sarah, every watt of overcooling is a watt of carbon. Raising supply air from 18°C to 24°C can cut cooling energy 15–20% with zero capex — just a setpoint change.",
     tom:"Tom, cooling typically represents 30–40% of total M&E cost. A 1°C change in supply air setpoint shifts the entire cooling capex and opex budget. Get the setpoint right before pricing equipment."
   },
   rhetoricTakeaways:{
     declan:"Heat load is the input to everything — size the chain from the rack out, not the building in.",
     ann:"Cooling headroom is growth headroom. A facility at 80%+ cooling utilisation has already hit its ceiling.",
     mark:"Design starts at the rack, not the roof. Worst-case density plus diversity gives the real number.",
     sarah:"Overcooling is the most common carbon waste in data centres — and the cheapest to fix.",
     tom:"Get the setpoint right before pricing the equipment — 1°C shifts the entire budget."
   },
   scenario:{title:"The Room That Wouldn't Cool",narrative:"Declan's Clonshaugh facility: the chiller plant shows 65% utilisation, yet Row 12 racks consistently overheat at 15kW each. The facilities team wants a new 500kW chiller unit (€350k installed). But the airflow audit reveals 38% of cold air bypasses the IT load through raised floor gaps and missing blanking panels.",question:"Is the problem cooling capacity or cooling distribution?",answer:"The instinct to add more cooling when racks overheat is natural — but wrong in most cases. At Clonshaugh, the chiller plant has plenty of headroom at 65% utilisation. The problem is that 38% of the cold air never reaches the servers. It escapes through cable cutouts, missing blanking panels, and misaligned floor tiles. This is a distribution problem, not a capacity problem.\nIndicative costs are screening-level estimates (Tier 3 — CIBSE Guide F; industry benchmarks, Q1 2025 Dublin market). Subject to detailed design and tender.\nPhase 1 — Quick wins (Week 1–2, ~€22k):\n1. Install blanking panels in all partially populated racks (€2k)\n2. Seal raised floor cable cutouts and gaps (€5k)\n3. Reposition perforated tiles to align with cold aisles (€0)\n4. Add end-of-row containment curtains for Row 12 (€15k)\nExpected result: effective cooling recovers from 930kW to >1,400kW. Row 12 inlet temperatures drop below 27°C.\nThe €350k chiller is not needed — yet. If IT load grows to 20kW/rack across all 400 racks, new cooling will be required. But the first step is always distribution.\nThe lesson: never buy capacity to solve a distribution problem. Fix the airflow first — it costs 1/15th the price and delivers the result in days, not months."},
   sourceNote:"ASHRAE TC 9.9 Thermal Guidelines 2021 (T1). EN 50600-2-3:2019 (T1). First Law of Thermodynamics.",
  whoShouldCare:["declan", "mark"],
  clockQuote:"Before you look at what the instruments say, count what's there. The number tells you what the design assumed. The instruments tell you what's actually happening.",
   retrofitRelevance:"Existing facilities often overcool because original designs assumed lower rack densities. The first retrofit opportunity is always: raise supply air temperature and fix air distribution before adding cooling capacity.",
   crossRefs:[{module:"DC-LEARN-001",level:"L9",topic:"Server PSU — heat output is the end of the power chain and the start of the cooling chain"},{module:"DC-LEARN-004",level:"L1",topic:"PUE fundamentals — server heat load drives the cooling component of PUE"}],
   cascadeCheck:(kw,racks,pue)=>{const m=25;return{needed:kw.toFixed(0),available:m.toFixed(0),unit:"kW/rack",pass:kw<=m,detail:kw+"kW/rack vs ∼"+m+"kW air cooling limit (with containment)"}}

  {id:"L2",level:2,name:"Rack Airflow Management",icon:"💨",component:"Air Distribution",available:true,
   userNeedStatement:"Manage the air path from CRAH/CRAC units to server inlets and from server exhausts back to cooling units — ensuring cold air reaches IT equipment and hot air doesn't recirculate.",
   plainEnglish:"The best chiller in the world is useless if the cold air doesn't reach the servers. Airflow management is about keeping cold air cold and hot air hot — never mixing them.",
   grammar:{
     facts:[
       {term:"Hot Aisle / Cold Aisle",definition:"Rack arrangement where server fronts face each other (cold aisle) and server backs face each other (hot aisle), creating distinct thermal zones.",plain:"Servers face front-to-front so cold air goes in the front and hot air comes out the back into a separate aisle.",number:"ΔT: 10–20°C across rack",standard:"ASHRAE TC 9.9 (2021)",feynman:{analogy:"Think of two rows of desk fans all facing the same direction. The side they blow from stays cool; the side they blow toward gets warm. Servers work the same way — cold in the front, hot out the back.",firstPrinciples:"Servers draw air in from one side and exhaust it from the other. If all servers face the same way, you get predictable hot and cold zones. Predictable zones can be managed; random mixing cannot.",theTest:"Two adjacent racks face opposite directions. What happens? Answer: one rack exhales hot air directly into the other rack’s inlet, creating a hot spot that no amount of total cooling capacity can fix."},soWhat:"Without separation, hot and cold air mix and every CRAH works harder for less result."},
       {term:"Containment",definition:"Physical barriers (curtains, panels, doors) that separate hot and cold airstreams to prevent mixing.",plain:"Walls and doors that keep hot air and cold air apart. Without containment, hot exhaust mixes with cold supply air, and cooling units work harder to re-cool air that was already cold. Installing containment is one of the cheapest, fastest efficiency wins in any data centre.",number:"Hot aisle containment most common",standard:"EN 50600-2-3:2019 Section 6.4",feynman:{analogy:"A fridge with its door open still makes cold air, but the kitchen stays warm. Closing the door is containment — it keeps cold where it is needed and stops waste.",firstPrinciples:"Hot and cold air will naturally mix if nothing separates them. Mixing wastes cooling energy because re-cooling mixed air requires more work. Physical barriers prevent mixing.",theTest:"A facility installs hot aisle containment and CRAH return air temperature rises 6°C. Is that good or bad? Answer: good — it means hot air is now reaching the CRAH instead of mixing with cold air, so effective cooling capacity increases."},soWhat:"Containment is the single cheapest way to recover lost cooling capacity — it fixes distribution before you buy more equipment."},
       {term:"Bypass Air",definition:"Cold supply air that returns to the CRAH without passing through IT equipment. Pure waste.",plain:"Cold air that takes a shortcut back to the cooling unit without doing any useful work.",number:"Uncontained: 30–60% bypass typical",standard:"ASHRAE Research Project RP-1596",feynman:{analogy:"Imagine watering a garden but 40% of the water goes down a drain before reaching the plants. The plants are dry despite the hose running at full pressure. Bypass air is the water down the drain.",firstPrinciples:"Cool air takes the path of least resistance. If there are gaps in the floor or missing panels, air flows through them instead of through servers. Every unit of bypassed air is a unit of wasted cooling.",theTest:"Installed CRAH capacity is 1,500kW and bypass is 38%. How much cooling actually reaches the IT equipment? Answer: 1,500 × 0.62 = 930kW effective — 570kW is wasted."},soWhat:"Bypass is invisible waste — the cooling system thinks it is working but the servers are not getting the benefit."},
       {term:"Blanking Panels",definition:"Filler panels installed in unused rack positions to prevent hot exhaust air from recirculating through the rack to server inlets.",plain:"Plastic panels that block gaps in racks so hot air can't sneak back to where cold air should be.",number:"€2–5 per panel (Tier 3 — ASHRAE TC 9.9 Best Practice, indicative)",standard:"ASHRAE TC 9.9 Best Practice",feynman:{analogy:"Plugging holes in a bucket before filling it with water. Each gap in a rack is a hole where hot air sneaks through to contaminate the cold side. A €3 plastic panel seals the hole.",firstPrinciples:"Unused rack positions create openings between hot and cold airstreams. Air pressure differences push hot exhaust air through these openings. Blanking panels seal the openings and maintain separation.",theTest:"A rack has 42U of space but only 30U of servers. What should fill the remaining 12U? Answer: blanking panels — without them, hot exhaust air recirculates through the empty spaces to server inlets."},soWhat:"A blanking panel costing a few euro can recover thousands of euro worth of cooling capacity — the best ROI in the data hall."},
       {term:"Raised Floor Plenum",definition:"The space beneath the raised floor used as an air distribution chamber for cold supply air.",plain:"The gap under the floor tiles that acts as a giant air duct. Cold air from the CRAH is pushed into this space under pressure, then rises up through perforated tiles into the cold aisles. If the plenum is cluttered with cables or too shallow, air distribution becomes uneven and some racks starve.",number:"Depth: 300–1000mm typical",standard:"EN 50600-2-3:2019",feynman:{analogy:"Think of the space under a raised floor like the ducting in a house’s central heating system. It is a hidden chamber that distributes air evenly to where it is needed.",firstPrinciples:"Cold air needs a distribution path from cooling units to server racks. The space under the floor acts as a pressurised chamber. Perforated tiles release cold air where racks need it.",theTest:"Plenum depth is 200mm and heavily obstructed with cables. What is the likely effect? Answer: reduced air pressure and uneven cooling distribution — tiles near CRAHs deliver too much air while distant tiles starve."},soWhat:"The plenum is the distribution duct — if it is cluttered or leaking, no amount of cooling capacity compensates."}
     ],
     whatItLooksLike:"In an uncontained data hall, you can feel the temperature gradient walking between aisles. Cold aisles at 20–24°C, hot aisles at 35–40°C. With containment, the difference is dramatic: the contained aisle is a defined thermal zone with physical doors at each end.",
     siteChecklist:["Check for hot aisle or cold aisle containment","Look for missing blanking panels in racks","Check raised floor tiles — any open gaps or missing tiles?","Feel for air leaks around cable cutouts in raised floor","Measure temperature difference: cold aisle vs hot aisle","Note any racks facing the wrong direction (breaking the hot/cold pattern)"]
   },
   logic:{
     causeAndEffect:[
       {cause:"No hot aisle or cold aisle containment is installed, resulting in 38% of cold air bypassing the IT equipment entirely",effect:"CRAH units work at full capacity but 38% of cooling never reaches servers — effective capacity is 62% of installed",insight:"Bypass air is invisible waste. You can't see it, but you can measure it: if CRAH return temperature is low, air is bypassing the load."},
       {cause:"Hot aisle containment is installed with sealed end doors and a blanket containment canopy, eliminating all air bypass paths",effect:"Bypass drops to <5%, CRAH return temperature rises 5–8°C, effective cooling capacity increases 40%+",insight:"Containment is the single highest-ROI cooling improvement. It doesn't add cooling — it makes existing cooling effective."},
       {cause:"Mixed rack orientations exist across the data hall, with some racks facing the wrong direction and exhausting into the cold aisle",effect:"Hot exhaust from reversed racks enters cold aisle, raising inlet temperatures for neighbouring servers",insight:"One reversed rack can create a hot spot affecting 4–6 adjacent racks. Rack orientation is non-negotiable."}
     ],
     constraintLesson:"Airflow management is the multiplier for cooling capacity:\n\n• No containment, no blanking panels: 40–60% effective cooling\n• Blanking panels only: 60–75% effective\n• Hot aisle containment + blanking panels: 90–98% effective\n\nAt Declan's Clonshaugh:\nInstalled CRAH capacity: 1,500kW\n• Current effective (38% bypass): ~930kW\n• With containment (<5% bypass): ~1,425kW\n\nContainment cost: ~€150k (Tier 3 — CIBSE Guide F; industry benchmarks, indicative). New chiller cost: ~€1.2M (Tier 3 — Carrier/Trane/York published ranges, indicative). Same result.",
     weakestLink:{whatsWrong:"Treating airflow management as 'nice to have' rather than essential infrastructure. Many facilities add chillers when containment would solve the problem at 1/10th the cost.",whatsRight:"Fix distribution first, add capacity second. Every kW of bypass eliminated is a kW of effective cooling gained for free.",howToGetThere:"Airflow audit → blanking panels → seal floor/cable gaps → containment → then reassess if additional capacity is needed."}
   },
   rhetoric:{
     declan:"Declan, check CRAH return air temperature. If it's below 30°C, you have bypass. Every degree below target is wasted energy. Containment + blanking panels = immediate capacity gain.",
     ann:"Ann, a facility without containment is operating at 60% efficiency. Ask the operator: what's the bypass rate? If they don't know, that's the due diligence finding.",
     mark:"Mark checks whether containment is designed in from day one. Retrofitting costs 3–5× more than including it in the original design. Hot aisle containment is preferred — it's safer for personnel.",
     sarah:"Sarah, containment reduces cooling energy by 20–30% by eliminating bypass. It's the fastest PUE improvement available and often the largest single carbon reduction in a retrofit.",
     tom:"Tom, containment ROI is typically 6–18 months. Budget €150k per data hall for hot aisle containment retrofit (Tier 3 — CIBSE Guide F; industry benchmarks, indicative). Compare against €1M+ for additional chiller capacity that containment may eliminate."
   },
   rhetoricTakeaways:{
     declan:"Fix containment and blanking panels before requesting more cooling capacity.",
     ann:"No containment means ~40% of cooling capacity is wasted. That is the due diligence finding.",
     mark:"Hot aisle containment from day one — retrofitting costs 3–5× more than building it in.",
     sarah:"Containment is the fastest PUE improvement available and often the largest single carbon reduction.",
     tom:"€150k containment retrofit (Tier 3 — CIBSE Guide F; industry benchmarks, indicative) can eliminate the need for €1M+ in additional chiller plant."
   },
   scenario:{title:"The Chiller That Wasn't Needed",narrative:"The MEP contractor quotes €1.2M for a new 500kW chiller to fix Row 12 overheating. But an airflow audit reveals: installed CRAH capacity is 1,500kW, bypass airflow is 38%, effective cooling reaching IT is only ~930kW. With containment reducing bypass to 5%, effective capacity would be ~1,425kW.",question:"Spend €1.2M on a chiller or €150k on containment?",answer:"This is the most common capital misallocation in data centre operations: spending seven figures on new plant when the existing plant delivers less than two-thirds of its rated capacity. The airflow audit tells the real story — 38% bypass means 570kW of cooling is produced but never reaches a server inlet. Containment recovers that wasted capacity for a fraction of the cost.\nIndicative costs are screening-level estimates (Tier 3 — CIBSE Guide F; industry benchmarks, Q1 2025 Dublin market). Subject to detailed design and tender.\nPhase 1 — Containment retrofit (~€160k):\n1. Hot aisle containment for all rows: ~€150k\n2. Blanking panels and floor sealing: ~€10k\n3. Result: effective capacity rises from 930kW to ~1,425kW (95% of installed)\n4. Capex avoided: ~€1.05M\nPhase 2 — Only if needed:\nIf IT load growth exceeds the recovered capacity, size new cooling for the contained environment. A contained hall needs 40–60% less cooling than an uncontained one — so the new system is smaller, cheaper, and more efficient.\nThe lesson: fix distribution before buying capacity. €160k of containment eliminated a €1.2M chiller order — and the facility runs cooler than it did before."},
   sourceNote:"ASHRAE TC 9.9 2021 (T1). ASHRAE RP-1596 (T1). EN 50600-2-3:2019 (T1).",
  whoShouldCare:["declan", "mark"],
  clockQuote:"A data centre isn't a computing facility. It's a heat management facility that also runs computers. When you understand that, you understand everything.",
   retrofitRelevance:"Containment retrofit is the #1 recommended action for any existing data centre. It improves every metric: temperature stability, energy efficiency, effective capacity, and PUE.",
   crossRefs:[{module:"DC-LEARN-004",level:"L1",topic:"PUE measurement — containment directly reduces the cooling component of PUE"},{module:"DC-LEARN-009",level:"L2",topic:"Environmental sensors — DCIM (Data Centre Infrastructure Management) quantifies containment effectiveness with inlet temperature mapping"}],
   cascadeCheck:(kw,racks,pue)=>{const h=kw*racks/1000;const c=1.5;const e=c*0.62;return{needed:h.toFixed(1),available:e.toFixed(1),unit:"MW effective",pass:h<=e,detail:h.toFixed(1)+"MW heat vs "+e.toFixed(1)+"MW effective (1.5MW × 62%)"}}

  {id:"L3",level:3,name:"CRAH/CRAC Units",icon:"❄️",component:"Precision Cooling",available:true,
   userNeedStatement:"Remove heat from the data hall air using Computer Room Air Handlers (CRAH) or Computer Room Air Conditioners (CRAC), maintaining precise temperature and humidity control.",
   plainEnglish:"CRAH and CRAC units are the workhorses inside the data hall — they take hot air from the servers and push cold air back. Think of them as the lungs of the cooling system.",
   grammar:{
     facts:[
       {term:"CRAH (Computer Room Air Handler)",definition:"Uses chilled water coils to cool air. Water from the chiller plant absorbs heat; fans distribute cooled air to the data hall.",plain:"A big unit with a fan and a cold water coil — air blows over the coil and gets cold.",number:"80–150kW sensible per unit",standard:"EN 50600-2-3:2019",feynman:{analogy:"A CRAH is like a car radiator in reverse. Instead of engine coolant heating the air, chilled water cools the air. A fan blows the cooled air into the room.",firstPrinciples:"Heat transfers from warm air to cold water through a coil. The warmed water returns to the chiller to be re-cooled. The fan moves air over the coil and into the data hall.",theTest:"A CRAH uses chilled water; a CRAC has its own compressor. Which is more efficient at scale? Answer: CRAH — centralised chillers are more efficient than multiple small compressors, and chilled water systems offer better part-load performance."},soWhat:"CRAHs connect the air side to the water side — their efficiency determines how well the chiller plant serves the servers."},
       {term:"CRAC (Computer Room Air Conditioner)",definition:"Contains its own DX (Direct Expansion) refrigerant circuit. Self-contained cooling — no chilled water needed.",plain:"Has its own built-in refrigeration system, like an oversized air conditioner. Simpler to install because it doesn't need a central chiller plant, but less efficient at scale. Typically found in smaller facilities or edge deployments.",number:"30–100kW per unit",standard:"EN 50600-2-3:2019",feynman:{analogy:"A CRAC is a self-contained mini fridge for the data hall. It has its own compressor inside, like a domestic air conditioner, but sized for a server room.",firstPrinciples:"A CRAC contains its own refrigerant circuit — compressor, condenser, and evaporator. It does not need a central chiller or piped chilled water. This makes it simpler to install but less efficient at scale.",theTest:"When would you choose a CRAC over a CRAH? Answer: in small facilities (<500kW) or edge deployments where the cost and complexity of a centralised chiller plant is not justified."},soWhat:"CRACs trade efficiency for simplicity — right for edge sites, wrong for large facilities where chiller plants win."},
       {term:"Sensible Cooling Ratio",definition:"Fraction of total cooling capacity used for temperature reduction vs humidity removal. Data centres need high sensible ratio (0.85–0.95).",plain:"How much of the cooling goes to reducing temperature versus removing moisture. Data centres produce almost entirely dry heat — servers do not generate humidity. A unit with a low sensible ratio wastes capacity on dehumidification that is not needed. Target 0.85–0.95 for DC applications.",number:"0.85–0.95 target",standard:"ASHRAE TC 9.9",feynman:{analogy:"Imagine using a towel to dry dishes versus wringing water from a cloth. Data centres need dish-drying (temperature reduction), not cloth-wringing (humidity removal). The ratio measures how much goes to each.",firstPrinciples:"Cooling energy splits between reducing temperature (sensible) and removing moisture (latent). Data centres generate dry heat with minimal moisture. A high sensible ratio means most energy goes to useful temperature reduction.",theTest:"A unit has a sensible ratio of 0.70. Is this suitable for a data centre? Answer: no — data centres need 0.85–0.95. A ratio of 0.70 wastes 30% of capacity on unnecessary dehumidification."},soWhat:"A low sensible ratio means you are paying to remove moisture that does not exist — wasted capacity in a dry-heat environment."},
       {term:"Supply Air Temperature",definition:"Temperature of air delivered to the cold aisle or underfloor plenum.",plain:"How cold the air is when it leaves the cooling unit. Many facilities run at 18°C or lower, well below the ASHRAE A1 maximum of 27°C. Every degree you raise the supply temperature saves 2–4% cooling energy — and costs nothing to change.",number:"Current: 18°C (Declan's). ASHRAE allows up to 27°C",standard:"ASHRAE TC 9.9 (2021)",feynman:{analogy:"Turning your home thermostat from 18°C to 21°C saves energy because the heating system works less. In a data centre, raising supply air from 18°C to 24°C is the same principle in reverse — the cooling system works less.",firstPrinciples:"Colder supply air requires more energy to produce. ASHRAE allows up to 27°C for A1 environments. Each degree warmer reduces cooling energy by 2–4% and extends free cooling availability.",theTest:"Supply air is set at 18°C. ASHRAE allows 27°C. How much cooling energy could raising to 24°C save? Answer: approximately 12–24% (6°C × 2–4% per degree), with zero capital expenditure."},soWhat:"Supply air setpoint is the single biggest operational lever — every degree warmer saves 2–4% with zero capital cost."},
       {term:"Airflow Rate",definition:"Volume of air moved per unit time, measured in m³/s. Must match the heat load: Q = ṁ × cp × ΔT.",plain:"How much air the unit pushes per second. More heat means more airflow needed to carry it away. The relationship is governed by a simple formula: heat removed equals air mass flow times specific heat times temperature rise. If the heat load doubles, the airflow must roughly double to maintain the same inlet temperatures.",number:"Formula: Q/(ρ × cp × ΔT)",standard:"CIBSE Guide B2",feynman:{analogy:"Blowing on hot soup cools it. Blowing harder cools it faster. In a data hall, the amount of air you blow over the racks determines how fast heat is carried away.",firstPrinciples:"Heat removal requires moving a mass of air over the heat source. The formula Q = mass flow × specific heat × temperature difference governs the relationship. More heat or less temperature difference means more airflow needed.",theTest:"IT load doubles but supply temperature stays the same. What must happen to airflow? Answer: airflow must roughly double to maintain the same rack inlet temperatures, since Q = ṁ × cp × ΔT."},soWhat:"Airflow must match the heat load — too little and servers overheat, too much and fan energy is wasted."}
     ],
     whatItLooksLike:"Large floor-standing units (2.5m tall × 1.5m wide × 1m deep) positioned around the data hall perimeter or within rows. Each has supply air grilles at the bottom (for underfloor supply) or front (for row-based cooling). Return air enters at the top. You can hear the fans and feel the cold air flowing from the discharge.",
     siteChecklist:["Count CRAH/CRAC units and read nameplate capacity","Check supply air temperature setpoint — is it below 24°C?","Note cooling type: chilled water (CRAH) or DX (CRAC)","Check fan speed — variable or fixed?","Look for units running but not needed (redundant units running loaded)","Measure supply air temperature at the unit discharge"]
   },
   logic:{
     causeAndEffect:[
       {cause:"CRAH supply air temperature is set to 18°C rather than the 24°C permitted under ASHRAE TC 9.9 A1 class for the installed servers",effect:"Chillers work harder, free cooling hours reduced by 2,000+/year, PUE increases by 0.1–0.2",insight:"Each 1°C increase in supply air saves 2–4% cooling energy. Going from 18°C to 24°C is a 12–24% saving with zero capex."},
       {cause:"CRAH units have fixed-speed fans running at 100% regardless of actual IT load, with no variable speed drive or load-following control",effect:"Fan energy is 30–50% of CRAH power consumption. At 50% airflow need, fixed fans waste 75% of fan energy.",insight:"Fan power follows the cube law: halving airflow reduces fan power to 1/8th. Variable speed drives are essential."},
       {cause:"12 CRAH units rated at 150kW each are installed but the current IT load only requires 8 units at typical redundancy levels",effect:"Four redundant CRAH units running at full fan speed while unloaded waste approximately 200kW of fan energy continuously",insight:"Shut down or reduce speed on excess units. N+1 redundancy means one spare, not four."}
     ],
     constraintLesson:"CRAH sizing for Declan's 8MW target:\n\nAirflow calculation: Q = IT Load / (ρ × cp × ΔT)\nWhere: ρ = 1.2 kg/m³, cp = 1.006 kJ/kgK, ΔT = 12°C\n\nQ = 8,000 / (1.2 × 1.006 × 12) = ~552 m³/s\n\nAt 150kW sensible per CRAH unit:\n8,000kW / 150kW = ~54 units + N+1 = ~55–60 units\n\nSupply air temperature is the single biggest lever. Each °C warmer reduces chiller energy and extends free cooling hours.",
     weakestLink:{whatsWrong:"Setting supply air at 18°C 'because we always have'. Most facilities overcool by 4–6°C, wasting 10–20% of total cooling energy.",whatsRight:"Set supply air to the highest ASHRAE-allowed temperature that maintains all rack inlets within envelope.",howToGetThere:"Gradually raise setpoint by 1°C per week. Monitor rack inlet temperatures. Stop when any inlet approaches 27°C."}
   },
   rhetoric:{
     declan:"Declan, raise your supply air from 18°C to 22–24°C gradually. Monitor rack inlets. This single change can cut cooling energy 15–20% and extend free cooling hours by 1,500+/year.",
     ann:"Ann, supply air temperature is a proxy for operational maturity. A facility at 18°C is overcooling. Ask: why haven't they raised it? The answer reveals how well they manage the cooling chain.",
     mark:"Mark checks whether variable-speed CRAH fans are confirmed from day one. The cube law means VSD payback is under 12 months — 24°C supply with containment, not 18°C without, is current best practice.",
     sarah:"Sarah, CRAH fan energy is 5–15% of total facility power. Variable speed + higher setpoint = 40–60% fan energy reduction. That's a significant carbon win at zero capex.",
     tom:"Tom, CRAH units: €30–50k each installed. For 8MW IT load, budget 55–60 units × €40k = €2.2–2.4M. VSD option adds ~€3k/unit but saves €200k+/year in energy."
   },
   rhetoricTakeaways:{
     declan:"Raise the supply air temperature before buying new cooling units — it costs nothing.",
     ann:"A facility running at 18°C supply air is overcooling. Ask why — the answer reveals operational maturity.",
     mark:"Variable-speed fans and 24°C supply with containment — that is the baseline specification.",
     sarah:"Fan energy is 5–15% of total facility power. VSD + higher setpoint cuts it by 40–60%.",
     tom:"VSD adds ~€3k/unit but saves €200k+/year in fan energy. Payback is measured in weeks."
   },
   scenario:{title:"The Setpoint Experiment",narrative:"Declan's Clonshaugh facility runs supply air at 18°C — six degrees below the ASHRAE A1 minimum of 24°C for optimal efficiency. The team has never changed the setpoint since commissioning because no one wanted to risk a thermal event. You propose a phased trial: raise 1°C per week for 6 weeks (18→24°C), monitoring all rack inlet temperatures daily. No capital expenditure. No equipment changes. Just a setpoint adjustment and a clipboard.",question:"What do you expect to happen at each stage?",answer:"This is the lowest-risk, highest-return intervention in any existing data centre. The physics is simple: every degree warmer the supply air, the less work the chiller does and the more hours Dublin's climate provides free cooling. The resistance is psychological, not technical — operators fear what they have never tested.\n\nThe phased approach builds evidence at each step:\n\n18→20°C: No change in rack inlets (overcooling absorbed). Chiller load drops 4–8%. Team confidence builds.\n20→22°C: Some high-density racks approach 25°C. Check airflow distribution — any hot spots reveal containment gaps, not setpoint problems. Chiller load drops further.\n22→24°C: A few racks may need blanking panels or floor tile adjustment. Free cooling hours increase by ~1,500/year as the threshold rises.\n\nNet result: 15–20% cooling energy reduction, €100k+/year opex saving, zero capex. PUE drops 0.1–0.15 points.\n\nCritical rule: if any rack exceeds 27°C at any stage, fix the local airflow issue — do not lower the entire facility setpoint. One hot rack is a distribution problem, not a setpoint problem.\n\nThe lesson: the biggest saving in the cooling chain costs nothing to implement. Every facility that has never tested a setpoint increase is leaving 15–20% of cooling energy on the table."},
   sourceNote:"ASHRAE TC 9.9 2021 (T1). EN 50600-2-3:2019 (T1). CIBSE Guide B2 (T2).",
  whoShouldCare:["declan", "mark", "tom"],
  clockQuote:"Hot air and cold air in the wrong place is not an airflow problem. It's a money problem. It's just that the bill arrives at the end of the year instead of the end of the day.",
   retrofitRelevance:"Supply air temperature optimisation is the fastest, cheapest, and lowest-risk improvement in any existing data centre. No equipment changes needed — just a setpoint adjustment and monitoring.",
   crossRefs:[{module:"DC-LEARN-004",level:"L7",topic:"ASHRAE thermal envelopes — the standard that defines safe supply air temperature ranges"},{module:"DC-LEARN-003",level:"L2",topic:"N+1 redundancy — CRAH/CRAC redundancy determines how much capacity margin exists for setpoint changes"}],
   cascadeCheck:(kw,racks,pue)=>{const h=kw*racks/1000;const c=12;const k=150;const ef=0.65;const e=c*k/1000*ef;return{needed:h.toFixed(1),available:e.toFixed(1),unit:"MW (CRAH)",pass:h<=e,detail:h.toFixed(1)+"MW vs "+e.toFixed(1)+"MW (12 CRAHs × 150kW × 65%)"}}
