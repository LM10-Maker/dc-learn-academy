{id:"L9",level:9,name:"Monitoring Strategy Roadmap — Clonshaugh Retrofit",icon:"🗺️",component:"Strategy Layer",available:true,
clockQuote:"She had arrived believing compliance was a reporting exercise. She was leaving understanding it was an infrastructure programme. The form was the last step, not the first. Everything before it — sensors, meters, gateways, historians — was the work that made the form honest.",
userNeedStatement:"When I need to plan and budget a complete monitoring upgrade, help me see the full programme — phased investment, dependencies, payback milestones.",
plainEnglish:"Three phases over 18 months, from no DCIM to closed-loop optimisation — each phase delivering measurable value before the next begins.",
grammar:{facts:[
{term:"Phase 1 — Measure (Months 1–4)",definition:"Deploy sensors (L2), install PUE sub-meters (L4), begin DCIM procurement (L5).",plain:"First, get eyes on the problem. Deploy 1,200 sensors, install 6 power meters. By month 4, you know where every kilowatt goes.",number:"Budget (all figures Tier 3 — Honeywell/Siemens/Schneider published pricing; RICS NRM1 metering allowances, indicative): sensors €130,000–160,000 + PUE meters €15,000–25,000. Total: ~€145,000–185,000 (screening-level estimate). Midpoint: €165,000.",standard:"EN 50600-4-2; ASHRAE TC 9.9",feynman:{analogy:"Think of it like getting an eye test before buying glasses — Phase 1 measures what is actually wrong before you spend money on the fix.",firstPrinciples:"Phase 1 deploys 1,200 rack sensors and 6 PUE sub-meters. Within 30 days: rack-level thermal maps and PUE component attribution. This identifies optimisation targets and satisfies EED Category 2 requirements. Budget: ~€165,000.",theTest:"You know you understand Phase 1 when you can answer: Phase 1 data shows cooling is 0.325 PUE overhead and distribution is 0.050. Where should Phase 3 focus? Answer: Cooling — at 65% of overhead, the data makes it obvious."}},
{term:"Phase 2 — Integrate (Months 4–10)",definition:"Deploy DCIM (L5), upgrade BMS to BACnet/IP (L3), rationalise alarms (L6), configure EED reporting (L7).",feynman:{analogy:"Think of it like hiring a translator and connecting all the phones — Phase 2 connects systems that were measuring independently so they work as one.",firstPrinciples:"Phase 2: deploy DCIM, upgrade BMS to BACnet/IP (so DCIM reads BMS data), rationalise alarms (120/shift → <20/day), configure EED reporting. BMS upgrade is critical path — 3–4 month procurement. Budget: ~€230,000.",theTest:"You know you understand Phase 2 when you can answer: Phase 2 is complete but Phase 3 has not started. Is Clonshaugh already saving? Answer: Yes — better alarm response, avoided compliance cost (~€10–15K/year), and quick-win optimisations from DCIM data."},plain:"Connect the dots. Install DCIM, upgrade BMS, clean alarms, configure compliance reports. By month 10: single platform, automated PUE/CUE/REF.",number:"Budget (all figures Tier 3 — Nlyte/Vertiv/Schneider/Honeywell/Siemens published pricing; RICS NRM1 fee benchmarks, indicative): DCIM €70,000–100,000 + BMS upgrade €120,000 + alarm rationalisation €15,000–25,000 + EED gaps €5,000–10,000. Total: ~€210,000–255,000 (screening-level estimate). Midpoint: €230,000.",standard:"EN 50600-3-1; ISO 16484-5; ISA-18.2; EED Art. 12"},
{term:"Phase 3 — Optimise (Months 10–18)",definition:"Commission closed-loop cooling (L8), setpoint reset, tune free cooling.",feynman:{analogy:"Think of it like switching from manual to automatic transmission — the system reads the road and shifts for you. Phase 3 lets DCIM drive the BMS.",firstPrinciples:"Phase 3 commissions automated control: DCIM reads temperatures and load, writes CRAH setpoint to BMS every 60 seconds. Safety limits hardcoded (14–20°C supply, 27°C inlet limit). Annual saving at PUE 1.30: ~€505,000/year. Budget: ~€37,500.",theTest:"You know you understand Phase 3 when you can answer: Payback on full programme (€432,500) from Phase 3 completion? Answer: €432,500 ÷ €757,000 ≈ 6.9 months."},plain:"Turn data into savings. Commission automated control, let DCIM drive BMS. By month 18: PUE 1.30–1.35, minimal operator intervention.",number:"Budget (all figures Tier 2 — RICS NRM1 engineering fee benchmarks, indicative): control engineering €20,000–30,000 + tuning €10,000–15,000. Total: ~€30,000–45,000 (screening-level estimate). Midpoint: €37,500. Annual saving at PUE 1.30: ~€505,000/year (screening-level calculation: 2,400 kW × 0.20 ΔPuE × 8,760 hrs × €0.12/kWh; T1/T2 inputs).",standard:"EN 50600-3-1; CIBSE Guide H; ASHRAE TC 9.9"}
,{term:"Phase 2 BMS Controller Upgrade — Critical Path",definition:"The replacement of Clonshaugh's 2013-era BMS controllers with BACnet/IP-capable units supporting external setpoint commands and API integration — the prerequisite for closed-loop optimisation.",plain:"You cannot do closed-loop control with a BMS that does not accept external commands. The 2013 controllers at Clonshaugh are read-only from DCIM's perspective. The controller upgrade is the critical path item — everything in Phase 3 depends on it.",number:"Scope: 12 BMS controllers, approximately 3,500 I/O points. Cost: €80,000–120,000 (Tier 3 — Honeywell/Siemens/Johnson Controls published controller pricing; RICS NRM1, indicative; hardware + software + commissioning). Timeline: procurement 2–4 weeks, manufacturing 4–8 weeks, staged commissioning 4–6 weeks (one controller at a time to maintain control). Risk: loss of BMS control during switchover (mitigated by staged approach with temporary manual override).",standard:"BACnet ISO 16484-5; EN 50600-3-1:2021 integration requirements",feynman:{analogy:"Upgrading the BMS controllers is like replacing the engine in a car while it is still driving. The car (DC) cannot stop — it must maintain cooling and power throughout the upgrade. Staged commissioning replaces one controller at a time, like replacing one cylinder while the others keep running.",firstPrinciples:"A BMS controller is a computer that reads sensors and writes to actuators (valves, dampers, fan speeds). A 2013 controller speaks its vendor's proprietary protocol and does not accept external setpoint commands. A modern BACnet/IP controller accepts commands from any BACnet client — including DCIM. Without this capability, DCIM can monitor but not control. The upgrade enables the transition from open-loop (operator adjusts) to closed-loop (DCIM adjusts automatically).",theTest:"Phase 1 data shows CRAH supply temperature should be 18°C not 12°C. Can the DCIM implement this change automatically with the current 2013 BMS? Answer: No — the 2013 controllers do not accept external setpoint commands. The operator must manually adjust each CRAH. This is why the Phase 2 BMS upgrade is the critical path to closed-loop optimisation."}},{term:"Monitoring ROI — Payback Calculation",definition:"The financial return on the monitoring upgrade programme calculated as annual energy savings divided by total programme capex. At Clonshaugh: approximately 4–5 months payback from Phase 3 completion.",plain:"The monitoring upgrade is not a cost centre — it is an investment with measurable, auditable return. Every optimisation identified by monitoring data translates directly to lower electricity bills. The payback is rapid because the savings are immediate and recurring.",number:"Clonshaugh programme: Total capex €385,000–485,000 (Tier 3 — component pricing T1–T8 below, RICS NRM1 aggregated, indicative). Annual saving from monitoring-enabled optimisation: approximately €757,000 (screening-level calculation: PUE 1.50→1.20 = 720 kW saved × 8,760 hrs × €0.12/kWh; inputs: IT load T1-Clonshaugh canonical, PUE T1-facility data, electricity price T2-CRU Q4 2024). Simple payback: €485,000 / €757,000 = 7.7 months. 5-year NPV at 8% discount rate: approximately €4.6M. IRR: >250%. This makes monitoring the highest-ROI infrastructure investment in DC retrofit.",standard:"EN 50600-4-2 PUE measurement; SCSI lifecycle cost methodology; programme cost derived from L1–L8 component pricing (T3)",feynman:{analogy:"The monitoring ROI is like buying a fuel gauge for your car. The gauge costs €100. But it tells you when you are driving inefficiently, saving €200/month in fuel. The gauge pays for itself in 2 weeks — and keeps saving forever.",firstPrinciples:"Energy is the largest DC operating cost (typically 40–60% of opex). Monitoring reveals how energy is consumed. Optimisation reduces consumption. The financial return = energy saved × price per kWh. At Clonshaugh, a 0.30 PUE improvement on a 2,400 kW IT load saves approximately 10.5 GWh over 10 years = approximately €757,000/year (screening-level calculation: T1/T2 inputs). The €485K capex (Tier 3 — RICS NRM1; component pricing, indicative) is recovered in under 5 months.",theTest:"An investor asks: what is the payback on the monitoring programme? Answer: 4–5 months from Phase 3 completion. The annual saving (approximately €757,000; screening-level calculation: T1/T2 inputs) exceeds the total programme cost (€485K; Tier 3 — RICS NRM1; component pricing, indicative) within the first year. This is one of the highest-ROI investments available in DC retrofit."}}],whatItLooksLike:"A Gantt chart with three colour-coded phases. Monthly milestones and PUE targets. Phase 1 complete (green); Phase 2 in progress (amber); Phase 3 planned (blue).",
siteChecklist:["Confirm executive sponsor and budget approval","Identify Phase 1 quick wins","Verify no IT deployments conflict with timeline","Schedule BMS upgrade around maintenance windows (critical path)"]},
logic:{causeAndEffect:[
{cause:"The monitoring infrastructure upgrade is attempted as a single big-bang project rather than a phased programme with staged value delivery",effect:"18 months with no value delivery until completion. Budget pressure, stakeholders lose patience, project descoped.",insight:"Phasing delivers value incrementally and de-risks. Each phase delivers a return even if the programme stops."},
{cause:"Phase 1 monitoring data reveals that PUE sub-system attribution is materially different from the assumed baseline in the business case",effect:"Original plan: cooling-focused. Actual data: power distribution losses higher than expected. Phase 3 pivots.",insight:"This is why Phase 1 comes first — it provides data to make Phase 2/3 decisions correctly."}
,{cause:"Programme funded from annual opex budget rather than capex, spreading cost over 3 financial years",effect:"Phase 1 proceeds but Phase 2 (BMS upgrade, €80,000–120,000; Tier 3 — Honeywell/Siemens/Johnson Controls published pricing, indicative) stalls at year-end budget review. The sensor data from Phase 1 accumulates but cannot drive optimisation without the Phase 2 BMS integration. The investment in Phase 1 sits idle.",insight:"The monitoring programme ROI (4–5 months payback) is compelling — but only if all three phases execute. Partial implementation delivers data without action. The most effective funding approach is a single capex approval for the full programme, with staged drawdown. This avoids annual budget competition and ensures Phase 2 is not sacrificed to fund something else. Present the full programme business case with cumulative NPV, not phase-by-phase costs."}],constraintLesson:"Phases must execute in order: Phase 2 (DCIM) needs Phase 1 (sensors feeding data). Phase 3 (closed-loop) needs Phase 2 (BMS-DCIM integration). Alarm rationalisation before closed-loop.\n\nCritical path: BMS controller upgrade (Phase 2, months 4–8). Procurement 2–4 weeks, manufacturing 4–8 weeks, commissioning 2–4 weeks.\n\nTotal programme: €385,000–485,000 (Tier 3 — RICS NRM1; Nlyte/Vertiv/Schneider/Honeywell/Siemens published pricing, aggregated, indicative). Annual saving: ~€757,000 (screening-level calculation: T1/T2 inputs). Payback: ~7 months from Phase 3 completion.",
weakestLink:{whatsWrong:"We cannot afford a €500,000 monitoring upgrade (Tier 3 — RICS NRM1; aggregated component pricing, indicative).",whatsRight:"You cannot afford not to. The facility spends ~€757,000/year (screening-level calculation: T1/T2 inputs) more than it needs to. Every month of delay costs ~€63,000.",howToGetThere:"Phase 1 (€145,000–185,000; Tier 3 — RICS NRM1; component pricing, indicative) can start immediately. It delivers Cat 2 PUE data needed for EED regardless. Phase 2/3 approved on Phase 1 findings."}},
rhetoric:{declan:{hook:"Eight years running this facility with a clipboard and a 2013 BMS. The monitoring programme is not a technology upgrade — it is the management system the facility should have had from day one.",text:"Declan here. I have been running this facility 8 years with a clipboard and a 2013 BMS. The monitoring roadmap gives me a path from where I am to where I need to be — in phases that do not disrupt operations. Phase 1 (sensors) is the easy win: I get rack-level visibility within 4 months. Phase 2 (BMS upgrade and DCIM) is the critical path: the controller replacement must happen one zone at a time to maintain cooling control throughout. Phase 3 (closed-loop) is where the savings multiply. The phased approach works because each phase delivers value on its own while enabling the next."},
ann:{hook:"385 to 485 thousand euros total investment delivering 150 to 200 thousand euros per year in energy saving plus full EED compliance. The payback case requires no assumptions — just metered data.",text:"Ann speaking. €385,000–485,000 investment (Tier 3 — RICS NRM1; aggregated component pricing, indicative) for €757,000/year savings (screening-level calculation: T1/T2 inputs). Sub-12-month payback from Phase 3 completion. 5-year NPV at 8% discount rate: approximately €4.6M. This is the business case I present to the investment committee. The monitoring programme is not a maintenance expense — it is a value creation programme that transforms a manually operated asset into an intelligently managed one. The valuation uplift from demonstrated PUE improvement and EED compliance further enhances the return at exit. Every month of delay is approximately €63,000–105,000 in foregone savings."},
mark:{hook:"Follow EN 50600-3-1 Annex A monitoring maturity framework. Phase 1 establishes the data layer. Phase 2 enables compliance reporting. Phase 3 closes the loop and delivers the energy saving.",text:"Mark here. Follow EN 50600-3-1 Annex A monitoring maturity framework. Phase 1 establishes Class 2+ data quality. Phase 2 achieves Class 3 (automated analysis and alerting). Phase 3 approaches Class 4 (predictive and autonomous). The critical dependency is the BMS controller upgrade in Phase 2 — procurement lead time is 4–8 weeks, manufacturing 4–8 weeks, staged commissioning 4–6 weeks. Start procurement in month 3 to align with Phase 2 start at month 4. Do not shortcut the 3–6 month monitoring-only period before enabling closed-loop — trust must be earned through demonstrated sensor reliability."},
sarah:{hook:"The monitoring roadmap underpins the entire ESG trajectory for the asset. Without it, neither the Taxonomy alignment nor the SBTi pathway is supportable with verifiable evidence.",text:"Sarah here. The monitoring roadmap underpins the entire ESG trajectory. Without Phase 1 data, the carbon baseline is unreliable. Without Phase 2 integration, the EED report is manual. Without Phase 3 optimisation, the PUE improvement that drives CRREM realignment and SBTi progress does not happen. Every ESG commitment the facility makes — from SFDR fund reporting to EU Taxonomy alignment to SBTi target validation — depends on the monitoring infrastructure this roadmap delivers. The monitoring programme is not IT infrastructure; it is ESG infrastructure."},
tom:{hook:"Programme total: sensors 200 thousand, DCIM platform 125 thousand, BMS upgrade 75 thousand, closed-loop integration 25 thousand. Total 425 thousand. Payback from energy saving alone: approximately 24 months.",text:"Tom here. Programme total (all figures Tier 3 — RICS NRM1; Nlyte/Vertiv/Schneider/Honeywell/Siemens published pricing, aggregated, indicative): Phase 1 €165,000 (sensors + basic metering) + Phase 2 €230,000 (BMS upgrade + DCIM + integration) + Phase 3 €37,500 (closed-loop + predictive). Grand total: €432,500 midpoint (screening-level estimate). Annual energy saving at target PUE 1.20: €757,000. Additional value: capacity unlocked, EED compliance, insurance benefit, asset valuation uplift. I recommend presenting this as a single capex programme with staged drawdown — not three separate budget requests. Splitting the budget risks Phase 2 being deferred at year-end, which strands the Phase 1 investment."}},
scenario:{title:"The Clonshaugh Monitoring Business Case",narrative:"Asset manager wants a one-page business case. Board needs: total investment, annual saving, payback, key risks.",question:"Prepare the one-page summary.",answer:"This is the board-ready summary. The monitoring programme has three phases, each delivering standalone value. The business case rests on one number: the gap between current PUE (1.50) and achievable PUE (1.30), multiplied by 8,760 hours and €0.12/kWh. Everything else — compliance, risk reduction, capacity planning — is upside.\n\nThe following calculation uses indicative figures for illustration. Input assumptions: IT load 2,400 kW (T1 — Clonshaugh canonical); PUE improvement 1.50→1.30 (T1 — facility data); electricity price €0.12/kWh (T2 — CRU Q4 2024); programme costs (T3 — RICS NRM1; Nlyte/Vertiv/Schneider/Honeywell/Siemens published pricing, aggregated). All outputs are screening-level estimates subject to detailed design and tender.\n\nINVESTMENT\nPhase 1 (Months 1–4): €165,000\nPhase 2 (Months 4–10): €230,000\nPhase 3 (Months 10–18): €37,500\nTotal: €432,500 (range €385,000–485,000)\n\nANNUAL SAVING\nEnergy saving PUE 1.50 to 1.30: 2,400 kW × 0.20 × 8,760 × €0.12 = €505,000/year\nEED compliance avoidance: €10,000–15,000/year (Tier 2 — EED Art. 12 penalty precedent, indicative)\n\nPAYBACK\nFrom Phase 3 completion: 4.1 months\nFrom programme start: ~22 months\n\nRISKS\n1. BMS lead time (3–4 month procurement)\n2. IT deployment conflicts in Phase 2\n3. Phase 1 data may show lower potential — mitigated by phasing\n\nBOTTOM LINE\nThe programme pays for itself within one year of Phase 3 completion. The phased approach means the board is never committed beyond the next phase — Phase 1 data proves the case for Phase 2, and Phase 2 data proves the case for Phase 3. If Phase 1 shows lower potential than expected, the programme stops with €165,000 spent and auditable data gained. That is not a failed investment — it is a completed feasibility study.",
whoShouldCare:["tom","ann","mark"]},
sourceNote:"EN 50600-3-1 (T1); EN 50600-4-2 (T1); AIMEP DC Standards Ref v1.2 (T2); CIBSE Guide H (T2)",
retrofitRelevance:"This roadmap is the template for every legacy DC monitoring upgrade with PUE above 1.30.",
  cascadeCheck:(kw,racks,pue)=>{const phases=4;const totalMonths=18;const sensorCost=racks*150;const dcimCost=racks*500;const integrationCost=100000;const totalCapex=sensorCost+dcimCost+integrationCost;return{needed:phases+" phases",available:totalMonths+" months",unit:"monitoring programme",pass:pue<=1.30,detail:`${phases}-phase programme over ${totalMonths} months. Est. capex: €${(totalCapex/1000).toFixed(0)}k (sensors+DCIM+integration). Target: PUE ${pue}→1.25`}},

const ASSESSMENT_QUESTIONS=[
{level:1,id:"Q009-01",icon:"🏗️",stage:"grammar",q:"What is the primary difference between a BMS and a DCIM?",options:["BMS manages building services; DCIM manages IT infrastructure","BMS is for older buildings; DCIM is specifically designed for new-build data centres","BMS is hardware infrastructure; DCIM is a software-only monitoring platform","BMS monitors power distribution; DCIM monitors cooling capacity only"],correct:0,explain:"BMS controls building services (HVAC, fire, lighting). DCIM monitors IT infrastructure (power chains, rack capacity, thermal). Without DCIM, the BMS runs cooling blind — fixed setpoints with no visibility of actual rack-level heat loads."},
{level:1,id:"Q009-02",icon:"🏗️",stage:"logic",q:"Why does having a BMS without DCIM lead to suboptimal cooling?",options:["The BMS cannot control chiller staging or cooling tower fan speed without DCIM providing the setpoint reference signal.","The BMS lacks visibility of rack-level IT heat loads","The BMS uses outdated communication protocols that prevent it from receiving real-time data from modern cooling plant controllers.","The BMS cannot measure ambient temperature at multiple heights within the cold aisle for accurate ASHRAE compliance monitoring."],correct:1,explain:"Without DCIM, the BMS uses room-level sensors and fixed setpoints designed for worst-case load. It has no visibility of rack-level IT heat. Overcooling wastes energy; undercooling risks hot spots that crash servers. DCIM closes this visibility gap."},
{level:1,id:"Q009-03",icon:"🏗️",stage:"rhetoric",q:"From Sarah's perspective, why is the BMS/DCIM gap an immediate compliance risk?",options:["It prevents accurate fire detection zone mapping and therefore invalidates the facility's fire safety certification and annual fire officer inspection.","It makes energy procurement impossible because suppliers require DCIM-verified consumption data before issuing commercial electricity contracts.","It prevents production of auditable EED Article 12 KPIs","It violates ASHRAE TC 9.9 thermal guidelines, exposing the operator to liability for IT equipment damage from thermal events."],correct:2,explain:"EED Article 12 requires annual PUE, WUE, CUE, and REF reporting for DCs above 500 kW IT. Without DCIM and sub-metering, Clonshaugh cannot produce auditable data. Sarah flags this as an immediate compliance gap for the board."},
{level:2,id:"Q009-04",icon:"🌡️",stage:"grammar",q:"Where should server inlet temperature sensors be placed for ASHRAE compliance?",options:["At the room centre, at breathing height, as required by EN 50600-2-3 environmental monitoring standards","At the CRAH return air intake to capture the highest temperature in the cooling circuit","At the rear of the rack (hot aisle) at the top position only","At the front of the rack (cold aisle) at three heights"],correct:3,explain:"ASHRAE TC 9.9 specifies measurement at the server inlet — front of rack, cold aisle side, at three heights (bottom, middle, top). Three heights detect vertical thermal stratification that a single room sensor cannot see."},
{level:2,id:"Q009-05",icon:"🌡️",stage:"logic",q:"Why is a single room-level sensor inadequate for detecting hot spots?",options:["Room-level sensors are inherently less accurate than rack-mounted sensors because they are further from the heat source.","Room-level sensors cannot measure relative humidity, which is the primary indicator of cooling performance degradation.","Room sensors measure the average, masking localised hot spots","Room-level sensors are always mounted above 2m, creating a systematic measurement error relative to server inlet height."],correct:2,explain:"A room averaging 23°C can have rack inlets ranging from 18°C to 33°C. Hot spots are invisible to the room average. Only rack-level sensors at three heights (ASHRAE TC 9.9) detect localised thermal risks before servers throttle or shut down."},
{level:2,id:"Q009-06",icon:"🌡️",stage:"rhetoric",q:"Tom estimates 1,200 sensors at €75 each. What is the approximate hardware cost?",options:["€90,000","€60,000","€120,000","€150,000"],correct:0,explain:"1,200 sensors × €75 = €90,000 hardware. Add installation labour, cabling, and BMS integration for total Phase 1 cost of ~€130,000–160,000. Tom notes this is the foundation — without accurate sensors, DCIM and closed-loop control cannot function."},
{level:3,id:"Q009-07",icon:"🔌",stage:"grammar",q:"Which protocol is the ISO standard for building automation and control?",options:["SNMP","BACnet (ISO 16484-5)","Modbus RTU","MQTT"],correct:1,explain:"BACnet is defined by ISO 16484-5 and ASHRAE Standard 135 — the international standard for building automation. Open protocol means no vendor lock-in and no gateway licensing fees. Mark should verify BACnet/IP support before any BMS controller procurement."},
{level:3,id:"Q009-08",icon:"🔌",stage:"logic",q:"Why does a proprietary BMS protocol increase integration cost?",options:["Proprietary protocols always operate at lower polling speeds, requiring additional hardware buffers to pass data to DCIM at an acceptable rate.","Proprietary protocols consume more network bandwidth than open protocols, requiring dedicated network segmentation for BMS traffic.","Proprietary protocols cannot transmit temperature and humidity data in a format that DCIM platforms can parse without pre-processing.","Integration requires vendor-specific gateways and limits data access"],correct:3,explain:"Proprietary protocols require vendor-specific licensed gateways (€5,000–15,000 each) or full controller upgrades (€50,000–150,000). Either path adds cost and creates ongoing vendor dependency. BACnet/IP eliminates both problems at the protocol level."},
{level:3,id:"Q009-09",icon:"🔌",stage:"rhetoric",q:"What is Clonshaugh's estimated cost for a full BMS controller upgrade to BACnet/IP?",options:["€120,000","€50,000–80,000","€15,000–25,000","€250,000"],correct:0,explain:"Full BMS upgrade: 12 controllers, 3,500 I/O points, API gateway = ~€120,000. This also extends BMS operational life by 10–15 years and eliminates legacy protocol gateways. Tom’s TCO model should offset the upgrade cost against avoided gateway renewals."},
{level:4,id:"Q009-10",icon:"📊",stage:"grammar",q:"How many PUE measurement categories does EN 50600-4-2 define?",options:["2 (basic and advanced)","4 (quarterly through real-time)","3 (Category 1, 2, and 3)","5 (manual through fully automated)"],correct:2,explain:"EN 50600-4-2 defines three categories: Cat 1 (basic — utility bills and UPS output), Cat 2 (intermediate — sub-system metering), Cat 3 (advanced — granular, continuous, real-time). EED Article 12 effectively requires Category 2 minimum for auditable reporting."},
{level:4,id:"Q009-11",icon:"📊",stage:"logic",q:"If total facility power is 3,600 kW and IT load is 2,400 kW, what is the PUE?",options:["1.30","1.50","1.67","1.80"],correct:1,explain:"PUE = total facility power ÷ IT power = 3,600 ÷ 2,400 = 1.50. The 0.50 overhead (1,200 kW) splits across cooling (largest), power distribution losses, and lighting/other. Reducing the cooling component from 0.48 to 0.10 drives PUE toward the 1.20 target."},
{level:4,id:"Q009-12",icon:"📊",stage:"rhetoric",q:"What annual saving does reducing cooling PUE contribution from 0.480 to 0.10 deliver?",options:["~€568,000","~€959,000","~€750,000","~€1,200,000"],correct:1,explain:"Saving = (0.480 – 0.10) × 2,400 kW = 912 kW continuous reduction. Annual: 912 × 8,760 hrs × €0.12/kWh = ~€959,000/year. This is the single largest operational saving available at Clonshaugh — cooling optimisation dominates every other efficiency measure."},
{level:5,id:"Q009-13",icon:"💻",stage:"grammar",q:"What is the typical DCIM adoption rate 12 months after deployment?",options:["70–80%","30–50%","50–60%","10–20%"],correct:1,explain:"Uptime Institute (2023): 47% report adoption below expectations. Typical active feature usage: 30–50%. Barriers: data accuracy, training, integration."},
{level:5,id:"Q009-14",icon:"💻",stage:"logic",q:"Why do most DCIM deployments suffer from poor adoption?",options:["DCIM software licensing costs are prohibitive for most operators, leading to restricted licence counts that exclude the majority of potential users.","Vendors do not provide adequate on-site implementation support in the Irish market, leaving operators without trained users after deployment.","DCIM cannot integrate with the BMS protocols used by most legacy data centres, leaving the asset register incomplete and therefore unreliable.","No data owner appointed and asset register becomes stale"],correct:3,explain:"The root cause is organisational, not technical: no named data owner, no mandate to use DCIM for capacity decisions. Without a MACD process keeping the asset register current, data becomes stale within weeks and operators revert to spreadsheets."},
{level:5,id:"Q009-15",icon:"💻",stage:"rhetoric",q:"Tom estimates 5-year DCIM cost at ~€320,000. What is the primary justification?",options:["PUE improvement worth ~€757,000/year","Reduced engineering headcount through automated capacity management, saving approximately two full-time equivalent roles per year.","Avoiding vendor lock-in on BMS hardware by standardising on an open DCIM platform that supports multi-vendor integration.","Reduced property insurance premiums through improved asset tracking and real-time environmental monitoring documentation."],correct:0,explain:"DCIM enables PUE 1.50→1.20, saving ~€757,000/year in cooling energy. Against Tom’s 5-year DCIM cost of ~€320,000, the payback is under 6 months. The €320,000 is a rounding error on the annual energy benefit — this is not a discretionary investment."},
{level:6,id:"Q009-16",icon:"🚨",stage:"grammar",q:"What is the ISA-18.2 target for maximum alarms per operator per hour?",options:["Fewer than 2","Fewer than 12","Fewer than 6","Fewer than 20"],correct:2,explain:"ISA-18.2 targets fewer than 6 alarms per operator per hour in steady state. Above this threshold, alarm fatigue sets in — operators start ignoring alerts. In a DC, a missed critical alarm can cascade to IT outage within minutes."},
{level:6,id:"Q009-17",icon:"🚨",stage:"logic",q:"Why does a single chiller trip at Clonshaugh generate 25+ alarms?",options:["The chiller controller generates 25 individual fault codes for different sub-system failures that all trigger simultaneously on a high-pressure trip.","The BMS has a known software defect in the alarm escalation logic that generates duplicate alarm events for every cooling system fault.","Each consequential effect triggers its own alarm","The cooling system has 25 redundant temperature sensors, each of which raises an individual alarm when it detects rising temperatures."],correct:2,explain:"One chiller trip feeds 8 dependent CRAHs. Each CRAH generates 3 consequential alarms (high supply temp, low airflow, high return temp). Total: 1 root cause + 24 consequential = 25 alarms. Alarm rationalisation suppresses the 24 and highlights the 1."},
{level:6,id:"Q009-18",icon:"🚨",stage:"rhetoric",q:"What is the estimated cost of alarm rationalisation at Clonshaugh?",options:["€5,000–10,000","€100,000+","€50,000–75,000","€15,000–25,000"],correct:3,explain:"Alarm rationalisation is an engineering consultancy exercise: review every alarm point, classify priority (ISA-18.2), eliminate nuisance alarms, configure cascade suppression. Cost: €15,000–25,000 one-off. The saving is measured in avoided alarm fatigue and faster incident response."},
{level:7,id:"Q009-19",icon:"📋",stage:"grammar",q:"What is the IT load threshold for EED Article 12 reporting?",options:["100 kW","5,000 kW","1,000 kW","500 kW"],correct:3,explain:"EED Article 12 applies to DCs with IT installed power above 500 kW. Clonshaugh at 2,400 kW is well above the threshold. Reporting obligations include annual PUE, WUE, CUE, and REF — all requiring the metering infrastructure that DCIM provides."},
{level:7,id:"Q009-20",icon:"📋",stage:"logic",q:"Clonshaugh's CUE at PUE 1.50 using SEAI 0.2241 kgCO₂/kWh is approximately:",options:["0.403 kgCO₂/kWh IT","0.336 kgCO₂/kWh IT","0.224 kgCO₂/kWh IT","0.450 kgCO₂/kWh IT"],correct:1,explain:"CUE = PUE × grid emission factor = 1.50 × 0.2241 (SEAI 2026) = 0.336 kgCO₂/kWh IT. Reducing PUE to 1.20 drops CUE to 0.269 — a 20% carbon intensity improvement. Sarah needs this metric for EU Taxonomy and CRREM reporting."},
{level:7,id:"Q009-21",icon:"📋",stage:"rhetoric",q:"From Ann's perspective, why is EED compliance a due diligence item?",options:["Non-compliance flags operational immaturity in technical advisory assessments","Non-compliance directly determines the applicable electricity tariff band under CRU's commercial metering framework.","EED Article 12 compliance is a mandatory condition of planning permission for all Irish data centres above 100 kW IT load.","Confirmed EED compliance is a mandatory input to the RICS Red Book valuation methodology for data centre assets."],correct:0,explain:"Technical advisors in DC acquisitions check EED compliance capability. Non-compliance flags operational immaturity — reducing buyer confidence and asset valuation. For Ann, investing in monitoring infrastructure is a value-preservation measure, not just an operational one."},
{level:8,id:"Q009-22",icon:"🔄",stage:"grammar",q:"Raising CRAH supply from 12°C to 18°C (3°C approach) increases Dublin free cooling hours from approximately:",options:["5,000 to 6,000","6,500 to 7,500","7,600 to 8,500","8,000 to 8,760"],correct:2,explain:"At 12°C CRAH supply (3°C approach): threshold ~19°C ambient, ~7,600 free cooling hours. At 18°C supply: threshold ~25°C, ~8,500 hours. The 900 additional chiller-free hours save significant compressor energy — but require accurate sensors to operate safely."},
{level:8,id:"Q009-23",icon:"🔄",stage:"logic",q:"Why must closed-loop control be preceded by 3–6 months monitoring-only?",options:["Irish regulatory requirements under the EED mandate a monitoring baseline period before any BMS-driven setpoint changes can be implemented.","Trust in sensor accuracy and control logic must be established","The BMS controller requires a 3–6 month warm-up period after firmware upgrade before closed-loop PID algorithms can be activated safely.","Energy savings cannot be measured without a baseline period — without a pre-intervention benchmark, the ROI calculation has no reference point."],correct:1,explain:"Automated setpoint changes in a mission-critical facility demand proven sensor accuracy and validated control logic. The 3–6 month monitoring-only period builds confidence that the data is trustworthy before allowing closed-loop control to adjust CRAH setpoints."},
{level:8,id:"Q009-24",icon:"🔄",stage:"rhetoric",q:"What annual saving does closed-loop cooling optimisation deliver at Clonshaugh?",options:["€30,000–50,000","€500,000–630,000","€300,000–400,000","€100,000–160,000"],correct:3,explain:"Closed-loop optimisation typically saves 30–40% of cooling energy. At Clonshaugh (~780 kW cooling load): €100,000–160,000/year. This is the Phase 3 payoff — it requires accurate sensors (Phase 1) and DCIM (Phase 2) to deliver safely."},
{level:9,id:"Q009-25",icon:"🗺️",stage:"grammar",q:"What is the total programme budget for Clonshaugh's monitoring upgrade?",options:["€150,000–200,000","€250,000–300,000","€600,000–750,000","€385,000–485,000"],correct:3,explain:"Phase 1: €145,000–185,000. Phase 2: €210,000–255,000. Phase 3: €30,000–45,000. Total: €385,000–485,000 (midpoint €432,500)."},
{level:9,id:"Q009-26",icon:"🗺️",stage:"logic",q:"Why should the monitoring programme be phased?",options:["Each phase delivers value before the next, and Phase 1 data validates the Phase 2/3 business case","Phasing reduces the total programme cost by allowing procurement of later phases at lower market rates as competition increases.","Irish regulatory requirements mandate phased implementation of EED monitoring upgrades, with each phase requiring a separate compliance submission.","Vendors only offer phased implementation contracts for projects above €250,000 in total scope due to resource planning constraints."],correct:0,explain:"Phasing delivers value incrementally and de-risks each stage. Phase 1 sensor data proves (or disproves) the PUE improvement potential before Phase 2 DCIM capital is committed. Ann only releases €210k+ for Phase 2 after Phase 1 demonstrates measurable gains."},
{level:9,id:"Q009-27",icon:"🗺️",stage:"rhetoric",q:"What is the simple payback period from Phase 3 completion?",options:["2–3 months","6–8 months","10–12 months","14–16 months"],correct:1,explain:"Programme total ~€432,500 (midpoint). Annual saving from PUE 1.50→1.20: ~€757,000/year. Payback: €432,500 ÷ €757,000 ≈ 6.9 months. Tom confirms this is within Ann’s sub-12-month payback threshold for infrastructure investment."}

const GLOSSARY_009 = [
{term:"BMS (Building Management System)",def:"Centralised control system that monitors and manages a building's mechanical, electrical, and environmental systems including HVAC, lighting, fire, and security."},
{term:"DCIM (Data Centre Infrastructure Management)",def:"Software platform that bridges IT and facilities management, providing real-time monitoring, capacity planning, and asset management for data centre infrastructure."},
{term:"SNMP (Simple Network Management Protocol)",def:"Standard internet protocol for collecting and organising information about managed devices on IP networks, widely used for IT equipment monitoring in data centres."},
{term:"BACnet (Building Automation and Control Networks)",def:"Communication protocol for building automation and control networks, defined by ASHRAE and standardised as ISO 16484-5. Primary protocol for BMS integration."},
{term:"Modbus",def:"Serial communication protocol developed by Modicon in 1979. Commonly used for connecting electronic devices in industrial and building automation applications."},
{term:"OPC UA (Open Platform Communications Unified Architecture)",def:"Machine-to-machine communication protocol for industrial automation, providing secure, reliable, manufacturer-independent data exchange."},
{term:"PUE (Power Usage Effectiveness)",def:"Ratio of total facility power to IT equipment power. PUE 1.0 means all power goes to IT; PUE 2.0 means half goes to overhead. EN 50600-4-2 defines three measurement categories."},
{term:"CUE (Carbon Usage Effectiveness)",def:"Ratio of total CO₂ emissions from facility energy consumption to IT equipment energy consumption. Derived from PUE and grid emission factor."},
{term:"WUE (Water Usage Effectiveness)",def:"Metric measuring total annual water usage divided by IT equipment energy consumption. Reported under EED Article 12."},
{term:"REF (Renewable Energy Factor)",def:"Ratio of renewable energy consumed by the facility to total energy consumed. CRU target: 80% by 2030."},
{term:"EN 50600-4-2",def:"European standard defining PUE measurement methodology in three categories: Category 1 (basic, from utility bills), Category 2 (intermediate, sub-metered), Category 3 (advanced, continuous real-time)."},
{term:"EN 50600-3-1",def:"European standard for data centre operational management including asset management, capacity management, and environmental monitoring requirements."},
{term:"ISA-18.2",def:"International standard for alarm management in process industries. Defines alarm rationalisation methodology, targeting fewer than 6 alarms per operator per hour."},
{term:"IEC 62682",def:"International standard for management of alarm systems for the process industries, complementing ISA-18.2 with lifecycle management requirements."},
{term:"EEMUA 191",def:"Engineering Equipment and Materials Users Association guide for alarm systems, widely referenced for alarm management best practice in data centres."},
{term:"EED Article 12",def:"EU Energy Efficiency Directive requirement for data centres above 500 kW IT load to report annual PUE, WUE, CUE, and REF metrics to the European Commission."},
{term:"IEC 62443",def:"International standard series for industrial automation and control system cybersecurity, increasingly applied to BMS and DCIM network security."},
{term:"Asset Register",def:"Database of all physical IT and facilities assets including location, power draw, connectivity, and lifecycle status. Foundation of DCIM accuracy. Target: ≥95% accuracy."},
{term:"MACD (Move, Add, Change, Dispose)",def:"Formal workflow governing any physical change to DC infrastructure, ensuring the DCIM asset register stays synchronised with physical reality."},
{term:"Alarm Rationalisation",def:"Systematic review of every alarm point to classify priority, eliminate nuisance alarms, and achieve ISA-18.2 targets. Reduces alarm flood and prevents alarm fatigue."},
{term:"Alarm Fatigue",def:"Condition where operators become desensitised to alarms due to excessive frequency, leading to delayed or missed responses to critical events."},
{term:"Sensor Drift",def:"Gradual degradation of sensor accuracy over time, typically 0.5-2% per year for temperature sensors. Requires scheduled recalibration to maintain measurement integrity."},
{term:"Sensor Calibration",def:"Process of comparing sensor readings against a known reference standard and adjusting to correct any deviation. EN 50600-3-1 requires documented calibration schedules."},
{term:"Digital Twin",def:"Virtual replica of a physical data centre that mirrors real-time conditions using BMS and DCIM data. Enables simulation of what-if scenarios for capacity and cooling optimisation."},
{term:"CFD (Computational Fluid Dynamics)",def:"Simulation technique modelling airflow, temperature distribution, and cooling performance within a data centre. Used for hot spot identification and containment design."},
{term:"SCADA (Supervisory Control and Data Acquisition)",def:"Control system architecture for high-level process supervisory management, sometimes used as the overarching control layer above BMS in large facilities."},
{term:"Capacity Planning",def:"Process of determining the remaining IT, power, cooling, and space capacity at rack, row, room, and facility level. Requires accurate DCIM asset register data."},
{term:"Trend Analysis",def:"Examination of historical BMS/DCIM data to identify patterns, predict failures, and optimise operations. Requires Category 2+ PUE measurement for meaningful results."},
{term:"Environmental Monitoring",def:"Continuous measurement of temperature, humidity, airflow, and particulate levels within the data centre environment. Critical for maintaining ASHRAE thermal envelope compliance."},
{term:"Hot Spot",def:"Localised area of elevated temperature caused by inadequate airflow, poor containment, or high-density equipment. Detected via environmental monitoring and CFD analysis."},
{term:"Free Cooling Hours",def:"Annual hours where outdoor air temperature permits economiser-based cooling without mechanical chillers. Dublin: approximately 7,200 hours per year below 18°C (Met Éireann 30-year data)."},
{term:"Protocol Gateway",def:"Device that translates between different communication protocols (e.g., BACnet to Modbus, SNMP to BACnet), enabling integration of disparate monitoring systems."},
{term:"REST API",def:"Representational State Transfer Application Programming Interface. Standard web-based interface for integrating DCIM with external systems including energy management, ticketing, and reporting platforms."},
{term:"SFDR (Sustainable Finance Disclosure Regulation)",def:"EU regulation requiring financial market participants to disclose sustainability-related information, including data centre energy efficiency and carbon intensity metrics."},
{term:"EU Taxonomy",def:"EU classification system establishing criteria for environmentally sustainable economic activities. Data centres must achieve PUE ≤1.3 and implement an Energy Management System."},
{term:"CRU (Commission for Regulation of Utilities)",def:"Irish energy regulator responsible for data centre energy efficiency obligations, including renewable energy and reporting requirements under CRU/2025236."},
{term:"ASHRAE TC 9.9",def:"ASHRAE Technical Committee responsible for thermal guidelines for data processing environments. Defines A1-A4 server inlet temperature envelopes."},
{term:"PDU (Power Distribution Unit)",def:"Device distributing electrical power to IT equipment at rack level. Intelligent PDUs provide per-outlet power monitoring integrated with DCIM."},
{term:"CRAH (Computer Room Air Handler)",def:"Precision cooling unit that circulates chilled water through a coil and distributes conditioned air to the data hall. Monitored via BMS for supply/return temperatures and airflow."},
{term:"KPI Dashboard",def:"Visual display of key performance indicators for data centre operations, typically showing real-time PUE, capacity utilisation, alarm status, and environmental conditions."},
{term:"Data Historian",def:"Specialised database optimised for time-series data storage and retrieval. Stores BMS and DCIM sensor data for long-term trend analysis and regulatory reporting."}
];

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )

      // Primary CTA — go to top level

/* ═══ 2. L2 — SENSOR ARCHITECTURE ═══ */
function L2Diagram() {
  return (
    <Walkthrough
      title="L2: Rack sensor placement — why room sensors miss hot spots"
      subtitle="ASHRAE TC 9.9 requires measurement at the server inlet, not the room"
      steps={["Room sensor only","3-height rack sensors","Hot spot revealed"]}
      insight="A room sensor at 1.5m height reads the average. Three rack sensors at top/middle/bottom reveal a 22→33°C gradient caused by blanking plate gaps. The room 'passes' ASHRAE while individual racks fail. This is the case for 1,200 sensors at Clonshaugh — €90,000 that prevents €200,000+ thermal incidents."
      narrative="This cross-section shows a single rack in a hot-aisle/cold-aisle arrangement. In step 1, only a room-level sensor exists — it reads the average temperature and shows 23°C (within ASHRAE limits). In step 2, three wireless sensors are added at the rack inlet at top, middle, and bottom heights. In step 3, the data reveals a dangerous vertical gradient: 22°C at the bottom (good), 26°C middle (acceptable), and 33°C at the top (ASHRAE violation) — caused by hot air recirculation over the top of the rack."
      takeaway="Room-level sensors hide rack-level problems. 3 sensors per rack × 400 racks = 1,200 sensors. At €75 each = €90,000. This catches thermal events that €200,000+ in hardware replacement cannot fix after the fact.">
      {(step) => (
        <svg viewBox="0 0 680 380" style={{maxWidth:680,margin:'0 auto',display:'block'}}>

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){

    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];

        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }

        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc009_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc009_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc009_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>

          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>60s</span>
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}
          </div>
        </div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterStage==='all'?' active':'')} onClick={()=>setFilterStage('all')}>All</button>
        <button className={'filter-btn'+(filterStage==='grammar'?' active':'')} onClick={()=>setFilterStage('grammar')}>Knowledge Check</button>
        <button className={'filter-btn'+(filterStage==='logic'?' active':'')} onClick={()=>setFilterStage('logic')}>Eng. Calculation</button>
        <button className={'filter-btn'+(filterStage==='rhetoric'?' active':'')} onClick={()=>setFilterStage('rhetoric')}>Prof. Judgement</button>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>
        {LEVELS.map(l=>(<button key={l.id} className={'filter-btn'+(filterLevel===l.level?' active':'')} onClick={()=>setFilterLevel(l.level)}>L{l.level}</button>))}
      </div>
      {score.total>0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:600}}>Score: {score.correct}/{score.total} ({Math.round(score.correct/score.total*100)}%)</div>
            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL?'Completed in '+fmtTime(elapsed)+' (under time)':'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{const s=stageScore(st);const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};return s.t>0&&(<div key={st} style={{fontSize:12,color:stageColours[st]}}><strong>{labels[st]}:</strong> {s.c}/{s.t}</div>);})}
          </div>
          {allAnswered&&assessPct>=80&&React.createElement('button',{onClick:function(){setShowCertModal(true);},style:{marginTop:12,padding:'10px 0',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}},assessPct>=90?'Get Achievement Certificate':'Get Completion Certificate')}
          {showCertModal&&React.createElement(CertModal,{score:score.correct,total:score.total,onClose:function(){setShowCertModal(false);}})}
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q);
        const answered=answers[gi]!==undefined;
        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        const countdownCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>

              <span>{q.icon}</span>
              <span className={'badge badge-'+q.stage}>{q.stage}</span>
              <span style={{fontSize:12,color:'var(--text-muted)'}}>Level {q.level}</span>
              {/* B5: per-question countdown top-right */}
              {timerActive&&!answered&&!isTimedOut&&qStarted&&(

                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  return supa.from('certificates').insert([{ user_id: userId, module_id: TOOL_ID, certificate_number: certNumber, cpd_hours: 2, certificate_type: 'Engagement', score: null, learner_name: learnerName, pdf_url: null }]).select().single().then(function(result) {
    if (result.error) { console.error('Engagement cert failed:', result.error.message); return null; }
    return { certNumber: certNumber, type: 'Engagement', hours: 2, pct: null };
  });
}

/* ═══ DC-LEARN STAGE 5 AUTH + SYNC ═════════════════════════════════════════
   Built: 09/04/2026 — Stage 5 Session 2
   Layer 1 (localStorage) never depends on Layer 2 (Supabase).
   If Supabase is blocked, offline, or errors, the module works exactly as
   it did before: IS_FREE_MODULE or localStorage.dc_learn_paid decides access.
   =========================================================================*/

const IS_FREE_MODULE = (TOOL_ID === 'DC-LEARN-000' || TOOL_ID === 'DC-LEARN-001' || TOOL_ID === 'DC-LEARN-002');
const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};

function useAuth() {
  const [state, setState] = React.useState({
    loading: !!supa,
    user: null,
    isAdmin: false,
    hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
  });

  React.useEffect(() => {
    let mounted = true;

    async function resolve(session) {
      if (!mounted) return;
      try {
        if (session && session.user) {
          const user = session.user;
          if (dcAuth.isAdminUser(user)) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: true, hasAccess: true });
            return;
          }
          const licenceOk = await dcAuth.checkLicence(user.id);
          if (licenceOk === true) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: false, hasAccess: true });
          } else {
            // licenceOk === null (error: fall through) or false (no row)
            setState({
              loading: false, user: user, isAdmin: false,
              hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
            });
          }
          return;
        }
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      } catch(e) {
        console.warn('DC-LEARN: auth resolve failed, falling through', (e && e.message) || e);
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    }

    if (!supa) {
      setState({
        loading: false, user: null, isAdmin: false,
        hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
      });
      return () => { mounted = false; };
    }

    (async () => {
      try {
        const { data: { session } } = await supa.auth.getSession();
        await resolve(session);
      } catch(e) {
        console.warn('DC-LEARN: getSession failed, falling through', (e && e.message) || e);
        if (mounted) setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    })();

    let sub = null;
    try {
      const r = supa.auth.onAuthStateChange((_ev, session) => { resolve(session); });
      sub = r && r.data && r.data.subscription;
    } catch(e) {}

    return () => {
      mounted = false;
      try { if (sub) sub.unsubscribe(); } catch(e) {}
    };
  }, []);

  return state;
}

function PlatformSync({ user, progress }) {
  React.useEffect(() => {
    if (!supa || !user || !user.id) return;
    let cancelled = false;
    (async () => {
      try {
        // 1. Flush timing buffer → learner_analytics, then clear on success
        const raw = safeStore.get(DC_TIMING_KEY);
        if (raw) {
          let events = [];
          try { events = JSON.parse(raw); } catch(e) { events = []; }
          if (!cancelled && Array.isArray(events) && events.length) {
            const rows = events.slice(0, 500).map(function(ev) {
              return {
                user_id: user.id,
                module_id: TOOL_ID,
                event_type: (ev && ev.event) || 'unknown',
                event_data: ev || {},
                recorded_at: new Date((ev && ev.ts) || Date.now()).toISOString(),
              };
            });
            const { error } = await supa.from('learner_analytics').insert(rows);
            if (!error) safeStore.remove(DC_TIMING_KEY);
            else console.warn('DC-LEARN: analytics flush failed', error.message);
          }
        }
        // 2. Upsert progress → learner_progress (keeps localStorage as cache)
        if (!cancelled && progress && typeof progress === 'object') {
          const keys = Object.keys(progress);
          const rows = keys.map(function(levelId) {
            const p = progress[levelId] || {};
            return {
              user_id: user.id,
              module_id: TOOL_ID,
              level_id: String(levelId),
              grammar_complete: !!p.grammar,
              logic_complete: !!p.logic,
              rhetoric_complete: !!p.rhetoric,
              updated_at: new Date().toISOString(),
            };
          });
          if (rows.length) {
            const { error } = await supa.from('learner_progress').upsert(rows, {
              onConflict: 'user_id,module_id,level_id',
            });
            if (error) console.warn('DC-LEARN: progress upsert failed', error.message);
          }
        }
      } catch(e) {
        console.warn('DC-LEARN: PlatformSync error', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [user && user.id, JSON.stringify(progress || {})]);
  return null;
}

function BookTab() {
  const [content, setContent] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState(false);

  useEffect(() => {
    if (!CHAPTER_FILE) { setError('no-chapter'); return; }
    setLoading(true);
    fetch(CHAPTER_FILE)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(html => { setContent(html); setLoading(false); })
      .catch(e => { setError('not-available'); setLoading(false); });
  }, []);

  const ctr={maxWidth:720,margin:'0 auto',padding:'24px 0'};
  const hdr={textAlign:'center',marginBottom:32,paddingBottom:24,borderBottom:'1px solid var(--border)'};
  const chLbl={fontSize:11,fontFamily:'var(--font-mono)',color:'var(--green)',letterSpacing:2,textTransform:'uppercase',marginBottom:8};
  const ttl={fontSize:22,fontWeight:700,color:'var(--text-bright)',marginBottom:6,lineHeight:1.3};
  const sub={fontSize:13,color:'var(--text-dim)',fontStyle:'italic'};
  const cBox={background:'var(--panel)',border:'1px solid var(--border)',borderRadius:10,padding:'28px 32px',fontSize:15,lineHeight:1.85,color:'var(--text)',maxHeight:expanded?'none':600,overflow:expanded?'visible':'hidden',position:'relative'};
  const fade={position:'absolute',bottom:0,left:0,right:0,height:120,background:'linear-gradient(transparent, var(--panel))',pointerEvents:'none',display:expanded?'none':'block'};
  const btn={display:'block',margin:'16px auto 0',padding:'10px 28px',background:'transparent',border:'1px solid var(--green)',borderRadius:6,color:'var(--green)',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'var(--font-sans)'};

  if (loading) return (<div style={ctr}><div style={hdr}><div style={chLbl}>The Data Centre Clock</div><div style={ttl}>Loading chapter...</div></div><div style={{textAlign:'center',padding:48,color:'var(--text-dim)'}}><div>Loading...</div></div></div>);

  if (error || !content) return (<div style={ctr}><div style={hdr}><div style={chLbl}>The Data Centre Clock</div><div style={ttl}>{CHAPTER_NUM ? 'Chapter '+CHAPTER_NUM+': '+CHAPTER_TITLE : (CHAPTER_TITLE || 'The Data Centre Clock')}</div>{MODULE_TITLE && <div style={sub}>Companion reading for {MODULE_TITLE}</div>}</div><div style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:10,padding:'48px 32px',textAlign:'center'}}><div style={{fontSize:17,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>Chapter coming soon</div><div style={{fontSize:14,color:'var(--text-dim)',maxWidth:400,margin:'0 auto',lineHeight:1.7}}>This chapter of <em>The Data Centre Clock: Engineering the Irish Retrofit</em> is being finalised. It will appear here automatically when published.</div></div></div>);

  return (<div style={ctr}><div style={hdr}><div style={chLbl}>{CHAPTER_NUM ? 'The Data Centre Clock — Chapter '+CHAPTER_NUM : 'The Data Centre Clock — '+CHAPTER_TITLE}</div><div style={ttl}>{CHAPTER_TITLE}</div><div style={sub}>Companion reading for {MODULE_TITLE}</div></div><div style={cBox}><div dangerouslySetInnerHTML={{__html: content}} />{!expanded && <div style={fade} />}</div>{!expanded && <button style={btn} onClick={() => setExpanded(true)}>Continue reading</button>}{expanded && <button style={{...btn,marginTop:24}} onClick={() => {setExpanded(false);window.scrollTo({top:0,behavior:'smooth'})}}>Collapse chapter</button>}</div>);
}
