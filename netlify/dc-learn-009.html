<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#2563EB;--accent2:#79c0ff;--success:#78a840;--warn:#d97706;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d97706;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.vg-tab-row{display:flex;gap:4px;margin:0 0 16px;flex-wrap:wrap}
.vg-tab-btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-tab-btn:hover{background:var(--panel);color:var(--text)}
.vg-tab-btn.active{background:transparent;color:var(--green);border-color:var(--green);font-weight:600}
</style>

{id:"L1",level:1,name:"BMS vs DCIM — Two Systems, One Facility",icon:"🏗️",component:"Control Layer",available:true,
clockQuote:"The regulation required forty-three data points. The BMS provided seven. The gap wasn't a reporting problem. It was an infrastructure problem — and she was just now realising the difference.",
userNeedStatement:"When I hear BMS and DCIM used interchangeably, help me understand the distinct role of each system so I can evaluate whether my facility has both covered.",
plainEnglish:"A BMS manages the building (HVAC, lighting, fire, access). A DCIM manages the IT infrastructure (power chains, rack capacity, thermal maps). Most legacy DCs have a BMS but no DCIM — and that gap is where efficiency dies.",
grammar:{facts:[
{term:"BMS (Building Management System)",definition:"Centralised platform for monitoring and controlling building services — HVAC, lighting, fire detection, access control, metering.",plain:"The system that runs the building. It controls chillers, AHUs, lighting schedules, and fire alarms. It does not know anything about IT loads or individual racks.",number:"A typical DC BMS manages 2,000–10,000 physical I/O points. Clonshaugh’s 2013-vintage BMS has approximately 3,500 points.",standard:"IS EN ISO 16484; CIBSE Guide H",feynman:{analogy:"Think of it like the thermostat in your house — it controls the heating and cooling, but it has no idea what you are doing in each room or how many people are home.",firstPrinciples:"Every building needs a brain to run its services. That brain is the BMS. It reads sensors, makes decisions, and sends commands to equipment. In a data centre, the BMS controls the building shell but cannot see inside the IT racks.",theTest:"You know you understand BMS when you can answer: If Clonshaugh adds 600 kW of new IT load, will the BMS automatically adjust cooling? Answer: No — the BMS runs on fixed setpoints and does not know the load changed."}},
{term:"DCIM (Data Centre Infrastructure Management)",definition:"Software platform that monitors, measures, manages, and optimises IT and facility infrastructure — power chains, cooling capacity, rack space, and environmental conditions at asset level.",plain:"The system that sees inside the racks. It knows which server is in which rack, how much power it draws, how hot it is, and how much capacity is left.",number:"DCIM typically monitors 50–200 data points per rack. At Clonshaugh’s 400 racks, that is 20,000–80,000 data points — none of which the BMS can see.",standard:"EN 50600-3-1; ISO/IEC 30134 series",feynman:{analogy:"Think of it like a hospital patient monitoring system versus the building heating controls. The heating keeps the corridors warm, but the patient monitors track every heartbeat in every bed. DCIM is the patient monitor for racks.",firstPrinciples:"A data centre has two worlds: the building (controlled by BMS) and the IT equipment (invisible to BMS). DCIM bridges this gap by monitoring what is inside each rack — power draw, temperature, capacity — collecting 50–200 data points per rack.",theTest:"You know you understand DCIM when you can answer: Can you calculate PUE to Category 2 accuracy without DCIM? Answer: Not reliably — Category 2 requires metered sub-system data that only DCIM can collect."}},
{term:"EPMS (Electrical Power Monitoring System)",definition:"Sub-system that meters electrical power at multiple points in the distribution chain — utility incomer, MSB, UPS input/output, PDU, and rack level.",plain:"The metering layer that tells you exactly where every kilowatt goes. Without it, PUE is calculated from utility bills — quarterly at best.",number:"Minimum for EN 50600-4-2 Category 1: utility incomer + IT load at UPS output. Best practice (Category 3): 6+ points per chain. Clonshaugh has Category 1 only.",standard:"EN 50600-4-2 (PUE); IEC 61557-12",feynman:{analogy:"Think of it like sub-metering your home electricity — instead of one bill for the whole house, you see what the kitchen, heating, and lighting each consume.",firstPrinciples:"Electricity enters a DC at one point and splits into many paths. EPMS puts meters at each split point so you see exactly where power goes. Without it, PUE is just total bill divided by estimated IT load.",theTest:"You know you understand EPMS when you can answer: Clonshaugh knows PUE is 1.50 but cannot say whether cooling or distribution is the bigger overhead — what metering category are they at? Answer: Category 1."}}
,{term:"EN 50600-3-1 — Operations Management",definition:"The EN 50600 series clause governing management and operational information for DC facilities, including monitoring scope, data retention, and integration requirements between building and IT systems.",plain:"The standard that says what you must monitor and how. It defines the framework for integrating BMS and DCIM data — not just collecting it, but structuring it so different systems can share information.",number:"EN 50600-3-1:2021 specifies 4 classes of operational information management. Class 1: basic manual logs. Class 2: automated collection, manual analysis. Class 3: automated collection and analysis with alerting. Class 4: real-time automated monitoring with predictive analytics. Clonshaugh currently at Class 2 (BMS automated, no DCIM analysis).",standard:"EN 50600-3-1:2021",feynman:{analogy:"EN 50600-3-1 is the building code for DC monitoring — just as building regulations specify minimum insulation, this standard specifies minimum monitoring. You would not occupy a building without meeting building regs; you should not operate a DC without meeting monitoring standards.",firstPrinciples:"A DC produces thousands of data points per minute. Without a framework for collecting, storing, and interpreting this data, monitoring degrades into noise. EN 50600-3-1 provides the framework: what to measure, how to store it, how long to retain it, and how to integrate across systems.",theTest:"Clonshaugh has a BMS collecting room temperatures and a spreadsheet tracking power bills. Which EN 50600-3-1 class is this? Answer: Class 2 at best — automated collection (BMS) but manual analysis (spreadsheet). No real-time alerting, no predictive capability."}},{term:"OT/IT Convergence",definition:"The merging of Operational Technology (BMS, SCADA, building controls) and Information Technology (DCIM, network monitoring, compute management) into a unified monitoring and control architecture.",plain:"Historically, building controls and IT systems spoke different languages, used different networks, and were managed by different teams. OT/IT convergence means bridging that gap — one view of the whole facility, from chiller to server.",number:"Typical DC has 3,000–10,000 OT points (BMS) and 5,000–50,000 IT points (DCIM/SNMP). Integration via API gateway: €15,000–30,000 (Tier 3 — Nlyte/Vertiv/Schneider published pricing; RICS NRM1, indicative). Unified dashboard development: €20,000–40,000 (Tier 3 — vendor published, indicative). At Clonshaugh: 3,500 BMS points + estimated 8,000 SNMP points = 11,500 total requiring integration.",standard:"EN 50600-3-1:2021; IEC 62443 (OT cybersecurity); NIST SP 800-82",feynman:{analogy:"OT/IT convergence is like merging the cockpit instruments and the cabin management system on an aircraft. The pilot needs both engine data and cabin pressure in one display — not two separate control rooms.",firstPrinciples:"A DC is both a building (mechanical, electrical, fire, security) and an IT facility (servers, network, storage). Optimal operation requires data from both domains: you cannot optimise cooling without knowing IT heat load, and you cannot plan IT capacity without knowing cooling headroom. Convergence eliminates the information gap between these domains.",theTest:"The BMS shows room temperature at 22°C (normal). DCIM shows rack inlet at 35°C (critical). How is this possible? Answer: hot spot from blanking plate gap. Only visible when OT (room) and IT (rack) data are viewed together — convergence reveals what either system alone would miss."}}],whatItLooksLike:"In the control room, the BMS screens show building schematics. A separate DCIM screen (if present) shows rack elevations and thermal heat maps. At Clonshaugh, only the BMS screens exist.",
siteChecklist:["Identify whether facility has BMS only, DCIM only, or both","Check BMS vintage — original install or upgraded?","How is PUE calculated? (Utility bills = Cat 1; real-time = Cat 2/3)","Can ops tell you rack-level power draw right now? (No = no DCIM)"]},
logic:{causeAndEffect:[
{cause:"The facility has a BMS for building services control but no DCIM system for IT infrastructure monitoring",effect:"Building services are controlled but IT infrastructure is invisible. Cooling runs at fixed setpoints regardless of actual IT load.",insight:"The BMS controls what it can see but has no visibility of what generates the heat. Like running a hospital heating system without knowing which wards are occupied."},
{cause:"A DCIM system is installed but has not been integrated with the BMS, leaving the two systems operating in data silos",effect:"Two monitoring silos. Neither system can optimise the other. Cooling response requires manual intervention.",insight:"DCIM and BMS from different vendors, different years, different protocols. The integration gap is where 10–20% of cooling energy hides."}
,{cause:"EN 50600-3-1 audit identifies facility at Class 2 (automated collection, manual analysis) — no predictive capability",effect:"Operational response is always reactive: faults detected after they occur, efficiency opportunities identified only in monthly reviews. Preventable failures (bearing wear, capacitor degradation, refrigerant loss) are not caught until equipment stops working.",insight:"The jump from Class 2 to Class 3 (automated analysis with alerting) is not primarily a technology investment — it is a process change. The technology costs €80,000–120,000 (Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2, indicative; Category 3 metering). But the process change — making DCIM the primary operational tool rather than a reporting tool — is what delivers the value. Technology without process change is expensive wallpaper."}],constraintLesson:"The fundamental constraint is the organisational boundary between IT and facilities. Separate teams, budgets, reporting lines, and tools. The BMS belongs to facilities; DCIM belongs to IT. Neither team has the authority to bridge the gap.\n\nAt Clonshaugh, the facilities team runs the BMS. The IT team manages servers. Neither can answer: ‘How much cooling capacity is available for the next 50 racks?’ — because that requires data from both systems.\n\nThe technology to integrate exists (EN 50600-3-1). The barrier is governance, budget ownership, and willingness to share data.",
weakestLink:{whatsWrong:"We have a BMS — we are monitoring the facility.",whatsRight:"The BMS monitors the building, not the IT infrastructure. Without DCIM, you are controlling cooling based on room-level sensors, not rack-level demand.",howToGetThere:"Step 1: Rack-level power metering (€800–1,500/rack; Tier 3 — Nlyte/Vertiv/Schneider published pricing, indicative). Step 2: Environmental sensors at row level (€50–100/sensor; Tier 3 — Honeywell/Siemens published pricing, indicative). Step 3: DCIM platform (€150/kW IT; Tier 3 — Nlyte/Vertiv/Schneider EcoStruxure published pricing, indicative). Step 4: Integrate DCIM with BMS via API gateway."}},
rhetoric:{declan:{hook:"The BMS tells me chillers are running and supply temps are within range. What it does not tell me is whether any of that cooling is reaching the servers.",text:"Declan here. I know what the BMS tells me — chillers running, supply temps, alarms. What it does not tell me is what is happening at rack level. Last month a contractor deployed 8 new servers without telling me. My cooling was already marginal in that row. The BMS saw nothing wrong because the room average was fine — but three racks hit 32°C at inlet. If I had DCIM, I would have seen the capacity breach before the servers went live. The BMS-DCIM gap is not theoretical — it costs me sleep."},
ann:{hook:"The DCIM gap is a commercial risk I identify in every DC due diligence. A facility without real-time capacity data cannot demonstrate headroom — and cannot sell confidently to new tenants.",text:"Ann speaking. The DCIM gap is a commercial risk I see in every DC due diligence. Without rack-level visibility, the capacity plan is unreliable — and capacity is what tenants buy. A fund acquiring this asset would discount for the monitoring gap because it represents operational risk and capex exposure. I have seen 5–10% valuation adjustments on assets where monitoring maturity is Class 1 or 2. Conversely, a facility with integrated BMS-DCIM at Class 3 commands a premium because it demonstrates operational excellence and EED readiness."},
mark:{hook:"EN 50600-3-1 defines four monitoring maturity levels. Clonshaugh at Level 1 — room-level only — is below the minimum required for EED Article 12 compliance reporting.",text:"Mark here. EN 50600-3-1 defines four monitoring maturity levels. Clonshaugh sits at Class 2 — automated collection via BMS, but analysis is manual spreadsheets. The standard expects Class 3 for facilities of this scale: automated alerting, trend analysis, and capacity forecasting. The gap is not the BMS itself — it performs adequately for building services. The gap is the absence of DCIM to handle IT-side data: rack power, server inlet temperatures, network port utilisation. Two separate monitoring domains must converge into one operational view."},
sarah:{hook:"EED Article 12 requires annual PUE, WUE, CUE, and REF reporting for facilities above 500 kW IT load. Room-level BMS data alone cannot generate those four metrics with defensible precision.",text:"Sarah here. EED Article 12 requires annual PUE, WUE, CUE, and REF reporting for DCs above 500 kW IT. Clonshaugh is at 2,400 kW — well above threshold. Without DCIM, producing auditable KPIs requires manual data extraction from utility bills and BMS logs. This is not just inefficient — it is a compliance risk. Auditors expect timestamped, system-generated data with calibration records, not spreadsheet calculations. The BMS-DCIM integration is the infrastructure that makes EED compliance systematic rather than heroic."},
tom:{hook:"DCIM plus EPMS plus sensors for Clonshaugh: approximately 500 to 600 thousand euros total programme. That is less than 5 percent of the annual electricity bill — and enables recovery of 10 to 20 percent of it.",text:"Tom here. DCIM + EPMS + sensors for Clonshaugh: approximately €500,000–600,000 capex across all three phases (Tier 3 — RICS NRM1; Nlyte/Vertiv/Schneider/Honeywell/Siemens published pricing, aggregated, indicative). But the payback from PUE improvement alone is €757,000/year (screening-level calculation: 2,400 kW × 0.30 ΔPuE × 8,760 hrs × €0.12/kWh; T1/T2 inputs). The monitoring programme is not a cost — it is the highest-ROI investment in the facility. I have seen clients spend €2M on new chillers when €200,000 of monitoring would have revealed that the existing chillers were adequate if properly controlled. Measure first, spend second."}},
scenario:{title:"The Invisible IT Load",narrative:"Clonshaugh reports PUE 1.50 from quarterly bills. Last month, a tenant deployed 40 AI racks at 15 kW each (600 kW) without notifying facilities.",question:"What risks has this created, and what monitoring would have prevented them?",answer:"Risks: 1) Thermal — 600 kW additional heat, undetected without rack sensors. 2) Power — 25% load increase, possible circuit trips. 3) PUE — quarterly figure now stale.\n\nPrevention: Intelligent PDUs (SNMP), row-level sensors, DCIM capacity management, automated PUE calculation (Cat 2+).\n\nCost: €500,000–600,000 (AIMEP DC Standards Ref v1.2: E65 €150/kW IT).",
whoShouldCare:["declan","mark"]},
sourceNote:"EN 50600-3-1:2021 (T1); ISO 16484-1 (T1); IEC 61557-12 (T1); CIBSE Guide H (T2)",
retrofitRelevance:"The BMS/DCIM gap is the most common finding in legacy DC assessments. Closing it is step one — all optimisation depends on measurement.",
  cascadeCheck:(kw,racks,pue)=>{const hasDCIM=false;const hasBMS=true;return{needed:"DCIM+BMS",available:hasBMS&&!hasDCIM?"BMS only":"Both",unit:"monitoring systems",pass:hasDCIM&&hasBMS,detail:`Legacy facility: BMS ${hasBMS?"present":"absent"}, DCIM ${hasDCIM?"present":"absent"}. Gap: DCIM deployment required for optimisation`}},

{id:"L2",level:2,name:"Sensor Architecture — Temperature, Humidity, Airflow",icon:"🌡️",component:"Sensor Layer",available:true,
clockQuote:"The DCIM had been installed with thirty sensors. Twelve went offline in the first year. Nobody renewed the maintenance contract. The monitoring system was half-built, and the half that worked wasn't connected to the half that reported.",
userNeedStatement:"When I need to understand what sensors a DC needs and where they go, help me specify a sensor architecture that matches ASHRAE requirements.",
plainEnglish:"Sensors are the eyes and ears of the monitoring system. The right sensors in the right locations turn invisible thermal problems into visible, fixable data.",
grammar:{facts:[
{term:"Server Inlet Temperature Sensor",definition:"Temperature sensor at the front of a server rack, measuring air entering the IT equipment.",plain:"The most important sensor in the DC. It measures what the servers actually breathe — the air temperature at the front of the rack, not the room average. Three per rack (top, middle, bottom) reveals the vertical stratification that a single room sensor completely misses.",number:"ASHRAE TC 9.9 recommended inlet: 18–27°C (A1/A2). Best practice: 3 sensors per rack (top/mid/bottom). Clonshaugh: 400 racks × 3 = 1,200 needed.",standard:"ASHRAE TC 9.9, 5th Ed 2021; EN 50600-2-3",feynman:{analogy:"Think of it like taking a patient's temperature — you measure at the patient, not in the corridor. Server inlet sensors measure at the server, not the room.",firstPrinciples:"Servers draw in cold air from the front and blow hot air out the back. The temperature that matters is what enters the server. ASHRAE says 18–27°C. One room sensor measures an average; three rack sensors show whether any server is overheating.",theTest:"You know you understand inlet sensors when you can answer: A room sensor reads 23°C. Is every rack within ASHRAE limits? Answer: Not necessarily — a rack far from cooling could have 33°C at the top due to hot air recirculation."}},
{term:"Differential Pressure Sensor",definition:"Measures pressure difference between cold and hot aisles, indicating airflow adequacy.",plain:"Tells you whether enough cold air reaches the racks. If pressure drops below target, hot air is recirculating from the hot aisle back into the cold aisle — meaning containment has failed somewhere. DP sensors on containment walls are the early warning system.",number:"Target: 5–15 Pa positive in cold aisle. Below 3 Pa = insufficient airflow risk. One DP sensor per contained aisle.",standard:"ASHRAE TC 9.9; CIBSE Guide B2 Section 3.7",feynman:{analogy:"Think of it like water pressure in a hose — if the pressure drops, water barely trickles out. If cold aisle pressure drops below 3 Pa, cold air barely reaches the racks.",firstPrinciples:"Cold air is pushed into the cold aisle under positive pressure. If containment has gaps, pressure drops and hot air recirculates, creating hot spots that room sensors cannot detect.",theTest:"You know you understand DP sensors when you can answer: Cold aisle DP reads 2 Pa. What is the most likely cause? Answer: A containment breach — missing blanking panels or unsealed cable penetrations."}},
{term:"Humidity Sensor (RH)",definition:"Relative humidity sensor measuring moisture content at the server inlet.",plain:"Too dry = electrostatic discharge risk. Too wet = condensation. Both are silent killers. ASHRAE recommends 20–80% RH — most operators target 40–60% for safety margin. One sensor per 10–20 racks minimum to catch localised humidity variations.",number:"ASHRAE: 20–80% RH non-condensing, 12°C max dew point. Target: 40–60% RH. One sensor per 10–20 racks minimum.",standard:"ASHRAE TC 9.9; ISO 7726",feynman:{analogy:"Think of it like humidity in your home — too dry in winter and you get static shocks; too damp and you get condensation on windows. Servers have the same problem, except damage is permanent.",firstPrinciples:"Air carries moisture. Relative humidity (RH) is moisture relative to capacity at that temperature. ASHRAE recommends 20–80% RH. Below 20%, electrostatic discharge risk rises. Above 80% or above dew point, condensation forms on cold components.",theTest:"You know you understand humidity monitoring when you can answer: A data hall reads 15% RH — is this within ASHRAE limits? Answer: No — below the 20% minimum. ESD risk is elevated."}}
,{term:"ASHRAE TC 9.9 Thermal Envelope",definition:"The allowable range of temperature and humidity at server inlets defined by ASHRAE Technical Committee 9.9: A1 class allows 18–27°C dry bulb and 8–80% RH (non-condensing).",plain:"ASHRAE sets the safe operating window for servers. The recommended range is 18–27°C at the server inlet. Below 18°C wastes cooling energy. Above 27°C risks thermal throttling. The sensor architecture must verify every rack stays within this envelope.",number:"ASHRAE A1 recommended: 18–27°C, 8–80% RH. A1 allowable: 15–32°C. A2 allowable: 10–35°C. Most enterprise servers are A1 rated. Raising setpoint from 20°C to 24°C saves approximately 4–5% cooling energy per degree (Tier 2 — ASHRAE literature). At Clonshaugh: 4°C raise × 4.5% × €380,000 cooling cost = approximately €68,000/year saving.",standard:"ASHRAE TC 9.9 Thermal Guidelines 2021; A1/A2/A3/A4 classification",feynman:{analogy:"The thermal envelope is like a comfort zone for servers. Just as humans work best at 20–24°C, servers work best at 18–27°C. Too cold wastes energy on unnecessary cooling. Too hot causes thermal throttling — the server slows itself down to avoid damage.",firstPrinciples:"Semiconductor junctions fail above approximately 105°C. Server fans and heatsinks keep junctions 40–60°C above inlet air temperature. An inlet at 27°C means junctions at 67–87°C — safe margin. An inlet at 35°C pushes junctions to 75–95°C — approaching limits. The sensor architecture exists to prove every rack stays within the safe zone.",theTest:"Clonshaugh raises CRAH supply from 12°C to 18°C. Server inlet at the warmest rack reads 26°C. Is this within ASHRAE A1? Answer: Yes — 26°C is within the 18–27°C recommended range. The old 12°C setpoint was overcooling by approximately 6°C, wasting energy."}},{term:"Wireless Sensor Networks (WSN)",definition:"Battery-powered or energy-harvesting sensors communicating via wireless protocols (Zigbee, LoRaWAN, Bluetooth LE) to monitoring infrastructure, avoiding cabling costs in retrofit environments.",plain:"In a 2013 facility like Clonshaugh, running cables to 400+ rack positions is expensive and disruptive. Wireless sensors clip to rack doors without cable runs — deployment in days not weeks.",number:"Wireless sensor cost: €50–100 per sensor (Tier 3 — Honeywell/Siemens/Schneider published pricing, indicative, T&RH combined). Battery life: 3–5 years (lithium cell, 30–60s reporting interval). Clonshaugh target: 1,200 sensors (3 per rack × 400 racks). Total hardware: approximately €90,000 (Tier 3 — component pricing, indicative). Installation: 2–3 weeks (no hot works, no cable pulling). Annual battery replacement budget: €5,000–8,000 (300–400 batteries/year at €15 each; Tier 3 — consumable cost, indicative).",standard:"IEEE 802.15.4 (Zigbee); LoRaWAN specification; EN 50600-3-1 sensor requirements",feynman:{analogy:"Wireless sensors in a DC are like weather stations in a field — you can scatter hundreds of them without digging trenches for cables. Each one reports local conditions to a central collector.",firstPrinciples:"Temperature varies significantly within a data hall — 10–15°C difference between cold aisle and hot aisle, and 3–5°C variation within the cold aisle due to blanking plate gaps, airflow obstructions, and uneven IT loads. To see this variation, you need sensors at each rack, not one per room. Wireless avoids the cost of 1,200 cable runs in a live facility.",theTest:"A wireless T&RH sensor reports 30°C at rack 247 inlet, but the room average is 23°C. What should the operator investigate? Answer: Blanking plate gap, missing containment seal, or CRAH airflow obstruction near rack 247. The wireless sensor identified a hot spot invisible to room-level monitoring."}}],whatItLooksLike:"Wireless T&RH sensors clipped to rack doors at three heights. DP sensors on containment walls. All feeding DCIM every 30–60 seconds.",
siteChecklist:["Count existing sensors per rack (target: 3 temp + 1 humidity)","Check accuracy class (±0.5°C min for temp)","Verify polling interval (<60s for thermal event detection)","Look for dead wireless sensors (flat batteries)"]},
logic:{causeAndEffect:[
{cause:"Temperature sensors are installed at room level only — one per data hall — with no rack-level or cold aisle measurement",effect:"Average stays in range while individual racks overheat. ASHRAE violations undetected until hardware fails.",insight:"Room-level averaging is like measuring hospital temperature with one corridor thermometer."},
{cause:"Rack-level temperature sensors are installed at adequate density but the polling interval is set to 5 minutes",effect:"Rapid thermal events escalate in 2–3 minutes. By next poll, servers are throttling.",insight:"1,200 sensors at 5-min intervals is less useful than 400 at 30 seconds for fault detection."}
],constraintLesson:"The constraint is not technology — wireless sensors are cheap. It is data volume. 1,200 sensors at 30s = 3.5M readings/day. Without DCIM analytics, this becomes noise.\n\nClonshaugh’s BMS has ~40 room-level sensors. Upgrading to rack-level = 30× data increase. The BMS cannot handle this — DCIM is architected for high-density data.\n\nPractical constraint: wireless battery life (3–5 years). At 1,200 sensors, ~300–400 battery replacements/year. Budget ~€5,000–8,000/year.",
weakestLink:{whatsWrong:"We monitor room temperature — the data hall is within ASHRAE limits.",whatsRight:"Room temperature is an average. ASHRAE limits apply at the server inlet. A room at 22°C can have inlets from 18°C to 32°C.",howToGetThere:"Step 1: Deploy wireless sensors on 20% worst-case racks (~€6,000–12,000). Step 2: Analyse 30 days. Step 3: Extend to 100% (~€24,000–48,000). Step 4: Connect to DCIM."}},
rhetoric:{declan:{hook:"I had a thermal incident last summer — four racks hit 35 degrees inlet at 3am. The BMS showed nothing because the nearest sensor was 12 metres away in the main aisle.",text:"Declan here. I had a thermal incident last summer — four racks hit 35°C inlet at 2 AM. The room sensor showed 23°C. How? The blanking plates were missing on three adjacent racks, creating a recirculation path from hot aisle to cold aisle that the room sensor could not see. We only found it because an IT engineer noticed fans screaming. With rack-level sensors, I would have had a 30°C warning 20 minutes earlier — enough time to install temporary blanking and avoid the thermal throttling that cost us two hours of degraded service."},
ann:{hook:"Sensor coverage is a due diligence item. Room-level only means no thermal event is detectable until it is already causing equipment damage — which is when the SLA clock starts.",text:"Ann speaking. Sensor coverage is a due diligence item. Room-level only is a red flag for any institutional buyer — it means the operator cannot demonstrate ASHRAE compliance at rack level. Insurance underwriters are starting to ask about sensor density too. A facility with rack-level monitoring and documented thermal compliance has lower risk profile and commands better terms. The €90,000 sensor investment (Tier 3 — Honeywell/Siemens/Schneider published pricing, indicative) is trivial against a €50M asset value (Tier 4 — indicative DC valuation benchmark) — it is essentially a rounding error that eliminates a material risk."},
mark:{hook:"ASHRAE TC 9.9 placement requires server inlet sensors, not room-level probes. One probe per 6 rack positions in a hot/cold aisle layout is the minimum defensible configuration.",text:"Mark here. Check whether ASHRAE TC 9.9 placement is confirmed: server inlet, not exhaust. Three heights per rack — top, middle, bottom — to detect vertical stratification. EN 50600-2-3 for environmental classification. Polling interval: 30–60 seconds for thermal monitoring, 5 minutes for humidity. Wireless preferred for retrofit — IEEE 802.15.4 mesh or LoRaWAN. Accuracy requirement: ±0.5°C for temperature, ±3% for RH. Calibration interval: annual, traceable to national standard. Document the sensor specification in the monitoring design basis document."},
sarah:{hook:"For EED Article 12, documented sensor architecture with calibration records is required. A room-level probe configuration cannot produce a compliant energy efficiency report.",text:"Sarah here. For EED Article 12, you need documented sensor architecture with calibration records and data retention policy. The regulation expects measurement, not estimation. An auditor will ask: where are your sensors, when were they last calibrated, and can you demonstrate the data chain from sensor to reported KPI? A 1,200-sensor wireless deployment with DCIM integration provides this evidence chain. Without it, EED reporting relies on manual processes that are vulnerable to error and difficult to audit."},
tom:{hook:"1,200 wireless sensors at 75 euros each: 90 thousand euros. Installed and commissioned: approximately 200 thousand total. That sensors programme prevents the thermal incident that costs 5 to 20 times more.",text:"Tom here. 1,200 wireless sensors at €75 each (Tier 3 — Honeywell/Siemens/Schneider published pricing, indicative) = €90,000 hardware. Add installation and DCIM integration: €130,000–160,000 total (Tier 2 — RICS NRM1 fee benchmarks, indicative). Annual battery budget: €5,000–8,000 (300–400 replacements at €15 each; Tier 3 — consumable cost, indicative). Compare against cost of one thermal incident: server replacement €50,000–200,000 (Tier 3 — Uptime Institute DC incident cost benchmarks, indicative), SLA penalties €20,000–100,000 (Tier 3 — Uptime Institute, indicative), reputation damage incalculable. The sensor network pays for itself by preventing a single incident. After that, everything is upside — better capacity planning, demonstrated ASHRAE compliance, and EED reporting capability."}},
scenario:{title:"The Hidden Hot Spot",narrative:"BMS shows all halls within ASHRAE range. But tenant complaints about throttling in Hall A are increasing. IR thermometer finds 33°C at top of Row J — 6°C above maximum.",question:"What sensor deployment would have detected this?",answer:"Detection: Rack-level inlet sensors at three heights. Room sensor at 1,500mm sees the average, not the top-of-rack air.\n\nRoot cause: Vertical stratification (22°C bottom → 33°C top) = 11°C gradient = hot air recirculation. Check containment, blanking panels, CRAH throw distance.\n\nFix: Blanking panels (€5–10 each), seal containment. Sensor deployment for Hall A: €6,000–12,000.",
whoShouldCare:["declan","mark"]},
sourceNote:"ASHRAE TC 9.9 5th Ed (T1); EN 50600-2-3:2019 (T1); ISO 7726 (T1); CIBSE Guide B2 (T2)",
retrofitRelevance:"Sensor deployment is Phase 1 — low cost, no downtime, immediate insight. 30 days of rack-level data typically justifies the entire DCIM investment.",
  cascadeCheck:(kw,racks,pue)=>{const sensorsPerRack=3;const totalSensors=racks*sensorsPerRack;const costPerSensor=50;const totalCost=totalSensors*costPerSensor;return{needed:totalSensors.toFixed(0),available:"0",unit:"sensors (est.)",pass:false,detail:`${racks} racks × ${sensorsPerRack} sensors = ${totalSensors} sensors. Est. cost: €${(totalCost/1000).toFixed(0)}k. Phase 1 investment.`}},

{id:"L3",level:3,name:"Communication Protocols — BACnet, SNMP, Modbus",icon:"🔌",component:"Protocol Layer",available:true,
clockQuote:"Sixty-three disabled alarms. Not because the building had sixty-three faults — but because when a sensor fails and nobody replaces it, the only way to stop the alarm screen from crying wolf is to tell it to stop crying. The building had been systematically silenced.",
userNeedStatement:"When I need to integrate BMS and DCIM that speak different protocols, help me understand which protocols exist and where integration gaps hide.",
plainEnglish:"BMS speaks BACnet. IT speaks SNMP. Legacy plant speaks Modbus. Getting these three to talk is the key integration challenge.",
grammar:{facts:[
{term:"BACnet",definition:"ISO 16484-5 standard protocol for building automation.",plain:"The language of building management. BACnet is the open standard that lets different manufacturers' equipment — chillers, AHUs, lighting controllers — talk to one central BMS. Without it, every vendor's system speaks its own dialect and nothing connects.",number:"BACnet/IP: UDP port 47808. Up to 4,194,303 objects per device.",standard:"ISO 16484-5:2022; ASHRAE 135-2020",feynman:{analogy:"Think of it like English being the common language of international business — BACnet is the standard language that lets different vendors' equipment communicate.",firstPrinciples:"Buildings contain equipment from many manufacturers. BACnet (ISO 16484-5) defines a standard protocol so a chiller from Carrier can report to a BMS from Siemens. It uses standard Ethernet and organises data as objects with properties.",theTest:"You know you understand BACnet when you can answer: A DCIM wants to read chiller data from the BMS — can it do this via SNMP? Answer: No — the BMS speaks BACnet, not SNMP. A gateway or API translator is needed."}},
{term:"SNMP",definition:"IETF protocol for monitoring IT infrastructure — UPS, PDU, CRAC, switches.",plain:"The language of IT infrastructure. SNMP lets network management tools poll every switch, server, UPS, and PDU for status. It is how DCIM knows what is happening inside the racks — where BMS cannot see.",number:"SNMPv3 adds authentication and encryption. Polls return data in <100ms.",standard:"RFC 3411–3418 (SNMPv3)",feynman:{analogy:"Think of it like asking every appliance in your house to report its status to your phone — the fridge tells you its temperature, the washing machine its cycle. SNMP is how IT equipment reports to monitoring.",firstPrinciples:"IT equipment — PDUs, UPS, switches — have network cards that share data. SNMP is the protocol. The monitoring system polls each device for power draw, temperature, status. The device responds from its MIB — a catalogue of everything it can report.",theTest:"You know you understand SNMP when you can answer: Why is SNMPv3 mandatory in a secure DC, not SNMPv2c? Answer: SNMPv2c sends passwords in clear text. SNMPv3 adds authentication and encryption."}},
{term:"Modbus (RTU/TCP)",definition:"Serial or Ethernet protocol for legacy industrial equipment.",plain:"The language of older equipment. Simple, reliable, everywhere in legacy plant rooms. Modbus has no built-in security — it was designed for isolated networks in the 1970s. In a modern connected DC, that simplicity becomes a vulnerability that OPC-UA is designed to replace.",number:"RTU: RS-485, up to 32 devices. TCP: port 502. Legacy DCs typically have 20–50 Modbus devices.",standard:"IEC 61158; Modbus Organization",feynman:{analogy:"Think of it like an old telephone system — simple, reliable, but no encryption and no caller ID. Modbus is the legacy protocol: it works, every old generator speaks it, but it has no security.",firstPrinciples:"Before BACnet and SNMP, industrial equipment used Modbus — a serial protocol from 1979. It sends register numbers and values with no standard data model. You need the manufacturer's register map for every device.",theTest:"You know you understand Modbus when you can answer: DCIM auto-discovers 50 PDUs via SNMP but finds zero generators — why? Answer: Generators use Modbus RTU on RS-485, a different protocol on a different network."}}
,{term:"API Gateway (REST/JSON)",definition:"A software middleware layer that translates between legacy BMS protocols (BACnet, Modbus) and modern IT systems using RESTful APIs with JSON data formatting.",plain:"The API gateway is the translator between old and new. Instead of replacing the entire BMS, you add a gateway that speaks both BACnet and REST. DCIM and analytics platforms then access BMS data through standard web APIs.",number:"API gateway cost: €15,000–30,000 (Tier 2 — RICS NRM1 fee benchmarks; Schneider/Honeywell published pricing, indicative; hardware + software + commissioning). Alternatives: full BMS controller replacement (€80,000–150,000; Tier 3 — Honeywell/Siemens/Johnson Controls published ranges, indicative) or vendor-locked proprietary integration (€40,000–80,000 + annual licence; Tier 3 — vendor published, indicative). Gateway approach preserves existing BMS investment while enabling modern integration. Typical implementation: 4–8 weeks.",standard:"EN 50600-3-1:2021 integration requirements; ISO 16484-5 BACnet data exchange",feynman:{analogy:"An API gateway is like a simultaneous interpreter at the United Nations. The BMS speaks BACnet, the DCIM speaks SNMP, the analytics platform speaks REST. The gateway translates in real-time so everyone understands everyone else.",firstPrinciples:"Legacy systems cannot be replaced overnight in a live DC — the risk of control loss is unacceptable. An API gateway provides a non-invasive integration path: it reads data from the BMS via its native protocol and publishes it via REST/JSON for any modern system to consume. No changes to the BMS itself.",theTest:"Clonshaugh has a 2013 BMS with 3,500 BACnet points. The new DCIM needs access to these points. What is the fastest, lowest-risk integration approach? Answer: API gateway (€15,000–30,000; Tier 2 — RICS NRM1; Schneider/Honeywell published pricing, indicative; 4–8 weeks). Full controller replacement is more capable but costs 5× more and takes 4× longer."}},{term:"OPC-UA (Unified Architecture)",definition:"An open, platform-independent industrial communication standard for secure, reliable data exchange between sensors, controllers, and enterprise systems in operational technology environments.",plain:"OPC-UA is emerging as the common language for DC infrastructure monitoring — it handles the security, data modelling, and transport that BACnet and Modbus were never designed for. New BMS controllers increasingly support OPC-UA natively.",number:"OPC-UA adoption in DC: growing but still minority. Most new Siemens, Schneider, and Honeywell controllers support OPC-UA. Legacy installations: require gateway (€5,000–15,000; Tier 3 — Siemens/Schneider/Honeywell published pricing, indicative). Key advantage: built-in encryption and authentication — unlike BACnet/IP and Modbus TCP which transmit in clear text.",standard:"IEC 62541 (OPC-UA); EN 50600-3-1:2021 interoperability requirements",feynman:{analogy:"OPC-UA is like HTTPS for buildings. Just as HTTP became HTTPS to add security to web browsing, OPC-UA adds security and structure to the unsecured industrial protocols that DC equipment uses today.",firstPrinciples:"BACnet and Modbus were designed in the 1990s for isolated building networks. They have no encryption, weak authentication, and limited data modelling. As DCs connect their control systems to enterprise IT networks (OT/IT convergence), these weaknesses become security vulnerabilities. OPC-UA was designed from the ground up for secure, cross-platform data exchange in connected industrial environments.",theTest:"An IT security audit finds BACnet/IP traffic traversing the corporate network in clear text. What protocol migration addresses this? Answer: OPC-UA — which provides certificate-based authentication and AES-256 encryption natively, unlike BACnet/IP."}}],whatItLooksLike:"Protocol gateways translate between BMS (BACnet), DCIM (SNMP), and legacy plant (Modbus).",
siteChecklist:["Inventory all protocols in use","Identify proprietary protocols requiring licensed gateways","Check SNMP version (v1/v2c = security risk)","Count Modbus devices requiring register maps"]},
logic:{causeAndEffect:[
{cause:"The BMS was installed in 2013 using a proprietary communication protocol that is not compatible with open DCIM platforms",effect:"DCIM cannot read BMS data without a proprietary vendor gateway or a full BMS controller upgrade, adding significant unplanned cost.",insight:"Clonshaugh’s exact situation. Controller upgrade: €50,000–150,000. Gateway alternative: €5,000–15,000 (read-only)."},
{cause:"PDUs and UPS units are configured with SNMP community strings left at factory default values and accessible on the building network",effect:"Any device on the shared network can read and write PDU and UPS configurations — a critical cybersecurity and operational risk.",insight:"SNMPv3 with authentication is a prerequisite for DCIM deployment."}
,{cause:"The BMS communicates over the building network without any VLAN segmentation from the corporate IT and management network",effect:"OT network (controlling cooling, power, fire) is exposed to IT network threats — ransomware, misconfiguration, or network congestion on the corporate side can disrupt building controls. IEC 62443 requires network segmentation between OT and IT zones.",insight:"This is the most overlooked DC risk in facilities built before 2018. The BMS was designed as an isolated system, but IT teams have since connected it to the corporate network for remote access and reporting. The convenience creates a security vulnerability: a compromised IT endpoint could reach the BMS. The fix is network segmentation with a DMZ between OT and IT — not expensive (€5,000–15,000 for managed switches and firewall rules; Tier 3 — Cisco/HP/Fortinet published pricing, indicative) but requires IT/OT coordination."}],constraintLesson:"The constraint is data mapping. Each gateway translation loses context. For 3,500 BMS points + 8,000 SNMP points + 50 Modbus devices, mapping takes 2–4 weeks engineering.\n\nModern approach: REST API integration. But legacy systems typically lack APIs. Target BACnet/IP with RESTful API gateway.",
weakestLink:{whatsWrong:"We will install DCIM and it will automatically discover all devices.",whatsRight:"DCIM auto-discovers SNMP devices. It does NOT auto-discover BMS devices (different protocol/network). Budget 2–4 weeks integration engineering.",howToGetThere:"Step 1: Protocol audit. Step 2: Network architecture. Step 3: Gateway spec (€5,000–15,000; Tier 3 — Schneider/Honeywell published pricing, indicative; or €50,000–150,000 full controller upgrade; Tier 3 — Honeywell/Siemens/Johnson Controls published, indicative). Step 4: Data point mapping. Step 5: Commission and verify."}},
rhetoric:{declan:{hook:"I have a 2013 BMS speaking its own language, Modbus meters, and a DCIM platform that will not talk to either. Three systems, zero integration, one clipboard.",text:"Declan here. I have a BMS from 2013 that speaks its own language, Modbus meters on the generators, SNMP on the PDUs, and a web interface on each CRAH that does not talk to anything else. Getting a single view of the facility means logging into five different systems. When I need to troubleshoot a cooling issue at 3 AM, I do not have time to switch between five screens. The API gateway is not a luxury — it is the difference between a 5-minute diagnosis and a 45-minute one. In a DC, those 40 minutes can mean thermal shutdown."},ann:{hook:"Protocol lock-in is a hidden liability. A proprietary BMS means every vendor change requires a full rip-and-replace rather than a software update — and that cost appears at the worst time.",text:"Ann speaking. Protocol lock-in is a hidden liability. A proprietary BMS means every future integration requires the original vendor — at their price, on their timeline. I have seen BMS upgrade quotes of €150,000+ from incumbent vendors who know the client has no alternative. An open-protocol strategy (BACnet/IP with REST API gateway) breaks this lock-in and typically reduces integration costs by 40–60% over a 10-year lifecycle. Check whether open protocols are confirmed in every new equipment procurement."},mark:{hook:"BACnet per ISO 16484-5 is the mandatory open protocol for BMS controllers. Modbus TCP acceptable for field devices. Any proprietary protocol requires a gateway — and a gateway is a single point of failure.",text:"Mark here. Check whether BACnet/IP is confirmed on all BMS controllers (ISO 16484-5), SNMPv3 on all IT infrastructure (v1/v2c are security vulnerabilities), Modbus TCP only where legacy integration is unavoidable. For new installations, consider OPC-UA (IEC 62541) which provides native encryption and structured data modelling. Critical requirement: network segmentation between OT and IT domains per IEC 62443. A BMS on the corporate LAN without segmentation is an unacceptable cybersecurity risk for a mission-critical facility."},sarah:{hook:"EED compliance monitoring must produce auditable data with traceable calibration records. A closed proprietary BMS cannot demonstrate that chain of custody — it is a compliance gap.",text:"Sarah here. For EED compliance, monitoring must produce auditable data with traceable data chains from sensor to report. This means: documented protocol architecture, data validation at each translation point, and retention of raw data alongside calculated KPIs. A protocol diagram showing BACnet → API gateway → DCIM → EED report is part of the evidence base. If an auditor cannot trace a reported PUE value back through the protocol chain to the physical meter, the report is not defensible."},tom:{hook:"Protocol gateway at 15 to 30 thousand euros. Full BACnet-native BMS replacement at 150 to 300 thousand euros. The gateway is the short-term fix — the replacement is the 5-year plan.",text:"Tom here. Gateway: €15,000–30,000 (Tier 2 — RICS NRM1 fee benchmarks; Schneider/Honeywell published pricing, indicative; read/write with REST API). Full BMS controller upgrade to BACnet/IP: €80,000–120,000 for 12 controllers and 3,500 points (Tier 3 — Honeywell/Siemens/Johnson Controls published controller pricing, indicative). The gateway is faster and cheaper but has limitations — it translates data, it does not enable closed-loop control. For Clonshaugh, the full upgrade is needed for Phase 3 closed-loop optimisation. But starting with the gateway in Phase 1 (€15,000) provides immediate data integration value while the controller upgrade is planned and funded for Phase 2."},},
scenario:{title:"The Protocol Gap",narrative:"New DCIM selected (SNMP + REST API). BMS vendor quotes €120,000 for BACnet/IP upgrade.",question:"Is the BMS upgrade justified?",answer:"Justified if closed-loop cooling optimisation (L8) is planned.\n\nWithout: two silos, manual PUE merge, minutes to respond.\nWith: real-time IT load to BMS, automatic CRAH adjustment, single PUE source, seconds to respond.\n\nPayback: €100,000–200,000/year savings vs €120,000 cost = 8–14 months.",
whoShouldCare:["mark","declan"]},
sourceNote:"ISO 16484-5:2022 (T1); RFC 3411–3418 (T1); EN 50600-3-1 (T1)",retrofitRelevance:"Protocol assessment is the critical path item. Incompatible protocols add 6–12 months and €50,000–150,000.",
  cascadeCheck:(kw,racks,pue)=>{const protocols=["BACnet","SNMP","Modbus"];const legacy="Modbus RTU";return{needed:"BACnet/IP + SNMP",available:legacy,unit:"protocol",pass:false,detail:`Legacy: ${legacy}. Target: BACnet/IP (BMS) + SNMPv3 (DCIM). Gateway cost: €50k–€150k if incompatible.`}},

{id:"L4",level:4,name:"PUE Measurement & Attribution",icon:"📊",component:"Analytics Layer",available:true,
clockQuote:"The BMS spoke BACnet. The DCIM spoke SNMP. There was supposed to be a gateway between them. It was value-engineered out. The two systems that needed to share data had never been introduced.",
userNeedStatement:"When I need to report or improve PUE, help me understand measurement categories and how monitoring determines accuracy.",
plainEnglish:"PUE is only as good as the metering behind it. EN 50600-4-2 defines three categories — each needs more infrastructure but delivers more actionable data.",
grammar:{facts:[
{term:"PUE Category 1 (Basic)",definition:"PUE from utility incomer ÷ IT load at UPS output. Monthly or quarterly.",plain:"The simplest PUE: total power in ÷ IT power out of UPS. Hides everything between UPS and server.",number:"Minimum for EN 50600-4-2. Accuracy ±5–10%. Clonshaugh operates at Category 1.",standard:"EN 50600-4-2:2016; ISO/IEC 30134-2",feynman:{analogy:"Think of it like checking your bank balance from the monthly statement — it tells you the total but not where you spent the money. Category 1 PUE is the bank statement.",firstPrinciples:"PUE is total facility power divided by IT load. Category 1 measures from two points — utility meter and UPS output. It can be done from quarterly bills. Accurate to ±5–10%, but hides everything.",theTest:"You know you understand Category 1 when you can answer: A chiller COP degrades in July — when will the PUE figure show this? Answer: Not until the September bill. Category 1 is retrospective."}},
{term:"PUE Category 2 (Intermediate)",definition:"PUE from metered sub-systems — total, IT, cooling, lighting each metered separately. Daily+.",plain:"Category 2 breaks PUE into components. This is where optimisation starts. Instead of a single number, you see exactly how much overhead comes from cooling, from power distribution, and from everything else — and that tells you where to invest.",number:"Requires 6+ metering points. Accuracy ±2–5%. Cost: €15,000–25,000 at Clonshaugh (Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2 instrumentation requirements, indicative).",standard:"EN 50600-4-2:2016",feynman:{analogy:"Think of it like itemising your bank statement — now you see groceries, transport, and heating as separate lines. Category 2 breaks PUE into sub-systems.",firstPrinciples:"Category 2 adds meters at each major sub-system. Instead of one PUE number, you get a budget: IT (1.000) + cooling plant (0.300) + cooling dist (0.080) + power dist (0.080) + other (0.040). Now you can target cooling specifically.",theTest:"You know you understand Category 2 when you can answer: PUE is 1.50, cooling plant is 0.250. If cooling halves to 0.125, what is new PUE? Answer: 1.000 + 0.125 + 0.080 + 0.100 + 0.070 = 1.375."}},
{term:"PUE Category 3 (Advanced)",definition:"PUE continuously at high granularity — individual UPS, CRAH, PDU branches. 15-minute intervals.",plain:"Category 3 sees everything. Identifies which specific CRAH is over-delivering, which UPS is least efficient.",number:"50–200+ metering points. Clonshaugh: ~80 points. Cost: €80,000–120,000 (Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2 instrumentation requirements, indicative). Accuracy ±1–2%.",standard:"EN 50600-4-2:2016",feynman:{analogy:"Think of it like having a smart meter on every appliance — you can see the dryer uses more than the fridge and the hallway light was left on. Category 3 sees every component.",firstPrinciples:"Category 3 meters individual CRAH units, UPS modules, PDU branches — continuously, at 15-minute intervals. This identifies that CRAH-7 runs at 100% serving an empty row, or UPS module 3 is 8% less efficient.",theTest:"You know you understand Category 3 when you can answer: Category 2 shows cooling is 65% of overhead. Can it tell you whether chillers or CRAH fans are bigger? Answer: No — Category 2 groups cooling as one line."}}
,{term:"PUE Attribution — Sub-System Breakdown",definition:"The decomposition of total PUE into its component contributors: cooling PUE, electrical distribution PUE, and other overheads, enabling targeted efficiency investment.",plain:"PUE 1.50 tells you the facility is 50% overhead. Attribution tells you WHERE that overhead is: cooling might be 0.35, distribution 0.10, lighting/other 0.05. Without attribution, you are guessing where to invest.",number:"Clonshaugh PUE 1.50 attribution (estimated from typical 2013 build): Cooling: 0.30–0.35 (60–70% of overhead). Power distribution: 0.08–0.12 (UPS, transformers, PDUs). Other: 0.03–0.07 (lighting, security, ventilation). At PUE 1.50: cooling improvement from 0.35 to 0.15 (free cooling optimisation) saves 0.20 PUE points = 420 kW = approximately €440,000/year (Tier 2 screening-level calculation: 420 kW × 8,760 hrs × €0.12/kWh; T1/T2 inputs).",standard:"EN 50600-4-2:2016 PUE measurement; ISO 30134-2:2016",feynman:{analogy:"PUE attribution is like a household energy audit. Your total bill is €200/month, but the audit reveals heating is €120, hot water €40, lighting €25, appliances €15. Now you know to insulate first, not replace light bulbs.",firstPrinciples:"PUE = Total Facility Power / IT Load. The numerator contains every non-IT load: chillers, pumps, CRAHs, fans, UPS losses, transformer losses, lighting, security. Attribution measures each component separately and expresses it as a fraction of IT load. This requires sub-metering at each major load — which is exactly what Category 2 PUE provides.",theTest:"Clonshaugh installs sub-metering and finds cooling = 0.35 PUE, distribution = 0.10, other = 0.05. Total = 1.50. If cooling drops to 0.15 through free cooling optimisation, what is the new PUE? Answer: 1.30 (1.0 + 0.15 + 0.10 + 0.05). This meets the EU Taxonomy threshold of PUE ≤ 1.3."}},{term:"Category 2 to Category 3 — Continuous Monitoring",definition:"The transition from intermediate PUE measurement (Category 2: daily/weekly readings from dedicated meters) to advanced measurement (Category 3: continuous real-time monitoring with ≤15-minute granularity).",plain:"Category 2 tells you your average PUE. Category 3 tells you your PUE right now — and how it changes with weather, IT load, and cooling mode. It enables real-time optimisation rather than monthly reviews.",number:"Category 2: 6 main meters, daily reads, €15,000–25,000 installed. Category 3: 80+ metering points, 15-minute data, €80,000–120,000 installed. Data volume: Category 2 = ~50 readings/day. Category 3 = ~7,700 readings/day. Storage: ~3 GB/year at Category 3. ROI: Category 3 typically identifies 3–5% additional PUE improvement over Category 2 through real-time anomaly detection.",standard:"EN 50600-4-2:2016; ISO 30134-2:2016",feynman:{analogy:"Category 2 is a weekly weigh-in. Category 3 is a fitness tracker that monitors your heart rate every second. The tracker reveals patterns the weekly weigh-in misses — like your PUE spiking every time the chillers stage up.",firstPrinciples:"Energy efficiency varies with conditions. PUE at 3 AM in January (free cooling, low IT load) differs from PUE at 3 PM in July (mechanical cooling, peak IT load). Category 2 averages these into a single number. Category 3 captures the variation, enabling the operator to identify when and why efficiency degrades — and to optimise accordingly.",theTest:"Category 2 shows average PUE 1.50. Category 3 reveals PUE ranges from 1.25 (winter night) to 1.85 (summer afternoon). What does this tell the operator? Answer: The facility is already efficient during free cooling periods but loses efficiency during mechanical cooling. Investment should target the mechanical cooling system, not the overall facility."}}],whatItLooksLike:"Cat 1: quarterly spreadsheet from bills. Cat 2: daily DCIM dashboard with component breakdown. Cat 3: real-time trending with automated alerts.",
siteChecklist:["Determine current PUE category (1/2/3)","Identify metering at each budget point","Check accuracy class (IEC 61557-12 Class 0.5 min)","Is PUE from real-time data or retrospective bills?"]},
logic:{causeAndEffect:[
{cause:"PUE is calculated at EN 50600-4-2 Category 1 using quarterly utility bills — no sub-metering exists for granular measurement",effect:"PUE hides seasonal variation, load changes, efficiency events. A chiller COP degradation in July invisible until September.",insight:"Category 1 PUE is a reporting metric, not operational tool. You cannot optimise what you measure quarterly."},
{cause:"Category 2 PUE measurement is in place but energy consumption is not attributed to individual cooling, power, and IT sub-systems",effect:"You know cooling is largest contributor but cannot identify which component — chillers, pumps, CRAHs.",insight:"Category 2 tells you where to look. Category 3 tells you what to fix."},
{cause:"PUE metering boundary misaligned — IT load measured at PDU output instead of UPS output",effect:"PUE appears better (lower denominator excludes PDU losses). EN 50600-4-2 boundary violated. Comparison with industry benchmarks is invalid.",insight:"A 0.02–0.05 PUE error from boundary misalignment sounds small, but at Clonshaugh’s scale (31,536 MWh/year), 0.05 PUE = 1,752 MWh = €210,000/year (Tier 2 calculation: 1,752 MWh × €0.12/kWh; T2-CRU Q4 2024). The metering boundary is not an academic distinction — it has a six-figure cost implication."}
],constraintLesson:"The constraint is metering infrastructure: CT access, voltage tapping, cabling to BMS/DCIM.\n\nCategory 1 → 2: ~6 new meters (€15,000–25,000). Category 2 → 3: ~80 points (€80,000–120,000; Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2, indicative).\n\nDo not wait for Category 3. Category 2 data reveals major PUE contributors within 30 days. 60–70% of overhead is typically in cooling.",
weakestLink:{whatsWrong:"Our PUE is 1.50 — that is just where this facility sits.",whatsRight:"PUE 1.50 is without optimisation data. Until you meter cooling, distribution, and IT separately, you cannot identify where the 0.50 overhead hides.",howToGetThere:"Step 1: Install 6 meters (€15,000–25,000; Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2, indicative). Step 2: Connect to DCIM for daily PUE. Step 3: Run 30 days for baseline. Step 4: Target largest contributor (cooling)."}},
rhetoric:{declan:{hook:"I have reported PUE 1.50 for three years based on quarterly electricity bills. Mark just showed me that number includes the car park lighting and the security office heating.",text:"Declan here. I have reported PUE 1.50 for three years based on quarterly electricity bills and UPS output logs. I cannot tell you if that is getting better or worse. I cannot tell you what is driving it. Last winter, PUE was probably 1.30 because we were on free cooling most of the time. Last July, it was probably 1.70. But quarterly averaging hides both the opportunity and the problem. Category 2 metering would give me daily PUE with sub-system breakdown — then I can actually manage it instead of just reporting a number."},
ann:{hook:"PUE accuracy affects asset valuation directly. Category 1 metering — which attributes all facility power — produces a different number from Category 2, which measures only the IT load precisely.",text:"Ann speaking. PUE accuracy affects asset valuation directly. Category 1 PUE attracts a 10–15% uncertainty discount in due diligence because the number cannot be verified or attributed. A facility claiming PUE 1.50 at Category 1 might actually be 1.40 in winter and 1.65 in summer — very different risk profiles. Category 2 data enables seasonal analysis, benchmark comparison, and trend-based valuation. For institutional investors, the difference between Category 1 and Category 2 PUE is the difference between a claim and evidence."},
mark:{hook:"EN 50600-4-2 specifies the PUE measurement boundary precisely. Common errors: including office lighting in the total load, excluding PDU losses from the IT boundary, or using estimated rather than metered IT power.",text:"Mark here. EN 50600-4-2 specifies the measurement boundaries precisely. Common error: measuring IT load at PDU output (excludes PDU losses of 2–4%) or at server PSU input (excludes cable losses). Correct boundary: UPS output for IT load, main incomer for total facility. At Clonshaugh, UPS output meters already exist. Adding 6 sub-meters (chillers, CRAHs, pumps, lighting, UPS losses, other) for €15,000–25,000 delivers Category 2 attribution. This is the single highest-value metering investment in the facility."},
sarah:{hook:"EED Article 12 requires annual PUE reporting. The EU Code of Conduct on DC Energy Efficiency specifies Category 2 minimum — one dedicated IT power meter, not an estimate from a billing sub-meter.",text:"Sarah here. EED Article 12 requires annual PUE reporting. The EU Code of Conduct recommends Category 2 as minimum for facilities above 1 MW IT load. Clonshaugh at 2.4 MW is firmly in scope. Beyond compliance, PUE attribution data feeds directly into CRREM carbon trajectory analysis (DC-LEARN-010 L3) — PUE improvement is the primary lever for reducing CUE. Without attributed PUE, the carbon reduction programme cannot identify or quantify its most impactful interventions. PUE measurement is the foundation of the entire ESG strategy."},
tom:{hook:"Moving from Category 1 to Category 2 PUE: 15 to 25 thousand euros for meters plus integration. That expenditure makes the PUE figure defensible in a transaction due diligence process.",text:"Tom here. Category 1 to 2: €15,000–25,000 for 6 meters plus DCIM integration (Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2, indicative). Category 2 to 3: €80,000–120,000 for 80+ metering points with continuous logging (Tier 2 — RICS NRM1 metering allowances; EN 50600-4-2, indicative). Category 2 data typically identifies 10–15% PUE improvement potential within 30 days — at Clonshaugh that is €126,000–189,000/year in energy savings. ROI on the Category 2 investment: payback in 6–10 weeks. This is why I always recommend Category 2 as the first investment in any DC monitoring programme — it pays for everything that follows."}},
scenario:{title:"PUE Attribution Exercise",narrative:"Category 2 data after 30 days: total 3,600 kW; IT 2,400 kW; cooling plant 600 kW; cooling distribution 192 kW; power distribution 240 kW; lighting/other 168 kW.",question:"Calculate PUE and identify optimisation target.",answer:"Here is how PUE attribution works in practice. The Category 2 sub-meters have given us the raw data — total facility power and the breakdown by sub-system. The job now is to convert those kilowatts into PUE components so we can see exactly where the overhead sits and where to invest.\n\nPUE = 3,600/2,400 = 1.50\n\nBreakdown: IT 1.000 + Cooling plant 0.250 + Cooling dist 0.080 + Power dist 0.100 + Other 0.070 = 1.500\n\nTarget: Cooling plant at 0.250 (50% of overhead). With Dublin’s 7,200 free cooling hours, best-in-class achieve 0.06–0.10.\n\nIf reduced to 0.10: new PUE = 1.35. Saving = 360 kW continuous = €378,000/year.\n\nWhat this means in practice: without attribution, the operator knows PUE is 1.50 but cannot tell whether to invest in cooling, UPS efficiency, or lighting. Attribution makes it obvious — cooling plant is half the overhead. That is where the money goes first.",
whoShouldCare:["mark","sarah"]},
sourceNote:"EN 50600-4-2:2016 (T1); IEC 61557-12 (T1); AIMEP DC Standards Reference v1.2 (T2)",
retrofitRelevance:"Category 1→2 is the highest-ROI monitoring investment — low cost, fast, directly identifies optimisation targets.",
  cascadeCheck:(kw,racks,pue)=>{const itMW=kw*racks/1000;const overheadMW=itMW*(pue-1);const coolingShare=0.65;const coolingMW=overheadMW*coolingShare;const coolingCost=coolingMW*1000*8760*0.12;return{needed:"Cat 1 (manual)",available:"Cat 2 (auto)",unit:"PUE measurement",pass:false,detail:`PUE ${pue}: overhead ${overheadMW.toFixed(1)}MW. Cooling ~${(coolingShare*100).toFixed(0)}% = ${coolingMW.toFixed(1)}MW = €${(coolingCost/1000).toFixed(0)}k/yr. Cat 2 metering identifies where.`}},
