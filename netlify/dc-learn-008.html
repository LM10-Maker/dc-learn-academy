{
  id:"L9", level:9, name:"Emerging Fire Risks", icon:"⚠️",
  available:true,
  component:"Emerging Fuel Risks",
  userNeedStatement:"Understand emerging risks from BESS, EV, HVO, and hydrogen — and how standards are evolving.",
  plainEnglish:"DC fire risks are changing. BESS adds thermal runaway outside UPS rooms. EV adds ignition. HVO has different storage. Hydrogen changes everything.",
  grammar:{
    facts:[
      {term:"BESS Fire Risk",definition:"Grid-scale Li-ion containers introduce thermal runaway at scale.",plain:"Shipping container of Li-ion on fire = major hazmat. Hours, HF gas, re-ignition.",number:">30 events 2017–2024 (EPRI). HF: ~20g/kWh (varies by chemistry and ventilation). 2 MWh: ~40 kg HF potential — dispersion depends on wind, ventilation, and enclosure.",standard:"NFPA 855; IEC 62619; UL 9540A; FM Global 5-33",feynman:{analogy:"Storing energy in batteries is like storing compressed springs — safe when contained, but if one releases, the energy has to go somewhere. A Battery Energy Storage System contains megawatt-hours of stored energy that can release as heat and toxic gas if cells fail.",firstPrinciples:"BESS installations concentrate large quantities of Li-ion cells. Thermal runaway in a BESS produces hydrogen fluoride and other toxic gases. BESS fires can burn for hours or days. Proximity to air intakes can introduce toxic gases into the data centre ventilation system.",theTest:"Why is BESS proximity to data centre air intakes a critical design consideration? Thermal runaway produces toxic gases including hydrogen fluoride. If the BESS is near an air intake, these gases enter the data centre ventilation system."},soWhat:"BESS installations bring thermal runaway risk to locations that never had it — every BESS project needs a fire protection review from day one."},
      {term:"EV Charging Fire",definition:"EV battery fires in DC car parks.",plain:"EV fire in DC car park = thermal runaway in uncontrolled environment.",number:"Battery: 40–100 kWh. Duration: 1–3 hrs. Water: 10,000–40,000 L.",standard:"NFPA 88A; BS 9999",feynman:{analogy:"A petrol pump fire is dangerous, but the fuel can be cut off and the fire starves. An EV charging fire is different — the car's battery keeps feeding the fire from inside, and water alone cannot stop the electrochemical reaction.",firstPrinciples:"EV batteries undergoing thermal runaway are self-sustaining — they generate their own oxygen internally. Charging increases thermal stress and failure probability. EV fires near data centres risk smoke ingress through ventilation. Separation distance and dedicated charging infrastructure are required.",theTest:"Why are EV charging fires more difficult to extinguish than conventional vehicle fires? The battery's electrochemical reaction is self-sustaining and generates its own oxygen. Conventional suppression methods cannot stop the internal cell-to-cell propagation."},soWhat:"EV charging fires are Li-ion fires — the same detection and suppression principles apply, but in spaces often not designed for them."},
      {term:"HVO Storage",definition:"Hydrotreated Vegetable Oil — higher flash point than diesel.",plain:"Higher flash point than diesel (~100 vs ~55°C). Same bunding rules.",number:"HVO: ~100°C (EN 15940). Diesel: ~55°C.",standard:"EN 15940; EPA IE; IS 3218:2013+A1:2019",feynman:{analogy:"HVO fuel looks and behaves almost exactly like diesel, but it's made from vegetable oil. The fire risk is the same as diesel — it needs the same bunding, separation distances, and spill containment. The 'green' label doesn't change the fire engineering.",firstPrinciples:"Hydrotreated Vegetable Oil is a drop-in diesel replacement with identical fire properties. Flash point, combustion behaviour, and storage requirements match conventional diesel. Environmental benefits do not reduce fire risk. Storage must comply with the same regulations as fossil diesel.",theTest:"Does switching from fossil diesel to HVO for backup generators change any fire safety requirements? No. HVO has identical fire properties to diesel — same flash point, same combustion behaviour, same bunding and storage requirements."},soWhat:"HVO is a combustible liquid stored near critical infrastructure — it requires bunding, foam suppression, and separation that diesel installations may not have."},
      {term:"Hydrogen Fire/Explosion",definition:"H₂ as future DC backup introduces explosion risk.",plain:"Explosive at low concentration. Invisible flame. Leaks through smallest gaps.",number:"LEL: 4%. UEL: 75%. Ignition: 0.017 mJ. ATEX Zone 2 min.",standard:"IEC 60079; EN 1473; emerging NFPA",feynman:{analogy:"Hydrogen is like an invisible, odourless gas that burns with a flame you cannot see. It's lighter than air so it rises and collects at ceiling level. If enough accumulates and finds an ignition source, it doesn't just burn — it explodes.",firstPrinciples:"Hydrogen has an extremely wide flammable range (4–75% in air). It is lighter than air and accumulates at ceiling level. Hydrogen flames are nearly invisible. Deflagration-to-detonation transition can occur in confined spaces. Ventilation, gas detection, and ATEX-rated equipment are mandatory.",theTest:"What is hydrogen's flammable range in air, and why does this make it particularly dangerous? 4–75% concentration in air — an extremely wide range meaning almost any leak in an enclosed space creates an explosion risk."},soWhat:"Hydrogen burns with an invisible flame and has a wide explosive range — it requires gas detection, explosion venting, and ATEX-rated equipment."},{term:"BESS Fire Safety Requirements",definition:"Battery Energy Storage Systems at DCs introduce unique risks: thermal runaway, toxic gas, re-ignition, water reactivity. Requires dedicated fire engineering.",plain:"Battery storage rooms at a DC are not just another electrical room. They produce toxic gas, reignite after suppression, and react dangerously with water.",number:"Toxic gases: HF, CO, HCN from Li-ion thermal runaway. Deflagration risk: flammable vapour above LEL. Re-ignition: hours or days after initial event. Ventilation: 5 ACH minimum.",standard:"NFPA 855; UL 9540A; EN 50600-2-5; EPA IE Licence conditions",feynman:{analogy:"Think of adding a fireworks storage room to a hospital. The hospital fire strategy does not cover fireworks. BESS at a DC is similar. The existing strategy does not cover battery-specific risks and must be extended.",firstPrinciples:"Li-ion battery fires differ from conventional fires: (1) thermal runaway is self-sustaining without external oxygen, (2) suppression may extinguish flames but internal reaction continues causing re-ignition, (3) decomposing cells release toxic gases, (4) large water volumes needed for cooling. BESS needs dedicated detection (gas + thermal + smoke), ventilation, suppression (water mist for cooling), and structural separation from the DC.",theTest:"A BESS room has FM-200 suppression like the server halls. A module enters thermal runaway. Is FM-200 effective? Partially. It may extinguish visible flames but cannot stop the internal cell reaction. The module will re-ignite. Water-based cooling is needed to reduce cell temperature below runaway threshold. Room also needs gas detection and forced ventilation."},soWhat:"NFPA 855 and UL 9540A set the testing and design standard for BESS fire protection — compliance must be verified before commissioning."}
    ],
    whatItLooksLike:"Containerised BESS with detection, monitoring, suppression. EV bays with enhanced sprinklers. HVO with bunding. Future: hydrogen detection.",
    siteChecklist:["BESS — per-container suppression?","EV sprinkler adequate?","HVO — bunding 110%, leak detection, MSDS?","Separation — BESS from building, EV from intakes?","Emergency plan — BESS, EV fire, HF gas?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"A containerised BESS installation is positioned adjacent to the data centre building without fire-rated separation or adequate distance. The BESS was added to the site as a power infrastructure project, and the fire protection review was limited to the BESS container itself without considering the exposure risk to the adjacent DC building.",effect:"A thermal runaway event in the BESS container produces sustained radiant heat for hours (not minutes), toxic hydrogen fluoride gas that migrates with wind, and potential explosion overpressure if the container is not adequately vented. The adjacent DC building wall, air intakes, and cable entry points are all exposed to these hazards.",insight:"BESS thermal runaway events produce sustained heat over hours, not the short-duration heat pulse of a conventional fire. Separation distance must account for radiant heat flux, toxic gas dispersion, and explosion overpressure. NFPA 855 provides minimum separation distances, but site-specific analysis is required for installations near occupied buildings and air intakes."},
      {cause:"The facility fire strategy was written to EN 50600-2-5 and IS 3218 standards that predate the widespread adoption of BESS, EV charging infrastructure, HVO fuel storage, and hydrogen systems at data centre sites. These technologies introduce hazards that the original standards did not contemplate.",effect:"The fire strategy document states compliance with EN 50600 and IS 3218, but these standards do not cover BESS thermal runaway, EV charging fire in enclosed car parks, HVO combustible liquid storage, or hydrogen explosion risk. The fire strategy is technically compliant with the standards it references, but materially incomplete for the hazards actually present on site.",insight:"Do not assume that an EN 50600-compliant fire strategy covers BESS, EV, HVO, or hydrogen. Each technology requires a supplementary assessment against its own standards: NFPA 855 for BESS, NFPA 88A for EV, EPA guidance for fuel storage, and ATEX/DSEAR for hydrogen. The fire strategy must be updated to incorporate these supplementary assessments before each technology is commissioned."},{cause:"A containerised BESS system has been installed adjacent to the data centre building with no fire-rated separation wall, no radiant heat assessment, and no consideration of toxic gas dispersion paths relative to the building air intakes",effect:"BESS thermal runaway exposes DC wall to radiant heat and toxic gas. If wall is not fire-rated, fire may spread to DC. Toxic gas may enter through air intakes.",insight:"BESS must be separated by fire-rated distance or barrier. Air intakes positioned upwind or above BESS. Gas detection at intakes provides early warning of off-gassing."}
    ],
    constraintLesson:"Standards are written for risks when published. BESS, EV, hydrogen are newer than IS 3218/EN 50600. Strategy must go beyond code to address actual risk.",
    weakestLink:{whatsWrong:"EN 50600 compliant. VESDA, clean agent, pre-action.",whatsRight:"EN 50600 covers traditional risks. BESS/EV/HVO added since are not fully addressed. NFPA 855 supplementary assessment required.",howToGetThere:"Commission supplementary FRA. NFPA 855 for BESS. Update strategy, plan, safety file."}
  },
  rhetoric:{
    declan:{hook:"Check the separation distance between any BESS container and the data centre building before approving the installation location. Minimum distances are specified in IEC 62485 and local planning.",text:"Declan, check the separation distance between any BESS container and the data centre air intakes. A Li-ion battery fire produces hydrogen fluoride gas, which is extremely toxic at parts-per-million concentrations. If a BESS container is 3 metres from an air intake and enters thermal runaway, HF will be drawn directly into the building ventilation system. The NFPA 855 minimum separation distances must be verified on site, not from drawings — and they must account for prevailing wind direction. This is the single most dangerous emerging fire risk for facilities that have added BESS without a fire protection review."},
    ann:{hook:"Emerging fire risks from BESS, EV charging, HVO storage, and hydrogen are driving material increases in DC insurance premiums for facilities that have not formally assessed and mitigated them.",text:"Ann, emerging fire risks from BESS, EV charging, HVO storage, and hydrogen are driving a wave of insurance re-pricing across the data centre sector. Multiple BESS thermal runaway incidents in 2023–2025 triggered significant premium increases for facilities with on-site energy storage. Insurers are now requiring specific fire protection evidence for every emerging technology before issuing cover. Proactive assessment and mitigation — demonstrating compliance with NFPA 855 for BESS, dedicated detection for EV charging, bunded foam systems for HVO — positions the facility ahead of the market and avoids the reactive re-pricing that follows an industry incident."},
    mark:{hook:"HF from Li-ion thermal runaway in a 2 MWh BESS: approximately 40 kg potential. IDLH concentration is 30 ppm. Ventilation and detection design must reflect the toxicity risk, not just the fire risk.",text:"HF from 2 MWh: ~40 kg potential (varies by chemistry/ventilation). IDLH: 30 ppm. Dispersion distance depends on wind and enclosure — site-specific modelling required. COMAH-level assessment for large BESS."},
    sarah:{hook:"BESS fire incidents are reportable under SFDR Principal Adverse Impact indicators on health and safety for employees and communities — a new disclosure obligation for affected funds.",text:"Sarah, BESS fire incidents are reportable under SFDR Principal Adverse Impact indicators for pollution prevention and physical risk. Compliance with NFPA 855 and UL 9540A testing is the minimum standard to satisfy the EU Taxonomy do-no-significant-harm criterion for BESS installations. Each emerging technology — BESS, EV charging, HVO, hydrogen — introduces its own regulatory framework that must be addressed before commissioning. A facility that installs BESS without NFPA 855 compliance documentation has a Taxonomy alignment gap that will surface in the next SFDR reporting cycle."},
    tom:{hook:"Fire protection for a BESS installation at 30 to 80 thousand euros per container for detection and suppression. The separation distance requirement may also drive civil works costs.",text:"Tom, fire protection for a BESS installation costs €30k–€80k per container for detection and suppression (Tier 3 — FM Global DS 5-33; NFPA 855; manufacturer published, indicative), plus €50k–€200k for separation infrastructure (Tier 3 — FM Global DS 5-33; NFPA 855; manufacturer published, indicative) including blast walls, ventilation, and HF-rated drainage. These are screening-level estimates that vary significantly with container size, chemistry, and site layout. Against a potential loss of €1.5M–€4M per BESS incident (Tier 3 — FM Global DS 5-33; EPRI 2023, indicative) — including equipment damage, environmental remediation, and business interruption — the protection investment is justified. Budget fire protection at feasibility stage for every emerging technology: BESS, EV charging, HVO storage, and hydrogen systems."}
  },
    rhetoricTakeaways:{
    declan:"BESS, EV charging, HVO storage, and hydrogen are all new fire risks. Each needs a specific fire protection review.",
    ann:"Emerging fire risks are the next wave of due diligence findings. Facilities without specific protection are exposed.",
    mark:"BESS: NFPA 855 + UL 9540A. EV: dedicated detection + HPWM. HVO: bund + foam. H₂: gas detection + explosion venting.",
    sarah:"Each emerging technology introduces new standards requirements. Fire strategy must be updated before commissioning.",
    tom:"Fire protection for emerging risks: €50k–€200k per technology (Tier 3 — FM Global DS 5-33; NFPA 855; manufacturer published, indicative). Budget at feasibility stage, not after installation."
  },
  scenario:{title:"The BESS Addition",narrative:"Operator plans 10 MWh BESS (5×2 MWh), 5m from DC, adjacent to main air intake.",question:"Fire safety issues?",answer:"The proposed BESS configuration has two serious fire safety deficiencies that must be resolved before planning or procurement proceeds.\n\nSeparation distance: 5m is inadequate. NFPA 855 specifies a minimum 6m separation from occupied buildings, and 10–15m where the BESS is adjacent to building air intakes. The proposed position is at the main DC air intake — the most operationally sensitive location possible. Li-ion thermal runaway produces hydrogen fluoride (HF) gas: colourless, acutely toxic at low concentrations (IDLH: 30ppm), and rapidly soluble in the humid air stream. HF entering the DC cooling air intake will contaminate server room air immediately, creating a simultaneous life safety emergency and corrosive damage event across the entire facility.\n\nRequired minimum separation: relocate the BESS to ≥15m from the building and ≥15m from any air intake. This is non-negotiable given the intake proximity and Clonshaugh’s 2.4 MW IT load.\n\nFire protection per container: each 2 MWh Li-ion container requires a complete fire safety package — suppression (HPWM or FM-200), CO/H₂ detection, thermal runaway containment strategy, and a container-level safety file. Indicative cost: €50k–€80k per container × 5 containers = €250k–€400k (Tier 3 — FM Global DS 5-33; NFPA 855; manufacturer published).\n\nAdditional requirements: NFPA 855 emergency response pre-plan briefed to Dublin Fire Brigade; EN 50600 compliance reviewed (EN 50600 does not address BESS thermal runaway — NFPA 855 is the required supplementary standard); EPA licensing position confirmed for HF risk.\n\nTotal fire safety investment: €350k–€600k indicative (Tier 3). Relocate the BESS first — all other decisions follow from correct separation distance. Sources: NFPA 855; FM Global DS 5-33; EN 50600; IS 3218:2013+A1:2019.",
whoShouldCare:["mark","ann","sarah"]},
  retrofitRelevance:"BESS fire protection cost must be included in the BESS business case, not treated as a separate safety budget item. Total additional fire safety: €350k–€600k above bare BESS installation.",
  crossRefs:[{module:"DC-LEARN-005",level:"L8",topic:"BESS — grid-scale battery storage creates the emerging fire risk that requires UL 9540A fire assessment"},{module:"DC-LEARN-005",level:"L3",topic:"HVO & alternative fuels — HVO changes fuel MSDS and fire response procedures for generator rooms"}],

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q008-01",icon:"🔥",stage:"grammar",q:"What is the most common ignition source in DC fires?",options:["External lightning entering via cable routes — roughly 12% of recorded DC fire events","PSU failure — approximately 35% of DC fire incidents tracked by FM Global","HVAC motor or compressor faults — roughly 18% of DC fire incidents globally","Cabling insulation degradation under sustained overload — roughly 15% of DC fires"],correct:1,explain:"PSU failure accounts for approximately 35% and UPS/battery faults for approximately 25% of data centre fire incidents. Source: FM Global Property Loss Prevention Data Sheet 5-32."},
  {level:1,id:"Q008-02",icon:"🔥",stage:"logic",q:"Conventional optical detector at ceiling in DC with 2.0 m/s airflow. Why inadequate?",options:["High airflow dilutes smoke below optical threshold — fire burns 10–20 min before trigger","Optical sensitivity drifts in high-humidity environments — recalibration every 90 days needed","Airflow pushes smoke to perimeter walls before reaching ceiling-mounted detector heads","Optical wavelength cannot distinguish between dust particles and genuine smoke in DCs"],correct:0,explain:"Data centre cooling airflow at 2.0 m/s disperses smoke particles below the optical detection threshold. VESDA aspirating systems detect at concentrations 100–1,000× lower than conventional point detectors, providing 10–20 minutes of additional warning time."},
  {level:1,id:"Q008-03",icon:"🔥",stage:"rhetoric",q:"Developer: 'Smoke detectors and sprinklers — fire-safe.' Gap?",options:["Standard office detectors respond adequately when paired with higher-sensitivity alarm threshold settings and reduced spacing at 5m centres","The main gap is sprinkler water damage — switching to dry-pipe eliminates the equipment risk","Standard detectors too slow in airflow, wet sprinklers destroy equipment — DC needs VESDA, clean agent, pre-action","Sprinklers are never permitted inside data halls per Irish building regulations Part B"],correct:2,explain:"Data centre fire protection is fundamentally different from office environments. High airflow delays conventional detection by 10–20 minutes, during which fire can exceed suppression capacity. Wet sprinklers cause catastrophic equipment damage. The correct strategy layers VESDA early detection, gaseous clean agent suppression, and pre-action sprinklers as defence in depth."},
  {level:2,id:"Q008-04",icon:"🔎",stage:"grammar",q:"At what VESDA level does clean agent typically discharge?",options:["Alert level (0.02% obs/m) — first notification to the building management system","Action level (0.05% obs/m) — triggers operator investigation and HVAC isolation","Fire 1 level (0.1% obs/m) — activates HVAC shutdown and pre-alarm sequence","Fire 2 level (0.5% obs/m) — triggers clean agent suppression system discharge"],correct:3,explain:"Fire 2 at 0.5% obs/m triggers the clean agent discharge sequence. Fire 1 at 0.1% triggers HVAC shutdown to prevent smoke spread and agent dilution. Alert and Action are pre-fire investigation and response thresholds. Source: VESDA design guide."},
  {level:2,id:"Q008-05",icon:"🔎",stage:"logic",q:"VESDA at ceiling only in 600mm raised floor server room. Detection gap?",options:["No gap — ceiling VESDA aspirating sampling network captures all smoke particles because hot combustion gases rise naturally to ceiling level","Sub-floor is unmonitored — cable fire can burn 15+ min undetected. IS 3218 requires sub-floor coverage","Raised floor depth of 600mm is below the 800mm threshold requiring separate detection zones","VESDA pipe sampling range of 200m² already covers sub-floor via rack-level return air paths"],correct:1,explain:"IS 3218 Section 7 requires detection in all voids exceeding 200mm depth. A 600mm raised floor is well above this threshold. Cable fires in unmonitored sub-floor voids can burn for 15+ minutes before smoke reaches ceiling detectors, by which time fire may exceed agent suppression capacity."},
  {level:2,id:"Q008-06",icon:"🔎",stage:"rhetoric",q:"Cost engineer proposes optical detectors to save 60%. Response?",options:["VESDA detects 100–1,000× lower — optical takes 10–20 min, fire exceeds agent capacity. 60% saving risks total loss","Optical detectors are adequate when combined with reduced sampling point spacing at 3m centres","The 60% capital saving is fully offset by higher insurance premiums that typically add 35–40% to annual operating costs for the facility","Optical technology has closed the sensitivity gap to within 10× of aspirating in recent product generations"],correct:0,explain:"VESDA aspirating detection provides 100–1,000× greater sensitivity than conventional optical point detectors. In a data centre with 2.0+ m/s airflow, optical detectors can take 10–20 minutes to trigger — sufficient time for fire to exceed clean agent suppression capacity. The 60% capital saving creates catastrophic total-loss exposure."},
  {level:3,id:"Q008-07",icon:"🧯",stage:"grammar",q:"What is FM-200 GWP?",options:["GWP 1 — classified as a zero-impact agent under EU F-Gas regulation","GWP 675 — equivalent to the original Halon 1301 replacement benchmark","GWP 3,220 — subject to EU F-Gas phase-down quota restrictions","GWP 1,430 — the same global warming potential as R-134a refrigerant"],correct:2,explain:"FM-200 (HFC-227ea) has a global warming potential of 3,220, making it subject to EU F-Gas Regulation 2024/573 phase-down quotas. By contrast, Novec 1230 has GWP of 1, effectively exempt from F-Gas restrictions. Source: IPCC AR5; EU F-Gas Regulation Annex I."},
  {level:3,id:"Q008-08",icon:"🧯",stage:"logic",q:"DC has FM-200. Under EU F-Gas 2024/573, long-term risk?",options:["No risk because existing installed fire suppression systems are permanently grandfathered under the EU phase-down transition schedule","FM-200 is subject to phase-down — supply will be restricted and refill costs will escalate significantly","FM-200 is banned outright from 2025 under the revised regulation for new installations only","F-Gas regulation applies only to refrigerant circuits, not to fire suppression agent systems"],correct:1,explain:"EU F-Gas Regulation 2024/573 applies to ALL fluorinated gas systems including fire suppression. FM-200 (GWP 3,220) faces progressive supply restriction through quota reductions, increasing refill costs and limiting availability. Existing systems are not banned but become increasingly expensive to maintain. Planning a Novec 1230 transition mitigates this risk."},
  {level:3,id:"Q008-09",icon:"🧯",stage:"rhetoric",q:"Why does FM-200→Novec financial case strengthen over time?",options:["Novec 1230 manufacturer pricing is contractually declining at 5% per year through 2030","FM-200 cylinder pressure ratings degrade progressively over time requiring expensive high-pressure vessel replacement and recertification testing","Insurance underwriters are mandating Novec conversion with 18-month compliance deadlines","Supply restriction increases FM-200 refill costs progressively — each discharge is a carbon event at GWP 3,220"],correct:3,explain:"FM-200 economics deteriorate year-on-year as EU F-Gas quotas tighten supply and increase refill costs. Each accidental or genuine discharge at GWP 3,220 triggers carbon reporting obligations. Novec 1230 at GWP 1 eliminates both the supply risk and the emissions reporting burden, with the cost differential narrowing as FM-200 prices rise."},
  {level:4,id:"Q008-10",icon:"🔋",stage:"grammar",q:"What gases indicate early Li-ion thermal runaway?",options:["CO and H₂ — released before visible smoke at detectable concentrations","Methane and propane — released when electrolyte reaches decomposition temperature","Nitrogen and oxygen — displaced from the cell casing as internal pressure builds","Sulphur dioxide and chlorine — released from cathode material thermal decomposition"],correct:0,explain:"Carbon monoxide (CO) at ≥20 ppm and hydrogen (H₂) at ≥10% LEL are the earliest reliable indicators of Li-ion thermal runaway, detectable before visible smoke or flame. These gases are released during initial cell venting. Source: IEC 62619; EPRI Battery Energy Storage System guidance 2023."},
  {level:4,id:"Q008-11",icon:"🔋",stage:"logic",q:"DC replaces VRLA with Li-ion. FM-200 remains. Gap?",options:["No gap — FM-200 suppresses Li-ion fires through the same oxygen-displacement mechanism as VRLA","FM-200 reduces O₂ but Li-ion is self-oxygenating — thermal runaway cannot be stopped. Need CO/H₂ detection and HPWM","Larger FM-200 cylinder bank sized at 1.5× design concentration will achieve effective suppression of Li-ion thermal runaway events","Li-ion cells cannot enter thermal runaway when installed in data centre rack configurations below 48V"],correct:1,explain:"This is the most common gap in DC retrofit projects. FM-200 suppresses fire by reducing ambient oxygen concentration, but Li-ion thermal runaway is self-oxygenating — the cathode material releases its own oxygen. FM-200 cannot stop propagation. The correct response is CO/H₂ off-gas detection for early warning and high-pressure water mist (HPWM) for cooling."},
  {level:4,id:"Q008-12",icon:"🔋",stage:"rhetoric",q:"PM says Li-ion complete, FM-200 covers VRLA. Response?",options:["Adequate — FM-200 concentration at 7.9% vol handles both VRLA and Li-ion chemistry types","Additional FM-200 cylinders sized at 1.5× design concentration for the increased energy density will adequately close the suppression gap","Fire system must be redesigned — FM-200 cannot suppress thermal runaway. Do not energise until CO/H₂ detection and HPWM installed","Li-ion is inherently safer than VRLA due to sealed construction eliminating hydrogen venting risk"],correct:2,explain:"Any change in battery chemistry from VRLA to Li-ion is a mandatory fire system design trigger. FM-200 is fundamentally incapable of suppressing Li-ion thermal runaway regardless of concentration. The facility must not be energised with Li-ion until CO/H₂ off-gas detection and high-pressure water mist suppression are commissioned and verified."},
  {level:5,id:"Q008-13",icon:"💧",stage:"grammar",q:"Key difference between single and double-interlock pre-action?",options:["Single interlock uses copper pipework while double interlock requires stainless steel throughout","Both types fill on detection — the difference is double interlock uses two separate detection zones","Single fills on detection but no water flows — double requires both detection and head activation","Double requires BOTH detection zone activation AND sprinkler head opening before water flows"],correct:3,explain:"Double-interlock pre-action requires two independent conditions: the detection system must activate AND at least one sprinkler head must open from heat exposure. Single-interlock fills the pipework on detection alone, creating water-damage risk from a single false alarm. Double interlock is preferred in data centres. Source: EN 12845."},
  {level:5,id:"Q008-14",icon:"💧",stage:"logic",q:"Hot aisle 43°C, 57°C heads. Risk?",options:["EN 12845 requires 30°C margin — 43+30=73°C minimum. 57°C heads at 14°C margin risk false activation","No risk — 57°C rated heads are the standard selection for all commercial server environments","Heads never falsely activate because the thermal glass-bulb element requires sustained radiant heat exposure for 3+ minutes to trigger release","The 14°C differential does not affect sprinkler operation because hot aisle containment limits exposure time"],correct:0,explain:"EN 12845 Table 4 requires sprinkler head ratings at minimum 30°C above maximum expected ambient temperature. With hot aisle at 43°C, the minimum head rating is 73°C. Installing 57°C heads creates only 14°C margin — well below the 30°C requirement — risking false activation from normal operating temperatures."},
  {level:5,id:"Q008-15",icon:"💧",stage:"rhetoric",q:"'Why pre-action when we have clean agent?'",options:["Pre-action is unnecessary when the clean agent system is properly designed with adequate cylinder reserve capacity and verified hold time","Clean agent handles incipient fire — pre-action is backstop if agent fails, re-ignites, exits zone, or exceeds capacity","Pre-action is always sufficient as the primary system without needing clean agent as a supplementary layer","The correct approach is to replace the clean agent entirely with pre-action as the single suppression system"],correct:1,explain:"Defence in depth is the governing principle: VESDA provides early warning, clean agent suppresses incipient fire, and pre-action sprinklers are the backstop for scenarios where the agent fails, fire re-ignites after hold time, fire occurs outside the protected zone, or fire energy exceeds agent capacity. No single layer is sufficient alone."},
  {level:6,id:"Q008-16",icon:"🧱",stage:"grammar",q:"EN 50600-2-1 fire resistance for IT hall?",options:["REI 30 minimum — standard commercial office fire resistance classification","REI 90 minimum — aligned with UPS room fire resistance requirements","REI 60 minimum — the base requirement for IT hall fire compartmentation","REI 120 minimum — matching the generator room fire resistance requirement"],correct:2,explain:"EN 50600-2-1 Section 6 specifies REI 60 as the minimum fire resistance for IT hall compartmentation. UPS rooms require REI 90 and generator rooms require REI 120 due to higher fuel loads and fire severity. Source: EN 50600-2-1 Table 2."},
  {level:6,id:"Q008-17",icon:"🧱",stage:"logic",q:"200 cable runs, no firestopping. Consequence?",options:["Minimal impact — fire-rated walls retain approximately 80% of their tested performance rating even without formal penetration seals installed","Sealing is only required where cable bundles exceed 50mm diameter per EN 1366-3 requirements","Only 10% of penetrations need sealing — those carrying power cables above 100A rating per IS 3217","200 unsealed penetrations void the fire boundary completely — fire and smoke spread in minutes regardless of REI"],correct:3,explain:"Every unsealed penetration through a fire-rated boundary voids the compartmentation at that point. With 200 unsealed cable runs, the fire rating is effectively zero — fire and smoke will propagate through the wall in minutes regardless of the wall's tested REI rating. Source: EN 1366-3 fire-stopping for service penetrations."},
  {level:6,id:"Q008-18",icon:"🧱",stage:"rhetoric",q:"Fire-rated walls, no management-of-change for seals. Problem?",options:["Every modification can compromise the boundary without re-certification — fire rating silently degrades over time","MOC is not needed because fire-rated walls are tested to maintain performance through normal building modifications","Only new buildings require MOC processes — existing facilities are assessed at the annual fire risk assessment only","Seals are permanent once installed — they do not degrade and do not require ongoing management or verification"],correct:0,explain:"Fire compartment integrity degrades with every unmanaged modification — new cable runs, removed seals, HVAC duct changes, or equipment mounting penetrations. Without a management-of-change process, each modification silently reduces the fire rating. Re-certification to EN 1366-3 is required after every penetration to maintain the rated boundary."},
  {level:7,id:"Q008-19",icon:"💨",stage:"grammar",q:"Min clean agent hold time per ISO 14520?",options:["2 minutes — sufficient for personnel evacuation from the protected zone before agent dissipates","5 minutes — the standard retention period for commercial office fire suppression systems","10 minutes — verified by door fan integrity testing per ISO 14520 Annex E methodology","30 minutes — required to ensure complete fire extinguishment including deep-seated cable fires"],correct:2,explain:"ISO 14520 Annex E specifies a minimum 10-minute hold time for clean agent at design concentration. This is verified by door fan integrity testing which measures the enclosure's air-tightness and calculates predicted retention time. Source: ISO 14520-1 Annex E."},
  {level:7,id:"Q008-20",icon:"💨",stage:"logic",q:"HVAC runs during discharge. What happens?",options:["Airflow dilutes agent below design concentration — 20–40 ACH replaces room air in 1.5–3 min, suppression fails","HVAC distributes the clean agent more evenly throughout the entire protected zone volume, improving overall suppression effectiveness","No measurable effect because clean agent density is higher than air and settles below HVAC diffuser level","HVAC concentration sensors automatically increase agent discharge volume to compensate for dilution losses"],correct:0,explain:"Data centre HVAC systems operate at 20–40 air changes per hour. At this rate, room air is replaced every 1.5–3 minutes, diluting the clean agent below its design extinguishing concentration almost immediately. HVAC must be shut down BEFORE agent discharge — this is typically triggered at VESDA Fire 1 level (0.1% obs/m)."},
  {level:7,id:"Q008-21",icon:"💨",stage:"rhetoric",q:"Door fan: 7 min (10 required). Accept?",options:["Close enough to the 10-minute requirement — the 30% margin in ISO 14520 accounts for this variance","The 7-minute result is acceptable provided the clean agent system manufacturer issues a formal written variance approval letter and acceptance","Only Novec 1230 systems require the full 10-minute hold time — FM-200 systems can operate at 7 minutes","7 min means agent leaks too fast — seal all penetrations and retest above 10 min. €5k–€15k sealing protects a €500k–€2M system"],correct:3,explain:"A door fan test result of 7 minutes against a 10-minute requirement means the enclosure cannot hold agent concentration long enough to suppress fire. The room has envelope leakage — typically unsealed cable penetrations, door gaps, or damper failures. Sealing costs €5k–€15k but protects the entire €500k–€2M suppression system investment. Integrity IS the system."},
  {level:8,id:"Q008-22",icon:"📋",stage:"grammar",q:"Irish FRA review frequency?",options:["Once at building handover — the initial assessment remains valid for the building lifetime","Annually at minimum, and immediately upon any material change to the building or its use","Every 5 years — aligned with the local authority fire safety certificate renewal cycle","Only when the fire authority specifically requests a review following an inspection visit"],correct:1,explain:"Under the Fire Services Act 1981/2003 and the Safety, Health and Welfare at Work Act 2005, fire risk assessments must be reviewed at least annually and immediately following any material change — including equipment changes, layout modifications, occupancy changes, or chemistry changes such as VRLA to Li-ion battery replacement."},
  {level:8,id:"Q008-23",icon:"📋",stage:"logic",q:"Li-ion added, FRA not updated. Consequences?",options:["No consequences — battery systems are covered under the original electrical installation risk assessment","Supplier responsibility only — the battery vendor's ATEX documentation satisfies the FRA requirement","FRA fails to cover thermal runaway risk, HF gas exposure, or system gaps — safety file misinforms brigade on PPE","Not required because Li-ion systems below 20 kWh are exempt from fire risk assessment obligations in Ireland"],correct:2,explain:"The building safety file is a life-safety document. When Li-ion batteries are installed without updating the FRA, the fire risk assessment fails to address thermal runaway propagation, hydrogen fluoride (HF) toxic gas exposure, and the gap between existing FM-200 suppression and Li-ion fire behaviour. The fire brigade response plan references the safety file — incorrect information means wrong PPE and wrong tactics."},
  {level:8,id:"Q008-24",icon:"📋",stage:"rhetoric",q:"Office-template FRA for DC. Missing?",options:["DC-specific hazards: Li-ion thermal runaway, O₂ depletion, raised floor voids, electrical density, HVAC smoke paths","Nothing material is missing — office FRA templates cover the core fire triangle assessment adequately","Only VESDA-specific maintenance schedules and sub-floor detection zones need adding — all other fire risks are common across commercial building types","Different cover page and building classification code — the hazard assessment content is substantively identical"],correct:0,explain:"A data centre presents at minimum six unique hazards that office-template FRAs do not address: Li-ion thermal runaway and HF gas production, oxygen depletion from clean agent discharge, raised floor void fire propagation, extreme electrical density and arc flash risk, high fuel load from cable mass, and HVAC-driven smoke distribution. Source: FM Global 5-32 data centre fire hazard analysis framework."},
  {level:9,id:"Q008-25",icon:"⚠️",stage:"grammar",q:"Toxic gas from Li-ion thermal runaway?",options:["CO₂ only — released at concentrations proportional to the number of cells in thermal runaway","Nitrogen dioxide — released from the anode graphite decomposition at temperatures above 300°C","Ozone — generated by electrical arcing between short-circuited cell terminals during thermal events","HF (hydrogen fluoride) — a 2 MWh BESS can produce approximately 40 kg, varying by cell chemistry"],correct:3,explain:"Hydrogen fluoride (HF) is the primary toxic gas concern from Li-ion thermal runaway. HF has an IDLH (immediately dangerous to life or health) concentration of just 30 ppm. A 2 MWh BESS can produce approximately 40 kg of HF, though exact quantities vary by cell chemistry, state of charge, and ventilation conditions. Source: EPRI 2023; NFPA 855."},
  {level:9,id:"Q008-26",icon:"⚠️",stage:"logic",q:"BESS 5m from air intake. Why critical?",options:["Adequate separation — NFPA 855 minimum clearance for outdoor BESS installations is 3 metres","HF gas drawn into DC cooling system within minutes at 5m separation — minimum 10–15m from air intakes required","No toxic gas risk at this distance because HF is heavier than air and disperses at ground level only","Standard HVAC intake filters rated to F7 classification effectively remove HF gas at concentrations below 100 ppm"],correct:1,explain:"At only 5 metres from HVAC air intakes, HF gas from a BESS thermal runaway event would be drawn directly into the data centre cooling system within minutes. Standard HVAC filters do not remove HF gas. NFPA 855 Chapter 14 recommends minimum 10–15 metre separation from building air intakes. Source: NFPA 855 Ch 14."},
  {level:9,id:"Q008-27",icon:"⚠️",stage:"rhetoric",q:"'EN 50600 compliant — no BESS assessment needed.' Response?",options:["Correct — EN 50600-2-5 Section 7.3 explicitly covers BESS thermal runaway scenarios and separation distances","EN 50600 compliance has no bearing on BESS requirements because battery installations fall under separate electrical installation safety codes entirely","EN 50600 predates BESS adoption — does not cover thermal runaway, HF, or deflagration. NFPA 855 additionally required","EN 50600 is being updated with BESS-specific annexes expected in Q3 2026 — defer assessment until publication"],correct:2,explain:"EN 50600 was developed before widespread BESS deployment in data centre environments and does not address thermal runaway propagation, HF toxic gas production, deflagration risk, or minimum separation distances. NFPA 855 provides the supplementary framework. EN 50600 compliance is necessary but not sufficient for facilities with BESS installations. Standards lag technology."}
]

const GLOSSARY_008 = [
  {term:"VESDA",def:"Very Early Smoke Detection Apparatus. Aspirating system that draws air through a pipe network to a laser detection chamber. Detects smoke at 100–1,000× lower concentration than conventional detectors."},
  {term:"Aspirating Smoke Detection",def:"Detection method that actively draws air samples through pipes to a central detector. Overcomes the dilution problem of high-airflow environments like data centres."},
  {term:"Clean Agent Suppression",def:"Gaseous fire suppression that extinguishes fire by removing heat or inhibiting chemical chain reactions without leaving residue. FM-200 and Novec 1230 are the two main agents used in data centres."},
  {term:"FM-200 (HFC-227ea)",def:"Halocarbon clean agent with GWP 3,220. Effective fire suppressant but subject to EU F-Gas phase-down. Increasingly expensive to service and refill."},
  {term:"Novec 1230 (FK-5-1-12)",def:"Fluoroketone clean agent with GWP 1. Preferred replacement for FM-200. Not subject to F-Gas restrictions. Higher initial cost but lower lifecycle cost."},
  {term:"GWP (Global Warming Potential)",def:"Measure of how much heat a greenhouse gas traps relative to CO₂ over 100 years. FM-200: 3,220. Novec 1230: 1. Lower is better."},
  {term:"Thermal Runaway",def:"Self-sustaining exothermic reaction in a Li-ion cell. Generates its own oxygen — conventional clean agent suppression cannot stop it. Onset: 130–150°C. Peak: 600–900°C."},
  {term:"Pre-action Sprinkler",def:"Sprinkler system where pipes contain no water until activation conditions are met. Prevents accidental water discharge onto live IT equipment."},
  {term:"Double Interlock",def:"Pre-action sprinkler configuration requiring both fire detection signal AND physical head activation before water enters pipes. Provides two independent confirmations."},
  {term:"Single Interlock",def:"Pre-action sprinkler where detection signal alone fills pipes with water. A damaged head can then discharge. Less protection against false discharge than double interlock."},
  {term:"Fire Compartment",def:"Zone bounded by fire-rated construction (walls, floors, doors) that contains fire and smoke for a rated period. Allows evacuation and limits damage."},
  {term:"REI Rating",def:"European fire resistance classification. R = structural load-bearing (Resistance). E = integrity against flames/hot gases. I = insulation against heat transfer. Number = minutes."},
  {term:"Penetration Seal",def:"Fire-rated seal around services (cables, pipes, ducts) passing through fire-rated barriers. Without sealing, every penetration voids the fire compartment rating."},
  {term:"Hold Time",def:"Minimum duration a clean agent must maintain design concentration. ISO 14520 requires 10 minutes minimum for data centres. Verified by door fan integrity test."},
  {term:"Door Fan Test",def:"Pressurisation test that measures air leakage from a suppression zone. Verifies whether the room can maintain agent concentration for the required hold time."},
  {term:"Room Integrity",def:"The ability of a suppression zone to retain clean agent at design concentration for the required hold time. Measured by door fan test per ISO 14520 Annex E."},
  {term:"HVAC-FAS Interface",def:"Integration between fire alarm system and HVAC that shuts down ventilation on fire detection. Prevents agent being evacuated and smoke being distributed."},
  {term:"Fire Damper",def:"Passive device that closes when its fusible link melts at rated temperature. Prevents fire spread through ductwork. Resets manually."},
  {term:"Smoke Damper",def:"Active device controlled by fire alarm system. Closes on signal to prevent smoke spread through ductwork. Can be reset remotely."},
  {term:"FRA (Fire Risk Assessment)",def:"Systematic evaluation of fire hazards, people at risk, and adequacy of fire precautions. Required under Irish fire safety legislation. Must be DC-specific, not generic commercial."},
  {term:"IS 3218:2013+A1:2019",def:"Irish Standard for fire detection and alarm systems. Specifies design, installation, commissioning, and maintenance. Mandates sub-floor detection in voids >200mm."},
  {term:"EN 50600-2-5:2021",def:"European standard for data centre security and fire protection. Part of the EN 50600 series governing DC design and operation."},
  {term:"NFPA 75",def:"Standard for the Fire Protection of Information Technology Equipment. US standard widely referenced for DC fire protection design internationally."},
  {term:"NFPA 2001",def:"Standard on Clean Agent Fire Extinguishing Systems. Governs design, installation, and maintenance of gaseous suppression systems."},
  {term:"ISO 14520",def:"International standard for gaseous fire-extinguishing systems. Covers design, installation, testing, and maintenance. Annex E specifies room integrity testing."},
  {term:"EN 12845",def:"European standard for automatic sprinkler systems. Covers design, installation, and maintenance. Table 4 specifies temperature ratings for sprinkler heads."},
  {term:"CO/H₂ Detection",def:"Gas detection for carbon monoxide and hydrogen — early warning indicators of Li-ion thermal runaway. Detects cell failure 5–15 minutes before visible smoke."},
  {term:"HPWM (High Pressure Water Mist)",def:"Water mist system operating above 35 bar producing droplets under 200 microns. Cools Li-ion cells during thermal runaway with 90% less water than conventional sprinklers."},
  {term:"F-Gas Regulation",def:"EU Regulation 2024/573 on fluorinated greenhouse gases. Phases down production and use of high-GWP F-gases including HFC-227ea (FM-200). Drives transition to low-GWP alternatives."},
  {term:"Intumescent Seal",def:"Fire-stopping material that expands when heated, sealing gaps around penetrations. Used in cable transits, pipe penetrations, and joints in fire-rated construction."},
  {term:"Fire Strategy Document",def:"Comprehensive document describing all fire safety measures for a building. Required for planning and building control. Must be maintained throughout building life."},
  {term:"BESS (Battery Energy Storage System)",def:"Large-scale battery installation for energy storage. Introduces thermal runaway risk requiring specific fire protection beyond standard clean agent systems."},
  {term:"Cascade Prevention",def:"Engineering measures to prevent thermal runaway propagation between battery modules. Includes physical separation, thermal barriers, and ventilation."},
  {term:"Sensitivity Level",def:"VESDA detection threshold. Alert (0.02%/m), Action (0.05%/m), Fire 1 (0.1%/m), Fire 2 (0.5%/m). Each triggers progressively more urgent response."},
  {term:"Defence in Depth",def:"Fire protection philosophy using multiple independent layers. Detection (VESDA) → suppression (clean agent) → containment (sprinklers) → compartmentation (fire walls). Each layer covers the failure mode of the layer above."}
];

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Runtime Error'),
      React.createElement('p',null,'DC-LEARN-008 v4.4.8 · Fire Safety for Irish Data Centres'),
      React.createElement('pre',{style:{fontSize:12,background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,overflow:'auto',whiteSpace:'pre-wrap'}},String(this.state.error)),
      React.createElement('p',{style:{color:'#6b7280',fontSize:13,marginTop:8}},'Copy this error and send to LM.')
    );
    return this.props.children;

}

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

const hasTextSelection = () => { const sel = window.getSelection(); return sel && sel.toString().length > 0; };

}

function GrammarPanel({level,onComplete,done}){
  const [expandedFact,setExpandedFact]=useState(null);
  const [checkedItems,setCheckedItems]=useState({});
  const toggleFact=(i)=>{ if(!hasTextSelection()) setExpandedFact(expandedFact===i?null:i); };
  const toggleCheck=(i)=>setCheckedItems(prev=>({...prev,[i]:!prev[i]}));
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--grammar)',fontSize:16,fontWeight:600,marginBottom:12}}>📖 Grammar — What Is It?</h3>
      {level.grammar.facts.map((f,i)=>(
        <div key={i} className="fact-card" role="button" tabIndex={0} aria-expanded={expandedFact===i}
          onClick={()=>toggleFact(i)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleFact(i)}>
          <div className="term">{f.term}</div>
          {expandedFact===i && (
            <div className="fade-in selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} style={{userSelect:'text',cursor:'text'}}>
              <div className="def">{f.definition}</div>
              <div className="detail">{f.plain}</div>
              <div className="detail" style={{fontStyle:'normal'}}>📊 {f.number}</div>
              <div className="std">{f.standard}</div>
              {f.soWhat && <div style={{fontStyle:'italic',color:'var(--grammar)',fontSize:13,marginTop:8,lineHeight:1.6}}>{f.soWhat}</div>}
              <AssistBar fact={f} stage="grammar" level={level} />
            </div>
          )}
        </div>
      ))}
      {level.grammar.whatItLooksLike && (
        <div className="card selectable-text" style={{marginTop:14}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>What It Looks Like on Site</h4>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{level.grammar.whatItLooksLike}</div>
        </div>
      )}
      {level.grammar.siteChecklist && (
        <div style={{marginTop:14}}>
          <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>Site Checklist</h4>
          {level.grammar.siteChecklist.map((item,i)=>(
            <label key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6,fontSize:13,color:'var(--text)',cursor:'pointer'}}>
              <input type="checkbox" checked={!!checkedItems[i]} onChange={()=>toggleCheck(i)} style={{marginTop:3}} />
              <span>{item}</span>
            </label>
          ))}
        </div>
      )}
      <button className={'completion-btn btn-grammar'+(done?' done':'')} onClick={onComplete}>
        {done ? '✓ Key facts memorised' : "I've memorised the key facts"}
      </button>
      {level.sourceNote && (
        <div style={{marginTop:14,fontSize:12,color:'var(--text-dim)',lineHeight:1.8,borderLeft:'3px solid var(--grammar)',paddingLeft:12}}>
          {level.sourceNote}
        </div>
      )}
      <div style={{marginTop:14,background:'var(--panel)',border:'1px solid var(--grammar)',borderRadius:10,padding:'12px 14px'}}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--grammar)',marginBottom:6}}>💡 Feynman Clarify</h4>
        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>Expand any Grammar fact and click <strong>💡 Clarify</strong> to cycle through three learning rounds: an everyday analogy, a first-principles explanation, and a self-test question. Each round uses original content — not a repetition of the visible definition.</div>
      </div>
    </div>
  );
}

function LogicPanel({level,onComplete,done}){

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].lvl.level),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

function Walkthrough({title, subtitle, steps, insight, narrative, takeaway, children}) {
  const [step, setStep] = useState(0);
  return (
    <div className="card">
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:2}}>{title}</div>
      <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:14}}>{subtitle}</div>
      <div className="step-row">
        {steps.map((s,i) => (
          <button key={i} onClick={() => setStep(i)} className="step-btn"
            style={{border:step===i?'1px solid var(--accent)':'1px solid var(--border)',
              background:step===i?'rgba(88,166,255,0.15)':'transparent',
              color:step===i?'var(--accent)':'var(--text-dim)',fontWeight:step===i?600:400}}>
            {i+1}. {s}
          </button>
        ))}
      </div>
      {typeof children === 'function' ? children(step) : children}
      {insight && step === steps.length - 1 && (
        <div className="fade-in" style={{marginTop:12,padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid var(--warn)',borderRadius:8,fontSize:12,color:'var(--text-bright)',lineHeight:1.6}}>{insight}</div>
      )}
      {narrative && <NarrativePanel text={narrative} takeaway={takeaway}/>}
    </div>
  );
}

      narrative="This cross-section shows a data centre room with three critical sampling zones. The ceiling zone catches smoke rising from the hot aisle. The sub-floor zone monitors the raised floor void where cables run — the most common location for undetected fires. The hot aisle zone captures smoke carried by server exhaust before it dilutes. Conventional point detectors mounted at the ceiling miss sub-floor fires entirely and struggle in high airflow."

      narrative="This three-step diagram shows the critical fire response sequence. Step 1 shows the wrong scenario — HVAC continues running during a fire, diluting smoke below VESDA thresholds and later diluting clean agent below effective concentration. Step 2 shows the correct sequence: VESDA Fire 1 triggers HVAC shutdown within 10 seconds, dampers close, and VESDA Fire 2 triggers agent discharge into a sealed, still room. Step 3 shows the failure mode — what happens when the FAS-BMS interface is not wired or not tested."

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  // Master 1s tick — drives both global elapsed and per-question countdowns

    if(timerActive){

      intervalRef.current=setInterval(()=>{
        const now=Date.now();
