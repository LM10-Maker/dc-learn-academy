    sarah:"Li-ion safety compliance requires IEC 62619 and EN 50600. Fire system must match the installed chemistry.",
    tom:"Fire system redesign for Li-ion: €100k–€300k per UPS room (Tier 3 — FM Global DS 5-33; manufacturer published, indicative). Must be included in every UPS upgrade budget."

  scenario:{title:"The Lead-Acid to Li-ion Upgrade",narrative:"Clonshaugh replaces lead-acid UPS on 3 floors with Li-ion (6→20 kW/rack). PM says FM-200 adequate.",question:"Is FM-200 adequate? What changes?",answer:"FM-200 is NOT adequate for Li-ion battery installations. The critical difference: Li-ion undergoes thermal runaway — a self-sustaining exothermic reaction that generates its own oxygen. FM-200 extinguishes by absorbing heat; it cannot interrupt thermal runaway because the cell generates internal heat regardless of the agent concentration surrounding it. FM-200 may suppress visible flame while the cell continues reacting, leading to re-ignition after the hold time expires.\n\nFour changes are required at Clonshaugh:\n\n1. Early gas detection: verify that CO and H₂ sensors are included in the UPS room specification. Li-ion thermal runaway off-gasses CO and H₂ before any visible smoke — these sensors provide minutes of advance warning that VESDA alone cannot deliver. Required per FM Global Data Sheet 5-33 and NFPA 855.\n\n2. High-pressure water mist (HPWM) at ≥35 bar: water mist suppresses flame and — critically — cools the battery externally, limiting cell-to-cell thermal runaway propagation. This is the FM Global-endorsed suppression method for Li-ion installations. FM-200 remains as a supplementary layer but is not the primary agent.\n\n3. Physical separation: 300mm clear separation between battery modules with non-combustible barriers, limiting propagation between modules.\n\n4. Building safety file update: change of battery chemistry is a material alteration requiring a revised Fire Risk Assessment, updated building safety file, and insurer notification before the new UPS is energised.\n\nIndicative cost: €100k–€300k per floor (Tier 3 — FM Global DS 5-33; manufacturer published). Three floors at Clonshaugh: €300k–€900k total. Sources: FM Global DS 5-33; NFPA 855; IS 3218:2013+A1:2019.",
whoShouldCare:["mark","tom"]},
  retrofitRelevance:"Every DC that has upgraded from lead-acid to Li-ion UPS without reviewing the fire system has an unmitigated thermal runaway risk. This is the #1 fire safety gap in DC retrofits.",

{
  id:"L5", level:5, name:"Pre-action Sprinklers", icon:"💧",
  available:true,
  component:"Sprinkler System",
  userNeedStatement:"Understand why pre-action double-interlock sprinklers are specified for DC IT spaces as backstop to clean agent.",
  plainEnglish:"Wet pipe sprinklers keep water in pipes — leak = servers destroyed. Pre-action keeps pipes dry until two signals confirm fire.",
  grammar:{
    facts:[
      {term:"Pre-action Sprinkler",definition:"System where pipes contain no water until two conditions are met.",plain:"Pipes empty until real fire. Two confirmations: alarm AND head melts open.",number:"Double interlock: BOTH detection AND head opening required.",standard:"EN 12845 Clause 4.4.4; NFPA 13",feynman:{analogy:"A pre-action sprinkler is like a fire hose that's locked behind two doors. The pipes are dry and empty until a separate detection system confirms there's a real fire — only then does water fill the pipes and discharge through opened heads.",firstPrinciples:"Pre-action systems hold pipes dry until activated by an independent detection signal. This prevents accidental water discharge from a broken head or pipe leak. In a data centre, accidental water discharge causes equipment damage equivalent to the fire itself.",theTest:"Why are pre-action sprinklers specified instead of wet pipe sprinklers in data centres? Wet pipe sprinklers contain pressurised water that discharges immediately if a head breaks or pipe leaks. Pre-action pipes are dry, preventing accidental discharge."},soWhat:"Pre-action sprinklers keep pipes dry until a confirmed fire — eliminating the accidental discharge risk that makes wet pipe systems unacceptable in data centres."},
      {term:"Double Interlock",definition:"Requires detection AND sprinkler head opening before water enters.",plain:"Safest for DC. Two independent confirmations before water.",number:"EN 12845 recommendation for IT spaces.",standard:"EN 12845 Clause 4.4.4; NFPA 13 Sec 8.3.2",feynman:{analogy:"A bank vault that requires two separate keys turned simultaneously — neither key alone opens it. Double interlock sprinklers need both a detection system signal AND a sprinkler head to physically melt before water flows.",firstPrinciples:"Single interlock fills pipes on detection signal alone; heads discharge when they melt. Double interlock requires both the detection system signal and physical head activation. This second layer of confirmation virtually eliminates accidental discharge in critical spaces.",theTest:"What two independent conditions must both be met before a double-interlock pre-action sprinkler discharges water? The fire detection system must send an activation signal AND the individual sprinkler head must physically activate from heat."},soWhat:"Double interlock requires two independent confirmations before water flows — it is the only configuration that protects against both false alarm discharge and broken head discharge."},
      {term:"Temperature Ratings",definition:"Glass bulb breaks at rated temperature. Must account for ambient.",plain:"Glass bulb breaks at set temperature. 40°C hot aisle + 57°C head = too close.",number:"57°C green. 68°C red. 79°C yellow. Hot aisle: min 68°C.",standard:"EN 12845 Table 4; BS EN ISO 6182-1",feynman:{analogy:"A chocolate bar melts at a different temperature than a candle. Sprinkler heads work the same way — they come in different melt temperatures. In a hot aisle at 43°C, you need heads rated well above that or they'll trigger from normal operating heat, not fire.",firstPrinciples:"Sprinkler heads contain a heat-sensitive element that activates at a specific temperature. The activation temperature must be at least 30°C above the maximum ambient temperature. Data centre hot aisles routinely reach 40–45°C, requiring heads rated at 79°C or higher.",theTest:"A hot aisle runs at 43°C. What is the minimum sprinkler head temperature rating, and why? 79°C (intermediate rating). The head must be rated at least 30°C above maximum ambient to prevent false activation."},soWhat:"A 57°C sprinkler head in a 43°C hot aisle has only 14°C margin — well below the 30°C required by EN 12845, creating a false activation risk."},{term:"Double Interlock Pre-action System",definition:"Pre-action sprinkler requiring two independent signals before water enters pipes: detector activation AND sprinkler head operation. Dual protection against accidental discharge.",plain:"Water only flows when both the fire alarm says fire AND a sprinkler head has melted from heat. Two locks, two keys, both needed.",number:"False discharge: ~1 in 70 million/year (double interlock) vs ~1 in 16 million (single). Pipe fill time: 30-60 seconds after both conditions met.",standard:"BS EN 12845; NFPA 13; EN 50600-2-5; FM Global DS 5-32",feynman:{analogy:"Think of a bank vault with two locks held by two different people. Both must agree to open. In a DC, accidental water discharge is catastrophic, so the double lock is worth the extra seconds.",firstPrinciples:"In single interlock, detector activation alone pressurises pipes. A leaking head then discharges water. In double interlock, both detection AND head operation are required. Only then does the valve open. This virtually eliminates accidental discharge from either a false alarm or a damaged head acting alone.",theTest:"A contractor breaks a sprinkler head in a DC with single interlock. Detection is in alarm from construction dust. What happens? The valve is open, pipes pressurised, broken head discharges water onto IT equipment. With double interlock, the broken head alone cannot cause discharge."},soWhat:"Double interlock virtually eliminates accidental water discharge — the engineering trade-off is 30–60 seconds additional pipe fill time, which is acceptable with clean agent as primary."},{term:"Sprinkler Head Selection for DC",definition:"Choice of sprinkler head type, temperature rating, and K-factor for DC. Must balance response speed with avoiding accidental operation in warm environments.",plain:"DC sprinkler heads must be chosen carefully. The hot aisle can reach 40-45C, so standard 57C heads would be too close to accidental activation.",number:"Standard head: 57C (too low for hot aisle). Intermediate: 68C or 79C (typical DC). High temp: 93C (above-rack in very hot zones). K-factor: K80 or K115 typical.",standard:"BS EN 12845; NFPA 13; EN 50600-2-5",feynman:{analogy:"Think of setting the trigger temperature on a thermostat. Too close to normal temperature and it activates routinely. Too high and it responds too slowly to a real fire. DC heads must be rated above hot aisle ambient but low enough to activate quickly in a real fire.",firstPrinciples:"Sprinkler heads activate when a fusible element reaches its rated temperature. In a DC hot aisle at 40-45C, a standard 57C head has only 12-17C margin. Temporary cooling loss or solar gain could cause accidental activation. Intermediate-rated heads (68C or 79C) provide adequate margin while still activating quickly in a genuine fire.",theTest:"Hot aisle runs at 42C. Standard 57C heads installed. Cooling fails for 2 hours in summer. What happens? Temperature could rise to 50-60C from trapped exhaust heat. At 57C, heads may activate, discharging water onto live IT equipment during a cooling failure, not a fire. This is why 68C or 79C heads are specified."},soWhat:"Hot aisle containment changes the ambient temperature above racks — every containment retrofit must include a sprinkler head reselection review."}
    ],
    whatItLooksLike:"Pre-action valve in riser. Dry pipes above racks. Green bulbs (57°C) cold aisle, red/yellow (68°C+) hot aisle. Air compressor supervisory pressure.",
    siteChecklist:["Valve — double or single interlock?","Supervisory pressure — positive = dry","Head colours in hot aisle — green = wrong","Commissioning record — detection-only, no pipe fill","Last valve test? Annual per EN 12845"]
  },
  logic:{
    causeAndEffect:[
      {cause:"Wet pipe sprinkler systems maintain pressurised water in all pipes at all times. In a data centre environment, any pipe leak, joint failure, or accidental head damage causes immediate water discharge onto live IT equipment. The risk is continuous and independent of any fire event.",effect:"The data centre industry standard is pre-action double interlock, where pipes are maintained dry and pressurised with supervisory air. Water only enters the pipes when both a detection signal is received AND a sprinkler head physically activates from heat. This eliminates the risk of accidental discharge from mechanical damage or pipe failure.",insight:"Double interlock does not sacrifice fire protection performance — it provides the same suppression capability as wet pipe once activated. The trade-off is 30–60 seconds of pipe fill time after activation, which is acceptable because clean agent is the primary suppression and sprinklers are the backstop. The false-discharge prevention is worth far more than the marginal delay."},
      {cause:"Hot aisle containment raises the ambient temperature above the racks to 40–45°C during normal operation. Standard 57°C sprinkler heads (green bulb) have only 12–17°C margin above this ambient — well below the 30°C minimum margin required by EN 12845 Table 4.",effect:"With only 12–17°C margin, a temporary cooling loss on a warm day can push the ambient to 50–55°C, causing 57°C heads to activate from normal operating heat rather than fire. This discharges water onto live equipment during a cooling failure — compounding one problem with another. The sprinkler system designed to protect the servers destroys them.",insight:"EN 12845 Table 4 requires sprinkler heads rated at least 30°C above the maximum expected ambient temperature. For a hot aisle at 43°C, the minimum rating is 73°C — the nearest standard rating is 79°C (yellow bulb). Every hot aisle containment retrofit must include a sprinkler head reselection review against the new ambient conditions."},{cause:"Pre-action valve fails to open during a real fire event because internal components have corroded from standing water or condensation in the valve body. This is particularly common in Dublin where water chemistry is aggressive to brass and bronze valve internals",effect:"Sprinkler heads activate from heat but no water flows. System completely ineffective. Fire grows unchecked.",insight:"Pre-action valves must be tested quarterly with full trip test annually. Valve corrosion common in Dublin water. Replace internals per manufacturer schedule."}
    ],
    constraintLesson:"Pre-action frequently specified correctly then compromised during installation. Three common failures: single interlock used instead of double, standard heads in hot aisles, detection interface not commissioned.",
    weakestLink:{whatsWrong:"We have pre-action — protected against water discharge.",whatsRight:"Single vs double interlock. Only double protects against false alarm discharge.",howToGetThere:"Check valve nameplate for 'double interlock'. Confirm detection-only test where pipes did NOT fill."}
  },
  rhetoric:{
    declan:{hook:"There are two types of pre-action sprinkler. Double interlock requires both a fire detector signal and a sprinkler head operation before water is released. Single interlock requires only one.",text:"Declan, there are two types of pre-action sprinkler and the difference matters enormously. Single interlock fills the pipes with water the moment the detection system triggers an alarm — if a sprinkler head is damaged or missing, water discharges immediately onto live equipment. Double interlock requires both a detection signal AND a sprinkler head to physically activate from heat before water enters the pipes. Check the valve nameplate in the riser room: it must say double interlock. If it says single, you have a false-discharge risk every time the fire alarm activates."},
    ann:{hook:"A false sprinkler discharge in a live server hall costs 2 to 5 million euros in equipment damage. Double interlock pre-action eliminates the false discharge risk — single interlock does not.",text:"Ann, a false sprinkler discharge in a live server hall causes equipment damage of €500k–€5M+ depending on the zone size and equipment value (Tier 2 — FM Global 5-32; insurance industry data, indicative). Insurance typically covers the equipment replacement cost, but not the business interruption — tenant SLA penalties, lost revenue, and reputational damage. Double-interlock pre-action eliminates the false-discharge risk by requiring two independent confirmations before water flows. The premium difference between single and double interlock is 10–15% of system cost. Against the potential loss, this is the clearest risk management decision in fire protection."},
    mark:{hook:"Double interlock confirmation and valve nameplate verification are mandatory before accepting any pre-action system. The control panel must confirm the interlock logic matches the design specification.",text:"Mark checks whether double interlock is confirmed and verified on the valve nameplate during commissioning. The VESDA Fire 2 signal must be hard-wired to the pre-action solenoid valve — not via the BMS, which introduces a software dependency into a life-safety circuit. Sprinkler heads in hot aisles must be rated at minimum 68°C (red bulb) or 79°C (yellow) per EN 12845 Table 4, with a 30°C margin above maximum ambient. Check supervisory air pressure monthly — a drop indicates a pipe leak or head damage that could cause discharge if the valve opens."},
    sarah:{hook:"Pre-action double interlock is required by EN 50600-2-5 for Integrity Class 3 and above. A single interlock system in a Tier III or Tier IV facility is a compliance gap against the standard.",text:"Sarah, pre-action double-interlock sprinklers are required by EN 50600-2-5 for IT spaces and are a standard condition of FM Global and major insurance policies for data centres. A facility operating with single interlock pre-action — or worse, wet-pipe sprinklers — in IT spaces may trigger a policy exclusion clause. This is a due diligence finding that must be flagged: confirm the interlock type on site, not from drawings, because single interlock systems are sometimes installed despite double interlock being specified due to cost-driven substitution during construction."},
    tom:{hook:"The cost premium for double interlock over single interlock pre-action is approximately 15 to 25 percent on the sprinkler system cost. One false discharge event costs substantially more than that premium.",text:"Tom, the cost premium for double interlock over single interlock pre-action is approximately 10–15% of the sprinkler system cost — typically €15k–€25k on a €150k system (Tier 3 — Tyco/Johnson Controls published ranges; SCSI benchmarks, indicative). The risk being mitigated is accidental water discharge onto live IT equipment: €500k–€5M+ per event in direct damage, plus uncapped business interruption. This is the clearest cost-benefit calculation in data centre fire protection. There is no credible engineering or financial argument for single interlock in an IT space."}
  },
    rhetoricTakeaways:{
    declan:"Check the valve nameplate — single or double interlock. And check head colours in the hot aisle — green 57°C means replace.",
    ann:"False sprinkler discharge: €500k–€5M+ (Tier 2 — FM Global 5-32; insurance industry data, indicative). Insurance covers equipment, not downtime. Double-interlock is the risk management choice.",
    mark:"Double interlock on valve. VESDA Fire 2 to solenoid. 68°C minimum in hot aisle. Supervisory air pressure monthly.",
    sarah:"Pre-action double-interlock is the EN 50600 and insurance industry requirement. Single interlock may trigger policy exclusions.",
    tom:"Double-interlock premium over single: 10–15%. Against €1M+ potential water damage (Tier 2 — FM Global 5-32; insurance industry data, indicative), this is the clearest value decision in fire protection."
  },
  scenario:{title:"The Hot Aisle Temperature Check",narrative:"Clonshaugh: contained hot aisles, 20 kW/rack. All heads 57°C. Max hot aisle: 43°C.",question:"Is the spec correct?",answer:"The hot aisle sprinkler specification is INCORRECT. The 57°C heads are appropriate for cold aisles but create a spurious activation risk in contained hot aisles.\n\nThe calculation: EN 12845 requires the sprinkler head temperature rating to exceed the maximum expected ambient temperature by a minimum margin of 30°C. At Clonshaugh’s maximum hot aisle temperature of 43°C (reasonable for 20 kW/rack contained aisles), the minimum head rating is 43 + 30 = 73°C. The 57°C heads are rated 16°C below this threshold — under sustained hot aisle operation, these heads may activate spuriously, discharging water onto live 20 kW/rack equipment.\n\nAction: replace all hot aisle heads rated at 57°C with 79°C-rated heads (yellow colour code — the nearest standard EN 12845 rating above 73°C) before commissioning acceptance.\n\nConsequence of spurious activation: in a pre-action double-interlock system, a single head activation alone should not release water — a concurrent detection signal is also required. However, if the system is incorrectly specified as single-interlock, or if a detection alarm coincides with the spurious head activation, water will discharge onto live 20 kW/rack servers across the full contained aisle. The damage scenario is total-aisle loss.\n\nCold aisle heads at 57°C are correct. Cold aisle supply temperatures at Clonshaugh are ≤24°C under ASHRAE A1 operation — well within the 30°C margin.\n\nVerify the full head schedule with the project fire engineer before acceptance. Source: EN 12845; IS 3218:2013+A1:2019.",
whoShouldCare:["declan","mark"]},
  retrofitRelevance:"Hot aisle containment retrofit changes the ambient temperature above racks. Any sprinkler heads in the containment must be re-evaluated against EN 12845 Table 4 temperature requirements.",
  crossRefs:[{module:"DC-LEARN-002",level:"L2",topic:"Rack airflow management — hot aisle containment raises ambient temperature, requiring sprinkler head reselection"},{module:"DC-LEARN-004",level:"L5",topic:"Cooling strategies — containment retrofit changes fire protection environment"}],
  sourceNote:"EN 12845 Clause 4.4.4 (T1); NFPA 13 (T1). Temperature: EN 12845 Table 4 (T1). FM Global 5-32 (T2).",
  clockQuote:"Declan had never priced a fire suppression retrofit. He'd never needed to. But Mark wasn't in the room, and the building needed numbers that the maintenance log couldn't provide. So he found them himself.",
  cascadeCheck:(level)=>{
    // Clonshaugh: sprinkler interlock type TBC, head temp in hot aisle TBC
    const hotAisleTemp = 43; // °C measured
    const headTemp = 57; // °C green bulb
    const margin = headTemp - hotAisleTemp; // 14°C, need 30°C per EN 12845
    return {needed:"79°C heads in hot aisle (30°C margin)",available:headTemp+"°C heads ("+margin+"°C margin)",unit:"",pass:false,detail:"EN 12845: need 30°C margin. Have "+margin+"°C — false activation risk in hot aisle."};
  }

{
  id:"L6", level:6, name:"Fire Compartmentation", icon:"🧱",
  available:true,
  component:"Compartmentation & REI",
  userNeedStatement:"Understand EN 50600 compartmentation, fire resistance ratings, and why penetration sealing is the most commonly failed compliance item.",
  plainEnglish:"Compartmentation is passive fire protection. Every cable, duct, pipe through a fire wall must be fire-stopped. One unsealed penetration defeats the entire compartment.",
  grammar:{
    facts:[
      {term:"Fire Compartment",definition:"Enclosed area bounded by fire-resisting construction.",plain:"Fireproof box. Fire stays inside for 60–120 minutes.",number:"EN 50600-2-1: IT halls REI 60. UPS REI 90. Generator REI 120.",standard:"EN 50600-2-1 Sec 6; IS 3218:2013+A1:2019",feynman:{analogy:"Watertight compartments on a ship prevent a hull breach from sinking the entire vessel. Fire compartments in a data centre do the same thing — fire-rated walls and doors contain a fire to one zone, preventing it from taking out the whole facility.",firstPrinciples:"Fire compartmentation divides a building into isolated zones. Fire-rated barriers resist fire penetration for a specified duration. This limits fire spread, protects evacuation routes, and allows firefighting to focus on the affected zone only.",theTest:"What fire resistance rating does EN 50600-2-1 specify for IT hall compartments? REI 60 minimum — the compartment must maintain load-bearing capacity (R), integrity (E), and insulation (I) for at least 60 minutes."},soWhat:"A fire compartment only works if every element maintains its rating — one unsealed penetration voids the entire boundary."},
      {term:"REI Rating",definition:"R=load-bearing, E=integrity, I=insulation. REI 120 = all three for 120 min.",plain:"R=won't collapse. E=fire/smoke won't pass. I=other side stays cool.",number:"REI 60: IT halls. REI 90: UPS. REI 120: generators, fuel, transformers.",standard:"EN 13501-2; EN 50600-2-1",feynman:{analogy:"REI is like a report card for a fire wall with three subjects: R for staying standing, E for not letting flames through, and I for not getting hot on the safe side. REI 90 means it passes all three for 90 minutes.",firstPrinciples:"R (Résistance) = structural load-bearing capacity under fire. E (Étanchéité) = integrity against flame and hot gas penetration. I (Isolation) = thermal insulation keeping the unexposed face below critical temperature. The number is the duration in minutes.",theTest:"What do the letters R, E, and I stand for in a fire resistance rating? R = load-bearing capacity (Résistance), E = integrity against flames and hot gases (Étanchéité), I = thermal insulation of the unexposed face (Isolation)."},soWhat:"REI ratings specify three independent properties — a wall can resist heat transfer but still allow smoke through if integrity is compromised."},
      {term:"Penetration Sealing",definition:"Sealing openings in fire-rated elements where services pass through.",plain:"Every hole must be sealed to wall standard. Unsealed = open door.",number:"Typical DC: 50–200 cable, 10–30 duct, 5–15 pipe penetrations per room.",standard:"EN 1366-3; IS 3218:2013+A1:2019",feynman:{analogy:"A dam with holes drilled through it for pipes is only as watertight as the seals around those pipes. Every cable, pipe, and duct that passes through a fire wall creates a hole — and every unsealed hole is a route for fire to bypass the wall entirely.",firstPrinciples:"Service penetrations through fire-rated barriers compromise the barrier's rating. Firestopping materials restore the fire rating around each penetration. In data centres with hundreds of cable runs, penetration sealing is the most commonly failed compliance item.",theTest:"Why is penetration sealing the most commonly failed fire compliance item in data centres? Data centres have hundreds of cable penetrations through fire walls. Each unsealed penetration reduces the wall's effective fire rating to zero at that point."},soWhat:"Every cable, pipe, and duct that passes through a fire wall must be sealed to the same rating as the wall — unsealed penetrations are the most common compartmentation failure."},{term:"Fire-Rated Cable Transits",definition:"Proprietary systems for sealing cable penetrations through fire walls while maintaining compartment rating. Must accommodate future cable additions.",plain:"Every cable through a fire wall needs sealing to the same fire rating as the wall. The seal must allow future cables without destroying the fire rating.",number:"Rating must match wall: REI 60 or REI 120. Re-enterable systems: allow future cables. Intumescent sealant: expands at ~150C to seal gaps.",standard:"EN 50600-2-5; IS 3218:2013+A1:2019; EN 1366-3 (penetration seals); BS 476 Part 20",feynman:{analogy:"Think of a door in a dam wall. The door must be as watertight as the dam, but you need to open it later to run more pipes. Fire-rated cable transits must seal as well as the wall but allow future additions.",firstPrinciples:"Fire compartmentation is only as good as its weakest penetration. Cable transits are the most common penetration. Re-enterable systems use modular blocks that can be opened to add cables without destroying the seal. Single-use foam must be completely removed and replaced to add one cable.",theTest:"A fire wall is REI 120. Fifty cables pass through, sealed with intumescent foam. An engineer needs to add 10 more. What happens? The foam must be cut, cables added, and penetration re-sealed and re-certified. A re-enterable modular system avoids this problem."},soWhat:"Cable transits are the most frequently modified penetrations in a data centre — every modification requires re-certification or the rating is voided."},{term:"Fire Door Discipline",definition:"Operational regime ensuring fire-rated doors in DC compartment boundaries are kept closed or on hold-open devices that release on alarm. Never propped open.",plain:"A fire door propped open with a wedge is not a fire door. It is a hole in the wall. Fire doors must close automatically on alarm.",number:"Rating: FD60 or FD120 to match wall. Hold-open: electromagnetic, releases on fire alarm. Self-closing: door closer rated for 60 min minimum.",standard:"IS 3218:2013+A1:2019; EN 50600-2-5; BS 476 Part 22; Building Regulations Part B",feynman:{analogy:"Think of watertight doors on a ship. They close automatically on flood alarm. A watertight door propped open means one compartment flooding sinks the ship. Fire doors in a DC are the same.",firstPrinciples:"Fire compartmentation depends on every opening being controlled. Doors are the weakest point because they are operated daily. A fire-rated wall with a propped door has zero resistance at that opening. Electromagnetic hold-open devices allow normal operation but release on alarm. Regular inspection must verify closers work and no doors are wedged.",theTest:"A DC has REI 120 walls between data hall and electrical room. The door is FD120 but wedged open. Fire starts in the electrical room. What happens? The alarm activates but the wedged door stays open. Fire and smoke pass freely into the data hall. The REI 120 wall is completely bypassed."},soWhat:"A fire door held open by a wedge or failed closer has zero fire resistance — door discipline is an operational requirement, not just an installation one."}
    ],
    whatItLooksLike:"Fire-rated walls with intumescent-sealed transits. Fire dampers in ducts. Fire doors with self-closers. Firestop collars on plastic pipes.",
    siteChecklist:["Verify compartment boundaries on as-built drawings","Inspect penetration seals","Fire dampers — actuator and fusible link?","Fire doors — self-closers, intumescent strips, not propped?","Firestop certificates available?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"New cables are added through fire-rated wall penetrations during routine cabling works, but the firestopping seal is not re-installed after the cables are pulled. The cabling contractor treats the penetration as a cable route, not a fire boundary, and the firestopping is not in their scope of works.",effect:"A single unsealed penetration in an REI 60 fire-rated wall voids the fire rating at that point entirely. Fire and smoke will travel through the unsealed opening within minutes, regardless of the construction standard of the surrounding wall. The compartment that was designed to contain fire for 60 minutes fails in under 10.",insight:"This is the most commonly failed fire compliance item in live data centres. Every cabling modification that passes through a fire-rated boundary must include firestopping reinstatement and certification as part of the work scope — not as an afterthought discovered at the next audit."},
      {cause:"Fire dampers installed in ductwork penetrating fire-rated walls are not tested after installation and are never tested during the operational life of the building. The fusible link mechanism or motor actuator degrades over time, and the damper blade may be obstructed by duct modifications or debris.",effect:"A fire damper that does not close when required allows fire and smoke to spread through the ductwork to every connected space. A single failed damper can compromise the compartmentation of multiple zones, extending smoke damage far beyond the fire origin and potentially into occupied areas.",insight:"IS 3218 requires annual testing of fire dampers and smoke dampers. Many data centres neglect this because the dampers are concealed above ceilings or in risers and are difficult to access. A damper testing programme with access panel installation is essential — the cost of access panels is trivial against the consequence of a damper that does not close."},{cause:"Cable penetrations through fire-rated barriers are sealed using general-purpose expanding foam rather than tested and certified fire-stopping products. This is often a contractor shortcut — expanding foam is cheap, fast, and visually fills the gap, but it has no fire resistance rating",effect:"Foam may not achieve rated resistance. During fire, foam shrinks or melts, allowing fire and smoke through. Compartmentation fails at that penetration.",insight:"Only tested and certified fire-stop systems (EN 1366-3) should be used. Expanding foam is not a fire-rated product. Inspect for certification labels at every penetration."}
    ],
    constraintLesson:"Passive fire protection is the last line. It degrades silently.\n\nFire Stopping Construction Sequence (Live DC):\n1. Remove existing fire stopping at the penetration\n2. Install new cable containment through the opening\n3. Install support framing if seal thickness exceeds wall thickness\n4. Pack mineral wool fire batt to required depth (200mm minimum)\n5. Apply intumescent seals around all penetrations on both sides\n6. Certify the completed installation\n\n⚠️ Fire Watch: Between steps 1 and 5, fire compartment is breached. Fire watch mandatory. Allow 2–3 days per penetration.",
    weakestLink:{whatsWrong:"Fire stopping is quick — do all in a day.",whatsRight:"Each requires sequential removal, installation, re-sealing, certification. Fire watch during breach.",howToGetThere:"Sequence fire stopping. Fire watch during open periods. Per-penetration certification."}
  },
  rhetoric:{
    declan:{hook:"Walk the cable routes and check every penetration seal in every fire-rated wall. After any expansion work, unsealed transits are the most common fire safety defect found.",text:"Declan, walk the cable routes and check every penetration seal in every fire-rated wall. I have never inspected a live data centre and found every penetration correctly sealed — there is always at least one that was broken open during a cabling project and never re-sealed. One unsealed penetration in an REI 60 wall reduces the effective fire rating of that wall to zero at that point. Fire and smoke will travel through the unsealed penetration in minutes, regardless of how well the rest of the wall was built. A monthly visual inspection of penetration seals should be part of the facilities maintenance schedule."},
    ann:{hook:"Fire compartmentation is one of the specific items that insurance underwriters inspect before renewal. An unsealed cable transit is visible and is a premium loading trigger.",text:"Ann, fire compartmentation is one of the specific items that insurance underwriters inspect at renewal — they will check that fire-rated boundaries are maintained, that penetration seals are intact, and that fire doors are operational. Failed or missing seals discovered during an underwriter inspection typically result in a compliance condition with a 60–90 day remediation deadline, and premiums may be loaded 10–20% until the condition is cleared. More critically, a fire that spreads through an unsealed penetration may void the claim entirely if the insurer can demonstrate that compartmentation was not maintained."},
    mark:{hook:"An REI 120 fire-rated wall with a single unsealed 100 mm cable transit fails the fire compartment. The fire spreads in minutes. The intumescent seal costs 50 euros and takes 30 minutes to install.",text:"Mark, an REI 120 fire-rated wall with a single 100mm unsealed cable transit will allow fire and smoke to pass through in under 10 minutes regardless of the wall rating — the penetration is the weakest point. Every penetration must be sealed to EN 1366-3 and certified by the firestopping contractor. After any cabling modification, the seal must be re-installed and re-certified. I'd check that the O&M manual includes a firestopping register recording every penetration, its seal type, installation date, and last inspection date. Without this register, maintaining compartmentation over a 20-year building life is impossible."},
    sarah:{hook:"EN 50600-2-1 specifies fire compartmentation requirements by zone type. Missing or damaged seals are a direct Taxonomy DNSH compliance gap under the climate change adaptation requirement.",text:"Sarah, EN 50600-2-1 specifies fire compartmentation requirements by zone type, and compliance requires not just correct initial construction but ongoing maintenance of fire-rated boundaries. A facility that was built to specification but has had hundreds of cabling modifications since handover may no longer comply if penetration seals were not re-certified after each modification. This is a common ESG due diligence finding: the building was compliant at handover, but operational changes have degraded the fire compartmentation below the standard. Request the firestopping register and check the last audit date."},
    tom:{hook:"Firestopping survey for a 400-rack facility at 5 to 20 thousand euros depending on complexity. A full remediation programme after a survey finding: 10 to 50 thousand euros. Both are manageable.",text:"Tom, a firestopping survey of a typical 400-rack facility costs €5k–€20k depending on the number of fire-rated boundaries and penetrations (Tier 3 — Hilti/Rockwool/3M published rates; SCSI benchmarks, indicative). Remediation costs €200–€500 per penetration for standard cable transits (Tier 3 — Hilti/Rockwool/3M published rates; SCSI benchmarks, indicative), with specialist seals for large multi-service penetrations costing more. A typical survey of a 2013-vintage facility finds 20–50 defective penetrations, giving a remediation budget of €10k–€25k (Tier 3 — Hilti/Rockwool/3M published rates; SCSI benchmarks, indicative). Against a potential fire loss of €5M–€50M+ (Tier 2 — FM Global 5-32; insurance industry data, indicative) for a single hall, this is the most cost-effective fire protection investment after detection — and it requires no operational shutdown to implement."}
  },
    rhetoricTakeaways:{
    declan:"Every unsealed cable penetration voids the fire rating of that wall. Check the firestopping register after every modification.",
    ann:"Fire compartmentation is the difference between a contained incident and a total facility loss.",
    mark:"REI 60 minimum for IT halls. REI 90 for UPS rooms. Every penetration sealed and certified to EN 1366-3.",
    sarah:"Compartmentation integrity is a planning condition and building control requirement — degradation triggers regulatory exposure.",
    tom:"Firestopping remediation: €200–€500 per penetration (Tier 3 — Hilti/Rockwool/3M published rates; SCSI benchmarks, indicative). A single unsealed penetration can void the entire compartment rating."
  },
  scenario:{title:"The Post-Expansion Audit",narrative:"Clonshaugh: 100-rack expansion 6 months ago. Audit finds 47 unsealed penetrations. Firestopping not in cabling contract.",question:"Immediate risk and actions?",answer:"Forty-seven unsealed cable penetrations void the fire compartment. Every unsealed penetration is a pathway for smoke, flame, and toxic gases between compartments. The server room fire compartment as currently built does not meet the design specification and cannot be insured as designed or accepted under the Building Control Acts.\n\nImmediate risk: if a fire ignites in any adjacent compartment, smoke and flame propagate freely into the server room through 47 separate uncontrolled pathways. The clean agent system protects the room — but only while the compartment is intact. An unsealed compartment vents agent immediately on discharge; effective hold time may be measured in seconds rather than minutes.\n\nRequired actions:\n1. Certified firestopping at all 47 penetrations: use EI 60 or EI 120-rated intumescent products appropriate to the wall/floor fire separation requirement. Indicative cost: 47 × €350 = €16,450 (Tier 3 — Hilti/Rockwool/3M published service rates).\n2. Sequenced hot works programme: 2–3 penetrations per working day under hot works permit with fire watch maintained throughout.\n3. Management-of-change process: establish a written MoC procedure requiring fire engineer sign-off before any future cable installation penetrates a fire-rated boundary.\n4. Insurer notification: the compartment breach must be reported. Concealing a known compartment failure invalidates the policy.\n5. Full facility survey: if the expansion cabling contract omitted firestopping, earlier works phases may have the same deficiency. Commission a penetration audit of the entire Clonshaugh facility, not just the expansion zone.\n\nDoor fan integrity test required on completion to verify compartment restoration. Source: IS 3218:2013+A1:2019; Building Control Acts 1990/2014; IEC 60331.",
whoShouldCare:["mark","declan"]},
  retrofitRelevance:"Every DC expansion project must include firestopping in the cabling contract scope. Omitting it is the most common project management failure in DC fire safety.",
  crossRefs:[{module:"DC-LEARN-003",level:"L6",topic:"Single points of failure — failed fire compartment turns a single-zone event into a multi-zone catastrophe"},{module:"DC-LEARN-014",level:"L7",topic:"Structural & fire integrity — liquid cooling pipework penetrations need fire-rated sealing"}],
  sourceNote:"EN 50600-2-1 Sec 6. EN 13501-2. EN 1366-3. EN 15650. IS 3218:2013+A1:2019 Sec 13. Construction sequencing: BSRIA BG 6/2018 (Tier 2).",
  clockQuote:"The cost of keeping the FM-200 wasn't just the annual service charge. It was the replacement cost when the supply ran out, the recharge cost when the system activated, and the compliance cost that nobody had budgeted because nobody had calculated the CO₂-equivalent.",

{
  id:"L7", level:7, name:"Smoke Control & HVAC Integration", icon:"💨",
  available:true,
  component:"FAS-BMS Integration",
  userNeedStatement:"Understand smoke control, HVAC-FAS integration, and the critical sequence: detect → shut HVAC → suppress → ventilate.",
  plainEnglish:"HVAC moves huge air volumes. In fire, it moves smoke throughout in minutes. HVAC must stop BEFORE suppression — otherwise agent is diluted.",
  grammar:{
    facts:[
      {term:"Smoke Control",definition:"Strategy for managing smoke movement during fire.",plain:"Detect → shut HVAC → close dampers → discharge → ventilate after confirmed.",number:"HVAC shutdown BEFORE suppression. Fire 1 → HVAC → Fire 2 → discharge.",standard:"IS 3218:2013+A1:2019; EN 50600-2-1; NFPA 2001 Sec 5.4",feynman:{analogy:"After putting out a kitchen fire, you open windows to clear the smoke so you can breathe again. Smoke control in a data centre works the same way — dedicated systems extract toxic smoke after suppression so the space can be safely re-entered.",firstPrinciples:"Fire produces toxic smoke that is often more dangerous than the fire itself. After suppression, smoke and depleted-oxygen air must be removed before re-entry. Smoke control systems use dedicated extract fans and air paths separate from the normal HVAC system.",theTest:"Why can't the normal HVAC system be used for post-fire smoke extraction? HVAC systems must shut down during fire to avoid spreading smoke and disrupting clean agent concentration. Dedicated smoke extract systems operate independently after suppression is complete."},soWhat:"Smoke damages more equipment than fire in a data centre — the smoke control strategy determines how far the damage zone extends."},
      {term:"HVAC-FAS Interface",definition:"Connection between Fire Alarm System and BMS.",plain:"Fire alarm tells AC to stop. If not wired/tested, AC runs during fire.",number:"Volt-free contacts FAS→BMS. Shutdown within 10 sec. Test every 6 months.",standard:"IS 3218:2013+A1:2019 Sec 16; EN 50600-2-1",feynman:{analogy:"If a fire alarm goes off in a building but the air conditioning keeps running, it blows smoke into every room and dilutes the fire-fighting gas. The HVAC-FAS interface is the handshake between the fire system and the cooling system — when one says 'fire', the other says 'stop'.",firstPrinciples:"HVAC systems move large volumes of air. During a fire event, this airflow spreads smoke and reduces clean agent concentration. The Fire Alarm System must command HVAC shutdown before agent discharge. The critical sequence is: detect, shut HVAC, suppress, ventilate.",theTest:"What is the correct sequence when a fire is detected in a data centre IT hall? Detect → shut down HVAC → discharge clean agent → hold time → ventilate. HVAC must stop before agent discharge to maintain concentration."},soWhat:"If HVAC does not shut down on fire alarm, the clean agent is extracted from the room and smoke is distributed through the building — this interface is mission-critical."},
      {term:"Hold Time",definition:"Time agent must be maintained at design concentration.",plain:"Gas must stay at concentration long enough. Room sealed, HVAC off.",number:"10 min min per ISO 14520/NFPA 2001. FM-200: 7.0%. Novec: 5.9%.",standard:"ISO 14520-9/10; NFPA 2001 Sec 5.4",feynman:{analogy:"Holding a plaster on a cut for 10 minutes lets the bleeding stop. Hold time is the same idea — keeping the suppression gas at full concentration for at least 10 minutes to ensure the fire is completely extinguished and doesn't reignite.",firstPrinciples:"Fire can reignite from hot surfaces if suppression agent dissipates too quickly. ISO 14520 requires maintaining design concentration for a minimum of 10 minutes. Hold time depends on room integrity — every leak reduces effective hold time.",theTest:"A door fan test shows 7 minutes hold time against a 10-minute requirement. What is the consequence? The clean agent system does not meet ISO 14520. The fire may reignite after the gas leaks out, and the system cannot be certified as compliant."},soWhat:"10 minutes minimum hold time means the room must retain agent concentration for 10 minutes after discharge — every gap, crack, and unsealed penetration works against this."},{term:"HVAC Fire Mode Sequence",definition:"Pre-programmed HVAC operations on fire alarm: fan shutdown, damper closure, pressurisation, smoke extract. Order and timing are critical.",plain:"When fire alarm triggers, HVAC must execute a precise sequence. Stop fans, close dampers, start smoke extract. Getting the order wrong spreads smoke faster.",number:"Fan shutdown: within 30 seconds. Damper closure: within 60 seconds. Smoke extract: within 120 seconds. Sequence verification: at commissioning and annually.",standard:"EN 50600-2-5; IS 3218:2013+A1:2019; BS 9999; CIBSE Guide E",feynman:{analogy:"Think of an aircraft emergency checklist. The pilot does not improvise. Shutting down the wrong system first makes things worse. HVAC fire mode is the same: sequence and timing are critical.",firstPrinciples:"The HVAC system is the primary smoke distribution pathway. If fans continue running during a fire, they spread smoke through ductwork to every room. Correct sequence: (1) stop recirculation fans, (2) close fire dampers, (3) activate smoke extract. If dampers close before fans stop, pressure spike damages ductwork.",theTest:"Fire in Data Hall A. HVAC serves Halls A and B. Dampers close but fan was not stopped first. What happens? The running fan pressurises ductwork between closed dampers, potentially forcing smoke through gaps or damaging duct joints."},soWhat:"The HVAC fire mode sequence must be tested quarterly — a sequence that works on paper but not in reality means the agent discharge is wasted."},{term:"Smoke Damper vs Fire Damper",definition:"Fire dampers prevent fire spread through ducts (thermal link at 72C). Smoke dampers prevent smoke spread (activated by fire alarm signal). Combined fire/smoke dampers do both.",plain:"A fire damper stops flames. A smoke damper stops smoke. In a DC, smoke does more damage than fire, so you need both or a combined unit.",number:"Fire damper: activates at 72C. Smoke damper: activates on electrical signal. Combined: both thermal and electrical. Testing: fire dampers annually, smoke dampers 6-monthly.",standard:"EN 15650 (fire dampers); EN 13501; IS 3218:2013+A1:2019; BS 9999",feynman:{analogy:"Think of two types of valve on a gas pipe. One closes when hot (fire damper, last resort). The other closes on an emergency button (smoke damper, early response). In a DC the alarm-activated smoke damper is more important because smoke travels through ducts long before flames.",firstPrinciples:"Fire travels through ducts slowly. The duct must heat to 72C before a thermal damper activates. But smoke travels at airflow speed, reaching every room within minutes. A fire damper alone does not stop smoke. Smoke dampers close on the alarm signal, stopping smoke as soon as detection occurs.",theTest:"A DC has thermal-only fire dampers at every wall. A small electrical fire produces heavy smoke but limited heat. Fire in Hall A. What happens to Hall B? Smoke travels through ductwork to Hall B within minutes. Thermal dampers stay open because duct temperature has not reached 72C. Hall B fills with smoke. Smoke dampers would have closed on alarm within seconds."},soWhat:"Smoke dampers close on signal, fire dampers close on temperature — specifying the wrong type means the wrong trigger and the wrong response time."}
    ],
    whatItLooksLike:"Dampers in every duct at boundary. HVAC panel with fire inputs. Motorised actuators. Post-suppression exhaust fans.",
    siteChecklist:["FAS-BMS wired/tested — HVAC shuts on Fire 1?","Fire dampers at boundary ducts?","Door fan — hold time >10 min?","HVAC no auto-restart after discharge?","Post-suppression ventilation — who initiates?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"The HVAC system continues to operate during and after clean agent discharge because the fire alarm system is not correctly interfaced with the BMS, or the interface was never commissioned, or the control sequence was modified during a BMS software update without fire system verification.",effect:"CRAH units and AHU fans continue to circulate air at 20–40 air changes per hour, actively extracting the clean agent from the suppression zone. The agent concentration never reaches or sustains the design level. The €30k–€80k agent charge (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) is discharged, diluted, and exhausted without suppressing the fire. The fire continues to grow unchecked.",insight:"The FAS-HVAC interface is the single most important fire system integration in a data centre. A suppression system without working HVAC shutdown is an agent storage system, not a fire protection system. Hard-wire the interface — do not rely on BMS software sequences for life-safety functions."},
      {cause:"Annual door fan integrity testing reveals that the suppression zone hold time has dropped from 12 minutes at commissioning to 6 minutes — below the 10-minute minimum required by ISO 14520. The degradation occurred gradually over 2–3 years of cabling works, HVAC modifications, and general wear on door seals.",effect:"At 6 minutes hold time, the clean agent concentration drops below the extinguishing threshold before the fire is fully suppressed. Re-ignition is likely. The suppression system discharge is partially effective at best, and a second discharge may be needed — if the cylinders have been refilled, which requires 6–12 weeks lead time for FM-200.",insight:"Room integrity degrades incrementally with every modification. No single change is dramatic enough to trigger a review, but the cumulative effect is measurable. Annual door fan testing catches the degradation before it crosses the 10-minute threshold. The cost of the test is €2k–€5k (Tier 3 — BS EN 15004; manufacturer published service rates, indicative). The cost of discovering the problem during a real fire is the loss of the facility."},{cause:"The HVAC system has no integration with the fire alarm system and no automatic fire mode sequence. The BMS and FAS were installed by different contractors and never commissioned as an integrated system. There is no hard-wired signal path between fire detection and HVAC shutdown",effect:"Fire alarm activates but HVAC continues running. Fans spread smoke through ductwork to every connected space. Smoke damage extends far beyond fire origin.",insight:"HVAC fire mode interface must be commissioned and tested as part of fire alarm system. Annual testing must include HVAC shutdown verification. This is frequently missed."}
    ],
    constraintLesson:"Clean agent + HVAC + compartment = ONE fire safety system. If any one fails, suppression fails.\n\nThe sequence is: VESDA Fire 1 → HVAC shutdown (within 10 seconds) → dampers close → hold time confirms sealed → VESDA Fire 2 → suppression discharge.\n\nIf HVAC doesn't stop, the agent is diluted. If the room leaks, the agent escapes. If dampers don't close, smoke spreads. Three systems, one fire safety outcome.",
    weakestLink:{whatsWrong:"We have FM-200 and VESDA. Complete.",whatsRight:"Without HVAC shutdown and hold time >10 min, agent won't reach or maintain concentration.",howToGetThere:"1. FAS-BMS: HVAC stops in 10 sec. 2. Door fan: >10 min. 3. Annual cycle."}
  },
  rhetoric:{
    declan:{hook:"During the next fire alarm test, watch the CRAHs. If they keep running after the alarm activates, the HVAC-FAS interface is not working — and the agent will not hold design concentration.",text:"Declan, during the next fire alarm test, watch the CRAHs. If they keep running after the alarm triggers, your clean agent system is effectively useless — the HVAC will extract the agent from the room faster than it can suppress the fire. A data centre with 20–40 air changes per hour can replace the entire room volume in 1.5–3 minutes. If the HVAC does not shut down within 30 seconds of Fire 1, the agent discharged at Fire 2 will be diluted below suppression concentration before it can act. Fix the FAS-to-BMS interface before anything else."},
    ann:{hook:"A clean agent suppression system costs 500 thousand to 2 million euros per room. If the hold time fails because the HVAC interface was never tested, that investment is not delivering the protection it was purchased for.",text:"Ann, a clean agent suppression system costs €500k–€2M per room depending on size and agent type (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative). A door fan integrity test costs €2k–€5k (Tier 3 — BS EN 15004; manufacturer published service rates, indicative). The €5k test is what validates whether the €2M system will actually work when needed — without it, you have an expensive installation with no proof of performance. If the HVAC does not shut down on fire alarm, or if the room has developed leaks since the last test, the agent will dissipate before suppression is complete. This is a €5k annual investment that protects a multi-million euro asset."},
    mark:{hook:"FM-200 design concentration is 7.0 percent by volume per NFPA 2001. A door fan integrity test under 15 percent leakage area is required to confirm 10-minute hold time. Test annually.",text:"Mark, FM-200 design concentration is 7.0% by volume per NFPA 2001. A typical data centre hall has 20–40 air changes per hour from CRAH units. Without HVAC shutdown, the entire room air volume is replaced in 1.5–3 minutes — meaning the clean agent concentration drops below the extinguishing threshold before suppression can complete. The HVAC-FAS interface must be hard-wired: Fire 1 signal shuts down all CRAH units and closes smoke dampers. Fire 2 signal triggers agent discharge. This sequence must be tested quarterly with witnessed results recorded in the fire log."},
    sarah:{hook:"The HVAC-FAS interface testing regime is a requirement of IS 3218 and EN 50600-2-5. Without documented testing records, the fire strategy compliance claim is not supportable.",text:"Sarah, the HVAC-FAS interface and its testing regime are requirements of IS 3218:2013+A1:2019 and EN 50600-2-5. Test records must be retained for the life of the system and made available for insurance renewal inspection and regulatory audit. A facility that cannot demonstrate quarterly HVAC shutdown testing has a compliance gap that affects both the fire certificate validity and the insurance policy conditions. For ESG reporting, this is a physical risk management control that should be verified annually as part of the asset sustainability assessment."},
    tom:{hook:"Door fan integrity test at 2 to 5 thousand euros per suppression zone. Annual requirement. If the zone fails, remediation costs 5 to 20 thousand euros. Far less than a suppression failure event.",text:"Tom, a door fan integrity test costs €2k–€5k per suppression zone (Tier 3 — BS EN 15004; manufacturer published service rates, indicative). Remedial sealing of identified leak paths typically costs €5k–€20k (Tier 3 — Hilti/Rockwool/3M published rates; SCSI benchmarks, indicative) depending on the number and complexity of penetrations. For a facility with four suppression zones, the annual testing programme costs €8k–€20k (Tier 3 — BS EN 15004; BS 5306; manufacturer published service rates, indicative). Against the cost of a failed clean agent discharge — €30k–€80k for agent re-release (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) alone, plus potential equipment damage if the fire is not suppressed — the testing programme is essential operational expenditure. Budget it as a recurring line item, not a discretionary maintenance task."}
  },
    rhetoricTakeaways:{
    declan:"HVAC shutdown on fire alarm must be tested quarterly. If it does not work, the agent is evacuated and smoke spreads through the building.",
    ann:"HVAC-FAS interface failure means suppression agent is extracted from the room. Hold time drops to zero.",
    mark:"Smoke dampers on signal, fire dampers on temperature. HVAC shutdown sequence: Fire 1 = HVAC off. Fire 2 = agent discharge.",
    sarah:"Smoke control is an EN 50600 and IS 3218 compliance item. HVAC-FAS integration must be tested and documented.",
    tom:"HVAC-FAS commissioning: €5k–€15k (Tier 3 — BS 5306; manufacturer published service rates, indicative). Failure cost: agent re-release €30k–€80k (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) plus downtime."
  },
  scenario:{title:"The Failed Hold Time",narrative:"Clonshaugh: new 2,000m² server room, FM-200 + VESDA. Door fan: 7 min (below 10).",question:"What must be done?",answer:"A 7-minute hold time in a 2,000m² server room means the clean agent system cannot deliver the minimum 10-minute concentration required by ISO 14520-1 Clause 8.2. Commissioning cannot be signed off. The room must not be accepted for live IT load until hold time is demonstrated at ≥10 minutes under a witnessed door fan test.\n\nAt 7 minutes, the agent concentration drops below the minimum design level — 7.0% for FM-200, 5.3% for Novec 1230 — before the hold period expires. Any incipient fire not fully extinguished within the available window will re-ignite when oxygen re-enters the room. The 3-minute shortfall represents a 30% failure against a non-negotiable life safety standard.\n\nIn a 2,000m² fit-out environment, the Equivalent Leakage Area is almost certainly distributed across many small pathways from post-fit-out cabling works — not a single large gap. This is the typical failure mode after active DC fit-out.\n\nRequired sequence:\n1. Equivalent Leakage Area (ELA) survey: locate and rank all leak paths by contribution\n2. Seal in priority order: structural cable penetrations first (largest ELA contribution), then ceiling-to-wall junctions, floor void boundaries, finally door and frame seals\n3. Re-test after each sealing phase — incremental re-testing confirms progress and avoids a single failed final test\n4. Final witnessed door fan test demonstrating ≥10 minutes with fire engineer present\n5. Management-of-change process established before IT load-in — every future cable penetration requires fire engineer sign-off\n\nEstimated sealing cost: €5k–€15k (Tier 3 — BS EN 15004; manufacturer published service rates). Sources: ISO 14520-1 Clause 8.2; NFPA 2001; IS 3218:2013+A1:2019.",
whoShouldCare:["mark","declan"]},
  retrofitRelevance:"HVAC-FAS integration testing is the cheapest single fire safety verification available. Cost: €2k–€5k per room. If it fails, the entire clean agent investment is ineffective.",
  crossRefs:[{module:"DC-LEARN-002",level:"L8",topic:"Controls & BMS integration — BMS must shut down CRAHs on fire alarm to maintain clean agent concentration"},{module:"DC-LEARN-009",level:"L6",topic:"DCIM alarm integration — fire alarm event triggers automated HVAC shutdown sequence via BMS"}],
  sourceNote:"IS 3218:2013+A1:2019 Sec 16 (T1); EN 50600-2-1 (T1). ISO 14520 Annex E (T1); NFPA 2001 (T1). EN 15650 (T1).",

{
  id:"L8", level:8, name:"Fire Risk Assessment", icon:"📋",
  available:true,
  component:"Fire Risk Assessment",
  userNeedStatement:"Understand DC fire risk assessment, Irish legal requirements, and DC-specific risk impacts.",
  plainEnglish:"FRA is legally required in Ireland. For a DC it must go beyond standard — Li-ion, clean agent O₂ depletion, raised floor, high electrical density.",
  grammar:{
    facts:[
      {term:"FRA",definition:"Systematic evaluation of fire hazards, protection, and management.",plain:"Structured review: what catches fire, who at risk, are systems adequate?",number:"Annual minimum. Updated on material change. Retained for inspection.",standard:"Fire Services Act 1981/2003; SHWW Act 2005; IS 3218:2013+A1:2019",feynman:{analogy:"A health check-up identifies risks before they become emergencies. A Fire Risk Assessment does the same for a building — it identifies what could catch fire, who could be harmed, and what controls need improvement, before an actual fire exposes the gaps.",firstPrinciples:"Irish fire safety law requires a documented Fire Risk Assessment for all workplaces. The FRA must be reviewed annually and updated when significant changes occur. A competent person must conduct the assessment. The FRA is a legal document — its absence is a criminal offence.",theTest:"How often must a Fire Risk Assessment be reviewed in Ireland, and what triggers an immediate update? Annual review minimum. Any significant change (new battery type, occupancy change, building modification) triggers immediate update."},soWhat:"A generic commercial FRA will miss every risk that makes data centres different — the FRA must be DC-specific or it is not fit for purpose."},
      {term:"DC-Specific Hazards",definition:"Hazards unique to or amplified in data centres.",plain:"DC has risks offices don't: self-combusting batteries, O₂-depleting gas, hidden floor fires.",number:"By frequency: PSU ~35%, UPS ~25%, cabling ~15%, cooling ~10%.",standard:"FM Global 5-32; EN 50600-2-1; NFPA 855",feynman:{analogy:"A standard car MOT doesn't check for the specific issues an electric car has with its battery. Similarly, an office-template fire risk assessment misses the specific hazards in a data centre — high-energy batteries, suppression gas in occupied spaces, and concealed fire pathways.",firstPrinciples:"Data centres contain hazards not found in typical commercial buildings. Li-ion batteries present thermal runaway risk. Clean agent discharge reduces oxygen in occupied spaces. Sub-floor voids create concealed fire paths. A generic office FRA template does not address any of these.",theTest:"Name three DC-specific fire hazards that a standard office FRA template would miss. Li-ion thermal runaway risk, clean agent oxygen depletion in occupied spaces, and concealed fire pathways in sub-floor voids."},soWhat:"Data centre hazards are fundamentally different from commercial buildings — applying standard building fire safety to a DC produces an inadequate system."},
      {term:"Clean Agent O₂ Depletion",definition:"FM-200/Novec discharge reduces oxygen concentration.",plain:"Suppression gas reduces oxygen. Everyone must evacuate before discharge.",number:"FM-200 at 7.0%: O₂ → ~19.5%. Novec at 5.9%: → ~19.7%. Pre-discharge: 30 sec.",standard:"ISO 14520-1 Annex G; NFPA 2001 Sec 1.5",feynman:{analogy:"Climbing a high mountain, the air gets thinner and harder to breathe. When clean agent discharges in a server room, it displaces oxygen the same way — the room becomes unsafe to breathe in, which is why people must evacuate before discharge.",firstPrinciples:"Clean agents reduce oxygen from 21% to approximately 12–15% at design concentration. Below 16% oxygen, human cognitive function degrades. Below 12%, consciousness is lost within minutes. Evacuation must complete before agent discharge. IDLH exposure requires specific emergency procedures.",theTest:"To what approximate oxygen level does clean agent discharge reduce a protected room, and what is the human safety threshold? Design concentration reduces oxygen to approximately 12–15%. Below 16% oxygen, cognitive function degrades significantly."},soWhat:"Clean agent discharge reduces oxygen to levels that require evacuation — the safety margin between fire suppression concentration and human safety limit is narrow."},{term:"Fire Strategy Document",definition:"Master document defining the DC fire safety strategy: detection philosophy, suppression selection, compartmentation layout, evacuation, and maintenance.",plain:"The fire strategy is the master plan. It says what protection is installed, why it was chosen, how it works together, and what must be maintained.",number:"Required for: planning, building control, insurance underwriter, and ongoing FM. Updated: every major change or minimum every 3 years.",standard:"IS 3218:2013+A1:2019; BS 9999; EN 50600-2-5; NFPA 75; Building Regulations Part B",feynman:{analogy:"Think of a medical care plan for a complex patient. It describes all treatments, why each was chosen, how they interact, and what monitoring is needed. Without it, individual treatments might conflict. A DC fire strategy is the care plan for the building.",firstPrinciples:"Individual fire systems do not work in isolation. The strategy defines how they interact: which detector activates which suppression, which HVAC sequence. Without it, systems may conflict (HVAC running during clean agent discharge, diluting the agent). The document also records design assumptions. If building use changes, strategy must be reviewed.",theTest:"A DC converts a storage room into a battery storage room. The fire strategy was written for original use. Still valid? No. Battery storage introduces thermal runaway risk, toxic gas, and re-ignition. The strategy must be updated for Li-ion detection, suppression, ventilation, and emergency response."},soWhat:"The fire strategy is a living document — every modification to the facility must be reflected or the strategy no longer represents the building as built."},{term:"Insurance Underwriter Requirements",definition:"Fire protection requirements imposed by DC insurers, often exceeding building regulations. Non-compliance can void the policy or increase premiums.",plain:"Your insurer sets fire standards often stricter than regulations. Fail to meet them and your insurance is worthless when you need it.",number:"FM Global and Zurich are the main DC insurers in Europe. FM Global standards are often the de facto minimum. Premium reduction for compliance: 10-30%.",standard:"FM Global DS 5-32 (Data Centers); DS 5-48 (Clean Agent); Zurich DC Guidelines",feynman:{analogy:"Think of home insurance requiring a burglar alarm. Without it, the insurer either refuses cover or charges more. DC insurers require specific fire protection and inspect to verify.",firstPrinciples:"Building regulations set the legal minimum. Insurance underwriters set a commercial minimum that often exceeds regulations because they bear the financial risk. FM Global publishes detailed DC fire protection standards. Non-compliance may result in policy exclusion, premium increase, or refusal to insure.",theTest:"A DC meets all building regulation fire requirements but FM Global identifies three deficiencies. Problem? Yes. Regulations are the legal minimum but FM Global is the insurance minimum. The insurer may restrict cover until deficiencies are resolved. Meeting regulations is necessary but not sufficient."},soWhat:"Insurance underwriters set requirements that often exceed code minimums — non-compliance can void cover or increase premiums by 30–50%."}
    ],
    whatItLooksLike:"Documented report: layout, detection, suppression, compartmentation, escape, management, DC hazards, action plan.",
    siteChecklist:["FRA exists, current, covers DC hazards?","Li-ion, UPS, generators, fuel as separate areas?","Evacuation accounts for pre-discharge timing?","Building safety file — chemistry, agent, hazmat?","Action items documented close-out?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"The Fire Risk Assessment was produced using a standard commercial building template that does not include data centre-specific hazard categories. The fire consultant applied the same methodology used for offices, retail, and warehouses — which omits the hazards unique to electronic equipment environments.",effect:"The FRA does not assess Li-ion battery thermal runaway risk, concealed fire in raised floor voids, clean agent oxygen depletion in occupied spaces, electrical arc flash from MV/LV switchgear, generator fuel storage and bunding, or smoke distribution through HVAC ductwork. Six material hazard categories are absent from the risk register.",insight:"A DC-specific FRA must be produced by a fire engineer with documented data centre experience. The standard commercial assessment template is not fit for purpose. Specify DC fire experience as a mandatory qualification in the consultant appointment, and verify the methodology includes all six DC-specific hazard categories before accepting the deliverable."},
      {cause:"Li-ion batteries are installed as part of a UPS upgrade project, but the building safety file and fire brigade information pack are not updated to reflect the change in battery chemistry. The project team treats it as an electrical upgrade, not a fire safety modification.",effect:"Emergency responders arriving at a fire alarm activation are unaware that the building contains Li-ion batteries that produce hydrogen fluoride gas during thermal runaway. They enter the space with standard respiratory protection that is inadequate for HF exposure. The first responders are at risk of serious HF injury, and the response protocol does not include the defensive firefighting approach required for thermal runaway.",insight:"The building safety file is a life-safety document that must be updated whenever the hazard profile changes. Any change to battery chemistry, fuel type, suppression agent, or ventilation configuration triggers an update. The fire brigade liaison officer must be briefed on any change that affects response protocol — this is a legal requirement, not a courtesy."},{cause:"Rack power density has increased from the original design of 6 kW/rack to 15–20 kW/rack through successive IT refreshes, but the fire risk assessment has not been updated to reflect the increased electrical loading, cable density, and heat generation per unit area",effect:"Higher density means higher heat per rack. Cable loading increases. Electrical fire risk increases. But detection, suppression, and compartmentation were designed for original density.",insight:"Any change to rack density, battery type, or HVAC configuration should trigger fire strategy review. Fire engineer must confirm all systems are still adequate for the new risk profile."}
    ],
    constraintLesson:"FRA is a living tool updated on every change. Without management-of-change, it becomes stale in months.\n\nIn a DC, the building changes constantly: new racks, new batteries, new cabling, new cooling. Each change has potential to introduce a new fire hazard or compromise an existing protection measure.",
    weakestLink:{whatsWrong:"FRA done at handover 3 years ago.",whatsRight:"3-year-old FRA for modified DC is not current. Annual minimum.",howToGetThere:"Appoint competent person. Management-of-change trigger. Retain all versions."}
  },
  rhetoric:{
    declan:{hook:"Ask one question: when was the Fire Risk Assessment last updated? If the answer is before the last fit-out, expansion, or equipment change, it does not reflect the current facility.",text:"Declan, ask one question: when was the Fire Risk Assessment last updated? If the answer is at handover and the facility has had any modification since — new battery chemistry, changed rack densities, added containment, altered cable routes — the FRA no longer represents the building as it exists today. Every operational change alters the fire risk profile, and a stale FRA means you are managing risk against a building that no longer exists. The FRA should be reviewed annually and updated after every material change to the facility."},
    ann:{hook:"A current Fire Risk Assessment is a standard condition of both insurance cover and most institutional lease agreements. An outdated FRA is a warranty breach waiting to be found.",text:"Ann, a current Fire Risk Assessment is a standard condition of both insurance cover and institutional due diligence. An out-of-date FRA — or worse, a generic commercial FRA that does not address DC-specific hazards — affects insurance terms and pricing directly. Underwriters will load premiums or impose conditions if the FRA does not cover Li-ion battery risk, clean agent hold time, VESDA coverage, and sub-floor detection. In DD, request the FRA, check the date, check the author qualifications, and verify it addresses all nine fire risk categories specific to data centres."},
    mark:{hook:"A DC-specific FRA must address at minimum six hazard categories: UPS battery chemistry, suppression agent, raised floor combustibility, containment materials, cable transit integrity, and hot-work permit compliance.",text:"Mark, a DC-specific FRA must address at minimum six hazard categories that do not appear in a standard commercial building assessment: Li-ion battery thermal runaway and HF gas release, clean agent oxygen depletion in occupied spaces, concealed fire in raised floor voids, electrical arc flash from LV and MV switchgear, generator fuel storage and bunding, and smoke distribution through HVAC ductwork. A generic fire consultant who applies the same methodology to a data centre as to an office building will miss every one of these. I'd verify DC fire safety experience is stated as a qualification requirement for the FRA author."},
    sarah:{hook:"IS 3218 and EN 50600-2-5 both require a documented fire strategy and a current risk assessment. Missing either creates a Taxonomy DNSH gap — the climate adaptation check cannot be completed.",text:"Sarah, IS 3218:2013+A1:2019 and EN 50600-2-5 both require a documented fire strategy and a current FRA maintained throughout the building life. Fire incidents and fire safety deficiencies are reportable under SFDR Principal Adverse Impact indicators for physical risk. A facility with an outdated FRA or a fire strategy that does not reflect current operations has a regulatory compliance gap that must be disclosed in sustainability reporting. The FRA review date and author qualifications should be standard items in the ESG data collection template for every DC asset.reportable."},
    tom:{hook:"A DC-specific Fire Risk Assessment at 5 to 15 thousand euros depending on facility size. An outdated FRA found during a transaction due diligence process typically generates a price chip 10 to 50 times that cost.",text:"Tom, a DC-specific Fire Risk Assessment costs €5k–€15k depending on facility size and complexity (Tier 3 — Fire Services Acts 1981/2003; SCSI benchmarks, indicative). Annual review costs €2k–€5k (Tier 3 — Fire Services Acts 1981/2003; SCSI benchmarks, indicative) to update the assessment against operational changes. These are screening-level estimates — the actual cost depends on the FRA author and the number of fire zones. Against a potential fire loss of €10M–€100M+ for a multi-hall facility (Tier 2 — FM Global 5-32; insurance industry data, indicative), the FRA is the most cost-effective risk management investment available. A single finding from the FRA — such as identifying the Li-ion suppression gap — can prevent a loss that exceeds the FRA cost by three to four orders of magnitude."}
  },

    tom:"DC-specific FRA: €8k–€15k (Tier 3 — Fire Services Acts 1981/2003; SCSI benchmarks, indicative). Generic FRA that misses DC risks: worthless — and the insurance won't pay."

  scenario:{title:"The Acquisition Fire Safety Review",narrative:"Fund acquiring 10 MW DC (2018). Vendor FRA: 2019. Since: Li-ion (2021), expansion (2022), HVO (2023).",question:"Is 2019 FRA adequate?",answer:"The 2019 FRA is not adequate for acquisition due diligence. Three material changes have occurred since the assessment — each independently sufficient to require an updated FRA under the Fire Services Acts 1981 and 2003.\n\nMaterial change 1 — Li-ion (2021): introduction of Li-ion batteries is a change of battery chemistry with a fundamentally different fire risk profile. Li-ion thermal runaway is self-oxygenating and cannot be suppressed by FM-200 alone. The 2019 FRA was written for lead-acid chemistry. The current fire risk model is incorrect. A specialist Li-ion FRA is required, covering CO/H₂ detection adequacy, suppression system suitability, and safety file update.\n\nMaterial change 2 — Expansion (2022): the 100-rack expansion created cable penetrations through fire-rated boundaries. Unless firestopping was explicitly specified in the expansion contract — and the acquisition audit should verify this — compartment integrity may be compromised. A full penetration survey and door fan integrity test are required.\n\nMaterial change 3 — HVO (2023): HVO is a combustible liquid with different fuel properties and storage requirements compared to diesel. The FRA must review secondary containment adequacy, fuel storage compliance, and EPA licensing position for the new fuel type.\n\nRequired due diligence package: specialist FRA update addressing all three changes, penetration seal survey, door fan test per ISO 14520-1, building safety file review, and five-year maintenance records. Commission all of this before exclusivity is released — remediation risk discovered post-acquisition sits entirely with the fund.\n\nIndicative FRA cost: €15k–€30k. Remediation: €50k–€200k depending on findings (Tier 3 — Hilti/Rockwool/3M; SCSI benchmarks). Sources: Fire Services Acts 1981/2003; IS 3218:2013+A1:2019; ISO 14520-1.",
whoShouldCare:["ann","mark","tom"]},
  retrofitRelevance:"Every DC acquisition should require a current FRA by a DC-specialist fire engineer. The FRA is the single most useful document in fire safety due diligence.",
