<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
</style>

</head>

  userNeedStatement:"Understand the specific fire risk profile of a data centre, why it differs from other building types, and what the most common ignition sources are.",
  plainEnglish:"A DC fire is different from a warehouse fire. The fuel load is electronic equipment under power with high airflow that spreads fire quickly. Stopping it early — before a conventional smoke detector triggers — is the entire strategy.",
  grammar:{
    facts:[
      {term:"IT Equipment Fire Risk",definition:"Electronic components can fail and ignite under electrical stress. Most common: PSU or UPS failure.",plain:"Servers and UPS are the things most likely to catch fire in a DC.",number:"PSU failure ~35%, UPS/battery ~25%, cabling ~15%, cooling ~10%",standard:"FM Global 5-32; EN 50600-2-1",feynman:{analogy:"A kitchen has a stove and a toaster — both can overheat and start a fire. In a data centre, the power supply and battery are the stove and toaster. They handle the most electrical stress and fail the most often.",firstPrinciples:"Electricity flowing through components generates heat. Components under higher electrical stress degrade faster. Power supplies and UPS batteries handle the highest currents and voltage conversions, making them the most likely ignition sources.",theTest:"What are the two most common ignition sources in data centre fires, and roughly what percentage do they account for together? PSU failure (~35%) and UPS/battery failure (~25%) — about 60% combined."},soWhat:"PSU and UPS failures account for 60% of DC fires — everything else in the fire strategy starts from this ignition profile."},
      {term:"High Airflow Environment",definition:"DC airflow transports smoke rapidly through the space.",plain:"The same AC that keeps servers cool also moves smoke around fast.",number:"DC airflow: 0.5–2.5 m/s in plenum, 1.0–4.0 m/s in hot aisle",standard:"ASHRAE TC 9.9; BS EN 50600-2-1",feynman:{analogy:"Imagine a hallway with a strong draught — if someone lights a match, the smoke spreads through the whole building in seconds. A data centre's cooling system creates that same draught, carrying smoke everywhere before anyone sees flames.",firstPrinciples:"Moving air carries particles. Data centres push large volumes of air to remove server heat. This same airflow transports smoke particles away from the source, diluting them below the threshold that triggers conventional detectors.",theTest:"Why does high airflow make conventional smoke detectors unreliable in data centres? The airflow dilutes smoke below the detector's trigger threshold, meaning a fire can burn 10–20 minutes before a conventional detector activates."},soWhat:"The cooling system that keeps servers alive also defeats conventional detection — airflow is the reason VESDA exists in data centres."},
      {term:"Raised Floor Void",definition:"Void beneath raised floor acts as cold air plenum and concealed fire pathway.",plain:"Under the tiles there is a gap full of cables. A fire can burn unseen.",number:"Depth: typically 600mm. Sub-floor fire may travel 5–15m before detection.",standard:"CIBSE TM38; IS 3218:2013+A1:2019 Section 7",feynman:{analogy:"Think of the space between a house's floorboards and the ground — if a fire starts there, you can't see it from the room above. The raised floor void in a data centre is the same hidden space, packed with cables that can burn unseen.",firstPrinciples:"Raised floors create a plenum for cold air distribution. This void also routes power and data cables. A fire in a concealed space grows without visual detection. Cable insulation is combustible and produces toxic smoke.",theTest:"What depth of raised floor void triggers mandatory sub-floor detection under IS 3218:2013+A1:2019? Voids greater than 200mm require dedicated sub-floor detection."},soWhat:"A cable fire burning unseen under the floor for 15 minutes can fill an entire hall with toxic smoke before ceiling detection triggers."},
      {term:"EMC-Sensitive Environment",definition:"DC equipment is damaged by fire suppressant residues or water discharge.",plain:"Water on live servers destroys them. DCs use gas suppression instead of sprinklers.",number:"Water damage: typically total loss. €500k–€5M+ per zone (Tier 2 — FM Global 5-32; insurance industry data, indicative).",standard:"NFPA 2001; FM Global 5-32",feynman:{analogy:"Spraying a garden hose inside a room full of running laptops would destroy every one. Data centre equipment reacts the same way — water from sprinklers causes total loss, which is why gas suppression exists.",firstPrinciples:"Electronic circuits short-circuit when exposed to water. Even residue from some fire suppressants can corrode circuit boards. The replacement cost of destroyed IT equipment far exceeds the cost of specialised suppression systems.",theTest:"Why do data centres use gas-based suppression instead of water sprinklers for IT spaces? Water causes electrical short circuits and corrosion, typically resulting in total equipment loss — €500k–€5M+ per zone (Tier 2 — FM Global 5-32; insurance industry data, indicative)."},soWhat:"Water on live servers is a total loss — this single fact drives the entire clean agent suppression strategy."},{term:"Fire Load Density in DC",definition:"Total combustible energy per unit floor area (MJ/m2). DCs have moderate fire load from cable insulation and IT equipment but high consequence due to concentration of value.",plain:"A DC does not have much that burns compared to a warehouse, but what does burn is extremely expensive and the smoke does more damage than the flames.",number:"Typical DC white space: 400-600 MJ/m2. Office: 600-800 MJ/m2. Warehouse: 1000-2000 MJ/m2. DC consequential loss per m2 is 10-100x higher than office.",standard:"IS 3218:2013+A1:2019; EN 50600-2-5; NFPA 75",feynman:{analogy:"Think of it like a jewellery shop vs a timber yard. The timber yard has far more combustible material, but a small fire in the jewellery shop destroys far more value. A DC is like the jewellery shop.",firstPrinciples:"Fire load density measures how much energy a fire could release. DCs have moderate fire load (cables, plastics) but the real risk is smoke damage. Smoke particles contaminate hard drives and electronics far beyond the fire zone. A fire in one rack can smoke-damage an entire hall. This is why detection must be very early (VESDA) and suppression must be fast (clean agent).",theTest:"A DC hall has lower fire load density than a typical office. Does this mean fire protection can be reduced? Answer: No. Consequential loss per m2 is 10-100x higher. A small fire producing smoke can damage millions of euros of IT equipment across the entire hall. Protection must be more stringent, not less."},soWhat:"Low fire load does not mean low risk — the consequential loss per square metre in a DC is 10–100× higher than in an office."}

  logic:{
    causeAndEffect:[
      {cause:"Conventional optical smoke detectors require a visible smoke density of 3–5% obscuration per metre before triggering. In a data centre with 2 m/s airflow from CRAH units, smoke from a smouldering PSU is diluted below this threshold almost immediately.",effect:"A smouldering power supply can burn for 10–20 minutes before generating enough concentrated smoke to trigger a ceiling-mounted optical detector. By that point, the fire may have grown beyond the capacity of the clean agent suppression system.",insight:"Detection must occur at the incipient stage — VESDA aspirating detection triggers at 0.001% obscuration, which is 100–1,000× more sensitive than conventional optical. This is not a preference, it is an engineering necessity driven by the airflow environment."},
      {cause:"Data centre CRAH units circulate air at 0.5–2.5 m/s in the plenum and 1.0–4.0 m/s in the hot aisle. This constant high-volume airflow disperses smoke particles away from the source and dilutes them across the entire hall volume.",effect:"A conventional detector positioned in this airflow environment may not accumulate sufficient smoke density to trigger until the fire has been burning for 15–30 minutes and has spread beyond its origin point. The cooling system designed to protect the servers is actively working against the detection system.",insight:"Detection sensitivity must be orders of magnitude higher than in a standard commercial building, AND the sampling points must be positioned to account for airflow patterns — in the hot aisle return path where smoke concentrates, and in sub-floor voids where cables route."},
      {cause:"Water discharged onto live electronic equipment causes immediate short-circuit damage and long-term corrosion. A single sprinkler head discharging onto a rack row produces total equipment loss — typically €500k–€5M+ per zone depending on equipment density and value (Tier 2 — FM Global 5-32; insurance industry data, indicative).",effect:"Clean agent gaseous suppression (FM-200 or Novec 1230) extinguishes fire without leaving residue or causing equipment damage. This is why clean agent is the primary suppression technology for DC IT spaces, with pre-action sprinklers retained only as a backstop if the clean agent fails or the fire re-ignites.",insight:"The entire DC fire strategy is structured to prevent escalation to sprinkler discharge. The sequence is: VESDA detects at incipient stage → clean agent suppresses before growth → pre-action sprinklers are the last resort, not the first response. Getting the sequence wrong means the sprinklers activate for every fire, destroying the equipment they were meant to protect."}

    constraintLesson:"The DC fire strategy is not the same as the building fire strategy. An office-style approach will produce an inadequate system. Detection (VESDA) → Suppression (clean agent) → Backup (pre-action sprinkler) → Containment (compartmentation). Each layer addresses the failure mode of the layer above it.",
    weakestLink:{whatsWrong:"We have smoke detectors and sprinklers — fire-safe.",whatsRight:"DC sequence: VESDA → alert → clean agent → prevent escalation. Sprinklers are last resort.",howToGetThere:"Specify DC-experienced fire specialist. Review against IS 3218 and EN 50600."}

  rhetoric:{
    declan:{hook:"A PSU produces smoke 10 to 20 minutes before flame. Standard detectors will not trigger. VESDA is not a premium — it is the minimum for any live server environment.",text:"PSU produces smoke 10–20 min before flame. Standard detectors won't trigger. VESDA picks up incipient smoke in under 60 seconds."},
    ann:{hook:"Fire risk in a data centre is fundamentally different from any other building type. The fuel load is invisible until it is producing smoke — which is 10 minutes before it is visible.",text:"Ann, fire risk in a data centre is fundamentally different from any other building type. Downtime from a fire event costs €50k–€500k per hour depending on tenant SLA structure (Tier 3 — Uptime Institute; CIBSE TM67, indicative), and reputational damage can suppress occupancy for 12–24 months. VESDA plus Novec 1230 suppression is the configuration that attracts the best insurance terms — typically 10–20% premium reduction versus conventional detection and FM-200."},
    mark:{hook:"The detection design must address four distinct zones: ceiling-level VESDA, sub-floor aspirating, in-rack point detection, and UPS battery room CO sensing. All four zones, not one.",text:"Mark, the detection design must address four distinct zones: ceiling-level VESDA in IT halls, sub-floor VESDA in raised floor voids over 200mm per IS 3218 Section 7, dedicated hot aisle return VESDA where containment concentrates exhaust air, and separate detection zones for UPS rooms. If the UPS has been upgraded to Li-ion, the UPS room needs enhanced CO/H₂ gas detection per IEC 62619 — standard VESDA alone will not detect thermal runaway precursors."},
    sarah:{hook:"Fire detection and suppression is an EN 50600-2-5 compliance requirement. The specification tier — from standard to aspirating — is directly linked to the Availability Class of the facility.",text:"Sarah, fire detection and suppression is an EN 50600-2-5 compliance requirement that appears on every institutional ESG due diligence checklist. A facility with only conventional optical detectors and wet-pipe sprinklers will score below the 2024 GRESB Infrastructure threshold for physical risk management and trigger a material finding in SFDR Article 8 technical screening. Confirm detection type, suppression agent, and last hold-time test date in the first site visit."},
    tom:{hook:"VESDA aspirating detection costs 150 to 200 percent more than conventional optical detection. The premium is justified by the 15-minute detection advantage — before any suppression event occurs.",text:"Tom, VESDA aspirating detection costs 150–200% more than conventional optical detectors — typically €15–25k per zone versus €5–8k (Tier 3 — Xtralis/Kidde/Hochiki published ranges, indicative). But the insurance premium reduction of 10–20% on a facility insured for €50M+ pays back the VESDA investment in 3–5 years. More importantly, conventional detection in a DC environment creates a 10–20 minute blind spot where fire grows beyond clean agent capacity, which converts a €30k suppression event (Tier 3 — BS 5306; manufacturer published service rates, indicative) into a €5M+ total-loss claim (Tier 2 — FM Global 5-32; insurance industry data, indicative)."}

  scenario:{title:"The Standard Fire System",narrative:"A DC developer has received a fire protection spec from a commercial office consultant — optical smoke detectors at ceiling level and wet pipe sprinklers throughout server rooms.",question:"Identify the inadequacies for a DC environment.",answer:"The commercial office specification fails on two fundamental counts for a DC environment.\n\nDetection inadequacy: Optical smoke detectors at ceiling level cannot reliably detect smouldering fires in high-velocity CRAH airflow — the airstream dilutes smoke before it reaches the detector. Sub-floor detection is absent, directly violating IS 3218:2013+A1:2019 Clause 9.3, which requires detection in all voids ≥200mm depth. At 600mm, Clonshaugh’s raised floor exceeds this threshold by a factor of three. VESDA (Very Early Smoke Detection Apparatus) with ceiling and sub-floor sampling tubes is the correct specification — VESDA detects sub-40ppm smoke levels before visible smoke appears, giving minutes of advance warning.\n\nSuppression inadequacy: Wet pipe sprinklers carry water in the pipe at all times under system pressure. Any mechanical failure, valve leak, or accidental head activation releases water onto live electrical equipment. At Clonshaugh, this means potential total-hall loss — immediate SLA breach, data destruction, and insurance complications.\n\nCorrect specification: VESDA at ceiling and sub-floor for detection. Clean agent (FM-200 at 7.0% design concentration, or Novec 1230 at 5.3%) for suppression — no water residue, safe for occupied spaces. Pre-action double-interlock sprinklers as the backstop suppression layer. Separate UPS zone protection. Sources: IS 3218:2013+A1:2019; ISO 14520-1; EN 15004; NFPA 2001.",
whoShouldCare:["mark","declan"]},
  retrofitRelevance:"In retrofit, fire detection technology is the first upgrade priority. Replacing conventional optical with VESDA in IT spaces typically has insurance premium payback within 3–5 years.",
  crossRefs:[{module:"DC-LEARN-003",level:"L6",topic:"Single points of failure — fire detection system is a SPOF across all data halls if not duplicated"},{module:"DC-LEARN-001",level:"L6",topic:"Floor PDU — electrical distribution in raised floor creates unique fire risk requiring sub-floor detection"}],
  sourceNote:"FM Global 5-32 (T2). IS 3218:2013+A1:2019 (T1). ISO 14520 (T1); NFPA 2001 (T1). EN 50600-2-1 (T1).",
  clockQuote:"She read the inspection certificate the way most people read fire exit signs — looking for the thing that didn't belong. The GWP was 3,220. That number belonged on the calendar.",

    const needed = level >= 3 ? "VESDA (all zones)" : "VESDA (IT halls)";
    return {needed:needed,available:"Ceiling VESDA only",unit:"",pass:level<2,detail:"Sub-floor detection gap — IS 3218 non-compliant at Enhanced+"};

{
  id:"L2", level:2, name:"VESDA Detection", icon:"🔎",
  available:true,
  component:"Aspirating Smoke Det.",
  userNeedStatement:"Understand how aspirating smoke detection works, why it is the DC standard, and what alert levels mean.",
  plainEnglish:"VESDA continuously sucks air through a pipe network and analyses it with a laser. It detects smoke at 100–1,000x lower concentrations than conventional detectors.",
  grammar:{
    facts:[
      {term:"VESDA (Very Early Smoke Detection)",definition:"Aspirating detection by Xtralis/Honeywell. Air drawn through pipe network to laser detector.",plain:"Pipe network sucks air to laser detector. Detects even invisible smoke.",number:"Range: 0.001% obs/m (Alert) to 20% (Fire 2). Optical: 0.1–1.0%. 100–1,000x more sensitive.",standard:"IS 3218:2013+A1:2019; EN 54-20",feynman:{analogy:"A bloodhound can detect a scent that a human nose completely misses. VESDA is the bloodhound of smoke detection — it actively sniffs the air through a network of pipes and detects smoke particles 100–1,000 times smaller than what triggers a standard detector.",firstPrinciples:"Aspirating detection draws air samples through a pipe network to a central laser chamber. The laser measures light scatter from particles. Active sampling overcomes the dilution problem that defeats passive point detectors in high-airflow environments.",theTest:"How much more sensitive is VESDA compared to conventional optical detectors? VESDA detects at 100–1,000 times lower smoke concentrations than conventional optical detectors."},soWhat:"VESDA detects fire at the incipient stage — 10 to 20 minutes before a conventional detector would trigger — and that time difference is the entire margin."},
      {term:"Alert Levels",definition:"Four graduated levels: Alert, Action, Fire 1, Fire 2.",plain:"Four stages from 'go look' to 'gas discharges'. Time to investigate before auto suppression.",number:"Alert 0.02%, Action 0.05%, Fire 1 0.1%, Fire 2 0.5% (triggers suppression).",standard:"IS 3218:2013+A1:2019 Clause 9; EN 54-20",feynman:{analogy:"A weather warning system goes from advisory to watch to warning to emergency. VESDA works the same way — four escalating levels give operators time to investigate before the system automatically discharges suppression gas.",firstPrinciples:"Graduated response prevents false discharge of expensive suppression agents. Each level triggers a different action. Lower levels allow human investigation. The highest level triggers automatic suppression because the fire has grown beyond manual intervention.",theTest:"At which VESDA alert level does clean agent suppression typically discharge automatically? Fire 2 (0.5% obscuration/m) triggers automatic suppression discharge."},soWhat:"Each VESDA threshold triggers a specific response — confusing them or wiring them wrong means the wrong action at the wrong time."},
      {term:"Sub-Floor Void VESDA",definition:"Dedicated aspirating detection in raised floor void.",plain:"Second set of pipes under floor tiles to catch cable fires.",number:"Mandatory per IS 3218 for voids >200mm. Sampling every 2m².",standard:"IS 3218:2013+A1:2019 Clause 9.3",feynman:{analogy:"A smoke alarm on the ceiling won't detect a fire in the basement. Sub-floor VESDA is the basement alarm — a separate set of sampling pipes specifically monitoring the hidden cable space beneath the floor tiles.",firstPrinciples:"Raised floor voids are concealed spaces where fires can develop undetected. Ceiling-mounted detection cannot sample air from below a sealed floor. IS 3218:2013+A1:2019 mandates dedicated sub-floor detection for voids exceeding 200mm depth.",theTest:"What is the sampling density required for sub-floor VESDA per IS 3218? Sampling points every 2m² in raised floor voids exceeding 200mm depth."},soWhat:"Without sub-floor detection, a cable fire in the void can burn for 15+ minutes undetected — IS 3218 makes this mandatory, not optional."},{term:"VESDA Pipe Network Design",definition:"Network of ABS sampling pipes with precision-drilled holes that draw air samples to the VESDA detector. Pipe layout determines detection coverage and response time.",plain:"VESDA works by sucking air through pipes with tiny holes. The pipe layout determines how quickly smoke from any point reaches the detector.",number:"Max pipe length: 100m. Sampling holes: 2mm at calculated spacing. Transport time: <60 seconds from furthest point. Typical DC: one detector per 200-400 m2.",standard:"I.S. 3218:2024; EN 54-20; ASPIRE2 design software",feynman:{analogy:"Think of a network of drinking straws spread across the ceiling, all connected to one very sensitive nose. The nose detects the faintest whiff of smoke from any straw. The design challenge is making sure every part of the room has a straw nearby.",firstPrinciples:"VESDA uses an aspirating fan to draw air through a pipe network. Each pipe has sampling holes at calculated intervals. In a DC with hot/cold aisle containment, pipes must sample from both the cold aisle supply and the hot aisle return air path to avoid blind spots.",theTest:"A VESDA pipe runs above the cold aisle ceiling tiles. Will it detect a fire inside a server in the hot aisle? Not quickly. Containment channels airflow from cold to hot. Smoke follows this path and may not reach the cold-aisle pipe for minutes. VESDA pipes must also sample from the hot aisle return."},soWhat:"A VESDA pipe network that is too long or too branched dilutes the smoke sample below the detection threshold — defeating the purpose of aspirating detection."},{term:"VESDA Maintenance and Testing",definition:"Regular inspection, cleaning, and functional testing of VESDA systems. Sampling pipes accumulate dust that reduces airflow and detection sensitivity.",plain:"VESDA pipes get dirty. If not cleaned regularly, the system gets slower and less sensitive when you need it most.",number:"Pipe cleaning: annually minimum. Flow test: quarterly. Smoke test: annually. Filter replacement: 6-12 monthly. Full audit: every 3 years per I.S. 3218.",standard:"I.S. 3218:2024; BS 5839-1 Section 6; EN 54-20",feynman:{analogy:"Think of a smoke alarm at home. If you never change the battery or clean the dust, it stops working when needed. VESDA is the same but more complex. The entire pipe network must be kept clean and airflow verified.",firstPrinciples:"VESDA reliability depends on consistent airflow through sampling pipes. Dust accumulation reduces flow velocity, increasing transport time and reducing sensitivity. The detector monitors its own total flow rate but this only detects total blockage. Gradual degradation from individual blocked holes is not self-detected. Point-by-point flow testing is essential.",theTest:"A VESDA detector reports normal flow and no faults. Is the system working correctly? Not necessarily. Normal total flow can mask individual blocked holes. If some holes are blocked and others clear, total flow appears acceptable. Only point-by-point testing confirms full coverage."},soWhat:"A VESDA system that is not tested is a VESDA system that may not work — annual sensitivity verification is the minimum standard."}
    ],
    whatItLooksLike:"Red ABS pipes with 2mm sampling holes. Detector outside server room. Display panel four levels. Sub-floor capillary tubes visible when tiles lifted.",
    siteChecklist:["VESDA units — where mounted?","Sub-floor — lift tile, look for capillary pipes","Sensitivity settings — site-specific or default?","Last service — annual calibration required","Display panel — any alerts or faults?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"Data centre CRAH units circulate air at 0.5–2.5 m/s in the plenum and 1.0–4.0 m/s in the hot aisle. This constant high-volume airflow disperses smoke particles away from the source and dilutes them across the entire hall volume before they can accumulate at any single detection point.",effect:"Standard optical detection in this environment may not trigger for 15–30 minutes — by which time the fire has grown from a localised smouldering event to a flame condition that may exceed clean agent suppression capacity. The 15–30 minute blind window is the critical vulnerability in any DC using conventional detection.",insight:"The DC fire strategy depends entirely on detecting fire at the incipient stage before it grows beyond clean agent capacity. VESDA aspirating detection achieves this by actively drawing air samples through a pipe network to a laser chamber, detecting at 100–1,000× lower concentration than optical detectors."},
      {cause:"VESDA pipe networks can be routed through three distinct zones: sub-floor void where cables concentrate, hot aisle return where airflow concentrates exhaust, and overhead ceiling space. Each zone feeds a separate detection channel with independent alarm thresholds.",effect:"A smouldering cable in the raised floor void is detected within 1–3 minutes because the sub-floor VESDA sampling point is positioned directly in the cable pathway, not waiting for smoke to rise through floor tiles and reach a ceiling detector.",insight:"Sub-floor is the most common undetected early-stage fire location in data centres. Cable insulation fires burn slowly and produce smoke that is trapped below the raised floor tiles. Without dedicated sub-floor VESDA, these fires can burn for 15+ minutes before any ceiling-level detection triggers."},
      {cause:"VESDA provides four graduated alarm thresholds: Alert (0.02% obs/m), Action (0.05%), Fire 1 (0.1%), and Fire 2 (0.5%). Each threshold triggers a specific and proportionate response through the BMS and FAS integration.",effect:"At Alert level, the operator investigates while all systems remain operational. At Fire 1, HVAC shuts down and the pre-discharge alarm sounds. At Fire 2, the clean agent discharges. This graduated response gives the operator 5–10 minutes of investigation time before suppression activates.",insight:"A graduated detection system allows human decision-making at the early stage — an operator who investigates an Alert may resolve the issue before it reaches Fire 1. A binary system that jumps from nothing to full discharge gives zero investigation time and no opportunity for intervention."}
    ],
    constraintLesson:"The argument against VESDA is cost (150–200% premium). The argument for is consequence — discovering fire when already well-established.",
    weakestLink:{whatsWrong:"VESDA is expensive — use high-sensitivity optical.",whatsRight:"High-sensitivity optical can't match aspirating in high airflow. Sub-floor can't be covered by ceiling detectors.",howToGetThere:"VESDA for IT spaces and sub-floor. Conventional for ancillary."}
  },
  rhetoric:{
    declan:{hook:"VESDA detects smoke at 0.001 percent obscuration per metre — 100 to 1,000 times earlier than standard detectors. That detection window is what prevents a suppression discharge.",text:"Declan, VESDA detects smoke at 0.001% obscuration per metre — that is 100 to 1,000 times more sensitive than a conventional optical detector. In practice, this means VESDA picks up a smouldering PSU within 60 seconds, while a ceiling-mounted optical in a 2 m/s airflow environment may take 10–20 minutes. Every insurance renewal, the underwriter asks what detection technology is installed. If the answer is conventional optical, expect a loading on the premium and a recommendation to upgrade."},
    ann:{hook:"DC insurance is rated by detection specification. VESDA plus Novec attracts materially better rates than conventional systems. The premium difference can be 15 to 25 percent on annual cost.",text:"DC insurance rated by detection spec. VESDA + Novec attracts better rates. Premium differential justifies capital in 3–5 years."},
    mark:{hook:"IS 3218 Section 9.3 mandates aspirating detection in raised floor voids exceeding 800 mm depth. That is not a recommendation — it is a standard requirement that must appear in the specification.",text:"Mark, IS 3218 Section 9.3 mandates aspirating detection in raised floor voids exceeding 200mm — this is not optional, it is a compliance requirement. In the hall, VESDA sampling points should be at 2m centres along hot aisle returns where containment concentrates the exhaust air. Detection sensitivity settings must be configured by the Fire Protection Engineer based on the specific airflow profile of each zone — factory defaults are never correct for a data centre environment because the high air change rate dilutes smoke differently in every layout."},
    sarah:{hook:"EN 50600-2-5 assigns protection classes based on facility criticality. Aspirating detection in all four zones is required for Class 3 and above — the class most institutional tenants require.",text:"Sarah, EN 50600-2-5 assigns protection classes based on facility criticality, and Class 3 or 4 — which covers any facility with SLA commitments — requires detection technology appropriate to the risk profile. In practice, VESDA aspirating detection is the only technology that meets this requirement for data centre IT spaces, because conventional detectors cannot reliably trigger in high-airflow environments. For ESG reporting, confirm both the detection technology and the maintenance regime — a VESDA system that has not been sensitivity-tested in 12 months is a compliance finding."},
    tom:{hook:"VESDA installation for a 1,000 square metre hall at 80 to 150 thousand euros depending on pipe routing complexity. Conventional optical system for the same area: 25 to 40 thousand euros.",text:"Tom, VESDA installation for a 1,000 m² hall typically costs €80k–€150k depending on zone count and pipe run complexity (Tier 3 — Xtralis/Kidde/Hochiki published ranges, indicative), versus €30k–€60k for conventional detection (Tier 3 — Xtralis/Kidde/Hochiki published ranges, indicative). The insurance premium saving is €15k–€40k per year on a facility insured at €50M+ (Tier 3 — FM Global 5-32; insurer published premium schedules, indicative), giving a payback of 3–5 years on the incremental cost (Tier 3 — Xtralis/Kidde/Hochiki published ranges; FM Global 5-32, indicative). But the real financial case is the avoided loss: conventional detection creates a 10–20 minute blind window where a fire can grow beyond clean agent capacity, converting a €30k suppression event (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) into a multi-million euro total-loss claim."}
  },
    rhetoricTakeaways:{
    declan:"Check every VESDA zone annually. If the display shows constant Alert, either sensitivity is too low or there is a real problem neither of which should be ignored.",
    ann:"VESDA is the earliest possible warning. Every minute of earlier detection reduces the potential loss by orders of magnitude.",
    mark:"Four thresholds: Alert, Action, Fire 1, Fire 2. Map each to a specific BMS response sequence.",
    sarah:"IS 3218 mandates sub-floor detection in voids over 200mm — non-compliance voids the fire certificate.",
    tom:"VESDA system cost: €15–25k per zone (Tier 3 — Xtralis/Kidde/Hochiki published ranges, indicative). A single undetected sub-floor fire costs €500k–€5M+ (Tier 2 — FM Global 5-32; insurance industry data, indicative)."
  },
  scenario:{title:"The Sub-Floor Detection Gap",narrative:"Commissioning review: VESDA at ceiling but no detection in 600mm raised floor void.",question:"Is sub-floor detection required? What is the risk?",answer:"Sub-floor detection is mandatory. IS 3218:2013+A1:2019 Clause 9.3 requires smoke detection in all voids ≥200mm depth. At 600mm, Clonshaugh’s raised floor exceeds this threshold — non-compliance is not a grey area.\n\nThe risk is threefold. First: the sub-floor void is the primary cable route — power, fibre, and copper data cables run beneath the floor tiles. Insulation degradation, connector overheating, and mechanical damage are all ignition sources in this zone. A smouldering cable fault undetected for 10 minutes can progress to a full compartment fire before ceiling VESDA responds.\n\nSecond: non-compliance invalidates the EN 50600 fire protection claim. If Clonshaugh is marketed or certified as EN 50600-compliant, the absence of sub-floor detection creates a material misrepresentation liability with clients and auditors.\n\nThird: the insurance position is compromised. DC fire insurers typically specify detection in all accessible voids. A 600mm void without VESDA sampling may trigger a policy exclusion clause on any sub-floor fire claim.\n\nRequired action: confirm that VESDA sampling tubes are specified beneath all raised floor panels, connected to the main VESDA controller. Verify room integrity is unaffected with a post-installation door fan test. Source: IS 3218:2013+A1:2019 Clause 9.3; EN 50600-2-5.",
whoShouldCare:["mark","declan"]},
  retrofitRelevance:"Sub-floor VESDA retrofit is typically €30k–€60k per 1,000m² server room. Often the single highest-value fire safety improvement in existing DCs.",
  crossRefs:[{module:"DC-LEARN-009",level:"L6",topic:"DCIM integration — VESDA alarm events feed into BMS/DCIM for automated HVAC shutdown and alerting"},{module:"DC-LEARN-002",level:"L2",topic:"Rack airflow management — high airflow rates in contained aisles dilute smoke, making conventional detection unreliable"}],
  sourceNote:"IS 3218:2013+A1:2019 Clause 9 (T1). EN 54-20 (T1). Xtralis published documentation (T3).",
  clockQuote:"The regulation doesn't care which system the gas is in. It cares about the gas. Cooling and fire suppression are different engineering disciplines, different budgets, different contractors. But if they both use high-GWP fluorinated gases, they're the same regulatory problem.",

{
  id:"L3", level:3, name:"Clean Agent Suppression", icon:"🧯",
  available:true,
  component:"Gaseous Suppression",
  userNeedStatement:"Understand clean agent suppression, FM-200 vs Novec 1230, and the F-Gas transition engineering.",
  plainEnglish:"Clean agents flood a sealed room with gas that removes oxygen without touching equipment. FM-200 (20-year standard) is replaced by Novec 1230 due to F-Gas phase-down.",
  grammar:{
    facts:[
      {term:"Clean Agent Suppression",definition:"Gaseous agent extinguishes fire without residue. Room must be sealed.",plain:"Gas floods room, absorbs heat to suppress combustion. No water, no residue. Room must be sealed.",number:"FM-200: 7.0% vol/vol (ISO 14520-9). Novec 1230: 5.9%. Suppression: ~10 seconds.",standard:"ISO 14520-1; NFPA 2001; IS 3218:2013+A1:2019",feynman:{analogy:"Blowing out a candle works by cooling the flame below its ignition point. Modern clean agents (FM-200, Novec 1230) work primarily by absorbing heat from the fire — cooling the combustion zone below the temperature needed to sustain the reaction, without leaving any residue on the equipment.",firstPrinciples:"Fire requires fuel, heat, and oxygen. Halocarbon clean agents (FM-200, Novec 1230) primarily suppress fire by absorbing heat energy from the combustion reaction, cooling it below the sustaining temperature. They also marginally reduce oxygen concentration, but heat absorption is the dominant mechanism. Unlike water, gas agents leave no residue. The room must be sealed to maintain effective agent concentration.",theTest:"What is the fundamental mechanism by which halocarbon clean agents (FM-200, Novec 1230) extinguish fire? They primarily absorb heat from the combustion reaction, cooling it below the sustaining temperature. Inert gas agents (IG-541) work differently — they reduce oxygen concentration. Different mechanism, same result."},soWhat:"Clean agent is the primary defence for IT spaces because it extinguishes fire without damaging the equipment it protects."},
      {term:"FM-200 (HFC-227ea)",definition:"Heptafluoropropane. GWP 3,220. Subject to EU F-Gas phase-down.",plain:"DC standard for 20 years. GWP 3,220 — EU phasing it out.",number:"GWP: 3,220. Lifetime: 36.5 yrs. NOAEL: 9.0%. Design: 7.0%.",standard:"ISO 14520-9; EU F-Gas 517/2014 and 2024/573",feynman:{analogy:"FM-200 is like a very effective but environmentally costly fire blanket. It works well, but every time you use it, you release a gas that traps 3,220 times more heat in the atmosphere than the same weight of CO₂.",firstPrinciples:"FM-200 is a hydrofluorocarbon with a Global Warming Potential of 3,220. It suppresses fire effectively but is subject to EU F-Gas Regulation 2024/573 phase-down. Supply will become restricted and expensive. Each discharge is a reportable carbon event.",theTest:"What is the GWP of FM-200, and why does this matter commercially? GWP 3,220. Under EU F-Gas phase-down, supply becomes restricted, refill costs increase, and each discharge is a reportable carbon event."},soWhat:"FM-200 works today but its economics are worsening every year — F-Gas phase-down is making each refill more expensive and harder to source."},
      {term:"Novec 1230 (FK-5-1-12)",definition:"Fluoroketone by 3M. GWP 1. F-Gas compliant replacement.",plain:"FM-200 replacement. Same job, negligible GHG impact.",number:"GWP: 1. Lifetime: <5 days. NOAEL: 10.0%. Design: 5.9%. ~15% less agent.",standard:"ISO 14520-10; NFPA 2001; IS 3218:2013+A1:2019",feynman:{analogy:"Novec 1230 is the electric car to FM-200's diesel — it does the same job of putting out fires but with almost zero environmental impact, since its global warming potential is just 1.",firstPrinciples:"Novec 1230 is a fluoroketone with GWP of 1, compared to FM-200's 3,220. It provides equivalent fire suppression performance. It is not subject to F-Gas phase-down restrictions. However, 3M announced exit from PFAS manufacturing (end-2025), creating supply chain uncertainty. IG-541 (inert gas blend: N₂/Ar/CO₂) is gaining market share as a zero-GWP, non-fluorinated alternative with unlimited supply certainty. The trade-off: IG-541 requires larger cylinder storage (higher gas volume) but eliminates all fluorinated compound risk.",theTest:"What is the GWP of Novec 1230, and why is it preferred over FM-200 for new installations? GWP 1. It avoids F-Gas phase-down supply risk, eliminates carbon reporting on discharge, and provides long-term cost certainty."},soWhat:"Novec eliminates the F-Gas regulatory risk entirely — GWP 1 means no phase-down exposure and no carbon reporting liability."},
      {term:"Room Integrity",definition:"Ability to maintain agent concentration for minimum hold time.",plain:"If room leaks, gas escapes. Door fan test measures airtightness.",number:"Hold time: 10 min minimum per ISO 14520/NFPA 2001.",standard:"ISO 14520-1 Clause 8.2; NFPA 2001 Ch 5",feynman:{analogy:"If you tried to fill a room with helium balloons but the door had gaps at the bottom, the helium would leak out before the room filled up. Clean agent works the same way — if the room leaks, the gas escapes before it can extinguish the fire.",firstPrinciples:"Clean agent suppression requires maintaining a minimum gas concentration for a specified hold time. Any opening in the room envelope allows agent to escape. Door fan testing measures the room's Equivalent Leakage Area. ISO 14520 requires a minimum 10-minute hold time.",theTest:"What is the minimum hold time required by ISO 14520 for clean agent suppression, and how is it verified? Minimum 10-minute hold time, verified by door fan pressurisation test measuring the room's Equivalent Leakage Area."},soWhat:"The most expensive clean agent system in the world is worthless if the room leaks — hold time depends entirely on room integrity."},{term:"FM-200 vs Novec 1230 Comparison",definition:"Two main clean agents. FM-200 (HFC-227ea): proven, higher GWP. Novec 1230 (FK-5-1-12): newer, near-zero GWP, higher cost.",plain:"FM-200 works brilliantly but has high greenhouse impact. Novec 1230 is equally effective with virtually zero environmental impact but costs more.",number:"FM-200: GWP 3220, design concentration 7.0%. Novec 1230: GWP <1, design concentration 5.3%. Cost: Novec typically 30-50% more per kg. Both safe for occupied spaces.",standard:"EN 15004; NFPA 2001; ISO 14520; EU F-Gas Regulation 517/2014",feynman:{analogy:"Think of choosing between two equally effective medicines where one has environmental side effects and the other does not. Both cure the disease, but the cleaner option costs more. With F-Gas regulation tightening, the cheaper option may not be available much longer.",firstPrinciples:"Both agents extinguish fire by absorbing heat (physical mechanism), not by removing oxygen, so they are safe for occupied spaces. FM-200 has GWP of 3220 (each kg = warming effect of 3220 kg CO2). Novec 1230 GWP <1. EU F-Gas Regulation is progressively restricting high-GWP substances. FM-200 may face phase-down, making Novec 1230 the safer long-term specification.",theTest:"A DC built in 2015 has FM-200. Cylinders need recharging after a discharge. Can they be refilled? Check current F-Gas regulations. FM-200 is subject to phase-down quotas. Refilling may be possible but increasingly expensive. Switching to Novec 1230 at recharge may be more cost-effective long-term."},soWhat:"The FM-200 to Novec transition is not a question of if, but when — every year of delay increases the cost gap."}
    ],
    whatItLooksLike:"Clean agent cylinders (red=FM-200, silver=Novec). Pipework to nozzles. Discharge indicator lights. Warning klaxon and 'GAS DISCHARGE' signage.",
    siteChecklist:["Agent type — FM-200 or Novec? Check labels.","Room integrity certificate — hold time >10 min","Cylinder pressure — all green?","HVAC interlock — shuts on Fire 1?","Last service — annual per ISO 14520"]
  },
  logic:{
    causeAndEffect:[
      {cause:"EU F-Gas Regulation 2024/573 progressively restricts the production and import of high-GWP fluorinated gases. FM-200 (HFC-227ea) with GWP 3,220 is directly affected — the available quota reduces on a defined schedule, concentrating supply among fewer producers at higher prices.",effect:"FM-200 refill costs have risen 40–80% since 2022 and continue to increase at 15–20% per year. Lead times for refill cylinders have extended from 2 weeks to 6–12 weeks. By 2028–2030, servicing FM-200 systems will be increasingly difficult and expensive as the remaining quota is allocated to higher-priority industrial uses.",insight:"Transition to Novec 1230 now avoids the supply constraint risk entirely. Novec with GWP 1 is not subject to F-Gas quotas and has stable pricing. Every year of delay increases the cost gap between maintaining FM-200 and transitioning."},
      {cause:"Novec 1230 achieves fire suppression at 5.9% design concentration versus 7.0% for FM-200. This means approximately 15% less agent by weight is required for the same room volume, which partially offsets the higher per-kilogram cost of Novec.",effect:"The lower concentration reduces the total agent inventory, cylinder count, and pipe sizing requirements. For retrofits, the existing FM-200 pipe network may be adequate for Novec without resizing, depending on hydraulic analysis — reducing transition costs significantly.",insight:"Transition often reduces the total cylinder volume and weight, which can free physical space in the cylinder storage room. The per-kilogram cost premium of Novec is partially offset by the lower quantity required."},
      {cause:"When clean agent discharges, the room must be sealed to maintain the extinguishing concentration for the required hold time of 10 minutes minimum per ISO 14520. If the HVAC system continues to operate, it actively extracts the agent through return air paths and supply ducts.",effect:"A data centre with 20–40 air changes per hour replaces the entire room volume in 1.5–3 minutes. If HVAC dampers fail to close on Fire 1 signal, the agent discharged at Fire 2 is diluted below suppression concentration within minutes. The €30k–€80k agent discharge (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) achieves nothing, and the fire continues to grow.",insight:"The HVAC-suppression interlock is the most common single-point failure in clean agent systems. A damper that does not fully close, a BMS signal that is not hard-wired to the FAS, or a control sequence that was never tested in live conditions — any of these can render the entire suppression system ineffective."}
    ],
    constraintLesson:"Room integrity and HVAC interlock testing are the two commissioning tests most commonly omitted.",
    weakestLink:{whatsWrong:"Suppression passed commissioning — cylinders full.",whatsRight:"Commissioning requires room integrity + HVAC interlock + full sequence test. Full cylinders with failed integrity = no suppression.",howToGetThere:"Include all three tests in spec. Require independent witnessing."}
  },
  rhetoric:{
    declan:{hook:"The single most important question about your clean agent system: when was the last door fan test, and did it pass? If you do not know, the answer is probably not recently.",text:"Declan, the single most important question about your clean agent system is: when was the last door fan integrity test? Every cable run installed after the original build is a potential leak path — and in a live DC, cables are added constantly. I have seen facilities where the hold time dropped from 12 minutes to under 4 minutes over two years of cabling works, with no one noticing because the door fan test was not repeated. Test annually, and after every significant cabling modification."},
    ann:{hook:"FM-200 refill costs have increased 40 to 80 percent since 2022 due to EU F-Gas supply restrictions. Budget for refill at current market prices, not the original installation allowance.",text:"Ann, FM-200 refill costs have increased 40–80% since 2022 due to EU F-Gas supply restrictions, and the trajectory is accelerating. A single-zone accidental discharge that cost €8k to refill in 2022 now costs €14k–€18k (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative). The Novec 1230 transition is a one-time capex of €50k–€150k per zone (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) that eliminates this escalating opex exposure permanently. In due diligence, ask for the suppression agent type, the last refill date and cost, and the transition plan — a facility with no transition plan has an unbudgeted future liability."},
    mark:{hook:"FM-200 to Novec 1230 is not a cylinder swap — it requires a room integrity test, agent quantity recalculation, nozzle sizing verification, and discharge pipe pressure recalculation.",text:"Mark, the FM-200 to Novec 1230 transition is not a simple cylinder swap — it requires a new suppression design per ISO 14520-10. Novec has a different discharge rate, different nozzle specifications, and different concentration requirements. The room geometry must be resurveyed, nozzle positions recalculated, and the pipe network may need resizing. I'd want the design commissioned from a fire protection engineer with clean agent experience, not from the cylinder supplier. The door fan test must be repeated after installation to confirm hold time at the new agent concentration."},
    sarah:{hook:"The ESG case for the Novec transition is quantifiable: FM-200 GWP is 3,220, Novec 1230 GWP is below 1. The Taxonomy DNSH F-Gas check passes on changeover and fails without it.",text:"Sarah, the ESG case for Novec transition is quantifiable and unambiguous. FM-200 has GWP 3,220: a single zone discharge of 100 kg creates 322 tCO₂e of Scope 1 emissions that must be reported under SFDR and EU Taxonomy. Novec 1230 with GWP 1 produces 0.1 tCO₂e for the same discharge — a 3,220× reduction. Every FM-200 system on the asset register is a carbon reporting liability and a do-no-significant-harm risk under Taxonomy Article 17. The transition timeline should be in the ESG action plan."},
    tom:{hook:"Novec 1230 transition at 50 to 150 thousand euros per zone. FM-200 refill at current market rates runs to 30 to 60 thousand euros per discharge event — and does not improve the ESG position.",text:"Tom, Novec 1230 transition costs €50k–€150k per zone (Tier 3 — Kidde/Siemens/Tyco/Eurofyre published ranges, indicative) depending on room size and pipe network complexity. Current FM-200 annual service cost is €8k–€20k per zone (Tier 3 — BS 5306; manufacturer published service rates, indicative) (Tier 3 — BS 5306; manufacturer published service rates, indicative) and rising at 15–20% per year — by 2028, expect €15k–€35k per zone annually (Tier 3 — BS 5306; manufacturer published service rates, indicative). The lifecycle cost crossover is 3–5 years: beyond that, maintaining FM-200 costs more cumulatively than the Novec transition would have. Budget the transition in the next capital plan and avoid the increasingly expensive holding pattern of FM-200 servicing."}
  },

  scenario:{title:"The Integrity Test Failure",narrative:"Commissioning: door fan test shows 4-min hold time (10-min required).",question:"What does this mean and what must happen?",answer:"A 4-minute hold time means the room fails the minimum requirement by 60%. ISO 14520-1 Clause 8.2 and NFPA 2001 Chapter 5 both require a minimum 10-minute hold time for clean agent suppression systems. Commissioning cannot be signed off — the room must not be accepted for live IT load until this is resolved.\n\nWhat the failure means operationally: agent concentration drops below the minimum design level (7.0% for FM-200, 5.3% for Novec 1230) before the hold period expires. Any incipient fire not fully extinguished within the available hold time will re-ignite when oxygen re-enters. The clean agent system, as currently commissioned, is not functional.\n\nCommon causes in DC environments: unsealed cable penetrations through fire-rated walls and floors (the most frequent cause after cabling works), supply and extract ductwork without fire dampers, floor void not sealed at room boundaries, door and frame gaps exceeding 3mm, and structural joints left untreated.\n\nRequired sequence:\n1. Equivalent Leakage Area (ELA) survey — locate and quantify all leak paths\n2. Seal cable penetrations with EI 60-rated certified firestopping (IS 3218; IEC 60331)\n3. Verify duct dampers are fitted and close correctly under fire signal\n4. Re-seal floor void at room boundary and door frames\n5. Re-test door fan — do not wait until all sealing is complete before re-testing\n6. Final witnessed door fan test demonstrating ≥10 minutes\n7. Fire engineer sign-off before commissioning acceptance\n\nSeal work budget: €5k–€20k indicative (Tier 3 — Hilti/3M published service rates). Sources: ISO 14520-1 Clause 8.2; NFPA 2001 Chapter 5; IS 3218:2013+A1:2019.",

{
  id:"L4", level:4, name:"Li-ion Battery Fire", icon:"🔋",
  available:true,
  component:"BESS Thermal Runaway",
  userNeedStatement:"Understand Li-ion thermal runaway, why it differs from conventional fire, and what systems must do differently.",
  plainEnglish:"Li-ion thermal runaway is self-sustaining and self-oxygenating. Clean agent cannot suppress it. Detection must catch CO/H2 precursors. Water mist cools adjacent cells.",
  grammar:{
    facts:[
      {term:"Thermal Runaway",definition:"Self-sustaining exothermic reaction in Li-ion cell.",plain:"Battery makes its own heat and oxygen. Cooling is the only option.",number:"Onset: 130–150°C. Peak: 600–900°C. Gas: CO, CO₂, HF.",standard:"IEC 62619; UN 38.3",feynman:{analogy:"A chain of dominoes where each one that falls makes the next one fall faster and hotter. In a Li-ion battery, one cell overheating triggers its neighbours to overheat, and the reaction accelerates until the entire battery pack is involved.",firstPrinciples:"Li-ion cells store energy chemically. When a cell fails, it releases energy as heat. This heat raises adjacent cells above their thermal stability threshold. The resulting chain reaction releases flammable and toxic gases. Conventional fire suppression cannot stop the electrochemical reaction.",theTest:"Why can't FM-200 or other clean agents suppress a Li-ion thermal runaway? Thermal runaway is an electrochemical reaction that generates its own oxygen internally. Removing ambient oxygen from the room does not stop the self-sustaining cell-to-cell propagation."},soWhat:"Thermal runaway is self-oxygenating — removing ambient oxygen with clean agent does not stop it, which is why Li-ion requires a completely different protection strategy."},
      {term:"CO and H2 Detection",definition:"Early warning gases from Li-ion before visible thermal event.",plain:"Before fire, battery off-gases CO and hydrogen — early warning.",number:"CO: 20–50 ppm. H2 LEL: 4% vol/vol.",standard:"IEC 62619 Sec 7; BS EN 50604-1",feynman:{analogy:"A canary in a coal mine warned miners of invisible gas before it was too late. CO and H₂ detectors are the modern canary for Li-ion batteries — they detect the invisible gases released in the earliest stage of cell failure, before any smoke appears.",firstPrinciples:"Li-ion cells emit carbon monoxide and hydrogen gas before thermal runaway becomes visible. These gases are detectable at parts-per-million concentrations. Early gas detection provides 5–15 minutes of warning before thermal runaway reaches the propagation stage.",theTest:"What two gases indicate early-stage Li-ion cell failure, and how much warning time does detection provide? Carbon monoxide (CO) and hydrogen (H₂). Detection provides 5–15 minutes of warning before thermal runaway propagation."},soWhat:"CO and H₂ detection gives 5–15 minutes of warning before thermal runaway becomes visible — this early warning is the only intervention window."},
      {term:"Cascade Prevention",definition:"Physical separation to prevent propagation to adjacent modules.",plain:"Space between units prevents chain reaction.",number:"300mm min between racks. Fire barrier between strings.",standard:"IEC 62619; EN 50600-2-1",feynman:{analogy:"Firebreaks in a forest stop a fire from spreading from one section to another. In a Li-ion battery room, physical separation between battery modules and fire-rated barriers serve as firebreaks to stop one failing module from igniting its neighbours.",firstPrinciples:"Thermal runaway propagates through heat transfer between adjacent cells. Increasing physical distance and adding thermal barriers reduces heat transfer. If the heat reaching an adjacent module stays below its critical temperature, propagation stops.",theTest:"What is the primary engineering strategy to prevent Li-ion thermal runaway propagation between battery modules? Physical separation and thermal barriers between modules to keep heat transfer below the critical temperature of adjacent cells."},soWhat:"Physical separation is the most cost-effective protection against thermal runaway propagation — it is cheaper at design stage than any active system."},
      {term:"Water Mist for Li-ion",definition:"HPWM cools cells to prevent cascade even though it can't stop thermal runaway.",plain:"Gas can't stop it. Water mist cools surrounding batteries.",number:"HPWM: >35 bar. Droplet: <100 micron.",standard:"NFPA 750; FM Global",feynman:{analogy:"Spraying a fine mist on a barbecue cools the coals without flooding them. High-pressure water mist does the same for Li-ion batteries — the tiny droplets cool the cells enough to slow the chain reaction without the flooding damage of conventional sprinklers.",firstPrinciples:"Water mist uses high-pressure nozzles to produce droplets under 200 microns. Small droplets have a very high surface-area-to-volume ratio, maximising evaporative cooling. The cooling effect absorbs heat from runaway cells. Water volume is 90% less than conventional sprinklers, reducing collateral water damage.",theTest:"Why is high-pressure water mist preferred over conventional sprinklers for Li-ion battery protection? Mist droplets provide maximum cooling with 90% less water volume, reducing collateral equipment damage while cooling runaway cells."},soWhat:"HPWM cools adjacent cells to prevent cascade with 90% less water than sprinklers — it is the only credible active suppression for thermal runaway."},{term:"Thermal Runaway Propagation",definition:"Chain reaction where one cell in thermal runaway heats adjacent cells past their stability point, causing cascading failure across the battery pack.",plain:"One bad battery cell heats the ones next to it until they also catch fire. Like dominoes, once started it spreads through the entire pack unless physically stopped.",number:"Cell-to-cell propagation: 1-10 minutes depending on chemistry. NMC: faster. LFP: slower. Propagation barrier (air gap or insulation): adds 10-30 minutes between modules.",standard:"NFPA 855; UL 9540A; EN 50600-2-2; IEC 62619",feynman:{analogy:"Think of a row of matches packed tightly together. Light one and the heat lights the next. Spacing them apart slows the chain reaction. Battery cells are the same. Physical gaps and thermal barriers between modules slow propagation and give time for response.",firstPrinciples:"Thermal runaway occurs when a cell reaches its stability limit (typically 150-200C for NMC). The cell releases energy and toxic gases, heating adjacent cells. If they reach their limit, they also enter runaway. The key design parameter is propagation resistance time: how long between one module failing and the next. Longer = more time for detection and response.",theTest:"A Li-ion UPS has 20 modules in a cabinet with no thermal barriers. One enters runaway. What happens? Heat transfers to adjacent modules within minutes. Without barriers, the entire cabinet may be involved within 10-20 minutes. With barriers, propagation can be delayed 10-30 minutes per barrier."},soWhat:"Without barriers between modules, a single cell failure can involve an entire cabinet within 10–20 minutes — propagation time is the design parameter."}
    ],
    whatItLooksLike:"CO detector (yellow), H2 at ceiling. Water mist nozzles. Separation gaps. Intumescent barriers. HF signage.",
    siteChecklist:["Battery chemistry — lead-acid or Li-ion?","If Li-ion: CO/H2 detection?","Suppression type? Clean agent alone = gap","Separation 300mm min?","Building safety file — chemistry and HF hazard?"]
  },
  logic:{
    causeAndEffect:[
      {cause:"Li-ion thermal runaway is an electrochemical reaction that generates its own oxygen internally from the decomposition of the cathode material. Clean agent suppression works by reducing ambient oxygen concentration — but the reaction does not depend on ambient oxygen.",effect:"FM-200 or Novec 1230 discharged into a room containing a Li-ion battery in thermal runaway will reduce ambient oxygen but will not stop the cell-to-cell propagation. The battery continues to burn, producing toxic gases including hydrogen fluoride, while the clean agent is consumed uselessly. The fire grows through the battery pack regardless of the suppression system.",insight:"This is the most significant unrecognised safety gap in the DC industry. Every facility that replaced lead-acid with Li-ion UPS without reviewing fire protection has an FM-200 system that cannot address the risk it was installed for. The chemistry changed; the suppression did not. This must be flagged in every battery upgrade project."},
      {cause:"Li-ion thermal runaway decomposes the electrolyte and releases hydrogen fluoride (HF) gas, which is extremely toxic at concentrations as low as 3 ppm (IDLH 30 ppm). HF is corrosive to skin, eyes, and lungs, and causes delayed systemic effects that may not be apparent for hours.",effect:"HF gas produced during a Li-ion fire spreads beyond the immediate fire zone through any air path — including HVAC ducts if dampers do not close. Equipment outside the fire compartment can be contaminated, and any person in the affected zone without full SCBA respiratory protection is at risk of serious injury. The hazard extends far beyond the visible fire.",insight:"Emergency response to a Li-ion fire is fundamentally different from a conventional fire. Full SCBA is mandatory — not optional — for any responder. The building safety file must document the battery chemistry, the HF hazard, and the required PPE. First responders unfamiliar with Li-ion risks may enter a visually contained fire and suffer HF exposure without realising it."},
      {cause:"Thermal runaway propagates through heat transfer between adjacent battery modules. When one module reaches thermal instability, it radiates and conducts heat to its neighbours. If adjacent modules are close enough, they reach their own critical temperature and enter runaway — creating a cascade.",effect:"Physical separation of 300mm minimum between modules, combined with intumescent thermal barriers, reduces heat transfer below the critical threshold for propagation. A properly separated installation limits a thermal runaway event to the originating module, preventing the cascade that would otherwise involve the entire cabinet or room within 10–20 minutes.",insight:"Physical separation is the most cost-effective protection against thermal runaway propagation and is cheapest when incorporated at design stage. Retrofitting separation into an existing battery room is significantly more expensive and may require room expansion. Every Li-ion battery installation should specify separation as a primary design requirement, not an afterthought."}
    ],
    constraintLesson:"Li-ion fire protection designed for lead-acid is NOT appropriate. One of the most significant unrecognised safety gaps in the DC industry.",
    weakestLink:{whatsWrong:"Replaced lead-acid with Li-ion. Existing FM-200 is adequate.",whatsRight:"Clean agent is not effective for thermal runaway. Fire protection must be redesigned when chemistry changes.",howToGetThere:"Engage specialist. CO/H2 detection, BMS-FAS, HPWM, separation, emergency protocol."}
  },
  rhetoric:{
    declan:{hook:"If the facility has switched from lead-acid to Li-ion UPS batteries without redesigning the fire protection, the two systems are now mismatched. That is a live insurance gap.",text:"Declan, if your facility has switched from lead-acid to Li-ion UPS batteries without reviewing the fire protection system, you have an unmitigated thermal runaway risk right now. FM-200 cannot suppress a Li-ion thermal runaway because the reaction is self-oxygenating — removing ambient oxygen from the room does not stop it. You need CO/H₂ gas detection for early warning, high-pressure water mist for cell cooling, and physical separation between battery modules to prevent cascade. Do not wait for an incident to discover this gap."},
    ann:{hook:"Li-ion battery fire is the single fastest-growing liability category in DC insurance. Conventional suppression systems are not rated for Li-ion thermal runaway events.",text:"Ann, Li-ion battery fire is the single fastest-growing liability in data centre due diligence. Every facility that has upgraded from lead-acid to Li-ion UPS without a concurrent fire protection review has an unmitigated thermal runaway exposure. The DD checklist must now include: confirm battery chemistry (VRLA, NMC, LFP), confirm suppression system type, and verify that the suppression matches the chemistry. A facility with Li-ion batteries and only FM-200 suppression is a material finding — the suppression system cannot address the risk it was retained to cover."},
    mark:{hook:"Li-ion UPS room fire protection must include: CO detection for early thermal runaway warning, Class A suppression rated for electrical fires, and exhaust ventilation for off-gassing management.",text:"Mark, the Li-ion UPS room fire protection specification must include: CO detection at 20 ppm alarm threshold, H₂ detection at 10% LEL, BMS battery temperature monitoring integrated to the FAS via hardwired relay, high-pressure water mist at minimum 35 bar operating pressure with nozzle coverage verified by hydraulic calculation, 300mm minimum physical separation between battery modules with intumescent barriers, and hydrogen fluoride hazard documentation in the building safety file. Every item on this list is a separate design package — omit any one and the protection system has a gap that thermal runaway will exploit."},
    sarah:{hook:"Li-ion battery safety is governed by IEC 62619 and referenced in EN 50600. A facility with Li-ion UPS and unchanged IS 3218 fire strategy has a direct compliance gap.",text:"Sarah, Li-ion battery safety is governed by IEC 62619 and referenced in EN 50600-2-2 for data centre applications. A facility that has installed Li-ion batteries without updating the fire safety assessment cannot claim compliance with either standard. This creates a regulatory gap that affects both insurance coverage and ESG reporting — specifically SFDR Principal Adverse Impact indicator 6 (energy consumption and efficiency) and the EU Taxonomy do-no-significant-harm criteria for pollution prevention. The fire review must be completed before the next compliance reporting period."},
    tom:{hook:"Fire protection redesign for a Li-ion UPS room: 100 to 300 thousand euros depending on room size and suppression agent selection. The cost of one thermal runaway event is an order of magnitude higher.",text:"Tom, the fire protection redesign for a Li-ion UPS room costs €100k–€300k depending on room size and number of battery cabinets (Tier 3 — FM Global DS 5-33; manufacturer published, indicative). This must be included in the UPS upgrade project budget from feasibility stage — not discovered as a variation after the batteries are installed. The scope includes CO/H₂ detection (€15k–€30k), HPWM system (€60k–€180k), physical separation and thermal barriers (€20k–€60k), and building safety file updates (€5k–€10k) (Tier 3 — FM Global DS 5-33; manufacturer published, indicative). A UPS upgrade budget that omits fire protection is incomplete and will overrun."}
  },
    rhetoricTakeaways:{
