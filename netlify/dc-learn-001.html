ll load via internal DC bus. Each PSU must be rated for maximum server draw, not half.",theTest:"A server draws 1200W peak. Two 750W PSUs. Correctly sized? No. Each must carry 1200W alone. With 750W PSUs, single failure overloads the survivor and crashes the server."}},{term:"PSU Efficiency and PUE Impact",definition:"Server PSU efficiency directly affects PUE because every watt lost as heat in the PSU must be removed by the cooling system. At scale, the difference between Bronze and Titanium PSUs is millions of euro per year.",plain:"A less efficient PSU wastes electricity as heat — and then you pay again to cool that heat. The double penalty compounds at scale.",number:"50 MW IT at Bronze (82%): draws 61 MW from PDU, wastes 11 MW as heat. At Titanium (96%): draws 52 MW, wastes 2 MW. Delta: 9 MW waste heat the cooling must remove.",standard:"80 PLUS Programme; EN 50600-2-2; ASHRAE TC 9.9",feynman:{analogy:"Think of a leaky garden hose. A Bronze PSU leaks 18% of every litre of electricity as heat. A Titanium PSU leaks only 4%. At 50 MW, the leak from Bronze is 9 MW — enough to power 3,000 homes, wasted as heat inside the building.",firstPrinciples:"PSU efficiency sets the conversion ratio from grid power to useful server power. Every watt not converted becomes heat. That heat raises PUE because the cooling system must remove it using additional electricity. The PUE impact is: PSU waste / IT load. At Bronze: 11/50 = 0.22 PUE points. At Titanium: 2/50 = 0.04 PUE points.",theTest:"A 10 MW DC replaces Bronze (82%) PSUs with Titanium (96%). What is the PUE improvement from PSU change alone? Answer: Bronze waste = 10/0.82 - 10 = 2.20 MW. Titanium waste = 10/0.96 - 10 = 0.42 MW. Saved: 1.78 MW. PUE reduction from PSU alone: 1.78/10 = 0.178 points. Plus cooling savings for removing 1.78 MW less heat."}}],
    whatItLooksLike:"Hot-swappable PSU modules in the rear of the server chassis. Two per server for redundancy. LED indicators for status. Efficiency label (80 PLUS tier) on PSU casing.",
    siteChecklist:["Confirm PSU efficiency rating — specify 80 PLUS Platinum or Titanium for new procurement","Verify dual PSU configuration — PSU-A on PDU-A, PSU-B on PDU-B","Check PSU load percentage — dual PSUs at 50% each is the optimal efficiency point","Monitor PSU temperature — overheating is a fire risk (DC-LEARN-008 L1)","Confirm server PSU accepts 200–240 V input (some legacy equipment requires 110 V)"]},
  logic:{causeAndEffect:[{cause:"PSU efficiency is 82% (80Plus Bronze) instead of 96% (80Plus Titanium) across the full 50 MW data centre fleet",effect:"PSU losses: 50 MW × (1/0.82 - 1/0.96) = 50 × (0.220 - 0.042) = 8.9 MW of additional waste heat. That heat must then be cooled — adding further energy cost.",insight:"PSU efficiency has a double impact on PUE: the direct electrical loss, plus the cooling energy required to remove that loss as heat. Specifying Titanium PSUs is one of the most effective PUE levers."},{cause:"Servers are procured with a single power supply unit to reduce capital cost, eliminating PSU-level redundancy",effect:"No power redundancy at server level. Any upstream event that affects the single feed (PDU failure, cable fault, breaker trip) = server outage.",insight:"Single-PSU servers in a Tier IV DC defeat the purpose of the dual-path infrastructure. The €50–€100 per server saving on the second PSU (Tier 3 — 80 PLUS programme; server manufacturer published price lists, indicative) is negligible against the investment in dual UPS, STS, and PDU."},{cause:"The entire server fleet is procured with single PSUs to reduce capital cost, creating a fleet-wide single point of failure",effect:"Every PSU failure causes server outage. In a 5000-server DC with 2% annual failure rate, approximately 100 unplanned outages per year.",insight:"Single-PSU is acceptable only for workloads with application-level redundancy (hyperscale search). For databases or stateful workloads, dual PSU is non-negotiable."},{cause:"Server fleet running at below 20% PSU load due to aggressive over-provisioning — 750 W PSUs feeding servers drawing 120 W",effect:"PSU efficiency at 20% load drops to 85–90% versus 96% at 50% load. Across 5,000 servers at 120 W: input at 85% efficiency = 706 kW versus input at 96% = 625 kW. Extra 81 kW wasted as heat — plus cooling penalty.",insight:"Right-sizing PSU wattage to actual server workload improves efficiency by 6–11%. At fleet scale this is a meaningful PUE lever. Modern servers support multiple PSU bay configurations — smaller PSUs running at 50% load outperform oversized PSUs at 20%."}],
    constraintLesson:"The PSU is the last component in the power chain and the one closest\nto the actual IT workload. Its efficiency determines how much of the\npower that started at the grid actually does useful computation.\n\nAt 50 MW IT load: the difference between Bronze and Titanium PSUs is\n8.9 MW of waste heat — which requires approximately 2.0 MW of additional\ncooling energy at COP 4.5. Total PUE impact: approximately 0.22.\n",
    weakestLink:{whatsWrong:"We specified Tier IV power infrastructure throughout. Our servers have dual PSUs.",whatsRight:"Dual PSUs connected to the same rack PDU provide zero redundancy. And if the PSUs are 80 PLUS Bronze, you are paying for Tier IV infrastructure efficiency losses at the last component in the chain. Specify Platinum/Titanium PSUs and verify A+B cabling.",howToGetThere:"Add PSU efficiency tier to server procurement specifications. Verify A+B PSU cabling during commissioning. When replacing end-of-life servers, mandate Titanium PSU as minimum specification."}},
  rhetoric:{declan:{hook:"Spent 50 million euros on Tier IV infrastructure and then plugged in Bronze-rated PSUs. That was the last inefficiency I could not see on any dashboard.",text:"You have spent €50M on Tier IV power infrastructure and then plugged in Bronze-rated PSUs. That is like building a motorway and putting speed bumps at every exit. Specify Titanium PSUs in every server procurement order."},ann:{hook:"Bronze versus Titanium at 50 MW: 16.8 million euros difference in annual power draw at standard rates. That is a specification line item, not a preference.",text:"PSU efficiency directly affects operating cost and PUE. At 50 MW, Bronze vs Titanium is a €10M+ 10-year difference in electricity cost alone. Server procurement should include PSU efficiency as a scored criterion, not just compute performance."},mark:{hook:"50 MW IT at Bronze 82 percent draws 60.98 MW from the PDU. At Titanium 96 percent: 52.08 MW. That 8.9 MW gap alone equals most mid-size DC total IT loads.",text:"50 MW IT load at Bronze (82%): total power draw from PDU = 50/0.82 = 60.98 MW. At Titanium (96%): 50/0.96 = 52.08 MW. Delta: 8.90 MW × 8,760 hrs × €0.12/kWh (CRU T2) = €9.36M/year. Plus cooling cost for the additional 8.9 MW heat: ~€2.08M/year at COP 4.5. Total delta: ~€11.4M/year. (Expanded teaching scenario — Clonshaugh 2.4 MW IT; electricity at CRU T2.)"},sarah:{hook:"PSU waste heat is Scope 2 consumption. Titanium specification at 50 MW saves approximately 6.6 MWh per hour — directly lowering the facility carbon intensity.",text:"PSU waste heat is Scope 2 energy consumption. Titanium PSUs at 50 MW save approximately 8.9 MW × 8,760 × 0.2241 = 17,452 tCO2/year compared to Bronze. This is a larger carbon saving than most cooling retrofits."},tom:{hook:"Titanium premium over Bronze: 30 to 80 euros per PSU. Specify it in the tender — it is the cheapest Scope 2 reduction available per euro of capital spent.",text:"Titanium PSU premium over Bronze: approximately €30–€80 per PSU (Tier 3 — 80 PLUS programme; server manufacturer published price lists, indicative). For 5,000 dual-PSU servers: €300k–€800k total premium. Against €11.4M/year energy saving: payback in under 1 month. This is the highest-ROI specification decision in the entire DC."}},
  rhetoricTakeaways:{declan:"Add PSU efficiency tier to every server procurement specification. Mandate Titanium as minimum for new orders.",ann:"PSU efficiency is the highest-ROI specification decision. Bronze vs Titanium at 50 MW is an €11M+ annual cost difference (Tier 3 — 80 PLUS programme; electricity CRU T2; expanded teaching scenario).",mark:"50 MW at Bronze (82%): draws 61 MW from PDU; at Titanium (96%): draws 52 MW. Delta: 8.9 MW continuous waste heat (expanded teaching scenario — Clonshaugh 2.4 MW IT; inputs: electricity CRU T2).",sarah:"Titanium PSUs at 50 MW save approximately 17,452 tCO2/year versus Bronze — larger than most cooling retrofits.",tom:"Titanium premium: €30–€80 per PSU (Tier 3 — 80 PLUS programme; server manufacturer published price lists, indicative). For 10,000 PSUs: €300k–€800k. Against €11.4M/year savings: payback under 1 month."},
  scenario:{title:"The Procurement Specification",narrative:"A DC operator is procuring 2,000 new servers for a 10 MW expansion. The server vendor quotes 80 PLUS Gold (88%) as standard. The DC engineer recommends specifying Titanium (96%). The procurement manager asks for the business case.",question:"Calculate the annual energy and cost saving of Titanium vs Gold PSUs for 10 MW IT.",answer:"IT load: 10 MW. Dual PSU per server (2,000 servers × 2 = 4,000 PSUs).\n\nGold (88% at 50% load):\nTotal power from PDU: 10 ÷ 0.88 = 11.36 MW\nPSU losses: 1.36 MW\n\nTitanium (96% at 50% load):\nTotal power from PDU: 10 ÷ 0.96 = 10.42 MW\nPSU losses: 0.42 MW\n\nSaving: 0.94 MW continuous\nAnnual energy saving: 0.94 × 8,760 = 8,234 MWh\nCost saving: 8,234 × €0.12 = €988,080/year\n\nPlus cooling saving (0.94 MW waste heat at COP 4.5):\nCooling energy: 0.94 ÷ 4.5 = 0.209 MW\nAnnual cooling saving: 0.209 × 8,760 × €0.12 = €219,605/year\n\nTotal annual saving: €1,207,685/year\n\nTitanium premium: 4,000 PSUs × €50 = €200,000\nPayback: €200,000 ÷ €1,207,685 = 0.17 years (2 months)\n\nCarbon saving: (8,234 + 1,831) × 0.2241 = 2,255 tCO2/year\n",
whoShouldCare:["mark","tom","sarah"]},
  sourceNote:"PSU efficiency — 80 PLUS programme (T2). HVDC — ETSI EN 300 132-3-1 (T1). PUE impact — AIMEP DC Standards Reference v1.2.0 Section 12 (T2). SEAI EF: 0.2241 kgCO2/kWh (T1).",
  clockQuote:"Everything works. Everything hums. She asked what the problem was. He said: Nothing. Yet.",
  crossRefs:[{module:"DC-LEARN-002",level:"L1",topic:"PSU heat rejection → cooling load"},{module:"DC-LEARN-006",level:"L4",topic:"PSU efficiency → Scope 2 carbon intensity"}],
  retrofitRelevance:"PSU upgrade happens naturally as servers are replaced (3–5 year cycle). The key retrofit action is ensuring the procurement specification mandates Titanium PSUs for all new equipment."
}
];

const ASSESSMENT_QUESTIONS = [
{level:1,id:"Q001-01",icon:"🔌",stage:"grammar",q:"What does MIC stand for in the context of a DC grid connection?",options:["Maximum Import Capacity — the contracted maximum power import from the grid","Maximum Internal Capacity — the total internally generated power including backup","Minimum Installation Capacity — the lowest permissible supply for the building","Maximum Installed Computing — the total rack power the facility can support"],correct:0,explain:"MIC = Maximum Import Capacity, specified in MVA or MW in the grid connection agreement. It is the absolute ceiling for site power import. Source: EirGrid Connection Policy 2024."},
{level:1,id:"Q001-02",icon:"🔌",stage:"logic",q:"A DC has 50 MVA MIC and draws 35 MVA at PUE 1.25. Can it add 15 MW of IT load?",options:["Yes — the remaining 15 MVA headroom exactly matches the proposed 15 MW IT expansion","No — 15 MW IT at PUE 1.25 requires 18.75 MVA total, bringing demand to 53.75 MVA and exceeding the 50 MVA MIC","Yes — PUE overhead is absorbed by existing cooling capacity without increasing grid demand","Only if the site diesel generators are running continuously in parallel mode to offset the additional 3.75 MVA grid capacity shortfall"],correct:1,explain:"MIC headroom must be calculated including PUE. 15 MW IT × 1.25 PUE = 18.75 MVA total demand, not 15 MVA. The expansion exceeds MIC by 3.75 MVA."},
{level:1,id:"Q001-03",icon:"🔌",stage:"rhetoric",q:"An operator says: 'We have 30% MIC headroom — plenty for growth.' What question should you ask?",options:["No further questions are needed — 30% headroom substantially exceeds the 20% minimum reserve typically recommended by industry standards","Ask what the contracted electricity tariff is per kWh for the additional imported capacity","Ask what age and condition the primary grid transformer is currently rated at","Ask what the headroom is in MW of IT capacity after PUE — 30% MIC at PUE 1.3 is only 23% IT headroom"],correct:3,explain:"Raw MIC headroom overstates available IT growth capacity because PUE overhead (cooling, mechanical, lighting) consumes a significant portion. Always convert MIC headroom to IT MW headroom using the facility's actual PUE."},
{level:2,id:"Q001-04",icon:"⚡",stage:"grammar",q:"What is the typical lead time for a 110 kV transformer in the current market?",options:["4–8 weeks","12–16 weeks","52–78 weeks","3–5 years"],correct:2,explain:"110 kV transformer lead time: 52–78 weeks (1–1.5 years). This is the longest-lead single component in the power chain. Source: AIMEP DC Standards Reference v1.2.0."},
{level:2,id:"Q001-05",icon:"⚡",stage:"logic",q:"A single-transformer DC experiences a developing oil leak. The manufacturer quotes 62 weeks for replacement. What is the risk?",options:["The DC has no transformer redundancy for 62 weeks — if it fails before replacement, all grid power is lost","Minimal risk — oil can be topped up periodically to maintain safe operating levels until the replacement unit arrives","No risk if the on-site diesel generators are available to carry the full IT load throughout the replacement period","The leak will self-seal under transformer operating pressure once the oil level stabilises at the leak point"],correct:0,explain:"Single-transformer DCs have no recovery option for transformer failure except a replacement — which takes 52–78 weeks. This is why Tier IV requires two independent transformers for concurrent maintainability."},
{level:2,id:"Q001-06",icon:"⚡",stage:"rhetoric",q:"Why is SF6 in HV switchgear an emerging concern for DC operators?",options:["SF6 gas is significantly more expensive than alternative insulating media, adding approximately €50k per switchgear unit","SF6 is classified as flammable under revised EU ATEX directives, requiring additional explosion protection zones around switchgear","SF6 gas is no longer manufactured in the EU — existing installations face supply constraints for top-up and maintenance","SF6 has a GWP of 23,500 — the most potent greenhouse gas in DCs. F-Gas regulation requires leak detection and reporting"],correct:3,explain:"SF6 GWP: 23,500 — the highest GWP of any gas commonly used in DC infrastructure. Even small leaks are significant under emissions reporting. EU F-Gas Regulation 2024/573 applies. Source: IPCC AR5; EU 2024/573."},
{level:3,id:"Q001-07",icon:"🔲",stage:"grammar",q:"What is the purpose of a bus coupler in a dual-bus main switchboard?",options:["Connects Bus A and Bus B — allowing either transformer to feed both sections in emergency. Normally open for fault management","Increases the total bus ampere rating by connecting two bus sections in permanent parallel configuration","Reduces harmonic distortion by providing a filtered return path between the two isolated bus sections","Provides combined lightning and transient surge protection for both bus sections via a shared high-energy surge protective device installation"],correct:0,explain:"The bus coupler bridges the two bus sections. Normally open (split bus) limits fault level. Closes when one transformer is out to maintain dual feed. Source: IEC 61439; EN 50600-2-2."},
{level:3,id:"Q001-08",icon:"🔲",stage:"logic",q:"A second transformer is added to a DC with normally closed bus coupler. Three months later, downstream breakers start nuisance-tripping. What happened?",options:["The original breakers are faulty and require replacement with higher-rated units from the same manufacturer","Parallel transformers doubled the fault level — downstream protection settings cannot discriminate at the higher level","The new transformer is physically too large for the switchroom, causing electromagnetic interference with all adjacent distribution equipment","The building power factor shifted below 0.85 due to the additional transformer magnetising current draw"],correct:1,explain:"Normally closed bus coupler with two transformers doubles the prospective fault level. All downstream protection settings must be reviewed and coordination study updated. Source: IEC 60909; IS 10101."},
{level:3,id:"Q001-09",icon:"🔲",stage:"rhetoric",q:"An operator asks: 'Why does our switchboard need Form 4b segregation? Form 2b is cheaper.' How do you respond?",options:["Form 2b is adequate for all DC applications — the additional cost of Form 4b cannot be justified operationally","Form classification does not materially affect DC switchboard performance or maintenance safety outcomes","Form 4b provides individual compartments per functional unit — enabling live maintenance on one circuit while adjacent circuits remain energised","Form 4b segregation is only required in hospital critical power installations under IEC 61439-7 Annex requirements"],correct:2,explain:"Concurrent maintainability — working on one circuit while others remain live — requires physical segregation between functional units. Form 4b (Type 7) provides this. Source: IEC 61439-2; EN 50600-2-2."},
{level:4,id:"Q001-11",icon:"🔋",stage:"grammar",q:"What UPS topology classification means the output voltage and frequency are independent of the input?",options:["VFI (Voltage and Frequency Independent) — the standard double conversion topology for data centres","VFD (Voltage and Frequency Dependent) — the IT load follows input supply variations directly","VI (Voltage Independent) — the output voltage is regulated but frequency follows the input supply","VFI-SS (Voltage Frequency Independent with Static Switch) — a hybrid topology for smaller installations"],correct:0,explain:"VFI per IEC 62040-3: the IT load always receives power from the inverter, fully decoupled from input voltage and frequency variations. This is the standard topology for DC UPS. Source: IEC 62040-3."},
{level:4,id:"Q001-12",icon:"🔋",stage:"logic",q:"A 50 MW DC has legacy UPS at 93% efficiency and modern UPS at 97.5% is available. What is the annual energy cost difference?",options:["Approximately €200k per year — the 4.5% efficiency gap generates modest savings at current electricity prices","Approximately €1M per year — significant but insufficient to justify the capital expenditure for UPS replacement","Approximately €2.6M per year — the 4.5% efficiency delta on 50 MW produces 2.48 MW of avoided losses at €0.12/kWh","Approximately €5M per year — including both direct UPS savings and the reduced cooling load from lower losses"],correct:2,explain:"At 93%: input = 50/0.93 = 53.76 MW, losses = 3.76 MW. At 97.5%: input = 50/0.975 = 51.28 MW, losses = 1.28 MW. Delta = 2.48 MW × 8,760 hrs × €0.12/kWh (CRU T2) = €2.61M/year. Source: AIMEP DC Standards Ref (T2); IEC 62040-3 (T1)."},
{level:4,id:"Q001-13",icon:"🔋",stage:"rhetoric",q:"A vendor proposes eco mode UPS (99% efficiency) for a Tier IV DC. What is the trade-off the operator must accept?",options:["No trade-off exists — eco mode is categorically superior to double conversion in all operating conditions","Eco mode reduces UPS component lifespan by 30–40% due to increased thermal cycling during mode transitions","Eco mode cannot be used in any data centre application because the 2–4 ms transfer time exceeds ITIC tolerance limits for all server PSUs","Eco mode bypasses double conversion — the IT load sees conditioned mains with a 2–4ms transfer to battery on failure"],correct:3,explain:"Eco mode saves ~1.5–2.5% efficiency but introduces a transfer gap (2–4ms). Most IT PSUs tolerate this per ITIC curve, but the operator must verify compatibility. Source: IEC 62040-3; CBEMA/ITIC."},
{level:5,id:"Q001-14",icon:"🔀",stage:"grammar",q:"What is the maximum transfer time for an STS to remain within ITIC tolerance?",options:["1 ms — the threshold for sensitive medical and laboratory instrumentation power transfers","Less than 10 ms — well within the ITIC curve 20 ms tolerance at zero voltage for IT equipment","50 ms — the standard transfer time for mechanical automatic transfer switches used in commercial building installations","100 ms — acceptable for IT equipment with dual-corded PSU redundancy and battery backup"],correct:1,explain:"STS transfer: <10 ms. ITIC tolerance: 20 ms at 0V. The 10 ms margin ensures IT equipment does not detect the transfer. Source: IEC 62310-1; ITIC curve."},
{level:5,id:"Q001-15",icon:"🔀",stage:"logic",q:"An STS is set with zero retransfer delay. The preferred source experiences intermittent failures. What happens?",options:["The STS hunts — transferring rapidly between sources, stressing downstream equipment and risking PSU failures","The STS handles intermittent source failures automatically using its internal power quality analysis algorithms","Nothing adverse occurs — modern STS units include built-in anti-hunting logic regardless of retransfer delay setting","The alternate source takes over permanently and the STS locks out the preferred source after three failed transfers"],correct:0,explain:"Zero retransfer delay causes hunting during transient events. Set minimum 5–30 seconds retransfer delay to prevent repeated transfers. Source: IEC 62310-1."},
{level:5,id:"Q001-16",icon:"🔀",stage:"rhetoric",q:"An operator has two UPS systems but no STS. They claim dual-path redundancy. What is the gap?",options:["No gap — two independent UPS systems inherently provide full dual-path redundancy to the IT load","STS is only required for Tier IV certification and adds unnecessary complexity to Tier III facilities","Without STS, the load sits on one UPS — if it fails, manual intervention is needed. STS provides automatic transfer in <10 ms","The operator can achieve equivalent redundancy by installing a manual changeover switch with a rated transfer time and lockout procedure"],correct:2,explain:"Dual UPS without STS = manual redundancy (hours to switch). Dual UPS with STS = automatic redundancy (milliseconds). The difference determines whether redundancy is operational or theoretical."},
{level:6,id:"Q001-17",icon:"📦",stage:"grammar",q:"What continuous loading limit does IS 10101 specify for circuits serving fixed loads?",options:["60% of rated current — the conservative limit applied to circuits in high-ambient environments above 35°C","80% of rated current — a 32A circuit can serve a maximum continuous load of 25.6A under normal conditions","90% of rated current — the standard derating for circuits enclosed in cable trunking or containment systems","100% of rated current — circuits are designed to operate continuously at their full protective device rating"],correct:1,explain:"IS 10101 (and IEC 60364) limits continuous loading of circuits to 80% of the protective device rating. A 32A breaker serves 25.6A continuously. Source: IS 10101 Chapter 43."},
{level:6,id:"Q001-18",icon:"📦",stage:"logic",q:"A colocation DC sells 50 racks at 8 kW each. The customer installs 15 kW GPU servers. What happens?",options:["The intelligent PDU dynamically redistributes available power across all branch circuits to automatically accommodate the higher per-rack load demand","The upstream UPS compensates for the overload by increasing its output current within the 125% overload tolerance","Nothing adverse occurs — modern PDUs are oversized by 50% at manufacture to accommodate future load growth","PDU branch circuits trip on overload — circuits were sized for 8 kW per rack and 15 kW exceeds the 80% continuous limit"],correct:3,explain:"Power allocation must match actual IT load. Selling at 8 kW/rack and installing 15 kW creates a physical overload that breakers will clear — at 3 AM. Source: IS 10101."},
{level:6,id:"Q001-19",icon:"📦",stage:"rhetoric",q:"Why is per-circuit PDU monitoring worth the additional cost?",options:["It is not worth the cost — aggregate PDU monitoring at the input provides equivalent visibility at lower expense","Per-circuit monitoring is only needed for Tier IV facilities where individual circuit visibility is a certification requirement","Per-circuit monitoring reveals load distribution — identifying overloaded circuits before trips and stranded capacity","Monitoring adds system complexity without meaningful operational benefit beyond what periodic manual readings provide"],correct:2,explain:"Monitoring converts reactive failure management (breaker trips) to proactive capacity management (alerts before overload). The 5–15% capacity reclamation from rebalancing under-utilised circuits typically justifies the cost."},
{level:7,id:"Q001-20",icon:"🔗",stage:"grammar",q:"What is the typical power capacity of a 32A three-phase busway tap-off at 80% derating?",options:["17,725 W — calculated as 32A × 400V × 1.732 × 0.80 per IS 10101 continuous loading rules","11,776 W — calculated as 32A × 230V × 1.6 derating for enclosed busway tap-off installations","5,888 W — the single-phase equivalent capacity at 32A × 230V × 0.80 derating per circuit","22,170 W — the full rated capacity at 32A × 400V × 1.732 without any continuous loading derating"],correct:0,explain:"Three-phase tap-off: 32 × 400 × 1.732 = 22,170 W at rated current. At 80% continuous: 17,725 W. Source: IEC 61439-6; IS 10101."},
{level:7,id:"Q001-21",icon:"🔗",stage:"logic",q:"A DC converts a 100-rack row from 5 kW to 20 kW per rack. The overhead busway is rated at 250A three-phase. What is the problem?",options:["No problem — busway flexibility allows unlimited reconfiguration of tap-off points to serve higher per-rack densities","Row power increases from 500 kW to 2,000 kW — a single 250A busway provides only 173 kW at 80%, far below requirements","Busway ampere rating automatically increases with load because the conductor temperature limit rises with ambient airflow","Adding more tap-off boxes to the existing busway distributes the higher total load across sufficient connection points"],correct:1,explain:"Busway rating is fixed at installation. Adding tap-offs distributes existing capacity but does not add capacity. High-density conversion typically requires additional busway runs or direct cable feeds. Source: IEC 61439-6."},
{level:7,id:"Q001-22",icon:"🔗",stage:"rhetoric",q:"An operator says: 'Busway gives us unlimited flexibility to add racks.' What is the limitation they are overlooking?",options:["Busway does provide unlimited flexibility — tap-off points can be added anywhere along the full busway length","Tap-off connection points are not hot-pluggable under load, requiring a full busway section de-energisation for each new tap-off connection","Busway systems cannot be physically extended beyond their original installed length without a full replacement","Tap-off flexibility is unlimited but busway ampere rating is fixed — adding tap-offs beyond the rating creates overload"],correct:3,explain:"Flexibility of connection ≠ flexibility of capacity. The busway is a fixed-capacity conductor. Overloading it by adding too many tap-offs is the same as overloading a cable. Source: IEC 61439-6."},
{level:8,id:"Q001-23",icon:"🔌",stage:"grammar",q:"What is the purpose of A+B dual PDU configuration in a rack?",options:["Each PDU provides an independent power path from separate sources — if PDU-A fails, PDU-B carries 100% of rack load","Dual PDUs double the available power capacity per rack by providing two simultaneous feed paths to each server","Dual PDUs balance the three-phase load across two independent neutral conductors to reduce harmonic currents","Dual PDUs reduce the per-PDU loading to approximately 50%, extending PDU component lifespan and reducing scheduled maintenance frequency"],correct:0,explain:"A+B redundancy means each server has two independent power paths. Each server PSU connects to a different PDU. Either PDU can carry the full rack load. Source: EN 50600-2-2; Uptime Institute."},
{level:8,id:"Q001-24",icon:"🔌",stage:"logic",q:"A PDU-A failure in a rack row causes 6 of 20 servers to lose power despite A+B configuration. What is the most likely cause?",options:["Both PDU-A and PDU-B failed simultaneously due to a common upstream UPS fault affecting the entire rack row","An upstream UPS failure propagated through the STS transfer mechanism to both PDU-A and PDU-B feeds despite independent power paths","The 6 affected servers had both PSU cables connected to PDU-A instead of A+B — eliminating their power redundancy","All 6 servers had single PSUs installed rather than the dual PSUs required for A+B redundancy configuration"],correct:2,explain:"Dual PSUs on the same PDU provide zero power redundancy. This cabling error is found in 3–10% of racks during post-installation audits. Source: Uptime Institute; industry data."},
{level:8,id:"Q001-25",icon:"🔌",stage:"rhetoric",q:"Why should every DC perform a rack-by-rack PSU-to-PDU cabling audit?",options:["Audits are only needed for new installations during the initial commissioning and handover verification process","Industry data shows 3–10% of racks have incorrect A/B cabling — dual PSUs on one PDU eliminates all upstream redundancy","Cable audits are unnecessary overhead and waste valuable operational time that would be better spent on upstream power infrastructure testing","Intelligent PDUs with per-outlet monitoring make physical cabling audits redundant by detecting single-path connections"],correct:1,explain:"The PSU-to-PDU connection is the final link in the power redundancy chain. If it is wrong, everything upstream — dual UPS, STS, dual PDU — is wasted. Industry audit data shows 3–10% error rate."},
{level:9,id:"Q001-26",icon:"💻",stage:"grammar",q:"What is the efficiency of an 80 PLUS Titanium PSU at 50% load?",options:["82% — the entry-level 80 PLUS Bronze certification efficiency rating at half load conditions","88% — the mid-tier 80 PLUS Gold certification efficiency rating at half load conditions","92% — the 80 PLUS Platinum certification efficiency rating at half load operating conditions","96% — the highest commonly available PSU efficiency tier under the 80 PLUS programme"],correct:3,explain:"80 PLUS Titanium: 96% at 50% load. This is the current highest tier. Compare to Bronze (82%), Gold (88%), Platinum (92%). Source: 80 PLUS programme."},
{level:9,id:"Q001-27",icon:"💻",stage:"logic",q:"A 50 MW DC uses Bronze (82%) PSUs instead of Titanium (96%). What is the approximate annual energy cost difference?",options:["Approximately €500k per year — the efficiency gap produces modest but measurable savings at scale","Approximately €2M per year — significant savings but insufficient to justify a fleet-wide PSU replacement","Approximately €11M per year — including both direct PSU loss savings and cooling energy to remove the waste heat","Approximately €50M per year — the compounding effect of PSU losses cascading through the entire downstream cooling infrastructure chain"],correct:2,explain:"Bronze losses: 50/0.82-50=10.98 MW. Titanium: 50/0.96-50=2.08 MW. Delta: 8.9 MW. Energy: 8.9×8760×0.12=€9.36M. Cooling (at COP 4.5): 8.9/4.5×8760×0.12=€2.08M. Total: ~€11.4M/year."},
{level:9,id:"Q001-28",icon:"💻",stage:"rhetoric",q:"A procurement manager says: 'PSU efficiency doesn't matter — the price difference between Bronze and Titanium is only €50 per PSU.' How do you respond?",options:["At €50/PSU for 10,000 units: €500k premium. Annual energy saving at 10 MW IT: €1.2M/year. Payback under 5 months","Correct — the per-unit savings are negligible when spread across the total server procurement capital expenditure budget","PSU efficiency only matters for large-scale DCs above 20 MW — smaller facilities see insufficient return on the premium","The procurement manager is correct to prioritise unit cost — PSU efficiency gains are offset by higher failure rates"],correct:0,explain:"PSU efficiency has a double impact: direct electrical saving + cooling energy reduction. The premium pays back in months, not years. Source: 80 PLUS programme; AIMEP calculations."}
];

const GLOSSARY_001 = [
{term:"MIC",def:"Maximum Import Capacity — the contracted maximum power import from the grid in MVA or MW."},
{term:"MVA",def:"Mega Volt-Amperes — unit of apparent power. Includes both real (MW) and reactive (MVAr) components."},
{term:"Power Factor",def:"Ratio of real power (MW) to apparent power (MVA). Target >0.95 at the grid connection point."},
{term:"N-1",def:"Grid security standard requiring stable operation after the loss of any single element."},
{term:"EirGrid",def:"Ireland's electricity transmission system operator. Manages the 110 kV+ network."},
{term:"ESB Networks",def:"Ireland's electricity distribution system operator. Manages the 38 kV and below network."},
{term:"HV/MV Transformer",def:"Steps voltage down from high voltage (110 kV) to medium voltage (10/20 kV)."},
{term:"ONAN/ONAF",def:"Oil-immersed transformer cooling modes. ONAN = natural cooling. ONAF = forced air over oil."},
{term:"K-Factor",def:"Measure of additional heating from harmonic currents. IT loads typically K-13 to K-20."},
{term:"SF6",def:"Sulphur hexafluoride — potent greenhouse gas (GWP 23,500) used in some HV/MV switchgear."},
{term:"GIS",def:"Gas-Insulated Switchgear — compact HV switchgear using SF6 or clean-air insulation."},
{term:"Bus Coupler",def:"Switch connecting two bus sections in a dual-bus switchboard. Normally open for fault level control."},
{term:"Fault Level",def:"Prospective short-circuit current at a point in the network. Measured in kA."},
{term:"Form 4b (Type 7)",def:"IEC 61439 segregation level providing individual compartments for each functional unit."},
{term:"Discrimination",def:"Protection coordination ensuring the closest upstream device clears a fault first."},
{term:"VFI",def:"Voltage and Frequency Independent — double conversion UPS topology. IT load always on inverter."},
{term:"UPS",def:"Uninterruptible Power Supply — provides continuous power to IT during mains disturbance."},
{term:"VRLA",def:"Valve Regulated Lead-Acid — sealed battery type. 5–7 year life. Temperature sensitive."},
{term:"Li-ion",def:"Lithium-ion battery. 10–15 year life, lighter, higher temperature tolerance than VRLA."},
{term:"Eco Mode",def:"UPS mode bypassing double conversion for efficiency (~99%), with 2–4 ms transfer gap."},
{term:"STS",def:"Static Transfer Switch — transfers load between two power sources in <10 ms."},
{term:"ITIC Curve",def:"Power acceptability curve defining voltage tolerance of IT equipment. 20 ms at 0V."},
{term:"PDU",def:"Power Distribution Unit — distributes power from UPS/STS to individual rack circuits."},
{term:"Busway",def:"Pre-fabricated conductor system for overhead power distribution in data halls."},
{term:"Tap-Off Box",def:"Connection point on a busway for feeding downstream circuits."},
{term:"A+B Redundancy",def:"Dual independent power paths (A and B) to each rack via separate PDUs."},
{term:"PSU",def:"Power Supply Unit — converts AC to DC inside the server. Efficiency rated by 80 PLUS tiers."},
{term:"80 PLUS",def:"PSU efficiency certification programme. Tiers: Bronze (82%), Gold (88%), Platinum (92%), Titanium (96%)."},
{term:"PUE",def:"Power Usage Effectiveness — total facility power divided by IT power. Target ≤1.3."},

{term:"CRM",def:"Capacity Remuneration Mechanism — capacity market payment for generators. T-4 clearing: €149,960/MW/yr."},
{term:"Concurrent Maintainability",def:"Ability to maintain any component without interrupting IT service. Tier III+ requirement."},
{term:"IS 10101",def:"Irish national electrical wiring standard. Based on IEC 60364 with national amendments."},
{term:"EN 50600-2-2",def:"European standard for data centre power distribution infrastructure."},
{term:"IEC 62040-3",def:"International standard for UPS performance testing and classification."},
{term:"IEC 61439",def:"International standard for low-voltage switchgear and controlgear assemblies."},
{term:"HVDC (48V)",def:"High Voltage Direct Current distribution at 48V, eliminating two AC/DC conversion stages."},

];

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Runtime Error'),
      React.createElement('p',null,React.createElement('strong',null,'DC-LEARN-001 v7.4.6 · Data Centre Power Chain'),' encountered an error.'),
      React.createElement('pre',{style:{background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,fontSize:13,whiteSpace:'pre-wrap',maxHeight:300,overflow:'auto'}},String(this.state.error)),
      React.createElement('p',{style:{color:'#6b7280',fontSize:13}},'Copy error and send to LM.'));
    return this.props.children;
  }
}

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const cc=[
    {label:"Think of it like… (1/3)",text:fact&&fact.feynman?fact.feynman.analogy:(fact?fact.plain:'')},
    {label:"From the ground up… (2/3)",text:fact&&fact.feynman?fact.feynman.firstPrinciples:(fact?fact.number:'')},
    {label:"You understand this when… (3/3)",text:fact&&fact.feynman?fact.feynman.theTest:(fact?fact.definition:'')}
  ];
  const handleClarify=(e)=>{e.stopPropagation();setClarifyStep(prev=>prev<0?0:prev<2?prev+1:-1);};
  if(stage!=='grammar'||!fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>{clarifyStep>=0?(clarifyStep<2?'Try again →':'Got it'):'💡 Clarify'}</button>
      {clarifyStep>=0&&clarifyStep<3&&(
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{cc[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{cc[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (idx) => {
    setSelectedLevel(idx);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.idx),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].idx),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

    try {

      if(pk){ setRhetPersona(pk); sessionStorage.removeItem('dc_persona_key'); }
    } catch(e){}
  },[activeLevel]);
  
  React.useEffect(()=>{ dcTimingLog.log('stage_change', { stage: trivium, level: activeLevel }); },[trivium, activeLevel]);
  const level=LEVELS.find(l=>l.level===activeLevel);

      <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:10}}>— Monday at Clonshaugh</div>
      <div style={{fontSize:13,color:"var(--text-dim)",lineHeight:1.5}}>This module teaches you every link in that chain — from the 110 kV grid connection to the server PSU.</div>
    </div>
    <div className="level-nav">
      {LEVELS.map(l=>(<button key={l.level} className={'level-btn'+(activeLevel===l.level?' active':'')} aria-label={'Level '+l.level+': '+l.name} onClick={()=>{setActiveLevel(l.level);setTrivium('grammar');}}>L{l.level}</button>))}

      <div className="trivium-tabs">
        <button className={'triv-btn'+(trivium==='grammar'?(p.grammar?' done-grammar':' active-grammar'):p.grammar?' done-grammar':'')} onClick={()=>setTrivium('grammar')}>{p.grammar?'✓ ':''}Grammar</button>

/* -------------------------------------------
   L7 BUSWAY - 4-step walkthrough
   Teaching: fixed capacity, flexible connection
   Layout: left margin labels x<86, drawing 100-500, right margin 520+
   Gate 11: all labels in margins, zero overlap
   ------------------------------------------- */
function L7Busway(){
  const [step,setStep]=useState(0);
  const NN=[
    "You're standing at one end of the data hall, looking at a cross-section. Rack rows ahead, ceiling above, raised floor below. Where does the power come from?",
    "Look up. Two busway trunking runs span the ceiling — A-feed and B-feed, each rated 250A three-phase. Tap-off boxes clamp onto each busway and cables drop vertically down. This overhead infrastructure is installed once. The 250A rating is fixed permanently.",
    "Below the raised floor tiles is a void. Cables route through this void to floor PDUs. PDU-A is fed from Busway A, PDU-B from Busway B. From each PDU, power whips reach the rack rows. Every rack gets both A and B feed — two independent paths from ceiling to server.",
    "The constraint. Busway rated 250A = 173 kW at 80% continuous loading. At 5 kW/rack serving 20 racks: 100 kW needed, 173 kW available — fine. At 20 kW/rack serving the same 20 racks: 400 kW needed — 2.3 times the busway capacity. Adding tap-offs distributes existing capacity more ways. It does not add a single watt."
  ];

  useEffect(()=>{
    // Define element groups per step
    const s1=['l7-ceil','l7-ceil-l','l7-tray','l7-tray-l','l7-tray-l2',
      'l7-bwa','l7-bwa-l','l7-bwb','l7-bwb-l',

      'l7-dropa','l7-dropb','l7-la','l7-la-l','l7-lb','l7-lb-l'];
    const s2=['l7-flr','l7-flr-l','l7-void','l7-void-l',

      'l7-r1','l7-r1-l','l7-rh','l7-rh-l','l7-r2','l7-r2-l','l7-ab1','l7-ab2'];
    const s3=['l7-cbox','l7-ct1','l7-ct2'];

    // Reset all to invisible
    [...s1,...s2,...s3].forEach(id=>P(id,{opacity:'0'}));
    // Ghosted structural elements always partly visible
    P('l7-ceil',{opacity:'0.25'});P('l7-ceil-l',{opacity:'0.25'});
    P('l7-flr',{opacity:'0.25'});P('l7-flr-l',{opacity:'0.25'});
    P('l7-r1',{opacity:'0.4'});P('l7-r1-l',{opacity:'0.4'});
    P('l7-rh',{opacity:'0.25'});P('l7-rh-l',{opacity:'0.25'});
    P('l7-r2',{opacity:'0.4'});P('l7-r2-l',{opacity:'0.4'});
    document.getElementById('l7-ins').innerHTML='';

    if(step>=1){
      s1.forEach(id=>P(id,{opacity:'1'}));
      P('l7-ceil',{opacity:'1',fillOpacity:'0.12'});
    }
    if(step>=2){
      s2.forEach(id=>P(id,{opacity:'1'}));

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath&&<path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime)&&<line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime&&<line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc001_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc001_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc001_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
          27 questions across three Trivium stages — 9 per stage, one per chain level.
          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>60s</span>
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}
          </div>
        </div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterStage==='all'?' active':'')} onClick={()=>setFilterStage('all')}>All</button>
        <button className={'filter-btn'+(filterStage==='grammar'?' active':'')} onClick={()=>setFilterStage('grammar')}>Knowledge Check</button>
        <button className={'filter-btn'+(filterStage==='logic'?' active':'')} onClick={()=>setFilterStage('logic')}>Eng. Calculation</button>
        <button className={'filter-btn'+(filterStage==='rhetoric'?' active':'')} onClick={()=>setFilterStage('rhetoric')}>Prof. Judgement</button>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>
        {LEVELS.map(l=>(<button key={l.id} className={'filter-btn'+(filterLevel===l.level?' active':'')} onClick={()=>setFilterLevel(l.level)}>L{l.level}</button>))}
      </div>
      {score.total>0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:600}}>Score: {score.correct}/{score.total} ({Math.round(score.correct/score.total*100)}%)</div>
            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL?'Completed in '+fmtTime(elapsed)+' (under time)':'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{const s=stageScore(st);const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};return s.t>0&&(<div key={st} style={{fontSize:12,color:stageColours[st]}}><strong>{labels[st]}:</strong> {s.c}/{s.t}</div>);})}
          </div>
          {allAnswered&&assessPct>=80&&React.createElement('button',{onClick:function(){setShowCertModal(true);},style:{marginTop:12,padding:'10px 0',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}},assessPct>=90?'Get Achievement Certificate':'Get Completion Certificate')}
          {showCertModal&&React.createElement(CertModal,{score:score.correct,total:score.total,onClose:function(){setShowCertModal(false);}})}
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q);
        const answered=answers[gi]!==undefined;
        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        const countdownCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
              <span>{q.icon}</span>
              <span className={'badge badge-'+q.stage}>{q.stage}</span>
              <span style={{fontSize:12,color:'var(--text-muted)'}}>Level {q.level}</span>
              {/* B5: per-question countdown top-right */}
              {timerActive&&!answered&&!isTimedOut&&qStarted&&(
                <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:countdownCol,minWidth:36,textAlign:'right'}}>
                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  var checkResult = supa.from('certificates').select('certificate_number').eq('module_id', TOOL_ID).eq('learner_name', learnerName).maybeSingle();
  return checkResult.then(function(existing) {
    if (existing.data) { return { duplicate: true, certNumber: existing.data.certificate_number }; }
    return supa.from('certificates').insert([{
      user_id: userId, module_id: TOOL_ID, certificate_number: certNumber,
      cpd_hours: 2, certificate_type: 'Engagement', score: null,
      learner_name: learnerName, pdf_url: null
    }]).select().single().then(function(result) {
      if (result.error) { console.error('Engagement cert failed:', result.error.message); return null; }
      return { certNumber: certNumber, type: 'Engagement', hours: 2, pct: null };
    });
  });
}

function EngageCertModal(props) {

/* ═══ DC-LEARN STAGE 5 AUTH + SYNC ═════════════════════════════════════════
   Built: 09/04/2026 — Stage 5 Session 2
   Layer 1 (localStorage) never depends on Layer 2 (Supabase).
   If Supabase is blocked, offline, or errors, the module works exactly as
   it did before: IS_FREE_MODULE or localStorage.dc_learn_paid decides access.
   =========================================================================*/

const IS_FREE_MODULE = (TOOL_ID === 'DC-LEARN-000' || TOOL_ID === 'DC-LEARN-001' || TOOL_ID === 'DC-LEARN-002');
const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};

function useAuth() {
  const [state, setState] = React.useState({
    loading: !!supa,
    user: null,
    isAdmin: false,
    hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
  });

  React.useEffect(() => {
    let mounted = true;

    async function resolve(session) {
      if (!mounted) return;
      try {
        if (session && session.user) {
          const user = session.user;
          if (dcAuth.isAdminUser(user)) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: true, hasAccess: true });
            return;
          }
          const licenceOk = await dcAuth.checkLicence(user.id);
          if (licenceOk === true) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: false, hasAccess: true });
          } else {
            // licenceOk === null (error: fall through) or false (no row)
            setState({
              loading: false, user: user, isAdmin: false,
              hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
            });
          }
          return;
        }
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      } catch(e) {
        console.warn('DC-LEARN: auth resolve failed, falling through', (e && e.message) || e);
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    }

    if (!supa) {
      setState({
        loading: false, user: null, isAdmin: false,
        hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
      });
      return () => { mounted = false; };
    }

    (async () => {
      try {
        const { data: { session } } = await supa.auth.getSession();
        await resolve(session);
      } catch(e) {
        console.warn('DC-LEARN: getSession failed, falling through', (e && e.message) || e);
        if (mounted) setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    })();

    let sub = null;
    try {
      const r = supa.auth.onAuthStateChange((_ev, session) => { resolve(session); });
      sub = r && r.data && r.data.subscription;
    } catch(e) {}

    return () => {
      mounted = false;
      try { if (sub) sub.unsubscribe(); } catch(e) {}
    };
  }, []);

  return state;
}

function PlatformSync({ user, progress }) {
  React.useEffect(() => {
    if (!supa || !user || !user.id) return;
    let cancelled = false;
    (async () => {
      try {
        // 1. Flush timing buffer → learner_analytics, then clear on success
        const raw = safeStore.get(DC_TIMING_KEY);
        if (raw) {
          let events = [];
          try { events = JSON.parse(raw); } catch(e) { events = []; }
          if (!cancelled && Array.isArray(events) && events.length) {
            const rows = events.slice(0, 500).map(function(ev) {
              return {
                user_id: user.id,
                module_id: TOOL_ID,
                event_type: (ev && ev.event) || 'unknown',
                event_data: ev || {},
                recorded_at: new Date((ev && ev.ts) || Date.now()).toISOString(),
              };
            });
            const { error } = await supa.from('learner_analytics').insert(rows);
            if (!error) safeStore.remove(DC_TIMING_KEY);
            else console.warn('DC-LEARN: analytics flush failed', error.message);
          }
        }
        // 2. Upsert progress → learner_progress (keeps localStorage as cache)
        if (!cancelled && progress && typeof progress === 'object') {
          const keys = Object.keys(progress);
          const rows = keys.map(function(levelId) {
            const p = progress[levelId] || {};
            return {
              user_id: user.id,
              module_id: TOOL_ID,
              level_id: String(levelId),
              grammar_complete: !!p.grammar,
              logic_complete: !!p.logic,
              rhetoric_complete: !!p.rhetoric,
              updated_at: new Date().toISOString(),
            };
          });
          if (rows.length) {
            const { error } = await supa.from('learner_progress').upsert(rows, {
              onConflict: 'user_id,module_id,level_id',
            });
            if (error) console.warn('DC-LEARN: progress upsert failed', error.message);
          }
        }
      } catch(e) {
        console.warn('DC-LEARN: PlatformSync error', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [user && user.id, JSON.stringify(progress || {})]);
  return null;
}
