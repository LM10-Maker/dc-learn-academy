<title>DC-LEARN-001 v7.4.6 | Data Centre Power Chain | Legacy Business Engineers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
svg text.ts{font:400 11px var(--font-sans);fill:var(--text-dim)}
svg text.tl{font:500 11px var(--font-sans);fill:var(--text-bright)}
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.dc-story-body{font-size:17px;line-height:1.9;color:var(--text)}
.dc-story-body p{margin-bottom:22px !important;font-size:17px;line-height:1.9}
.dc-story-body h2{font-family:Georgia,"Times New Roman",serif !important;font-size:26px !important;font-weight:400 !important;color:var(--text-bright) !important;margin-bottom:28px !important;text-align:center;letter-spacing:0.3px}
.dc-story-body h3{font-family:Georgia,"Times New Roman",serif !important;font-size:19px !important;font-weight:500 !important;color:var(--text-bright) !important;margin:36px 0 16px !important}
.dc-story-body blockquote{margin:32px 0 !important;padding:18px 24px 18px 28px !important;border-left:3px solid var(--green) !important;background:var(--green-dim) !important;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.dc-story-body blockquote p{margin-bottom:0 !important}
.dc-story-body hr{margin:36px auto !important;width:80px;border:none !important;border-top:1px solid var(--border-light) !important}
.dc-story-body em{font-style:italic}
.dc-story-body strong{color:var(--text-bright)}
.dc-story-body .dc-story-dropcap::first-letter{float:left;font-family:Georgia,"Times New Roman",serif;font-size:68px;line-height:0.85;padding-right:10px;padding-top:4px;color:var(--green);font-weight:400}
@media(max-width:600px){.dc-authbtn-dropdown{position:fixed !important;top:68px !important;left:12px !important;right:12px !important;min-width:0 !important;width:auto !important}}
</style>
</head>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-LEARN-001 v7.4.6</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

  learningObjective:"Understand how grid power reaches the DC, what MIC means, and why it is the ultimate capacity ceiling.",plainEnglish:"The MIC (Maximum Import Capacity) is the maximum power the grid will deliver to your site. Everything downstream — generators, UPS, PDUs, servers — must fit within this number. If the MIC is 50 MVA and your DC needs 60 MVA, nothing downstream matters until the grid capacity is increased.",
  grammar:{facts:[{term:"MIC (Maximum Import Capacity)",definition:"The contracted maximum power import from the grid, specified in MVA or MW. Set by the connection agreement with EirGrid (transmission) or ESB Networks (distribution).",plain:"The pipe diameter for electricity. Everything you do in the DC must fit through this pipe.",number:"Typical: 20–200 MVA for large DCs. Connection voltage: 110 kV (>20 MW), 38 kV (5–20 MW). Lead time: 4–8 years for new 110 kV connection.",standard:"EirGrid Connection Policy 2024; CRU/2025236",feynman:{analogy:"Think of it like the water main coming into your housing estate. Every house, every tap, every shower must fit through that one pipe. If the estate grows beyond what the main can deliver, no amount of internal plumbing helps — you need a bigger pipe from the water company, and that takes years.",firstPrinciples:"Electricity enters a data centre through a single contracted connection to the national grid. The maximum power that connection will deliver is the MIC — measured in MVA. Every transformer, UPS, and server downstream must fit within that number. Increasing it means a new grid infrastructure project with EirGrid — typically a 4–8 year lead time.",theTest:"You know you understand MIC when you can answer: A DC has a 50 MVA MIC and currently draws 30 MVA. Is there 20 MVA of headroom for IT growth? Answer: No — the 30 MVA includes PUE overhead. If PUE is 1.3, IT load is ~23 MW. Growing IT to 40 MW at PUE 1.3 needs 52 MVA — exceeding the MIC."}},{term:"110 kV Transmission Connection",definition:"High-voltage connection to the EirGrid transmission network. Required for DCs >20 MW. Dual independent 110 kV feeds from different substations for Tier IV.",plain:"The motorway junction for electricity. Big DCs need two independent motorway exits — from different junctions.",number:"110 kV capacity: up to ~500 MVA per circuit. Dual feed for Tier IV from two different 110 kV substations.",standard:"EirGrid Grid Code v2.0 2024; EN 50600-2-2",feynman:{analogy:"Think of it like the difference between a country road and a motorway. Small data centres connect via the local distribution network (the country road). Large ones need a direct connection to the transmission network (the motorway) — and for Tier IV, two motorway exits from different junctions.",firstPrinciples:"Ireland\'s electricity grid has two layers: transmission (110 kV and above, run by EirGrid) and distribution (38 kV and below, run by ESB Networks). Data centres above ~20 MW need a 110 kV transmission connection because the distribution network cannot supply enough power. For Tier IV, two independent 110 kV feeds from different substations provide fault tolerance.",theTest:"You know you understand this when you can answer: Why can\'t a 50 MW data centre just connect at 38 kV like a large office building? Answer: The distribution network at 38 kV cannot reliably deliver 50 MW to a single point. Transmission at 110 kV can — and dual independent feeds from different 110 kV substations are required for Tier IV fault tolerance."}},{term:"Power Factor at MIC",definition:"The ratio of real power (MW) to apparent power (MVA) at the grid connection point. Low power factor wastes grid capacity and may incur reactive power charges.",plain:"If your DC draws 50 MVA but only uses 45 MW of real power, the grid is carrying 5 MVA of wasted capacity. ESB charges for this.",number:"Target: >0.95 at MIC. Typical DC with modern UPS: 0.98–0.99. Legacy DC with 6-pulse UPS: 0.80–0.90.",standard:"ESB Networks connection agreement; EN 50160",feynman:{analogy:"Think of it like ordering a pint of beer. If 10% of the glass is froth, you\'re only getting 90% useful beer — but you\'re paying for the full glass. A poor power factor means you\'re using grid capacity for reactive power (the froth) instead of real power (the beer).",firstPrinciples:"When a data centre draws power, not all of it does useful work. Real power (MW) runs the servers; reactive power (MVAr) circulates in the system without doing work. The ratio of real to apparent power is the power factor. ESB Networks charges penalties when power factor drops below 0.95, because the grid must carry the full apparent power even though only the real power is useful.",theTest:"You know you understand power factor when you can answer: A DC draws 50 MVA with a power factor of 0.85. How much real power reaches the IT load? Answer: 50 × 0.85 = 42.5 MW. The grid is carrying 50 MVA but only 42.5 MW does work — 15% of the MIC capacity is wasted on reactive power."}},{term:"N-1 Grid Security Standard",definition:"The grid must remain stable if any single element (line, transformer, generator) fails. DCs connected at 110 kV must not cause instability under N-1 contingency.",plain:"The grid is designed so that losing any one piece does not cause a blackout. Your DC must not be the thing that tips it over.",number:"N-1 applies to all connections >10 MW. EirGrid assesses each new DC connection against system-wide N-1 security. Failed assessment = connection refused or delayed.",standard:"EirGrid Grid Code v2.0 2024; EirGrid Connection Policy",feynman:{analogy:"Think of it like a bridge designed to carry traffic even if one lane is closed. The grid must keep working even if one transmission line fails. If your DC is so big that it would overload the remaining lines during a fault, EirGrid will not connect you.",firstPrinciples:"N-1 means the system must survive the loss of any single component without cascading failure. When a DC applies for a grid connection, EirGrid models what happens if each nearby line or transformer fails. If the DC load would cause overloading on the remaining circuits, the connection is refused until reinforcement is built.",theTest:"You know you understand N-1 when you can answer: A 50 MW DC connects to a substation served by two 110 kV lines. One line trips. Can the remaining line carry the DC plus all other loads? If not, the connection fails the N-1 test and will be refused."}},{term:"Grid Connection Timeline",definition:"The elapsed time from connection application to energisation. For 110 kV connections in Ireland, typically 4-8 years including planning, design, and construction.",plain:"You cannot speed up a grid connection. It is the longest single lead time in any DC project.",number:"Application to offer: 6-12 months. Offer to planning: 12-24 months. Construction: 18-36 months. Total: 4-8 years for new 110 kV. 2-4 years for 38 kV upgrade.",standard:"EirGrid Connection Policy 2024; CRU/2025236",feynman:{analogy:"Think of it like building a new motorway exit. You cannot just cut a hole in the barrier. A grid connection is civil and electrical infrastructure that takes years, not months.",firstPrinciples:"A new 110 kV connection requires: EirGrid application, system study, connection offer, planning consent, detailed design, procurement, construction, and commissioning. Each step has statutory timelines. The grid connection is almost always the critical path for a new DC.",theTest:"You know you understand this when you can answer: A developer buys a site in 2026 and needs 80 MW by 2030. Is this achievable with a new 110 kV connection? Answer: Unlikely. 4-8 year lead time means energisation 2030-2034. The developer needs a site with existing grid capacity."}}],
    whatItLooksLike:"110 kV overhead line or underground cable terminating at the DC primary substation. Revenue metering at the connection point. Two independent 110 kV feeders for Tier IV — from different substations.",
    siteChecklist:["Confirm MIC from connection agreement (MVA and MW)","Verify single or dual feed — dual independent required for Tier IV","Check current load as percentage of MIC — headroom for growth?","Confirm power factor at MIC — target >0.95","Identify lead time for MIC increase if growth planned"]},
  logic:{causeAndEffect:[{cause:"DC IT load grows beyond the contracted Maximum Import Capacity agreed with ESB Networks at the point of connection",effect:"Excess demand is either curtailed or triggers breach-of-contract penalties. MIC increase requires new EirGrid application — 2–5 year lead time.",insight:"The MIC must be sized for the ultimate DC capacity at planning stage, not current load. Under-specifying the MIC is the most expensive mistake because it takes the longest to fix."},{cause:"Only one 110 kV EirGrid feeder is physically available to the site from the nearest primary substation",effect:"The DC cannot achieve Tier IV fault tolerance for the utility supply. A single feeder failure = total grid power loss.",insight:"Dual independent feeds from different substations is a site selection criterion for Tier IV. It must be confirmed before site acquisition."},{cause:"A grid connection application is submitted to EirGrid without an adequate site electrical survey or load forecast",effect:"EirGrid study reveals insufficient local network capacity. Connection offer delayed 12-24 months while reinforcement is designed.",insight:"Commission an independent grid capacity assessment before signing a site purchase agreement. The study cost is negligible versus a 2-year delay."},{cause:"Power factor at grid connection drops below 0.95 threshold specified in the ESB Networks connection agreement",effect:"Reactive power charges applied by ESB Networks. At Clonshaugh's 5 MVA MIC, a drop from 0.98 to 0.85 power factor wastes 2.6 MVA of apparent power capacity — effectively reducing usable MIC by 13%.",insight:"Power factor correction capacitors cost €15k–€30k (Tier 3 — manufacturer benchmarks, indicative). ESB reactive power penalties accrue monthly. The correction equipment pays back in 6–12 months — and reclaims MIC headroom that cannot be obtained any other way."}],
    constraintLesson:"The MIC is the absolute ceiling. Every other component in the power chain\nmust fit within it. A €100M DC with a 50 MVA MIC can never draw more\nthan 50 MVA — no matter how many generators, UPS, or PDUs are installed.\nIncreasing the MIC is a multi-year, multi-million-euro grid infrastructure project.\n",
    weakestLink:{whatsWrong:"We have 50 MVA MIC and currently draw 30 MVA. We have plenty of headroom for growth.",whatsRight:"30 MVA is 60% of MIC at current PUE. If PUE is 1.3, the IT load is ~23 MW. Growth to 40 MW IT at PUE 1.3 = 52 MVA — exceeding the 50 MVA MIC. The headroom is less than it appears when PUE overhead is included.",howToGetThere:"Calculate IT headroom as: (MIC - current_total) ÷ PUE. Model growth scenarios against MIC. If growth hits 80% of MIC within 5 years, start the MIC increase application now."}},
  rhetoric:{declan:{hook:"Check the MIC, then check your current draw, then calculate what happens when you try to add the next 50 racks.",text:"Check the MIC. Then check your current draw. Then calculate what happens when you fill the remaining hall space. If the answer is more than the MIC, you have a problem that takes 4–8 years to solve. Do this calculation before signing any expansion contract."},ann:{hook:"The MIC is the single most important number in any DC valuation. It sets the absolute revenue ceiling for the asset.",text:"The MIC is the single most important number in DC valuation. It sets the ultimate revenue capacity of the facility. A DC with a 100 MVA MIC is worth more than an identical DC with 50 MVA — because the growth ceiling is twice as high."},mark:{hook:"50 MVA at 110 kV equals 262 A per phase. Dual feed halves that per path. One wrong sizing assumption and expansion is blocked entirely.",text:"50 MVA at 110 kV = 50,000 kVA ÷ (1.732 × 110 kV) = 262 A per phase. Dual feed: 131 A per feeder under normal operation, 262 A per feeder under N-1. Cable sizing, protection settings, and transformer ratings must all coordinate with these currents."},sarah:{hook:"Grid electricity consumption is reported under EED Article 12. The MIC determines the maximum energy intensity this facility will ever need to disclose.",text:"Grid electricity consumption for DCs is reported under EED Article 12. The MIC and actual consumption are part of the regulatory reporting requirements. SEAI grid emission factor 0.2241 kgCO2/kWh applies to all grid-sourced electricity."},tom:{hook:"Grid connection at 50 to 150 thousand euros per MVA for shallow works. Underestimate the required headroom and the programme bill triples.",text:"Grid connection cost: €50k–€150k per MVA for shallow connection (Tier 3 — ESB Networks connection charges; SCSI benchmarks, indicative). A 100 MVA connection: €5M–€15M. Deep reinforcement (if grid upgrade needed): 2–5x additional. This cost is front-loaded and non-recoverable."}},
  rhetoricTakeaways:{declan:"Check MIC. Calculate growth to MIC boundary. Start the application process if you are within 5 years of hitting the ceiling.",ann:"MIC sets the ultimate revenue capacity of the asset. A constrained MIC reduces terminal valuation.",mark:"Calculate IT headroom as (MIC - current draw) / PUE. Model growth scenarios against MIC at target density.",sarah:"MIC and actual consumption are core metrics for EED Article 12 reporting. Grid emission factor of 0.2241 kgCO2/kWh applies to all grid-sourced electricity.",tom:"Grid connection at €50k–€150k per MVA is front-loaded and non-recoverable (Tier 3 — ESB Networks connection charges; SCSI benchmarks, indicative). Deep reinforcement can multiply this by 2–5x."},
  scenario:{title:"The Growth Ceiling",narrative:"A DC has 50 MVA MIC and currently draws 35 MVA at PUE 1.25. The operator plans to add 15 MW of IT load in Phase 2. The project manager says the MIC has enough headroom.",question:"Does the MIC support the Phase 2 expansion? Show the calculation.",answer:"Current state:\nTotal draw: 35 MVA. IT load: 35 ÷ 1.25 PUE = 28 MW IT.\n\nPhase 2 addition: 15 MW IT.\nTotal IT after Phase 2: 28 + 15 = 43 MW.\nTotal power at PUE 1.25: 43 × 1.25 = 53.75 MVA.\n\nMIC: 50 MVA. Required: 53.75 MVA.\nShortfall: 3.75 MVA (7.5% over MIC).\n\nThe Phase 2 expansion EXCEEDS the MIC by 3.75 MVA.\n\nOptions:\nA) Apply for MIC increase to 60 MVA — lead time 2–5 years, cost €500k–€1.5M\nB) Reduce PUE from 1.25 to 1.16 — frees 3.9 MVA headroom (requires cooling retrofit)\nC) Phase the IT addition: 12 MW now (stays within MIC), remaining 3 MW after MIC increase\n\nThe project manager's assumption was wrong. Headroom must be calculated including PUE.\n",
whoShouldCare:["declan","mark","ann"]},
  sourceNote:"MIC — EirGrid Connection Policy 2024 (T1). Grid capacity — EirGrid System Operator Report 2024 (T1). Power factor — ESB Networks (T1). Costs — AIMEP DC Standards Reference v1.2.0 (T2).",
  clockQuote:"One cable, one route, one connection. Four hundred tenants who assume the power's always on.",
  crossRefs:[{module:"DC-LEARN-006",level:"L3",topic:"Grid emission factor → carbon reporting"},{module:"DC-LEARN-002",level:"L1",topic:"MIC overhead → cooling load"}],
  retrofitRelevance:"MIC constraints are the primary growth limiter for existing DCs. PUE improvement is the fastest way to free MIC headroom without a grid application."

{
  id:"L2",level:2,name:"HV/MV Substation",icon:"⚡",
  component:"110kV/MV Transformer",available:true,
  userNeedStatement:"Understand how high voltage is transformed and why transformer redundancy determines availability",
  cascadeCheck:(kw,racks,pue)=>{const totalMW=(kw*racks/1000)*pue;const txMVA=2;const derated=txMVA*0.8*0.9;return{needed:(totalMW/2).toFixed(1),available:derated.toFixed(1),unit:"MW/path",pass:(totalMW/2)<=derated,detail:`${(totalMW/2).toFixed(1)}MW per path vs ${derated.toFixed(1)}MW (2MVA×0.8 K-derate×0.9PF)`}},
  learningObjective:"Understand what happens at the primary substation: HV to MV transformation, switchgear types, and why transformer redundancy matters.",plainEnglish:"The substation takes 110,000 volts from the grid and steps it down to medium voltage (typically 10 kV or 20 kV) for distribution inside the DC. For Tier IV, there are two transformers — either one can carry the full load if the other fails.",
  grammar:{facts:[{term:"HV/MV Transformer",definition:"Steps down from 110 kV (or 38 kV) to medium voltage (10 kV, 11 kV, or 20 kV). ONAN or ONAF cooled. Lead time for 110 kV transformers: 52–78 weeks.",plain:"A big box that reduces voltage from grid level to building level. Two of them for Tier IV. Ordering one takes 1–1.5 years.",number:"Typical: 40–80 MVA per transformer. 2× transformers for Tier IV (each rated for 100% load). Lead time: 52–78 weeks for 110 kV class.",standard:"IEC 60076; EN 50600-2-2",feynman:{analogy:"Think of it like a pressure regulator on a gas main. The gas arrives at high pressure from the street, and the regulator steps it down to a safe, usable pressure for your home. The HV/MV transformer does the same for electricity — stepping 110 kV down to 10 or 20 kV.",firstPrinciples:"Electricity travels long distances at high voltage (110 kV) because higher voltage means lower current and less energy lost as heat in the cables. But 110 kV is far too high for any equipment inside a data centre. The HV/MV transformer steps it down to medium voltage — typically 10 kV or 20 kV in Ireland — which can be safely distributed across the campus to the MV/LV transformers.",theTest:"You know you understand this when you can answer: Why not step directly from 110 kV to 400 V in one transformer? Answer: The voltage ratio would be too extreme for a single transformer to handle efficiently. Stepping down in stages (110 kV → 10 kV → 400 V) allows each transformer to be optimised for its voltage range and limits fault energy at each level."}},{term:"HV Switchgear",definition:"Equipment that controls, protects, and isolates the HV circuits at the substation. GIS (gas-insulated) or AIS (air-insulated) depending on space and environment.",plain:"The master switches for high-voltage power. GIS is compact (for indoor substations). AIS is cheaper but larger (for outdoor substations).",number:"GIS: SF6 or clean-air insulated. Compact footprint: ~50% of AIS. Cost premium: 30–50% over AIS. SF6 is an F-gas — increasingly replaced with vacuum or clean-air alternatives.",standard:"IEC 62271 series; EN 50600-2-2",feynman:{analogy:"Think of it like the circuit breaker panel in your house, but for the entire electricity supply to the campus. If something goes wrong — a fault, a short circuit — the HV switchgear disconnects the supply in milliseconds, before the fault energy can destroy equipment or injure people.",firstPrinciples:"At 110 kV, fault currents can reach tens of thousands of amps. The HV switchgear must detect a fault and break the circuit within 60–80 milliseconds. It uses SF₆ gas or vacuum interrupters to extinguish the electrical arc when the contacts open. The switchgear also provides the isolation points that allow sections of the network to be maintained safely.",theTest:"You know you understand HV switchgear when you can answer: Why does it matter whether the switchgear uses SF₆ or vacuum? Answer: SF₆ is a potent greenhouse gas (23,500× CO₂ equivalent). It\'s subject to F-Gas regulation. Vacuum switchgear has no F-Gas liability. New DC builds increasingly specify SF₆-free switchgear to avoid future regulatory risk."}},{term:"Transformer Redundancy",definition:"For Tier IV: 2× transformers, each rated for 100% of the total DC load. In normal operation, each carries ~50%. If one fails, the other carries 100% (N+1 or 2N at transformer level).",plain:"Two transformers sharing the load equally — if one fails or needs maintenance, the other carries the full facility load without interruption.",number:"Normal loading: each transformer at 50%. Emergency loading: one transformer at 100% (ONAN rating may limit — check ONAF rating for emergency).",standard:"Uptime Institute Tier IV; EN 50600-2-2 Availability Class 4",feynman:{analogy:"Think of it like having two bridges across a river. If one bridge closes for repair, traffic still flows on the other. Without a second bridge, one closure cuts off the whole town. That\'s why mission-critical DCs have two transformers — each sized to carry the full load alone.",firstPrinciples:"A single HV/MV transformer is a single point of failure. If it trips or needs maintenance, the entire DC loses power. N+1 redundancy means installing one more transformer than needed — so any one can be taken offline without reducing capacity. Each transformer must be rated to carry the full load on its own, not just half.",theTest:"You know you understand transformer redundancy when you can answer: A DC has two 40 MVA transformers in N+1 configuration. What is the maximum IT load the facility can support? Answer: 40 MVA (not 80 MVA). N+1 means one carries the full load while the other is spare. Using both at full load means losing one = total failure."}},{term:"Oil-Immersed vs Cast-Resin Transformers",definition:"Two main transformer types for DC substations. Oil-immersed: higher ratings, better cooling, requires bunding. Cast-resin (dry-type): lower fire risk, indoor installation, smaller ratings.",plain:"Oil transformers are bigger and more powerful but need fire protection and oil containment. Dry transformers are safer indoors but cost more per MVA.",number:"Oil-immersed: up to 100+ MVA, typical losses 0.3-0.5%. Cast-resin: up to ~25 MVA, losses 0.5-0.8%. Oil requires bund capacity of 110% of oil volume.",standard:"IEC 60076 (power transformers); EN 50600-2-2; IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like choosing between a diesel van and an electric van. The diesel carries more but needs fuel storage and spill protection. The electric is cleaner in enclosed spaces but has less capacity and costs more.",firstPrinciples:"Oil-immersed transformers use mineral oil for cooling and insulation, enabling higher ratings but requiring fire-rated rooms, bunding, and leak detection. Cast-resin use epoxy-encapsulated windings with no flammable liquid. Most large DCs use oil-immersed at the primary substation and cast-resin for internal distribution.",theTest:"You know you understand this when you can answer: A DC substation has two 20 MVA oil-immersed transformers. Why not use cast-resin? Answer: 20 MVA cast-resin are at the upper limit of available ratings, more expensive, and have higher losses. At this scale, oil-immersed with proper fire protection is more cost-effective."}},{term:"Transformer K-Factor for Harmonic Loads",definition:"K-factor quantifies additional heating from harmonic currents. DC IT loads produce significant harmonics. Transformers must be K-rated to avoid premature failure.",plain:"Servers produce dirty power (harmonics). Standard transformers overheat with dirty power. K-rated transformers handle it.",number:"Standard transformer: K-1. DC IT loads: K-13 to K-20 typical. A K-1 transformer supplying K-13 load must be derated to ~65% of nameplate.",standard:"IEEE C57.110; IEC 60076-7; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of it like a road designed for cars suddenly carrying heavy trucks. The surface wears out faster because each truck impact is harder. Harmonic currents are the heavy trucks, causing more heating per amp.",firstPrinciples:"IT power supplies draw current in pulses containing harmonic frequencies (3rd, 5th, 7th) that cause additional heating in transformer windings. A K-factor of 13 means the harmonic heating is 13 times what a pure sine wave would produce. Transformers must be specified with the appropriate K-factor or they will overheat and fail prematurely.",theTest:"You know you understand K-factor when you can answer: A 2 MVA standard (K-1) transformer feeds a DC hall with K-13 load. Safe continuous capacity? Answer: ~65% of nameplate = 1.3 MVA. Operating at full 2 MVA with K-13 load causes dangerous overheating."}}],
    whatItLooksLike:"Fenced compound with transformer bays, oil containment bunds, HV cable or overhead line terminations, GIS or AIS switchgear, protection relay panels, SCADA connection.",
    siteChecklist:["Confirm transformer count and rating — each must carry 100% for Tier IV","Check transformer cooling mode — ONAN vs ONAF emergency rating","Verify oil containment bunding — 110% of transformer oil volume (EPA)","Check HV switchgear type — GIS or AIS, SF6 status","Confirm transformer lead time in current market — 52–78 weeks is typical"]},
  logic:{causeAndEffect:[{cause:"Power transformer procurement lead time in 2025 is 52–78 weeks from the four main global manufacturers",effect:"A failed transformer in a non-redundant configuration means 12–18 months without full capacity. In a redundant (2×) configuration, the remaining transformer carries 100% — but there is no margin for a second failure.",insight:"Transformer failure in a single-transformer DC is the longest recovery event in the power chain. 2× transformers is not a luxury — it is the minimum for any DC that cannot tolerate a year-long capacity reduction."},{cause:"SF6 switchgear gas is a potent greenhouse gas with Global Warming Potential of 23,500 under EU F-Gas Regulation",effect:"GIS switchgear using SF6 creates a Scope 1 emission source and an F-Gas reporting obligation. Leaks must be detected and reported.",insight:"New installations should specify SF6-free GIS where available. Existing SF6 installations must include leak detection and annual F-Gas reporting."},{cause:"A transformer oil leak is detected in the primary substation bund during a routine maintenance inspection",effect:"Transformer must be de-energised for investigation. Single-transformer installations lose all power. EPA notification may be required if oil reaches drainage.",insight:"Dual transformer installations maintain supply during investigation. Bund capacity must be 110% of oil volume per EPA requirements."},{cause:"HV/MV transformer procured without K-factor rating for harmonic-rich DC IT loads",effect:"Standard K-1 transformer must be derated to ~65% of nameplate when feeding K-13 IT loads. A 40 MVA transformer delivers only 26 MVA usable capacity — potentially insufficient for the planned IT load.",insight:"K-factor must be specified at procurement. Retrofitting harmonic filtering costs 3–5× more than specifying the correct K-factor at order stage. Replacement lead time: 52–78 weeks."}],
    constraintLesson:"The transformer is the heaviest, most expensive, and longest-lead component\nin the power chain. It cannot be replaced quickly. It cannot be bypassed.\nAnd at 52–78 weeks lead time, it cannot be procured in an emergency.\nA spare transformer — or at minimum, a mutual aid agreement — is\nessential for any DC that values uptime.\n",
    weakestLink:{whatsWrong:"We have two 80 MVA transformers for our 50 MVA load — 60% utilisation each.",whatsRight:"60% each = 30 MVA spare combined. But if one fails, the other must carry 50 MVA = 62.5% loading. Check the ONAN continuous rating — if the transformer is ONAN rated at 64 MVA, emergency loading at 50 MVA is 78%, which is acceptable. But if ONAN is 56 MVA, you need ONAF cooling to sustain 50 MVA.",howToGetThere:"Confirm ONAN and ONAF ratings for each transformer. Model N-1 loading (one transformer out). Verify cooling mode automatically switches under N-1. Consider procuring a spare (or securing a mutual aid agreement with a nearby facility)."}},
  rhetoric:{declan:{hook:"Ring the transformer manufacturer today and write down the delivery date. That number controls your entire expansion programme timeline.",text:"Ring the transformer manufacturer and ask what the lead time is today. Write down the number. Now imagine one of your transformers fails tomorrow. That number is how long you operate on one transformer with zero redundancy. If you are not comfortable with that, order a spare."},ann:{hook:"Transformer failure in a non-redundant DC means 12 to 24 weeks offline. Insurance does not cover lost SLA revenue — the contract does.",text:"A transformer failure in a non-redundant DC can take the facility offline for 12–18 months. The revenue impact at €100k–€500k per MW per year (Tier 3 — CIBSE/Uptime Institute benchmarks, indicative) makes the investment in a second transformer one of the clearest financial decisions in DC infrastructure."},mark:{hook:"Transformer impedance at 8 to 12 percent drives every fault level calculation downstream. Specify it at concept stage — it cannot be changed after procurement.",text:"Transformer impedance affects fault level at the MV switchboard. Typical: 8–12% impedance for 110/10 kV transformers. Lower impedance = higher fault level = heavier-duty switchgear required. This cascades down to every breaker in the chain."},sarah:{hook:"SF6 switchgear is an F-Gas reporting obligation. With GWP of 23,500 even a minor leak is a material disclosure event under SFDR.",text:"SF6 switchgear is an F-Gas reporting requirement. GWP 23,500 — even small leaks are significant. New DC builds should specify SF6-free alternatives where available. Existing SF6 installations must be on the annual F-Gas register per EU 2024/573."},tom:{hook:"A 110 to 10 kV transformer costs 1.5 to 4 million euros each. The 52-week lead time is more expensive than the equipment — it delays all revenue.",text:"110/10 kV transformer: €1.5M–€4M each depending on rating and specification (Tier 3 — ABB/Schneider/Siemens published ranges, indicative). Two for Tier IV: €3M–€8M. A spare on standby: add €2M–€4M. Against a 12–18 month revenue loss from single transformer failure (€5M–€50M+, indicative — CRU/industry data), the spare pays for itself."}},
  rhetoricTakeaways:{declan:"Order the spare transformer today. At 52–78 weeks lead time, the window for action closed a year ago.",ann:"Transformer redundancy is a binary risk — one transformer means a single failure can idle the asset for 12–18 months.",mark:"Verify K-factor specification matches actual harmonic load. A K-1 transformer serving K-13 load must be derated to 65%.",sarah:"SF6 switchgear creates a Scope 1 reporting obligation under F-Gas regulation. Specify SF6-free alternatives for new installations.",tom:"Transformer cost is €200k–€2M depending on rating (Tier 3 — ABB/Schneider/Siemens published ranges, indicative). The real cost of a single-transformer failure is 12–18 months of lost revenue."},
  scenario:{title:"The Transformer Lead Time",narrative:"A 40 MW DC has a single 80 MVA transformer. The transformer develops an oil leak. The manufacturer quotes 62 weeks for a replacement.",question:"What are the options and what should the operator have done differently?",answer:"Current situation: single transformer, developing fault. 62-week replacement lead time.\n\nImmediate options:\n1. Monitor oil level and leak rate — determine time to critical level\n2. Source a refurbished transformer (shorter lead time but lower reliability)\n3. Request emergency loan from manufacturer or mutual aid partner\n4. Reduce DC load to extend transformer life (lower loading = slower degradation)\n\nWhat should have been done differently:\n1. Tier IV design requires 2× transformers — this DC has a single point of failure\n2. A spare transformer (or mutual aid agreement) should have been in place\n3. Online oil analysis monitoring would have detected the fault earlier\n4. Annual transformer condition assessment per IEC 60422\n\nCost comparison:\n- Second transformer at build: €2M–€4M (12–18 month programme)\n- Emergency procurement now: €3M–€5M (expedited) + revenue loss during 62-week wait\n- Revenue at risk: 40 MW × €100k/MW/year × 62/52 weeks = €4.8M minimum\n",
whoShouldCare:["mark","tom","ann"]},
  sourceNote:"Transformer ratings — IEC 60076 (T1). Lead times — industry consensus 2025 (T3). HV switchgear — IEC 62271 series (T1). SF6 — EU F-Gas 2024/573 (T1). Costs — AIMEP DC Standards Reference v1.2.0 (T2).",
  clockQuote:"ESB's language on one side. The building's language on the other.",
  crossRefs:[{module:"DC-LEARN-001",level:"L1",topic:"MIC → transformer sizing constraint"},{module:"DC-LEARN-006",level:"L5",topic:"SF6 switchgear → F-Gas reporting"}],
  retrofitRelevance:"Existing DCs with single transformers are the highest-risk candidates for catastrophic power failure. Adding a second transformer is a major retrofit — 18–24 month programme including civil works."

{
  id:"L3",level:3,name:"LV Main Switchboard",icon:"🔲",
  component:"MV/LV Transformer & LV SW",available:true,
  userNeedStatement:"Understand the dual-bus architecture where redundancy splits into A and B paths",
  cascadeCheck:(kw,racks,pue)=>{const totalMW=(kw*racks/1000)*pue;const busMVA=3200*400*1.732/1e6;return{needed:(totalMW/2).toFixed(1),available:(busMVA*0.9).toFixed(1),unit:"MW/path",pass:(totalMW/2)<=(busMVA*0.9),detail:`${(totalMW/2).toFixed(1)}MW per path vs ${(busMVA*0.9).toFixed(1)}MW (3200A busbar @90%)`}},
  learningObjective:"Understand the MV-to-LV transformation, main switchboard configuration, bus-section and bus-coupler arrangements, and how fault levels propagate.",plainEnglish:"The MV/LV transformer steps voltage down from 10 kV to 400 V (Ireland) for distribution to the UPS systems. The main LV switchboard splits this power into multiple circuits — typically one per UPS module. For Tier IV, the switchboard has two independent bus sections with a bus coupler between them.",
  grammar:{facts:[{term:"MV/LV Transformer",definition:"Steps down from 10 kV (or 11/20 kV) to 400 V three-phase (Ireland). Dry-type (cast resin) preferred in DCs — no oil, lower fire risk, suitable for indoor installation.",plain:"The second step-down. Takes medium voltage from the substation and produces the 400 V that UPS systems and mechanical plant use.",number:"Typical: 2–3.15 MVA per transformer. Dry-type (cast resin) for indoor installation. Impedance: 6% typical. Lead time: 20–36 weeks.",standard:"IEC 60076-11 (Dry-type transformers); IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like the last pressure step before water reaches your taps. The medium-voltage supply (10 kV) is still too high for any equipment to use directly. The MV/LV transformer steps it down to 400 V — the voltage your UPS systems, lighting, and cooling actually need.",firstPrinciples:"Medium voltage (10–20 kV) is efficient for distributing power across a campus, but all DC equipment — UPS, PDUs, servers — operates at low voltage (400 V in Ireland and the EU). The MV/LV transformer makes this final conversion. Its impedance determines the fault level at the main switchboard — typically 5–6% impedance, producing fault currents of 40–80 kA at 400 V.",theTest:"You know you understand this when you can answer: If a 3.15 MVA transformer has 6% impedance, what is the prospective fault current at 400 V? Answer: Isc = 3,150,000 ÷ (1.732 × 400 × 0.06) = 75.8 kA. Every piece of switchgear downstream must be rated to withstand at least this fault current."}},{term:"Main LV Switchboard",definition:"The primary low-voltage distribution board receiving power from MV/LV transformers and feeding UPS systems, mechanical services, and essential loads.",plain:"The central hub that distributes 400 V power to everything in the DC. For Tier IV, it has two independent halves that can each run the entire load.",number:"Typical rating: 4,000–6,300 A per bus section. Form 4b segregation (Type 7 per IEC 61439). IP rating: IP41 minimum for indoor installation.",standard:"IEC 61439-1/2; IS 10101:2020+A1:2024; EN 50600-2-2",feynman:{analogy:"Think of it like the central roundabout in a town. Every road from outside the town feeds into it, and every road to the neighbourhoods leads out from it. If the roundabout is blocked, nothing moves. The main LV switchboard is that roundabout — all power passes through it.",firstPrinciples:"The main LV switchboard receives power from the MV/LV transformers and distributes it to the UPS systems, mechanical services, and other loads. It is the single point where the redundancy architecture splits into A and B paths. Its fault level rating (Icw) must exceed the prospective fault current from the transformer. Its form of segregation (Form 2b, 4a, or 4b) determines whether individual circuits can be maintained while the rest stay live.",theTest:"You know you understand this when you can answer: Why does Form 4b cost 20–30% more than Form 2b, and why do DCs pay it? Answer: Form 4b provides full segregation between functional units — so an electrician can work on one circuit without risk of contact with live busbars in adjacent circuits. In a DC that must stay energised 24/7, this is the only way to achieve concurrent maintainability."}},{term:"Bus Section and Bus Coupler",definition:"The main switchboard is split into two bus sections (A and B), each fed by a separate transformer. A bus coupler connects them — normally open (split bus) or normally closed (parallel bus) depending on the fault level management strategy.",plain:"Two independent power highways inside the switchboard. Normally they run separately. The coupler between them is a bridge that can connect them in an emergency.",number:"Normal: bus coupler open (split bus). Emergency (one transformer out): bus coupler closes, surviving transformer feeds both sections. Changeover: <100ms for automatic bus coupler.",standard:"IEC 61439; EN 50600-2-2 Section 6",feynman:{analogy:"Think of it like a pair of water tanks connected by a valve. Normally the valve is closed — each tank feeds its own set of taps independently. If one tank empties, you can open the valve to share from the other. The bus coupler is that valve between the A and B bus sections.",firstPrinciples:"A dual-bus switchboard has two independent bus sections (A and B), each fed by its own transformer. Between them sits a bus coupler — a circuit breaker that can connect the two sections. Normally open means each bus is independent — a fault on one stays on one. Normally closed means both transformers share both buses — simpler load balancing, but the fault level doubles.",theTest:"You know you understand this when you can answer: Two 3.15 MVA transformers at 6% impedance. Bus coupler normally open: fault level per section = 76 kA. What happens if you close the coupler? Answer: Both transformers feed both buses — fault level roughly doubles to ~152 kA. Most 400 V switchgear is rated 50–100 kA. Closing the coupler without upgrading the switchgear is dangerous."}},{term:"Protective Device Discrimination",definition:"Coordination of circuit breakers so only the device closest to the fault trips, leaving the rest of the system live. Critical for maintaining DC uptime.",plain:"When a fault occurs, only the nearest breaker should trip. If the main breaker trips instead, the whole DC loses power.",number:"Upstream trip time > downstream trip time at fault current. Typical margin: 100-150 ms. Full discrimination: guaranteed selectivity at all fault levels.",standard:"IS 10101:2020+A1:2024 Chapter 53; IEC 61439-1; EN 50600-2-2",feynman:{analogy:"Think of it like a fire alarm system. If a fire starts in Room 3, you want the Room 3 alarm and fire door to activate, not the whole-building shutdown. Discrimination means isolating the fault without collateral damage.",firstPrinciples:"Circuit breakers have time-current characteristics defining how fast they trip at different fault currents. Discrimination is achieved when the downstream breaker always trips before the upstream breaker. In a DC, losing discrimination means a single server fault could trip the main switchboard breaker.",theTest:"You know you understand discrimination when you can answer: A 3200A ACB feeds a 630A MCCB. A 15 kA fault occurs on the sub-board. Which trips? Answer: The 630A MCCB must trip first. If the 3200A trips, the entire bus loses power."}},{term:"IP Rating for LV Switchgear",definition:"Ingress Protection rating defining enclosure resistance to solid objects and water. DC switchgear rooms are controlled environments but still require adequate IP rating.",plain:"IP rating tells you how well the switchgear cabinet keeps dust and water out — critical in environments with cooling system leaks or construction dust.",number:"Typical DC switchgear room: IP41. Outdoor or roof-mounted: IP54 minimum. Battery rooms: IP20 with forced ventilation.",standard:"IEC 60529; EN 61439-1; IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like the waterproof rating on a watch. An everyday watch needs splash resistance. A diving watch needs submersion rating. Switchgear in a clean DC room needs basic dust protection.",firstPrinciples:"The IP code has two digits: first (0-6) rates solid object protection, second (0-9) rates water protection. In a DC, LV switchgear sits in a controlled environment, so IP41 is standard. The key point: if the room floods due to a cooling pipe burst, IP41 switchgear will fail.",theTest:"You know you understand IP rating when you can answer: A DC switchgear room floods from a burst CHW pipe. Switchgear is IP41. What happens? Answer: IP41 has no water protection. The flood causes flashover and total switchgear failure. CHW pipes should never route above switchgear rooms."}}],
    whatItLooksLike:"Floor-standing switchboard panels in an electrical room. Two bus sections (A and B) with a bus coupler panel between them. Incoming feeders from MV/LV transformers. Outgoing feeders to UPS systems and mechanical distribution boards.",
    siteChecklist:["Confirm bus section arrangement — A/B split with bus coupler","Verify bus coupler mode — normally open or normally closed","Check fault level rating (Icw) — must exceed prospective fault level at the switchboard","Confirm Form of segregation — Form 4b for mission-critical","Verify that all outgoing circuits have discrimination with upstream protection"]},
  logic:{causeAndEffect:[{cause:"Bus coupler set to normally closed (parallel bus) without adequate fault level analysis",effect:"Prospective fault level doubles when both transformers feed the same bus. Switchgear may be underrated for the combined fault level.",insight:"Normally open bus coupler is the safer default — limits fault level to one transformer contribution. Normally closed requires fault level verification of every downstream component."},{cause:"Discrimination study not completed between main switchboard and downstream boards",effect:"A fault on a downstream circuit trips the main breaker instead of the local breaker — taking down the entire bus section instead of just the faulted circuit",insight:"Discrimination (grading) is not optional in a DC. Every breaker pair must be confirmed to discriminate by time, current, or energy. IEC 61439 and IS 10101 require this."},{cause:"Extension panel added to existing switchboard using a spare frame position with a 1600A switch-disconnector as incomer",effect:"Operator questions why the extension panel incomer is 'only' a switch-disconnector and not an MCCB — assumes every panel incomer must have its own overcurrent protection",insight:"The extension panel incomer provides isolation for maintenance, not fault protection. Overcurrent protection is provided by the upstream breaker in the existing switchboard, which is already coordinated with the downstream devices. A switch-disconnector is the correct engineering choice — it has no trip unit because it does not need one. Adding an MCCB would create a discrimination problem with the upstream breaker. Source: IEC 61439-2; IS 10101 Chapter 53."},{cause:"Main switchboard fault level rating (Icw) is 50 kA but the prospective fault level from two parallel MV/LV transformers exceeds this at 76 kA",effect:"Switchgear rated below the prospective fault level cannot safely interrupt a fault. Consequences range from switchgear damage to arc flash — a potentially fatal event in an occupied electrical room.",insight:"Prospective fault level must be calculated at design stage and verified by measurement after energisation. Upgrading switchgear to a higher Icw rating is a full panel replacement — not a field modification. IS 10101:2020 Chapter 43 requires verification."}],
    constraintLesson:"The main switchboard is the point where redundancy splits into two independent paths.\nIf the switchboard design does not properly separate the A and B buses, the entire\ndual-path strategy is compromised. A single fault that takes down both bus sections\ndefeats the purpose of having two transformers, two UPS systems, and two distribution paths.\n",
    weakestLink:{whatsWrong:"We have a dual-bus switchboard with A and B sections. The DC has full power redundancy.",whatsRight:"A dual-bus switchboard is redundant only if the bus sections are physically and electrically independent. Check: is the bus coupler normally open? Is the fault level on each section within switchgear rating? Does a fault on one section stay on one section?",howToGetThere:"Commission a fault level study. Verify discrimination. Confirm bus coupler mode. Test bus coupler changeover under load."}},
  rhetoric:{declan:{hook:"Open the switchboard room and count the bus sections. One section means no maintenance window without exposing the entire facility to shutdown risk.",text:"Open the switchboard room and count the bus sections. If there is only one, you have a single point of failure at the heart of the power chain. If there are two, check the bus coupler position — if it is normally closed, you may have a fault level problem."},ann:{hook:"The main switchboard is the choke point. All power passes through it — and a single fault on an undersized board takes everything offline.",text:"The main switchboard is the choke point of the power chain. All power passes through it. Its rating, configuration, and redundancy directly determine the maximum IT capacity and availability class of the facility."},mark:{hook:"Fault level from transformer impedance: that calculation determines whether your switchboard is adequately rated or a liability waiting to cause a cascade.",text:"Fault level at main LV switchboard: calculate from transformer impedance. For a 3.15 MVA transformer at 6% impedance: Isc = 3,150,000 ÷ (1.732 × 400 × 0.06) = 75.8 kA symmetrical. Switchgear Icw must exceed this. With two transformers parallel (bus coupler closed): fault level doubles to ~151 kA — most LV switchgear is not rated for this."},sarah:{hook:"SF6 in MV switchgear is a live F-Gas obligation. Verify it appears in the environmental register before any compliance audit or transaction DD.",text:"Switchgear containing SF6 (some MV switchgear) is subject to F-Gas regulation. Verify whether any MV switchgear in the chain contains SF6 and include in the F-Gas register."},tom:{hook:"Main LV switchboard at 200 to 500 thousand euros depending on rating. The undersized version costs twice — once to buy, once to replace under load.",text:"Main LV switchboard cost: €200k–€500k depending on rating and form factor (Tier 3 — ABB/Schneider/Eaton published ranges, indicative). Form 4b (Type 7) segregation adds 20–30% cost vs Form 2b. But Form 4b allows live maintenance of individual circuits — which is the whole point of concurrent maintainability."}},
  rhetoricTakeaways:{declan:"Walk the switchroom. Check bus coupler position. If normally closed with two transformers, commission a fault level study immediately.",ann:"The switchboard configuration determines whether the facility meets concurrent maintainability — a valuation driver for Tier III+.",mark:"Fault level with parallel transformers: calculate from combined impedance. Verify all downstream protection coordinates at the higher level.",sarah:"SF6-containing MV switchgear must be on the F-Gas register. Verify annually and report leaks.",tom:"Form 4b adds 20–30% cost over Form 2b — but enables live circuit-level maintenance that avoids revenue-affecting shutdowns."},
  scenario:{title:"The Fault Level Surprise",narrative:"A DC upgrade adds a second MV/LV transformer to achieve dual-feed redundancy. The bus coupler is set to normally closed to share load evenly. Three months later, a downstream cable fault trips the main incomer instead of the local board.",question:"Diagnose the likely cause and recommend corrective action.",answer:"Root cause: fault level increase from parallel transformers exceeds\ndiscrimination capability of downstream protection.\n\nWith one transformer (normally open coupler): fault level = ~76 kA.\nWith two transformers parallel (coupler closed): fault level = ~152 kA.\n\nThe downstream breakers were selected and set for the original single-transformer\nfault level. At the higher parallel fault level, the energy let-through exceeds\nthe discrimination margin — the upstream breaker trips before the downstream breaker.\n\nCorrective actions:\n1. Immediate: set bus coupler to normally open (split bus operation)\n2. Commission a fault level study for the new dual-transformer configuration\n3. Review all downstream breaker settings and ratings\n4. If normally closed operation is required: upgrade downstream protection to\n   discriminate at the higher fault level (may require current-limiting breakers)\n5. Update protection coordination study and single-line diagram\n",
whoShouldCare:["mark","tom"]},
  sourceNote:"Fault level calculation — IEC 60909 (T1). Switchgear — IEC 61439 (T1). Discrimination — IS 10101:2020+A1:2024 Chapter 53 (T1). EN 50600-2-2 (T1).",
  clockQuote:"Every circuit in the building traces back to one of these panels. Both warm.",
  crossRefs:[{module:"DC-LEARN-001",level:"L4",topic:"Switchboard fault level → UPS protection"},{module:"DC-LEARN-004",level:"L2",topic:"Concurrent maintainability → Tier classification"}],
  retrofitRelevance:"Adding a second transformer to an existing DC is one of the most common retrofits. The fault level implication is frequently missed — resulting in discrimination failures. When adding extension panels to existing switchboards, the incomer is typically a switch-disconnector (isolation only), with overcurrent protection provided by the upstream breaker. This is correct engineering — not a cost-saving shortcut."
},
{
  id:"L4",level:4,name:"UPS Systems",icon:"🔋",
  component:"UPS — Battery Bridge",available:true,
  userNeedStatement:"Understand UPS role as the bridge between mains and generator, and how efficiency impacts PUE",
  cascadeCheck:(kw,racks)=>{const itMW=kw*racks/1000;const stringMW=1.5*0.9;return{needed:itMW.toFixed(1),available:stringMW.toFixed(1),unit:"MW (single string)",pass:itMW<=stringMW,detail:`${itMW.toFixed(1)}MW IT vs ${stringMW.toFixed(1)}MW per string (1.5MVA×0.9PF, 2N)`}},
  learningObjective:"Understand UPS role in the power chain, double conversion topology, efficiency impact on PUE, and how UPS is sized for the downstream load.",plainEnglish:"The UPS sits between the mains supply and the IT load. It converts AC to DC (charging batteries), then DC back to AC (feeding IT). This double conversion means the IT load always gets clean, stable power — but the conversion costs 3–6% in efficiency losses.",
  grammar:{facts:[{term:"Double Conversion (VFI)",definition:"Voltage and Frequency Independent. All power passes through rectifier → battery bus → inverter. IT load is always on inverter output — decoupled from mains.",plain:"All power goes through the UPS processor — the IT load never sees raw mains, but the double conversion costs 3–6% in efficiency losses.",number:"Efficiency: 94–97.5% depending on age and load. PUE contribution: 0.03–0.08. Losses at 50 MW: 1.3–3.2 MW of waste heat.",standard:"IEC 62040-3; EN 50600-2-2",feynman:{analogy:"Think of it like a water purification system with a storage tank. Tap water (mains) flows in, gets purified (rectified to DC), stored in the tank (battery), then dispensed as clean water (inverted back to AC). The IT load always drinks purified water — never raw tap water, even if the mains supply is dirty.",firstPrinciples:"In double conversion, all power passes through two stages: AC→DC (rectifier) and DC→AC (inverter). The battery sits on the DC bus between them. This means the output to IT is always generated fresh by the inverter — completely decoupled from mains disturbances. The trade-off is efficiency: each conversion loses 1.5–3%, so the UPS itself consumes 3–6% of all power passing through it.",theTest:"You know you understand VFI when you can answer: If a DC has 10 MW of IT load and the UPS is 95% efficient, how much extra power does the UPS consume? Answer: The UPS must draw 10 MW ÷ 0.95 = 10.53 MW to deliver 10 MW. The 0.53 MW difference is waste heat — which the cooling system must also remove, adding further to PUE."}},{term:"UPS Sizing",definition:"UPS must be sized for the downstream IT load plus growth, with redundancy (N+1 or 2N). Module count based on IT load per bus.",plain:"Size the UPS for the maximum load it will ever see — not today's load.",number:"Modular UPS: typically 200–500 kW per module. N+1: for every N modules needed, add 1 spare. 2(N+1): two independent UPS systems, each with N+1 capability.",standard:"EN 50600-2-2; Uptime Institute Tier Standard",feynman:{analogy:"Think of it like buying a car for the family you\'ll have in 10 years, not the family you have today. If you buy a two-seater now and need a seven-seater in five years, you can\'t just add seats — you need a new car. UPS modules are the same: size for ultimate capacity, not current load.",firstPrinciples:"UPS is sized in kVA or kW modules. The total required is the maximum planned IT load (not today\'s load) divided by the power factor, plus redundancy. N+1 means one extra module beyond what\'s needed: if you need 4 modules, install 5. 2(N+1) means two complete independent UPS systems, each with N+1 — the standard for Tier IV.",theTest:"You know you understand UPS sizing when you can answer: A DC plans for 2 MW of IT load. UPS modules are 500 kW each. How many modules for 2(N+1)? Answer: Each string needs N+1 = (2000÷500)+1 = 5 modules. Two strings for 2(N+1) = 10 modules total. Each string can carry the full 2 MW load independently."}},{term:"UPS Efficiency vs Load",definition:"UPS efficiency varies with load percentage. Peak efficiency at 50–75% load. Drops significantly below 25% load.",plain:"A UPS running at quarter load is like a car idling in traffic — burning fuel but not going anywhere efficiently.",number:"Modular Li-ion UPS: 97.5% at 50% load, 95.5% at 25% load. Legacy: 92% at 50% load, 88% at 25% load.",standard:"IEC 62040-3; AIMEP DC Standards Reference v1.2.0 Section 12",feynman:{analogy:"Think of it like a car\'s fuel economy. A car gets its best mileage at steady motorway speed — not idling in traffic and not flooring it. A UPS is most efficient at 50–75% load. Below 25% load, it\'s burning fuel (electricity) just to keep itself running, with very little useful power reaching the IT load.",firstPrinciples:"UPS efficiency is not constant — it varies with the percentage of rated load being drawn. Internal losses (switching, magnetics, cooling fans) are relatively fixed regardless of load. At low loads, these fixed losses are a large percentage of total throughput. A modern Li-ion modular UPS achieves 97.5% at 50% load but drops to 95.5% at 25% load. Legacy VRLA UPS: 92% at 50%, 88% at 25%.",theTest:"You know you understand this when you can answer: A 1 MW UPS at 25% load (250 kW delivered) with 88% efficiency. How much power enters the UPS? Answer: 250 ÷ 0.88 = 284 kW. Losses = 34 kW — that\'s 34 kW of waste heat the cooling system must remove. At 50% load with 92% efficiency: 500 ÷ 0.92 = 543 kW, losses = 43 kW. Double the useful output for only 26% more losses."}},{term:"Eco Mode Operation",definition:"UPS mode where power bypasses the inverter during normal conditions, switching to double conversion only during mains disturbance. Efficiency ~99% but introduces 2-4 ms transfer gap.",plain:"Eco mode saves energy by not processing every watt through the UPS, but there is a tiny gap when it switches to protection mode.",number:"Efficiency: 95% to 99% in eco mode. Transfer time: 2-4 ms. Annual savings on 10 MW: ~400 kW continuous. PUE improvement: 0.03-0.05.",standard:"IEC 62040-3; EN 50600-2-2; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of it like a bodyguard who sometimes steps aside to rest. 99% of the time nothing happens and you save cost. But that 1% gap is when you are exposed.",firstPrinciples:"In eco mode, mains power flows directly to IT through the static bypass, with the inverter on standby. If mains degrades, the UPS transfers to double conversion in 2-4 ms. Modern server PSUs ride through 10-20 ms gaps. But some operators reject eco mode because one transfer failure outweighs the savings.",theTest:"You know you understand eco mode when you can answer: A 10 MW DC runs UPS at 95%. Eco mode achieves 99%. At 95%: draws 10.53 MW. At 99%: draws 10.10 MW. Saving: ~0.43 MW continuous."}},{term:"Li-ion vs VRLA Battery Comparison",definition:"Two main UPS battery technologies. VRLA (lead-acid): proven, cheaper upfront, 5-7 year life, heavy. Li-ion: lighter, 10-15 year life, higher upfront cost, lower TCO.",plain:"Lead-acid batteries are cheap but heavy and short-lived. Lithium costs more upfront but lasts twice as long and takes half the space.",number:"VRLA: 5-7 year life, ~100 kg/kWh, 25C max. Li-ion: 10-15 year life, ~30 kg/kWh, 35C max. Li-ion TCO over 15 years: 20-40% lower.",standard:"IEC 62040-1; NFPA 855; EN 50600-2-2",feynman:{analogy:"Think of it like a cheap car you replace every 5 years vs a premium car you keep for 15. The cheap car costs less each time but over 15 years you buy three.",firstPrinciples:"VRLA batteries degrade with heat and cycling. Life is 5-7 years at 25C, dropping sharply above 30C. Li-ion tolerates 35C, lasts 10-15 years, weighs 60-70% less. Li-ion has thermal runaway risk requiring dedicated fire detection. But 15-year TCO is 20-40% lower than VRLA.",theTest:"A 10 MW DC needs 5 min runtime. VRLA: 2M replaced at yr 5 and 10. Li-ion: 3.5M, no replacement until yr 15. TCO? VRLA: 6M. Li-ion: 3.5M. Li-ion saves 2.5M before counting smaller room and lower cooling."}}],
    whatItLooksLike:"Modular UPS cabinets (1–2 m tall), battery cabinets, static bypass switch, maintenance bypass panel, output distribution board.",
    siteChecklist:["Confirm UPS topology — VFI double conversion standard for DCs","Check current load as percentage of UPS capacity — target 50–75% for best efficiency","Verify battery type and age — VRLA: replace by year 5–7. Li-ion: 10–15 year life","Confirm N+1 or 2(N+1) redundancy configuration","Check if eco mode is available and whether it is enabled"]},
  logic:{causeAndEffect:[{cause:"UPS load is only 20% of rated capacity in a partially filled data centre operating below design occupancy",effect:"Efficiency drops from 97.5% to ~94%. The absolute losses are lower (lower total power), but the percentage waste is higher — directly inflating PUE.",insight:"Modular UPS allows switching off surplus modules — keeping remaining modules at optimal load percentage. This is a PUE quick win for under-loaded DCs."},{cause:"UPS battery age exceeds the 7-year design life for VRLA chemistry, with capacity degraded below the 80% replacement threshold",effect:"Actual runtime is significantly less than rated. A battery that was rated for 15 minutes may deliver only 8–9 minutes — potentially less than generator start time under adverse conditions.",insight:"Battery impedance testing every 6 months. Replace VRLA at 80% capacity threshold. See DC-LEARN-005 L3 for detailed UPS content."},{cause:"UPS battery room temperature exceeds 30°C due to a cooling failure, accelerating VRLA battery degradation rate",effect:"VRLA battery life halves for every 10C above 25C. Li-ion BMS may force protective disconnect, removing backup entirely.",insight:"Battery rooms need independent cooling with N+1 redundancy. Temperature alarm at 28C and shutdown at 35C."},{cause:"UPS eco mode enabled across the facility without assessing individual tenant IT equipment tolerance for transfer gaps",effect:"Eco mode introduces a 2–4 ms transfer gap during mains disturbance. Most modern server PSUs ride through 10–20 ms. But legacy storage arrays and some network switches crash at 4 ms — one tenant reboot per transfer event.",insight:"Eco mode saves ~400 kW continuous on a 10 MW installation (PUE improvement ~0.04). But one unplanned tenant reboot costs more in SLA penalties than a year of eco mode savings. Pilot on a non-production circuit first."}],
    constraintLesson:"The UPS is the most critical single component in the power chain because it\ntouches every watt of IT power. A 1% efficiency improvement at the UPS saves\nmore energy than a 5% improvement at any other single component.\n",
    weakestLink:{whatsWrong:"Our UPS is rated for 2 MW and we only draw 1.5 MW — we have plenty of capacity.",whatsRight:"1.5 MW on a 2 MW UPS is 75% loading — good for efficiency. But check: is that 2 MW the N+1 rating or the total rating? If N+1, the usable capacity is less. If the UPS is N-only, a single module failure means overload.",howToGetThere:"Clarify: total UPS capacity vs N+1 usable capacity. Model growth to confirm headroom. Check efficiency curve at current and projected load percentages."}},
