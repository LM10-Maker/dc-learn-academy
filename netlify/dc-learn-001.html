  rhetoric:{declan:{hook:"Check the UPS panel. Load below 30 percent: eco-mode is off, efficiency drops by 3 to 4 points, and nobody in the team noticed.",text:"Check the UPS display panel. Look at the load percentage. If it is below 30%, you are paying a PUE penalty for under-utilisation. If it is above 80%, you have no growth headroom. The sweet spot is 50–75%."},ann:{hook:"UPS efficiency is the single largest lever an operator can pull to improve PUE without touching a single cooling unit or changing any infrastructure.",text:"UPS efficiency is the single largest lever an operator can pull to improve PUE without touching the IT load. In a competitive colocation market where tenants benchmark facilities on PUE, a 3-point improvement from a UPS upgrade can shift the facility from 'average' to 'best-in-class' — directly affecting occupancy rates and rental premiums. This is an asset repositioning play, not just an energy saving."},mark:{hook:"At 94 percent UPS on 50 MW IT, losses reach 3.3 MW. Upgrading to 97 percent recovers 1.8 MW — that is 1.9 million euros per year at standard rates.",text:"50 MW IT × PUE 1.10 = 55 MW through UPS. At 94% efficiency: 3.3 MW losses. At 97.5%: 1.4 MW. Delta: 1.9 MW × 8,760 hrs × €0.12/kWh (CRU T2) = €2.0M/year. UPS technology choice is a €20M+ 10-year decision (expanded teaching scenario — Clonshaugh 2.4 MW IT)."},sarah:{hook:"UPS losses inflate Scope 2 reporting directly. Every percentage point of efficiency improvement reduces the reported carbon intensity without altering the IT load.",text:"UPS losses are Scope 2 electricity consumption — they increase carbon intensity and affect CRREM Misalignment Year. A 1.9 MW UPS loss reduction at 0.2241 kgCO2/kWh = 3,730 tCO2/year saved."},tom:{hook:"Modular UPS at 150 to 250 euros per kW installed. At 2,400 kW that is 360 to 600 thousand euros — but it eliminates the single largest power loss in the facility.",text:"Modern modular UPS: €150–€250/kW installed (Tier 3 — APC by Schneider/Eaton/Vertiv published ranges, indicative). A 50 MW UPS system: €7.5M–€12.5M (expanded teaching scenario — Clonshaugh 2.4 MW IT). The energy saving from 94%→97.5% efficiency pays back the premium in under 3 years."}},
  rhetoricTakeaways:{declan:"Check UPS load percentage. If below 25%, switch off surplus modules. Check battery age against design life.",ann:"UPS replacement is one of the highest-ROI DC retrofits — efficiency savings typically deliver payback in 3–5 years.",mark:"At 50 MW (expanded teaching scenario — Clonshaugh 2.4 MW IT), each 1% UPS efficiency improvement saves ~0.5 MW continuously. That is €526k/year at €0.12/kWh (CRU T2).",sarah:"UPS losses are a direct component of PUE. Improving from 93% to 97.5% reduces Scope 2 emissions by thousands of tonnes annually.",tom:"Modular Li-ion UPS: higher upfront cost but 20–40% lower TCO over 15 years versus VRLA. Factor in avoided battery replacements."},
  scenario:{title:"The Efficiency Upgrade",narrative:"A 2015-vintage DC has legacy UPS running at 93% efficiency. Current IT load: 20 MW. The operator is considering a UPS replacement. The CFO asks for the business case.",question:"Calculate the annual energy saving and simple payback for a UPS upgrade.",answer:"Current: 20 MW IT × PUE overhead through UPS:\n[Indicative calculation — inputs: electricity €0.12/kWh (CRU T2), UPS capex €200/kW (Tier 3 — APC/Eaton/Vertiv published ranges), grid EF 0.2241 kgCO₂/kWh (SEAI T1). All outputs are screening-level estimates.]\nAt 93% efficiency: UPS losses = 20 ÷ 0.93 - 20 = 1.505 MW\nNew modular UPS at 97.5%: losses = 20 ÷ 0.975 - 20 = 0.513 MW\nSaving: 0.992 MW continuous\nAnnual energy saving: 0.992 × 8,760 = 8,690 MWh\nCost saving: 8,690 × €0.12/kWh (CRU T2) = €1,042,800/year\nCarbon saving: 8,690 × 0.2241 = 1,947 tCO2/year\n\nUPS replacement cost: 20 MW × €200/kW = €4,000,000\nSimple payback: €4M ÷ €1.04M = 3.8 years\n\nAdditional benefits:\n- VRLA→Li-ion batteries: smaller footprint, 10–15 year life\n- PUE improvement: from 1.075 (UPS contribution) to 1.026\n- NOTE: Li-ion requires fire system review (DC-LEARN-008 L4)\n",
whoShouldCare:["mark","sarah","tom"]},
  sourceNote:"UPS efficiency — AIMEP DC Standards Reference v1.2.0 Section 12. Costs — SCSI M&E benchmark data; RICS NRM1 (T2). IEC 62040-3.",
  clockQuote:"Thirty seconds of battery. Enough time for diesel to take over.",
  crossRefs:[{module:"DC-LEARN-005",level:"L3",topic:"UPS topology → generator redundancy"},{module:"DC-LEARN-002",level:"L3",topic:"UPS losses → CRAH cooling load"}],
  retrofitRelevance:"UPS replacement is one of the highest-ROI DC retrofits. The efficiency saving alone typically provides payback in 3–5 years."
},
{
  id:"L5",level:5,name:"Static Transfer Switch",icon:"🔀",
  component:"Static Transfer Switch",available:true,
  userNeedStatement:"Understand how the STS provides sub-10ms failover for single-corded loads",
  cascadeCheck:(kw,racks)=>{const totalA=(kw*racks/9)/(230);const stsA=250;return{needed:totalA.toFixed(0),available:stsA.toFixed(0),unit:"A per STS (est. 9 zones)",pass:totalA<=stsA,detail:`${totalA.toFixed(0)}A per STS vs ${stsA}A rated (${racks} racks / ~9 STS zones, 230V 1PH)`}},
  learningObjective:"Understand how the STS enables dual-path redundancy by transferring IT load between UPS systems without interruption.",plainEnglish:"The STS sits between two UPS outputs and the downstream PDUs. If UPS-A fails, the STS transfers the load to UPS-B in under 10 milliseconds — faster than IT equipment can detect. It is the component that makes dual-path redundancy actually work.",
  grammar:{facts:[{term:"STS (Static Transfer Switch)",definition:"A solid-state device that transfers load between two independent power sources within one half-cycle (<10ms). Uses thyristors or IGBTs for break-before-make or make-before-break transfer.",plain:"An automatic switch that moves power from path A to path B so fast that the servers never notice.",number:"Transfer time: <10 ms (within ITIC curve tolerance of 20 ms at 0V). Rating: typically 400–3,200 A at 400 V.",standard:"IEC 62310-1 (STS); EN 50600-2-2",feynman:{analogy:"Think of it like a light switch that can change between two power sources faster than a light bulb can flicker. The STS monitors both UPS feeds and if one fails, it switches the load to the other in under 10 milliseconds — so fast that the servers don\'t even notice.",firstPrinciples:"The STS sits downstream of two independent UPS outputs (A and B). It feeds one source to the load at a time (the preferred source) and monitors both continuously. If the preferred source fails or goes out of tolerance, the STS transfers to the alternate source using solid-state thyristors — no mechanical parts to slow it down. Transfer time: 4–10 milliseconds.",theTest:"You know you understand the STS when you can answer: Why use an STS if servers already have dual PSUs on A+B feeds? Answer: Not all DC loads have dual PSUs — lighting, BMS, fire systems, and some network equipment are single-corded. The STS provides A/B redundancy for single-corded loads without requiring dual PSUs in every device."}},{term:"ITIC Curve (CBEMA)",definition:"The Information Technology Industry Council power acceptability curve. Defines the voltage sag duration that IT equipment must tolerate without malfunction.",plain:"A chart that shows how long IT equipment can survive without power. Most equipment survives a 10 ms break — which is within STS transfer time.",number:"ITIC tolerance: 20 ms at 0V (complete loss). STS transfer: <10 ms. Margin: 10 ms. Most IT PSUs tolerate 5–20 ms depending on input capacitor sizing.",standard:"ITIC (CBEMA) Power Acceptability Curve; IEC 62310-1",feynman:{analogy:"Think of it like the tolerance zone for a blood pressure reading. A brief spike or dip is fine — the body copes. But if it stays too high or too low for too long, organs are damaged. The ITIC curve defines how long servers can tolerate voltage outside normal limits before they crash or are damaged.",firstPrinciples:"The ITIC (Information Technology Industry Council) curve defines the voltage envelope that IT equipment must tolerate without malfunction. It plots voltage deviation (% of nominal) against duration. A 50% voltage sag lasting less than 20 milliseconds is within tolerance. The same sag lasting 500 milliseconds is not. The STS must complete its transfer within the ITIC envelope to avoid server disruption.",theTest:"You know you understand the ITIC curve when you can answer: An STS takes 8 ms to transfer. The mains drops to 0 V. Will the servers ride through? Answer: Yes — the ITIC curve allows 0 V for up to 20 ms. The 8 ms transfer is within tolerance. But if the STS took 25 ms, servers would trip because 0 V for >20 ms exceeds the ITIC envelope."}},{term:"Preferred vs Alternate Source",definition:"STS designates one input as preferred (normal supply) and one as alternate. Load normally runs on preferred. STS transfers to alternate only on preferred failure — then transfers back when preferred recovers.",plain:"One power path is 'home.' The other is 'backup.' The STS switches to backup when home fails, and switches back when home recovers.",number:"Transfer to alternate: <10 ms. Retransfer to preferred: configurable delay (typically 5–30 seconds) to avoid hunting.",standard:"IEC 62310-1; EN 50600-2-2",feynman:{analogy:"Think of it like having a regular doctor and a locum. You normally see your regular doctor (preferred source), but if they\'re unavailable, the locum (alternate) covers. The STS automatically switches to the alternate — but you need to know which one is preferred, because that\'s where the load normally sits.",firstPrinciples:"The STS designates one UPS feed as preferred and the other as alternate. Under normal conditions, 100% of the load runs on the preferred source. The alternate is energised but carries no load. If the preferred fails, the STS transfers to the alternate. Configuration choice matters: which UPS string is preferred affects maintenance scheduling, load balancing, and fault isolation.",theTest:"You know you understand this when you can answer: Both UPS strings are healthy. The STS is on the preferred source. An operator takes the preferred UPS offline for maintenance — what happens? Answer: The STS detects the preferred source failing and transfers to the alternate in <10 ms. The IT load continues uninterrupted. When maintenance is complete, the STS retransfers to the preferred source."}},{term:"STS Maintenance Bypass",definition:"A manual bypass switch that routes load directly from one source, bypassing the STS entirely. Allows the STS to be de-energised for maintenance without interrupting the downstream load.",plain:"A manual switch that takes the STS out of the circuit for servicing — the load keeps running on one path while the STS is worked on.",number:"Bypass rated for full STS load. Operation: break-before-make (brief interruption <20 ms) or wrap-around (make-before-break, no interruption). Wrap-around requires source synchronisation.",standard:"IEC 62310-1; EN 50600-2-2 (concurrent maintainability)",feynman:{analogy:"Think of it like a temporary road diversion around roadworks. The main road (STS) needs repair, so traffic is routed around it on a bypass road. The bypass keeps traffic flowing but without the automated speed controls — if something goes wrong, there\'s no instant rerouting.",firstPrinciples:"The STS itself needs periodic maintenance and testing. The maintenance bypass is a manual switch that routes power around the STS directly from one source to the load. While on bypass, the load has no automatic transfer capability — it is running on a single source with no failover. Bypass operations must be planned during low-risk windows.",theTest:"You know you understand this when you can answer: A DC operator puts the STS on maintenance bypass and then the single source feeding the bypass trips. What happens? Answer: The load loses power. There is no automatic transfer on bypass — the STS electronics are isolated. This is why bypass operations are high-risk and require a method statement, risk assessment, and senior authorisation."}},{term:"STS Sensing and Transfer Logic",definition:"The STS continuously monitors both sources for voltage, frequency, and phase angle. Transfer initiated when the preferred source degrades beyond programmable thresholds.",plain:"The STS constantly watches both power feeds. The moment one goes bad, it switches to the other faster than you can blink.",number:"Monitoring: voltage +/-10%, frequency +/-2 Hz, phase angle <15 degrees. Transfer: <1 ms sensing + 4-8 ms switch = <10 ms total. Retransfer delay: 5-30 sec programmable.",standard:"IEC 62310-3; EN 50600-2-2; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of it like a pilot monitoring two engines. If Engine 1 faults, thrust shifts instantly to Engine 2. The STS does this in under 10 ms. But the pilot does not switch back immediately, because Engine 1 might fail again.",firstPrinciples:"The STS monitors voltage magnitude, frequency, and phase angle on each input. If the preferred source drops below threshold, the STS fires SCR thyristors on the alternate source within one half-cycle (8-10 ms at 50 Hz). The retransfer delay prevents bouncing between sources during unstable events.",theTest:"Source A sags to 85% for 50 ms then recovers. STS threshold is 90%. What happens? STS detects sag, transfers to B in <10 ms, then waits retransfer delay (5-30 sec) before returning to A. IT sees <10 ms interruption within PSU hold-up time."}}],
    whatItLooksLike:"A wall- or floor-mounted switch panel with two incoming feeders and one output. LED indicators for preferred/alternate source status. Monitoring display showing transfer count and transfer time.",
    siteChecklist:["Confirm STS transfer time — should be <10 ms","Verify both preferred and alternate sources are live and within voltage tolerance","Check STS transfer log — frequent transfers may indicate upstream power quality issues","Confirm STS is rated for the current downstream load (including growth)","Verify STS bypass — manual bypass must allow maintenance without load interruption"]},
  logic:{causeAndEffect:[{cause:"UPS-A fails under load and the Static Transfer Switch initiates an automatic transfer to UPS-B within 4ms",effect:"Load continues without interruption if transfer completes within ITIC tolerance. UPS-B must have capacity to accept the additional load.",insight:"STS transfer only works if UPS-B has headroom for the transferred load. If UPS-B is already at 90% load, accepting the transfer from STS may overload it. STS load planning must consider both normal and N-1 scenarios."},{cause:"The Static Transfer Switch is configured with zero retransfer delay, causing immediate back-transfer after source restoration",effect:"When preferred source recovers briefly then fails again (flicker), the STS transfers back and forth rapidly — hunting. Multiple rapid transfers stress both the STS and the downstream IT equipment.",insight:"Set retransfer delay to 5–30 seconds minimum. Hunting causes more STS failures than any other single cause — each rapid transfer stresses the thyristors. An STS that hunts for 60 seconds at 2 Hz has executed 120 transfers, consuming months of mechanical life in a minute. The setting costs nothing to change; the replacement costs €30k–€80k (Tier 3 — ABB/Schneider static transfer switch published ranges, indicative)."},{cause:"Both STS input sources experience a simultaneous voltage sag during a grid disturbance event on the shared upstream busbar",effect:"Neither source meets voltage threshold. STS cannot transfer to healthy source. Load rides on PSU hold-up capacitors. If sag exceeds hold-up time, servers crash.",insight:"Truly independent STS sources require separate UPS strings, transformers, and ideally separate utility feeds. A shared upstream point means a single event degrades both."},{cause:"STS preferred source designation not reviewed after a major power chain reconfiguration — load has been running on the alternate source for 6 months",effect:"When the alternate source is taken offline for scheduled maintenance, the STS transfers to the preferred — which has not carried load for months. An untested transfer under full production load is an unknown risk.",insight:"Review STS source designation after every power chain change. Verify both sources are live and within tolerance. Test transfer to each source under load at least annually. The STS transfer log reveals which source has been carrying load — check it monthly."}],
    constraintLesson:"The STS makes dual-path redundancy real. Without it, having two UPS systems means\nhaving a spare UPS, not a redundant UPS. The STS is what enables seamless transfer\nfrom one path to the other.\n",
    weakestLink:{whatsWrong:"We have two independent UPS systems — our power is fully redundant.",whatsRight:"Two UPS systems without an STS means the load is on one UPS at a time. If that UPS fails, someone has to manually switch to the other. With an STS, the switch happens in milliseconds — automatically.",howToGetThere:"Verify STS is installed between each UPS pair and downstream PDU. Confirm transfer time <10 ms. Test transfer under load annually."}},
  rhetoric:{declan:{hook:"The STS is the device that makes the word redundant actually mean something. Without it, dual UPS is two separate single points of failure.",text:"The STS is the device that makes the word 'redundant' actually mean something. Without it, your second UPS is a spare that someone has to switch to manually. With it, the load moves in 10 milliseconds — faster than a blink."},ann:{hook:"The STS converts a dual-UPS capital investment from theoretical to contractual. Without confirmed transfer testing, the Tier IV availability claim is untenable.",text:"STS is the component that converts a capital investment in dual UPS from theoretical redundancy to actual availability improvement. Without STS, the second UPS adds capital cost without proportional availability benefit."},mark:{hook:"STS transfer under 10 ms. ITIC curve tolerance at 0V is 20 ms. That 10 ms margin is all that separates uptime from a load drop at switchover.",text:"STS transfer time <10 ms. ITIC tolerance: 20 ms at 0V. Margin: 10 ms. This margin assumes IT PSU input capacitors are healthy. Aged capacitors with reduced capacitance narrow the margin. PSU health affects STS effectiveness."},sarah:{hook:"STS transfer events are logged. In any compliant reporting framework, published availability figures must reconcile with that event log — and they often do not.",text:"STS transfer events are logged and should be included in availability reporting. Frequent transfers may indicate upstream power quality issues that should be investigated and reported."},tom:{hook:"STS at 30 to 80 thousand euros per unit. Without it, the dual-UPS investment does not deliver the contractual SLA it was purchased to support.",text:"STS cost: €30k–€80k per unit at 400–800 A rating (Tier 3 — ABB/Schneider static transfer switch published ranges, indicative). For a 50 MW DC with 20 STS units: €600k–€1.6M (expanded teaching scenario — Clonshaugh 2.4 MW IT). This is typically 1–2% of total electrical infrastructure cost — a small fraction that enables the full value of the dual-path redundancy investment."}},
  rhetoricTakeaways:{declan:"Confirm STS retransfer delay is set to 5–30 seconds. Zero delay causes hunting that can destroy the STS in minutes.",ann:"Without STS, dual UPS is a spare, not a failover. STS is what makes dual-path redundancy real and operational.",mark:"STS transfer time must be within ITIC tolerance. Verify <10 ms transfer and that both sources are synchronised.",sarah:"STS availability directly affects the facility availability metric — a key reporting indicator for fund-level ESG.",tom:"STS cost: €30k–€80k per unit (Tier 3 — ABB/Schneider static transfer switch published ranges, indicative). Compare against the revenue at risk from a manual changeover that takes hours instead of milliseconds."},
  scenario:{title:"The STS Transfer Test",narrative:"During annual testing, an STS fails to transfer to the alternate source within 10 ms. Transfer time measured: 45 ms. The IT equipment downstream experiences a brief power interruption — several servers reboot.",question:"What caused the server reboots and what must be corrected?",answer:"Cause: STS transfer time (45 ms) exceeded ITIC tolerance (20 ms at 0V).\nIT PSUs lost input power for 45 ms — beyond the capacitor hold-up time of most PSUs.\nServers rebooted due to PSU input undervoltage.\n\nCorrective actions:\n1. Diagnose STS slow transfer — likely cause: thyristor ageing, control board fault, or voltage/frequency mismatch between preferred and alternate sources\n2. Service or replace STS to restore <10 ms transfer\n3. Verify both preferred and alternate sources are synchronised (voltage and frequency within STS acceptance window)\n4. Re-test under load — confirm <10 ms\n5. Check all other STS units in the facility for similar degradation\n\nPrevention: annual STS transfer testing under load with transfer time measurement.\nSet maintenance threshold: any STS with transfer time >8 ms should be serviced.\n",
whoShouldCare:["declan","mark"]},
  sourceNote:"STS — IEC 62310-1 (T1). ITIC curve — ITI/CBEMA (T1). Transfer time testing — EN 50600-2-2 commissioning requirements (T1).",
  clockQuote:"If the A side fails, the B side holds everything. If you've wired it right.",
  crossRefs:[{module:"DC-LEARN-001",level:"L4",topic:"UPS redundancy → STS requirement"},{module:"DC-LEARN-004",level:"L3",topic:"STS → single-corded equipment risk"}],
  retrofitRelevance:"Adding STS to a single-path DC is the key retrofit that enables dual-path redundancy downstream. It can be added without major changes to the existing UPS infrastructure."
},
{
  id:"L6",level:6,name:"Floor PDU",icon:"📦",
  component:"Floor PDU",available:true,
  userNeedStatement:"Understand how power is distributed from UPS to rack rows and why branch protection matters",
  cascadeCheck:(kw,racks)=>{const totalMW=(kw*racks)/1000;const pduCount=Math.ceil(racks/50);const pduMW=0.277;const totalPduMW=pduCount*pduMW;return{needed:totalMW.toFixed(1),available:totalPduMW.toFixed(1),unit:"MW total (est. "+pduCount+" PDUs)",pass:totalMW<=totalPduMW,detail:`${totalMW.toFixed(1)}MW IT vs ${totalPduMW.toFixed(1)}MW PDU capacity (${pduCount}×277kW PDUs @ 400A 3PH)`}},
  learningObjective:"Understand how floor PDUs distribute power from UPS/STS to individual rack rows, including transformer isolation, monitoring, and branch circuit protection.",plainEnglish:"The floor PDU takes power from the UPS output (via STS if dual-path) and distributes it to individual rack rows via branch circuits. Each PDU typically serves 20–40 racks. It includes a transformer (for voltage matching or isolation), monitoring, and branch circuit breakers.",
  grammar:{facts:[{term:"Floor PDU",definition:"A power distribution unit located on the data hall floor. Steps down voltage if needed (e.g. 400V to 230V), provides monitoring (per-circuit), and distributes to rack PDUs via branch circuits.",plain:"The local substation for a section of the data hall. Takes power from the UPS and splits it into individual circuits for each row of racks.",number:"Typical rating: 100–500 kVA. Branch circuits: 20–80 per PDU. Monitoring: per-circuit kW, kWh, power factor, current.",standard:"IEC 62040-3; EN 50600-2-2; IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like the fuse board in your house — but on the data hall floor, close to the racks it feeds. It takes a single large feed from the UPS and splits it into many smaller circuits, each protected by its own breaker, each feeding a row or group of racks.",firstPrinciples:"The floor PDU (Power Distribution Unit) sits between the UPS output and the rack PDUs. It typically contains a transformer (to step down or isolate voltage), monitoring equipment, and branch circuit breakers. Each branch circuit feeds a specific set of racks. The PDU is the last point where power can be metered and managed before it reaches individual racks.",theTest:"You know you understand this when you can answer: A floor PDU has a 400 kVA transformer and 42 branch circuits at 32 A. Can all 42 circuits run at full load simultaneously? Answer: 42 × 32 A × 230 V = 309 kVA. That\'s within the 400 kVA transformer rating. But diversity means not all circuits peak at the same time — PDUs are typically loaded to 60–80% of transformer rating to allow for growth."}},{term:"PDU Transformer",definition:"Isolation or step-down transformer within the PDU. Provides galvanic isolation and/or voltage transformation (e.g., 400 V 3-phase to 230 V single-phase for standard IT equipment).",plain:"Some racks need 230V single-phase (standard servers). Some need 400V three-phase (high-density). The PDU transformer handles the conversion.",number:"K-factor transformer for harmonic loads: K13 or K20 typical for DC PDU application. Derating not required if K-factor matches harmonic profile.",standard:"IEC 61558; IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like a noise-cancelling wall between your house and a noisy neighbour. The PDU transformer doesn\'t just change voltage — it provides galvanic isolation, which means electrical noise and faults on the supply side don\'t pass through to the server side.",firstPrinciples:"Many floor PDUs include a step-down transformer (e.g., 400 V to 230 V for single-phase outlets, or 400 V to 415 V for harmonic cancellation). Beyond voltage conversion, the transformer provides galvanic isolation — creating a new earth reference point and blocking common-mode noise. It also limits fault current on the secondary side to a known, manageable level.",theTest:"You know you understand this when you can answer: Why do some DC operators specify PDUs without transformers (transformer-less PDUs)? Answer: Removing the transformer saves 1.5–2% in losses (improving PUE) and reduces weight and cost. The trade-off is losing galvanic isolation. Modern UPS output is clean enough that some operators accept this trade-off — but it depends on the IT equipment\'s tolerance."}},{term:"Branch Circuit Protection",definition:"Individual circuit breakers within the PDU for each outgoing circuit to rack PDUs. Provides overcurrent protection and isolation for maintenance.",plain:"Each row of racks has its own breaker in the PDU. If a fault occurs on one row, only that row loses power — the rest continue.",number:"Typical branch: 32 A single-phase (7.36 kW) or 32 A three-phase (22.1 kW). RCBO or MCB depending on earthing arrangement.",standard:"IS 10101:2020+A1:2024 Chapter 43; IEC 61439",feynman:{analogy:"Think of it like the individual fuses in your house fuseboard. If you overload the kitchen circuit, only the kitchen fuse blows — the lights and sockets in the rest of the house stay on. Branch circuit breakers in a PDU do the same: isolate a fault to one rack row without affecting others.",firstPrinciples:"Each branch circuit from the PDU is protected by a circuit breaker — typically a Type C MCB rated at 16 A, 20 A, or 32 A depending on rack density. The breaker must discriminate with the upstream protection in the PDU main incomer. If a fault occurs on one branch, only that branch trips — not the PDU main breaker, which would take down all branches.",theTest:"You know you understand this when you can answer: A 32 A branch circuit feeds a row of 10 racks. A server PSU fails with a short circuit. What should happen? Answer: The 32 A branch MCB should trip within milliseconds, isolating that row. The PDU main breaker must NOT trip — that\'s discrimination. If the main trips instead, it means the breakers are not properly coordinated."}},{term:"PDU Metering and Monitoring",definition:"Modern PDUs include per-circuit metering with network connectivity for DCIM integration. Essential for capacity management and colocation billing.",plain:"A smart PDU tells you exactly how much power each circuit uses. Critical for knowing when capacity is running out.",number:"Per-circuit accuracy: +/-1% billing grade, +/-3% capacity management. Polling: 1-5 seconds. SNMP, Modbus, or REST API for DCIM.",standard:"EN 50600-2-2; IEC 62053 (metering accuracy); AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of it like a smart meter on every appliance in your house instead of one meter for the whole house. If your bill spikes, you see exactly which appliance causes it.",firstPrinciples:"A PDU without metering is a blind distribution point. With 42 circuits, knowing which are at 80% and which at 20% is the difference between informed capacity management and guesswork. Billing-grade accuracy is required for colocation tenant billing.",theTest:"A PDU has 42 circuits. Total reads 80%. Is it nearly full? Not necessarily. If 10 circuits are at 95% and 32 at 30%, total reads 80% but no more high-load circuits are available. Per-circuit metering reveals the real constraint."}},{term:"PDU Redundancy Configuration",definition:"PDUs deployed in A/B pairs feeding each rack from independent power paths. Each PDU must carry the full rack load alone if its partner fails.",plain:"Every rack gets two power feeds. Either one can carry the full load alone, so losing one PDU does not lose any servers.",number:"A-feed: 50% loaded normally. B-feed: 50% loaded. Either capable of 100% alone. Each PDU rated for full rack capacity, not half.",standard:"EN 50600-2-2; Uptime Institute Tier Standard; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of two bridges, each strong enough for all traffic. Normally traffic splits 50/50. If one closes, the other carries everything. Sizing each for only 50% means closing one causes collapse.",firstPrinciples:"In 2N PDU configuration, each rack has two feeds from independent electrical paths. Each PDU must be rated for full rack load even though it normally carries 50%. The common mistake is sizing each PDU for 50%, meaning losing one overloads the other.",theTest:"A rack draws 10 kW. Each PDU rated 12 kW. Correctly sized for 2N? Yes, each carries full 10 kW with headroom. If PDUs were 6 kW each (totalling 12 kW), losing either overloads the survivor."}}],
    whatItLooksLike:"Floor-standing cabinet (typically in the data hall or adjacent electrical room). Incoming feeder from UPS/STS. Internal transformer. Monitoring panel. Rows of branch circuit breakers.",
    siteChecklist:["Confirm PDU transformer K-factor matches harmonic load profile","Check branch circuit loading — target <80% continuous per IS 10101","Verify monitoring — per-circuit metering essential for capacity planning","Confirm PDU redundancy — A and B feed PDUs for dual-path to rack","Check that each PDU has a maintenance bypass (allows PDU service without load interruption)"]},
  logic:{causeAndEffect:[{cause:"A PDU branch circuit is continuously loaded to 95% of its rated current, exceeding the 80% continuous load rule",effect:"Thermal stress on breaker contacts and cabling. IS 10101 limits continuous loading to 80% of breaker rating for circuits serving fixed loads.",insight:"Per-circuit monitoring catches this before the breaker trips. Without monitoring, the first sign of overload is a tripped breaker at 3 AM."},{cause:"A rack row is supplied from a single PDU feed (A-feed only) with no B-feed path to dual-corded servers",effect:"PDU maintenance or failure = row outage. Dual A+B PDU feeds allow either PDU to be maintained without rack power interruption.",insight:"Dual PDU feeds only work if the IT equipment has dual PSUs configured for A+B redundancy. Single-PSU servers on dual PDU = wasted redundancy."},{cause:"PDU output circuit breakers are not selectively coordinated with the upstream distribution board protection",effect:"A fault on a single rack circuit trips the PDU main breaker instead of the branch breaker. Entire rack row loses power.",insight:"PDU branch breakers must be coordinated with the main breaker at the prospective fault current. Many suppliers provide uncoordinated standard breakers."},{cause:"PDU transformer temperature rise exceeds nameplate rating due to blocked ventilation in a sealed electrical room",effect:"Transformer winding temperature rises 15–20°C above rated limit. Insulation life halves for every 10°C above rated temperature. A transformer with 25-year design life fails in 6–8 years.",insight:"PDU rooms need forced ventilation or cooling sized for transformer losses — typically 2–3% of throughput power. A 500 kVA PDU rejects 10–15 kW of heat. In a sealed room, that heat has nowhere to go."}],
    constraintLesson:"The PDU is where the power chain becomes visible to the IT team.\nEverything upstream (transformers, switchboards, UPS) is the domain of the\nMEP engineer. The PDU is where the MEP engineer meets the\nIT team — and where capacity mismatches are discovered.\n",
    weakestLink:{whatsWrong:"Each rack has 32 A available. We are at 20 A per rack average — 37.5% spare.",whatsRight:"Average is misleading. If 10% of racks draw 30 A and 90% draw 18 A, the 30 A racks are at 94% — above the 80% continuous limit. Per-rack monitoring reveals the distribution.",howToGetThere:"Install per-circuit monitoring at PDU level. Set 80% capacity alerts per circuit. Rebalance loads across circuits to prevent hot spots."}},
  rhetoric:{declan:{hook:"PDU with per-circuit monitoring tells me exactly where headroom exists. Without it I am guessing and padding every rack booking with a safety margin.",text:"The PDU is the window into power distribution. If you have per-circuit monitoring you can see exactly where the load is and where the headroom is. If you do not, you are flying blind. Install metering on every PDU circuit."},ann:{hook:"PDU monitoring feeds capacity planning and revenue forecasting directly. Without per-circuit data, you are selling rack space on guesswork not measurement.",text:"PDU monitoring data feeds directly into capacity planning and revenue forecasting. A DC that cannot tell you per-rack power consumption cannot accurately forecast available capacity — or quote new customers."},mark:{hook:"32 A three-phase branch at 400V gives 17.7 kW continuous at 0.80 derating. That simple calculation is what the wiring audit usually reveals has not been done.",text:"32 A three-phase branch at 400 V: 32 × 400 × 1.732 × 0.80 = 17.7 kW continuous (at 80% derating per IS 10101). This is the effective per-circuit capacity. Dividing by the number of racks per circuit gives the per-rack allocation."},sarah:{hook:"PDU-level metering provides the IT power denominator for the PUE calculation. Without it, the EED Article 12 figures are not auditably defensible.",text:"PDU-level metering provides the data for PUE calculation (IT power measurement) and EED Article 12 reporting. Without accurate PDU metering, carbon intensity calculations are estimates, not measurements."},tom:{hook:"Floor PDU at 20 to 80 thousand euros each. The monitored version costs 20 percent more and pays for itself the first time it catches an overloaded circuit.",text:"Floor PDU cost: €20k–€80k each depending on rating and monitoring level (Tier 3 — APC/Raritan/Vertiv published ranges, indicative). Per-circuit monitoring adds €5k–€15k per PDU (Tier 3 — APC/Raritan/Vertiv published ranges, indicative). For a 50 MW DC with 40 PDUs: €800k–€3.2M total. The monitoring investment pays for itself in capacity optimisation — typically 5–15% more usable power from existing infrastructure."}},
  rhetoricTakeaways:{declan:"Install per-circuit monitoring on every PDU. Set 80% threshold alarms. Rebalance loads across circuits quarterly.",ann:"PDU monitoring data feeds capacity forecasting and customer billing. Without it, available capacity is an estimate.",mark:"32A three-phase at 400V: 17.7 kW continuous at 80% derating. This is the hard ceiling per branch circuit.",sarah:"PDU-level metering provides the IT power measurement required for PUE calculation and EED Article 12 reporting.",tom:"Per-circuit monitoring adds €5k–€15k per PDU (Tier 3 — APC/Raritan/Vertiv published ranges, indicative). The 5–15% capacity reclamation from rebalancing typically pays for itself within a year."},
  scenario:{title:"The Capacity Mismatch",narrative:"A DC operator sells a 50-rack deployment to a customer at 8 kW per rack. The customer installs GPU servers drawing 15 kW each. PDU branch circuits start tripping at 3 AM.",question:"What went wrong and how should it be prevented?",answer:"What went wrong:\nBranch circuit rated at 32A single-phase × 230V × 0.80 = 5,888 W continuous per circuit.\nOr 32A three-phase × 400V × 1.732 × 0.80 = 17,725 W continuous per circuit.\n\nIf single-phase 32A circuits: 5.9 kW per circuit vs 15 kW per rack = overload.\nIf three-phase 32A shared across 2 racks: 17.7 kW / 2 = 8.85 kW per rack vs 15 kW = overload.\n\nRoot cause: capacity was sold based on per-rack allocation (8 kW) without verifying\nagainst actual branch circuit capacity. Customer installed higher-density equipment.\n\nPrevention:\n1. Contractual: power allocation must specify maximum kW/rack and circuit type\n2. Technical: per-circuit monitoring with 80% threshold alarm\n3. Process: customer IT hardware review before installation\n4. For GPU/AI racks: 3-phase circuits at 63 A (43.6 kW continuous) or higher\n",
whoShouldCare:["declan","mark"]},
  sourceNote:"PDU specifications — IEC 61439 (T1); IS 10101:2020+A1:2024 (T1). Branch circuit derating — IS 10101 Chapter 43 (T1). Monitoring — EN 50600-2-2 (T1).",
  clockQuote:"The last distribution point before the server. After this, it's the machine.",
  crossRefs:[{module:"DC-LEARN-006",level:"L6",topic:"UPS power factor → grid power factor"},{module:"DC-LEARN-002",level:"L1",topic:"PDU allocation → rack heat density"}],
  retrofitRelevance:"PDU upgrade from single-phase to three-phase branch circuits is one of the most common retrofits for DCs accepting high-density AI/GPU workloads."
},
{
  id:"L7",level:7,name:"Busway",icon:"🔗",
  component:"Busbar Trunking (Busway)",available:true,
  userNeedStatement:"Understand overhead busway distribution and why it enables flexible rack deployment",
  cascadeCheck:(kw)=>{const availKW=32*0.8*230/1000;return{needed:kw.toFixed(1),available:availKW.toFixed(1),unit:"kW/rack (1PH tap)",pass:kw<=availKW,detail:`${kw}kW target vs ${availKW.toFixed(1)}kW max per tap (1PH 32A×0.8 derate×230V)`}},
  learningObjective:"Understand busway as an alternative to cable distribution, how tap-off boxes work, and the capacity advantages for high-density deployments.",plainEnglish:"Busway is a prefabricated metal duct containing copper or aluminium busbars. Instead of running individual cables from the PDU to each rack, the busway runs overhead and racks tap off power through plug-in boxes. It is faster to install, easier to reconfigure, and better suited to high-density layouts.",
  grammar:{facts:[{term:"Busbar Trunking System",definition:"Prefabricated enclosed busbars for power distribution. Installed overhead or under raised floor. Tap-off boxes plug in at any point along the busway to serve individual racks or rack rows.",plain:"A power highway running above the racks. Plug a tap-off box in anywhere along its length to connect a rack — like plugging into a power strip.",number:"Rating: 100 A to 6,300 A depending on application. Tap-off: 32 A single-phase (5,888 W) or 32 A three-phase (17,725 W at 0.80 derating).",standard:"IEC 61439-6 (Busbar Trunking); IS 10101:2020+A1:2024",feynman:{analogy:"Think of it like a power strip running the entire length of the data hall ceiling. Instead of pulling individual cables from the PDU to each rack row, you run one busbar overhead and tap off wherever you need power. Moving a tap-off is far easier than re-routing a cable.",firstPrinciples:"A busbar trunking system (busway) distributes power from the floor PDU to rack rows using prefabricated copper or aluminium conductors enclosed in a protective housing. It mounts overhead and accepts plug-in tap-off boxes at regular intervals. Each tap-off feeds a rack row. The busway\'s advantage over cabling is flexibility — tap-off points can be added, moved, or removed without shutdown.",theTest:"You know you understand this when you can answer: A data hall redesign moves a rack row 3 metres north. With cable distribution, what happens vs. with busway? Answer: With cables, you need to pull new cables from the PDU to the new rack position — possibly requiring a shutdown and new containment. With busway, you unplug the tap-off box and plug it in at the new position along the busway — often a live operation."}},{term:"Tap-Off Box",definition:"A plug-in connection point on the busway. Contains breaker or fuse protection. Can be added, moved, or removed without de-energising the busway.",plain:"A plug that connects a rack row to the busway. Add more plugs as you add more racks.",number:"Single-phase 32 A: 32 × 0.80 × 230 = 5,888 W continuous. Three-phase 32 A: 32 × 0.80 × 400 × 1.732 = 17,725 W continuous.",standard:"IEC 61439-6; IS 10101",feynman:{analogy:"Think of it like a USB hub plugged into a laptop. The busway is the laptop, and each tap-off box is a hub that provides power to the racks below it. You plug it in where you need it, and each one has its own protection so a fault in one hub doesn\'t affect the others.",firstPrinciples:"The tap-off box is a plug-in module that connects to the busway at any tap-off point. It contains a switch-disconnector or MCB for isolation and protection, and output connections (usually a Powerlock or terminal block) that feed the rack PDUs below. Tap-off boxes are rated in amps (typically 63 A, 100 A, or 160 A) and must match the busway phase configuration.",theTest:"You know you understand this when you can answer: Can you add a new tap-off box to a live busway without shutting down the entire busway? Answer: Yes — this is one of the key advantages of busway. The tap-off box is designed for plug-in installation with the busway energised. The box\'s internal switch-disconnector is in the OFF position during insertion, then turned ON once seated."}},{term:"Busway vs Cable",definition:"Busway advantages: faster installation, easier reconfiguration, better capacity per floor area. Cable advantages: lower cost for small installations, flexible routing, no vendor lock-in.",plain:"Busway is better for large DCs that change layout often. Cables are cheaper for small, static installations.",number:"Installation speed: busway 30–50% faster than cable for runs >20m. Reconfiguration: tap-off moves in minutes vs cable re-routing in hours/days.",standard:"EN 50600-2-2; industry best practice",feynman:{analogy:"Think of it like choosing between a fixed railway line and a fleet of taxis. Cables are like the railway — once laid, the route is fixed and changing it is expensive. Busway is like the taxi fleet — flexible, reconfigurable, but with higher upfront cost per metre.",firstPrinciples:"Traditional cable distribution runs individual cables from PDU to each rack row — reliable and well-understood, but inflexible once installed. Busway is a prefabricated overhead system that offers modular power distribution with live tap-off capability. Busway costs more per metre installed but saves on lifecycle cost when rack layouts change frequently. Cable is cheaper upfront but every layout change means new cables, new containment, and potential downtime.",theTest:"You know you understand this when you can answer: A colocation DC expects rack layout changes every 2–3 years as tenants change. Cable or busway? Answer: Busway — the reconfiguration cost and downtime of re-cabling every 2–3 years will exceed the busway premium within the first change cycle. For a single-tenant DC with a fixed layout for 10+ years, cable may be more cost-effective."}},{term:"Busway Thermal Rating and Derating",definition:"Busway current rating is specified at reference ambient (typically 35C). Higher ambient or restricted ventilation requires derating.",plain:"A busway rated 800A at 35C cannot safely carry 800A at 45C. Hot environments mean less capacity.",number:"Typical derating: 1% per degree C above 35C. 800A busway at 45C: 800 x 0.90 = 720A. Horizontal above hot aisle: ambient may reach 40-45C.",standard:"IEC 61439-6; EN 50600-2-2; IS 10101:2020+A1:2024",feynman:{analogy:"Think of a runner on a hot day. A runner maintaining 15 km/h at 20C slows to 13 km/h at 35C. Busway conductors work the same way: higher ambient means less safe current capacity.",firstPrinciples:"Busway rating is determined by maximum conductor temperature the insulation withstands, typically 105C. Allowable rise = 105 minus ambient. At 35C: 70C rise. At 45C: 60C rise, so current must be reduced. Routing busway above hot aisles where exhaust reaches 40-45C is a common oversight.",theTest:"An 800A busway runs above the hot aisle at 42C. Derated capacity? 42-35 = 7C above reference. At 1% per degree: 800 x 0.93 = 744A. If feeding 8 racks at 100A each (800A), the busway is overloaded at 42C."}},{term:"Busway Fire Compartmentation",definition:"Where busway passes through fire-rated walls or floors, fire-stopping must maintain the compartment rating. The busway itself provides no fire resistance.",plain:"Busway punches holes through fire walls. Every hole must be sealed to the same fire rating as the wall.",number:"Typical DC fire compartment: REI 60 to REI 120. Firestop must accommodate thermal movement of busway during load cycling.",standard:"EN 50600-2-5; IS 3218:2024; BS 476 / EN 13501",feynman:{analogy:"Think of running a pipe through a firewall. The pipe itself is not fireproof, so the hole around it must be sealed with fire-rated material. Busway penetrations are the same.",firstPrinciples:"Fire compartmentation divides the building into zones where fire is contained for a rated period. Busway creates a breach. The aluminium or steel housing conducts heat and provides no fire resistance. A tested firestop system must seal the gap. The firestop must also accommodate busway thermal expansion.",theTest:"A 400A busway passes through an REI 120 wall. The manufacturer says the housing is steel. Sufficient? No. Steel conducts heat and reaches failure temperature well before 120 minutes. A tested firestop rated to REI 120 must be installed around the penetration."}}],
    whatItLooksLike:"Overhead aluminium or steel trunking running the length of the data hall. Tap-off boxes spaced at regular intervals (typically every 600 mm). Drop cables from tap-off to rack PDU.",
    siteChecklist:["Confirm busway rating matches total rack row power requirement","Verify tap-off spacing matches rack pitch (600 mm or 700 mm)","Check busway loading — sum of all tap-off loads vs busway rating","Confirm tap-off boxes are hot-pluggable (can be added under load)","Verify busway IP rating for the installation environment"]},
  logic:{causeAndEffect:[{cause:"The data centre converts from standard compute servers at 5 kW per rack to GPU AI servers at 30 kW per rack",effect:"Existing busway tap-off boxes rated for 32 A single-phase (5.9 kW) are inadequate. Three-phase tap-offs or higher-rated busway needed.",insight:"Busway flexibility works in both directions — it is easy to add tap-offs, but the busway itself has a fixed rating. If the total rack power per row exceeds the busway rating, the busway must be replaced."},{cause:"Overhead busway is installed without adequate structural support, relying on ceiling fixings rated for lighting loads",effect:"Busway sag over time, loose connections, potential contact failure — creating an arc flash hazard",insight:"Busway support centres must follow manufacturer specifications exactly. Copper busway is heavier than aluminium — verify structural capacity of the overhead supports."},{cause:"A 250A tap-off box is installed at slot 26 on a busway rated for maximum 24 tap-off positions",effect:"Slot 25 or 27 becomes physically inaccessible — the tap-off box width exceeds a single slot pitch, blocking the adjacent position",insight:"Busway slot availability must be assessed net of coverage impact, not gross. Each 250A TOB installation reduces remaining capacity by two slot positions, not one. In a facility-wide retrofit audit, failing to account for this cascading coverage effect overestimates deployable capacity by up to 50%. A slot-level survey is essential before committing rack counts. Source: manufacturer installation guides (T3)."},{cause:"Busway IP rating is inadequate for location — installed below a CHW pipe run without drip tray protection",effect:"A CHW pipe joint leak (glycol-water mix at 6°C) drips onto the busway over several hours. Moisture enters through ventilation slots. Phase-to-earth fault develops under load — arc flash event at the busway splice.",insight:"Busway routing must avoid overhead water services. Where unavoidable, install drip trays and leak detection rope. A single busway fault takes down an entire rack row. The remediation cost dwarfs the €500 drip tray."}],
    constraintLesson:"Busway is the most flexible distribution method — but the flexibility\napplies to the tap-offs, not the busway itself. The busway rating\nis fixed at installation. A 250 A busway cannot serve a row of 30 kW racks\nif the total exceeds 250 A. Planning the busway rating for ultimate density,\nnot current density, is essential.\n\nThere is a second constraint that is invisible on a single-line diagram:\nphysical slot coverage. A 250A tap-off box physically spans approximately\ntwo slot positions on the busway. Installing one TOB blocks the adjacent slot.\nThe number of available slots in an audit is NOT the number of TOBs you can\ninstall — each installation reduces remaining positions by two, not one.\nA slot-level survey must account for this cascading effect before any\ncapacity commitment is made.\n",
    weakestLink:{whatsWrong:"We have busway throughout the hall — we can add racks anywhere.",whatsRight:"You can add tap-offs anywhere, but the total load per busway section must not exceed its rating. Adding more taps does not add more capacity — it distributes existing capacity among more connection points.",howToGetThere:"Map total load per busway section. Identify sections approaching capacity. For high-density deployments, consider supplementary busway runs or direct cable feeds to high-power racks."}},
  rhetoric:{declan:{hook:"Busway is excellent for flexibility — until you hit the rating. I have seen operators plug 40 kW into a 32 A tap-off box without checking.",text:"Busway is brilliant for flexibility — until you hit the rating. I have seen operators add tap-offs until the busway trips on overload. Know the busway ampere rating. Know the sum of the tap-offs. Keep it below 80%."},ann:{hook:"Busway enables rapid rack deployment. In colocation, speed-to-power directly determines revenue recognition — this infrastructure is what unlocks it at scale.",text:"Busway is a capital investment that enables rapid rack deployment. In a colocation business, the speed of deployment directly affects revenue ramp. A DC with busway can deploy 50 racks in a week. A cable-fed DC may take a month."},mark:{hook:"Busway voltage drop at 0.01 to 0.03 V per metre over a 50 m run. At rated current and high density that becomes a protection coordination calculation.",text:"Busway voltage drop: typically 0.01–0.03 V/m at rated current. Over a 50 m run at 250 A: 1.5 V drop maximum. At 400 V, that is 0.38% — within the 3% limit per IS 10101. Check at end of run for longest circuits."},sarah:{hook:"Copper versus aluminium busway carries a material embodied carbon difference — document the selection rationale in the sustainability record at design stage.",text:"Busway material (copper vs aluminium) has an embodied carbon difference. For sustainability reporting, the material choice should be documented. Aluminium busway has lower embodied carbon per ampere capacity."},tom:{hook:"150 to 400 euros per metre for busway. A large DC needs kilometres of it. Specify incorrectly once and re-procurement more than doubles the cost.",text:"Busway cost: €150–€400 per metre depending on rating. For a 50 MW DC with 1,500 m of busway: €225k–€600k. Tap-off boxes: €500–€2,000 each. Installation labour: 30–50% less than equivalent cable installation. The speed advantage may offset the material premium."}},
  rhetoricTakeaways:{declan:"Before any rack density increase, check busway rating against the new total load per row. Busway cannot be derated in the field.",ann:"Busway rating caps the revenue per row. A 250A busway limits row capacity regardless of rack count.",mark:"250A three-phase busway at 80%: 138 kW per section. A 20-rack row at 20 kW/rack needs 400 kW — three busway runs.",sarah:"Busway material (copper vs aluminium) and insulation affect embodied carbon — specify in procurement for lifecycle assessments.",tom:"Busway cost: €200–€500 per metre plus €500–€1,500 per tap-off. Direct cable feeds may be cheaper above 40 kW/rack."},
  scenario:{title:"The High-Density Conversion",narrative:"A colocation DC converts a 100-rack row from 5 kW standard servers to 20 kW GPU servers. The overhead busway is rated at 250 A three-phase. Current utilisation: 60%.",question:"Will the existing busway support the conversion? Calculate the new loading.",answer:"Busway capacity per run (at 80% continuous derating):\n250 A × 400 V × 1.732 × 0.80 = 138.6 kW per busway run.\n\nAssume 4 busway runs of 250 A serving the 100-rack row:\nTotal capacity: 4 × 138.6 = 554 kW.\n\nCurrent loading:\n100 racks × 5 kW = 500 kW. Utilisation: 500 ÷ 554 = 90% — already above 80% target.\n(Note: 60% utilisation implies additional busway runs or lower actual rack loads.)\n\nAfter conversion to 20 kW/rack:\n100 racks × 20 kW = 2,000 kW total.\nRequired busway runs: 2,000 ÷ 138.6 = 14.4 → 15 busway runs of 250 A.\nExisting: 4 busway runs. Shortfall: 11 additional runs.\n\nOptions:\nA) Install 8 additional 250 A busway runs — €120k–€320k + installation\nB) Replace 4 × 250 A with 4 × 800 A busway — €200k–€400k + installation\nC) Direct cable feeds to high-density racks (bypass busway) — €50k–€150k for 100 racks\n\nThe existing busway cannot support the conversion without significant expansion.\n",
whoShouldCare:["mark","tom"]},
  sourceNote:"Busway — IEC 61439-6. Tap-off ratings — IS 10101. Costs — SCSI M&E benchmark data; RICS NRM1 (T2).",
  clockQuote:"A power highway running above the racks. Plug in wherever you need it.",
  crossRefs:[{module:"DC-LEARN-001",level:"L6",topic:"PDU branch circuit → busway tap-off"},{module:"DC-LEARN-002",level:"L7",topic:"Busway heat → data hall cooling load"}],
  retrofitRelevance:"Busway capacity is the most common constraint when converting standard racks to high-density AI/GPU workloads. Supplementary distribution is almost always required."
},
{
  id:"L8",level:8,name:"Rack PDU",icon:"🖥️",
  component:"Rack PDU & Monitoring",available:true,
  userNeedStatement:"Understand A+B rack-level redundancy and how intelligent PDUs enable capacity management",
  cascadeCheck:(kw)=>{const availKW=32*0.8*230/1000;return{needed:kw.toFixed(1),available:availKW.toFixed(1),unit:"kW/rack (1PH 32A)",pass:kw<=availKW,detail:`${kw}kW target vs ${availKW.toFixed(1)}kW max per PDU (32A×0.8 derate×230V, each PDU must handle full load in 2N)`}},
  learningObjective:"Understand rack PDU types (basic, metered, switched, intelligent), redundancy configuration (A+B feeds), and how rack-level monitoring enables capacity management.",plainEnglish:"The rack PDU is the last distribution point before the server PSU. It takes the feed from the floor PDU (or busway tap-off) and distributes it to individual servers via outlets. For redundancy, each rack has an A-feed and B-feed PDU — each capable of powering the full rack.",
  grammar:{facts:[{term:"Rack PDU",definition:"A power strip mounted vertically in the rack cabinet. Distributes power from the incoming feed to individual server and network equipment outlets.",plain:"The power strip inside the rack that servers plug into. Comes in basic (no monitoring), metered (shows power usage), and switched (can turn outlets on/off remotely).",number:"Typical: 32 A single-phase (5,888 W at 80%) or 32 A three-phase (17,725 W at 80%). Outlets: 12–42 per PDU depending on type.",standard:"IEC 60309 (industrial plugs); IS 10101",feynman:{analogy:"Think of it like a multi-socket extension lead inside a wardrobe. It takes the single power feed coming into the rack and distributes it to every server, switch, and storage device inside. But unlike a home extension lead, it monitors every outlet and can tell you exactly how much power each device draws.",firstPrinciples:"The rack PDU mounts vertically inside the server rack (0U — zero rack units, so it doesn\'t consume rack space). It receives power from the floor PDU or busway tap-off via a single input cable and provides multiple outlets (C13 and C19 connectors) to the IT equipment. Intelligent rack PDUs report per-outlet power, current, voltage, and temperature back to the DCIM system.",theTest:"You know you understand this when you can answer: A rack has two PDUs (A and B). The A-side PDU shows 80% load, the B-side shows 10%. Is this a problem? Answer: Yes — if the A-side PDU or its upstream feed fails, the B-side must carry the full load. At 10% B-side load, it can. But 80% on one side means the load is not balanced. If A fails, B suddenly goes from 10% to 90% — within tolerance but with no headroom."}},{term:"A+B Redundancy",definition:"Each rack has two PDUs (A-feed and B-feed) from independent power paths. Each server has dual PSUs — one on A, one on B. Either PDU can power the full server load.",plain:"Two separate power feeds to every rack. If one dies, the other keeps everything running.",number:"A-feed on UPS/STS path A. B-feed on UPS/STS path B. Each rated for 100% of rack load. Normal: 50/50 load sharing. N-1: 100% on surviving feed.",standard:"EN 50600-2-2; Uptime Institute Tier IV",feynman:{analogy:"Think of it like wearing both a belt and braces. Either one will hold your trousers up on its own. If the belt breaks, the braces take over — your trousers stay up. A+B rack PDUs give every server two independent power paths, each capable of carrying the full load.",firstPrinciples:"In an A+B rack configuration, two independent PDUs feed each rack from two separate power paths — typically from two different UPS systems via two different floor PDUs. Every server connects to both PDUs via dual PSUs. Under normal operation, each PDU carries roughly 50% of the load. If one path fails completely, the other carries 100%. This is the fundamental redundancy model at rack level.",theTest:"You know you understand A+B when you can answer: Each rack PDU is rated for 32 A (7.4 kW at 230 V). The rack has 6 kW of IT load. On A+B, each PDU carries 3 kW (41% of rating). If the A-side fails, the B-side carries 6 kW (81% of rating). Is this acceptable? Answer: Yes — 81% is within the PDU rating. But it leaves only 19% headroom. Best practice is to keep each side below 40% so a failover stays below 80%."}},{term:"Intelligent PDU",definition:"Rack PDU with per-outlet power monitoring, environmental sensors (temperature, humidity), remote outlet switching, and network management (SNMP/IP).",plain:"A smart power strip that tells you exactly how much each server is using and lets you turn outlets on and off remotely.",number:"Per-outlet monitoring accuracy: ±1%. Environmental sensor: temperature ±0.5°C. Cost premium: 2–3× over basic PDU.",standard:"Industry standard — no specific IEC standard for intelligent PDU features",feynman:{analogy:"Think of it like a smart electricity meter for every device in your house — except it reports every 10 seconds and can remotely switch any socket on or off. An intelligent PDU gives the operator per-outlet visibility and control over every server in the rack, without physically touching anything.",firstPrinciples:"An intelligent (or smart) rack PDU adds network connectivity, per-outlet metering, environmental sensors (temperature, humidity), and remote switching to the basic PDU function. It reports real-time data to the DCIM system via SNMP, Modbus, or a web interface. This data drives capacity planning — operators can see exactly which racks have power headroom and which are approaching limits.",theTest:"You know you understand this when you can answer: The DCIM dashboard shows Rack A4 drawing 6.8 kW from a 7.4 kW PDU (92% loaded). What should the operator do? Answer: No new equipment in that rack until load is reduced or redistributed. 92% leaves no headroom for a failover event. The intelligent PDU data tells you this before someone tries to install a new server and trips the breaker."}},{term:"IEC Connector Types (C13/C14 vs C19/C20)",definition:"IEC 60320 defines the connector pairs used on rack PDUs. C13/C14 for standard servers (≤10 A at 250 V). C19/C20 for high-power equipment (≤16 A at 250 V). The wrong connector means the equipment physically cannot plug in.",plain:"Small plug (C14) for normal servers, big plug (C20) for power-hungry servers and switches. Getting this wrong during rack build-out wastes a day re-cabling.",number:"C13/C14: rated 10 A / 250 V (2,500 W max). C19/C20: rated 16 A / 250 V (4,000 W max). Typical 2U server: C14. High-density GPU server or network switch: C20.",standard:"IEC 60320; IS 10101",feynman:{analogy:"Think of it like having two sizes of garden hose connector — one for the lawn sprinkler and one for the pressure washer. C13/C14 connectors handle standard servers (up to 10 A / 2.3 kW). C19/C20 connectors handle high-power equipment (up to 16 A / 3.7 kW). Using the wrong connector won\'t physically fit — by design.",firstPrinciples:"IEC 60320 defines the connector types used in data centres. C13 (female, on the cable) plugs into C14 (male, on the device) — rated 10 A at 230 V (2.3 kW). C19 (female) plugs into C20 (male) — rated 16 A at 230 V (3.7 kW). The physical shape prevents cross-connection: you cannot plug a C13 into a C20 socket. Rack PDUs provide a mix of both outlet types depending on expected equipment.",theTest:"You know you understand this when you can answer: A new GPU server draws 2.8 kW per PSU. Which connector type does it need? Answer: C19/C20 — because 2.8 kW at 230 V = 12.2 A, which exceeds the C13/C14 rating of 10 A. The rack PDU must have C19 outlets available. If only C13 outlets remain, the server cannot be safely connected."}},{term:"Intelligent Rack PDU Features",definition:"Advanced rack PDUs with per-outlet switching, metering, environmental sensors, and remote management via SNMP or web interface.",plain:"A smart rack PDU is like a power strip with a brain. It tells you what each outlet draws, switches outlets remotely, and alerts you if the rack overheats.",number:"Per-outlet metering: +/-1%. Per-outlet switching: remote power cycle. Environmental: temperature +/-0.5C, humidity +/-3% RH. Dual Ethernet for management redundancy.",standard:"EN 50600-2-2; IEC 62040-3; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"Think of a smart power bar that tells you how much each device costs and lets you turn any socket off from your phone. In a DC with thousands of servers, remotely power-cycling a hung server at 3 AM saves significant time.",firstPrinciples:"An intelligent rack PDU combines distribution, metering, switching, and environmental monitoring. Metering feeds DCIM for capacity management. Switching enables remote power cycling for lights-out operations. Environmental sensors provide rack-level thermal data that room-level CRAH sensors cannot detect.",theTest:"A server in rack A15 has hung. DC is lights-out. With basic PDU: engineer travels to site, hours of downtime. With intelligent PDU: NOC operator remotely switches outlet off and on, 30 seconds of downtime."}}],
    whatItLooksLike:"Vertical-mount power strip in the rear of the rack cabinet. LED display or network connection showing power readings. Two PDUs per rack (A and B) mounted on opposite sides.",
    siteChecklist:["Confirm A+B PDU configuration — each rack should have dual independent feeds","Verify each server has dual PSUs connected to A and B feeds","Check PDU loading per rack — target <80% per PDU (each must carry 100% under N-1)","Confirm monitoring — per-outlet or per-PDU metering for capacity management","Verify outlet type matches server PSU plug (IEC C13/C19)"]},
  logic:{causeAndEffect:[{cause:"A server has dual power supply units but both PSUs are connected to the same rack PDU on the A-feed path only",effect:"Dual PSUs provide no redundancy — both are on the same power path. A-feed failure = server outage.",insight:"Cabling discipline is critical. Each server PSU must be on a different rack PDU (A vs B). This is a commissioning check, not a design check — mistakes happen during installation."},{cause:"Rack PDU load persistently exceeds 80% of rated capacity in continuous operation across multiple rack positions",effect:"Thermal stress on PDU contacts and wiring. Risk of outlet failure or internal fuse/breaker trip. Under N-1 (one PDU carries full load), the surviving PDU would be at 160% — guaranteed failure.",insight:"Each PDU must be sized so that under N-1 (the other PDU fails), it carries 100% of the rack load at ≤80% of its own rating. This means normal loading per PDU should be ≤40% — not 80%."},{cause:"Rack PDU power whip cables are routed through the hot aisle exhaust path, exposing them to sustained elevated temperatures",effect:"Cable insulation degrades in sustained 40-45C air. Over 2-3 years, insulation cracks at flex points. Risk of arc fault inside the rack.",insight:"Power whips must route through the cold aisle side or dedicated cable management at top of rack. Never through the hot aisle exhaust."},{cause:"Rack PDU outlets are all C13 type but new GPU servers require C19 connectors rated for 16 A",effect:"GPU servers physically cannot connect to C13 outlets (different connector shape). Even with an adapter, C13 outlets are rated 10 A — running a 12 A GPU PSU through a 10 A outlet risks overheating and fire.",insight:"Rack PDU specification must anticipate the IT equipment roadmap. Replacing a rack PDU in a live cabinet requires a planned outage. Specify mixed C13/C19 outlets from initial procurement — the cost premium is negligible."}],
    constraintLesson:"The rack PDU is the simplest component in the power chain — and the one\nmost likely to be incorrectly configured. Dual PSUs on the same PDU.\nA-feed on both PDUs. Overloaded outlets. Wrong plug types.\n\nThese are all installation errors, not design errors. The design is correct\non paper. The installation is where it goes wrong. Post-installation audit\nof every rack's power configuration is the only way to verify.\n",
    weakestLink:{whatsWrong:"Every server has dual PSUs. Every rack has dual PDUs. The power configuration is redundant.",whatsRight:"Redundancy only exists if PSU-A is on PDU-A and PSU-B is on PDU-B. If both PSUs are on the same PDU — which happens more often than anyone admits — the server has no power redundancy at all.",howToGetThere:"Audit every rack: trace each PSU cable to its PDU. Confirm A on A, B on B. Use colour-coded cables (red for A, blue for B) to prevent future misconnection. Include in commissioning checklist."}},
  rhetoric:{declan:{hook:"Lift the floor tile and trace the cables. I guarantee at least 5 percent of your racks are powered from the wrong UPS distribution path.",text:"Lift the floor tile and trace the cables. I guarantee at least 5% of your racks have both PSUs on the same PDU. Colour-coded cables and a commissioning audit are the fix. It takes one afternoon and prevents a 3 AM outage."},ann:{hook:"Rack-level power monitoring enables per-customer billing in colocation. That is the commercial model that justifies the premium on intelligent PDUs.",text:"Rack-level power monitoring enables per-customer billing in colocation environments. Without it, power is estimated — which means either under-charging (revenue loss) or over-charging (customer complaints)."},mark:{hook:"32 A single-phase rack PDU gives 5,888 W continuous. Dual A plus B feeds: 11,776 W. Specify the PDU rating before committing to any tenant power SLA.",text:"32 A single-phase rack PDU: 32 × 0.80 × 230 = 5,888 W continuous. Dual A+B: total per-rack capacity = 2 × 5,888 = 11,776 W. But under N-1, each PDU must carry 100%: maximum rack load = 5,888 W (not 11,776 W). For >6 kW racks: 3-phase PDU required."},sarah:{hook:"Rack-level energy data feeds the EED Article 12 PUE IT load measurement. Without it, the IT boundary is a spreadsheet estimate, not a metered value.",text:"Rack-level energy monitoring data feeds EED Article 12 reporting and PUE measurement. Per-rack granularity enables accurate IT load measurement — the denominator in PUE calculation."},tom:{hook:"Basic rack PDU at 200 to 500 euros. Intelligent per-outlet monitored: 1,500 to 3,000 euros. Specify which category per rack type before the fit-out contract is let.",text:"Basic rack PDU: €200–€500 each; Metered: €500–€1,200; Intelligent (per-outlet monitoring + switching): €1,200–€3,000 (Tier 3 — APC/Raritan/Vertiv published ranges, indicative). For 2,000 racks × 2 PDUs: €800k–€12M depending on monitoring level. Metered is the minimum for any professional DC."}},
  rhetoricTakeaways:{declan:"Schedule a rack-by-rack PSU-to-PDU cabling audit. 30 seconds per server. One day prevents the 3 AM outage the upstream infrastructure was built to avoid.",ann:"A 3–10% cabling error rate means 3–10% of racks have zero redundancy despite Tier IV upstream. The audit is a due diligence item.",mark:"Verify every server has PSU-1 on PDU-A and PSU-2 on PDU-B. Both PSUs on the same PDU is zero redundancy.",sarah:"Cabling audit results feed into facility availability reporting — a key metric for operational ESG disclosure.",tom:"The audit costs one technician-day per hall. The prevented outage cost is measured in millions."},
  scenario:{title:"The Cabling Audit",narrative:"A colocation DC experiences a PDU failure on rack row 7. Instead of the expected zero impact (A+B redundancy), 6 of 20 servers in the row lose power.",question:"Investigate and explain why 6 servers lost power despite dual PDU configuration.",answer:"Root cause: 6 servers had both PSU cables connected to the failed PDU (A-feed only).\n\nDespite the rack having A and B PDUs, the servers were cabled incorrectly:\n- PSU-1 → PDU-A (correct)\n- PSU-2 → PDU-A (INCORRECT — should be PDU-B)\n\nThis is a cabling installation error, not a design fault.\n\nActions:\n1. Immediate: re-cable the 6 affected servers to correct A+B configuration\n2. Audit: trace every PSU cable in every rack — confirm A on A, B on B\n3. Process: implement colour-coded power cables (red=A, blue=B)\n4. Commissioning: add PSU-to-PDU trace verification to rack handover checklist\n5. Monitoring: intelligent PDUs can detect which outlets are loaded on each PDU —\n   a significant load imbalance between A and B PDUs indicates cabling error\n",
whoShouldCare:["declan","mark"]},
  sourceNote:"Rack PDU — IS 10101 (T1); IEC 60309 (T1). A+B redundancy — EN 50600-2-2 (T1). Cabling audit — Uptime Institute best practice (T2).",
  clockQuote:"Two power supplies in every server. One on A, one on B. Either keeps it alive.",
  crossRefs:[{module:"DC-LEARN-001",level:"L7",topic:"Busway A/B → rack PDU A/B"},{module:"DC-LEARN-004",level:"L5",topic:"Cabling audit → availability class"}],
  retrofitRelevance:"Cabling audit is a zero-capex improvement that should be performed on every acquired DC. The discovery rate of A/B misconnection is typically 3–10% of racks."
},
{
  id:"L9",level:9,name:"Server PSU",icon:"💻",
  component:"Server PSU",available:true,
  userNeedStatement:"Understand the final power conversion stage and why PSU efficiency compounds across thousands of servers",
  cascadeCheck:()=>({needed:"-",available:"-",unit:"",pass:true,detail:"Server PSU is the load — efficiency affects cooling chain, not distribution capacity"}),
  learningObjective:"Understand PSU efficiency ratings (80 PLUS), dual-PSU redundancy, high-voltage DC alternatives, and how PSU efficiency affects PUE.",plainEnglish:"The server PSU converts the 230 V AC from the rack PDU to the 12 V DC that the CPU and memory actually use. At 80 PLUS Titanium efficiency (96% at 50% load), almost all the power reaches the components. But at 80 PLUS Bronze (82% at 50%), nearly 1 in 5 watts is wasted as heat — heat that the cooling system then has to remove.",
  grammar:{facts:[{term:"80 PLUS Certification",definition:"Energy efficiency certification for PSUs. Rated at 20%, 50%, and 100% load. Higher tiers = higher efficiency across all load points.",plain:"A rating system for how efficiently the PSU converts AC to DC. Titanium is best (96%+). Bronze is basic (82%+). The wasted energy becomes heat.",number:"80 PLUS Bronze: 82% at 50% load. Silver: 85%. Gold: 88%. Platinum: 92%. Titanium: 96% at 50% load.",standard:"80 PLUS programme (CLEAResult); ENERGY STAR for data centres",feynman:{analogy:"Think of it like the energy rating label on your fridge. An A-rated fridge wastes less electricity as heat than a C-rated one. 80 PLUS Titanium PSUs convert over 96% of input power to useful DC for the server — wasting less than 4% as heat. Standard PSUs waste 15–20%.",firstPrinciples:"The server PSU converts AC from the rack PDU to DC for the server\'s internal components (typically 12 V and 3.3 V). Every conversion has losses — manifested as waste heat. The 80 PLUS programme certifies PSU efficiency at 20%, 50%, and 100% load. Ratings: 80 PLUS (80%), Bronze (82%), Silver (85%), Gold (87%), Platinum (90%), Titanium (94–96%). At DC scale, even 2% efficiency improvement across thousands of PSUs saves megawatts.",theTest:"You know you understand this when you can answer: A DC has 10,000 servers, each drawing 500 W. Upgrading PSUs from Gold (87% efficient) to Titanium (96%) — how much power is saved? Answer: At Gold: 10,000 × 500 ÷ 0.87 = 5,747 kW input. At Titanium: 10,000 × 500 ÷ 0.96 = 5,208 kW input. Savings: 539 kW — which also reduces cooling load by 539 kW. Total impact: ~1 MW reduction."}},{term:"Dual PSU (1+1 Redundancy)",definition:"Each server has two PSUs. Both active, sharing load equally. If one fails, the other carries 100%. Requires A-feed and B-feed connection to separate rack PDUs.",plain:"Two power supplies in every server. If one dies, the other takes over instantly. But only if they are on different power paths.",number:"Normal: each PSU at 50% load. N-1: surviving PSU at 100%. PSU efficiency at 50% load is typically 2–4% higher than at 100% — dual PSU at 50% each is the efficiency sweet spot.",standard:"Server manufacturer specification; EN 50600-2-2",feynman:{analogy:"Think of it like a car with two fuel tanks, each connected to the engine. If one tank springs a leak, the engine keeps running on the other. Each server PSU connects to a different rack PDU (A and B) — so losing one entire power path doesn\'t shut down any server.",firstPrinciples:"Mission-critical servers have two PSU bays. Each PSU connects to a different rack PDU — one on the A path, one on the B path. Under normal operation, both PSUs share the load equally. If one PSU or its upstream path fails, the other PSU carries 100% of the server\'s load. This is 1+1 redundancy at the server level — the last link in the power chain\'s redundancy story.",theTest:"You know you understand dual PSUs when you can answer: A server has two 750 W PSUs, each on a different path. Normal load is 400 W. If the A-side fails, the B-side PSU must deliver 400 W alone. Is 750 W enough? Answer: Yes — 400 W is 53% of one PSU\'s capacity. But check: the upstream rack PDU and its breaker must also handle the additional 200 W that was previously on the A-side PDU."}},{term:"High-Voltage DC (HVDC)",definition:"Alternative power distribution using 380 V DC instead of 230 V AC. Eliminates AC-DC-AC-DC conversion losses in the UPS-PSU chain. Emerging standard for hyperscale.",plain:"Instead of converting AC→DC→AC→DC through the chain, deliver DC directly. Fewer conversions = fewer losses = better efficiency.",number:"380 V DC efficiency: 96–98% end-to-end (vs 90–94% for AC double conversion). Adoption: limited to hyperscale and greenfield builds.",standard:"ETSI EN 300 132-3-1 (380 V DC); IEC SRD 63311",feynman:{analogy:"Think of it like cutting out the middleman in a supply chain. Instead of converting AC→DC→AC→DC (which happens twice in the traditional chain), HVDC distribution sends DC power straight to the server PSU — eliminating two conversion steps and the losses that come with them.",firstPrinciples:"Traditional path: AC mains → UPS rectifier (AC→DC) → UPS inverter (DC→AC) → server PSU (AC→DC). Each conversion loses 2–5%. HVDC eliminates the UPS inverter and the server PSU\'s AC→DC rectifier stage by distributing 380 V DC directly. The server uses a simpler DC-DC converter. Total efficiency gain: 2–5% compared to traditional AC distribution. Adopted by major hyperscalers, but still niche in colocation.",theTest:"You know you understand HVDC when you can answer: If HVDC is 2–5% more efficient, why hasn\'t everyone switched? Answer: Legacy servers have AC PSUs — they can\'t accept DC input without replacement. Electricians and maintenance staff are trained on AC, not DC. DC fault protection behaves differently (no zero-crossing to extinguish arcs). The operational and safety retraining cost is significant. HVDC works for hyperscalers who control the entire stack — not for colos with mixed tenant equipment."}},{term:"Server PSU Load Sharing",definition:"In a dual-PSU server, both PSUs share load equally. Each must be rated to carry the full server load alone for redundancy.",plain:"Two PSUs split work 50/50. If one fails, the other takes over instantly. No interruption, no data loss.",number:"Normal: each PSU at 50% (near peak efficiency). Single failure: survivor jumps to 100%. Each PSU must be rated for server maximum draw including CPU turbo.",standard:"Intel/AMD server design guides; EN 50600-2-2",feynman:{analogy:"Like two engines on a twin-engine aircraft. Both run at 50% thrust in cruise. If one fails, the other goes to 100%. But if each engine was only powerful enough for 50%, losing one means the plane cannot fly.",firstPrinciples:"Dual PSUs provide 1+1 redundancy. Under normal operation both share load 50/50, optimal for efficiency (peak at 40-60% load). When one fails, the other takes fu
