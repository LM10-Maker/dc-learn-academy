.hero::before{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(13,17,23,0.97) 0%,rgba(13,17,23,0.92) 25%,rgba(13,17,23,0.75) 50%,rgba(13,17,23,0.45) 75%,rgba(13,17,23,0.25) 100%);pointer-events:none}
.hero .container{position:relative;z-index:1}
.hero-inner{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.hero-logo{width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(74,124,89,0.4)}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero-badge{display:inline-block;font-family:var(--font-mono);font-size:11px;color:var(--lbe-green);
  border:1px solid rgba(74,124,89,0.3);border-radius:4px;padding:3px 10px;letter-spacing:0.5px}
.hero-credit{font-size:11px;color:rgba(255,255,255,0.35);font-family:var(--font-mono);margin-top:4px}
.hero h1{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);font-weight:400;line-height:1.2;margin-bottom:10px;max-width:480px}
.hero h1 em{font-style:italic;color:rgba(255,255,255,0.65)}
.hero-sub{font-size:16px;color:rgba(255,255,255,0.6);max-width:480px;line-height:1.6}
.hero-regs{margin-top:16px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.4);line-height:1.8;max-width:480px}
.hero-stats{display:flex;gap:28px;margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
.stat-num{font-family:var(--font-display);font-size:30px;color:#fff;display:block}
.stat-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* SECTIONS */
section{padding:56px 0}
section+section{border-top:1px solid var(--border)}
.section-label{font-family:var(--font-mono);font-size:11px;color:var(--lbe-green);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.section-title{font-family:var(--font-display);font-size:26px;color:var(--dc-black);margin-bottom:14px;line-height:1.3}
.section-intro{font-size:15px;color:var(--text-dim);max-width:620px;margin-bottom:28px}

/* VIDEO */
.video-section{background:#0d1117;color:#fff;padding:56px 0}
.video-section .section-label{color:var(--lbe-green)}
.video-section .section-title{color:#fff}
.video-section .section-intro{color:rgba(255,255,255,0.6)}
.video-wrap{width:100%;aspect-ratio:16/9;background:#0d1117;border-radius:10px;display:flex;
  align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);transition:transform 0.3s}
.video-wrap:hover{transform:scale(1.005)}
.video-wrap:hover .play-btn{transform:scale(1.1)}
.play-btn{width:72px;height:72px;border-radius:50%;background:rgba(74,124,89,0.9);display:flex;
  align-items:center;justify-content:center;transition:transform 0.25s;z-index:1;
  box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.play-icon{width:0;height:0;border-style:solid;border-width:14px 0 14px 24px;border-color:transparent transparent transparent #fff;margin-left:4px}
.video-caption{font-size:13px;color:rgba(255,255,255,0.5);margin-top:14px;text-align:center}

/* BOOK */
.book-section{background:var(--surface-alt);padding:56px 0}
.book-grid{display:grid;grid-template-columns:280px 1fr;gap:40px;align-items:center}
.book-cover{border-radius:8px;overflow:hidden;position:relative;

.book-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(13,17,23,0.95) 0%,rgba(13,17,23,0.6) 50%,rgba(13,17,23,0.3) 100%)}
.book-cover-content{position:absolute;bottom:0;left:0;right:0;padding:24px;z-index:1}
.book-cover-badge{font-family:var(--font-mono);font-size:9px;color:var(--lbe-green);text-transform:uppercase;
  letter-spacing:1.5px;border:1px solid rgba(74,124,89,0.3);border-radius:3px;padding:2px 8px;display:inline-block;margin-bottom:12px}
.book-cover-title{font-family:var(--font-display);font-size:24px;color:#fff;line-height:1.15;margin-bottom:4px}
.book-cover-subtitle{font-family:var(--font-display);font-style:italic;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px}
.book-cover-author{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.35)}
.book-cover-stats{display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08)}
.book-cover-stats span{font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.5px}
.book-info h3{font-family:var(--font-display);font-size:22px;margin-bottom:12px}
.book-info p{font-size:14px;color:var(--text-dim);line-height:1.8;margin-bottom:12px}
.book-info .free-note{font-family:var(--font-mono);font-size:12px;color:var(--free-green);background:var(--free-bg);
  display:inline-block;padding:4px 12px;border-radius:4px;border:1px solid rgba(22,163,74,0.15)}

/* NEW VISITOR */
.new-visitor{background:var(--free-bg);border:1px solid rgba(22,163,74,0.12);border-radius:8px;
  padding:16px 20px;margin-bottom:24px;font-size:13px;
  display:flex;align-items:center;gap:12px}
.new-visitor strong{color:var(--free-green)}
.new-visitor a{color:var(--lbe-green);text-decoration:none;font-weight:600}
.new-visitor a:hover{text-decoration:underline}

/* MODULE GRID */
.free-banner{background:var(--free-bg);border:1px solid rgba(22,163,74,0.12);border-radius:8px;
  padding:16px 20px;margin-bottom:24px;font-size:13px}
.free-banner strong{color:var(--free-green)}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.mod-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;
  transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;background:#fff;cursor:pointer;position:relative}
.mod-card:hover{border-color:var(--lbe-green);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.06)}
.mod-card-img{width:100%;height:140px;object-fit:cover;display:block}
.mod-card-body{padding:16px 18px 18px}
.mod-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mod-card-id{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.module-tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px}
.tag-free{background:var(--free-bg);color:var(--free-green);border:1px solid rgba(22,163,74,0.15)}
.tag-paid{background:var(--surface);color:var(--text-dim);border:1px solid var(--border)}
.mod-card-title{font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:6px;line-height:1.3}
.mod-card-desc{font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:12px}
.mod-card-topics{border-top:1px solid var(--border);padding-top:10px}
.topic-item{font-size:11px;color:var(--text-dim);padding:2px 0;line-height:1.4}
.mod-card-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.lock-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.03);display:flex;align-items:flex-start;justify-content:flex-end;padding:12px}
.lock-badge{background:rgba(0,0,0,0.55);border-radius:6px;padding:4px 8px;display:flex;align-items:center;gap:4px;
  font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.8);letter-spacing:0.5px}

/* PERSONAS */
.persona-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.persona-card{border-radius:8px;overflow:hidden;border:1px solid var(--border);
  transition:border-color 0.2s,transform 0.2s;background:#fff}
.persona-card:hover{border-color:var(--lbe-green);transform:translateY(-2px)}
.persona-img{width:100%;height:110px;object-fit:cover;object-position:center top;display:block}
.persona-body{padding:10px 12px 12px}
.persona-role{font-weight:700;font-size:13px;margin-bottom:1px}
.persona-title{font-size:10px;color:var(--lbe-green);font-family:var(--font-mono);margin-bottom:5px}
.persona-quote{font-size:11px;color:var(--text-dim);line-height:1.35;font-style:italic}

/* AUTHORITY */
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.auth-creds{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.auth-cred{font-size:12px;padding:4px 12px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;
  align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease-out}
.modal{background:#fff;border-radius:12px;max-width:480px;width:100%;padding:36px;position:relative;
  animation:fadeUp 0.3s ease-out}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:24px;
  color:var(--text-muted);cursor:pointer;padding:4px 8px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-title{font-family:var(--font-display);font-size:22px;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
.modal-btn{display:block;width:100%;padding:14px 20px;border-radius:8px;text-align:left;
  text-decoration:none;margin-bottom:12px;transition:border-color 0.2s,transform 0.15s}
.modal-btn:hover{transform:translateY(-1px);text-decoration:none}
.btn-founding{background:var(--gold-bg);border:2px solid rgba(184,134,11,0.2);color:var(--text)}
.btn-founding:hover{border-color:var(--gold)}
.btn-pro{background:var(--surface);border:2px solid var(--border);color:var(--text)}
.btn-pro:hover{border-color:var(--lbe-green)}
.btn-name{font-weight:700;font-size:15px;margin-bottom:2px}
.btn-price{font-family:var(--font-mono);font-size:13px;color:var(--text-dim)}
.btn-note{font-size:11px;color:var(--text-muted);margin-top:4px}
.modal-footer{font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px}

/* CTA */
.cta-section{background:var(--surface-alt);padding:56px 0;text-align:center;border-top:1px solid var(--border)}
.cta-btn{display:inline-block;background:var(--lbe-green);color:#fff;font-family:var(--font-body);
  font-size:15px;font-weight:600;padding:12px 36px;border-radius:6px;text-decoration:none;transition:background 0.2s}
.cta-btn:hover{background:var(--lbe-green-dark);text-decoration:none}
.cta-sub{font-size:12px;color:var(--text-muted);margin-top:10px}

/* FOOTER */
footer{padding:28px 0;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.footer-links{display:flex;gap:16px}
.footer-links a{color:var(--text-muted);font-size:11px}
.footer-links a:hover{color:var(--text)}

@media(max-width:768px){
  .hero{padding:48px 0 40px}.hero h1{font-size:26px}.hero-stats{flex-wrap:wrap;gap:16px}
  .persona-grid{grid-template-columns:repeat(2,1fr)}
  .persona-grid>:last-child{grid-column:span 2;max-width:50%;margin:0 auto}
  .mod-grid{grid-template-columns:1fr}
  .book-grid{grid-template-columns:1fr}
  .auth-grid{grid-template-columns:1fr}
  section{padding:36px 0}
}
@media(max-width:480px){
  .persona-grid{grid-template-columns:1fr}
  .persona-grid>:last-child{grid-column:auto;max-width:100%}
  .book-grid{grid-template-columns:1fr;text-align:center}
  .book-cover{max-width:160px;margin:0 auto}
}

/* PRICING */
.pricing-card{background:var(--dc-black);color:#fff;border-radius:12px;padding:36px}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-top:20px}
.price-tier{border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:20px;transition:border-color 0.2s}
.price-tier:hover{border-color:var(--lbe-green)}
.price-tier.featured{border-color:var(--lbe-green);background:rgba(74,124,89,0.08)}
.price-name{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.price-amount{font-family:var(--font-display);font-size:28px;font-weight:400;margin-bottom:4px}
.price-note{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:10px}
.price-feat{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.5}
.founding-badge{display:inline-block;background:var(--lbe-green);color:#fff;font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;margin-bottom:6px;letter-spacing:0.5px}
.price-btn{display:inline-block;margin-top:12px;padding:8px 20px;border-radius:4px;font-family:var(--font-mono);font-size:11px;text-decoration:none;letter-spacing:0.5px;transition:all 0.2s}
.price-btn-primary{background:var(--lbe-green);color:#fff}
.price-btn-primary:hover{background:var(--lbe-green-dark)}
.price-btn-outline{border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7)}
.price-btn-outline:hover{border-color:var(--lbe-green);color:var(--lbe-green)}
.guarantee{display:flex;align-items:flex-start;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08)}
.guarantee-text{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6}
.guarantee-text strong{color:rgba(255,255,255,0.85)}
@media(max-width:768px){.pricing-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.pricing-grid{grid-template-columns:1fr}}
</style>

  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: threshold || 0.1 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

    <div className="modal-overlay" onClick={onClose} role="dialog" aria-modal="true">
