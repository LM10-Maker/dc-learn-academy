<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LBE Certificate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
.bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.btn{padding:10px 28px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;font-family:system-ui;transition:all .15s;border:none;}
.btn-primary{background:#4a7c59;color:#fff;}
.btn-primary:hover{background:#3a6349;}
.btn-secondary{background:transparent;color:#888;border:1px solid #444;}
.btn-secondary:hover{border-color:#78a840;color:#78a840;}
.invalid{color:#e24b4a;text-align:center;padding:60px 20px;font-size:14px;}

/* CERT */
.cert{background:#fff;max-width:1050px;width:100%;border-radius:2px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;}
.fo{position:absolute;inset:10px;border:2px solid #1a1a1a;pointer-events:none;z-index:5;}
.fi{position:absolute;inset:15px;border:.5px solid rgba(26,26,26,.18);pointer-events:none;z-index:5;}
.co{position:absolute;width:28px;height:28px;z-index:6;pointer-events:none;}
.co::before,.co::after{content:'';position:absolute;background:#1a1a1a;}
.co::before{width:28px;height:2.5px;top:0;left:0;}
.co::after{width:2.5px;height:28px;top:0;left:0;}
.tl{top:10px;left:10px;}
.tr{top:10px;right:10px;transform:scaleX(-1);}
.bl{bottom:10px;left:10px;transform:scaleY(-1);}
.br{bottom:10px;right:10px;transform:scale(-1,-1);}
.ct{padding:26px 60px 22px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.lr{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;}
.lc{width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.18);background:#fff;flex-shrink:0;}
.lc img{width:100%;height:100%;object-fit:cover;}
.bn{font-size:9px;letter-spacing:3px;color:#9dd66b;font-weight:700;text-transform:uppercase;margin-bottom:3px;text-align:left;}
.bsb{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.28);text-transform:uppercase;text-align:left;}
.ctitle{font-family:"Playfair Display",Georgia,serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:.3px;margin-bottom:5px;}
.dr{display:inline-flex;align-items:center;gap:10px;margin-bottom:3px;}
.dl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;}
.ds{color:#78a840;font-size:12px;letter-spacing:4px;}
.hrule{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22) 20%,rgba(255,255,255,.22) 80%,transparent);margin:14px 0 0;}
.cb{padding:30px 72px 20px;text-align:center;position:relative;}
.wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:270px;height:270px;opacity:.06;pointer-events:none;z-index:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.cb>*:not(.wm){position:relative;z-index:1;}
.pres{font-size:9px;letter-spacing:3px;color:#bbb;text-transform:uppercase;margin-bottom:10px;}
.recip{font-family:"Playfair Display",Georgia,serif;font-size:36px;font-weight:700;color:#111;display:inline-block;padding-bottom:10px;margin-bottom:20px;border-bottom:2.5px solid #1a1a1a;letter-spacing:.5px;}
.awd{font-size:11px;color:#888;line-height:1.8;margin-bottom:7px;}
.mname{font-family:"Playfair Display",Georgia,serif;font-size:18px;font-weight:700;color:#111;margin-bottom:5px;}
.msub{font-size:8.5px;color:#bbb;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.aline{font-size:11px;color:#444;letter-spacing:.4px;border-top:1px solid #e5e5e5;border-bottom:1px solid #e5e5e5;padding:12px 0;margin-bottom:16px;line-height:1.8;}
.sbadge{display:inline-block;font-size:10px;border:1px solid;border-radius:20px;padding:5px 20px;margin-bottom:20px;letter-spacing:.3px;}
.srow{display:flex;align-items:flex-end;justify-content:space-between;padding:0 8px;margin-top:8px;}
.sig{text-align:center;min-width:160px;}
.simg{height:60px;display:block;margin:0 auto;}
.sline{height:1px;background:#1a1a1a;margin:8px auto 6px;width:160px;}
.sname{font-size:10px;font-weight:600;color:#222;letter-spacing:.2px;}
.srole{font-size:8px;color:#bbb;margin-top:2px;}
.nb{text-align:center;padding-bottom:4px;}
.nl{font-size:7px;color:#ccc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.nv{font-family:monospace;font-size:10px;color:#777;background:#f5f5f5;padding:5px 14px;border-radius:4px;letter-spacing:1.5px;border:1px solid #ebebeb;}
.nd{font-size:9px;color:#bbb;margin-bottom:5px;letter-spacing:.3px;}
.cf{background:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:12px 72px;display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
.ft{font-size:8px;color:rgba(255,255,255,.32);letter-spacing:.3px;}
.fu{font-family:monospace;font-size:8px;color:#78a840;letter-spacing:.5px;}

/* PRINT */
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#fff!important;padding:0!important;align-items:stretch!important;}
  .bar{display:none!important;}
  .cert{box-shadow:none!important;border-radius:0!important;max-width:100%!important;
    width:100vw!important;height:100vh!important;
    display:flex!important;flex-direction:column!important;}
  .cb{flex:1!important;display:flex!important;flex-direction:column!important;justify-content:center!important;}
  @page{margin:0;size:A4 landscape;}
}
</style>
</head>
<body>

<div class="bar">
  <button class="btn btn-primary" onclick="window.print()">&#x2399;&nbsp; Save as PDF / Print</button>
  <button class="btn btn-secondary" id="copy-btn" onclick="copyNum()">&#x29C9;&nbsp; Copy certificate number</button>
  <a class="btn btn-secondary" href="javascript:history.back()">&#x2190;&nbsp; Back to module</a>
</div>

<div id="cert-area"></div>

function p(key) {
  var params = new URLSearchParams(window.location.search);
  return params.get(key) || '';
}

function copyNum() {
  var num = p('num');
  if (num) {
    navigator.clipboard.writeText(num).then(function() {
      var btn = document.getElementById('copy-btn');
      btn.innerHTML = '&#x2713;&nbsp; Copied!';
      setTimeout(function(){ btn.innerHTML = '&#x29C9;&nbsp; Copy certificate number'; }, 2000);
    });
  }
}

function render() {
  var name   = p('name');
  var num    = p('num');
  var type   = p('type');   // Engagement | Completion | Achievement
  var hours  = p('hours');
  var score  = p('score');
  var mod    = p('mod');
  var issued = p('issued') || new Date().toLocaleDateString('en-IE',{day:'numeric',month:'long',year:'numeric'});

  if (!name || !num || !type) {
    document.getElementById('cert-area').innerHTML = '<div class="invalid">Invalid certificate link. Please return to the module and issue the certificate again.</div>';
    return;
  }

  var isAch = type === 'Achievement';
  var isEng = type === 'Engagement';
  var hdrBg = isAch ? 'linear-gradient(150deg,#142814 0%,#1c1c1c 100%)' : '#1a1a1a';
  var valCol = isAch ? '#2d5a1b' : '#4a7c59';

  var certTitle = isEng ? 'Engagement Certificate'
    : isAch ? 'Achievement Certificate'
    : 'Certificate of Completion';

  var distHTML = isAch
    ? '<div class="dr"><span class="dl">Distinction</span><span class="ds">✦ ✦ ✦</span><span class="dl">DC Learning Series</span></div>'
    : '';

  var awdText = isEng
    ? 'for completing all 27 Trivium stages across all 9 chain levels of'
    : isAch
    ? 'for achieving distinction in the three-tier assessment of'
    : 'for successfully completing the three-tier assessment of';

  var aLine = isEng
    ? '27 Trivium stages completed · ' + hours + ' CPD hours · Irish Data Centre Sector · MEP Retrofit Engineering'
    : '27 questions · Grammar, Logic & Rhetoric · ' + hours + ' CPD hours · Irish Data Centre Sector';

  var scoreHTML = (!isEng && score)
    ? '<div class="sbadge" style="color:' + valCol + ';border-color:' + valCol + '44">Assessment score: ' + score + '% · ' + (isAch ? 'Distinction' : 'Pass') + '</div>'
    : '';

  document.getElementById('cert-area').innerHTML =
    '<div class="cert">'
    +'<div class="fo"><div class="fi"></div></div>'
    +'<div class="co tl"></div><div class="co tr"></div><div class="co bl"></div><div class="co br"></div>'
    +'<div class="ct" style="background:' + hdrBg + ';-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact">'
    +'<div class="lr"><div class="lc"><img src="' + LOGO + '" alt="LBE"/></div>'
    +'<div><div class="bn">Legacy Business Engineers Ltd</div><div class="bsb">Dublin · Ireland · legacybe.ie</div></div></div>'
    +'<div class="ctitle">' + certTitle + '</div>'
    + distHTML
    +'<div class="hrule"></div></div>'
    +'<div class="cb">'
    +'<img class="wm" src="' + LOGO + '" alt=""/>'
    +'<div class="pres">This certificate is awarded to</div>'
    +'<div class="recip">' + decodeURIComponent(name) + '</div>'
    +'<div class="awd">' + awdText + '</div>'
    +'<div class="mname">' + decodeURIComponent(mod || 'DC Learning Module') + '</div>'
    +'<div class="msub">DC Learning Series · Legacy Business Engineers Ltd</div>'
    +'<div class="aline">' + aLine + '</div>'
    + scoreHTML
    +'<div class="srow">'
    +'<div class="sig"><img class="simg" src="' + SIG + '" alt=""/><div class="sline"></div><div class="sname">Les Murphy CEng MBA</div><div class="srole">Legacy Business Engineers Ltd</div></div>'
    +'<div class="nb"><div class="nl">Certificate number</div><div class="nv">' + num + '</div></div>'
    +'<div class="sig"><div style="height:60px"></div><div class="nd">' + issued + '</div><div class="sline"></div><div class="sname">DC Learning Series</div><div class="srole">Legacy Business Engineers Ltd</div></div>'
    +'</div></div>'
    +'<div class="cf" style="-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact"><div class="ft">Verify at</div><div class="fu">learn.legacybe.ie/verify</div><div class="ft">Issued ' + issued + '</div></div>'
    +'</div>';

  document.title = certTitle + ' · ' + decodeURIComponent(name) + ' · LBE';
}

render();
</script>
