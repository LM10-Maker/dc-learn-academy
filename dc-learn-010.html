  /* ═══ L9: Net Zero Roadmap — Clonshaugh 10-Year ═══ */
  {
    id:"L9", level:9, name:"Net Zero Roadmap — Clonshaugh 10-Year", icon:"🗺️",
    component:"Strategy", available:true,
    clockQuote:"The clock that had been ticking for one building was now ticking for two. Clonshaugh was four hundred racks. Tallaght was twelve hundred. The methodology was the same. The stakes were four times higher. And the deadlines were identical.",
    userNeedStatement:"When I need to plan the full decarbonisation journey for a legacy DC, help me see the integrated roadmap — from carbon baseline to net zero — with phased investment, dependencies, and measurable milestones.",
    plainEnglish:"This level brings the entire module together into a 10-year roadmap for Clonshaugh: from a 7,151 tonne CO₂e baseline to a sub-1,000 tonne net zero aligned facility — through efficiency, renewables, heat recovery, and circularity.",
    grammar:{
      facts:[
        {term:"Phase A — Measure & Optimise (Years 1–2)",definition:"Establish monitoring infrastructure (DC-LEARN-009), achieve PUE 1.20, complete carbon baseline, begin Scope 3 data collection.",plain:"First, get the data right and the efficiency right. The monitoring programme from DC-LEARN-009 is the foundation. PUE improvement delivers the fastest and cheapest carbon reduction.",number:"Investment: approximately €432,500 (DC-LEARN-009 monitoring programme, T3 — RICS NRM1/SCSI benchmarks, indicative). Carbon reduction: 1,413 tonnes CO₂/year (PUE 1.50 → 1.20). Post-Phase A footprint: approximately 5,717 tonnes CO₂e/year (Scope 1+2).",standard:"EN 50600-2-6; EN 50600-4-2; AIMEP DC Standards Reference v1.2",
          feynman:{analogy:"Think of it like weighing yourself before starting a diet. You can\'t claim progress if you don\'t know your starting point. Phase A installs the scales (monitoring) and starts the exercise (PUE improvement) — before buying any supplements (PPAs) or surgery (infrastructure).",firstPrinciples:"You cannot manage what you cannot measure. Phase A installs monitoring infrastructure (DC-LEARN-009), establishes a carbon baseline, and improves PUE from 1.50 to 1.20. This costs approximately €432,500 (T3 — DC-LEARN-009 cross-ref; RICS NRM1/SCSI benchmarks, indicative) and saves 1,413 tonnes CO₂/year. The monitoring data then becomes the evidence that justifies every Phase B investment.",theTest:"You know you understand Phase A when you can answer: Why not skip straight to buying a renewable PPA? Answer: Without PUE improvement first, you\'re buying renewable certificates for energy you didn\'t need to consume. And without monitoring data, you can\'t correctly size the PPA — you\'d be guessing the volume."}},
        {term:"Phase B — Decarbonise (Years 2–5)",definition:"Procure renewable PPA (80%), switch generators to HVO, complete waste heat feasibility, implement circular economy policy, achieve SBTi near-term target.",plain:"Second, change the energy source and reduce direct emissions. The CPPA is the big Scope 2 lever. HVO addresses the generator Scope 1. Together with PUE, they deliver the 42% SBTi target.",number:"Investment: CPPA premium approximately €200,000/year + HVO premium approximately €5,000/year + on-site PV approximately €600,000 (Tier 3 — SEAI REFIT benchmarks; BSRIA published, indicative) + waste heat study €25,000 (Tier 3 — RICS NRM1 fee benchmarks, indicative). Carbon reduction: approximately 2,885 tonnes CO₂/year additional. Post-Phase B footprint: approximately 2,832 tonnes CO₂e/year.",standard:"RE100; SBTi V5.3; EED 2023/1791; GHG Protocol",
          feynman:{analogy:"Think of it like switching your home from oil heating to a heat pump and solar panels — you\'ve already insulated the house (Phase A efficiency), now you\'re changing the energy source. It costs more upfront, but the monthly bills drop and the house is future-proofed.",firstPrinciples:"Phase B changes the energy source: an 80% CPPA replaces grid electricity with renewable, HVO replaces diesel in generators. On-site PV adds a small but visible renewable contribution. Together with Phase A efficiency gains, this achieves approximately 60% carbon reduction — exceeding the SBTi 42% near-term target. Total Phase B investment: approximately €625,000 capex (T3 — aggregate: PV Tier 3 SEAI/BSRIA + waste heat study Tier 3 RICS NRM1) plus €205,000/year operating premiums (T3 — CPPA: RE-Source Platform; HVO: SEAI guidance, indicative).",theTest:"You know you understand Phase B when you can answer: Which delivers more carbon reduction — the CPPA or the on-site PV? Answer: The CPPA by far. It covers 80% of consumption (approximately 2,825 tCO₂/year saved), while PV covers only 2.4% (approximately 170 tCO₂/year saved). PV is valuable for visibility and additionality, but the CPPA is the heavy lifter."}},
        {term:"Phase C — Net Zero Path (Years 5–10)",definition:"Increase CPPA to 100%, implement waste heat recovery (if viable), achieve Scope 3 reduction through lifecycle extension, prepare for net-zero verification.",plain:"Third, close the remaining gaps. Move to 100% renewable, capture waste heat revenue, extend equipment lifecycles, and prepare for SBTi net-zero validation.",number:"Additional CPPA premium for 100% coverage: approximately €75,000/year. Waste heat infrastructure (if viable): approximately €400,000–600,000 (Tier 3 — EED 2023/1791 Art. 26; European district heating benchmarks; Codema Dublin, indicative) with payback 4–6 years. Scope 3 reduction: approximately 1,067 t CO₂e/year. Post-Phase C target: approximately 900–1,200 tonnes CO₂e/year.",standard:"SBTi Corporate Net-Zero Standard; EU Taxonomy; CRREM v2.01",
          feynman:{analogy:"Think of it like the final 10% of a home renovation — the snagging list. The big structural work is done (Phases A and B), but closing out the last gaps (waste heat, circular economy, 100% renewable) takes patience and persistence over several years.",firstPrinciples:"Phase C extends the CPPA to 100% coverage, implements waste heat recovery (if the feasibility study from Phase B proves viable), and reduces Scope 3 through equipment lifecycle extension. The target is approximately 900–1,200 tonnes CO₂e/year — down from 7,151. The remaining emissions are residual Scope 1 (refrigerant leakage) and Scope 3 (embodied carbon that can\'t be eliminated entirely).",theTest:"You know you understand Phase C when you can answer: Can Clonshaugh reach absolute zero emissions? Answer: No — some residual emissions remain (refrigerant leakage, embodied carbon). SBTi net-zero allows up to 10% residual, which must be neutralised through permanent carbon removal, not offsets."}}
      ,
        {
          term:"EED Reporting Integration into Roadmap",
          definition:"The annual EED Article 12 reporting obligation provides a natural checkpoint for monitoring progress against the net zero roadmap — PUE, WUE, REF, and ERF must be reported each May.",
          plain:"The EED reporting deadline (15 May annually) is not just a compliance burden — it is the annual measurement event that tracks progress against every phase of the net zero roadmap. If your metering and DCIM are in place (Phase A), the report writes itself from operational data.",
          number:"Clonshaugh annual report: PUE (from DCIM — DC-LEARN-009), WUE (from MID meter — L7), REF (from CPPA/GO records — L2), ERF (from waste heat delivery records — L6). Phase A establishes the data infrastructure. Phase B actions show up as improving KPIs year-on-year. Phase C deliverables appear as ERF > 0 and REF approaching 0.80.",
          standard:"EED 2023/1791 Article 12; Delegated Regulation 2024/1364",
          feynman:{analogy:"EED reporting is like a school report card issued every May. Phase A installs the exam system (metering). Phase B is the studying (efficiency improvements). The report card shows whether the studying is working.",firstPrinciples:"A roadmap without measurement is just a wish list. The EED reporting obligation forces annual measurement of the four key sustainability metrics — PUE, WUE, REF, ERF — which exactly map to the four domains of the net zero roadmap (efficiency, water, renewables, waste heat). Integrating roadmap milestones with EED reporting dates creates accountability.",theTest:"Clonshaugh completes Phase A (monitoring) by Year 2 and starts Phase B (decarbonisation). The Year 3 EED report should show what changes vs Year 2? Answer: PUE improving (cooling optimisation underway), REF rising (CPPA procurement starting), WUE stable or falling (hybrid cooling operational), ERF still 0 (waste heat connection not yet built)."}

        {
          term:"Investment-Grade Verification",
          definition:"The standard of evidence required for a net zero programme to secure project finance, green bonds, or Taxonomy-aligned lending — typically requiring third-party measurement verification, auditable data trails, and standards-referenced methodologies.",
          plain:"Saying 'we will reduce carbon by 60%' is not enough for investors. Investment-grade verification means: independently measured baseline, traceable calculations, standards-referenced methodology, and third-party audit of reported data. This is the difference between a marketing claim and a bankable business case.",
          number:"Typical verification cost: €15,000–30,000 for third-party PUE/WUE audit (Tier 3 — RICS NRM1; EN 50600-4-2 audit scope, indicative). Carbon baseline verification to ISO 14064-3: €10,000–20,000 (Tier 2 — SBTi/ISO 14064-3 published guidance, indicative). SBTi target validation fee: €9,500 (Tier 2 — SBTi published fee schedule). Total investment-grade verification: €35,000–80,000 (Tier 3 — indicative aggregate, screening level) — less than 2% of the Clonshaugh programme capex (€1.56M). ROI: enables green lending at 20–50 basis points below standard rates, saving €100,000–250,000 over a 10-year facility loan (Tier 3 — ICMA Green Bond Principles; LSEG Green Lending benchmarks 2024, indicative).",
          standard:"ISO 14064-3:2019 (verification); EN 50600-4-2:2016 (PUE measurement); EU Green Bond Standard (proposed); ICMA Green Bond Principles 2021",
          feynman:{analogy:"Investment-grade verification is like a building surveyor's report before a property purchase. The buyer does not trust the seller's description of the property — they pay an independent surveyor to inspect and report. Investors apply the same logic to carbon claims.",firstPrinciples:"Financial markets require assurance that reported data is accurate and methodology is sound. Third-party verification provides this assurance by: (1) confirming measurement equipment is calibrated, (2) checking calculation methodology against standards, (3) sampling data for accuracy, and (4) issuing an assurance statement. Without this, carbon reduction claims are unverifiable and therefore unbankable.",theTest:"Clonshaugh's CFO wants to issue a green bond to fund Phase B decarbonisation. The bond prospectus claims 60% carbon reduction. What documentation does the underwriter require? Answer: ISO 14064-verified carbon baseline, PUE measurement per EN 50600-4-2, SBTi-validated target, auditable DCIM data trail, and a third-party assurance statement confirming methodology and data integrity."}

        {cause:"Carbon tax escalates from €71/tCO₂ (2025) to €100/tCO₂ by 2030 (Finance Act trajectory)",effect:"Scope 1 generator emissions (88 t/year at Clonshaugh) cost €6,248/year at €71 rising to €8,800/year at €100. More significantly, if Scope 2 electricity carbon tax pass-through increases, the total facility exposure at 7,063 tonnes could reach €706,000/year at €100/tCO₂ (Tier 1 — Finance Act; illustrative at full ETS pass-through — actual ETS rate Tier 3 — BNEF, indicative).",insight:"The escalating carbon tax creates a financial tailwind for the net zero programme. Every tonne of CO₂ avoided in Phase A becomes more valuable each year as the tax rate rises. This strengthens the business case retrospectively — early movers capture the largest cumulative benefit."}

      constraintLesson:"The constraint in a 10-year net zero programme is organisational persistence. Engineering programmes are designed, built, and commissioned in months. Decarbonisation programmes run for a decade.\n\nThe mitigation is measurement. Annual carbon reporting against SBTi targets creates external accountability. CRREM trajectory reporting creates investor accountability. EED Article 12 reporting creates regulatory accountability. These three reporting frameworks together ensure that progress is visible, verifiable, and irreversible — even if the champion who started the programme moves on.",

    scenario:{
      title:"The 10-Year Net Zero Business Case",
      narrative:"The board has requested a one-page summary of the Clonshaugh net zero programme: investment, return, milestones, and risks.",
      question:"Prepare the one-page summary with reconciled cost and benefit figures.",
      answer:"[All cost figures in this roadmap are screening-level estimates. Sources: DC-LEARN-009 (T3) for monitoring capex; RE-Source Platform (T3) for CPPA premiums; SEAI/BSRIA (T3) for PV capex; Codema Dublin/EED Art.26 (T3) for waste heat; RICS NRM1 (T3) for fees; SBTi published schedule (T2) for validation fees. Finance Act (T1) for carbon tax trajectory.]\n\nCLONSHAUGH DC — NET ZERO ROADMAP SUMMARY\n\nBASELINE (2026): 7,151 tonnes CO₂e/year (88t Scope 1 + 7,063t Scope 2)\n\nPHASE A — Measure & Optimise (Years 1–2): €432,500\n  Monitoring programme (DC-LEARN-009): €432,500\n  Carbon reduction: 1,413 t/year (PUE 1.50 → 1.20)\n  Post-Phase A: 5,717 t CO₂e/year\n\nPHASE B — Decarbonise (Years 2–5): €625,000 capex + €205,000/year\n  On-site PV (800 kWp): €600,000 (T3 — SEAI REFIT; BSRIA, indicative)\n  Waste heat study: €25,000 (T3 — RICS NRM1 fee benchmarks; Codema published, indicative)\n  CPPA premium (80%): €200,000/year (T3 — RE-Source Platform; SEAI CPPA market benchmarks, indicative)\n  HVO fuel switch: €5,000/year (T3 — SEAI HVO guidance; market benchmarks, indicative)\n  Carbon reduction: 2,885 t/year additional\n  Post-Phase B: 2,832 t CO₂e/year (SBTi 42% target: ACHIEVED at 60% reduction)\n\nPHASE C — Net Zero Path (Years 5–10): €500,000 capex + €275,000/year\n  Waste heat infrastructure (if viable): €500,000 (T3 — EED Art. 26; Codema Dublin benchmarks, indicative)\n  CPPA extension to 100%: €275,000/year (T3 — RE-Source Platform market benchmarks, indicative)\n  Scope 3 lifecycle extension: saves 1,067 t/year embodied\n  Post-Phase C target: approximately 900–1,200 t CO₂e/year\n\nTOTAL 10-YEAR PROGRAMME\n  Capex: approximately €1.56M\n  Operating premium: approximately €2.28M (cumulative CPPA/HVO)\n  Gross cost: approximately €3.84M\n\nTOTAL 10-YEAR BENEFITS\n  Energy savings (PUE): €6.3M\n  Waste heat revenue: €0.5M (5 years at €105K)\n  ITAD revenue: €1.2M\n  Financing benefit (Taxonomy alignment): €0.5–1.0M (T3 — ICMA green lending benchmarks, indicative)\n  Gross benefit: approximately €8.5–9.0M (T3 — aggregate indicative)\n\nNET 10-YEAR BENEFIT: approximately €4.7–5.2M (T3 — net of all above, indicative)\n\nKEY RISKS\n  1. CPPA price risk — 15-year commitment at fixed premium\n  2. Grid decarbonisation uncertainty\n  3. Waste heat viability — depends on demand proximity\n  4. Scope 3 data quality — vendor cooperation needed\n\nSource: SBTi V5.3; CRREM v2.01; SEAI 2026; Finance Act (€71→€100)"

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q010-01",icon:"🌍",stage:"grammar",q:"Which emission scope dominates a typical Irish grid-connected DC's carbon footprint?",options:["Scope 2 (grid electricity)","Scope 1 (generators)","Scope 3 (embodied carbon)","All three are approximately equal"],correct:0,explain:"Scope 2 (grid electricity) typically accounts for 85–95% of total DC emissions."},
  {level:1,id:"Q010-02",icon:"🌍",stage:"logic",q:"Why does PUE improvement reduce Scope 2 emissions without changing the energy source?",options:["PUE improvement generates on-site renewable energy, reducing the proportion of grid electricity in the facility's energy mix.","Lower PUE means less total electricity consumed per kWh of IT work","PUE improvement reduces the applicable grid emission factor by qualifying the facility for a lower-carbon grid tariff band.","PUE is a physical infrastructure metric and has no direct relationship to Scope 2 carbon emissions calculations."],correct:1,explain:"PUE improvement reduces total facility energy consumption by eliminating cooling and distribution overhead. Less electricity consumed = less Scope 2 emissions."},
  {level:1,id:"Q010-03",icon:"🌍",stage:"rhetoric",q:"Clonshaugh's total Scope 2 emissions at PUE 1.50 and grid factor 0.2241 are approximately:",options:["3,500 tonnes CO₂","5,600 tonnes CO₂","7,060 tonnes CO₂","9,400 tonnes CO₂"],correct:2,explain:"Scope 2 = 2,400 kW × 1.50 × 8,760 hrs × 0.2241 kgCO₂/kWh = approximately 7,063 tonnes CO₂/year."},

  {level:2,id:"Q010-04",icon:"⚡",stage:"grammar",q:"What distinguishes a CPPA from purchasing RECs?",options:["CPPAs are cheaper than RECs on a per-MWh basis","There is no material difference for GHG Protocol Scope 2 market-based carbon reporting","RECs provide physical electricity delivered to site; CPPAs are a financial instrument only","CPPAs fund new renewable generation (additionality); RECs do not necessarily"],correct:3,explain:"A CPPA with additionality funds a new renewable project. RECs represent attributes of existing generation. RE100 and sophisticated ESG analysts increasingly require additionality."},
  {level:2,id:"Q010-05",icon:"⚡",stage:"logic",q:"Why does on-site PV cover only 1–3% of a DC's electricity consumption?",options:["Irish solar irradiance is too low to generate meaningful energy from rooftop PV in the Dublin climate.","PV technology efficiency at 20–23% is insufficient to generate the power densities required by data centre loads.","DC roof area is small relative to the enormous energy demand","Planning permission for DC rooftop PV installations is routinely refused by local authorities in the Greater Dublin Area."],correct:2,explain:"A 2,400 kW DC consumes approximately 31,500 MWh/year. A typical DC roof supports approximately 800 kWp of PV, generating approximately 760 MWh/year — about 2.4% of demand."},
  {level:2,id:"Q010-06",icon:"⚡",stage:"rhetoric",q:"Ann estimates CPPA premium at Clonshaugh as approximately:",options:["€125,000/year for 50% coverage","€50,000/year","€500,000/year","€1,000,000/year"],correct:0,explain:"50% CPPA (approximately 12,600 MWh) at €10/MWh premium over grid price = approximately €126,000/year."},

  {level:3,id:"Q010-07",icon:"📉",stage:"grammar",q:"What does the CRREM 'Misalignment Year' indicate?",options:["The year the building will be demolished or fully decommissioned under the Paris Agreement transition plan","The year carbon intensity exceeds the Paris-aligned pathway","The year the building was commissioned and its initial carbon intensity baseline was established","The year energy costs exceed the operator's sustainability budget threshold"],correct:1,explain:"The Misalignment Year is when a building's projected carbon intensity crosses above the CRREM decarbonisation pathway — signalling transition risk."},
  {level:3,id:"Q010-08",icon:"📉",stage:"logic",q:"Why is CUE (kgCO₂/kWh IT) preferred over kgCO₂/m² for DC CRREM analysis?",options:["CUE is simpler to calculate and requires only the grid emission factor and PUE — no floor area measurement is needed.","kgCO₂/m² overestimates DC emissions because floor area in a DC is larger than in other commercial buildings per unit of energy demand.","CUE is mandated by EU regulation as the primary carbon intensity metric for data centres under the EU Taxonomy Delegated Act.","DC floor area bears no relationship to energy demand — CUE reflects actual operational intensity"],correct:3,explain:"In DCs, floor area is a poor proxy for energy demand. CUE (= PUE × grid factor) directly measures carbon intensity per unit of IT work."},
  {level:3,id:"Q010-09",icon:"📉",stage:"rhetoric",q:"Clonshaugh's CUE at current PUE 1.50 is:",options:["0.336 kgCO₂/kWh IT","0.224 kgCO₂/kWh IT","0.150 kgCO₂/kWh IT","0.450 kgCO₂/kWh IT"],correct:0,explain:"CUE = PUE × grid factor = 1.50 × 0.2241 = 0.336 kgCO₂/kWh IT."},

  {level:4,id:"Q010-10",icon:"🏛️",stage:"grammar",q:"What is the EU Taxonomy PUE threshold for data centre alignment?",options:["PUE ≤ 1.1","PUE ≤ 1.2","PUE ≤ 1.3","PUE ≤ 1.5"],correct:2,explain:"The EU Taxonomy Delegated Act requires PUE ≤ 1.3 for data centres to qualify as substantially contributing to climate change mitigation."},
  {level:4,id:"Q010-11",icon:"🏛️",stage:"logic",q:"Why is PUE ≤ 1.3 necessary but not sufficient for Taxonomy alignment?",options:["PUE ≤ 1.3 alone does not satisfy the financial reporting transparency requirements that the EU Taxonomy imposes on institutional fund managers.","PUE measurement must be validated by an accredited third-party auditor before the Taxonomy-aligned claim can be made to investors.","The EU Taxonomy applies only to new data centres commissioned after 1 January 2025 — existing facilities are permanently exempt.","Taxonomy also requires DNSH compliance across six environmental objectives"],correct:3,explain:"Beyond PUE, the Taxonomy requires Do No Significant Harm assessments for climate adaptation, water, circular economy, pollution, and biodiversity."},
  {level:4,id:"Q010-12",icon:"🏛️",stage:"rhetoric",q:"Tom estimates the cost beyond monitoring to achieve full Taxonomy alignment at:",options:["€5,000–10,000","€37,000–70,000","€150,000–200,000","€500,000+"],correct:1,explain:"DNSH assessments: €20,000–40,000. Waste heat study: €15,000–25,000. Water metering: €2,000–5,000. Total: approximately €37,000–70,000."},

  {level:5,id:"Q010-13",icon:"🎯",stage:"grammar",q:"What reduction does SBTi V5.3 require for well-below 2°C near-term targets?",options:["25% by 2030","42% by 2030","50% by 2030","90% by 2050"],correct:1,explain:"SBTi V5.3 requires minimum 42% absolute Scope 1+2 reduction by 2030 for well-below 2°C alignment. The 1.5°C pathway requires approximately 50%."},
  {level:5,id:"Q010-14",icon:"🎯",stage:"logic",q:"Why can Clonshaugh exceed the 42% SBTi target?",options:["The Irish grid emission factor will drop to near zero by 2030 as renewable capacity expands, passively reducing Clonshaugh's Scope 2 without any active measures.","Scope 3 lifecycle extension reductions from server refresh deferral make up the shortfall between the 42% target and achievable Scope 1+2 reductions.","SBTi targets are relatively modest and can be achieved through operational efficiency measures alone without capital expenditure.","PUE improvement (20%) + 50% CPPA together achieve approximately 60% reduction"],correct:3,explain:"PUE 1.50→1.20 saves 20% of Scope 2. A 50% CPPA saves approximately 40% additional. Combined: approximately 60% reduction — exceeding the 42% target."},
  {level:5,id:"Q010-15",icon:"🎯",stage:"rhetoric",q:"What is the key difference between SBTi 42% and 50% reduction targets?",options:["42% = well-below 2°C; approximately 50% = 1.5°C alignment","42% is a voluntary commitment threshold; approximately 50% is a mandatory regulatory obligation under EU climate law.","42% covers Scope 1+2 emissions only; approximately 50% includes Scope 3 value chain emissions from IT equipment manufacturing.","There is no practical operational difference — both targets require the same decarbonisation actions for a facility of Clonshaugh's profile."],correct:0,explain:"SBTi V5.3: 42% = well-below 2°C minimum. Approximately 50% = 1.5°C pathway. The distinction is material for SFDR Article 9 funds."},

  {level:6,id:"Q010-16",icon:"♨️",stage:"grammar",q:"What is the typical temperature grade of DC waste heat from air cooling?",options:["10–15°C","60–80°C","25–45°C","90–120°C"],correct:2,explain:"Air-cooled DC waste heat is low-grade: 25–35°C from CRAH return air. This requires heat pump uplift for district heating."},
  {level:6,id:"Q010-17",icon:"♨️",stage:"logic",q:"Why is proximity of demand the key viability factor for DC waste heat recovery?",options:["Heat pumps cannot operate efficiently over long pipe runs because thermal losses accumulate faster than the heat pump can compensate.","Irish planning regulations prohibit district heating pipe connections exceeding 500m from the waste heat source facility boundary.","Insulated pipework costs €500–1,500/metre, making long connections uneconomic","Heat loses temperature too quickly in buried pipework for the recovered energy to be usable at district heating supply temperatures."],correct:2,explain:"Piping cost (€500–1,500/m) is the primary economic constraint. At 500m, connection costs €250,000–750,000. Revenue at €105,000/year means payback of 2–7 years at 500m."},
  {level:6,id:"Q010-18",icon:"♨️",stage:"rhetoric",q:"What is Clonshaugh's estimated waste heat output?",options:["120 kW","480 kW","1,200 kW","2,400 kW"],correct:1,explain:"At PUE 1.20 target, overhead = 20% of IT load = 0.20 × 2,400 kW = 480 kW."},

  {level:7,id:"Q010-19",icon:"💧",stage:"grammar",q:"What is the WUE for a DC using only dry cooling?",options:["1.0 L/kWh","0.1 L/kWh","0.5 L/kWh","0 L/kWh"],correct:3,explain:"Dry cooling uses zero water — WUE = 0. Evaporative cooling: WUE = 1.0–1.8 L/kWh."},
  {level:7,id:"Q010-20",icon:"💧",stage:"logic",q:"Why is there a trade-off between PUE and WUE?",options:["Evaporative cooling reduces PUE (energy) but increases WUE (water)","Better PUE always requires more water — every efficiency improvement in cooling requires higher evaporative rates at the cooling tower.","WUE and PUE are completely independent metrics with no engineering relationship between cooling energy and water consumption.","Lower PUE directly reduces water consumption because more efficient cooling systems require less cooling water flow rate."],correct:0,explain:"Evaporative cooling is more energy-efficient than dry cooling (lower PUE) but consumes water (higher WUE). In water-constrained Dublin, the trade-off increasingly favours dry or hybrid cooling."},
  {level:7,id:"Q010-21",icon:"💧",stage:"rhetoric",q:"What is the cost to install water metering for WUE measurement?",options:["€2,000–5,000","€500–1,000","€15,000–25,000","€50,000+"],correct:0,explain:"A MID-approved water meter on the cooling make-up supply: €2,000–5,000 installed. This single meter closes compliance gaps in EED, Taxonomy, and planning conditions."},

  {level:8,id:"Q010-22",icon:"♻️",stage:"grammar",q:"Extending server refresh from 3 to 5 years reduces embodied carbon per year by approximately:",options:["10%","25%","40%","60%"],correct:2,explain:"At 3-year cycle: embodied carbon amortised over 3 years. At 5-year cycle: amortised over 5 years. Reduction per year: (1 - 3/5) = 40%."},
  {level:8,id:"Q010-23",icon:"♻️",stage:"logic",q:"Why is lifecycle extension the highest-impact circular economy action for DCs?",options:["It reduces operational energy consumption by eliminating the efficiency gap between older and newer server hardware generations.","It eliminates 40% of annual embodied carbon without capex","It generates ITAD revenue that directly offsets the capital cost of new server procurement in the refresh cycle.","It satisfies the WEEE Directive extended producer responsibility obligation, reducing the DC operator's regulatory compliance cost."],correct:1,explain:"Lifecycle extension from 3 to 5 years eliminates 40% of annual embodied carbon — the single largest circular economy reduction — with no capital expenditure."},
  {level:8,id:"Q010-24",icon:"♻️",stage:"rhetoric",q:"What annual ITAD revenue does Tom estimate for Clonshaugh?",options:["€30,000","€500,000","€250,000","€120,000"],correct:3,explain:"800 servers/year × €150 average refurbishment value = approximately €120,000/year ITAD revenue potential."},

  {level:9,id:"Q010-25",icon:"🗺️",stage:"grammar",q:"What is the total 10-year gross cost of the Clonshaugh net zero programme?",options:["Approximately €1.5M","Approximately €3.8M","Approximately €2.5M","Approximately €6.0M"],correct:1,explain:"Approximately €1.56M capex + €2.28M operating (CPPA/HVO premiums cumulative) = approximately €3.84M gross over 10 years."},
  {level:9,id:"Q010-26",icon:"🗺️",stage:"logic",q:"Why is Phase A (monitoring) a prerequisite for Phase B (decarbonisation)?",options:["Monitoring generates the data that validates the Phase B business case","Phase B capital equipment cannot be procured or installed until Phase A compliance certificates are issued by the relevant authorities.","Irish and EU regulatory requirements mandate that energy monitoring infrastructure must be in place before any decarbonisation investment.","Phase A delivers staff training on carbon accounting that is required before Phase B procurement processes can be initiated."],correct:0,explain:"Phase A monitoring data (PUE Category 2, carbon baseline) provides the evidence that validates Phase B investments (PPA sizing, HVO fuel volumes). Without data, the business case is built on assumptions."},
  {level:9,id:"Q010-27",icon:"🗺️",stage:"rhetoric",q:"What is the estimated net 10-year benefit of the Clonshaugh programme?",options:["Approximately €1.5M","Approximately €3.0M","Approximately €4.7–5.2M","Approximately €8.0M"],correct:2,explain:"Gross benefits approximately €8.5–9.0M (energy savings + waste heat + ITAD + financing benefit) minus gross costs approximately €3.8M = net benefit approximately €4.7–5.2M over 10 years."}
];

// AssistBar — Clarify only (Grammar), no Read Aloud

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),

              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},

      // Primary CTA — go to top level

function ChainTab({progress, setActiveTab, setSelectedLevel,persona,onPersona,onPersonaLevel,PERSONA_MAP}) {
  const [calcPue, setCalcPue] = useState("1.50");
  const [calcRef, setCalcRef] = useState("0");
  const [calcResult, setCalcResult] = useState(null);
  const [activeChainLevel, setActiveChainLevel] = useState(null);

  const SEAI_EF = 0.2241; // SEAI 2026 grid emission factor kgCO2/kWh

  const handleCalc = () => {
    const pue = parseFloat(calcPue);
    const ref = parseFloat(calcRef) / 100;
    if (isNaN(pue) || isNaN(ref) || pue < 1.0 || pue > 3.0 || ref < 0 || ref > 1) {
      setCalcResult({error: "Check inputs: PUE 1.0–3.0, REF 0–100%"});
      return;
    }
    // CI = PUE × SEAI_EF × (1 - REF) × 1000 → kgCO2/MWh_IT
    const ci = pue * SEAI_EF * (1 - ref) * 1000;
    let band, color, advisory;
    if (ci < 200) { band = "LOW"; color = "var(--green)"; advisory = "Below 200 kgCO₂/MWh IT. Strong position for CRREM alignment and EU Taxonomy eligibility."; }
    else if (ci < 300) { band = "MODERATE"; color = "var(--amber)"; advisory = "200–300 kgCO₂/MWh IT. PUE improvement and/or renewable PPA recommended to reach LOW band."; }
    else if (ci < 400) { band = "ELEVATED"; color = "#e07020"; advisory = "300–400 kgCO₂/MWh IT. Significant efficiency and renewable investment needed. CRREM misalignment risk is high."; }
    else { band = "HIGH"; color = "var(--red)"; advisory = "Above 400 kgCO₂/MWh IT. Immediate action required. Asset is likely already CRREM misaligned."; }
    setCalcResult({ci: ci.toFixed(1), band, color, advisory, pue, ref: ref*100});
  };

  const handleChainClick = (lvl) => {
    if (hasTextSelection()) return;
    setActiveChainLevel(activeChainLevel === lvl.level ? null : lvl.level);

    setSelectedLevel(lvl.level - 1);
    setActiveTab("learn");

<div className="chain-layout">
        <div>

              <label>PUE (1.0 – 3.0)</label>
              <input className="calc-input" type="number" step="0.01" min="1.0" max="3.0"
                value={calcPue} onChange={e => setCalcPue(e.target.value)} />
            </div>
            <div className="calc-input-group">
              <label>Renewable Energy Fraction (% — 0 to 100)</label>
              <input className="calc-input" type="number" step="1" min="0" max="100"
                value={calcRef} onChange={e => setCalcRef(e.target.value)} />
            </div>
            <button className="calc-btn" onClick={handleCalc}>Calculate {"→"}</button>
            {calcResult && !calcResult.error && (
              <div className="calc-result fade-in" style={{background:'var(--panel)',border:'1px solid '+calcResult.color}}>
                <div className="ci-value" style={{color:calcResult.color}}>{calcResult.ci}</div>
                <div className="ci-unit">kgCO{"₂"}/MWh IT</div>
                <div className="ci-band" style={{color:calcResult.color}}>{calcResult.band}</div>
                <div className="ci-advisory">{calcResult.advisory}</div>
                <div style={{marginTop:8,fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
                  PUE {calcResult.pue.toFixed(2)} × EF 0.2241 × (1 − {(calcResult.ref/100).toFixed(2)}) × 1,000
                </div>
              </div>
            )}
            {calcResult && calcResult.error && (
              <div className="calc-result fade-in" style={{background:'var(--red-dim)',border:'1px solid var(--red)',color:'var(--red)',fontSize:13}}>
                {calcResult.error}

            <div style={{marginTop:16,padding:'12px 14px',background:'var(--panel)',borderRadius:8,fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
              <strong style={{color:'var(--text-bright)'}}>How to read the results</strong><br/>
              The calculator estimates carbon intensity (CI) in kgCO₂/MWh_IT. A lower CI indicates better carbon performance. <span style={{color:'var(--green)',fontWeight:600}}>GREEN</span> means aligned with CRREM pathway. <span style={{color:'var(--amber)',fontWeight:600}}>AMBER</span> means approaching misalignment. <span style={{color:'var(--red)',fontWeight:600}}>RED</span> means misaligned — immediate action required.
            </div>
          </div>

          {/* Carbon Profile Card */}
          <div className="sidebar-card">
            <h3 style={{fontSize:15,fontWeight:700,color:'var(--text-bright)',marginBottom:4}}>{"🏢"} Facility Profile</h3>
            <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Clonshaugh Reference Facility (2013)</div>
            <div style={{fontSize:13,color:'var(--text)',lineHeight:2}}>
              <div>Location: <strong>Clonshaugh, Dublin</strong></div>
              <div>Built: <strong>2013 (Colocation)</strong></div>
              <div>Racks: <strong>400</strong></div>
              <div>Current density: <strong>6 kW/rack</strong></div>

              <strong>Trivium Method:</strong> Grammar (definitions) → Logic (cause/effect) → Rhetoric (stakeholder perspectives).<br/>

function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const [rhetPersonaInit,setRhetPersona]=useState(null);
  // Read persona stage + persona key from Chain tab persona entry card
  React.useEffect(()=>{
    try {
      const req = sessionStorage.getItem('dc_persona_stage');
      if(req){ setStage(req); sessionStorage.removeItem('dc_persona_stage'); }
      const pk = sessionStorage.getItem('dc_persona_key');
      if(pk){ setRhetPersona(pk); sessionStorage.removeItem('dc_persona_key'); }
    } catch(e){}
  },[selectedLevel]);
  
  React.useEffect(()=>{ dcTimingLog.log('stage_change', { stage: stage, level: selectedLevel }); },[stage, selectedLevel]);
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
    {lvl.clockQuote && (
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
        <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>— Level {lvl.level}: {lvl.name}</div>
      </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeedStatement}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric} initialPersona={rhetPersonaInit}/>}
      </div>
      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

const VG_AD = () => (<defs><marker id="vga" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></marker></defs>);

function VGWalkthrough({title, subtitle, steps, insight, narrative, takeaway, children}) {
  const [step, setStep] = useState(0);
  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:2}}>{title}</div>

          <button key={i} onClick={() => setStep(i)} className="step-btn"
            style={{border:step===i?'1px solid var(--accent,#5b9bd5)':'1px solid var(--border)',
              background:step===i?'rgba(88,166,255,0.15)':'transparent',
              color:step===i?'var(--accent,#5b9bd5)':'var(--text-dim)',fontWeight:step===i?600:400}}>
            {i+1}. {s}
          </button>
        ))}
      </div>
      {typeof children === 'function' ? children(step) : children}
      {insight && step === steps.length - 1 && (
        <div className="fade-in" style={{marginTop:12,padding:'10px 14px',background:'var(--amber-dim,rgba(212,160,38,0.12))',border:'1px solid var(--warn,#d4a026)',borderRadius:8,fontSize:12,color:'var(--text-bright)',lineHeight:1.6}}>{insight}</div>

      {narrative && <NarrativePanel text={narrative} takeaway={takeaway}/>}
    </div>
  );
}

/* ═══ 3. L3 — CRREM MISALIGNMENT TRAJECTORY ═══ */
function L3Diagram() {
  return (
    <VGWalkthrough
      title="L3: CRREM misalignment trajectory — CUE vs pathway"
      subtitle="When does Clonshaugh cross the line? What does retrofit change?"
      steps={["Pathway only","Current position","Retrofit path"]}
      insight="At CUE 0.336, Clonshaugh is near or past the misalignment point (~2029–2031). PUE retrofit to 1.20 brings CUE to 0.269. Combined with 80% RE and grid decarbonisation, the facility re-aligns by 2030–2032. Asset value impact of misalignment: 5–15% discount (Tier 2 — RICS Sustainability and ESG 2023) on a €50M facility (indicative teaching scenario) = €2.5–7.5M at risk."
      narrative="CRREM draws a declining line — the maximum carbon intensity a building can have each year to stay Paris-aligned. This diagram uses CUE (kgCO₂/kWh IT) rather than kgCO₂/m² because DC floor area bears no relationship to energy demand. Clonshaugh's current CUE of 0.336 (PUE 1.50 × GEF 0.2241) sits close to the pathway at 2026. Without action, the facility becomes misaligned by approximately 2029–2031."
      takeaway="CRREM v2.01 has no published DC pathway — these bands are LBE-derived (Tier 3/4, PUE × GEF methodology). Every client report must disclose the derivation. CUE is preferred over kgCO₂/m² for DCs.">
      {(step) => {
        /* Chart geometry — narrower chart, wide right margin for labels */
        const cx=70,cy=60,cw=400,ch=230;
        const bottom=cy+ch, right=cx+cw;
        const maxCUE=0.50;
        const yC = (cue) => bottom-(cue/maxCUE)*ch;
        const minYr=2024,maxYr=2050;
        const xY = (yr) => cx+((yr-minYr)/(maxYr-minYr))*cw;

        const pts=[{yr:2024,cue:0.40},{yr:2026,cue:0.36},{yr:2028,cue:0.32},
          {yr:2030,cue:0.26},{yr:2035,cue:0.16},{yr:2040,cue:0.10},{yr:2045,cue:0.05},{yr:2050,cue:0.02}];
        const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${xY(p.yr).toFixed(0)},${yC(p.cue).toFixed(0)}`).join(' ');

        /* Right margin x for all labels */
        const rmX = right + 24;

        return (
        <svg viewBox="0 0 680 420" style={{display:'block',margin:'0 auto',maxWidth:680}}>
          <VG_AD/>
          <text style={{font:'600 12px var(--font-sans)',fill:'var(--text-bright)'}} x="340" y="22" textAnchor="middle">
            {step===0?"LBE-derived DC pathway (T3/T4) — no published CRREM DC pathway":
             step===1?"Clonshaugh at CUE 0.336 — near or past misalignment":
             "Retrofit path: PUE 1.20 + 80% RE re-aligns by ~2032"}
          </text>

          {/* Y axis */}
          <line x1={cx} y1={cy} x2={cx} y2={bottom} stroke="var(--border)" strokeWidth="0.5"/>
          {[0.10,0.20,0.30,0.40,0.50].map(v => (
            <g key={v}>
              <text style={{font:'400 8px var(--font-mono)',fill:'var(--text-dim)'}} x={cx-6} y={yC(v)+3} textAnchor="end">{v.toFixed(2)}</text>
              <line x1={cx} y1={yC(v)} x2={right} y2={yC(v)} stroke="var(--border)" strokeWidth="0.3" strokeDasharray="4 4"/>
            </g>
          ))}
          <text style={{font:'400 8px var(--font-mono)',fill:'var(--text-dim)'}} x={cx-6} y={bottom+3} textAnchor="end">0</text>
          <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="14" y={cy+ch/2} textAnchor="middle" transform={`rotate(-90,14,${cy+ch/2})`}>CUE (kgCO₂/kWh IT)</text>

          {/* X axis */}
          <line x1={cx} y1={bottom} x2={right} y2={bottom} stroke="var(--border)" strokeWidth="0.5"/>
          {[2024,2028,2032,2036,2040,2044,2048].map(yr => (
            <text key={yr} style={{font:'400 8px var(--font-mono)',fill:'var(--text-dim)'}} x={xY(yr)} y={bottom+14} textAnchor="middle">{yr}</text>
          ))}

          {/* Pathway — always visible */}
          <path d={pathD} fill="none" stroke="#d97706" strokeWidth="2.5" strokeDasharray="6 3"/>

          {/* RIGHT MARGIN: Pathway label */}
          <text style={{font:'500 9px var(--font-sans)',fill:'#d97706'}} x={rmX} y={bottom-10}>Pathway (T3/T4)</text>

          {/* ─── STEP 1+: Current position ─── */}
          {step >= 1 && (<g>
            {/* Dot */}
            <circle cx={xY(2026)} cy={yC(0.336)} r="6" fill="#dc2626" stroke="#fff" strokeWidth="1.5"/>

            {/* No-action dashed line */}
            <line x1={xY(2026)} y1={yC(0.336)} x2={xY(2038)} y2={yC(0.336)} stroke="#dc2626" strokeWidth="1" strokeDasharray="4 2"/>

            {/* Leader line to right margin */}
            <line x1={xY(2038)} y1={yC(0.336)} x2={rmX-4} y2={yC(0.336)} stroke="#dc2626" strokeWidth="0.5"/>

            {/* RIGHT MARGIN: Clonshaugh labels — stacked cleanly */}
            <text style={{font:'600 10px var(--font-sans)',fill:'#dc2626'}} x={rmX} y={yC(0.336)-4}>Clonshaugh NOW</text>
            <text style={{font:'500 9px var(--font-mono)',fill:'#dc2626'}} x={rmX} y={yC(0.336)+10}>CUE 0.336</text>
            <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-muted)'}} x={rmX} y={yC(0.336)+22}>(PUE 1.50 × GEF 0.2241)</text>
            <text style={{font:'400 8px var(--font-sans)',fill:'#dc2626'}} x={rmX} y={yC(0.336)+36}>← No action trajectory</text>

            {/* Misalignment shading */}
            <rect x={xY(2028)} y={cy} width={xY(2035)-xY(2028)} height={ch} fill="#dc2626" fillOpacity="0.04"/>
            <text style={{font:'600 9px var(--font-sans)',fill:'#dc2626'}} x={(xY(2028)+xY(2035))/2} y={cy+14} textAnchor="middle">MISALIGNED</text>
            <text style={{font:'400 8px var(--font-sans)',fill:'var(--text-muted)'}} x={(xY(2028)+xY(2035))/2} y={cy+26} textAnchor="middle">~2029–2031</text>
          </g>)}

          {/* ─── STEP 2: Retrofit path ─── */}
          {step === 2 && (<g className="fade-in">
            {/* Green retrofit line */}
            <path d={`M${xY(2026).toFixed(0)},${yC(0.336).toFixed(0)} L${xY(2028).toFixed(0)},${yC(0.269).toFixed(0)} L${xY(2032).toFixed(0)},${yC(0.18).toFixed(0)} L${xY(2040).toFixed(0)},${yC(0.08).toFixed(0)} L${xY(2050).toFixed(0)},${yC(0.03).toFixed(0)}`}
              fill="none" stroke="#16a34a" strokeWidth="2.5"/>

            {/* PUE 1.20 dot */}
            <circle cx={xY(2028)} cy={yC(0.269)} r="5" fill="#16a34a" stroke="#fff" strokeWidth="1.5"/>
            {/* Leader to left margin */}
            <line x1={xY(2028)-7} y1={yC(0.269)} x2={cx+4} y2={yC(0.269)} stroke="#16a34a" strokeWidth="0.5" strokeDasharray="3 2"/>
            <text style={{font:'600 9px var(--font-mono)',fill:'#16a34a'}} x={cx+6} y={yC(0.269)-4}>CUE 0.269</text>
            <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-dim)'}} x={cx+6} y={yC(0.269)+8}>(PUE 1.20)</text>

            {/* 80% RE dot */}
            <circle cx={xY(2032)} cy={yC(0.18)} r="5" fill="#16a34a" stroke="#fff" strokeWidth="1.5"/>
            {/* Leader to left margin */}
            <line x1={xY(2032)-7} y1={yC(0.18)} x2={cx+4} y2={yC(0.18)} stroke="#16a34a" strokeWidth="0.5" strokeDasharray="3 2"/>
            <text style={{font:'500 9px var(--font-mono)',fill:'#16a34a'}} x={cx+6} y={yC(0.18)-4}>CUE ~0.18</text>
            <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-dim)'}} x={cx+6} y={yC(0.18)+8}>(80% RE + grid ↓)</text>

            {/* RIGHT MARGIN: Re-aligned note */}
            <text style={{font:'600 10px var(--font-sans)',fill:'#16a34a'}} x={rmX} y={yC(0.20)-4}>RE-ALIGNED</text>
            <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-muted)'}} x={rmX} y={yC(0.20)+8}>(illustrative — grid</text>
            <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-muted)'}} x={rmX} y={yC(0.20)+18}>decarbonisation assumed)</text>
          </g>)}

          {/* Legend bar */}
          <line x1="80" y1="370" x2="110" y2="370" stroke="#d97706" strokeWidth="2.5" strokeDasharray="6 3"/>
          <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="118" y="374">LBE pathway (T3/T4)</text>
          {step>=1 && (<g>
            <line x1="280" y1="370" x2="310" y2="370" stroke="#dc2626" strokeWidth="1" strokeDasharray="4 2"/>
            <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="318" y="374">No action</text>
          </g>)}
          {step===2 && (<g>
            <line x1="400" y1="370" x2="430" y2="370" stroke="#16a34a" strokeWidth="2.5"/>
            <text style={{font:'400 9px var(--font-sans)',fill:'var(--text-dim)'}} x="438" y="374">Retrofit path</text>
          </g>)}

          <text style={{font:'400 7px var(--font-mono)',fill:'var(--text-muted)'}} x="20" y="400">CRREM v2.01 has no published DC pathway. Bands are LBE-derived (PUE × GEF, Tier 3/4). Indicative only.</text>
        </svg>
      );}}
    </VGWalkthrough>
  );
}

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc010_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc010_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc010_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>

          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}
            {!timerActive&&elapsed>0&&!allAnswered && <button style={{padding:'5px 12px',border:'1px solid var(--green)',borderRadius:6,background:'transparent',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handleResume}>Resume</button>}
          </div>
        </div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterStage==='all'?' active':'')} onClick={()=>setFilterStage('all')}>All</button>
        <button className={'filter-btn'+(filterStage==='grammar'?' active':'')} onClick={()=>setFilterStage('grammar')}>Knowledge Check</button>
        <button className={'filter-btn'+(filterStage==='logic'?' active':'')} onClick={()=>setFilterStage('logic')}>Eng. Calculation</button>
        <button className={'filter-btn'+(filterStage==='rhetoric'?' active':'')} onClick={()=>setFilterStage('rhetoric')}>Prof. Judgement</button>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>

      </div>
      {score.total>0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:600}}>Score: {score.correct}/{score.total} ({Math.round(score.correct/score.total*100)}%)</div>
            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL?'Completed in '+fmtTime(elapsed)+' (under time)':'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{const s=stageScore(st);const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};return s.t>0&&(<div key={st} style={{fontSize:12,color:stageColours[st]}}><strong>{labels[st]}:</strong> {s.c}/{s.t}</div>);})}
          </div>
          {allAnswered&&assessPct>=80&&React.createElement('button',{onClick:function(){setShowCertModal(true);},style:{marginTop:12,padding:'10px 0',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',display:'block',width:'100%'}},assessPct>=90?'Get Achievement Certificate':'Get Completion Certificate')}
          {showCertModal&&React.createElement(CertModal,{score:score.correct,total:score.total,onClose:function(){setShowCertModal(false);}})}
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q);
        const answered=answers[gi]!==undefined;
        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        const countdownCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>

              <span>{q.icon}</span>
              <span className={'badge badge-'+q.stage}>{q.stage}</span>

                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  return supa.from('certificates').insert([{ user_id: userId, module_id: TOOL_ID, certificate_number: certNumber, cpd_hours: 2, certificate_type: 'Engagement', score: null, learner_name: learnerName, pdf_url: null }]).select().single().then(function(result) {

  });
}

function ProgressTab({progress,tabTimes}){

/* ─── DC-LEARN AUTH COMPONENT v1.0 ───────────────────────────────────────
   Drop this block into each module HTML file, inside the <script type="text/babel"> block,
   immediately BEFORE function App().

   FREE modules (DC-LEARN-000, 001, 002): set IS_FREE_MODULE = true
   PAID modules (DC-LEARN-003 to 015):    set IS_FREE_MODULE = false

   The component:
   - Checks Supabase session on load
   - Queries learner_tiers for paid status
   - Free modules: always open, shows login button in header if not logged in
   - Paid modules: locked overlay if not logged in or free tier
   - Login via email magic link (no password to forget)
   - Session cached in localStorage for speed
   ─────────────────────────────────────────────────────────────────────── */

const IS_FREE_MODULE = false; // SET TO true FOR DC-LEARN-000, 001, 002

/* ── Auth State Manager ── */
const dcAuth = {
  _session: null,
  _tier: null,

  async init() {
    if (!supa) return;
    // Check cached session
    try {
      const { data: { session } } = await supa.auth.getSession();
      this._session = session;
      if (session) {
        await this._loadTier(session.user.id);
      }
    } catch(e) {
      console.warn('Auth init failed:', e);
    }
    // Listen for auth changes
    supa.auth.onAuthStateChange(async (_event, session) => {
      this._session = session;
      this._tier = null;
      if (session) await this._loadTier(session.user.id);
    });
  },

  async _loadTier(userId) {
    try {
      const { data } = await supa
        .from('learner_tiers')
        .select('tier')
        .eq('user_id', userId)
        .single();
      this._tier = data?.tier || 'free';
    } catch(e) {
      this._tier = 'free';
    }
  },

  isLoggedIn() { return !!this._session; },
  isPaid() { return this._tier === 'founding' || this._tier === 'professional'; },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
  userEmail() { return this._session?.user?.email || null; },

  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    const { error } = await supa.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    return { error };
  },

  async signOut() {
    if (!supa) return;
    await supa.auth.signOut();
    window.location.reload();
  }
};

  React.useEffect(()=>{

        hasAccess: dcAuth.hasAccess(),
        email: dcAuth.userEmail()

    if (supa) {

            hasAccess: dcAuth.hasAccess(),
            email: dcAuth.userEmail()
          });
        }, 500);
      });
    }
  },[]);

  return authState;
}

      {activeTab==='challenges' && <FieldChallengesTab/>}

          <a href="https://legacybe.ie/contact/" target="_blank" rel="noopener" style={{display:'inline-block',padding:'10px 24px',background:'var(--lbe-green)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600,fontSize:14,marginTop:12,textAlign:'center'}}>Send Us a Message</a>

        <a href="./dc-learn-009.html">← DC-LEARN-001: Power Distribution</a>
        <span style={{color:'var(--text-muted)',fontSize:12}}>Module 11 of 16 · Series Spec v1.4</span>

      <div className="nav-footer no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <span>© 2026 Legacy Business Engineers Ltd</span>
        <div><a href="https://legacybe.ie" target="_blank" rel="noopener">legacybe.ie</a><a href="https://legacybe.ie/tools/" target="_blank" rel="noopener">Tools</a><a href="https://legacybe.ie/contact/" target="_blank" rel="noopener">Contact</a><a href="https://legacybe.ie/services/" target="_blank" rel="noopener">Services</a></div>
      </div>
    </div>
  );
}
