// Source: 9 levels per Trivium method — DC_LEARN_SERIES_SPEC_v1_2 §3. Content from CIBSE Guide B2, ASHRAE TC 9.9, EN 50600-2-3.
const LEVELS = [
  /* ═══ L1: Carbon Accounting — Scope 1, 2 & 3 ═══ */
  {
    id:"L1", level:1, name:"Carbon Accounting — Scope 1, 2 & 3", icon:"🌍",
    component:"Carbon Baseline", available:true,
    clockQuote:"Sarah had learned that investment committees didn't read sustainability reports. They read risk assessments. So she presented the net zero pathway as what it was: a risk assessment with a programme attached.",
    userNeedStatement:"When I need to understand my data centre’s carbon footprint, help me quantify Scope 1, 2, and 3 emissions so I can set reduction targets and report accurately.",
    plainEnglish:"Before you can reduce carbon, you must measure it. DC carbon accounting follows the GHG Protocol — Scope 1 (on-site fuel), Scope 2 (grid electricity), and Scope 3 (embodied carbon in equipment, supply chain). For most Irish DCs, Scope 2 dominates at 85–95% of total emissions.",
    grammar:{
      facts:[
        {
          term:"Scope 1 — Direct Emissions",
          definition:"Greenhouse gas emissions from on-site fuel combustion: standby generators (diesel or HVO test runs), gas-fired plant, and refrigerant leakage from cooling systems.",
          plain:"The carbon that comes directly from your site. For most DCs, this is generator test runs (monthly, 1–4 hours each) and refrigerant leakage. It is typically 2–5% of total emissions, but it is the category you control most directly.",
          number:"Clonshaugh Scope 1: Generator tests — approximately 25,000 litres diesel/year × 2.68 kgCO₂/litre (SEAI 2024) = 67 tonnes CO₂/year. Refrigerant leakage — typical 5% annual loss rate on R410A systems (conservative for legacy plant; Tier 4), GWP 2,088: at 200 kg charge, 5% loss = 10 kg × 2,088 = 20.9 tonnes CO₂e/year. Total Scope 1: approximately 88 tonnes CO₂e/year.",
          standard:"GHG Protocol Corporate Standard; SEAI Emission Factors 2024; EU F-Gas Regulation 517/2014",
          feynman:{analogy:"Think of it like your car\'s exhaust. When you drive, your car burns fuel and the exhaust comes out of your tailpipe — that\'s direct emissions. A data centre\'s generators and leaking refrigerant are its tailpipe.",firstPrinciples:"Data centres have diesel generators that run monthly for testing — burning diesel produces CO₂ directly on site. Cooling systems contain refrigerant gases that sometimes leak — these gases trap heat thousands of times more effectively than CO₂. Add those two together and you have Scope 1: the carbon your site physically produces.",theTest:"You know you understand Scope 1 when you can answer: If Clonshaugh switches its generators from diesel to HVO (hydrotreated vegetable oil), does Scope 1 fall? Answer: Yes — HVO produces approximately 90% less CO₂ than diesel, cutting generator-related Scope 1 from 67 to about 7 tonnes/year."}
        },
        {
          term:"Scope 2 — Indirect Emissions (Electricity)",
          definition:"Greenhouse gas emissions from purchased electricity consumed at the data centre, calculated using the national grid emission factor.",
          plain:"The carbon embedded in the electricity you buy. For a grid-connected DC with no renewable PPA, this is the big number. In Ireland, every kWh consumed generates 0.2241 kg CO₂ (SEAI 2026 grid factor).",
          number:"Clonshaugh Scope 2: 2,400 kW IT × 1.50 PUE × 8,760 hrs × 0.2241 kgCO₂/kWh = 7,063 tonnes CO₂/year. At target PUE 1.20: 2,400 × 1.20 × 8,760 × 0.2241 = 5,650 tonnes. PUE improvement alone saves 1,413 tonnes/year (20% reduction).",
          standard:"GHG Protocol Scope 2 Guidance (2015); SEAI 2026 Grid Emission Factor (0.2241 kgCO₂/kWh)",
          feynman:{analogy:"Think of it like your home electricity bill — you didn\'t burn any fuel, but every time you switch on a light, a power station somewhere burns gas or coal on your behalf. The more energy-wasteful your house (draughty windows, old appliances), the bigger your share of that burning.",firstPrinciples:"Ireland\'s power stations produce 0.2241 kg of CO₂ for every kWh they generate — that\'s the grid emission factor (SEAI 2026). A data centre uses electricity not just for computing, but for cooling and power distribution too — the ratio of total to IT-only energy is the PUE. Multiply PUE × grid factor × IT load × hours in a year, and you have Scope 2.",theTest:"You know you understand Scope 2 when you can answer: Clonshaugh improves PUE from 1.50 to 1.20 but stays on the same grid — do Scope 2 emissions fall? Answer: Yes, by 20%, because less total electricity is consumed per kWh of IT work, even though the grid carbon intensity hasn\'t changed."}
        },
        {
          term:"Scope 3 — Value Chain Emissions",
          definition:"Indirect emissions from the upstream and downstream value chain: embodied carbon in IT equipment manufacture and transport, construction materials, end-of-life disposal, employee commuting, and water treatment.",
          plain:"The carbon footprint of everything you bought, built, and will eventually throw away. For DCs, the largest Scope 3 category is embodied carbon in servers — manufacturing a single server generates approximately 1,000–3,000 kgCO₂e depending on configuration.",
          number:"Clonshaugh Scope 3 estimate: 400 racks × 10 servers average × 2,000 kgCO₂e per server (Tier 4 — manufacturer data varies significantly) = 8,000 tonnes CO₂e embodied. Amortised over 5-year refresh cycle: 1,600 tonnes CO₂e/year. This is approximately 18% of total carbon footprint.",
          standard:"GHG Protocol Corporate Value Chain (Scope 3) Standard; ISO 14064-1:2018",
          feynman:{analogy:"Think of it like buying a new phone. Before you even switch it on, factories in China mined the metals, assembled the parts, and shipped it to you — all producing carbon. A server is the same, just much heavier on the carbon footprint.",firstPrinciples:"Every physical product carries carbon from its manufacture — this is called embodied carbon. A typical server takes 1,000–3,000 kg of CO₂ to manufacture before it ever reaches the data centre. If you replace servers every 3 years, you\'re ordering that manufacturing carbon three times per decade instead of twice.",theTest:"You know you understand Scope 3 when you can answer: If Clonshaugh extends its server refresh cycle from 3 years to 5 years, does Scope 3 change? Answer: Yes — embodied carbon per year drops by 40%, because the same manufacturing footprint is spread over more years of use."}
        }
      ,
        {
          term:"Grid Emission Factor (GEF)",
          definition:"The average CO₂ intensity of electricity delivered by the national grid, expressed in kgCO₂ per kWh consumed. Published annually by SEAI for Ireland.",
          plain:"Every kilowatt-hour drawn from the Irish grid carries a carbon weight. In 2026, that weight is 0.2241 kg CO₂. As more wind and solar come online, this number falls — but it is set by national energy policy, not by the DC operator.",
          number:"Ireland GEF trajectory: 0.437 kgCO₂/kWh (2015) → 0.22418 (2020) → 0.2241 (SEAI 2026). Government target of 80% renewable electricity by 2030 could reduce GEF to 0.10–0.15 kgCO₂/kWh. At Clonshaugh: every 0.01 reduction in GEF saves approximately 315 tonnes CO₂/year (2,400 kW × 1.50 PUE × 8,760 hrs × 0.01).",
          standard:"SEAI Emission Factors 2026; Climate Action Plan 2025 — 80% renewable electricity target",
          feynman:{analogy:"The grid emission factor is like the average fuel economy of every car on the road. You cannot change the national average by tuning your own engine — but you can choose to drive less (PUE improvement) or switch to an electric car with its own charging (PPA with additionality).",firstPrinciples:"The grid mixes gas, wind, solar, and other sources. Each source has different carbon intensity — wind is near-zero, gas is approximately 0.40 kgCO₂/kWh. The GEF is the weighted average across all sources for the year. As wind capacity grows (Ireland targets 9 GW onshore + 5 GW offshore by 2030), the average carbon per kWh falls.",theTest:"If Ireland doubles its wind capacity but total electricity demand also doubles (partly due to new DCs), does the grid emission factor necessarily improve? Answer: Not necessarily — if fossil generation stays constant to meet growing demand, the GEF could plateau or even rise. This is why additionality matters."}

        {
          term:"Carbon Tax (Ireland)",
          definition:"A tax on CO₂ emissions from fossil fuel combustion, currently €71 per tonne CO₂ (Budget 2025 — T1) with a legislated trajectory to €100/tCO₂ by 2030 under the Finance Act (T1).",
          plain:"Ireland taxes carbon from burning fuel — diesel in generators, natural gas in boilers. It does not yet directly tax electricity consumption (that carbon cost flows through the ETS and wholesale electricity price). For DCs, the direct carbon tax impact is on Scope 1 only, but the indirect cost via electricity prices affects Scope 2.",
          number:"Clonshaugh carbon tax exposure: Scope 1 = 88 t CO₂e × €71/t = €6,248/year (2025). At €100/t (2030): €8,800/year. Indirect Scope 2 exposure via ETS pass-through in electricity price: estimated €5–15/MWh (Tier 3 — BNEF European Carbon Market 2025; ETS pass-through rate, indicative), adding €158,000–473,000/year to electricity costs for a 31,536 MWh facility.",

          feynman:{analogy:"Carbon tax is like a congestion charge for pollution. The more fuel you burn, the more you pay. And like a congestion charge that rises every year to discourage driving, carbon tax is legislated to increase (Finance Act — T1) — from €71 now to €100 by 2030.",firstPrinciples:"The carbon tax applies per tonne of CO₂ released from combustion. Diesel produces 2.68 kgCO₂ per litre (SEAI). Clonshaugh burns 25,000 litres/year for generator tests = 67 tonnes CO₂. At €71/t (T1 — Budget 2025 — T1), that is €4,757. The trajectory to €100/t is legislated, not speculative — it creates a rising cost floor under every litre of diesel burned on site.",theTest:"If Clonshaugh switches generators from diesel to HVO (hydrotreated vegetable oil), does the carbon tax bill change? Answer: Yes — HVO is classified as biogenic, so the carbon tax on fuel combustion drops by approximately 90%. This is a direct Scope 1 financial saving."}

        {cause:"The facility's carbon accounting baseline excludes Scope 3 embodied carbon from IT equipment manufacturing and logistics",effect:"Reported footprint understates total impact by 15–20%. When Scope 3 reporting becomes mandatory (expected under CSRD for large entities), the facility appears to have suddenly increased its emissions — reputational risk.",insight:"Start measuring Scope 3 now, even if reporting is not yet mandatory. The data collection effort (vendor requests, lifecycle assessments) takes 6–12 months to establish."}

        {cause:"EED Article 12 energy reporting becomes mandatory for Irish data centres with IT load at or above 500 kW from 2024",effect:"Operators must produce auditable PUE data annually. Facilities without metering infrastructure (DC-LEARN-009) face a compliance gap — they cannot report what they do not measure.",insight:"The connection between carbon accounting and EED reporting is direct: the same metering data that produces your carbon baseline also satisfies EED. Investing in DC-LEARN-009 metering now serves double duty — carbon management and regulatory compliance."}
      ],
      constraintLesson:"The fundamental constraint in DC carbon accounting is the grid emission factor. For a grid-connected facility like Clonshaugh, Scope 2 is 85–95% of the total footprint, and Scope 2 is entirely driven by electricity consumption × grid factor. The operator controls electricity consumption (through PUE improvement). The operator does not control the grid factor — that depends on national energy policy, renewable deployment, and grid mix.\n\nIreland’s grid factor has improved from 0.437 kgCO₂/kWh (2015) to 0.2241 (SEAI 2026) — a 49% reduction driven by wind energy deployment. The Government target of 80% renewable electricity by 2030 would reduce the grid factor further, potentially to 0.10–0.15 kgCO₂/kWh.\n\nHowever, relying on grid decarbonisation alone is not a credible strategy for two reasons: (1) the 80% target may not be achieved on time, and (2) investors and regulators increasingly expect operators to take direct action (PPA procurement, on-site generation, efficiency measures) rather than passively benefiting from system-wide improvements. The carbon tax trajectory (€71/tCO₂ current, €100/tCO₂ target by 2030 — Finance Act — T1) adds a direct cost incentive to reduce Scope 1 emissions.",

        howToGetThere:"Step 1: Calculate Scope 1 + Scope 2 baseline (this level). Step 2: Begin Scope 3 data collection from IT equipment vendors. Step 3: Set reduction targets (L5 — SBTi). Step 4: Implement PUE improvement (DC-LEARN-009). Step 5: Procure renewable PPA (L2). Step 6: Address Scope 1 (HVO fuel switch, refrigerant leak reduction)."
      }

    rhetoric:{
      declan:{hook:"I know how much diesel we burn in generator tests — about 25,000 litres per year. I did not know that translates to 66 tonnes CO2 at the current carbon tax rate.",text:"Declan here. I know how much diesel we burn in generator tests — about 25,000 litres a year. I know the electricity bills. What I have never done is add those up and call it a carbon footprint. The Scope 2 number — 7,063 tonnes — that is a big number for a single facility. And if I include the Scope 1 refrigerant leaks, it gets bigger. The monitoring data from DC-LEARN-009 is what makes this calculation possible."},
      ann:{hook:"Carbon accounting is not optional for institutional investors from 2025. A DC without a verified GHG baseline cannot participate in the green financing market.",text:"Ann speaking. Carbon accounting is no longer optional for institutional investors. SFDR Article 8 and 9 funds must disclose portfolio carbon intensity. If this DC is in a fund portfolio, its Scope 1 and 2 emissions flow through to fund-level reporting. A DC that can produce auditable carbon data is worth more than one that cannot — because it reduces the fund manager’s reporting risk."},
      mark:{hook:"The engineering inputs to carbon accounting: electricity consumption with the SEAI emission factor, generator fuel consumption, refrigerant leakage with GWP, and water consumption.",text:"Mark here. The engineering inputs to carbon accounting are: electricity consumption (from metering — DC-LEARN-009 L4), generator fuel consumption (from fuel logs), refrigerant charge and top-up records (from F-Gas log), and PUE (from DCIM). These are engineering measurements, not financial estimates. The carbon accountant depends on the engineer for data quality."},
      sarah:{hook:"GHG Protocol is the methodology. ISO 14064-1 is the verification standard. Scope 1, 2, and 3 boundaries must be defined and documented before any disclosure is made.",text:"Sarah here. This is my core domain. GHG Protocol is the methodology. ISO 14064-1 is the verification standard. SEAI publishes the Irish grid emission factor annually. The carbon tax (€71/tCO₂ current, €100/tCO₂ by 2030 — Finance Act — T1) applies to Scope 1 only (natural gas, diesel combustion) but provides a direct financial incentive to reduce generator fuel consumption and switch to HVO."},
      tom:{hook:"Scope 1 carbon tax at 71 euros per tonne CO2 on 66 tonnes from generator tests: 4,686 euros today. At 100 euros per tonne by 2030: 6,600 euros. Modest individually, material at portfolio scale.",text:"Tom here. The financial dimension of carbon: Scope 1 carbon tax at €71/tCO₂ on 88 tonnes = approximately €6,200/year currently. At €100/tCO₂ (2030): €8,800/year. Small in absolute terms, but the cost trajectory is clear — every tonne of Scope 1 becomes more expensive. The bigger financial exposure is Scope 2: if carbon pricing extends to electricity (via ETS pass-through): 7,063 tonnes × €20/tonne (illustrative — ETS pass-through rate indicative, Tier 3 — BNEF European Carbon Market 2025) = €141,000/year screening estimate. PUE improvement is carbon cost insurance."}

    scenario:{
      title:"The Clonshaugh Carbon Baseline",
      narrative:"The asset manager has asked for a complete carbon footprint for Clonshaugh as part of SFDR Article 8 fund reporting.",
      question:"Calculate the Scope 1, 2, and 3 baseline and identify the three highest-impact reduction levers.",
      answer:"CLONSHAUGH CARBON BASELINE (Annual)\n\nScope 1 — Direct Emissions: 88 tonnes CO₂e\n  Generator tests: 25,000 L diesel × 2.68 kgCO₂/L = 67.0 t CO₂\n  Refrigerant leakage: 10 kg R410A × GWP 2,088 = 20.9 t CO₂e\n  (Refrigerant leakage rate of 5% is conservative for legacy plant — Tier 4)\n\nScope 2 — Indirect Emissions: 7,063 tonnes CO₂\n  2,400 kW × 1.50 PUE × 8,760 hrs × 0.2241 kgCO₂/kWh = 7,063 t\n\nScope 3 — Value Chain: 1,621 tonnes CO₂e/year (amortised)\n  Embodied carbon: 8,000 t ÷ 5-year cycle = 1,600 t/yr\n  Other Scope 3 (transport, water): approximately 21 t/yr\n\nTOTAL: approximately 8,772 tonnes CO₂e/year\n\nThree highest-impact reduction levers:\n1. PUE improvement 1.50→1.20: saves 1,413 t/yr (16% of total)\n2. 50% CPPA (renewable PPA): saves approximately 2,825 t/yr (32% of total)\n3. Lifecycle extension 3→5 years: saves 1,067 t/yr embodied (12% of total)"

  {

    component:"Energy Source", available:true,
    clockQuote:"The carbon footprint was overwhelmingly Scope 2 — grid electricity. That made the path clear: use less electricity, and make the electricity you use cleaner. Two levers, one source, and every improvement compounds.",
    userNeedStatement:"When I need to reduce Scope 2 emissions through renewable energy, help me understand the options — CPPA, RECs, on-site PV — and what constitutes a credible renewable claim.",
    plainEnglish:"Renewable energy procurement is the second-largest carbon reduction lever after PUE improvement. The key distinction is additionality — does your purchase fund new renewable generation, or just transfer certificates for generation that already exists?",
    grammar:{
      facts:[
        {term:"CPPA (Corporate Power Purchase Agreement)",definition:"Long-term contract (10–15 years) to purchase electricity directly from a named renewable generator, typically a wind or solar farm. The buyer receives both the physical electricity and the associated Guarantees of Origin.",plain:"A deal to buy electricity directly from a wind or solar farm. The key word is additionality — a good PPA funds a new renewable project that would not have been built without the contract. That is real carbon reduction.",number:"Irish CPPA market: typical tenor 10–15 years. Price range: €50–80/MWh (Tier 3 — RE-Source Platform; SEAI CPPA market data 2024/25, indicative). Additionality premium over standard RECs: €5–15/MWh (Tier 3 — RE-Source Platform, indicative). At Clonshaugh’s consumption (approximately 31,536 MWh/year at PUE 1.50), a CPPA covers a significant volume.",standard:"RE100 Technical Criteria (additionality); GHG Protocol Scope 2 Guidance (market-based method)",
          feynman:{analogy:"Think of it like sponsoring a farmer to plant a new orchard specifically for you. You pay a premium, but that orchard wouldn\'t exist without your commitment. Buying apples at the supermarket (RECs) doesn\'t plant new trees.",firstPrinciples:"Electricity from the grid comes from a mix of sources — wind, gas, coal. To claim renewable energy, you need proof it was generated. A CPPA is a long-term contract (10–15 years) with a specific wind or solar farm — your money funds new renewable capacity that wouldn\'t exist otherwise. That\'s additionality.",theTest:"You know you understand CPPAs when you can answer: A company buys cheap RECs and claims 100% renewable — is this the same as a CPPA? Answer: No — RECs transfer certificates from existing generation, while a CPPA funds new generation. Only the CPPA adds renewable capacity to the grid."}},
        {term:"REC / GO (Renewable Energy Certificate / Guarantee of Origin)",definition:"Tradeable certificate representing the environmental attributes of 1 MWh of renewable electricity generation. Purchased separately from the physical electricity and used for Scope 2 reporting under the market-based method.",plain:"A certificate that says ‘1 MWh of renewable electricity was generated somewhere.’ You buy it to claim renewable energy in your carbon report. But the electricity you actually consumed still came from the grid mix. RECs do not fund new renewable projects unless they are linked to a PPA.",number:"Irish/EU GO price: €1–5/MWh (Tier 3 — RECS International published pricing; RE-Source Platform 2024/25, indicative). At Clonshaugh’s consumption: €31,000–158,000/year for 100% REC coverage. Significantly cheaper than a CPPA but no additionality — the renewable generation already exists.",standard:"EU Directive 2018/2001 (RED II) Article 19 (Guarantees of Origin); AIB (Association of Issuing Bodies)",
          feynman:{analogy:"Think of it like buying a receipt for someone else\'s gym workout. You get the certificate saying ‘1 hour of exercise happened,’ but your fitness hasn\'t improved. The workout already happened without you.",firstPrinciples:"When a wind farm generates 1 MWh, it creates two things: physical electricity (goes into the grid) and a certificate proving it was renewable. These certificates can be sold separately. Buying the certificate lets you claim renewable energy in your carbon report — but the wind farm was already built and running. Your purchase didn\'t cause any new clean energy to exist.",theTest:"You know you understand RECs when you can answer: If every company in Ireland bought RECs for 100% of their electricity, would Ireland\'s actual CO₂ emissions fall? Answer: No — the same physical electricity would flow from the same power stations. RECs reassign credit, they don\'t change the physics."}},
        {term:"On-Site Renewable Generation",definition:"Renewable energy generated on the data centre site — typically rooftop or ground-mounted solar PV.",plain:"Solar panels on the roof. It is genuinely additional, fully within your control, and it reduces both Scope 2 emissions and electricity cost. The limitation: DC roofs are small relative to energy demand. On-site PV typically covers 1–3% of a DC’s total consumption.",number:"Typical DC roof area: 2,000–5,000 m² for a 2.4 MW facility. At 200 Wp/m² and Ireland’s average yield of approximately 950 kWh/kWp/year: 4,000 m² × 200 Wp × 950 kWh/kWp = 760 MWh/year = 2.4% of Clonshaugh’s annual consumption.",standard:"MCS (Microgeneration Certification Scheme); IS EN 62446 (PV system testing)",
          feynman:{analogy:"Think of it like growing vegetables in your back garden. It\'s genuinely yours, it\'s fresh, and you know exactly where it came from — but your garden is small, so it only covers a fraction of what your family eats.",firstPrinciples:"Solar panels convert sunlight into electricity directly on your roof. In Ireland, each kilowatt-peak of panels generates about 950 kWh per year. A data centre roof might fit 800 kWp of panels — generating about 760 MWh/year. But the data centre consumes about 31,500 MWh/year. So rooftop solar covers roughly 2.4% of demand.",theTest:"You know you understand on-site PV when you can answer: Why can\'t Clonshaugh go 100% solar? Answer: The roof is far too small relative to the energy demand — you\'d need approximately 40 times the available roof area to match consumption."}}
      ,
        {
          term:"CRU 80% Renewable Requirement",
          definition:"Under CRU/2025236 (December 2025), new data centres in Ireland with MIC ≥ 1 MVA must source at least 80% of annual electricity demand from additional renewable generation in the Republic of Ireland, with a six-year glide path from energisation.",
          plain:"Ireland's energy regulator now requires new DCs to bring their own renewable energy — not just buy certificates for existing wind farms, but fund new renewable generation. This is additionality baked into connection policy. Existing DCs are not directly captured, but the policy signals the direction of travel.",
          number:"CRU thresholds: < 1 MVA = exempt. 1–10 MVA (Tier A) = autoproducer unit + 80% renewable. > 10 MVA (Tier B) = separately connected dispatchable generation + 80% renewable + SEM participation. Six-year glide path. Non-compliance: System Operators can reduce MIC to the capacity covered by 80% renewable supply.",
          standard:"CRU/2025236 Large Energy Users Connection Policy (December 2025); Electricity Regulation Act 1999 s.14",
          feynman:{analogy:"Think of it like a new housing development required to install its own solar panels and connect to a new wind farm before anyone can move in. The electricity grid is saying: if you want to plug in, you must bring your own clean power source.",firstPrinciples:"Ireland's grid is constrained — DC demand could reach 31% of national electricity by 2034 (EirGrid). The CRU policy prevents new DCs from adding demand without also adding supply. The 80% figure aligns with Climate Action Plan 2025's national 80% renewable target. The six-year glide path acknowledges that building wind or solar farms takes 3–5 years from planning to generation.",theTest:"A new 20 MW DC connects in Dublin in 2027. When must it source 80% from new Irish renewables? Answer: By 2033 (six-year glide path from energisation). In the interim, it must show a credible procurement plan and report annually to System Operators."}
        }
      ,
        {
          term:"Additionality (Renewable Energy)",
          definition:"The principle that renewable energy procurement must fund new generation capacity that would not have been built without the purchaser's commitment. Distinguished from purchasing certificates for existing generation.",
          plain:"Additionality separates credible renewable claims from greenwashing. Buying a guarantee of origin (GO) for wind power that was already generating does nothing for the climate — it just moves a label from one consumer to another. A CPPA that underwrites a new wind farm's construction creates real additional renewable generation.",
          number:"CRU/2025236 explicitly requires additionality: renewable generation that has been or is currently contracted through REFIT, RESS, or ORESS cannot be used to meet the 80% requirement. This eliminates the option of buying surplus GOs from subsidised farms. RE100 guidance similarly distinguishes additionality-verified procurement from certificate-only claims.",
          standard:"CRU/2025236 §4.3; RE100 Technical Criteria 2022; GHG Protocol Scope 2 Guidance — market-based method",
          feynman:{analogy:"Imagine 100 people want to claim they eat organic. If 10 organic farms exist but all 100 buy certificates saying their food is organic, 90 people are eating non-organic food with an organic label. Additionality means you must fund the 11th farm.",firstPrinciples:"The climate benefit of renewable energy depends on whether it displaces fossil generation. If a wind farm was already built and generating, buying its certificate does not cause any additional renewable generation — the wind farm would have run anyway. Only procurement that causes a new project to be financially viable (the CPPA as revenue anchor for project finance) adds renewable capacity to the system.",theTest:"A DC operator buys GOs from an existing RESS-subsidised wind farm to claim 100% renewable. Does this count under CRU/2025236? Answer: No — generation contracted through RESS is explicitly excluded. The operator must contract with a new, additional renewable project."}
        }

        {cause:"Facility signs a 15-year CPPA with a new Irish wind farm (additionality-verified)",effect:"New wind farm is built, adding renewable capacity to the Irish grid. Scope 2 (market-based) reduces. Grid emission factor for all consumers improves marginally. Real emissions reduction occurs.",insight:"Additionality is the gold standard. A CPPA that funds new renewable generation creates genuine carbon benefit. RE100 requires additionality for membership. SFDR Article 9 funds increasingly require additionality-verified renewable procurement."}
      ,
        {cause:"CRU/2025236 requires 80% additional renewable electricity with six-year glide path",effect:"New Irish DCs must now embed renewable procurement into their connection application — not as an afterthought but as a condition of grid access. Existing DCs face no direct obligation, but the policy signals where regulation is heading for the entire sector.",insight:"The word 'additional' is the critical detail. Buying GOs from existing RESS-subsidised wind farms does not qualify — the CRU explicitly excludes generation under existing support mechanisms. This means DCs must sign CPPAs that underwrite new renewable projects, creating genuine additionality. For existing facilities like Clonshaugh, voluntary CPPA procurement now positions the operator ahead of likely future obligations."}
      ],
      constraintLesson:"The constraint in renewable energy procurement for DCs is volume. Clonshaugh consumes approximately 31,500 MWh/year. A 100% CPPA at this volume requires a dedicated wind farm of approximately 10–12 MW capacity (at Irish capacity factor of approximately 30%). Negotiating a CPPA of this size takes 12–24 months.\n\nOn-site PV is simpler but tiny — 2.4% of consumption at best. It is a visible commitment to renewables but not a material decarbonisation measure.\n\nThe practical approach for most Irish DCs: (1) PUE improvement first (reduces the MWh volume), (2) CPPA for 50–80% of consumption (12–18 month procurement), (3) RECs for the remainder (immediate), (4) on-site PV for visible commitment and marginal generation.",
      weakestLink:{

        howToGetThere:"Step 1: Reduce consumption through PUE improvement (DC-LEARN-009). Step 2: Engage a PPA advisory firm to scope CPPA options (12–24 month process). Step 3: Procure RECs for interim coverage. Step 4: Assess on-site PV feasibility. Step 5: Report both market-based and location-based Scope 2."

    rhetoric:{
      declan:{hook:"PPAs are a commercial decision above my pay grade. What I do understand is that the renewable percentage on next year's EED submission will not be 80 percent without one.",text:"Declan here. I do not negotiate PPAs — that is a commercial decision above my pay grade. But I can tell the procurement team exactly how much energy we consume, when we consume it, and how much we could reduce through efficiency. The monitoring data from DC-LEARN-009 sizes the PPA correctly."},
      ann:{hook:"A CPPA is a 10 to 15 year commitment at 50 to 80 euros per MWh. Model the cost against the green financing premium available at exit — they are not comparable in isolation.",text:"Ann speaking. A CPPA is a 10–15 year commitment at €50–80/MWh (Tier 3 — RE-Source Platform; Irish CPPA market benchmarks, indicative). That is a €15–40 million commitment over the contract term. The financial risk is real — if wholesale electricity prices fall below the PPA strike, the facility pays above market. But the carbon reporting benefit is significant, and SFDR Article 9 funds increasingly require additionality-verified renewable procurement."},
      mark:{hook:"On-site PV specification for a DC: south-facing, 15 to 20 degree tilt, 200 Wp per square metre. At Clonshaugh roof area, PV covers approximately 5 to 8 percent of IT load — supplementary, not primary.",text:"Mark here. On-site PV specification for a DC: south-facing, 15–20° tilt, 200 Wp/m² panels, string inverters with DC-side disconnection (IS 10101 Section 712). Grid export requires ESB Networks NC6 application. Self-consumption is optimised by matching PV output to base load — a DC with constant 24/7 demand is ideal."},
      sarah:{hook:"For Scope 2 reporting, the GHG Protocol allows location-based using the SEAI grid factor or market-based using CPPA and Guarantee of Origin. SFDR requires market-based for Article 9 funds.",text:"Sarah here. For Scope 2 reporting, GHG Protocol allows two methods: location-based (grid average factor) and market-based (supplier-specific factor or PPA/REC). Best practice is to report both. A large gap between location-based and market-based figures attracts scrutiny."},

      answer:"[Input assumptions for cost estimates: CPPA price Tier 3 — RE-Source Platform; PV capex Tier 3 — SEAI/BSRIA benchmarks; REC price Tier 3 — RECS International. All cost figures are screening-level estimates, indicative only, subject to detailed procurement.]\n\nStrategy: layered approach over 3 years\n\nYear 1 (2026): Efficiency + interim RECs\n- Complete PUE improvement to 1.20 → consumption falls to approximately 25,200 MWh/year\n- Purchase RECs for 100% interim coverage: approximately €25,000–126,000/year\n- Commission roof PV feasibility study: €10,000\n\nYear 2 (2027): CPPA procurement\n- Engage PPA advisory: €20,000–30,000\n- Negotiate 15-year CPPA for 80% of consumption (20,200 MWh)\n- Install rooftop PV (approximately 800 kWp): capex approximately €600,000\n\nYear 3 (2028): Full coverage\n- CPPA operational: 80% coverage (20,200 MWh)\n- On-site PV: 3% coverage (760 MWh)\n- RECs for remaining 17% (4,240 MWh): approximately €4,000–21,000/year\n\nTotal annual renewable cost (steady state from 2028): approximately €222,500/year\nScope 2 (market-based) falls to near zero. Additionality covers 83% (CPPA + PV).\nSource: RE100 Technical Criteria (T2); GHG Protocol Scope 2 Guidance 2015 (T1); SEAI renewable data (T1); Irish CPPA market data — RE-Source Platform (T3); PV costs — SEAI REFIT/BSRIA (T3); advisory fees — RICS NRM1 (T2). All cost figures screening-level estimates."

  /* ═══ L3: CRREM & Misalignment Risk ═══ */
  {
    id:"L3", level:3, name:"CRREM & Misalignment Risk", icon:"📉",
    component:"Trajectory Risk", available:true,
    clockQuote:"Tom had modelled disposal as the alternative. A buyer's due diligence would find every gap the team had spent six months documenting. The discount was three to five million euros. The retrofit programme cost less than the haircut.",
    userNeedStatement:"When I need to assess whether my DC asset is on a Paris-aligned carbon trajectory, help me understand CRREM methodology, what misalignment means for asset value, and what it takes to realign.",
    plainEnglish:"CRREM tells you whether your building’s carbon intensity is on track to meet climate targets — or whether it will cross the line and become a misaligned asset. For DCs, PUE and grid factor are the two variables that determine the Misalignment Year.",
    grammar:{
      facts:[
        {term:"CRREM (Carbon Risk Real Estate Monitor)",definition:"Science-based tool that projects building-level carbon intensity against Paris-aligned decarbonisation pathways. Buildings that exceed the pathway are flagged as misaligned — exposed to climate transition risk.",plain:"A thermometer for building carbon risk. CRREM draws a line showing the maximum carbon intensity a building can have each year to stay Paris-aligned. If your building crosses that line, it is misaligned — and potentially exposed to regulatory, financial, and reputational risk.",number:"CRREM v2.01 does not include a published data centre pathway. The carbon intensity bands used here are LBE-derived using PUE × grid emission factor methodology (Tier 3/4). For Irish data centres, the expected trajectory descends steeply from approximately 400 kgCO₂/m² in 2020 toward near-zero by 2050. Clonshaugh’s current carbon intensity depends on how floor area is defined — which is a known challenge for DC CRREM application.",standard:"CRREM v2.01 (CRREM Foundation, July 2025); Paris Agreement 1.5°C/2°C pathways",
          feynman:{analogy:"Think of it like a speed limit on a motorway that drops every year. Today the limit is 120 km/h, next year it\'s 100, then 80. If your car can\'t slow down, eventually you\'re speeding — and you get fined. CRREM is the building\'s speed limit for carbon.",firstPrinciples:"The Paris Agreement sets a global carbon budget — a total amount of CO₂ the world can emit and still limit warming. CRREM divides that budget by country and building type, creating a descending pathway — less carbon allowed each year. If your building\'s actual carbon intensity stays above that line, it\'s classified as misaligned — exposed to financial and regulatory risk.",theTest:"You know you understand CRREM when you can answer: If two identical DCs have the same PUE but one has a renewable PPA and the other doesn\'t, which one hits the CRREM pathway sooner? Answer: The one without the PPA — its carbon intensity stays higher because all electricity carries the grid emission factor."}},
        {term:"Misalignment Year",definition:"The year in which a building’s projected carbon intensity exceeds the CRREM decarbonisation pathway. After this year, the building is classified as misaligned and exposed to transition risk.",plain:"The year the building crosses the line. Before the Misalignment Year, the building is on track. After it, the building is behind the curve. For fund managers, misaligned assets attract higher risk weightings and potentially lower valuations.",number:"Clonshaugh at current performance: the Misalignment Year depends on the CRREM pathway used and the carbon intensity metric chosen. At PUE 1.50 and grid factor 0.2241, Clonshaugh may be misaligned already or within 1–2 years — Tier 4 estimate, as CRREM DC pathways are less established than office/retail pathways.",standard:"CRREM v2.01; CRREM Foundation methodology",
          feynman:{analogy:"Think of it like a mortgage fixed rate expiring. Everything is fine while you\'re inside the deal — but the moment your rate resets, your costs jump. The Misalignment Year is when your building\'s carbon ‘rate’ exceeds what investors and regulators will accept.",firstPrinciples:"CRREM draws a line on a chart: years along the bottom, carbon intensity up the side. The line goes down over time. Your building has its own carbon intensity, projected forward. The year where your building\'s line crosses above CRREM\'s line is the Misalignment Year — from that point, the building is behind the curve.",theTest:"You know you understand Misalignment Year when you can answer: Can you push the Misalignment Year further into the future without spending any money? Answer: Possibly — if the national grid gets greener (lower emission factor), your building\'s carbon intensity drops automatically. But you can\'t control that timeline, which is why relying on it is risky."}},
        {term:"Carbon Intensity Metric for DCs",definition:"The choice of denominator in the carbon intensity calculation: kgCO₂ per m² (floor area), per kWh IT, or per MW IT. CRREM traditionally uses kgCO₂/m², but this is problematic for DCs where floor area bears no relationship to energy use.",plain:"A 10,000 m² DC at 50% utilisation and a 10,000 m² DC at 100% utilisation have the same floor area but very different energy use and carbon emissions. Using kgCO₂/m² penalises efficient high-density facilities and rewards empty space.",number:"Industry consensus is moving toward kgCO₂/kWh IT (effectively CUE) as the DC-appropriate carbon intensity metric. CUE = PUE × grid factor. Clonshaugh CUE = 1.50 × 0.2241 = 0.336 kgCO₂/kWh IT. At target PUE 1.20: CUE = 0.269.",standard:"EN 50600-4-8 (CUE); CRREM Foundation DC methodology discussion paper",
          feynman:{analogy:"Think of it like measuring a restaurant\'s efficiency by meals served per square metre versus meals served per chef. A huge empty restaurant looks terrible by floor area but might have brilliant chefs. For data centres, floor area is the wrong ruler — energy per unit of IT work is the right one.",firstPrinciples:"Carbon intensity needs a numerator (carbon emitted) and a denominator (what you got for it). Traditional buildings use kgCO₂ per square metre of floor. But a half-empty DC has the same floor area as a full one with very different energy use. CUE (Carbon Usage Effectiveness) uses kgCO₂ per kWh of IT work instead — directly linking carbon to useful output.",theTest:"You know you understand CUE when you can answer: Clonshaugh CUE = PUE 1.50 × EF 0.2241 = what? Answer: 0.336 kgCO₂/kWh IT. If PUE drops to 1.20, CUE drops to 0.269 — a 20% improvement from efficiency alone."}}
      ,
        {
          term:"CRREM Pathway Assumptions — Data Centres",
          definition:"CRREM v2.01 provides decarbonisation pathways based on Paris-aligned carbon budgets, but the standard pathways use kgCO₂/m² — a metric poorly suited to data centres where energy intensity per square metre is 10–50× a typical office.",
          plain:"CRREM was designed for offices, retail, and residential. A DC on 2,000 m² might consume 31,500 MWh/year — compared to 200 MWh for an office of the same size. The kgCO₂/m² pathway would show a DC as catastrophically misaligned even if its CUE is world-class. This is why DC carbon risk assessment should use CUE as the intensity metric.",
          number:"Comparison: Office at 100 kWh/m²/year × 0.2241 = 22.4 kgCO₂/m². DC at 15,768 kWh/m²/year (31,536 MWh ÷ 2,000 m²) × 0.2241 = 3,531 kgCO₂/m². The CRREM 2030 office pathway target is approximately 25–30 kgCO₂/m². A DC cannot possibly meet that threshold using floor-area normalisation.",
          standard:"CRREM v2.01 (2025); CUE-based DC CRREM methodology derived from PUE × grid emission factor (Tier 3/4 — no published CRREM DC pathway exists)",
          feynman:{analogy:"Measuring a data centre's carbon intensity per square metre is like measuring a Formula 1 car's fuel efficiency on a litres-per-kilometre basis and comparing it to a bicycle. The comparison makes the F1 car look terrible, but the metrics measure completely different things.",firstPrinciples:"CRREM pathways translate a global carbon budget into per-building intensity targets. The budget allocation uses floor area as the denominator because it works for most building types. For DCs, the useful output is not floor space but IT compute capacity — measured in kW of IT load. CUE (kgCO₂/kWh IT) normalises by useful output, making cross-facility comparison meaningful.",theTest:"Two DCs: Facility A has CUE 0.30 on 5,000 m². Facility B has CUE 0.25 on 1,000 m² (high density). On a kgCO₂/m² basis, which looks worse? Answer: Facility B — because it packs more IT load into less floor space. But on CUE, Facility B is more carbon-efficient. This proves why kgCO₂/m² misleads for DCs."}
        }
      ,
        {
          term:"Transition Risk — Financial Quantification",
          definition:"The financial risk that a building's value will decline because its carbon intensity exceeds regulatory or investor-mandated thresholds. Quantified as the capital expenditure required to bring the asset back below the pathway.",
          plain:"Transition risk is not abstract — it has a euro value. For a DC above the CRREM pathway, the transition risk equals the cost of the retrofit programme needed to bring CUE below the pathway. If that cost exceeds the asset's value uplift, the building is economically stranded.",
          number:"Clonshaugh transition risk estimate: At CUE 0.336 (current), Misalignment Year is approximately 2029–2031 depending on pathway. Retrofit cost to reach CUE 0.22 (target PUE 1.20 × projected GEF 0.18): approximately €1.56M capex. Asset value impact of misalignment: 5–15% discount on market value (RICS Sustainability and ESG, 2023 — Tier 2). On a €50M facility, that is €2.5–7.5M at risk.",
          standard:"CRREM v2.01; RICS Sustainability and Commercial Property Valuation (2023); SCSI TPI H2 2025",
          feynman:{analogy:"Transition risk is like a car that fails its NCT. The car still runs, but its market value drops because it needs investment to pass the test. The bigger the gap between current performance and the pass threshold, the larger the discount a buyer applies.",firstPrinciples:"Financial markets price assets based on future cash flows and risks. A DC above the CRREM pathway faces three risk channels: (1) higher insurance premiums, (2) restricted refinancing as lenders apply green lending criteria, and (3) reduced sale price as buyers discount for remediation cost. The transition risk equals the present value of all three channels combined.",theTest:"An investor is offered two identical Dublin DCs — same IT capacity, same rent, same location. DC-A has CUE 0.25 (below pathway). DC-B has CUE 0.40 (above pathway). How should the investor price the difference? Answer: DC-B should be discounted by at least the expected retrofit cost plus a risk premium for regulatory uncertainty."}
        }

      whatItLooksLike:"A CRREM trajectory chart with the x-axis showing years (2020–2050) and the y-axis showing carbon intensity. The CRREM pathway line descends from upper left to lower right. The building’s projected intensity is plotted as a second line. Where the building line crosses above the pathway line is the Misalignment Year.",
      siteChecklist:["Determine which CRREM pathway applies (country: Ireland; property type: data centre)","Calculate current carbon intensity using both kgCO₂/m² and CUE (kgCO₂/kWh IT)","Model future carbon intensity under different PUE and grid factor scenarios","Identify the Misalignment Year under current performance trajectory"]

    logic:{
      causeAndEffect:[
        {cause:"The data centre reduces PUE from 1.50 to 1.20 through containment, setpoint optimisation, and free cooling activation",effect:"CUE improves from 0.336 to 0.269 kgCO₂/kWh IT (20% reduction). Misalignment Year extends by several years. CRREM risk classification improves.",insight:"PUE improvement directly moves the CRREM trajectory. Every 0.01 PUE reduction at Clonshaugh saves approximately 47 tonnes CO₂/year and extends the Misalignment Year. This is the most controllable variable in the CRREM equation."},
        {cause:"Grid emission factor decreases from 0.2241 to 0.15 kgCO₂/kWh (potential 2030 scenario)",effect:"CUE at PUE 1.20 improves from 0.269 to 0.180 kgCO₂/kWh IT. Misalignment Year extends significantly. However, this improvement is outside the operator’s control.",insight:"Grid decarbonisation helps CRREM trajectory but cannot be relied upon as the sole strategy. Operators should model CRREM under both optimistic and conservative grid scenarios."},
        {cause:"An investor uses location-based Scope 2 emission factors for CRREM analysis instead of the required market-based factors",effect:"CUE reflects physical grid intensity (0.2241 at PUE 1.50 = 0.336) regardless of PPA procurement. A facility with a 100% CPPA still shows 0.336 CUE on a location basis. Portfolio appears misaligned even if the operator has decarbonised through renewable procurement.",insight:"CRREM methodology does not yet standardise whether location-based or market-based Scope 2 applies to DCs. In practice, most institutional investors run both. The location-based figure drives PUE improvement; the market-based figure rewards renewable procurement. Report both — the gap between them tells the full story."}
      ],
      constraintLesson:"The fundamental challenge with CRREM for data centres is the metric. CRREM was designed for offices, retail, and residential buildings where kgCO₂/m² is a meaningful measure. In DCs, floor area is a poor proxy for energy demand.\n\nThe emerging consensus is CUE (Carbon Usage Effectiveness = PUE × grid emission factor), measured in kgCO₂/kWh IT. This metric directly reflects the two variables the operator can influence: efficiency (PUE) and energy source (grid factor or PPA).\n\nFor Clonshaugh, both metrics should be calculated and tracked. The kgCO₂/m² metric satisfies traditional CRREM reporting. The CUE metric provides the operationally meaningful trend.",
      weakestLink:{

        whatsRight:"CRREM is increasingly applied to DCs by institutional investors. While kgCO₂/m² is suboptimal for DCs, ignoring CRREM is not an option. Use CUE as the primary operational metric and report kgCO₂/m² alongside it for CRREM compliance.",
        howToGetThere:"Step 1: Calculate current CUE (PUE × grid factor). Step 2: Model CUE trajectory under PUE improvement and grid scenarios. Step 3: Calculate kgCO₂/m² for CRREM reporting. Step 4: Identify Misalignment Year under both metrics. Step 5: Develop realignment strategy if misaligned."

    rhetoric:{
      declan:{hook:"CRREM is an investor tool, not an engineering tool. But the Misalignment Year it produces changes who will bid for this facility at exit — so it is my problem too.",text:"Declan here. CRREM is an investor tool, not an engineering tool. But the numbers it uses come from my metering. If PUE is wrong, CRREM is wrong. The monitoring programme (DC-LEARN-009) gives me the data that feeds into the fund manager’s CRREM model."},
      ann:{hook:"CRREM misalignment is a valuation event. Misaligned assets attract a discount at exit that compounds every year the programme is deferred — it is not a static number.",text:"Ann speaking. CRREM misalignment is a valuation event. Misaligned assets attract 5–15% value haircut in institutional portfolios. For a €50M DC asset (indicative teaching scenario), that is €2.5–7.5M at risk (Tier 2 — RICS Sustainability and ESG Report 2023, 5–15% haircut range). The cost of PUE improvement (€432,500 from DC-LEARN-009) is trivial against the potential value erosion."},
      mark:{hook:"CUE is the engineering metric: CUE equals PUE multiplied by the grid emission factor. At PUE 1.50 and SEAI 2026 factor of 0.2241 kgCO2 per kWh, CUE equals 0.336 kgCO2 per kWh IT.",text:"Mark here. CUE is the engineering metric: CUE = PUE × grid emission factor. At PUE 1.50 and EF 0.2241: CUE = 0.336 kgCO₂/kWh IT. At target PUE 1.20: CUE = 0.269. The engineering actions to improve CUE are the DC-LEARN-009 monitoring and optimisation programme."},
      sarah:{hook:"CRREM alignment is referenced in SFDR reporting, TCFD disclosures, and Green Bond frameworks. The Misalignment Year is the most actionable output of the CRREM analysis.",text:"Sarah here. CRREM alignment is increasingly referenced in SFDR reporting, TCFD disclosures, and green bond frameworks. For DC assets in fund portfolios, the CRREM Misalignment Year is a headline risk metric. Demonstrating a pathway to realignment — even if currently misaligned — is materially better than no pathway at all."},
      tom:{hook:"CRREM misalignment can trigger 5 to 15 percent value adjustment at exit. On a 50 million euro asset, that is 2.5 to 7.5 million euros — a number that makes every retrofit budget look reasonable.",text:"Tom here. CRREM financial impact: misalignment can trigger 5–15% value adjustment (Tier 2 — RICS Sustainability and ESG 2023) on €50M asset (indicative scenario) = €2.5–7.5M risk. PUE improvement cost: €432,500 (DC-LEARN-009 cross-ref, T3 — RICS NRM1/SCSI, indicative). Payback on CRREM risk alone: immediate. This is before counting the €630,000/year energy saving from PUE improvement (cross-ref DC-LEARN-004/009, T3 — 1,200 MWh × €0.12/kWh CRU Q4 2024 — T2, indicative)."}

    scenario:{

      narrative:"The fund’s sustainability team requires a CRREM trajectory assessment for Clonshaugh as part of annual portfolio risk reporting.",

      answer:"CRREM TRAJECTORY — CLONSHAUGH DC\n\nMetric 1: CUE (kgCO₂/kWh IT) — PREFERRED FOR DCs\nCurrent: PUE 1.50 × 0.2241 = 0.336 kgCO₂/kWh IT\nTarget (PUE 1.20): 1.20 × 0.2241 = 0.269 kgCO₂/kWh IT\nWith 80% CPPA: 0.269 × 0.20 = 0.054 kgCO₂/kWh IT (market-based)\n\nMetric 2: kgCO₂/m² (floor area basis)\nAssuming 5,000 m² technical floor area:\nCurrent: 7,063 t ÷ 5,000 m² = 1,413 kgCO₂/m² (extremely high — DC energy intensity)\nThis illustrates why kgCO₂/m² is misleading for DCs.\n\nMisalignment assessment:\nAt current CUE 0.336: LIKELY ALREADY MISALIGNED (Tier 4 — CRREM DC pathways are developing)\nAt target CUE 0.054 (PUE 1.20 + 80% CPPA): LIKELY REALIGNED\n\nRecommendation: Present both metrics. Use CUE as primary. Flag kgCO₂/m² limitation.\nSource: CRREM v2.01; EN 50600-4-8 (CUE); SEAI 2026"

  /* ═══ L4: EU Taxonomy Alignment ═══ */
  {
    id:"L4", level:4, name:"EU Taxonomy Alignment", icon:"🏛️",
    component:"Green Classification", available:true,
    clockQuote:"He'd costed buildings by the square metre for thirty years. This was different. Revenue per rack. Cost per kilowatt cooled. Payback in months, not decades. Tom was thinking in DC economics now, and the numbers were unlike anything he'd seen in commercial property.",
    userNeedStatement:"When I need to determine whether my DC qualifies as a ‘green’ investment under EU Taxonomy, help me understand the technical screening criteria, DNSH requirements, and what it costs to achieve alignment.",
    plainEnglish:"The EU Taxonomy is the classification system that determines whether an economic activity is environmentally sustainable. For DCs, the headline criterion is PUE ≤ 1.3 — but that is necessary, not sufficient. Full alignment requires DNSH compliance across six environmental objectives.",
    grammar:{
      facts:[
        {term:"EU Taxonomy Technical Screening Criteria — Data Centres",definition:"Criteria defined in the EU Taxonomy Delegated Act (Climate Change Mitigation) for data processing, hosting, and related activities to qualify as substantially contributing to climate change mitigation.",plain:"The test your DC must pass to be classified as a ‘green’ investment under EU rules. Pass it, and the asset attracts green financing. Fail it, and it does not — which increasingly affects loan terms and investor appetite.",number:"Headline criterion: PUE ≤ 1.3. Additional criteria: implementation of European Code of Conduct for Data Centre Energy Efficiency (expected practices); assessment of waste heat recovery potential; WUE reporting. These apply to any DC seeking alignment, regardless of build date.",standard:"EU Taxonomy Regulation 2020/852; Delegated Act 2021/2139 (Climate Change Mitigation); European Code of Conduct for DC Energy Efficiency",
          feynman:{analogy:"Think of it like an organic food certification. The farmer must meet specific standards — no pesticides, soil quality, animal welfare — and pass an inspection. Only then can they label their produce ‘organic’ and charge a premium. The EU Taxonomy is the ‘organic’ label for buildings.",firstPrinciples:"The EU created a classification system to define what counts as an environmentally sustainable investment. For data centres, the headline test is PUE ≤ 1.3 — but there are also requirements for waste heat assessment, energy efficiency best practice, and water use reporting. Pass them all, and the asset qualifies for green financing at better rates.",theTest:"You know you understand the Taxonomy criteria when you can answer: Clonshaugh achieves PUE 1.20 — is it automatically Taxonomy-aligned? Answer: No — PUE is necessary but not sufficient. It also needs DNSH compliance, waste heat assessment, Code of Conduct implementation and verification, and WUE reporting."}},
        {term:"PUE ≤ 1.3 Requirement",definition:"The EU Taxonomy requires a PUE at or below 1.3 for data centres to qualify as Taxonomy-aligned. This applies to both new and existing facilities seeking alignment.",plain:"PUE 1.3 is the pass/fail line. Clonshaugh at 1.50 fails. At target 1.20, it passes with margin. The criterion applies to all DCs — not just new builds from a specific date.",number:"Clonshaugh current PUE 1.50: FAILS (0.20 above threshold). Target PUE 1.20: PASSES (0.10 below threshold). The monitoring programme (DC-LEARN-009) is the path from fail to pass.",standard:"Delegated Act 2021/2139 Annex I Section 8.1",
          feynman:{analogy:"Think of it like a pass mark on an exam. Below 1.3, you pass. Above 1.3, you fail. It doesn\'t matter how close you are — 1.31 fails just as clearly as 2.0. And passing the exam doesn\'t guarantee you the job — there are other interviews to pass too.",firstPrinciples:"PUE measures how much extra energy a data centre uses beyond what the computers need. A PUE of 1.0 means zero overhead (impossible in practice). A PUE of 1.3 means 30% overhead for cooling and power distribution. The EU Taxonomy draws the line at 1.3 — any DC above this threshold cannot be classified as a green investment, regardless of other merits.",theTest:"You know you understand PUE ≤ 1.3 when you can answer: Clonshaugh is at PUE 1.50 today. How much overhead energy must be eliminated to reach 1.3? Answer: PUE must drop by 0.20, meaning cooling and distribution overhead must be cut from 50% to 30% of IT load — achievable through the DC-LEARN-009 monitoring programme."}},
        {term:"Do No Significant Harm (DNSH)",definition:"EU Taxonomy requirement that a qualifying activity must not significantly harm any of the other five environmental objectives: climate adaptation, water, circular economy, pollution, and biodiversity.",plain:"Meeting PUE ≤ 1.3 is necessary but not sufficient. The activity must also not harm water resources (WUE), must consider equipment lifecycle (circular economy), must manage pollution (refrigerant leakage), and must assess biodiversity impact.",number:"DNSH requires: climate adaptation risk assessment, water use assessment and minimisation, circular economy provisions for IT equipment, pollution prevention (F-Gas compliance), and biodiversity impact screening.",standard:"EU Taxonomy Regulation 2020/852 Article 17; Delegated Act 2021/2139 Annex I",
          feynman:{analogy:"Think of it like a doctor\'s oath: first, do no harm. It\'s not enough to cure one disease if your treatment poisons the patient\'s liver. The Taxonomy says it\'s not enough to be energy-efficient if you\'re wasting water, dumping e-waste, or ignoring flood risk.",firstPrinciples:"The EU Taxonomy has six environmental objectives: climate mitigation, climate adaptation, water, circular economy, pollution, and biodiversity. Meeting one objective (PUE ≤ 1.3 for climate mitigation) only counts if you\'re not significantly harming the other five. Each objective has its own evidence requirement — assessments, policies, and data.",theTest:"You know you understand DNSH when you can answer: A DC meets PUE 1.3 but has never assessed its flood risk or measured its water use. Is it Taxonomy-aligned? Answer: No — missing DNSH assessments for climate adaptation and water means alignment cannot be claimed, regardless of PUE performance."}}
      ,
        {
          term:"EED Article 12 — Data Centre Reporting",
          definition:"Under the Energy Efficiency Directive (recast 2023), data centres with installed IT power demand ≥ 500 kW must report energy performance data annually to the European Database on Data Centres.",
          plain:"The EU now requires DC operators to measure and publish their energy performance. This is not voluntary — Delegated Regulation 2024/1364 is directly effective in all EU member states, including Ireland. The reported KPIs include PUE, WUE, energy reuse factor, and renewable energy factor. The data is published at EU and country level.",
          number:"Reporting thresholds: ≥ 500 kW installed IT power demand. Deadline: 15 May annually (from 2025 onward, covering prior calendar year). Clonshaugh at 2,400 kW IT is well above threshold. KPIs required: PUE, WUE, REF (Renewable Energy Factor), ERF (Energy Reuse Factor). First Irish-relevant deadline was 15 May 2025 (EED not yet transposed in Ireland at time of Regulation's adoption — but Regulation is directly effective).",
          standard:"EED 2023/1791 Article 12; Delegated Regulation 2024/1364; Annex VII EED",
          feynman:{analogy:"EED reporting is like a building's annual energy rating being published online for anyone to see. Just as a BER label lets home buyers compare energy performance, the European Database lets investors and regulators compare DC energy efficiency across the continent.",firstPrinciples:"The EU wants transparency to drive competition on efficiency. If DC operators must publish their PUE, the worst performers face market pressure to improve — tenants choose more efficient facilities, lenders favour lower-risk assets. The 500 kW threshold captures virtually all commercial DCs while exempting small server rooms.",theTest:"Clonshaugh reports PUE 1.50 to the European Database. A competing Dublin DC reports PUE 1.25. What market impact does this create? Answer: Tenants and investors can now compare directly. Clonshaugh faces pressure to improve or accept lower rents and higher financing costs."}
        }
      ,
        {
          term:"European Code of Conduct for DC Energy Efficiency",
          definition:"A voluntary best-practice framework managed by the EU Joint Research Centre (JRC) in Ispra, covering IT equipment, cooling, power distribution, building design, and monitoring. Participants self-assess against a checklist of expected and optional practices.",
          plain:"The Code of Conduct is the EU's best-practice guide for DC efficiency — it is voluntary now but is referenced in the Taxonomy as evidence of engagement with efficiency improvement. Signing up commits the operator to annual self-assessment and reporting of practices adopted.",
          number:"The Code covers approximately 150 practices across 5 categories. Expected practices are considered baseline good practice; optional practices represent best-in-class. Participation is free. Annual reporting to JRC. Referenced in EU Taxonomy Delegated Act 2021/2139 as supporting evidence for substantial contribution to climate change mitigation.",
          standard:"EU Code of Conduct on Data Centre Energy Efficiency (JRC, 2025 edition); EU Taxonomy Delegated Act 2021/2139",
          feynman:{analogy:"The Code of Conduct is like an ISO management system but lighter — it is a checklist of best practices rather than a certification. Think of it as a gym membership for your DC: joining commits you to showing up and tracking your progress, but nobody forces you to lift heavier weights.",firstPrinciples:"Efficiency improvement requires structured self-assessment. The Code of Conduct provides the structure: assess current practices, identify gaps, implement improvements, report progress. The voluntary nature keeps participation low-friction, while the EU Taxonomy reference creates a commercial incentive to participate.",theTest:"An operator claims Taxonomy alignment but has not participated in the Code of Conduct. Is this a problem? Answer: Not a hard failure — participation is voluntary — but it weakens the evidence base for demonstrating engagement with efficiency improvement, which the Taxonomy expects."}
        }

      siteChecklist:["Verify current PUE against 1.3 threshold","Check European Code of Conduct for Data Centres — has the facility registered?","Has a waste heat recovery feasibility assessment been conducted?","Can the facility report WUE? (Requires water metering if water-based cooling)"]

        {cause:"A facility registers with the European Code of Conduct for Data Centre Energy Efficiency and commits to annual reporting",effect:"Demonstrates commitment to best practice energy management. The Code of Conduct is referenced in the Taxonomy Delegated Act as an expected practice. Registration is free.",insight:"The Code of Conduct is free to register and provides a structured framework for energy efficiency improvement. It is a low-cost, high-signalling-value step."}
      ,
        {cause:"Operator achieves PUE ≤ 1.3 and registers for Code of Conduct but has not completed climate adaptation risk assessment",effect:"Taxonomy alignment fails at DNSH — climate adaptation requires a physical climate risk assessment per ISO 14090 covering acute risks (flooding, storms) and chronic risks (rising temperatures affecting cooling capacity). PUE alone, even at world-class levels, does not address adaptation.",insight:"This is the most commonly underestimated Taxonomy requirement for DC operators. Engineers focus on PUE because it is measurable and within their control. But climate adaptation is a separate environmental objective — and in Dublin, with increasing flood risk from the Liffey/Tolka catchments and rising summer temperatures, the adaptation assessment is not merely paperwork."}
      ],
      constraintLesson:"The constraint in Taxonomy alignment is the breadth of requirements. Operators tend to fixate on PUE because it is the most quantifiable criterion. But the DNSH requirements span six environmental objectives, each with its own documentation burden.\n\nFor Clonshaugh, the pragmatic approach is: (1) achieve PUE ≤ 1.3, (2) register with the Code of Conduct, (3) commission a waste heat recovery feasibility study (L6), (4) install water metering, (5) document equipment lifecycle policy (L8), (6) document F-Gas log compliance (DC-LEARN-007), (7) commission a climate adaptation risk screening.\n\nThe total cost of DNSH documentation is modest — approximately €20,000–40,000 (Tier 3 — RICS NRM1 fee benchmarks, indicative) in consultancy fees — but the lead time is 6–12 months. Start early.",
      weakestLink:{
        whatsWrong:"We meet PUE ≤ 1.3 — we are Taxonomy-aligned.",
        whatsRight:"PUE ≤ 1.3 is necessary but not sufficient. Full Taxonomy alignment requires DNSH compliance across all six environmental objectives, a waste heat recovery assessment, WUE reporting, and implementation of the European Code of Conduct.",
        howToGetThere:"Step 1: Achieve PUE ≤ 1.3 (DC-LEARN-009). Step 2: Register with Code of Conduct. Step 3: Commission waste heat feasibility (L6). Step 4: Install water metering and report WUE. Step 5: Document equipment lifecycle policy (L8). Step 6: Complete DNSH assessments. Step 7: Compile alignment evidence file for auditor."
      }
    },
    rhetoric:{
      declan:{hook:"PUE 1.3 is achievable — the DC-LEARN monitoring programme gets us there. But the Taxonomy requires metered evidence, not an engineering estimate.",text:"Declan here. PUE 1.3 is achievable — the DC-LEARN-009 monitoring programme gets us to 1.20. What I did not realise is the Taxonomy also asks about waste heat, water use, and equipment disposal. Those are not things I track today. I need to start measuring and documenting."},
      ann:{hook:"Taxonomy alignment is a financing differentiator. Green bonds, sustainability-linked loans, and Article 9 fund eligibility all depend on it — and the premium is measurable in basis points.",text:"Ann speaking. Taxonomy alignment is a financing differentiator. Green bonds, sustainability-linked loans, and EU Green Deal funding all reference the Taxonomy. A Taxonomy-aligned DC asset attracts 20–50 basis points lower financing cost. At Clonshaugh’s scale, that is potentially €50,000–100,000/year in financing cost savings (Tier 3 — ICMA Green Bond Principles; LSEG green lending benchmarks 2024, indicative)."},
      mark:{hook:"Engineering actions for Taxonomy: PUE metering to EN 50600-4-2 Category 2, CPPA for 50 percent REF with additionality, water metering for WUE, and documented F-Gas management plan.",text:"Mark here. The engineering actions for Taxonomy alignment: PUE metering to EN 50600-4-2 Category 2 minimum, waste heat temperature and flow measurement, water metering to EN 50600-4-9, F-Gas leak detection and reporting (EN 378), and equipment asset register with lifecycle tracking."},
      sarah:{hook:"Taxonomy alignment is reported as a percentage of revenue, capex, or opex depending on the fund structure. A DC that achieves alignment converts a binary compliance question into a positive disclosure.",text:"Sarah here. Taxonomy alignment is reported as a percentage of revenue, capex, or opex in the entity’s annual accounts (for NFRD/CSRD reporting entities). Misreporting alignment attracts regulatory scrutiny under the Taxonomy Regulation Article 8."},
      tom:{hook:"Full Taxonomy alignment programme at Clonshaugh: PUE metering 25 thousand, CPPA advisory 15 thousand, water meter 5 thousand, F-Gas management 10 thousand. Total 55 thousand to achieve alignment.",text:"Tom here. Cost to achieve full Taxonomy alignment at Clonshaugh: PUE programme (DC-LEARN-009): €432,500 (cross-ref T3 — RICS NRM1/SCSI benchmarks, indicative). DNSH assessments and documentation: €20,000–40,000 (Tier 3 — RICS NRM1 fee benchmarks, indicative). Waste heat feasibility study: €15,000–25,000 (Tier 3 — Codema/RICS NRM1; EN 50600-4-7 scope, indicative). Water metering: €2,000–5,000 (Tier 3 — EN 50600-4-9; MID-approved meter manufacturer data, indicative). Code of Conduct implementation and verification: administrative cost only. Total beyond DC-LEARN-009: approximately €37,000–70,000. The financing cost benefit (20–50 bps — Tier 3 — ICMA Green Bond Principles; European green lending benchmarks 2024, indicative) on a €50M asset value (indicative scenario) = €100,000–250,000/year. Payback is immediate."}
    },
    scenario:{
      title:"The Taxonomy Alignment Audit",
      narrative:"An external auditor is reviewing Clonshaugh’s EU Taxonomy alignment claim for the fund’s annual sustainability report.",
      question:"What evidence does the auditor need, and what gaps exist today?",
      answer:"Auditor evidence requirements and Clonshaugh status:\n\n1. PUE ≤ 1.3: FAIL today (PUE 1.50). Target 1.20 achievable through DC-LEARN-009.\n2. European Code of Conduct: NOT REGISTERED. Action: register (free, 1 week).\n3. Waste heat recovery assessment: NOT DONE. Action: commission feasibility study (€15,000–25,000).\n4. WUE reporting: NOT MEASURABLE (no water metering). Action: install meter (€2,000–5,000).\n5. DNSH — Climate Adaptation: NOT ASSESSED. Action: commission physical risk screening (€5,000–10,000 — Tier 3 — RICS Climate Risk Assessment; TCFD scenario analysis scope, indicative).\n6. DNSH — Water: NOT DOCUMENTED. Addressed by item 4.\n7. DNSH — Circular Economy: NOT DOCUMENTED. Action: draft policy (L8).\n8. DNSH — Pollution: PARTIALLY (F-Gas log exists but not Taxonomy-formatted).\n9. DNSH — Biodiversity: NOT ASSESSED. Action: desk-based ecological screening (€3,000–5,000).\n\nTimeline to full alignment: 18–24 months. Cost beyond monitoring: approximately €37,000–70,000.\nSource: EU Taxonomy Regulation 2020/852; Delegated Act 2021/2139"
