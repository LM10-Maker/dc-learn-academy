<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">

<title>DC-AI-001 v4.0.0 | Data Centre Power Density | Legacy Business Engineers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent);background:var(--surface)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.dc-story-body{font-size:17px;line-height:1.9;color:var(--text)}
.dc-story-body p{margin-bottom:22px !important;font-size:17px;line-height:1.9}
.dc-story-body h2{font-family:Georgia,"Times New Roman",serif !important;font-size:26px !important;font-weight:400 !important;color:var(--text-bright) !important;margin-bottom:28px !important;text-align:center;letter-spacing:0.3px}
.dc-story-body h3{font-family:Georgia,"Times New Roman",serif !important;font-size:19px !important;font-weight:500 !important;color:var(--text-bright) !important;margin:36px 0 16px !important}
.dc-story-body blockquote{margin:32px 0 !important;padding:18px 24px 18px 28px !important;border-left:3px solid var(--green) !important;background:var(--green-dim) !important;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.dc-story-body blockquote p{margin-bottom:0 !important}
.dc-story-body hr{margin:36px auto !important;width:80px;border:none !important;border-top:1px solid var(--border-light) !important}
.dc-story-body em{font-style:italic}
.dc-story-body strong{color:var(--text-bright)}
.dc-story-body .dc-story-dropcap::first-letter{float:left;font-family:Georgia,"Times New Roman",serif;font-size:68px;line-height:0.85;padding-right:10px;padding-top:4px;color:var(--green);font-weight:400}
@media(max-width:600px){.dc-authbtn-dropdown{position:fixed !important;top:68px !important;left:12px !important;right:12px !important;min-width:0 !important;width:auto !important}}
</style>
</head>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-AI-001 v4.0.0</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

    "cascadeCheck": "function(inputs) {\n  const targetKW = inputs.targetKW || 15;\n  const pduPhase = inputs.pduPhase || 1;\n  const pduAmps = inputs.pduAmps || 32;\n  const voltage = inputs.voltage || 230;\n  const feeds = inputs.feeds || 2;\n  const containmentInstalled = inputs.containmentInstalled || false;\n\n  var maxPerFeed;\n  if (pduPhase === 1) {\n    maxPerFeed = (pduAmps * voltage) / 1000;\n  } else {\n    maxPerFeed = (pduAmps * voltage * 1.732) / 1000;\n  }\n  const totalPDUCapacity = maxPerFeed * feeds;\n  const thermalOK = containmentInstalled;\n  const powerOK = totalPDUCapacity >= targetKW;\n\n  if (!thermalOK && !powerOK) {\n    return { pass: false, reason: 'Neither thermal capacity (no containment) nor power capacity (' + totalPDUCapacity.toFixed(1) + ' kW PDU max vs ' + targetKW + ' kW target) is sufficient.' };\n  } else if (!thermalOK) {\n    return { pass: false, reason: 'Containment not installed — thermal capacity insufficient for ' + targetKW + ' kW/rack even though PDU capacity (' + totalPDUCapacity.toFixed(1) + ' kW) is adequate.' };\n  } else if (!powerOK) {\n    return { pass: false, reason: 'Containment installed but PDU capacity (' + totalPDUCapacity.toFixed(1) + ' kW max) is below target ' + targetKW + ' kW/rack. PDU upgrade required.' };\n  }\n  return { pass: true, reason: 'Both containment (thermal) and PDU capacity (' + totalPDUCapacity.toFixed(1) + ' kW) support target density of ' + targetKW + ' kW/rack.' };\n}\n"

  "L1": [
    {term:"Rack Power Density",analogy:"Think of rack density like parking spaces. A car park designed for small hatchbacks has tight spaces, narrow ramps, and light structural loading. You cannot park SUVs in it without scraping walls and cracking floors. Legacy data centres were built for hatchback-class servers — modest power, modest heat. AI servers are articulated lorries trying to park in the same spaces.",firstPrinciples:"Every watt consumed by IT equipment becomes a watt of heat. The power delivery chain (cabling, switchboards, PDUs) and the heat removal chain (fans, chillers, pipes) were both sized for the original design density. EN 50600-2-2:2019 §6.2 requires the power distribution to be designed for the planned power density per rack position. If the plan was 8 kW, the infrastructure ceiling is 8 kW — regardless of what the server manufacturer ships.",theTest:"If someone asks you what rack power density means, can you explain why a 2013 facility at 8 kW/rack cannot simply install 40 kW servers without changing anything else?"},
    {term:"Nameplate Rating vs Actual Draw",analogy:"Like the difference between a property's rateable floor area and the space actually occupied by tenants. The landlord pays rates on the full area, but only collects rent on occupied space. The gap is stranded capacity — it exists on paper but generates no return. In a data centre, nameplate is the rated area; actual draw is the occupied space.",firstPrinciples:"IS 10101:2020+AC2:2025 §433 requires circuits to be designed for the rated current (nameplate) of connected loads. But servers typically draw 40–60% of nameplate under normal operation. The infrastructure is sized for the maximum that could happen, not the average that does happen. This creates a gap — a facility with 2.4 MW nameplate may only draw 1.6 MW. That 800 kW delta is theoretically available but locked behind distribution constraints.",theTest:"Can you explain to a board why 40% spare capacity on the electricity bill does not mean 40% spare capacity for new AI servers?"},
    {term:"Power Usage Effectiveness (PUE)",analogy:"PUE is the management fee on your electricity bill. If your fund charges a 1.5% management fee, for every €1 of gross return, €0.50 goes to running the fund and €1.00 reaches the investor. A PUE of 1.50 means the same thing — for every €1 of electricity that powers servers, €0.50 powers everything else. The lower the fee, the more efficient the operation.",firstPrinciples:"PUE = Total facility energy ÷ IT equipment energy (ISO/IEC 30134-2:2026). It is a dimensionless ratio always ≥1.0. The EU Taxonomy Climate Delegated Act 2021/2139 §8.1 sets a PUE threshold of ≤1.3 for data centres to qualify as environmentally sustainable activities. At PUE 1.50, Clonshaugh spends €0.50 on overhead for every €1.00 on compute. The difference between 1.50 and 1.20 at 2.4 MW IT is approximately €760,000 per year in energy cost.",theTest:"If a colleague says 'our PUE is 1.50, that's fine,' can you explain in euros what the gap to 1.30 costs annually and why it matters for Taxonomy reporting?"},
    {term:"Maximum Import Capacity (MIC)",analogy:"MIC is the water pressure at the mains stopcock. You can install as many taps as you want inside the house, but the total flow is limited by the pipe from the street. To get more water pressure, you need the utility to upgrade the mains connection — and that takes 18 to 36 months and costs €500K to €2M+. In a data centre, MIC is measured in kVA and is contractually fixed with ESB Networks.",firstPrinciples:"MIC defines the maximum power a facility can draw from the electricity grid under its connection agreement with ESB Networks. It is measured in kVA (kilovolt-amperes), not kW, because it includes both real power (kW) and reactive power (kVAr). Required MIC = IT Load × PUE ÷ Power Factor. Exceeding MIC triggers contractual penalties or disconnection. At Clonshaugh: 2,400 kW × 1.50 ÷ 0.85 = 4,235 kVA against a 5,000 kVA MIC — 85% utilisation, leaving only 765 kVA headroom.",theTest:"Can you calculate whether a proposed AI deployment fits within the existing MIC, and if not, what the timeline and cost implications are?"},
    {term:"Power Distribution Unit (PDU)",analogy:"A PDU is the last junction box before the server — like the fuse board in a rented apartment. Each apartment has its own fuse board sized for domestic appliances. If a tenant installs an industrial oven, the fuse board trips. In a data centre, the PDU is sized for legacy servers. AI servers draw 5× the current, and the PDU physically cannot deliver it.",firstPrinciples:"Rack-mounted PDUs transform and distribute power from the floor distribution to individual server power supply units. A typical legacy dual-feed configuration is 2 × 32A single-phase at 230V, giving a theoretical maximum of 14.7 kW per rack. At AI densities of 40–135 kW, this is insufficient by a factor of 3–9×. PDU replacement is a per-rack cost (€2,000–€5,000 per rack, indicative) but must be coordinated with upstream distribution upgrades.",theTest:"If the CTO says 'we have dual-feed PDUs so we're redundant,' can you explain why dual-feed does not mean adequate capacity for AI workloads?"}
  ],
  "L2": [
    {term:"Hot Aisle Containment (HAC)",analogy:"Containment is like installing proper draught-proofing in a listed building. Without it, you are heating the rooms and the hallways simultaneously — wasting energy on spaces nobody occupies. With containment, you direct all the warm air to where the extraction system can capture it efficiently. In data centres, the 'hallway' is the space above the racks where hot and cold air mix uselessly.",firstPrinciples:"Hot aisle containment physically separates the server exhaust air (35–45°C) from the cold supply air (18–27°C per ASHRAE A1). Without containment, hot exhaust recirculates to server inlets, raising inlet temperature and forcing CRAH units to overcool. Containment typically recovers 30–50% of wasted cooling capacity by eliminating bypass and recirculation. At Clonshaugh, containment could increase effective cooling from 8 kW/rack to approximately 12–15 kW/rack with no additional CRAH investment.",theTest:"Can you explain why a facility without containment is wasting 30–50% of its cooling budget, and what the payback period on containment installation looks like?"},
    {term:"Delta-T (ΔT)",analogy:"ΔT is the temperature 'profit margin' on your cooling system. If you buy cold air at 15°C and sell hot air at 35°C, your margin is 20°C. A margin of only 11°C means your cooling is working twice as hard for the same result — like a retailer selling at near-cost. You want the widest margin the equipment can tolerate.",firstPrinciples:"Heat removed = mass flow rate × specific heat capacity × ΔT. For a fixed airflow, doubling the ΔT doubles the heat removed. Containment increases ΔT by preventing mixing. A pre-containment ΔT of 11°C rising to 20°C post-containment means 82% more heat removal from the same CRAH fleet. This is the single most capital-efficient intervention in most legacy cooling systems.",theTest:"If the ops team reports a ΔT of 8°C across the CRAH units, can you explain what is happening physically and what it means for the cooling budget?"},
    {term:"Blanking Panel",analogy:"Blanking panels are like plugging the holes in a colander. If you are trying to fill a colander with water, every open hole lets water escape before it reaches the top. In a server rack, every empty slot lets cold air bypass the servers and enter the hot aisle without doing any cooling work. The blanking panel is a €5 plastic plug that prevents thousands of euros in wasted cooling.",firstPrinciples:"An open 1U rack slot allows approximately 100 CFM of cold air to bypass the servers. In a 42U rack with 10 empty slots, 25–30% of supply air performs no cooling. At scale, this wastes €15,000–€30,000 per year in a 400-rack facility. Blanking panels are the highest-ROI intervention in any data centre — €2,000 total investment, payback measured in weeks.",theTest:"Can you explain why a €5 plastic panel is one of the highest-ROI investments in data centre operations?"},
    {term:"Computational Fluid Dynamics (CFD)",analogy:"CFD is the wind tunnel test for your data centre. Just as an architect tests a skyscraper model in a wind tunnel before construction, CFD simulates how air moves through the server hall before you spend money on cooling changes. It reveals where hot spots will form, where cold air is wasted, and whether a proposed layout will actually work — all for the cost of a few days of engineering time.",firstPrinciples:"CFD numerically solves the Navier-Stokes equations for fluid flow and heat transfer within the data hall geometry. It predicts temperature distribution, airflow velocity, and pressure differentials at every point in the space. For retrofit planning, CFD answers three critical questions: (1) will the proposed rack layout create thermal hotspots?, (2) can the existing CRAH fleet maintain temperatures at the target density?, (3) where would additional cooling have maximum effect for maximum effect?",theTest:"Can you explain why you would commission a €15K CFD study before committing to a €2M cooling upgrade, and what specific questions it answers?"},
    {term:"Cooling Redundancy (N+1)",analogy:"N+1 cooling is like having a spare tyre in the boot. You need four tyres to drive (N), but you carry a fifth (+1) so that a single puncture does not strand you. In cooling, if you need 12 CRAH units to handle the heat load, N+1 means installing 13 — so one can fail or be maintained without overheating the hall. Without N+1, planned maintenance means planned risk.",firstPrinciples:"N+1 redundancy means installing one additional cooling unit beyond the minimum required to handle the design heat load. If the design load requires N units, N+1 provides for the loss of any single unit without exceeding thermal limits. For data centres, losing cooling is more immediately dangerous than losing power — UPS batteries provide minutes of ride-through for power failures, but thermal mass provides only seconds to minutes before server temperatures exceed safe limits.",theTest:"If the facility has 12 CRAH units and the ops team says 'we have plenty of cooling,' can you explain what question to ask about redundancy and why the answer matters?"}
  ],
  "L3": [
    {term:"Volumetric Heat Capacity",analogy:"Imagine carrying heat in buckets. Water buckets are large and heavy — each one carries a lot of heat. Air buckets are tiny paper cups — you need 3,450 of them to carry the same heat as one water bucket. That is the fundamental physics reason why air cooling hits a ceiling and liquid cooling does not. You cannot make the paper cups bigger — only switch to proper buckets.",firstPrinciples:"Volumetric heat capacity of air is approximately 1.21 kJ/m³·K. Water is approximately 4,180 kJ/m³·K — 3,450× higher. This is an intrinsic physical property that cannot be engineered away. To remove 35 kW of heat at a 20°C ΔT, air requires 1.45 m³/s of flow per rack. The energy to move that volume of air (fan power) scales with the cube of the flow rate — doubling the heat removal requires 8× the fan energy.",theTest:"Can you explain to a non-engineer why air cooling has a physics ceiling at roughly 40 kW per rack, using a simple analogy they would understand?"},
    {term:"ASHRAE Class H1",analogy:"ASHRAE H1 is the speed limit for data centre temperatures. Just as a motorway has a posted speed limit that balances safety against utility, ASHRAE H1 defines the allowable temperature and humidity range that server manufacturers guarantee their equipment will operate within. Exceed the limit, and your servers may slow down, shut down, or fail — and the manufacturer's warranty does not cover it.",firstPrinciples:"ASHRAE Technical Committee 9.9 defines equipment environment classes. Class A1 (the most common) allows inlet temperatures of 15–32°C. Class H1 (high-density environments) allows 5–25°C with tighter humidity control. At air-cooled densities above 20 kW/rack, vertical temperature stratification within the rack means top-of-rack inlet temperatures can exceed the class limit even when the supply air meets specification. This is the practical expression of the air ceiling.",theTest:"If the CTO says 'our supply air is 20°C so we are within ASHRAE limits,' can you explain why the supply temperature is not the same as the server inlet temperature at high density?"},
    {term:"Fan Energy Penalty",analogy:"Fan energy is the tax on air cooling that increases faster than the income. If you earn €100K and pay 20% tax, you keep €80K. But if your income doubles to €200K and the tax rate quadruples to 80%, you keep only €40K — less than before. Fan power works the same way: doubling the cooling demand does not double the fan energy — it multiplies it by eight. At some point, the tax exceeds the income.",firstPrinciples:"Fan affinity laws state that power scales with the cube of airflow: P₂ = P₁ × (Q₂/Q₁)³. At 8 kW/rack, fan power is approximately 0.3 kW/rack. At 35 kW/rack, the required airflow increases by a factor of 4.35×, and fan power increases by 4.35³ = 82× to approximately 12.3 kW/rack. At 35 kW, fan power alone is 35% of the IT load — making the PUE contribution from fans approximately 0.35, which pushes total PUE above 1.5 from fans alone.",theTest:"Can you explain why the cost of air cooling does not increase linearly with rack power, and at what density the economics become irrational?"},
    {term:"Acoustic Limit",analogy:"The acoustic limit is the noise curfew on your cooling system. Just as a nightclub faces noise complaints from neighbours and ultimately a closure order if it exceeds permitted levels, a data centre with high-speed fans faces occupational health obligations under Irish law. At AI densities, the fans are so loud that staff cannot safely work on the data hall floor without hearing protection — and that changes the operational model.",firstPrinciples:"S.I. No. 299 of 2007 (Safety, Health and Welfare at Work (General Application) (Amendment) (No. 3) Regulations 2007) sets the lower exposure action value at 80 dB(A) and the upper value at 85 dB(A). At 35 kW/rack air-cooled, predicted noise from the required airflow velocity is 82–86 dB(A), triggering mandatory hearing protection and health surveillance obligations. This is not a design preference — it is a legal compliance threshold that constrains how the facility can be operated.",theTest:"If the ops manager says 'we can push to 35 kW with bigger fans,' can you explain the specific Irish regulation that creates a ceiling on fan-driven cooling?"},
    {term:"Thermal Throttling",analogy:"Thermal throttling is like a car's engine management system cutting power on a hot day to prevent overheating. The car still moves, but at reduced performance. GPUs do the same — when temperatures exceed safe limits, the chip automatically reduces its processing speed to generate less heat. Your client is paying for 100% compute but receiving 70%. The server is not broken — it is protecting itself from the building's inadequate cooling.",firstPrinciples:"Modern GPUs implement dynamic voltage and frequency scaling (DVFS) tied to junction temperature. NVIDIA GPUs begin throttling at approximately 83°C junction temperature. In an air-cooled environment at 35 kW/rack with vertical temperature stratification, the top third of GPUs in a rack may throttle during peak workload periods, reducing compute output by 15–30% while still drawing nearly full power. The economic impact is significant: the facility bills for the full rack power but delivers reduced compute capacity.",theTest:"Can you explain why a data centre that bills per-kilowatt but delivers throttled compute is effectively overcharging its tenants, and how this creates a lease risk?"}
  ],
  "L4": [
    {term:"Total Cost of Ownership (TCO)",analogy:"TCO is the difference between the sticker price and the cost of owning the car for 10 years. A cheaper car with poor fuel economy and expensive servicing can cost more over 10 years than a premium car with low running costs. The same logic applies to cooling: air cooling is cheaper to install but vastly more expensive to run at high density. The sticker price misleads; TCO reveals.",firstPrinciples:"TCO encompasses capital expenditure, operating expenditure (primarily energy), maintenance, space utilisation, and end-of-life costs over the system's full lifecycle. EN 50600-1:2019 §5 requires business impact analysis that considers TCO for data centre infrastructure decisions. At 25–30 kW/rack, the TCO crossover occurs — the cubic scaling of fan energy causes air cooling opex to exceed DLC opex, even after accounting for the higher DLC capital premium.",theTest:"If a fund manager asks 'why spend €5M on liquid cooling when air costs €2M,' can you explain the TCO argument in numbers they can put in a board paper?"},
    {term:"Direct-to-Chip Cooling (DLC)",analogy:"DLC is the difference between cooling a room with open windows and cooling a laptop with its internal heat pipe. Open windows (air cooling) move heat away from the general area. The heat pipe (DLC) touches the hot component directly and carries heat away through a sealed liquid loop. At low heat loads, open windows work. At high heat loads, only direct contact is efficient enough.",firstPrinciples:"DLC circulates liquid coolant through cold plates mounted directly on heat-generating components (GPUs, CPUs). The liquid absorbs heat at the chip surface and transports it via a sealed loop to a coolant distribution unit (CDU), which rejects the heat to the building cooling system. Because liquid has 3,450× the volumetric heat capacity of air, DLC achieves the same heat removal with vastly less fluid volume and near-zero fan energy at the rack level.",theTest:"Can you explain in one sentence why liquid cooling works where air cooling fails, and why the explanation has nothing to do with engineering preference — it is physics?"},
    {term:"Coolant Distribution Unit (CDU)",analogy:"The CDU is the heat exchanger at the boundary between the IT world and the building world — like the meter box between your electricity supply and your internal wiring. It separates two systems that need to work together but must not contaminate each other. Building water stays on the building side. IT coolant stays on the IT side. The CDU transfers heat between them without mixing the two.",firstPrinciples:"CDUs contain a plate heat exchanger that transfers heat between the secondary loop (IT-side coolant) and the primary loop (building chilled water or condenser water). Each CDU typically provides 300–500 kW of cooling capacity. For a 50-rack zone at 100 kW, 10 active CDUs are required plus 1 for N+1 redundancy = 11 CDUs. CDU plant requires dedicated floor space (approximately 15–25 m² for 11 units), structural support, and piping connections to both loops.",theTest:"If someone says 'we just need to add some liquid cooling,' can you explain the CDU infrastructure that sits behind it and what space, power, and redundancy it requires?"},
    {term:"Hybrid Cooling Architecture",analogy:"Hybrid cooling is like running a petrol car with an electric motor assist — you use the existing system where it works and add the new technology where it is needed. Not every rack in the building needs liquid cooling. The legacy 8 kW racks are perfectly happy with air. Only the AI zone needs DLC. The challenge is making the two systems coexist — separate coolant loops, separate controls, shared chiller plant.",firstPrinciples:"In a retrofit context, hybrid architecture means maintaining air cooling for existing low-density racks while deploying DLC for new high-density racks within the same facility. This requires careful separation of cooling zones, independent control loops, and shared chiller plant capacity management. The air-cooled zone continues operating at its original PUE. The DLC zone operates at approximately 1.05–1.15 PUE. The blended facility PUE falls between the two, weighted by IT load share.",theTest:"Can you explain why 'AI-ready' does not mean converting the entire facility to liquid cooling, and how the economics of a hybrid approach differ from a full conversion?"},
    {term:"Stranded Infrastructure Risk",analogy:"Stranded infrastructure is the sunk-cost trap applied to buildings. If you invest €2M in air cooling for 25 kW/rack, and three years later the tenant needs 50 kW, your €2M investment has near-zero residual value — like buying a diesel fleet the year before a diesel ban. The total cost becomes €2M wasted + €5M for liquid cooling = €7M. The liquid-first option was €5M. The 'cheaper' choice cost 40% more.",firstPrinciples:"Stranded infrastructure occurs when capital investment loses its utility before the end of its economic life due to a change in requirements. In data centre AI retrofit, the risk is acute: air cooling infrastructure designed for 25 kW/rack cannot serve 40+ kW/rack. If tenant density requirements increase within the asset hold period (typically 7–12 years), the air cooling investment is written off. The probability of density increase is tied to GPU roadmaps — NVIDIA's published roadmap shows density roughly doubling every 2–3 generations.",theTest:"Can you explain the stranded infrastructure calculation to a fund manager and quantify the expected value of choosing air vs liquid at 25 kW/rack today?"}
  ],
  "L5": [
    {term:"Cold Plate",analogy:"The cold plate is the heat sponge bolted directly onto the GPU. Think of it as a hot water bottle in reverse — instead of releasing warmth into a bed, it absorbs heat from the chip and passes it into the liquid flowing through its internal channels. The tighter the contact between plate and chip, the more efficiently heat transfers. A poorly mounted cold plate is like a hot water bottle with an air gap — it barely works.",firstPrinciples:"Cold plates are precision-machined copper or aluminium blocks with internal micro-channels through which coolant flows. They mount directly to the GPU or CPU package with thermal interface material (TIM) ensuring minimal thermal resistance at the junction. Heat transfer rate depends on: contact area, TIM conductivity, coolant flow rate, and channel geometry. For NVIDIA B300 GPUs at 1,400W TDP, the cold plate must remove 1.4 kW from approximately 800 mm² of die area — a heat flux of approximately 175 W/cm².",theTest:"Can you explain why a cold plate is not just 'a pipe with water in it' and what determines whether it works effectively at 1,400W per GPU?"},
    {term:"Manifold",analogy:"The manifold is the plumbing junction that splits one large pipe into many small ones — like a garden hose splitter that feeds six sprinklers from one tap. In a DLC rack, the manifold takes the incoming coolant supply and distributes it equally to each GPU cold plate. If one branch gets more flow than another, some GPUs run cool while others overheat. Balanced distribution is everything.",firstPrinciples:"In-rack manifolds distribute coolant from the rack-level supply/return headers to individual cold plates via flexible hoses. For a GB300 NVL72 with 72 GPUs across 18 trays, the manifold must provide balanced flow to all 72 cold plates within ±5% variation. Flow balancing is achieved through calibrated orifice fittings or pressure-independent control valves. The manifold is also the primary service isolation point — maintenance on one tray's cold plate must not require draining the entire rack.",theTest:"Can you explain why flow balancing matters in a 72-GPU rack and what happens to GPU performance if the manifold delivers uneven coolant distribution?"},
    {term:"Secondary Cooling Loop",analogy:"The secondary loop is the clean side of your laundry. You would not wash your work clothes in the same machine as contaminated hazmat gear. Similarly, the coolant touching GPU cold plates (IT-side) must be kept separate from the building's chilled water system (facility-side) to prevent contamination. The CDU is the boundary. The secondary loop is everything on the IT side of that boundary.",firstPrinciples:"The secondary loop circulates coolant from the CDU through the rack manifolds and cold plates. It is a closed loop with independent water treatment, filtration, and pressure management. Coolant is typically deionised water or water-glycol mix (propylene glycol for freeze protection and corrosion inhibition). The secondary loop operates at higher cleanliness standards than building water because particulate contamination can block micro-channels in cold plates, causing localised overheating.",theTest:"Can you explain why a DLC system needs two separate cooling loops and what goes wrong if building water enters the IT-side circuit?"},
    {term:"Coolant Selection",analogy:"Choosing a coolant is like choosing motor oil for a high-performance engine. The wrong viscosity, the wrong additive package, or the wrong temperature rating and the engine seizes. In DLC, the coolant must balance thermal performance, material compatibility, corrosion inhibition, and safety. Using untreated water is like running a Formula 1 engine on cooking oil — it flows, but it destroys the internals.",firstPrinciples:"Common DLC coolants are deionised water, water-glycol mixtures (typically 20–30% propylene glycol), and specialised engineered fluids. Selection criteria: thermal conductivity (water is best), viscosity (affects pump energy), corrosion inhibition (protects copper cold plates and aluminium manifolds from galvanic corrosion), biological control (prevents microbial growth in warm loops), and safety (non-toxic, non-flammable, low environmental impact). ASHRAE TC 9.9 provides guidance on coolant selection for data centre applications.",theTest:"If the operations team says 'we will just use tap water,' can you explain the three specific failure modes that makes this a risk?"},
    {term:"Leak Detection System",analogy:"Leak detection in a DLC data centre is the smoke alarm equivalent for water. But where a smoke alarm gives you minutes to evacuate, a DLC leak gives you seconds before liquid reaches live electronics. The detection system must not just alarm — it must pinpoint the exact location (which rack, which tray, which connection) and trigger automatic isolation before the leak becomes a flood.",firstPrinciples:"DLC leak detection uses sensing cables run beneath racks and at every manifold connection point. When coolant contacts the cable, it triggers an alarm with location data to within 1 metre. Advanced systems integrate with the CDU to automatically isolate the affected circuit. Response time matters: at typical DLC pressures and flow rates, a failed connection can release 2–5 litres per minute. In a live data centre with €10M+ of GPU hardware per row, the cost of an undetected leak measured in minutes is measured in millions.",theTest:"Can you explain why DLC leak detection is fundamentally different from building water leak detection, and why response time is measured in seconds rather than hours?"}
  ],
  "L6": [
    {term:"GB300 NVL72 Rack Power Envelope",analogy:"The GB300 rack is like a small industrial workshop compressed into a single wardrobe. It draws as much electricity as 17 typical Irish homes simultaneously. The power enters through cables as thick as a garden hose, the heat output requires industrial-scale plumbing, and the rack weighs as much as a small car. This is not a server — it is a piece of industrial plant that happens to fit in a standard rack footprint.",firstPrinciples:"The NVIDIA GB300 NVL72 contains 36 Grace CPUs and 72 Blackwell GPUs across 18 compute trays, connected by 5th-generation NVLink. Thermal design power: 132–142 kW (135 kW typical), with transient peaks to 155 kW due to power sloshing. Total rack weight: approximately 3,200 lbs (1,450 kg). Cooling: mandatory direct-to-chip liquid cooling. Power feed: requires 250A three-phase at 415V minimum. These parameters exceed every design assumption in a pre-2020 data centre.",theTest:"Can you explain to a fund manager why a single GB300 rack costs more to power than 15 of the existing legacy racks, and what that means for the facility's grid connection?"},
    {term:"Power Sloshing",analogy:"Power sloshing is like a crowd of passengers shifting weight on a ferry. The total weight does not change, but when everyone moves to one side, the ferry lists. In a GB300 rack, the total power stays within the 135 kW envelope, but individual trays spike to 6.1 kW while others idle. The electrical distribution must handle the momentary peak at each point, not just the average across the rack.",firstPrinciples:"NVIDIA dynamically redistributes power between the 18 compute trays based on workload phase (all-reduce, forward pass, backward pass in training; batch processing in inference). Each tray can spike to its maximum while adjacent trays throttle, keeping the rack total within the TDP envelope but creating instantaneous current demands up to 155 kW at the electrical feed. Circuit protection must be set above the peak, not the average, or nuisance tripping occurs during normal operation.",theTest:"Can you explain why a circuit breaker sized for 135 kW average will nuisance-trip on a GB300 rack, and what the correct sizing approach is?"},
    {term:"50V DC Internal Busbar",analogy:"The internal power rail inside a GB300 rack runs at just 50 volts — household socket voltage is 230V. But at 135 kW on 50V, the current is 2,700 amps — the same as an industrial arc welder. Think of it as a firehose-width power rail crammed inside a wardrobe. At that current, even a loose connection the size of a pinhead generates enough heat to melt copper. Every junction must be precision-engineered.",firstPrinciples:"The GB300 NVL72 uses an internal 50V DC power architecture. Each PSU converts facility AC to 50V DC, feeding a shared busbar that distributes to all 18 compute trays. At 135 kW: I = P/V = 135,000/50 = 2,700A. This extreme current density requires: low-impedance busbar connections, thermal management of the busbar itself, and protection coordination at 50V DC (where fault currents are extremely high and arc extinction is more difficult than AC).",theTest:"Can you explain why the internal voltage of a GPU rack matters to a fund manager evaluating facility infrastructure readiness?"},
    {term:"Rack Weight (Liquid-Cooled GPU)",analogy:"A liquid-cooled GB300 rack at 3,200 lbs is like parking a small car on a raised floor tile designed for filing cabinets. The raised floor in a 2013 data centre was designed for lightweight air-cooled servers, not industrial GPU systems with copper cold plates, steel manifolds, and liquid-filled pipes. The floor does not fail gracefully — it either holds or it collapses. Structural assessment is not optional.",firstPrinciples:"A GB300 NVL72 rack weighs approximately 3,200 lbs (1,450 kg) fully populated with coolant. Standard raised floor tiles are rated at 150 psf (730 kg/m²) distributed load. The rack footprint is approximately 0.72 m² (800mm × 900mm). Point load at each levelling foot (assuming 4 feet, 50 cm² contact each): 800 lbs / 0.054 ft² ≈ 14,800 psf — approximately 13× the floor rating. Slab-to-slab mounting (bypassing the raised floor entirely) is the standard response for loads of this magnitude.",theTest:"Can you explain why the structural assessment must happen before the MIC upgrade application, and what slab-to-slab mounting means in practical terms?"},
    {term:"1,400W Per GPU",analogy:"A single B300 GPU draws 1,400 watts — roughly the same as a domestic immersion heater running continuously. A GB300 rack contains 72 of them. That is 72 immersion heaters in a space the size of a wardrobe, running 24/7, all year. Now imagine a room with 50 of those wardrobes. That is an AI data hall — and it is why the cooling, power, and structural engineering for these facilities is fundamentally different from anything built before 2023.",firstPrinciples:"The NVIDIA B300 GPU has a TDP of 1,400W. In a GB300 NVL72 rack with 72 GPUs: 72 × 1,400W = 100,800W of GPU power alone. The remaining 31–41 kW covers Grace CPUs, NVLink interconnect, management controllers, and fans. Cooling this at the chip level requires approximately 16.7 litres per minute of coolant flow per GPU (at 10°C coolant ΔT). Total rack coolant flow: approximately 1,200 litres per minute. This is industrial plumbing, not IT infrastructure.",theTest:"Can you convert 1,400W per GPU into a number that a non-technical board member would understand, and explain why 72 of them in one rack changes the entire infrastructure conversation?"}
  ],
  "L7": [
    {term:"Bus Section Rating",analogy:"The bus section rating is the speed limit on the power motorway inside your switchboard. It defines how much current the copper bars can carry before they overheat. A 1,600A bus section is like a two-lane motorway — adequate for commuter traffic but gridlocked during rush hour. AI racks are the rush hour that never ends. If the bus section is at 73% capacity with legacy loads, there is no room for a fleet of 250A AI circuits.",firstPrinciples:"The bus section in a switchboard carries the aggregate current from all downstream circuits. Its rating (in amperes) is determined by conductor cross-section, material (copper or aluminium), enclosure ventilation, and ambient temperature per EN 61439-2:2011 §10. At Clonshaugh Hall B: 1,600A bus section at 415V three-phase with 0.85 power factor delivers 977 kW maximum. At 73% utilisation, headroom is 264 kW — insufficient for even 7 AI racks at 40 kW each.",theTest:"Can you calculate the available headroom on a 1,600A bus section at 73% utilisation and explain why it is the binding constraint for AI deployment?"},
    {term:"Protection Coordination (Discrimination)",analogy:"Protection coordination is like a fire door system in a hotel. If there is a fire in one room, you want the fire door on that floor to close — not every fire door in the building simultaneously. In an electrical system, a fault on one rack circuit should trip only the breaker protecting that rack, not the breaker protecting the entire AI zone. Without proper coordination, a single rack fault takes down 50 racks.",firstPrinciples:"Protection coordination (discrimination) ensures that the protective device nearest to a fault operates first, isolating only the faulted circuit without cascading upstream. Per IS 10101:2020+AC2:2025 §536, discrimination must be verified between each level of the distribution hierarchy. In an AI retrofit, the hierarchy is: main switchboard → sub-distribution → rack MCCB → server PSU. Each level must be coordinated for both overload (time-current curves) and short-circuit (energy let-through) conditions.",theTest:"Can you explain why protection coordination becomes more difficult at AI densities, and what happens if the coordination study is skipped?"},
    {term:"Cable Sizing (Current-Carrying Capacity)",analogy:"Cable sizing is like choosing the diameter of a water pipe. Too narrow and the pressure drops — the tap at the end barely runs. Too wide and you have wasted money on pipe you did not need. But unlike water pipes, undersized electrical cables do not just underperform — they overheat, and in extreme cases, catch fire. Every AI rack needs its own properly sized 'pipe' from the switchboard to the rack.",firstPrinciples:"Cable current-carrying capacity (Iz) depends on conductor material, cross-section, insulation type, installation method, ambient temperature, and grouping with other cables. Per IS 10101:2020+AC2:2025 §522–523, cables must be sized so that the design current (Ib) does not exceed Iz after applying derating factors. For AI racks at 250A three-phase, typical cable is 120mm² 4-core + earth copper (2.8 kg/m). For 50 racks at 15m average run: 50 × 15 × 2.8 = 2,100 kg of copper — plus 2,100 kg for B-feed in a 2N configuration.",theTest:"Can you explain why AI rack cabling is measured in tonnes, not metres, and what that means for cable tray capacity and structural loading?"},
    {term:"Busbar Trunking System",analogy:"Think of a dedicated bus lane running above the server racks — a single high-capacity power backbone with tap-off points at each rack position. Instead of running 50 individual heavy cables from the switchboard (50 cables, 50 terminations, 50 potential failure points), you install one overhead power rail and connect each rack with a plug-in tap-off unit. It is faster to install, easier to reconfigure for GPU refresh cycles, and eliminates the cable grouping problem entirely.",firstPrinciples:"Busbar trunking systems distribute power via enclosed copper or aluminium conductors mounted on overhead support structures. Tap-off units at each rack position provide individual circuit protection. Advantages over cable at AI density: no grouping derating (each conductor is independently ventilated), faster installation (no cable pulling), flexible rack positioning (tap-off units can be relocated for 2–3 year GPU refresh cycles), and higher current density per unit weight.",theTest:"Can you explain why busbar trunking is the default power distribution method for AI zones and how it solves three problems that cable distribution creates?"},
    {term:"Voltage Drop",analogy:"Voltage drop is the toll charged by the cable for carrying current along its length. The longer the cable and the higher the current, the more 'toll' is taken — meaning less voltage arrives at the server end. In legacy facilities, the toll is small (short cables, low current). At AI density, the toll can be significant enough to cause equipment malfunction or tripping. Every volt lost in the cable is a volt the server does not receive.",firstPrinciples:"Voltage drop in a cable is V = I × R × L, where I is current, R is resistance per metre, and L is cable length. IS 10101:2020+AC2:2025 limits voltage drop to 5% for final circuits. For AI racks at 250A over 20m in 120mm² copper (R = 0.153 mΩ/m): V_drop = 250 × 0.153e-3 × 20 × √3 = 1.33V per phase. This is within limits at 415V, but at 480V or 800V DC the percentage drop is even lower — one of the efficiency arguments for higher distribution voltages.",theTest:"Can you calculate the voltage drop for an AI rack circuit and explain why higher distribution voltages reduce this loss?"}
  ],
  "L8": [
    {term:"I²R Loss",analogy:"I²R loss is the friction tax on every metre of electrical cable. Just as a lorry burns more fuel on a rough road than a smooth motorway, electrical current loses more energy as heat in longer or thinner cables. But here is the critical insight: the loss scales with the square of the current. Double the current, quadruple the loss. This is why reducing current (by raising voltage) has such a dramatic effect on efficiency.",firstPrinciples:"Power loss in a conductor = I² × R, where I is current (amperes) and R is resistance (ohms). For a given power delivery (P = V × I), raising the voltage reduces the current proportionally: doubling voltage halves current and reduces I²R losses by 75%. At 415V, a 135 kW rack draws 221A. At 480V, it draws 191A. At 800V DC, only 169A. The annual energy saving from 415V to 480V across a 50-rack AI zone is approximately €26,000 — from the cables alone.",theTest:"Can you explain in one sentence why doubling the voltage reduces cable losses by 75%, not 50%, and why this matters at scale?"},
    {term:"415V Three-Phase (European Standard)",analogy:"415V three-phase is the standard gauge railway of European data centres. Everything is designed for it — switchboards, circuit breakers, cables, PDUs, UPS systems. It works well for legacy densities. But just as standard gauge limits train speeds compared to purpose-built high-speed rail, 415V limits the current-carrying efficiency at AI densities. The infrastructure fits, but it is not optimised for the new workload.",firstPrinciples:"415V (line-to-line) / 240V (line-to-neutral) three-phase is the standard LV distribution voltage in Ireland per IS 10101:2020+AC2:2025. At 135 kW per rack: I = P / (V × √3 × pf) = 135,000 / (415 × 1.732 × 0.85) = 221A. This is manageable with 120mm² cable but creates significant I²R losses over distance and requires heavy cable trays. At 50 racks, the cable mass alone is 2,100 kg per feed.",theTest:"Can you calculate the current draw of an AI rack at 415V and explain why the resulting cable mass creates a structural concern?"},
    {term:"480V Three-Phase (US Standard)",analogy:"480V is the motorway upgrade — wider lanes, less congestion, faster throughput. By stepping up from 415V to 480V, current drops by 16%, cable losses drop by 29%, and cable cross-section can be reduced. The upgrade is not dramatic but it is free efficiency — like switching from B-roads to a motorway for the same journey. The catch: Irish standards are written for 415V, so 480V requires an engineering assessment to prove compliance.",firstPrinciples:"480V three-phase is standard in North American data centres. At 135 kW: I = 135,000 / (480 × 1.732 × 0.85) = 191A — 14% lower than 415V. Cable cross-section can be reduced from 120mm² to 95mm² while maintaining the same voltage drop percentage. Annual I²R saving across 50 racks at 15m average run: approximately €26,000. The complication: IS 10101:2020+AC2:2025 is written for 230/400V nominal. Operation at 480V requires a specialist engineering assessment confirming all protection, cable, and equipment ratings are adequate at the non-standard voltage.",theTest:"Can you explain the efficiency argument for 480V and the specific Irish compliance step required to implement it?"},
    {term:"800V DC Distribution",analogy:"800V DC is the bullet train — a purpose-built technology that eliminates the speed constraints of the existing network entirely. Where 415V AC requires multiple conversion stages (each losing 2–4% efficiency), 800V DC eliminates 2–3 of those stages. NVIDIA demonstrated it at GTC 2025 because the GPU roadmap is heading to 400 kW per rack, where AC distribution becomes physically impractical — the cables would weigh more than the servers.",firstPrinciples:"800V DC distribution eliminates AC-DC-AC conversion stages in the power chain. A conventional path: grid AC → transformer → UPS (AC-DC-AC) → PDU → server PSU (AC-DC). An 800V DC path: grid AC → rectifier → 800V DC bus → server PSU (DC-DC). Each eliminated conversion stage saves 2–4% efficiency. Total improvement: 8–13% end-to-end. At 135 kW per rack: current = 169A (vs 221A at 415V AC). NVIDIA's GTC 2025 sidecar PSU demonstration signals that 800V DC is the target architecture for GB300-class and beyond.",theTest:"Can you explain to a board why 800V DC is not a futuristic technology but an imminent infrastructure requirement, and what the cost of not preparing for it looks like?"},
    {term:"Conversion Efficiency Chain",analogy:"The conversion efficiency chain is like a series of currency exchange desks. Every time you convert euros to dollars to yen and back, each desk takes a 2–3% commission. By the time your money completes the circuit, you have lost 8–12% to fees. Electricity goes through the same series of conversions in a data centre — each transformer, UPS, and PSU takes its cut. Fewer conversions mean more of your purchased electricity reaches the GPU.",firstPrinciples:"A typical 415V AC power chain has 5 conversion stages: MV→LV transformer (98–99%), UPS AC→DC→AC (94–97%), PDU transformer (98–99%), server PSU AC→DC (92–96%), voltage regulator DC→DC (97–99%). Cumulative efficiency: 0.985 × 0.955 × 0.985 × 0.94 × 0.98 = 0.858 — meaning 14.2% of purchased electricity is lost to conversions before reaching the GPU. An 800V DC architecture eliminates 2–3 stages, improving cumulative efficiency to approximately 0.93–0.95 — recovering 7–9% of total facility power consumption.",theTest:"Can you walk through the conversion chain of a typical data centre power path, identify where the losses occur, and calculate the cumulative efficiency?"}
  ],
  "L9": [
    {term:"Retrofit NPV (Net Present Value)",analogy:"NPV is the answer to the fund manager's fundamental question: 'if I spend €8M today to retrofit this facility for AI, what is that investment worth in today's money over the hold period?' It accounts for every future revenue stream, every operating cost, and the time value of money. A positive NPV means the retrofit creates value. A negative NPV means the money is better deployed elsewhere. Every other metric — payback, IRR, cost per rack — is a simplification of NPV.",firstPrinciples:"NPV = Σ(Cash flow_t / (1 + r)^t) - Initial investment, where r is the discount rate and t is the year. For a data centre AI retrofit: cash flows include incremental tenant revenue (higher density = higher rent per m²), operating cost savings (DLC vs air cooling), CRM revenue (€149,960/MW/yr if qualifying), and terminal value at exit. The discount rate reflects the fund's hurdle rate (typically 7–10% for infrastructure assets). At 7% over 12 years, the PV annuity factor is approximately 7.94.",theTest:"Can you calculate the NPV of a retrofit scenario given capex, annual revenue, fill rate, discount rate, and hold period — and explain what the result means for the investment committee?"},
    {term:"Fill Rate Risk",analogy:"Fill rate risk is the occupancy risk on a commercial property — except in a data centre, vacant racks still consume cooling energy and incur maintenance costs. A 200-rack AI zone at 50% fill generates half the revenue but significantly more than half the operating cost. The breakeven fill rate — the minimum occupancy needed to cover costs — determines whether the investment is resilient or fragile. The lower the breakeven, the more the fund can sleep at night.",firstPrinciples:"Breakeven fill rate = Total capex / (Annual revenue × PV annuity factor). For Scenario C (135 kW/20 racks, €6.8M capex, €4.3M/yr revenue, 7.94 PV factor): breakeven = 6.8 / (4.3 × 7.94) = 20%. This means the investment is NPV-positive even at 20% occupancy — an extremely resilient position. For comparison, Scenario A (40 kW/50 racks): breakeven = 5.9 / (2.0 × 7.94) = 37%. Higher breakeven = higher risk. The choice between scenarios is partly a risk tolerance decision, not just an NPV maximisation.",theTest:"Can you calculate the breakeven fill rate for two competing scenarios and explain to the investment committee which is more resilient to demand uncertainty?"},
    {term:"Phased Deployment",analogy:"Phased deployment is the option strategy for data centre retrofit. Instead of committing €8M on day one for 50 racks, you invest €3M for 20 racks now, prove demand, and exercise the option to expand when the tenant base justifies it. Each phase is a call option — you pay a premium (slightly higher per-rack cost due to mobilisation overhead) but you gain the right to scale up without the obligation. If demand does not materialise, your exposure is capped.",firstPrinciples:"Phased deployment reduces upfront capital exposure while preserving the option to expand. Phase 1 typically covers MIC upgrade (12–24 month lead time, must start early), DLC infrastructure for the initial zone, and shared plant (CDUs, chiller capacity) sized for Phase 2. The cost premium for phasing is typically 10–15% versus full build-out, because shared plant and mobilisation costs are amortised over a smaller Phase 1 base. The option value of phasing must be weighed against the premium: if demand certainty is high (signed pre-lease), full build-out is cheaper. If demand is uncertain, phasing reduces the downside.",theTest:"Can you explain to a fund manager when phased deployment is the right strategy versus full build-out, and quantify the option value in a specific scenario?"},
    {term:"Opportunity Cost of Inaction",analogy:"Opportunity cost of inaction is the rent you are not collecting because the building is not ready for the tenants who want to move in. Every month without AI-ready capacity is a month of premium rent lost to a competitor who built faster. At Clonshaugh, the estimated tenant attrition from not offering AI capacity is €2.4M per year — and the asset devaluation from being classified as 'legacy' rather than 'AI-ready' is a further €6–10M over the hold period. Doing nothing has a price.",firstPrinciples:"Opportunity cost of inaction quantifies the value lost by not acting. Components: (1) tenant attrition — existing tenants who outgrow the facility's density capability leave for AI-ready competitors; (2) new tenant failure — inability to win AI workload contracts at premium rates; (3) asset devaluation — CBRE research indicates a 15–25% valuation discount for non-AI-ready facilities versus AI-capable equivalents; (4) regulatory trajectory — future CRU/EED/Taxonomy requirements become harder to meet from a legacy baseline. The sum of these components is the cost of the 'do nothing' scenario against which all retrofit scenarios must be compared.",theTest:"Can you quantify the opportunity cost of inaction for a specific facility and explain why 'do nothing' is not the same as 'spend nothing'?"},
    {term:"Density Scenario Selection",analogy:"Choosing a density scenario is like choosing the spec for a new-build apartment block. Build all studios and you maximise unit count but attract only one tenant type. Build all penthouses and you maximise rent per unit but need far fewer tenants to fill. Build a mix and you hedge your bets. In data centres, 40 kW racks (studios) serve more tenants at lower margin. 135 kW racks (penthouses) serve fewer tenants at premium margin. The right answer depends on the market, the lease book, and the fund's risk appetite.",firstPrinciples:"Density scenario selection is a multi-variable optimisation across: capex (higher density = higher per-rack cost), revenue (higher density = higher per-rack rent), fill rate risk (higher density = fewer racks, higher concentration risk per tenant), technology risk (higher density = greater exposure to GPU generation shifts), and infrastructure constraints (MIC, structural, cooling plant). The optimal scenario is not always the highest-NPV option — concentration risk, infrastructure constraints, and market timing may favour a lower-density, more diversified deployment.",theTest:"If an investment committee asks 'should we build for 40 kW, 100 kW, or 135 kW,' can you walk them through the trade-offs using NPV, breakeven fill rate, and concentration risk — and arrive at a defensible recommendation?"}
  ]

// AssistBar - Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: (() => { const fe = FEYNMAN_DATA[level.id] && FEYNMAN_DATA[level.id].find(e => e.term === fact.term); return fe ? fe.analogy : (fact ? fact.plain : ''); })()},
    {label:"From the ground up… (2/3)", text: (() => { const fe = FEYNMAN_DATA[level.id] && FEYNMAN_DATA[level.id].find(e => e.term === fact.term); return fe ? fe.firstPrinciples : (fact ? fact.number : ''); })()},
    {label:"You understand this when… (3/3)", text: (() => { const fe = FEYNMAN_DATA[level.id] && FEYNMAN_DATA[level.id].find(e => e.term === fact.term); const question = fe ? fe.theTest : ''; const answer = fact && fact.soWhat ? fact.soWhat : ''; return question + (answer ? '\n\n✓ The key insight: ' + answer : ''); })()}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8,whiteSpace:'pre-line'}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}
