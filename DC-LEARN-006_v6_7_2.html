{
  id:"L9",level:9,name:"Future Grid",icon:"🌱",
  component:"Renewable Integration, DC Policy, and the 2030 Grid",available:true,
  userNeedStatement:"Understand the trajectory of the Irish grid, DC policy, and what the 2030 renewable target means for DC carbon footprints.",
  cascadeCheck:(kw,racks,pue)=>{const targetMW=(racks*20/1000)*pue;const mic=CLONSHAUGH.mic;return{needed:targetMW.toFixed(1),available:(mic*0.9).toFixed(1),unit:"MW",pass:targetMW<=(mic*0.9),detail:`Future capacity at 20kW/rack: ${targetMW.toFixed(1)}MW vs ${(mic*0.9).toFixed(1)}MW MIC. ${targetMW>(mic*0.9)?'MIC upgrade required for target density.':'MIC adequate for target density.'}`}},
  learningObjective:"Understand the Irish grid\u2019s trajectory to 80% renewable by 2030, government DC policy, and what additionality means for investor-grade carbon claims.",
  plainEnglish:"The Irish grid in 2030 will look very different. 80% renewable. Potentially far more constrained for DCs. Understanding the direction of travel is the difference between making the right site decision today and getting it wrong.",
  grammar:{facts:[
    {term:"Government DC Policy Statement (2022)",definition:"DHLGH policy directing new DC connections in the GDA must demonstrate grid capacity and contribute positively.",plain:"The government decided Dublin had enough DCs. Not a ban \u2014 a higher evidential burden.",number:"DCs: approximately 22% of Irish grid demand (CRU, 2024). Government target: limit to 15\u201318% by 2030.",standard:"DHLGH DC Policy Statement 2022; EirGrid-ESBN Shaping our Electricity Future 2021",
      feynman:{analogy:"Think of it like planning restrictions in a national park. You can still build, but you need stronger justification and must demonstrate you won\u2019t harm the environment. The DC Policy Statement is similar: you can still connect in Dublin, but you must prove grid capacity exists and that your DC contributes positively.",firstPrinciples:"In 2022, the Department of Housing, Local Government and Heritage issued a policy statement acknowledging that DCs consume approximately 22% of Irish electricity (CRU, 2024) and that further growth in the Greater Dublin Area is constrained. The policy doesn\u2019t ban new DCs but requires demonstration of grid capacity, renewable energy contribution, and positive economic impact. This effectively raises the bar for Dublin-area DC development.",theTest:"You know you understand this when you can answer: Is there a ban on new DC connections in Dublin? Answer: No \u2014 it\u2019s a higher evidential burden, not a ban. Developers must demonstrate grid capacity, renewable contribution, and positive impact. But the practical effect is that development outside the GDA faces fewer hurdles."}},
    {term:"EirGrid 2030 Renewable Target",definition:"Government target of 80% renewable electricity by 2030.",plain:"Four out of five units of electricity from wind and solar by 2030.",number:"Grid carbon trajectory: 0.437 (2015) \u2192 0.2241 (2026) \u2192 ~0.08\u20130.10 (2030).",standard:"Climate Action Plan 2024; EU RED III; EirGrid Generation Development Plan 2023",
      feynman:{analogy:"Ireland\u2019s grid is getting greener every year \u2014 like a river gradually clearing after pollution stops. By 2030, 80% of electricity should come from wind and solar. For a DC, this means your Scope 2 carbon footprint drops automatically \u2014 without doing anything on-site.",firstPrinciples:"Ireland\u2019s grid carbon intensity has fallen from 0.437 kgCO\u2082/kWh (2015) to 0.2241 (2026) as renewable generation has increased from ~25% to ~42%. The government targets 80% renewable by 2030, which would reduce grid carbon to approximately 0.08\u20130.10 kgCO\u2082/kWh. This is the single biggest decarbonisation lever for Irish DCs \u2014 passive grid decarbonisation reduces Scope 2 without any on-site investment.",theTest:"You know you understand this when you can answer: A DC in Ireland with PUE 1.20 on the 2030 grid (80% RE). What is the approximate CUE? Answer: CUE = PUE \u00d7 grid EF = 1.20 \u00d7 0.09 \u2248 0.108 kgCO\u2082/kWh-IT. Compare to 2026: 1.20 \u00d7 0.2241 = 0.269. A 60% reduction from grid decarbonisation alone."}},
    {term:"Additionality (Corporate PPA)",definition:"Renewable energy must be from new generation that would not have been built without the PPA.",plain:"If you want to say your DC is \u2018100% renewable,\u2019 you need to fund new generation \u2014 not buy certificates from existing farms.",number:"EU Taxonomy: PPA from projects commissioned within 3 years, in same bidding zone.",standard:"EU Taxonomy Delegated Act 2021/2139; EU RED III Article 22a",
      feynman:{analogy:"Additionality is like the difference between planting a new tree and buying a certificate for an existing tree. If you fund a NEW wind farm through a PPA, that\u2019s additional renewable generation that wouldn\u2019t exist without you. Buying RECs from an existing wind farm doesn\u2019t add any new renewable capacity.",firstPrinciples:"For SFDR Article 9 funds and EU Taxonomy alignment, passive grid decarbonisation is insufficient. Investors require additionality: proof that the DC\u2019s renewable energy claim comes from NEW generation capacity that was built specifically because of the PPA. Existing wind farms generating RECs do not count. The PPA must be from projects commissioned within 3 years, in the same bidding zone (Ireland).",theTest:"You know you understand additionality when you can answer: A DC claims \u2018net zero Scope 2\u2019 based on Ireland\u2019s grid reaching 80% renewable by 2030. Is this valid for an Article 9 fund? Answer: No. Article 9 requires additionality-verified PPAs. Passive grid improvement doesn\u2019t satisfy SFDR/Taxonomy requirements. The DC needs a signed PPA with a new renewable project."}},
    {term:"Flexibility and Demand Response",definition:"EirGrid programme incentivising large consumers to reduce demand during grid stress, in exchange for payment.",plain:"EirGrid will pay DCs to reduce demand for short periods when the grid is under stress.",number:"Demand response payments: \u20ac20k\u2013\u20ac200k/year for large DCs (indicative \u2014 Tier 2, EirGrid DS3 Programme rates).",standard:"EirGrid DS3 Programme; EU Electricity Regulation 2019/943 Article 17",
      feynman:{analogy:"Demand response is like surge pricing in reverse. Instead of charging more during peak demand, EirGrid PAYS you to use less. For a DC with on-site generation or battery storage, reducing grid demand during stress periods can earn \u20ac20k\u2013\u20ac200k/year \u2014 and positions the DC as part of the grid solution, not part of the problem.",firstPrinciples:"The Irish grid faces periods of high demand and low renewable output when system stability is at risk. EirGrid\u2019s demand response programme pays large consumers to reduce their grid demand during these periods. A DC can participate by shifting to on-site generation or battery power temporarily. Revenue is modest (\u20ac20k\u2013\u20ac200k/year) but the political value is significant: DCs that actively support grid stability are better positioned in the policy debate about DC electricity consumption.",theTest:"You know you understand this when you can answer: Why would a DC participate in demand response for \u20ac50k/year when its electricity bill is \u20ac10M+? Answer: The revenue is not the main benefit. Demonstrating grid flexibility positions the DC as a responsible grid participant, supporting planning applications and policy engagement. DCs that consume passively are part of the problem. DCs that respond flexibly are part of the solution."}},
    {term:"CRU Data Centre Connection Obligation",definition:"CRU Decision CRU/2025236 requiring new data centre grid connections to source a minimum of 80% renewable electricity.",plain:"New DCs connecting to the Irish grid must commit to sourcing 80% of their electricity from renewables. This is a condition of connection, not a voluntary target.",number:"Minimum: 80% renewable. Applies to new connections from 2025. Evidence: Corporate PPA or equivalent.",standard:"CRU Decision CRU/2025236 (superseding CRU/21/124)",
      feynman:{analogy:"The CRU renewable obligation is like a planning condition on a new building — you must comply before you can occupy. For a DC, 80% renewable sourcing is a condition of getting the grid connection turned on. Without evidence of compliance, CRU can block energisation.",firstPrinciples:"CRU Decision CRU/2025236 establishes that new DC grid connections must demonstrate 80% renewable electricity sourcing. This can be met through Corporate PPAs with additionality, direct connection to on-site renewables, or a combination. The obligation is monitored annually. It aligns with the government's Climate Action Plan and the EU Taxonomy renewable energy requirements.",theTest:"You know you understand this when you can answer: A new DC plans to buy 80% renewable energy certificates (RECs) from existing wind farms to meet the CRU obligation. Is this sufficient? Answer: Likely insufficient. CRU/2025236 requires evidence of genuine renewable sourcing, which may require additionality-verified PPAs rather than unbundled RECs from existing generation. The exact compliance mechanism is subject to CRU guidance — check the latest published criteria."}},

  constraintLesson:"The Irish grid\u2019s direction is positive for DC decarbonisation but uncertain for DC expansion. 80% renewables is achievable but the queue isn\u2019t getting shorter and the political environment for new large DCs in Dublin is the most challenging ever.\n",

    ann:"Irish DC carbon footprint in 2030 on 80% renewable grid: approximately 0.10 kgCO\u2082/kWh-IT at PUE 1.10. Compare to Germany at 0.38 kgCO\u2082/kWh-IT. Ireland\u2019s renewable trajectory is a genuine competitive advantage.",

    tom:"Corporate PPA: \u20ac60\u201390/MWh for new Irish onshore wind (Tier 3 \u2014 RE-Source Platform 2025 market benchmarks). Against a DC paying \u20ac120/MWh grid electricity (Tier 2 \u2014 CRU Q4 2024), a PPA saves 20\u201330% AND provides additionality."},
  rhetoricTakeaways:{declan:"The Irish grid will be 80% renewable by 2030. Your Scope 2 number halves without you doing anything.",ann:"Ireland's renewable trajectory is a genuine competitive advantage for DC carbon footprint vs Germany or Netherlands.",mark:"Track SEAI annual emission factor — it changes every year. Do not extrapolate. SEAI is the reference.",sarah:"EU Taxonomy renewable requirement: 50% by 2025, 75% by 2027, 90% by 2030. A modest PPA covers the gap.",tom:"Corporate PPA: €60–90/MWh for new Irish onshore wind (Tier 3 — RE-Source Platform 2025 market benchmarks). Against €120/MWh grid electricity (Tier 2 — CRU Q4 2024), a PPA saves 20–30%."},
    scenario:{
    title:"The 2030 Carbon Claim",
    narrative:"A DC investor preparing an Article 9 fund prospectus wants to state their Irish DC will be \u2018net zero Scope 2\u2019 by 2030 based on the grid\u2019s renewable trajectory.",
    question:"Is the claim valid? What evidence is needed?",
    answer:"Claim: PARTIALLY VALID \u2014 with significant caveats.\n\nValid:\n\u2022 Irish grid REF trajectory: ~42% (2026) \u2192 targeting 80% (2030)\n\u2022 If 80% achieved: ~0.08\u20130.10 kgCO\u2082/kWh\n\u2022 At PUE 1.10: CUE ~0.088\u20130.11 kgCO\u2082/kWh-IT \u2014 near-zero\n\nNot valid:\n1. EU Taxonomy/SFDR Article 9 require ADDITIONALITY \u2014 passive grid decarbonisation is not sufficient\n2. The 80% target is a government aspiration, not a guarantee\n3. \u2018Net zero Scope 2\u2019 requires market-based accounting with RECs or PPAs\n\nEvidence needed:\n1. Signed Corporate PPA with additionality-verified Irish wind/solar project\n2. PPA covers 2025\u20132030 (continuous compliance)\n3. PPA generation covers DC annual consumption\n4. Independent verification of additionality\n\nGap: No PPA in place. Claim needs qualification: \u2018subject to execution of an additionality-verified PPA.\u2019\n"},
  sourceNote:"SEAI published emission factors annual series 2015–2026 (T1). DHLGH DC Policy Statement 2022 (T1). Climate Action Plan 2024 (T1). EU Taxonomy Delegated Act 2021/2139 (T1). EU RED III Article 22a (T1).",
  retrofitRelevance:"Existing DCs benefit most from grid decarbonisation \u2014 their Scope 2 footprint drops automatically. But Article 9 investors require additionality PPAs regardless of grid trajectory.",

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q006-01",icon:"🗺",stage:"grammar",q:"Who operates the Irish transmission system (110kV+)?",options:["EirGrid","ESB Networks","CRU","SEAI"],correct:0,explain:"EirGrid is the state-owned TSO for Ireland, responsible for the 110kV, 220kV, and 400kV transmission network. Source: Electricity Regulation Act 1999."},
  {level:1,id:"Q006-02",icon:"🗺",stage:"logic",q:"Why must the grid connection application be submitted before planning permission is granted?",options:["EirGrid requires planning permission first","Grid connection and planning run in series doubling the programme","Grid connection and planning take similar time \u2014 running them in parallel saves years","EirGrid can refuse connection if planning is granted first"],correct:2,explain:"TCP timeline is 4\u20138 years. Planning typically 18 months\u20133 years. Running in parallel saves years. Source: EirGrid Connection Policy 2024."},
  {level:1,id:"Q006-03",icon:"🗺",stage:"rhetoric",q:"How would you explain the Irish grid connection queue to a fund manager?",options:["ESB Networks handles all connections so the queue is shorter","The queue is long but EirGrid prioritises commercial applications","Grid connections are typically available within 12 months","2.1 GW of DC applications are ahead of you \u2014 each representing years of lead time"],correct:3,explain:"Accurately represents the 2.1 GW queue and its programme implication. Source: EirGrid System Operator data 2024."},

  {level:2,id:"Q006-04",icon:"📋",stage:"grammar",q:"What does TCP stand for in the EirGrid connection process?",options:["Technical Connection Protocol","Transmission Connection Policy","Total Capacity Planning","Transformer Connection Programme"],correct:1,explain:"TCP = Transmission Connection Policy \u2014 EirGrid\u2019s formal process for connections to 110kV+. Governed by CRU/2025236 (superseding CRU/21/124)."},
  {level:2,id:"Q006-05",icon:"📋",stage:"logic",q:"A connection offer expires before the developer accepts it. What is the likely consequence?",options:["The application joins the back of the queue","EirGrid automatically renews the offer","EirGrid issues a revised offer within 4 weeks","The developer can renegotiate the terms"],correct:0,explain:"An expired offer means the application loses its queue position. Queue position is the most valuable thing in the TCP process."},
  {level:2,id:"Q006-06",icon:"📋",stage:"rhetoric",q:"A QS asks what provisional sum to put in the budget for grid connection. What is the correct response?",options:["\u20ac5M flat","Nil \u2014 EirGrid pays for all connection works","\u20ac50k\u2013\u20ac150k per MVA for shallow connection, with contingency for deep reinforcement","\u20ac1M per MW of IT load"],correct:2,explain:"\u20ac50k\u2013\u20ac150k per MVA is the standard shallow connection benchmark. Deep reinforcement is additional and site-specific. Source: EirGrid Connection Policy 2024; CRU/2025236."},

  {level:3,id:"Q006-07",icon:"\u26A1",stage:"grammar",q:"What is the typical 2025 market lead time for a 100 MVA power transformer?",options:["52\u201378 weeks","26\u201336 weeks","8\u201312 weeks","Over 100 weeks"],correct:0,explain:"52\u201378 weeks (approximately 12\u201318 months) is the current 2025 market lead time for large power transformers from the four main manufacturers (Siemens, ABB, Hitachi Energy, Hyundai). This is the critical long-lead item on primary substation design."},
  {level:3,id:"Q006-08",icon:"\u26A1",stage:"logic",q:"Why is a double busbar configuration (not single busbar) specified for Tier IV primary substations?",options:["Double busbar is cheaper","Double busbar provides twice the voltage","Double busbar allows concurrent maintainability \u2014 either bus can be isolated for maintenance without loss of supply","Single busbar is not available in Ireland"],correct:2,explain:"Tier IV requires concurrent maintainability. A single busbar requires a complete outage for maintenance. Double busbar allows one section to be isolated while the other remains live. Source: Uptime Institute Tier Standard; CIBSE TM57."},
  {level:3,id:"Q006-09",icon:"\u26A1",stage:"rhetoric",q:"How do you explain transformer procurement timing to a developer who wants to wait until detailed design is complete?",options:["The transformer must be ordered before detailed design is complete due to 52\u201378 week lead time","Agree \u2014 detailed design produces the right transformer spec","Transformer specification is the mechanical contractor\u2019s problem","Order a standard transformer from stock"],correct:0,explain:"Waiting for detailed design completion before ordering guarantees a programme delay of 12\u201318 months. Transformer procurement is a project inception decision."},

  {level:4,id:"Q006-10",icon:"🛡",stage:"grammar",q:"What is the typical trip time for transformer differential protection?",options:["15\u201325ms","150\u2013300ms","60\u2013150ms","500\u20131000ms"],correct:0,explain:"Transformer differential protection trips in 15\u201325ms \u2014 faster than any other type. Source: IEC 60255-187-3."},
  {level:4,id:"Q006-11",icon:"🛡",stage:"logic",q:"An incomer relay and outgoing feeder relay both trip at 0.4 seconds. What is the problem?",options:["0.4s is too slow for modern relays","Only a problem above 110kV","Settings are standard and correct","Both relays race to trip \u2014 likely blacking out the whole facility"],correct:3,explain:"Zero discrimination time means both relays trip simultaneously. A feeder fault takes out entire primary supply. Requires 0.3\u20130.4s time step. Source: CIBSE TM57 Section 5."},
  {level:4,id:"Q006-12",icon:"🛡",stage:"rhetoric",q:"A facility manager asks why protection settings from a previous DC project can\u2019t be reused. How do you respond?",options:["They can \u2014 same equipment, same settings","Protection settings are site-specific based on local fault levels. Reusing is a professional liability issue.","Protection settings are standardised across all EirGrid connections","Settings don\u2019t need to be site-specific with same manufacturer equipment"],correct:1,explain:"Settings depend on fault levels which vary by site, cable lengths, and network configuration."},

  {level:5,id:"Q006-13",icon:"🔀",stage:"grammar",q:"For Tier IV dual feed to be genuinely independent, what is the minimum requirement?",options:["Two cables from the same substation","Two feeds from geographically separate EirGrid substations with independent busbars and cable routes","Two circuits on the same overhead line","Two feeds from the same substation on different voltage levels"],correct:1,explain:"Genuine independence requires different EirGrid substations, independent cable routes, no shared protection. Source: Uptime Institute; EN 50600-2-2."},
  {level:5,id:"Q006-14",icon:"🔀",stage:"logic",q:"A contractor lays both HV cables in a single trench to save cost. Why is this a problem?",options:["A single mechanical event takes out both feeds \u2014 defeating the independence requirement","Single trench is a planning violation","Cables overheat each other","Allowed if cables are different colours"],correct:0,explain:"Route diversity requires separate trenches and different routes. A single incident affecting one trench takes out both cables."},
  {level:5,id:"Q006-15",icon:"🔀",stage:"rhetoric",q:"A developer says: \u2018We have two feeds from Citywest substation \u2014 that\u2019s dual feed for Tier IV.\u2019 How do you respond?",options:["Correct \u2014 two feeds from any substation meets the requirement","Two feeds from the same substation share a common busbar. A single event at Citywest takes out both. Tier IV requires genuinely independent substations.","Depends whether on different busbars","Correct if both on different voltage levels"],correct:1,explain:"Two feeds from the same substation are NOT independent for Tier IV. Both share the same physical substation vulnerability."},

  {level:6,id:"Q006-16",icon:"📈",stage:"grammar",q:"What is the EirGrid Grid Code minimum power factor at the connection point?",options:["0.85 lagging","Unity (1.0)","0.95 lagging to 0.95 leading","0.90 lagging only"],correct:2,explain:"EirGrid Grid Code requires PF between 0.95 lagging and 0.95 leading. Most DCs target 0.98+. Source: EirGrid Grid Code CPC4; EN 50160."},
  {level:6,id:"Q006-17",icon:"📈",stage:"logic",q:"An existing DC with older transformer-based UPS receives an EirGrid PF non-compliance notice. What is the most cost-effective long-term remedy?",options:["Faulty metering \u2014 recalibrate","PF correction not required for standby UPS","Install capacitor banks regardless of UPS age","Replace UPS with modern modular units (PF 0.99 input) \u2014 resolves PF AND delivers energy saving payback"],correct:3,explain:"Older UPS has PF 0.80\u20130.85. Modern modular UPS achieves 0.99+. Replacement resolves PF AND saves ~2.5% UPS losses. Payback 7\u201315 years."},
  {level:6,id:"Q006-18",icon:"📈",stage:"rhetoric",q:"A facilities manager asks why harmonic distortion matters if the lights aren\u2019t flickering. How do you explain?",options:["Harmonics only affect lighting","Not an issue with modern UPS","Only monitored by EirGrid","Harmonics overheat cables and transformers silently and can cause relay mal-operation \u2014 invisible damage until something fails"],correct:3,explain:"Harmonics cause hidden damage and protection interference long before visible symptoms. Baseline power quality monitoring is important."},

  {level:7,id:"Q006-19",icon:"📜",stage:"grammar",q:"What does the EirGrid SCADA interface requirement mean for a DC operator?",options:["Must install a weather station","SCADA is optional below 50 MW","Must install a real-time communications link providing voltage, current, power and alarm data to EirGrid\u2019s control centre","EirGrid installs and maintains the SCADA interface"],correct:2,explain:"EirGrid requires real-time monitoring of all transmission-connected facilities. DC owner must install and maintain the interface. Polling every 2 seconds."},
  {level:7,id:"Q006-20",icon:"📜",stage:"logic",q:"Protection relays not on EirGrid\u2019s approved list discovered 4 weeks before commissioning. What is the primary consequence?",options:["Minor delay \u2014 EirGrid approves in 1 week","EirGrid will not permit connection. Type approval takes 12\u201316 weeks minimum \u2014 8\u201312 week programme delay likely","EirGrid can temporarily waive the requirement","Relays can be commissioned under a Bond"],correct:1,explain:"EirGrid will not energise until relay type approval is confirmed. This is a hard gate. 12\u201316 weeks minimum. Prevention: check approved list at specification stage."},
  {level:7,id:"Q006-21",icon:"📜",stage:"rhetoric",q:"Who is responsible for Grid Code compliance at a DC \u2014 the HV contractor or the DC owner?",options:["HV contractor","EirGrid","DC owner \u2014 Grid Code compliance is the connection holder\u2019s obligation regardless of installer","CRU \u2014 enforcement only"],correct:2,explain:"The DC owner is responsible for documentation, type approvals, ongoing compliance monitoring, and reporting. Common source of confusion."},

  {level:8,id:"Q006-22",icon:"🔋",stage:"grammar",q:"At what installed generation capacity does a DC require a CRU Licence to Generate Electricity (Dispatch Licence)?",options:["1 MW","10 MW","5 MW","25 MW"],correct:1,explain:"Generation licence threshold is 10 MW installed electrical capacity. Most Tier III/IV DCs exceed this. Source: Electricity Regulation Act 1999 s.14."},
  {level:8,id:"Q006-23",icon:"🔋",stage:"logic",q:"A DC\u2019s generators never export to the grid \u2014 strictly standby. Does this mean a generation licence is not required?",options:["Incorrect \u2014 the threshold is based on installed capacity, not operating mode. Standby generators above 10 MW still need a licence.","Correct \u2014 standby generators don\u2019t need a licence","Only grid-connected generators need a licence","Diesel generators are exempt"],correct:0,explain:"The generation licence is required based on installed capacity regardless of operating mode."},
  {level:8,id:"Q006-24",icon:"🔋",stage:"rhetoric",q:"An investor asks if switching to HVO fuel has a material financial impact. How do you frame the answer?",options:["HVO doubles fuel costs \u2014 avoid it","HVO is only for new generators","HVO is free under government subsidy","HVO costs 20\u201325% more per litre, but generator runtime is typically 100\u2013200 hours/year. Annual premium for a 60 MW fleet is \u20ac5k\u2013\u20ac10k \u2014 not material."],correct:3,explain:"HVO premium sounds significant but annual fuel consumption for standby operation is small. The lifecycle carbon and EPA compliance benefits outweigh cost."},

  {level:9,id:"Q006-25",icon:"🌱",stage:"grammar",q:"What is the Irish government\u2019s target for renewable electricity by 2030?",options:["50%","65%","100%","80%"],correct:3,explain:"Climate Action Plan 2024 targets 80% renewable by 2030. Reduces grid carbon intensity to ~0.08\u20130.10 kgCO\u2082/kWh \u2014 a 55\u201365% reduction from 0.2241."},
  {level:9,id:"Q006-26",icon:"🌱",stage:"logic",q:"A DC claims \u2018net zero Scope 2\u2019 based solely on the Irish grid\u2019s renewable trajectory. Why is this insufficient for an SFDR Article 9 fund?",options:["The grid won\u2019t reach 80% renewable","Article 9 only applies to generation","Article 9 funds require additionality-verified PPAs \u2014 passive grid decarbonisation does not satisfy SFDR/Taxonomy requirements","Net zero Scope 2 is not a recognised SFDR metric"],correct:2,explain:"SFDR Article 9 requires market-based accounting with additionality. Passive grid improvement doesn\u2019t qualify. Source: EU RED III Article 22a; EU Taxonomy."},
  {level:9,id:"Q006-27",icon:"🌱",stage:"rhetoric",q:"A developer asks whether South Dublin or a greenfield site in Athlone would have a shorter grid connection programme. How do you respond?",options:["South Dublin \u2014 better infrastructure","Athlone \u2014 EirGrid capacity is less constrained outside the GDA, and the DC policy burden is lower","Both are identical","Neither \u2014 the government has banned new DC connections"],correct:1,explain:"GDA grid is more constrained due to the 2.1 GW DC queue. Locations outside the GDA typically have shorter queues and face less political resistance. Source: EirGrid TDP 2022; DHLGH DC Policy Statement."}

// AI ASSIST BAR — v5.0 (Final: content-specific, no generation)
// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per canonical template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

  const g = level.grammar;
  return (<div className="fade-in">
    <h3 style={{color:'var(--grammar)',fontSize:16,fontWeight:600,marginBottom:12}}>📖 Grammar — What Is It?</h3>
    {g.facts.map((f,i)=>(<div key={i} className="fact-card" role="button" tabIndex={0} aria-expanded={expanded===i} onClick={()=>toggleFact(i)} onKeyDown={(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleFact(i);}}}>
      <div className="term">{f.term}</div>
      {expanded===i&&(
        <div className="fade-in selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} style={{userSelect:'text',cursor:'text'}}>
          <div className="def">{f.definition}</div>
          <div className="detail">{f.plain}</div>
          <div className="detail" style={{fontStyle:'normal'}}>{f.number}</div>
          <div className="std" lang="en">{f.standard}</div>
          {(f.soWhat || SO_WHAT_MAP[f.term]) && <div style={{fontSize:12,color:'var(--green)',fontStyle:'italic',marginTop:6,lineHeight:1.6}}>{f.soWhat || SO_WHAT_MAP[f.term]}</div>}
          <AssistBar fact={f} level={level} stage="grammar"/>
        </div>
      )}
    </div>))}
    {g.whatItLooksLike && (
      <div className="card selectable-text" style={{marginTop:12}}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>What It Looks Like on Site</h4>
        <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{g.whatItLooksLike}</p>
      </div>
    )}
    {g.siteChecklist && (
      <div style={{marginTop:14}}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>Site Checklist</h4>
        {g.siteChecklist.map((item,i)=>(
          <label key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6,fontSize:13,color:'var(--text)',cursor:'pointer'}}>
            <input type="checkbox" checked={!!checkedItems[i]} onChange={()=>toggleCheck(i)} style={{marginTop:3}} />
            <span>{item}</span>
          </label>
        ))}
      </div>
    )}
    <button className={'completion-btn btn-grammar'+(done?' done':'')} onClick={onComplete}>
      {done ? '✓ Key facts memorised' : "I've memorised the key facts"}
    </button>
    <div style={{marginTop:16,padding:'10px 14px',borderLeft:'3px solid var(--green)',background:'var(--panel)',borderRadius:'0 8px 8px 0',fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)',lineHeight:1.6}}>
      {[...new Set(g.facts.map(f=>f.standard))].join('. ')}.
    </div>
    <div style={{marginTop:12,padding:'14px 18px',border:'1px solid var(--grammar)',borderRadius:10,background:'var(--panel)'}}>
      <div style={{fontSize:14,fontWeight:600,color:'var(--grammar)',marginBottom:6}}>💡 Feynman Clarify</div>
      <div style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>Expand any Grammar fact and click 💡 <strong>Clarify</strong> to cycle through three learning rounds: an everyday analogy, a first-principles explanation, and a self-test question. Each round uses original content — not a repetition of the visible definition.</div>
    </div>
  </div>);
}

function LogicPanel({level,onComplete,done}){
  const lo = level.logic;
  return (<div className="fade-in">
    <h3 style={{color:'var(--logic)',fontSize:16,fontWeight:600,marginBottom:12}}>⚙️ Logic — Why Does It Matter?</h3>
    {lo.causeAndEffect.map((ce,i)=>(<div key={i} className="ce-card" style={{userSelect:'text',cursor:'text'}}
      onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <div className="cause">⚡ {ce.cause}</div>
      <div className="effect">→ {ce.effect}</div>
      <div className="insight">💡 {ce.insight}</div>
    </div>))}
    {lo.constraintLesson && (
      <div className="card" style={{marginTop:14,userSelect:'text',cursor:'text'}}
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        <h4 style={{fontSize:13,fontWeight:600,color:'var(--logic)',marginBottom:8}}>Constraint Lesson</h4>
        <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8,whiteSpace:'pre-line'}}>{lo.constraintLesson}</div>
      </div>
    )}
    <div className="wl-box" style={{userSelect:'text',cursor:'text'}}
      onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <h4 style={{fontSize:14,fontWeight:600,color:'var(--green)',marginBottom:10}}>🔗 Weakest Link</h4>
      <div style={{marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--red)'}}>❌ What's Wrong:</span>
        <p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{lo.weakestLink.whatsWrong}</p>
      </div>
      <div style={{marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>✅ What's Right:</span>
        <p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{lo.weakestLink.whatsRight}</p>
      </div>
      <div>
        <span style={{fontSize:12,fontWeight:600,color:'var(--accent)'}}>➡️ How To Get There:</span>
        <p style={{fontSize:13,color:'var(--text)',marginTop:4}}>{lo.weakestLink.howToGetThere}</p>
      </div>
    </div>
    {level.crossRefs && level.crossRefs.length > 0 && (
      <div style={{marginTop:14}} className="selectable-text"
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
        <h4 style={{fontSize:12,fontWeight:600,color:'var(--text-dim)',marginBottom:6}}>Cross-References</h4>
        {level.crossRefs.map((ref,i)=>(<div key={i} style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>
          ↔️ {ref.module} {ref.level}: {ref.topic}
        </div>))}
      </div>
    )}
    <button className={'completion-btn btn-logic'+(done?' done':'')} onClick={onComplete}>
      {done ? '✓ Consequences understood' : 'I understand the consequences'}
    </button>
  </div>);
}

function RhetoricPanel({level,onComplete,done}){
  const [persona,setPersona] = useState("declan");
  const r = level.rhetoric;
  return (<div className="fade-in">
    <h3 style={{color:'var(--rhetoric)',fontSize:16,fontWeight:600,marginBottom:12}}>💬 Rhetoric — How Do I Explain It?</h3>
    <div className="persona-row">
      {PERSONA_KEYS.map(k=>(<button key={k} className={'persona-btn'+(persona===k?' active':'')} aria-label={PERSONAS[k]} onClick={()=>setPersona(k)}>{PERSONAS[k]}</button>))}
    </div>
    <div className="persona-msg selectable-text" style={{userSelect:'text',cursor:'text'}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      {r[persona]}
      {level.rhetoricTakeaways && level.rhetoricTakeaways[persona] && <div style={{fontStyle:'italic',color:'var(--rhetoric)',marginTop:10,fontSize:13,lineHeight:1.6}}>{level.rhetoricTakeaways[persona]}</div>}
    </div>
    {level.scenario && <div className="card" style={{marginTop:16}}>
      <h3>🎯 Field Challenge Preview: {level.scenario.title}</h3>
      <p style={{fontSize:13,color:"var(--text-dim)"}}>{level.scenario.narrative.substring(0,150)}...</p>
      <p style={{fontSize:12,color:"var(--accent)",marginTop:8}}>→ See full Field Challenge in the Field Challenges tab</p>
    </div>}
    <button className={'completion-btn btn-rhetoric'+(done?' done':'')} onClick={onComplete} style={{marginTop:16}}>
      {done ? '✓ Can explain to stakeholders' : 'I can explain it to each stakeholder'}
    </button>
  </div>);
}

      <div className="chain-layout">
      <div>
        <div className="card">
          
          {LEVELS.map((l,i)=>{
            const p = progress[l.id]||{};
            const completedStages = [p.grammar,p.logic,p.rhetoric].filter(Boolean).length;
            const allDone = completedStages===3;
            const cr = showCascade ? cascadeResults[i] : null;
            const isBneck = cr && !cr.pass && cr.needed!=="-";
            const isPass = cr && cr.pass && cr.needed!=="-";
            
            return (
              <div key={l.id} className={'chain-item'+(isPass?' pass':isBneck?' fail':'')}
                  role="button" tabIndex={0}
                  onClick={()=>handleChainClick(l)}
                  onKeyDown={(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleChainClick(l);}}}
                  style={{
                    alignItems:'flex-start'
                  }}>
                  <span className="icon" style={{paddingTop:2}}>{l.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div className="name">L{l.level}: {l.name}</div>
                        <div className="comp">{l.component}</div>
                      </div>
                      <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                        <Dot done={p.grammar} stage="grammar"/>
                        <Dot done={p.logic} stage="logic"/>
                        <Dot done={p.rhetoric} stage="rhetoric"/>
                      </div>
                    </div>
                    {cr && cr.needed!=="-" && (<div style={{marginTop:6,fontSize:12}}><span className={cr.pass?'badge badge-pass':'badge badge-fail'}>{cr.pass?'PASS':'FAIL'}</span><span style={{color:'var(--text-dim)',marginLeft:8}}>{cr.detail}</span></div>)}
                    {activeChainLevel === l.level && (
                      <div className="fade-in selectable-text"
                        style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',userSelect:'text',cursor:'text'}}
                        onClick={e => e.stopPropagation()}
                        onMouseDown={e => e.stopPropagation()}>
                        <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,marginBottom:8}}>
                          {l.plainEnglish}
                        </p>
                        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',marginBottom:8}}>
                          User Need: {l.userNeedStatement}
                        </p>
                        <button style={{padding:'6px 14px',border:'1px solid var(--green)',borderRadius:6,
                                        background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',
                                        fontSize:12,fontFamily:'var(--font-sans)'}}
                          onClick={(e) => {e.stopPropagation(); goToLevel(l);}}>
                          Open in Learn tab →
                        </button>
                      </div>
                    )}
                  </div>
              </div>
            );
          })}

          <div style={{marginTop:12,padding:"8px 12px",background:"rgba(59,130,246,0.08)",borderRadius:6,fontSize:"0.7rem",color:"var(--text-dim)"}}>
            <span style={{marginRight:12}}>
              <Dot done={false} stage="grammar"/> Grammar
            </span>
            <span style={{marginRight:12}}>
              <Dot done={false} stage="logic"/> Logic
            </span>
            <span>
              <Dot done={false} stage="rhetoric"/> Rhetoric
            </span>
            <span style={{float:"right"}}>● = Complete &nbsp; ○ = Not started</span>
          </div>
        </div>
      </div>

      {/* Right sidebar */}
      <div>
        <div className="sidebar-card">
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--text-bright)',marginBottom:12}}>🔢 Cascade Calculator</h3>
          <label style={{fontSize:12,color:'var(--text-dim)'}}>Target kW/rack
            <input className="calc-input" type="number" value={cascadeKW} onChange={e=>setCascadeKW(Number(e.target.value))} />
          </label>
          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Rack count
            <input className="calc-input" type="number" value={cascadeRacks} onChange={e=>setCascadeRacks(Number(e.target.value))} />
          </label>
          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Target PUE
            <input className="calc-input" type="number" step="0.1" value={cascadePUE} onChange={e=>setCascadePUE(Number(e.target.value))} />
          </label>
          <button className="calc-btn" onClick={()=>setShowCascade(true)}>Find Bottlenecks →</button>
          {showCascade && (
            <div className="fade-in" style={{marginTop:12}}>
              <div style={{fontSize:13,fontWeight:600,color:bottleneckCount>0?'var(--red)':'var(--green)',marginBottom:8}}>
                {bottleneckCount>0 ? `${bottleneckCount} bottleneck${bottleneckCount>1?'s':''} found` : '✅ All levels adequate'}
              </div>

/* ─── CLOCK FACE ─── */
function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

            {allAnswered && <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:elapsed<=COUNTDOWN_TOTAL?'var(--grammar)':'var(--red)'}}>{elapsed<=COUNTDOWN_TOTAL ? 'Completed in '+fmtTime(elapsed)+' (under time)' : 'Completed in '+fmtTime(elapsed)+' ('+fmtTime(elapsed-COUNTDOWN_TOTAL)+' over)'}</div>}
          </div>
          <div className="progress-bar" style={{marginTop:8}}><div className="fill fill-green" style={{width:Math.round(score.correct/score.total*100)+'%'}}></div></div>
          <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{
              const s=stageScore(st);
              const labels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};
              return s.t>0 && (
                <div key={st} style={{fontSize:12,color:stageColours[st]}}>
                  <strong>{labels[st]}:</strong> {s.c}/{s.t}
                </div>
              );
            })}
          </div>
          <button style={{marginTop:10,padding:'6px 14px',border:'1px solid var(--border)',borderRadius:8,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleReset}>Reset Assessment</button>
        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q); const answered=answers[gi]!==undefined;
        return (
          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0'}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}><span>{q.icon}</span><span className={'badge badge-'+q.stage}>{q.stage}</span><span style={{fontSize:12,color:'var(--text-muted)'}}>Level {q.level}</span></div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>{q.q}</div>
            {q.options.map((opt,oi)=>{ let cls='assess-option'; if(answered){if(oi===q.correct) cls+=' correct'; else if(answers[gi]===oi) cls+=' incorrect';} return (<div key={oi} className={cls} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>); })}
            {answered && <div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function ProgressTab({progress,tabTimes}){
  const total=LEVELS.length*3; let complete=0;
  LEVELS.forEach(l=>{const p=progress[l.id]||{};if(p.grammar)complete++;if(p.logic)complete++;if(p.rhetoric)complete++;});
  const pct=Math.round(complete/total*100);
  const moduleComplete=complete===total;
  const fmtT=(s)=>{if(!s||s<1)return '0s';if(s<60)return s+'s';const m=Math.floor(s/60);const ss=s%60;return m+'m '+ss+'s';};
  const fmtTime=(s)=>{if(!s)return '00:00';const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const totalTime=tabTimes?Object.values(tabTimes).reduce((a,b)=>a+b,0):0;
  const tabLabels={chain:'Grid Connection',learn:'Learn',visual:'Visual Guide',challenges:'Field Challenges',assessment:'Assessment',progress:'Progress'};
  const maxTime=tabTimes?Math.max(...Object.values(tabTimes),1):1;
  const [assessData,setAssessData]=useState(null);
  useEffect(()=>{try{const s=safeStore.get('dc006_assess');if(s)setAssessData(JSON.parse(s));}catch(e){}},[]);
  const stageLabels={grammar:'Knowledge Check',logic:'Eng. Calculation',rhetoric:'Prof. Judgement'};
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const assessStageScore=(st)=>{
    if(!assessData||!assessData.answers)return null;
    const qs=ASSESSMENT_QUESTIONS.filter(q=>q.stage===st);
    let c=0,t=0;
    qs.forEach(q=>{const gi=ASSESSMENT_QUESTIONS.indexOf(q);if(assessData.answers[gi]!==undefined){t++;if(assessData.answers[gi]===q.correct)c++;}});
    return t>0?{c,t}:null;
  };
  return (
    <div>
      {moduleComplete && (
        <div className="card" style={{borderLeft:'4px solid var(--green)',background:'var(--green-dim)',marginBottom:16}}>
          <h2 style={{color:'var(--green)',marginBottom:6}}>Module Complete</h2>
          <div style={{fontSize:14,color:'var(--text-bright)',marginBottom:4}}>All {total} Trivium stages completed across 9 chain levels.</div>
          {assessData&&assessData.score&&assessData.score.total>=ASSESSMENT_QUESTIONS.length && (
            <div style={{fontSize:13,color:'var(--text-dim)',marginTop:8}}>
              Assessment: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%) in {fmtTime(assessData.elapsed)}
            </div>
          )}
          {totalTime>0 && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Total time invested: {fmtT(totalTime)}</div>}
        </div>
      )}
      <div className="card"><h2>Overall Progress</h2><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{complete}/{total} stages complete ({pct}%)</div><div className="progress-bar" style={{height:12}}><div className="fill fill-green" style={{width:pct+'%'}}></div></div></div>
      {assessData&&assessData.score&&assessData.score.total>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:8}}>Assessment Results</h2>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Score: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%)</div>
          <div className="progress-bar" style={{height:8,marginBottom:10}}><div className="fill fill-green" style={{width:Math.round(assessData.score.correct/assessData.score.total*100)+'%'}}></div></div>
          {assessData.elapsed>0 && <div style={{fontSize:12,fontFamily:'var(--font-mono)',color:assessData.elapsed<=900?'var(--grammar)':'var(--red)',marginBottom:8}}>{assessData.elapsed<=900?'Completed in '+fmtTime(assessData.elapsed)+' (under time)':'Completed in '+fmtTime(assessData.elapsed)+' ('+fmtTime(assessData.elapsed-900)+' over)'}</div>}
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{
              const s=assessStageScore(st);
              return s && (
                <div key={st} style={{fontSize:12,color:stageColours[st]}}>
                  <strong>{stageLabels[st]}:</strong> {s.c}/{s.t}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {LEVELS.map(lvl=>{const p=progress[lvl.id]||{};return (
        <div key={lvl.id} className="card" style={{padding:16}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20}}>{lvl.icon}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>Level {lvl.level}: {lvl.name}</div><div style={{display:'flex',gap:8,marginTop:6}}><Dot done={p.grammar} stage="grammar"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Grammar</span><Dot done={p.logic} stage="logic"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Logic</span><Dot done={p.rhetoric} stage="rhetoric"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Rhetoric</span></div></div></div></div>
      );})}
      {tabTimes && totalTime>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:4}}>Session Insights</h2>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Time spent per tab across sessions. For continuous improvement — not visible to other users.</div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>Total time: {fmtT(totalTime)}</div>
          {Object.keys(tabLabels).map(k=>{
            const t=tabTimes[k]||0;
            const w=Math.round(t/maxTime*100);
            return (
              <div key={k} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--text-dim)'}}>{tabLabels[k]}</span>
                  <span style={{fontFamily:'var(--font-mono)',color:t>0?'var(--text-bright)':'var(--text-muted)'}}>{fmtT(t)}</span>
                </div>
                <div className="progress-bar" style={{height:6}}><div className="fill fill-green" style={{width:w+'%',transition:'width 0.3s'}}></div></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GlossaryBibToggle(){
  const [show,setShow]=useState(null);
  return (
    <div style={{display:'flex',gap:8,flexDirection:'column'}}>
      <div style={{display:'flex',gap:8}}>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='glossary'?'var(--green-dim)':'var(--surface)',color:show==='glossary'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='glossary'?null:'glossary')}>
          {show==='glossary'?'▾':'▸'} Glossary ({GLOSSARY_006.length} terms)
        </button>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='bib'?'var(--green-dim)':'var(--surface)',color:show==='bib'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='bib'?null:'bib')}>
          {show==='bib'?'▾':'▸'} Bibliography ({BIBLIOGRAPHY_006.length} sources)
        </button>
      </div>
      {show==='glossary' && <div className="card fade-in"><GlossaryPanel/></div>}
      {show==='bib' && <div className="card fade-in"><BibliographyPanel/></div>}
    </div>
  );
}

function GlossaryPanel(){
  const [search,setSearch]=useState('');
  const filtered=search?GLOSSARY_006.filter(g=>g.term.toLowerCase().includes(search.toLowerCase())||g.def.toLowerCase().includes(search.toLowerCase())):GLOSSARY_006;
  return (
    <div>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search terms..." style={{width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:8,background:'var(--surface)',color:'var(--text)',fontSize:13,fontFamily:'var(--font-sans)',marginBottom:12,boxSizing:'border-box'}}/>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>{filtered.length} of {GLOSSARY_006.length} terms</div>
      {filtered.map((g,i)=>(
        <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{g.term}</div>
          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6,marginTop:2}}>{g.def}</div>
        </div>
      ))}
    </div>
  );
}

function BibliographyPanel(){
  return (
    <div>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Sources referenced in this module. Tier 1 = published standard or regulatory instrument. Tier 2 = industry benchmark or guidance document.</div>
      {BIBLIOGRAPHY_006.map((b,i)=>(
        <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:8,alignItems:'baseline'}}>
            <span className={'badge badge-'+(b.tier==='T1'?'pass':'logic')} style={{fontSize:10}}>{b.tier}</span>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{b.title}</div>
          </div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginTop:3,lineHeight:1.6}}>
            <span style={{fontFamily:'var(--font-mono)'}}>{b.year}</span> — {b.usage}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function App(){
  const [activeTab,setActiveTab]=useState('chain');
  const [activeLevel,setActiveLevel]=useState(1);
  const [progress,setProgress]=useState(()=>{try{const s=safeStore.get('dc006_progress');return s?JSON.parse(s):{};}catch(e){return{};}});
  useEffect(()=>{try{safeStore.set('dc006_progress',JSON.stringify(progress));}catch(e){}},[progress]);
  const [theme,setTheme]=useState('dark');
  const [tabTimes,setTabTimes]=useState(()=>{try{const s=safeStore.get('dc006_tabTimes');return s?JSON.parse(s):{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}catch(e){return{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}});
  const tabStartRef=React.useRef(Date.now());
  const prevTabRef=React.useRef('chain');
  useEffect(()=>{
    const now=Date.now();
    const prev=prevTabRef.current;
    const dt=Math.floor((now-tabStartRef.current)/1000);
    if(dt>0){setTabTimes(prev2=>({...prev2,[prev]:prev2[prev]+dt}));}
    tabStartRef.current=now;
    prevTabRef.current=activeTab;
  },[activeTab]);
  useEffect(()=>{try{safeStore.set('dc006_tabTimes',JSON.stringify(tabTimes));}catch(e){}},[tabTimes]);
  const toggleTheme = () => { const next=theme==='dark'?'light':'dark'; setTheme(next); document.documentElement.setAttribute('data-theme',next); };

  const handleComplete = useCallback((id, stage)=>{
    setProgress(prev=>({...prev,[id]:{...prev[id],[stage]:true}}));
  },[]);

  const tabs = [
    {id:'chain',label:'Grid Connection'},
    {id:'learn',label:'Learn'},
    {id:'visual',label:'Visual Guide'},
    {id:'challenges',label:'Field Challenges'},
    {id:'assessment',label:'Assessment'},
    {id:'progress',label:'Progress'}
  ];

  return (
    <div>
      <div id="lbe-audience-bar" className="no-print" style={{background:'linear-gradient(135deg,#1a1a1a,#2a2a2a)',padding:'8px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>AUDIENCE: Data Centre Professionals — Operators, Engineers, Fund Managers, ESG Analysts, Cost Managers</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>DC LEARNING SERIES</span>
      </div>
      <header>
        <img src={LOGO_SRC} alt="LBE Logo" style={{borderRadius:'50%',overflow:'hidden'}} />
        <div>
          <h1>Grid Connection & HV Infrastructure</h1>
          <div className="sub">{TOOL_ID} v{TOOL_VERSION} · DC Learning Series · Legacy Business Engineers Ltd</div>
          <div className="sub" style={{marginTop:4,fontSize:11,opacity:0.7}}>9 levels from grid connection to on-site generation</div>
        </div>
        <button className="theme-toggle" onClick={toggleTheme}>{theme==='dark'?'☀️ Light':'🌙 Dark'}</button>
      </header>
      <div className="main">
        <div className="tab-row no-print" role="tablist">
          {tabs.map(t=>(<button key={t.id} className={'tab-btn'+(activeTab===t.id?' active':'')} role="tab" aria-selected={activeTab===t.id} onClick={()=>setActiveTab(t.id)}>{t.label}</button>))}
        </div>
        {activeTab==='chain' && <ChainTab activeLevel={activeLevel} setActiveLevel={setActiveLevel} setActiveTab={setActiveTab} progress={progress}/>}
        {activeTab==='learn' && <LearnTab activeLevel={activeLevel} setActiveLevel={setActiveLevel} progress={progress} onComplete={handleComplete} setActiveTab={setActiveTab}/>}
        {activeTab==='visual'&&<VisualGuideTab/>}
        {activeTab==='challenges' && <FieldChallengesTab/>}
        {activeTab==='assessment' && <AssessmentTab/>}
        {activeTab==='progress' && <ProgressTab progress={progress} tabTimes={tabTimes}/>}
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',margin:'0 auto',maxWidth:1100,padding:'0 20px'}} className="no-print">
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>From learning to practice</div>
          <div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>The real-world version of what this module teaches is a DC Performance Assessment — an independent screening of a facility's grid connection and HV infrastructure against CRU, EED, Taxonomy, and EPA requirements.</div>
        </div>
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',display:'flex',flexDirection:'column',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div><div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>Questions or feedback on this content?</div><div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>Technical corrections, suggestions, or industry perspective welcome.</div></div>
          <a href="https://legacybe.ie/contact/" target="_blank" rel="noopener" style={{display:'inline-block',padding:'10px 24px',background:'var(--lbe-green)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600,fontSize:14,marginTop:12,textAlign:'center'}}>Send Us a Message</a>
        </div>
      </div>
      <div className="series-nav no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <a href="./dc-learn-005.html">← DC-LEARN-005: Backup Power</a>
        <span style={{color:'var(--text-muted)',fontSize:12}}>Module 7 of 16 · Series Spec v1.4</span>
        <a href="./dc-learn-007.html">DC-LEARN-007: Regulatory Landscape →</a>
      </div>
      <div className="nav-footer no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <span>© 2026 Legacy Business Engineers Ltd</span>
        <div><a href="https://legacybe.ie" target="_blank" rel="noopener">legacybe.ie</a><a href="https://legacybe.ie/tools/" target="_blank" rel="noopener">Tools</a><a href="https://legacybe.ie/contact/" target="_blank" rel="noopener">Contact</a><a href="https://legacybe.ie/services/" target="_blank" rel="noopener">Services</a></div>
      </div>
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));

</script>
