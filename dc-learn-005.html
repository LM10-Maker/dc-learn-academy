const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q005-01",icon:"🔌",stage:"grammar",q:"What is the maximum acceptable unplanned downtime per year for Tier IV?",options:["4 hours","8 hours","2 hours","26 minutes"],correct:3,explain:"Tier IV demands 99.995% availability — just 26 min/yr unplanned downtime (Uptime Institute). Exceeding that threshold triggers SLA penalties and reputational damage. At Clonshaugh's 400 racks, a single outage can cost €100k+ per hour."},
  {level:1,id:"Q005-02",icon:"🔌",stage:"logic",q:"If UPS autonomy is 8 minutes and generator start-to-sync is 25 seconds, what's the real vulnerability?",options:["Generator start time is the vulnerability — 25 seconds is too long for sensitive IT loads, which require transfer within 10 ms.","Fuel supply is the primary risk — a mains failure exceeding 8 minutes exhausts the UPS before the generator reaches full synchronisation.","Battery degradation reducing bridge time below sync time","Generator acoustic performance is a site planning constraint that limits where generators can be positioned relative to IT halls."],correct:2,explain:"At 8 min UPS bridge vs 25s generator sync, today's margin is safe. But VRLA batteries degrade — at 80% EOL that 8 min becomes ~6.4 min (IEC 60896-22). Thermal stress accelerates this. The real risk is silent until it causes a bridge failure."},
  {level:1,id:"Q005-03",icon:"🔌",stage:"rhetoric",q:"How would you explain backup power time horizons to a fund manager?",options:["'UPS handles milliseconds, generators hours, fuel days — each link covers a different window'","'We have N+1 redundancy across all power paths, which means the facility can tolerate any single component failure without impact to IT load.'","'Generators reach full synchronisation and transfer in under 10 seconds, which is well within our critical load protection window.'","'Battery autonomy at rated capacity always exceeds the published generator start-to-transfer time under our commissioning test results.'"],correct:0,explain:"Fund managers grasp time horizons — milliseconds (UPS), hours (generators), days (fuel) — faster than topology labels like 2(N+1). Framing backup as time-layered insurance connects directly to risk appetite and investment decisions."},
  {level:2,id:"Q005-04",icon:"⛽",stage:"grammar",q:"What is typical diesel generator SFC at rated load?",options:["0.27 l/kWh","0.15 l/kWh","0.40 l/kWh","0.55 l/kWh"],correct:0,explain:"SFC ~0.27 l/kWh at rated load (CIBSE Guide F Table 14.1). This drives the EPA thermal input calculation — electrical output ÷ 0.40 efficiency = MWth. Getting SFC wrong cascades into fuel storage sizing, emissions reporting, and licensing thresholds."},
  {level:2,id:"Q005-05",icon:"⛽",stage:"logic",q:"12 × 3MW generators: what is total thermal input for EPA?",options:["36 MWth","42 MWth","90 MWth","120 MWth"],correct:2,explain:"12 × 3 MW ÷ 0.40 = 90 MWth, exceeding the 50 MWth EPA IE Licence threshold. The trap: EPA uses thermal input, not electrical output. A 36 MWe fleet is actually 90 MWth. Operating without the licence risks enforcement and shutdown."},
  {level:2,id:"Q005-06",icon:"⛽",stage:"rhetoric",q:"Operator says 35MW fleet is 'below 50MW EPA threshold'. Correct response?",options:["Agree — the EPA IE Licence threshold applies to electrical output and 35 MW of installed generation capacity falls clearly below the 50 MW limit.","'MCPD is the relevant regulation for this fleet — the IE Licence threshold does not apply to standby generators operating under 500 hours per year.'","'Only the N generators that run simultaneously count toward the EPA threshold, not the full installed fleet including standby units.'","'EPA uses thermal input: 35÷0.40 = 87.5 MWth — well above 50'"],correct:3,explain:"EPA uses thermal input, not electrical output: 35 MWe ÷ 0.40 = 87.5 MWth — above the 50 MWth IE Licence threshold. This electrical-vs-thermal confusion is the most common EPA error. Mark should verify any operator's headroom claim uses correct units."},
  {level:3,id:"Q005-07",icon:"🌿",stage:"grammar",q:"Approximate lifecycle CO₂ reduction switching diesel to HVO?",options:["50%","70%","90%","100%"],correct:2,explain:"HVO delivers ~90% lifecycle CO₂ reduction vs fossil diesel (EN 15940). No engine modifications needed — it is a drop-in fuel. This makes it the fastest, lowest-risk Scope 1 decarbonisation measure for any Irish DC operator."},
  {level:3,id:"Q005-08",icon:"🌿",stage:"logic",q:"Why does carbon tax trajectory (€71→€100/tCO₂) matter for HVO?",options:["Narrows HVO premium until HVO is cheaper on total cost","Rising carbon tax directly increases the regulatory cost of HVO because biogenic HVO is reclassified under EU ETS Phase 4 as a taxable fuel.","Carbon tax trajectory applies only to gas-fired generation — diesel generators are exempt from Irish carbon tax under the emergency standby exemption.","Carbon tax escalation has no impact on standby generator operating cost because fuel consumption is determined by test hours, not continuous operation."],correct:0,explain:"Carbon tax at €71/tCO₂ rising to €100 by 2030 (Finance Act) widens diesel's cost penalty each year. HVO's premium narrows as tax climbs — the total-cost crossover where HVO becomes cheaper moves earlier with each budget cycle."},
  {level:3,id:"Q005-09",icon:"🌿",stage:"rhetoric",q:"Sustainability director asks for quickest Scope 1 win. Best answer?",options:["Install rooftop solar across the DC campus — solar offsets Scope 2 grid electricity and is the most visible ESG measure available without capital risk.","Replace the standby generator fleet with BESS — BESS eliminates all Scope 1 combustion emissions and enables grid services revenue simultaneously.","Reduce the mandatory generator test regime — fewer test hours directly reduces Scope 1 fuel combustion and improves the annual carbon report.","'Switch to HVO — 90% CO₂ reduction, no engine changes, immediate'"],correct:3,explain:"HVO: ~90% CO₂ cut, no engine changes, implementable in weeks (EN 15940). No other Scope 1 measure matches this speed-to-impact ratio. Sarah can report immediate emissions improvement from the very next quarterly generator test."},
  {level:4,id:"Q005-10",icon:"🔋",stage:"grammar",q:"Which IEC 62040-3 classification provides zero transfer time?",options:["VFD","VI","VFI","All three"],correct:2,explain:"VFI: load always on the inverter — zero transfer time (IEC 62040-3:2021). VI and VFD topologies allow brief interruptions that can crash IT loads. For any critical data centre, VFI is the only acceptable UPS classification."},
  {level:4,id:"Q005-11",icon:"🔋",stage:"logic",q:"At 50MW, upgrading UPS from 94% to 97% saves approximately?",options:["€1.6M/yr","€500k/yr","€3M/yr","€5M/yr"],correct:0,explain:"3% efficiency gain × 50 MW = 1.5 MW × 8,760 hrs × €0.12/kWh = €1.58M/yr savings (CRU Q4 2024). Over a 15-year UPS life that is ~€24M avoided energy cost, plus the PUE improvement counts toward EU Taxonomy ≤1.3 compliance."},
  {level:4,id:"Q005-12",icon:"🔋",stage:"rhetoric",q:"How justify €3M UPS upgrade to a CFO?",options:["'The current UPS is beyond its design life and replacement is mandatory under IEC 62040 service life guidance to maintain equipment warranty cover.'","'The new units have improved monitoring displays and remote management capability that will reduce on-site maintenance hours by the facilities team.'","'Saves €1.6M/year — payback under 2 years, plus PUE improvement for ESG'","'IEC 62040-3 VFI classification requires modern UPS — the current legacy units do not meet current classification standards for critical IT infrastructure.'"],correct:2,explain:"€3M capex vs €1.6M/yr energy saving = sub-2-year payback. The PUE improvement also supports EU Taxonomy ≤1.3 compliance. CFOs respond when one investment delivers both financial return and measurable ESG improvement."},
  {level:5,id:"Q005-13",icon:"🧪",stage:"grammar",q:"At what capacity should VRLA batteries be replaced?",options:["80%","90%","70%","60%"],correct:0,explain:"VRLA replacement threshold is 80% of rated capacity (IEC 60896-22). Below this, degradation accelerates and UPS bridge time drops unpredictably. If autonomy falls below generator start-to-sync time, the backup chain breaks."},
  {level:5,id:"Q005-14",icon:"🧪",stage:"logic",q:"Why size batteries for EOL (80%) rather than day-one?",options:["More floor area is available at day-one and future battery additions are easier to accommodate when the initial string is undersized.","Because degradation means failing autonomy within 2–3 years if sized for day-one","LFP battery regulation under IEC 62619 requires EOL sizing as a mandatory design basis for safety-critical UPS applications.","Warranty periods are tied to capacity thresholds and sizing for day-one capacity voids the manufacturer's extended warranty coverage."],correct:1,explain:"Day-one sizing means autonomy is met only at commissioning. VRLA batteries degrade — within 2–3 years, bridge time drops below generator sync requirements. Always size for 80% EOL per IEC 60896-22 to maintain backup integrity."},
  {level:5,id:"Q005-15",icon:"🧪",stage:"rhetoric",q:"Operator says 'LFP is too expensive — staying with VRLA'. Best counter?",options:["'LFP is the newer technology and the industry is standardising on it — staying with VRLA creates a legacy asset problem within five years.'","'VRLA batteries have a documented thermal runaway risk that is unacceptable in a colocation environment under Irish fire safety regulations.'","'All tier-certified data centres are now specifying LFP as the mandatory battery chemistry — VRLA will affect your certification renewal.'","'LFP capex 2–3× but TCO ~0.5× over 20 years: longer life, fewer replacements, 70% less floor space'"],correct:3,explain:"LFP capex is 2–3× VRLA but 20-year TCO is ~0.5×: 5,000+ vs ~300 cycles, fewer replacements, 70% less floor space. When Tom includes floor-space recovery in the TCO model, the premium often pays for itself."},
  {level:6,id:"Q005-16",icon:"🔀",stage:"grammar",q:"2(N+1) with N=6: how many total generators?",options:["12","13","14","16"],correct:2,explain:"2×(6+1) = 14 total generators (Uptime Institute Tier IV). Two independent paths, each N+1, provide concurrent maintainability — any unit can be serviced without reducing either path below its rated capacity."},
  {level:6,id:"Q005-17",icon:"🔀",stage:"logic",q:"2(N+1) generators but single shared fuel tank. Effective fuel redundancy?",options:["2(N+1)","2N","N+1","N"],correct:3,explain:"Shared fuel tank = common-mode failure. Both power paths depend on one supply — contamination or depletion collapses redundancy from 2(N+1) to N. Tier IV design intent requires independent fuel supply to each path."},
  {level:6,id:"Q005-18",icon:"🔀",stage:"rhetoric",q:"Investor asks why Tier IV costs 2.6× more. How frame it?",options:["'Tier IV is required by Irish planning policy for data centres above 50 MW IT load in the Greater Dublin Area.'","'Any single failure is invisible to tenants. Premium is insurance against €100k+/hour downtime'","'All institutional-grade data centres are now specifying Tier IV as the minimum standard for new colocation facilities in Europe.'","'Tier IV generators and UPS systems are higher quality units from a smaller pool of specialist manufacturers, which drives the cost premium.'"],correct:1,explain:"Tier IV costs ~2.6× Tier III, but one outage can exceed €100k/hr in SLA penalties. Framing the premium as insurance against quantified downtime loss makes it a risk-based investment decision, not a gold-plating conversation."},
  {level:7,id:"Q005-19",icon:"🔄",stage:"grammar",q:"STS typical transfer time?",options:["<4ms","0ms","60–100ms","500ms"],correct:0,explain:"STS achieves <4 ms transfer via thyristors (IEC 62310-1:2005). Last line of defence: if the primary UPS path fails, load switches to the alternate before IT equipment sees any disturbance. Essential for dual-path topologies."},
  {level:7,id:"Q005-20",icon:"🔄",stage:"logic",q:"Why is full transfer testing more important than individual generator tests?",options:["Individual component tests are not required once full transfer testing is passed — a successful full test retrospectively validates all sub-system performance.","Tests handoffs where most failures occur","Full transfer testing is cheaper to execute than individual generator tests and covers the same technical scope with a single test event.","Regulators require full transfer testing as a licence condition — individual generator tests do not satisfy the EPA IE Licence commissioning requirement."],correct:1,explain:"Most failures occur at component handoffs — paralleling, ATS transfer, UPS stand-down — not within individual units. Only integrated systems testing (IST) proves the complete backup chain functions end-to-end."},
  {level:7,id:"Q005-21",icon:"🔄",stage:"rhetoric",q:"Client says 'We test generators monthly, so backup is proven.' What's wrong?",options:["Monthly generator testing is insufficient — quarterly is the minimum frequency accepted by EPA under the IE Licence regime for standby plant.","'Start tests prove engines. They don't prove paralleling, sync, load transfer, and UPS stand-down work together.'","Only weekly testing is adequate to prove standby backup — monthly test intervals allow degradation to develop between tests without detection.","Full transfer testing is unnecessary where BESS provides primary backup — generator tests are only required as a secondary validation."],correct:1,explain:"Start tests prove engines run — not that paralleling, ATS transfer, and UPS stand-down work together. Most outages originate at component handoffs. Full IST is the only proof that the backup chain functions as a system."},
  {level:8,id:"Q005-22",icon:"⚡",stage:"grammar",q:"Primary DS3 revenue stream for BESS in Ireland?",options:["Demand Response","Black Start","Voltage support","FFR"],correct:3,explain:"FFR: €15–25/MW/hr contracted availability under EirGrid's DS3 programme (2024/25 tariff). This is the primary BESS revenue stream in Ireland. Without a secured DS3 contract, the BESS investment case becomes speculative."},
  {level:8,id:"Q005-23",icon:"⚡",stage:"logic",q:"Fundamental risk of BESS dual-use?",options:["Battery degradation from continuous grid cycling reduces the BESS capacity available for DC backup below the design autonomy within three years.","BESS may be grid-dispatched with low SOC when DC mains fails","BESS dual-use creates a grid connection capacity issue because the DC's agreed maximum import capacity is exceeded during simultaneous backup and grid export.","Grid connection cost for a dual-use BESS is two to three times higher than a standalone backup system, reducing the projected DS3 revenue payback."],correct:1,explain:"If BESS is grid-dispatched to low SOC when mains fails, it cannot bridge to generator start. Minimum SOC must be contractually protected, but reserving capacity cuts DS3 revenue — the core tension in every dual-use business case."},
  {level:8,id:"Q005-24",icon:"⚡",stage:"rhetoric",q:"CFO sees vendor's 4.2-year BESS payback. First question to advise?",options:["Is the quoted capital cost based on a fixed-price EPC contract or an indicative supply cost — BESS civil and electrical integration costs are frequently omitted from vendor payback models?","'Is revenue based on contracted or projected DS3 rates — and what happens at contract expiry?'","What discount rate is the vendor using — most vendor payback models use a 5% discount rate whereas institutional DC investment analysis applies 8–10%?","How many BESS containers are included — vendor models frequently assume a four-container configuration that does not reflect the actual project scope?"],correct:1,explain:"Vendor payback models assume current DS3 rates persist, but contracts are time-limited. At renewal, rates may fall as BESS capacity grows. Ann's first question: is revenue contracted or projected, and what happens at contract expiry?"},
  {level:9,id:"Q005-25",icon:"🏗️",stage:"grammar",q:"Typical EirGrid HV connection lead time in Ireland?",options:["3–6 months","6–12 months","12–24 months","3–5 years"],correct:2,explain:"12–24 months in Dublin (EirGrid 2024). Grid connection is typically the longest critical-path item. A delay cascades through generator Cx, UPS energisation, and tenant handover — shifting every downstream programme milestone."},
  {level:9,id:"Q005-26",icon:"🏗️",stage:"logic",q:"Why must design follow IT load → PUE → UPS → Battery → Generators → Fuel → BESS → Compliance?",options:["The design sequence is alphabetical by discipline to maintain consistency with the EirGrid connection application format.","Each step's output is the next step's input — PUE change cascades through everything","Design standards including CIBSE TM57 and the Uptime Institute Tier Standard require this sequence as a mandatory design methodology.","This sequence reduces capital cost by allowing each design stage to be value-engineered before the next layer of equipment is specified."],correct:1,explain:"Each output is the next input: PUE → cooling load → generator count → thermal input → EPA licensing. Changing PUE mid-design forces recalculation of every downstream step. This is why the design sequence is non-negotiable."},
  {level:9,id:"Q005-27",icon:"🏗️",stage:"rhetoric",q:"One question to reveal if a DC's backup is proven or theoretical?",options:["What is the total installed generator capacity — confirmed plant lists reveal whether the design is current or based on original specification.","'When was the last successful full-load transfer test?'","Is the facility Tier certified — Uptime Institute certification requires documentation of all backup systems to validated design standards.","What UPS brand is installed — the UPS manufacturer's name confirms whether the DC is using enterprise-grade or commercial-grade backup systems."],correct:1,explain:"Full-load transfer test is the only proof the backup works end-to-end. Individual component tests miss handoff failures. Asking 'when was the last successful IST?' separates proven backup from theoretical redundancy on paper."}
];
const GLOSSARY_005 = [
{term:"Tier IV",def:"Uptime Institute classification: 99.995% availability, fault-tolerant, concurrently maintainable. Maximum 26.3 min unplanned downtime/year."},
{term:"UPS (Uninterruptible Power Supply)",def:"Power conditioning and battery-backed device providing continuous power to IT load during mains failure. VFI topology provides zero transfer time."},
{term:"VFI (Voltage and Frequency Independent)",def:"UPS topology where load is always powered from the inverter. Mains disturbances never reach the IT equipment. IEC 62040-3 classification."},
{term:"Bridge Time",def:"Duration the UPS battery sustains IT load between mains failure and generator synchronisation. Typically 5–15 minutes."},
{term:"Fuel Autonomy",def:"Duration the generator fleet can operate on stored fuel. Tier IV minimum 48 hours. Depends on load, PUE, and tank capacity."},
{term:"Transfer Time",def:"Duration of power interruption when switching between sources. VFI UPS = 0ms. ATS = 10–100ms."},
{term:"ATS (Automatic Transfer Switch)",def:"Electromechanical switch that transfers load between utility and generator supply. Transfer time typically 60–100ms."},
{term:"STS (Static Transfer Switch)",def:"Solid-state switch providing sub-cycle (<4ms) transfer between two independent power sources. Last line of defence if UPS fails."},
{term:"Generator Paralleling",def:"Connecting multiple generators to a common bus to share load. Enables N+1 redundancy and flexible capacity allocation."},
{term:"Specific Fuel Consumption (SFC)",def:"Fuel used per unit of electrical energy generated. Typically 0.25–0.30 L/kWh for modern diesel generators."},
{term:"MCPD (Medium Combustion Plant Directive)",def:"EU 2015/2193, transposed as S.I. 595/2017. Emission limits for plant 1–50 MWth. Applies to generator fleets above threshold."},
{term:"EPA IE Licence",def:"Environmental Protection Agency Industrial Emissions licence required for thermal plant >50 MWth. First Schedule Class 2.1."},
{term:"Load Bank Testing",def:"Applying artificial load to a generator to verify performance at rated capacity. Essential because many generators run under-loaded."},
{term:"HVO (Hydrotreated Vegetable Oil)",def:"Paraffinic renewable diesel (EN 15940). Drop-in replacement for fossil diesel. ~90% Scope 1 CO₂ reduction."},
{term:"CFPP (Cold Filter Plugging Point)",def:"Lowest temperature at which fuel flows through a standard filter. Critical for HVO in Irish winter conditions."},
{term:"Carbon Tax",def:"Currently €71/tCO₂ (Tier 1 — Budget 2025 / Finance Act), legislated to reach €100/tCO₂ by 2030 (Tier 1 — Finance Act). Applies to all fossil fuel combustion including generator testing."},
{term:"VRLA (Valve Regulated Lead Acid)",def:"Sealed lead-acid battery. Typical UPS application. 7–10 year design life. 80% capacity at end of life."},
{term:"LFP (Lithium Iron Phosphate)",def:"Lithium-ion chemistry (LiFePO₄). 15+ year life, 5000+ cycles. Requires thermal management and fire detection."},
{term:"Thermal Runaway",def:"Exothermic chain reaction in battery cells causing rapid temperature rise, fire, and toxic gas release. Primary risk with lithium-ion."},
{term:"Impedance Testing",def:"Non-invasive battery health measurement. Rising impedance indicates cell degradation. IEEE 1188/1189."},
{term:"N+1 Redundancy",def:"One more component than required. Minimum for maintenance without risk to IT load. Single fault tolerant."},
{term:"2N Redundancy",def:"Two complete independent systems, each capable of serving full load. Concurrent maintainability."},
{term:"2(N+1) Redundancy",def:"Two complete independent systems, each with N+1 internal redundancy. Tier IV requirement."},
{term:"Concurrent Maintainability",def:"Ability to maintain any component without affecting IT load. Requires minimum 2N topology."},
{term:"BESS (Battery Energy Storage System)",def:"Standalone battery system for grid services, peak shaving, or backup. Typically LFP chemistry, 1–4 hour duration."},
{term:"DS3 (System Services)",def:"EirGrid programme paying for grid stabilisation services. Fast Frequency Response (FFR) is the primary revenue stream for BESS."},
{term:"FFR (Fast Frequency Response)",def:"Power injection within 2 seconds of frequency deviation. €15–25/MW/hr contracted availability (Tier 2 — EirGrid DS3 Regulated Tariff 2024/25). EirGrid DS3 requirement."},
{term:"CRM (Capacity Remuneration Mechanism)",def:"SEM capacity auction. T-4 clearing price €149,960/MW/year (Tier 1 — SEMO PCAR2829T-4). Pays generators to be available."},
{term:"Grid-Interactive UPS",def:"UPS that provides IT backup and participates in DS3 grid services simultaneously. Reserves minimum SoC for critical load."},
{term:"SoC (State of Charge)",def:"Battery charge level as percentage of capacity. Grid-interactive UPS typically reserves 50% SoC for IT protection."},
{term:"CRU Dispatchable Generation",def:"CRU/2025236 requirement: new data centres must provide generation that responds to SEM dispatch signals. Transforms DC from consumer to prosumer."},
{term:"EN 50600-2-2",def:"European standard for data centre power distribution infrastructure. Defines availability classes and design requirements."},
{term:"IEC 62040-3",def:"International standard for UPS classification. Defines VFI, VI, VFD topologies and performance requirements."},
{term:"Commissioning (Cx)",def:"Systematic process of verifying that installed systems perform according to design intent. CIBSE Commissioning Code M."},
{term:"IST (Integrated Systems Testing)",def:"Testing the complete backup chain under simulated failure conditions. Verifies generator-UPS-ATS-STS coordination."},
{term:"MIC (Maximum Import Capacity)",def:"Maximum power that can be drawn from the ESB Networks connection. Clonshaugh = 5 MVA at 10 kV MV."},
{term:"UL 9540A",def:"Standard test method for evaluating thermal runaway fire propagation in BESS installations. Insurance requirement."},
{term:"NFPA 855",def:"Standard for the installation of stationary energy storage systems. Covers fire protection, spacing, and ventilation requirements."}
];

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Runtime Error'),
      React.createElement('p',null,'DC-LEARN-005 v6.6.10 · Backup Power: Generators, UPS & BESS'),
      React.createElement('pre',{style:{fontSize:12,background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,overflow:'auto',whiteSpace:'pre-wrap'}},String(this.state.error)),
      React.createElement('p',{style:{color:'#6b7280',fontSize:13,marginTop:8}},'Copy this error and send to LM.')
    );
    return this.props.children;
  }
}

// AssistBar — Clarify only (Grammar), no Read Aloud

const hasTextSelection = () => { const sel = window.getSelection(); return sel && sel.toString().length > 0; };

function AssistBar({fact,level,stage}){
  const [mode,setMode]=useState(null);
  const [round,setRound]=useState(0);
  const rounds=['analogy','firstPrinciples','theTest'];
  const handleClarify=()=>{if(mode==='clarify'){const next=(round+1)%3;setRound(next);}else{setMode('clarify');setRound(0);}};
  const speak=(text)=>{if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.9;window.speechSynthesis.speak(u);}};
  const handleRead=()=>{
    let text='';
    if(stage==='grammar')text=[fact.term,fact.definition,fact.plain,'Number: '+fact.number,'Standard: '+fact.standard].join('. ');
    else if(stage==='logic'&&level.logic)text=level.logic.causeAndEffect.map(ce=>ce.cause+'. '+ce.effect+'. '+ce.insight).join('. ');
    else if(stage==='rhetoric'&&level.rhetoric)text=Object.values(level.rhetoric).filter(v=>typeof v==='string').join('. ');
    speak(text);
  };
  return (
    <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
      {stage==='grammar' && fact.feynman && (
        <button style={{padding:'5px 12px',border:'1px solid var(--grammar)',borderRadius:6,background:'transparent',color:'var(--grammar)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleClarify}>💡 Clarify ({rounds[round]})</button>
      )}
      <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}} onClick={handleRead}>🔊 Read Aloud</button>
      {mode==='clarify' && fact.feynman && (
        <div className="fade-in" style={{width:'100%',marginTop:8,padding:12,background:'var(--panel)',borderRadius:8,border:'1px solid var(--grammar)',fontSize:13,color:'var(--text)',lineHeight:1.8}}>
          <div style={{fontWeight:600,color:'var(--grammar)',marginBottom:6,fontSize:12,textTransform:'uppercase'}}>{rounds[round]}</div>
          {fact.feynman[rounds[round]]}
        </div>
      )}
    </div>
  );
}

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'declan', label:'Declan', role:'Ops Manager',    color:'var(--accent)'},
    {key:'ann',    label:'Ann',    role:'Fund Manager',   color:'#e879a0'},
    {key:'mark',   label:'Mark',   role:'MEP Engineer',   color:'var(--green)'},
    {key:'sarah',  label:'Sarah',  role:'ESG Analyst',    color:'#2dd4bf'},
    {key:'tom',    label:'Tom',    role:'QS / Cost',      color:'#fb923c'},
  ];

  const pkeys = ['declan','ann','mark','sarah','tom'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (levelNum) => {
    setSelectedLevel(levelNum);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) : null;
  const activeTop3 = activePersona ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        activePersona ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      activePersona && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    activePersona && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.lvl.level),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.name
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric \u2192'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].lvl.level),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric \u2192`)
    )
  );
}

              <h2 style={{margin:0,fontSize:22,color:'#fff'}}>Backup Power Chain — Clonshaugh DC</h2>

    <div className="chain-layout">
      <div>
        <div className="card">
          {LEVELS.map((lvl,i)=>{
            const p = progress[lvl.id]||{};
            const cr = calcResult ? calcResult[i] : null;
            return (
              <div key={lvl.id} className={'chain-item'+(cr?(cr.pass?' pass':' fail'):'')}
                role="button" tabIndex={0}
                onClick={()=>{ if(!hasTextSelection()) setActiveChainLevel(activeChainLevel===lvl.level?null:lvl.level); }}
                onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&setActiveChainLevel(activeChainLevel===lvl.level?null:lvl.level)}>
                <div style={{fontSize:24,lineHeight:1}}>{lvl.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,color:'var(--text-bright)'}}>L{lvl.level}: {lvl.name}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{lvl.component}</div>
                  {cr && (<div style={{marginTop:6,fontSize:12}}><span className={cr.pass?'badge badge-pass':'badge badge-fail'}>{cr.pass?'PASS':'FAIL'}</span><span style={{color:'var(--text-dim)',marginLeft:8}}>{cr.detail}</span></div>)}
                  {activeChainLevel===lvl.level && (
                    <div className="fade-in selectable-text" style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',userSelect:'text',cursor:'text'}}
                      onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
                      <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,marginBottom:8}}>{lvl.plainEnglish}</p>
                      <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',marginBottom:8}}>User Need: {lvl.userNeedStatement}</p>
                      <button style={{padding:'6px 14px',border:'1px solid var(--green)',borderRadius:6,background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-sans)'}}
                        onClick={(e)=>{e.stopPropagation();goToLevel(lvl);}}>Open in Learn tab →</button>
                    </div>
                  )}
                </div>
                <div style={{display:'flex',gap:4,alignItems:'center',paddingTop:4}}><Dot done={p.grammar} stage="grammar"/><Dot done={p.logic} stage="logic"/><Dot done={p.rhetoric} stage="rhetoric"/></div>
              </div>
            );
          })}
        </div>

        <PersonaEntryCard setActiveTab={setActiveTab} setSelectedLevel={setSelectedLevel} />
      </div>
      <div>
        <div className="sidebar-card">
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--text-bright)',marginBottom:12}}>🔢 Cascade Calculator</h3>
          <label style={{fontSize:12,color:'var(--text-dim)'}}>Target kW/rack<input className="calc-input" type="number" value={calcKw} onChange={e=>setCalcKw(Number(e.target.value))}/></label>
          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Racks<input className="calc-input" type="number" value={calcRacks} onChange={e=>setCalcRacks(Number(e.target.value))}/></label>

function Walkthrough({title, subtitle, steps, insight, narrative, takeaway, children}) {
  const [step, setStep] = useState(0);
  return (
    <div className="card">
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:2}}>{title}</div>

          <button key={i} onClick={() => setStep(i)} className="step-btn"
            style={{border:step===i?'1px solid var(--green)':'1px solid var(--border)',
              background:step===i?'var(--green-dim)':'transparent',
              color:step===i?'var(--green)':'var(--text-dim)',fontWeight:step===i?600:400}}>
            {i+1}. {s}
          </button>
        ))}
      </div>
      {typeof children === 'function' ? children(step) : children}
      {insight && step === steps.length - 1 && (
        <div className="fade-in" style={{marginTop:12,padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid var(--warn)',borderRadius:8,fontSize:12,color:'var(--text-bright)',lineHeight:1.6}}>{insight}</div>

  );
}

/* ═══ 2. L1 — TIME HORIZONS ═══ */
function L1Diagram() {
  return (
    <Walkthrough
      title="L1: Backup power time horizons"
      subtitle="Three layers of protection — each covers a different time window"
      steps={["UPS: 0–10 minutes","Generator: 10 min to 48+ hrs","Fuel: days to weeks"]}
      insight="Each layer hands off to the next. If any handoff fails — battery too degraded, generator won't start, fuel runs out — the chain breaks. The weakest handoff is the real availability, not the strongest component."
      narrative="This timeline shows the three backup power layers and how they overlap. The UPS (with batteries) provides instant coverage from the moment mains fails — zero transfer time. The generator starts within 10–30 seconds and takes over from the UPS, running for as long as fuel lasts. Fuel storage determines the maximum duration — at Clonshaugh, 175,000 litres gives approximately 48 hours at full load."
      takeaway="UPS bridges seconds-to-minutes. Generators bridge hours-to-days. Fuel storage determines the maximum. Each layer must hand off cleanly to the next.">
      {(step) => {
        const bars = [
          {label:"UPS + Battery",start:0,end:120,col:"#2563EB",y:70,detail:"0 ms, 5–10 min"},
          {label:"Generator fleet",start:5,end:480,col:"#d97706",y:130,detail:"25s start, runs for hours/days"},

            <AD/>
            <text style={{font:'600 13px var(--font-sans)',fill:'var(--text-bright)'}} x="340" y="20" textAnchor="middle">Three layers of backup — each covers a time window</text>
            {[{t:"0",x:0},{t:"10s",x:2},{t:"1m",x:10},{t:"10m",x:100},{t:"1hr",x:200},{t:"8hr",x:350},{t:"48hr",x:520}].map((m,i) => (
              <g key={i}>
                <text style={{font:'400 8px var(--font-mono)',fill:'var(--text-muted)'}} x={xBase + m.x * xScale} y="52" textAnchor="middle">{m.t}</text>

              return (
                <g key={i}>

                </g>
              );

                <line x1={xBase + 80 * xScale} y1="106" x2={xBase + 80 * xScale} y2="128" stroke="var(--warn)" strokeWidth="1.5" markerEnd="url(#a)"/>

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{

        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });

        const timedOutSet=Object.assign({},newTimeouts);

        </div>
      )}
      {filtered.map((q,fi)=>{
        const gi=globalIdx(q);
        const answered=answers[gi]!==undefined;
        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';
        const countdownCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';

          <div key={gi} className="card" style={{marginBottom:12,borderLeft:'3px solid '+stageColours[q.stage],borderRadius:'0 10px 10px 0',opacity:isTimedOut&&!answered?0.7:1}}>

              <span style={{fontSize:12,color:'var(--text-muted)'}}>Level {q.level}</span>
              {/* B5: per-question countdown top-right */}
              {timerActive&&!answered&&!isTimedOut&&qStarted&&(
                <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:countdownCol,minWidth:36,textAlign:'right'}}>
                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  return supa.from('certificates').insert([{ user_id: userId, module_id: TOOL_ID, certificate_number: certNumber, cpd_hours: 2, certificate_type: 'Engagement', score: null, learner_name: learnerName, pdf_url: null }]).select().single().then(function(result) {
    if (result.error) { console.error('Engagement cert failed:', result.error.message); return null; }
    return { certNumber: certNumber, type: 'Engagement', hours: 2, pct: null };
  });
}

/* ─── DC-LEARN AUTH COMPONENT v1.0 ───────────────────────────────────────
   Drop this block into each module HTML file, inside the <script type="text/babel"> block,
   immediately BEFORE function App().

   FREE modules (DC-LEARN-000, 001, 002): set IS_FREE_MODULE = true
   PAID modules (DC-LEARN-003 to 015):    set IS_FREE_MODULE = false

   The component:
   - Checks Supabase session on load
   - Queries learner_tiers for paid status
   - Free modules: always open, shows login button in header if not logged in
   - Paid modules: locked overlay if not logged in or free tier
   - Login via email magic link (no password to forget)
   - Session cached in localStorage for speed
   ─────────────────────────────────────────────────────────────────────── */

const IS_FREE_MODULE = false; // SET TO true FOR DC-LEARN-000, 001, 002

/* ── Auth State Manager ── */
const dcAuth = {
  _session: null,
  _tier: null,

  async init() {
    if (!supa) return;
    // Check cached session
    try {
      const { data: { session } } = await supa.auth.getSession();
      this._session = session;
      if (session) {
        await this._loadTier(session.user.id);
      }
    } catch(e) {
      console.warn('Auth init failed:', e);
    }
    // Listen for auth changes
    supa.auth.onAuthStateChange(async (_event, session) => {
      this._session = session;
      this._tier = null;
      if (session) await this._loadTier(session.user.id);
    });
  },

  async _loadTier(userId) {
    try {
      const { data } = await supa
        .from('learner_tiers')
        .select('tier')
        .eq('user_id', userId)
        .single();
      this._tier = data?.tier || 'free';
    } catch(e) {
      this._tier = 'free';
    }
  },

  isLoggedIn() { return !!this._session; },
  isPaid() { return this._tier === 'founding' || this._tier === 'professional'; },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
  userEmail() { return this._session?.user?.email || null; },

  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    const { error } = await supa.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    return { error };
  },

  async signOut() {
    if (!supa) return;
    await supa.auth.signOut();
    window.location.reload();
  }
};

/* ── Auth Hook for App() ── */
function useAuth() {
  const [authState, setAuthState] = React.useState({
    loading: true,
    loggedIn: false,
    hasAccess: IS_FREE_MODULE,
    email: null
  });

  React.useEffect(()=>{
    dcAuth.init().then(()=>{
      setAuthState({
        loading: false,
        loggedIn: dcAuth.isLoggedIn(),
        hasAccess: dcAuth.hasAccess(),
        email: dcAuth.userEmail()
      });
    });

    if (supa) {
      supa.auth.onAuthStateChange(async ()=>{
        // Small delay to let tier load
        setTimeout(()=>{
          setAuthState({
            loading: false,
            loggedIn: dcAuth.isLoggedIn(),
            hasAccess: dcAuth.hasAccess(),
            email: dcAuth.userEmail()
          });
        }, 500);
      });
    }
  },[]);

  return authState;
}
