header h1{font-size:22px;font-weight:700;line-height:1.2}

.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}

.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}

.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}

.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}

const DC_TIMING_KEY = 'dc005_timing';
const dcTimingLog = (function(){
  var buf = [];
  try { var s = safeStore.get(DC_TIMING_KEY); if(s) buf = JSON.parse(s); } catch(e){ buf = []; }
  function flush(){ try { safeStore.set(DC_TIMING_KEY, JSON.stringify(buf)); } catch(e){} }
  function log(event, data) {
    buf.push(Object.assign({ event: event, ts: Date.now() }, data || {}));
    if(buf.length > 2000) buf = buf.slice(-1500);
    flush();
  }
  log('module_open', { module: TOOL_ID, version: TOOL_VERSION });
  try { window.addEventListener('beforeunload', function(){ log('module_close', {}); flush(); }); } catch(e){}
  return { log: log };
})();

  {id:"L1",level:1,name:"Why Backup Power Matters",icon:"🔌",component:"Backup Power Overview",available:true,
   cascadeCheck:(kw,racks,pue)=>{const itMW=(kw*racks)/1000;const totalMW=itMW*pue;const genMW=14;return{needed:totalMW.toFixed(1),available:genMW.toFixed(1),unit:"MW gen capacity",pass:totalMW<=genMW*0.8,detail:itMW.toFixed(1)+"MW IT × "+pue+" PUE = "+totalMW.toFixed(1)+"MW vs "+genMW+"MW generator fleet"};},
   userNeedStatement:"Provide continuous power to the IT load when the utility supply fails — from the first millisecond to the last litre of fuel.",
   plainEnglish:"A data centre without backup power is like a hospital without an emergency generator. The lights may go out once a year, but when they do, every second of darkness costs money and reputation.",
   grammar:{
     facts:[
       {term:"Tier IV Uptime",definition:"99.995% availability — maximum 26.3 minutes unplanned downtime per year.",plain:"The lights can go out for less than half an hour per year — total.",number:"26.3 min/year",standard:"Uptime Institute Tier Standard: Topology (2018)",feynman:{analogy: "Tier IV is like a hospital that promises to never close its emergency room — not for maintenance, not for equipment failure, not even for a power cut. The whole building is designed so any single thing can break without anyone noticing.", firstPrinciples: "Availability is measured as a percentage of time a system is operational. 99.995% means only 0.005% downtime — about 26 minutes per year. Achieving this requires eliminating every single point of failure.", theTest: "A facility claims 99.99% uptime. How many minutes of downtime per year does that allow? Answer: about 53 minutes — roughly double what Tier IV permits."},soWhat:"Tier classification sets the redundancy floor — every component below must meet or exceed it."},
       {term:"UPS Bridge Time",definition:"Duration the UPS battery sustains IT load between mains failure and generator start.",plain:"The battery buys time while the generators warm up.",number:"5–15 minutes",standard:"EN 50600-2-2:2019 Section 6.2",feynman:{analogy: "The UPS battery is like the air in your lungs when you dive underwater. It keeps you alive while you swim to the surface (generator start). If you run out of air before reaching the surface, you drown.", firstPrinciples: "Generators need time to start, accelerate, and synchronise before they can accept load. The battery must hold the full IT load for this entire duration. If the battery depletes before the generator connects, load is lost.", theTest: "UPS battery provides 10 minutes. Generator takes 25 seconds to sync. What is the safety margin? Answer: 575 seconds (9 min 35 sec). But this assumes day-one battery capacity — at end of life (80%), bridge drops to 8 minutes."},soWhat:"Bridge time is the gap between grid loss and generator load — if it closes before the battery runs out, you survive."},
       {term:"Fuel Autonomy",definition:"Duration the generator fleet can operate on stored fuel. Tier IV minimum is 48 hours.",plain:"How many days you can run on the fuel in your tanks.",number:"48 hours minimum (Tier IV)",standard:"Uptime Institute Tier Standard: Topology (2018)",feynman:{analogy: "Fuel autonomy is like the water tank on a remote farm. When the mains pipe breaks, you live off stored water. If nobody delivers more before the tank runs dry, the farm shuts down.", firstPrinciples: "Generators convert diesel or HVO into electricity. The fuel tank is finite. Autonomy equals stored litres divided by consumption rate. Consumption rate depends on load, which depends on IT plus cooling.", theTest: "A facility has 100,000 litres and consumes 3,000 litres/hour at current load. What is the autonomy? Answer: 33.3 hours — below the 48-hour Tier IV minimum."},soWhat:"Fuel autonomy is the hard ceiling on generator runtime — no fuel, no power, no data centre."},
       {term:"Transfer Time",definition:"Duration of power interruption when switching between sources. VFI UPS = 0ms.",plain:"How long the power blinks when something switches over.",number:"0ms (VFI) to 100ms (ATS)",standard:"IEC 62040-3:2021",feynman:{analogy: "Transfer time is like changing lanes on a motorway. A smooth lane change (VFI UPS) means the passenger never feels a bump. A sudden swerve (ATS) causes a brief jolt. Hitting the barrier (no UPS) means a crash.", firstPrinciples: "When power source changes, there is a brief moment where voltage may dip or disappear. IT equipment tolerates zero interruption (VFI) but not 100ms gaps. The transfer mechanism determines whether the load notices the switch.", theTest: "An ATS transfers in 80ms. A VFI UPS transfers in 0ms. Why can the ATS gap not be felt by IT behind a VFI UPS? Answer: the UPS is always powering the IT load from its inverter — the ATS gap only affects the UPS input, not the IT output."},soWhat:"Transfer time determines whether IT equipment notices the switch — VFI UPS makes it invisible."},
       {term:"Outage Cost",definition:"Financial impact per hour of unplanned downtime for a typical 10MW colocation facility.",plain:"What it costs when the power goes out and stays out.",number:"€30k–€100k/hour (Tier 2 — Uptime Institute Annual Outage Analysis 2024, indicative; typical 10MW colocation — expanded teaching scenario)",standard:"Uptime Institute Annual Outage Analysis 2024",feynman:{analogy: "An outage cost is like a taxi meter running while you are stuck in traffic. Every minute ticking costs money — lost revenue, SLA penalties, emergency contractor fees, and reputation damage that is harder to measure but often more expensive.", firstPrinciples: "Downtime costs include direct revenue loss, SLA penalty payments, emergency response costs, data recovery, and reputational damage. For colocation, tenants may have termination clauses triggered by SLA breaches.", theTest: "Calculation — input: colocation revenue €200/kW/month (Tier 2 — JLL/CBRE DC market data 2024, indicative; expanded teaching scenario). SLA penalty structure: 10% credit (Tier 3 — industry-standard lease terms, indicative). All outputs screening-level. A 10MW facility earns €200/kW/month in colocation revenue. A 4-hour outage triggers a 10% monthly SLA credit. What is the direct financial impact? Answer: 10,000kW × €200 × 10% = €200,000 (indicative) — plus emergency costs and tenant churn risk."},soWhat:"Outage cost converts downtime seconds into euros — the number that justifies every backup investment."}
     ],
     whatItLooksLike:"The backup power chain lives in the generator yard (outdoor acoustic enclosures), the UPS room (rows of black cabinets with battery racks), and the main switchroom (paralleling switchgear, ATS panels, monitoring screens).",
     siteChecklist:["Identify UPS room(s) — note topology (VFI/VI/VFD)","Count generators and read nameplate rating","Locate fuel tanks and note capacity in litres","Check fuel level and calculate hours of autonomy","Identify ATS/STS panels — note transfer mechanism","Check UPS battery room temperature vs setpoint"]
   },
   logic:{
     causeAndEffect:[
       {cause:"Grid outage exceeds 15 minutes — the threshold beyond which UPS battery autonomy is typically exhausted at full load",effect:"UPS battery depletes if generators fail to start within autonomy window — total facility power loss and uncontrolled IT shutdown",insight:"The UPS doesn't protect you from long outages — it protects you from the 10 seconds between grid failure and generator sync."},
       {cause:"Fuel delivery chain disrupted during extended grid outage — tanker access, supplier priority, road conditions all at risk",effect:"Generators stop when fuel tanks run dry — no automatic fuel transfer from reserve, facility loses all backup power simultaneously",insight:"48-hour autonomy assumes resupply arrives. In a national emergency, fuel trucks may not get through."},
       {cause:"UPS battery capacity degrades below 80% of original rated capacity — the industry-standard end-of-life threshold",effect:"UPS autonomy falls below the design minimum bridge time — insufficient margin for generator start and load acceptance sequence",insight:"Batteries fade gradually. Nobody notices until the next real outage when 10 minutes becomes 4 minutes."}
     ],
     constraintLesson:"The backup chain is a time-series problem. Each component covers a different window:\n\n0–10ms: UPS (zero transfer for VFI)\n10s–15min: UPS battery (bridge to generator)\n15min–48hrs+: Generators (fuel-limited)\n\nThe weakest link is the handoff between stages. Every backup design is an exercise in ensuring no gap exists between these three horizons.",
     weakestLink:{whatsWrong:"Assuming backup power means 'having generators'. Many facilities have generators but haven't tested the full transfer sequence in years.",whatsRight:"Backup power is a chain. The weakest link determines actual resilience.",howToGetThere:"Map the complete time sequence. Test every handoff. Measure every duration."}
   },
   rhetoric:{
     declan:{hook:"Test the full transfer sequence quarterly — not just generator starts. A generator that starts is not the same as a generator that carries the load.",text:"Declan — test the full transfer sequence quarterly, not just generator starts. A generator that starts but doesn't sync is the same as one that doesn't start. The transfer chain has at least four failure points: generator synchronisation, ATS transfer, UPS reversion, and PDU switching. If any one fails, generators running perfectly at the yard is irrelevant. Book a weekend window, bring the load transfer team, and test the whole chain from utility failure to stable generator supply and back again. Document every transfer time."},
     ann:{hook:"Backup resilience maps directly to SLA performance. Ask the operator: when was the last documented full-load transfer test, and what was the outcome?",text:"Ann, backup resilience maps directly to SLA performance. Ask the operator: when was the last time you ran on generators for 4+ hours under real load?"},
     mark:{hook:"Size UPS bridge time for end-of-life battery capacity at 0.80 derating — not day-one rating. The calculation difference can be 4 minutes versus 9.",text:"Mark — size UPS bridge time for end-of-life battery capacity, not day-one ratings. VRLA loses 20% capacity by year 7. The real engineering is in the transfer timing — coordinate generator start, ATS transfer, and UPS bypass so that the battery never sees more than 80% of its rated discharge. I'd check whether the spec requires minimum 10 minutes bridge time at EOL capacity with 100% IT load. That margin is what separates a designed system from a hopeful one."},
     sarah:{hook:"Backup power is the largest single Scope 1 carbon risk in DC operations. The shift from diesel to HVO is the fastest decarbonisation lever available today.",text:"Sarah, backup power is the largest single Scope 1 carbon risk. The shift from diesel to HVO and from generators to BESS is the most impactful decarbonisation lever."},
     tom:{hook:"Backup power is 15 to 20 percent of total DC M&E capital cost. Budget for UPS battery replacement at year 7 — it is not a surprise, it is a schedule item.",text:"Tom — backup power is 15–20% of total DC M&E capital cost. Budget for UPS battery replacement at year 10 (VRLA) or 15 (LFP) — it's a known future cost that most reserve fund studies underestimate. A 2 MW UPS with VRLA will see two full battery swaps over a 20-year lifecycle at roughly €150–250k each (Tier 3 — BNEF H2 2025; battery manufacturer published, indicative). Factor this into the reserve fund from day one. The CRU dispatchable generation requirement (CRU/2025236) may add further cost if generators must be SEM-capable — budget an additional 10–15% for dispatch readiness."}
   },
   rhetoricTakeaways:{declan:"Test the full transfer chain quarterly — a generator that starts but doesn't sync is the same as one that doesn't start.",ann:"Backup resilience maps directly to SLA revenue protection — quantify the cost of a single 4-hour outage against the reserve fund.",mark:"Size every component for end-of-life capacity, not day-one ratings — the weakest link at year 10 is the real design constraint.",sarah:"Backup power is the largest Scope 1 risk — the diesel-to-HVO transition is the single highest-impact decarbonisation action.",tom:"Budget 15–20% of total M&E capital for backup — and include two battery replacement cycles in the 20-year reserve fund."},
   scenario:{title:"Storm Éowyn: 72-Hour Grid Outage",narrative:"A major storm hits Ireland. Your 5MW facility loses grid at 02:00 Friday. Generators start cleanly. But 30 hours in, the fuel supplier can't guarantee delivery until Monday (48+ hours away). You have 18 hours of fuel remaining.",question:"What do you do with 18 hours of fuel and no confirmed resupply?",answer:"1. REDUCE LOAD: Negotiate with tenants to shed non-critical IT. Each 10% reduction extends fuel ~10%.\n2. SECURE ALTERNATIVE FUEL: Contact multiple suppliers. Check neighbouring facilities.\n3. NOTIFY STAKEHOLDERS: Inform tenants with honest timelines. Trigger SLA force majeure.\n4. PREPARE GRACEFUL SHUTDOWN: If fuel can't be secured, plan controlled shutdown — save state, power down non-critical first.\n\nThe lesson: 48-hour autonomy is a minimum, not a guarantee. Real resilience includes fuel supply agreements and tested shutdown plans.",
whoShouldCare:["declan","mark"]},

  clockQuote:"Preparation is where you catch mistakes. Execution is where you pay for the ones you missed. Declan had never missed one. That was either skill or luck, and he wasn't sure which one worried him more.",
   retrofitRelevance:"Existing facilities often have backup designed to original Tier requirements that no longer match actual IT load. Verify: battery health vs required bridge time, fuel storage vs current load, generator capacity vs actual PUE.",
   crossRefs:[{module:"DC-LEARN-001",level:"L4",topic:"UPS systems — UPS topology in the power chain determines bridge time to generator"},{module:"DC-LEARN-003",level:"L1",topic:"Single component reliability — backup power availability is the product of all component reliabilities"}]

  {id:"L2",level:2,name:"Diesel Generators",icon:"⛽",component:"Generator Fleet",available:true,
   cascadeCheck:(kw,racks,pue)=>{const itMW=(kw*racks)/1000;const totalMW=itMW*pue;const genCount=Math.ceil(totalMW/2.5)+1;const thermalMW=genCount*2.5/0.40;return{needed:thermalMW.toFixed(1),available:"50",unit:"MWth EPA threshold",pass:thermalMW<=50,detail:genCount+" × 2.5MW ÷ 0.40 = "+thermalMW.toFixed(1)+"MWth vs 50MWth EPA"};},
   userNeedStatement:"Provide sustained electrical power to the entire facility when the grid is unavailable — for hours or days.",
   plainEnglish:"Generators are the marathon runners. The UPS sprints the first 10 minutes; generators take over and run for days if you keep feeding them fuel.",
   grammar:{
     facts:[
       {term:"Specific Fuel Consumption",definition:"Fuel consumed per unit of electrical energy output: litres per kWh_e at rated load.",plain:"How thirsty the generator is — measured against electrical output, not thermal.",number:"0.27 l/kWh_e at rated load",standard:"CIBSE Guide F Table 14.1",feynman:{analogy: "SFC is like a car's fuel economy rating — litres per 100km tells you how far you go on a tank. For generators, 0.27 litres per kWh tells you how much diesel each unit of electricity costs in fuel.", firstPrinciples: "A generator converts chemical energy in fuel to electricity. The conversion is imperfect — only 35–42% of fuel energy becomes electricity. SFC captures this inefficiency as a simple consumption rate: litres of fuel per kWh of electrical output.", theTest: "A 2.5MW generator runs at rated load for 48 hours. SFC is 0.27 l/kWh. How much fuel? Answer: 2,500 × 0.27 × 48 = 32,400 litres. This is one generator — multiply by fleet size for total fuel requirement."},soWhat:"Specific fuel consumption sets the operating cost baseline — every litre per kWh compounds over thousands of running hours."},
       {term:"Standby Rating (ESP)",definition:"Maximum power for emergency standby, limited to 200 hours/year per ISO 8528-1.",plain:"The rating for generators that only run in emergencies.",number:"<200 hrs/year",standard:"ISO 8528-1:2018 Clause 13.3.2",feynman:{analogy: "ESP rating is like the sprint speed of a marathon runner — they can do it briefly in an emergency, but not for long. Generators rated ESP can deliver maximum power only during genuine outages, not for continuous operation.", firstPrinciples: "Generator ratings define how much load and for how long. ESP (Emergency Standby Power) allows maximum output but only for limited hours per year. Running an ESP-rated generator continuously voids warranties and accelerates wear.", theTest: "A generator is rated 2.5MW ESP (200 hrs/year). The facility runs it for 400 hours during a prolonged grid event. What is the consequence? Answer: warranty void, accelerated engine wear, and potential overheating — the generator was not designed for this duty cycle."},soWhat:"ESP rating caps annual runtime at 200 hours — exceed it and the warranty is void, the wear accelerates, and the insurance position weakens."},
       {term:"MCPD Threshold",definition:"Medium Combustion Plant Directive applies to generators ≥1 MWth thermal input.",plain:"If your generator burns enough fuel, it needs a permit.",number:"≥1 MWth per unit",standard:"EU 2015/2193, S.I. 595/2017",feynman:{analogy: "MCPD is like a MOT test for each individual engine, while EPA is a licence for the whole fleet. Even if your fleet is below the EPA threshold, each engine above 1 MWth still needs its own emission checks.", firstPrinciples: "EU directive 2015/2193 regulates emissions from individual combustion plants between 1 and 50 MWth. Each generator is assessed individually. Emission limits apply to NOx, SO2, and dust. This is separate from the EPA aggregate threshold.", theTest: "A 2MW electrical generator: does MCPD apply? Answer: 2 / 0.40 = 5 MWth per unit — yes, MCPD applies to each unit individually (threshold is 1 MWth)."},soWhat:"MCPD thermal thresholds determine whether your generator fleet triggers environmental permitting — get it wrong and you cannot legally test."},
       {term:"Thermal Input",definition:"Total fuel energy input = electrical output ÷ efficiency. EPA uses this for licence thresholds.",plain:"The fuel going IN — always much higher than electricity OUT.",number:"Electrical ÷ 0.40 = thermal",standard:"EPA First Schedule Class 2.1",feynman:{analogy: "Thermal input is like the difference between what you eat and what your body actually uses. A generator eats 6.25 MW of fuel energy to produce 2.5 MW of electricity — the rest is waste heat. Regulators care about the total food intake, not just the useful output.", firstPrinciples: "Electrical output divided by efficiency gives thermal input. At 40% efficiency, 2.5MW electrical requires 6.25MW thermal. EPA thresholds use thermal input because it measures total combustion — and total emissions — regardless of how efficiently the fuel is used.", theTest: "10 × 2.5MW generators at 40% efficiency. Total thermal input? Answer: 10 × 2.5 / 0.40 = 62.5 MWth. This exceeds the 50 MWth EPA threshold — even though electrical output is only 25MW."},soWhat:"Thermal input is always higher than electrical output — regulators measure what goes in, not what comes out, and that ratio catches most operators by surprise."}
     ,
      {term:"EPA IE Licence — Generator Emissions Conditions",definition:"Data centres with aggregate thermal input exceeding 50 MW require an EPA Industrial Emissions Licence. Licence conditions set NOx, SOx, and particulate limits on diesel generators, with continuous emissions monitoring required above certain thresholds.",plain:"If your generators add up to more than 50 MW of fuel input, you need an EPA licence. That licence will set hard caps on how much NOx and particulate matter your engines can emit. Most legacy DCs with 20+ MW IT load trigger this — the generators serving 2N redundancy easily push past 50 MW thermal.",number:"50 MW: IED Annex I thermal input threshold. 500 mg/Nm³: typical NOx limit for emergency-only diesel gen. 190 mg/Nm³: BAT-AEL for medium combustion plant (MCP Directive).",standard:"Industrial Emissions Directive 2010/75/EU Annex I; Medium Combustion Plant Directive (EU) 2015/2193; EPA IE Licence General Conditions",feynman:{analogy:"It is like a factory chimney needing a permit. Below a certain size, nobody checks what comes out. Above 50 MW of fuel burning capacity, every gram of NOx is monitored, capped, and reported to the EPA. Your backup generators are industrial plant, not just standby kit.",firstPrinciples:"Diesel combustion produces NOx, SOx, and particulate matter. The IED captures any facility with rated thermal input above 50 MW under Annex I. A data centre with 2N generator redundancy on a 20 MW IT load typically has 60–80 MW of installed generator capacity, well above the threshold. The EPA licence imposes emission limit values, monitoring obligations, and reporting requirements.",theTest:"A DC has 16 × 3.3 MW diesel generators providing 2N redundancy for 24 MW IT load. What is the aggregate rated thermal input and does it trigger an EPA IE Licence? Answer: 16 × 3.3 MW ÷ 0.40 efficiency = 132 MW thermal input — well above the 50 MW IED threshold. An EPA IE Licence is required."},soWhat:"EPA licensing applies to the aggregate fleet thermal input — 2(N+1) redundancy on a 20 MW IT load easily exceeds 50 MWth even though you never run all generators simultaneously."}],
     whatItLooksLike:"Diesel generators are housed in acoustic enclosures (~12m × 3m × 3.5m for 2.5MW). A typical yard has 8–20 units with fuel day tanks, control panels, and exhaust stacks.",
     siteChecklist:["Read nameplate: kW/kVA, ESP or PRP","Count ALL installed units (redundant count for EPA)","Check exhaust system condition","Read fuel day tank level gauge","Check block heater (must be pre-heated for fast start)","Review run-hour meter vs ESP 200hr limit"]
   },
   logic:{
     causeAndEffect:[
       {cause:"Generator fleet sized on electrical output only — thermal input calculation omitted from the specification and EPA application",effect:"Total thermal input exceeds 50 MWth threshold — EPA Industrial Emissions licence required but not anticipated or budgeted",insight:"A 35MW electrical fleet has 87.5 MWth thermal input. Many operators discover their EPA obligation years after installation."},
       {cause:"Generators running at less than 30% of rated load during test or partial-occupancy periods — below minimum loading threshold",effect:"Wet stacking causes unburned fuel accumulation, carbon deposits on injectors and exhaust, and significantly reduced generator reliability",insight:"Generators are least efficient and reliable at low loads. Right-size for actual load, not ultimate design."},
       {cause:"Annual generator runtime exceeds the EPA Emergency Standby Plant 200-hour limit — reclassification to peaking plant triggered",effect:"Generator warranty voided by excess runtime, accelerated mechanical wear on critical components, and insurance coverage risk for claims",insight:"Grid service participation can push past ESP. Revenue-generating generators need PRP rating."}
     ],
     constraintLesson:"Generator sizing is multi-constraint: electrical load, redundancy multiplier, regulatory thermal input, fuel storage, and planning noise limits. The constraint that binds first varies by project.",
     weakestLink:{whatsWrong:"Calculating EPA threshold using electrical output instead of thermal input — underestimates by 60%.",whatsRight:"Every rating must be converted: electrical ÷ 0.40 = thermal. Sum ALL units including redundant.",howToGetThere:"Table: each generator → ÷ 0.40 → thermal. Sum all rows. Compare vs 50 MWth (EPA) and per-unit vs 1 MWth (MCPD)."}
   },
   rhetoric:{
     declan:{hook:"Run monthly tests at 50 percent load or above. No-load starts just wet-stack the engines and give you a false confidence that the system is ready.",text:"Declan — run monthly tests at ≥50% load, not no-load starts that just wet-stack the engines. Annual full-load bank test per EPA IE Licence conditions means connecting a resistive load bank and running each generator at rated output for the specified duration. If you skip load testing, carbon builds up in the cylinders and exhaust. Keep a log of every test: date, duration, load percentage, fuel consumed, and any alarms. The EPA auditor will ask for it."},
     ann:{hook:"Key due diligence questions for backup power: total thermal input, EPA licence status, last full-load transfer test date, and HVO compatibility confirmation.",text:"Ann — key due diligence questions for backup power: total thermal input for EPA threshold? All units within ESP hours? When was the last full-load bank test? Diesel or HVO? If the facility has never run a full-load transfer test, that is a red flag for your risk assessment. An untested backup system is not a backup — it is an assumption."},
     mark:{hook:"Calculate thermal input at concept design stage — not planning stage. It may change the EPA licence requirement and the programme timeline by 12 months.",text:"Mark, calculate thermal input at concept design — not planning stage. It may change generator count, fuel type, or site layout."},
     sarah:{hook:"Each generator test run at 14 MW burns 3,780 litres per hour. Switching to HVO cuts Scope 1 from that test by 90 percent with no engine modification required.",text:"Sarah, each test run at 14MW load burns 3,780 litres/hour. Switching to HVO cuts lifecycle CO₂ by ~90% with zero engine modification."},
     tom:{hook:"Generator cost at 300 to 500 euros per kW installed. At 10 MW for a mid-size DC that is 3 to 5 million euros of capital — with a 15-year replacement horizon.",text:"Tom — generator cost: €300–500/kW installed (Tier 3 — Caterpillar/MTU/Cummins/SDMO published ranges, indicative; expanded teaching scenario — not Clonshaugh 2.4 MW) including acoustic enclosures, fuel tanks, switchgear, and exhaust treatment. For a 10 MW IT load at PUE 1.4 with 2(N+1) redundancy, you need approximately 35 MW of installed generator capacity — that is €10.5–17.5M (indicative, screening-level). Add €200–400k (Tier 3 — manufacturer published ranges, indicative) for the paralleling switchboard and load sharing controls. The fuel storage alone for 48 hours at full load is 120,000 litres, requiring bunded double-skin tanks with leak detection — another €80–150k (Tier 3 — contractor market data, indicative) depending on above-ground or below-ground installation. Budget fuel tanks separately (€200–400k, Tier 3, indicative)."}
   },
   rhetoricTakeaways:{declan:"Log every generator start — real-time and test. The pattern of start failures predicts the next real outage.",ann:"Generator fleet age directly impacts insurance premiums — ask the operator for the mean time between failures.",mark:"Size the fuel system for 72 hours, not 48 — the supply chain disruption that matters is the one nobody planned for.",sarah:"Diesel generators are the largest point source of Scope 1 emissions — every test hour burns fuel and budget.",tom:"Generator overhaul cycles are predictable costs — major service at 5,000 hours, full rebuild at 15,000 hours. Budget accordingly."},
   scenario:{title:"EPA Licence Surprise",narrative:"New 20MW DC has 12 × 3MW generators (2(N+1)). During pre-commissioning, Ann asks: 'What's our thermal input for EPA?' The engineer says '36 MWth — below 50 MWth threshold.'",question:"Is the engineer correct? What's the actual thermal input?",answer:"WRONG. 12 × 3MW electrical ÷ 0.40 = 12 × 7.5 = 90 MWth.\n90 MWth >> 50 MWth → EPA IE licence IS required.\n\nConsequences: 12–18 month licence process, continuous emissions monitoring, annual stack testing, potential fuel type conditions. Should have been identified at concept design.",
whoShouldCare:["mark","ann","sarah"]},
   sourceNote:"SFC: CIBSE Guide F Table 14.1 (T2). ESP: ISO 8528-1:2018 (T1). MCPD: EU 2015/2193, S.I. 595/2017 (T1). EPA: First Schedule Class 2.1 (T1).",
  clockQuote:"Thirty seconds. That's the gap between the grid dropping and the generators taking the load. Thirty seconds where the only thing keeping four hundred tenants online is a room full of batteries that are seven years old.",
   retrofitRelevance:"Check: actual load vs fleet capacity, cumulative run hours vs ESP, fuel type and carbon tax exposure, EPA/MCPD status.",
   crossRefs:[{module:"DC-LEARN-003",level:"L2",topic:"N+1 redundancy — generator N+1 is the minimum for maintenance without risk to IT load"},{module:"DC-LEARN-007",level:"L2",topic:"EPA IE Licence — thermal input calculation determines whether generators trigger EPA licensing"}]
  },
  {id:"L3",level:3,name:"HVO & Alternative Fuels",icon:"🌿",component:"Generator Fuel Systems",available:true,
   cascadeCheck:(kw,racks,pue)=>{const itMW=(kw*racks)/1000;const fuelLitresYr=itMW*pue*1000*0.27*200;const co2T=fuelLitresYr*2.68/1000;const taxEur=co2T*71;return{needed:co2T.toFixed(0),available:"0",unit:"tCO₂/yr (diesel)",pass:false,detail:fuelLitresYr.toFixed(0)+"L/yr × 2.68 kg/L = "+co2T.toFixed(0)+"t. Tax: €"+Math.round(taxEur/1000)+"k/yr"};},
   userNeedStatement:"Deliver the same generator performance with ~90% lower CO₂ — without changing the engines.",
   plainEnglish:"HVO is to diesel what an electric car is to a petrol car, except you don't need a new car. Same engine, different fuel, 90% less CO₂.",
   grammar:{
     facts:[
       {term:"HVO",definition:"Hydrotreated Vegetable Oil — paraffinic drop-in replacement for fossil diesel.",plain:"Renewable diesel from waste cooking oil. Works in any diesel generator.",number:"~90% lifecycle CO₂ reduction",standard:"EN 15940:2016",feynman:{analogy: "HVO is like switching from regular petrol to an identical-looking biofuel that works in the same engine with no modifications. The exhaust smells the same, the power is the same, but 90% of the carbon is from plants that absorbed CO2 last year, not from fossil fuel buried for millions of years.", firstPrinciples: "HVO is made by hydrotreating waste oils and fats into a paraffinic diesel. Chemically, it is a hydrocarbon like fossil diesel but with a short carbon cycle — the carbon was recently atmospheric CO2 captured by plants.", theTest: "HVO reduces lifecycle CO2 by 90%. Does it reduce NOx emissions? Answer: slightly, by 5–10%. But MCPD still applies because NOx limits are technology-dependent, not fuel-dependent."},soWhat:"HVO is the fastest Scope 1 decarbonisation lever — same engine, same tank, 90% fewer emissions."},
       {term:"Carbon Tax Trajectory",definition:"Irish carbon tax: €71/tCO₂ (Budget 2025) → €100/tCO₂ (2030).",plain:"Fossil fuel gets more expensive every year — by law.",number:"€71→€100/tCO₂ (Tier 1 — Finance Act / Budget 2025)",standard:"Finance Act (Budget 2025)",feynman:{analogy: "Carbon tax is like a rising toll on a road you must use. Each year the toll goes up, making the road more expensive. Eventually, the toll makes the old road so expensive that the new bypass (HVO) becomes the cheaper route.", firstPrinciples: "Carbon tax internalises the environmental cost of CO2 emissions into fuel prices. As the tax rises, fossil fuels become progressively more expensive relative to low-carbon alternatives. This creates a financial tipping point.", theTest: "Calculation using T1 inputs — Carbon tax: €71/tCO₂ (Budget 2025, Finance Act) → €100/tCO₂ by 2030 (Finance Act). Diesel CO₂ factor: 2.68 kgCO₂/litre (SEAI). All outputs are screening-level estimates. At €71/tCO₂, diesel emits 2.68 kgCO₂/litre. What is the carbon tax per litre? Answer: 2.68 × 71 / 1000 = €0.19/litre (Tier 1 — Finance Act / SEAI). At €100/tCO₂ by 2030: €0.27/litre (Tier 1 — Finance Act)."},soWhat:"Carbon tax creates the economic forcing function — at €71/tCO₂ rising to €100, the HVO premium shrinks every year until diesel becomes the more expensive option."},
       {term:"CFPP",definition:"Cold Filter Plugging Point — HVO performs better in cold than fossil diesel.",plain:"HVO handles cold better than regular diesel.",number:"HVO: -32°C. Diesel: -15°C",standard:"EN 116:2015",feynman:{analogy: "CFPP is like the temperature at which honey becomes too thick to pour. Below the CFPP, the fuel clogs the filter and the engine starves. In Ireland's climate, this matters mainly in January and February.", firstPrinciples: "All diesel fuels contain long-chain hydrocarbons that crystallise at low temperatures. These crystals block fuel filters. The CFPP is the temperature at which the fuel can no longer pass through a standard test filter.", theTest: "HVO has a CFPP of -32°C. Dublin's record low is -12°C. Is CFPP a real risk for HVO in Ireland? Answer: no — HVO is significantly better than mineral diesel (CFPP typically -10 to -15°C) in Irish conditions."},soWhat:"CFPP sets the seasonal operability boundary — below the cloud point, fuel crystallises in the filter and the generator starves within minutes."},
       {term:"CRU Renewable Requirement",definition:"80% renewable energy for new/expanded DC grid connections.",plain:"New DCs must prove 80% renewable energy.",number:"80% renewable",standard:"CRU Dec 2025 Decision Paper",feynman:{analogy: "The CRU renewable requirement is like a building energy rating for your electricity supply. New data centres must prove that 80% of their power comes from renewable sources — it is a condition of getting connected to the grid.", firstPrinciples: "Ireland's grid has limited capacity. The CRU uses connection conditions to ensure new large loads (data centres) support national renewable targets. 80% renewable can come from on-site generation, PPAs, or Guarantees of Origin.", theTest: "A new 50MW DC connects to the grid. What renewable capacity must it demonstrate? Answer: 40MW equivalent (80% of 50MW) through a combination of on-site solar, wind PPAs, and/or corporate GOs."},soWhat:"CRU renewable obligations apply to the total energy mix — generator fuel is part of the equation."}
     ,
      {term:"Hydrogen Readiness — Dual-Fuel Generator Strategy",definition:"Some generator manufacturers now offer dual-fuel engines capable of running on diesel, HVO, or hydrogen blends. A hydrogen-ready strategy future-proofs generator investment against the anticipated availability of green hydrogen from 2030+.",plain:"You can buy generators today that are designed to run on hydrogen blends when hydrogen becomes commercially available in Ireland. This is not mainstream yet — green hydrogen at scale requires massive electrolyser investment and surplus renewable electricity — but for a 20-year generator lifecycle, the optionality has value.",number:"2030+: estimated timeline for green hydrogen availability at scale in Ireland. 10–30%: typical hydrogen blend ratio for dual-fuel reciprocating engines without major modification.",standard:"EU Hydrogen Strategy (2020); SEAI National Hydrogen Strategy consultation (2023); EN 50600-2-5:2021 Annex A",feynman:{analogy:"Buying a hydrogen-ready generator today is like buying a hybrid car before charging infrastructure was widespread. The technology works, but the fuel supply chain is not there yet. The value is in the optionality — when the infrastructure arrives, you are already equipped.",firstPrinciples:"Green hydrogen is produced by electrolysis using renewable electricity. Ireland has surplus wind at times (curtailment exceeds 2,200 GWh/yr), making it a potential electrolyser location. However, the economics require electrolyser costs to fall and a distribution network to be built. For DC generators, hydrogen-ready means the engine, fuel system, and controls can accept hydrogen blends without major retrofit.",theTest:"Calculation — input: generator capex €4M (Tier 3 — Caterpillar/MTU/Cummins/SDMO published ranges, indicative; expanded teaching scenario). H2-ready premium 8% (Tier 3 — OEM published options, indicative). All outputs screening-level estimates. A DC operator budgets €4M for new 2N generators. A hydrogen-ready specification adds 8% to the cost (€320K, indicative). If green hydrogen becomes available in 2032, what is the avoided cost? Answer: The avoided cost is the full replacement of non-hydrogen-capable engines (€4M+, Tier 3, indicative) versus the €320K premium paid upfront (Tier 3, indicative). The optionality payback depends on hydrogen availability timing, but the asymmetry strongly favours the ready specification."},soWhat:"Hydrogen readiness is an optionality play — the 8% capital premium today avoids a full engine replacement when green hydrogen arrives at scale."}],
     whatItLooksLike:"HVO looks identical to fossil diesel — slightly lighter colour. Same tanks, pipework, fill points. Only difference: labelling and delivery documentation.",
     siteChecklist:["Check fuel delivery receipts — confirm HVO (EN 15940) or diesel","Review tank labels and MSDS","Verify OEM approval for HVO","Check fuel polishing system","Review carbon reporting emission factors","Confirm supply contract terms"]
   },
   logic:{
     causeAndEffect:[
       {cause:"Operator switches generator fuel from mineral diesel to HVO (hydrotreated vegetable oil) — a drop-in biofuel replacement",effect:"Approximately 90% Scope 1 CO₂ reduction achieved with zero capital expenditure on engine modifications — fuel switch only required",insight:"Lowest-effort, highest-impact decarbonisation action. No construction, no planning, just change what's in the tank."},
       {cause:"Irish carbon tax escalates from €71 to €100/tCO₂ by 2030 under the Finance Act published trajectory (Tier 1 source)",effect:"HVO cost premium narrows to parity ~2028 (Tier 3 — Neste/World Kinect analysis, indicative)",insight:"The Finance Act guarantees HVO will be cheaper. The question is whether to switch now and save cumulatively."},
       {cause:"CRU Decision CRU/2025236 requires 80% renewable energy fraction for new data centre grid connections in Ireland",effect:"HVO-fuelled embedded generation counts toward the CRU 80% renewable target — reducing the volume of Corporate PPA required for compliance",insight:"HVO is not just a carbon reduction measure — it directly counts toward CRU grid connection renewable compliance requirements for new data centres."}
     ],
     constraintLesson:"The HVO decision is financial and regulatory timing, not technical. Technical: settled (EN 15940, all OEMs approve). Financial: 15–25% premium, offset ~70% by carbon tax savings. By 2028, parity. Regulatory: EPA and CRU both pushing toward low-carbon fuel.\n\nCritical nuance: HVO reduces lifecycle CO₂ by ~90% but does NOT reduce NOx or particulate matter (PM) at the stack. MCPD emission limits for NOx/PM apply equally to diesel and HVO. Exhaust after-treatment (SCR for NOx, DPF for PM) is still required for MCPD compliance regardless of fuel choice.",
     weakestLink:{whatsWrong:"Evaluating HVO on per-litre cost only without carbon tax, regulatory value, and reputation.",whatsRight:"Total cost: fuel + carbon tax + regulatory risk + reputational value. HVO wins beyond 3-year hold.",howToGetThere:"10-year model: litres × (price + carbon tax) for each fuel. Add regulatory risk line."}
   },
   rhetoric:{
     declan:{hook:"Switching to HVO is operationally invisible. Same fill point, same tank, same engine settings. The only thing that changes is the Scope 1 number on the report.",text:"Declan — switching to HVO is operationally invisible. Same fill, same tank, same engine, same maintenance schedule. Just cleaner exhaust. Make sure your fuel supplier provides a certificate of sustainability with every delivery — the EPA and ESG auditor will want proof the HVO meets EN 15940. Store HVO the same way as diesel, but note slightly different cold-flow properties. In Irish conditions this is rarely an issue, but check with the engine OEM for their specific fuel approval."},
     ann:{hook:"HVO eliminates approximately 90 percent of Scope 1 emissions from backup power. For an Article 9 fund, that single fuel switch changes the portfolio carbon profile materially.",text:"Ann — HVO eliminates approximately 90% of Scope 1 emissions from backup power. For a 5+ year hold period, the cumulative cost saving after carbon tax offset is positive from year 3. More importantly, this is the single easiest decarbonisation measure in any DC retrofit — zero capital cost, zero operational change, immediate ESG reporting improvement. If the asset is not already on HVO, ask why."},
     mark:{hook:"Verify the OEM approval letter for HVO before switching fuel type. File it in the maintenance record — it is required for insurance validity on generator damage claims.",text:"Mark — verify the OEM approval letter for HVO before switching fuel type. File it in the O&M manual for warranty claims. Most major generator manufacturers (Caterpillar, Cummins, MTU, Volvo Penta) now approve EN 15940-compliant HVO for their current engine ranges. Older engines may need injector timing adjustment. Get written confirmation from the engine distributor."},
     sarah:{hook:"For a 30 MW portfolio, HVO avoids approximately 1,000 tonnes CO2 per year. That is a reportable and verifiable Scope 1 reduction available from this financial year.",text:"Sarah, for a 30MW portfolio, HVO avoids ~1,000 tCO₂/year — equivalent to removing 400 cars from the road, with zero capital investment."},
     tom:{hook:"HVO premium is 15 to 25 percent on fuel cost. But fuel is less than 2 percent of DC OpEx for a facility with normal test regimes — the carbon benefit far outweighs it.",text:"Tom — HVO premium is 15–25% on fuel, but fuel is less than 2% of DC opex for a facility running generators only during outages and testing. Net additional cost for a 10 MW facility running 200 test hours per year: €20–50k/yr (Tier 3 — Neste/World Kinect published fuel pricing, indicative; expanded teaching scenario). Against total opex of €8–12M (Tier 3 — industry benchmark, indicative), that is a rounding error delivering 80–90% reduction in Scope 1 lifecycle emissions. The ROI on ESG reporting alone justifies it — a single avoided CRREM Misalignment Year shift is worth more than a decade of HVO premium."}
   },
   rhetoricTakeaways:{declan:"Verify HVO compatibility with the engine OEM before switching — not all generators are warranted for paraffinic fuels.",ann:"HVO switching is cost-neutral at €100/tCO₂ carbon tax (Tier 1 — Finance Act 2030 target) — the business case improves every year from now (Tier 3 — Neste/World Kinect published fuel pricing analysis, indicative).",mark:"Specify CFPP of -20°C minimum for Irish conditions — summer-grade HVO will gel in a November outage.",sarah:"HVO reduces Scope 1 generator emissions by ~90% — this is the fastest available pathway to net zero on backup power.",tom:"HVO premium is €0.05–0.10/litre over diesel (Tier 3 — Neste/World Kinect published fuel pricing, indicative) — calculate the annual cost against the carbon tax saving to find the crossover."},
   scenario:{title:"Portfolio HVO Transition",narrative:"Fund with 4 Irish DCs (30MW IT — expanded teaching scenario). Annual fuel spend €1.8M diesel (Tier 3 — industry benchmark, indicative). HVO costs 22% more/litre (Tier 3 — Neste/World Kinect published fuel pricing, indicative). Carbon tax €71/tCO₂ today (Tier 1 — Budget 2025), €100 by 2030 (Tier 1 — Finance Act).",question:"Build the business case. Switch now or wait?",answer:"SWITCH NOW.\n\nDiesel annual: €1.8M fuel + €108k carbon tax = €1,908k\nHVO annual: €2,196k fuel + €10.8k carbon tax = €2,207k\nNet premium: ~€299k/year\n\nBy 2028 (€80/tCO₂): gap narrows to €286k\nBy 2030 (€100/tCO₂): gap narrows further, HVO fuel premium also falling\n\nCumulative CO₂ avoided by switching now vs 2028: ~2,744 tonnes\nPlus: EPA compliance, CRU conditions, tenant ESG reporting, fund LP expectations.",
whoShouldCare:["mark","sarah","tom"]},
   sourceNote:"EN 15940:2016 (T1). Finance Act 2020 Section 40 (T1). CFPP: EN 116:2015 (T1). CRU Dec 2025 (T1). DEFRA 2024 EF 2.68 kgCO₂/litre (T1).",

  {id:"L4",level:4,name:"UPS Topologies",icon:"🔋",component:"Uninterruptible Power Supply",available:true,
   cascadeCheck:(kw,racks,pue)=>{const itMW=(kw*racks)/1000;const lossKW=itMW*1000*0.04;const costYr=lossKW*8760*0.12;return{needed:(lossKW/1000).toFixed(2),available:"0",unit:"MW UPS loss (96%)",pass:lossKW<500,detail:itMW.toFixed(1)+"MW × 4% = "+(lossKW/1000).toFixed(2)+"MW loss = €"+Math.round(costYr/1000)+"k/yr"};},
   userNeedStatement:"Provide continuous, conditioned power with zero interruption — bridging grid failure to generator availability.",
   plainEnglish:"The UPS is a safety net. When the wire breaks, it catches you instantly — not in 10 milliseconds, instantly.",
   grammar:{
     facts:[
       {term:"VFI (Online Double-Conversion)",definition:"AC→DC→AC continuously. Load always on inverter. Zero transfer time.",plain:"The gold standard — load never touches raw mains.",number:"0ms transfer, 93–97.5% efficiency",standard:"IEC 62040-3:2021 VFI-SS-111",feynman:{analogy: "A VFI UPS is like a personal interpreter who translates everything in real-time. Raw mains power comes in, gets completely converted to DC, then rebuilt as clean AC. The load never hears the original noisy signal — only the clean translation.", firstPrinciples: "VFI converts all incoming AC to DC (rectifier), stores energy in DC link, then converts back to AC (inverter). The load always runs from the inverter output. If mains fails, the DC link draws from batteries instead — no switchover needed.", theTest: "Why is VFI transfer time 0ms while VI is 2-4ms? Answer: in VFI, the load is always on the inverter — there is nothing to transfer. In VI, the load must switch from mains to inverter when mains fails."},soWhat:"VFI topology is the only zero-transfer-time option — the load never sees raw mains, so the load never sees a disturbance."},
       {term:"VI (Line-Interactive)",definition:"Mains via AVR normally. 2–4ms transfer to inverter on fault.",plain:"Cheaper but the power blinks. Not for data centres.",number:"2–4ms transfer, 96–98% efficiency",standard:"IEC 62040-3:2021 VI-SS-111",feynman:{analogy: "A VI UPS is like a co-pilot who only grabs the controls when the pilot passes out. Normally, the pilot (mains) flies the plane with the co-pilot adjusting minor things (voltage regulation). But there is a 2-4ms gap while the co-pilot takes over.", firstPrinciples: "In line-interactive mode, mains power feeds the load directly through an autotransformer (AVR) that corrects voltage variations. The inverter is on standby. On mains failure, the inverter activates — but this switch takes 2-4ms.", theTest: "Can a VI UPS protect a data centre? Answer: not recommended. IT equipment can tolerate brief interruptions, but 2-4ms transfer risks data corruption under heavy I/O loads, and VI cannot clean poor power quality."},soWhat:"VI trades protection for efficiency — 2–4% better than VFI, but the 2–4 ms transfer gap means the load sees raw mains until the moment it fails."},
       {term:"VFD (Offline/Standby)",definition:"Load on raw mains. Inverter on fault only. 10ms+ transfer.",plain:"Fine for desk lamps. Dangerous for data centres.",number:"10ms+ transfer, 98%+ efficiency",standard:"IEC 62040-3:2021 VFD-SS-111",feynman:{analogy: "A VFD UPS is like a spare tyre in the boot — it only comes out after the puncture. The load runs on raw mains with zero conditioning. When mains fails, there is a 10ms+ gap while the spare tyre is fitted.", firstPrinciples: "The load connects directly to raw mains. The inverter and battery are completely offline until mains fails. Transfer to battery requires detecting the failure, starting the inverter, and switching — all of which takes time.", theTest: "A server PSU can tolerate a 20ms power gap. Is VFD acceptable? Answer: marginally, but not for mission-critical loads. The 10ms+ transfer plus poor power conditioning makes VFD unsuitable for any data centre application."},soWhat:"VFD is unsuitable for any contracted data centre — the load runs on raw mains with no conditioning, and the transfer gap on failure is the longest of any topology."},
       {term:"Efficiency at Scale",definition:"3% efficiency difference at 50MW = 1.5MW continuous loss = ~€1.58M/year (indicative; input: €0.12/kWh — Tier 2, CRU Q4 2024; 50 MW expanded teaching scenario, not Clonshaugh 2.4 MW).",plain:"A small percentage × a huge load = millions per year.",number:"50MW × 3% = €1.58M/year (screening-level estimate)",standard:"DC Standards Ref v1.1.0 §12",feynman:{analogy: "UPS efficiency at scale is like the difference between a dripping tap and a burst pipe. A 3% efficiency gap sounds tiny, but at 50MW it is 1.5MW of continuous heat — enough to power 1,500 homes — wasted 24 hours a day, 365 days a year.", firstPrinciples: "UPS losses are proportional to load. At 50MW, each percentage point of efficiency equals 500kW of continuous loss. At €0.12/kWh (Tier 2 — CRU Q4 2024), 1% = €526k/year (indicative). The relationship is linear: double the load, double the cost of inefficiency.", theTest: "Calculation — input assumptions: electricity €0.12/kWh (Tier 2, CRU Q4 2024); UPS upgrade capex €1.5M (Tier 3 — APC by Schneider/Eaton/Vertiv published ranges, indicative; expanded teaching scenario). All outputs screening-level estimates. Old UPS: 93% efficient on 10MW. New UPS: 97% efficient. What is the annual saving? Answer: 4% × 10,000kW × 8,760h × €0.12 = €420k/year. Payback on a €1.5M upgrade (indicative): ~3.6 years."},soWhat:"Efficiency at scale compounds — a 2% improvement on a 2.4 MW load saves 420 MWh per year, and that saving recurs for the life of the facility."}
     ,
      {term:"Modular UPS — Right-Sizing and Efficiency",definition:"Modular UPS systems allow capacity to be added in increments (typically 25–50 kW modules) as IT load grows, maintaining high efficiency at partial load.",plain:"A monolithic 500 kW UPS running at 100 kW IT load operates at roughly 85–88% efficiency. A modular UPS with 5 × 100 kW modules would power down 4 modules and run 1 at near-full load at 95–96% efficiency. The energy saving over the UPS lifetime is substantial.",number:"95–96%: modular UPS efficiency at optimal loading. 85–88%: monolithic UPS at 20% load. 3–5%: efficiency gain worth €30–50k/yr per MW IT (Tier 3 — CIBSE Guide M; indicative) at €0.12/kWh (Tier 2 — CRU Q4 2024).",standard:"IEC 62040-3:2021 — UPS Performance and Test Requirements; EU Code of Conduct for Energy Efficiency in Data Centres v3.2.1",feynman:{analogy:"A modular UPS is like having five small boilers instead of one giant one. When only one room needs heating, you fire one boiler at full efficiency instead of running the giant one at a fraction of its capacity, wasting energy as heat.",firstPrinciples:"UPS efficiency is load-dependent — it drops significantly at partial loads because fixed losses (cooling fans, control circuits, transformer magnetising current) become a larger fraction of total throughput. Modular systems solve this by activating only enough modules to serve the current load, keeping each module in its peak efficiency band.",theTest:"A 2 MW UPS room serves 800 kW of IT. Monolithic UPS at 89% efficiency vs modular at 95%. How much energy saved annually? Answer: 800 kW × (1/0.89 − 1/0.95) × 8,760 hrs = ~497 MWh/yr, worth ~€60k (Tier 2 — CRU Q4 2024, €0.12/kWh; indicative) at €0.12/kWh."},soWhat:"Modular UPS enables right-sizing — deploy capacity as load grows, avoid stranded capital, and maintain N+1 at every stage of the growth curve."}],
     whatItLooksLike:"Modern modular UPS: rows of tall black cabinets (~2m × 0.6m × 0.8m per module, 100–500kW each). Legacy transformer-based: much larger (~3m × 2m × 2m, several tonnes). The hum is noticeable.",
     siteChecklist:["Read nameplate — topology (VFI/VI/VFD) and rated capacity","Check display — load % of rated","Note module configuration and N+1 status","Check battery autonomy display","Verify UPS room temperature (20–25°C)","Check for bypass indicators","Review maintenance history"]
   },
   logic:{
     causeAndEffect:[
       {cause:"UPS topology upgrade improves efficiency from 93% (legacy transformer-based) to 97% (modern transformerless design)",effect:"At 50MW: 1.5MW saved = ~€1.58M/year (Tier 2 — CRU Q4 2024, €0.12/kWh; indicative; expanded teaching scenario)",insight:"UPS efficiency is the most underappreciated cost lever. It runs 24/7/365 — small percentages compound into millions."},
       {cause:"A single UPS power module fails in an N+1 modular configuration — the redundant module absorbs the load automatically",effect:"IT load continues on remaining modules but the facility operates at N (zero redundancy) until the failed module is repaired or replaced",insight:"N+1 means one failure away from risk. The repair window is the real vulnerability."},
       {cause:"IT load growth exceeds the rated UPS output capacity — no margin remains for load transfer or redundancy operation",effect:"UPS transfers to static bypass — IT load receives raw unconditioned mains power with no voltage regulation or battery backup protection",insight:"Overloading doesn't trip a breaker — it quietly removes protection. More dangerous than a visible failure."}
     ],
     constraintLesson:"UPS topology for DC is VFI — no choice. The real decisions: modular vs standalone, efficiency target, battery chemistry, and redundancy level. The binding constraint is often floor space — LFP + modular can reduce room footprint 50–60%.",
     weakestLink:{whatsWrong:"Focusing on UPS capex (€/kW) instead of TCO (capex + energy losses + battery replacements over 15 years).",whatsRight:"A 93%-efficient UPS costs more over 10 years than a 97% one. Electricity bill dwarfs purchase price.",howToGetThere:"TCO = purchase + (losses kW × 8,760h × €0.12 × 10yr) + battery replacements. Input: €0.12/kWh (Tier 2 — CRU Q4 2024). Compare on TCO, not capex. All TCO outputs are screening-level estimates (Tier 2 — RICS Life Cycle Costing guidance)."}
   },
   rhetoric:{
     declan:{hook:"Check UPS load monthly. Above 80 percent means you need to plan capacity addition. Below 30 percent means eco-mode may have disabled itself to maintain efficiency.",text:"Declan — check UPS load monthly. Above 80% means you need to plan capacity additions before you hit the wall. In a modular system, that means ordering a new power module — typically two-week lead time, hot-swap install, no downtime. In a monolithic system, above 80% means a major capital project: new UPS, new room, new cabling. Set DCIM alerts at 70% and 80% load thresholds so you never get surprised."},
     ann:{hook:"UPS age and efficiency are the most overlooked items in due diligence. A 93 percent efficient UPS on a 10 MW load costs 700 thousand euros more per year than a 97 percent unit.",text:"Ann — UPS age and efficiency are the most overlooked due diligence items. A 93% efficient UPS on 10 MW wastes €740k/year more than a 97% system (Tier 2 — CRU Q4 2024, €0.12/kWh; indicative; expanded teaching scenario). That is €3.7M over a 5-year hold period (screening-level estimate) — enough to fund the replacement. Ask for efficiency curves at actual loading, not nameplate. If the UPS is over 12 years old and below 94% at operating load, budget for replacement in year 1. 3-year payback upgrade."},
     mark:{hook:"Confirm VFI classification per IEC 62040-3 and minimum efficiency at 25, 50, 75, and 100 percent load. Both must be verified before any efficiency claim is accepted.",text:"Mark checks whether VFI classification (IEC 62040-3) is confirmed and minimum efficiency at 50% and 75% loading is documented in procurement records."},
     sarah:{hook:"UPS losses are the second largest PUE contributor after cooling. Moving from 93 to 97 percent efficiency reduces Scope 2 by 400 to 500 kW continuously — at zero capex change.",text:"Sarah, UPS losses are the second-largest PUE contributor after cooling. 93%→97% reduces PUE by 0.03–0.06."},
     tom:{hook:"Modular UPS at 150 to 300 euros per kW. At a 2,400 kW facility the replacement programme is 360 to 720 thousand euros — but the energy saving pays it back in under 3 years.",text:"Tom — modular UPS: €150–300/kW (Tier 3 — APC by Schneider/Eaton/Vertiv published ranges, indicative). Legacy monolithic: €100–200/kW (Tier 3 — APC by Schneider/Eaton/Vertiv published ranges, indicative) but higher running costs. For a 2 MW UPS room, modular adds €100–200k upfront (indicative) but saves €40–60k/yr (Tier 2 — CRU Q4 2024, €0.12/kWh; indicative) in energy efficiency. Simple payback: 2.5–5 years. Over a 15-year lifecycle, the modular system saves €400–700k (screening-level estimate) in electricity. And the right-sizing benefit means you buy capacity in 50 kW steps as IT load grows, instead of committing the full 2 MW on day one."}
   },
   rhetoricTakeaways:{declan:"Know your UPS topology — VFI, VI, or VFD determines what happens in the first millisecond of a power event.",ann:"UPS efficiency gap of 3–5% compounds to hundreds of thousands in energy cost over a 15-year lifecycle.",mark:"Modular UPS right-sizes to actual load — a 2 MW frame at 40% utilisation wastes 60% of the invested capital.",sarah:"UPS losses are a direct contributor to PUE — a 2% efficiency improvement at 2.4 MW saves 420 MWh/year.",tom:"Compare UPS on total cost of ownership, not capital price — efficiency, footprint, and battery replacement cycle dominate."},
   scenario:{title:"The Silent Bypass",narrative:"BMS alert at 03:00: 'UPS Frame 2 — Static Bypass Active.' IT load still running. No tenant alarms. Vendor says engineer on site by 10:00. That's 7 hours.",question:"What is the actual risk and what should Declan do in 30 minutes?",answer:"CRITICAL. Frame 2 IT load is on raw mains with ZERO protection.\n\n30-minute plan:\n1. CHECK if facility is 2N (dual-fed). If so, load may survive Frame 2 loss.\n2. CHECK if load can be transferred to another frame via maintenance bypass (needs HV-authorised person).\n3. NOTIFY management — this is not 'wait until morning'.\n4. CONSIDER partial load shed off Frame 2.\n5. CHECK weather — storms increase grid disturbance risk.\n\nThe lesson: 'Static bypass active' looks harmless but means protection is silently removed. One of the most dangerous events because it doesn't look dangerous.",
whoShouldCare:["declan","mark"]},
   sourceNote:"IEC 62040-3:2021 (T1). CIBSE Guide K (T2). DC Standards Ref v1.1.0 §12 (T2). EN 50600-2-2:2019 (T1).",
  clockQuote:"A generator that starts is a component. A generator that runs for 48 hours on secured fuel is a system. Most facilities test the component. Almost none test the system.",
   retrofitRelevance:"UPS upgrade is typically the highest-ROI retrofit. Assess: current efficiency at operating load, remaining battery life, module redundancy, floor space recovery potential.",
   crossRefs:[{module:"DC-LEARN-001",level:"L4",topic:"UPS systems — power distribution chain context for UPS topology selection"},{module:"DC-LEARN-008",level:"L4",topic:"Li-ion battery fire — UPS battery chemistry determines fire suppression requirements"}]

  {id:"L5",level:5,name:"Battery Technologies",icon:"🧪",component:"UPS Energy Storage",available:true,
   cascadeCheck:(kw,racks,pue)=>{const itMW=(kw*racks)/1000;const totalMW=itMW*pue;const upsMW=3.6*0.9;return{needed:totalMW.toFixed(1),available:upsMW.toFixed(1),unit:"MW UPS capacity",pass:totalMW<=upsMW,detail:itMW.toFixed(1)+"MW IT × "+pue+" PUE = "+totalMW.toFixed(1)+"MW vs "+upsMW.toFixed(1)+"MW UPS (3.6 MVA × 0.9 PF)"};},
   userNeedStatement:"Store enough energy to bridge mains failure to generator availability — reliably, safely, for the entire design life.",
   plainEnglish:"Batteries are the first responder. When power drops, they're already holding the load before anyone notices. No startup time — always ready.",
   grammar:{
     facts:[
       {term:"VRLA AGM",definition:"Valve Regulated Lead-Acid. Sealed, 10-year design life at 20°C. ~30 Wh/kg (pack level).",plain:"The traditional workhorse — cheap to buy, expensive to own, takes up a lot of room.",number:"30 Wh/kg (pack level), 10yr life at 20°C",standard:"IEC 60896-22:2004",feynman:{analogy: "VRLA is like a landline telephone — reliable, well understood, cheap to install, but takes up a lot of space and will eventually need replacing with something better. It has been the default choice for decades.", firstPrinciples: "Lead-acid chemistry stores energy by reversing a chemical reaction between lead plates and sulphuric acid. Sealed valve regulation prevents gas escape. Energy density is low because lead is heavy. Temperature accelerates degradation.", theTest: "VRLA rated for 10 years at 20°C. The battery room runs at 30°C. What is the actual expected life? Answer: approximately 5 years — the Arrhenius rule halves life for every 10°C above rated temperature."},soWhat:"VRLA end-of-life is invisible — impedance testing is the only way to see degradation before the next outage reveals it."},
       {term:"LFP",definition:"Lithium Iron Phosphate. 15+ year life, 3,000+ cycles to 80% EOL. ~120 Wh/kg.",plain:"Smaller, lighter, lasts longer, costs more upfront, needs fire protection.",number:"120 Wh/kg, 15yr life, 70% less floor area",standard:"IEC 62619:2022",feynman:{analogy: "LFP is like upgrading from a bulky old suitcase to a compact modern one that holds the same amount in half the space and lasts three times longer before the zip breaks.", firstPrinciples: "Lithium iron phosphate stores energy by moving lithium ions between cathode and anode. The iron phosphate cathode is thermally stable (no cobalt), giving better safety than other lithium chemistries. Higher energy density means less weight and space per kWh.", theTest: "VRLA: 30 Wh/kg, 10-year life, takes 100m². LFP: 120 Wh/kg, 15-year life, takes 30m². Which has lower 20-year total cost? Answer: LFP — one replacement vs two, plus the freed floor space can generate revenue."},soWhat:"LFP doubles the battery lifecycle but introduces thermal runaway risk — the fire protection upgrade is non-negotiable."},
       {term:"EOL Threshold",definition:"Battery capacity at which replacement is required: 80% of rated.",plain:"When the battery delivers only 80% of original, time to replace.",number:"80% (both VRLA and LFP)",standard:"IEC 60896-22 / IEC 62619",feynman:{analogy: "EOL threshold is like a car tyre with a minimum tread depth. The tyre still works below the limit, but it cannot be trusted to stop you safely in an emergency. Batteries below 80% still store energy but cannot guarantee the required bridge time.", firstPrinciples: "Battery capacity decreases with age and cycling. The 80% threshold is where remaining capacity may not meet the design autonomy requirement under worst-case conditions (high load, end of discharge, elevated temperature).", theTest: "A battery sized for exactly 10 minutes at 100% capacity. At 80% EOL, what bridge time remains? Answer: 8 minutes. If generator sync takes 25 seconds, is this safe? Yes, but margin has dropped from 575 to 455 seconds."},soWhat:"The 80% EOL threshold is where bridge time drops below design minimum — a battery that still holds charge may no longer hold enough charge."},
       {term:"Thermal Runaway",definition:"Self-heating chain reaction in Li-ion cells. Triggered by damage, overcharging, or internal short.",plain:"When a lithium battery overheats and catches fire in a way that's very difficult to stop.",number:"Off-gas detection triggers 5–15 min before event",standard:"EN 50604-1:2016, UL 9540A",feynman:{analogy: "Thermal runaway is like a chain reaction in dominoes made of matches. One cell overheats, which heats the next, which ignites, and the reaction spreads faster than any suppression system can respond. The only defence is preventing the first domino from falling.", firstPrinciples: "Internal cell failure (short circuit, overcharge, or mechanical damage) generates heat. Above a critical temperature, the electrolyte decomposes exothermically — producing more heat, which triggers adjacent cells. The reaction is self-sustaining.", theTest: "FM-200 gas suppression extinguishes the flame but cells re-ignite 10 minutes later. Why? Answer: gas removes oxygen but does not cool the cells. The exothermic decomposition continues without oxygen. Only water-based cooling can break the thermal chain."},soWhat:"Thermal runaway is the catastrophic failure mode — once the exothermic chain reaction starts, it cannot be stopped, only contained."}
     ,
      {term:"LFP vs NMC — Thermal Runaway Risk Profile",definition:"Lithium Iron Phosphate (LFP) batteries have a significantly higher thermal runaway onset temperature (~270°C) compared to Nickel Manganese Cobalt (NMC, ~150°C). For DC UPS applications where fire risk is paramount, LFP is increasingly the default.",plain:"NMC batteries store more energy per kilogram but catch fire at lower temperatures. LFP batteries are heavier for the same energy but are far more thermally stable. In a data centre where fire suppression, rack density, and business continuity are paramount, the extra weight of LFP is a small price for reduced fire risk.",number:"~270°C: LFP thermal runaway onset. ~150°C: NMC thermal runaway onset. 30–40%: energy density penalty of LFP vs NMC (Wh/kg).",standard:"IEC 62619:2022 — Safety requirements for secondary lithium cells; UL 9540A — Test Method for Evaluating Thermal Runaway Fire Propagation",feynman:{analogy:"Choosing between NMC and LFP for a data centre is like choosing between petrol and diesel for a bus fleet. Petrol gives more power per litre but is far more volatile. Diesel is heavier but much harder to ignite. In a building full of irreplaceable IT equipment, you pick the chemistry that does not catch fire easily.",firstPrinciples:"Thermal runaway occurs when a battery cell enters an uncontrolled exothermic reaction. NMC releases oxygen at lower temperatures, accelerating combustion. LFP has a more stable olivine crystal structure that resists oxygen release. For stationary DC applications where weight is not a constraint but fire risk is critical, LFP delivers better safety margins.",theTest:"A DC operator is choosing UPS batteries for a 2 MW installation. NMC weighs 8 tonnes, costs €400k (Tier 3 — BNEF H2 2025; battery manufacturer published, indicative). LFP weighs 12 tonnes, costs €350k (Tier 3 — BNEF H2 2025; indicative). Which should they choose? Answer: LFP — cheaper, thermally safer (270°C vs 150°C onset), and the 4-tonne weight penalty is trivial in a ground-floor plant room."},soWhat:"LFP vs NMC is a safety-versus-density trade-off — in a data centre where fire risk outweighs weight constraints, LFP wins on every metric that matters."}],
     whatItLooksLike:"VRLA: heavy steel blocks on multi-tier racks, 100–200m² for 5MW/10min. LFP: compact modular units, 30–60m² for same capacity. Li-ion rooms have off-gas detectors, ventilation, water mist suppression, fire-rated walls.",
     siteChecklist:["Identify chemistry — VRLA or LFP","Check room temperature (VRLA: 20°C, LFP: 25°C)","Review cell/module voltage and impedance data","Check installation date vs design life","For LFP: verify off-gas monitoring is operational","For LFP: verify suppression is Li-ion rated (water mist, NOT gas-only)"]
   },
   logic:{
     causeAndEffect:[
       {cause:"VRLA battery string degrades to 65% of original capacity — well below the 80% end-of-life replacement threshold",effect:"UPS bridge time falls from 10 minutes design to approximately 6.5 minutes actual — may not cover the full generator start sequence",insight:"Degradation is invisible until tested. UPS display may show day-one rating, not actual capacity."},
       {cause:"Battery room ambient temperature rises from 20°C design to 30°C actual — a 10°C exceedance above VRLA rated conditions",effect:"VRLA design life halves per the Arrhenius rule — every 10°C above rated temperature reduces expected battery service life by approximately 50%",insight:"Cooling failure in battery room silently shortens life by years. By the time you notice, it's too late."},
       {cause:"Lithium iron phosphate (LFP) cell enters thermal runaway — internal short circuit triggers uncontrolled exothermic reaction",effect:"Cell-to-cell thermal propagation causes a self-sustaining fire that re-ignites after gaseous suppression agent dissipates — FM-200 cannot extinguish it",insight:"Gas agents (FM-200) extinguish flame but don't cool cells — they re-ignite. Only water-based systems provide sufficient cooling."}
     ],
     constraintLesson:"Battery sizing = oversizing for degradation:\n1. Raw energy: load × (minutes ÷ 60)\n2. EOL derating: ÷ 0.80\n3. Temperature derating\n4. Ageing margin (10–15%)\n\nA battery sized 'just right' at commissioning fails autonomy tests within 2–3 years.",
     weakestLink:{whatsWrong:"Sizing for day-one capacity without EOL and temperature derating.",whatsRight:"Size for worst case: EOL × temperature × ageing margin. Battery must meet autonomy on its last day of service.",howToGetThere:"Design: required kWh ÷ 0.80 ÷ temp factor. Verify annually with impedance testing."}
   },
   rhetoric:{
     declan:{hook:"Battery room temperature is the single biggest factor in VRLA life after initial manufacturing. One degree above 25 Celsius halves the design life.",text:"Declan — battery room temperature is the single biggest factor in VRLA life after initial quality. Every 10°C above 25°C halves battery life. At 35°C, your 10-year rated batteries will fail in 5 years. Dedicated cooling for the battery room is not optional. Check battery room temperature daily on your BMS rounds. If the split is down, escalate immediately. For LFP, the same rule applies but the chemistry is more tolerant of temperature variation."},
     ann:{hook:"Batteries older than 7 years with no recent impedance test: budget for replacement. An impedance test is 5 thousand euros. Unexpected loss of bridge time is not recoverable.",text:"Ann, if batteries are >7 years (VRLA) with no recent impedance test, budget for replacement within 18 months."},
     mark:{hook:"Size for end-of-life at 0.80 derating and temperature correction. Specify annual impedance testing and replacement at 80 percent capacity — do not wait for a failure event.",text:"Mark, always size for EOL (÷0.80) and temperature. I'd check for impedance testing from year 3 (VRLA) or year 8 (LFP), and verify off-gas detection and water mist are confirmed for all LFP installations."},
     sarah:{hook:"LFP chemistry lasts 50 percent longer than VRLA with 70 percent less floor space. Fewer replacements means lower embodied carbon over the facility lifecycle.",text:"Sarah — LFP lasts 1.5× longer than VRLA with 70% less floor space, meaning fewer disposal events, less building material, and a lower lifecycle environmental footprint. For SFDR Article 8/9 reporting, the battery chemistry choice affects embodied carbon, hazardous waste volumes, and replacement frequency. LFP also avoids cobalt supply chain risks that NMC carries — relevant for EU due diligence requirements on conflict minerals."},
     tom:{hook:"VRLA at 100 to 150 euros per kWh versus LFP at 350 to 500 euros. LFP total cost of ownership over 15 years is typically lower — the premium pays back in reduced replacement cycles.",text:"Tom — VRLA: €100–150/kWh upfront (Tier 3 — BNEF H2 2025; battery manufacturer published, indicative), but you replace them twice in 20 years giving lifecycle cost of €300–450k for a 5 MW installation (Tier 2 — RICS Life Cycle Costing guidance; indicative). LFP Li-ion: €250–400/kWh (Tier 3 — BNEF H2 2025; indicative) but 15-year life with one replacement cycle. Factor in charging efficiency savings (98% vs 92% for VRLA) and reduced cooling load. LFP also frees 70% floor space. The total cost of ownership model increasingly favours LFP for any new installation or VRLA end-of-life replacement."}
   },
   rhetoricTakeaways:{declan:"Impedance-test every battery string quarterly — the string that fails silently is the one that fails during the next outage.",ann:"Battery replacement is the single largest recurring capital expense in the backup chain — it must be in the reserve fund.",mark:"LFP doubles cycle life but requires fire detection upgrades — budget for off-gas detection and suppression from day one.",sarah:"VRLA contains lead and acid — end-of-life disposal is a regulated waste stream with carbon and compliance implications.",tom:"VRLA replacement at year 7–10 costs €150–250k per 2 MW string (Tier 3 — BNEF H2 2025; battery manufacturer published, indicative) — LFP at year 15 costs more per event but fewer events (Tier 2 — RICS Life Cycle Costing guidance; indicative)."},
   scenario:{title:"Battery Room Fire Design",narrative:"Tom is designing an LFP battery room for a Tier III DC. The contractor proposes reusing the FM-200 system from the original VRLA specification.",question:"Is FM-200 adequate for LFP? If not, what's needed?",answer:"NO. FM-200 is inadequate for LFP.\n\nFM-200 is for Class C electrical fires. LFP thermal runaway is a chemical fire that re-ignites after gas dissipates.\n\nSpecify:\n1. DETECTION: Off-gas monitoring (CO, H₂, VOC) — triggers 5–15 min before runaway\n2. VENTILATION: Mechanical extraction, min 6 ACH, exhaust to atmosphere\n3. SUPPRESSION: Water mist for Li-ion cooling (not gas-only)\n4. CONTAINMENT: 60-min fire-rated walls, fire-rated penetrations\n5. STANDARDS: EN 50604-1, UL 9540A, NFPA 855\n\nCost: ~20–30% premium on fire protection vs VRLA spec. Non-negotiable for Li-ion safety.",
whoShouldCare:["mark","declan"]},
   sourceNote:"VRLA: IEC 60896-22:2004 (T1). LFP: IEC 62619:2022 (T1). Thermal runaway: EN 50604-1:2016, UL 9540A (T1). Fire: NFPA 855 (T2).",
  clockQuote:"The maintenance log showed a perfect record: every monthly start test passed, every annual load bank within tolerance. But every test was a sprint. Nobody had tested the marathon.",
   retrofitRelevance:"Battery replacement is the most common retrofit trigger (VRLA EOL at year 10). Assess: actual capacity via impedance, LFP conversion potential, fire protection adequacy if changing chemistry.",
   crossRefs:[{module:"DC-LEARN-008",level:"L4",topic:"Li-ion battery fire — VRLA-to-LFP conversion requires fire protection upgrade (off-gas detection, water mist)"},{module:"DC-LEARN-002",level:"L8",topic:"Controls & BMS — battery monitoring integration with BMS for health tracking and thermal alerts"}]
