const LEVELS = [
{
  id:"L1", level:1, name:"PUE — What It Measures and Why It Matters", icon:"📊",
  available:true,
  component:"PUE = Total Facility Energy / IT Equipment Energy",
  userNeed:"Establish whether your facility is efficient, average, or poor — and understand what PUE 1.0 vs 1.50 means in euros per year.",
  plainEnglish:"PUE of 1.0 means every watt goes to computing. PUE of 1.50 means for every watt of computing, 0.50 watts are wasted on cooling, power distribution, and lighting — at 2,400 kW IT load, that 0.50 overhead costs over €1.26 million per year. At Clonshaugh's PUE 1.50, the 0.35 overhead above best-in-class (1.15) costs €883,000 per year.",
  grammar:{
    facts:[
      {term:"PUE (Power Usage Effectiveness)",definition:"Total facility power divided by IT equipment power. The universal DC efficiency metric.",plain:"If you draw 4 MW from the grid and your servers use 2 MW, PUE = 2.0. Half your electricity is overhead.",number:"World average 2024: 1.58 (Uptime Institute). Google: 1.10. Hyperscale target: <1.20. Irish typical: 1.40–1.60.",standard:"The Green Grid TGG-WP27 (2016); EU EED Annex IV",feynman:{analogy:"Imagine you order 10 pizzas for a party but 8 get eaten on the delivery truck. PUE measures how many of your electricity pizzas actually reach the servers versus how many get consumed by cooling, power conversion, and lighting along the way.",firstPrinciples:"Energy cannot be created or destroyed, only converted. Every conversion step (transformer, UPS, cooling compressor) loses some energy as heat. PUE captures the total conversion overhead as a single ratio: total input divided by useful IT output.",theTest:"If a facility draws 3,600 kW from the grid and servers consume 2,400 kW, what is the PUE? Answer: 3,600 / 2,400 = 1.50."}},
      {term:"IT Load (PIT)",definition:"Power consumed by all IT equipment: servers, storage, networking. The denominator in PUE.",plain:"What the servers actually draw — the useful work.",number:"Clonshaugh: 2,400 kW at full occupancy (400 racks × 6 kW/rack).",standard:"EN 50600-4-2 Clause 4.2",feynman:{analogy:"The IT load is the engine of a car. Everything else — air conditioning, headlights, radio — exists to support the engine doing useful work. The IT load is the useful work of the data centre.",firstPrinciples:"Servers convert electrical energy into computation and heat. The power drawn by all servers, storage, and networking equipment is the denominator of PUE — the reference point against which all overhead is measured.",theTest:"If a DC has 400 racks each drawing 6 kW, what is the IT load? Answer: 400 × 6 = 2,400 kW."}},
      {term:"Facility Load (PFACILITY)",definition:"Total power drawn from utility: IT + cooling + UPS losses + lighting + other. The numerator in PUE.",plain:"What ESB Networks bills you for — everything including the overhead.",number:"Clonshaugh at PUE 1.50: 2,400 × 1.50 = 3,600 kW total draw.",standard:"The Green Grid TGG-WP27; EN 50600-4-2",feynman:{analogy:"Your household electricity bill covers everything: fridge, heating, lights, and your computer. The facility load is the DC equivalent — the total bill from ESB Networks, covering servers plus everything that keeps them running.",firstPrinciples:"The utility meter at the DC boundary measures total power drawn from the grid. This includes IT equipment plus cooling plant, UPS losses, lighting, fire suppression, and security. It is the numerator in the PUE calculation.",theTest:"If IT load is 2,400 kW and PUE is 1.50, what is the facility load? Answer: 2,400 × 1.50 = 3,600 kW."}},
      {term:"Annualised Energy Cost",definition:"Annual electricity cost = Facility Load × 8,760 hrs × €/kWh. The number that makes the business case.",plain:"PUE reduction × IT load × annual hours × electricity rate = euros saved.",number:"Clonshaugh PUE 1.50 vs 1.15: delta = 840 kW × 8,760 × €0.12 = €883,008/year.",standard:"CRU Q4 2024 blended rate: €0.12/kWh",feynman:{analogy:"If you leave a 100W light bulb on all year, you can calculate the annual cost by multiplying watts by hours by price per unit. The DC annualised cost is exactly the same maths, just with much bigger numbers.",firstPrinciples:"Energy cost equals power multiplied by time multiplied by unit price. A DC runs 8,760 hours per year (24×365). Facility load in kW times 8,760 hours times the electricity rate gives the annual bill.",theTest:"At 3,600 kW facility load and €0.12/kWh, what is the annual electricity cost? Answer: 3,600 × 8,760 × 0.12 = €3,784,320."}},
      {term:"EU Taxonomy PUE Threshold",definition:"The EU Taxonomy for Sustainable Activities requires DCs to demonstrate PUE ≤ 1.3 (using annualised, metered data) to qualify as a Taxonomy-aligned sustainable economic activity.",plain:"If your PUE is above 1.3, your DC cannot meet the PUE criterion for Taxonomy alignment. This matters for institutional capital — Taxonomy alignment is increasingly a condition of green finance. Note: PUE ≤ 1.3 is necessary but not sufficient — other criteria also apply.",number:"Threshold: PUE ≤ 1.3 (annualised). Clonshaugh at PUE 1.50: not Taxonomy-aligned. At target PUE 1.20: Taxonomy-aligned.",standard:"EU Taxonomy Delegated Act 2021/2139 Annex I, Section 8.1",feynman:{analogy:"Think of the Taxonomy threshold like the energy label on a washing machine. Below PUE 1.3, the DC meets the efficiency criterion for green classification. Above it, the facility fails at the first hurdle — no matter how good its other metrics are.",firstPrinciples:"The EU Taxonomy classifies economic activities as environmentally sustainable based on measurable thresholds. For data centres, the key threshold is PUE ≤ 1.3 using annualised, metered data. This determines access to green bonds and sustainable investment classification.",theTest:"Clonshaugh has PUE 1.50. Is it Taxonomy-aligned? What PUE must it reach? Answer: No. It must reach PUE ≤ 1.3."}}
    ]
  },
  logic:{
    causeAndEffect:[
      {cause:"PUE measured on a single cool October day",effect:"PUE appears excellent because the chiller is off and free cooling is running. Annual average will be significantly worse.",insight:"Always annualise. A single-point PUE snapshot on Ireland’s coolest day is cherry-picking."},
      {cause:"PUE calculated without IT submetering",effect:"If IT load is estimated not metered, PUE is unverifiable. Could hide a 0.1–0.2 error.",insight:"EED Article 12 requires verifiable metering. Self-reported PUE from memory or nameplate ratings will not satisfy an auditor."},
      {cause:"Adding IT load without upgrading cooling",effect:"PUE stays constant but absolute energy and cost increase. PUE alone does not tell you if you are getting more efficient per rack.",insight:"PUE per kW/rack (energy intensity) is more useful for densification planning than flat PUE."}
    ],
    constraintLesson:"PUE is the single most useful number in DC efficiency — and the single most abused.\nA PUE of 1.3 measured once on a cold day is not the same as PUE 1.3 metered continuously over 12 months. The difference matters because EED compliance requires the latter.",
    weakestLink:{whatsWrong:"We know our PUE — it is about 1.5, estimated from monthly utility bills and a rough IT load figure.",whatsRight:"Utility billing is accurate. IT load can be estimated reasonably from PDU readings. The gap is the methodology and continuous logging.",howToGetThere:"Install revenue-grade utility submetering at MSB (€8K–12K). Install IT load metering at PDU level (€5K–10K). BMS dashboard with live PUE logged hourly (€3K–8K). Total: €16K–30K. (Tier 2 — RICS NRM1 fee benchmarks; Schneider/Vertiv published BMS rates, indicative, Q1 2025 Irish market)"}
  },
  rhetoric:{
    declan:"Declan — I have never measured PUE properly until now. I estimated from the ESB bill and what I thought the servers drew. That gave me PUE of somewhere between 1.4 and 1.8 depending on the month. The real number, properly metered at Category 2, was 1.50 — consistent with what Mark predicted from the cooling architecture. The lesson: you cannot manage what you do not measure, and you cannot measure PUE from the electricity bill alone. Install dedicated IT and facility meters at the correct EN 50600-4-2 boundary points.",
    ann:"PUE 1.50 means 33% of my electricity spend is overhead. If Mark gets it to 1.20, that is €883K per year back — and it crosses the EU Taxonomy threshold of 1.3, which means the facility may be eligible for Taxonomy-aligned classification. That opens green finance options.",
    mark:"At 2,400 kW IT and €4.5M total electricity cost (Tier 2 — derived from 3,600 kW facility load × 8,760 hrs × €0.12/kWh CRU T2, indicative), we can back-calculate PUE from billing data. But to improve it, we need component-level metering — cooling, UPS losses, lighting separately. Otherwise we are optimising blind.",
    sarah:"PUE 1.50 at 2,400 kW IT = 1,200 kW of continuous waste. At SEAI 2026 carbon intensity (0.2241 kgCO₂/kWh), that is 2,355 tonnes CO₂ per year of avoidable emissions. And at PUE 1.50, we fail the EU Taxonomy PUE ≤ 1.3 threshold — the facility is not classifiable as a sustainable activity under Delegated Act 2021/2139. Every PUE improvement moves the CRREM Misalignment Year further into the future, directly protecting asset value for institutional investors.",
    tom:"Metering costs €16K–30K (Tier 2 — RICS NRM1; Schneider/Vertiv published, indicative). The first action it enables (supply temperature optimisation) saves €50K–100K in year one (Tier 3 — CIBSE TM54 2013; Uptime Institute benchmarks, indicative). Payback on metering alone is under 6 months. Every subsequent action compounds the return."
  },
  scenario:{title:"The ESB Bill",narrative:"Declan receives the annual ESB bill: €3,784,320 for Clonshaugh. He knows IT load is approximately 2,400 kW. Ann asks: what is our PUE, and what would best-in-class look like?",question:"Calculate PUE from the billing data and estimate the annual saving from achieving PUE 1.20.",answer:"[Calculation uses: Electricity rate €0.12/kWh — CRU Q4 2024 T2. IT load 2,400 kW — Clonshaugh reference facility. All outputs screening-level illustration only.]\nPUE calculation:\nAnnual energy: €3,784,320 ÷ €0.12/kWh = 31,536,000 kWh = 31,536 MWh\nFacility load: 31,536,000 ÷ 8,760 = 3,600 kW average\nIT load: 2,400 kW\nPUE = 3,600 ÷ 2,400 = 1.50\n\nTarget PUE 1.20:\nTarget facility load: 2,400 × 1.20 = 2,880 kW\nDelta: 3,600 - 2,880 = 720 kW reduction\nAnnual saving: 720 × 8,760 × €0.12 = €756,864/year\nCarbon saving: 720 × 8,760 × 0.2241 ÷ 1,000 = 1,414 tCO₂/year\n\nCaveat: PUE from billing is estimated (±10–15% uncertainty on IT load). Metering investment required to verify."},
  sourceNote:"PUE definition — The Green Grid TGG-WP27 (T2). EED reporting — EU 2023/1791 Article 12 (T1). Electricity rate — CRU Q4 2024 (T2). Carbon intensity — SEAI 2026 0.2241 kgCO₂/kWh (T1).",
  clockQuote:"She said 1.3. He said 1.5. Nobody needed Mark to do the maths.",
  retrofitRelevance:"PUE metering is the foundation of every cooling retrofit. Without it, you cannot measure improvement. Install metering before any optimisation investment.",
  crossRefs:[{module:"DC-LEARN-001",level:"L1",topic:"Utility supply & MIC — total facility power at incomer is the numerator in PUE"},{module:"DC-LEARN-009",level:"L4",topic:"DCIM PUE tracking — real-time PUE requires metering at both total and IT power points"},{module:"DC-LEARN-010",level:"L1",topic:"Carbon accounting — PUE is the primary lever for Scope 2 emissions reduction"}],
  cascadeCheck:(kw,racks,pue)=>{const itMW=kw*racks/1000;const totalMW=itMW*pue;const overheadMW=totalMW-itMW;const overheadCost=overheadMW*1000*8760*0.12;return{needed:pue.toFixed(2),available:"1.20",unit:"PUE",pass:pue<=1.20,detail:`PUE ${pue.toFixed(2)}: overhead ${overheadMW.toFixed(1)}MW = €${(overheadCost/1000).toFixed(0)}k/yr. Target 1.20: overhead ${(itMW*0.20).toFixed(1)}MW = €${(itMW*0.20*1000*8760*0.12/1000).toFixed(0)}k/yr`}}
},
{
  id:"L2", level:2, name:"WUE — Water Efficiency", icon:"💧",
  available:true,
  component:"WUE = Annual Water Use (litres) / IT Energy (kWh)",
  userNeed:"Understand when cooling systems consume water, what WUE means for Irish planning compliance, and why water-free cooling is increasingly required.",
  plainEnglish:"Evaporative cooling towers and adiabatic systems use water to reject heat. In Dublin, with dry coolers and free cooling, WUE can be zero — no water consumed for cooling. Irish Water and local authorities are increasingly scrutinising DC water consumption during planning.",
  grammar:{
    facts:[
      {term:"WUE (Water Usage Effectiveness)",definition:"Annual site water usage for cooling divided by IT energy. Measured in litres per kWh.",plain:"How much water the DC consumes per unit of IT work. Zero is achievable in Ireland with dry cooling.",number:"Evaporative tower: WUE 1.0–2.0 L/kWh. Adiabatic: 0.1–0.5 L/kWh. Dry cooler: 0.0 L/kWh.",standard:"The Green Grid TGG-WP49; EU EED Annex IV",feynman:{analogy:"WUE is like measuring how much water your garden sprinkler wastes per flower it waters. For every unit of useful IT work, how many litres of water does the cooling system evaporate? Zero is achievable with dry coolers.",firstPrinciples:"Heat rejection can use water (evaporative towers) or air (dry coolers). WUE divides total annual water consumption by total IT energy. In Ireland, with dry coolers and free cooling, WUE can be zero — no water consumed for cooling at all.",theTest:"A DC uses 15 million litres/year with 21,024 MWh IT energy. What is WUE? Answer: 15,000,000 / 21,024,000 = 0.71 L/kWh."}},
      {term:"Cooling Tower",definition:"Heat rejection device using evaporative cooling. Water is sprayed over fill media while air passes through, removing heat by evaporation.",plain:"A big wet radiator. Uses water evaporation to cool. Effective but consumes significant water and requires Legionella management.",number:"Evaporation rate: ~1.5 L per kWh rejected. Legionella testing: quarterly minimum under Irish HSA guidance.",standard:"HSA Guidelines on Legionella Control; IS 820:2019",feynman:{analogy:"A cooling tower works like sweating. Water evaporates from the surface, carrying heat away. Effective but consumes large quantities of water and creates a habitat for Legionella bacteria if not properly treated.",firstPrinciples:"Evaporative cooling exploits the latent heat of vaporisation. Water sprayed over fill media absorbs heat and evaporates into the passing air stream. The phase change from liquid to vapour removes approximately 2,260 kJ per kg of water evaporated.",theTest:"What are two compliance obligations for a cooling tower in Ireland? Answer: Legionella testing (quarterly, HSA) and water metering for EED WUE reporting."}},
      {term:"Dry Cooler",definition:"Air-to-water heat exchanger that uses ambient air across a finned coil. No water consumption. No evaporation.",plain:"A big outdoor radiator with fans. Uses air, not water. Zero water consumption. Zero Legionella risk.",number:"Typical range: 100 kW–5,000 kW per unit. Only needs fans — no compressor, no refrigerant.",standard:"EN 327; CIBSE Guide B2",feynman:{analogy:"A dry cooler is like a car radiator. Hot water flows through finned tubes, fans blow air across them, and the water comes back cooler. No water consumed, no chemicals needed, and no Legionella risk.",firstPrinciples:"Sensible heat transfer occurs when warm fluid passes through a finned-tube heat exchanger with ambient air blown across it. The temperature difference between the fluid and the air drives the heat transfer rate. No phase change, no water loss.",theTest:"What is the WUE of a dry cooler? Answer: 0.0 L/kWh — zero water consumption."}}
    ,
      {term:"Adiabatic Cooling — Water vs Energy Tradeoff",definition:"Adiabatic pre-cooling sprays water onto intake air to lower its temperature by 3–5°C, extending free cooling into warmer hours. The tradeoff is water consumption (WUE > 0) in exchange for reduced compressor energy.",plain:"Adiabatic cooling trades water for electricity savings. In Dublin, it extends free cooling from 82% to approximately 97% of annual hours. The water consumption is modest — approximately 0.1–0.5 L/kWh-IT — but must be reported under EED Article 12.",number:"3–5°C: typical wet bulb depression in Irish conditions. 0.1–0.5 L/kWh-IT: WUE range for adiabatic assist. 97%: extended free cooling coverage in Dublin.",standard:"CIBSE Guide B2 §3.8 — Evaporative Cooling; Dublin design summer dry bulb: 25.0°C (Met Éireann)",feynman:{analogy:"Adiabatic cooling is like misting yourself on a warm day. The water evaporates and cools the air by a few degrees — just enough to avoid switching on the expensive air conditioning. The trade is a small water cost for a large electricity saving.",firstPrinciples:"Evaporating water absorbs latent heat — approximately 2,260 kJ/kg. Spraying a fine mist into the air stream before a dry cooler lowers its temperature by 3–5°C, enough to maintain free cooling during the 1,300 hours per year when Dublin\'s dry bulb exceeds 18°C but wet bulb remains below the cooling setpoint.",theTest:"Dublin experiences 1,300 hours between 18°C and 25°C dry bulb. How does adiabatic assist help? Answer: It pre-cools intake air below the free cooling threshold, allowing dry coolers to reject heat without compressor assistance during those hours — extending free cooling from 82% to 97%."}},
      {term:"Legionella Risk — HSA Obligations for Cooling Towers",definition:"Cooling towers that use evaporative water systems create an aerosol that can harbour Legionella bacteria. Irish HSA guidelines require a written risk assessment, quarterly testing, and a documented management programme.",plain:"Every wet cooling system is a potential Legionella source. The HSA requires a risk assessment, a maintenance plan, quarterly water testing, and documented corrective actions. Failure to comply is a health and safety prosecution risk, not just a facilities issue.",number:"Quarterly: minimum Legionella testing frequency. 20–45°C: temperature range where Legionella proliferates. 1,000 CFU/L: action level requiring immediate response.",standard:"HSA Guidelines on Legionella Control (2019); IS 820:2019; L8 (UK equivalent reference)",feynman:{analogy:"A cooling tower in warm weather is like a warm bath that nobody cleans — the perfect breeding ground for bacteria. Legionella thrives in stagnant warm water between 20°C and 45°C. Without chemical treatment and regular testing, the tower becomes a public health risk.",firstPrinciples:"Legionella pneumophila bacteria multiply in warm water (20–45°C) and are transmitted as aerosol droplets. Cooling towers create aerosol by design — they spray water into air to evaporate it. Without biocide treatment, temperature management, and regular testing, the tower can become an amplification site for Legionella.",theTest:"A DC operator switches from dry coolers to an evaporative tower to improve PUE. What new compliance obligation does this create? Answer: A written Legionella risk assessment, quarterly water testing, chemical treatment regime, and documented management programme under HSA guidelines."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"Cooling tower operating without water sub-meter",effect:"WUE cannot be calculated. EED Article 12 WUE reporting impossible.",insight:"A €1,000 sub-meter solves this permanently."},
      {cause:"Irish Water contacts DC about consumption",effect:"15 million litres/year from cooling towers. Dublin water infrastructure under pressure.",insight:"WUE = 0 from dry coolers removes water as a planning objection and eliminates Legionella compliance burden."},
      {cause:"Cooling tower Legionella test overdue",effect:"HSA compliance risk. Quarterly testing obligation. Water treatment costs.",insight:"Dry cooler retrofit eliminates the entire F-Gas and Legionella compliance programme."}
    ],
    constraintLesson:"In Ireland, water-free cooling is both technically achievable and increasingly mandated.\nDublin is below 18°C for 82% of annual hours (7,200 hrs), enabling free cooling without mechanical compression.\nAdiabatic assist extends effective free cooling coverage to 97%. Cooling towers are the legacy approach.",
    weakestLink:{whatsWrong:"We have a cooling tower. It works. WUE has never been measured.",whatsRight:"The tower works but consumes water, requires Legionella management, and is not EED-reportable without metering.",howToGetThere:"Install a water sub-meter (€800–1,500). Calculate WUE for EED reporting. Then evaluate dry cooler retrofit to eliminate water consumption and Legionella risk."}
  },
  rhetoric:{
    declan:"Declan — the Legionella test was overdue when I checked. The cooling tower is a liability — water treatment chemicals, quarterly testing, blowdown management, drift eliminators to maintain, and a documented risk assessment that the HSA can ask for at any time. The dry cooler alternative has none of this. Zero water, zero Legionella risk, zero chemical storage, and zero HSA compliance paperwork. The only downside is slightly higher fan energy on the warmest days, which adiabatic assist solves for a fraction of the tower maintenance cost.",
    ann:"Water consumption is a planning risk for DC expansion. Irish Water and local authorities are scrutinising DC water use. WUE = 0 from dry coolers removes this as a planning objection. For any acquisition, ask for the WUE metric and water supply contract. A facility dependent on evaporative cooling carries both cost and regulatory risk.",
    mark:"No separate water meter means no WUE, which means EED Article 12 compliance for WUE is impossible. A €1,000 sub-meter solves this permanently. The metering gap is the first thing any EED auditor will check.",
    sarah:"WUE = 0.0 L/kWh is achievable with dry coolers in Ireland. Dublin climate means water-free cooling works most of the year. This is a competitive advantage for Irish DCs.",
    tom:"Tom — dry cooler retrofit versus keeping the tower: €200K CapEx for dry coolers (Tier 3 — Airedale/Stulz/Vertiv published ranges, indicative) versus €15K/yr tower maintenance, chemicals, and Legionella testing (Tier 2 — HSA Guidelines; Irish water treatment contractor rates, indicative). Simple payback on the dry cooler is 13+ years on maintenance savings alone. But the real driver is risk: one Legionella incident can cost €500K+ in shutdown, remediation, and reputational damage (Tier 3 — HSE UK enforcement case data; Irish insurance loss adjuster benchmarks, screening-level estimate). The dry cooler eliminates this risk entirely. Factor in the WUE improvement for EED reporting and the business case becomes clear."
  },
  scenario:{title:"The Irish Water Notice",narrative:"Irish Water contacts Clonshaugh about water consumption. The cooling tower consumes approximately 15 million litres annually. Dublin water infrastructure is under pressure.",question:"Calculate current WUE and the water saving from converting to dry coolers.",answer:"Current WUE:\nWater use: 15,000,000 litres/year\nIT energy: 2,400 kW × 8,760 hrs = 21,024,000 kWh/year\nWUE = 15,000,000 ÷ 21,024,000 = 0.71 L/kWh\n\nAfter dry cooler conversion:\nWUE = 0.0 L/kWh (zero water for cooling)\nWater saving: 15 million litres/year\nLegionella compliance saving: ~€8K–12K/year\nWater charges saving: ~€15K–25K/year (depending on tariff)"},
  sourceNote:"WUE — The Green Grid TGG-WP49 (T2). Legionella — HSA Guidelines (T1). EED — EU 2023/1791 Article 12 (T1).",
  clockQuote:"Half a million a year. For being 0.2 above a number most people haven't heard of.",
  retrofitRelevance:"WUE measurement requires a water sub-meter. Install before any cooling retrofit to establish baseline. Dry cooler conversion eliminates water consumption entirely.",
  crossRefs:[{module:"DC-LEARN-002",level:"L7",topic:"Condenser/heat rejection — cooling tower type determines WUE and water consumption"},{module:"DC-LEARN-010",level:"L7",topic:"Water stewardship — WUE is the sustainability KPI for water use in data centres"},{module:"DC-LEARN-009",level:"L1",topic:"DCIM → PUE measurement categories — WUE metering sits alongside PUE in the monitoring framework"}],
  cascadeCheck:(kw,racks,pue)=>{const itMW=kw*racks/1000;const wue=1.8;const waterL=wue*itMW*1000*8760;const waterM3=waterL/1000;return{needed:wue.toFixed(1),available:"0.0",unit:"L/kWh (WUE)",pass:wue<=0.5,detail:`WUE ${wue}: ${(waterM3/1000).toFixed(0)}k m³/yr. Dry cooler target WUE 0.0 eliminates water consumption entirely`}}
},
{
  id:"L3", level:3, name:"CRAC vs CRAH", icon:"❄️",
  available:true,
  component:"CRAC = self-contained compressor unit. CRAH = fan + chilled water coil.",
  userNeed:"Know the difference between CRAC and CRAH units, when each is appropriate, and the efficiency and resilience implications for retrofit planning.",
  plainEnglish:"A CRAC has its own compressor — standalone but less efficient. A CRAH uses central chilled water — more efficient but dependent on the chiller plant. At 2,400 kW cooling load, the efficiency difference is approximately €490K/year. CRAHs with N+1 chiller redundancy give both efficiency and resilience.",
  grammar:{
    facts:[
      {term:"CRAC (Computer Room Air Conditioner)",definition:"A self-contained cooling unit with internal compressor and refrigerant circuit. Rejects heat via an external condenser.",plain:"Each unit is independent — like a window air conditioner for the server room. If one fails, the others keep running.",number:"COP: 2.5–3.5. Power for 2,400 kW cooling: ~690–960 kW compressor power. Refrigerant: typically R410A (F-Gas regulated).",standard:"EN 14511; EU F-Gas Regulation 2024/573",feynman:{analogy:"A CRAC is like a standalone split air conditioner in a bedroom. It has its own compressor, its own refrigerant circuit, and works independently. If one fails, the others keep going — but each one is relatively inefficient.",firstPrinciples:"A CRAC contains an internal vapour-compression refrigeration cycle. Refrigerant absorbs heat at the evaporator, the compressor raises its pressure and temperature, and the condenser rejects heat outside. Each unit operates independently with no central dependency.",theTest:"What refrigerant do most CRACs use, and why is this a future risk? Answer: R410A (GWP 2,088), subject to EU F-Gas Regulation phase-down."}},
      {term:"CRAH (Computer Room Air Handler)",definition:"A fan unit with a chilled water coil. No compressor. Depends on a central chiller or free cooling plant for chilled water supply.",plain:"A big fan blowing air over a cold-water coil. Much more efficient than a CRAC, but needs a chiller or free cooling plant to supply the cold water.",number:"Fan power: 50–80 kW for 8 units at 2,400 kW. Central plant COP 5.5+. Total cooling power: ~436–680 kW. ~€490K/yr less than CRACs (Tier 2 — CIBSE Guide B2 COP benchmarks; EN 1886, indicative at 2,400 kW).",standard:"EN 1886; CIBSE Guide B2; EN 50600-2-3",feynman:{analogy:"A CRAH is like a hotel room fan-coil unit. It blows room air over a chilled water coil but has no compressor of its own — it depends on a central chiller to supply the cold water, like the hotel's central plant.",firstPrinciples:"A CRAH is a fan unit with a water-to-air heat exchanger. Cold water from a central chiller flows through the coil. The fan draws warm server air across the coil, cooling it. Efficiency depends on the central plant, not the individual unit.",theTest:"What happens if the central chiller fails and you have 8 CRAHs? Answer: All 8 lose cooling simultaneously — the chiller is the single point of failure."}},
      {term:"R410A Phase-Down",definition:"R410A (GWP 2,088) is the common CRAC refrigerant. Subject to EU F-Gas Regulation 2024/573 phase-down — supply restrictions increasing, service costs rising.",plain:"If you have CRACs with R410A refrigerant, servicing will get harder and more expensive every year. CRAHs use water — no refrigerant phase-down risk.",number:"R410A GWP: 2,088. Service cost trend: +30–50% since 2020 due to phase-down. By 2030: severely restricted.",standard:"EU F-Gas Regulation 2024/573; IPCC AR5",feynman:{analogy:"Imagine you own a car that runs on a special fuel that is being banned. Each year, less fuel is available and the price climbs. R410A refrigerant is in the same position — the EU is phasing it out, making CRAC servicing harder and more expensive every year.",firstPrinciples:"R410A has a Global Warming Potential (GWP) of 2,088 — releasing 1 kg has the same warming effect as 2,088 kg of CO₂. The EU F-Gas Regulation 2024/573 progressively restricts supply of high-GWP refrigerants through quota reduction.",theTest:"What is R410A's GWP and by when will it be severely restricted? Answer: GWP 2,088. By 2030, EU quotas will have restricted supply to the point where servicing becomes difficult and expensive."}}
    ,
      {term:"Variable Speed Drives (VSD) on CRAH Fans",definition:"Fitting variable speed drives to CRAH fan motors allows airflow to match actual IT load rather than running at full speed constantly. Fan power follows the cube law — halving airflow reduces fan power by approximately 87%.",plain:"A CRAH fan running at full speed when the room is half-loaded wastes enormous energy. A VSD lets the fan slow down to match the actual cooling demand. The savings are dramatic because of the cube law — reducing speed by 50% cuts power consumption by ~87%.",number:"Fan affinity cube law: Power ∝ Speed³. At 50% speed: 0.5³ = 12.5% of full power. VSD retrofit cost: €5–15k per CRAH unit.",standard:"IEC 60034-30-1 — Motor Efficiency Classes; EU Ecodesign Regulation 2019/1781",feynman:{analogy:"Running a CRAH fan at full speed regardless of load is like driving everywhere in 5th gear at maximum revs. A VSD is like adding a gearbox — the fan adjusts its speed to match the actual demand, consuming a fraction of the energy at partial load.",firstPrinciples:"The affinity laws for centrifugal fans state that power consumption varies with the cube of rotational speed. This means a 20% reduction in fan speed yields a 49% reduction in power. VSDs control motor speed by varying the supply frequency, enabling precise matching of airflow to cooling demand.",theTest:"8 CRAHs each draw 10 kW at full speed. IT load drops to 60%, requiring 60% airflow. What is the fan power saving with VSDs? Answer: 0.6³ = 0.216. Power = 80 kW × 0.216 = 17.3 kW. Saving: 62.7 kW (78%)."}},
      {term:"Delta-T Optimisation — Chilled Water Temperature Differential",definition:"Increasing the temperature difference between supply and return chilled water reduces water flow rate and pump energy. A higher delta-T means the same cooling capacity with less water movement.",plain:"Most legacy DCs run a narrow delta-T (5–7°C). Widening it to 10–12°C means less water needs to circulate for the same cooling, cutting pump energy significantly. But you need the CRAHs and valves to handle the higher return temperature.",number:"Legacy delta-T: 5–7°C. Optimised: 10–12°C. Pump power reduction: 40–60%. Annual saving: €20–60k per MW IT.",standard:"CIBSE Guide B2 §2.4 — Chilled Water Systems; ASHRAE Guideline 36-2018",feynman:{analogy:"Delta-T optimisation is like carrying bigger buckets instead of making more trips. If each bucket of water carries twice as much heat (higher delta-T), you need half as many trips (lower flow rate) — and the pump that carries the buckets uses far less energy.",firstPrinciples:"Cooling capacity = mass flow rate × specific heat × delta-T. For a fixed cooling load, increasing delta-T proportionally reduces the required flow rate. Pump power follows the cube law with flow rate, so doubling delta-T can reduce pump power by 75–85%.",theTest:"A chilled water system runs at 6°C/12°C (delta-T = 6°C). Optimising to 6°C/18°C (delta-T = 12°C) for the same load — what happens to pump flow and power? Answer: Flow halves (same Q with 2× delta-T). Pump power drops by approximately 87% (0.5³ = 0.125)."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"3 × chillers, load 2,400kW. Single chiller circuit",effect:"Chiller trips = all 8 CRAH units lose cooling simultaneously. Single point of failure.",insight:"CRAH dependency on central plant creates centralised SPOF. N+1 chiller is essential for CRAH resilience."},
      {cause:"CRACs proposed for independence from chiller plant",effect:"CRACs at 2,400 kW would cost approximately €490K more per year to run than CRAHs due to lower COP (Tier 2 — CIBSE Guide B2 §4.3; EN 14511 COP benchmarks, indicative).",insight:"Add a second chiller for €300K (Tier 3 — Airedale/Daikin/Climaveneta published ranges for 1.2–2.4 MW air-cooled chillers, indicative) to get both CRAH efficiency and resilience. CRACs also introduce R410A F-Gas exposure."},
      {cause:"R410A CRAC fleet requires F-Gas compliance",effect:"6-month leak checks, rising refrigerant costs, phase-down exposure.",insight:"CRAHs use water — no refrigerant, no F-Gas obligation, no phase-down risk."}
    ],
    constraintLesson:"The CRAC vs CRAH decision is architecture, not just efficiency.\nCRACs give independence (each unit self-contained). CRAHs give efficiency (central plant, free cooling).\nFor a 400-rack facility, CRAHs with N+1 chiller redundancy give both.",
    weakestLink:{whatsWrong:"We have CRAHs on a single chiller circuit. The chiller is the single point of failure for all 8 CRAH units.",whatsRight:"CRAH architecture is correct for efficiency. The gap is chiller redundancy — add N+1.",howToGetThere:"Add second chiller (€200K–350K, Tier 3 — Airedale/Daikin/Climaveneta published ranges, indicative). Configure lead/lag changeover. Add dry cooler for free cooling. Total for resilient free-cooling CRAH plant: €500K–750K. Annual saving vs CRACs: ~€490K/yr."}
  },
  rhetoric:{
    declan:"Declan — we went CRAH when the facility was built. Right call for efficiency — central plant COP of 5.5 versus CRAC COP of 3.0 saved us hundreds of thousands per year. But August proved the central dependency risk. When the lead chiller tripped, all 8 CRAHs lost chilled water simultaneously. The room hit 35°C inlet in 12 minutes. We need N+1 chillers at minimum, and the BMS must be programmed for automatic standby changeover with zero manual intervention.hiller is the throat of the whole cooling system. One trip, 8 CRAHs all die together.",
    ann:"The CRAH architecture saves €490K/year versus CRACs (Tier 2 — CIBSE Guide B2; EN 1886 COP benchmark comparison, indicative at 2,400 kW). But the single chiller dependency is a risk. Adding a second chiller for €300K gives both efficiency and resilience — payback in 8 months.",
    mark:"CRAHs create a centralised dependency. But the answer is not CRACs — it is N+1 chillers. CRACs at 2,400 kW would cost €490K more per year. Buy a second chiller and get both resilience and efficiency.",
    sarah:"CRACs use R410A — F-Gas phase-down makes them an obsolescence risk. CRAHs use water — no refrigerant risk. Any new CRAC investment today is buying into a refrigerant phase-down problem. The F-Gas transition from CRACs to CRAHs eliminates the single largest refrigerant risk in the facility.",
    tom:"CRAC-vs-CRAH: architecture first, finance second. For a 400-rack facility, central plant is almost always better. The economics of free cooling at scale make CRAC uncompetitive."
  },
  scenario:{title:"The F-Gas Inspection",narrative:"An F-Gas compliance inspector visits Clonshaugh. 8 CRAC units containing R410A. Total charge: 192 kg. GWP 2,088. CO₂-equivalent: 401 tCO₂-eq.",question:"What leak check frequency applies? Calculate the annual emission cost at 5% leak rate.",answer:"Threshold check (EU F-Gas Regulation 2024/573 Article 4): 401 tCO₂-eq > 50 tCO₂-eq → 6-month leak checks required.\n401 tCO₂-eq < 500 tCO₂-eq → 3-month checks NOT yet triggered.\n\nAnnual leak emission at 5%:\n5% of 192 kg = 9.6 kg R410A leaked/year\nCO₂-eq: 9.6 × 2,088 = 20,045 kgCO₂-eq = 20 tCO₂-eq\n\nCarbon cost (Finance Act):\nCurrent: €71/tCO₂ × 20 = €1,420/yr\n2030: €100/tCO₂ × 20 = €2,000/yr\n\nRefrigerant top-up at €35/kg: 9.6 × €35 = €336/yr\nCompliance programme: €3K–5K/yr\nConvert to CRAHs and eliminate the entire F-Gas obligation."},
  sourceNote:"CRAC/CRAH — EN 14511 (T1); CIBSE Guide B2 (T2). F-Gas — EU 2024/573 (T1). R410A GWP — IPCC AR5 (T1).",
  clockQuote:"The Taxonomy doesn't care when it was built.",
  retrofitRelevance:"CRAC-to-CRAH conversion is a major retrofit project but eliminates F-Gas risk and delivers ~€490K/year energy saving at scale.",
  crossRefs:[{module:"DC-LEARN-002",level:"L3",topic:"CRAH/CRAC units — detailed comparison of unit types, capacities, and airflow patterns"},{module:"DC-LEARN-007",level:"L5",topic:"F-Gas phase-down — CRAC units with DX refrigerant face F-Gas compliance pressure"}],
  cascadeCheck:(kw,racks,pue)=>{const coolingKW=kw*racks*(pue-1)*0.7;const cracCOP=2.8;const crahCOP=5.5;const cracInput=coolingKW/cracCOP;const crahInput=coolingKW/crahCOP;const saving=(cracInput-crahInput)*8760*0.12;return{needed:cracCOP.toFixed(1),available:crahCOP.toFixed(1),unit:"COP",pass:false,detail:`CRAC COP ${cracCOP}: ${cracInput.toFixed(0)}kW input. CRAH COP ${crahCOP}: ${crahInput.toFixed(0)}kW. Saving: €${(saving/1000).toFixed(0)}k/yr`}}

{
  id:"L4", level:4, name:"Free Cooling — Ireland’s Advantage", icon:"🌬️",
  available:true,
  component:"Free cooling: reject heat using ambient air without mechanical compression",
  userNeed:"Understand how free cooling works, what makes Dublin exceptional, and how to calculate the economic case for a free cooling retrofit.",
  plainEnglish:"Dublin is below 19°C for approximately 7,200 hours per year — 82% of annual hours. For 82% of the year, a properly designed cooling system can reject DC heat without running a compressor. The saving at 2,400 kW IT load is €316K–600K per year.",
  grammar:{
    facts:[
      {term:"Free Cooling (Economiser Mode)",definition:"Heat rejection using ambient air when temperature is below the cooling water return minus approach. No compressor needed.",plain:"When it is cold enough outside, water goes through an outdoor heat exchanger instead of a chiller. The cold air does the work.",number:"Dublin: 7,200 hrs/yr at T<19°C. 82% of annual hours. Best in EU after Nordics.",standard:"ASHRAE TC 9.9 2021; CIBSE Guide B2; AIMEP DC Standards Reference v1.2.0",feynman:{analogy:"On a cold day, you open the window instead of running the air conditioner. Free cooling does the same thing for a DC — when outdoor air is cold enough, the chiller switches off and ambient air does the cooling work for free.",firstPrinciples:"Heat naturally flows from hot to cold. When outdoor air temperature is below the required supply temperature, a heat exchanger can cool the DC water circuit using ambient air alone, with no compressor energy. Only fan energy is consumed.",theTest:"How many hours per year is Dublin below 18°C? Answer: Approximately 7,200 hours — 82% of annual hours. Source: Met Éireann 30-year normals."}},
      {term:"Dry Cooler",definition:"Air-to-water heat exchanger. Ambient air blows across a finned coil to cool water. No compressor, no refrigerant.",plain:"A big outdoor radiator. Water in warm, air blows, water out cooler. Very low maintenance.",number:"Typical range: 100 kW–5,000 kW. Only fans — no compressor. COP equivalent: 15–50.",standard:"EN 327; CIBSE Guide B2",feynman:{analogy:"A dry cooler in free cooling mode is like leaving your fridge door open in winter — the cold air does the work. The fans run but the compressor stays off, cutting cooling electricity by 80–90% during those hours.",firstPrinciples:"When ambient temperature is below the required chilled water temperature, dry coolers reject heat directly to the atmosphere via sensible heat transfer. No compressor cycle is needed. The only electrical cost is fan power for airflow across the finned coils.",theTest:"What percentage of annual hours can Dublin achieve free cooling? Answer: Approximately 82% (7,200 of 8,760 hours)."}},
      {term:"Adiabatic Assist",definition:"Pre-cooling inlet air by water evaporation to extend free cooling beyond dry bulb limit.",plain:"Spray water on the incoming air to cool it below ambient. Extends free cooling for warm-but-not-hot days.",number:"Dublin 19–25°C: ~1,300 hrs where adiabatic extends free cooling. Total coverage: 97% of annual hours.",standard:"CIBSE Guide B2; Dublin design summer dry bulb: 25.0°C (Met Éireann)",feynman:{analogy:"Adiabatic assist is like misting yourself on a warm day — the water spray cools the air by a few degrees, just enough to extend free cooling into the warmer months without running the full chiller.",firstPrinciples:"Adiabatic cooling pre-cools the intake air by spraying a fine water mist that evaporates, lowering the air temperature by 3–5°C. This extends the effective free cooling envelope from 82% to approximately 97% of annual hours in Dublin.",theTest:"How does adiabatic assist extend free cooling coverage in Dublin? Answer: From ~82% to ~97% of annual hours by pre-cooling intake air by 3–5°C."}}
    ,
      {term:"Approach Temperature — The Free Cooling Limit",definition:"The approach temperature is the difference between the cooling water return temperature and the ambient dry bulb temperature at which the dry cooler can reject sufficient heat. Typical approach: 3–5°C.",plain:"Free cooling works when the outside air is cold enough, but not the instant it drops below the server inlet target. There is a gap — the approach temperature — between what the dry cooler needs and what the ambient air provides. A 3°C approach means free cooling kicks in when ambient drops to 15°C for a 18°C supply setpoint.",number:"Typical approach: 3–5°C. At 3°C approach with 18°C supply: free cooling available below 15°C ambient. Dublin hours below 15°C: ~6,500/yr.",standard:"CIBSE Guide B2; ASHRAE TC 9.9; AIMEP DC Standards Reference",feynman:{analogy:"Approach temperature is like the gap between the speed limit and how fast traffic actually flows. Even on a clear motorway (cold day), traffic (cooling water) never quite reaches the speed limit (ambient temperature) — there is always a gap due to the heat exchanger\'s imperfect transfer.",firstPrinciples:"Heat exchangers require a temperature driving force — the fluid being cooled must be warmer than the cooling medium. The approach temperature is the minimum temperature difference at which sufficient heat transfer occurs. Larger heat exchangers reduce the approach but increase capital cost and physical footprint.",theTest:"A dry cooler has a 5°C approach. The chilled water setpoint is 18°C. Below what ambient temperature can free cooling operate? Answer: 18 − 5 = 13°C. Free cooling available when ambient is below 13°C."}},
      {term:"Dublin Climate Advantage — Met Éireann 30-Year Data",definition:"Dublin\'s maritime climate provides 7,200 hours per year below 18°C and a design summer dry bulb of 25.0°C — one of Europe\'s most favourable climates for data centre free cooling, second only to Nordic locations.",plain:"Ireland\'s mild, wet climate is a genuine competitive advantage for data centres. 82% of the year is cold enough for free cooling. The summer peak of 25°C is moderate by European standards — Frankfurt hits 35°C, Madrid 40°C. This means Irish DCs can achieve lower PUE with simpler, cheaper cooling infrastructure.",number:"7,200 hrs/yr: below 18°C (Met Éireann). 25.0°C: design summer dry bulb. 82%: free cooling availability. ~97% with adiabatic assist.",standard:"Met Éireann 30-year normals (Dublin Airport); CIBSE Guide A — Weather Data",feynman:{analogy:"Dublin\'s climate for data centres is like being handed a discount card for cooling electricity. While DCs in Frankfurt or Madrid run chillers 5,000+ hours per year, Dublin can use free outdoor air for 7,200 hours — saving millions in energy costs over the facility lifetime.",firstPrinciples:"Free cooling availability is determined by the number of hours ambient temperature is below the required cooling water setpoint minus the approach temperature. Dublin\'s maritime climate, moderated by the Gulf Stream, delivers consistently cool temperatures with a narrow annual range (2–25°C).",theTest:"Compare Dublin (7,200 hrs below 18°C) with Frankfurt (4,500 hrs below 18°C) for a 10 MW DC at €0.12/kWh [expanded teaching scenario — not Clonshaugh]. What is the approximate annual cooling cost difference? Answer: Dublin uses free cooling for 2,700 more hours. At ~1 MW cooling load per 10 MW IT (PUE contribution), saving: 2,700 × 1,000 × 0.12 = ~€324k/yr."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"Chiller runs year-round despite Dublin climate",effect:"82% of annual hours, the chiller is running unnecessarily. €316K/year wasted.",insight:"Free cooling is the single largest energy saving available to Irish DCs."},
      {cause:"Free cooling installed but BMS not configured for automatic switching",effect:"Free cooling utilisation drops significantly. Night shifts default to what is running.",insight:"BMS programming (€8K–15K, Tier 2 — RICS NRM1 BMS controls benchmarks; Schneider/Vertiv published, indicative) is essential for ROI. Without automatic switching, free cooling hours are inconsistently captured."},
      {cause:"ASHRAE A1 setpoints (supply 18°C, onset 15°C) instead of A2 (onset 19°C)",effect:"~1,000 fewer free cooling hours per year in Dublin.",insight:"Every 1°C rise in permissible supply temperature adds ~200–400 free cooling hours in Dublin."}
    ],
    constraintLesson:"Free cooling is the single largest energy saving available to Irish DCs.\nThe barrier is not technology — dry coolers are simple and proven.\nThe barrier is that many facilities were designed with chiller-only cooling when the economics of free cooling were less understood.",
    weakestLink:{whatsWrong:"We run the chiller year-round. There is no free cooling equipment.",whatsRight:"CHW circuit exists and is correctly sized. CRAHs are compatible with elevated CHW temperatures. Rooftop space available.",howToGetThere:"[Cost inputs — Tier 3, indicative, Q1 2025 Irish market: Airedale/Stulz/Vertiv published. Savings derived from 7,200 hrs Met Éireann T1 × canonical load × €0.12/kWh CRU T2.] Dry cooler arrays (€400K–500K). Adiabatic assist (€100K–150K). BMS automation (€20K–30K). Total: €520K–680K. Saving: €316K/yr. Payback: 20–26 months."}
  },
  rhetoric:{
    declan:"Declan — I knew free cooling should be on the list but nobody told me the numbers were this clear-cut. 82% of the year Dublin is cold enough to cool the DC without running a compressor. That is 7,200 hours of free cooling out of 8,760. Add adiabatic assist and it goes to 97%. The chiller only runs for about 260 hours — the hottest days of summer. We have been paying for compressor electricity year-round when the Irish weather would do the work for free for most of the year.he year the chiller does not need to run. That is €316K we are throwing away annually (Tier 1/2 — derived: 7,200 hrs Met Éireann × 2,400 kW × €0.12/kWh CRU T2, indicative).",
    ann:"€620K capex (Tier 3 — Airedale/Stulz/Vertiv published, SCSI Q1 2025, indicative), €316K/yr saving (Tier 1/2 — derived: 7,200 hrs Met Éireann × 2,400 kW × €0.12/kWh CRU T2), 24-month payback. That is a 39% IRR before any carbon credits. This is the clearest investment case in the entire retrofit programme.",
    mark:"The Clonshaugh free cooling business case is one of the clearest I have seen. 20-month payback, proven technology, and the chiller becomes a backup rather than the primary cooler. The approach temperature assumption is critical — specify 3°C approach for dry coolers to maximise free cooling hours against Dublin climate data.",
    sarah:"Dublin is one of the best free cooling climates in the EU. Irish DC operators who do not exploit this are leaving money and carbon reduction on the table. A Dublin DC running chillers year-round when free cooling is available for 82% of hours has a quantifiable carbon inefficiency that CRREM models will penalise.",
    tom:"Tom — I price the dry cooler installation at €400K–€500K for a 2,400 kW facility (Tier 3 — Airedale/Stulz/Vertiv published ranges, SCSI benchmarks Q1 2025, indicative). Add adiabatic assist for €100K–€150K (Tier 3 — Airedale/Munters published, indicative). Controls integration: €50K–80K (Tier 2 — RICS NRM1 BMS integration benchmarks, indicative). Total: €550K–€730K. Against annual compressor savings of €250K–€350K (eliminating chiller for 82% of hours), payback is 20–24 months. This is one of the best returns in any DC retrofit programme."
  },
  scenario:{title:"The Free Cooling Business Case",narrative:"Mark presents the free cooling business case to Ann's investment committee. Clonshaugh runs chillers year-round despite Dublin's 7,200 free cooling hours. Capex: €620K for dry coolers, adiabatic assist, and controls. Ann asks: what is the 10-year NPV?",question:"Calculate the 10-year NPV at 8% discount rate and recommend the phased approval approach.",answer:"[Screening-level calculation. Input assumptions: free cooling saving €316,320/yr derived from 7,200 hrs × 2,400 kW × 0.18 kW/kW_IT overhead × €0.12/kWh — Met Éireann T1 / CRU T2. Capital cost indicative — Tier 3, Airedale/Stulz published. Discount rate 8% per RICS Red Book. All outputs subject to detailed design and tender.]\n\nAnnual saving: €316,320/year\nCapital cost: €620,000 (year 0)\nDiscount rate: 8%\n\nNPV = -€620,000 + Σ(€316,320 ÷ (1.08)^n) for n=1 to 10\nPV of annuity: €316,320 × ((1 - 1.08^-10) / 0.08) = €316,320 × 6.7101 = €2,122,619\nNPV = €2,122,619 - €620,000 = €1,502,619\n\nIRR ≈ 39% (saving/capex ratio exceeds hurdle rate significantly)\nPayback: 23 months\n\nPhased approach: Phase 1 (BMS + controls, €80K) to prove savings. Phase 2 (dry coolers, €400K) once Phase 1 data confirms. Phase 3 (adiabatic, €140K) to extend coverage to 97% of hours."},
  sourceNote:"Free cooling hours — Met Éireann 30-year normals 7,200 hrs <18°C (T1). Electricity — CRU Q4 2024 (T2). Carbon — SEAI 2026 0.2241 kgCO₂/kWh (T1). Cross-reference: DC-LEARN-002 Level 6.",
  clockQuote:"We're all looking at the same building. Start there.",
  retrofitRelevance:"Free cooling is the highest-ROI capital investment in the cooling retrofit programme. Install after metering and setpoint optimisation.",
  crossRefs:[{module:"DC-LEARN-002",level:"L6",topic:"Free cooling/economiser — the mechanical systems that deliver ambient cooling to the CHW loop"},{module:"DC-LEARN-006",level:"L2",topic:"Irish grid & SEAI — free cooling reduces grid electricity demand and Scope 2 emissions"},{module:"DC-LEARN-014",level:"L1",topic:"Liquid cooling fundamentals — rear-door heat exchangers can extend free cooling hours"}],
  cascadeCheck:(kw,racks,pue)=>{const coolingKW=kw*racks*(pue-1)*0.7;const fcHours=7200;const utilisation=0.85;const mechCOP=3.5;const fcSaving=coolingKW/mechCOP*fcHours/8760*utilisation*8760*0.12;return{needed:"0",available:"7,200",unit:"free cooling hrs/yr",pass:true,detail:`Dublin: ${fcHours} hrs <18°C. At ${(utilisation*100).toFixed(0)}% utilisation: €${(fcSaving/1000).toFixed(0)}k/yr avoided mechanical cooling`}}
},
{
  id:"L5", level:5, name:"Cooling Strategies", icon:"🔬",
  available:true,
  component:"Air cooling, direct liquid cooling, immersion, and density thresholds",
  userNeed:"Know when each cooling strategy is appropriate, what density thresholds drive technology transitions, and what the Irish retrofit market looks like.",
  plainEnglish:"Traditional air cooling works up to about 25 kW/rack. Above that, air cannot remove heat fast enough and liquid cooling becomes necessary. Most Irish DCs run 6–15 kW/rack — well within air cooling range but approaching the threshold as AI workloads densify.",
  grammar:{
    facts:[
      {term:"Air Cooling (Raised Floor / Overhead)",definition:"Cold air delivered to server inlets via raised floor plenum or overhead supply. Hot exhaust collected and returned to CRAH/CRAC.",plain:"Blow cold air at the front of the servers, collect hot air from the back. Without containment, hot and cold air mix — creating invisible hotspots where individual servers overheat and throttle while the room average temperature looks fine.",number:"Effective to ~25 kW/rack with containment. Most Irish DCs: 6–15 kW/rack currently.",standard:"ASHRAE TC 9.9; CIBSE Guide B2",feynman:{analogy:"Traditional air cooling is like a central heating system in a house — cool air is pushed into the room from below the floor or above the ceiling. It works well for normal heat loads but struggles when the house gets very hot.",firstPrinciples:"Air has low thermal conductivity and low specific heat capacity compared to water. Moving enough air to cool a 25 kW rack requires very high airflow rates. Above approximately 25 kW per rack, air cooling reaches its practical limit.",theTest:"What is the approximate maximum rack density for air cooling with containment? Answer: ~25 kW/rack. Beyond this, air cannot remove heat fast enough."}},
      {term:"Hot/Cold Aisle Containment",definition:"Physical separation between cold supply air and hot exhaust air using doors, curtains, or panels. Prevents mixing.",plain:"Stop the cold air and hot air from mixing before the cold air reaches the servers. The single biggest efficiency improvement for air-cooled DCs.",number:"Without containment: PUE penalty 0.1–0.3. Installation cost: €300–500/rack.",standard:"ASHRAE TC 9.9 Best Practices; BICSI 002-2019",feynman:{analogy:"Without containment, a server room is like a house with all doors and windows open — the heating and cooling systems fight each other. Containment is like closing the doors: hot air goes one way, cold air goes the other, and they never mix.",firstPrinciples:"Servers draw cool air from one side and exhaust hot air from the other. Without physical separation, hot exhaust recirculates back to server inlets, raising inlet temperatures. Containment physically separates hot and cold air paths, eliminating bypass airflow.",theTest:"What PUE improvement does containment typically deliver and what is the payback? Answer: PUE improvement of 0.1–0.3, payback under 12 months at typical DC loads."}},
      {term:"Direct Liquid Cooling (DLC)",definition:"Cold plates attached directly to CPU/GPU packages. Liquid circulates through the plates, removing heat at the chip.",plain:"Instead of blowing air at the server, pipe cold water directly to the hottest chips. Operationally, this means liquid connections at every rack — a leak is no longer just a facilities problem, it is an IT equipment damage risk. Leak detection is mandatory.",number:"Effective for 30–100+ kW/rack. Required for AI/GPU clusters. 1,000x better thermal conductivity than air.",standard:"ASHRAE TC 9.9 DLC White Paper; EN 13053",feynman:{analogy:"Direct liquid cooling is like a water-cooled engine in a car versus air cooling. Water touches the heat source directly and carries heat away 1,000 times more efficiently than air — essential when the heat load is extreme.",firstPrinciples:"Water has approximately 4,000 times the volumetric heat capacity of air. By bringing liquid directly to the heat source (CPU/GPU), the temperature difference can be maintained with far less flow volume than air cooling requires. This enables rack densities of 50–100+ kW.",theTest:"At what rack density does direct liquid cooling become necessary? Answer: Above ~25 kW/rack, where air cooling reaches its practical limit."}}
    ,
      {term:"Rear-Door Heat Exchanger (RDHX)",definition:"A water-cooled heat exchanger mounted on the rear door of a server rack. Captures exhaust heat at the rack before it enters the room, enabling neutral or negative heat contribution to the data hall.",plain:"Instead of letting hot exhaust blow into the room for the CRAH to deal with, an RDHX catches the heat at the rack door. The rack becomes thermally neutral — the room does not get any hotter. This allows higher rack densities without upgrading the room-level cooling.",number:"Capture rate: 60–80% of rack exhaust heat. Effective for 15–40 kW/rack. No refrigerant required — uses chilled water only.",standard:"ASHRAE TC 9.9; EN 50600-2-3:2019",feynman:{analogy:"An RDHX is like a towel rack radiator mounted on the back of each server cabinet. Instead of hot air escaping into the room, the heat is absorbed by water flowing through the door and piped away. The room stays cool even as individual racks get hotter.",firstPrinciples:"Capturing heat at the source (rack exhaust) before it mixes with room air is thermodynamically more efficient than trying to cool the mixed room air. The RDHX uses chilled water to absorb heat through a compact finned-tube heat exchanger at the rack door, maintaining a concentrated hot-to-cold temperature differential.",theTest:"A 25 kW rack exhausts air at 40°C. An RDHX captures 70% of this heat. What heat load reaches the room? Answer: 25 × 0.30 = 7.5 kW. The room-level cooling only needs to handle 7.5 kW instead of 25 kW from this rack."}},
      {term:"Immersion Cooling — Single-Phase vs Two-Phase",definition:"Immersion cooling submerges servers in a dielectric fluid. Single-phase uses circulated fluid (no boiling). Two-phase uses a fluid that boils at the chip surface, providing extremely high heat transfer coefficients.",plain:"Single-phase immersion circulates a non-conductive liquid around the servers like a warm bath. Two-phase immersion uses a fluid that boils on the hottest chips, carrying heat away through evaporation. Two-phase is more efficient but more complex and expensive.",number:"Single-phase: effective to 100+ kW/rack. Two-phase: effective to 200+ kW/rack. PUE contribution from cooling: < 1.03 for immersion vs 1.10–1.30 for air.",standard:"ASHRAE TC 9.9 Liquid Cooling Guidelines; OCP (Open Compute Project) Immersion Specifications",feynman:{analogy:"Single-phase immersion is like cooling a hot engine by submerging it in oil. Two-phase immersion is like cooling it in a liquid that boils on contact — the boiling absorbs enormous amounts of heat extremely efficiently, like water flashing to steam on a hot pan.",firstPrinciples:"Phase change (boiling) absorbs latent heat — far more energy per degree than sensible heating alone. Two-phase immersion exploits this by using a low-boiling-point dielectric fluid that vaporises at the chip surface, absorbing heat at the molecular level. The vapour rises, condenses on a cold surface, and returns as liquid.",theTest:"Why does two-phase immersion achieve lower PUE contribution than single-phase? Answer: Phase change provides a much higher heat transfer coefficient (up to 10×), requiring less fluid circulation and lower pump energy to remove the same heat load."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"Densification from 6 kW to 20 kW per rack without containment",effect:"Hot and cold air mix in the open floor. Hotspots at server inlets — potentially exceeding ASHRAE limits on some racks.",insight:"Containment is prerequisite for densification. €300–500/rack is the cheapest efficiency gain available."},
      {cause:"Operator says containment is too expensive at €300–500/rack for 400 racks",effect:"€120K–200K total. PUE improvement of 0.1–0.3 at 2,400 kW saves €100K–300K/year.",insight:"Payback under 12 months. Containment is the foundation for every other improvement."},
      {cause:"AI tenant requests 50 kW/rack",effect:"Air cooling cannot handle this density even with containment. Direct liquid cooling required.",insight:"Most Irish DCs are air-cooled. AI densification is the trigger for liquid cooling investment."}
    ],
    constraintLesson:"Containment is the foundation. Nothing else works efficiently without it.\nAt 20 kW/rack with open floor cooling, half the cold air never reaches the servers.\nContainment fixes this for €300–500/rack — the cheapest efficiency gain available.",
    weakestLink:{whatsWrong:"We are densifying from 6 kW to 20 kW per rack. The existing cooling system will handle it.",whatsRight:"The cooling capacity may be sufficient but the delivery method is not. At 20 kW/rack without containment, hot and cold air mix.",howToGetThere:"Install containment (€300–500/rack, Tier 3 — Subzero/Polargy/APC published containment kit prices, indicative). Rebalance airflow. Then evaluate whether free cooling capacity needs upgrading for the higher heat load."}
  },
  rhetoric:{
    declan:"Declan — we have talked about containment for years but it keeps getting pushed back. Every time we defer it, the room gets hotter in random spots while the BMS shows average return air at 26°C. That average hides individual rack inlets at 35°C where hot exhaust recirculates. Containment fixes this immediately — cold air goes to the servers, hot air goes to the CRAHs, and the two never mix. The installation takes 2–3 weeks per row and does not require downtime if sequenced properly.ensify a row, the adjacent rows get hotter. Containment would fix it overnight.",
    ann:"Containment at €300–500/rack for 400 racks is €120K–200K (Tier 3 — Subzero/Polargy/APC published containment kit prices, indicative). The PUE improvement (0.1–0.3) at 2,400 kW saves €100K–300K/year. Payback under 12 months. In due diligence, check whether containment is installed — open-floor DCs at high rack density are a hidden PUE risk.",
    mark:"Containment is the foundation. At 20 kW/rack without it, half the cold air bypasses the servers. Install containment before any other cooling investment. Without containment, VSD optimisation and free cooling are fighting against bypass airflow — the efficiency of upstream improvements is halved.",
    sarah:"Open floor cooling is architecturally wasteful — conditioning a room to cool the servers rather than conditioning the servers. Containment is the first step toward ASHRAE A2 supply temperatures.",
    tom:"I price containment at €300–500 per rack for full installation including doors, panels, and blanking plates. For 400 racks: €120K–200K. Payback under 12 months from PUE improvement alone."
  },
  scenario:{title:"The Density Request",narrative:"A tenant at Clonshaugh requests 20 kW/rack for an AI workload in a currently 6 kW/rack row. No containment is installed.",question:"What must be done before accepting the density increase?",answer:"Before accepting 20 kW/rack:\n1. Install hot aisle containment on the target row (€300–500/rack × row count, Tier 3 — Subzero/Polargy/APC published containment kit prices, indicative)\n2. Verify CRAH airflow capacity for increased heat load (20 kW vs 6 kW = 3.3× increase)\n3. Check chilled water plant capacity — additional 14 kW/rack × rack count\n4. Verify raised floor tile capacity — higher airflow needed at each rack position\n5. Check sprinkler head temperature rating — hot aisle at 20 kW will exceed 40°C, need ≥68°C heads\n6. Verify power capacity — rack PDU, busway, and upstream distribution\n\nWithout containment: hotspots, thermal alarms, and adjacent rack overheating."},
  sourceNote:"Containment — ASHRAE TC 9.9 Best Practices (T1). DLC — ASHRAE DLC White Paper (T2). Density thresholds — CIBSE TM57 (T2).",
  clockQuote:"PUE 1.50 was the result of real work. Now someone was telling him it wasn't enough.",
  retrofitRelevance:"Containment is the cheapest efficiency gain in any DC. Always install before setpoint optimisation or free cooling.",
  crossRefs:[{module:"DC-LEARN-002",level:"L2",topic:"Rack airflow management — containment is the physical implementation of hot/cold aisle separation"},{module:"DC-LEARN-014",level:"L5",topic:"Rear-door heat exchangers — liquid cooling at rack level as an alternative to air containment for high density"}],
  cascadeCheck:(kw,racks,pue)=>{const deltaT_uncontained=8;const deltaT_contained=18;const airflowReduction=1-(deltaT_uncontained/deltaT_contained);const fanSaving=airflowReduction*0.3*kw*racks*8760*0.12;return{needed:"Uncontained",available:"Contained",unit:"ΔT improvement",pass:false,detail:`Containment raises ΔT from ${deltaT_uncontained}°C to ${deltaT_contained}°C. Fan energy reduction ~${(airflowReduction*100).toFixed(0)}%. Saving: €${(fanSaving/1000).toFixed(0)}k/yr`}}
},
{
  id:"L6", level:6, name:"EED Reporting", icon:"📋",
  available:true,
  component:"EU EED Article 12: PUE, WUE, REF, CUE reporting for DCs >500 kW",
  userNeed:"Know what EED Article 12 requires, when it applies, and what a defensible PUE measurement programme looks like.",
  plainEnglish:"The EU Energy Efficiency Directive requires DCs above 500 kW IT load to report PUE, WUE, REF, and CUE annually to SEAI. First reports were due September 2024. Non-reporting carries enforcement risk under Irish transposition — SEAI is the competent authority with penalty powers. Clonshaugh at 2,400 kW is well above the threshold.",
  grammar:{
    facts:[
      {term:"EED Article 12 (Recast 2023)",definition:"EU directive requiring DCs above 500 kW IT to report PUE, WUE, REF, and CUE annually.",plain:"If your DC is big enough, you must publish your efficiency numbers. In Ireland, report to SEAI.",number:"Scope: DCs > 500 kW IT load. Ireland: SEAI is competent authority. Deadline: 15 May annually.",standard:"EU EED Recast 2023/1791 Article 12; Delegated Regulation 2024/1364",feynman:{analogy:"EED Article 12 is like the annual tax return for data centres — every DC above a certain size must declare its energy performance metrics to the government each year. Failure to file has consequences.",firstPrinciples:"The EU Energy Efficiency Directive (Recast 2023/1791) Article 12 requires data centres above 500 kW IT load to report PUE, WUE, REF, and CUE annually to the national competent authority. In Ireland, this is SEAI. Deadline: 15 May each year.",theTest:"What is the IT load threshold for EED Article 12 reporting, and who is the competent authority in Ireland? Answer: 500 kW IT load. SEAI."}},
      {term:"REF (Renewable Energy Factor)",definition:"Share of facility energy consumption from renewable sources.",plain:"What percentage of your power comes from renewables — PPAs, on-site generation, or grid mix.",number:"Irish grid renewable share 2024: ~50%. Target 80% by 2030. DC PPAs typically 80–100%.",standard:"EED Annex IV; SEAI National Energy Projections",feynman:{analogy:"REF is like the percentage of organic ingredients in your shopping basket. It measures what fraction of the DC's total energy comes from renewable sources — wind, solar, hydro — versus fossil fuels.",firstPrinciples:"REF equals the total renewable energy consumed (on-site generation plus certified green supply contracts) divided by total energy consumed. Ireland's grid is approximately 40% renewable (wind-dominated), but REF requires verifiable certification, not just grid average.",theTest:"If a DC consumes 31,536 MWh/year and has certified renewable supply for 12,600 MWh, what is REF? Answer: 12,600 / 31,536 = 0.40 (40%)."}},
      {term:"CUE (Carbon Usage Effectiveness)",definition:"Total GHG emissions from facility energy use divided by IT energy. kgCO₂ per kWh-IT.",plain:"Carbon intensity of operating the DC.",number:"Clonshaugh at PUE 1.50, grid 0.2241 kgCO₂/kWh: CUE = 1.50 × 0.2241 = 0.336 kgCO₂/kWh-IT.",standard:"The Green Grid TGG-WP32; SEAI 2026 grid emission factor: 0.2241 kgCO₂/kWh",feynman:{analogy:"CUE is the carbon price tag on every kWh of IT work. It tells you how many kilograms of CO₂ the DC emits per kWh of useful computing — combining the grid carbon intensity with the facility's own PUE overhead.",firstPrinciples:"CUE equals PUE multiplied by the grid emission factor. It captures both the facility overhead (PUE) and the carbon intensity of the electricity supply (kgCO₂/kWh). Reducing either PUE or grid carbon intensity reduces CUE.",theTest:"At PUE 1.50 and grid factor 0.2241 kgCO₂/kWh, what is CUE? Answer: 1.50 × 0.2241 = 0.336 kgCO₂/kWh-IT."}}
    ,
      {term:"EN 50600-4-2 — PUE Measurement Categories",definition:"EN 50600-4-2 defines three categories of PUE measurement based on IT energy measurement point: Category 1 (UPS output), Category 2 (PDU output), Category 3 (server input). Category 3 is most accurate.",plain:"Where you measure IT power changes the PUE number. Measuring at the UPS output (Cat 1) includes PDU losses in the IT figure, making PUE look better. Measuring at the server input (Cat 3) excludes all distribution losses, giving the most honest PUE.",number:"Cat 1: IT measured at UPS output (includes PDU losses). Cat 2: IT at PDU output. Cat 3: IT at server input (most accurate). PUE difference Cat 1 vs Cat 3: typically 0.02–0.05.",standard:"EN 50600-4-2:2016+A1:2019 — PUE Measurement Categories",feynman:{analogy:"PUE categories are like measuring your car\'s fuel efficiency at different points: at the fuel pump (Cat 1), at the engine inlet (Cat 2), or at the crankshaft (Cat 3). Each successive measurement excludes more losses and gives a more honest reading of useful work.",firstPrinciples:"PUE = total facility energy / IT equipment energy. The denominator depends on where IT energy is measured. Each component between the UPS and the server (PDU, cabling, connectors) introduces losses. Category 3 measures closest to the actual IT work, excluding all distribution overhead from the IT figure.",theTest:"A DC reports PUE of 1.28 at Category 1 (UPS output). The PDU and distribution losses are 3%. What would Category 3 PUE be? Answer: IT energy at Cat 3 = Cat 1 IT energy × 0.97. PUE Cat 3 = total / (IT × 0.97) = 1.28 / 0.97 ≈ 1.32."}},
      {term:"Delegated Regulation 2024/1364 — DC Sustainability Indicators",definition:"The EU Delegated Regulation specifies standardised calculation methodologies for PUE, WUE, ERF, and REF that all DCs above 500 kW must use for EED Article 12 reporting.",plain:"The EU does not just want you to report PUE — it wants everyone to calculate it the same way. The Delegated Regulation standardises measurement boundaries, time periods, and formulas. This means PUE values reported to the European database are comparable across facilities and countries.",number:"4 mandatory KPIs: PUE, WUE, ERF, REF. 500 kW: IT power threshold. 15 May: annual reporting deadline. Directly effective in Ireland (no transposition needed).",standard:"Commission Delegated Regulation (EU) 2024/1364 — supplementing EED Article 12",feynman:{analogy:"The Delegated Regulation is like the weigh-in rules before a boxing match — everyone must use the same scales, the same process, and the same time window. This prevents one DC reporting a flattering summer PUE while another reports an honest annual average.",firstPrinciples:"Standardised metrics enable comparison. Without a common calculation method, operators could cherry-pick measurement points and time periods to flatter their PUE. The Delegated Regulation eliminates this by prescribing EN 50600-4-2 measurement categories, annual averaging periods, and consistent boundary definitions.",theTest:"An operator reports PUE as a summer peak reading at Category 1. Is this compliant with the Delegated Regulation? Answer: No — the Regulation requires annual average (not peak) and should reference EN 50600-4-2 categories. Summer peak PUE will be higher than annual average (worse), so this also overstates performance."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"DC submits PUE from nameplate IT ratings instead of metered data",effect:"Server nameplate ratings are typically 30–50% above actual draw. PUE calculated from nameplate appears better than reality.",insight:"EED Delegated Regulation 2024/1364 requires metered PIT. Self-reported PUE from nameplate is non-compliant."},
      {cause:"DC has been in EED scope since 2024 but has made no submission",effect:"SEAI contacts them. 28-day response deadline.",insight:"Proactive engagement with a concrete remediation plan avoids penalties. Non-response triggers enforcement."},
      {cause:"No metering infrastructure installed",effect:"Cannot produce verifiable PUE, WUE, or CUE figures.",insight:"Provisional submission from billing data with a metering improvement plan is treated more favourably than non-submission."}
    ],
    constraintLesson:"EED compliance is not optional. The first reporting cycle has passed.\nFacilities that proactively register and submit provisional data are being treated favourably.\nFacilities that ignore the obligation face enforcement.",
    weakestLink:{whatsWrong:"We did not know about EED Article 12. No registration, no metering, no submission.",whatsRight:"The engineering data to calculate provisional PUE exists. A provisional submission with caveats is far better than non-submission.",howToGetThere:"Register with SEAI (free). Submit provisional PUE from billing data. Install metering (€20K–30K, Tier 2 — RICS NRM1; Schneider/Vertiv published metering package rates, indicative). Submit verified report year 2 onwards."}
  },
  rhetoric:{
    declan:"Declan — I got a letter from SEAI three weeks ago. I did not know what EED Article 12 was. Mark told me we need to report PUE, WUE, CUE, and REF to the European database by 15 May every year. We had none of the metering in place to calculate these properly. The IT meters were at the UPS output (Category 1), not the PDU level (Category 2) that the Delegated Regulation specifies. We have spent the last month installing sub-meters to get compliant.d me ignoring it is not an option.",
    ann:"EED compliance is table stakes for institutional investment. A DC that cannot produce a verified PUE is not investable for the class of investor I am raising money from.",
    mark:"SEAI is in enforcement ramp-up. Facilities that proactively register and submit a provisional report with a metering improvement plan are not being penalised. Wait another year and that window closes. Specify EN 50600-4-2 Category 2 metering as a minimum for new installations. Category 3 for facilities targeting Taxonomy alignment.",
    sarah:"EED reporting feeds directly into SFDR disclosure. Article 9 funds require counterparty ESG data. PUE, WUE, REF, and CUE from EED reporting satisfy multiple regulatory disclosure requirements simultaneously. The standardised reporting under the Delegated Regulation means Irish operators are now directly comparable with continental European peers.",
    tom:"Tom — metering investment pays back instantly, not from energy saving but from regulatory risk elimination. The EN 50600-4-2 compliant metering package for a 2,400 kW facility costs €16–30K (Tier 2 — RICS NRM1; Schneider/Vertiv published, indicative). Without it, you cannot produce a verified PUE for EED Article 12, cannot demonstrate Taxonomy alignment, and cannot satisfy SFDR data requests from institutional investors. The cost of non-compliance is not a fine — it is exclusion from the institutional capital market.ination. €25K for metering (Tier 2 — RICS NRM1 metering package benchmarks, indicative) vs €50K penalty potential (Tier 3 — SEAI enforcement case data, screening-level estimate)."
  },
  scenario:{title:"The SEAI Letter",narrative:"SEAI sends Clonshaugh a compliance enquiry. Facility identified as in-scope via CRU grid connection data. No FY2024 submission. 28-day response deadline.",question:"What should the response contain?",answer:"Response elements:\n1. Acknowledge scope and obligation\n2. Provisional PUE from billing data (state methodology and uncertainty ±10–15%)\n3. WUE: state absence of sub-metering, installation planned\n4. REF: state grid supply, ~50% renewable (grid average)\n5. CUE: calculable from provisional PUE × grid emission factor\n6. Metering improvement plan with dates and committed budget\n7. Commitment to submit verified FY2025 report by 15 May 2026\n\nCritical: include a concrete remediation plan. Acknowledgement without a plan triggers enforcement."},
  sourceNote:"EED — EU 2023/1791 Article 12 (T1). Delegated Reg — 2024/1364 (T1). SEAI — Irish competent authority (T1). Carbon — SEAI 2026 0.2241 kgCO₂/kWh (T1).",
  clockQuote:"She always printed the number she was going to use. Paper on a table was harder to look away from.",
  retrofitRelevance:"EED compliance drives metering investment. Metering is the prerequisite for every cooling optimisation measure.",
  crossRefs:[{module:"DC-LEARN-007",level:"L1",topic:"EED Article 12 — detailed regulatory obligations including reporting deadlines and thresholds"},{module:"DC-LEARN-009",level:"L7",topic:"DCIM reporting — automated EED compliance data extraction from monitoring systems"}],
  cascadeCheck:(kw,racks,pue)=>{const itKW=kw*racks;const threshold=500;const triggered=itKW>threshold;return{needed:itKW.toFixed(0),available:threshold.toFixed(0),unit:"kW IT (EED threshold)",pass:!triggered,detail:`${itKW}kW IT ${triggered?"EXCEEDS":"below"} ${threshold}kW EED Article 12 reporting threshold. ${triggered?"Metering infrastructure required.":"Below threshold — voluntary reporting recommended."}`}}
