{
  id:"L7", level:7, name:"ASHRAE Thermal Envelopes", icon:"🌡️",
  available:true,
  component:"ASHRAE TC 9.9 thermal classes: A1 (strict) to A4 (permissive)",
  userNeed:"Know what ASHRAE thermal class applies to your equipment, what the supply air limits are, and how envelope choice affects cooling energy.",
  plainEnglish:"Server manufacturers rate equipment for specific temperature ranges. ASHRAE A1 needs 15–20°C supply. ASHRAE A2 tolerates up to 35°C inlet. Every degree you raise acceptable supply temperature = more free cooling hours. Most modern servers are at least A2.",
  grammar:{
    facts:[
      {term:"ASHRAE A1 Class",definition:"Server inlet 15–20°C recommended, humidity 20–80% RH. Strictest cooling requirement.",plain:"Older or high-performance equipment needing tight temperature control. Limits free cooling in warmer months.",number:"Supply air: 15–20°C recommended. Typical: pre-2015 enterprise servers.",standard:"ASHRAE TC 9.9 2021 Table 1",feynman:{analogy:"ASHRAE A1 is like a vintage car that needs a perfectly temperature-controlled garage. These older servers are fussy — they need cooler air (15–32°C allowable) and tighter humidity control, costing more to keep comfortable.",firstPrinciples:"ASHRAE TC 9.9 classifies IT equipment by environmental tolerance. A1 class has a narrower allowable range (15–32°C) and stricter humidity requirements than A2. Cooling to A1 limits when most equipment is A2-capable wastes energy.",theTest:"What is the allowable inlet temperature range for ASHRAE A1? Answer: 15–32°C allowable, 18–27°C recommended."}},
      {term:"ASHRAE A2 Class",definition:"Server inlet 10–35°C allowable, 15–25°C recommended. Most common modern class.",plain:"Most servers manufactured 2015+ fall here. 35°C allowable inlet means much more free cooling headroom.",number:"Supply air: can extend to 27°C in economiser mode. Dublin free cooling: 97% of annual hours at A2.",standard:"ASHRAE TC 9.9 2021 Table 1",feynman:{analogy:"ASHRAE A2 servers are like modern cars that work fine in a wider range of conditions. They tolerate warmer air (10–35°C), meaning the DC can run warmer and save on cooling costs — if the operator trusts the rating.",firstPrinciples:"A2 class equipment tolerates a wider environmental envelope: 10–35°C allowable, 15–25°C recommended. Most modern enterprise and hyperscale servers are A2-rated. Operating at the recommended upper limit (25°C) instead of the A1 limit (27°C) saves 2–4% cooling energy per degree.",theTest:"What is the allowable inlet temperature for A2 class? Answer: 10–35°C allowable, 15–25°C recommended."}},
      {term:"Setpoint Optimisation",definition:"Raising the supply air temperature setpoint to the maximum permitted by the installed equipment thermal class.",plain:"If your servers can handle 25°C air, why are you cooling to 18°C? Every degree raised saves energy.",number:"Each 1°C rise in supply temperature: ~2–4% cooling energy reduction. From 18°C to 24°C: ~12–24% saving.",standard:"ASHRAE TC 9.9 Best Practices 2021",feynman:{analogy:"Setpoint optimisation is like turning down the central heating from 22°C to 20°C in your house. You barely notice the difference but the gas bill drops noticeably. In a DC, each degree warmer saves 2–4% of cooling energy.",firstPrinciples:"Cooling energy is proportional to the temperature difference between the supply air and the outdoor ambient air. Raising the supply setpoint from 18°C to 24°C reduces this difference by 6°C, which reduces compressor and free cooling energy requirements significantly.",theTest:"How much cooling energy does each 1°C setpoint increase save? Answer: Approximately 2–4% of cooling energy per degree."}}
    ,
      {term:"ASHRAE A1 vs A2 — Widened Temperature Envelopes",definition:"ASHRAE TC 9.9 defines thermal envelopes for data centres. A1 allows intake air up to 32°C. A2 allows up to 35°C. Widening the envelope extends free cooling hours by allowing servers to accept warmer supply air.",plain:"Modern servers can tolerate warmer air than legacy equipment. By operating at A2 (up to 35°C intake) instead of A1 (32°C), a DC in Dublin can run free cooling for even more hours per year — potentially reaching 99%+ with adiabatic assist.",number:"A1: 15–32°C intake, 20–80% RH. A2: 10–35°C intake. A3: 5–40°C. A4: 5–45°C. Dublin max dry bulb: 25°C (well within A2).",standard:"ASHRAE TC 9.9 Thermal Guidelines for Data Processing Environments (5th Edition, 2021)",feynman:{analogy:"Widening the ASHRAE envelope is like turning up the thermostat on the office air conditioning. Instead of cooling to 21°C, you accept 24°C. The servers can handle it, and the cooling system works less hard — or not at all during mild weather.",firstPrinciples:"Server components have thermal limits set by semiconductor physics. ASHRAE defines safe operating ranges that balance reliability and efficiency. A wider envelope (higher maximum intake temperature) means the cooling system can supply warmer air while remaining within server tolerance, extending free cooling hours.",theTest:"A DC in Dublin operates at ASHRAE A1 (max 32°C intake). Dublin never exceeds 25°C. Is A1 even a constraint? Answer: No — Dublin\'s climate is well within A1 limits. The DC could operate at A2 (35°C) or even A3 (40°C) without risk, further relaxing cooling requirements."}},
      {term:"Humidity Control — Widened Ranges Save Energy",definition:"Legacy DCs maintained tight humidity (40–55% RH). ASHRAE 2021 guidelines allow 20–80% RH for Class A1/A2. Widening the band eliminates humidification/dehumidification energy, which can contribute 3–5% of total cooling energy.",plain:"Old-school DCs ran humidifiers and dehumidifiers to keep humidity in a narrow band. Modern guidelines say 20–80% RH is fine for IT equipment. Turning off the humidifier saves energy and eliminates water consumption from that source.",number:"Legacy: 40–55% RH (tight). ASHRAE 2021: 20–80% RH (A1/A2). Energy saving: 3–5% of cooling energy. Dublin average RH: 75–85%.",standard:"ASHRAE TC 9.9 (5th Edition, 2021); CIBSE Guide B2",feynman:{analogy:"Controlling humidity in a tight band is like trying to keep a swimming pool at exactly 28.0°C — the heater and cooler fight each other constantly. Widening the acceptable range to 25–31°C means neither system runs as often, saving significant energy.",firstPrinciples:"Humidification requires energy to evaporate water; dehumidification requires energy to condense it. Both are phase-change processes with high energy costs. ASHRAE\'s widened humidity range (20–80%) reflects updated understanding that modern IT equipment tolerates wide humidity variation without reliability impact.",theTest:"A DC in Dublin runs humidifiers to maintain 45% RH minimum. Dublin\'s ambient RH averages 80%. Is the humidifier necessary? Answer: Under ASHRAE 2021 A1/A2 guidelines (20–80% RH acceptable), the humidifier is unnecessary. Dublin\'s naturally high humidity is well within the widened range. Turning it off saves 3–5% of cooling energy."}}]
  },
  logic:{
    causeAndEffect:[
      {cause:"Supply temperature set at 18°C for mixed estate of 95% A2 and 5% A1 servers",effect:"Entire facility cooled to the most restrictive equipment class. 95% of racks could accept 22–24°C.",insight:"Zone the A1 equipment separately. Each 1°C rise saves 2–4% cooling energy."},
      {cause:"Operator nervous about raising supply from 18°C to 24°C",effect:"Modern A2 servers are rated to 35°C allowable inlet. 24°C is well within recommended range.",insight:"Implement in 1°C increments over 4–6 weeks with continuous BMS monitoring."},
      {cause:"Supply temperature unchanged since 2013",effect:"Equipment refreshed to A2-class since then. Running at 18°C wastes 6°C of free cooling headroom.",insight:"€60K–120K/year wasted on over-cooling (Tier 2 — CIBSE TM54; derived from 80–120 kW excess cooling × 8,760 hrs × €0.12/kWh CRU T2, indicative). Audit cost: €5K–10K (Tier 2 — RICS NRM1 fee benchmarks, indicative)."}
    ],
    constraintLesson:"The supply temperature setpoint is often set for the most restrictive equipment in the room.\nIf 5% of racks are A1 and 95% are A2, the entire room runs at A1 temperatures.\nZone the A1 equipment separately and raise the setpoint for everything else.",
    weakestLink:{whatsWrong:"Supply temperature set at 18°C since 2013 and never changed. Equipment has been refreshed to A2-class since then.",whatsRight:"A2 equipment tolerates 27°C inlet. Running at 18°C wastes 6°C of free cooling headroom.",howToGetThere:"Audit equipment thermal class. Identify any A1 legacy equipment. Zone A1 separately. Raise A2 zones to 22–24°C. Monitor for 30 days. Adjust."}
  },
  rhetoric:{
    declan:"Declan — I set the supply temperature at 18°C when we opened in 2013 and never changed it. Nobody told me the ASHRAE guidelines had widened to allow 32°C inlet for A1 equipment. Our servers are all A2-rated — they can handle 35°C inlet. We have been overcooling by 10–15°C for over a decade. Raising the setpoint to 24°C this month saved immediate cooling energy — the chillers run less and the free cooling hours extend dramatically. Zero capex, immediate payback.d me the servers could handle warmer air.",
    ann:"Raising supply temperature from 18°C to 24°C is a zero-capex optimisation. The energy saving at 2,400 kW could be €60K–120K/year (Tier 2 — CIBSE TM54; derived: 80–120 kW × 8,760 hrs × €0.12/kWh CRU T2, indicative). Free money. The zero-capex setpoint change is the most compelling slide in any board presentation.",
    mark:"18°C was correct in 2013 for mixed A1 equipment. In 2026, with mostly A2+ equipment, running at 18°C is over-cooling by 6°C. That is €60K–120K/year wasted (Tier 2 — CIBSE TM54; derived: ~100 kW × 8,760 hrs × €0.12/kWh CRU T2, indicative).",
    sarah:"Every degree of supply temperature rise reduces carbon intensity. At 2,400 kW, a 4°C rise saves approximately 200–400 tonnes CO₂/year from reduced chiller operation.",
    tom:"Setpoint optimisation costs zero capex — it is a BMS configuration change. The only cost is the thermal audit to confirm equipment compatibility. Budget €5K–10K for the audit (Tier 2 — RICS NRM1 fee benchmarks, indicative). Saving: €60K–120K/year. Best ROI in the entire programme."
  },
  scenario:{title:"The Temperature Audit",narrative:"Mark audits Clonshaugh server equipment. 380 of 400 racks contain A2-class servers. 20 racks contain legacy A1 equipment in one row. Supply temperature is 18°C throughout.",question:"What is the recommended setpoint strategy and estimated saving?",answer:"Strategy: zoned cooling.\nA1 zone (20 racks, 1 row): maintain 18°C supply. Isolate with containment if not already done.\nA2 zone (380 racks, remaining rows): raise supply to 23–24°C.\n\nSaving estimate:\n380 racks × 6 kW = 2,280 kW IT in A2 zone\n5°C setpoint increase (18→23°C): ~10–15% cooling energy reduction\nCooling energy for A2 zone: ~800 kW × 10–15% = 80–120 kW reduction\nAnnual saving: 100 kW × 8,760 × €0.12 = ~€105K/year\nCapex: €5K–10K for thermal audit + BMS reprogramming\nPayback: under 2 months"},
  sourceNote:"ASHRAE TC 9.9 2021 thermal classes (T1). Setpoint optimisation — ASHRAE Best Practices (T1). Dublin climate — Met Éireann (T1).",
  clockQuote:"Five people, five reactions. None of them were wrong.",
  retrofitRelevance:"Setpoint optimisation is the zero-capex quick win. Always do thermal audit before raising temperatures.",
  crossRefs:[{module:"DC-LEARN-002",level:"L1",topic:"Server heat output — ASHRAE inlet temperature limits protect against thermal throttling"},{module:"DC-LEARN-007",level:"L3",topic:"EU Taxonomy — PUE ≤1.3 threshold requires pushing supply air toward the warm end of the ASHRAE envelope"}],
  cascadeCheck:(kw,racks,pue)=>{const currentSetpoint=20;const ashraeA1Max=27;const headroom=ashraeA1Max-currentSetpoint;const savingPerDegree=0.03;const annualSaving=headroom*savingPerDegree*kw*racks*pue*8760*0.12;return{needed:currentSetpoint+"°C",available:ashraeA1Max+"°C",unit:"ASHRAE A1 max",pass:true,detail:`Current ${currentSetpoint}°C → ASHRAE A1 max ${ashraeA1Max}°C = ${headroom}°C headroom. ~3%/°C cooling saving: €${(annualSaving/1000).toFixed(0)}k/yr potential`}}
},
{
  id:"L8", level:8, name:"The Cooling Retrofit Business Case", icon:"💰",
  available:true,
  component:"Phased investment programme: metering → containment → free cooling → controls",
  userNeed:"Build a complete cooling optimisation business case: phased actions, costs, savings, and presentation for board approval.",
  plainEnglish:"The individual improvements — PUE metering, containment, free cooling, setpoint optimisation, EED compliance — combine into a phased programme. Phase 1 (low-cost quick wins) funds Phase 2 (capital projects). The total programme has a 2–3 year payback and generates €800K+/year ongoing saving (Tier 2 — RICS NRM1 / SCSI Q1 2025 aggregated phased estimates; RICS Red Book DCF, indicative).",
  grammar:{
    facts:[
      {term:"Phased Investment",definition:"Sequence capital spending so early wins fund later phases. Reduces peak funding requirement and proves the concept before committing to large capex.",plain:"Start with the cheap stuff that saves money fast. Use those savings to justify the expensive stuff.",number:"Phase 1 (metering + setpoints): €30K–50K (Tier 2 — RICS NRM1, indicative), saves €150K+/yr. Phase 2 (containment): €150K–200K (Tier 3 — Subzero/Polargy/APC, indicative). Phase 3 (free cooling): €500K–700K (Tier 3 — Airedale/Stulz/Vertiv, indicative).",standard:"CIBSE TM54; SEAI BEUS Grant Programme",feynman:{analogy:"Phased investment is like renovating a house room by room instead of all at once. You prove the builder is good on the bathroom before committing to the kitchen. Phase 1 proves the saving before the board approves Phase 2.",firstPrinciples:"Large capital requests face higher approval barriers than small ones. By splitting the programme into phases where each phase generates measurable savings, the business case for subsequent phases uses actual data instead of projections.",theTest:"Why is Phase 1 (metering + setpoints at €45K, Tier 2 — RICS NRM1) easier to approve than the full €800K programme (Tier 2 — SCSI Q1 2025, indicative)? Answer: €45K fits operational budget (no board approval). Measured savings from Phase 1 prove the ROI for Phase 2."}},
      {term:"SEAI BEUS Grant",definition:"SEAI Better Energy for Business scheme. Grants of up to €120K/year per applicant for commercial energy efficiency measures including cooling.",plain:"The government will help pay for your cooling upgrade. Up to €120K per year.",number:"Grant rate: 30–50% of eligible cost. Maximum: €120K/year. Cooling system upgrades including free cooling and adiabatic are eligible.",standard:"SEAI BEUS 2024 Guidelines",feynman:{analogy:"The SEAI BEUS grant is like a cashback offer on energy-saving improvements. The government pays back a portion of your cooling upgrade costs — up to €120K per year — to incentivise commercial buildings to reduce energy consumption.",firstPrinciples:"SEAI's Better Energy for Business scheme provides capital grants for energy efficiency measures in commercial buildings, including data centre cooling upgrades. Grants cover a percentage of eligible costs up to a maximum of €120,000 per applicant per year.",theTest:"What is the maximum annual SEAI BEUS grant for a single applicant? Answer: €120,000 per year."}},
      {term:"10-Year NPV Model",definition:"Net Present Value over a 10-year investment horizon. Standard appraisal method for DC infrastructure investment.",plain:"What is the total value of the investment today, accounting for the time value of money?",number:"Clonshaugh cooling programme: ~€4.9M NPV at 8% discount rate over 10 years.",standard:"RICS Red Book; SCSI Valuation Standards",feynman:{analogy:"NPV is like asking: if I put €875K into this cooling programme today, will I get back more than €875K in savings over 10 years, adjusted for the fact that money today is worth more than money tomorrow?",firstPrinciples:"Net Present Value discounts future cash flows back to today's value using a discount rate that reflects the cost of capital. A positive NPV means the investment returns more than the required rate. NPV of €4.9M on €875K means €5.60 returned per €1 invested.",theTest:"An investment of €875K (Tier 2 — RICS NRM1 / SCSI Q1 2025 aggregated, indicative) returns €4.9M NPV (Tier 2 — RICS Red Book DCF at 8% discount rate) over 10 years. What is the simple multiple? Answer: €4.9M / €875K ≈ 5.6× return."}}
    ,
      {term:"PUE Improvement — Payback Calculation Method",definition:"The financial case for cooling retrofit is: annual energy saving (€) = IT load (kW) × PUE reduction × 8,760 hrs × €/kWh. Simple payback = CapEx / annual saving.",plain:"Every 0.1 PUE reduction saves real money. For a 10 MW IT load at €0.12/kWh [expanded teaching scenario — not Clonshaugh (400-rack, 2.4 MW)], a 0.1 PUE reduction saves approximately €1.05M per year. A cooling retrofit costing €3M has a simple payback of under 3 years.",number:"0.1 PUE reduction on 10 MW IT [expanded teaching scenario]: saves 1 MW × 8,760 hrs × €0.12 = €1,051,200/yr. Typical retrofit payback: 2–5 years.",standard:"AIMEP DC Standards Reference; CRU Q4 2024 blended rate: €0.12/kWh",feynman:{analogy:"PUE improvement payback is like insulating your house. The upfront cost is significant but the heating bill drops immediately and keeps saving every year. After a few years, the insulation has paid for itself and every subsequent year is pure profit.",firstPrinciples:"PUE reduction directly translates to reduced facility power for the same IT load. The saving is continuous: kW reduced × 8,760 annual hours × electricity rate. The payback depends on the ratio of retrofit capital cost to annual energy saving. Most cooling retrofits in Irish DCs achieve 2–5 year payback.",theTest:"A 5 MW IT DC at PUE 1.50 invests €1.5M in a cooling retrofit achieving PUE 1.30. What is the annual saving and simple payback? Answer: Saving = 5,000 × 0.20 × 8,760 × 0.12 = €1,051,200/yr. Payback = €1.5M / €1.05M = 1.4 years."}},
      {term:"Staged Retrofit — Maintaining Uptime During Cooling Upgrade",definition:"Cooling retrofit in a live DC must maintain N+1 or better redundancy throughout construction. This typically means building new plant in parallel, commissioning it, then decommissioning old plant — not swapping in-place.",plain:"You cannot shut down the cooling to upgrade it. The retrofit must be staged: install new plant alongside old, commission and prove it, transfer load, then remove old equipment. This doubles the plant room footprint temporarily and adds 20–40% to the construction cost versus a greenfield install.",number:"Construction cost premium for live retrofit: 20–40% over greenfield. Programme: 12–24 months for a typical 5–10 MW retrofit. Zero planned downtime if staged correctly.",standard:"EN 50600-2-3:2019 — Environmental Control; Uptime Institute Tier Standard (concurrent maintainability)",feynman:{analogy:"Retrofitting cooling in a live DC is like replacing the engine of a ship while it is at sea. You cannot stop the ship, so you must build the new engine alongside the old one, connect it, prove it works, and only then disconnect the old one.",firstPrinciples:"IT equipment cannot tolerate cooling interruption beyond a few minutes. A staged retrofit maintains continuous cooling by running old and new systems in parallel during the transition. This requires temporary additional space, power, and pipework — increasing cost but eliminating planned downtime.",theTest:"A 10 MW DC plans to replace its CRAC-based cooling with a CRAH + chiller system. Can it do this over a single weekend shutdown? Answer: No — a cooling system replacement requires parallel operation, staged commissioning, and gradual load transfer. Programme: 12–24 months with zero planned downtime."}}]

  scenario:{title:"The Board Meeting",narrative:"Mark and Tom present the cooling retrofit programme to Ann’s investment committee. Phase 1: €45K. Phase 2: €180K. Phase 3: €650K. Total: €875K. Annual saving: €850K+.",question:"What is the payback and how should the phased approval be structured?",answer:"[Screening-level phased programme estimate. Cost inputs: Tier 2 — RICS NRM1 / SCSI Q1 2025 benchmarks, indicative. Savings derived from canonical values: €0.12/kWh CRU T2, 7,200 hrs Met Éireann T1, 0.2241 kgCO₂/kWh SEAI T1. NPV at 8% per RICS Red Book. All figures subject to detailed design and tender.]\nPhased approval structure:\nPhase 1 (Q1): Metering + setpoint optimisation. €45K. Saving: €155K/yr. Payback: 4 months.\nApprove under operational budget. No board approval needed.\n\nPhase 2 (Q2): Containment. €180K. Additional saving: €200K/yr. Payback: 11 months.\nApprove based on Phase 1 measured results.\n\nPhase 3 (Q3–Q4): Free cooling + controls. €650K. Additional saving: €500K/yr. Payback: 16 months.\nApprove based on Phase 1+2 measured results. Apply for SEAI BEUS grant (up to €120K offset).\n\nTotal programme: €875K capex. €855K/yr saving. Payback: 12 months aggregate.\n10-year NPV at 8%: ~€4.9M."},

{

  userNeed:"Understand the specific challenges of cooling retrofit in a live facility and what a competent MEP consultant must deliver to make it safe.",
  plainEnglish:"Unlike power upgrades where you can isolate circuits, cooling upgrades in a live facility mean you are working with thermal loads that cannot be switched off. The servers keep running. The heat keeps coming. Every cooling modification must maintain thermal safety throughout.",
  grammar:{
    facts:[
      {term:"Method of Procedure (MOP)",definition:"A documented, step-by-step plan for every cooling modification in the live DC. Includes thermal risk assessment, rollback criteria, and emergency response.",plain:"The written plan that says exactly what happens in what order, what could go wrong, and what to do if it does.",number:"Typical MOP: 10–30 pages. Review: minimum 3 stakeholders (FM, consultant, contractor). Rehearsal: strongly recommended.",standard:"BICSI 002-2019 Clause 10.5; Uptime Institute M&O Stamp",feynman:{analogy:"A MOP is like a flight checklist for pilots. Every step of the cooling retrofit is written down in advance: who does what, when, with what backup plan if something goes wrong. No checklist, no flight — no MOP, no retrofit.",firstPrinciples:"A live data centre contains critical IT infrastructure that cannot tolerate uncontrolled environmental excursions. A MOP documents every step, identifies risks at each step, specifies rollback procedures, and ensures all parties understand the sequence before work begins.",theTest:"Why might an insurer exclude a claim for damage during a DC retrofit? Answer: If the work was performed without a documented MOP, the insurer may consider it an uncontrolled modification."}},
      {term:"Thermal Buffer Time",definition:"Time from cooling system failure to ASHRAE thermal alarm temperature. Depends on IT load density and containment.",plain:"How long you have before servers overheat if cooling stops. Higher density = less time.",number:"At 6 kW/rack (open floor): 4–6 minutes. At 20 kW/rack (contained): <2 minutes.",standard:"ASHRAE TC 9.9 Thermal Buffer Analysis",feynman:{analogy:"Thermal buffer time is like how long you can hold your breath underwater. Once cooling stops, the server room heats up. At 6 kW/rack, you have about 4–6 minutes before temperatures reach alarm levels — that is your breath-hold.",firstPrinciples:"When cooling stops, the thermal mass of the building, air, and equipment absorbs the ongoing heat output from servers. The buffer time depends on the ratio of thermal mass to heat generation rate. Higher rack density = shorter buffer.",theTest:"At 6 kW/rack with open floor cooling, what is the approximate thermal buffer to alarm temperature? Answer: 4–6 minutes."}},
      {term:"Staged Shutdown/Startup",definition:"Sequential approach to cooling modifications — one CRAH or chiller at a time, with thermal monitoring between each step.",plain:"Do not turn everything off at once. Take one unit offline, verify the others can handle the load, do the work, bring it back, then move to the next.",number:"With N+1 cooling: one unit offline at a time. Without N+1: only work during lowest-load periods.",standard:"Uptime Institute Tier III — Concurrent Maintainability",feynman:{analogy:"Staged shutdown is like landing a plane in stages — you do not just switch everything off. Each system shuts down in a specific order, with confirmation at each step, so that nothing is damaged and the restart follows the reverse sequence safely.",firstPrinciples:"Data centre cooling systems have interdependencies: chillers must stabilise before CRAHs can distribute chilled water, and IT equipment must not start generating heat before cooling is confirmed. Staged procedures respect these dependencies and include verification at each step.",theTest:"Why must cooling be confirmed before IT load is brought back online? Answer: Servers generate heat immediately on startup. Without confirmed cooling, thermal buffer may be exceeded before the cooling plant reaches capacity."}}
    ,
      {term:"Commissioning Cooling Under Load — The 72-Hour Soak Test",definition:"New cooling plant must be proven under sustained load before the old system is decommissioned. A 72-hour soak test at full design load confirms thermal stability, control response, and alarm thresholds.",plain:"You do not trust new cooling until it has run continuously under full load for at least 72 hours without intervention. This soak test catches control instabilities, sensor drift, and thermal anomalies that short tests miss. Only after the soak test passes can the old plant be decommissioned.",number:"72 hours: minimum recommended soak duration. Full design load: test at 100% of expected thermal load. Zero alarms: pass criteria.",standard:"CIBSE Commissioning Code W (Water Distribution Systems); EN 50600-2-3:2019",feynman:{analogy:"A 72-hour soak test is like a new car\'s extended test drive before buying. A 10-minute spin around the car park proves the engine starts. Three days on the motorway proves it handles sustained load, heat buildup, and real-world conditions without breaking down.",firstPrinciples:"Steady-state thermal performance differs from transient startup behaviour. A cooling system may respond well to initial load but drift as components reach thermal equilibrium, as control loops interact, or as ambient conditions change diurnally. A 72-hour test captures at least three full day/night cycles.",theTest:"New chiller plant is commissioned and runs for 8 hours at full load without alarms. Is this sufficient to decommission the old plant? Answer: No — 8 hours does not capture a full diurnal cycle. A 72-hour soak test is the minimum to confirm sustained performance across varying ambient conditions."}},
      {term:"Monitoring and Continuous PUE Improvement",definition:"PUE is not a one-time measurement. Continuous monitoring via DCIM, combined with automated setpoint optimisation, enables ongoing PUE improvement without major capital investment.",plain:"After the retrofit, the work is not done. DCIM systems track PUE in real time, flag anomalies, and enable incremental improvements. A well-monitored DC improves PUE by 0.01–0.03 per year through operational tuning — adjusting setpoints, optimising free cooling changeover, and fine-tuning VSD curves.",number:"0.01–0.03: annual PUE improvement from operational tuning. DCIM implementation: €100–300k (Tier 3 — Nlyte/Sunbird/Vertiv DCIM published pricing, indicative). ROI: typically under 12 months for a 5+ MW facility (Tier 3 — Uptime Institute DCIM ROI benchmarks, indicative).",standard:"EN 50600-4-2 — continuous monitoring requirement; ISO 50001:2018 — Energy Management Systems",feynman:{analogy:"Continuous PUE monitoring is like a fitness tracker for the data centre. You cannot improve what you do not measure. The DCIM dashboard shows real-time PUE, highlights anomalies, and tracks the effect of every operational change.",firstPrinciples:"PUE varies with ambient temperature, IT load, cooling setpoints, and equipment degradation. Without continuous monitoring, operators cannot distinguish seasonal variation from genuine efficiency loss. DCIM provides the data layer that enables evidence-based operational decisions.",theTest:"A DC achieves PUE 1.30 after retrofit. Over the next year, PUE drifts to 1.35 without any hardware changes. What is the likely cause? Answer: Operational drift — setpoints may have crept, free cooling changeover thresholds may be suboptimal, or a VSD may have been overridden to manual. DCIM monitoring would flag this within days, not months."}}]

  rhetoric:{

    ann:"A cooling retrofit without documented MOPs is an insurance risk. If equipment is damaged during the upgrade due to thermal excursion, the insurer will ask to see the MOP. No MOP = potential claim exclusion. Require the retrofit contractor to provide MOPs signed by a Chartered Engineer before any work commences in the live facility.",

    tom:"MOPs are not glamorous. Clients do not love paying for paperwork. But the MOP for a 400-rack cooling retrofit is €10K–20K of consultant time (Tier 2 — RICS NRM1 fee benchmarks; BICSI 002-2019 Cx documentation scope, indicative). Against the cost of a thermal incident during retrofit — €100K–1M+ of damaged IT equipment — it is essential."

  scenario:{title:"The August Heatwave Returns",narrative:"During a cooling retrofit at Clonshaugh, the backup chiller trips unexpectedly. Ambient temperature: 26°C. IT load: 2,400 kW. No temporary cooling installed. MOP did not include a chiller failure scenario.",question:"What happens and what should the MOP have included?",answer:"What happens:\nAt 2,400 kW with no active cooling, temperature rise rate depends on containment.\nOpen floor (current): thermal buffer ~4–6 minutes to ASHRAE A2 alarm (35°C inlet).\nContained hot aisle: buffer reduced to 2–3 minutes.\nAt 26°C ambient, free cooling cannot compensate without mechanical assist.\n\nWithin 5 minutes: ASHRAE alarm temperature reached. Server throttling begins.\nWithin 10 minutes: risk of automatic server shutdown.\nWithin 15 minutes: risk of equipment damage.\n\nWhat the MOP should have included:\n1. Risk assessment: identified chiller failure as credible during retrofit\n2. Mitigation: temporary portable cooling on standby (€5K–10K rental per unit, Tier 3 — Irish plant hire market rates, indicative)\n3. Rollback plan: procedure to restore cooling within 2 minutes\n4. Thermal monitoring: real-time BMS dashboard showing every zone\n5. Go/no-go criteria: maximum ambient temperature for retrofit work (e.g. <20°C)\n6. Communication plan: who calls whom at what temperature threshold"},

const RHETORIC_TAKEAWAYS_004 = {

const ASSESSMENT_QUESTIONS = [
  {level:1,id:"Q004-01",icon:"📊",stage:"grammar",q:"A DC draws 3,600 kW from the grid and the IT load is 2,400 kW. What is the PUE?",options:["1.50","1.30","2.00","0.56"],correct:0,explain:"PUE = Total Facility Power / IT Power = 3,600 / 2,400 = 1.50. Source: The Green Grid TGG-WP27."},
  {level:1,id:"Q004-02",icon:"📊",stage:"logic",q:"PUE is measured at 1.25 on a cool October day in Dublin. Why should this not be reported as the annual PUE?",options:["1.25 is too low to be real","PUE can only be measured in summer","October measurements are always wrong","A single-day measurement during optimal free cooling conditions does not represent annual performance. Summer months with chiller operation will increase PUE. EED requires 12-month annualised PUE."],correct:3,explain:"Seasonal PUE variation can be 0.1–0.3 between winter and summer in Irish DCs. EED requires annualised figures."},
  {level:1,id:"Q004-03",icon:"📊",stage:"rhetoric",q:"A DC reports PUE 1.50 estimated from ESB bills. An investor asks for verified PUE. What is the gap?",options:["No gap — billing data is sufficient","PUE cannot be verified","Estimated PUE has ±10–15% uncertainty. Verified PUE requires continuous metering at utility supply and IT load points per EN 50600-4-2. The gap is metering infrastructure (€16K–30K investment).","Only hyperscale DCs need verified PUE"],correct:2,explain:"EED Article 12 and investor due diligence require metered, verifiable PUE. Estimated PUE from billing is indicative only."},
  {level:2,id:"Q004-04",icon:"💧",stage:"grammar",q:"A DC with a cooling tower uses 15 million litres/year. IT energy is 21,024 MWh. What is WUE?",options:["0.71 L/kWh","1.40 L/kWh","0.0 L/kWh","15.0 L/kWh"],correct:0,explain:"WUE = 15,000,000 L / 21,024,000 kWh = 0.71 L/kWh. Source: The Green Grid TGG-WP49."},
  {level:2,id:"Q004-05",icon:"💧",stage:"logic",q:"An Irish DC operator converts from cooling towers to dry coolers. How does this affect WUE and Legionella compliance?",options:["WUE increases, Legionella risk remains","WUE drops to 0.0 L/kWh (zero water for cooling). Legionella risk and quarterly testing obligation are eliminated entirely.","WUE stays the same","Dry coolers increase water consumption"],correct:1,explain:"Dry coolers use air, not water. WUE = 0.0. Legionella risk eliminated. Compliance cost saving: €8K–12K/year in testing alone (Tier 2 — HSA Legionella Code of Practice; Irish water treatment contractor rates, indicative)."},
  {level:2,id:"Q004-06",icon:"💧",stage:"rhetoric",q:"An operator says: ‘WUE does not matter — water is cheap in Ireland.’ How do you respond?",options:["WUE matters beyond cost. Irish Water infrastructure is under pressure and local authorities are scrutinising DC water consumption during planning applications. WUE = 0 from dry coolers removes water as a planning objection and eliminates Legionella compliance burden.","Correct — water cost is negligible","WUE only matters in arid climates","Water consumption is not reportable"],correct:0,explain:"WUE is an EED reporting metric, a planning consideration, and a Legionella compliance driver — not just a cost issue."},
  {level:3,id:"Q004-07",icon:"❄️",stage:"grammar",q:"What is the key difference between CRAC and CRAH cooling units?",options:["CRAC is larger than CRAH","CRAH uses more electricity","CRAC is more efficient","CRAC has an internal compressor and refrigerant circuit. CRAH is a fan unit with a chilled water coil, dependent on central plant."],correct:3,explain:"CRAC = self-contained with compressor. CRAH = fan + chilled water from central plant. CRAHs are more efficient at scale. Source: CIBSE Guide B2."},
  {level:3,id:"Q004-08",icon:"❄️",stage:"logic",q:"A DC has 8 CRAH units on a single chiller. The chiller trips. What happens?",options:["One CRAH stops working","CRAHs switch to internal compressor","All 8 CRAH units lose cooling simultaneously — the chiller is the single point of failure for the entire cooling system. N+1 chiller redundancy eliminates this risk.","The building thermal mass provides backup"],correct:2,explain:"CRAH dependency on central plant creates centralised SPOF. N+1 chiller is essential for CRAH resilience. Source: EN 50600-2-3."},
  {level:3,id:"Q004-09",icon:"❄️",stage:"rhetoric",q:"An operator wants to replace ageing CRAHs with new CRAC units for independence. How do you advise?",options:["Good decision — CRACs provide independence","CRACs are always better for resilience","Replace all units simultaneously","CRACs at 2,400 kW would cost approximately €490K more per year to run than CRAHs due to lower COP. Add a second chiller for €300K to get both CRAH efficiency and resilience. CRACs also introduce R410A F-Gas exposure."],correct:3,explain:"N+1 chiller with CRAHs gives better efficiency AND resilience than CRACs. Plus avoids F-Gas phase-down risk from R410A."},
  {level:4,id:"Q004-10",icon:"🌬️",stage:"grammar",q:"How many hours per year is Dublin below 19°C (free cooling threshold)?",options:["3,600 hours (41%)","5,400 hours (62%)","7,200 hours (82%)","8,760 hours (100%)"],correct:2,explain:"Dublin is below 19°C for approximately 7,200 hours per year — 82% of annual hours. Source: Met Éireann 30-year normals; AIMEP DC Standards Reference v1.2.0."},
  {level:4,id:"Q004-11",icon:"🌬️",stage:"logic",q:"A DC designs free cooling for ASHRAE A1 setpoints (supply 18°C, onset 15°C) instead of A2 (onset 19°C). What is the consequence?",options:["~1,000 fewer free cooling hours per year in Dublin. A1 restricts free cooling onset to 15°C vs 19°C for A2. Each lost hour is a chiller hour.","More free cooling hours","No effect on free cooling","A1 provides better cooling"],correct:0,explain:"Every 1°C rise in permissible supply temperature adds ~200–400 free cooling hours in Dublin. A2 vs A1 can mean 1,000+ additional free cooling hours."},
  {level:4,id:"Q004-12",icon:"🌬️",stage:"rhetoric",q:"Free cooling is installed but the BMS is not configured for automatic switching. What is the impact?",options:["No impact — operators switch manually","Free cooling utilisation drops significantly. Night shifts default to what is running. Without automatic switching based on ambient temperature, free cooling hours are inconsistently captured. BMS programming (€8K–15K) is essential for ROI.","Manual switching is more reliable","BMS automation is only for large DCs"],correct:1,explain:"Free cooling ROI depends on capturing all available hours. Automatic BMS switching is mandatory for consistent operation. Source: CIBSE Guide B2."},
  {level:5,id:"Q004-13",icon:"🔬",stage:"grammar",q:"What is the typical maximum rack density for traditional air cooling with containment?",options:["10 kW/rack","50 kW/rack","25 kW/rack","100 kW/rack"],correct:2,explain:"Air cooling with hot/cold aisle containment is effective up to approximately 25 kW/rack. Above this, air cannot remove heat fast enough. Source: ASHRAE TC 9.9."},
  {level:5,id:"Q004-14",icon:"🔬",stage:"logic",q:"A DC densifies from 6 kW to 20 kW per rack without installing containment. What happens?",options:["Hot and cold air mix in the open floor. At 20 kW/rack, the mixing creates hotspots at server inlets — potentially exceeding ASHRAE limits on some racks while others remain cool. Containment is prerequisite for densification.","Cooling works normally","Only the front row is affected","Air cooling cannot handle 20 kW/rack"],correct:0,explain:"Without containment, bypass airflow and recirculation worsen dramatically at higher densities. Containment (€300–500/rack) is the foundation. Source: ASHRAE TC 9.9 Best Practices."},
  {level:5,id:"Q004-15",icon:"🔬",stage:"rhetoric",q:"An operator says containment is too expensive at €300–500/rack for 400 racks. How do you respond?",options:["Agree — containment is a luxury","Only new DCs need containment","Containment only helps at high density","€120K–200K total for containment. PUE improvement of 0.1–0.3 at 2,400 kW saves €100K–300K/year. Payback under 12 months. Containment is the cheapest efficiency gain available and the foundation for every other improvement."],correct:3,explain:"Containment payback is consistently under 12 months. It is a prerequisite for setpoint optimisation, free cooling maximisation, and densification."},
  {level:6,id:"Q004-16",icon:"📋",stage:"grammar",q:"What is the EED Article 12 IT load threshold for mandatory DC reporting in Ireland?",options:["100 kW","1,000 kW","500 kW IT load — DCs above this must report PUE, WUE, REF, and CUE annually to SEAI","5,000 kW"],correct:2,explain:"EU EED Recast 2023/1791 Article 12 scope: DCs above 500 kW IT load. Irish competent authority: SEAI. Reporting deadline: 15 May annually."},
  {level:6,id:"Q004-17",icon:"📋",stage:"logic",q:"A DC submits PUE from nameplate IT ratings instead of metered data. Why is this problematic?",options:["Nameplate ratings are accurate","Server nameplate ratings are typically 30–50% above actual draw. PUE calculated from nameplate appears better than reality. EED Delegated Regulation 2024/1364 requires metered PIT.","Nameplate is more conservative","EED accepts estimated data"],correct:1,explain:"Nameplate overestimates IT load, which underestimates PUE (makes it look better). EED requires metered data per Delegated Regulation 2024/1364 Article 4."},
  {level:6,id:"Q004-18",icon:"📋",stage:"rhetoric",q:"A DC has been in EED scope since 2024 but has made no submission. SEAI contacts them. What is the best response?",options:["Ignore the letter","Wait for the penalty notice","Hire a lawyer","Respond immediately: acknowledge scope, submit provisional PUE from available data with stated uncertainty, provide a metering improvement plan with committed dates and budget. Proactive engagement with a remediation plan is treated more favourably than non-response."],correct:3,explain:"SEAI is currently in enforcement ramp-up. Good-faith engagement with a concrete remediation plan avoids penalties. Non-response triggers enforcement."},
  {level:7,id:"Q004-19",icon:"🌡️",stage:"grammar",q:"What is the allowable inlet temperature range for ASHRAE A2 class servers?",options:["10–35°C allowable, with 15–25°C recommended","15–20°C","18–27°C","5–45°C"],correct:0,explain:"ASHRAE A2: 10–35°C allowable, 15–25°C recommended. This is the most common modern server class. Source: ASHRAE TC 9.9 2021 Table 1."},
  {level:7,id:"Q004-20",icon:"🌡️",stage:"logic",q:"A DC runs at 18°C supply for a mixed estate of 95% A2 and 5% A1 servers. What is the efficiency impact?",options:["No impact — 18°C is optimal","A1 and A2 require the same temperature","18°C is the minimum for all servers","The entire facility is cooled to the most restrictive equipment class. 95% of racks could accept 22–24°C, saving approximately €60K–120K/year in cooling energy. Zone the A1 equipment separately."],correct:3,explain:"Zoning separates the 5% A1 constraint from the 95% A2 opportunity. Each 1°C rise saves 2–4% cooling energy. Source: ASHRAE TC 9.9 Best Practices."},
  {level:7,id:"Q004-21",icon:"🌡️",stage:"rhetoric",q:"An operator is nervous about raising supply temperature from 18°C to 24°C. How do you reassure them?",options:["Do not raise it — risk is too high","Modern A2 servers are rated to 35°C allowable inlet. 24°C is well within the recommended range. Implement the change in 1°C increments over 4–6 weeks with continuous BMS monitoring. Any hotspot identified can be addressed per-rack without reverting the entire setpoint.","Only raise by 1°C maximum","Wait for server manufacturer approval"],correct:1,explain:"Gradual implementation with monitoring mitigates risk. 24°C is conservatively within A2 range. The approach — incremental with monitoring — is industry best practice."},
  {level:8,id:"Q004-22",icon:"💰",stage:"grammar",q:"What is the maximum annual SEAI BEUS grant for commercial cooling measures?",options:["€30,000","€80,000","€120,000 per applicant per year","€250,000"],correct:2,explain:"SEAI Better Energy for Business (BEUS) 2024: maximum grant per applicant per year is €120,000. Cooling upgrades including free cooling are eligible."},
  {level:8,id:"Q004-23",icon:"💰",stage:"logic",q:"A board defers a €800K cooling investment. Mark proposes phasing: Phase 1 at €45K. Why is this approach more likely to succeed?",options:["Smaller numbers are always easier","Phase 1 (metering + setpoints at €45K) can be approved under operational budget without board approval. It delivers €155K/yr saving — proving the concept. Phase 2 approval then uses measured results, not projections.","Phase 1 is all that is needed","The board should approve the full amount"],correct:1,explain:"Phased investment reduces approval barriers and proves ROI before committing to major capex. Phase 1 results create the evidence base for Phase 2+3 approval."},
  {level:8,id:"Q004-24",icon:"💰",stage:"rhetoric",q:"An investor asks for the 10-year NPV of the cooling programme. The answer is €4.9M at 8% discount rate on €875K investment. What does this mean in plain terms?",options:["For every €1 invested in the cooling programme, the facility receives approximately €5.60 in present-value returns over 10 years. The investment pays for itself in 12 months and generates €850K+/year thereafter.","The investment loses money","NPV is only relevant for financial analysts","The returns are speculative"],correct:0,explain:"NPV of €4.9M on €875K investment = 5.6× return. Simple payback: 12 months. Annual saving: €850K+. This is an exceptional investment return by any commercial property standard."},
  {level:9,id:"Q004-25",icon:"🏗️",stage:"grammar",q:"What is the approximate thermal buffer time for a 6 kW/rack DC with open floor cooling if all cooling stops?",options:["<2 minutes","15–20 minutes","4–6 minutes","1 hour"],correct:2,explain:"At 6 kW/rack with open floor, thermal buffer to ASHRAE alarm temperature is approximately 4–6 minutes. Higher density or containment reduces this further. Source: ASHRAE TC 9.9 Thermal Buffer Analysis."},
  {level:9,id:"Q004-26",icon:"🏗️",stage:"logic",q:"A cooling retrofit MOP assumes 30 minutes of cooling interruption. Thermal buffer is 5 minutes. What must change?",options:["Nothing — thermal mass covers the gap","Extend the MOP to 2 hours","Cancel the retrofit","The MOP must either provide temporary cooling for the 25-minute gap, reduce the interruption to under 5 minutes, or schedule the work during a planned IT load reduction. A 30-minute interruption with 5-minute thermal buffer will cause thermal alarms and potential equipment damage."],correct:3,explain:"Thermal buffer is a hard constraint. Any cooling interruption exceeding the buffer requires temporary cooling or load reduction. The MOP must account for this."},
  {level:9,id:"Q004-27",icon:"🏗️",stage:"rhetoric",q:"A contractor says MOPs are unnecessary paperwork that delays the project. How do you respond?",options:["Agree — experienced contractors do not need MOPs","MOPs for live DC work are not paperwork — they are the safety system. A cooling retrofit without a MOP is an uncontrolled experiment on €10M+ of IT equipment. Insurance may exclude claims for damage during undocumented modifications.","MOPs are only for new builds","Only the consultant needs to see the MOP"],correct:1,explain:"MOPs protect the facility, the contractor, and the operator. Without them, any incident during retrofit is uncontrolled and potentially uninsurable."}
];

const GLOSSARY_004 = [
  {term:"Adiabatic Cooling",def:"Pre-cools air entering a dry cooler by evaporating water. Trades modest water consumption for large electricity savings — extends free cooling from 82% to ~97% of Dublin hours."},
  {term:"Annualised Energy Cost",def:"Facility Load × 8,760 hrs × €/kWh. The number that makes the business case for PUE improvement."},
  {term:"ASHRAE TC 9.9",def:"ASHRAE Technical Committee 9.9 — sets thermal guidelines for data processing environments, including inlet temperature classes A1–A4."},
  {term:"ASHRAE Thermal Envelope",def:"Allowable server inlet temperature range by class. A1: 15–32°C. A2: 10–35°C. Wider envelope = more free cooling hours."},
  {term:"Blanking Panels",def:"Filler panels in unused rack positions. €2–5 per panel. Prevents hot exhaust recirculation — the best ROI item in any data hall."},
  {term:"BMS (Building Management System)",def:"Central control system coordinating setpoints, staging, and free cooling transitions. Only as good as its last optimisation."},
  {term:"Containment",def:"Physical barriers separating hot and cold airstreams. Eliminates bypass air. €300–500/rack. Payback under 12 months. Foundation for every other improvement."},
  {term:"Cooling Tower (Wet)",def:"Evaporative heat rejection. Efficient but consumes water and requires Legionella management under HSA guidelines."},
  {term:"COP (Coefficient of Performance)",def:"Cooling output ÷ electrical input. COP 4.5 = 4.5 kW cooling per 1 kW electricity. Higher is better."},
  {term:"CRAC",def:"Computer Room Air Conditioner — self-contained with DX compressor and refrigerant. Independent but less efficient at scale than CRAHs."},
  {term:"CRAH",def:"Computer Room Air Handler — fan unit with chilled water coil. More efficient at scale but dependent on central chiller plant."},
  {term:"Delta-T Optimisation",def:"Increasing CHW supply-return temperature differential reduces pump energy. Legacy 5–7°C → optimised 10–12°C."},
  {term:"Dry Cooler",def:"Air-to-water heat exchanger. Zero water consumption, zero Legionella risk. WUE = 0.0 L/kWh."},
  {term:"EED Article 12",def:"EU Energy Efficiency Directive reporting requirement for DCs above 500 kW IT load. Annual submission to SEAI."},
  {term:"EU Taxonomy PUE Threshold",def:"PUE ≤ 1.3 (annualised, metered) required for Taxonomy-aligned classification. Necessary but not sufficient."},
  {term:"F-Gas Regulation",def:"EU 2024/573 — phases down high-GWP refrigerants. R410A (GWP 2,088) increasingly restricted; CRAHs avoid this exposure."},
  {term:"Free Cooling Hours",def:"Annual hours when ambient conditions allow cooling without mechanical refrigeration. Dublin: ~7,200 hrs/yr (82%)."},
  {term:"Heat Flux",def:"Rate of heat transfer per unit area (kW/m²). Determines whether air or liquid cooling is required."},
  {term:"IT Load (PIT)",def:"Power consumed by all IT equipment. The denominator in PUE. Must be metered, not estimated from nameplate."},
  {term:"Legionella Risk",def:"Cooling towers create aerosol that can harbour Legionella. HSA requires quarterly testing, risk assessment, and documented management programme."},
  {term:"Method of Procedure (MOP)",def:"Documented step-by-step plan for every modification in a live DC. Includes thermal risk assessment, rollback criteria, and emergency response."},
  {term:"NPV (Net Present Value)",def:"Total value of investment today, accounting for time value of money. Positive NPV = investment returns more than required rate."},
  {term:"Phased Investment",def:"Sequence capital so early wins fund later phases. Phase 1 proves the saving before the board approves Phase 2."},
  {term:"PUE (Power Usage Effectiveness)",def:"Total facility power ÷ IT load power. Target: ≤1.3. World-class: <1.1. The universal DC efficiency metric."},
  {term:"R410A",def:"Common CRAC refrigerant. GWP 2,088. Subject to EU F-Gas phase-down — service costs rising, supply increasingly restricted."},
  {term:"SEAI BEUS Grant",def:"Better Energy for Business scheme. Up to €120K/year per applicant for commercial energy efficiency measures including cooling."},
  {term:"Setpoint Optimisation",def:"Adjusting supply air temperature based on equipment thermal class. Each 1°C rise saves 2–4% cooling energy. Zero capex."},
  {term:"Staged Retrofit",def:"Building new plant alongside old, commissioning, then transferring load. 20–40% cost premium over greenfield but zero planned downtime."},
  {term:"Supply Air Temperature",def:"Temperature delivered to cold aisle. Most facilities overcool at 18°C when ASHRAE allows 27°C (A1) or 35°C (A2)."},
  {term:"Thermal Buffer",def:"Time from cooling loss to ASHRAE alarm temperature. At 6 kW/rack open floor: 4–6 minutes. With containment: 8–12 minutes."},
  {term:"VSD (Variable Speed Drive)",def:"Controls motor speed by varying supply frequency. Fan power follows cube law — 50% speed = 12.5% power."},
  {term:"WUE (Water Usage Effectiveness)",def:"Annual water use (litres) ÷ IT energy (kWh). Dry coolers achieve WUE 0.0. Cooling towers: 1.0–2.0 L/kWh."}
];

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError) return React.createElement('div',{style:{maxWidth:700,margin:'60px auto',padding:24,border:'2px solid #dc2626',borderRadius:12,background:'#fef2f2',fontFamily:'system-ui'}},
      React.createElement('h2',{style:{color:'#dc2626'}},'⚠️ Runtime Error'),
      React.createElement('p',null,'DC-LEARN-004 v6.0.6 · Energy Efficiency & PUE'),
      React.createElement('pre',{style:{fontSize:12,background:'#1f2937',color:'#f87171',padding:12,borderRadius:8,overflow:'auto',whiteSpace:'pre-wrap'}},String(this.state.error)),
      React.createElement('p',{style:{color:'#6b7280',fontSize:13,marginTop:8}},'Copy this error and send to LM.')
    );
    return this.props.children;
  }
}

// AssistBar — Clarify only (Grammar), no Read Aloud
// Read Aloud REMOVED per 011 template
function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

const hasTextSelection = () => { const sel = window.getSelection(); return sel && sel.toString().length > 0; };

function Dot({done,stage}){
  const colors={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  return <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:done?colors[stage]:'var(--border)',border:'1px solid '+(done?colors[stage]:'var(--border-light)'),marginRight:4}} />;
}

function GrammarPanel({level,onComplete,done}){
  const [expandedFact,setExpandedFact]=useState(null);
  const [checkedItems,setCheckedItems]=useState({});
  const toggleFact=(i)=>{ if(!hasTextSelection()) setExpandedFact(expandedFact===i?null:i); };
  const toggleCheck=(i)=>setCheckedItems(prev=>({...prev,[i]:!prev[i]}));
  return (
    <div className="fade-in">
      <h3 style={{color:'var(--grammar)',fontSize:16,fontWeight:600,marginBottom:12}}>📖 Grammar — What Is It?</h3>
      {level.grammar.facts.map((f,i)=>(
        <div key={i} className="fact-card" role="button" tabIndex={0} aria-expanded={expandedFact===i}
          onClick={()=>toggleFact(i)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleFact(i)}>
          <div className="term">{f.term}</div>
          {expandedFact===i && (
            <div className="fade-in selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} style={{userSelect:'text',cursor:'text'}}>
              <div className="def">{f.definition}</div>
              <div className="detail">{f.plain}</div>
              <div className="detail" style={{fontStyle:'normal'}}>📊 {f.number}</div>
              <div className="std">{f.standard}</div>
              <AssistBar fact={f} stage="grammar" level={level} />
              {(f.soWhat || SO_WHAT_MAP[f.term]) && <div style={{fontStyle:'italic',color:'var(--grammar)',fontSize:13,marginTop:8,lineHeight:1.6}}>{f.soWhat || SO_WHAT_MAP[f.term]}</div>}
            </div>
          )}

      {level.grammar.whatItLooksLike && (

  );

          <label style={{fontSize:12,color:'var(--text-dim)',marginTop:8,display:'block'}}>Number of racks<input className="calc-input" type="number" value={calcRacks} onChange={e=>setCalcRacks(Number(e.target.value))}/></label>

              <div>Overhead: <strong style={{color:'var(--red)'}}>{(calcResult.overhead/1000).toFixed(1)} MW</strong></div>
              <div>Annual cost: <strong>€{(calcResult.annualCost/1000000).toFixed(2)}M</strong></div>
              <div>Saving to PUE {CLONSHAUGH.targetPUE}: <strong style={{color:'var(--green)'}}>€{(calcResult.saving/1000000).toFixed(2)}M/yr</strong></div>
              <div>CO₂ overhead: <strong>{calcResult.carbon.toFixed(0)} tCO₂/yr</strong></div>
              <div>EU Taxonomy: <span className={calcResult.taxonomy?'badge badge-pass':'badge badge-fail'}>{calcResult.taxonomy?'ALIGNED':'NOT ALIGNED'}</span></div>

            The calculator converts your rack density and PUE into annual energy cost and carbon. <span style={{color:'var(--green)',fontWeight:600}}>Green</span> values show the saving achievable by reaching the target PUE. <span style={{color:'var(--red)',fontWeight:600}}>Red</span> values show current overhead — the gap between your facility load and your IT load. EU Taxonomy alignment requires PUE ≤ 1.3 (annualised, metered).
          </div>
        </div>
        <div className="sidebar-card">
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--text-bright)',marginBottom:4}}>🏢 Facility Profile</h3>
          <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Clonshaugh Reference Facility (2013)</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:2}}>

            <div>Built: <strong>2013 (Colocation)</strong></div>
            <div>Racks: <strong>{CLONSHAUGH.racks}</strong></div>
            <div>Current density: <strong>{CLONSHAUGH.currentKW} kW/rack</strong></div>
            <div>Target density: <strong style={{color:'var(--amber)'}}>{CLONSHAUGH.targetKW} kW/rack</strong></div>
            <div>Cooling: <strong>Perimeter CRAH</strong></div>
            <div>Free Cooling: <strong>Not installed</strong></div>
            <div>Current PUE: <strong>{CLONSHAUGH.currentPUE}</strong></div>
            <div>Target PUE: <strong style={{color:'var(--amber)'}}>{CLONSHAUGH.targetPUE}</strong></div>
          </div>
        </div>
        <div className="sidebar-card">
          <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:8}}>📐 Methodology</h3>
          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
            <strong>Trivium Method:</strong> Grammar (definitions) → Logic (cause/effect) → Rhetoric (stakeholder perspectives).
            <br/><strong>Feynman Clarify:</strong> Every fact has three layers — analogy (no jargon), first principles (from universal knowledge), and a test (can you answer this?).
            <br/><strong>Weakest Link:</strong> Each level identifies the most common misconception and the corrective path.
            <br/><strong>Five Personas:</strong> Same finding → five different professional perspectives (Declan, Ann, Mark, Sarah, Tom).
          </div>
        </div>
      </div>
    </div>
    </div>
  );
}

function LearnTab({selectedLevel,setSelectedLevel,progress,setProgress}){
  const [stage,setStage]=useState('grammar');
  const lvl = LEVELS[selectedLevel];
  const p = progress[lvl.id]||{};
  const handleComplete = (s) => { setProgress(prev=>({...prev,[lvl.id]:{...prev[lvl.id],[s]:true}})); };
  const stageClass = (s) => { const active=stage===s; const done=p[s]; if(active) return 'triv-btn active-'+s; if(done) return 'triv-btn done-'+s; return 'triv-btn'; };

  return (
    <div>
        {lvl.clockQuote && (
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderLeft:"4px solid var(--lbe-green)",borderRadius:8,padding:"16px 20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--lbe-green)",marginBottom:8,fontFamily:"var(--font-mono)",letterSpacing:1}}>FROM THE DATA CENTRE CLOCK</div>
        <div style={{fontSize:14,fontStyle:"italic",color:"var(--text-bright)",lineHeight:1.6,marginBottom:8}}>"{lvl.clockQuote}"</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>\u2014 Level {lvl.level}: {lvl.name}</div>
      </div>
    )}
      <div className="level-nav">
        {LEVELS.map((l,i)=>(<button key={l.id} className={'level-btn'+(selectedLevel===i?' active':'')} onClick={()=>{setSelectedLevel(i);setStage('grammar');}}>L{l.level}</button>))}
      </div>
      <div className="card selectable-text">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <span style={{fontSize:32}}>{lvl.icon}</span>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Level {lvl.level}: {lvl.name}</h2><div style={{fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{lvl.component}</div></div>
        </div>
        <p style={{fontSize:12,color:'var(--green)',fontStyle:'italic',margin:'8px 0'}}>User Need: {lvl.userNeed}</p>
        <p style={{fontSize:13,color:'var(--text-dim)',marginBottom:16}}>{lvl.plainEnglish}</p>
        <div className="trivium-tabs">
          <button className={stageClass('grammar')} onClick={()=>setStage('grammar')}>{p.grammar?'✓ ':''}Grammar</button>
          <button className={stageClass('logic')} onClick={()=>setStage('logic')}>{p.logic?'✓ ':''}Logic</button>
          <button className={stageClass('rhetoric')} onClick={()=>setStage('rhetoric')}>{p.rhetoric?'✓ ':''}Rhetoric</button>
        </div>
        {stage==='grammar' && <GrammarPanel level={lvl} onComplete={()=>handleComplete('grammar')} done={p.grammar}/>}
        {stage==='logic' && <LogicPanel level={lvl} onComplete={()=>handleComplete('logic')} done={p.logic}/>}
        {stage==='rhetoric' && <RhetoricPanel level={lvl} onComplete={()=>handleComplete('rhetoric')} done={p.rhetoric}/>}
      </div>
      {lvl.sourceNote && (<div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',marginTop:8}}>Source: {lvl.sourceNote}</div>)}
      <div style={{marginTop:20}}>
        <GlossaryBibToggle/>
      </div>
    </div>
  );
}

function FieldChallengesTab(){
  const [filterLevel,setFilterLevel]=useState(0);
  const [revealed,setRevealed]=useState({});
  const filtered = filterLevel===0 ? LEVELS : LEVELS.filter(l=>l.level===filterLevel);
  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--amber)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6}}>Fictional reference facility — Clonshaugh, Dublin. These field challenges are based on engineering scenarios encountered in Irish DC retrofit programmes. Apply the knowledge from the Learn tab to solve real-world problems.</div>
      </div>
      <div className="filter-row">
        <button className={'filter-btn'+(filterLevel===0?' active':'')} onClick={()=>setFilterLevel(0)}>All Levels</button>

      </div>
      {filtered.map(lvl=>(
        <div key={lvl.id} className="challenge-card selectable-text" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>{lvl.icon} Level {lvl.level}: {lvl.name}</div>
          <h3 style={{fontSize:15,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>{lvl.scenario.title}</h3>
          <div className="fc-situation" style={{marginBottom:12}}>
            <div className="fc-label">Situation</div>
            <p style={{fontSize:13,color:'var(--text)',lineHeight:1.8,margin:0}}>{lvl.scenario.narrative}</p>
          </div>

}

function VGWalkthrough({title, subtitle, steps, insight, narrative, takeaway, children}) {

              color:step===i?'var(--green)':'var(--text-dim)',fontWeight:step===i?600:400}}>
            {i+1}. {s}

}

/* ═══ VG2. L1 — PUE ENERGY WATERFALL ═══ */
function VGL1Diagram() {
  return (
    <VGWalkthrough
      title="L1: Where does the electricity go?"
      subtitle="3,600 kW enters from ESB. Only 2,400 kW reaches the servers. Where are the 1,200 kW losses?"
      steps={["Current: PUE 1.50","Target: PUE 1.20"]}
      insight="The overhead drops from 1,200 kW to 480 kW — a saving of 720 kW continuous. At €0.12/kWh that is €757K/year. The biggest single lever is cooling (containment + free cooling optimisation)."
      narrative="This waterfall shows where every kilowatt goes in Clonshaugh. The full bar is what ESB bills you for. The green section is IT — the useful work. Everything else is overhead: cooling, UPS losses, lighting, and other services. Step through to compare the current PUE 1.50 (33% overhead) with the target PUE 1.20 (17% overhead)."
      takeaway="At PUE 1.50, one-third of your electricity bill is overhead. Reducing to PUE 1.20 saves 720 kW continuous — €757K/year at Clonshaugh.">
      {(step) => {
        const it = 2400;
        const pue = step === 0 ? 1.50 : 1.20;
        const total = Math.round(it * pue);
        const cool = step === 0 ? 840 : 288;
        const ups = step === 0 ? 180 : 96;
        const other = total - it - cool - ups;
        const maxW = 500;
        const scale = maxW / 3600;
        const bx = 90;
        const bw = Math.round(total * scale);

        const segments = [
          {label:"IT Load",val:it,col:"#16a34a"},
          {label:"Cooling",val:cool,col:"#2563EB"},
          {label:"UPS losses",val:ups,col:"#d97706"},
          {label:"Other",val:other > 0 ? other : 0,col:"#6b7280"},
        ];

        let cx = bx;
        return (
          <svg viewBox="0 0 680 300" style={{display:'block',margin:'0 auto',maxWidth:680}}>
            <VG_AD/>
            <text style={{font:'600 13px var(--font-sans)',fill:'var(--text-bright)'}} x="340" y="20" textAnchor="middle">
              {step === 0 ? "Current: PUE 1.50 — 3,600 kW from ESB" : "Target: PUE 1.20 — 2,880 kW from ESB"}
            </text>

            {/* Stacked horizontal bar */}
            {segments.map((seg,i) => {
              const w = Math.round(seg.val * scale);
              const x = cx;
              cx += w;
              return (
                <g key={i}>
                  <rect x={x} y="50" width={w} height="60" fill={seg.col} fillOpacity="0.2" stroke={seg.col} strokeWidth="0.8"/>
                  {w > 40 && (
                    <g>
                      <text style={{font:'600 11px var(--font-sans)',fill:'var(--text-bright)'}} x={x + w/2} y="72" textAnchor="middle">{seg.label}</text>
                      <text style={{font:'500 10px var(--font-mono)',fill:seg.col}} x={x + w/2} y="92" textAnchor="middle">{seg.val} kW</text>
                    </g>
                  )}
                </g>
              );
            })}

            {/* Overhead bracket */}
            <line x1={bx + Math.round(it * scale)} y1="120" x2={bx + bw} y2="120" stroke="var(--error)" strokeWidth="1.5"/>
            <text style={{font:'500 11px var(--font-sans)'}} fill="var(--error)"
              x={(bx + Math.round(it * scale) + bx + bw) / 2} y="140" textAnchor="middle">
              Overhead: {total - it} kW ({Math.round((1 - 1/pue) * 100)}%)
            </text>

            {/* Left margin — PUE */}
            <text style={{font:'600 14px var(--font-mono)'}} fill={step === 0 ? 'var(--error)' : 'var(--success)'}
              x="50" y="76" textAnchor="middle">{pue.toFixed(2)}</text>
            <text style={{font:'400 10px var(--font-sans)',fill:'var(--text-dim)'}} x="50" y="92" textAnchor="middle">PUE</text>

            {/* Annual cost */}
            <rect x="130" y="170" width="420" height="36" rx="6" fill="var(--panel)" stroke="var(--border)" strokeWidth="0.5"/>
            <text style={{font:'500 11px var(--font-sans)',fill:'var(--text-bright)'}} x="340" y="185" textAnchor="middle">
              Annual electricity: {total} kW × 8,760 hrs × €0.12 = €{(total * 8760 * 0.12 / 1000000).toFixed(2)}M
            </text>
            <text style={{font:'400 10px var(--font-sans)',fill:'var(--text-dim)'}} x="340" y="200" textAnchor="middle">
              Overhead cost: {total - it} kW × 8,760 × €0.12 = €{((total - it) * 8760 * 0.12 / 1000).toFixed(0)}K/yr
            </text>

            {/* EU Taxonomy line */}
            {step === 0 && (
              <g>
                <line x1={bx + Math.round(it * 1.3 * scale)} y1="44" x2={bx + Math.round(it * 1.3 * scale)} y2="116"
                  stroke="var(--warn)" strokeWidth="1" strokeDasharray="4 3"/>
                <text style={{font:'500 9px var(--font-sans)'}} fill="var(--warn)"
                  x={bx + Math.round(it * 1.3 * scale)} y="40" textAnchor="middle">EU Taxonomy ≤1.3</text>
              </g>
            )}

            {/* Saving comparison at step 2 */}
            {step === 1 && (
              <g className="fade-in">
                <rect x="170" y="230" width="340" height="36" rx="6"
                  fill="var(--green-dim)" stroke="var(--success)" strokeWidth="0.5"/>
                <text style={{font:'600 11px var(--font-sans)'}} fill="var(--success)" x="340" y="248" textAnchor="middle">
                  Saving vs PUE 1.50: 720 kW continuous = €757K/year
                </text>
                <text style={{font:'400 10px var(--font-sans)'}} fill="var(--success)" x="340" y="262" textAnchor="middle">
                  Carbon reduction: 720 × 8,760 × 0.2241 = 1,413 tCO₂/yr
                </text>
              </g>
            )}
          </svg>
        );
      }}
    </VGWalkthrough>
  );
}

/* ═══ VG4. L7 — ASHRAE THERMAL ENVELOPES ═══ */
function VGL7Diagram() {
  return (
    <VGWalkthrough
      title="L7: ASHRAE thermal envelopes — how much heat can you tolerate?"
      subtitle="Higher inlet temperature = more free cooling hours = lower PUE"
      steps={["A1 — conservative","A2 — recommended","A3/A4 — extended"]}
      insight="Moving from A1 (max 27°C) to A2 (max 35°C) allows free cooling onset at 19°C instead of 15°C — gaining approximately 1,000 additional free cooling hours per year in Dublin. Each additional hour replaces one chiller hour."
      narrative="ASHRAE defines four thermal envelope classes (A1–A4) that specify the allowable server inlet temperature range. A1 is the most conservative (15–32°C). A4 is the most permissive (5–45°C). The wider you go, the more hours per year you can use free cooling instead of running the chiller. Most modern servers are rated A2 or above."
      takeaway="Each 1°C increase in allowable inlet temperature adds roughly 200–400 free cooling hours/year in Dublin. A2 is the sweet spot for most facilities — widest envelope with mainstream server support.">
      {(step) => {
        const bands = [
          {name:"A1",min:15,max:32,onset:15,hours:5800,col:"#2563EB",note:"Conservative. Most restrictive."},
          {name:"A2",min:10,max:35,onset:19,hours:7200,col:"#16a34a",note:"Recommended. Best trade-off."},
          {name:"A3",min:5,max:40,onset:24,hours:8000,col:"#d97706",note:"Extended. Higher risk tolerance."},
          {name:"A4",min:5,max:45,onset:28,hours:8400,col:"#dc2626",note:"Maximum. Specialised equipment."},
        ];
        const yBase = 80;
        const tempScale = 8;
        const xBase = 120;

        return (
          <svg viewBox="0 0 680 380" style={{display:'block',margin:'0 auto',maxWidth:680}}>
            <VG_AD/>
            <text style={{font:'600 13px var(--font-sans)',fill:'var(--text-bright)'}} x="340" y="20" textAnchor="middle">
              ASHRAE server inlet temperature envelopes
            </text>
            <text style={{font:'400 11px var(--font-sans)',fill:'var(--text-dim)'}} x="340" y="36" textAnchor="middle">
              Wider envelope = more free cooling hours = lower electricity cost
            </text>

            {/* Temperature axis labels */}
            {[0,5,10,15,20,25,30,35,40,45].map(t => (
              <g key={t}>
                <text style={{font:'400 9px var(--font-mono)',fill:'var(--text-muted)'}}
                  x={xBase + t * tempScale} y="56" textAnchor="middle">{t}°C</text>
                <line x1={xBase + t * tempScale} y1="60" x2={xBase + t * tempScale} y2="240"
                  stroke="var(--border)" strokeWidth="0.3"/>
              </g>
            ))}

            {/* Band bars */}
            {bands.map((b,i) => {
              const y = yBase + i * 42;
              const x1 = xBase + b.min * tempScale;
              const w = (b.max - b.min) * tempScale;
              const active = (step === 0 && i === 0) || (step === 1 && i <= 1) || (step >= 2);

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}
