          {assessData&&assessData.score&&assessData.score.total>=ASSESSMENT_QUESTIONS.length && (
            <div style={{fontSize:13,color:'var(--text-dim)',marginTop:8}}>
              Assessment: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%) in {fmtTime(assessData.elapsed)}
            </div>
          )}
          {totalTime>0 && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Total time invested: {fmtT(totalTime)}</div>}
        </div>
      )}
      <div className="card"><h2>Overall Progress</h2><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{complete}/{total} stages complete ({pct}%)</div><div className="progress-bar" style={{height:12}}><div className="fill fill-green" style={{width:pct+'%'}}></div></div></div>
      {assessData&&assessData.score&&assessData.score.total>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:8}}>Assessment Results</h2>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Score: {assessData.score.correct}/{assessData.score.total} ({Math.round(assessData.score.correct/assessData.score.total*100)}%)</div>
          <div className="progress-bar" style={{height:8,marginBottom:10}}><div className="fill fill-green" style={{width:Math.round(assessData.score.correct/assessData.score.total*100)+'%'}}></div></div>
          {assessData.elapsed>0 && <div style={{fontSize:12,fontFamily:'var(--font-mono)',color:assessData.elapsed<=900?'var(--grammar)':'var(--red)',marginBottom:8}}>{assessData.elapsed<=900?'Completed in '+fmtTime(assessData.elapsed)+' (under time)':'Completed in '+fmtTime(assessData.elapsed)+' ('+fmtTime(assessData.elapsed-900)+' over)'}</div>}
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {['grammar','logic','rhetoric'].map(st=>{
              const s=assessStageScore(st);
              return s && (
                <div key={st} style={{fontSize:12,color:stageColours[st]}}>
                  <strong>{stageLabels[st]}:</strong> {s.c}/{s.t}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {LEVELS.map(lvl=>{const p=progress[lvl.id]||{};return (
        <div key={lvl.id} className="card" style={{padding:16}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20}}>{lvl.icon}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>Level {lvl.level}: {lvl.name}</div><div style={{display:'flex',gap:8,marginTop:6}}><Dot done={p.grammar} stage="grammar"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Grammar</span><Dot done={p.logic} stage="logic"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Logic</span><Dot done={p.rhetoric} stage="rhetoric"/><span style={{fontSize:11,color:'var(--text-muted)'}}>Rhetoric</span></div></div></div></div>
      );})}
      {tabTimes && totalTime>0 && (
        <div className="card" style={{marginTop:16}}>
          <h2 style={{marginBottom:4}}>Session Insights</h2>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Time spent per tab across sessions. For continuous improvement — not visible to other users.</div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:12}}>Total time: {fmtT(totalTime)}</div>
          {Object.keys(tabLabels).map(k=>{
            const t=tabTimes[k]||0;
            const w=Math.round(t/maxTime*100);
            return (
              <div key={k} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                  <span style={{color:'var(--text-dim)'}}>{tabLabels[k]}</span>
                  <span style={{fontFamily:'var(--font-mono)',color:t>0?'var(--text-bright)':'var(--text-muted)'}}>{fmtT(t)}</span>
                </div>
                <div className="progress-bar" style={{height:6}}><div className="fill fill-green" style={{width:w+'%',transition:'width 0.3s'}}></div></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GlossaryBibToggle(){
  const [show,setShow]=useState(null);
  return (
    <div style={{display:'flex',gap:8,flexDirection:'column'}}>
      <div style={{display:'flex',gap:8}}>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='glossary'?'var(--green-dim)':'var(--surface)',color:show==='glossary'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='glossary'?null:'glossary')}>
          {show==='glossary'?'▾':'▸'} Glossary ({GLOSSARY_004.length} terms)
        </button>
        <button style={{flex:1,padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,background:show==='bib'?'var(--green-dim)':'var(--surface)',color:show==='bib'?'var(--green)':'var(--text-dim)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)'}} onClick={()=>setShow(show==='bib'?null:'bib')}>
          {show==='bib'?'▾':'▸'} Bibliography ({BIBLIOGRAPHY_004.length} sources)
        </button>
      </div>
      {show==='glossary' && <div className="card fade-in"><GlossaryPanel/></div>}
      {show==='bib' && <div className="card fade-in"><BibliographyPanel/></div>}
    </div>
  );
}

function GlossaryPanel(){
  const [search,setSearch]=useState('');
  const filtered=GLOSSARY_004.filter(g=>!search||g.term.toLowerCase().includes(search.toLowerCase())||g.def.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search terms..." style={{width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:8,background:'var(--surface)',color:'var(--text)',fontSize:13,fontFamily:'var(--font-sans)',marginBottom:12,boxSizing:'border-box'}}/>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>{filtered.length} of {GLOSSARY_004.length} terms</div>
      {filtered.map((g,i)=>(
        <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{g.term}</div>
          <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6,marginTop:2}}>{g.def}</div>
        </div>
      ))}
    </div>
  );
}

function BibliographyPanel(){
  return (
    <div>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Sources referenced in this module. Tier 1 = published standard or regulatory instrument. Tier 2 = industry benchmark or guidance document.</div>
      {BIBLIOGRAPHY_004.map((b,i)=>(
        <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:8,alignItems:'baseline'}}>
            <span className={'badge badge-'+(b.tier==='T1'?'pass':'logic')} style={{fontSize:10}}>{b.tier}</span>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{b.title}</div>
          </div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginTop:3,lineHeight:1.6}}>
            <span style={{fontFamily:'var(--font-mono)'}}>{b.year}</span> — {b.usage}
          </div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [activeTab,setActiveTab]=useState('chain');
  const [selectedLevel,setSelectedLevel]=useState(0);
  const [progress,setProgress]=useState(()=>{try{const s=safeStore.get('dc004_progress');return s?JSON.parse(s):{};}catch(e){return{};}});
  React.useEffect(()=>{try{safeStore.set('dc004_progress',JSON.stringify(progress));}catch(e){}},[progress]);
  const [theme,setTheme]=useState('dark');
  const [tabTimes,setTabTimes]=useState(()=>{try{const s=safeStore.get('dc004_tabTimes');return s?JSON.parse(s):{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}catch(e){return{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}});
  const tabStartRef=React.useRef(Date.now());
  const prevTabRef=React.useRef('chain');
  React.useEffect(()=>{
    const now=Date.now();
    const prev=prevTabRef.current;
    const dt=Math.floor((now-tabStartRef.current)/1000);
    if(dt>0){setTabTimes(prev2=>({...prev2,[prev]:prev2[prev]+dt}));}
    tabStartRef.current=now;
    prevTabRef.current=activeTab;
  },[activeTab]);
  React.useEffect(()=>{try{safeStore.set('dc004_tabTimes',JSON.stringify(tabTimes));}catch(e){}},[tabTimes]);
  const toggleTheme = () => { const next=theme==='dark'?'light':'dark'; setTheme(next); document.documentElement.setAttribute('data-theme',next); };
  const tabs = [{id:'chain',label:'Energy Efficiency'},{id:'learn',label:'Learn'},{id:'visual',label:'Visual Guide'},{id:'challenges',label:'Field Challenges'},{id:'assessment',label:'Assessment'},{id:'progress',label:'Progress'}];

  return (
    <div>
      <div id="lbe-audience-bar" className="no-print" style={{background:'linear-gradient(135deg,#1a1a1a,#2a2a2a)',padding:'8px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>AUDIENCE: Data Centre Professionals — Operators, Engineers, Fund Managers, ESG Analysts, Cost Managers</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>DC LEARNING SERIES</span>
      </div>
      <header>
        <img src={LOGO_SRC} alt="LBE Logo" style={{borderRadius:'50%',overflow:'hidden'}} />
        <div><h1>Energy Efficiency & PUE</h1><div className="sub">{TOOL_ID} v{TOOL_VERSION} · DC Learning Series · Legacy Business Engineers Ltd</div><div className="sub" style={{marginTop:4,fontSize:11,opacity:0.7}}>Fictional reference facility — 9 levels from raw PUE to Taxonomy alignment</div></div>
        <button className="theme-toggle" onClick={toggleTheme}>{theme==='dark'?'☀️ Light':'🌙 Dark'}</button>
      </header>
      <div className="main">
        <div className="tab-row no-print" role="tablist">
          {tabs.map(t=>(<button key={t.id} className={'tab-btn'+(activeTab===t.id?' active':'')} role="tab" aria-selected={activeTab===t.id} onClick={()=>setActiveTab(t.id)}>{t.label}</button>))}
        </div>
        {activeTab==='chain' && <ChainTab setActiveTab={setActiveTab} setSelectedLevel={setSelectedLevel} progress={progress}/>}
        {activeTab==='learn' && <LearnTab selectedLevel={selectedLevel} setSelectedLevel={setSelectedLevel} progress={progress} setProgress={setProgress}/>}
        {activeTab==='visual'&&<VisualGuideTab/>}
      {activeTab==='challenges' && <FieldChallengesTab/>}
        {activeTab==='assessment' && <AssessmentTab/>}
        {activeTab==='progress' && <ProgressTab progress={progress} tabTimes={tabTimes}/>}
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',margin:'0 auto',maxWidth:1100,padding:'0 20px'}} className="no-print">
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>From learning to practice</div>
          <div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>The real-world version of what this module teaches is a DC Performance Assessment — an independent screening of a facility's cooling chain against CRU, EED, Taxonomy, and EPA requirements. It turns the theory into measured performance data and a prioritised action list.</div>
        </div>
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',display:'flex',flexDirection:'column',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div><div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>Questions or feedback on this content?</div><div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>Technical corrections, suggestions, or industry perspective welcome.</div></div>
          <a href="https://legacybe.ie/contact/" target="_blank" rel="noopener" style={{display:'inline-block',padding:'10px 24px',background:'var(--lbe-green)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600,fontSize:14,marginTop:12,textAlign:'center'}}>Send Us a Message</a>
        </div>
      </div>
      <div className="series-nav no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <a href="./dc-learn-003.html">← DC-LEARN-003: Resilience & Redundancy</a>
        <span style={{color:'var(--text-muted)',fontSize:12}}>Module 4 of 16 · Series Spec v1.4</span>
        <a href="./dc-learn-005.html">DC-LEARN-005: Backup Power →</a>
      </div>
      <div className="nav-footer no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <span>© 2026 Legacy Business Engineers Ltd</span>
        <div><a href="https://legacybe.ie" target="_blank" rel="noopener">legacybe.ie</a><a href="https://legacybe.ie/tools/" target="_blank" rel="noopener">Tools</a><a href="https://legacybe.ie/contact/" target="_blank" rel="noopener">Contact</a><a href="https://legacybe.ie/services/" target="_blank" rel="noopener">Services</a></div>
      </div>
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>, document.getElementById('root'));

</script>
</body>
