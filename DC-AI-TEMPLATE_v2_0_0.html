<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DC-AI Template v2.0 | DC-AI Series | Legacy Business Engineers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--panel:#1c2333;--border:#30363d;--border-light:#484f58;--text:#e6edf3;--text-bright:#f0f6fc;--text-dim:#8b949e;--text-muted:#6e7681;--accent:#5b9bd5;--accent2:#79c0ff;--success:#78a840;--warn:#d4a026;--error:#ef4444;--lbe-green:#4a7c59;--dc-black:#1a1a1a;--green:#78a840;--green-dim:rgba(120,168,64,0.12);--green-glow:rgba(120,168,64,0.25);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--red-glow:rgba(239,68,68,0.3);--amber:#d4a026;--amber-dim:rgba(212,160,38,0.12);--amber-glow:rgba(212,160,38,0.25);--font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',monospace;--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
[data-theme="light"]{--bg:#fdfdfd;--surface:#f6f8fa;--panel:#f0f2f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text-bright:#0a0a0a;--text-dim:#57606a;--text-muted:#8b949e;--accent:#2b6cb0;--accent2:#0550ae;--success:#4a7c59;--warn:#a67c1a;--error:#cf222e;--lbe-green:#2d5a3d;--dc-black:#1a1a1a;--green:#4a7c59;--green-dim:rgba(74,124,89,0.10);--green-glow:rgba(74,124,89,0.20);--red:#dc2626;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.15);--amber:#a67c1a;--amber-dim:rgba(166,124,26,0.08);--amber-glow:rgba(166,124,26,0.15);--grammar:#2563EB;--logic:#d97706;--rhetoric:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 8px 2px var(--green-glow)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 8px 2px var(--red-glow)}}
header{background:var(--dc-black);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:relative}
header img{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
header h1{font-size:22px;font-weight:700;line-height:1.2}
header .sub{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px}
.theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-sans)}
.theme-toggle:hover{background:rgba(255,255,255,.2)}
.main{max-width:1100px;margin:0 auto;padding:28px 20px 16px}
.tab-row{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);white-space:nowrap;transition:all .2s}
.tab-btn:hover{border-color:var(--green);color:var(--text)}
.tab-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.level-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.level-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.level-btn:hover{border-color:var(--green);color:var(--text)}
.level-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.trivium-tabs{display:flex;gap:8px;margin-bottom:16px}
.triv-btn{flex:1;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .2s;text-align:center}
.triv-btn:hover{color:var(--text)}
.triv-btn.active-grammar{background:rgba(91,155,213,.15);border-color:var(--grammar);color:var(--grammar);font-weight:600}
.triv-btn.active-logic{background:rgba(212,160,38,.15);border-color:var(--logic);color:var(--logic);font-weight:600}
.triv-btn.active-rhetoric{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.triv-btn.done-grammar{border-color:var(--grammar);color:var(--grammar);background:transparent}
.triv-btn.done-logic{border-color:var(--logic);color:var(--logic);background:transparent}
.triv-btn.done-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric);background:transparent}
.fact-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--grammar);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.fact-card:hover{border-color:var(--grammar)}
.term{font-weight:600;font-size:14px;color:var(--text-bright)}
.def{font-size:13px;color:var(--text);margin-top:8px;line-height:1.8}
.detail{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.std{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px}
.ce-card{background:var(--panel);border-left:3px solid var(--logic);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:10px}
.cause{font-weight:600;font-size:13px;color:var(--text-bright)}
.effect{font-size:13px;color:var(--text);margin-top:6px;line-height:1.8}
.insight{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.7}
.wl-box{border:1px solid var(--green);border-radius:10px;padding:16px;margin-top:14px;background:var(--green-dim)}
.persona-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.persona-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-sans);transition:all .2s}
.persona-btn.active{background:rgba(167,139,189,.15);border-color:var(--rhetoric);color:var(--rhetoric);font-weight:600}
.persona-msg{font-size:14px;color:var(--text);line-height:1.8;padding:14px 16px;border-left:3px solid var(--rhetoric);background:var(--panel);border-radius:0 10px 10px 0}
.challenge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fc-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.fc-situation .fc-label{background:var(--amber-dim);color:var(--amber)}
.fc-challenge-q .fc-label{background:rgba(91,155,213,0.12);color:var(--accent)}
.fc-fix .fc-label{background:var(--green-dim);color:var(--green)}
.fc-challenge-q{font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:8px}
.fc-fix-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-top:10px}
.assess-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--font-sans);margin-bottom:8px;transition:all .2s}
.assess-option:hover{border-color:var(--accent)}
.assess-option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.assess-option.incorrect{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.assess-feedback{font-size:13px;color:var(--text-dim);margin-top:10px;padding:12px;background:var(--panel);border-radius:8px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
.badge-grammar{background:rgba(91,155,213,.15);color:var(--grammar)}
.badge-logic{background:rgba(212,160,38,.15);color:var(--logic)}
.badge-rhetoric{background:rgba(167,139,189,.15);color:var(--rhetoric)}
.badge-pass{background:var(--green-dim);color:var(--green)}
.badge-fail{background:var(--red-dim);color:var(--red)}
.progress-bar{height:8px;background:var(--panel);border-radius:4px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-grammar{background:var(--grammar)}.fill-logic{background:var(--logic)}.fill-rhetoric{background:var(--rhetoric)}.fill-green{background:var(--green)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.completion-btn{padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:16px;transition:all .2s}
.btn-grammar{background:var(--grammar);border-color:var(--grammar);color:#fff}
.btn-logic{background:var(--logic);border-color:var(--logic);color:#000}
.btn-rhetoric{background:var(--rhetoric);border-color:var(--rhetoric);color:#fff}
.completion-btn.done{background:transparent!important}
.completion-btn.done.btn-grammar{border-color:var(--grammar);color:var(--grammar)}
.completion-btn.done.btn-logic{border-color:var(--logic);color:var(--logic)}
.completion-btn.done.btn-rhetoric{border-color:var(--rhetoric);color:var(--rhetoric)}
.chain-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
.chain-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.chain-item:hover{border-color:var(--green)}
.chain-item.fail{border-color:var(--red);background:var(--red-dim);animation:pulse-red 2s infinite}
.chain-item.pass{border-color:var(--green);background:var(--green-dim)}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-family:var(--font-sans);font-size:14px;margin-top:4px}
.calc-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sans);margin-top:8px;width:100%}
.calc-btn:hover{opacity:.9}
.assist-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
.assist-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-sans)}
.assist-btn:hover{border-color:var(--accent);color:var(--text)}
.clarify-box{flex-basis:100%;background:var(--panel);border:1px solid var(--grammar);border-radius:10px;padding:12px 14px;margin-top:8px}
.series-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin:12px 0;border-top:1px solid var(--border)}
.series-nav a{color:var(--green);text-decoration:none;font-size:13px}
.series-nav a:hover{text-decoration:underline}
.nav-footer{border-top:1px solid var(--border);padding:16px 0;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text-muted)}
.nav-footer a{color:var(--green);text-decoration:none;margin-left:16px}
.nav-footer a:hover{color:var(--green)}
@media print{.no-print{display:none!important}}
.selectable-text{user-select:text;-webkit-user-select:text;-moz-user-select:text;cursor:text}
@media(max-width:900px){.chain-layout{grid-template-columns:1fr}}
@media(max-width:768px){header{flex-wrap:wrap;padding:14px 16px}header h1{font-size:18px}.main{padding:16px 12px}.tab-btn{padding:8px 12px;font-size:13px}.card{padding:16px}.nav-footer{flex-direction:column;text-align:center}.nav-footer a{margin-left:0;margin-right:12px}}

/* ═══ VISUAL GUIDE DIAGRAM STYLES ═══ */
.step-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.step-btn{padding:8px 16px;border-radius:6px;font:500 12px var(--font-sans);cursor:pointer;transition:all .15s;min-width:120px}
.narrative-panel{margin-top:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);line-height:1.7}
.narrative-panel .np-title{font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.narrative-panel .np-body{margin-bottom:8px}
.narrative-panel .np-takeaway{font-weight:600;color:var(--text-bright)}
.vg-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px}
.vg-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font:500 12px var(--font-sans);color:var(--text-dim);transition:all .15s}
.vg-filter-btn:hover{background:var(--surface);color:var(--text)}
.vg-filter-btn.active{background:transparent;border-color:var(--green);color:var(--green);font-weight:600}
.dc-story-body{font-size:17px;line-height:1.9;color:var(--text)}
.dc-story-body p{margin-bottom:22px !important;font-size:17px;line-height:1.9}
.dc-story-body h2{font-family:Georgia,"Times New Roman",serif !important;font-size:26px !important;font-weight:400 !important;color:var(--text-bright) !important;margin-bottom:28px !important;text-align:center;letter-spacing:0.3px}
.dc-story-body h3{font-family:Georgia,"Times New Roman",serif !important;font-size:19px !important;font-weight:500 !important;color:var(--text-bright) !important;margin:36px 0 16px !important}
.dc-story-body blockquote{margin:32px 0 !important;padding:18px 24px 18px 28px !important;border-left:3px solid var(--green) !important;background:var(--green-dim) !important;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.dc-story-body blockquote p{margin-bottom:0 !important}
.dc-story-body hr{margin:36px auto !important;width:80px;border:none !important;border-top:1px solid var(--border-light) !important}
.dc-story-body em{font-style:italic}
.dc-story-body strong{color:var(--text-bright)}
.dc-story-body .dc-story-dropcap::first-letter{float:left;font-family:Georgia,"Times New Roman",serif;font-size:68px;line-height:0.85;padding-right:10px;padding-top:4px;color:var(--green);font-weight:400}
@media(max-width:600px){.dc-authbtn-dropdown{position:fixed !important;top:68px !important;left:12px !important;right:12px !important;min-width:0 !important;width:auto !important}}
</style>
</head>
<body>
<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('root');
  if (el && (!el.innerHTML || el.innerHTML.trim() === '')) {
    el.innerHTML = '<div style="max-width:700px;margin:60px auto;font-family:system-ui;padding:24px;border:2px solid #dc2626;border-radius:12px;background:#fef2f2">'
      + '<h2 style="color:#dc2626;margin:0 0 12px">⚠️ Tool Error</h2>'
      + '<p style="color:#374151;margin:0 0 8px"><strong>DC-AI-001 v3.1.0</strong> failed to load.</p>'
      + '<div style="background:#1f2937;color:#f87171;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;margin:12px 0">'
      + 'Error: ' + msg + '\nLine: ' + line + ', Col: ' + col
      + (err && err.stack ? '\n\nStack:\n' + err.stack.substring(0,500) : '')
      + '</div>'
      + '<p style="color:#6b7280;font-size:13px;margin:8px 0 0">Copy this error and send to LM.</p>'
      + '</div>';
  }

// AssistBar - Clarify only (Grammar), no Read Aloud

function AssistBar({fact,level,stage}){
  const [clarifyStep,setClarifyStep]=useState(-1);
  const clarifyContent = [
    {label:"Think of it like… (1/3)", text: fact && fact.feynman ? fact.feynman.analogy : (fact ? fact.plain : '')},
    {label:"From the ground up… (2/3)", text: fact && fact.feynman ? fact.feynman.firstPrinciples : (fact ? fact.number : '')},
    {label:"You understand this when… (3/3)", text: fact && fact.feynman ? fact.feynman.theTest : (fact ? fact.definition : '')}
  ];
  const handleClarify = (e) => {
    e.stopPropagation();
    setClarifyStep(prev => prev < 0 ? 0 : prev < 2 ? prev + 1 : -1);
  };
  if(stage !== 'grammar' || !fact) return null;
  return (
    <div className="assist-bar" onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <button className="assist-btn" onClick={handleClarify}>
        {clarifyStep >= 0 ? (clarifyStep < 2 ? 'Try again →' : 'Got it') : '💡 Clarify'}
      </button>
      {clarifyStep >= 0 && clarifyStep < 3 && (
        <div className="clarify-box fade-in" style={{flexBasis:'100%',userSelect:'text',cursor:'text'}}
          onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--grammar)',marginBottom:6}}>{clarifyContent[clarifyStep].label}</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.8}}>{clarifyContent[clarifyStep].text}</div>
        </div>
      )}
    </div>
  );
}

function PersonaHeatMap({persona, onPersonaLevel, PERSONA_MAP}) {
  const [sel, setSel] = React.useState(null); // {pKey, lIdx}
  const [tip, setTip] = React.useState(null); // {text, x, y}

  const PKEYS = ['conor','helena','eoin','rachel','padraig'];

  // Compute rhetoric text lengths per persona per level
  const raw = React.useMemo(() => {
    return PKEYS.map(pk =>
      LEVELS.map(lvl => {
        const r = lvl.rhetoric[pk];
        return typeof r === 'object' ? (r.text||'').length : (r||'').length;
      })
    );
  }, []);

  // Normalise per row (per persona) — min/max within that persona's row
  const norm = React.useMemo(() => {
    return raw.map(row => {
      const mn = Math.min(...row), mx = Math.max(...row);
      return row.map(v => (mx === mn) ? 0.5 : (v - mn) / (mx - mn));
    });
  }, [raw]);

  const PINFO = [
    {key:'conor',  icon:'💼',label:'Conor',  role:'Asset Manager'},
    {key:'helena', icon:'🖥',label:'Helena', role:'CTO'},
    {key:'eoin',   icon:'🔧',label:'Eoin',   role:'MEP Engineer'},
    {key:'rachel', icon:'🌱',label:'Rachel', role:'ESG Director'},
    {key:'padraig',icon:'📊',label:'Padraig',role:'QS / Cost'},
  ];

  const cellStyle = (pi, li) => {
    const intensity = norm[pi][li];
    const isSel = sel && sel.pIdx === pi && sel.lIdx === li;
    return {
      height: 32,
      borderRadius: 4,
      cursor: 'pointer',
      background: `rgba(124,58,237,${(0.12 + intensity * 0.75).toFixed(2)})`,
      border: isSel ? '2px solid var(--green)' : '1.5px solid transparent',
      transition: 'transform .1s',
    };
  };

  const handleSelect = (pi, li) => {
    setSel(prev => (prev && prev.pIdx === pi && prev.lIdx === li) ? null : {pIdx:pi, lIdx:li});
  };

  const handleGo = () => {
    if (!sel) return;
    onPersonaLevel(PINFO[sel.pIdx].key, sel.lIdx);
  };

  const selP = sel ? PINFO[sel.pIdx] : null;
  const selL = sel ? LEVELS[sel.lIdx] : null;
  const selText = sel ? (() => {
    const r = LEVELS[sel.lIdx].rhetoric[PINFO[sel.pIdx].key];
    return typeof r === 'object' ? (r.text||'') : (r||'');
  })() : '';

  return React.createElement('div', {style:{marginTop:8}},
    // Label
    React.createElement('div', {style:{fontSize:12,color:'var(--text-dim)',marginBottom:8,fontFamily:'var(--font-mono)'}},
      'PERSONA RELEVANCE MAP — click a cell to navigate'),

    // Grid — scrollable wrapper
    React.createElement('div', {style:{overflowX:'auto'}},
      React.createElement('div', {style:{
        display:'grid',
        gridTemplateColumns:'90px repeat(9,1fr)',
        gap:3,
        minWidth:520,
      }},
        // Header row
        React.createElement('div', null),
        ...LEVELS.map((lvl,li) =>
          React.createElement('div', {key:lvl.id, style:{
            fontSize:9, textAlign:'center', color:'var(--text-muted)',
            fontFamily:'var(--font-mono)', lineHeight:1.3, padding:'0 2px'
          }},
            React.createElement('div', {style:{fontWeight:600, color:'var(--text-dim)', fontSize:10}}, `L${li+1}`),
            lvl.title.split(' ').slice(0,2).join(' ')
          )
        ),
        // Persona rows
        ...PINFO.map((p, pi) => [
          // Row label
          React.createElement('div', {key:`rl-${pi}`, style:{
            display:'flex', alignItems:'center', gap:5,
            fontSize:11, color:'var(--text-bright)', paddingRight:4,
            fontWeight: persona===p.key ? 600 : 400,
            opacity: persona && persona!==p.key ? 0.6 : 1,
          }},
            React.createElement('span', {style:{fontSize:13}}, p.icon),
            React.createElement('div', null,
              React.createElement('div', {style:{fontWeight:500}}, p.label),
              React.createElement('div', {style:{fontSize:9,color:'var(--text-muted)'}}, p.role)
            )
          ),
          // Cells
          ...LEVELS.map((lvl, li) =>
            React.createElement('div', {
              key:`c-${pi}-${li}`,
              style:cellStyle(pi, li),
              title:`${p.icon} ${p.label} on ${lvl.title}`,
              onClick: () => handleSelect(pi, li),
            })
          )
        ]).flat()
      )
    ),

    // Selected preview
    sel && React.createElement('div', {style:{
      marginTop:10, padding:'10px 12px',
      background:'var(--panel)', borderRadius:8,
      borderLeft:'3px solid var(--rhetoric)',
      fontSize:12, lineHeight:1.7, color:'var(--text)',
    }},
      React.createElement('div', {style:{
        fontSize:10, fontFamily:'var(--font-mono)',
        color:'var(--rhetoric)', marginBottom:4
      }},
        `${selP.icon} ${selP.label} — L${sel.lIdx+1}: ${selL.name}`),
      selText.length > 120 ? selText.slice(0,120)+'…' : selText
    ),

    // Action buttons
    React.createElement('div', {style:{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}},
      React.createElement('button', {
        onClick: handleGo,

function PersonaEntryCard({setActiveTab, setSelectedLevel}) {
  const STORAGE_KEY = 'dc_persona_' + (typeof TOOL_VERSION !== 'undefined' ? TOOL_VERSION.split('.')[0] : '002');
  const [activePersona, setActivePersona] = React.useState(() => {
    try { return localStorage.getItem(STORAGE_KEY) || null; } catch(e) { return null; }
  });

  const selectPersona = (key) => {
    const next = activePersona === key ? null : key;
    setActivePersona(next);
    try {
      if (next) localStorage.setItem(STORAGE_KEY, next);
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
  };

  const PINFO = [
    {key:'conor',   label:'Conor',   role:'Asset Manager',   color:'var(--accent)'},
    {key:'helena',  label:'Helena',  role:'CTO',             color:'#e879a0'},
    {key:'eoin',    label:'Eoin',    role:'MEP Engineer',    color:'var(--green)'},
    {key:'rachel',  label:'Rachel',  role:'ESG Director',    color:'#2dd4bf'},
    {key:'padraig', label:'Padraig', role:'QS / Cost',       color:'#fb923c'},
  ];

  const pkeys = ['conor','helena','eoin','rachel','padraig'];

  // Compute top 3 levels per persona by rhetoric text length
  const top3 = React.useMemo(() => {
    const result = {};
    pkeys.forEach(pk => {
      const all = LEVELS.map((lvl, idx) => {
        const r = lvl.rhetoric && lvl.rhetoric[pk];
        const text = typeof r === 'object' ? (r.hook || r.text || '') : (r || '');
        return {idx, lvl, text, len: text.length};
      });
      const avg = all.reduce((s,x) => s + x.len, 0) / all.length;
      const threshold = avg * 0.5;
      // Filter levels above threshold, cap at 5, sort by level number ascending
      const filtered = all
        .filter(x => x.len >= threshold)
        .sort((a,b) => b.len - a.len)
        .slice(0, 5)
        .sort((a,b) => a.idx - b.idx);
      result[pk] = filtered.length >= 2 ? filtered : all.sort((a,b) => b.len - a.len).slice(0,2).sort((a,b) => a.idx - b.idx);
    });
    return result;
  }, []);

  const goToLevel = (idx) => {
    setSelectedLevel(idx);
    setActiveTab('learn');
    // Navigate to rhetoric stage — store in sessionStorage for LearnTab to pick up
    sessionStorage.setItem('dc_persona_stage', 'rhetoric');
    if (activePersona) sessionStorage.setItem('dc_persona_key', activePersona);
  };

  const activePInfo = activePersona ? PINFO.find(p => p.key === activePersona) || null : null;
  const activeTop3 = (activePersona && activePInfo) ? top3[activePersona] : null;

  return React.createElement('div', {
    style:{
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:12, padding:'16px 20px', marginBottom:18,
    }
  },

    // Header row
    React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}},
      React.createElement('span', {style:{fontSize:14, fontWeight:600, color:'var(--text-bright)'}},
        (activePersona && activePInfo) ? `Viewing as ${activePInfo.label} — ${activePInfo.role}` : 'Your professional angle on this module →'
      ),
      (activePersona && activePInfo) && React.createElement('button', {
        onClick: () => selectPersona(null),
        style:{
          fontSize:11, color:'var(--text-muted)', background:'none',
          border:'none', cursor:'pointer', fontFamily:'var(--font-sans)',
          padding:'2px 6px', borderRadius:4,
        }
      }, 'Clear')
    ),

    // Persona buttons
    React.createElement('div', {style:{display:'flex', gap:8, flexWrap:'wrap', marginBottom: activePersona ? 16 : 0}},
      PINFO.map(p =>
        React.createElement('button', {
          key: p.key,
          onClick: () => selectPersona(p.key),
          style:{
            padding:'6px 14px', fontSize:12, fontWeight:500,
            borderRadius:6, cursor:'pointer', fontFamily:'var(--font-sans)',
            background: activePersona === p.key ? p.color : 'var(--surface)',
            color: activePersona === p.key ? '#fff' : 'var(--text-dim)',
            border: `1px solid ${activePersona === p.key ? p.color : 'var(--border)'}`,
            transition:'all .15s', textAlign:'center', lineHeight:1.3,
          }
        },
          React.createElement('div', {style:{fontWeight:600}}, p.label),
          React.createElement('div', {style:{fontSize:9, opacity:0.8, marginTop:1}}, p.role)
        )
      )
    ),

    // Top 3 panel — only when persona selected
    (activePersona && activePInfo && activeTop3) && React.createElement('div', {style:{borderTop:'1px solid var(--border)', paddingTop:14}},
      React.createElement('div', {style:{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:10}},
        'WHERE YOUR PROFESSIONAL PERSPECTIVE IS RICHEST'
      ),
      activeTop3.map((item, i) =>
        React.createElement('div', {
          key: item.idx,
          style:{
            display:'flex', alignItems:'flex-start', gap:12,
            padding:'10px 12px', marginBottom:6, borderRadius:8,
            background:'var(--panel)',
            borderLeft:`3px solid ${activePInfo.color}`,
            cursor:'pointer',
          },
          onClick: () => goToLevel(item.idx),
        },
          React.createElement('div', {style:{
            fontSize:10, fontFamily:'var(--font-mono)', fontWeight:700,
            color: activePInfo.color, minWidth:28, paddingTop:2,
          }}, `L${item.lvl.level}`),
          React.createElement('div', {style:{flex:1}},
            React.createElement('div', {style:{fontSize:13, fontWeight:600, color:'var(--text-bright)', marginBottom:3}},
              item.lvl.title
            ),
            LEVELS[item.idx].rhetoric[activePersona]?.hook && React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', lineHeight:1.4, fontStyle:'italic', overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical'}},
              '\u201c' + LEVELS[item.idx].rhetoric[activePersona].hook + '\u201d'
            )
          ),
          React.createElement('div', {style:{fontSize:11, color:'var(--rhetoric)', whiteSpace:'nowrap', paddingTop:2, fontFamily:'var(--font-mono)'}},
            'Rhetoric →'
          )
        )
      ),

      // Primary CTA — go to top level
      React.createElement('button', {
        onClick: () => goToLevel(activeTop3[0].idx),
        style:{
          marginTop:10, padding:'8px 18px', fontSize:13, fontWeight:600,
          background: activePInfo.color, color:'#fff',
          border:'none', borderRadius:7, cursor:'pointer',
          fontFamily:'var(--font-sans)',
        }
      }, `Go to L${activeTop3[0].lvl.level} — Rhetoric →`)
    )
  );
}

function ClockFace({remaining,total,active,overtime}){
  const size=64,cx=size/2,cy=size/2,r=26;
  const pct=overtime?1:Math.max(0,1-remaining/total);
  const angle=pct*360;
  const handLen=20;
  const handAngle=(pct*360-90)*Math.PI/180;
  const hx=cx+handLen*Math.cos(handAngle);
  const hy=cy+handLen*Math.sin(handAngle);
  const col=overtime?'var(--red)':active?'var(--green)':'var(--text-muted)';
  const trackCol=overtime?'var(--red-dim)':'var(--green-dim)';
  const arcEnd=((angle-90)*Math.PI/180);
  const arcStart=((-90)*Math.PI/180);
  const sx=cx+r*Math.cos(arcStart),sy=cy+r*Math.sin(arcStart);
  const ex=cx+r*Math.cos(arcEnd),ey=cy+r*Math.sin(arcEnd);
  const large=angle>180?1:0;
  const arcPath=angle>0&&angle<360?`M${sx},${sy}A${r},${r},0,${large},1,${ex},${ey}`:'';
  // Tick marks
  const ticks=[];
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const ix=cx+(r+3)*Math.cos(a);const iy=cy+(r+3)*Math.sin(a);const ox=cx+(r+6)*Math.cos(a);const oy=cy+(r+6)*Math.sin(a);ticks.push(<line key={i} x1={ix} y1={iy} x2={ox} y2={oy} stroke="var(--border-light)" strokeWidth={i%3===0?1.5:0.5}/>);}
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="2"/>
      {arcPath && <path d={arcPath} fill="none" stroke={trackCol} strokeWidth="4" strokeLinecap="round"/>}
      {ticks}
      <circle cx={cx} cy={cy} r="2.5" fill={col}/>
      {(active||overtime) && <line x1={cx} y1={cy} x2={hx} y2={hy} stroke={col} strokeWidth="2" strokeLinecap="round"/>}
      {!active&&!overtime && <line x1={cx} y1={cy} x2={cx} y2={cy-handLen} stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" opacity="0.4"/>}
    </svg>
  );
}

function AssessmentTab(){
  // P2 — Option shuffle (deterministic per session via seeded LCG per question)
  const SHUFFLED_QUESTIONS = useMemo(() => {
    function seedRand(seed) {
      let s = seed;
      return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
    }
    function strHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return h >>> 0;
    }
    return ASSESSMENT_QUESTIONS.map(function(q) {
      const rand = seedRand(strHash(q.id));
      const indices = [0,1,2,3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const newOptions = indices.map(function(i) { return q.options[i]; });
      const newCorrect = indices.indexOf(q.correct);
      return Object.assign({}, q, { options: newOptions, correct: newCorrect });
    });
  }, []);

  const TIER_SECONDS = { grammar: 60, logic: 120, rhetoric: 90 };

  const [filterStage,setFilterStage]=useState('all');
  const [filterLevel,setFilterLevel]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState({correct:0,total:0});
  const [timedOut,setTimedOut]=useState({});
  const [timerActive,setTimerActive]=useState(false);
  // B5: per-question start timestamps {qi: Date.now()} — resets per question
  const [qStartTimes,setQStartTimes]=useState({});
  // Tick counter drives per-question countdown display (1s resolution)
  const [tick,setTick]=useState(0);
  // Global session elapsed (for the 15:00 overview clock only)
  const [elapsed,setElapsed]=useState(0);
  const intervalRef=React.useRef(null);
  const sessionStartRef=React.useRef(null);

  // Master 1s tick — drives both global elapsed and per-question countdowns
  React.useEffect(()=>{
    if(timerActive){
      if(!sessionStartRef.current) sessionStartRef.current=Date.now()-elapsed*1000;
      intervalRef.current=setInterval(()=>{
        const now=Date.now();
        setElapsed(Math.floor((now-sessionStartRef.current)/1000));
        setTick(t=>t+1);
      },1000);
    } else {
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
    return ()=>{if(intervalRef.current)clearInterval(intervalRef.current);};
  },[timerActive]);

  // Visibility change — pause on tab switch
  React.useEffect(()=>{
    function handleVis(){
      if(document.hidden && timerActive){
        setTimerActive(false);
        if(intervalRef.current) clearInterval(intervalRef.current);
      }
    }
    document.addEventListener('visibilitychange',handleVis);
    return ()=>document.removeEventListener('visibilitychange',handleVis);
  },[timerActive]);

  // Per-question timeout check on every tick
  React.useEffect(()=>{
    if(!timerActive) return;
    const now=Date.now();
    const newTimeouts={};
    SHUFFLED_QUESTIONS.forEach(function(q,qi){
      if(answers[qi]!==undefined||timedOut[qi]) return;
      if(qStartTimes[qi]===undefined) return; // not yet started
      const limit=TIER_SECONDS[q.stage]||60;
      const qElapsed=Math.floor((now-qStartTimes[qi])/1000);
      if(qElapsed>=limit){
        newTimeouts[qi]=true;
        dcTimingLog.log('assess_q_timeout',{qi,stage:q.stage,level:q.level,limit});
      }
    });
    if(Object.keys(newTimeouts).length>0){
      setTimedOut(prev=>Object.assign({},prev,newTimeouts));
      setScore(prev=>({correct:prev.correct,total:prev.total+Object.keys(newTimeouts).length}));
      setAnswers(prev=>{
        const next=Object.assign({},prev);
        Object.keys(newTimeouts).forEach(qi=>{next[qi]=-1;});
        return next;
      });
      // Start timer for next unanswered question
      setQStartTimes(prev=>{
        const next=Object.assign({},prev);
        const timedOutSet=Object.assign({},newTimeouts);
        for(let qi=0;qi<SHUFFLED_QUESTIONS.length;qi++){
          if(answers[qi]===undefined&&!timedOut[qi]&&!timedOutSet[qi]&&next[qi]===undefined){
            next[qi]=Date.now();
            break;
          }
        }
        return next;
      });
    }
  },[tick,timerActive]);

  const allAnswered=score.total>=SHUFFLED_QUESTIONS.length;
  const COUNTDOWN_TOTAL=900;
  const remaining=Math.max(0,COUNTDOWN_TOTAL-elapsed);
  const overtime=elapsed>COUNTDOWN_TOTAL;
  const overtimeAmt=overtime?elapsed-COUNTDOWN_TOTAL:0;

  React.useEffect(()=>{
    if(allAnswered&&timerActive){
      setTimerActive(false);
      if(intervalRef.current) clearInterval(intervalRef.current);
    }
  },[allAnswered]);

  const filtered=SHUFFLED_QUESTIONS.filter(q=>{
    if(filterStage!=='all'&&q.stage!==filterStage) return false;
    if(filterLevel>0&&q.level!==filterLevel) return false;
    return true;
  });

  var cms=React.useState(false); var showCertModal=cms[0]; var setShowCertModal=cms[1];
  var assessPct=allAnswered?Math.round(score.correct/score.total*100):0;

  const handleAnswer=(qi,oi)=>{
    if(answers[qi]!==undefined||timedOut[qi]) return;
    // Start session on first answer
    if(!timerActive){
      setTimerActive(true);
      sessionStartRef.current=Date.now();
      dcTimingLog.log('assess_start',{module:TOOL_ID});
      // Start timer for this question and the next unanswered one after answering
      setQStartTimes({[qi]:Date.now()});
    }
    dcTimingLog.log('assess_q_submit',{qi,stage:SHUFFLED_QUESTIONS[qi].stage,level:SHUFFLED_QUESTIONS[qi].level,correct:SHUFFLED_QUESTIONS[qi].correct===oi});
    setAnswers(prev=>({...prev,[qi]:oi}));
    setScore(prev=>({correct:prev.correct+(SHUFFLED_QUESTIONS[qi].correct===oi?1:0),total:prev.total+1}));
    // Start timer for next unanswered question
    setQStartTimes(prev=>{
      const next=Object.assign({},prev);
      for(let i=0;i<SHUFFLED_QUESTIONS.length;i++){
        if(i!==qi&&next[i]===undefined&&answers[i]===undefined&&!timedOut[i]){
          next[i]=Date.now()+100; // slight delay so previous answer registers first
          break;
        }
      }
      return next;
    });
  };

  const globalIdx=(q)=>SHUFFLED_QUESTIONS.indexOf(q);
  const stageColours={grammar:'var(--grammar)',logic:'var(--logic)',rhetoric:'var(--rhetoric)'};
  const stageScore=(st)=>{const qs=SHUFFLED_QUESTIONS.filter(q=>q.stage===st);let c=0,t=0;qs.forEach(q=>{const gi=globalIdx(q);if(answers[gi]!==undefined){t++;if(answers[gi]===q.correct)c++;}});return {c,t,total:qs.length};};

  const handleReset=()=>{
    setAnswers({});setScore({correct:0,total:0});setElapsed(0);
    setTimerActive(false);setTimedOut({});setQStartTimes({});setTick(0);
    sessionStartRef.current=null;
    if(intervalRef.current) clearInterval(intervalRef.current);
    try{safeStore.remove('dc_ai_001_assess');}catch(e){}
  };
  const handlePause=()=>{setTimerActive(false);if(intervalRef.current)clearInterval(intervalRef.current);};
  const handleResume=()=>{
    // Offset all qStartTimes by pause duration
    const pausedAt=Date.now();
    setTimerActive(true);
  };

  // Persist / restore
  React.useEffect(()=>{
    if(score.total>0){try{safeStore.set('dc_ai_001_assess',JSON.stringify({answers,score,elapsed,filterStage,filterLevel,timedOut,qStartTimes}));}catch(e){}}
  },[answers,score,elapsed]);
  React.useEffect(()=>{
    try{const saved=safeStore.get('dc_ai_001_assess');if(saved){const s=JSON.parse(saved);if(s.answers)setAnswers(s.answers);if(s.score)setScore(s.score);if(s.elapsed)setElapsed(s.elapsed);if(s.filterStage)setFilterStage(s.filterStage);if(s.filterLevel!==undefined)setFilterLevel(s.filterLevel);if(s.timedOut)setTimedOut(s.timedOut);if(s.qStartTimes)setQStartTimes(s.qStartTimes);}}catch(e){}
  },[]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};
  const fmtCountdown=(s)=>{const m=Math.floor(s/60);const ss=s%60;return m+':'+String(ss).padStart(2,'0');};

  return (
    <div>
      <div className="card" style={{marginBottom:16,padding:12,borderLeft:'3px solid var(--green)'}}>
        <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.8}}>
          27 questions across three Trivium stages — 9 per stage, one per chain level.
          <strong> Knowledge Check</strong> (Grammar): can you recall the key facts? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>60s</span>
          <strong> Eng. Calculation</strong> (Logic): can you work through the consequences? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>120s</span>
          <strong> Prof. Judgement</strong> (Rhetoric): can you explain it to each stakeholder? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)'}}>90s</span>
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'10px 0',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <ClockFace remaining={remaining} total={COUNTDOWN_TOTAL} active={timerActive} overtime={overtime}/>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:overtime?'var(--red)':timerActive?'var(--green)':allAnswered?'var(--grammar)':'var(--text-muted)',letterSpacing:2}}>
                {overtime ? '+'+fmtTime(overtimeAmt) : fmtTime(remaining)}
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                {!timerActive&&!allAnswered&&elapsed===0 ? '15:00 — starts on first answer' : overtime ? 'Over time' : allAnswered ? 'Complete' : score.total+'/'+SHUFFLED_QUESTIONS.length+' answered'}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {timerActive && <button style={{padding:'5px 12px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:'var(--text-dim)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-sans)'}} onClick={handlePause}>Pause</button>}

        </div>

        const isTimedOut=timedOut[gi];
        const qLimit=TIER_SECONDS[q.stage]||60;
        // B5: per-question independent countdown
        const qStarted=qStartTimes[gi]!==undefined;
        const qElapsedSec=qStarted?Math.floor((Date.now()-qStartTimes[gi])/1000):0;
        const qRemain=Math.max(0,qLimit-qElapsedSec);
        const qFrac=qLimit>0?qRemain/qLimit:0;
        const barCol=qFrac>0.33?'var(--green)':qFrac>0.15?'var(--logic)':'var(--red,#dc2626)';

              {/* B5: per-question countdown top-right */}
              {timerActive&&!answered&&!isTimedOut&&qStarted&&(
                <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:countdownCol,minWidth:36,textAlign:'right'}}>
                  {fmtCountdown(qRemain)}
                </span>
              )}
              {isTimedOut&&<span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--red,#dc2626)',marginLeft:'auto'}}>⏱ TIMED OUT</span>}
              {!timerActive&&!answered&&!isTimedOut&&elapsed>0&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto',fontFamily:'var(--font-mono)'}}>paused</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text-bright)',marginBottom:4}}>{q.q}</div>
            {timerActive&&!answered&&!isTimedOut&&qStarted&&(
              <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(qFrac*100)+'%',background:barCol,borderRadius:2,transition:'width 0.9s linear, background 0.3s'}}/>
              </div>
            )}
            {(!timerActive||!qStarted)&&!answered&&!isTimedOut&&<div style={{height:3,marginBottom:8}}/>}
            {q.options.map((opt,oi)=>{
              let cls='assess-option';
              if(answered){if(oi===q.correct)cls+=' correct';else if(answers[gi]===oi&&answers[gi]!==-1)cls+=' incorrect';}
              if(isTimedOut&&!answered)cls+=' timed-out';
              return(<div key={oi} className={cls} style={isTimedOut?{pointerEvents:'none',opacity:0.5}:{}} onClick={()=>handleAnswer(gi,oi)}>{String.fromCharCode(65+oi)}. {opt}</div>);
            })}
            {isTimedOut&&<div className="assess-feedback" style={{borderLeftColor:'var(--red,#dc2626)'}}>⏱ Time expired ({qLimit}s). {q.explain}</div>}
            {answered&&!isTimedOut&&<div className="assess-feedback">{q.explain}</div>}
          </div>
        );
      })}
    </div>
  );
}

function issueEngageCertificate(learnerName, learnerEmail) {
  if (!supa) { console.warn('Supabase not loaded'); return Promise.resolve(null); }
  var certNumber = generateCertNumber(TOOL_ID);
  var userId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'anon-' + Date.now();
  var checkResult = supa.from('certificates').select('certificate_number').eq('module_id', TOOL_ID).eq('learner_name', learnerName).maybeSingle();
  return checkResult.then(function(existing) {
    if (existing.data) { return { duplicate: true, certNumber: existing.data.certificate_number }; }
    return supa.from('certificates').insert([{
      user_id: userId, module_id: TOOL_ID, certificate_number: certNumber,
      cpd_hours: 2, certificate_type: 'Engagement', score: null,
      learner_name: learnerName, pdf_url: null
    }]).select().single().then(function(result) {
      if (result.error) { console.error('Engagement cert failed:', result.error.message); return null; }
      return { certNumber: certNumber, type: 'Engagement', hours: 2, pct: null };
    });
  });
}

const DC_PROGRESS_KEY = 'dc' + TOOL_ID.replace('DC-LEARN-','') + '_progress';

const dcAuth = {
  async sendMagicLink(email) {
    if (!supa) return { error: 'Not connected' };
    try {
      const { error } = await supa.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      return { error };
    } catch(e) { return { error: (e && e.message) || 'Network error' }; }
  },
  async signOut() {
    if (!supa) return;
    try { await supa.auth.signOut(); } catch(e) {}
    try { localStorage.removeItem('dc_learn_paid'); } catch(e) {}
  },
  isPaid() { try { return localStorage.getItem('dc_learn_paid') === 'true'; } catch(e) { return false; } },
  setPaid() { try { localStorage.setItem('dc_learn_paid', 'true'); } catch(e) {} },
  isAdminUser(user) {
    try { return !!(user && user.user_metadata && user.user_metadata.role === 'admin'); }
    catch(e) { return false; }
  },
  async checkLicence(userId) {
    if (!supa || !userId) return null;
    try {
      const { data, error } = await supa.from('licences')
        .select('id, tier, status')
        .eq('user_id', userId)
        .eq('status', 'active')
        .limit(1);
      if (error) throw error;
      return !!(data && data.length > 0);
    } catch(e) {
      console.warn('DC-LEARN: licence check failed, falling through', (e && e.message) || e);
      return null;
    }
  },
  hasAccess() { return IS_FREE_MODULE || this.isPaid(); },
};

function useAuth() {
  const [state, setState] = React.useState({
    loading: !!supa,
    user: null,
    isAdmin: false,
    hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
  });

  React.useEffect(() => {
    let mounted = true;

    async function resolve(session) {
      if (!mounted) return;
      try {
        if (session && session.user) {
          const user = session.user;
          if (dcAuth.isAdminUser(user)) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: true, hasAccess: true });
            return;
          }
          const licenceOk = await dcAuth.checkLicence(user.id);
          if (licenceOk === true) {
            dcAuth.setPaid();
            setState({ loading: false, user: user, isAdmin: false, hasAccess: true });
          } else {
            // licenceOk === null (error: fall through) or false (no row)
            setState({
              loading: false, user: user, isAdmin: false,
              hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
            });
          }
          return;
        }
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      } catch(e) {
        console.warn('DC-LEARN: auth resolve failed, falling through', (e && e.message) || e);
        setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    }

    if (!supa) {
      setState({
        loading: false, user: null, isAdmin: false,
        hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
      });
      return () => { mounted = false; };
    }

    (async () => {
      try {
        const { data: { session } } = await supa.auth.getSession();
        await resolve(session);
      } catch(e) {
        console.warn('DC-LEARN: getSession failed, falling through', (e && e.message) || e);
        if (mounted) setState({
          loading: false, user: null, isAdmin: false,
          hasAccess: IS_FREE_MODULE || dcAuth.isPaid(),
        });
      }
    })();

    let sub = null;
    try {
      const r = supa.auth.onAuthStateChange((_ev, session) => { resolve(session); });
      sub = r && r.data && r.data.subscription;
    } catch(e) {}

    return () => {
      mounted = false;
      try { if (sub) sub.unsubscribe(); } catch(e) {}
    };
  }, []);

  return state;
}

function PlatformSync({ user, progress }) {
  React.useEffect(() => {
    if (!supa || !user || !user.id) return;
    let cancelled = false;
    (async () => {
      try {
        // 1. Flush timing buffer → learner_analytics, then clear on success
        const raw = safeStore.get(DC_TIMING_KEY);
        if (raw) {
          let events = [];
          try { events = JSON.parse(raw); } catch(e) { events = []; }
          if (!cancelled && Array.isArray(events) && events.length) {
            const rows = events.slice(0, 500).map(function(ev) {
              return {
                user_id: user.id,
                module_id: TOOL_ID,
                event_type: (ev && ev.event) || 'unknown',
                event_data: ev || {},
                recorded_at: new Date((ev && ev.ts) || Date.now()).toISOString(),
              };
            });
            const { error } = await supa.from('learner_analytics').insert(rows);
            if (!error) safeStore.remove(DC_TIMING_KEY);
            else console.warn('DC-LEARN: analytics flush failed', error.message);
          }
        }
        // 2. Upsert progress → learner_progress (keeps localStorage as cache)
        if (!cancelled && progress && typeof progress === 'object') {
          const keys = Object.keys(progress);
          const rows = keys.map(function(levelId) {
            const p = progress[levelId] || {};
            return {
              user_id: user.id,
              module_id: TOOL_ID,
              level_id: String(levelId),
              grammar_complete: !!p.grammar,
              logic_complete: !!p.logic,
              rhetoric_complete: !!p.rhetoric,
              updated_at: new Date().toISOString(),
            };
          });
          if (rows.length) {
            const { error } = await supa.from('learner_progress').upsert(rows, {
              onConflict: 'user_id,module_id,level_id',
            });
            if (error) console.warn('DC-LEARN: progress upsert failed', error.message);
          }
        }
      } catch(e) {
        console.warn('DC-LEARN: PlatformSync error', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [user && user.id, JSON.stringify(progress || {})]);
  return null;
}

  React.useEffect(()=>{try{safeStore.set('dc_ai_001_progress',JSON.stringify(progress));}catch(e){}},[progress]);
  const [cascadeResults, setCascadeResults] = React.useState(() => { try { var s = safeStore.get('dc_ai_001_cascadeResults'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } });
  function onCascadeResult(lvlIdx, res) { setCascadeResults(function(p) { var n = Object.assign({}, p); n[lvlIdx] = res; safeStore.set('dc_ai_001_cascadeResults', JSON.stringify(n)); return n; }); }
  const [theme,setTheme]=useState('dark');
  // ── STAGE 3: Persona Entry (C2) ───────────────────────────────────
  const PERSONA_MAP = {conor:{label:'Asset Manager',icon:'💼',stage:'rhetoric',preview:true},helena:{label:'Chief Technology Officer',icon:'🖥',stage:'grammar',preview:false},eoin:{label:'MEP Retrofit Engineer',icon:'🔧',stage:'grammar',preview:false},rachel:{label:'ESG & Regulatory Director',icon:'🌱',stage:'rhetoric',preview:true},padraig:{label:'Project QS / Cost Manager',icon:'📊',stage:'logic',preview:true}};
  const [persona,setPersona]=useState(()=>{try{const s=safeStore.get('dc_ai_001_persona');return s||null;}catch(e){return null;}});
  const handlePersona = (key) => { setPersona(key); try{safeStore.set('dc_ai_001_persona',key);}catch(e){} dcTimingLog.log('persona_select',{persona:key}); setSelectedLevel(0); setActiveTab('learn'); };
  const handlePersonaLevel = (key, levelIdx) => { setPersona(key); try{safeStore.set('dc_ai_001_persona',key);}catch(e){} dcTimingLog.log('persona_select',{persona:key,level:levelIdx}); setSelectedLevel(levelIdx); setActiveTab('learn'); };
  const [tabTimes,setTabTimes]=useState(()=>{try{const s=safeStore.get('dc_ai_001_tabTimes');return s?JSON.parse(s):{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}catch(e){return{chain:0,learn:0,visual:0,challenges:0,assessment:0,progress:0};}});
  const tabStartRef=React.useRef(Date.now());
  const prevTabRef=React.useRef('chain');
  React.useEffect(()=>{
    const now=Date.now();
    const prev=prevTabRef.current;
    const dt=Math.floor((now-tabStartRef.current)/1000);
    if(dt>0){setTabTimes(prev2=>({...prev2,[prev]:prev2[prev]+dt}));}
    tabStartRef.current=now;
    prevTabRef.current=activeTab;
  },[activeTab]);
  React.useEffect(()=>{try{safeStore.set('dc_ai_001_tabTimes',JSON.stringify(tabTimes));}catch(e){}},[tabTimes]);
  // Analytics clock hooks (Stage 1 / B6)
  React.useEffect(()=>{ dcTimingLog.log('tab_switch', { tab: activeTab }); },[activeTab]);
  React.useEffect(()=>{ dcTimingLog.log('level_change', { level: selectedLevel }); },[selectedLevel]);
  const toggleTheme = () => { const next=theme==='dark'?'light':'dark'; setTheme(next); document.documentElement.setAttribute('data-theme',next); };
  const tabs = [{id:'chain',label:'Power Density'},{id:'learn',label:'Learn'},{id:'visual',label:'Visual Guide'},{id:'challenges',label:'Field Challenges'},{id:'assessment',label:'Assessment'},{id:'book',label:'The Story'},{id:'progress',label:'Progress'}];

  return (
    <div>
      {!IS_FREE_MODULE && !authState.hasAccess && !authState.loading && <LockedOverlay/>}
      <PlatformSync user={authState.user} progress={progress}/>
      <div id="lbe-audience-bar" className="no-print" style={{background:'linear-gradient(135deg,#1a1a1a,#2a2a2a)',padding:'8px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>AUDIENCE: Data Centre Professionals — Operators, Engineers, Fund Managers, ESG Analysts, Cost Managers</span>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#78a840'}}>DC-AI SERIES</span>
      </div>
      <header>
        <img src={LOGO_SRC} alt="LBE Logo" style={{borderRadius:'50%',overflow:'hidden'}} />
        <div><h1>Data Centre Power Density</h1><div className="sub">{TOOL_ID} v{TOOL_VERSION} · DC-AI Series · Legacy Business Engineers Ltd</div><div className="sub" style={{marginTop:4,fontSize:11,opacity:0.7}}>[MODULE_DESCRIPTION] — [N] levels from entry to mastery</div></div>
        <AuthButton authState={authState} onAuthChange={()=>{}}/>
        <button className="theme-toggle" onClick={toggleTheme}>{theme==='dark'?'☀️ Light':'🌙 Dark'}</button>
      </header>
      <div className="main">
        <div className="tab-row no-print" role="tablist">
          {tabs.map(t=>(<button key={t.id} className={'tab-btn'+(activeTab===t.id?' active':'')} role="tab" aria-selected={activeTab===t.id} onClick={()=>setActiveTab(t.id)}>{t.label}</button>))}
        </div>
        {activeTab==='chain' && <ChainTab setActiveTab={setActiveTab} setSelectedLevel={setSelectedLevel} selectedLevel={selectedLevel} progress={progress} persona={persona} onPersona={handlePersona} onPersonaLevel={handlePersonaLevel} PERSONA_MAP={PERSONA_MAP} cascadeResults={cascadeResults} onCascadeResult={onCascadeResult}/>}
        {activeTab==='learn' && <LearnTab selectedLevel={selectedLevel} setSelectedLevel={setSelectedLevel} progress={progress} setProgress={setProgress}/>}
        {activeTab==='visual'&&<VisualGuideTab/>}
      {activeTab==='challenges' && <FieldChallengesTab/>}
        {activeTab==='assessment' && <AssessmentTab/>}
        {activeTab==='book' && <BookTab/>}
        {activeTab==='progress' && <ProgressTab progress={progress} tabTimes={tabTimes}/>}
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',margin:'0 auto',maxWidth:1100,padding:'0 20px'}} className="no-print">
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>From learning to practice</div>
          <div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>The real-world version of what this module teaches is a DC Performance Assessment — an independent screening of a facility's cooling chain against CRU, EED, Taxonomy, and EPA requirements. It turns the theory into measured performance data and a prioritised action list.</div>
        </div>
        <div style={{flex:'1 1 300px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 22px',display:'flex',flexDirection:'column',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
          <div><div style={{fontWeight:600,fontSize:15,color:'var(--text-bright)',marginBottom:6}}>Questions or feedback on this content?</div><div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>Technical corrections, suggestions, or industry perspective welcome.</div></div>
          <a href="https://legacybe.ie/contact/" target="_blank" rel="noopener" style={{display:'inline-block',padding:'10px 24px',background:'var(--lbe-green)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600,fontSize:14,marginTop:12,textAlign:'center'}}>Send Us a Message</a>
        </div>
      </div>
      <div className="series-nav no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <span style={{color:'var(--text-muted)'}}>← No previous module</span>
        <span style={{color:'var(--text-muted)',fontSize:12}}>Module 1 of 8 · DC-AI Series v1.0</span>
        <a href="./dc-ai-002.html">DC-AI-002: Power Distribution →</a>
      </div>
      <div className="nav-footer no-print" style={{maxWidth:1100,margin:'0 auto',padding:'16px 20px'}}>
        <span>© 2026 Legacy Business Engineers Ltd</span>
        <div><a href="https://legacybe.ie" target="_blank" rel="noopener">legacybe.ie</a><a href="https://legacybe.ie/tools/" target="_blank" rel="noopener">Tools</a><a href="https://legacybe.ie/contact/" target="_blank" rel="noopener">Contact</a><a href="https://legacybe.ie/services/" target="_blank" rel="noopener">Services</a></div>
      </div>
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>, document.getElementById('root'));

</script>
</body>
</html>
